<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Story Set — Tilt</title>
<!--
  LOOP / attention-architecture — Story Set
  Circuits: 05-ease, 04-loss, 07-timing
  Engine: calm
  Mechanic: Story bubbles deplete their rings on their own. Tap to acknowledge
            before they expire. The game is watching them settle, not racing.
  Modes:
    ?demo=1&seed=7   scripted calm arc ~16s -> soft CTA -> __demoDone=true
    ?bot=1&runs=N&seed=5  imperfect autopilot N runs -> __botDone=true
-->
<style>
  html,body{margin:0;padding:0;height:100%;background:#0b0d12;overflow:hidden;
            -webkit-user-select:none;user-select:none;touch-action:manipulation;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;background:#0b0d12;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'story-set';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // palette — calm: no vermillion
  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var TEAL2 = 'rgba(46,197,182,', GOLD2 = 'rgba(242,177,52,';

  // ── Game constants ──────────────────────────────────────────────────────────
  var BUBBLE_R  = 36;       // bubble radius
  var RING_W    = 5;        // ring stroke width
  var COLS      = 4;        // bubbles per row
  var ROWS      = 3;        // rows
  var TOTAL     = COLS * ROWS;
  var SPACING_X = W / (COLS + 1);
  var ROW_Y     = [200, 340, 480]; // row Y positions

  // Time each bubble takes to drain (ms). Bubbles vary so the set empties
  // asynchronously — feels organic, not like a countdown timer.
  var BASE_DRAIN = 4800;    // fastest
  var DRAIN_VAR  = 3200;    // added range

  // ── State ──────────────────────────────────────────────────────────────────
  var phase;                // 'title'|'play'|'over'|'cta'
  var bubbles;              // array of bubble objects
  var score;                // acknowledged before expiry
  var expired;              // total that ran out untouched
  var runStartTs;
  var overAt, ctaAt;
  var hitStop, zoom, shakeAmt;
  var floats;               // floating text array
  var calStep;              // calm sound step counter
  var botRunsDone;

  // ── Input regions ──────────────────────────────────────────────────────────
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // ── Bubble factory ─────────────────────────────────────────────────────────
  function makeBubbles(offsetMs) {
    offsetMs = offsetMs || 0;
    var bubs = [];
    for (var row = 0; row < ROWS; row++) {
      for (var col = 0; col < COLS; col++) {
        var drain = BASE_DRAIN + rng() * DRAIN_VAR;
        // hue varies gently per bubble — soft avatar colors
        var hue = Math.floor(rng() * 300);
        bubs.push({
          col: col, row: row,
          x: SPACING_X * (col + 1),
          y: ROW_Y[row],
          drain: drain,
          elapsed: offsetMs * rng() * 0.3,  // slight stagger for bot pre-offset
          ack: false,       // tapped / acknowledged
          expired: false,
          fadeOut: 0,       // 0..1 alpha, animating when expired/acked
          hue: hue,
          pulseT: 0         // used for the soft pulse animation
        });
      }
    }
    return bubs;
  }

  function newGame() {
    hitStop = 0; zoom = 1; shakeAmt = 0; floats = []; calStep = 0;
    score = 0; expired = 0;
    phase = DEMO ? 'play' : (BOT ? 'play' : 'title');
    bubbles = makeBubbles(0);
    botRunsDone = 0;

    if (DEMO || BOT) {
      startRun();
    }
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ── Bubble ring fill (0..1) ─────────────────────────────────────────────
  function ringFill(b) {
    return Math.max(0, 1 - b.elapsed / b.drain);
  }

  // ── Acknowledge a bubble ─────────────────────────────────────────────────
  function ackBubble(b) {
    if (b.ack || b.expired) return;
    b.ack = true;
    score++;
    calStep++;
    if (window.J) J.calm(calStep);
    hitStop = 2.5;
    zoom = 1.018;
    floatText('+1', b.x, b.y - BUBBLE_R - 8, TEAL, 26);
    if (window.LOOP) LOOP.emit('bubble_acked', { score: score, ring: +ringFill(b).toFixed(2) });
  }

  function floatText(txt, x, y, color, size) {
    floats.push({ txt: txt, x: x, y: y, color: color, size: size || 24, t: 0 });
  }

  // ── Game over ────────────────────────────────────────────────────────────
  function endRun() {
    if (phase !== 'play') return;
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.calm(0);  // soft closing bell
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1), expired: expired });

    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2000);
      return;
    }

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 600);
      }
    }
  }

  function resetRun() {
    score = 0; expired = 0; floats = []; calStep = 0;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    bubbles = makeBubbles(0);
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ── Input ─────────────────────────────────────────────────────────────────
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play') {
      // find nearest unacked, unexpired bubble within tap radius
      var hit = null, best = Infinity;
      for (var i = 0; i < bubbles.length; i++) {
        var b = bubbles[i];
        if (b.ack || b.expired) continue;
        var dx = (x !== undefined ? x : b.x) - b.x;
        var dy = (y !== undefined ? y : b.y) - b.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < BUBBLE_R + 18 && dist < best) { best = dist; hit = b; }
      }
      if (hit) ackBubble(hit);
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 400) {
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') tap();
  });

  // ── Demo / Bot autopilot ─────────────────────────────────────────────────
  // Demo: scripted calm arc (settle → deepen → resolve)
  // demoQueue: list of bubble indices to ack, plus timing
  var demoQueue = null, demoQueueIdx = 0, demoTicksLeft = 0;

  // For demo we want a gentle, human-feeling arc:
  // watch a few expire untouched (settle), then start acknowledging (deepen),
  // end with a peaceful last ack (resolve).
  function buildDemoQueue() {
    // We'll pick 7 bubbles to ack out of 12. Remaining 5 expire naturally.
    // Indices map to bubbles array. We ack them with varying pauses.
    var picks = [0, 2, 4, 5, 7, 9, 11];
    var pauses = [2800, 1400, 900, 1200, 800, 1000, 1100]; // ms before acking
    demoQueue = picks.map(function (idx, i) { return { idx: idx, pause: pauses[i] }; });
    demoQueueIdx = 0;
  }

  var demoWaitMs = 0, demoLastMs = 0;

  // Bot: randomly ack about half the bubbles, then go passive so expiry triggers game_over
  var botAckSet = null, botTickMs = 0, botLastMs = 0, botPhaseIdx = 0;
  function buildBotQueue() {
    var picks = [];
    for (var i = 0; i < TOTAL; i++) {
      if (rng() < 0.55) picks.push(i);
    }
    // shuffle
    for (var j = picks.length - 1; j > 0; j--) {
      var k = Math.floor(rng() * (j + 1));
      var tmp = picks[j]; picks[j] = picks[k]; picks[k] = tmp;
    }
    botAckSet = picks;
    botPhaseIdx = 0;
    botTickMs = 400 + rng() * 600;
    botLastMs = 0;
  }

  function autopilot(nowMs) {
    if (phase !== 'play') return;

    if (DEMO) {
      if (!demoQueue) { buildDemoQueue(); demoLastMs = nowMs; demoWaitMs = demoQueue[0].pause; }
      if (demoQueueIdx >= demoQueue.length) return;  // all done, let rest expire
      if (nowMs - demoLastMs >= demoWaitMs) {
        var entry = demoQueue[demoQueueIdx];
        var b = bubbles[entry.idx];
        if (b && !b.ack && !b.expired) {
          ackBubble(b);
        }
        demoQueueIdx++;
        if (demoQueueIdx < demoQueue.length) {
          demoWaitMs = demoQueue[demoQueueIdx].pause;
        }
        demoLastMs = nowMs;
      }
    } else if (BOT) {
      if (!botAckSet) { buildBotQueue(); botLastMs = nowMs; }
      if (botPhaseIdx >= botAckSet.length) return;  // passive phase — let expiry happen
      if (nowMs - botLastMs >= botTickMs) {
        var idx = botAckSet[botPhaseIdx];
        var bb = bubbles[idx];
        if (bb && !bb.ack && !bb.expired) {
          ackBubble(bb);
        }
        botPhaseIdx++;
        botTickMs = 350 + rng() * 700;
        botLastMs = nowMs;
      }
    }
  }

  // ── Render helpers ───────────────────────────────────────────────────────
  function drawBubble(b, now) {
    if (b.ack && b.fadeOut >= 1) return;
    var fill = ringFill(b);
    var alpha = b.ack ? Math.max(0, 1 - b.fadeOut) : (b.expired ? Math.max(0, 1 - b.fadeOut) : 1);

    cx.save();
    cx.globalAlpha = alpha;

    // soft pulse when ring is >60% left (calm aliveness)
    var pulse = 1;
    if (!b.ack && !b.expired && fill > 0.6) {
      pulse = 1 + 0.025 * Math.sin(b.pulseT * 0.05);
    }
    cx.translate(b.x, b.y);
    cx.scale(pulse, pulse);
    cx.translate(-b.x, -b.y);

    // bubble fill (soft avatar circle)
    var grad = cx.createRadialGradient(b.x - 6, b.y - 6, 2, b.x, b.y, BUBBLE_R);
    var h = b.hue;
    grad.addColorStop(0, 'hsl(' + h + ',42%,68%)');
    grad.addColorStop(1, 'hsl(' + h + ',36%,42%)');
    cx.beginPath();
    cx.arc(b.x, b.y, BUBBLE_R - RING_W - 1, 0, Math.PI * 2);
    cx.fillStyle = grad;
    cx.fill();

    // ring track (dim)
    cx.beginPath();
    cx.arc(b.x, b.y, BUBBLE_R, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(255,255,255,0.12)';
    cx.lineWidth = RING_W;
    cx.stroke();

    // ring fill (depleting, clock-wise from top)
    if (fill > 0) {
      var startAngle = -Math.PI / 2;
      var endAngle   = startAngle + fill * Math.PI * 2;
      // color shifts gold→teal as time runs short
      var ringColor = fill > 0.35
        ? GOLD
        : 'hsl(' + (51 + (0.35 - fill) / 0.35 * 129) + ',76%,' + (50 + fill * 20) + '%)';
      cx.beginPath();
      cx.arc(b.x, b.y, BUBBLE_R, startAngle, endAngle);
      cx.strokeStyle = ringColor;
      cx.lineWidth = RING_W;
      cx.lineCap = 'round';
      cx.stroke();
      cx.lineCap = 'butt';
    }

    // ack checkmark glow
    if (b.ack) {
      cx.globalAlpha = alpha * (1 - b.fadeOut * 0.5);
      cx.strokeStyle = TEAL;
      cx.lineWidth = 2.5;
      cx.lineCap = 'round';
      cx.lineJoin = 'round';
      cx.beginPath();
      cx.moveTo(b.x - 10, b.y);
      cx.lineTo(b.x - 3, b.y + 8);
      cx.lineTo(b.x + 11, b.y - 8);
      cx.stroke();
      cx.lineCap = 'butt';
    }

    cx.restore();
  }

  // ── Main loop ────────────────────────────────────────────────────────────
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // juice decay
    if (hitStop > 0) hitStop -= dt; else if (phase === 'play') autopilot(now);
    zoom += (1 - zoom) * 0.12 * dt;
    shakeAmt *= Math.pow(0.80, dt);

    // update bubbles
    var allDone = true;
    if (phase === 'play') {
      for (var i = 0; i < bubbles.length; i++) {
        var b = bubbles[i];
        b.pulseT += dt;
        if (!b.ack && !b.expired) {
          b.elapsed += dt * 16.667;
          if (b.elapsed >= b.drain) {
            b.expired = true;
            b.fadeOut = 0;
            expired++;
            // soft near-miss sound for last moment
            if (window.J) J.calm(0);
            floatText('...', b.x, b.y - BUBBLE_R - 10, 'rgba(255,255,255,0.3)', 18);
            if (window.LOOP) LOOP.emit('bubble_expired', { n: expired });
          }
        }
        if (b.ack || b.expired) {
          b.fadeOut = Math.min(1, b.fadeOut + dt * 0.028);
        }
        if (!b.ack && !b.expired) allDone = false;
        // still fading — also not done
        if ((b.ack || b.expired) && b.fadeOut < 1) allDone = false;
      }
      if (allDone) endRun();
    }

    // ── draw ──
    cx.save();
    // shake + zoom transforms
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    // soft teal ambient
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // ── TITLE ──
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '700 36px -apple-system, Helvetica, Arial';
      cx.fillText('STORY SET', W / 2, 280);
      cx.fillStyle = TEAL;
      cx.font = '400 16px -apple-system, Helvetica, Arial';
      var pulse = 0.55 + 0.45 * Math.sin(now / 500);
      cx.globalAlpha = pulse;
      cx.fillText('tap to begin', W / 2, 328);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '400 13px -apple-system, Helvetica, Arial';
      cx.fillText('acknowledge them before they go', W / 2, 362);
    }

    // ── PLAY ──
    if (phase === 'play' || phase === 'over') {
      // row labels (soft, small)
      cx.textAlign = 'left';
      cx.fillStyle = 'rgba(255,255,255,0.2)';
      cx.font = '400 11px Menlo, monospace';

      // draw bubbles
      for (var j = 0; j < bubbles.length; j++) {
        drawBubble(bubbles[j], now);
      }

      // score pill top
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '700 52px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('acknowledged', W / 2, 118);

      // counter bar
      var barW = 260, barH = 4, bx = (W - barW) / 2, by = 132;
      cx.fillStyle = 'rgba(255,255,255,0.1)';
      cx.fillRect(bx, by, barW, barH);
      var done = bubbles.filter(function (b) { return b.ack || b.expired; }).length;
      var prog = done / TOTAL;
      cx.fillStyle = prog > 0.7 ? TEAL : GOLD;
      cx.fillRect(bx, by, barW * prog, barH);
    }

    // ── OVER ──
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';

      // big score
      cx.fillStyle = '#fff';
      cx.font = '700 56px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' / ' + TOTAL, W / 2, 300);

      cx.fillStyle = TEAL;
      cx.font = '500 18px -apple-system, Helvetica, Arial';
      var msg = score >= TOTAL ? 'all seen.' : score >= 8 ? 'most caught.' : score >= 4 ? 'some passed.' : 'they all went.';
      cx.fillText(msg, W / 2, 338);

      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '400 13px -apple-system, Helvetica, Arial';
      var expiredPct = Math.round(expired / TOTAL * 100);
      cx.fillText(expiredPct + '% slipped by', W / 2, 368);

      if (!DEMO && !BOT) {
        var p2 = 0.55 + 0.45 * Math.sin(now / 400);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '500 15px -apple-system, Helvetica, Arial';
        cx.fillText('tap — breathe again', W / 2, 430);
        cx.globalAlpha = 1;
      }
    }

    // ── CTA (demo only) ──
    if (phase === 'cta') {
      var elapsed = (now - ctaAt) / 1000;
      var ease = Math.min(1, elapsed * 2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.72 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';

      cx.fillStyle = '#fff';
      cx.font = '700 42px -apple-system, Helvetica, Arial';
      cx.fillText('STORY SET', W / 2, 296);

      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '400 17px -apple-system, Helvetica, Arial';
      cx.fillText('watch them settle. reach yours.', W / 2, 336);

      var pulse2 = 0.75 + 0.25 * Math.sin(now / 360);
      cx.globalAlpha = ease * pulse2;
      cx.fillStyle = TEAL;
      cx.font = '700 22px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 400);
      cx.globalAlpha = ease;

      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '400 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);

      cx.globalAlpha = 1;
    }

    // ── Floating text ──
    for (var fi = floats.length - 1; fi >= 0; fi--) {
      var fl = floats[fi];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 35);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + fl.size + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 36) floats.splice(fi, 1);
    }

    // ── Mute toggle (human only) ──
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
