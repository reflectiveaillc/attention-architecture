<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Haul Unpack — Tilt</title>
<!--
  LOOP / attention-architecture — Haul Unpack
  Circuits: 06-zeigarnik (10 items, must complete), 01-rpe (anticipation/reveal),
            05-ease (gesture maps to unboxing muscle memory)
  Modes:
    ?demo=1&seed=7   scripted mirror-neuron clip, sets window.__demoDone
    ?bot=1&runs=N    imperfect autoplay, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'haul-unpack';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var TOTAL_ITEMS = 10;

  // Items to unbox (emoji + label)
  var ITEM_POOL = [
    { emoji: '👟', label: 'Sneakers',    color: '#e8502e' },
    { emoji: '💄', label: 'Lipstick',    color: '#ff6b9d' },
    { emoji: '📱', label: 'Phone Case',  color: '#2ec5b6' },
    { emoji: '🎧', label: 'Headphones',  color: '#f2b134' },
    { emoji: '👗', label: 'Dress',       color: '#a78bfa' },
    { emoji: '💎', label: 'Jewelry',     color: '#2ec5b6' },
    { emoji: '🕶️', label: 'Sunglasses',  color: '#f2b134' },
    { emoji: '👜', label: 'Bag',         color: '#e8502e' },
    { emoji: '🧴', label: 'Skincare',    color: '#4ade80' },
    { emoji: '✨', label: 'Highlighter', color: '#f2b134' }
  ];

  // Shuffle item pool with seeded RNG
  function shuffleItems() {
    var arr = ITEM_POOL.slice();
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr.slice(0, TOTAL_ITEMS);
  }

  // ---- state ----
  var phase;         // 'title' | 'challenge' | 'play' | 'over' | 'cta'
  var items;         // array of item objects to unbox
  var revealed;      // count of revealed items
  var shelf;         // array of revealed item objects with positions
  var flashes;       // floating text
  var hitStop, zoom, shakeAmt;
  var dareBeaten, runStartTs, overAt, ctaAt, challengeAt;
  var score;         // = revealed count (meaningful number)
  var botRunsDone;

  // Swipe / drag state
  var dragStartY = null, isDragging = false, swipeProgress = 0;
  var flap;          // the animated box flap { angle, open, animating }

  // Box state
  var BOX_X = W / 2, BOX_Y = 380;
  var BOX_W = 200, BOX_H = 160;
  var FLAP_H = 50;

  // current item being revealed
  var revealAnim = null; // { item, t, fromY, toY, shelfSlot }

  // Shelf layout: 2 rows x 5 cols
  function shelfSlotPos(idx) {
    var col = idx % 5, row = Math.floor(idx / 5);
    var startX = W / 2 - 4 * 46 / 2;
    return { x: startX + col * 46, y: 108 + row * 62 };
  }

  function pctTop(sc) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-sc / 4))));
  }

  function newGame() {
    rng = mulberry32(SEED);  // reset RNG for reproducibility
    items     = shuffleItems();
    revealed  = 0;
    shelf     = [];
    flashes   = [];
    hitStop   = 0;
    zoom      = 1;
    shakeAmt  = 0;
    dareBeaten = false;
    score     = 0;
    botRunsDone = 0;
    flap = { angle: 0, open: false, animating: false };
    swipeProgress = 0;
    isDragging = false;
    dragStartY = null;
    revealAnim = null;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) {
      phase = 'title';
      setTimeout(startRun, 100);
      return;
    }
    phase = 'title';
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function openFlap() {
    if (flap.open || flap.animating || revealAnim) return;
    flap.animating = true;
    if (window.J) J.tension(Math.min(revealed / TOTAL_ITEMS, 1));
  }

  function onFlapOpened() {
    flap.open = true;
    flap.animating = false;
    // Trigger item reveal
    var item = items[revealed];
    var slot  = revealed;
    var pos   = shelfSlotPos(slot);
    revealAnim = { item: item, t: 0, fromY: BOX_Y - BOX_H / 2, toY: pos.y, toX: pos.x, slot: slot };

    var isLast  = (revealed + 1 >= TOTAL_ITEMS);
    var isGold  = (item.label === 'Jewelry' || item.label === 'Highlighter');

    if (window.J) {
      if (isLast)      J.perfect(TOTAL_ITEMS);
      else if (isGold) J.gold();
      else             J.hit(revealed + 1);
    }

    if (isLast) { hitStop = 6; zoom = 1.04; shakeAmt = 3; }
    else if (isGold) { hitStop = 4; zoom = 1.02; }

    flash('+' + item.emoji, item.color, 42);
    if (window.LOOP) LOOP.emit('item_revealed', { n: revealed + 1, item: item.label });

    // Check dare beaten
    revealed++;
    score = revealed;
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 38);
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }

    shelf.push({ item: item, pos: pos, alpha: 0 });

    if (revealed >= TOTAL_ITEMS) {
      // Haul complete!
      setTimeout(endRun, 800);
    } else {
      // Reset box for next item — close flap after short pause
      setTimeout(function () {
        flap = { angle: 0, open: false, animating: false };
        swipeProgress = 0;
        revealAnim = null;
      }, 600);
    }
  }

  function endRun() {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 4;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) { J.fanfare(); }
    if (DEMO) window.__demoScore = score;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 800);
      }
    }
  }

  function resetRun() {
    rng = mulberry32(SEED + botRunsDone);
    items    = shuffleItems();
    revealed = 0;
    shelf    = [];
    flashes  = [];
    score    = 0;
    flap     = { angle: 0, open: false, animating: false };
    swipeProgress = 0;
    isDragging = false;
    dragStartY = null;
    revealAnim = null;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 500, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'items' }); return;
      }
      resetRun(); return;
    }
  }

  // Swipe down gesture to open box
  function onPointerDown(e) {
    if (DEMO || BOT) return;
    var r  = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale;
    var py = (e.clientY - r.top)  / scale;
    tap(px, py);
    if (phase !== 'play') return;
    // Check if touch is on box area
    var bx = BOX_X - BOX_W / 2, by = BOX_Y - BOX_H / 2;
    if (px >= bx - 20 && px <= bx + BOX_W + 20 && py >= by - 30 && py <= by + BOX_H + 20) {
      dragStartY = py;
      isDragging = true;
    }
  }
  function onPointerMove(e) {
    if (DEMO || BOT || !isDragging || phase !== 'play') return;
    if (flap.open || flap.animating || revealAnim) return;
    var r  = cv.getBoundingClientRect();
    var py = (e.clientY - r.top) / scale;
    var dy = py - dragStartY;
    swipeProgress = Math.max(0, Math.min(1, dy / 80));
    flap.angle = swipeProgress * Math.PI * 0.85;
    if (swipeProgress >= 1) {
      isDragging = false;
      openFlap();
    }
  }
  function onPointerUp(e) {
    if (!isDragging) return;
    isDragging = false;
    if (swipeProgress < 1 && !flap.open && !flap.animating) {
      // Snap back
      swipeProgress = 0;
      flap.angle = 0;
    }
  }

  cv.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowDown') {
      if (phase === 'play' && !flap.open && !flap.animating && !revealAnim) openFlap();
    }
  });

  // ---- demo / bot autopilot ----
  // Demo: script of timings (ms) with hesitation before each swipe
  var demoScript = [1800, 1400, 1100, 1600, 900, 1300, 1000, 1500, 800, 600];
  var demoIdx = 0, demoNextAt = 0, demoStarted = false;

  // Bot: random-interval swipes
  var botNextAt = 0;

  function autopilot(now) {
    if (!state_is_play()) return;
    if (flap.open || flap.animating || revealAnim) return;

    if (DEMO) {
      if (!demoStarted) { demoNextAt = now + demoScript[0]; demoStarted = true; return; }
      if (demoIdx >= TOTAL_ITEMS) return;
      if (now >= demoNextAt) {
        openFlap();
        demoIdx++;
        var wait = demoScript[Math.min(demoIdx, demoScript.length - 1)] || 900;
        // Near-fail hesitation at ~60%: long pause at item 6
        if (demoIdx === 6) wait = 2200;
        demoNextAt = now + wait;
      }
    } else if (BOT) {
      if (now >= botNextAt) {
        openFlap();
        botNextAt = now + 600 + rng() * 800;
      }
    }
  }

  function state_is_play() { return phase === 'play'; }

  // ---- render helpers ----
  function drawBox(now) {
    var x = BOX_X - BOX_W / 2, y = BOX_Y - BOX_H / 2;
    // Box body
    cx.save();
    cx.shadowColor = 'rgba(232,80,46,0.25)';
    cx.shadowBlur = 20;
    cx.fillStyle = '#1a1e2a';
    cx.strokeStyle = VERM;
    cx.lineWidth = 2.5;
    cx.beginPath();
    cx.roundRect ? cx.roundRect(x, y, BOX_W, BOX_H, 10) : cx.rect(x, y, BOX_W, BOX_H);
    cx.fill(); cx.stroke();
    cx.restore();

    // Box label tape strip
    cx.fillStyle = GOLD;
    cx.globalAlpha = 0.9;
    cx.fillRect(x + 30, y + BOX_H * 0.4, BOX_W - 60, 6);
    cx.fillRect(BOX_X - 3, y, 6, BOX_H * 0.45);
    cx.globalAlpha = 1;

    // Flap (folds down from top of box using perspective-ish rotation)
    var flapAngle = flap.animating ? flap.angle : (flap.open ? Math.PI * 0.85 : swipeProgress * Math.PI * 0.85);
    cx.save();
    cx.translate(BOX_X, y);
    // skew to simulate folding down
    var scaleY = Math.cos(flapAngle);
    var flapVisH = FLAP_H * Math.abs(scaleY);
    var flapDir = flapAngle > Math.PI / 2 ? -1 : 1;

    cx.fillStyle = '#222840';
    cx.strokeStyle = VERM;
    cx.lineWidth = 2;
    cx.beginPath();
    cx.rect(-BOX_W / 2, flapDir * flapVisH * -1, BOX_W, flapVisH);
    cx.fill(); cx.stroke();

    // Tape on flap
    cx.fillStyle = GOLD;
    cx.globalAlpha = 0.7;
    cx.fillRect(-20, flapDir * flapVisH * -0.5 - 3, 40, 6);
    cx.globalAlpha = 1;
    cx.restore();

    // Inside glow when open
    if (flap.open) {
      var g = cx.createRadialGradient(BOX_X, y + 20, 0, BOX_X, y + 20, BOX_W * 0.6);
      g.addColorStop(0, 'rgba(242,177,52,0.3)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      cx.fillStyle = g;
      cx.fillRect(x, y, BOX_W, BOX_H * 0.5);
    }

    // Item count label on box
    if (revealed < TOTAL_ITEMS) {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText((TOTAL_ITEMS - revealed) + ' items inside', BOX_X, y + BOX_H - 18);
    }

    // Swipe hint (when not opened yet and not animating)
    if (!flap.open && !flap.animating && !revealAnim && revealed < TOTAL_ITEMS) {
      var pulse = 0.4 + 0.4 * Math.sin(now / 400);
      cx.globalAlpha = pulse;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('swipe down ↓', BOX_X, y + BOX_H + 28);
      cx.globalAlpha = 1;
    }
  }

  function drawShelf(now) {
    // Shelf background
    cx.fillStyle = 'rgba(255,255,255,0.04)';
    cx.strokeStyle = 'rgba(255,255,255,0.08)';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.roundRect ? cx.roundRect(22, 70, W - 44, 132, 10) : cx.rect(22, 70, W - 44, 132);
    cx.fill(); cx.stroke();

    // Slot outlines
    for (var i = 0; i < TOTAL_ITEMS; i++) {
      var sp = shelfSlotPos(i);
      cx.strokeStyle = 'rgba(255,255,255,0.08)';
      cx.lineWidth = 1;
      cx.beginPath();
      cx.roundRect ? cx.roundRect(sp.x - 18, sp.y - 18, 36, 36, 6) : cx.rect(sp.x - 18, sp.y - 18, 36, 36);
      cx.stroke();
    }

    // Revealed items on shelf
    for (var j = 0; j < shelf.length; j++) {
      var s = shelf[j];
      s.alpha = Math.min(1, s.alpha + 0.06);
      cx.globalAlpha = s.alpha;
      cx.font = '22px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.textBaseline = 'middle';
      cx.fillText(s.item.emoji, s.pos.x, s.pos.y);
      cx.globalAlpha = 1;
    }
    cx.textBaseline = 'alphabetic';

    // Shelf label
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 10px -apple-system, Helvetica, Arial';
    cx.fillText('YOUR HAUL — ' + revealed + ' / ' + TOTAL_ITEMS, W / 2, 66);
  }

  function drawRevealAnim(now) {
    if (!revealAnim) return;
    revealAnim.t += 0.045;
    if (revealAnim.t > 1) revealAnim.t = 1;
    var t = revealAnim.t;
    var ease = 1 - Math.pow(1 - t, 3); // cubic ease out
    var curY = revealAnim.fromY + (revealAnim.toY - revealAnim.fromY) * ease;
    var curX = revealAnim.toX + (BOX_X - revealAnim.toX) * (1 - ease);
    var sc = 1 + (1 - ease) * 1.5; // big → normal

    cx.save();
    cx.translate(curX, curY);
    cx.scale(sc, sc);
    cx.globalAlpha = Math.min(1, t * 3);
    cx.font = '28px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText(revealAnim.item.emoji, 0, 0);
    cx.globalAlpha = 1;
    cx.restore();
    cx.textBaseline = 'alphabetic';
  }

  // ---- main render loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Animate flap opening
    if (flap.animating) {
      flap.angle += 0.12 * dt * Math.PI;
      if (flap.angle >= Math.PI * 0.85) {
        flap.angle = Math.PI * 0.85;
        onFlapOpened();
      }
    }

    // Autopilot
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      autopilot(now);
    }

    // Juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // BG
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(242,177,52,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // Title screen
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('HAUL UNPACK', W / 2, 280);
      cx.fillStyle = GOLD;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      var p = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = p;
      cx.fillText('TAP TO START', W / 2, 328);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('10 items. swipe to reveal.', W / 2, 360);
    }

    // Challenge card (demo beat 1)
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('10', W / 2, 410);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("full haul", W / 2, 440);
    }

    // Play phase
    if (phase === 'play') {
      drawShelf(now);
      drawBox(now);
      drawRevealAnim(now);

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.textAlign = 'center';
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, H - 32);
      }

      // Progress bar at bottom
      var progress = revealed / TOTAL_ITEMS;
      cx.fillStyle = 'rgba(255,255,255,0.08)';
      cx.fillRect(40, H - 55, W - 80, 6);
      var barGrad = cx.createLinearGradient(40, 0, 40 + (W - 80) * progress, 0);
      barGrad.addColorStop(0, TEAL);
      barGrad.addColorStop(1, GOLD);
      cx.fillStyle = barGrad;
      cx.fillRect(40, H - 55, (W - 80) * progress, 6);
    }

    // Game over / haul complete
    if (phase === 'over') {
      drawShelf(now);
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = GOLD;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('HAUL COMPLETE', W / 2, 310);
      cx.fillStyle = '#fff';
      cx.font = '800 22px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' items unpacked', W / 2, 352);
      var pt = pctTop(score);
      cx.fillStyle = TEAL;
      cx.font = '900 20px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 394);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('completed faster than ' + (100 - pt) + '% of players', W / 2, 418);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — UNBOX AGAIN', W / 2, 468);
        cx.globalAlpha = 1;
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // Demo CTA card
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('HAUL UNPACK', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they unpacked all ' + (window.__demoScore || 10) + '. beat it.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 10), W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // Floating text flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
