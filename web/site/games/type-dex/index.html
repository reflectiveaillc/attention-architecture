      var c = newCreature(i, W * 0.2 + i * W * 0.3);
      c.dir = 1; c.speed = Math.abs(c.speed);
      c.alpha = 1; c.fadeIn = false;
      state.creatures.push(c);
    }
  }

  // ordered list of which creature appears next
  var spawnQueue = [];
  function buildSpawnQueue() {
    spawnQueue = [];
    for (var i = 0; i < DEX_SIZE; i++) spawnQueue.push(i);
    // shuffle with rng
    for (var j = spawnQueue.length - 1; j > 0; j--) {
      var k = Math.floor(rng() * (j + 1));
      var tmp = spawnQueue[j]; spawnQueue[j] = spawnQueue[k]; spawnQueue[k] = tmp;
    }
  }

  var spawnTimer = 0, spawnInterval = 120; // frames between spawns
  var nextSpawnIdx = 0;
  var activeSlots = DEMO ? 5 : BOT ? 5 : 3; // max on screen at once during play

  function startRun() {
    state.phase = 'play';
    state.creatures = [];
    captured = new Array(DEX_SIZE).fill(false);
    combo = 0;
    runStartTs = Date.now();
    buildSpawnQueue();
    nextSpawnIdx = 0;
    spawnTimer = 0;
    dexFlash = 0;
    dareBeaten = false;
    demoPhase = 0; demoWait = 48; demoMissed = false;
    botWait = 0; botTimeoutTimer = 0;

    // spawn initial creatures
    for (var i = 0; i < 3 && i < DEX_SIZE; i++) {
      var c = newCreature(spawnQueue[nextSpawnIdx++]);
      c.dir = i % 2 === 0 ? 1 : -1;
      c.speed = (0.7 + rng() * 0.6) * c.dir * SPEED_MUL;
      c.x = i % 2 === 0 ? -60 : W + 60;
      state.creatures.push(c);
    }

    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function capturedCount() {
    var n = 0; for (var i = 0; i < captured.length; i++) if (captured[i]) n++;
    return n;
  }

  function tryCapture(typeIdx) {
    // find highest-priority creature of that type on screen
    var best = null, bestDist = Infinity;
    for (var i = 0; i < state.creatures.length; i++) {
      var cr = state.creatures[i];
      if (cr.type !== typeIdx) continue;
      if (captured[cr.idx]) continue;
      var dist = Math.abs(cr.x - W / 2);
      if (dist < bestDist) { bestDist = dist; best = cr; }
    }
    if (!best) {
      // MISS — wrong type (no matching silhouette on screen)
      shakeAmt = 3;
      if (window.J) J.near();
      flash('WRONG TYPE!', VERM, 32);
      combo = 0;
      if (window.LOOP) LOOP.emit('near_miss', { type: TYPES[typeIdx].id, reason: 'wrong_type' });
      return;
    }

    // capture!
    captured[best.idx] = true;
    state.score++;
    combo++;
    var n = capturedCount();
    hitStop = 4;
    zoom = combo >= 3 ? 1.04 : 1.02;

    if (window.J) {
      if (combo >= 5) J.gold();
      else if (combo >= 3) J.perfect(combo);
      else J.hit(combo);
      J.tension(Math.min(n / DEX_SIZE, 0.9));
    }

    if (combo >= 5) flash('×' + combo + ' COMBO!', GOLD, 44);
    else if (combo >= 3) flash('COMBO ×' + combo, TEAL, 38);
    else flash(best.name + ' ✓', TEAL, 32);
    shakeAmt = combo >= 3 ? 4 : 1.5;

    // emit events
    if (window.LOOP) LOOP.emit('creature_captured', { idx: best.idx, type: typeIdx, combo: combo, total: n });

    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && n > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN!', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(n);
    }

    // remove from screen after capture flash
    (function(cref) {
      setTimeout(function() {
        var idx = state.creatures.indexOf(cref);
        if (idx >= 0) state.creatures.splice(idx, 1);
      }, 350);
    })(best);

    // check win
    if (n >= DEX_SIZE) {
      // ALL CAPTURED — full dex flash then game over
      dexFlash = performance.now();
      if (window.J) { J.fanfare(); }
      flash('DEX COMPLETE!', GOLD, 52);
      flash('100% CAPTURED', TEAL, 38);
      setTimeout(gameOver, 2400);
      return;
    }

    // near miss event if we were very close before sealing
    if (n === DEX_SIZE - 1) {
      flash('ONE LEFT!', GOLD, 40);
      if (window.J) J.tension(0.95);
      if (window.LOOP) LOOP.emit('near_miss', { remaining: 1 });
    }
  }

  function gameOver() {
    if (state.phase !== 'play') return;
    state.phase = 'over';
    state.overAt = performance.now();
    var n = capturedCount();
    var dur = (Date.now() - runStartTs) / 1000;

    if (window.J) {
      if (n >= DEX_SIZE) J.fanfare();
      else J.death(Math.min(0.3 + n / DEX_SIZE * 0.7, 1));
      J.tension(0);
    }
    shakeAmt = n >= DEX_SIZE ? 0 : 8;

    if (DEMO) window.__demoScore = n;
    if (window.LOOP) LOOP.emit('game_over', { score: n, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function() {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function() { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(resetRun, 800);
    }
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    spawnTimer = 0; nextSpawnIdx = 0;
    startRun();
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 8))));
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- demo / bot autopilots ----
  // Demo: scripted sequence mimicking human hesitation, with a deliberate wrong tap around 60%
  var demoWaits = [38, 28, 52, 24, 60, 30, 45, 20, 35, 28, 55, 22, 40, 18, 62, 25, 30, 45, 20, 35];
  var demoWait = 48, demoPhase = 0, demoMissed = false;

  function demoStep() {
    if (state.phase !== 'play') return;
    if (demoWait > 0) { demoWait--; return; }

    var n = capturedCount();

    // near-fail beat: around 60% (~12 captured), deliberately tap a wrong type that is not on screen
    if (n >= 11 && !demoMissed) {
      demoMissed = true;
      var onScreen = state.creatures.filter(function(c){ return !captured[c.idx]; });
      if (onScreen.length > 0) {
        var present = {};
        for (var s = 0; s < onScreen.length; s++) present[onScreen[s].type] = 1;
        var wrongType = (onScreen[0].type + 1) % TYPES.length;
        while (present[wrongType]) wrongType = (wrongType + 1) % TYPES.length;
        tryCapture(wrongType);
        demoWait = demoWaits[demoPhase % demoWaits.length] + 20;
        demoPhase++;
        return;
      }
    }

    // find a visible creature to capture
    var targets = state.creatures.filter(function(c){ return !captured[c.idx] && c.alpha > 0.5; });
    if (targets.length === 0) { demoWait = 8; return; }

    // pick the most centered creature
    targets.sort(function(a,b){ return Math.abs(a.x-W/2) - Math.abs(b.x-W/2); });
    var t = targets[0];
    tryCapture(t.type);
    demoWait = demoWaits[demoPhase % demoWaits.length];
    demoPhase++;
  }

  var botWait = 0;
  function botStep() {
    if (state.phase !== 'play') return;
    if (botWait > 0) { botWait--; return; }

    var targets = state.creatures.filter(function(c){ return !captured[c.idx] && c.alpha > 0.5; });
    if (targets.length === 0) { botWait = 6; return; }

    // imperfect but reliable: center bias with occasional off-center pick
    if (rng() < 0.25) {
      var t = targets[Math.floor(rng() * targets.length)];
      tryCapture(t.type);
    } else {
      targets.sort(function(a,b){ return Math.abs(a.x-W/2) - Math.abs(b.x-W/2); });
      tryCapture(targets[0].type);
    }
    botWait = Math.floor(8 + rng() * 18);
  }

  // safety net: if anything gets stuck, force a game over
  var botTimeoutTimer = 0;
  var BOT_TIMEOUT_FRAMES = 2400; // ~40s at 60fps

  // ---- input ----
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      // check type buttons
      for (var i = 0; i < typeBtns.length; i++) {
        var btn = typeBtns[i];
        if (x !== undefined && inR(btn, x, y)) {
          btn.pulse = 10;
          tryCapture(btn.type);
          return;
        }
      }
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: capturedCount(), unit: 'captured' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function(e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function(e) {
    if (e.code === 'Space') tap(typeBtns[0].x + 1, typeBtns[0].y + 1);
  });

  // ---- render ----
  function drawDexGrid(cx, x0, y0, capturedArr) {
    // mini dex grid: 5 columns × 4 rows = 20 slots
    var cols = 5, rows = 4, sz = 28, pad = 4;
    var gw = cols * (sz + pad) - pad;
    var startX = x0 - gw / 2;
    for (var i = 0; i < DEX_SIZE; i++) {
      var col = i % cols, row = Math.floor(i / cols);
      var bx = startX + col * (sz + pad);
      var by = y0 + row * (sz + pad);
      var isCaptured = capturedArr[i];
      cx.fillStyle = isCaptured ? TYPES[CREATURES[i].type].color : 'rgba(255,255,255,0.06)';
      cx.globalAlpha = isCaptured ? 0.9 : 0.4;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(bx, by, sz, sz, 5);
      else cx.rect(bx, by, sz, sz);
      cx.fill();
      cx.globalAlpha = 1;
      if (isCaptured) {
        cx.fillStyle = '#000';
        cx.font = '600 11px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(CREATURES[i].name.slice(0,4), bx + sz/2, by + sz - 8);
      } else {
        cx.fillStyle = 'rgba(255,255,255,0.18)';
        cx.font = '700 14px Menlo, monospace';
        cx.textAlign = 'center';
        cx.fillText('?', bx + sz/2, by + sz - 8);
      }
    }
  }

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // spawn logic during play
    if (state.phase === 'play') {
      spawnTimer += dt;
      if (spawnTimer >= spawnInterval && nextSpawnIdx < DEX_SIZE) {
        // only spawn if not already captured and not on screen
        while (nextSpawnIdx < DEX_SIZE) {
          var cIdx = spawnQueue[nextSpawnIdx];
          if (!captured[cIdx] && !state.creatures.some(function(c){ return c.idx === cIdx; })) {
            var activeUncaptured = state.creatures.filter(function(c){ return !captured[c.idx]; }).length;
            if (activeUncaptured < activeSlots) {
              state.creatures.push(newCreature(cIdx));
              nextSpawnIdx++;
              spawnTimer = 0;
              spawnInterval = (DEMO ? 28 : BOT ? 35 : 90) + rng() * (DEMO ? 18 : BOT ? 24 : 60);
            }
            break;
          } else {
            nextSpawnIdx++;
          }
        }
        // If queue exhausted but there are uncaptured creatures not on screen, re-queue them
        if (nextSpawnIdx >= DEX_SIZE) {
          var missing = [];
          for (var mi = 0; mi < DEX_SIZE; mi++) {
            if (!captured[mi] && !state.creatures.some(function(c){ return c.idx === mi; })) {
              missing.push(mi);
            }
          }
          if (missing.length > 0) {
            spawnQueue = missing;
            nextSpawnIdx = 0;
            spawnTimer = 60;
          }
        }
      }

      // autopilots
      if (DEMO) demoStep();
      else if (BOT) {
        botStep();
        botTimeoutTimer += dt;
        if (botTimeoutTimer > BOT_TIMEOUT_FRAMES) {
          botTimeoutTimer = 0;
          gameOver();
        }
      }
    }

    // update creatures
    for (var i = state.creatures.length - 1; i >= 0; i--) {
      var cr = state.creatures[i];
      if (hitStop <= 0 || !cr) {
        cr.wobble += cr.wobbleSpeed * dt;
        if (state.phase === 'play') cr.x += cr.speed * dt;
        // fade in
        if (cr.fadeIn) { cr.alpha = Math.min(1, cr.alpha + 0.04 * dt); if (cr.alpha >= 1) cr.fadeIn = false; }
      }
      // remove if off screen (walked past)
      if (cr.x > W + 100 || cr.x < -100) {
        state.creatures.splice(i, 1);
        if (state.phase === 'play' && !captured[cr.idx]) {
          // re-queue this creature
          var alreadyQueued = spawnQueue.slice(nextSpawnIdx).indexOf(cr.idx) >= 0;
          if (!alreadyQueued) spawnQueue.push(cr.idx);
        }
      }
    }

    // hit-stop decay
    if (hitStop > 0) hitStop -= dt;

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.83, dt); zoom += (1 - zoom) * 0.1 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(242,177,52,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // dex complete flash
    if (dexFlash > 0) {
      var elapsed = (now - dexFlash) / 1000;
      var pulse = Math.sin(elapsed * 12) * 0.5 + 0.5;
      cx.fillStyle = 'rgba(242,177,52,' + (pulse * 0.18) + ')';
      cx.fillRect(0, 0, W, H);
    }

    // title phase
    if (state.phase === 'title') {
      // draw atmospheric creatures
      for (var i = 0; i < state.creatures.length; i++) {
        var cr = state.creatures[i];
        cx.globalAlpha = 0.18;
        drawShape(cx, cr.shape, cr.x, cr.y + Math.sin(cr.wobble) * 6, cr.r);
        cx.globalAlpha = 1;
      }
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('TYPE DEX', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('tap the type — catch them all', W / 2, 300);
      var pulse2 = 0.6 + 0.4 * Math.sin(now / 350);
      cx.globalAlpha = pulse2; cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 345);
      cx.globalAlpha = 1;
      // dex preview
      drawDexGrid(cx, W/2, 400, captured);
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 290);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('20', W/2, 395);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('fill the whole dex', W/2, 430);
    }

    // play phase
    if (state.phase === 'play' || state.phase === 'over') {
      // draw creatures (silhouettes)
      for (var i = 0; i < state.creatures.length; i++) {
        var cr = state.creatures[i];
        var wobbleY = Math.sin(cr.wobble) * 8;
        cx.globalAlpha = captured[cr.idx] ? 0.15 : cr.alpha;
        // type-colored glow behind silhouette
        if (!captured[cr.idx] && cr.alpha > 0.3) {
          cx.save();
          cx.shadowColor = TYPES[cr.type].color;
          cx.shadowBlur = 22;
          cx.globalAlpha = cr.alpha * 0.3;
          cx.fillStyle = TYPES[cr.type].color;
          cx.beginPath(); cx.arc(cr.x, cr.y + wobbleY, cr.r * 0.7, 0, Math.PI * 2); cx.fill();
          cx.restore();
        }
        cx.globalAlpha = captured[cr.idx] ? 0.12 : cr.alpha;
        drawShape(cx, cr.shape, cr.x, cr.y + wobbleY, cr.r);
        cx.globalAlpha = 1;

        // type label above silhouette (small hint)
        if (!captured[cr.idx] && cr.alpha > 0.7 && state.phase === 'play') {
          cx.globalAlpha = 0.55;
          cx.textAlign = 'center';
          cx.fillStyle = TYPES[cr.type].color;
          cx.font = '700 10px Menlo, monospace';
          cx.fillText('???', cr.x, cr.y + wobbleY - cr.r - 8);
          cx.globalAlpha = 1;
        }
      }

      // HUD: top progress
      var n = capturedCount();
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.88)';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(n + '/20', W / 2, 68);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('CAPTURED', W / 2, 86);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 108);
      }

      // progress bar
      var barW = W - 60, barX = 30, barY = 96;
      cx.fillStyle = 'rgba(255,255,255,0.08)';
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(barX, barY, barW, 5, 3);
      else cx.rect(barX, barY, barW, 5);
      cx.fill();
      cx.fillStyle = TEAL;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(barX, barY, barW * (n / DEX_SIZE), 5, 3);
      else cx.rect(barX, barY, barW * (n / DEX_SIZE), 5);
      cx.fill();

      // type buttons (only during play)
      if (state.phase === 'play') {
        for (var bi = 0; bi < typeBtns.length; bi++) {
          var btn = typeBtns[bi];
          var T = TYPES[btn.type];
          var pAlpha = btn.pulse > 0 ? btn.pulse / 10 : 0;
          if (btn.pulse > 0) btn.pulse -= dt;

          cx.fillStyle = pAlpha > 0 ? T.color : T.bg;
          cx.globalAlpha = 0.92;
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(btn.x, btn.y, btn.w, btn.h, 10);
          else cx.rect(btn.x, btn.y, btn.w, btn.h);
          cx.fill();
          if (pAlpha > 0) {
            cx.globalAlpha = pAlpha * 0.6;
            cx.fillStyle = '#fff';
            cx.beginPath();
            if (cx.roundRect) cx.roundRect(btn.x, btn.y, btn.w, btn.h, 10);
            else cx.rect(btn.x, btn.y, btn.w, btn.h);
            cx.fill();
          }
          cx.globalAlpha = 1;

          // border
          cx.strokeStyle = T.color;
          cx.lineWidth = 1.5;
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(btn.x, btn.y, btn.w, btn.h, 10);
          else cx.rect(btn.x, btn.y, btn.w, btn.h);
          cx.stroke();

          // symbol + label
          cx.textAlign = 'center';
          cx.font = '22px -apple-system, Helvetica, Arial';
          cx.fillText(T.sym, btn.x + btn.w / 2, btn.y + btn.h / 2 + 4);
          cx.fillStyle = T.color;
          cx.font = '700 10px Menlo, monospace';
          cx.fillText(T.label, btn.x + btn.w / 2, btn.y + btn.h - 7);
        }
      }
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // game over card
    if (state.phase === 'over') {
      var nn = capturedCount();
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var allDone = nn >= DEX_SIZE;
      cx.fillStyle = allDone ? GOLD : VERM;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText(allDone ? 'DEX SEALED.' : 'RUN OVER.', W/2, 255);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(nn + '/20 captured', W/2, 298);
      var pt = pctTop(nn);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W/2, 336);

      // mini dex grid in over card
      drawDexGrid(cx, W/2, 358, captured);

      if (!DEMO && !BOT) {
        var pp = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = pp; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W/2, 558);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W/2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('TYPE DEX', W/2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('captured ' + (window.__demoScore || 20) + '/20. your move.', W/2, 320);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT 20', W/2, 390);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 424);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
