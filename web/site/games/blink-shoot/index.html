<title>Blink Shoot — Tilt</title>
<!--
  LOOP / attention-architecture — Blink Shoot (FACE-CONTROL engine)
  The player BLINKS to make a runner hop over obstacles.
  Funny-face payoff: twitchy rapid over-blinking caught on camera.
  Tech: shared face-control.js (proven detection, blink signal) + getUserMedia
        + MediaRecorder via FC.toggleRecord (canvas → webm).
  Control: FC.sig.blink (0=open, 1=closed). Edge-triggered with hysteresis:
    trigger at 0.22, release at 0.12 — one action per blink, no flutter.
    LOW threshold so a natural (not maximal) blink reliably fires.
  Input: FACE ONLY — tap/space only restart after crash, never jump.
  AUTO modes: ?demo=1 / ?bot=1 run a simulated face + autoTick so the
    clip-capture + validation gates work headless (no camera / FC used).
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:none;
               font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
  video { display:none; }
  #ui { position:fixed; left:0; right:0; bottom:max(16px,env(safe-area-inset-bottom)); display:flex; gap:10px; justify-content:center; z-index:10; }
  button { background:#12151d; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:99px;
           padding:12px 20px; font-size:15px; font-weight:800; cursor:pointer; }

  button.rec.on { animation:pulse 1s infinite; }
  @keyframes pulse { 50% { opacity:.55; } }
  #perm { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:24px; z-index:20; background:#0b0d12; }
  #perm h1 { font-size:34px; font-weight:900; margin:0; }
  #perm p { color:rgba(255,255,255,.6); font-size:15px; max-width:320px; margin:0; }
  #perm .big { background:#e8502e; border-color:#e8502e; font-size:18px; padding:16px 28px; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="perm">
  <h1>BLINK SHOOT</h1>
  <p><b>Blink</b> to hop over obstacles. Blink harder = jump higher. Your twitchy face rides in the corner — record it and share the chaos.</p>
  <button class="big" id="start">▶ ALLOW CAMERA &amp; PLAY</button>
  <p style="font-size:12px;opacity:.5">camera stays on your device — nothing is uploaded</p>
</div>
<div id="ui" style="display:none">
  <button id="rec" class="rec">● RECORD</button>
</div>
<script>window.LOOP_GAME = 'blink-shoot';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script src="../../js/face-control.js"></script>
<script type="module">
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;
  var AUTO = DEMO || BOT;  // no camera in scripted modes

  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio||1,2), scale=1;
  function fit(){var s=Math.min(window.innerWidth/W,window.innerHeight/H);scale=s;cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);}
  window.addEventListener('resize',fit); fit();

  var VERM='#e8502e', TEAL='#2ec5b6', GOLD='#f2b134', INK='#0b0d12';
  var PURPLE='#9b59b6';

  // ---- shared FaceControl lib ----
  var FC = window.FaceControl;

  // ---- game constants ----
  // Tuned for FACE control: lower gravity, forgiving jump, slow initial speed,
  // wide obstacle spacing. Speed ramps up gently after the first 5-8 seconds.
  var GROUND_Y = H - 120;
  var RUNNER_X = 100;
  var GRAV = 0.28;           // was 0.5 — softer fall, more time to react
  var JUMP_V = -7.5;         // was -9.5 — less rocket, more arc
  var OBS_SPEED_BASE = 2.0;  // starting speed (was 3.2)
  var OBS_SPEED_MAX  = 4.0;  // cap after ramp
  var OBS_SPEED = OBS_SPEED_BASE;
  var OBS_EVERY = 130;       // frames between obstacles (was 90) — more breathing room
  var OBS_W = 38;

  // ---- game state ----
  var st, obstacles, spawnT, best=0, hitStop=0, shakeAmt=0, dareBeaten=false;
  try{best=+localStorage.getItem('bs_best')||0;}catch(_){}

  // blink control — edge-triggered with hysteresis from FC.sig.blink
  // LOW thresholds: trigger 0.22, release 0.12 — a natural blink fires reliably.
  var BLINK_ON  = 0.22;  // fire when smoothed blink crosses this (was 0.28)
  var BLINK_OFF = 0.12;  // release hysteresis (was 0.15)
  var blinkSmoothed=0, wasBlinking=false;

  // test hook: window.__st() → live game state snapshot for auto-validation
  window.__st = function(){
    return {
      st: st,
      obstacles: obstacles,
      OBS_SPEED: OBS_SPEED,
      BLINK_ON: BLINK_ON,
      BLINK_OFF: BLINK_OFF,
      blinkSmoothed: blinkSmoothed,
      wasBlinking: wasBlinking
    };
  };

  var runStartTs=0, botRunsDone=0, ctaAt=0;

  // simulated face animation state (for AUTO PiP — never routed through FC)
  var simBlink=0, simBrowRaise=0, simPuff=0;

  function newRun(){
    st={phase:'ready', y:GROUND_Y, vy:0, score:0, onGround:true, overAt:0};
    obstacles=[]; spawnT=0;
    if(AUTO){ st.phase='play'; start(); }
  }
  function start(){
    st.phase='play'; st.y=GROUND_Y; st.vy=0; st.score=0;
    st.onGround=true; st.overAt=0;
    obstacles=[]; spawnT=0; dareBeaten=false;
    runStartTs=Date.now();
    if(window.LOOP) LOOP.emit('play_start',{seed:SEED});
  }

  function spawnObs(){
    // First obstacle is SHORT so it's easy to clear while the player learns blink control.
    // Later obstacles ramp up in height.
    var isFirst = obstacles.length === 0 && st.score === 0;
    var tall = !isFirst && rng() > 0.5;
    var h;
    if (isFirst) {
      h = 35 + rng()*20;  // very short first obstacle
    } else if (tall) {
      h = 70 + rng()*50;  // reduced max from 80+60=140 to 70+50=120
    } else {
      h = 35 + rng()*30;
    }
    obstacles.push({x: W+OBS_W, h: h, scored: false});
  }

  function jump(power){
    if(st.phase==='ready'){ st.phase='play'; start(); }
    if(st.phase!=='play') return;
    if(!st.onGround) return; // only jump from ground
    st.vy = JUMP_V * (0.7 + 0.5*Math.min(power||1,1));
    st.onGround = false;
    if(window.LOOP) LOOP.emit('blink_jump',{score:st.score});
    if(window.J) J.hit(st.score+1);
  }

  function gameOver(){
    st.phase='over'; st.overAt=performance.now(); shakeAmt=12;
    var dur=(Date.now()-runStartTs)/1000;
    var nb=st.score>best; if(nb){best=st.score;try{localStorage.setItem('bs_best',String(best));}catch(_){}};
    if(window.J){J.death(Math.min(0.3+st.score/20,1)); if(nb) setTimeout(function(){J.fanfare();},450);}
    if(DEMO) window.__demoScore=st.score;
    if(window.LOOP) LOOP.emit('game_over',{score:st.score,dur_s:+dur.toFixed(1)});
    if(BOT){
      botRunsDone++;
      if(botRunsDone>=BOT_RUNS) window.__botDone=true;
      else setTimeout(function(){newRun();},700);
    }
    if(DEMO){
      setTimeout(function(){
        st.phase='cta'; ctaAt=performance.now();
        setTimeout(function(){window.__demoDone=true;},3200);
      },1400);
    }
  }

  // ---- input: FACE ONLY. Tap/space ONLY restarts after a crash — never jumps.
  // The jump is driven exclusively by blinking (FC.sig.blink).
  function tapRestart(){ if(AUTO) return; if(st.phase==='over'&&performance.now()-st.overAt>500) newRun(); }
  window.addEventListener('keydown',function(e){ if(e.code==='Space'){e.preventDefault(); tapRestart();} });
  cv.addEventListener('pointerdown', tapRestart);

  // ---- camera start (delegates entirely to FC) ----
  document.getElementById('start').addEventListener('click', async function(){
    document.getElementById('perm').style.display='none';
    document.getElementById('ui').style.display='flex';
    await FC.start();
    newRun();
    requestAnimationFrame(frame);
  });

  // ---- AUTO autopilot (simulated face — never touches FC) ----
  var autoCool=0;
  function autoTick(dt){
    if(st.phase!=='play') return;
    autoCool-=dt;
    var next=null;
    for(var i=0;i<obstacles.length;i++){
      if(obstacles[i].x+OBS_W>RUNNER_X-20){ next=obstacles[i]; break; }
    }
    // give-up cap so demo/bot END cleanly
    var giveUp = (DEMO && st.score>=6) || (BOT && st.score>=(3+botRunsDone*2));
    if(giveUp) return;

    if(next){
      var d = next.x - RUNNER_X;
      if(d < 120 && d > 0 && st.onGround && autoCool<=0){
        jump(1.0);
        autoCool=15;
        simBlink=1; simBrowRaise=1; simPuff=0.7;
      }
    }
  }

  // ---- render loop ----
  var last=performance.now();
  function frame(now){
    var dt=Math.min((now-last)/16.667,3); last=now;

    var isBlinking; // used in drawing
    if(AUTO){
      // AUTO drives jump() directly and animates the PiP sim face — no FC involved
      autoTick(dt);
      simBlink     += (0 - simBlink)*0.18*dt;
      simBrowRaise += (0 - simBrowRaise)*0.12*dt;
      simPuff      += (0 - simPuff)*0.14*dt;
      blinkSmoothed = simBlink;
      isBlinking = blinkSmoothed > 0.35;
    } else {
      // Human mode: shared FC pulse engine — one blink = ONE jump (a 1 in a 1/0
      // world), fired on the closing edge. Small/fast blinks count; no smoothing
      // in the trigger path (blinkSmoothed is for rendering only).
      FC.update(now);
      blinkSmoothed += (FC.sig.blink - blinkSmoothed)*0.6*dt;
      isBlinking = FC.gate.blink;
      if(FC.tap('blink')) jump(1.0);   // fixed strength — predictable
      wasBlinking = isBlinking;
    }

    // physics
    if(hitStop>0){hitStop-=dt;}
    else if(st.phase==='play'){
      // Gentle speed ramp: full speed only after ~8 seconds (480 frames at 60fps).
      // Score also nudges speed so it feels rewarding, not punishing.
      var elapsed = (Date.now() - runStartTs) / 1000;
      OBS_SPEED = Math.min(OBS_SPEED_MAX, OBS_SPEED_BASE + elapsed * 0.18 + st.score * 0.05);

      st.vy += GRAV*dt;
      st.y  += st.vy*dt;
      if(st.y >= GROUND_Y){ st.y=GROUND_Y; st.vy=0; st.onGround=true; }
      else { st.onGround=false; }

      spawnT+=dt;
      if(spawnT>=OBS_EVERY){ spawnT=0; spawnObs(); }

      for(var i=obstacles.length-1;i>=0;i--){
        var ob=obstacles[i];
        ob.x -= OBS_SPEED*dt;
        if(!ob.scored && ob.x+OBS_W<RUNNER_X){
          ob.scored=true; st.score++;
          if(window.J) J.perfect(st.score);
          if(!AUTO&&window.SHARE&&SHARE.dare!==null&&!dareBeaten&&st.score>SHARE.dare){
            dareBeaten=true; if(window.J)J.fanfare(); SHARE.beaten(st.score);
          }
        }
        if(ob.x<-OBS_W) obstacles.splice(i,1);
        var rx=RUNNER_X-14, ry=st.y-40, rw=28, rh=40;
        var ox=ob.x, oy=GROUND_Y-ob.h, ow=OBS_W, oh=ob.h;
        if(rx+rw>ox && rx<ox+ow && ry+rh>oy && ry<oy+oh){ gameOver(); }
      }
      if(st.y<0) gameOver();
    }

    // ---- draw ----
    cx.save();
    if(shakeAmt>0.3){cx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt);} shakeAmt*=Math.pow(0.83,dt);

    // background gradient
    var bg=cx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#0e1428'); bg.addColorStop(0.6,'#1a0a2e'); bg.addColorStop(1,'#0b0d12');
    cx.fillStyle=bg; cx.fillRect(0,0,W,H);

    // stars
    cx.fillStyle='rgba(255,255,255,0.5)';
    var starRng=mulberry32(999);
    for(var s=0;s<60;s++){
      var sx=starRng()*W, sy=starRng()*(GROUND_Y-100);
      var sr=starRng()*1.5+0.3;
      cx.beginPath(); cx.arc(sx,sy,sr,0,Math.PI*2); cx.fill();
    }

    // ground
    cx.fillStyle='#1e1a35';
    cx.fillRect(0,GROUND_Y+10,W,H-GROUND_Y-10);
    cx.strokeStyle=PURPLE; cx.lineWidth=2; cx.globalAlpha=0.6;
    cx.beginPath(); cx.moveTo(0,GROUND_Y+10); cx.lineTo(W,GROUND_Y+10); cx.stroke();
    cx.globalAlpha=1;

    // obstacles (neon pillars)
    for(var j=0;j<obstacles.length;j++){
      var ob=obstacles[j];
      var og=cx.createLinearGradient(ob.x,0,ob.x+OBS_W,0);
      og.addColorStop(0,VERM); og.addColorStop(1,'#a01020');
      cx.fillStyle=og;
      cx.fillRect(ob.x, GROUND_Y-ob.h+10, OBS_W, ob.h);
      cx.fillStyle=GOLD;
      cx.fillRect(ob.x-2, GROUND_Y-ob.h+6, OBS_W+4, 8);
    }

    // runner character
    var rx=RUNNER_X, ry=st.y;
    var isJumping=!st.onGround;
    cx.save(); cx.translate(rx, ry);
    cx.fillStyle=TEAL;
    cx.beginPath(); cx.roundRect ? cx.roundRect(-14,-40,28,40,8) : cx.rect(-14,-40,28,40);
    cx.fill();
    cx.fillStyle='#2edfcf';
    cx.beginPath(); cx.arc(0,-48,14,0,Math.PI*2); cx.fill();
    var eyeClose = Math.min(blinkSmoothed, 1);
    cx.fillStyle='#fff';
    if(eyeClose < 0.7){
      cx.beginPath(); cx.arc(-5,-50,4*(1-eyeClose*0.8),0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(5,-50,4*(1-eyeClose*0.8),0,Math.PI*2); cx.fill();
      cx.fillStyle='#111';
      cx.beginPath(); cx.arc(-5,-50,2,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(5,-50,2,0,Math.PI*2); cx.fill();
    } else {
      cx.fillStyle=TEAL;
      cx.fillRect(-9,-51,8,3);
      cx.fillRect(1,-51,8,3);
    }
    if(isJumping){
      cx.fillStyle='#1c8378';
      cx.beginPath(); cx.ellipse(0,-8,10,6,0,0,Math.PI*2); cx.fill();
    } else {
      var legOsc=Math.sin(now/80)*6;
      cx.fillStyle='#1c8378';
      cx.fillRect(-10,-5,8,12+legOsc);
      cx.fillRect(2,-5,8,12-legOsc);
    }
    cx.restore();

    // webcam PiP — FC.video (mirrored) composited into canvas so recordings capture the face
    var camW=118, camH=88, cxp=W-camW-12, cyp=12;
    if(!AUTO){
      // Use shared FC drawPiP: mirrors FC.video, red border when blink active, bar shows strength
      FC.drawPiP(cx, cxp, cyp, camW, camH, isBlinking, blinkSmoothed, W, H);
      // status line
      var fcLabel = FC.statusLabel() || (FC.sig.blink>0.4 ? 'BLINKING!' : 'BLINK TO JUMP!');
      cx.fillStyle=(fcLabel.indexOf('http')>=0||fcLabel.indexOf('blocked')>=0)?GOLD:'rgba(255,255,255,0.6)';
      cx.font='700 9px Menlo,monospace'; cx.textAlign='center';
      cx.fillText(fcLabel.toUpperCase(), cxp+camW/2, cyp+camH+22);
    } else {
      // AUTO: simulated face PiP (never touches FC)
      cx.save();
      cx.strokeStyle='rgba(255,255,255,0.3)'; cx.lineWidth=2;
      cx.beginPath(); cx.roundRect ? cx.roundRect(cxp,cyp,camW,camH,12) : cx.rect(cxp,cyp,camW,camH); cx.stroke();
      cx.beginPath(); cx.roundRect ? cx.roundRect(cxp,cyp,camW,camH,12) : cx.rect(cxp,cyp,camW,camH); cx.clip();
      cx.fillStyle='#1a0a2e'; cx.fillRect(cxp,cyp,camW,camH);
      var fx=cxp+camW/2, fy=cyp+camH/2;
      cx.fillStyle=GOLD; cx.beginPath(); cx.arc(fx,fy,28,0,Math.PI*2); cx.fill();
      var browY = fy-20 - simBrowRaise*8;
      cx.strokeStyle='#111'; cx.lineWidth=3; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(fx-16,browY); cx.quadraticCurveTo(fx-10,browY-4,fx-4,browY); cx.stroke();
      cx.beginPath(); cx.moveTo(fx+4,browY); cx.quadraticCurveTo(fx+10,browY-4,fx+16,browY); cx.stroke();
      var eyeY=fy-9;
      if(simBlink>0.5){
        cx.fillStyle='#111';
        cx.fillRect(fx-16,eyeY-1,10,3);
        cx.fillRect(fx+6,eyeY-1,10,3);
      } else {
        cx.fillStyle='#111'; cx.beginPath(); cx.arc(fx-11,eyeY,4,0,Math.PI*2); cx.fill();
        cx.beginPath(); cx.arc(fx+11,eyeY,4,0,Math.PI*2); cx.fill();
        cx.fillStyle='#fff'; cx.beginPath(); cx.arc(fx-10,eyeY-1,1.5,0,Math.PI*2); cx.fill();
        cx.beginPath(); cx.arc(fx+12,eyeY-1,1.5,0,Math.PI*2); cx.fill();
      }
      if(simPuff>0.1){
        cx.fillStyle='rgba(255,150,100,'+(simPuff*0.5)+')';
        cx.beginPath(); cx.arc(fx-22,fy+4,10*simPuff+4,0,Math.PI*2); cx.fill();
        cx.beginPath(); cx.arc(fx+22,fy+4,10*simPuff+4,0,Math.PI*2); cx.fill();
      }
      cx.fillStyle='#111';
      var mouthOpen = simBlink*8+simBrowRaise*4;
      cx.beginPath(); cx.ellipse(fx, fy+14, 8, 2+mouthOpen*0.5, 0, 0, Math.PI); cx.fill();
      cx.restore();
      // DEMO label
      cx.fillStyle='rgba(255,255,255,0.6)';
      cx.font='700 9px Menlo,monospace'; cx.textAlign='center';
      cx.fillText('DEMO', cxp+camW/2, cyp+camH+22);
    }

    // score
    cx.textAlign='center'; cx.fillStyle='#fff'; cx.font='900 56px -apple-system,Helvetica,Arial';
    if(st&&(st.phase==='play'||st.phase==='over')) cx.fillText(st.score,W/2,90);
    cx.fillStyle='rgba(255,255,255,0.4)'; cx.font='600 12px Menlo,monospace'; cx.fillText('BEST '+best,W/2,112);

    // ready state
    if(st&&st.phase==='ready'){
      cx.fillStyle=VERM; cx.font='800 18px -apple-system,Helvetica,Arial';
      cx.globalAlpha=0.6+0.4*Math.sin(now/300);
      cx.fillText('BLINK TO JUMP',W/2,H/2-40); cx.globalAlpha=1;
    }

    // game over state
    if(st&&st.phase==='over'){
      cx.fillStyle='rgba(11,13,18,0.65)'; cx.fillRect(0,0,W,H);
      cx.fillStyle=VERM; cx.font='900 42px -apple-system,Helvetica,Arial'; cx.fillText('SPLAT.',W/2,H/2-30);
      cx.fillStyle='#fff'; cx.font='800 24px -apple-system,Helvetica,Arial'; cx.fillText(st.score+' hops',W/2,H/2+8);
      if(!AUTO){
        cx.fillStyle=TEAL; cx.font='700 15px -apple-system,Helvetica,Arial';
        cx.globalAlpha=0.6+0.4*Math.sin(now/280);
        cx.fillText('tap to play again',W/2,H/2+50); cx.globalAlpha=1;
      }
    }

    // cta state (demo only)
    if(st&&st.phase==='cta'){
      var t=(now-ctaAt)/1000, e=Math.min(1,t*2.2);
      cx.fillStyle='rgba(11,13,18,'+(0.82*e)+')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha=e;
      cx.fillStyle='#fff'; cx.font='900 40px -apple-system,Helvetica,Arial'; cx.fillText('BLINK SHOOT',W/2,H/2-30);
      cx.fillStyle=TEAL; cx.font='700 17px -apple-system,Helvetica,Arial'; cx.fillText('blink to jump. record the twitch.',W/2,H/2+6);
      cx.fillStyle=VERM; cx.font='900 24px -apple-system,Helvetica,Arial'; cx.fillText('▶ PLAY NOW',W/2,H/2+52);
      cx.globalAlpha=1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- recording (shared FaceControl lib) ----
  var recBtn=document.getElementById('rec');
  recBtn.addEventListener('click',function(){
    var started=FC.toggleRecord(cv,'blink-shoot.webm',function(){
      recBtn.textContent='● RECORD'; recBtn.classList.remove('on');
      if(window.LOOP) LOOP.emit('recording_saved',{score:st?st.score:0});
    });
    if(started){ recBtn.textContent='■ STOP & SAVE'; recBtn.classList.add('on'); }
  });

  // scripted modes auto-start (no camera prompt)
  if(AUTO){ document.getElementById('perm').style.display='none'; newRun(); requestAnimationFrame(frame); }
})();
</script>
