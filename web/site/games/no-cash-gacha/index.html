      } else {
        cx.fillStyle = 'rgba(255,255,255,0.03)'; cx.fill();
        cx.strokeStyle = 'rgba(255,255,255,0.15)'; cx.lineWidth = 1.5; cx.stroke();
      }
    }
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      if (state.spinning) {
        state.spinT += dt / SPIN_FRAMES;
        if (state.spinT >= 1) { state.spinT = 1; finishSpin(); }
      }
      if (state.scarePhase === 1) {
        state.scareT += dt;
        if (state.scareT >= 16) {
          state.scarePhase = 2; state.scareT = 0;
          actuallyReveal();
          flash('PROTECTED', TEAL, 40);
          if (window.J) J.gold();
          zoom = 1.04; shakeAmt = 0;
        }
      } else if (state.scarePhase === 2) {
        state.scareT += dt;
        if (state.scareT >= 20) { state.scarePhase = 0; state.scareT = 0; }
      }
      autopilot();
    }

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.1 * dt;

    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 38px -apple-system, Helvetica, Arial';
    cx.fillText('NO-CASH GACHA', W / 2, 68);
    cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('15 UNIQUE PULLS · NO PAYWALL', W / 2, 92);

    if (state.phase === 'play' || state.phase === 'over') {
      cx.fillStyle = '#fff'; cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(state.pullCount + '/' + TOTAL, W / 2, 150);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('COLLECTED', W / 2, 170);
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = state.dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(state.dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 196);
      }
    }

    drawCapsule(now);
    drawTracker();

    var shownName = state.spinning ? (state.duplicateScare ? '???' : 'SPINNING') :
                    (state.scarePhase === 1 ? 'DUPLICATE?' : (state.revealItem ? state.revealItem.name : ''));
    if (shownName && state.phase !== 'title' && state.phase !== 'challenge' && state.phase !== 'cta') {
      cx.textAlign = 'center'; cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '700 16px Menlo, monospace';
      cx.fillText(shownName, W / 2, 390);
    }

    if (state.phase === 'play' && !state.spinning && state.scarePhase === 0 && state.pullCount < TOTAL) {
      var pulse = 0.6 + 0.4 * Math.sin(now / 280);
      cx.textAlign = 'center'; cx.globalAlpha = pulse;
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP THE CAPSULE', W / 2, 455); cx.globalAlpha = 1;
    }

    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var p2 = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = p2; cx.fillText('TAP TO START', W / 2, 440); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('duplicate protection is on', W / 2, 465);
    }

    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(CHALLENGE_SCORE), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 345 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = state.pullCount >= TOTAL ? TEAL : VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(state.pullCount >= TOTAL ? 'COMPLETE' : 'LOCKED', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.pullCount + ' collected', W / 2, 345);
      var pt = pctTop(state.pullCount);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p3 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p3; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — PULL AGAIN', W / 2, 462);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && state.dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    if (state.phase === 'cta') {
      var t = (now - state.ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('NO-CASH GACHA', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they collected ' + (window.__demoScore || 15) + '. your move.', W / 2, 340);
      var p4 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p4;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 15), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
