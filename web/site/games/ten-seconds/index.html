<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ten Seconds — Tilt</title>
<!--
  LOOP / attention-architecture — Ten Seconds (MVP game)
  Circuits: 04 loss (the near-miss), 06 Zeigarnik (one more try),
            01 RPE (variable reward — perfect is 1-in-400).
  Modes (query params):
    ?demo=1&seed=7        scripted run for clip capture (challenge → flinch → miss → CTA),
                          sets window.__demoDone and window.__demoScore when finished
    ?bot=1&runs=N&seed=5  N rounds autoplay for traffic simulation, sets window.__botDone
    ?clip=ID&src=tiktok   attribution (see js/loop-events.js)
    ?sink=URL             event sink override
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'ten-seconds';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 10;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game state ----
  var phase = 'title';          // title | challenge | play | blind | reveal | cta
  var startTime = 0;            // performance.now() when round began
  var finalElapsed = 0;         // captured elapsed at stop
  var revealAt = 0;             // when reveal phase started
  var ctaAt = 0;                // when CTA overlay started
  var attempts = 0;            // rounds this session
  var bestDelta = Infinity;     // best-ever |delta| in seconds
  var blindProgress = 0;        // 0→1 fade for blind transition
  var flashes = [];

  // ---- v2 juice / share state ----
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false, challengeAt = 0;
  var freezeElapsed = 0;       // elapsed time to freeze on hit-stop
  var demoFlinchTimer = null, demoStopTimer = null;
  var demoChallengeScore = 350; // ms — the demo's final delta
  var demoFlinchAt = 6200;      // ms into the round: the "oh no" flinch
  var demoStopAt = 10350;       // ms into the round: the real miss

  try { bestDelta = +localStorage.getItem('ts_best') || Infinity; } catch (_) {}

  // ---- demo / bot state ----
  var botTimer = null;
  var botRunsDone = 0;

  function newGame() {
    phase = 'title';
    attempts = 0;
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false; challengeAt = 0;
    if (demoFlinchTimer) clearTimeout(demoFlinchTimer);
    if (demoStopTimer) clearTimeout(demoStopTimer);
    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRound, 1250);
      return;
    }
    if (BOT) startBot();
  }

  function startRound() {
    attempts++;
    phase = 'play';
    startTime = performance.now();
    blindProgress = 0;
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    finalElapsed = 0; freezeElapsed = 0;
    if (DEMO) {
      demoFlinchTimer = setTimeout(demoFlinch, demoFlinchAt);
      demoStopTimer = setTimeout(stop, demoStopAt);
    }
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED, attempt: attempts });
    if (window.J) J.tension(0);
  }

  function stop() {
    finalElapsed = (performance.now() - startTime) / 1000;
    freezeElapsed = finalElapsed;
    var deltaSec = Math.abs(finalElapsed - 10);
    var deltaMs = Math.round(deltaSec * 1000);
    var mag = Math.min(0.3 + deltaSec / 2, 1);

    if (window.J) {
      J.tension(0);
      if (deltaSec <= 0.01) J.perfect(attempts);
      else if (deltaSec <= 0.05) J.near();
      else J.death(mag);
    }

    if (deltaSec <= 0.01) {
      hitStop = 5; zoom = 1.04;
      flash('PERFECT.', GOLD, 52);
    } else if (deltaSec <= 0.05) {
      hitStop = 3; zoom = 1.02; shakeAmt = 5;
      flash('SO CLOSE.', VERM, 44);
      if (window.LOOP) LOOP.emit('near_miss', { delta_ms: deltaMs });
    } else {
      hitStop = 2;
      shakeAmt = Math.min(6 + deltaSec * 8, 10);
      zoom = 0.98;
      if (deltaSec > 0.3) flash('WAY OFF.', VERM, 40);
    }

    if (deltaSec < bestDelta) {
      bestDelta = deltaSec;
      try { localStorage.setItem('ts_best', String(bestDelta)); } catch (_) {}
      if (window.J && attempts > 1) J.fanfare();
    }

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && deltaMs < SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(deltaMs);
    }

    if (window.LOOP) {
      LOOP.emit('game_over', { score: deltaMs, dur_s: +finalElapsed.toFixed(3) });
    }

    if (DEMO) {
      window.__demoScore = deltaMs;
      // reveal card → CTA, matching the demo timing arc
      var revealHold = 2200 + Math.ceil(hitStop * 16.7);
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, revealHold);
    }
  }

  function restartRound() {
    if (window.LOOP) LOOP.emit('restart', {});
    if (demoFlinchTimer) clearTimeout(demoFlinchTimer);
    if (demoStopTimer) clearTimeout(demoStopTimer);
    startRound();
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 470, w: 250, h: 44 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title' || phase === 'challenge') { startRound(); return; }
    if (phase === 'play' || phase === 'blind') { stop(); return; }
    if (phase === 'reveal' && performance.now() - revealAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: Math.round(Math.abs(finalElapsed - 10) * 1000), unit: 'ms' });
        return;
      }
      restartRound();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  function demoFlinch() {
    if (phase !== 'play' && phase !== 'blind') return;
    freezeElapsed = (performance.now() - startTime) / 1000;
    shakeAmt = 4; hitStop = 2; zoom = 1.015;
    flash('too soon...', VERM, 32);
    if (window.J) J.near();
  }

  // ---- bot autopilot ----
  function startBot() {
    runBotRound();
  }

  function runBotRound() {
    if (botRunsDone >= BOT_RUNS) {
      window.__botDone = true;
      return;
    }
    startRound();
    // seeded stop time between 8.8s and 11.2s
    var targetMs = 8800 + rng() * 2400;
    botTimer = setTimeout(function () {
      stop();
      botRunsDone++;
      botTimer = setTimeout(function () {
        runBotRound();
      }, 500);
    }, targetMs);
  }

  // ---- helpers ----
  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  function fmtTime(s) {
    var secs = Math.min(s, 99.99);
    var whole = Math.floor(secs);
    var frac = Math.floor((secs - whole) * 100);
    return (whole < 10 ? '0' : '') + whole + '.' + (frac < 10 ? '0' : '') + frac;
  }

  function pctTop(ms) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-300 / Math.max(ms, 1)))));
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // current elapsed during play/blind (frozen during hit-stop)
    var currentElapsed = 0;
    if (phase === 'play' || phase === 'blind') {
      if (hitStop > 0) currentElapsed = freezeElapsed;
      else currentElapsed = (now - startTime) / 1000;
      if (phase === 'play' && currentElapsed >= 3.0) {
        phase = 'blind';
        blindProgress = 0;
      }
      if (phase === 'blind') {
        blindProgress = Math.min(1, blindProgress + dt * 0.12);
      }
    }

    // hit-stop release → reveal
    if (hitStop > 0) {
      hitStop -= dt;
      if (hitStop <= 0) {
        phase = 'reveal';
        revealAt = performance.now();
      }
    }

    // tension riser as the 10-second mark approaches
    if (window.J && (phase === 'play' || phase === 'blind') && hitStop <= 0) {
      var tx = Math.min(1, Math.max(0, currentElapsed - 7) / 3);
      J.tension(tx);
    }

    // ---- v2 juice transforms (save/restore around the whole draw) ----
    cx.save();
    if (shakeAmt > 0.2 || Math.abs(zoom - 1) > 0.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- title ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 52px -apple-system, Helvetica, Arial';
      cx.fillText('TEN SECONDS', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('stop at exactly 10.00', W / 2, 300);
      cx.fillText('it goes blind at 3', W / 2, 322);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillStyle = VERM;
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 380); cx.globalAlpha = 1;
    }

    // ---- challenge card (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(demoChallengeScore), W / 2, 390);
      cx.fillStyle = GOLD; cx.font = '800 30px -apple-system, Helvetica, Arial';
      cx.fillText('ms', W / 2, 430);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 460);
    }

    // ---- play / blind ----
    if (phase === 'play' || phase === 'blind') {
      cx.textAlign = 'center';

      // incoming dare banner (human only)
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(
          dareBeaten
            ? 'DARE BEATEN ✓'
            : 'BEAT ' + SHARE.dare + ' ms' + (SHARE.by ? ' — dared by ' + SHARE.by : ''),
          W / 2, 146
        );
      }

      if (phase === 'play') {
        cx.fillStyle = '#fff'; cx.font = '900 96px -apple-system, Helvetica, Arial';
        cx.fillText(fmtTime(currentElapsed), W / 2, 340);
      } else {
        // blind — digits fade to "?.??"
        var blindAlpha = 1 - blindProgress * 0.75;
        cx.fillStyle = 'rgba(255,255,255,' + blindAlpha + ')';
        cx.font = '900 96px -apple-system, Helvetica, Arial';
        cx.fillText('?.??', W / 2, 340);

        cx.fillStyle = 'rgba(255,255,255,0.22)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('attempt #' + attempts, W / 2, 380);
      }
    }

    // ---- reveal ----
    if (phase === 'reveal') {
      var deltaSec = Math.abs(finalElapsed - 10);
      var early = finalElapsed < 10;
      var deltaMs = Math.round(deltaSec * 1000);

      cx.textAlign = 'center';

      // actual time — huge
      cx.fillStyle = '#fff'; cx.font = '900 88px -apple-system, Helvetica, Arial';
      cx.fillText(finalElapsed.toFixed(2), W / 2, 290);

      // delta line
      var deltaLabel = early ? 'EARLY' : 'LATE';
      var deltaColor = deltaSec <= 0.01 ? GOLD : VERM;
      cx.fillStyle = deltaColor; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(deltaSec.toFixed(2) + ' ' + deltaLabel, W / 2, 338);

      // verdict
      var verdict, vColor;
      if (deltaSec <= 0.01)      { verdict = 'PERFECT. (1 in 400 tries)'; vColor = GOLD; }
      else if (deltaSec <= 0.05) { verdict = 'SO CLOSE.'; vColor = VERM; }
      else if (deltaSec <= 0.15) { verdict = 'almost had it'; vColor = 'rgba(255,255,255,0.7)'; }
      else if (deltaSec <= 0.5)  { verdict = 'getting warmer'; vColor = 'rgba(255,255,255,0.5)'; }
      else                       { verdict = 'way off — again?'; vColor = 'rgba(255,255,255,0.35)'; }

      cx.fillStyle = vColor; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText(verdict, W / 2, 382);

      // best ever
      if (bestDelta < Infinity) {
        cx.fillStyle = 'rgba(255,255,255,0.32)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
        cx.fillText('best ' + bestDelta.toFixed(2) + 's off', W / 2, 414);
      }

      // rank line
      var pt = pctTop(deltaMs);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 446);

      // share pill (human only)
      if (!DEMO && !BOT) {
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        (cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h));
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        var shareLabel = (window.SHARE && SHARE.dare !== null && dareBeaten) ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND';
        cx.fillText(shareLabel, W / 2, SHARE_R.y + 30);
      }

      // retry prompt (human only)
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 540);
        cx.globalAlpha = 1;
      }
    }

    // ---- flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ---- demo CTA card ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('TEN SECONDS', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      var ds = window.__demoScore || demoChallengeScore;
      cx.fillText('missed by ' + ds + ' ms. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + ds + ' MS', W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
