      state.phase = 'challenge';

      setTimeout(startRun, 1200);

    if (BOT) { startRun(); return; }

  function startRun() {
    state.phase = 'play';
    state.targetIdx = 0;
    state.targetRevealedAt = performance.now();
    state.tapCooldown = 0;

    scheduleTrap();

  var DEMO_TIMING = [0.35, 0.52, 0.40, 0.66, 0.29, 0.82, 0.91, 0.44, 0.60];

  // ---- frame loop ----
  var last = performance.now();

    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (state.tapCooldown > 0) state.tapCooldown -= dt;

    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);

    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- CHALLENGE CARD (demo beat 1) ----
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('REPLIES TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('22', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top thread", W / 2, 430);
    }

    // ---- PLAY ----
    if (state.phase === 'play') {
      // HUD
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 62px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 92);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best + '   LV ' + state.level, W / 2, 112);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(
          dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — ' + SHARE.by : ''),
          W / 2, 132
        );
      }

      // thread header
      cx.textAlign = 'left';
      cx.fillStyle = 'rgba(255,255,255,0.26)';
      cx.font = '600 11px Menlo, monospace';
      cx.fillText('▸ thread · reply ' + (state.score + 1), PANEL_X, THREAD_START_Y - 10);

      // collapse ratio
      var collapseRatio = 0;
      if (state.targetRevealedAt > 0) {
        collapseRatio = Math.min(1, (now - state.targetRevealedAt) / getWindow(state.level));
      }

      // draw visible comment cards
      var slideY = state.slideOffset;
      for (var slot = 0; slot < VISIBLE_LINES; slot++) {
        var threadIdx = (state.targetIdx - 1) + slot;
        if (threadIdx < 0 || threadIdx >= state.thread.length) continue;
        var comment = state.thread[threadIdx];
        var slotY = THREAD_START_Y + slot * LINE_H + slideY;
        if (slotY > H + LINE_H || slotY < 0) continue;

        var isTarget = threadIdx === state.targetIdx;
        var isTrap   = threadIdx === state.trapIdx;
        var cr = isTarget ? collapseRatio : -1;

        if      (threadIdx < state.targetIdx) cx.globalAlpha = 0.25;
        else if (threadIdx > state.targetIdx) cx.globalAlpha = 0.52;
        else                                  cx.globalAlpha = 1;

        drawComment(comment, slotY, isTarget, isTrap, cr);
        cx.globalAlpha = 1;
      }

      // more replies hint (fixed number, no rng)
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.18)';
      cx.font = '600 11px -apple-system, Helvetica, Arial';
      cx.fillText('↓ ' + state.moreRepliesCount + ' more replies', W / 2, THREAD_START_Y + VISIBLE_LINES * LINE_H + 10);
    }

    // ---- OVER ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('COLLAPSED.', W / 2, 295);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' replies', W / 2, 338);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 380);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('faster than ' + (100 - pt) + '% of readers', W / 2, 404);
      if (!DEMO && !BOT) {
        var pp = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = pp; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 450);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.13)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath(); drawRoundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 29
        );
      }
    }

    // ---- CTA (demo beat 6) ----
    if (state.phase === 'cta') {
      var t = (now - state.ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('COMMENT CLIFF', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 22) + '. your thread.', W / 2, 330);
      var pp3 = 0.75 + 0.25 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * pp3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 22), W / 2, 394);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 426);
      cx.globalAlpha = 1;
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 228 - fl.t * 0.55);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
