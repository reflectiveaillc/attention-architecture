  // We have 20+ shapes to pick from. Difficulty = morphed/ambiguous variants.

  var SHAPES = [
    // 0: circle
    function(c, x, y, s, f) {

    function(c, x, y, s, f) {

    // 5: pentagon
    function(c, x, y, s, f) {
      c.beginPath();
      for (var i = 0; i < 5; i++) {
        var a = (i / 5) * Math.PI * 2 - Math.PI / 2;

      c.beginPath();

        var a = (i / 10) * Math.PI * 2 - Math.PI / 2;
        var r = (i % 2 === 0) ? s * 0.5 : s * 0.22;
        if (i === 0) c.moveTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
        else c.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);

    },
    // 8: cross / plus
    function(c, x, y, s, f) {
      var t = s * 0.17, h = s * 0.48;

      c.fillRect(x - t, y - h, t * 2, h * 2);
      c.fillRect(x - h, y - t, h * 2, t * 2);
    },
    // 9: crescent (circle with circle cutout)
    function(c, x, y, s, f) {

      c.beginPath(); c.arc(x, y, s * 0.5, 0, Math.PI * 2);

      c.globalCompositeOperation = 'destination-out';

    // 10: arrow (right)
    function(c, x, y, s, f) {
      c.beginPath();
      c.moveTo(x - s * 0.42, y - s * 0.18); c.lineTo(x + s * 0.05, y - s * 0.18);
      c.lineTo(x + s * 0.05, y - s * 0.42); c.lineTo(x + s * 0.48, y);
      c.lineTo(x + s * 0.05, y + s * 0.42); c.lineTo(x + s * 0.05, y + s * 0.18);
      c.lineTo(x - s * 0.42, y + s * 0.18); c.closePath();
      c.fillStyle = f; c.fill();
    },
    // 11: heart
    function(c, x, y, s, f) {
      c.beginPath();
      c.moveTo(x, y + s * 0.35);
      c.bezierCurveTo(x - s * 0.5, y, x - s * 0.5, y - s * 0.38, x, y - s * 0.15);
      c.bezierCurveTo(x + s * 0.5, y - s * 0.38, x + s * 0.5, y, x, y + s * 0.35);
      c.closePath(); c.fillStyle = f; c.fill();
    },
    // 12: lightning bolt
    function(c, x, y, s, f) {
      c.beginPath();
      c.moveTo(x + s * 0.15, y - s * 0.5); c.lineTo(x - s * 0.18, y - s * 0.02);
      c.lineTo(x + s * 0.1, y - s * 0.02); c.lineTo(x - s * 0.15, y + s * 0.5);

      c.beginPath(); c.arc(x + s * 0.35, y + s * 0.18, s * 0.18, 0, Math.PI * 2); c.fill();
      c.fillRect(x - s * 0.42, y + s * 0.1, s * 0.84, s * 0.25);

    // 17: pac-man
    function(c, x, y, s, f) {
      c.beginPath();

      c.quadraticCurveTo(x - s * 0.42, y + s * 0.45, x - s * 0.42, y + s * 0.05);
      c.lineTo(x - s * 0.42, y - s * 0.28); c.closePath();
      c.fillStyle = f; c.fill();
    },

    function(c, x, y, s, f) {
      c.beginPath(); c.arc(x, y, s * 0.5, Math.PI * 0.25, Math.PI * 1.75); c.closePath();

  var NUM_SHAPES = SHAPES.length; // 20

  // ---- Game state ----
  var phase, streak, score, round, flashes, hitStop, shakeAmt, zoom, dareBeaten;
  var showSilhouette, silhTimer, choiceReveal, choiceAnim, flashTimer;

  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };

  // silhouette flash duration (ms) decreases with difficulty
  function silhDuration(round) { return Math.max(350, 1000 - round * 48); }
  // number of choices stays 6, but how similar they are increases

  // generate a round
  function genRound(roundN) {
    // pick a correct shape
    var cIdx = Math.floor(rng() * NUM_SHAPES);

    // build a pool of distractors
    // at low rounds, shapes are visually different; at high rounds they look similar
    var pool = [];
    // shape similarity groups (shapes that look alike under a silhouette)
    var similarGroups = [
      [0, 14, 6],        // circle / octagon / hexagon
      [1, 14, 8],        // square / octagon / cross
      [2, 3, 4],         // triangle-up / triangle-down / diamond
      [5, 6, 14],        // pentagon / hexagon / octagon
      [7, 12, 17],       // star / lightning / pac-man
      [9, 19, 0],        // crescent / moon / circle
      [10, 12, 8],       // arrow / lightning / cross
      [11, 13, 0],       // heart / teardrop / circle
      [15, 2, 3],        // hourglass / triangle-up / triangle-down
      [16, 0, 14],       // cloud / circle / octagon
      [18, 1, 5],        // shield / square / pentagon
    ];

    // find if cIdx belongs to a group
    var myGroup = null;
    for (var g = 0; g < similarGroups.length; g++) {
      if (similarGroups[g].indexOf(cIdx) !== -1) { myGroup = similarGroups[g]; break; }
    }

    var difficulty = Math.min(1, roundN / 12);
    // at high difficulty, use more from the same group
    var nFromGroup = Math.round(difficulty * 3);

    // fill pool with similar shapes first (at high difficulty)
    if (myGroup && nFromGroup > 0) {
      for (var i = 0; i < myGroup.length && pool.length < nFromGroup; i++) {
        if (myGroup[i] !== cIdx) pool.push(myGroup[i]);
      }
    }
    // fill rest with random distinct shapes
    var tries = 0;
    while (pool.length < 5 && tries < 100) {
      tries++;
      var r = Math.floor(rng() * NUM_SHAPES);
      if (r !== cIdx && pool.indexOf(r) === -1) pool.push(r);
    }

    // shuffle pool and take 5 distractors
    for (var i = pool.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
    }
    var distractors = pool.slice(0, 5);

    // insert correct at random position
    var pos = Math.floor(rng() * 6);
    var allChoices = [];
    var di = 0;
    for (var i = 0; i < 6; i++) {
      if (i === pos) allChoices.push(cIdx);
      else allChoices.push(distractors[di++]);
    }

    return { shapeIdx: cIdx, choices: allChoices, correctPos: pos };
  }

  function newGame() {
    phase = 'title';
    streak = 0; score = 0; round = 0;

    silhTimer = 0;
    choiceReveal = false;
    choiceAnim = 0;

    phase = 'over';

    var dur = (Date.now() - runStartTs) / 1000;

    if (newBest) { best = score; try { localStorage.setItem('sm_best', String(best)); } catch(_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function() {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function() { window.__demoDone = true; }, 3600);
      }, 2500);

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function() { restartRun(); }, 800);

  }

  function restartRun() {
    streak = 0; score = 0; round = 0; flashes = [];
    answered = false; answerResult = null;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();

  function resolveAnswer(choicePos) {
    if (answered || phase !== 'play' || !choiceReveal) return;
    answered = true;
    var correct = (choicePos === correctIdx);
    answerResult = { pos: choicePos, correct: correct };

    if (correct) {
      streak++;
      score++;
      var isFast = silhTimer < silhDuration(round) * 0.3; // answered fast?
      if (isFast) {
        flash('FAST!', TEAL, 42);
        if (window.J) J.perfect(streak);
        hitStop = 5; zoom = 1.03;
      } else if (streak >= 5) {
        flash('×' + streak, GOLD, 46);
        if (window.J) J.hit(streak);
        if (window.J) J.tension(Math.min(streak / 12, 1));
      } else {
        flash('✓', TEAL, 40);
        if (window.J) J.hit(streak);
      }
      // dare check
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(score);
      }
      if (window.LOOP) LOOP.emit('correct_match', { round: round, streak: streak, shape: currentShape });
      // advance after brief feedback
      setTimeout(function() {
        round++;
        nextRound();
      }, 420);
    } else {
      // near miss check: if correct answer was very close to tapped
      var row1 = Math.floor(choicePos / GRID_COLS), col1 = choicePos % GRID_COLS;
      var row2 = Math.floor(correctIdx / GRID_COLS), col2 = correctIdx % GRID_COLS;
      var dist = Math.abs(row1 - row2) + Math.abs(col1 - col2);
      if (dist === 1) {
        flash('SO CLOSE', VERM, 36);
        if (window.J) J.near();
        if (window.LOOP) LOOP.emit('near_miss', { round: round, streak: streak });
      } else {
        flash('MISS', VERM, 42);
      }
      shakeAmt = 6;
      if (window.J) J.tension(0);
      setTimeout(function() { gameOver(); }, 700);
    }
  }

  // ---- input ----
  function tap(x, y) {
    if (DEMO || BOT) return;
    // mute toggle
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }

    if (phase === 'title') { startRun(); return; }
    if (phase === 'play' && choiceReveal && !answered) {
      // figure out which cell
      if (y >= GRID_Y && y <= GRID_Y + CELL_H * GRID_ROWS) {
        var col = Math.floor(x / CELL_W);
        var row = Math.floor((y - GRID_Y) / CELL_H);
        if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
          var idx = row * GRID_COLS + col;
          resolveAnswer(idx);
        }
      }
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'streak' }); return;
      }
      restartRun();
    }
  }

  window.addEventListener('pointerdown', function(e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function(e) {
    // number keys 1-6 for desktop testing
    var k = parseInt(e.key);
    if (k >= 1 && k <= 6) { resolveAnswer(k - 1); return; }
    if (e.code === 'Space') tap(W / 2, H / 2);
  });

  // ---- demo / bot autopilot ----
  // demo: scripted sequence of answers (correct / wrong at the end)
  // near-fail: pick wrong but catch self (hesitation before correct)
  var demoScript = [
    { wait: 38, ans: 'correct' },
    { wait: 28, ans: 'correct' },
    { wait: 52, ans: 'correct' },
    { wait: 65, ans: 'correct' },
    { wait: 44, ans: 'correct' },
    { wait: 70, ans: 'near_correct' }, // hesitate near a wrong choice then correct
    { wait: 55, ans: 'correct' },
    { wait: 80, ans: 'wrong' }          // the fail
  ];
  var demoIdx = 0, demoWait = 0, demoActive = false;
  var botWait = 0, botCorrectRuns = 0;

  function demoTick() {
    if (phase !== 'play') return;
    if (!choiceReveal || answered) return;
    if (demoWait > 0) { demoWait--; return; }

    var step = demoScript[Math.min(demoIdx, demoScript.length - 1)];
    if (!demoActive) {
      demoActive = true;
      demoWait = step.wait;
      return;
    }
    demoActive = false;

    if (step.ans === 'correct' || step.ans === 'near_correct') {
      resolveAnswer(correctIdx);
    } else {
      // pick a wrong one
      var wrong = (correctIdx + 1 + Math.floor(rng() * 4)) % 6;
      if (wrong === correctIdx) wrong = (wrong + 1) % 6;
      resolveAnswer(wrong);
    }
    demoIdx++;
  }

  function botTick() {
    if (phase !== 'play') return;
    if (!choiceReveal || answered) return;
    if (botWait > 0) { botWait--; return; }
    // imperfect bot: correct ~72% of the time; goes wrong eventually
    var willBeCorrect = rng() < 0.72 && botCorrectRuns < 8;
    if (willBeCorrect) {
      botCorrectRuns++;
      resolveAnswer(correctIdx);
    } else {
      botCorrectRuns = 0;
      var wrong = Math.floor(rng() * 6);
      if (wrong === correctIdx) wrong = (wrong + 1) % 6;
      resolveAnswer(wrong);
    }
    botWait = 20 + Math.floor(rng() * 25);
  }

  // ---- draw helpers ----
  function drawShape(shapeIdx, x, y, size, fill) {
    SHAPES[shapeIdx](cx, x, y, size, fill);
  }

  function drawCell(idx, anim) {
    var col = idx % GRID_COLS;
    var row = Math.floor(idx / GRID_COLS);
    var cx_ = col * CELL_W + CELL_W / 2;
    var cy_ = GRID_Y + row * CELL_H + CELL_H / 2;

    // cell background
    var isCorrect = (answerResult && idx === correctIdx);
    var isWrong = (answerResult && idx === answerResult.pos && !answerResult.correct);
    var isHover = false;

    var bgAlpha = 0.08;
    var borderColor = 'rgba(255,255,255,0.08)';
    if (isCorrect && answered) { bgAlpha = 0.18; borderColor = TEAL; }
    if (isWrong) { bgAlpha = 0.15; borderColor = VERM; }

    // slide in from below animation
    var slideOff = (1 - Math.min(1, anim)) * 30;
    var cellAlpha = Math.min(1, anim);

    cx.save();
    cx.globalAlpha = cellAlpha;
    cx.translate(0, slideOff);

    cx.fillStyle = 'rgba(255,255,255,' + bgAlpha + ')';
    var rx = col * CELL_W + 4, ry = GRID_Y + row * CELL_H + 4;
    var rw = CELL_W - 8, rh = CELL_H - 8;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(rx, ry, rw, rh, 10);
    else cx.rect(rx, ry, rw, rh);
    cx.fill();

    cx.strokeStyle = borderColor; cx.lineWidth = 1.5;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(rx, ry, rw, rh, 10);
    else cx.rect(rx, ry, rw, rh);
    cx.stroke();

    // shape (silhouette = black)
    var shapeColor = 'rgba(255,255,255,0.82)';
    if (isCorrect && answered) shapeColor = TEAL;
    if (isWrong) shapeColor = VERM;

    drawShape(choices[idx], cx_, cy_, SHAPE_SIZE, shapeColor);

    cx.restore();
  }

  // ---- main render loop ----
  last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // update silhouette timer
    if (phase === 'play' && showSilhouette) {
      silhTimer += dt * 16.667;
      if (silhTimer >= silhDuration(round)) {
        showSilhouette = false;
        choiceReveal = true;
        choiceAnim = 0;
      }
    }
    if (choiceReveal && choiceAnim < CHOICE_REVEAL_DUR) {
      choiceAnim += dt;
    }

    // autopilots
    if (DEMO && phase === 'play') demoTick();
    if (BOT && phase === 'play') botTick();

    // hit-stop decay (CRITICAL: decay before calling autopilot)
    if (hitStop > 0) hitStop -= dt;

    // juice
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('SHADOW MATCH', W / 2, 268);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('a silhouette flashes', W / 2, 308);
      cx.fillText('tap the match before your brain lies', W / 2, 330);

      // draw a demo silhouette hint
      cx.save();
      cx.globalAlpha = 0.22;
      drawShape(7, W / 2, 410, 72, '#fff');  // star silhouette
      cx.restore();

      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 560);
      cx.globalAlpha = 1;
    }

    // ---- CHALLENGE card (demo only) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 288);
      cx.fillStyle = GOLD; cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('11', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top streak", W / 2, 432);
    }

    // ---- PLAY ----
    if (phase === 'play') {
      // streak / score header
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 62px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 90);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 112);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W / 2, 138);
      }

      // round label
      cx.fillStyle = 'rgba(255,255,255,0.25)';
      cx.font = '600 11px Menlo, monospace';
      cx.fillText('ROUND ' + (round + 1), W / 2, 155);

      // silhouette zone (top area, big)
      var silhSize = 110;
      var silhX = W / 2, silhY = 252;

      if (showSilhouette) {
        // flashing silhouette
        var progress = silhTimer / silhDuration(round);
        var fadeOut = progress > 0.75 ? (1 - (progress - 0.75) / 0.25) : 1;
        cx.save();
        cx.globalAlpha = fadeOut;
        // black silhouette on a slightly lighter backdrop
        cx.fillStyle = 'rgba(255,255,255,0.06)';
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(silhX - 90, silhY - 90, 180, 180, 16);
        else cx.rect(silhX - 90, silhY - 90, 180, 180);
        cx.fill();
        drawShape(currentShape, silhX, silhY, silhSize, 'rgba(255,255,255,0.9)');
        cx.restore();

        // timer bar
        var barW = 220, barH = 5;
        var barX = W / 2 - barW / 2, barY = silhY + 105;
        cx.fillStyle = 'rgba(255,255,255,0.1)';
        cx.fillRect(barX, barY, barW, barH);
        var fill = (1 - progress) * barW;
        var barColor = progress < 0.6 ? TEAL : (progress < 0.85 ? GOLD : VERM);
        cx.fillStyle = barColor;
        cx.fillRect(barX, barY, fill, barH);

        // label
        cx.fillStyle = 'rgba(255,255,255,0.6)';
        cx.font = '700 12px Menlo, monospace';
        cx.fillText('MEMORIZE', W / 2, silhY - 98);
      } else if (choiceReveal) {
        // silhouette gone — "?" appears
        if (!answered) {
          var questionAlpha = Math.min(1, choiceAnim / 4);
          cx.save();
          cx.globalAlpha = questionAlpha * 0.4;
          cx.fillStyle = 'rgba(255,255,255,0.06)';
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(silhX - 90, silhY - 90, 180, 180, 16);
          else cx.rect(silhX - 90, silhY - 90, 180, 180);
          cx.fill();
          cx.globalAlpha = questionAlpha * 0.55;
          cx.fillStyle = '#fff';
          cx.font = '900 72px -apple-system, Helvetica, Arial';
          cx.fillText('?', silhX, silhY + 24);
          cx.restore();
        } else {
          // reveal the correct shape after answer
          var revealColor = answerResult.correct ? TEAL : VERM;
          cx.save();
          cx.globalAlpha = 0.7;
          cx.fillStyle = 'rgba(255,255,255,0.05)';
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(silhX - 90, silhY - 90, 180, 180, 16);
          else cx.rect(silhX - 90, silhY - 90, 180, 180);
          cx.fill();
          drawShape(currentShape, silhX, silhY, silhSize, revealColor);
          cx.restore();
        }

        // draw grid of choices
        var gridAnim = Math.min(1, choiceAnim / CHOICE_REVEAL_DUR);
        for (var i = 0; i < 6; i++) {
          // stagger each cell by i * 2 frames
          var cellA = Math.min(1, Math.max(0, (choiceAnim - i * 2) / 8));
          drawCell(i, cellA);
        }
      }
    }

    // ---- GAME OVER ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG ONE.', W / 2, 294);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' matched', W / 2, 340);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 386);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('sharper than ' + (100 - pt) + '% of players', W / 2, 410);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 290);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — GO AGAIN', W / 2, 458);
        cx.globalAlpha = 1;

        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.12)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- CTA (demo) ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SHADOW MATCH', W / 2, 296);
      cx.fillStyle = 'rgba(255,255,255,0.72)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they matched ' + (window.__demoScore || 11) + '. can you?', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 11), W / 2, 406);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
