<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var LAV = '#9d8cff', ROSE = '#e8a0b4';

  // ---- Taxonomy ----
  // Two binary traits:
  //   Trait A: ROUND (circle-family) vs ANGULAR (polygon-family)
  //   Trait B: HOLLOW (outlined) vs SOLID (filled)
  // Four types:
  //   I   = ROUND  + SOLID   — warm/enclosed
  //   II  = ROUND  + HOLLOW  — open/receptive
  //   III = ANGULAR + SOLID  — defined/stable
  //   IV  = ANGULAR + HOLLOW — precise/structured
  //
  // Difficulty increases: specimens 1-8 are clear, 9-16 are ambiguous,
  // 17-24 are edge cases (mixed signals, unusual proportions).

  var TYPE_NAMES = ['I', 'II', 'III', 'IV'];
  var TYPE_LABELS = ['Round · Solid', 'Round · Hollow', 'Angular · Solid', 'Angular · Hollow'];
  var TYPE_COLORS = [TEAL, LAV, GOLD, ROSE];

  // Each specimen: { type, difficulty } — difficulty 0=clear 1=moderate 2=edge
  function buildSpecimens() {
    var specs = [];
    // 6 of each type, mix of difficulties
    for (var t = 0; t < 4; t++) {
      for (var d = 0; d < 6; d++) {
        var difficulty = d < 2 ? 0 : d < 4 ? 1 : 2;
        specs.push({ type: t, difficulty: difficulty });
      }
    }
    // shuffle with seeded RNG but keep early specimens easier
    // Sort by difficulty first so early game is accessible
    specs.sort(function(a, b) {
      if (a.difficulty !== b.difficulty) return a.difficulty - b.difficulty;
      return rng() - 0.5;
    });
    // Within each difficulty band, shuffle
    function shuffleBand(arr, start, end) {
      for (var i = end - 1; i > start; i--) {
        var j = start + Math.floor(rng() * (i - start + 1));
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
    }
    shuffleBand(specs, 0, 7);
    shuffleBand(specs, 8, 15);
    shuffleBand(specs, 16, 23);
    // assign unique seed per specimen for shape variation
    for (var i = 0; i < specs.length; i++) {
      specs[i].shapeSeed = Math.floor(rng() * 10000);
      specs[i].idx = i;
    }
    return specs;
  }

  // ---- Bucket layout ----
  // 4 buckets arranged 2×2 in the bottom half
  var BUCKET_W = 88, BUCKET_H = 80;
  var BUCKETS = [
    { x: 60,  y: 530, type: 0 },
    { x: 157, y: 530, type: 1 },
    { x: 254, y: 530, type: 2 },
    { x: 351, y: 530, type: 3 },
  ];

  // ---- State ----
  var phase, specimens, specimenIdx, score, errors, runStartTs;
  var currentSpec, dragX, dragY, dragging, placedSpecs;
  var flashes, hitStop, zoom, shakeAmt;
  var ctaAt, ctaPhase, revealPhase, revealAt;
  var botRunsDone, botRunCount;
  var revealed; // which bucket types the player has seen (for key building)
  var keyVisible;

  function initGame() {
    rng = mulberry32(SEED);
    specimens = buildSpecimens();
    specimenIdx = 0;
    score = 0;
    errors = 0;
    runStartTs = Date.now();
    currentSpec = null;
    dragX = W / 2; dragY = 320;
    dragging = false;
    placedSpecs = [[], [], [], []]; // per-bucket placed specimens
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    ctaAt = 0; ctaPhase = false;
    revealPhase = false; revealAt = 0;
    revealed = [false, false, false, false];
    keyVisible = false;
    demoStarted = false; demoNextPlaceTime = 0; demoPlaceCount = 0;
    botNextActionTime = 0;
    phase = DEMO || BOT ? 'play' : 'intro';
    if (phase === 'play') {
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      nextSpecimen();
    }
  }

  function nextSpecimen() {
    if (specimenIdx >= specimens.length) {
      endGame();
      return;
    }
    currentSpec = specimens[specimenIdx];
    specimenIdx++;
    dragX = W / 2;
    dragY = 220;
    dragging = false;
  }

  function endGame() {
    currentSpec = null;
    phase = 'reveal';
    revealAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    window.__demoScore = score;
    // After reveal, show CTA (demo) or allow restart (bot/human)
    if (DEMO) {
      setTimeout(function () {
        ctaPhase = true;
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 3200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        setTimeout(function () { window.__botDone = true; }, 400);
      } else {
        setTimeout(function () { initGame(); }, 600);
      }
    }
  }

  function placeSpecimen(bucketIdx) {
    if (!currentSpec) return;
    var correct = currentSpec.type === BUCKETS[bucketIdx].type;
    var spec = currentSpec;
    var targetBucket = BUCKETS[bucketIdx];
    // Reveal this type in the key
    revealed[spec.type] = true;
    if (revealed[0] || revealed[1] || revealed[2] || revealed[3]) keyVisible = true;
    // Place into bucket
    placedSpecs[bucketIdx].push(spec);
    if (correct) {
      score++;
      hitStop = spec.difficulty === 2 ? 7 : 3;
      zoom = spec.difficulty === 2 ? 1.04 : 1.018;
      if (window.J) J.calm(score);
      if (spec.difficulty === 2) {
        flash('PRECISE', TEAL, 28);
        shakeAmt = 1;
      } else if (spec.difficulty === 1) {
        flash('SORTED', TEAL, 22);
      } else {
        flash('✓', TEAL, 20);
      }
      if (window.LOOP) LOOP.emit('specimen_sorted', { idx: spec.idx, type: spec.type, correct: true, difficulty: spec.difficulty });
    } else {
      errors++;
      shakeAmt = 3;
      flash('×', ROSE, 24);
      if (window.J) J.calm(1);
      if (window.LOOP) LOOP.emit('specimen_sorted', { idx: spec.idx, type: spec.type, correct: false, difficulty: spec.difficulty });
    }
    nextSpecimen();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size || 24, t: 0, x: dragX, y: dragY }); }

  // ---- Drawing specimens ----
  function drawSpecimen(spec, x, y, alpha, sz) {
    if (!spec) return;
    var srng = mulberry32(spec.shapeSeed);
    var type = spec.type; // 0=RoundSolid 1=RoundHollow 2=AngularSolid 3=AngularHollow
    var isRound = type === 0 || type === 1;
    var isHollow = type === 1 || type === 3;
    var diff = spec.difficulty;
    sz = sz || 32;
    cx.save();
    cx.globalAlpha = alpha !== undefined ? alpha : 1;
    cx.translate(x, y);

    var col = TYPE_COLORS[type];
    // Edge cases: slightly distorted to be ambiguous
    var wobble = diff === 2 ? (srng() * 0.22 + 0.1) : 0;

    if (isRound) {
      // Circle or slightly elliptical
      var rx = sz * (1 + wobble * (srng() - 0.5));
      var ry = sz * (1 + wobble * (srng() - 0.5));
      // For edge case, might look slightly polygon-ish
      if (diff === 2 && srng() > 0.5) {
        // softened polygon
        var sides = 5 + Math.floor(srng() * 3);
        cx.beginPath();
        for (var i = 0; i < sides; i++) {
          var ang = (i / sides) * Math.PI * 2 - Math.PI / 2;
          var r2 = sz * (0.85 + srng() * 0.18);
          if (i === 0) cx.moveTo(Math.cos(ang) * r2, Math.sin(ang) * r2);
          else cx.lineTo(Math.cos(ang) * r2, Math.sin(ang) * r2);
        }
        cx.closePath();
      } else {
        cx.beginPath();
        cx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
      }
    } else {
      // Polygon
      var sides = diff === 0 ? 4 : diff === 1 ? (3 + Math.floor(srng() * 2)) : (3 + Math.floor(srng() * 4));
      // Edge cases might be many-sided (approaching round)
      if (diff === 2 && srng() > 0.55) sides = 8 + Math.floor(srng() * 4);
      cx.beginPath();
      var rot = srng() * Math.PI;
      for (var i = 0; i < sides; i++) {
        var ang = (i / sides) * Math.PI * 2 + rot;
        var r3 = sz * (1 + (diff === 2 ? (srng() - 0.5) * 0.15 : 0));
        if (i === 0) cx.moveTo(Math.cos(ang) * r3, Math.sin(ang) * r3);
        else cx.lineTo(Math.cos(ang) * r3, Math.sin(ang) * r3);
      }
      cx.closePath();
    }

    if (isHollow) {
      cx.strokeStyle = col;
      cx.lineWidth = sz < 20 ? 2 : 3;
      cx.stroke();
      // Inner detail mark
      if (diff < 2) {
        cx.beginPath();
        cx.arc(0, 0, sz * 0.18, 0, Math.PI * 2);
        cx.strokeStyle = col;
        cx.lineWidth = 1.5;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.5;
        cx.stroke();
        cx.globalAlpha = alpha !== undefined ? alpha : 1;
      }
    } else {
      // Solid fill with subtle gradient
      var g = cx.createRadialGradient(-sz * 0.3, -sz * 0.3, 0, 0, 0, sz * 1.2);
      g.addColorStop(0, col + 'dd');
      g.addColorStop(1, col + '88');
      cx.fillStyle = g;
      cx.fill();
      // Inner highlight
      if (diff < 2) {
        cx.beginPath();
        cx.arc(-sz * 0.22, -sz * 0.22, sz * 0.18, 0, Math.PI * 2);
        cx.fillStyle = 'rgba(255,255,255,0.22)';
        cx.fill();
      }
    }

    cx.restore();
  }

  function drawBucket(b, isHover) {
    var x = b.x, y = b.y;
    var col = TYPE_COLORS[b.type];
    var placed = placedSpecs[BUCKETS.indexOf(b)] || [];
    cx.save();
    cx.translate(x, y);

    // Bucket outline
    var alpha = isHover ? 0.9 : 0.55;
    cx.strokeStyle = col;
    cx.lineWidth = isHover ? 2.5 : 1.8;
    cx.globalAlpha = alpha;
    cx.beginPath();
    // Trapezoid bucket shape
    cx.moveTo(-BUCKET_W/2 + 6, -BUCKET_H/2);
    cx.lineTo(BUCKET_W/2 - 6, -BUCKET_H/2);
    cx.lineTo(BUCKET_W/2, BUCKET_H/2);
    cx.lineTo(-BUCKET_W/2, BUCKET_H/2);
    cx.closePath();
    if (isHover) {
      cx.fillStyle = col + '22';
      cx.fill();
    }
    cx.stroke();

    // Count badge
    if (placed.length > 0) {
      cx.globalAlpha = 0.7;
      cx.fillStyle = col;
      cx.font = '700 11px Menlo, monospace';
      cx.textAlign = 'center';
      cx.fillText(placed.length, 0, BUCKET_H/2 - 6);
    }

    cx.globalAlpha = 1;
    cx.restore();

    // Type label under bucket
    cx.save();
    cx.textAlign = 'center';
    cx.fillStyle = col;
    cx.globalAlpha = 0.7;
    cx.font = '700 10px Menlo, monospace';
    cx.fillText('TYPE ' + TYPE_NAMES[b.type], x, y + BUCKET_H/2 + 14);
    cx.globalAlpha = 1;
    cx.restore();

    // Mini specimens in bucket (up to 4 visible as tiny shapes)
    var mini = Math.min(placed.length, 6);
    for (var i = 0; i < mini; i++) {
      var col2 = Math.floor(i / 3);
      var row2 = i % 3;
      var mx = x - BUCKET_W/2 + 14 + row2 * 24;
      var my = y - BUCKET_H/2 + 16 + col2 * 26;
      drawSpecimen(placed[i], mx, my, 0.65, 9);
    }
  }

  // ---- Key panel ----
  function drawKey() {
    if (!keyVisible) return;
    // Show discovered types only
    var known = 0;
    for (var t = 0; t < 4; t++) if (revealed[t]) known++;
    if (known === 0) return;

    var kx = 12, ky = 430;
    cx.save();
    cx.globalAlpha = 0.82;
    cx.fillStyle = 'rgba(11,13,18,0.7)';
    cx.strokeStyle = 'rgba(255,255,255,0.08)';
    cx.lineWidth = 1;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(kx, ky, 180, 10 + known * 26, 8);
    else cx.rect(kx, ky, 180, 10 + known * 26);
    cx.fill(); cx.stroke();

    var row = 0;
    for (var t = 0; t < 4; t++) {
      if (!revealed[t]) continue;
      var ey = ky + 18 + row * 26;
      // mini example
      drawSpecimen({ type: t, difficulty: 0, shapeSeed: t * 999 + 7 }, kx + 16, ey, 0.9, 10);
      cx.fillStyle = TYPE_COLORS[t];
      cx.font = '600 10px Menlo, monospace';
      cx.textAlign = 'left';
      cx.fillText('TYPE ' + TYPE_NAMES[t] + '  ' + TYPE_LABELS[t], kx + 30, ey + 4);
      row++;
    }
    cx.globalAlpha = 1;
    cx.restore();
  }

  // ---- Progress bar ----
  function drawProgress() {
    var total = specimens.length;
    var done = specimenIdx - (currentSpec ? 1 : 0);
    var frac = done / total;
    var bx = 20, by = 36, bw = W - 40, bh = 4;
    cx.save();
    cx.fillStyle = 'rgba(255,255,255,0.1)';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(bx, by, bw, bh, 2); else cx.rect(bx, by, bw, bh);
    cx.fill();
    if (frac > 0) {
      var g = cx.createLinearGradient(bx, 0, bx + bw, 0);
      g.addColorStop(0, TEAL); g.addColorStop(1, LAV);
      cx.fillStyle = g;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(bx, by, bw * frac, bh, 2); else cx.rect(bx, by, bw * frac, bh);
      cx.fill();
    }
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 11px Menlo, monospace';
    cx.textAlign = 'right';
    cx.fillText(done + '/' + total, W - 20, by - 4);
    cx.restore();
  }

  // ---- Reveal screen ----
  function drawReveal(now) {
    var elapsed = (now - revealAt) / 1000;
    var ease = Math.min(1, elapsed * 1.8);
    cx.fillStyle = INK; cx.fillRect(0, 0, W, H);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)');
    bg.addColorStop(1, 'rgba(157,140,255,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '800 28px -apple-system, Helvetica, Arial';
    cx.fillText('TAXONOMY COMPLETE', W / 2, 72);

    // Score
    var acc = Math.round((score / specimens.length) * 100);
    cx.fillStyle = TEAL;
    cx.font = '900 72px -apple-system, Helvetica, Arial';
    cx.fillText(score, W / 2, 148);
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '600 14px Menlo, monospace';
    cx.fillText(acc + '% accurate · ' + specimens.length + ' specimens', W / 2, 172);

    // Full taxonomy display — the completion-satisfaction moment
    var gridY = 200;
    for (var t = 0; t < 4; t++) {
      var bx = (t % 2) * 190 + 20;
      var by = gridY + Math.floor(t / 2) * 200;

      cx.fillStyle = 'rgba(255,255,255,0.06)';
      cx.strokeStyle = TYPE_COLORS[t];
      cx.lineWidth = 1.5;
      cx.globalAlpha = ease * 0.8;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(bx, by, 170, 180, 10); else cx.rect(bx, by, 170, 180);
      cx.fill(); cx.stroke();

      cx.globalAlpha = ease;
      cx.fillStyle = TYPE_COLORS[t];
      cx.font = '800 13px Menlo, monospace';
      cx.textAlign = 'center';
      cx.fillText('TYPE ' + TYPE_NAMES[t], bx + 85, by + 20);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 10px Menlo, monospace';
      cx.fillText(TYPE_LABELS[t], bx + 85, by + 34);

      // Show all specimens from this type (sorted correctly)
      var allOfType = specimens.filter(function(s) { return s.type === t; });
      for (var si = 0; si < Math.min(allOfType.length, 6); si++) {
        var sx = bx + 18 + (si % 3) * 48;
        var sy = by + 70 + Math.floor(si / 3) * 52;
        var delay = t * 0.15 + si * 0.05;
        var sa = Math.min(1, Math.max(0, (elapsed - delay) * 3));
        drawSpecimen(allOfType[si], sx, sy, ease * sa, 16);
      }
    }

    cx.globalAlpha = 1;

    if (!DEMO && !BOT && elapsed > 1.5) {
      var p = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = p * ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText('TAP TO SORT AGAIN', W / 2, H - 30);
      cx.globalAlpha = 1;
    }
  }

  // ---- Input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 110, y: 626, w: 220, h: 38 };
  function inR(r, px, py) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }

  function bucketAt(px, py) {
    for (var i = 0; i < BUCKETS.length; i++) {
      var b = BUCKETS[i];
      if (px >= b.x - BUCKET_W/2 - 10 && px <= b.x + BUCKET_W/2 + 10 &&
          py >= b.y - BUCKET_H/2 - 10 && py <= b.y + BUCKET_H/2 + 10) return i;
    }
    return -1;
  }

  var pointerDown = false, pointerStartX = 0, pointerStartY = 0;

  function onPointerDown(px, py) {
    if (DEMO || BOT) return;
    if (inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'intro') {
      phase = 'play';
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      nextSpecimen();
      return;
    }
    if (phase === 'reveal' && !ctaPhase) {
      var elapsed = (performance.now() - revealAt) / 1000;
      if (elapsed > 1.5) {
        if (inR(SHARE_R, px, py) && window.SHARE) {
          SHARE.send({ score: score, unit: 'sorted' }); return;
        }
        // restart
        initGame();
        return;
      }
      return;
    }
    if (phase === 'play' && currentSpec) {
      pointerDown = true;
      pointerStartX = px; pointerStartY = py;
      dragX = px; dragY = py;
      dragging = true;
    }
  }

  function onPointerMove(px, py) {
    if (DEMO || BOT || !dragging) return;
    dragX = px; dragY = py;
  }

  function onPointerUp(px, py) {
    if (DEMO || BOT || !dragging) return;
    dragging = false;
    pointerDown = false;
    if (!currentSpec) return;
    var bi = bucketAt(px, py);
    if (bi >= 0) {
      placeSpecimen(bi);
    } else {
      // snap back
      dragX = W / 2; dragY = 220;
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    onPointerDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    var r = cv.getBoundingClientRect();
    onPointerMove((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointerup', function (e) {
    var r = cv.getBoundingClientRect();
    onPointerUp((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    // keyboard: 1-4 keys sort into buckets
    var keys = { '1': 0, '2': 1, '3': 2, '4': 3 };
    if (keys[e.key] !== undefined && phase === 'play' && currentSpec) {
      var bi = keys[e.key];
      dragX = BUCKETS[bi].x; dragY = BUCKETS[bi].y;
      placeSpecimen(bi);
    }
    if (e.code === 'Space' && phase === 'intro') {
      phase = 'play';
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      nextSpecimen();
    }
  });

  // ---- Demo / bot autopilot ----
  // Demo: time-based continuous placements. Settle phase is slow/deliberate,
  // deepen phase picks up, resolve phase completes all 24 — then endGame → CTA.
  var demoStarted = false;
  var demoRunTs = 0;
  var demoNextPlaceTime = 0; // absolute timestamp for next placement

  // Per-specimen demo wait (ms). 24 entries covering the full run.
  // Calm arc: slow hesitation early → rhythmic confidence → crisp resolve.
  var DEMO_WAITS = [
    1500, 1350, 1200, 1100, 1000, 950, 900,   // settle (0-6)
    820, 760, 700, 650, 620,                    // deepen (7-11)
    580, 540, 510, 480, 450, 430,               // deepen more (12-17)
    400, 380, 360, 340, 320, 300                // resolve (18-23)
  ];
  var demoPlaceCount = 0;  // how many specimens placed in this demo run

  var botNextActionTime = 0;

  function autopilot() {
    if (DEMO && !ctaPhase && phase === 'play') {
      if (!demoStarted) {
        demoStarted = true;
        demoRunTs = performance.now();
        demoNextPlaceTime = demoRunTs + DEMO_WAITS[0];
        demoPlaceCount = 0;
      }
      var now2 = performance.now();
      if (currentSpec && now2 >= demoNextPlaceTime) {
        // Place into correct bucket (demo shows the satisfying correct sort)
        var correctBucket = -1;
        for (var b = 0; b < BUCKETS.length; b++) {
          if (BUCKETS[b].type === currentSpec.type) { correctBucket = b; break; }
        }
        if (correctBucket >= 0) {
          dragX = BUCKETS[correctBucket].x;
          dragY = BUCKETS[correctBucket].y - 10;
          placeSpecimen(correctBucket);
          var wait = DEMO_WAITS[Math.min(demoPlaceCount, DEMO_WAITS.length - 1)];
          demoPlaceCount++;
          demoNextPlaceTime = performance.now() + wait;
        }
      }
      // After all 24 placed, endGame() was already called by placeSpecimen→nextSpecimen chain
    }
    if (BOT && phase === 'play' && currentSpec) {
      var now2 = performance.now();
      if (botNextActionTime === 0) botNextActionTime = now2 + 250 + rng() * 350;
      if (now2 >= botNextActionTime) {
        botNextActionTime = 0;
        // Bot is imperfect: occasionally places wrong (~15% error rate)
        var err = rng() < 0.15;
        var chosenBucket;
        if (err) {
          var wrongBuckets = [];
          for (var b = 0; b < BUCKETS.length; b++) {
            if (BUCKETS[b].type !== currentSpec.type) wrongBuckets.push(b);
          }
          chosenBucket = wrongBuckets[Math.floor(rng() * wrongBuckets.length)];
        } else {
          for (var b = 0; b < BUCKETS.length; b++) {
            if (BUCKETS[b].type === currentSpec.type) { chosenBucket = b; break; }
          }
        }
        dragX = BUCKETS[chosenBucket].x;
        dragY = BUCKETS[chosenBucket].y;
        placeSpecimen(chosenBucket);
      }
    }
  }

  // ---- Render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Decay juice
    if (hitStop > 0) hitStop -= dt;
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.13 * dt;

    // Run autopilot only when sim is not frozen
    if (hitStop <= 0) autopilot();

    // Draw
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.002) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(0.6, 'rgba(157,140,255,0.04)');
    bg.addColorStop(1, 'rgba(232,160,180,0.04)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    if (phase === 'intro') {
      drawIntro(now);
    } else if (phase === 'play') {
      drawPlay(now);
    } else if (phase === 'reveal') {
      drawReveal(now);
    }

    // Demo CTA
    if (ctaPhase) {
      var elapsed = (now - ctaAt) / 1000;
      var ease = Math.min(1, elapsed * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('TYPE SORT', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore || score) + ' of 24 — build yours', W / 2, 330);
      var p = 0.72 + 0.28 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p;
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶  REACH IT', W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = LAV;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // Mute (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawIntro(now) {
    cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '900 42px -apple-system, Helvetica, Arial';
    cx.fillText('TYPE SORT', W / 2, 240);
    cx.fillStyle = TEAL;
    cx.font = '600 15px -apple-system, Helvetica, Arial';
    cx.fillText('24 specimens. four types.', W / 2, 278);
    cx.fillText('drag each into the right bucket.', W / 2, 298);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('the key builds as you go.', W / 2, 322);

    // show all 4 type examples
    var ex = [
      { type: 0, x: 80,  y: 420 },
      { type: 1, x: 160, y: 420 },
      { type: 2, x: 245, y: 420 },
      { type: 3, x: 325, y: 420 },
    ];
    for (var i = 0; i < ex.length; i++) {
      drawSpecimen({ type: ex[i].type, difficulty: 0, shapeSeed: ex[i].type * 333 + 1 }, ex[i].x, ex[i].y, 0.7, 22);
      cx.fillStyle = TYPE_COLORS[ex[i].type];
      cx.font = '700 10px Menlo, monospace';
      cx.textAlign = 'center';
      cx.fillText('TYPE ' + TYPE_NAMES[ex[i].type], ex[i].x, ex[i].y + 34);
    }

    var pulse = 0.6 + 0.4 * Math.sin(now / 300);
    cx.globalAlpha = pulse;
    cx.fillStyle = TEAL;
    cx.font = '700 17px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText('TAP TO BEGIN', W / 2, 580);
    cx.globalAlpha = 1;
  }

  function drawPlay(now) {
    // Progress bar
    drawProgress();

    // Header score
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 52px -apple-system, Helvetica, Arial';
    cx.fillText(score, W / 2, 90);
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '600 11px Menlo, monospace';
    cx.fillText('SORTED', W / 2, 108);

    // Current specimen — the piece to sort
    if (currentSpec) {
      var sz = 38;
      // Label prompt
      var diffLabel = currentSpec.difficulty === 2 ? 'EDGE CASE' : currentSpec.difficulty === 1 ? 'OBSERVE' : '';
      if (diffLabel) {
        cx.fillStyle = GOLD;
        cx.font = '700 11px Menlo, monospace';
        cx.textAlign = 'center';
        cx.fillText(diffLabel, W / 2, 148);
      }

      // Instruction arrow when not dragging
      if (!dragging) {
        cx.globalAlpha = 0.35 + 0.25 * Math.sin(now / 500);
        cx.fillStyle = TEAL;
        cx.font = '600 12px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText('drag to bucket ↓', W / 2, 175);
        cx.globalAlpha = 1;
      }

      // Glow under specimen when dragging near a bucket
      var hovBucket = dragging ? bucketAt(dragX, dragY) : -1;
      if (hovBucket >= 0) {
        var hb = BUCKETS[hovBucket];
        var gr = cx.createRadialGradient(hb.x, hb.y, 0, hb.x, hb.y, 60);
        gr.addColorStop(0, TYPE_COLORS[hb.type] + '44');
        gr.addColorStop(1, 'transparent');
        cx.fillStyle = gr;
        cx.fillRect(hb.x - 80, hb.y - 80, 160, 160);
      }

      // Draw specimen at drag position
      var specX = dragging ? dragX : W / 2;
      var specY = dragging ? dragY : 220;
      if (dragging) {
        // Drop shadow
        cx.save();
        cx.shadowColor = TYPE_COLORS[currentSpec.type];
        cx.shadowBlur = 18;
        drawSpecimen(currentSpec, specX, specY, 1.0, sz);
        cx.restore();
      } else {
        // Gentle bob
        var bob = Math.sin(now / 700) * 4;
        drawSpecimen(currentSpec, specX, specY + bob, 1.0, sz);
      }
    } else if (phase === 'play') {
      // All placed, transitioning
      cx.fillStyle = TEAL;
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText('taxonomy complete', W / 2, 220);
    }

    // Divider line
    cx.strokeStyle = 'rgba(255,255,255,0.07)';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(20, 410); cx.lineTo(W - 20, 410);
    cx.stroke();

    // Buckets
    var hovBucket2 = dragging ? bucketAt(dragX, dragY) : -1;
    for (var i = 0; i < BUCKETS.length; i++) {
      drawBucket(BUCKETS[i], i === hovBucket2);
    }

    // Key panel
    drawKey();

    // Floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += 1;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x || W / 2, (fl.y || 200) - fl.t * 1.4);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }
  }

  // ---- Init tracking vars ----
  botRunsDone = 0;

  // ---- Init ----
  initGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
