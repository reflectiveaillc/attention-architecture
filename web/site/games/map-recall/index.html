<meta charset="UTF-8">

<title>Map Recall — Tilt</title>
<!--
  LOOP / attention-architecture — Map Recall
  Circuits: 01-rpe (distance-based scoring), 06-zeigarnik (one more try), 03-social (rank share)
  Mechanic: memorise 5 map spots → fade → drag pins to recalled positions → scored by error
  Modes:
    ?demo=1&seed=7   scripted mirror-neuron arc, sets window.__demoDone
    ?bot=1&runs=N&seed=5  imperfect autoplay, sets window.__botDone

<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'map-recall';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // Map area (canvas coords)
  var MAP = { x: 30, y: 160, w: 345, h: 340 };

  // ---- map landmark shapes (drawn with canvas, no external resources) ----
  function drawMap(cx, alpha) {
    cx.save();
    cx.globalAlpha = (alpha === undefined ? 1 : alpha);

    // ocean fill
    cx.fillStyle = '#1a3a5c';
    cx.fillRect(MAP.x, MAP.y, MAP.w, MAP.h);

    // fake continent outlines
    cx.fillStyle = '#3a6b3e';
    // main landmass
    cx.beginPath();
    cx.moveTo(MAP.x + 40,  MAP.y + 60);
    cx.lineTo(MAP.x + 180, MAP.y + 30);
    cx.lineTo(MAP.x + 290, MAP.y + 80);
    cx.lineTo(MAP.x + 310, MAP.y + 180);
    cx.lineTo(MAP.x + 260, MAP.y + 250);
    cx.lineTo(MAP.x + 140, MAP.y + 280);
    cx.lineTo(MAP.x + 60,  MAP.y + 220);
    cx.lineTo(MAP.x + 20,  MAP.y + 130);
    cx.closePath();
    cx.fill();

    // small island
    cx.beginPath();
    cx.ellipse(MAP.x + 280, MAP.y + 290, 38, 24, 0.3, 0, Math.PI * 2);
    cx.fill();

    // peninsula
    cx.beginPath();
    cx.moveTo(MAP.x + 60,  MAP.y + 220);
    cx.lineTo(MAP.x + 90,  MAP.y + 310);
    cx.lineTo(MAP.x + 40,  MAP.y + 300);
    cx.closePath();
    cx.fill();

    // grid lines (faint)
    cx.strokeStyle = 'rgba(255,255,255,0.08)';
    cx.lineWidth = 1;
    for (var gx = MAP.x; gx <= MAP.x + MAP.w; gx += 57) {
      cx.beginPath(); cx.moveTo(gx, MAP.y); cx.lineTo(gx, MAP.y + MAP.h); cx.stroke();
    }
    for (var gy = MAP.y; gy <= MAP.y + MAP.h; gy += 57) {
      cx.beginPath(); cx.moveTo(MAP.x, gy); cx.lineTo(MAP.x + MAP.w, gy); cx.stroke();
    }

    // border
    cx.strokeStyle = 'rgba(255,255,255,0.2)';
    cx.lineWidth = 1.5;
    cx.strokeRect(MAP.x, MAP.y, MAP.w, MAP.h);

    cx.restore();
  }

  // ---- generate 5 spots seeded ----
  function genSpots() {
    var spots = [];
    // ensure minimum spacing
    var tries = 0;
    while (spots.length < 5 && tries < 200) {
      tries++;
      var sx = MAP.x + 18 + rng() * (MAP.w - 36);
      var sy = MAP.y + 18 + rng() * (MAP.h - 36);
      var ok = true;
      for (var j = 0; j < spots.length; j++) {
        var dx = spots[j].x - sx, dy = spots[j].y - sy;
        if (Math.sqrt(dx*dx + dy*dy) < 60) { ok = false; break; }
      }
      if (ok) spots.push({ x: sx, y: sy });
    }
    return spots;
  }

  var labels = ['A','B','C','D','E'];

  // ---- state ----
  var phase, spots, pins, dragging, runStartTs, dareBeaten;
  var flashes, hitStop, zoom, shakeAmt;
  var memoriseTimer, roundScore, best, totalError;
  var botRunsDone = 0, demoPhaseIdx = 0;
  var overAt = 0, ctaAt = 0, challengeAt = 0;

  try { best = +localStorage.getItem('mr_best') || 0; } catch(_) {}

  function newGame() {
    spots = genSpots();
    pins = spots.map(function(s) { return { x: s.x + (rng()-0.5)*80, y: s.y + (rng()-0.5)*80, dragging: false, placed: false }; });
    // clamp pins to map
    pins.forEach(function(p) {
      p.x = Math.max(MAP.x + 8, Math.min(MAP.x + MAP.w - 8, p.x));
      p.y = Math.max(MAP.y + 8, Math.min(MAP.y + MAP.h - 8, p.y));
      p.placed = false;
    });
    dragging = -1;
    flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    dareBeaten = false; totalError = 0;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startMemorisePhase, 1250);
      return;
    }
    if (BOT) {
      phase = 'memorise';
      memoriseTimer = 5;
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    phase = 'title';
  }

  function startMemorisePhase() {
    phase = 'memorise';
    memoriseTimer = 5;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function startRecallPhase() {
    phase = 'recall';
    // scatter pins randomly across map for player to drag
    for (var i = 0; i < pins.length; i++) {
      pins[i].x = MAP.x + 18 + rng() * (MAP.w - 36);
      pins[i].y = MAP.y + 18 + rng() * (MAP.h - 36);
      pins[i].placed = false;
    }
  }

  function scoreRound() {
    // total error = sum of distances from pin to original spot
    var err = 0;
    for (var i = 0; i < spots.length; i++) {
      var dx = pins[i].x - spots[i].x;
      var dy = pins[i].y - spots[i].y;
      err += Math.sqrt(dx*dx + dy*dy);
    }
    totalError = Math.round(err);
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = (best === 0 || totalError < best);
    if (newBest) {
      best = totalError;
      try { localStorage.setItem('mr_best', String(best)); } catch(_) {}
      if (window.J) setTimeout(function() { J.fanfare(); }, 400);
    }

    // sounds
    if (window.J) {
      J.death(Math.min(0.2 + totalError / 400, 1));
    }
    shakeAmt = totalError < 80 ? 4 : 8;

    if (DEMO) window.__demoScore = totalError;

    if (window.LOOP) LOOP.emit('game_over', { score: totalError, dur_s: +dur.toFixed(1) });

    overAt = performance.now();
    phase = 'over';

    if (DEMO) {
      setTimeout(function() {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function() { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function() { resetRun(); }, 900);
      }
    }
  }

  function resetRun() {
    rng = mulberry32(SEED + botRunsDone * 17);
    spots = genSpots();
    pins = spots.map(function(s) { return { x: s.x, y: s.y, dragging: false, placed: false }; });
    flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    dareBeaten = false; totalError = 0; dragging = -1;
    if (window.LOOP) LOOP.emit('restart', {});
    phase = 'memorise';
    memoriseTimer = 5;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED + botRunsDone * 17 });
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  function pctTop(err) {
    // Lower error is better; rank as top X% based on error
    return Math.max(1, Math.min(99, Math.round(100 * (1 - Math.exp(-err / 60)))));
  }

  // ---- input zones ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W/2 - 125, y: 486, w: 250, h: 46 };
  var SUBMIT_R = { x: W/2 - 100, y: MAP.y + MAP.h + 20, w: 200, h: 44 };

  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function pointerDown(px, py) {
    if (DEMO || BOT) return;
    if (window.J && inR(MUTE_R, px, py)) { J.toggleMute(); return; }

    if (phase === 'title') { startMemorisePhase(); return; }

    if (phase === 'recall') {
      // check submit button
      if (inR(SUBMIT_R, px, py)) { scoreRound(); return; }
      // find closest pin to drag
      var best_d = 28, best_i = -1;
      for (var i = 0; i < pins.length; i++) {
        var dx = pins[i].x - px, dy = pins[i].y - py;
        var d = Math.sqrt(dx*dx + dy*dy);
        if (d < best_d) { best_d = d; best_i = i; }
      }
      if (best_i >= 0) dragging = best_i;
      return;
    }

    if (phase === 'over' && performance.now() - overAt > 350) {
      if (inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: totalError, unit: 'error pts' }); return;
      }
      // restart
      rng = mulberry32(SEED + Math.round(performance.now()) % 1000);
      spots = genSpots();
      pins = spots.map(function(s) { return { x: s.x + (rng()-0.5)*80, y: s.y + (rng()-0.5)*80, dragging: false, placed: false }; });
      pins.forEach(function(p) {
        p.x = Math.max(MAP.x + 8, Math.min(MAP.x + MAP.w - 8, p.x));
        p.y = Math.max(MAP.y + 8, Math.min(MAP.y + MAP.h - 8, p.y));
      });
      flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false; totalError = 0; dragging = -1;
      if (window.LOOP) LOOP.emit('restart', {});
      startMemorisePhase();
    }
  }

  function pointerMove(px, py) {
    if (DEMO || BOT) return;
    if (dragging >= 0 && phase === 'recall') {
      pins[dragging].x = Math.max(MAP.x + 4, Math.min(MAP.x + MAP.w - 4, px));
      pins[dragging].y = Math.max(MAP.y + 4, Math.min(MAP.y + MAP.h - 4, py));
    }
  }

  function pointerUp() {
    if (DEMO || BOT) return;
    if (dragging >= 0) {
      pins[dragging].placed = true;
      // sound: check distance
      var dx = pins[dragging].x - spots[dragging].x;
      var dy = pins[dragging].y - spots[dragging].y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (window.J) {
        if (dist < 15) { J.perfect(1); hitStop = 3; zoom = 1.03; flash('PERFECT', TEAL, 38); }
        else if (dist < 35) { J.hit(1); flash('CLOSE!', GOLD, 32); }
        else if (dist < 60) { J.near(); flash('SO CLOSE', VERM, 28); if (window.LOOP) LOOP.emit('near_miss', { dist: Math.round(dist) }); }
      }
      dragging = -1;
    }
  }

  // map pointer events
  cv.addEventListener('pointerdown', function(e) {
    var r = cv.getBoundingClientRect();
    pointerDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  cv.addEventListener('pointermove', function(e) {
    var r = cv.getBoundingClientRect();
    pointerMove((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  cv.addEventListener('pointerup', pointerUp);
  cv.addEventListener('pointercancel', pointerUp);
  window.addEventListener('keydown', function(e) { if (e.code === 'Space' && phase === 'recall') scoreRound(); });

  // ---- DEMO autopilot ----
  // arc: challenge card → memorise (watch map) → recall with hesitation + near-fail → score over → cta
  var demoState = 'idle';
  var demoPinIdx = 0;
  var demoMoveTimer = 0;
  // offsets per pin: how far off the true position the demo "places" the pin
  var demoErrors = [28, -38, 18, -45, 22, -20, 35, -12]; // (x,y) pairs
  var demoHesitation = [60, 80, 45, 100, 55]; // frames before moving each pin

  function runDemoAutopilot(dt) {
    if (!DEMO) return;
    if (phase === 'memorise') {
      // just watch — countdown handles transition
      return;
    }
    if (phase === 'recall') {
      if (demoState === 'idle') { demoState = 'hesitating'; demoMoveTimer = demoHesitation[0] || 60; demoPinIdx = 0; }
      if (demoState === 'hesitating') {
        demoMoveTimer -= dt;
        if (demoMoveTimer <= 0) {
          // snap pin to nearly-correct position
          if (demoPinIdx < pins.length) {
            var ex = demoErrors[(demoPinIdx * 2) % demoErrors.length] || 20;
            var ey = demoErrors[(demoPinIdx * 2 + 1) % demoErrors.length] || -20;
            // near-fail recovery at ~60% (pin 3): place very wrong, then quickly correct
            if (demoPinIdx === 2) {
              // first place badly
              pins[demoPinIdx].x = Math.max(MAP.x + 4, Math.min(MAP.x + MAP.w - 4, spots[demoPinIdx].x + 80));
              pins[demoPinIdx].y = Math.max(MAP.y + 4, Math.min(MAP.y + MAP.h - 4, spots[demoPinIdx].y + 60));
              // then "correct" quickly
              demoState = 'correcting';
              demoMoveTimer = 25;
              return;
            }
            pins[demoPinIdx].x = Math.max(MAP.x + 4, Math.min(MAP.x + MAP.w - 4, spots[demoPinIdx].x + ex));
            pins[demoPinIdx].y = Math.max(MAP.y + 4, Math.min(MAP.y + MAP.h - 4, spots[demoPinIdx].y + ey));
            pins[demoPinIdx].placed = true;
            demoPinIdx++;
            if (demoPinIdx >= pins.length) {
              // submit after brief pause
              demoState = 'submitting';
              demoMoveTimer = 50;
            } else {
              demoState = 'hesitating';
              demoMoveTimer = demoHesitation[Math.min(demoPinIdx, demoHesitation.length - 1)] || 50;
            }
          }
        }
        return;
      }
      if (demoState === 'correcting') {
        demoMoveTimer -= dt;
        if (demoMoveTimer <= 0) {
          // move pin 2 closer to correct (recovery moment)
          var ex2 = demoErrors[(demoPinIdx * 2) % demoErrors.length] || 20;
          var ey2 = demoErrors[(demoPinIdx * 2 + 1) % demoErrors.length] || -15;
          pins[demoPinIdx].x = Math.max(MAP.x + 4, Math.min(MAP.x + MAP.w - 4, spots[demoPinIdx].x + ex2));
          pins[demoPinIdx].y = Math.max(MAP.y + 4, Math.min(MAP.y + MAP.h - 4, spots[demoPinIdx].y + ey2));
          pins[demoPinIdx].placed = true;
          demoPinIdx++;
          demoState = 'hesitating';
          demoMoveTimer = demoHesitation[Math.min(demoPinIdx, demoHesitation.length - 1)] || 50;
          if (window.J) J.near();
          flash('CLOSE!', GOLD, 30);
        }
        return;
      }
      if (demoState === 'submitting') {
        demoMoveTimer -= dt;
        if (demoMoveTimer <= 0) {
          demoState = 'done';
          scoreRound();
        }
        return;
      }
    }
  }

  // ---- BOT autopilot ----
  var botState = 'idle', botPinIdx = 0, botMoveTimer = 0;

  function runBotAutopilot(dt) {
    if (!BOT) return;
    if (phase !== 'recall') return;
    if (botState === 'idle') { botState = 'placing'; botPinIdx = 0; botMoveTimer = 20; }
    if (botState === 'placing') {
      botMoveTimer -= dt;
      if (botMoveTimer <= 0 && botPinIdx < pins.length) {
        // imperfect: random error
        var errX = (rng() - 0.5) * 120;
        var errY = (rng() - 0.5) * 120;
        pins[botPinIdx].x = Math.max(MAP.x + 4, Math.min(MAP.x + MAP.w - 4, spots[botPinIdx].x + errX));
        pins[botPinIdx].y = Math.max(MAP.y + 4, Math.min(MAP.y + MAP.h - 4, spots[botPinIdx].y + errY));
        pins[botPinIdx].placed = true;
        botPinIdx++;
        botMoveTimer = 18;
        if (botPinIdx >= pins.length) {
          botState = 'submitting';
          botMoveTimer = 30;
        }
      } else if (botMoveTimer <= 0 && botPinIdx >= pins.length) {
        botState = 'submitting';
        botMoveTimer = 30;
      }
      return;
    }
    if (botState === 'submitting') {
      botMoveTimer -= dt;
      if (botMoveTimer <= 0) {
        botState = 'idle';
        botPinIdx = 0;
        scoreRound();
      }
    }
  }

  // ---- render ----
  function drawPin(x, y, label, color, alpha, pulse) {
    cx.save();
    cx.globalAlpha = alpha === undefined ? 1 : alpha;
    var r = 14;
    if (pulse) {
      var sc = 1 + 0.08 * Math.sin(performance.now() / 120);
      cx.translate(x, y); cx.scale(sc, sc); cx.translate(-x, -y);
    }
    // pin body
    cx.fillStyle = color || VERM;
    cx.beginPath();
    cx.arc(x, y - r, r, 0, Math.PI * 2);
    cx.fill();
    // pin stem
    cx.beginPath();
    cx.moveTo(x - 4, y - r + 2);
    cx.lineTo(x, y + 2);
    cx.lineTo(x + 4, y - r + 2);
    cx.fillStyle = color || VERM;
    cx.fill();
    // label
    cx.fillStyle = '#fff';
    cx.font = '900 11px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(label, x, y - r + 4);
    cx.restore();
  }

  function drawOriginalSpot(x, y, label) {
    cx.save();
    cx.globalAlpha = 0.85;
    cx.strokeStyle = GOLD;
    cx.lineWidth = 2;
    cx.beginPath();
    cx.arc(x, y, 10, 0, Math.PI * 2);
    cx.stroke();
    cx.fillStyle = GOLD;
    cx.font = '800 10px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(label, x, y + 3.5);
    cx.restore();
  }

  function drawErrorLine(pin, spot, label) {
    var dx = pin.x - spot.x, dy = pin.y - spot.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var color = dist < 20 ? TEAL : dist < 50 ? GOLD : VERM;
    cx.save();
    cx.strokeStyle = color;
    cx.lineWidth = 1.5;
    cx.setLineDash([4, 4]);
    cx.globalAlpha = 0.6;
    cx.beginPath();
    cx.moveTo(spot.x, spot.y);
    cx.lineTo(pin.x, pin.y);
    cx.stroke();
    cx.restore();
  }

  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // countdown memorise timer
    if (phase === 'memorise') {
      memoriseTimer -= dt / 60;
      if (memoriseTimer <= 0) {
        memoriseTimer = 0;
        // transition to recall
        if (DEMO) demoState = 'idle';
        if (BOT) { botState = 'idle'; botPinIdx = 0; botMoveTimer = 20; }
        startRecallPhase();
      }
    }

    // juice: decay hitStop and shake
    if (hitStop > 0) hitStop -= dt;
    else {
      runDemoAutopilot(dt);
      runBotAutopilot(dt);
    }

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W/2 + sx, H/2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W/2, -H/2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('MAP RECALL', W/2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('memorise the spots. drag the pins.', W/2, 300);
      cx.fillStyle = GOLD;
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText('lower error = better score', W/2, 326);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W/2, 380);
      cx.globalAlpha = 1;
      // draw preview map
      drawMap(cx, 0.4);
    }

    // ---- CHALLENGE CARD (demo) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('47', W/2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('total error pts — lower is better', W/2, 434);
    }

    // ---- MEMORISE ----
    if (phase === 'memorise') {
      // heading
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 20px -apple-system, Helvetica, Arial';
      cx.fillText('MEMORISE THE SPOTS', W/2, 138);

      // countdown ring
      var pct = Math.max(0, memoriseTimer / 5);
      cx.strokeStyle = 'rgba(255,255,255,0.12)';
      cx.lineWidth = 4;
      cx.beginPath(); cx.arc(W/2, 138 - 24, 18, -Math.PI/2, Math.PI * 2 * pct - Math.PI/2); cx.stroke();
      cx.strokeStyle = GOLD; cx.lineWidth = 4;
      cx.beginPath(); cx.arc(W/2, 138 - 24, 18, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * pct); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 14px Menlo, monospace';
      cx.fillText(Math.ceil(Math.max(0, memoriseTimer)), W/2, 120);

      // draw map with spots
      drawMap(cx);
      for (var i = 0; i < spots.length; i++) {
        drawPin(spots[i].x, spots[i].y, labels[i], TEAL, 1, false);
      }

      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('remember where A B C D E are', W/2, MAP.y + MAP.h + 22);
    }

    // ---- RECALL ----
    if (phase === 'recall') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 18px -apple-system, Helvetica, Arial';
      cx.fillText('PLACE THE PINS', W/2, 138);

      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 13px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + ' error pts', W/2, 158);
      }

      // map (no spots shown)
      drawMap(cx);

      // draw pins
      for (var i = 0; i < pins.length; i++) {
        var isD = (i === dragging);
        drawPin(pins[i].x, pins[i].y, labels[i], VERM, 1, isD);
      }

      // submit button
      var allPlaced = pins.every(function(p) { return p.placed; });
      cx.fillStyle = allPlaced ? TEAL : 'rgba(255,255,255,0.15)';
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SUBMIT_R.x, SUBMIT_R.y, SUBMIT_R.w, SUBMIT_R.h, 22);
      else cx.rect(SUBMIT_R.x, SUBMIT_R.y, SUBMIT_R.w, SUBMIT_R.h);
      cx.fill();
      cx.fillStyle = allPlaced ? INK : 'rgba(255,255,255,0.4)';
      cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(allPlaced ? 'SUBMIT →' : 'DRAG ALL PINS', W/2, SUBMIT_R.y + 28);

      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '600 11px -apple-system, Helvetica, Arial';
      cx.fillText('drag each pin to where it was', W/2, SUBMIT_R.y + SUBMIT_R.h + 16);
    }

    // ---- OVER ----
    if (phase === 'over') {
      // show map with error lines + original spots
      drawMap(cx, 0.7);
      for (var i = 0; i < spots.length; i++) {
        drawErrorLine(pins[i], spots[i], labels[i]);
        drawOriginalSpot(spots[i].x, spots[i].y, labels[i]);
        drawPin(pins[i].x, pins[i].y, labels[i], VERM, 0.8, false);
      }

      // overlay
      cx.fillStyle = 'rgba(11,13,18,0.6)';
      cx.fillRect(0, 0, W, H);

      cx.textAlign = 'center';
      cx.fillStyle = totalError < 80 ? TEAL : VERM;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText(totalError < 80 ? 'SHARP MEMORY!' : 'MAP FAIL.', W/2, 300);

      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(totalError + ' error pts', W/2, 344);

      var pt = pctTop(totalError);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W/2, 386);

      if (best > 0) {
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('best: ' + best + ' pts', W/2, 410);
      }

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — TRY AGAIN', W/2, 456);
        cx.globalAlpha = 1;

        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W/2, SHARE_R.y + 30);
      }
    }

    // ---- CTA (demo) ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('MAP RECALL', W/2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('total error ' + (window.__demoScore || 47) + '. think you can beat it?', W/2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.globalAlpha = ease * p3;
      cx.fillStyle = VERM;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 47), W/2, 404);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 438);
      cx.globalAlpha = 1;
    }

    // flashes (floating reward text)
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 250 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
