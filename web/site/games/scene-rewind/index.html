  // Pick N unique items from pool (uses rng)
  function pick(pool, n) {
    var copy = pool.slice();
    var res = [];
    for (var i = 0; i < n && copy.length > 0; i++) {
      var idx = Math.floor(rng() * copy.length);
      res.push(copy.splice(idx, 1)[0]);
    }
    return res;
  }

  // Generate grid positions for objects
  function makeGrid(n) {
    // Shuffle grid cells and pick n
    var cells = [];
    for (var r = 0; r < SCENE_ROWS; r++) {
      for (var c = 0; c < SCENE_COLS; c++) {
        cells.push({ col: c, row: r });
      }
    }
    // shuffle
    for (var i = cells.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = cells[i]; cells[i] = cells[j]; cells[j] = tmp;
    }
    var picked = cells.slice(0, n);
    return picked.map(function(cell) {
      return {
        x: cell.col * CELL_W + CELL_W / 2 + (rng() - 0.5) * 22,
        y: SCENE_TOP + cell.row * CELL_H + CELL_H / 2 + (rng() - 0.5) * 16

    // Remove REMOVE_COUNT objects, add ADD_COUNT new ones, shuffle positions
    var remaining = originalObjs.slice();
    // remove random 3
    var removed = pick(remaining.map(function(_, i) { return i; }), REMOVE_COUNT);
    removed.sort(function(a,b){return b-a;});
    removed.forEach(function(i) { remaining.splice(i, 1); });

    // pick ADD_COUNT new objects not in original scene
    var usedIds = originalObjs.map(function(o) { return o.id; });
    var pool = OBJS.filter(function(o) { return usedIds.indexOf(o.id) < 0; });
    var added = pick(pool, ADD_COUNT);
    newObjIds = added.map(function(o) { return o.id; });

    // generate fresh positions for all objects
    var total = remaining.length + added.length;
    var positions = makeGrid(total);
    var all = remaining.concat(added.map(function(o) { return { id: o.id, col: o.col, draw: o.draw }; }));

    currentObjs = all.map(function(obj, i) {
      return {
        id: obj.id, col: obj.col, draw: obj.draw,
        x: positions[i].x, y: positions[i].y,
        r: (rng() - 0.5) * 0.3,
        isNew: newObjIds.indexOf(obj.id) >= 0,
        tapped: false, tapEffect: 0
      };
    });
    tappedObjs = [];
  }

  function startMem() {
    phase = 'memorize';
    runStartTs = Date.now();
    memorizeTimer = performance.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED, round: round });
  }

  function startRecall() {
    buildRecallScene();
    phase = 'recall';
    recallStart = performance.now();
  }

  function checkRoundComplete() {
    // Check if player found all new objects
    var found = currentObjs.filter(function(o) { return o.isNew && o.tapped; }).length;
    if (found >= NEEDED_TAPS) {
      // Round complete!
      var correct = currentObjs.filter(function(o) { return o.tapped && o.isNew; }).length;
      var wrong = currentObjs.filter(function(o) { return o.tapped && !o.isNew; }).length;
      score += correct;
      if (wrong === 0) {
        combo++;
        if (window.J) J.perfect(combo);
        flash('PERFECT!', TEAL, 44);
        hitStop = 4; zoom = 1.03;
      } else {
        combo = 0;
        if (window.J) J.hit(score);
        flash('+' + correct, GOLD, 38);
        if (wrong > 0 && window.J) J.near();
      }
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN!', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(score);
      }
      if (window.LOOP) LOOP.emit('round_complete', { round: round, score: score, combo: combo });
      round++;
      // Start next round
      setTimeout(function() { buildScene(); startMem(); }, 600);
    }
  }

  function timeUp() {
    // Time ran out on recall phase -> game over
    gameOver();
  }

  function tapWrong() {
    // Wrong tap — penalize: game over immediately
    if (window.J) J.death(0.5);
    shakeAmt = 8;
    flash('WRONG!', VERM, 42);
    setTimeout(function() { gameOver(); }, 400);
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.death(Math.min(0.4 + score / 10, 1));
    var newBest = score > best;
    if (newBest) { best = score; try { localStorage.setItem('scr_best', String(best)); } catch(_){} }
    if (newBest && window.J) setTimeout(function() { J.fanfare(); }, 500);
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function() {
        phase = 'cta'; ctaAt = performance.now();
        setTimeout(function() { window.__demoDone = true; }, 3600);
      }, 2600);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function() { newGame(); }, 800);
    }
  }

  function newGame() {
    score = 0; combo = 0; round = 1; flashes = [];
    hitStop = 0; shakeAmt = 0; zoom = 1; dareBeaten = false;
    // reset rng for reproducibility in bot/demo
    rng = mulberry32(SEED + (botRunsDone || 0));
    buildScene();
    if (DEMO) {
      phase = 'challenge';
      setTimeout(function() { startMem(); }, 1300);
    } else if (BOT) {
      startMem();
    } else {
      phase = 'title';
    }
  }

  // ---- Input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 478, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(ex, ey) {
    if (DEMO || BOT) return;
    if (ex !== undefined && inR(MUTE_R, ex, ey) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startMem(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (ex !== undefined && inR(SHARE_R, ex, ey) && window.SHARE) {
        SHARE.send({ score: score, unit: 'found' }); return;
      }
      if (window.LOOP) LOOP.emit('restart', {});
      newGame(); return;
    }
    if (phase === 'recall') {
      // find tapped object
      if (ex === undefined) return;
      var hit = null;
      for (var i = currentObjs.length - 1; i >= 0; i--) {
        var obj = currentObjs[i];
        if (obj.tapped) continue;
        var dx = ex - obj.x, dy = ey - obj.y;
        if (Math.sqrt(dx*dx + dy*dy) < OBJ_SIZE * 0.55) { hit = obj; break; }
      }
      if (!hit) return;
      hit.tapped = true; hit.tapEffect = 1;
      if (hit.isNew) {
        tappedObjs.push(hit.id);
        if (window.J) J.hit(combo + 1);
        flash('+1', TEAL, 32);
        if (window.LOOP) LOOP.emit('object_found', { id: hit.id, round: round });
        checkRoundComplete();
      } else {
        // wrong tap
        if (window.LOOP) LOOP.emit('near_miss', { id: hit.id, round: round });
        tapWrong();
      }
    }
  }

  window.addEventListener('pointerdown', function(e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function(e) { if (e.code === 'Space') tap(); });

  // ---- Bot / Demo autopilots ----
  var botPhaseTimer = 0;
  var demoState = { step: 0, wait: 0, hesWait: 0, phase: 'start' };
  var demoWaits = [45, 30, 55, 28, 40, 35, 50, 32]; // hesitation in frames

  function autopilot(now) {
    if (phase === 'memorize') return; // just watch
    if (phase !== 'recall') return;
    if (DEMO) {
      demoAuto(now);
    } else if (BOT) {
      botAuto(now);
    }
  }

  var botAutoTimer = 0, botActed = false;
  function botAuto(now) {
    if (!botAutoTimer) botAutoTimer = now;
    var elapsed = now - botAutoTimer;
    if (elapsed < 800 + rng() * 1200) return; // wait a bit
    botAutoTimer = now;
    // find an untapped new obj to tap
    var newUntapped = currentObjs.filter(function(o) { return o.isNew && !o.tapped; });
    if (newUntapped.length > 0) {
      var target = newUntapped[Math.floor(rng() * newUntapped.length)];
      // bot occasionally taps wrong (miss on last round to cause game_over)
      var shouldMiss = (round >= 3 && rng() < 0.5);
      if (shouldMiss) {
        var wrongObjs = currentObjs.filter(function(o) { return !o.isNew && !o.tapped; });
        if (wrongObjs.length > 0) {
          target = wrongObjs[Math.floor(rng() * wrongObjs.length)];
        }
      }
      simulateTap(target.x, target.y);
    }
  }

  var demoAutoTimer = 0, demoStep = 0, demoHesitating = false, demoHesStart = 0, demoHesWait = 0;
  function demoAuto(now) {
    if (!demoAutoTimer) demoAutoTimer = now;
    var elapsed = now - demoAutoTimer;

    // hesitate before tapping
    if (demoHesitating) {
      if (now - demoHesStart < demoHesWait) return;
      demoHesitating = false;
    }
    if (elapsed < 300) return;
    demoAutoTimer = now;

    // find untapped new objects
    var newUntapped = currentObjs.filter(function(o) { return o.isNew && !o.tapped; });
    if (newUntapped.length === 0) return;

    // On round 2 (near-fail): almost tap wrong, then correct
    if (round === 2 && demoStep === 0) {
      // near miss moment: emit a near_miss event
      if (window.LOOP) LOOP.emit('near_miss', { demo: true });
      if (window.J) J.near();
      shakeAmt = 3;
      flash('SO CLOSE...', VERM, 32);
      demoStep = 1;
      demoHesitating = true; demoHesStart = now; demoHesWait = 800;
      return;
    }

    // On round 3+: fail deliberately on second tap (miss a wrong one)
    if (round >= 3 && newUntapped.length === 1 && demoStep < 2) {
      // tap wrong to fail
      var wrongObjs = currentObjs.filter(function(o) { return !o.isNew && !o.tapped; });
      if (wrongObjs.length > 0) {
        demoStep = 2;
        demoHesitating = true; demoHesStart = now; demoHesWait = 600;
        simulateTap(wrongObjs[0].x, wrongObjs[0].y);
        return;
      }
    }

    // standard: tap first new object with hesitation
    var target = newUntapped[0];
    var hesIdx = Math.min(score + newUntapped.length, demoWaits.length - 1);
    demoHesitating = true; demoHesStart = now; demoHesWait = demoWaits[hesIdx] * 16;
    simulateTap(target.x, target.y);
  }

  function simulateTap(x, y) {
    var hit = null;
    for (var i = currentObjs.length - 1; i >= 0; i--) {
      var obj = currentObjs[i];
      if (obj.tapped) continue;
      var dx = x - obj.x, dy = y - obj.y;
      if (Math.sqrt(dx*dx + dy*dy) < OBJ_SIZE * 0.55) { hit = obj; break; }
    }
    if (!hit) return;
    hit.tapped = true; hit.tapEffect = 1;
    if (hit.isNew) {
      tappedObjs.push(hit.id);
      if (!DEMO && window.J) J.hit(combo + 1);
      flash('+1', TEAL, 32);
      checkRoundComplete();
    } else {
      if (window.LOOP) LOOP.emit('near_miss', { id: hit.id, round: round });
      tapWrong();
    }
  }

  // ---- Render ----
  function drawObject(obj, alpha, glowNew) {
    cx.save();
    cx.globalAlpha = alpha || 1;
    cx.translate(obj.x, obj.y);
    cx.rotate(obj.r || 0);
    if (glowNew && obj.isNew) {
      // glow new objects
      cx.shadowColor = TEAL;
      cx.shadowBlur = 18;
    }
    cx.fillStyle = obj.col;
    obj.draw(cx, 0, 0, OBJ_SIZE);
    if (obj.tapped) {
      cx.globalAlpha = (alpha || 1) * Math.max(0, obj.tapEffect);
      if (obj.isNew) {
        cx.fillStyle = TEAL;
        cx.beginPath(); cx.arc(0, 0, OBJ_SIZE * 0.52, 0, Math.PI * 2);
        cx.globalAlpha = (alpha || 1) * obj.tapEffect * 0.35; cx.fill();
        cx.globalAlpha = (alpha || 1) * obj.tapEffect;
        cx.strokeStyle = TEAL; cx.lineWidth = 3;
        cx.beginPath(); cx.arc(0, 0, OBJ_SIZE * 0.52, 0, Math.PI * 2); cx.stroke();
      } else {
        cx.fillStyle = VERM;
        cx.beginPath(); cx.arc(0, 0, OBJ_SIZE * 0.52, 0, Math.PI * 2);
        cx.globalAlpha = (alpha || 1) * obj.tapEffect * 0.35; cx.fill();
        cx.globalAlpha = (alpha || 1) * obj.tapEffect;
        cx.strokeStyle = VERM; cx.lineWidth = 3;
        cx.beginPath(); cx.arc(0, 0, OBJ_SIZE * 0.52, 0, Math.PI * 2); cx.stroke();
      }
    }
    cx.restore();
  }

  function drawSceneBg() {
    // Subtle grid lines
    cx.save();
    cx.strokeStyle = 'rgba(255,255,255,0.04)';
    cx.lineWidth = 1;
    for (var c = 1; c < SCENE_COLS; c++) {
      cx.beginPath(); cx.moveTo(c * CELL_W, SCENE_TOP - 10); cx.lineTo(c * CELL_W, SCENE_TOP + SCENE_ROWS * CELL_H); cx.stroke();
    }
    for (var r = 1; r < SCENE_ROWS; r++) {
      cx.beginPath(); cx.moveTo(10, SCENE_TOP + r * CELL_H); cx.lineTo(W - 10, SCENE_TOP + r * CELL_H); cx.stroke();
    }
    cx.restore();
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Juice timers
    if (hitStop > 0) hitStop -= dt;
    else autopilot(now);

    zoom += (1 - zoom) * 0.12 * dt;
    shakeAmt *= Math.pow(0.82, dt);

    // Update flash particles
    for (var fi = flashes.length - 1; fi >= 0; fi--) {
      flashes[fi].t += dt;
      if (flashes[fi].t > 42) flashes.splice(fi, 1);
    }

    // Update tap effects
    if (currentObjs) {
      for (var oi = 0; oi < currentObjs.length; oi++) {
        if (currentObjs[oi].tapEffect > 0) currentObjs[oi].tapEffect -= 0.04 * dt;
      }
    }

    // Memorize phase timer
    if (phase === 'memorize') {
      var elapsed = now - memorizeTimer;
      if (elapsed >= MEMORIZE_DUR) {
        startRecall();
      }
    }
    // Recall phase timer
    if (phase === 'recall') {
      var recallElapsed = now - recallStart;
      if (recallElapsed >= RECALL_DUR) {
        if (window.J) J.tension(Math.min(recallElapsed / RECALL_DUR, 1));
        if (phase === 'recall') timeUp();
      } else {
        // rising tension as time runs out
        if (recallElapsed > RECALL_DUR * 0.6 && window.J) {
          J.tension(Math.max(0, (recallElapsed - RECALL_DUR * 0.6) / (RECALL_DUR * 0.4)));
        }
      }
    }

    // ---- Draw ----
    cx.save();

    // Juice transforms
    var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
    if (shakeAmt > 0.2 || zoom > 1.001) {
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    drawSceneBg();

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('SCENE REWIND', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '400 15px -apple-system, Helvetica, Arial';
      cx.fillText('spot what changed', W / 2, 296);
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 360);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.28)'; cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('memorize · find what changed', W / 2, 410);
    }

    // ---- CHALLENGE CARD (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('6', W / 2, 406);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("objects found today's top run", W / 2, 436);
    }

    // ---- MEMORIZE PHASE ----
    if (phase === 'memorize' && originalObjs) {
      var memElapsed = now - memorizeTimer;
      var memPct = Math.min(memElapsed / MEMORIZE_DUR, 1);
      // Header
      cx.textAlign = 'center';
      cx.fillStyle = GOLD; cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('MEMORIZE THE SCENE', W / 2, 50);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('Round ' + round, W / 2, 70);
      // Timer bar
      cx.fillStyle = 'rgba(255,255,255,0.10)'; cx.fillRect(30, 82, W - 60, 6);
      var barW = (W - 60) * (1 - memPct);
      cx.fillStyle = GOLD; cx.fillRect(30, 82, barW, 6);
      // Objects
      for (var i = 0; i < originalObjs.length; i++) {
        drawObject(originalObjs[i], 1, false);
      }
    }

    // ---- RECALL PHASE ----
    if (phase === 'recall' && currentObjs) {
      var recElapsed = now - recallStart;
      var recPct = Math.min(recElapsed / RECALL_DUR, 1);
      // Header
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('WHAT CHANGED?', W / 2, 50);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('tap the new objects (' + NEEDED_TAPS + ' added)', W / 2, 70);
      // Timer bar (turns red)
      var timeLeft = 1 - recPct;
      cx.fillStyle = 'rgba(255,255,255,0.10)'; cx.fillRect(30, 82, W - 60, 6);
      var barColor = recPct < 0.6 ? TEAL : recPct < 0.80 ? GOLD : VERM;
      cx.fillStyle = barColor; cx.fillRect(30, 82, (W - 60) * timeLeft, 6);
      // Score
      cx.fillStyle = 'rgba(255,255,255,0.90)'; cx.font = '800 32px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 106);
      // Objects
      for (var j = 0; j < currentObjs.length; j++) {
        drawObject(currentObjs[j], 1, false);
      }
      // Remaining indicators
      var foundCount = currentObjs.filter(function(o) { return o.isNew && o.tapped; }).length;
      cx.fillStyle = 'rgba(255,255,255,0.25)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText(foundCount + ' / ' + NEEDED_TAPS + ' found', W / 2, H - 28);
      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '700 13px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, H - 12);
      }
    }

    // ---- GAME OVER ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('MISSED IT.', W / 2, 298);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' found', W / 2, 340);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 382);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 402);
      if (!DEMO && !BOT) {
        var pulse2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = pulse2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE ROUND', W / 2, 448);
        cx.globalAlpha = 1;
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- DEMO CTA ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.4);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SCENE REWIND', W / 2, 298);
      cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('she found ' + (window.__demoScore || 6) + '. can you?', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 6), W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // ---- Flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      cx.globalAlpha = Math.max(0, 1 - fl.t / 42);
      cx.textAlign = 'center'; cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.5);
      cx.globalAlpha = 1;
    }

    // ---- Mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial'; cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
