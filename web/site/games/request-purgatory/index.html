<script>
(function () {

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {

      var t = Math.imul(a ^ a >>> 15, 1 | a);

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  var BUBBLE_RADIUS = 36;

  var REAL_ICONS  = ['👤','🙋','🙏','💬','✉️','🧑','👋','😊'];

  // ---- game state ----
  function newGame() {
    state = {
      phase: 'title',   // title | challenge | play | over | cta
      score: 0,
      lives: 3,
      combo: 0,
      overAt: 0,

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 14))));
  }

  // confusion factor [0..1]: how similar spam icons look to real
  function confusionFactor() {
    return Math.min(1, state.score / 40);
  }

  function spawnBubble() {
    var isReal = rng() < 0.55;  // slightly more real to start, balances with penalty
    var cf = confusionFactor();
    var icon;
    if (isReal) {
      icon = REAL_ICONS[Math.floor(rng() * REAL_ICONS.length)];
    } else {
      if (rng() < cf) {
        icon = SPAM_DISGUISED[Math.floor(rng() * SPAM_DISGUISED.length)];
      } else {
        icon = SPAM_ICONS[Math.floor(rng() * SPAM_ICONS.length)];
      }
    }
    // secondary label (username style) — spam usernames look randomer
    var name = isReal ? randomRealName() : randomSpamName(cf);

    bubbles.push({
      x: 60 + rng() * (W - 120),
      y: H + BUBBLE_RADIUS + 10,
      vy: state.speed,
      isReal: isReal,
      icon: icon,
      name: name,
      id: Math.floor(rng() * 1e9),
      swiped: false,
      swipeDir: 0,    // 0=pending, 1=right(accept), -1=left(decline)
      alpha: 1,
      exitVx: 0,
    });
  }

  var REAL_NAMES  = ['sofia_r','marco.v','dani.lu','isa_m','teo.cx','nadia.k','leo.ft','sara.b'];
  var SPAM_NAMES_CLEAN  = ['user9182','bot_3391','acc_882x','_ubot923','promo.x1','1user_9'];
  var SPAM_NAMES_DISGUISED = ['sofia.dm','marco9x','daniela_','_isabel','matteo01','naomi.m'];
  function randomRealName()  { return REAL_NAMES [Math.floor(rng() * REAL_NAMES.length)]; }
  function randomSpamName(cf) {
    if (rng() < cf) return SPAM_NAMES_DISGUISED[Math.floor(rng() * SPAM_NAMES_DISGUISED.length)];
    return SPAM_NAMES_CLEAN[Math.floor(rng() * SPAM_NAMES_CLEAN.length)];
  }

  // ---- decision: accept=right, decline=left ----
  function decideBubble(b, dir) {
    if (b.swiped) return;
    b.swiped = true;
    b.swipeDir = dir;
    b.exitVx = dir * 18;

    var correct = (dir === 1 && b.isReal) || (dir === -1 && !b.isReal);
    if (correct) {
      state.score++;
      state.combo++;
      var perfect = state.combo >= 5;
      if (window.J) {
        if (perfect) J.perfect(state.combo);
        else J.hit(state.combo);
        J.tension(Math.min(state.score / 35, 1));
      }
      if (perfect) { hitStop = 5; zoom = 1.03; }
      flash(perfect ? 'SORTED! ×' + state.combo : (dir === 1 ? 'ACCEPTED' : 'DECLINED'), perfect ? GOLD : TEAL, perfect ? 40 : 32);
      if (window.LOOP) LOOP.emit('bubble_sorted', { score: state.score, isReal: b.isReal, correct: true, combo: state.combo });

      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {

      state.combo = 0;

      if (window.J) J.near();
      flash(b.isReal ? '−2 LIVES' : '−1 LIFE', VERM, 36);
      if (window.LOOP) LOOP.emit('bubble_sorted', { score: state.score, isReal: b.isReal, correct: false, lives_lost: livesLost });
      if (state.lives <= 0) {
        state.lives = 0;

        setTimeout(gameOver, 400);
      }
    }
    // difficulty ramp
    state.speed = 0.8 + state.score * 0.04;
    state.spawnInterval = Math.max(55, 120 - state.score * 2);
  }

  function bubbleMissed(b) {
    // bubble reached top without being swiped = missed a real one if real
    if (b.isReal) {

      state.combo = 0;

      flash('MISSED!', VERM, 36);
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { score: state.score });
      if (state.lives <= 0) { state.lives = 0; setTimeout(gameOver, 300); }
    }
    // spam bubbles that float past are fine

  function gameOver() {

    state.overAt = performance.now();

    if (window.LOOP) LOOP.emit('restart', {});

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });

  // ---- input (human) ----
  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale;
    var y = (e.clientY - r.top)  / scale;

    if (inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }

    if (state.phase === 'title') { startRun(); return; }

  window.addEventListener('pointermove', function (e) {
    if (DEMO || BOT) return;

    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale;
    var dx = x - swipeStart.x;
    // live-drag the bubble if one is grabbed
    if (swipeStart.bubbleIdx >= 0) {
      var b = bubbles[swipeStart.bubbleIdx];
      if (b && !b.swiped) b.x = swipeStart.x + dx;   // visual drag only; decision on release
    }
  });

  // ---- demo / bot autopilots ----
  // Demo script: (score, isReal, correct?) pairs to orchestrate

  var demoActions = [

    { wait: 28, correct: true },
    { wait: 22, correct: true },

    { wait: 20, correct: true },
    { wait: 44, correct: true },
    { wait: 18, correct: true },
    { wait: 30, correct: true },

  function autopilot() {
    if (state.phase !== 'play') return;

      if (b === demoLastBubble) return;  // wait for a new bubble
      var act = demoActions[Math.min(demoActionIdx, demoActions.length - 1)];
      var makeCorrect = (demoActionIdx < demoActions.length) ? act.correct : true;

      if (makeCorrect) {
        dir = b.isReal ? 1 : -1;
      } else {
        dir = b.isReal ? -1 : 1;

  // ---- draw helpers ----
  function drawBubble(b, dragDx) {
    var x = b.x, y = b.y;
    var a = b.alpha;

    // tint based on swipe direction (visual feedback)
    var borderCol = 'rgba(255,255,255,0.22)';
    if (b.swiped) {

    cx.save();
    cx.globalAlpha = a;

    // bubble shadow

    // circle background
    cx.beginPath();
    cx.arc(x, y, BUBBLE_RADIUS, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(20,24,34,0.92)';
    cx.fill();
    cx.shadowBlur = 0;

    // border
    cx.strokeStyle = borderCol;
    cx.lineWidth = 2;
    cx.stroke();

    // icon
    cx.font = '28px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';

      cx.globalAlpha = i < state.lives ? 1.0 : 0.2;
      cx.font = '20px -apple-system';
      cx.textAlign = 'left';
      cx.fillStyle = '#fff';
      cx.fillText(i < state.lives ? '❤️' : '🖤', 20 + i * 30, 42);

    cx.globalAlpha = 1;

    if (state.phase !== 'play') return;
    cx.textAlign = 'left';
    cx.fillStyle = VERM + 'aa';
    cx.font = '600 12px Menlo, monospace';
    cx.fillText('← DECLINE', 16, H - 24);
    cx.textAlign = 'right';
    cx.fillStyle = TEAL + 'aa';
    cx.fillText('ACCEPT →', W - 16, H - 24);
    cx.textAlign = 'center';

  // ---- main loop ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // spawn new bubbles
    if (state.phase === 'play') {
      state.spawnTimer += dt;
      if (state.spawnTimer >= state.spawnInterval) {
        state.spawnTimer = 0;
        spawnBubble();

    // update bubbles
    for (var i = bubbles.length - 1; i >= 0; i--) {
      var b = bubbles[i];
      if (b.swiped) {

        b.x    += b.exitVx * dt;
        b.alpha -= 0.06 * dt;
        if (b.alpha <= 0) { bubbles.splice(i, 1); }
      } else {
        b.y -= b.vy * dt;
        // missed: floated past top

          bubbleMissed(b);
          bubbles.splice(i, 1);

    // autopilot
    if ((DEMO || BOT) && state.phase === 'play') {
      if (hitStop > 0) { hitStop -= dt; }
      else autopilot();
    } else if (hitStop > 0) {
      hitStop -= dt;
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // header: score + label
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 80);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('SORTED', W / 2, 100);

      // lives
      drawLives();

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 13px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 120);
      }
    }

    // bubbles
    if (state.phase === 'play' || state.phase === 'over') {
      for (var j = 0; j < bubbles.length; j++) {
        var bub = bubbles[j];
        var drag = 0;
        if (!DEMO && !BOT && swipeStart && swipeStart.bubbleIdx === j) {
          drag = (bub.x - swipeStart.x);
        }
        drawBubble(bub, drag !== 0 ? drag : undefined);
      }
    }

    // hints
    drawHints();

    // floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // title card
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('REQUEST', W / 2, 290);
      cx.fillStyle = VERM; cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('PURGATORY', W / 2, 332);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('swipe right = accept  ·  left = decline', W / 2, 368);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('declining a real person costs 2 lives', W / 2, 390);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD; cx.font = '900 90px -apple-system, Helvetica, Arial';
      cx.fillText('21', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // game over overlay
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('GHOSTED.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' sorted', W / 2, 334);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 378);
      cx.fillStyle = 'rgba(255,255,255,0.50)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of people', W / 2, 400);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 446);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23)
                     : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('REQUEST', W / 2, 278);
      cx.fillStyle = VERM; cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('PURGATORY', W / 2, 320);
      cx.fillStyle = 'rgba(255,255,255,0.70)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they sorted ' + (window.__demoScore || 21) + '. beat it.', W / 2, 358);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 21), W / 2, 418);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 448);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
