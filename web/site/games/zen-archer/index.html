<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game state ----
  // Score = mm deviation from bullseye center (lower=better; display as mm off, but rank by smallest)
  // We track BEST as lowest deviation (best = closest to 0)
  // Public score for dares/sharing: rounded mm from bull (0 = perfect, higher = worse)
  var ARROW_SPEED = 2.8;  // draw speed (power increase per frame unit)

  // Target geometry (canvas coords)
  var TGT_CX = W / 2, TGT_CY = 340;
  var RINGS = [
    { r: 14,  score: 100, label: 'X', color: '#fff' },
    { r: 28,  score: 90,  label: '10', color: GOLD },
    { r: 44,  score: 80,  label: '9',  color: GOLD },
    { r: 60,  score: 70,  label: '8',  color: VERM },
    { r: 78,  score: 60,  label: '7',  color: VERM },
    { r: 98,  score: 50,  label: '6',  color: '#555' },
    { r: 118, score: 40,  label: '5',  color: '#555' },
    { r: 138, score: 30,  label: '4',  color: '#222' },
    { r: 155, score: 20,  label: '3',  color: '#222' },
  ];
  var TOTAL_ARROWS = 5;

  var state, flashes, hitStop, zoom, shakeAmt, dareBeaten;
  var runStartTs, best = null; // best = smallest deviation in mm (0 = perfect)
  try { best = parseFloat(localStorage.getItem('za_best')); if (isNaN(best)) best = null; } catch(_){}

  // ---- Wind ----
  // Wind gives micro-variance; magnitude 0-1, direction in radians
  var wind = { angle: 0, mag: 0 };
  function newWind() {
    wind.angle = rng() * Math.PI * 2;
    wind.mag   = rng() * 0.38;  // 0..0.38 — noticeable but beatable
  }

  // ---- Draw power meter ----
  // Player holds to charge. Release at peak (PEAK_RANGE) for minimum deviation.
  // Power: 0..1. Peak zone: 0.44..0.56. Too early or late = drift.
  var PEAK_LO = 0.44, PEAK_HI = 0.56;
  var drawPower = 0;   // 0..1 (current charge level)
  var holding   = false;
  var arrowsFired = 0;
  var arrows = [];     // {x, y, angle, alpha, hit} — displayed after release
  var phase  = 'title'; // title | challenge | play | over | cta
  var overAt = 0, ctaAt = 0, challengeAt = 0;
  var botRunsDone = 0;
  var roundScore = 0;  // cumulative score this run (sum of ring values)
  var bestDeviationMm = null; // smallest deviation this run

  // ---- Demo script ----
  // Each entry: target power at release (0-1). 'miss' = fully miss target.
  var demoScript = [0.52, 0.47, 0.35, 0.54, 0.18]; // 5 arrows: good, decent, near-miss, perfect, miss
  var demoIdx = 0;
  var demoWaits = [52, 44, 68, 90, 38]; // frames of hesitation (human feel)
  var demoWait  = 60;                    // initial challenge-card wait
  var demoDrawing = false;               // currently holding

  // ---- Bot state ----
  var botTarget = -1;
  var botHolding = false;
  var botPassive = false; // after K shots, go passive and miss to trigger game_over

  function newGame() {
    arrows = []; flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    drawPower = 0; holding = false; arrowsFired = 0; roundScore = 0; bestDeviationMm = null;
    demoIdx = 0; demoWaits = [52, 44, 68, 90, 38]; demoDrawing = false;
    botTarget = -1; botHolding = false; botPassive = false; botRunsDone = 0;
    newWind();
    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      demoWait = 80; // frames at challenge card
      return;
    }
    if (BOT) { phase = 'play'; startRun(); return; }
    phase = 'title';
  }

  function startRun() {
    runStartTs = Date.now();
    arrowsFired = 0; arrows = []; roundScore = 0; bestDeviationMm = null;
    newWind();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- Release logic ----
  // Returns deviation in px from bullseye centre accounting for wind
  function computeHit(power) {
    // Error from ideal peak: 0 at centre of peak zone
    var centre = (PEAK_LO + PEAK_HI) / 2;
    var halfW   = (PEAK_HI - PEAK_LO) / 2;
    var err = (power - centre) / halfW; // -1..+1 inside zone, bigger outside
    // Convert to spread: 0 at peak → grows quadratically + wind offset
    var spread = Math.abs(err) * 128;   // max ~128px at extremes
    // Wind pushes in its own direction
    var windPx = wind.mag * 60;
    var dx = spread * Math.sign(power - centre) + Math.cos(wind.angle) * windPx * 0.6;
    var dy = (rng() - 0.5) * spread * 0.6 + Math.sin(wind.angle) * windPx * 0.6;
    return { dx: dx, dy: dy };
  }

  // Find which ring was hit given deviation distance in px
  function ringForDist(dist) {
    for (var i = 0; i < RINGS.length; i++) {
      if (dist <= RINGS[i].r) return RINGS[i];
    }
    return null; // miss
  }

  var PX_PER_MM = 1.8; // visual scale: 1mm = 1.8px

  function fireArrow(power) {
    var hit = computeHit(power);
    var dist = Math.sqrt(hit.dx * hit.dx + hit.dy * hit.dy);
    var ring = ringForDist(dist);
    var devMm = Math.round(dist / PX_PER_MM);

    var ax = TGT_CX + hit.dx;
    var ay = TGT_CY + hit.dy;
    var perfect = ring && ring.r === RINGS[0].r;
    var nearMiss = !ring && dist < RINGS[RINGS.length - 1].r * 1.18;

    arrows.push({ x: ax, y: ay, alpha: 1, ring: ring, perfect: perfect, t: 0 });

    if (ring) {
      roundScore += ring.score;
      if (bestDeviationMm === null || devMm < bestDeviationMm) bestDeviationMm = devMm;
    }

    // Sound
    if (window.J) {
      if (perfect)      { J.perfect(arrowsFired); J.gold(); hitStop = 5; zoom = 1.035; }
      else if (ring && ring.score >= 80) { J.hit(arrowsFired + 1); hitStop = 3; zoom = 1.02; }
      else if (ring)    { J.hit(1); }
      else if (nearMiss){ J.near(); shakeAmt = 3; }
      else              { J.death(0.3); shakeAmt = 6; }
      J.tension(Math.min(arrowsFired / TOTAL_ARROWS, 1));
    }

    // Floating text
    if (perfect)      flash('BULLSEYE', GOLD, 46);
    else if (ring && ring.score >= 90) flash('+' + ring.score, TEAL, 40);
    else if (ring && ring.score >= 70) flash('+' + ring.score, '#fff', 34);
    else if (nearMiss) { flash('SO CLOSE', VERM, 36); if (window.LOOP) LOOP.emit('near_miss', { dev_mm: devMm }); }
    else               flash('MISS', VERM, 44);

    if (window.LOOP) LOOP.emit('arrow_released', {
      arrow: arrowsFired + 1,
      power: +power.toFixed(3),
      dev_mm: devMm,
      ring: ring ? ring.label : 'miss',
      score: ring ? ring.score : 0
    });

    arrowsFired++;

    // Dare beaten?
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && roundScore > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(roundScore);
    }

    if (arrowsFired >= TOTAL_ARROWS) {
      setTimeout(function () { endRound(); }, 700);
    } else {
      newWind();
    }
  }

  function endRound() {
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = (best === null) || (bestDeviationMm !== null && bestDeviationMm < best);
    if (newBest && bestDeviationMm !== null) {
      best = bestDeviationMm;
      try { localStorage.setItem('za_best', String(best)); } catch(_){}
      if (window.J) setTimeout(function(){ J.fanfare(); }, 400);
    }
    if (window.J) J.death(0.4);
    if (window.LOOP) LOOP.emit('game_over', { score: roundScore, dur_s: +dur.toFixed(1) });
    if (DEMO) window.__demoScore = roundScore;
    overAt = performance.now();
    phase = 'over';
    shakeAmt = 7;
    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { restartRun(); }, 700);
      }
    }
  }

  function restartRun() {
    arrows = []; flashes = []; drawPower = 0; holding = false;
    demoIdx = 0; demoDrawing = false;
    botTarget = -1; botHolding = false; botPassive = false;
    newWind();
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
    phase = 'play';
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 80))));
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- Input ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function startHold(x, y) {
    if (DEMO || BOT) return;
    if (inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { phase = 'play'; startRun(); return; }
    if (phase === 'play' && arrowsFired < TOTAL_ARROWS) {
      holding = true; drawPower = 0;
      if (window.J) J.tension(0);
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: roundScore, unit: 'pts' }); return;
      }
      restartRun();
    }
  }

  function endHold(x, y) {
    if (DEMO || BOT) return;
    if (phase === 'play' && holding) {
      holding = false;
      fireArrow(drawPower);
      drawPower = 0;
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    startHold((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointerup', function (e) {
    var r = cv.getBoundingClientRect();
    endHold((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowDown') {
      e.preventDefault();
      if (phase === 'title') { phase = 'play'; startRun(); return; }
      if (phase === 'play' && !holding) { holding = true; drawPower = 0; }
      if (phase === 'over' && performance.now() - overAt > 350) restartRun();
    }
  });
  window.addEventListener('keyup', function (e) {
    if ((e.code === 'Space' || e.code === 'ArrowDown') && holding) {
      holding = false; fireArrow(drawPower); drawPower = 0;
    }
  });

  // ---- Autopilots ----
  function demoPilot() {
    if (phase !== 'play' || arrowsFired >= TOTAL_ARROWS) return;
    if (demoWait > 0) { demoWait--; return; }
    var targetPower = demoScript[Math.min(demoIdx, demoScript.length - 1)];
    if (!demoDrawing) {
      // start drawing
      demoDrawing = true; drawPower = 0;
    }
    drawPower += 0.008 * (1 + rng() * 0.3); // human-imperfect speed
    if (drawPower >= targetPower) {
      drawPower = targetPower;
      demoDrawing = false;
      demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
      demoIdx++;
      fireArrow(drawPower);
      drawPower = 0;
    }
  }

  function botPilot() {
    if (phase !== 'play' || arrowsFired >= TOTAL_ARROWS) return;
    // Bot plays K shots competently then one final shot that misses badly
    var K = 4; // first K shots aim well; last shot misses
    var isMissShot = (arrowsFired === TOTAL_ARROWS - 1) && !botPassive;
    if (botTarget < 0) {
      if (arrowsFired >= K) {
        // aim to miss: choose a power well outside peak zone
        botTarget = 0.05 + rng() * 0.15; // 0.05..0.20 → big miss
      } else {
        // aim near peak zone with some variance
        botTarget = PEAK_LO + (PEAK_HI - PEAK_LO) * (0.3 + rng() * 0.4) + (rng() - 0.5) * 0.12;
      }
    }
    if (!botHolding) { botHolding = true; drawPower = 0; }
    drawPower += 0.009 + rng() * 0.003;
    if (drawPower >= botTarget) {
      botHolding = false;
      var p = botTarget;
      botTarget = -1;
      fireArrow(p);
      drawPower = 0;
    }
  }

  // ---- Render helpers ----
  function drawTarget(now) {
    // Draw rings from outside in
    for (var i = RINGS.length - 1; i >= 0; i--) {
      var ring = RINGS[i];
      cx.beginPath();
      cx.arc(TGT_CX, TGT_CY, ring.r, 0, Math.PI * 2);
      cx.fillStyle = ring.color;
      cx.fill();
      // ring border
      cx.strokeStyle = 'rgba(0,0,0,0.3)';
      cx.lineWidth = 1;
      cx.stroke();
    }
    // Crosshair
    cx.strokeStyle = 'rgba(0,0,0,0.4)';
    cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(TGT_CX - 10, TGT_CY); cx.lineTo(TGT_CX + 10, TGT_CY); cx.stroke();
    cx.beginPath(); cx.moveTo(TGT_CX, TGT_CY - 10); cx.lineTo(TGT_CX, TGT_CY + 10); cx.stroke();
  }

  function drawArrows() {
    for (var i = 0; i < arrows.length; i++) {
      var a = arrows[i];
      a.t++;
      var alpha = Math.min(1, a.t / 8);
      cx.save();
      cx.globalAlpha = alpha;
      // Arrow shaft
      cx.strokeStyle = '#8B5E3C';
      cx.lineWidth = 3;
      cx.beginPath();
      cx.moveTo(a.x, a.y - 28);
      cx.lineTo(a.x, a.y);
      cx.stroke();
      // Arrowhead
      cx.fillStyle = a.perfect ? GOLD : (a.ring ? '#ccc' : VERM);
      cx.beginPath();
      cx.moveTo(a.x, a.y);
      cx.lineTo(a.x - 5, a.y - 10);
      cx.lineTo(a.x + 5, a.y - 10);
      cx.closePath();
      cx.fill();
      // Perfect glow
      if (a.perfect) {
        cx.beginPath();
        cx.arc(a.x, a.y, 8, 0, Math.PI * 2);
        cx.fillStyle = 'rgba(242,177,52,0.35)';
        cx.fill();
      }
      cx.restore();
    }
  }

  // Power meter bar
  function drawPowerMeter(power) {
    var bx = 30, by = H - 200, bw = W - 60, bh = 18;
    // BG bar
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.fillRect(bx, by, bw, bh);
    // Peak zone highlight
    var peakX = bx + PEAK_LO * bw, peakW = (PEAK_HI - PEAK_LO) * bw;
    cx.fillStyle = 'rgba(242,177,52,0.28)';
    cx.fillRect(peakX, by, peakW, bh);
    // Fill
    var inPeak = power >= PEAK_LO && power <= PEAK_HI;
    cx.fillStyle = inPeak ? GOLD : VERM;
    cx.fillRect(bx, by, power * bw, bh);
    // Peak markers
    cx.strokeStyle = GOLD; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(peakX, by - 4); cx.lineTo(peakX, by + bh + 4); cx.stroke();
    cx.beginPath(); cx.moveTo(peakX + peakW, by - 4); cx.lineTo(peakX + peakW, by + bh + 4); cx.stroke();
    // Label
    cx.textAlign = 'center'; cx.font = '700 11px Menlo, monospace';
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.fillText('HOLD & RELEASE', W / 2, by - 8);
    cx.fillStyle = GOLD;
    cx.fillText('PEAK', (peakX + peakX + peakW) / 2, by + bh + 14);
  }

  function drawWindIndicator() {
    var wx = 30, wy = H - 240;
    cx.save();
    cx.translate(wx + 18, wy);
    cx.rotate(wind.angle);
    var len = 12 + wind.mag * 22;
    cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
    cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(0, -len); cx.stroke();
    cx.fillStyle = TEAL;
    cx.beginPath(); cx.moveTo(-4, -len + 6); cx.lineTo(4, -len + 6); cx.lineTo(0, -len - 2); cx.closePath(); cx.fill();
    cx.restore();
    cx.textAlign = 'left'; cx.font = '600 11px Menlo, monospace';
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.fillText('WIND', wx + 36, wy + 4);
  }

  function drawArrowPips() {
    // Show remaining arrows
    var totalFired = Math.min(arrowsFired, TOTAL_ARROWS);
    for (var i = 0; i < TOTAL_ARROWS; i++) {
      var px = W / 2 - (TOTAL_ARROWS - 1) * 14 / 2 + i * 14;
      var py = H - 156;
      cx.beginPath(); cx.arc(px, py, 5, 0, Math.PI * 2);
      if (i < totalFired) {
        cx.fillStyle = 'rgba(255,255,255,0.25)';
      } else {
        cx.fillStyle = GOLD;
      }
      cx.fill();
    }
  }

  // ---- Main frame ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Demo challenge card -> transition to play
    if (DEMO && phase === 'challenge') {
      demoWait -= dt;
      if (demoWait <= 0) {
        phase = 'play';
        startRun();
        demoWait = demoWaits[0];
      }
    }

    // Update draw power (human hold)
    if (!DEMO && !BOT && holding && phase === 'play' && arrowsFired < TOTAL_ARROWS) {
      drawPower = Math.min(1, drawPower + 0.008 * dt);
      if (window.J) J.tension(drawPower);
    }

    // Hit-stop: decay first; autopilot only runs when not frozen
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      if (DEMO) demoPilot();
      if (BOT)  botPilot();
    }

    // Juice: shake decay, zoom decay
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // ---- Draw ----
    cx.save();
    // Juice transforms
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // Draw target (always visible during play/over)
    if (phase === 'play' || phase === 'over') {
      drawTarget(now);
      drawArrows();
    }

    // Draw power meter during play if not all arrows fired
    if (phase === 'play' && arrowsFired < TOTAL_ARROWS) {
      drawPowerMeter(holding || (DEMO && demoDrawing) || (BOT && botHolding) ? drawPower : 0);
      drawWindIndicator();
      drawArrowPips();
      // Arrow counter
      cx.textAlign = 'center'; cx.font = '700 13px Menlo, monospace';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.fillText('ARROW ' + (arrowsFired + 1) + ' OF ' + TOTAL_ARROWS, W / 2, H - 176);
    }

    // Score display during play
    if (phase === 'play' || phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 54px -apple-system, Helvetica, Arial';
      cx.fillText(roundScore, W / 2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + (best !== null ? best + 'mm' : '--'), W / 2, 108);
      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — ' + SHARE.by : ''), W / 2, 130);
      }
    }

    // Flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 220 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // Title screen
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('ZEN ARCHER', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('hold to draw. release at peak.', W / 2, 298);
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('HOLD TO START', W / 2, 340); cx.globalAlpha = 1;
      // Draw a decorative target preview
      cx.save();
      cx.translate(0, 80);
      drawTarget(now);
      cx.restore();
    }

    // Challenge card (demo beat 1)
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 310);
      cx.fillStyle = GOLD; cx.font = '900 86px -apple-system, Helvetica, Arial';
      cx.fillText('430', W / 2, 410);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top archer", W / 2, 442);
    }

    // Game over / score card
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND OVER', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(roundScore + ' pts', W / 2, 336);
      if (bestDeviationMm !== null) {
        cx.fillStyle = GOLD; cx.font = '700 18px -apple-system, Helvetica, Arial';
        cx.fillText('BEST: ' + bestDeviationMm + 'mm from bull', W / 2, 364);
      }
      var pt = pctTop(roundScore);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 398);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of archers', W / 2, 420);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — SHOOT AGAIN', W / 2, 462); cx.globalAlpha = 1;
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // Demo CTA card
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('ZEN ARCHER', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they scored ' + (window.__demoScore || 380) + '. your arrow.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 380), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 446);
      cx.globalAlpha = 1;
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
