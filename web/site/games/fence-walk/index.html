<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c');
  var cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };

  // ---- Game state ----
  var state, shakeAmt, zoom, hitStop, flashes;
  var runStartTs, botRunsDone = 0;
  var ctaAt = 0, last = performance.now();

  // The path is a looping series of tiles; player holds to walk forward.
  // Score = distance walked in tiles. Game ends when player steps off path.

  // Path parameters: the path gently curves left/right in a predictable loop.
  // Each tile is a segment of the path with a known offset pattern.

  var PATH_TILE_H = 80;   // height of each path tile on screen
  var PATH_W = 100;       // visible width of walkable surface
  var LANE_W = 90;        // inner walkable lane (stay inside ±LANE_W/2 from center)
  var PLAYER_R = 14;      // player circle radius
  var SCROLL_SPEED = 1.6; // base scroll speed in px/frame-unit

  // Path curve: a gentle sine wave that repeats every PERIOD tiles
  var PERIOD = 12;        // tiles per full wave
  var AMPLITUDE = 45;     // max lateral offset from center

  // The walk generates scenic objects: fence posts, trees, gate
  // These are cosmetic, placed at fixed relative positions each loop.

  function tileOffset(tileIdx) {
    // Returns the x-center offset of path center at tile tileIdx
    return Math.sin((tileIdx / PERIOD) * 2 * Math.PI) * AMPLITUDE;
  }

  function tileOffsetSmooth(t) {
    // t is a float tile index
    return Math.sin((t / PERIOD) * 2 * Math.PI) * AMPLITUDE;
  }

  // ---- Scenery definitions (repeating every PERIOD tiles) ----
  // fence posts: at every 1 tile, left and right
  // tree: at tile 0, left side
  // gate: at tile PERIOD/2, center

  function newGame() {
    shakeAmt = 0; zoom = 1; hitStop = 0; flashes = [];
    state = {
      phase: 'title',   // title | play | over | cta
      // scroll position in tiles (float)
      scroll: 0,
      // player x position (relative to canvas center)
      playerX: 0,
      // player is walking (holding touch/mouse)
      walking: false,
      // how far off-path the player has strayed (0..1)
      offPath: 0,
      score: 0,
      // distance accumulated in tiles
      dist: 0,
      overAt: 0,
      stepCount: 0,    // for calm sound timing
      stepTick: 0,
    };
    botRunsDone = 0;
    if (DEMO) {
      startRun();
      return;
    }
    if (BOT) {
      startRun();
    }
  }

  function startRun() {
    state.phase = 'play';
    state.scroll = 0;
    state.playerX = 0;
    state.dist = 0;
    state.score = 0;
    state.walking = false;
    state.offPath = 0;
    state.stepCount = 0;
    state.stepTick = 0;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function gameOver() {
    if (state.phase !== 'play') return;
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 5;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = state.score;
      // After score display, show CTA card
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 600);
      }
    }
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size || 32, t: 0 });
  }

  // ---- Input ----
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  var touchActive = false;

  function pointerDown(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      touchActive = true;
      state.walking = true;
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      resetRun();
    }
  }

  function pointerUp() {
    if (DEMO || BOT) return;
    touchActive = false;
    if (state.phase === 'play') {
      state.walking = false;
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    pointerDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointerup', pointerUp);
  window.addEventListener('pointercancel', pointerUp);
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      if (state.phase === 'play') { state.walking = true; }
      else pointerDown();
    }
  });
  window.addEventListener('keyup', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      state.walking = false;
    }
  });

  // ---- Bot / Demo autopilots ----
  // Bot: walk for K tiles then lift (causing a drift-off), then game_over fires
  var BOT_WALK_TILES = 18;    // bot walks this many tiles, then releases
  var BOT_RELEASED = false;
  // Demo: walk the calm arc, do NOT release — demo ends via timeout-triggered gameOver
  var DEMO_WALK_TILES = 22;   // demo walks this many tiles then we trigger a gentle fade-out game_over
  var DEMO_TRIGGERED_END = false;

  function autopilot(dt) {
    if (state.phase !== 'play') return;
    if (DEMO) {
      // Demo walks forward calmly, then triggers game_over via "stepping off"
      // so that the demo arc completes and the CTA shows
      if (!DEMO_TRIGGERED_END && state.dist >= DEMO_WALK_TILES) {
        DEMO_TRIGGERED_END = true;
        // Gently drift off path over next ~1s then call gameOver
        state.demoFinalDrift = true;
      }
      if (state.demoFinalDrift) {
        // Drift player off path
        state.playerX += 1.5 * dt;
        state.walking = false;
        // offPath will naturally increase as player drifts past edge
        // game_over is called from the update logic when offPath >= 1
      } else {
        state.walking = true;
        // Keep player centered on path with slight natural wobble
        var targetX = tileOffsetSmooth(state.scroll);
        var err = targetX - state.playerX;
        state.playerX += err * 0.07 * dt + (rng() - 0.5) * 0.4;
      }
    } else if (BOT) {
      if (!BOT_RELEASED && state.dist < BOT_WALK_TILES) {
        state.walking = true;
        // Follow path center with slight imperfection
        var tgt = tileOffsetSmooth(state.scroll);
        var er = tgt - state.playerX;
        state.playerX += er * 0.1 * dt + (rng() - 0.5) * 0.5;
      } else {
        // Release — stop walking AND drift off-path so game_over fires
        BOT_RELEASED = true;
        state.walking = false;
        // actively drift off
        state.playerX += 2.5 * dt;
      }
    }
  }

  // ---- Render helpers ----
  function drawBg() {
    // Sky gradient
    var sky = cx.createLinearGradient(0, 0, 0, H * 0.55);
    sky.addColorStop(0, '#0e1520');
    sky.addColorStop(1, '#1a2a3a');
    cx.fillStyle = sky; cx.fillRect(0, 0, W, H);
    // Ground gradient
    var gnd = cx.createLinearGradient(0, H * 0.55, 0, H);
    gnd.addColorStop(0, '#1c2e1c');
    gnd.addColorStop(1, '#111a11');
    cx.fillStyle = gnd; cx.fillRect(0, H * 0.55, W, H * 0.45);
  }

  // Horizon line where sky meets ground
  var HORIZON_Y = H * 0.52;
  // Perspective: path converges toward vanishing point at top of screen
  var VP_X = W / 2;  // vanishing point x (center)
  var VP_Y = H * 0.28; // vanishing point y

  // Project a world point (wx, wz) to screen (sx, sy)
  // wz = 0 is the player's position (bottom), wz = 1 is far horizon
  function project(wx, wz) {
    var sy = VP_Y + (H - VP_Y) * (1 - wz);
    var sx = VP_X + (wx - VP_X) * (1 - wz);
    // Actually let's use a simpler model:
    // sy = HORIZON_Y + (H - HORIZON_Y) * (1 - wz)  [wz=0→bottom, wz=1→horizon]
    var fy = HORIZON_Y + (H - HORIZON_Y) * (1 - wz);
    // perspective scale
    var pScale = 1 - wz * 0.85;
    var fx = W / 2 + wx * pScale;
    return { x: fx, y: fy, s: pScale };
  }

  // Draw path tiles (the walkable lane in perspective)
  function drawPath(scroll) {
    // Draw from bottom (near) to top (far), ~10 tiles visible
    var NUM_TILES_VISIBLE = 10;
    cx.save();

    for (var i = 0; i < NUM_TILES_VISIBLE; i++) {
      // tile i: i=0 is at the player (bottom), i=NUM_TILES_VISIBLE-1 is near horizon
      var wz0 = i / NUM_TILES_VISIBLE;
      var wz1 = (i + 1) / NUM_TILES_VISIBLE;
      var tileNum0 = scroll + i;
      var tileNum1 = scroll + i + 1;

      var cx0 = tileOffsetSmooth(tileNum0); // path center at near edge
      var cx1 = tileOffsetSmooth(tileNum1); // path center at far edge

      // Four corners of the path tile
      var p00 = project(cx0 - PATH_W / 2, wz0);
      var p01 = project(cx0 + PATH_W / 2, wz0);
      var p10 = project(cx1 - PATH_W / 2, wz1);
      var p11 = project(cx1 + PATH_W / 2, wz1);

      // Alternate tile shading for rhythm
      var isOdd = Math.floor(tileNum0) % 2;
      var brightness = 0.18 + 0.06 * (1 - wz0);
      cx.beginPath();
      cx.moveTo(p00.x, p00.y);
      cx.lineTo(p01.x, p01.y);
      cx.lineTo(p11.x, p11.y);
      cx.lineTo(p10.x, p10.y);
      cx.closePath();
      cx.fillStyle = isOdd ? 'rgba(46,197,182,' + (brightness * 0.7) + ')' : 'rgba(46,197,182,' + (brightness * 0.45) + ')';
      cx.fill();

      // Path edges (the comforting lane lines)
      cx.strokeStyle = 'rgba(46,197,182,' + (0.25 * (1 - wz0)) + ')';
      cx.lineWidth = 1;
      cx.beginPath();
      cx.moveTo(p00.x, p00.y); cx.lineTo(p10.x, p10.y);
      cx.stroke();
      cx.beginPath();
      cx.moveTo(p01.x, p01.y); cx.lineTo(p11.x, p11.y);
      cx.stroke();
    }
    cx.restore();
  }

  // Draw fence posts alongside the path
  function drawFence(scroll) {
    cx.save();
    var NUM_TILES = 10;
    for (var i = 1; i < NUM_TILES; i++) {
      var wz = i / NUM_TILES;
      var tileNum = scroll + i;
      var pathCx = tileOffsetSmooth(tileNum);
      var pScale = 1 - wz * 0.85;

      // Left and right fence posts
      var sides = [-1, 1];
      for (var s = 0; s < 2; s++) {
        var side = sides[s];
        var postX = pathCx + side * (PATH_W / 2 + 8);
        var p = project(postX, wz);
        var ph = 28 * pScale;
        var pw = 5 * pScale;
        var alpha = 0.6 * (1 - wz * 0.5);
        cx.fillStyle = 'rgba(180,160,120,' + alpha + ')';
        cx.fillRect(p.x - pw / 2, p.y - ph, pw, ph);
        // Post cap
        cx.fillStyle = 'rgba(220,200,150,' + alpha + ')';
        cx.fillRect(p.x - pw / 2 - 1, p.y - ph - 3, pw + 2, 4);
        // Horizontal rail connecting to previous post (for continuity)
        if (i < NUM_TILES - 1) {
          var wz2 = (i + 1) / NUM_TILES;
          var tileNum2 = scroll + i + 1;
          var pathCx2 = tileOffsetSmooth(tileNum2);
          var postX2 = pathCx2 + side * (PATH_W / 2 + 8);
          var p2 = project(postX2, wz2);
          var railY0 = p.y - ph * 0.65;
          var railY2 = p2.y - (28 * (1 - wz2 * 0.85)) * 0.65;
          cx.strokeStyle = 'rgba(180,160,120,' + (alpha * 0.7) + ')';
          cx.lineWidth = 2 * pScale;
          cx.beginPath();
          cx.moveTo(p.x, railY0);
          cx.lineTo(p2.x, railY2);
          cx.stroke();
        }
      }
    }
    cx.restore();
  }

  // Draw trees (at specific scenic spots in the loop)
  function drawTrees(scroll) {
    cx.save();
    var NUM_TILES = 10;
    for (var i = 2; i < NUM_TILES; i++) {
      var tileNum = Math.floor(scroll + i);
      var loopPos = ((tileNum % PERIOD) + PERIOD) % PERIOD;
      // Tree at loop position 3 (left) and 9 (right)
      if (loopPos === 3 || loopPos === 9) {
        var wz = i / NUM_TILES;
        var pathCx = tileOffsetSmooth(scroll + i);
        var side = (loopPos === 3) ? -1 : 1;
        var treeX = pathCx + side * (PATH_W / 2 + 30);
        var p = project(treeX, wz);
        var pScale = 1 - wz * 0.85;
        var alpha = 0.8 * (1 - wz * 0.4);

        // Trunk
        cx.fillStyle = 'rgba(100,70,40,' + alpha + ')';
        var th = 40 * pScale, tw = 7 * pScale;
        cx.fillRect(p.x - tw / 2, p.y - th, tw, th);

        // Canopy
        cx.fillStyle = 'rgba(30,80,40,' + alpha + ')';
        var cr = 22 * pScale;
        cx.beginPath();
        cx.arc(p.x, p.y - th - cr * 0.4, cr, 0, Math.PI * 2);
        cx.fill();
        // Lighter canopy highlight
        cx.fillStyle = 'rgba(46,110,55,' + (alpha * 0.6) + ')';
        cx.beginPath();
        cx.arc(p.x + cr * 0.2, p.y - th - cr * 0.55, cr * 0.65, 0, Math.PI * 2);
        cx.fill();
      }
    }
    cx.restore();
  }

  // Draw gate (at loop position 6, center of path)
  function drawGate(scroll) {
    cx.save();
    var NUM_TILES = 10;
    for (var i = 2; i < NUM_TILES; i++) {
      var tileNum = Math.floor(scroll + i);
      var loopPos = ((tileNum % PERIOD) + PERIOD) % PERIOD;
      if (loopPos === 6) {
        var wz = i / NUM_TILES;
        var pathCx = tileOffsetSmooth(scroll + i);
        var p = project(pathCx, wz);
        var pScale = 1 - wz * 0.85;
        var alpha = 0.85 * (1 - wz * 0.3);

        var gw = PATH_W * pScale * 0.9;
        var gh = 45 * pScale;
        var gx = p.x - gw / 2;
        var gy = p.y - gh;

        // Gate posts
        cx.fillStyle = 'rgba(180,160,120,' + alpha + ')';
        cx.fillRect(gx, gy, 7 * pScale, gh);
        cx.fillRect(gx + gw - 7 * pScale, gy, 7 * pScale, gh);
        // Gate horizontal bars
        cx.strokeStyle = 'rgba(200,180,130,' + alpha + ')';
        cx.lineWidth = 3 * pScale;
        cx.beginPath();
        cx.moveTo(gx, gy + gh * 0.25); cx.lineTo(gx + gw, gy + gh * 0.25);
        cx.stroke();
        cx.beginPath();
        cx.moveTo(gx, gy + gh * 0.6); cx.lineTo(gx + gw, gy + gh * 0.6);
        cx.stroke();
        // Gate arch
        cx.strokeStyle = 'rgba(200,180,130,' + (alpha * 0.7) + ')';
        cx.lineWidth = 2 * pScale;
        cx.beginPath();
        cx.arc(p.x, gy + 2, gw / 2, Math.PI, 0);
        cx.stroke();

        // Golden glow around gate (reward feel)
        cx.shadowColor = 'rgba(242,177,52,0.4)';
        cx.shadowBlur = 15 * pScale;
        cx.strokeStyle = 'rgba(242,177,52,' + (alpha * 0.5) + ')';
        cx.lineWidth = 1;
        cx.beginPath();
        cx.arc(p.x, gy + 2, gw / 2, Math.PI, 0);
        cx.stroke();
        cx.shadowBlur = 0;
      }
    }
    cx.restore();
  }

  // Draw player
  function drawPlayer(playerX) {
    // Player sits at the bottom of the path
    var py = H - 60;
    var pathCx = tileOffsetSmooth(state.scroll);
    var px = W / 2 + (playerX - pathCx) * 0.3 + pathCx * 0.6;
    // Simpler: player screen x is just offset from canvas center following the path
    px = W / 2 + playerX * 0.5;

    cx.save();
    // Soft glow
    cx.shadowColor = TEAL;
    cx.shadowBlur = state.walking ? 18 : 8;

    // Body circle
    cx.beginPath();
    cx.arc(px, py, PLAYER_R, 0, Math.PI * 2);
    cx.fillStyle = state.walking ? TEAL : 'rgba(46,197,182,0.7)';
    cx.fill();

    // Inner highlight
    cx.shadowBlur = 0;
    cx.beginPath();
    cx.arc(px - 4, py - 4, PLAYER_R * 0.4, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.fill();

    // Walking bob (pulse when moving)
    if (state.walking) {
      var bob = Math.sin(Date.now() / 120) * 2;
      cx.beginPath();
      cx.arc(px, py + bob, PLAYER_R + 4, 0, Math.PI * 2);
      cx.strokeStyle = 'rgba(46,197,182,0.25)';
      cx.lineWidth = 2;
      cx.stroke();
    }
    cx.restore();

    // Off-path warning glow (red tint at edges)
    if (state.offPath > 0.5) {
      var warn = (state.offPath - 0.5) * 2;
      cx.save();
      cx.globalAlpha = warn * 0.3;
      cx.fillStyle = '#e8502e';
      cx.fillRect(0, 0, W, H);
      cx.restore();
    }
  }

  // Draw soft ambient particles (calm visual)
  var particles = [];
  for (var pi = 0; pi < 12; pi++) {
    particles.push({
      x: rng() * W,
      y: rng() * H,
      r: 1 + rng() * 2,
      speed: 0.1 + rng() * 0.2,
      alpha: 0.1 + rng() * 0.2,
      phase: rng() * Math.PI * 2,
    });
  }

  function drawParticles(now) {
    cx.save();
    for (var pi = 0; pi < particles.length; pi++) {
      var p = particles[pi];
      p.y -= p.speed;
      if (p.y < -10) { p.y = H + 10; p.x = rng() * W; }
      var a = p.alpha * (0.5 + 0.5 * Math.sin(now / 1000 + p.phase));
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(46,197,182,' + a + ')';
      cx.fill();
    }
    cx.restore();
  }

  // Distance label (score)
  function drawScore() {
    cx.save();
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.font = '800 56px -apple-system, Helvetica, Arial';
    cx.fillText(state.score, W / 2, 90);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('STEPS', W / 2, 110);
    cx.restore();
  }

  // ---- Main update loop ----
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Run autopilot before hitStop check
    if (state.phase === 'play') {
      autopilot(dt);
    }

    // hitStop freeze / decay
    if (hitStop > 0) {
      hitStop -= dt;
    } else if (state.phase === 'play') {
      // Advance scroll if walking
      if (state.walking) {
        state.scroll += SCROLL_SPEED * dt / PATH_TILE_H * 0.8;
        state.dist = state.scroll;
        state.score = Math.floor(state.dist);

        // Calm step sound every ~1.5 tiles
        state.stepTick += dt;
        if (state.stepTick > 24) {
          state.stepTick = 0;
          state.stepCount++;
          if (window.J) J.calm(state.stepCount);
          // Milestone flash every 5 steps
          if (state.score > 0 && state.score % 5 === 0 && state.score !== state.lastFlashScore) {
            state.lastFlashScore = state.score;
            flash('' + state.score + ' steps', TEAL, 28);
            hitStop = 2; zoom = 1.01;
          }
        }
      }

      // Player follows path center loosely when walking (natural drift)
      var pathCx = tileOffsetSmooth(state.scroll);
      if (state.walking) {
        // Drift player toward path center slowly
        state.playerX += (pathCx - state.playerX) * 0.03 * dt;
      }

      // Compute off-path amount
      var relX = state.playerX - pathCx;
      var maxRelX = LANE_W / 2;
      state.offPath = Math.abs(relX) / maxRelX;

      // If player strays off path, they fall off (game over)
      if (state.offPath >= 1.0) {
        // Walked off the path
        if (window.LOOP) LOOP.emit('near_miss', { dist: state.score });
        gameOver();
      }

      // If player stops walking for too long while off-center, drift further
      if (!state.walking && state.offPath > 0.3) {
        state.playerX += (state.playerX > pathCx ? 1 : -1) * 0.8 * dt;
      }
    }

    // ---- DRAW ----
    cx.save();

    // Juice transforms
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.1 * dt;

    // Background
    drawBg();
    drawParticles(now);

    if (state.phase === 'play' || state.phase === 'over') {
      drawPath(state.scroll);
      drawFence(state.scroll);
      drawTrees(state.scroll);
      drawGate(state.scroll);
      drawPlayer(state.playerX);
      drawScore();
    }

    // Title screen
    if (state.phase === 'title') {
      drawBg();
      // Draw still path scene
      drawPath(0);
      drawFence(0);
      drawTrees(0);
      drawGate(0);
      drawPlayer(0);

      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(11,13,18,0.6)';
      cx.fillRect(0, 230, W, 160);
      cx.fillStyle = '#fff';
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('FENCE WALK', W / 2, 285);
      cx.fillStyle = 'rgba(255,255,255,0.6)';
      cx.font = '500 15px -apple-system, Helvetica, Arial';
      cx.fillText('hold to walk the path', W / 2, 318);
      var pulse = 0.55 + 0.45 * Math.sin(now / 400);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('HOLD TO BEGIN', W / 2, 358);
      cx.globalAlpha = 1;
    }

    // Over screen
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('DRIFTED OFF.', W / 2, 290);
      cx.fillStyle = '#fff';
      cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' steps', W / 2, 335);
      cx.fillStyle = GOLD;
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('the path always comes back', W / 2, 368);
      if (!DEMO && !BOT) {
        var pulse2 = 0.55 + 0.45 * Math.sin(now / 350);
        cx.globalAlpha = pulse2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('HOLD TO WALK AGAIN', W / 2, 420);
        cx.globalAlpha = 1;
      }
    }

    // Demo CTA card (calm invitation)
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('FENCE WALK', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '500 17px -apple-system, Helvetica, Arial';
      cx.fillText('the path always leads home.', W / 2, 332);
      var pulse3 = 0.7 + 0.3 * Math.sin(now / 300);
      cx.globalAlpha = ease * pulse3;
      cx.fillStyle = TEAL;
      cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // Floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.save();
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.5);
      cx.restore();
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
