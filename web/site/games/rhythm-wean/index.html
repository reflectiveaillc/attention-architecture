<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // palette
  var INK  = '#0b0d12';
  var TEAL = '#2ec5b6';
  var GOLD = '#f2b134';

  // ---- game constants ----
  var TOTAL_BEATS = 32;
  var BPM         = 72;          // calm tempo
  var BEAT_MS     = 60000 / BPM; // ~833ms per beat
  var HIT_WINDOW  = 220;         // ms either side of the beat = generous window
  var RING_CX = W / 2, RING_CY = 310;
  var RING_R  = 120;

  // ---- state ----
  var phase, beatsCaught, runStartTs, runEndTs;
  var lastBeatTime, nextBeatIdx, gameScore;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var particles = [];  // floating reward text + ring sparks
  var ctaAt = 0, botRunsDone = 0;
  var demoAt = 0;

  // ring glow animation state
  var ringGlow = 0;   // 0..1, decays
  var resolveGlow = 0; // 0..1 — lights up on completion

  // ---- init ----
  function newGame() {
    phase        = DEMO ? 'demo_settle' : (BOT ? 'play' : 'title');
    beatsCaught  = 0;
    gameScore    = 0;
    particles    = [];
    hitStop      = 0; zoom = 1; shakeAmt = 0;
    ringGlow     = 0; resolveGlow = 0;
    nextBeatIdx  = 0;
    lastBeatTime = 0;

    if (DEMO) {
      demoAt = performance.now();
      // settle phase: 2s of ambient, then auto-play the ring
      setTimeout(function () {
        startRun();
        phase = 'demo_play';
      }, 2000);
      return;
    }
    if (BOT) {
      startRun();
      return;
    }
  }

  function startRun() {
    beatsCaught  = 0;
    gameScore    = 0;
    particles    = [];
    hitStop      = 0; zoom = 1; shakeAmt = 0;
    ringGlow     = 0; resolveGlow = 0;
    nextBeatIdx  = 0;
    lastBeatTime = performance.now();
    runStartTs   = Date.now();
    if (!DEMO) phase = 'play';
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- completion & game over ----
  function onComplete() {
    // Player caught enough beats to complete the ring
    phase      = 'resolve';
    runEndTs   = Date.now();
    gameScore  = beatsCaught;
    resolveGlow = 1;
    zoom = 1.04; shakeAmt = 3; hitStop = 8;  // gentle pulse
    if (window.J) J.calm(beatsCaught);
    spawnBurst(RING_CX, RING_CY, 24, TEAL);
    floatText('+RING COMPLETE', TEAL, 36);
    var dur = (runEndTs - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: gameScore, dur_s: +dur.toFixed(1) });
    if (window.LOOP) LOOP.emit('ring_complete', { beats: beatsCaught });

    if (DEMO) {
      window.__demoScore = gameScore;
      setTimeout(function () {
        phase = 'demo_cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
      return;
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else { setTimeout(function () { newBotRun(); }, 900); }
      return;
    }
    // human: show over screen
    setTimeout(function () { phase = 'over'; }, 1800);
  }

  function onGameOver() {
    // Bot or natural lose: ran out of beats without completing (missed too many)
    phase    = 'over';
    runEndTs = Date.now();
    var dur  = (runEndTs - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: beatsCaught, dur_s: +dur.toFixed(1) });
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else { setTimeout(function () { newBotRun(); }, 600); }
    }
  }

  function newBotRun() {
    startRun();
  }

  // ---- beat logic ----
  // Returns ms until next beat relative to `now`
  function msToBeat(now) {
    if (lastBeatTime === 0) return 9999;
    var elapsed = now - lastBeatTime;
    var beatNum = Math.floor(elapsed / BEAT_MS);
    var nextBeatMs = (beatNum + 1) * BEAT_MS;
    return nextBeatMs - elapsed;
  }

  function currentBeatPhase(now) {
    // 0..1 where 0=exact beat, 0.5=halfway between beats
    if (lastBeatTime === 0) return 0.5;
    var elapsed = (now - lastBeatTime) % BEAT_MS;
    return elapsed / BEAT_MS;
  }

  // returns fractional beat index (how far into beat 0..TOTAL_BEATS)
  function beatFraction(now) {
    if (lastBeatTime === 0) return 0;
    return (now - lastBeatTime) / BEAT_MS;
  }

  // ---- tap / hit detection ----
  function tryHit(now) {
    if (phase !== 'play' && phase !== 'demo_play') return;
    if (beatsCaught >= TOTAL_BEATS) return;
    var elapsed = now - lastBeatTime;
    // find nearest beat
    var beatNum = Math.round(elapsed / BEAT_MS);
    var beatT   = beatNum * BEAT_MS;
    var diff    = Math.abs(elapsed - beatT);
    if (diff <= HIT_WINDOW) {
      // Hit!
      beatsCaught++;
      var frac = beatsCaught / TOTAL_BEATS;
      ringGlow = 1.0;
      hitStop  = 3;
      zoom     = 1.02;
      if (window.J) J.calm(beatsCaught);
      // floating text every 8 beats
      if (beatsCaught % 8 === 0 && beatsCaught < TOTAL_BEATS) {
        floatText('+' + beatsCaught, TEAL, 28);
        spawnBurst(RING_CX, RING_CY, 8, TEAL);
      }
      if (window.LOOP) LOOP.emit('beat_caught', { n: beatsCaught, diff_ms: Math.round(diff) });
      if (beatsCaught >= TOTAL_BEATS) { onComplete(); }
    } else {
      // Near miss or miss
      if (diff < HIT_WINDOW * 2.2) {
        if (window.LOOP) LOOP.emit('near_miss', { n: beatsCaught, diff_ms: Math.round(diff) });
        floatText('~', 'rgba(255,255,255,0.4)', 24);
      }
    }
  }

  // ---- particles ----
  function floatText(txt, color, size) {
    particles.push({ type: 'text', txt: txt, color: color, size: size,
      x: RING_CX + (rng() - 0.5) * 60,
      y: RING_CY - 50, vy: -0.6, t: 0, life: 55 });
  }

  function spawnBurst(cx2, cy2, n, color) {
    for (var i = 0; i < n; i++) {
      var angle = (i / n) * Math.PI * 2 + rng() * 0.3;
      var speed = 1.2 + rng() * 1.8;
      particles.push({ type: 'dot', x: cx2, y: cy2,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        color: color, r: 2.5 + rng() * 2, t: 0, life: 45 });
    }
  }

  // ---- autopilot ----
  // Demo & Bot autopilot: tap at appropriate beat moments
  var lastAutoBeat = -1;
  var botMissChance = 0.18;   // bot misses ~18% of beats so it doesn't always win
  var botActionsLeft = TOTAL_BEATS + 2; // bot always runs through all beats

  function autopilot(now) {
    if (phase !== 'play' && phase !== 'demo_play') return;
    if (beatsCaught >= TOTAL_BEATS) return;
    var elapsed = now - lastBeatTime;
    var beatNum = Math.floor(elapsed / BEAT_MS);
    if (beatNum === lastAutoBeat) return;   // already acted this beat
    // Tap slightly after the beat for human feel
    var timeInBeat = elapsed - beatNum * BEAT_MS;
    var targetOffset = DEMO ? (40 + rng() * 60) : (30 + rng() * 80); // ms after beat
    if (timeInBeat >= targetOffset) {
      lastAutoBeat = beatNum;
      if (DEMO) {
        // Demo always hits — calm arc
        tryHit(now);
      } else if (BOT) {
        // Bot misses occasionally so the game can end naturally via onGameOver
        if (rng() > botMissChance) {
          tryHit(now);
        } else {
          // deliberate miss — will naturally push toward game over when beats exhaust
          if (window.LOOP) LOOP.emit('beat_missed', { n: beatsCaught, beat: beatNum });
        }
      }
    }
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, px, py) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); phase = 'play'; return; }
    if (phase === 'play') { tryHit(performance.now()); return; }
    if (phase === 'over' && performance.now() - (runEndTs || 0) > 400) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: gameScore, unit: 'beats' }); return;
      }
      resetHuman();
    }
  }

  function resetHuman() {
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
    phase = 'play';
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- render helpers ----
  function drawRing(now) {
    var frac = beatsCaught / TOTAL_BEATS;
    var beatPh = currentBeatPhase(now);   // 0..1
    // pulse: ring radius breathes with the beat
    var pulse = Math.sin(beatPh * Math.PI) * 0.05;
    var r = RING_R * (1 + pulse);

    // background dim circle
    cx.save();
    cx.globalAlpha = 0.12;
    cx.strokeStyle = TEAL;
    cx.lineWidth = 18;
    cx.beginPath();
    cx.arc(RING_CX, RING_CY, r, 0, Math.PI * 2);
    cx.stroke();
    cx.restore();

    if (frac > 0) {
      // filled arc representing completion
      var endAngle = -Math.PI / 2 + frac * Math.PI * 2;
      // glow layer
      if (ringGlow > 0) {
        cx.save();
        cx.globalAlpha = ringGlow * 0.45;
        cx.strokeStyle = '#88ffee';
        cx.lineWidth = 28;
        cx.lineCap = 'round';
        cx.beginPath();
        cx.arc(RING_CX, RING_CY, r, -Math.PI / 2, endAngle);
        cx.stroke();
        cx.restore();
      }
      // main arc
      cx.save();
      cx.globalAlpha = 0.85 + ringGlow * 0.15;
      cx.strokeStyle = TEAL;
      cx.lineWidth = 14;
      cx.lineCap = 'round';
      cx.beginPath();
      cx.arc(RING_CX, RING_CY, r, -Math.PI / 2, endAngle);
      cx.stroke();
      cx.restore();
    }

    // resolve: full ring explosion glow
    if (resolveGlow > 0) {
      cx.save();
      cx.globalAlpha = resolveGlow * 0.7;
      cx.strokeStyle = '#aafff4';
      cx.lineWidth = 22 + resolveGlow * 20;
      cx.beginPath();
      cx.arc(RING_CX, RING_CY, r, 0, Math.PI * 2);
      cx.stroke();
      cx.restore();
    }

    // beat marker dot — rotates around the ring
    var markerAngle = -Math.PI / 2 + beatPh * Math.PI * 2;
    var mx = RING_CX + Math.cos(markerAngle) * r;
    var my = RING_CY + Math.sin(markerAngle) * r;
    cx.save();
    cx.globalAlpha = 0.6 + 0.4 * Math.sin(beatPh * Math.PI);
    cx.fillStyle = beatsCaught >= TOTAL_BEATS ? GOLD : '#ffffff';
    cx.beginPath();
    cx.arc(mx, my, 7, 0, Math.PI * 2);
    cx.fill();
    cx.restore();
  }

  function drawParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.t += dt;
      var a = Math.max(0, 1 - p.t / p.life);
      if (p.type === 'text') {
        p.y += p.vy * dt;
        cx.save();
        cx.globalAlpha = a;
        cx.textAlign = 'center';
        cx.fillStyle = p.color;
        cx.font = '700 ' + (p.size) + 'px -apple-system, Helvetica, Arial';
        cx.fillText(p.txt, p.x, p.y);
        cx.restore();
      } else if (p.type === 'dot') {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 0.04 * dt;
        cx.save();
        cx.globalAlpha = a;
        cx.fillStyle = p.color;
        cx.beginPath();
        cx.arc(p.x, p.y, p.r * (1 - p.t / p.life * 0.5), 0, Math.PI * 2);
        cx.fill();
        cx.restore();
      }
      if (p.t >= p.life) particles.splice(i, 1);
    }
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // advance beat clock (for completed ring, keep pulsing)
    if ((phase === 'play' || phase === 'demo_play') && lastBeatTime > 0) {
      // advance nextBeatIdx for event tracking
      var elapsed = now - lastBeatTime;
      var beatNum = Math.floor(elapsed / BEAT_MS);
      if (beatNum > nextBeatIdx) {
        nextBeatIdx = beatNum;
        if (window.J) J.calm(beatsCaught % 8);
        // if total beats have passed and ring not complete → natural end
        if (nextBeatIdx >= TOTAL_BEATS && beatsCaught < TOTAL_BEATS && phase !== 'resolve') {
          onGameOver();
        }
      }
    }

    // autopilot for demo / bot
    if ((DEMO || BOT) && (phase === 'play' || phase === 'demo_play') && hitStop <= 0) {
      autopilot(now);
    }

    // decay hit-stop, shake, zoom, glows
    if (hitStop > 0) hitStop -= dt; else {
      // hitStop expired: no further autopilot blocking needed
    }
    shakeAmt  *= Math.pow(0.82, dt);
    zoom      += (1 - zoom) * 0.10 * dt;
    ringGlow  *= Math.pow(0.88, dt);
    resolveGlow *= Math.pow(0.96, dt);

    // juice transforms
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    // subtle ambient gradient
    var bg = cx.createRadialGradient(RING_CX, RING_CY, 20, RING_CX, RING_CY, 340);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '700 36px -apple-system, Helvetica, Arial';
      cx.fillText('RHYTHM WEAN', W / 2, 210);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('tap on each pulse. complete the ring.', W / 2, 245);
      // static dim ring preview
      cx.globalAlpha = 0.15;
      cx.strokeStyle = TEAL; cx.lineWidth = 14;
      cx.beginPath(); cx.arc(RING_CX, RING_CY, RING_R, 0, Math.PI * 2); cx.stroke();
      cx.globalAlpha = 1;
      // pulse CTA
      var p0 = 0.55 + 0.45 * Math.sin(now / 700);
      cx.globalAlpha = p0;
      cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO BEGIN', W / 2, H - 200);
      cx.globalAlpha = 1;
    }

    // ---- DEMO SETTLE ----
    if (phase === 'demo_settle') {
      cx.textAlign = 'center';
      var settleT = (now - demoAt) / 1000;
      cx.globalAlpha = Math.min(1, settleT * 0.8);
      cx.fillStyle = 'rgba(46,197,182,0.08)';
      cx.fillRect(0, 0, W, H);
      // show ring quietly pulsing
      cx.globalAlpha = Math.min(0.18, settleT * 0.09);
      cx.strokeStyle = TEAL; cx.lineWidth = 14;
      cx.beginPath(); cx.arc(RING_CX, RING_CY, RING_R, 0, Math.PI * 2); cx.stroke();
      cx.globalAlpha = 1;
    }

    // ---- PLAY ----
    if (phase === 'play' || phase === 'demo_play') {
      drawRing(now);
      // beat counter
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '700 52px -apple-system, Helvetica, Arial';
      cx.fillText(beatsCaught, W / 2, 130);
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('/ ' + TOTAL_BEATS + ' BEATS', W / 2, 155);
      // beat pulse indicator at bottom
      var beatPh = currentBeatPhase(now);
      var bpulse = Math.sin(beatPh * Math.PI);
      var dotY = H - 160;
      cx.save();
      cx.globalAlpha = 0.35 + bpulse * 0.65;
      cx.fillStyle = TEAL;
      cx.beginPath();
      cx.arc(W / 2, dotY, 6 + bpulse * 4, 0, Math.PI * 2);
      cx.fill();
      cx.restore();
      // tap hint (only early)
      if (beatsCaught < 4 && !BOT) {
        var hintA = 0.4 + 0.3 * Math.sin(now / 400);
        cx.globalAlpha = hintA;
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.font = '500 13px -apple-system, Helvetica, Arial';
        cx.fillText('tap the pulse', W / 2, H - 130);
        cx.globalAlpha = 1;
      }
    }

    // ---- RESOLVE (completion glow) ----
    if (phase === 'resolve') {
      drawRing(now);
      cx.textAlign = 'center';
      cx.fillStyle = GOLD;
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(beatsCaught, W / 2, 130);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('RING COMPLETE', W / 2, 155);
    }

    // ---- OVER ----
    if (phase === 'over') {
      drawRing(now);
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      if (beatsCaught >= TOTAL_BEATS) {
        cx.fillStyle = GOLD;
        cx.font = '800 36px -apple-system, Helvetica, Arial';
        cx.fillText('COMPLETE', W / 2, 292);
      } else {
        cx.fillStyle = TEAL;
        cx.font = '800 36px -apple-system, Helvetica, Arial';
        cx.fillText('SO CLOSE', W / 2, 292);
      }
      cx.fillStyle = '#fff';
      cx.font = '700 24px -apple-system, Helvetica, Arial';
      cx.fillText(beatsCaught + ' / ' + TOTAL_BEATS + ' beats', W / 2, 338);
      cx.fillStyle = GOLD;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText(beatsCaught >= TOTAL_BEATS ? 'the loop ends here.' : 'the ring wants finishing.', W / 2, 378);

      if (!DEMO && !BOT) {
        var pp = 0.6 + 0.4 * Math.sin(now / 400);
        cx.globalAlpha = pp;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — TRY AGAIN', W / 2, 438);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.13)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- DEMO CTA ----
    if (phase === 'demo_cta') {
      var t2 = (now - ctaAt) / 1000, ease = Math.min(1, t2 * 2.5);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '700 40px -apple-system, Helvetica, Arial';
      cx.fillText('RHYTHM WEAN', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '500 17px -apple-system, Helvetica, Arial';
      cx.fillText('tap 32 pulses. finish the loop.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 340);
      cx.globalAlpha = ease * p3;
      cx.fillStyle = TEAL;
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 406);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // particles on top
    drawParticles(dt);

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
