<script>
(function () {
  'use strict';

  // mulberry32 seeded RNG
  function mulberry32(a) {

      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;

  // ---- game state ----

  var ROUNDS = 3;
  var WINDOW_MS = 400;   // ±400ms = valid tap window
  var PERFECT_MS = 30;   // within 30ms = "PERFECT"

  function newGame() {

  // Per-round drop timing: each round has a randomised build-up (2000–4500ms),
  // then the drop fires. Player taps any time; we record deviation.
  function startRound() {
    round++;
    buildDur = 2000 + rng() * 2500;   // 2.0–4.5 s
    buildT = 0;
    dropTriggered = false;
    tapRegistered = false;
    tapped = false;

  }

  // Called when the drop fires (visually + audibly)
  function fireDrop() {
    dropTriggered = true;
    dropFiredAt = performance.now();
    dropAt = dropFiredAt;
    if (window.J) { J.hit(1); J.tension(0); }
    shakeAmt = 3;
    zoom = 1.025;
    if (!tapped) {
      // Player hasn't tapped yet — if they tap within WINDOW_MS they still score
    }
    // After WINDOW_MS + a grace, close the window
    setTimeout(closeWindow, WINDOW_MS + 50);
  }

  // Close the timing window after drop
  function closeWindow() {
    if (tapRegistered) return; // already handled
    // Player never tapped (or tapped outside window) — record as miss
    if (!tapped || tapDev === null) {
      tapDev = 999;
    }
    finishRound(tapDev);
  }

  function finishRound(dev) {
    if (tapRegistered) return;
    tapRegistered = true;
    roundScores.push(dev);

    var isMiss = dev >= 999;
    var isPerfect = dev <= PERFECT_MS;
    var isNear = dev <= NEAR_MS && !isPerfect;

    if (window.J) {
      if (isMiss) J.near();
      else if (isPerfect) { hitStop = 60; J.perfect(1); }
      else if (isNear) J.near();
      else J.hit(1);
    }
    if (isPerfect) { hitStop = 60; zoom = 1.04; }
    if (isNear) shakeAmt = 3;

    var label = isMiss ? 'MISS' : isPerfect ? 'PERFECT' : isNear ? 'SO CLOSE' : dev + ' ms';
    var col   = isMiss ? VERM : isPerfect ? GOLD : isNear ? TEAL : '#fff';
    flash(label, col, 46);

    if (!isMiss && !isPerfect && !isNear && window.LOOP) {
      LOOP.emit('near_miss', { dev_ms: dev });
    }

    if (round < ROUNDS) {
      // Short gap then next round
      setTimeout(function () { if (phase === 'play') startRound(); }, 1200);
    } else {
      // All rounds done → game over
      setTimeout(endGame, 1200);
    }
  }

  function endGame() {
    // Score = best deviation across rounds (0 = perfection, 999 = all miss)
    var best999 = roundScores.reduce(function (b, v) { return Math.min(b, v); }, 999);
    var finalScore = best999;   // lower is better, 0 = perfect

    var isNewBest = finalScore < bestDev;
    if (isNewBest) { bestDev = finalScore; try { localStorage.setItem('dc_best', String(bestDev)); } catch (_) {} }

    var dur = (Date.now() - runStartTs) / 1000;

        setTimeout(function () { window.__demoDone = true; }, 3600); }, 2800);
      return;

    if (BOT) {
      botRunsDone++;
      phase = 'over';
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 600);

    phase = 'over';

    if (window.LOOP) LOOP.emit('restart', {});

  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };

  var demoScript = [68, 88, 'early'], demoIdx = 0;

            if (tapped) return;

            demoIdx++;
            demoTriggered = false;
            finishRound(tapDev);
          }, targetDelay);
        }
      }
    } else if (BOT) {
      if (tapped) return;
      if (dropTriggered && !demoTriggered) {
        demoTriggered = true;
        // imperfect bot: random offset ±120ms, sometimes misses

          if (tapped) return;
          tapped = true;
          demoTriggered = false;
          if (delay > WINDOW_MS) {
            tapDev = 999;
            finishRound(999);

            tapDev = Math.round(delay);

      } else if (!dropTriggered && !demoTriggered) {

          tapped = true;

          setTimeout(function () {
            demoTriggered = false;
            finishRound(999);
          }, 300);
        }
      }

    if (dev >= 999) return 99;
    return Math.max(1, Math.min(99, Math.round(100 * (dev / 300))));

  // ---- render helpers ----
  // Draw the build-up "anticipation" bar and noise
  function drawBuildUp(progress, t) {
    // Background pulse — noise intensifies as drop approaches
    var noiseA = progress * 0.18;
    cx.fillStyle = 'rgba(232,80,46,' + noiseA + ')';
    cx.fillRect(0, 0, W, H);

    cx.beginPath();
    cx.arc(cx2, cy2, radius + 20, 0, Math.PI * 2);
    cx.fill();

    // Countdown ring
    cx.save();
    cx.translate(W / 2, H / 2);

    cx.strokeStyle = 'rgba(255,255,255,0.08)';

    cx.strokeStyle = ringColor;
    cx.lineWidth = 6;
    cx.lineCap = 'round';
    cx.beginPath();
    cx.arc(0, 0, 100, -Math.PI / 2, arcEnd);
    cx.stroke();

    // Pulsing center dot
    var dotR = 12 + Math.sin(t / 80) * (3 + progress * 8);
    cx.fillStyle = ringColor;
    cx.globalAlpha = 0.8 + progress * 0.2;
    cx.beginPath();
    cx.arc(0, 0, dotR, 0, Math.PI * 2);
    cx.fill();
    cx.globalAlpha = 1;

    // Random noise particles near the drop
    if (progress > 0.5) {
      var n = Math.floor(progress * 12);
      for (var i = 0; i < n; i++) {
        var angle = (t * 0.003 + i * 0.52) % (Math.PI * 2);
        var dist = 120 + Math.sin(t * 0.007 + i) * 20;
        var px = Math.cos(angle) * dist;
        var py = Math.sin(angle) * dist;
        cx.fillStyle = GOLD;
        cx.globalAlpha = (progress - 0.5) * 0.8;
        cx.beginPath();
        cx.arc(px, py, 2 + i % 2, 0, Math.PI * 2);
        cx.fill();
        cx.globalAlpha = 1;

      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + 'ms', W / 2, H - 80);

    var fade = Math.max(0, 1 - elapsed / 400);

    // Big DROP text

    cx.globalAlpha = fade;
    cx.fillStyle = '#fff';
    cx.font = '900 72px -apple-system, Helvetica, Arial';
    cx.fillText('DROP', W / 2, H / 2 + 24);
    cx.globalAlpha = 1;

    // Tap prompt

      cx.fillStyle = VERM;
      cx.font = '800 22px -apple-system, Helvetica, Arial';
      var pulse = 0.7 + 0.3 * Math.sin(elapsed / 60);
      cx.globalAlpha = fade * pulse;
      cx.fillText('TAP NOW', W / 2, H / 2 + 70);

  // ---- main loop ----
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // decay juice

    if (hitStop < 0) hitStop = 0;
    shakeAmt *= Math.pow(0.83, dt);

      } else {

        if (window.J) J.tension(progress * 0.8);

    }

    // autopilot
    if (hitStop <= 0) {
      autopilot(dt);

    // juice transforms
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);

    if (phase === 'challenge') {
      // mirror-neuron beat 1: challenge card
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('41', W / 2, 410);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';

    }

    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('DROP CATCH', W / 2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '400 16px -apple-system, Helvetica, Arial';
      cx.fillText('tap the exact frame the beat drops.', W / 2, 320);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.globalAlpha = pulse;
      cx.fillText('TAP TO PLAY', W / 2, 370);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('best: ' + (bestDev >= 999 ? '—' : bestDev + ' ms'), W / 2, 402);
    }

    if (phase === 'play') {
      if (!dropTriggered) {
        var progress = Math.min(buildT / buildDur, 1);
        drawBuildUp(progress, now);
      } else {
        var elapsed = now - dropFiredAt;
        drawDropFlash(elapsed);
        // Round indicator still visible
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('ROUND ' + round + ' / ' + ROUNDS, W / 2, 80);
        // previous scores
        for (var ri = 0; ri < roundScores.length; ri++) {
          var sc2 = roundScores[ri];
          var scTxt2 = sc2 >= 999 ? 'MISS' : sc2 + 'ms';
          cx.fillStyle = sc2 < PERFECT_MS ? GOLD : sc2 < NEAR_MS ? TEAL : 'rgba(255,255,255,0.5)';
          cx.font = '700 13px Menlo, monospace';
          cx.fillText('R' + (ri + 1) + ': ' + scTxt2, W / 2, 100 + ri * 18);
        }
      }
    }

    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.7)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';

      // Show round scores
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '700 14px Menlo, monospace';
      for (var ri2 = 0; ri2 < roundScores.length; ri2++) {
        var rsc = roundScores[ri2];
        var rTxt = rsc >= 999 ? 'MISS' : rsc + ' ms';
        var rCol = rsc < PERFECT_MS ? GOLD : rsc < NEAR_MS ? TEAL : rsc >= 999 ? VERM : '#fff';
        cx.fillStyle = rCol;
        cx.fillText('R' + (ri2 + 1) + ': ' + rTxt, W / 2, 210 + ri2 * 26);
      }

      // Best deviation
      var fd = roundScores.reduce(function (b, v) { return Math.min(b, v); }, 999);
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(fd >= 999 ? 'ALL MISS' : fd + ' ms off', W / 2, 320);

      cx.fillStyle = '#fff'; cx.font = '800 22px -apple-system, Helvetica, Arial';
      cx.fillText(fd >= 999 ? 'train your ear' : (fd < PERFECT_MS ? 'PERFECT TIMING' : fd < NEAR_MS ? 'SO CLOSE' : 'keep feeling it'), W / 2, 360);

      var pt = pctTop(fd);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 400);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 450);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // demo CTA card
    if (phase === 'cta') {
      var tC = (now - ctaAt) / 1000, ease = Math.min(1, tC * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('DROP CATCH', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore || 41) + ' ms off. can you beat it?', W / 2, 344);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 41) + ' ms', W / 2, 414);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 448);
      cx.globalAlpha = 1;
    }

    // floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
