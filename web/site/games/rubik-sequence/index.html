<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rubik Sequence — Tilt</title>
<!--
  LOOP / attention-architecture — Rubik Sequence
  Circuits: 01-rpe (variable reward), 02-novelty (sequences grow), 06-zeigarnik (one more try).
  Modes:
    ?demo=1&seed=7   scripted mirror-neuron clip → __demoDone
    ?bot=1&runs=N&seed=M  imperfect autoplay → __botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'rubik-sequence';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // 6 Rubik face colors (classic)
  var FACES = [
    { id: 0, label: 'U', color: '#FFFFFF', shadow: '#AAAAAA' }, // white  – top
    { id: 1, label: 'R', color: '#E8502E', shadow: '#A03020' }, // red    – right
    { id: 2, label: 'F', color: '#2EC5B6', shadow: '#1A8A80' }, // teal   – front
    { id: 3, label: 'D', color: '#F2B134', shadow: '#B07820' }, // gold   – bottom
    { id: 4, label: 'L', color: '#3399FF', shadow: '#1A55AA' }, // blue   – left
    { id: 5, label: 'B', color: '#55CC55', shadow: '#2A7A2A' }  // green  – back
  ];

  // ---- layout ----
  // 6 face tiles arranged in a 3×2 grid, centred on canvas
  var TILE_SIZE = 90, TILE_GAP = 14;
  var GRID_COLS = 3, GRID_ROWS = 2;
  var GRID_W = GRID_COLS * TILE_SIZE + (GRID_COLS - 1) * TILE_GAP;
  var GRID_H = GRID_ROWS * TILE_SIZE + (GRID_ROWS - 1) * TILE_GAP;
  var GRID_X = (W - GRID_W) / 2;
  var GRID_Y = H - GRID_H - 90;

  function tileRect(faceId) {
    var col = faceId % GRID_COLS, row = Math.floor(faceId / GRID_COLS);
    return {
      x: GRID_X + col * (TILE_SIZE + TILE_GAP),
      y: GRID_Y + row * (TILE_SIZE + TILE_GAP),
      w: TILE_SIZE, h: TILE_SIZE
    };
  }

  // ---- game state ----
  var phase;   // 'title' | 'challenge' | 'show' | 'input' | 'over' | 'cta'
  var sequence, seqLen, inputIdx, score, best, runStartTs;
  var showIdx, showTimer, showDelay;
  var flashes = [], tileFlash = null;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var dareBeaten = false;
  var challengeAt = 0, overAt = 0, ctaAt = 0;

  try { best = +localStorage.getItem('rs_best') || 0; } catch (_) { best = 0; }

  // ---- RNG helpers ----
  function randFace() { return Math.floor(rng() * 6); }
  function buildSequence(len) {
    var s = [];
    for (var i = 0; i < len; i++) s.push(randFace());
    return s;
  }

  // ---- game flow ----
  function newGame() {
    sequence = []; seqLen = 1; score = 0; inputIdx = 0;
    flashes = []; tileFlash = null; dareBeaten = false;
    hitStop = 0; shakeAmt = 0; zoom = 1;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { phase = 'title'; startRun(); return; }
    phase = 'title';
  }

  function startRun() {
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    startRound();
  }

  function startRound() {
    // extend sequence by one
    sequence = buildSequence(seqLen);
    showIdx = 0;
    showDelay = DEMO ? 36 : BOT ? 30 : 50;  // frames between flashes
    showTimer = 0;
    phase = 'show';
  }

  function startInput() {
    inputIdx = 0;
    phase = 'input';
  }

  function playerTap(faceId) {
    if (phase !== 'input') return;
    tileFlash = { faceId: faceId, t: 0 };

    if (faceId === sequence[inputIdx]) {
      // correct
      if (window.J) {
        var combo = inputIdx + 1;
        if (inputIdx === sequence.length - 1) J.perfect(seqLen);
        else J.hit(combo);
        J.tension(Math.min(seqLen / 12, 1));
      }
      if (inputIdx === sequence.length - 1) {
        // completed the round
        score = seqLen;
        var newBest = score > best;
        if (newBest) { best = score; try { localStorage.setItem('rs_best', String(best)); } catch (_) {} }
        hitStop = 5; zoom = 1.03;
        flash('CLEAN!', TEAL, 44);
        if (newBest && window.J) J.fanfare();
        if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
          dareBeaten = true;
          flash('DARE BEATEN', TEAL, 42);
          if (window.J) J.fanfare();
          SHARE.beaten(score);
        }
        if (window.LOOP) LOOP.emit('round_clear', { len: seqLen, score: score });
        seqLen++;
        // next round after brief pause
        setTimeout(function () { if (phase !== 'over') startRound(); }, DEMO ? 600 : 800);
        phase = 'wait'; // suspend input during pause
      } else {
        inputIdx++;
      }
    } else {
      // wrong — game over
      tileFlash = { faceId: faceId, t: 0, wrong: true };
      shakeAmt = 8;
      if (window.J) J.death(Math.min(0.3 + seqLen / 14, 1));
      flash('WRONG', VERM, 50);
      if (window.LOOP) LOOP.emit('near_miss', { seq_len: seqLen, at: inputIdx });
      gameOver();
    }
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (DEMO) window.__demoScore = score;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 600);
    }
  }

  function resetRun() {
    sequence = []; seqLen = 1; score = 0; inputIdx = 0;
    flashes = []; tileFlash = null;
    hitStop = 0; shakeAmt = 0; zoom = 1; dareBeaten = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 8))));
  }

  // ---- input handling ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, px, py) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'input' && px !== undefined) {
      for (var i = 0; i < FACES.length; i++) {
        var r = tileRect(i);
        if (inR(r, px, py)) { playerTap(i); return; }
      }
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: score, unit: 'moves' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') tap();
    // number keys 1-6 for keyboard play
    var k = parseInt(e.key, 10);
    if (k >= 1 && k <= 6) tap(tileRect(k - 1).x + TILE_SIZE / 2, tileRect(k - 1).y + TILE_SIZE / 2);
  });

  // ---- demo / bot autopilots ----
  // Demo script: indices into the sequence that will be "misplayed"
  // Pattern: correct all → near-fail (wrong face at 60%) → save (keep going) → real miss at end
  var demoState = {
    phase: 'normal',     // 'normal' | 'nearfail' | 'recovery' | 'fail'
    roundsClean: 0,
    failAt: -1,          // round where near-fail happens
    realFailAt: -1,      // round where real fail happens
    waitFrames: 0,
    seqPos: 0
  };

  // Bot state
  var botRunsDone = 0;
  var botWait = 0, botPos = 0;
  var BOT_MISS_ROUND = 0; // set per run

  // Demo auto-input — called each frame when ready
  function demoAutoInput() {
    if (phase !== 'input') return;
    if (demoState.waitFrames > 0) { demoState.waitFrames--; return; }

    var targetFace = sequence[inputIdx];
    var roundNum = seqLen - 1; // current round index (0-based)

    // Decide if this press is a deliberate wrong
    var makeWrong = false;
    if (demoState.phase === 'nearfail' && inputIdx === Math.floor(sequence.length * 0.6)) {
      makeWrong = true;
      demoState.phase = 'recovery_pending'; // after this wrong -> game over -> we re-try (but we need a save mechanic)
    }

    // For demo: near-fail = press wrong, game ends, but in our demo script we actually
    // want a "near-fail LOOK" without dying — we'll simulate it by briefly flashing wrong
    // face then correcting. Since game ends on wrong, we structure the demo differently:
    // rounds 1-3 clean, round 4 we press all correct but very slowly (hesitation),
    // round 5 near miss = we get to last position and pause long, then correct,
    // round 6 = real fail (wrong press on 2nd move).
    // Redefine: near-fail = correct sequence but on the LAST tap we delay very long (tension)
    // Real fail = wrong press

    var hesitate = 25 + Math.floor(rng() * 20); // human hesitation
    if (roundNum >= 3) hesitate += 15; // more hesitation on longer seqs
    if (demoState.phase === 'nearfail_pause' && inputIdx === sequence.length - 1) {
      // Long pause before last correct tap on the tension round
      hesitate = 80;
      demoState.phase = 'normal';
    }

    // Real fail at round 5
    if (roundNum === 5 && inputIdx === 1) {
      makeWrong = true;
    }

    demoState.waitFrames = hesitate;

    if (makeWrong) {
      var wrongFace = (targetFace + 1 + Math.floor(rng() * 4)) % 6;
      playerTap(wrongFace);
    } else {
      playerTap(targetFace);
    }
  }

  function botAutoInput() {
    if (phase !== 'input') return;
    if (botWait > 0) { botWait--; return; }
    botWait = 20 + Math.floor(rng() * 15);

    // Bot misses on BOT_MISS_ROUND at position 1
    if (seqLen - 1 === BOT_MISS_ROUND && inputIdx === 1) {
      var wrongFace = (sequence[inputIdx] + 1 + Math.floor(rng() * 4)) % 6;
      playerTap(wrongFace);
    } else {
      playerTap(sequence[inputIdx]);
    }
  }

  // Reset bot miss target for each run
  function resetBotMissRound() {
    BOT_MISS_ROUND = 2 + Math.floor(rng() * 4); // miss on round 2-5
  }
  resetBotMissRound();

  // ---- render ----
  var last = performance.now();

  function drawTile(faceId, highlight, wrongFlash, alpha) {
    var f = FACES[faceId];
    var r = tileRect(faceId);
    cx.globalAlpha = alpha !== undefined ? alpha : 1;

    // shadow
    cx.fillStyle = f.shadow;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(r.x + 4, r.y + 4, r.w, r.h, 12);
    else cx.rect(r.x + 4, r.y + 4, r.w, r.h);
    cx.fill();

    // face
    cx.fillStyle = highlight ? '#FFFFFF' : wrongFlash ? VERM : f.color;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(r.x, r.y, r.w, r.h, 12);
    else cx.rect(r.x, r.y, r.w, r.h);
    cx.fill();

    // label
    cx.fillStyle = faceId === 0 ? '#333' : INK;
    cx.textAlign = 'center';
    cx.font = '900 28px Menlo, monospace';
    cx.fillText(f.label, r.x + r.w / 2, r.y + r.h / 2 + 10);

    cx.globalAlpha = 1;
  }

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // sequence show phase: advance through flashes
    if (phase === 'show') {
      showTimer -= dt;
      if (showTimer <= 0) {
        if (showIdx < sequence.length) {
          tileFlash = { faceId: sequence[showIdx], t: 0, show: true };
          if (window.J) J.hit(showIdx + 1);
          showIdx++;
          showTimer = showDelay;
        } else {
          // done showing, wait a beat then start input
          showTimer = 999;
          tileFlash = null;
          setTimeout(function () {
            if (phase === 'show') startInput();
          }, DEMO ? 400 : 500);
        }
      }
    }

    // demo autopilot
    if (DEMO && phase === 'input') demoAutoInput();
    // bot autopilot
    if (BOT && phase === 'input')  botAutoInput();

    // juice decay
    if (hitStop > 0) hitStop -= dt;
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;
    if (tileFlash) { tileFlash.t += dt; if (tileFlash.t > 18) tileFlash = null; }

    // transforms
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- draw tiles (always visible except during title/challenge) ----
    if (phase !== 'title' && phase !== 'challenge' && phase !== 'cta') {
      for (var i = 0; i < FACES.length; i++) {
        var isHighlight = tileFlash && tileFlash.faceId === i && !tileFlash.wrong;
        var isWrong     = tileFlash && tileFlash.faceId === i && tileFlash.wrong;
        var hlAmt = isHighlight ? Math.max(0, 1 - tileFlash.t / 18) : 0;
        drawTile(i, hlAmt > 0.3, isWrong, phase === 'over' ? 0.4 : 1);
      }

      // during input: show which tiles still need to be pressed
      if (phase === 'input') {
        // subtle progress dots above grid
        cx.textAlign = 'center';
        for (var k = 0; k < sequence.length; k++) {
          var dotX = W / 2 - (sequence.length - 1) * 8 + k * 16;
          cx.fillStyle = k < inputIdx ? TEAL : (k === inputIdx ? GOLD : 'rgba(255,255,255,0.25)');
          cx.beginPath(); cx.arc(dotX, GRID_Y - 18, 5, 0, Math.PI * 2); cx.fill();
        }
      }

      // show phase indicator above tiles
      if (phase === 'show') {
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('WATCH THE SEQUENCE', W / 2, GRID_Y - 30);
        // progress dots
        for (var j = 0; j < sequence.length; j++) {
          var dX = W / 2 - (sequence.length - 1) * 8 + j * 16;
          cx.fillStyle = j < showIdx ? TEAL : 'rgba(255,255,255,0.2)';
          cx.beginPath(); cx.arc(dX, GRID_Y - 14, 5, 0, Math.PI * 2); cx.fill();
        }
      }
      if (phase === 'input') {
        cx.textAlign = 'center';
        cx.fillStyle = GOLD;
        cx.font = '700 13px -apple-system, Helvetica, Arial';
        cx.fillText('REPEAT THE SEQUENCE', W / 2, GRID_Y - 30);
      }
    }

    // score/round display
    if (phase === 'show' || phase === 'input' || phase === 'wait' || phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 72px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);

      // sequence length indicator
      cx.fillStyle = VERM;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + seqLen + '  ·  ' + sequence.length + ' MOVES', W / 2, 148);

      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && (phase === 'show' || phase === 'input')) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + ' MOVES', W / 2, 174);
      }
    }

    // floating flash text
    for (var fi = flashes.length - 1; fi >= 0; fi--) {
      var fl = flashes[fi]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(fi, 1);
    }

    // title
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('RUBIK', W / 2, 260);
      cx.fillStyle = VERM;
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('SEQUENCE', W / 2, 308);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('memorize & repeat the moves', W / 2, 345);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 390);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.28)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('PB: longest flawless chain', W / 2, 420);

      // draw face grid as decoration
      for (var ti = 0; ti < FACES.length; ti++) drawTile(ti, false, false, 0.35);
    }

    // challenge card (demo beat 1)
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('6', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's longest chain", W / 2, 430);
    }

    // game over / score card
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG.', W / 2, 290);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' moves', W / 2, 335);
      var pt = pctTop(score);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 378);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 402);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — TRY AGAIN', W / 2, 450);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (phase === 'cta') {
      var ct = (now - ctaAt) / 1000, ease = Math.min(1, ct * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('RUBIK', W / 2, 280);
      cx.fillStyle = VERM;
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SEQUENCE', W / 2, 330);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('longest chain: ' + (window.__demoScore || 6) + ' moves', W / 2, 368);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.globalAlpha = ease * p3;
      cx.fillStyle = VERM;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 6), W / 2, 418);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 448);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
