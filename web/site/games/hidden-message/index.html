  function layoutPool() {

    var lines = [], cur = [], curW = 0;

      var w = tiles[i].w;

    }

      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('310', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // flashes (floating reward text)
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('HIDDEN MESSAGE', W / 2, 286);
      cx.fillStyle = VERM; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP A TILE — UNSCRAMBLE IT', W / 2, 332); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('read it to the end.', W / 2, 360);
    }

    // game over
    if (state.phase === 'over') drawOver(now);

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('HIDDEN MESSAGE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they scored ' + (window.__demoScore || 310) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 310), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  function drawHUD(now) {
    cx.textAlign = 'left';
    // lives (hearts) — the visible stake
    for (var i = 0; i < LIVES; i++) {
      cx.fillStyle = i < state.lives ? VERM : 'rgba(255,255,255,0.14)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('♥', 18 + i * 22, 30);
    }
    // score
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 52px -apple-system, Helvetica, Arial';
    cx.fillText(state.score, W / 2, 64);
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + best, W / 2, 84);
    // combo ladder — stakes must be visible
    if (state.combo > 1) {
      var cs = 18 + Math.min(state.combo, 12);
      cx.fillStyle = GOLD;
      cx.font = '900 ' + cs + 'px -apple-system, Helvetica, Arial';
      cx.globalAlpha = 0.5 + 0.5 * Math.min(state.combo / 8, 1);
      cx.fillText('×' + state.combo, W / 2, 108);
      cx.globalAlpha = 1;
    }
    // dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 14px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 128);
    }
    // timer bar
    var barX = 40, barY = 144, barW = W - 80, low = state.tLeft < 2;
    cx.fillStyle = 'rgba(255,255,255,0.08)'; cx.fillRect(barX, barY, barW, 4);
    cx.fillStyle = low ? VERM : TEAL;
    cx.fillRect(barX, barY, barW * Math.max(0, state.tLeft / state.tLimit), 4);
  }

  function drawAnswer(now) {
    // panel
    cx.fillStyle = 'rgba(255,255,255,0.025)';
    tileRect(20, 158, W - 40, 196, 14); cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,0.06)'; cx.lineWidth = 1; cx.stroke();
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(255,255,255,0.32)'; cx.font = '700 10px Menlo, monospace';
    cx.fillText(state.completing ? 'MESSAGE DELIVERED' : 'THE MESSAGE', 30, 176);
    cx.textAlign = 'center';

    var lay = layoutAnswer();
    var glow = state.completing ? 0.5 + 0.5 * Math.sin(now / 120) : 0;
    for (var i = 0; i < lay.length; i++) {
      var it = lay[i];
      if (it.ghost) {
        // ghost slot — the unfinished part (Zeigarnik made visible)
        cx.fillStyle = 'rgba(255,255,255,0.10)';
        cx.fillRect(it.x, it.y + 8, it.w, 3);
        continue;
      }
      var isPlacing = state.placing && state.placing.idx === (function () {
        // index of this placed word among non-ghost items
        var n = 0; for (var j = 0; j < i; j++) if (!lay[j].ghost) n++; return n;
      })();
      if (isPlacing) {
        // still flying — leave a faint landing slot
        cx.fillStyle = 'rgba(242,177,52,0.18)';
        cx.fillRect(it.x, it.y + 8, it.w, 3);
        continue;
      }
      var pop = (state.settlingIdx !== null && lay.filter(function (l) { return !l.ghost; }).indexOf(it) === state.settlingIdx) ? (1 + 0.18 * Math.max(0, 1 - state.settlingT / 6)) : 1;
      cx.save();
      cx.translate(it.x + it.w / 2, it.y + 15);
      cx.scale(pop, pop);
      cx.font = '800 22px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      if (glow) { cx.shadowColor = GOLD; cx.shadowBlur = 18 * glow; }
      cx.fillStyle = state.completing ? GOLD : '#fff';
      cx.fillText(it.word, 0, 0);
      cx.shadowBlur = 0; cx.textBaseline = 'alphabetic';
      cx.restore();
    }
    cx.textAlign = 'center';
  }

  function drawPool() {
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    for (var i = 0; i < state.pool.length; i++) {
      var t = state.pool[i];
      if (t.dead) continue;
      var sc = Math.min(1, Math.max(0, t.born) / 8);
      if (sc <= 0) continue;
      var shx = t.shakeT > 0 ? Math.sin(t.shakeT * 1.6) * 3 : 0;
      var wrong = t.shakeT > 0;
      cx.save();
      cx.translate(t.x + t.w / 2 + shx, t.y + 19);
      cx.scale(sc, sc);
      tileRect(-t.w / 2, -19, t.w, 38, 9);
      cx.fillStyle = wrong ? 'rgba(232,80,46,0.20)' : 'rgba(46,197,182,0.10)';
      cx.fill();
      cx.strokeStyle = wrong ? VERM : TEAL; cx.lineWidth = 1.5; cx.stroke();
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(t.word, 0, 1);
      cx.restore();
    }
    // the flying tile (placing animation) on top
    if (state.placing) {
      var p = state.placing;
      var pr = Math.min(1, p.t / p.dur);
      var e = 1 - Math.pow(1 - pr, 3);
      var fx = lerp(p.fx, p.tx, e), fy = lerp(p.fy, p.ty, e);
      var flip = Math.cos(pr * Math.PI);            // 1 → -1 → flips mid-flight
      var sx = Math.abs(flip) < 0.12 ? 0.12 * (flip < 0 ? -1 : 1) : flip;
      cx.save();
      cx.translate(fx, fy); cx.scale(sx, 1);
      tileRect(-p.w / 2, -19, p.w, 38, 9);
      cx.fillStyle = 'rgba(46,197,182,0.16)'; cx.fill();
      cx.strokeStyle = TEAL; cx.lineWidth = 1.5; cx.stroke();
      cx.shadowColor = TEAL; cx.shadowBlur = 16; cx.stroke(); cx.shadowBlur = 0;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(p.word, 0, 1);
      cx.restore();
    }
    cx.textBaseline = 'alphabetic';
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
    cx.fillText('MISSED.', W / 2, 300);
    cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
    cx.fillText(state.score + ' points', W / 2, 342);
    var pt = pctTop(state.score);
    cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 388);
    cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 412);
    if (!DEMO && !BOT) {
      var p2 = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = p2; cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
      cx.globalAlpha = 1;
      // share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      tileRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
