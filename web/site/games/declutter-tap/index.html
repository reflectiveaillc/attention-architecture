<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Declutter Tap — Tilt</title>
<!--
  LOOP / attention-architecture — Declutter Tap
  Circuits: 06-zeigarnik, 05-ease, 04-loss
  Engine: calm
  Mechanic: shelf of objects; faint grey glow marks clutter. Tap each to remove
            with a poof. When only essentials remain the shelf breathes → quiet exhale.
  Modes:
    ?demo=1&seed=7   calm arc ~16s → soft CTA → window.__demoDone
    ?bot=1&runs=N&seed=M  imperfect autopilot, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'declutter-tap';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO    = qs.get('demo') === '1';
  var BOT     = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED    = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), ctx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var CREAM = '#f5f0e8';

  // ---- object definitions ----
  // Each object: shape type, label, isClutter flag, drawn with canvas primitives
  var OBJECT_DEFS = [
    // essentials (keep)
    { id:'plant',   label:'plant',   clutter: false },
    { id:'book',    label:'book',    clutter: false },
    { id:'lamp',    label:'lamp',    clutter: false },
    { id:'cup',     label:'cup',     clutter: false },
    { id:'clock',   label:'clock',   clutter: false },
    // clutter (remove)
    { id:'box',     label:'box',     clutter: true  },
    { id:'tangle',  label:'cords',   clutter: true  },
    { id:'pile',    label:'pile',    clutter: true  },
    { id:'junk',    label:'gadget',  clutter: true  },
    { id:'dust',    label:'stuff',   clutter: true  },
    { id:'mag',     label:'magazines', clutter: true },
    { id:'bag',     label:'bag',     clutter: true  },
  ];

  // ---- shelf layout ----
  var SHELF_Y     = H - 200;   // shelf surface y
  var SHELF_X     = 40;
  var SHELF_W     = W - 80;
  var CELL_W      = 60;        // cell width per object slot
  var OBJ_H       = 70;        // max object height
  var MAX_OBJS    = 7;         // objects per round
  var CLUTTER_COUNT = 4;       // how many are clutter

  // ---- state ----
  var objects, phase, runStartTs, score, totalClutter;
  var hitStop, shakeAmt, zoom, flashes;
  var breathe;        // 0..1 breath animation after clear
  var breatheDir;
  var ctaAt;
  var botRunsDone;

  function newGame() {
    rng = mulberry32(SEED);
    objects    = [];
    flashes    = [];
    phase      = 'play';
    hitStop    = 0;
    shakeAmt   = 0;
    zoom       = 1;
    score      = 0;
    breathe    = 0;
    breatheDir = 1;
    ctaAt      = 0;
    runStartTs = Date.now();
    botRunsDone = botRunsDone || 0;

    buildShelf();

    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function buildShelf() {
    // pick objects: CLUTTER_COUNT clutter + rest essentials
    var clutterPool   = OBJECT_DEFS.filter(function(d){ return d.clutter; });
    var essentialPool = OBJECT_DEFS.filter(function(d){ return !d.clutter; });
    // shuffle pools
    clutterPool   = shuffle(clutterPool.slice());
    essentialPool = shuffle(essentialPool.slice());
    var chosen = [];
    var cl = Math.min(CLUTTER_COUNT, clutterPool.length);
    var es = Math.min(MAX_OBJS - cl, essentialPool.length);
    for (var i = 0; i < cl; i++)  chosen.push({ def: clutterPool[i],   clutter: true  });
    for (var i = 0; i < es; i++)  chosen.push({ def: essentialPool[i], clutter: false });
    chosen = shuffle(chosen);
    totalClutter = cl;

    // assign positions across the shelf
    var spacing = SHELF_W / (chosen.length + 1);
    for (var i = 0; i < chosen.length; i++) {
      var ox = SHELF_X + spacing * (i + 1) + (rng() - 0.5) * 8;
      objects.push({
        id:      chosen[i].def.id,
        label:   chosen[i].def.label,
        clutter: chosen[i].clutter,
        x: ox,
        y: SHELF_Y,
        glowPulse: rng() * Math.PI * 2,   // phase offset for gentle glow pulse
        removed:  false,
        poofT:    -1,    // poof animation timer; -1 = idle
        alpha:    1,
        shake:    0,     // per-object micro-shake on tap
        tapW:     46,    // tap hit-box width
        tapH:     OBJ_H + 10
      });
    }
  }

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function removeClutter(obj) {
    if (obj.removed || !obj.clutter) return;
    obj.removed = true;
    obj.poofT   = 0;
    score++;

    // gentle calm sound
    if (window.J) J.calm(score);

    // subtle hit-stop + micro-zoom
    hitStop = 1.5;
    zoom = 1.01;

    // floating text
    var txt = ['gone', 'bye', 'clear', 'poof', 'less'][Math.floor(rng() * 5)];
    flashes.push({ txt: txt, color: TEAL, size: 20, x: obj.x, y: obj.y - 20, t: 0 });

    if (window.LOOP) LOOP.emit('object_removed', { id: obj.id, n: score });

    // check if all clutter removed
    var remaining = objects.filter(function(o){ return o.clutter && !o.removed; });
    if (remaining.length === 0) {
      setTimeout(endSession, 800);
    }
  }

  function tapWrong(obj) {
    // tapped an essential — gentle shake on it, no penalty
    obj.shake = 4;
    flashes.push({ txt: 'keep it', color: 'rgba(255,255,255,0.5)', size: 16, x: obj.x, y: obj.y - 20, t: 0 });
    if (window.LOOP) LOOP.emit('near_miss', { id: obj.id });
  }

  function endSession() {
    if (phase === 'over' || phase === 'cta') return;
    phase = 'over';
    breathe = 0;
    breatheDir = 1;
    if (window.J) J.calm(score + 1);
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2000);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { restartRun(); }, 700);
      }
    }
  }

  function restartRun() {
    objects    = [];
    flashes    = [];
    phase      = 'play';
    hitStop    = 0;
    shakeAmt   = 0;
    zoom       = 1;
    score      = 0;
    breathe    = 0;
    breatheDir = 1;
    runStartTs = Date.now();
    rng = mulberry32(SEED + botRunsDone * 37);
    buildShelf();
    if (window.LOOP) LOOP.emit('restart', {});
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'over') {
      // restart
      restartRun();
      if (window.LOOP) LOOP.emit('restart', {});
      return;
    }
    if (phase !== 'play') return;
    // find tapped object
    var hit = null;
    for (var i = 0; i < objects.length; i++) {
      var o = objects[i];
      if (o.removed) continue;
      var hw = o.tapW / 2, hh = o.tapH / 2;
      if (px >= o.x - hw && px <= o.x + hw &&
          py >= o.y - hh && py <= o.y + hh / 2) {
        hit = o; break;
      }
    }
    if (hit) {
      if (hit.clutter) removeClutter(hit);
      else tapWrong(hit);
    }
  }

  cv.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') {
      // tap first available clutter
      for (var i = 0; i < objects.length; i++) {
        if (!objects[i].removed && objects[i].clutter) {
          tap(objects[i].x, objects[i].y - 10);
          break;
        }
      }
    }
  });

  // ---- autopilot (demo + bot) ----
  var autoCooldown = 0;

  function autopilot(dt) {
    if (phase !== 'play') return;
    autoCooldown -= dt;
    if (autoCooldown > 0) return;
    // find a clutter object to remove
    var candidates = objects.filter(function(o){ return o.clutter && !o.removed; });
    if (candidates.length === 0) return;
    var target = candidates[Math.floor(rng() * candidates.length)];
    removeClutter(target);
    // demo: calm pace (~0.9s), bot: quick (~0.5s)
    if (DEMO) {
      autoCooldown = 54 + rng() * 28;   // ~0.9–1.4s @ 60fps
    } else {
      autoCooldown = 22 + rng() * 20;   // ~0.4–0.7s
    }
  }

  // ---- drawing helpers ----

  // Draw a shelf object by id using canvas primitives
  function drawObject(o, now) {
    if (o.removed && o.poofT < 0) return;
    ctx.save();
    ctx.translate(o.x, o.y);

    // per-object shake
    if (o.shake > 0.3) {
      ctx.translate((rng() - 0.5) * o.shake, (rng() - 0.5) * o.shake);
    }

    // poof / removal animation
    if (o.removed && o.poofT >= 0) {
      var pt = o.poofT;
      var pa = Math.max(0, 1 - pt / 18);
      var ps = 1 + pt * 0.07;
      ctx.globalAlpha = pa;
      ctx.scale(ps, ps);
      // draw poof circles
      for (var k = 0; k < 6; k++) {
        var ang = (k / 6) * Math.PI * 2 + pt * 0.2;
        var pr2 = 10 + pt * 2.5;
        var px2 = Math.cos(ang) * pr2, py2 = Math.sin(ang) * pr2;
        ctx.beginPath();
        ctx.arc(px2, py2, 4 - pt * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = TEAL;
        ctx.globalAlpha = pa * 0.7;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
      return;
    }

    ctx.globalAlpha = o.alpha;

    // clutter glow (grey glow = "this is clutter")
    var glowPulse = Math.sin(now / 900 + o.glowPulse) * 0.5 + 0.5;  // 0..1
    if (o.clutter) {
      ctx.shadowColor = 'rgba(180,180,180,' + (0.5 + glowPulse * 0.4) + ')';
      ctx.shadowBlur  = 8 + glowPulse * 6;
    }

    drawShape(o.id, o.clutter, glowPulse);

    ctx.shadowBlur = 0;

    // label under object
    ctx.fillStyle = o.clutter
      ? 'rgba(180,180,180,' + (0.5 + glowPulse * 0.35) + ')'
      : 'rgba(255,255,255,0.28)';
    ctx.font = '500 10px -apple-system, Helvetica, Arial';
    ctx.textAlign = 'center';
    ctx.fillText(o.label, 0, 22);

    ctx.restore();
  }

  function drawShape(id, isClutter, glow) {
    var c = isClutter ? 'rgba(160,160,165,' + (0.7 + glow * 0.25) + ')' : CREAM;
    ctx.fillStyle = c;
    ctx.strokeStyle = isClutter ? 'rgba(140,140,148,0.6)' : 'rgba(245,240,232,0.35)';
    ctx.lineWidth = 1;

    if (id === 'plant') {
      // pot
      ctx.beginPath();
      ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
      ctx.lineTo(8, 14); ctx.lineTo(-8, 14);
      ctx.closePath(); ctx.fillStyle = '#8B6F5C'; ctx.fill();
      // leaves
      ctx.fillStyle = '#5BA85A';
      ctx.beginPath(); ctx.ellipse(-6, -12, 7, 12, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, -14, 6, 11,  0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0, -16, 5, 10,  0.0, 0, Math.PI*2); ctx.fill();
    } else if (id === 'book') {
      ctx.fillStyle = '#4A7FB5';
      ctx.fillRect(-16, -28, 32, 42);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(-14, -26, 4, 38);
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.strokeRect(-16, -28, 32, 42);
    } else if (id === 'lamp') {
      // shade
      ctx.fillStyle = isClutter ? c : '#E8D5A3';
      ctx.beginPath();
      ctx.moveTo(-14, -26); ctx.lineTo(14, -26);
      ctx.lineTo(10, 0); ctx.lineTo(-10, 0);
      ctx.closePath(); ctx.fill();
      // base
      ctx.fillStyle = isClutter ? c : '#A07850';
      ctx.fillRect(-4, 0, 8, 22);
      ctx.fillRect(-10, 20, 20, 4);
      // glow
      if (!isClutter) {
        ctx.fillStyle = 'rgba(255,240,180,0.15)';
        ctx.beginPath(); ctx.ellipse(0, -26, 20, 10, 0, 0, Math.PI*2); ctx.fill();
      }
    } else if (id === 'cup') {
      ctx.fillStyle = isClutter ? c : '#B0C4DE';
      ctx.beginPath();
      ctx.moveTo(-10, -18); ctx.lineTo(10, -18);
      ctx.lineTo(12, 4); ctx.lineTo(-12, 4);
      ctx.closePath(); ctx.fill();
      // handle
      ctx.strokeStyle = isClutter ? 'rgba(150,150,155,0.8)' : '#8FA8C8';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(14, -7, 6, -Math.PI*0.4, Math.PI*0.4); ctx.stroke();
      // steam lines
      if (!isClutter) {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1.5;
        for (var s = -4; s <= 4; s += 4) {
          ctx.beginPath(); ctx.moveTo(s, -20); ctx.quadraticCurveTo(s+3,-26,s,-32); ctx.stroke();
        }
      }
    } else if (id === 'clock') {
      ctx.fillStyle = isClutter ? c : CREAM;
      ctx.beginPath(); ctx.arc(0, -8, 18, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = isClutter ? 'rgba(140,140,148,0.5)' : 'rgba(80,60,40,0.4)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, -8, 18, 0, Math.PI*2); ctx.stroke();
      // hands
      ctx.strokeStyle = isClutter ? 'rgba(100,100,105,0.6)' : 'rgba(60,40,20,0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(0,-22); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(9,-8); ctx.stroke();
      // base nub
      ctx.fillStyle = isClutter ? c : '#C0A87A';
      ctx.fillRect(-3, 10, 6, 4);
    } else if (id === 'box') {
      ctx.fillStyle = c;
      ctx.fillRect(-16, -18, 32, 32);
      ctx.strokeStyle = 'rgba(140,140,148,0.7)';
      ctx.lineWidth = 1;
      ctx.strokeRect(-16, -18, 32, 32);
      // flaps
      ctx.beginPath();
      ctx.moveTo(-16,-18); ctx.lineTo(0,-10); ctx.lineTo(16,-18);
      ctx.strokeStyle = 'rgba(140,140,148,0.5)';
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(0,-10); ctx.stroke();
    } else if (id === 'tangle') {
      // cord tangle
      ctx.strokeStyle = c;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-14, -4);
      ctx.bezierCurveTo(-8, -18, 12, -14, 8, 0);
      ctx.bezierCurveTo(4, 12, -10, 10, -6, -2);
      ctx.bezierCurveTo(-2, -14, 14, -8, 10, 8);
      ctx.stroke();
    } else if (id === 'pile') {
      // stack of random papers
      ctx.fillStyle = 'rgba(160,160,165,0.7)';
      ctx.save(); ctx.rotate(-0.15);
      ctx.fillRect(-14, -22, 28, 34);
      ctx.restore();
      ctx.fillStyle = 'rgba(150,150,155,0.8)';
      ctx.save(); ctx.rotate(0.1);
      ctx.fillRect(-12, -20, 26, 32);
      ctx.restore();
      ctx.fillStyle = c;
      ctx.fillRect(-11, -19, 24, 30);
      // lines
      ctx.strokeStyle = 'rgba(120,120,125,0.35)';
      ctx.lineWidth = 1;
      for (var ll = -14; ll < 10; ll += 5) {
        ctx.beginPath(); ctx.moveTo(-8, ll); ctx.lineTo(10, ll); ctx.stroke();
      }
    } else if (id === 'junk') {
      // old gadget / remote control shape
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(-10, -22, 20, 36, 5) : ctx.rect(-10, -22, 20, 36);
      ctx.fill();
      // buttons
      ctx.fillStyle = 'rgba(100,100,105,0.5)';
      for (var bx = -6; bx <= 6; bx += 6) {
        for (var by = -14; by <= 2; by += 8) {
          ctx.beginPath(); ctx.arc(bx, by, 2.5, 0, Math.PI*2); ctx.fill();
        }
      }
    } else if (id === 'dust') {
      // dust blob / undefined stuff
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(0, -6, 16, 0, Math.PI);
      ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.arc(-8, -6, 9, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(8, -6, 9, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -6, 8, Math.PI, 0); ctx.fill();
    } else if (id === 'mag') {
      // stack of magazines
      ctx.fillStyle = 'rgba(150,140,160,0.8)';
      ctx.fillRect(-14, -4, 28, 8);
      ctx.fillStyle = 'rgba(160,145,170,0.85)';
      ctx.fillRect(-14,-10, 28, 8);
      ctx.fillStyle = c;
      ctx.fillRect(-14,-16, 28, 8);
      ctx.strokeStyle = 'rgba(120,110,130,0.4)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(-14,-16, 28, 28);
    } else if (id === 'bag') {
      // shopping bag
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(-12, -4); ctx.lineTo(-14, 14); ctx.lineTo(14, 14);
      ctx.lineTo(12, -4); ctx.closePath(); ctx.fill();
      // handles
      ctx.strokeStyle = 'rgba(140,140,148,0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-6, -4); ctx.quadraticCurveTo(-8, -16, -2, -16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(6, -4); ctx.quadraticCurveTo(8, -16, 2, -16);
      ctx.stroke();
    }
  }

  function drawShelf() {
    // shelf surface
    var g = ctx.createLinearGradient(SHELF_X, SHELF_Y, SHELF_X + SHELF_W, SHELF_Y);
    g.addColorStop(0, 'rgba(90,70,55,0.6)');
    g.addColorStop(0.5, 'rgba(110,85,65,0.8)');
    g.addColorStop(1, 'rgba(90,70,55,0.6)');
    ctx.fillStyle = g;
    ctx.fillRect(SHELF_X - 8, SHELF_Y, SHELF_W + 16, 6);
    // shelf underside shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(SHELF_X - 4, SHELF_Y + 6, SHELF_W + 8, 4);
    // wall line above shelf
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(SHELF_X - 8, SHELF_Y - 2, SHELF_W + 16, 2);
  }

  function drawProgress(now) {
    var total = objects.filter(function(o){ return o.clutter; }).length;
    var removed = objects.filter(function(o){ return o.clutter && o.removed; }).length;
    var frac = total > 0 ? removed / total : 0;

    var cx2 = W / 2, cy2 = H - 48, rad = 20;
    ctx.strokeStyle = 'rgba(46,197,182,0.15)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx2, cy2, rad, 0, Math.PI * 2); ctx.stroke();
    if (frac > 0) {
      ctx.strokeStyle = TEAL;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx2, cy2, rad, -Math.PI/2, -Math.PI/2 + frac * Math.PI * 2);
      ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '600 11px Menlo, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(removed + '/' + total, cx2, cy2 + 4);
  }

  function drawTitle(now) {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.font = '500 13px -apple-system, Helvetica, Arial';
    ctx.fillText('tap the glowing items to remove', W/2, SHELF_Y - 80);
    // small glow legend
    ctx.save();
    ctx.shadowColor = 'rgba(180,180,180,0.8)';
    ctx.shadowBlur  = 8;
    ctx.fillStyle = 'rgba(180,180,180,0.7)';
    ctx.beginPath(); ctx.arc(W/2 - 52, SHELF_Y - 60, 5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.font = '400 11px -apple-system, Helvetica, Arial';
    ctx.fillText('grey glow = clutter', W/2 + 4, SHELF_Y - 56);
  }

  // ---- breath animation after clear ----
  function drawBreathShelf(now) {
    var bs = 1 + breathe * 0.012;
    ctx.save();
    ctx.translate(W/2, SHELF_Y);
    ctx.scale(bs, bs);
    ctx.translate(-W/2, -SHELF_Y);
    drawShelf();
    // essentials only remain
    for (var i = 0; i < objects.length; i++) {
      var o = objects[i];
      if (!o.clutter) drawObject(o, now);
    }
    ctx.restore();
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    requestAnimationFrame(frame);
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // poof animation tick + alpha fade
    for (var i = 0; i < objects.length; i++) {
      var o = objects[i];
      if (o.removed && o.poofT >= 0) {
        o.poofT += dt;
        if (o.poofT > 22) o.poofT = -1;   // done
      }
      if (o.shake > 0.1) o.shake *= Math.pow(0.80, dt);
    }

    // juice transforms
    ctx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shakeAmt;
      var sy = (rng() - 0.5) * shakeAmt;
      ctx.translate(W/2 + sx, H/2 + sy);
      ctx.scale(zoom, zoom);
      ctx.translate(-W/2, -H/2);
    }
    shakeAmt *= Math.pow(0.83, dt);
    zoom += (1 - zoom) * 0.11 * dt;

    // hit-stop: freeze autopilot but decay
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      autopilot(dt);
    }

    // bg
    ctx.fillStyle = INK;
    ctx.fillRect(0, 0, W, H);
    // subtle warm gradient on wall
    var bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.03)');
    bg.addColorStop(1, 'rgba(242,177,52,0.04)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    if (phase === 'play') {
      drawShelf();
      drawTitle(now);
      for (var i = 0; i < objects.length; i++) {
        drawObject(objects[i], now);
      }
      drawProgress(now);
    }

    if (phase === 'over') {
      // breath animation
      breathe += breatheDir * 0.012 * dt;
      if (breathe >= 1) { breathe = 1; breatheDir = -1; }
      if (breathe <= 0) { breathe = 0; breatheDir =  1; }

      drawBreathShelf(now);

      ctx.fillStyle = 'rgba(11,13,18,0.48)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.fillStyle = TEAL;
      ctx.font = '700 30px -apple-system, Helvetica, Arial';
      ctx.fillText('shelf cleared', W/2, 310);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '500 16px -apple-system, Helvetica, Arial';
      ctx.fillText(score + ' items released', W/2, 346);
      if (!DEMO && !BOT) {
        var p = 0.45 + 0.55 * Math.sin(now / 1200);
        ctx.globalAlpha = 0.5 + 0.5 * p;
        ctx.fillStyle = TEAL;
        ctx.font = '500 13px -apple-system, Helvetica, Arial';
        ctx.fillText('tap to clear again', W/2, 396);
        ctx.globalAlpha = 1;
      }
    }

    // demo CTA
    if (phase === 'cta') {
      drawBreathShelf(now);
      breathe += breatheDir * 0.009 * dt;
      if (breathe >= 1) { breathe = 1; breatheDir = -1; }
      if (breathe <= 0) { breathe = 0; breatheDir =  1; }

      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      ctx.fillStyle = 'rgba(11,13,18,' + (0.68 * ease) + ')';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = ease;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.font = '800 36px -apple-system, Helvetica, Arial';
      ctx.fillText('DECLUTTER TAP', W/2, 296);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '500 16px -apple-system, Helvetica, Arial';
      ctx.fillText('clear the shelf. breathe.', W/2, 334);
      var p2 = 0.65 + 0.35 * Math.sin(now / 800);
      ctx.fillStyle = TEAL;
      ctx.globalAlpha = ease * p2;
      ctx.font = '800 24px -apple-system, Helvetica, Arial';
      ctx.fillText('▶ REACH IT', W/2, 398);
      ctx.globalAlpha = ease;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '500 13px -apple-system, Helvetica, Arial';
      ctx.fillText('link in bio', W/2, 428);
      ctx.globalAlpha = 1;
    }

    // floating reward texts
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 34);
      ctx.globalAlpha = fa;
      ctx.textAlign = 'center';
      ctx.fillStyle = fl.color;
      ctx.font = '600 ' + fl.size + 'px -apple-system, Helvetica, Arial';
      ctx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.65);
      ctx.globalAlpha = 1;
      if (fl.t > 34) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.45;
      ctx.font = '16px -apple-system, Helvetica, Arial';
      ctx.fillStyle = '#fff';
      ctx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w/2, MUTE_R.y + 26);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  botRunsDone = 0;
  newGame();
  requestAnimationFrame(frame);
})();
</script>
