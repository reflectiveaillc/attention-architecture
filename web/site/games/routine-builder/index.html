<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK  = '#0b0d12';
  var TEAL = '#2ec5b6';
  var GOLD = '#f2b134';
  var SOFT = '#7ecbc4';  // lighter teal for calm palette
  var DIM  = 'rgba(255,255,255,0.55)';

  // ── Routine steps (fixed canonical order: 0→6)
  var STEPS = [
    { label: 'Wake & hydrate',   icon: '💧', color: '#2ec5b6' },
    { label: 'Body movement',    icon: '🏃', color: '#4eb8d4' },
    { label: 'Deep work block',  icon: '🧠', color: '#6aaccc' },
    { label: 'Inbox review',     icon: '📬', color: '#8aa0c4' },
    { label: 'Learning slot',    icon: '📖', color: '#a694bc' },
    { label: 'Wind-down ritual', icon: '🌙', color: '#c288b4' },
    { label: 'Reflect & reset',  icon: '✨', color: '#e07cac' }
  ];
  var CARD_H = 62, CARD_W = 310, CARD_PAD = 10;
  var SLOT_X = (W - CARD_W) / 2;

  // ── State
  var phase;        // 'title' | 'play' | 'locked' | 'cta'
  var order;        // current permutation of indices [0..6]
  var dragging;     // { idx, fromSlot, startY, curY, offsetY }
  var locked;       // true when routine is complete and correct
  var lockedAt;     // timestamp
  var ctaAt;        // timestamp
  var flashes;      // floating reward texts
  var hitStop, shakeAmt, zoom;
  var runStartTs;
  var score;        // # correct placements (0–7)
  var botRunsDone;
  var demoStep, demoT, demoSlotTarget, demoPhase, demoPhaseT;
  var last;

  // ── Juice helpers
  function flash(txt, color, size, x, y) {
    flashes.push({ txt:txt, color:color, size:size, x:x||W/2, y:y||H/2-40, t:0 });
  }
  function calcCorrectCount() {
    var n = 0;
    for (var i = 0; i < order.length; i++) { if (order[i] === i) n++; }
    return n;
  }
  // Slot Y position for slot index s
  function slotY(s) { return 120 + s * (CARD_H + CARD_PAD); }

  // ── Init
  function newGame() {
    phase = 'title';
    // shuffle order deterministically
    order = [0,1,2,3,4,5,6];
    for (var i = order.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
    }
    // make sure it's not already solved
    while (calcCorrectCount() === order.length) {
      var a = Math.floor(rng() * order.length);
      var b = (a + 1 + Math.floor(rng() * (order.length - 1))) % order.length;
      var t2 = order[a]; order[a] = order[b]; order[b] = t2;
    }
    dragging  = null;
    locked    = false;
    lockedAt  = 0;
    ctaAt     = 0;
    flashes   = [];
    hitStop   = 0;
    shakeAmt  = 0;
    zoom      = 1;
    score     = calcCorrectCount();
    botRunsDone = 0;
    demoStep  = 0;
    demoT     = 0;
    demoPhase = 'settle';   // settle | deepen | resolve | cta
    demoPhaseT = 0;
    demoSlotTarget = -1;
    last      = performance.now();

    if (BOT) { startPlay(); }
    if (DEMO) {
      // settle: show title for ~2s then start building
      startPlay();
      demoPhase = 'settle';
    }
  }

  function startPlay() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function checkLock() {
    score = calcCorrectCount();
    if (score === order.length) {
      lockRoutine();
    }
  }

  function lockRoutine() {
    if (locked) return;
    locked  = true;
    phase   = 'locked';
    lockedAt = performance.now();
    hitStop = 80;
    zoom    = 1.04;
    shakeAmt = 0;   // calm — no shake on lock
    if (window.J) J.calm(7);
    flash('ROUTINE LOCKED', TEAL, 36, W/2, 80);
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: 7, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = 7;
      demoPhase = 'cta';
      demoPhaseT = performance.now();
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2000);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { restartGame(); }, 800);
      }
    }
  }

  function restartGame() {
    if (window.LOOP) LOOP.emit('restart', {});
    rng = mulberry32(SEED + botRunsDone * 31337);
    order = [0,1,2,3,4,5,6];
    for (var i = order.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
    }
    while (calcCorrectCount() === order.length) {
      var a = Math.floor(rng() * order.length);
      var b = (a + 1 + Math.floor(rng() * (order.length - 1))) % order.length;
      var t2 = order[a]; order[a] = order[b]; order[b] = t2;
    }
    dragging  = null;
    locked    = false;
    flashes   = [];
    hitStop   = 0;
    shakeAmt  = 0;
    zoom      = 1;
    score     = calcCorrectCount();
    // reset autopilot state so buildBotPlan/buildDemoPlan fires fresh
    autopilotReady = false;
    botPlan = []; botPlanIdx = 0; botWaitFrames = 0;
    demoPlan = null; demoPlanIdx = 0; demoWaitFrames = 0;
    startPlay();
  }

  // ── Drag input
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function pointerToCard(px, py) {
    // returns slot index the pointer is over, or -1
    for (var s = 0; s < order.length; s++) {
      var sy = slotY(s);
      if (px >= SLOT_X && px <= SLOT_X + CARD_W && py >= sy && py <= sy + CARD_H) return s;
    }
    return -1;
  }

  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale, py = (e.clientY - r.top) / scale;
    if (inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startPlay(); return; }
    if (phase === 'locked' || phase === 'cta') { restartGame(); return; }
    if (phase === 'play') {
      var slot = pointerToCard(px, py);
      if (slot >= 0) {
        dragging = { fromSlot: slot, startY: py, curY: py,
                     offsetY: py - slotY(slot) };
        e.preventDefault();
      }
    }
  });
  window.addEventListener('pointermove', function (e) {
    if (DEMO || BOT || !dragging) return;
    var r = cv.getBoundingClientRect();
    dragging.curY = (e.clientY - r.top) / scale;
  });
  window.addEventListener('pointerup', function (e) {
    if (DEMO || BOT || !dragging) return;
    var r = cv.getBoundingClientRect();
    var py = (e.clientY - r.top) / scale;
    // find target slot
    var targetY = py - dragging.offsetY + CARD_H / 2;
    var toSlot = Math.max(0, Math.min(order.length - 1, Math.round((targetY - 120) / (CARD_H + CARD_PAD))));
    if (toSlot !== dragging.fromSlot) {
      swapSlots(dragging.fromSlot, toSlot);
    }
    dragging = null;
  });
  window.addEventListener('pointercancel', function () { dragging = null; });

  function swapSlots(from, to) {
    var tmp = order[from]; order[from] = order[to]; order[to] = tmp;
    score = calcCorrectCount();
    if (window.J) J.calm(score);
    // snap flash on correct placement
    if (order[to] === to || order[from] === from) {
      flash('✓', TEAL, 28, SLOT_X + CARD_W / 2, slotY(to) + CARD_H / 2);
      hitStop = 30;
    }
    if (window.LOOP) LOOP.emit('card_placed', { score: score, from: from, to: to });
    checkLock();
  }

  // ── Demo/Bot autopilot
  // Demo: calm arc — settle (2s) → deepen (build step by step) → resolve (lock) → cta
  var demoPlan; // array of [from, to] swaps to solve the puzzle
  var demoPlanIdx = 0;
  var demoWaitFrames = 0;

  function buildDemoPlan() {
    // compute the sequence of swaps to sort order[] into [0,1,2,3,4,5,6]
    demoPlan = [];
    var arr = order.slice();
    for (var i = 0; i < arr.length; i++) {
      if (arr[i] !== i) {
        // find where i is
        for (var j = i + 1; j < arr.length; j++) {
          if (arr[j] === i) {
            demoPlan.push([i, j]);
            var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
            break;
          }
        }
      }
    }
  }

  // Bot: same idea but with occasional wrong moves first
  var botPlan = [], botPlanIdx = 0, botWaitFrames = 0;
  function buildBotPlan() {
    botPlan = [];
    var arr = order.slice();
    // one intentional wrong swap first (for imperfection)
    var wi = Math.floor(rng() * (arr.length - 1));
    botPlan.push([wi, wi + 1]);
    var t = arr[wi]; arr[wi] = arr[wi+1]; arr[wi+1] = t;
    // then solve
    for (var i = 0; i < arr.length; i++) {
      if (arr[i] !== i) {
        for (var j = i + 1; j < arr.length; j++) {
          if (arr[j] === i) {
            botPlan.push([i, j]);
            var t2 = arr[i]; arr[i] = arr[j]; arr[j] = t2;
            break;
          }
        }
      }
    }
    botPlanIdx = 0;
    botWaitFrames = 0;
  }

  var autopilotReady = false;
  function autopilot(dt) {
    if (phase !== 'play') return;
    if (!autopilotReady) {
      if (DEMO && !demoPlan) { buildDemoPlan(); demoPlanIdx = 0; demoWaitFrames = 60; }
      if (BOT) { buildBotPlan(); }
      autopilotReady = true;
    }

    if (DEMO) {
      if (demoWaitFrames > 0) { demoWaitFrames -= dt; return; }
      if (demoPlanIdx >= demoPlan.length) return;
      var swap = demoPlan[demoPlanIdx];
      swapSlots(swap[0], swap[1]);
      demoPlanIdx++;
      demoWaitFrames = 45 + rng() * 30; // human-feeling hesitation
    } else if (BOT) {
      if (botWaitFrames > 0) { botWaitFrames -= dt; return; }
      if (botPlanIdx >= botPlan.length) return;
      var bswap = botPlan[botPlanIdx];
      swapSlots(bswap[0], bswap[1]);
      botPlanIdx++;
      botWaitFrames = 20 + rng() * 25;
    }
  }

  // ── Render
  function drawCard(s, cardIdx, isGhost, alpha) {
    var step = STEPS[cardIdx];
    var y = slotY(s);
    var correct = (cardIdx === s);
    cx.globalAlpha = alpha !== undefined ? alpha : 1;

    // card background
    cx.fillStyle = correct ? 'rgba(46,197,182,0.18)' : 'rgba(255,255,255,0.06)';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(SLOT_X, y, CARD_W, CARD_H - 4, 10);
    else cx.rect(SLOT_X, y, CARD_W, CARD_H - 4);
    cx.fill();

    // left accent bar
    cx.fillStyle = correct ? TEAL : 'rgba(255,255,255,0.15)';
    cx.fillRect(SLOT_X, y, 4, CARD_H - 4);

    // icon
    cx.font = '22px -apple-system, Helvetica, Arial';
    cx.textAlign = 'left';
    cx.fillStyle = '#fff';
    cx.fillText(step.icon, SLOT_X + 14, y + CARD_H - 20);

    // label
    cx.font = '600 15px -apple-system, Helvetica, Arial';
    cx.fillStyle = correct ? '#fff' : DIM;
    cx.fillText(step.label, SLOT_X + 46, y + CARD_H - 20);

    // slot number (dim)
    cx.font = '600 11px Menlo, monospace';
    cx.textAlign = 'right';
    cx.fillStyle = correct ? TEAL : 'rgba(255,255,255,0.22)';
    cx.fillText((s + 1) + '', SLOT_X + CARD_W - 10, y + CARD_H - 20);

    // check indicator
    if (correct) {
      cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillStyle = TEAL;
      cx.fillText('✓', SLOT_X + CARD_W - 28, y + CARD_H - 20);
    }

    cx.globalAlpha = 1;
  }

  function drawProgress() {
    var total = order.length;
    var barW = CARD_W, barH = 4;
    var bx = SLOT_X, by = 100;
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    if (cx.roundRect) { cx.beginPath(); cx.roundRect(bx, by, barW, barH, 2); cx.fill(); }
    else cx.fillRect(bx, by, barW, barH);
    cx.fillStyle = TEAL;
    var fill = (score / total) * barW;
    if (cx.roundRect) { cx.beginPath(); cx.roundRect(bx, by, fill, barH, 2); cx.fill(); }
    else cx.fillRect(bx, by, fill, barH);
    // label
    cx.textAlign = 'left';
    cx.font = '600 11px Menlo, monospace';
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.fillText(score + '/' + total + ' IN ORDER', bx, by - 6);
  }

  var ctaOverlay = 0;
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop decays; autopilot only runs when hitStop is not active
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      autopilot(dt);
    }

    // juice decay
    shakeAmt *= Math.pow(0.88, dt);
    zoom += (1 - zoom) * 0.10 * dt;

    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shakeAmt, sy = (rng() - 0.5) * shakeAmt;
      cx.translate(W/2 + sx, H/2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W/2, -H/2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)');
    bg.addColorStop(1, 'rgba(126,203,196,0.04)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 38px -apple-system, Helvetica, Arial';
      cx.fillText('ROUTINE BUILDER', W/2, 300);
      cx.fillStyle = TEAL;
      cx.font = '600 16px -apple-system, Helvetica, Arial';
      var p = 0.55 + 0.45 * Math.sin(now / 700);
      cx.globalAlpha = p;
      cx.fillText('TAP TO START', W/2, 346);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('drag the steps into order', W/2, 378);
    }

    if (phase === 'play' || phase === 'locked') {
      // header
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 14px Menlo, monospace';
      cx.fillText('BUILD YOUR SYSTEM', W/2, 44);
      cx.fillStyle = TEAL;
      cx.font = '700 12px -apple-system, Helvetica, Arial';
      cx.fillText('drag to reorder', W/2, 66);

      drawProgress();

      // draw cards (skip dragged card in its slot)
      for (var s = 0; s < order.length; s++) {
        if (dragging && dragging.fromSlot === s) {
          // ghost placeholder
          cx.fillStyle = 'rgba(255,255,255,0.04)';
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(SLOT_X, slotY(s), CARD_W, CARD_H - 4, 10);
          else cx.rect(SLOT_X, slotY(s), CARD_W, CARD_H - 4);
          cx.fill();
          continue;
        }
        drawCard(s, order[s]);
      }

      // draw dragged card floating
      if (dragging) {
        var dy = dragging.curY - dragging.offsetY;
        cx.save();
        cx.shadowColor = 'rgba(46,197,182,0.35)';
        cx.shadowBlur = 14;
        cx.translate(0, dy - slotY(dragging.fromSlot));
        drawCard(dragging.fromSlot, order[dragging.fromSlot], false, 0.96);
        cx.restore();
      }

      // locked overlay summary
      if (phase === 'locked') {
        var elapsed = (now - lockedAt) / 1000;
        var easeIn = Math.min(1, elapsed * 1.8);
        cx.fillStyle = 'rgba(11,13,18,' + (0.5 * easeIn) + ')';
        cx.fillRect(0, 0, W, H);
        cx.globalAlpha = easeIn;
        cx.textAlign = 'center';
        cx.fillStyle = TEAL;
        cx.font = '800 28px -apple-system, Helvetica, Arial';
        cx.fillText('YOUR SYSTEM.', W/2, 86);
        // summary slide card
        var sy2 = 118 - Math.max(0, (1 - easeIn) * 60);
        cx.fillStyle = 'rgba(46,197,182,0.12)';
        if (cx.roundRect) { cx.beginPath(); cx.roundRect(SLOT_X - 8, sy2 - 12, CARD_W + 16, order.length * (CARD_H + CARD_PAD) + 30, 14); cx.fill(); }
        cx.strokeStyle = 'rgba(46,197,182,0.3)'; cx.lineWidth = 1;
        if (cx.roundRect) { cx.beginPath(); cx.roundRect(SLOT_X - 8, sy2 - 12, CARD_W + 16, order.length * (CARD_H + CARD_PAD) + 30, 14); cx.stroke(); }
        cx.globalAlpha = 1;

        if (!DEMO && !BOT) {
          cx.globalAlpha = easeIn;
          cx.fillStyle = TEAL;
          cx.font = '600 14px -apple-system, Helvetica, Arial';
          var p2 = 0.5 + 0.5 * Math.sin(now / 600);
          cx.globalAlpha = easeIn * p2;
          cx.fillText('TAP TO BUILD AGAIN', W/2, H - 70);
          cx.globalAlpha = 1;
        }
      }
    }

    // CTA card (demo only)
    if (phase === 'cta') {
      var t2 = (now - ctaAt) / 1000, ease2 = Math.min(1, t2 * 2.0);
      cx.fillStyle = 'rgba(11,13,18,' + (0.85 * ease2) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease2;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 36px -apple-system, Helvetica, Arial';
      cx.fillText('ROUTINE BUILDER', W/2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('your morning. your rules.', W/2, 325);
      var pp = 0.65 + 0.35 * Math.sin(now / 400);
      cx.fillStyle = TEAL;
      cx.globalAlpha = ease2 * pp;
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W/2, 395);
      cx.globalAlpha = ease2;
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 430);
      cx.globalAlpha = 1;
    }

    // floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '800 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 1.2);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
