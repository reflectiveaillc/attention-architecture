    roundedRect(x, y, w, h, 18);
    cx.fill();
    cx.shadowColor = 'transparent';

    // border
    cx.strokeStyle = 'rgba(255,255,255,0.22)';
    cx.lineWidth = 1.5;
    roundedRect(x, y, w, h, 18);
    cx.stroke();

    // text
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillStyle = '#fff';
    var size = Math.max(14, Math.min(26, h * 0.32));
    cx.font = '900 ' + size + 'px -apple-system, Helvetica, Arial';
    var label = b.label;
    if (effects.scrambleUntil > 0 && isReal) {
      label = scramble(label);
    }
    cx.fillText(label, x, y + 1);
    cx.restore();
  }

  function scramble(s) {
    var arr = s.split('');
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr.join('');
  }

  function currentButton() {
    var now = performance.now();
    if (effects.dodgeUntil > now) {
      var t = 1 - (effects.dodgeUntil - now) / 650;
      var e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      return {
        x: effects.dodgeBaseX + (effects.dodgeTargetX - effects.dodgeBaseX) * e,
        y: effects.dodgeBaseY + (effects.dodgeTargetY - effects.dodgeBaseY) * e,
        w: button.w, h: button.h, label: button.label
      };
    }
    return button;
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 11))));
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;
    if (hitStop > 0) hitStop -= dt; // decay — without this the first milestone freezes the autopilot forever
    else autopilot(now);

    if (button.squash > 0) button.squash = Math.max(0, button.squash - 0.12 * dt);

    // canvas filter
    var filterParts = [];
    if (effects.dead) filterParts.push('grayscale(1)');
    if (effects.invertUntil > now) filterParts.push('invert(1)');
    if (filterParts.length) cx.filter = filterParts.join(' ');
    else cx.filter = 'none';

    // Contract v2: global juice transform (save/scale/shake/restore)
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(232,80,46,0.08)');
    bg.addColorStop(1, 'rgba(46,197,182,0.05)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // flicker overlay
    if (effects.flickerUntil > now) {
      var flick = (now % 160) < 80 ? 0.12 : 0;
      cx.fillStyle = 'rgba(255,255,255,' + flick + ')';
      cx.fillRect(0, 0, W, H);
    }

    // tremble offset
    var tx = 0, ty = 0;
    if (effects.tremble) {
      tx = (rng() - 0.5) * 6;
      ty = (rng() - 0.5) * 6;
    }

    cx.save();
    // flip the whole UI
    if (effects.flipUntil > now) {
      cx.translate(0, H);
      cx.scale(1, -1);
    }
    cx.translate(tx, ty);

    // cracks
    cx.strokeStyle = 'rgba(255,255,255,0.28)';
    cx.lineWidth = 1;
    for (var i = 0; i < effects.cracks.length; i++) {
      var c = effects.cracks[i];
      cx.beginPath(); cx.moveTo(c.x1, c.y1); cx.lineTo(c.x2, c.y2); cx.stroke();
    }

    // button(s)
    var cur = currentButton();
    if (effects.decoys) {
      for (var i = 0; i < effects.decoyPositions.length; i++) {
        var p = effects.decoyPositions[i];
        drawButton({ x: p.x, y: p.y, w: p.w, h: p.h, label: 'DO NOT PRESS' }, i === effects.realDecoyIdx, 0.96);
      }
    } else {
      drawButton(cur, true);
    }

    // sweat
    for (var i = effects.sweat.length - 1; i >= 0; i--) {
      var s = effects.sweat[i];
      s.y += s.vy * dt; s.life -= 0.015 * dt;
      cx.fillStyle = 'rgba(46,197,182,' + (s.life * 0.7) + ')';
      cx.beginPath(); cx.arc(s.x, s.y, 3, 0, Math.PI * 2); cx.fill();
      if (s.life <= 0) effects.sweat.splice(i, 1);
    }

    // confetti
    for (var i = effects.confetti.length - 1; i >= 0; i--) {
      var p = effects.confetti[i];
      if (p.suck) {
        p.x += (W / 2 - p.x) * 0.12 * dt;
        p.y += (H / 2 - p.y) * 0.12 * dt;
        p.life -= 0.04 * dt;
      } else {
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.35 * dt;
        p.life -= 0.008 * dt;
      }
      cx.fillStyle = p.color;
      cx.globalAlpha = Math.max(0, p.life);
      cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
      if (p.life <= 0) effects.confetti.splice(i, 1);
    }

    // label above button
    var label = '';
    if (effects.payoff) label = '';
    else if (effects.mockUntil > now && effects.mockText) label = effects.mockText;
    else if (effects.beg && total >= 80 && total < 90) label = getLabel(total) || 'please stop.';
    else if (effects.finale && total >= 90 && total < 100) label = getLabel(total) || (100 - total) + ' more…';
    else label = getLabel(total);
    if (label) {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.82)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText(label, W / 2, cur.y - cur.h / 2 - 34);
    }

    // counter + incoming dare banner
    if (!effects.payoff && demoPhase !== 'challenge' && demoPhase !== 'over' && demoPhase !== 'cta') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 72px -apple-system, Helvetica, Arial';
      cx.fillText(total, W / 2, 110);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('PRESSES', W / 2, 136);
      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 164);
      }
    }

    cx.restore(); // end flip/tremble

    // flashes (drawn after flip so text reads upright)
    for (var i = flashes.length - 1; i >= 0; i--) {
      var fl = flashes[i]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, fl.y - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(i, 1);
    }

    // fake alert
    if (effects.alertUntil > now) {
      var e2 = Math.min(1, (effects.alertUntil - now) / 300);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * e2) + ')';
      cx.fillRect(20, 200, W - 40, 140);
      cx.strokeStyle = VERM; cx.lineWidth = 2;
      cx.strokeRect(22, 202, W - 44, 136);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '800 18px -apple-system, Helvetica, Arial';
      cx.fillText('SYSTEM ALERT', W / 2, 240);
      cx.fillStyle = '#fff';
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('USER IS STILL PRESSING', W / 2, 272);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('severity: terminal curiosity', W / 2, 298);
    }

    // fake achievement
    if (effects.achievementUntil > now) {
      var e3 = Math.min(1, (effects.achievementUntil - now) / 300);
      cx.fillStyle = 'rgba(242,177,52,' + (0.18 * e3) + ')';
      cx.fillRect(0, 180, W, 180);
      cx.textAlign = 'center';
      cx.fillStyle = GOLD;
      cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText('🏆 ACHIEVEMENT UNLOCKED', W / 2, 230);
      cx.fillStyle = '#fff';
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('HALFWAY TO NOTHING', W / 2, 272);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('progress bar: 50% of disappointment', W / 2, 302);
    }

    // payoff + share pill (human only)
    if (effects.payoff) {
      cx.fillStyle = 'rgba(11,13,18,0.6)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '700 22px -apple-system, Helvetica, Arial';
      cx.fillText("that's it. that's what happens.", W / 2, H / 2 - 24);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('(press to start over)', W / 2, H / 2 + 14);
      if (!DEMO && !BOT) {
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo challenge card
    if (DEMO && demoPhase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(demoTarget), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // demo score card
    if (DEMO && demoPhase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('THEY PRESSED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore || demoTarget) + ' presses', W / 2, 345);
      var pt = pctTop(window.__demoScore || demoTarget);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
    }

    // demo CTA
    if (DEMO && demoPhase === 'cta') {
      if (ctaAt === 0) ctaAt = now;
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 56px -apple-system, Helvetica, Arial';
      cx.fillText("DON'T", W / 2, 270);
      cx.fillText('PRESS', W / 2, 330);
      cx.fillStyle = 'rgba(255,255,255,0.8)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they pressed ' + (window.__demoScore || demoTarget) + '. your move.', W / 2, 380);
      var p2 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p2;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || demoTarget), W / 2, 450);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 484);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore(); // end global juice transform
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
