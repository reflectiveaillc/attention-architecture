<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // Seeded RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  // Soft calm palette; vermillion intentionally avoided.
  var CATS = [
    { id: 'sea',   label: 'SEA',   color: '#2ec5b6', tone: 'hsl(173,58%,48%)' },
    { id: 'sun',   label: 'SUN',   color: '#f2b134', tone: 'hsl(40,78%,57%)'  },
    { id: 'mint',  label: 'MINT',  color: '#7dd3c0', tone: 'hsl(166,48%,66%)' },
    { id: 'moon',  label: 'MOON',  color: '#9bb5ff', tone: 'hsl(222,100%,80%)'},
    { id: 'sand',  label: 'SAND',  color: '#e8c58c', tone: 'hsl(36,62%,73%)'  },
    { id: 'bloom', label: 'BLOOM', color: '#c9a0dc', tone: 'hsl(285,45%,74%)' }
  ];
  var TILE_SIZE = 34;
  var TILES_DEF = [
    { cat: 0, mark: 0 }, { cat: 0, mark: 1 }, { cat: 0, mark: 2 },
    { cat: 1, mark: 0 }, { cat: 1, mark: 1 }, { cat: 1, mark: 2 },
    { cat: 2, mark: 0 }, { cat: 2, mark: 1 }, { cat: 2, mark: 2 },
    { cat: 3, mark: 0 }, { cat: 3, mark: 1 }, { cat: 3, mark: 2 },
    { cat: 4, mark: 0 }, { cat: 4, mark: 1 }, { cat: 4, mark: 2 },
    { cat: 5, mark: 0 }, { cat: 5, mark: 1 }, { cat: 5, mark: 2 }
  ];

  // --- Layout ---
  var SLOT_COLS = 3, SLOT_ROWS = 2;
  var SLOT_W = 118, SLOT_H = 86, SLOT_PAD = 10;
  var VAULT_W = SLOT_COLS * SLOT_W + (SLOT_COLS - 1) * SLOT_PAD;
  var VAULT_X = (W - VAULT_W) / 2;
  var VAULT_Y = H - SLOT_ROWS * SLOT_H - (SLOT_ROWS - 1) * SLOT_PAD - 26;
  var PILE_Y_TOP = 124, PILE_Y_BOT = VAULT_Y - 28;

  var slots = [];
  (function buildSlots() {
    for (var i = 0; i < CATS.length; i++) {
      var col = i % SLOT_COLS, row = Math.floor(i / SLOT_COLS);
      slots.push({
        catIdx: i,
        x: VAULT_X + col * (SLOT_W + SLOT_PAD),
        y: VAULT_Y + row * (SLOT_H + SLOT_PAD),
        w: SLOT_W,
        h: SLOT_H,
        count: 0
      });
    }
  })();

  // --- State ---
  var phase, tiles, placedCount, score, flashes, runStartTs, completeAt, ctaAt, endAt;
  var hitStop, zoom, shakeAmt;
  var botRunsDone, demoIdx, demoWait, botWait, botMiss;
  var dragging = null;      // { tile, offsetX, offsetY, auto: false }
  var autoDrag = null;      // { tile, fromX, fromY, toX, toY, t, dur, targetSlot }
  var best = 0;
  try { best = +localStorage.getItem('vs_best') || 0; } catch (_) {}

  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function newGame() {
    phase       = 'title';
    tiles       = [];
    placedCount = 0;
    score       = 0;
    flashes     = [];
    completeAt  = 0;
    ctaAt       = 0;
    endAt       = 0;
    hitStop     = 0;
    zoom        = 1;
    shakeAmt    = 0;
    botRunsDone = 0;
    demoIdx     = 0;
    demoWait    = 0;
    botWait     = 0;
    botMiss     = 0;
    dragging    = null;
    autoDrag    = null;

    for (var i = 0; i < slots.length; i++) slots[i].count = 0;
    buildTiles();

    if (BOT) setTimeout(startPlay, 250);
    if (DEMO) setTimeout(startPlay, 1400);
  }

  function buildTiles() {
    // shuffle tile order in the pile so it looks tumbled
    var order = [];
    for (var i = 0; i < TILES_DEF.length; i++) order.push(i);
    for (var j = order.length - 1; j > 0; j--) {
      var k = Math.floor(rng() * (j + 1));
      var tmp = order[j]; order[j] = order[k]; order[k] = tmp;
    }
    tiles = [];
    var cx0 = W / 2, cy0 = (PILE_Y_TOP + PILE_Y_BOT) / 2;
    for (var n = 0; n < order.length; n++) {
      var def = TILES_DEF[order[n]];
      // pile scatter: random position with overlap for a "tumbled" feel
      var angle = rng() * Math.PI * 2;
      var dist  = rng() * 90;
      var x = cx0 + Math.cos(angle) * dist + (rng() - 0.5) * 30;
      var y = cy0 + Math.sin(angle) * dist * 0.6 + (rng() - 0.5) * 40;
      x = Math.max(40 + TILE_SIZE, Math.min(W - 40 - TILE_SIZE, x));
      y = Math.max(PILE_Y_TOP + TILE_SIZE, Math.min(PILE_Y_BOT - TILE_SIZE, y));
      tiles.push({
        defIdx: order[n],
        catIdx: def.cat,
        markIdx: def.mark,
        x: x, y: y,
        homeX: x, homeY: y,
        placed: false,
        slotX: 0, slotY: 0,
        glow: 0,
        returnT: 0
      });
    }
  }

  function startPlay() {
    if (phase === 'play' || phase === 'complete' || phase === 'cta') return;
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function slotForTile(tile) { return slots[tile.catIdx]; }

  function placeTile(tile) {
    if (tile.placed) return;
    var slot = slotForTile(tile);
    slot.count++;
    tile.placed = true;
    tile.glow = 1;
    placedCount++;
    score = placedCount;

    // position inside slot: 3 tiles per slot in a row, centered
    var insetX = 5 + (slot.count - 1) * (TILE_SIZE + 3);
    var insetY = (slot.h - TILE_SIZE) / 2;
    tile.slotX = slot.x + insetX;
    tile.slotY = slot.y + insetY;
    tile.x = tile.slotX; tile.y = tile.slotY;

    if (window.J) J.calm(placedCount);

    // calm juice: tiny hit-stop, soft zoom
    hitStop = 2;
    zoom = placedCount >= 18 ? 1.05 : 1.02;
    if (placedCount === 18) { shakeAmt = 2; }

    var labels = ['SETTLED', 'THERE', 'NICE', 'EASY', 'QUIET', 'CALM'];
    flash(labels[Math.floor(rng() * labels.length)], TEAL, 28);

    if (window.LOOP) LOOP.emit('tile_placed', { cat: tile.catIdx, n: placedCount });

    if (placedCount >= 18) {
      setTimeout(completeGame, 220);
    }
  }

  function tryDropTile(tile, x, y) {
    // find the vault slot under the drop point
    for (var i = 0; i < slots.length; i++) {
      var s = slots[i];
      if (x >= s.x && x <= s.x + s.w && y >= s.y && y <= s.y + s.h) {
        if (s.catIdx === tile.catIdx && s.count < 3) {
          placeTile(tile);
          return true;
        }
        // wrong slot — soft near-miss flash
        flash('NOT THERE', GOLD, 26);
        if (window.LOOP) LOOP.emit('near_miss', { cat: tile.catIdx, dropped: s.catIdx });
        break;
      }
    }
    return false;
  }

  function completeGame() {
    if (phase === 'complete') return;
    phase = 'complete';
    completeAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;

    if (score > best) {
      best = score;
      try { localStorage.setItem('vs_best', String(best)); } catch (_) {}
    }

    if (window.J) J.calm(18);
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 3200);
      return;
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    phase       = 'play';
    placedCount = 0;
    score       = 0;
    flashes     = [];
    completeAt  = 0;
    endAt       = 0;
    hitStop     = 0;
    zoom        = 1;
    shakeAmt    = 0;
    botMiss     = 0;
    dragging    = null;
    autoDrag    = null;
    for (var i = 0; i < slots.length; i++) slots[i].count = 0;
    buildTiles();
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('restart', {});
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // --- Input ---
  function toCanvas(pt) {
    var r = cv.getBoundingClientRect();
    return { x: (pt.clientX - r.left) / scale, y: (pt.clientY - r.top) / scale };
  }

  function tileAt(x, y) {
    for (var i = tiles.length - 1; i >= 0; i--) {
      var t = tiles[i];
      if (t.placed) continue;
      if (Math.abs(x - (t.x + TILE_SIZE / 2)) < TILE_SIZE / 2 + 4 &&
          Math.abs(y - (t.y + TILE_SIZE / 2)) < TILE_SIZE / 2 + 4) {
        return t;
      }
    }
    return null;
  }

  function onPointerDown(e) {
    if (DEMO || BOT) return;
    var p = toCanvas(e);
    if (inR(MUTE_R, p.x, p.y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startPlay(); return; }
    if (phase === 'complete' || phase === 'over') {
      if (performance.now() - completeAt > 350) {
        if (inR(SHARE_R, p.x, p.y) && window.SHARE) {
          SHARE.send({ score: score, unit: 'tiles sorted' }); return;
        }
        resetRun();
      }
      return;
    }
    if (phase !== 'play') return;
    var t = tileAt(p.x, p.y);
    if (t) {
      dragging = { tile: t, offsetX: p.x - t.x, offsetY: p.y - t.y, auto: false };
      t.glow = 1;
    }
  }
  function onPointerMove(e) {
    if (!dragging || dragging.auto) return;
    var p = toCanvas(e);
    dragging.tile.x = p.x - dragging.offsetX;
    dragging.tile.y = p.y - dragging.offsetY;
  }
  function onPointerUp(e) {
    if (!dragging || dragging.auto) return;
    var t = dragging.tile;
    var cx = t.x + TILE_SIZE / 2, cy = t.y + TILE_SIZE / 2;
    if (!tryDropTile(t, cx, cy)) {
      // animate back to home
      t.returnT = 0;
    }
    dragging = null;
  }

  window.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    if (e.code === 'Space') {
      if (phase === 'title') startPlay();
      else if ((phase === 'complete' || phase === 'over') && performance.now() - completeAt > 350) resetRun();
    }
  });

  // --- Autopilot (demo + bot) ---
  // Hesitation pattern: settle → quicker middle → lingering resolve
  var demoWaits = [26, 22, 24, 20, 22, 18, 24, 20, 22, 24, 18, 22, 20, 22, 26, 18, 22, 20];
  var botWaits  = [14, 10, 12, 10, 8, 12, 10, 14, 10, 8, 12, 10, 8, 12, 10, 8, 10, 12];

  function startAutoDrag(tile, targetSlot) {
    var tx = targetSlot.x + 5 + targetSlot.count * (TILE_SIZE + 3);
    var ty = targetSlot.y + (targetSlot.h - TILE_SIZE) / 2;
    autoDrag = {
      tile: tile,
      fromX: tile.homeX, fromY: tile.homeY,
      toX: tx, toY: ty,
      t: 0, dur: DEMO ? 28 : 18,
      targetSlot: targetSlot
    };
  }

  function pickNextTile() {
    for (var i = 0; i < tiles.length; i++) {
      if (!tiles[i].placed) return tiles[i];
    }
    return null;
  }

  function autopilot() {
    if (phase !== 'play') return;
    if (autoDrag) return; // mid-drag

    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var tile = pickNextTile();
      if (!tile) return;
      var slot = slotForTile(tile);
      startAutoDrag(tile, slot);
      demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 26;
      demoIdx++;
    } else if (BOT) {
      if (botWait > 0) { botWait--; return; }
      var tile = pickNextTile();
      if (!tile) return;
      var slot = slotForTile(tile);
      if (rng() < 0.12) {
        // imperfect: drag to a wrong slot first, then tile returns home
        var wrong = slots[Math.floor(rng() * slots.length)];
        if (wrong.catIdx !== tile.catIdx) {
          startAutoDrag(tile, wrong);
          botMiss++;
          botWait = Math.floor(10 + rng() * 14);
          return;
        }
      }
      startAutoDrag(tile, slot);
      botWait = botWaits[Math.min(botMiss, botWaits.length - 1)] || 10;
    }
  }

  function updateAutoDrag(dt) {
    if (!autoDrag) return;
    var a = autoDrag;
    a.t += dt;
    var p = Math.min(1, a.t / a.dur);
    // ease out cubic
    var ease = 1 - Math.pow(1 - p, 3);
    a.tile.x = a.fromX + (a.toX - a.fromX) * ease;
    a.tile.y = a.fromY + (a.toY - a.fromY) * ease;
    if (p >= 1) {
      // if wrong slot, snap back; if full, also snap back
      if (a.targetSlot.catIdx === a.tile.catIdx && a.targetSlot.count < 3) {
        placeTile(a.tile);
      } else {
        a.tile.returnT = 0;
        flash('NOT THERE', GOLD, 24);
      }
      autoDrag = null;
    }
  }

  // --- Render helpers ---
  function drawMark(cx, x, y, size, markIdx, color) {
    cx.save();
    cx.translate(x + size / 2, y + size / 2);
    cx.fillStyle = 'rgba(11,13,18,0.75)';
    cx.strokeStyle = 'rgba(11,13,18,0.75)';
    cx.lineWidth = 2.5;
    var r = size * 0.22;
    if (markIdx === 0) {
      cx.beginPath(); cx.arc(0, 0, r, 0, Math.PI * 2); cx.fill();
    } else if (markIdx === 1) {
      cx.beginPath();
      cx.roundRect ? cx.roundRect(-r, -r, r * 2, r * 2, 4) : cx.rect(-r, -r, r * 2, r * 2);
      cx.fill();
    } else {
      cx.beginPath();
      cx.moveTo(0, -r - 2); cx.lineTo(r + 2, r + 2); cx.lineTo(-r - 2, r + 2);
      cx.closePath(); cx.fill();
    }
    cx.restore();
  }

  function drawTile(t, now) {
    var size = TILE_SIZE;
    var glow = Math.max(0, t.glow);
    if (glow > 0) t.glow -= 0.03;

    cx.save();
    if (glow > 0) {
      cx.shadowColor = CATS[t.catIdx].color;
      cx.shadowBlur = 18 * glow;
    }
    // tile body
    var g = cx.createLinearGradient(t.x, t.y, t.x, t.y + size);
    g.addColorStop(0, CATS[t.catIdx].tone.replace(')', ',85%)').replace('hsl', 'hsla'));
    g.addColorStop(1, CATS[t.catIdx].tone.replace(')', ',58%)').replace('hsl', 'hsla'));
    cx.fillStyle = g;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(t.x, t.y, size, size, 10);
    else cx.rect(t.x, t.y, size, size);
    cx.fill();
    cx.shadowBlur = 0;

    // border
    cx.strokeStyle = 'rgba(255,255,255,0.35)';
    cx.lineWidth = 1.5;
    cx.stroke();

    // mark
    drawMark(cx, t.x, t.y, size, t.markIdx, CATS[t.catIdx].color);
    cx.restore();
  }

  function drawSlot(s) {
    var cat = CATS[s.catIdx];
    cx.save();
    cx.fillStyle = 'rgba(255,255,255,0.04)';
    cx.strokeStyle = cat.color;
    cx.lineWidth = 2;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(s.x, s.y, s.w, s.h, 14);
    else cx.rect(s.x, s.y, s.w, s.h);
    cx.fill(); cx.stroke();

    // label
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '700 11px Menlo, monospace';
    cx.fillText(cat.label, s.x + s.w / 2, s.y + s.h - 10);

    // tiny count
    cx.fillStyle = 'rgba(255,255,255,0.25)';
    cx.font = '600 10px -apple-system, Helvetica, Arial';
    cx.fillText(s.count + '/3', s.x + s.w - 18, s.y + 16);
    cx.restore();
  }

  function drawVaultDoorClose(now) {
    if (phase !== 'complete' && phase !== 'cta') return;
    var t = (now - completeAt) / 1000;
    var ease = Math.min(1, t * 1.2);
    var panelW = (VAULT_W / 2 + 4) * ease;
    cx.save();
    cx.fillStyle = 'rgba(11,13,18,0.92)';
    cx.fillRect(VAULT_X - 4, VAULT_Y - 4, panelW, SLOT_ROWS * SLOT_H + (SLOT_ROWS - 1) * SLOT_PAD + 8);
    cx.fillRect(VAULT_X + VAULT_W + 4 - panelW, VAULT_Y - 4, panelW, SLOT_ROWS * SLOT_H + (SLOT_ROWS - 1) * SLOT_PAD + 8);
    // soft seam line
    cx.strokeStyle = 'rgba(46,197,182,' + (0.4 * (1 - ease * 0.5)) + ')';
    cx.lineWidth = 2;
    cx.beginPath();
    cx.moveTo(W / 2, VAULT_Y - 4);
    cx.lineTo(W / 2, VAULT_Y + SLOT_ROWS * SLOT_H + (SLOT_ROWS - 1) * SLOT_PAD + 4);
    cx.stroke();
    cx.restore();
  }

  // --- Main loop ---
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (phase === 'play') {
      // return-to-home animation for rejected drops
      for (var i = 0; i < tiles.length; i++) {
        var t = tiles[i];
        if (t.returnT > 0) {
          t.returnT += dt * 0.08;
          var p = Math.min(1, t.returnT);
          var e = 1 - Math.pow(1 - p, 3);
          t.x = t.x + (t.homeX - t.x) * e;
          t.y = t.y + (t.homeY - t.y) * e;
          if (p >= 1) t.returnT = 0;
        }
      }
    }

    // hit-stop decay + autopilot
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      if ((DEMO || BOT) && phase === 'play') {
        autopilot();
        updateAutoDrag(dt);
      }
    }

    // juice transforms: save/restore around the whole frame draw
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.10 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(242,177,52,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // title
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 44px -apple-system, Helvetica, Arial';
      cx.fillText('VAULT SORT', W / 2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('drag every treasure to its vault', W / 2, 318);
      var pulse = 0.5 + 0.5 * Math.sin(now / 380);
      cx.globalAlpha = 0.55 + 0.45 * pulse;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText(DEMO ? 'settling in…' : 'TAP TO START', W / 2, 362);
      cx.globalAlpha = 1;
    }

    // vault slots
    for (var si = 0; si < slots.length; si++) drawSlot(slots[si]);

    // placed tiles
    for (var pi = 0; pi < tiles.length; pi++) {
      if (tiles[pi].placed) drawTile(tiles[pi], now);
    }

    // unplaced tiles (pile)
    for (var ui = 0; ui < tiles.length; ui++) {
      if (!tiles[ui].placed) drawTile(tiles[ui], now);
    }

    // dragging tile on top
    if (dragging && dragging.tile && !dragging.tile.placed) {
      drawTile(dragging.tile, now);
    }

    // vault door close
    drawVaultDoorClose(now);

    // play HUD
    if (phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(placedCount, W / 2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('of 18 tiles sorted', W / 2, 110);
      cx.fillStyle = 'rgba(255,255,255,0.22)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('sort the vault, then it seals', W / 2, 138);
    }

    // complete card
    if (phase === 'complete') {
      var tComp = (now - completeAt) / 1000;
      var ease = Math.min(1, tComp * 1.6);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 88);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('all 18 tiles sorted', W / 2, 112);

      if (ease > 0.5) {
        cx.globalAlpha = (ease - 0.5) * 2;
        cx.fillStyle = TEAL;
        cx.font = '700 22px -apple-system, Helvetica, Arial';
        cx.fillText('VAULT SEALED', W / 2, 286);
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.font = '500 15px -apple-system, Helvetica, Arial';
        cx.fillText('every item in its place', W / 2, 316);
      }
      cx.globalAlpha = 1;

      if (!DEMO && !BOT && tComp > 1.4) {
        var pp = 0.6 + 0.4 * Math.sin(now / 320);
        cx.globalAlpha = pp;
        cx.fillStyle = TEAL;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO SORT AGAIN', W / 2, 420);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE YOUR VAULT', W / 2, SHARE_R.y + 30);
      }
    }

    // demo soft CTA
    if (phase === 'cta') {
      var tCta = (now - ctaAt) / 1000;
      var ctaEase = Math.min(1, tCta * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ctaEase) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ctaEase;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('VAULT SORT', W / 2, 284);
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '500 17px -apple-system, Helvetica, Arial';
      cx.fillText('organize your own vault', W / 2, 322);
      var ctaPulse = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL;
      cx.globalAlpha = ctaEase * ctaPulse;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 396);
      cx.globalAlpha = ctaEase;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // floating reward text
    for (var fi = flashes.length - 1; fi >= 0; fi--) {
      var fl = flashes[fi]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 224 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(fi, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
