<script>
(function () {
  'use strict';

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;

  var cv = document.getElementById('c'), cx = cv.getContext('2d');

  function newGame() {
    state = {

      beatActive: false, beatStart: 0, nextBeatAt: 0,

  function pctTop(score) {

  function startRun() {

    state.safeHit = true;
    state.beatActive = false;
    var award = Math.max(15, Math.round(state.safeDur * 1.5 - reaction));
    state.combo++; if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    state.score += award;

    var near = isNear || reaction > state.safeDur * 0.72;

      if (perfect) J.perfect(state.combo);
      else if (near) J.near();
      else J.hit(state.combo);

    var gap = Math.max(160, 340 - (state.round - 1) * 8);
    if (DEMO) gap += (demoWaits[Math.min(state.beatIdx, demoWaits.length - 1)] || 0);
    state.nextBeatAt = simTime + gap;
    state.round++;
  }

  function doFlinch() {
    if (!state.beatActive) return;

  function gameOver(reason) {
    if (state.phase === 'over') return;

  var demoWaits  = [420, 360, 540, 400, 620, 460, 520, 480, 300]; // hesitation before each beat

  function scheduleDemo() {
    var i = Math.min(state.beatIdx, demoScript.length - 1);

  var ctaAt = 0;

    // challenge card (demo beat 1)

    // floating reward text

      cx.globalAlpha = pulse; cx.fillText('TAP THE CALM', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('cut on teal. don’t flinch on red.', W / 2, 360);

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);

      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';

      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();

    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';

      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';

      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 0), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
