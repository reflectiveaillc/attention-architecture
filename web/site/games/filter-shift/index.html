        ctx.save(); ctx.strokeStyle = TEAL; ctx.lineWidth = 2; ctx.shadowColor = TEAL; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.moveTo(fx - fw * 0.30, fy + fh * 0.05); ctx.lineTo(fx - fw * 0.18, fy + fh * 0.12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(fx + fw * 0.30, fy + fh * 0.05); ctx.lineTo(fx + fw * 0.18, fy + fh * 0.12); ctx.stroke();
        ctx.restore();
        ctx.save(); ctx.strokeStyle = GOLD; ctx.lineWidth = 3; ctx.shadowColor = GOLD; ctx.shadowBlur = 8;
        var my = fy + fh * 0.26;
        ctx.beginPath(); ctx.moveTo(fx - fw * 0.18, my); ctx.quadraticCurveTo(fx, my + fh * 0.10, fx + fw * 0.18, my); ctx.stroke();
        ctx.restore();
      }
    },
    cartoon: {
      skin: '#ffdbac', outline: '#000', outlineWidth: 4,
      eyeWhite: '#fff', pupil: '#000', lip: '#c0392b', hair: '#222',
      extra: function (ctx, fx, fy, fw, fh) {
        ctx.fillStyle = 'rgba(255,105,105,0.25)';
        ctx.beginPath(); ctx.arc(fx - fw * 0.30, fy + fh * 0.08, fw * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(fx + fw * 0.30, fy + fh * 0.08, fw * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(fx - fw * 0.24, fy - fh * 0.17, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(fx + fw * 0.32, fy - fh * 0.17, 4, 0, Math.PI * 2); ctx.fill();
      }
    },
    glitch: {
      skin: '#b8b8b8', outline: '#111', outlineWidth: 1,
      eyeWhite: '#fff', pupil: '#d00', lip: '#000', hair: '#333',
      extra: function (ctx, fx, fy, fw, fh) {
        ctx.save();
        for (var i = 0; i < 6; i++) {
          var y = fy - fh / 2 + (i + 0.5) * fh / 6 + Math.sin(gNow * 0.008 + i) * 3;
          var shift = (i % 2 ? 1 : -1) * 8;
          ctx.globalCompositeOperation = 'screen';
          ctx.fillStyle = 'rgba(232,80,46,0.30)';
          ctx.fillRect(fx - fw / 2 + shift, y, fw, fh / 10);
          ctx.fillStyle = 'rgba(46,197,182,0.25)';
          ctx.fillRect(fx - fw / 2 - shift, y + 4, fw, fh / 12);
        }
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        for (var j = 0; j < 16; j++) ctx.fillRect(fx - fw / 2, fy - fh / 2 + j * (fh / 16), fw, 2);
        ctx.restore();
      }
    },
    noir: {
      skin: '#d4d4d4', outline: '#000', outlineWidth: 2,
      eyeWhite: '#f0f0f0', pupil: '#000', lip: '#333', hair: '#111',
      extra: function (ctx, fx, fy, fw, fh) {
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.beginPath(); ctx.ellipse(fx - fw * 0.28, fy - fh * 0.13, fw * 0.16, fh * 0.08, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(fx + fw * 0.28, fy - fh * 0.13, fw * 0.16, fh * 0.08, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.ellipse(fx, fy - fh * 0.42, fw * 0.42, fh * 0.10, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(fx - fw * 0.22, fy - fh * 0.55, fw * 0.44, fh * 0.16);
      }
    },
    beauty: {
      skin: '#f5c6a5', outline: 'rgba(120,80,70,0.25)', outlineWidth: 1,
      eyeWhite: '#fff', pupil: '#5a3a2a', lip: '#d44d6e', hair: '#5c3a2a',
      extra: function (ctx, fx, fy, fw, fh) {
        ctx.fillStyle = 'rgba(232,80,46,0.16)';
        ctx.beginPath(); ctx.ellipse(fx - fw * 0.30, fy + fh * 0.08, fw * 0.10, fh * 0.06, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(fx + fw * 0.30, fy + fh * 0.08, fw * 0.10, fh * 0.06, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath(); ctx.ellipse(fx - fw * 0.05, fy + fh * 0.27, fw * 0.04, fh * 0.02, -0.2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(242,177,52,0.7)';
        var t = gNow * 0.005;
        [[-0.18, -0.22], [0.22, -0.18], [0.16, 0.12], [-0.20, 0.18]].forEach(function (p, i) {
          var sx = fx + p[0] * fw, sy = fy + p[1] * fh;
          var r = 2 + Math.sin(t + i * 1.7) * 1;
          ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
        });
      }
    }
  };

  function drawFilter(name, fx, fy, fw, fh, alpha) {
    var style = STYLES[name]; if (!style) return;
    cx.save();
    cx.globalAlpha = alpha;
    if (style.glow) { cx.shadowColor = style.glowColor; cx.shadowBlur = style.glowBlur; }
    cx.fillStyle = style.skin;
    cx.strokeStyle = style.outline;
    cx.lineWidth = style.outlineWidth || 0;
    ellipse(fx, fy, fw / 2, fh / 2); cx.fill(); if (style.outlineWidth) cx.stroke();

    if (style.hair) drawHair(fx, fy, fw, fh, style.hair);

    cx.strokeStyle = style.outline;
    cx.lineWidth = Math.max(1, (style.outlineWidth || 0) * 0.6);
    drawEyebrow(fx - fw * 0.28, fy - fh * 0.24, -0.15);
    drawEyebrow(fx + fw * 0.28, fy - fh * 0.24, 0.15);

    drawEyes(style, fx, fy, fw, fh);

    cx.fillStyle = style.nose || style.outline;
    cx.beginPath();
    cx.moveTo(fx, fy + fh * 0.02);
    cx.lineTo(fx - fw * 0.04, fy + fh * 0.12);
    cx.lineTo(fx + fw * 0.04, fy + fh * 0.12);
    cx.closePath(); cx.fill();

    drawMouth(style, fx, fy, fw, fh);

    cx.shadowColor = 'transparent'; cx.shadowBlur = 0;
    if (style.extra) style.extra(cx, fx, fy, fw, fh);
    cx.restore();
  }

  function drawFaceArea() {
    var fx = W / 2, fy = H / 2 - 10, fw = 220, fh = 260;
    if (state.combo > 0 && state.phase === 'play') {
      cx.save();
      var r = fw / 2 + 14 + Math.min(state.combo * 3, 30);
      var a = Math.min(0.3 + state.combo * 0.06, 0.9);
      cx.strokeStyle = state.combo >= 5 ? GOLD : TEAL;
      cx.globalAlpha = a;
      cx.lineWidth = 2 + Math.min(state.combo * 0.5, 5);
      cx.beginPath(); cx.arc(fx, fy, r, 0, Math.PI * 2); cx.stroke();
      cx.restore();
    }
    var t = state.transition / TRANSITION;
    if (t > 0 && state.prev && state.prev !== state.current) drawFilter(state.prev, fx, fy, fw, fh, t);
    drawFilter(state.current, fx, fy, fw, fh, 1 - t);
    if (state.phase === 'over') drawCracks(fx, fy, fw, fh);
  }

  function drawCracks(fx, fy, fw, fh) {
    cx.save();
    cx.strokeStyle = 'rgba(255,255,255,0.55)'; cx.lineWidth = 2;
    cx.beginPath();
    for (var i = 0; i < 7; i++) {
      var ang = (i / 7) * Math.PI * 2 + 0.3;
      var r1 = fw * 0.1 + (i % 2 ? fw * 0.15 : 0);
      var r2 = fw * 0.4 + (i % 3 ? fw * 0.05 : 0);
      cx.moveTo(fx + Math.cos(ang) * r1, fy + Math.sin(ang) * r1);
      cx.lineTo(fx + Math.cos(ang + 0.2) * r2, fy + Math.sin(ang + 0.2) * r2);
    }
    cx.stroke();
    cx.restore();
  }

  function drawOver() {
    cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
    cx.fillText('BUSTED.', W / 2, 300);
    cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
    cx.fillText(state.score + ' matches', W / 2, 345);
    var pt = topPct(state.score);
    cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
    cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
    if (!DEMO && !BOT) {
      var p2 = 0.6 + 0.4 * Math.sin(performance.now() / 280);
      cx.globalAlpha = p2; cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  function drawCTA() {
    var t = (performance.now() - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease; cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
    cx.fillText('FILTER SHIFT', W / 2, 300);
    cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
    cx.fillText('he matched ' + (window.__demoScore || 0) + '. your move.', W / 2, 340);
    var p3 = 0.7 + 0.3 * Math.sin(performance.now() / 240);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 30px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + (window.__demoScore || 0), W / 2, 410);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 442);
    cx.globalAlpha = 1;
  }

  function drawMute() {
    if (!window.J) return;
    cx.textAlign = 'center'; cx.globalAlpha = 0.5;
    cx.font = '16px -apple-system, Helvetica, Arial'; cx.fillStyle = '#fff';
    cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
    cx.globalAlpha = 1;
  }

  function drawGame() {
    if (state.phase === 'title') { drawTitle(); return; }
    if (state.phase === 'challenge') { drawChallenge(); return; }
    drawHUD();
    drawFaceArea();
    drawMatchBar();
    drawFlashes();
    if (state.phase === 'over') drawOver();
    if (state.phase === 'cta') drawCTA();
    drawMute();
  }

  function frame(now) {
    gNow = now;
    var dt = Math.min((now - lastNow) / 16.667, 3); lastNow = now; lastDt = dt;
    if (state.transition > 0) { state.transition -= dt; if (state.transition < 0) state.transition = 0; }

    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      runFrames += dt;
      if (state.mode === 'idle' && runFrames >= state.idleEnd) startMatch();
      if (state.mode === 'match' && !state.matched && runFrames >= state.matchEnd) missFail();
      autopilot();
    }

    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    drawBG();
    drawGame();
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
