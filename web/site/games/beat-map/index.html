<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var SOFT_BLUE = '#4a9eca', SAGE = '#6ec97a', LAVENDER = '#a080e0', ROSE = '#e08098', AMBER = '#e0a040';

  // Song structure labels
  var LABELS = ['intro', 'verse', 'chorus', 'bridge', 'outro'];
  var LABEL_COLORS = {
    intro:  SOFT_BLUE,
    verse:  SAGE,
    chorus: TEAL,
    bridge: LAVENDER,
    outro:  AMBER
  };
  var LABEL_DISPLAY = {
    intro:  'INTRO',
    verse:  'VERSE',
    chorus: 'CHORUS',
    bridge: 'BRIDGE',
    outro:  'OUTRO'
  };

  // A song is a sequence of sections
  // Each section has: label, numBars (visual pulse units)
  // The player sees bars one-at-a-time and must label them
  var SONGS = [
    // Song 1: simple pop structure
    [
      { label: 'intro',  bars: 2 },
      { label: 'verse',  bars: 3 },
      { label: 'chorus', bars: 3 },
      { label: 'verse',  bars: 3 },
      { label: 'chorus', bars: 3 },
      { label: 'bridge', bars: 2 },
      { label: 'chorus', bars: 3 },
      { label: 'outro',  bars: 2 }
    ],
    // Song 2: shorter
    [
      { label: 'intro',  bars: 2 },
      { label: 'verse',  bars: 4 },
      { label: 'chorus', bars: 4 },
      { label: 'bridge', bars: 2 },
      { label: 'chorus', bars: 4 },
      { label: 'outro',  bars: 2 }
    ]
  ];

  // Flatten song into individual bars with correct labels
  function buildSongBars(songDef) {
    var bars = [];
    for (var s = 0; s < songDef.length; s++) {
      var sec = songDef[s];
      for (var b = 0; b < sec.bars; b++) {
        bars.push({ label: sec.label, sectionIdx: s, barInSection: b });
      }
    }
    return bars;
  }

  // Visual pulse pattern per label type (height multipliers over time, 0..1)
  // Intro: gentle rise, Verse: steady medium, Chorus: tall spiky, Bridge: irregular, Outro: gentle fall
  var PULSE_PATTERNS = {
    intro:  [0.3, 0.4, 0.5, 0.45, 0.35, 0.4, 0.3, 0.35],
    verse:  [0.5, 0.55, 0.6, 0.55, 0.5, 0.55, 0.6, 0.5],
    chorus: [0.8, 0.9, 1.0, 0.85, 0.95, 1.0, 0.9, 0.85],
    bridge: [0.6, 0.4, 0.7, 0.35, 0.65, 0.45, 0.5, 0.6],
    outro:  [0.55, 0.45, 0.4, 0.35, 0.3, 0.25, 0.2, 0.15]
  };

  // Game state
  var state, flashes, hitStop, zoom, shakeAmt;
  var runStartTs;
  var botRunsDone = 0;

  // Demo/bot autopilot state
  var demoPhaseTime = 0, demoBarsPlaced = 0;
  var botTarget = null, botBarsDone = 0, botPassive = false;

  function newGame() {
    var songIdx = Math.floor(rng() * SONGS.length);
    var songDef = SONGS[songIdx];
    var bars = buildSongBars(songDef);
    hitStop = 0; zoom = 1; shakeAmt = 0; flashes = [];
    demoPhaseTime = 0; demoBarsPlaced = 0;
    botTarget = null; botBarsDone = 0; botPassive = false;

    state = {
      phase: 'title',   // title | play | complete | cta
      bars: bars,
      totalBars: bars.length,
      currentBar: 0,
      guesses: [],      // array of guessed labels (same length as bars eventually)
      score: 0,
      maxScore: bars.length * 10,
      selectedLabel: null,
      labelIdx: 0,      // which label is highlighted in the chooser
      pulseT: 0,        // internal timer for pulse animation
      barRevealT: 0,    // animation timer when bar snaps
      lastSnap: null,   // { correct: bool }
      completedAt: 0,
      ctaAt: 0
    };

    if (DEMO) { setTimeout(startPlay, 800); return; }
    if (BOT) { startPlay(); return; }
  }

  function startPlay() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function submitLabel(label) {
    if (state.phase !== 'play') return;
    var bar = state.bars[state.currentBar];
    var correct = (label === bar.label);
    state.guesses.push(label);
    var points = correct ? 10 : 0;
    state.score += points;
    state.lastSnap = { correct: correct, label: label, correctLabel: bar.label };
    state.barRevealT = 0;

    if (correct) {
      hitStop = 2;
      zoom = 1.015;
      if (window.J) J.calm(state.currentBar % 8);
      flash('+10', TEAL, 32);
      if (window.LOOP) LOOP.emit('bar_correct', { bar: state.currentBar, label: label });
    } else {
      shakeAmt = 2;
      if (window.LOOP) LOOP.emit('bar_wrong', { bar: state.currentBar, guess: label, correct: bar.label });
      flash(bar.label.toUpperCase(), ROSE, 24);
    }

    state.currentBar++;
    state.selectedLabel = null;

    if (state.currentBar >= state.totalBars) {
      setTimeout(finishGame, 600);
    } else {
      // calm step sound for each bar
      if (correct && window.J) J.calm((state.currentBar) % 8);
    }
  }

  function finishGame() {
    state.phase = 'complete';
    state.completedAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var correct = state.guesses.filter(function (g, i) { return g === state.bars[i].label; }).length;
    var pct = Math.round(100 * correct / state.totalBars);

    if (window.J) J.calm(7); // soft resolution bell
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), pct_correct: pct });

    if (DEMO) {
      window.__demoScore = state.score;
      setTimeout(function () {
        state.phase = 'cta';
        state.ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 3200);
      return;
    }

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () {
          rng = mulberry32(SEED + botRunsDone * 7);
          newGame();
        }, 600);
      }
    }
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0, vy: -0.5 });
  }

  // --- Input ---
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 560, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // Label button rects (drawn in render, stored here for hit-test)
  var LABEL_RECTS = [];

  function tap(cx2, cy2) {
    if (DEMO || BOT) return;
    if (cx2 !== undefined && inR(MUTE_R, cx2, cy2) && window.J) { J.toggleMute(); return; }

    if (state.phase === 'title') { startPlay(); return; }

    if (state.phase === 'play') {
      // Check label buttons
      for (var i = 0; i < LABEL_RECTS.length; i++) {
        if (inR(LABEL_RECTS[i], cx2, cy2)) {
          submitLabel(LABELS[i]);
          return;
        }
      }
    }

    if (state.phase === 'complete' && performance.now() - state.completedAt > 400) {
      if (cx2 !== undefined && inR(SHARE_R, cx2, cy2) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'mapped' }); return;
      }
      // Restart
      rng = mulberry32(SEED);
      newGame();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.key >= '1' && e.key <= '5') {
      submitLabel(LABELS[+e.key - 1]);
    }
  });

  // --- Demo / bot autopilot ---
  function autopilot(dt) {
    if (state.phase !== 'play') return;

    if (DEMO) {
      demoPhaseTime += dt;
      // Place one label every ~55 frames (~0.9s), with slight hesitation variance
      var wait = 50 + (rng() * 25 | 0);
      if (demoPhaseTime >= wait) {
        demoPhaseTime = 0;
        if (state.currentBar >= state.totalBars) return;
        var bar = state.bars[state.currentBar];
        // Demo plays mostly correct but with 2-3 gentle mistakes for human feel
        var mistakeOn = [3, 7]; // bar indices where demo gets it wrong
        var isMistake = mistakeOn.indexOf(state.currentBar) >= 0;
        var guessLabel;
        if (isMistake) {
          // pick wrong label nearby
          var li = LABELS.indexOf(bar.label);
          guessLabel = LABELS[(li + 1) % LABELS.length];
        } else {
          guessLabel = bar.label;
        }
        submitLabel(guessLabel);
      }
      return;
    }

    if (BOT) {
      if (state.currentBar >= state.totalBars) return;
      // Bot places a label every ~30 frames
      if (botTarget === null) {
        botTarget = 30 + (rng() * 20 | 0);
      }
      botTarget -= dt;
      if (botTarget <= 0) {
        botTarget = null;
        var bar = state.bars[state.currentBar];
        // Bot is imperfect: ~70% correct
        var correct2 = rng() < 0.70;
        var guessLbl;
        if (correct2) {
          guessLbl = bar.label;
        } else {
          var li2 = LABELS.indexOf(bar.label);
          guessLbl = LABELS[(li2 + 1 + (rng() * 3 | 0)) % LABELS.length];
        }
        submitLabel(guessLbl);
      }
    }
  }

  // --- Render ---
  var last = performance.now();

  function drawBeatVisualizer(now) {
    // Central animated waveform showing current bar's "sound energy"
    // If playing, show pulse pattern for current section
    var bar = state.currentBar < state.totalBars ? state.bars[state.currentBar] : state.bars[state.totalBars - 1];
    var pattern = PULSE_PATTERNS[bar.label];
    var cx2 = W / 2, baseY = 370, vizW = 280, barCount = 16;
    var barW = (vizW / barCount) - 2;

    cx.save();
    for (var i = 0; i < barCount; i++) {
      var patIdx = i % pattern.length;
      var hBase = pattern[patIdx];
      // Animate with time
      var wave = Math.sin(now / 180 + i * 0.6) * 0.12 + Math.sin(now / 100 + i * 1.1) * 0.08;
      var h = Math.max(4, (hBase + wave) * 80);
      var x = cx2 - vizW / 2 + i * (barW + 2);
      var alpha = 0.5 + hBase * 0.5;
      cx.globalAlpha = alpha;
      cx.fillStyle = TEAL;
      cx.fillRect(x, baseY - h, barW, h);
      // Reflection
      cx.globalAlpha = alpha * 0.2;
      cx.fillRect(x, baseY, barW, h * 0.3);
    }
    cx.globalAlpha = 1;
    cx.restore();
  }

  function drawSongMap(now) {
    // Show all bars as small segments in a horizontal strip
    var mapY = 220, mapH = 24;
    var totalW = W - 60;
    var bw = totalW / state.totalBars;
    var mapX = 30;

    for (var i = 0; i < state.totalBars; i++) {
      var barDef = state.bars[i];
      var x = mapX + i * bw;
      var col, alpha;

      if (i < state.currentBar) {
        // Already guessed
        var guessed = state.guesses[i];
        var isCorrect = guessed === barDef.label;
        col = isCorrect ? LABEL_COLORS[barDef.label] : ROSE;
        alpha = 0.9;
      } else if (i === state.currentBar) {
        // Current bar — pulse
        col = GOLD;
        alpha = 0.7 + 0.3 * Math.sin(now / 120);
      } else {
        // Future
        col = 'rgba(255,255,255,0.1)';
        alpha = 1;
      }

      cx.globalAlpha = alpha;
      cx.fillStyle = col;
      cx.fillRect(x + 1, mapY, bw - 2, mapH);
    }
    cx.globalAlpha = 1;

    // Label: "SONG MAP"
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '600 11px Menlo, monospace';
    cx.fillText('SONG MAP', mapX, mapY - 8);

    // Progress counter
    cx.textAlign = 'right';
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 11px Menlo, monospace';
    cx.fillText(Math.min(state.currentBar, state.totalBars) + ' / ' + state.totalBars, mapX + totalW, mapY - 8);
  }

  function drawLabelButtons(now) {
    // 5 label buttons laid out in 2 rows: 3 top, 2 bottom
    LABEL_RECTS = [];
    var btnW = 110, btnH = 44, gap = 8;
    var row1Y = 440, row2Y = 440 + btnH + gap;
    var row1X = [W/2 - btnW - gap/2 - btnW - gap, W/2 - btnW/2, W/2 + btnW/2 + gap];
    // Actually let's do 2+3 layout: top row has 2, bottom row has 3
    // Better: single row of 3 + second row of 2
    var row1 = [0, 1, 2]; // intro, verse, chorus
    var row2 = [3, 4];    // bridge, outro
    var r1StartX = W/2 - (3 * btnW + 2 * gap) / 2;
    var r2StartX = W/2 - (2 * btnW + gap) / 2;

    for (var ri = 0; ri < row1.length; ri++) {
      var li = row1[ri];
      var bx = r1StartX + ri * (btnW + gap);
      var by = row1Y;
      LABEL_RECTS[li] = { x: bx, y: by, w: btnW, h: btnH };
      drawLabelBtn(li, bx, by, btnW, btnH, now);
    }
    for (var ri2 = 0; ri2 < row2.length; ri2++) {
      var li2 = row2[ri2];
      var bx2 = r2StartX + ri2 * (btnW + gap);
      var by2 = row2Y;
      LABEL_RECTS[li2] = { x: bx2, y: by2, w: btnW, h: btnH };
      drawLabelBtn(li2, bx2, by2, btnW, btnH, now);
    }
  }

  function drawLabelBtn(li, bx, by, bw, bh, now) {
    var label = LABELS[li];
    var col = LABEL_COLORS[label];
    // Glow pulse
    var glowA = 0.08 + 0.04 * Math.sin(now / 400 + li);
    cx.fillStyle = col.replace('#', 'rgba(') + ',' + glowA + ')';
    // Draw with fallback for roundRect
    cx.beginPath();
    if (cx.roundRect) { cx.roundRect(bx, by, bw, bh, 10); } else { cx.rect(bx, by, bw, bh); }
    cx.fill();
    // Border
    cx.strokeStyle = col;
    cx.lineWidth = 1.5;
    cx.globalAlpha = 0.7;
    cx.beginPath();
    if (cx.roundRect) { cx.roundRect(bx, by, bw, bh, 10); } else { cx.rect(bx, by, bw, bh); }
    cx.stroke();
    cx.globalAlpha = 1;
    // Label text
    cx.textAlign = 'center';
    cx.fillStyle = col;
    cx.font = '700 13px -apple-system, Helvetica, Arial';
    cx.fillText(LABEL_DISPLAY[label], bx + bw / 2, by + bh / 2 + 5);
  }

  function drawCompletedMap(now) {
    // Full song map revealed with correct color coding
    var mapY = 320, mapH = 28;
    var totalW = W - 60;
    var bw = totalW / state.totalBars;
    var mapX = 30;

    // Draw section legend groupings
    var prevLabel = null, secStart = 0;
    for (var i = 0; i <= state.totalBars; i++) {
      var lbl = i < state.totalBars ? state.bars[i].label : null;
      if (lbl !== prevLabel && prevLabel !== null) {
        // Draw label text above section
        var secW = (i - secStart) * bw;
        cx.textAlign = 'center';
        cx.fillStyle = LABEL_COLORS[prevLabel];
        cx.globalAlpha = 0.85;
        cx.font = '600 9px Menlo, monospace';
        cx.fillText(LABEL_DISPLAY[prevLabel], mapX + secStart * bw + secW / 2, mapY - 6);
        cx.globalAlpha = 1;
        secStart = i;
      }
      prevLabel = lbl;
    }

    for (var i2 = 0; i2 < state.totalBars; i2++) {
      var barDef2 = state.bars[i2];
      var x = mapX + i2 * bw;
      var guessed2 = state.guesses[i2];
      var correct2 = guessed2 === barDef2.label;
      // Reveal animation
      var revDelay = i2 * 4;
      var t = (performance.now() - state.completedAt) - revDelay * 16;
      var revA = Math.min(1, Math.max(0, t / 300));

      cx.globalAlpha = revA;
      cx.fillStyle = LABEL_COLORS[barDef2.label];
      cx.fillRect(x + 1, mapY, bw - 2, mapH);

      if (!correct2) {
        // Wrong guess marker
        cx.globalAlpha = revA;
        cx.fillStyle = ROSE;
        cx.fillRect(x + 1, mapY + mapH - 4, bw - 2, 4);
      }
    }
    cx.globalAlpha = 1;
  }

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;
    state.pulseT += dt;

    // Decay juice
    if (hitStop > 0) { hitStop -= dt; } else { autopilot(dt); }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // Juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    // Subtle gradient
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(74,158,202,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // Title / intro
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT MAP', W / 2, 280);
      cx.fillStyle = TEAL;
      cx.font = '600 15px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 400);
      cx.globalAlpha = pulse;
      cx.fillText('TAP TO START', W / 2, 330);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '400 13px -apple-system, Helvetica, Arial';
      cx.fillText('label each bar of the song', W / 2, 360);
      // Draw a sample mini-waveform as teaser
      cx.textAlign = 'left';
      var mini = [0.3,0.5,0.8,0.9,0.85,0.7,0.4,0.6,0.9,1.0,0.8,0.6,0.5,0.4,0.3,0.2];
      var mw = 240, mh = 50, mx = (W - mw) / 2, my = 400;
      for (var mi = 0; mi < mini.length; mi++) {
        var mh2 = mini[mi] * mh * (0.8 + 0.2 * Math.sin(now/200 + mi * 0.5));
        cx.globalAlpha = 0.4 + mini[mi] * 0.4;
        cx.fillStyle = TEAL;
        cx.fillRect(mx + mi * (mw / mini.length), my + mh - mh2, mw / mini.length - 2, mh2);
      }
      cx.globalAlpha = 1;
    }

    // Play phase
    if (state.phase === 'play') {
      // Section name hint — subtle, shows for current bar
      var curBar = state.bars[Math.min(state.currentBar, state.totalBars - 1)];

      // Header: "WHAT IS THIS?"
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 13px Menlo, monospace';
      cx.fillText('BAR ' + (state.currentBar + 1) + ' — WHAT SECTION IS THIS?', W / 2, 140);

      // Score
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '700 32px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 185);
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '500 11px -apple-system, Helvetica, Arial';
      cx.fillText('SCORE', W / 2, 202);

      // Song map progress
      drawSongMap(now);

      // Beat visualizer
      drawBeatVisualizer(now);

      // Snap feedback
      if (state.lastSnap) {
        state.barRevealT += dt;
        var snapA = Math.max(0, 1 - state.barRevealT / 25);
        cx.globalAlpha = snapA;
        cx.textAlign = 'center';
        cx.fillStyle = state.lastSnap.correct ? TEAL : ROSE;
        cx.font = '700 18px -apple-system, Helvetica, Arial';
        cx.fillText(state.lastSnap.correct ? '✓ ' + LABEL_DISPLAY[state.lastSnap.label] : '✗ ' + LABEL_DISPLAY[state.lastSnap.correctLabel], W / 2, 415);
        cx.globalAlpha = 1;
        if (state.barRevealT > 25) state.lastSnap = null;
      }

      // Label buttons
      drawLabelButtons(now);

      // Instruction hint (fades after first few bars)
      var hintA = Math.max(0, 1 - state.currentBar * 0.3);
      if (hintA > 0) {
        cx.globalAlpha = hintA * 0.5;
        cx.textAlign = 'center';
        cx.fillStyle = '#fff';
        cx.font = '400 11px -apple-system, Helvetica, Arial';
        cx.fillText('tap a section label to map this bar', W / 2, 550);
        cx.globalAlpha = 1;
      }
    }

    // Complete phase
    if (state.phase === 'complete') {
      var tSince = performance.now() - state.completedAt;
      var fadeIn = Math.min(1, tSince / 600);
      var correct3 = state.guesses.filter(function (g, i) { return g === state.bars[i].label; }).length;
      var pct2 = Math.round(100 * correct3 / state.totalBars);

      cx.globalAlpha = fadeIn;
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('MAP COMPLETE', W / 2, 140);

      cx.fillStyle = '#fff';
      cx.font = '700 22px -apple-system, Helvetica, Arial';
      cx.fillText(pct2 + '% CORRECT', W / 2, 180);

      cx.fillStyle = GOLD;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' pts · ' + correct3 + '/' + state.totalBars + ' bars mapped', W / 2, 210);
      cx.globalAlpha = 1;

      // Completed song map
      drawCompletedMap(now);

      // Color legend
      var legY = 390, legX = 30;
      cx.globalAlpha = Math.min(1, (tSince - 400) / 400);
      cx.textAlign = 'left';
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '500 10px Menlo, monospace';
      cx.fillText('LEGEND', legX, legY - 8);
      for (var li3 = 0; li3 < LABELS.length; li3++) {
        var lbl3 = LABELS[li3];
        var lx = legX + li3 * 68;
        cx.fillStyle = LABEL_COLORS[lbl3];
        cx.fillRect(lx, legY, 12, 12);
        cx.fillStyle = 'rgba(255,255,255,0.6)';
        cx.font = '500 10px Menlo, monospace';
        cx.fillText(LABEL_DISPLAY[lbl3], lx + 15, legY + 10);
      }
      cx.globalAlpha = 1;

      // Restart / share
      if (!DEMO && !BOT) {
        var restA = Math.min(1, (tSince - 1200) / 500);
        cx.globalAlpha = restA;
        var pulse2 = 0.65 + 0.35 * Math.sin(now / 350);
        cx.globalAlpha = restA * pulse2;
        cx.fillStyle = TEAL;
        cx.textAlign = 'center';
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO PLAY AGAIN', W / 2, 480);
        cx.globalAlpha = restA;

        // Share
        cx.fillStyle = 'rgba(242,177,52,0.12)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) { cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); } else { cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h); }
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
        cx.globalAlpha = 1;
      }
    }

    // Demo CTA
    if (state.phase === 'cta') {
      var ctaT = (now - state.ctaAt) / 1000;
      var ease = Math.min(1, ctaT * 2.0);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT MAP', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '600 18px -apple-system, Helvetica, Arial';
      cx.fillText('map the song. grow your ear.', W / 2, 330);
      var p3 = 0.7 + 0.3 * Math.sin(now / 280);
      cx.fillStyle = TEAL;
      cx.globalAlpha = ease * p3;
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '500 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // Floating reward texts
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      fl.vy -= 0.02 * dt;
      var fa = Math.max(0, 1 - fl.t / 35);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 260 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 35) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
