<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // Mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var SOFT_BLUE = '#5ba4d4', SOFT_GREEN = '#6dc76d', SOFT_PURPLE = '#b08de8';
  var DIAL_COLORS = [TEAL, GOLD, SOFT_BLUE, SOFT_GREEN, SOFT_PURPLE, '#e8a87c'];

  // ---- GAME DESIGN ----
  // 6 dials, each with symbols cycling in a hidden order.
  // Observe 2 full demo cycles → figure out the correct tap sequence → execute.
  // Tap each dial in the correct order to open the lock.
  // Score = time remaining (calm — no timer pressure in actual play, but bot needs to finish)

  var SYMBOLS = ['◆', '●', '▲', '■', '★', '◉'];
  var NUM_DIALS = 6;
  var OBSERVE_CYCLES = 2;       // number of full cycles shown before player turn
  var CYCLE_INTERVAL = 900;     // ms per dial advance during observation (calm pace)

  var state;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var flashes = [];
  var runStartTs = 0;
  var best = 0;
  try { best = +localStorage.getItem('sl_best') || 0; } catch (_) {}

  // Each dial has a sequence: starting symbol index + a "rule" (which symbol it cycles to)
  // The hidden rule = each dial cycles through its symbols in a fixed shuffled order
  // The CORRECT tap sequence = tap dials 0..5 in order of their "target" symbol index ascending
  // (i.e. dial whose rule-target has lowest symbol index gets tapped first, etc.)
  // Actually: the correct sequence is the order in which the dials' current symbols
  // match a pattern revealed over 2 cycles. Simpler: each dial has a fixed "tap slot" (0-5).
  // We shuffle [0,1,2,3,4,5] to get the correct tap order.

  function buildDials() {
    // Each dial has 6 symbols shown in a shuffled order
    var dials = [];
    for (var i = 0; i < NUM_DIALS; i++) {
      // Shuffle symbols differently for each dial
      var order = [0, 1, 2, 3, 4, 5];
      // Fisher-Yates with seeded rng
      for (var j = order.length - 1; j > 0; j--) {
        var k = Math.floor(rng() * (j + 1));
        var tmp = order[j]; order[j] = order[k]; order[k] = tmp;
      }
      dials.push({
        order: order,          // shuffled symbol indices (the hidden cycle order)
        pos: Math.floor(rng() * 6),  // current position in the order
        tapped: false,
        glow: 0,
        shake: 0,
        wrong: false,
        wrongTimer: 0
      });
    }
    return dials;
  }

  function buildCorrectSequence() {
    // The correct sequence: tap the dial whose CURRENT symbol comes first in
    // the GLOBAL symbol index ordering. i.e. tap in order of symbol[0] → symbol[5].
    // More concretely: after observation, the correct sequence = sort dials by
    // their "order[pos]" value ascending. Player needs to figure this out by watching.
    var seq = [];
    for (var i = 0; i < NUM_DIALS; i++) seq.push(i);
    seq.sort(function(a, b) {
      return state.dials[a].order[state.dials[a].pos] - state.dials[b].order[state.dials[b].pos];
    });
    return seq;
  }

  function newGame() {
    state = {
      phase: 'title',   // title | observe | play | over | open | cta
      dials: buildDials(),
      correctSeq: null,
      tapIdx: 0,        // next expected tap index in correctSeq
      score: 0,
      roundsCompleted: 0,
      observeStep: 0,   // which step in observation animation
      observeTimer: 0,
      cycleDone: 0,     // how many full cycles shown
      openAt: 0,
      overAt: 0,
      ctaAt: 0,
      openProgress: 0,  // 0→1 lock open animation
      mistakeCount: 0,
      level: 1
    };
    flashes = [];
    if (DEMO) {
      setTimeout(startObserve, 400);
      return;
    }
    if (BOT) {
      startObserve();
      return;
    }
  }

  function startObserve() {
    state.phase = 'observe';
    state.observeStep = 0;
    state.observeTimer = 0;
    state.cycleDone = 0;
    // advance dials to show the starting configuration
  }

  function startPlay() {
    state.phase = 'play';
    runStartTs = Date.now();
    state.correctSeq = buildCorrectSequence();
    state.tapIdx = 0;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED, level: state.level });
  }

  function tapDial(idx) {
    if (state.phase !== 'play') return;
    var dial = state.dials[idx];
    if (dial.tapped) return;

    var expected = state.correctSeq[state.tapIdx];
    if (idx === expected) {
      // Correct tap
      dial.tapped = true;
      dial.glow = 1;
      state.tapIdx++;
      if (window.J) J.calm(state.tapIdx);
      if (window.LOOP) LOOP.emit('dial_tapped', { idx: idx, step: state.tapIdx });

      if (state.tapIdx === NUM_DIALS) {
        // All dials tapped correctly — lock opens!
        setTimeout(openLock, 200);
      }
    } else {
      // Wrong tap — flash red, small shake
      dial.wrong = true;
      dial.wrongTimer = 40;
      shakeAmt = 3;
      state.mistakeCount++;
      flash('WRONG ORDER', '#e8502e', 28);
      // After a wrong tap, re-show observation for this round (calm mechanic: restart sequence)
      // For calm engine: just reset the tap sequence, don't end the run
      // Reset all dials to untapped state
      for (var i = 0; i < NUM_DIALS; i++) {
        state.dials[i].tapped = false;
        state.dials[i].glow = 0;
      }
      state.tapIdx = 0;
      if (window.LOOP) LOOP.emit('near_miss', { step: state.tapIdx, mistakeCount: state.mistakeCount });
    }
  }

  function openLock() {
    state.phase = 'open';
    state.openAt = performance.now();
    state.openProgress = 0;
    hitStop = 8;
    zoom = 1.025;
    if (window.J) J.calm(10); // completion bell
    var dur = (Date.now() - runStartTs) / 1000;
    state.score = state.roundsCompleted + 1;
    if (state.score > best) {
      best = state.score;
      try { localStorage.setItem('sl_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (window.__demoScore === undefined && DEMO) window.__demoScore = state.score;

    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        state.ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
      return;
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { nextRound(); }, 1200);
      }
      return;
    }
    // Human: show completion then let them go to next round
    setTimeout(function () {
      state.phase = 'over';
      state.overAt = performance.now();
    }, 2000);
  }

  function nextRound() {
    state.roundsCompleted++;
    state.level++;
    // Rebuild dials with same rng (continues seed chain)
    state.dials = buildDials();
    state.correctSeq = null;
    state.tapIdx = 0;
    state.mistakeCount = 0;
    if (window.LOOP) LOOP.emit('restart', { round: state.roundsCompleted });
    startObserve();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0, vy: 0 });
  }

  // ---- OBSERVATION ANIMATION ----
  // During observation, dials cycle through their symbols one at a time.
  // Each full sweep (all 6 dials advance once) = 1 cycle.
  // After OBSERVE_CYCLES full cycles, show the "locked" state and begin play.

  function updateObservation(dt) {
    state.observeTimer -= dt * 16.667; // dt in frames, convert to ms-ish
    if (state.observeTimer <= 0) {
      state.observeTimer = CYCLE_INTERVAL / (state.level > 1 ? 0.8 : 1);
      // Advance one dial
      var dialIdx = state.observeStep % NUM_DIALS;
      var d = state.dials[dialIdx];
      d.pos = (d.pos + 1) % d.order.length;
      d.glow = 0.8; // brief highlight when it ticks
      state.observeStep++;
      if (state.observeStep % NUM_DIALS === 0) {
        state.cycleDone++;
        if (state.cycleDone >= OBSERVE_CYCLES) {
          // Done observing — begin play phase
          setTimeout(startPlay, 500);
          state.phase = 'transition';
        }
      }
    }
    // Decay dial glow
    for (var i = 0; i < NUM_DIALS; i++) {
      if (state.dials[i].glow > 0) state.dials[i].glow -= 0.03 * dt;
      if (state.dials[i].wrongTimer > 0) state.dials[i].wrongTimer -= dt;
      else state.dials[i].wrong = false;
    }
  }

  // ---- INPUT ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // Dial hit regions computed in render, stored here
  var dialRegions = [];

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startObserve(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 400) {
      nextRound(); return;
    }
    if (state.phase === 'play' && x !== undefined) {
      for (var i = 0; i < dialRegions.length; i++) {
        var r = dialRegions[i];
        var dx = x - r.cx, dy = y - r.cy;
        if (dx * dx + dy * dy <= r.rad * r.rad) {
          tapDial(i);
          return;
        }
      }
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') tap();
  });

  // ---- BOT / DEMO AUTOPILOT ----
  var botRunsDone = 0;
  var botPhaseTimer = 0;
  var botTapIdx = 0;
  var botTapTimer = 0;
  var demoPhaseTimer = 0;
  var demoTapIdx = 0;
  var demoTapTimer = 0;
  // Demo hesitation waits (frames) before each tap — human-feeling pauses
  var demoWaits = [55, 38, 70, 44, 60, 35];

  function autopilot(dt) {
    if (BOT) {
      botAutopilot(dt);
    } else if (DEMO) {
      demoAutopilot(dt);
    }
  }

  function botAutopilot(dt) {
    if (state.phase === 'observe' || state.phase === 'transition') return; // wait for play
    if (state.phase === 'open' || state.phase === 'over') return;
    if (state.phase === 'title') { startObserve(); return; }
    if (state.phase !== 'play') return;
    // Bot waits a beat then taps the correct sequence (imperfect: ~20% chance of wrong tap first)
    botTapTimer -= dt;
    if (botTapTimer > 0) return;
    botTapTimer = 18 + Math.floor(rng() * 20); // ~18-38 frames between taps

    if (state.tapIdx >= NUM_DIALS) return;
    // Occasionally make a mistake (tap wrong dial first)
    var makeError = rng() < 0.12 && state.tapIdx < NUM_DIALS - 1;
    var tapped;
    if (makeError) {
      // Find an untapped dial that isn't the correct next one
      var wrongOptions = [];
      for (var i = 0; i < NUM_DIALS; i++) {
        if (!state.dials[i].tapped && i !== state.correctSeq[state.tapIdx]) {
          wrongOptions.push(i);
        }
      }
      if (wrongOptions.length > 0) {
        tapped = wrongOptions[Math.floor(rng() * wrongOptions.length)];
      } else {
        tapped = state.correctSeq[state.tapIdx];
      }
    } else {
      tapped = state.correctSeq[state.tapIdx];
    }
    tapDial(tapped);
  }

  function demoAutopilot(dt) {
    if (state.phase === 'observe' || state.phase === 'transition') return;
    if (state.phase === 'open' || state.phase === 'cta') return;
    if (state.phase !== 'play') return;
    demoTapTimer -= dt;
    if (demoTapTimer > 0) return;

    if (state.tapIdx >= NUM_DIALS) return;
    var waitFrames = demoWaits[Math.min(demoTapIdx, demoWaits.length - 1)] || 50;
    demoTapTimer = waitFrames;

    // Demo: one deliberate hesitation-mistake at step 2
    if (demoTapIdx === 2 && state.mistakeCount === 0) {
      // Tap a wrong dial first — visible pause + correction (tension moment)
      var wrongOpts = [];
      for (var i = 0; i < NUM_DIALS; i++) {
        if (!state.dials[i].tapped && i !== state.correctSeq[state.tapIdx]) {
          wrongOpts.push(i);
        }
      }
      if (wrongOpts.length > 0) {
        tapDial(wrongOpts[0]);
        demoTapTimer = 55; // pause before correcting
        return;
      }
    }

    tapDial(state.correctSeq[state.tapIdx]);
    demoTapIdx++;
  }

  // ---- RENDER ----
  // Dial layout: 2 rows of 3, centered
  var DIAL_RAD = 44;
  var DIAL_GAP_X = 115;
  var DIAL_GAP_Y = 110;
  var DIALS_ORIGIN_X = W / 2 - DIAL_GAP_X;
  var DIALS_ORIGIN_Y = 340;

  function dialCenter(i) {
    var col = i % 3, row = Math.floor(i / 3);
    return {
      cx: DIALS_ORIGIN_X + col * DIAL_GAP_X,
      cy: DIALS_ORIGIN_Y + row * DIAL_GAP_Y
    };
  }

  var ctaAt = 0, last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Observation tick
    if (state.phase === 'observe') {
      updateObservation(dt);
    }

    // Autopilot
    autopilot(dt);

    // Juice state decay
    if (hitStop > 0) hitStop -= dt;
    shakeAmt *= Math.pow(0.88, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // Decay dial glows
    for (var i = 0; i < NUM_DIALS; i++) {
      var d = state.dials[i];
      if (d.glow > 0) d.glow = Math.max(0, d.glow - 0.025 * dt);
      if (d.wrongTimer > 0) { d.wrongTimer -= dt; if (d.wrongTimer <= 0) d.wrong = false; }
    }

    // Open animation progress
    if (state.phase === 'open') {
      state.openProgress = Math.min(1, (now - state.openAt) / 1000);
    }

    // --- DRAW ---
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(90,164,212,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // TITLE
    if (state.phase === 'title') {
      drawTitle(now);
    }

    // OBSERVE / TRANSITION
    if (state.phase === 'observe' || state.phase === 'transition' || state.phase === 'play') {
      drawDials(now);
      drawLockBody(now);
      drawObserveHint(now);
      drawProgressIndicator();
    }

    // OPEN
    if (state.phase === 'open') {
      drawDials(now);
      drawLockOpen(now);
    }

    // GAME OVER (human — solved)
    if (state.phase === 'over') {
      drawDials(now);
      drawLockOpen(now);
      drawOverCard(now);
    }

    // DEMO CTA
    if (state.phase === 'cta') {
      drawDials(now);
      drawLockOpen(now);
      drawDemoCTA(now);
    }

    // Flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '800 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 50) flashes.splice(k, 1);
    }

    // Mute toggle
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawTitle(now) {
    cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '900 46px -apple-system, Helvetica, Arial';
    cx.fillText('SEQUENCE', W / 2, 300);
    cx.fillStyle = TEAL;
    cx.font = '900 46px -apple-system, Helvetica, Arial';
    cx.fillText('LOCK', W / 2, 354);
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '500 15px -apple-system, Helvetica, Arial';
    cx.fillText('watch the pattern. tap the order.', W / 2, 395);
    var pulse = 0.55 + 0.45 * Math.sin(now / 350);
    cx.globalAlpha = pulse;
    cx.fillStyle = TEAL;
    cx.font = '700 17px -apple-system, Helvetica, Arial';
    cx.fillText('TAP TO BEGIN', W / 2, 445);
    cx.globalAlpha = 1;
  }

  function drawDials(now) {
    dialRegions = [];
    for (var i = 0; i < NUM_DIALS; i++) {
      var d = state.dials[i];
      var pos = dialCenter(i);
      dialRegions.push({ cx: pos.cx, cy: pos.cy, rad: DIAL_RAD });

      var baseColor = DIAL_COLORS[i];
      var symIdx = d.order[d.pos];
      var sym = SYMBOLS[symIdx];

      // Outer ring
      cx.beginPath();
      cx.arc(pos.cx, pos.cy, DIAL_RAD, 0, Math.PI * 2);
      if (d.tapped) {
        cx.strokeStyle = TEAL;
        cx.lineWidth = 3;
      } else if (d.wrong) {
        cx.strokeStyle = '#e8502e';
        cx.lineWidth = 2.5;
      } else if (d.glow > 0.1) {
        cx.strokeStyle = 'rgba(46,197,182,' + Math.min(1, d.glow) + ')';
        cx.lineWidth = 2;
      } else {
        cx.strokeStyle = 'rgba(255,255,255,0.18)';
        cx.lineWidth = 1.5;
      }
      cx.fillStyle = d.tapped ? 'rgba(46,197,182,0.14)' :
                     d.wrong  ? 'rgba(232,80,46,0.10)' :
                                'rgba(255,255,255,0.04)';
      cx.fill(); cx.stroke();

      // Glow aura when recently ticked
      if (d.glow > 0.15 && !d.tapped) {
        cx.beginPath();
        cx.arc(pos.cx, pos.cy, DIAL_RAD + 8, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(46,197,182,' + (d.glow * 0.4) + ')';
        cx.lineWidth = 6;
        cx.stroke();
      }

      // Symbol
      cx.textAlign = 'center';
      if (d.tapped) {
        cx.fillStyle = TEAL;
        cx.globalAlpha = 1;
        cx.font = '700 28px -apple-system, Helvetica, Arial';
        cx.fillText('✓', pos.cx, pos.cy + 10);
      } else {
        cx.fillStyle = d.wrong ? '#e8a87c' : baseColor;
        cx.globalAlpha = d.wrong ? 0.6 : 1;
        cx.font = '700 26px -apple-system, Helvetica, Arial';
        cx.fillText(sym, pos.cx, pos.cy + 10);
        cx.globalAlpha = 1;
      }

      // Dial index number (small, faint)
      cx.fillStyle = 'rgba(255,255,255,0.22)';
      cx.font = '500 10px Menlo, monospace';
      cx.fillText(String(i + 1), pos.cx, pos.cy + DIAL_RAD - 6);
    }
    cx.globalAlpha = 1;
  }

  function drawLockBody(now) {
    // Lock shackle / body illustration above dials
    var lx = W / 2, ly = 200;
    // Shackle arc
    cx.beginPath();
    cx.arc(lx, ly + 10, 34, Math.PI, 0);
    cx.strokeStyle = 'rgba(255,255,255,0.25)';
    cx.lineWidth = 8;
    cx.lineCap = 'round';
    cx.stroke();
    // Body
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    cx.strokeStyle = 'rgba(255,255,255,0.22)';
    cx.lineWidth = 1.5;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(lx - 36, ly + 10, 72, 54, 8);
    else cx.rect(lx - 36, ly + 10, 72, 54);
    cx.fill(); cx.stroke();
    // Keyhole
    cx.beginPath();
    cx.arc(lx, ly + 38, 8, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(255,255,255,0.18)';
    cx.fill();
    cx.fillRect(lx - 3, ly + 38, 6, 14);

    // Observe counter
    if (state.phase === 'observe') {
      var cyclesLeft = OBSERVE_CYCLES - state.cycleDone;
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '500 12px Menlo, monospace';
      cx.fillText('CYCLE ' + (state.cycleDone + 1) + ' / ' + OBSERVE_CYCLES, W / 2, 150);
    }
    if (state.phase === 'transition') {
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('now tap the sequence', W / 2, 150);
    }
  }

  function drawLockOpen(now) {
    var lx = W / 2, ly = 200;
    var p = Math.min(1, state.openProgress);
    // Shackle swings open (rotate up and to right)
    var angle = p * (-Math.PI * 0.55);
    cx.save();
    cx.translate(lx + 34, ly + 10);
    cx.rotate(angle);
    cx.translate(-(lx + 34), -(ly + 10));
    cx.beginPath();
    cx.arc(lx, ly + 10, 34, Math.PI, 0);
    cx.strokeStyle = p > 0.5 ? TEAL : 'rgba(255,255,255,0.35)';
    cx.lineWidth = 8;
    cx.lineCap = 'round';
    cx.stroke();
    cx.restore();

    // Body
    cx.fillStyle = p > 0.5 ? 'rgba(46,197,182,0.15)' : 'rgba(255,255,255,0.06)';
    cx.strokeStyle = p > 0.5 ? TEAL : 'rgba(255,255,255,0.22)';
    cx.lineWidth = p > 0.5 ? 2 : 1.5;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(lx - 36, ly + 10, 72, 54, 8);
    else cx.rect(lx - 36, ly + 10, 72, 54);
    cx.fill(); cx.stroke();

    // "OPEN" text with glow when fully open
    if (p > 0.8) {
      var a = (p - 0.8) / 0.2;
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 18px -apple-system, Helvetica, Arial';
      cx.fillText('UNLOCKED', lx, ly + 42);
      cx.globalAlpha = 1;
    }

    // Score
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 52px -apple-system, Helvetica, Arial';
    cx.fillText(state.score, W / 2, 120);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + best, W / 2, 142);
  }

  function drawObserveHint(now) {
    if (state.phase !== 'observe' && state.phase !== 'transition') return;
    cx.textAlign = 'center';
    if (state.phase === 'observe') {
      cx.fillStyle = 'rgba(255,255,255,0.28)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('memorize the order', W / 2, H - 80);
    }
  }

  function drawProgressIndicator() {
    if (state.phase !== 'play') return;
    // Show how many dials tapped so far
    var totalW = NUM_DIALS * 20 + (NUM_DIALS - 1) * 8;
    var startX = W / 2 - totalW / 2;
    for (var i = 0; i < NUM_DIALS; i++) {
      var px = startX + i * 28;
      cx.beginPath();
      cx.arc(px + 10, H - 68, 7, 0, Math.PI * 2);
      cx.fillStyle = i < state.tapIdx ? TEAL : 'rgba(255,255,255,0.15)';
      cx.fill();
    }
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '500 12px -apple-system, Helvetica, Arial';
    cx.fillText('tap the correct sequence', W / 2, H - 42);
    // Dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
      cx.fillStyle = GOLD;
      cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + SHARE.dare + ' vault' + (SHARE.dare === 1 ? '' : 's'), W / 2, 130);
    }
  }

  function drawOverCard(now) {
    cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = TEAL;
    cx.font = '900 38px -apple-system, Helvetica, Arial';
    cx.fillText('VAULT OPENED', W / 2, 300);
    cx.fillStyle = '#fff';
    cx.font = '700 22px -apple-system, Helvetica, Arial';
    cx.fillText(state.score + (state.score === 1 ? ' vault' : ' vaults'), W / 2, 345);
    if (!DEMO && !BOT) {
      var pulse = 0.55 + 0.45 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('TAP FOR NEXT', W / 2, 420);
      cx.globalAlpha = 1;
    }
  }

  function drawDemoCTA(now) {
    var t = (now - state.ctaAt) / 1000;
    var ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease; cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '900 44px -apple-system, Helvetica, Arial';
    cx.fillText('SEQUENCE', W / 2, 295);
    cx.fillStyle = TEAL;
    cx.font = '900 44px -apple-system, Helvetica, Arial';
    cx.fillText('LOCK', W / 2, 348);
    cx.fillStyle = 'rgba(255,255,255,0.7)';
    cx.font = '600 17px -apple-system, Helvetica, Arial';
    cx.fillText('you already know this move.', W / 2, 388);
    var pulse2 = 0.7 + 0.3 * Math.sin(now / 260);
    cx.globalAlpha = ease * pulse2;
    cx.fillStyle = TEAL;
    cx.font = '900 26px -apple-system, Helvetica, Arial';
    cx.fillText('▶ REACH IT', W / 2, 444);
    cx.globalAlpha = ease;
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '600 14px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 476);
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
