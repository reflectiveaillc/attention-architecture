<meta charset="UTF-8">

<title>Cheek Float — Tilt</title>
<!--
  LOOP / attention-architecture — Cheek Float (FACE-CONTROL engine)
  The player PUFFS THEIR CHEEKS to float a balloon UP through a narrowing cave.
  Stop puffing → balloon sinks. The webcam PiP captures the glorious chipmunk
  face the whole time — that recording IS the shareable content.
  Tech: face-control.js shared lib (MediaPipe FaceLandmarker, cheekPuff blendshape)
        + MediaRecorder (canvas.captureStream → downloadable webm).
  AUTO modes: ?demo=1 / ?bot=1 skip camera, animate a simulated puffed face,
  autopilot keeps the balloon through the cave, demo chokes after ~6 gaps.
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:none;
               font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
  video { display:none; }
  #ui { position:fixed; left:0; right:0; bottom:max(16px,env(safe-area-inset-bottom)); display:flex; gap:10px; justify-content:center; z-index:10; }
  button { background:#12151d; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:99px;
           padding:12px 20px; font-size:15px; font-weight:800; cursor:pointer; }
  button.rec { background:#e8502e; border-color:#e8502e; }
  button.rec.on { animation:pulse 1s infinite; }
  @keyframes pulse { 50% { opacity:.55; } }
  #perm { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:24px; z-index:20; background:#0b0d12; }
  #perm h1 { font-size:34px; font-weight:900; margin:0; }
  #perm p { color:rgba(255,255,255,.6); font-size:15px; max-width:320px; margin:0; }
  #perm .big { background:#e8502e; border-color:#e8502e; font-size:18px; padding:16px 28px; }
</style>

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="perm">
  <h1>CHEEK FLOAT</h1>
  <p>Puff your <b>cheeks</b> to float the balloon up through the cave. Stop puffing and it sinks. Your chipmunk face rides in the corner — record it and share the chaos.</p>
  <button class="big" id="start">▶ ALLOW CAMERA &amp; PLAY</button>
  <p style="font-size:12px;opacity:.5">camera stays on your device — nothing is uploaded</p>
</div>
<div id="ui" style="display:none">
  <button id="rec" class="rec">● RECORD</button>
</div>
<script>window.LOOP_GAME = 'cheek-float';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script src="../../js/face-control.js"></script>
<script type="module">
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;
  var AUTO = DEMO || BOT;

  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio||1,2), scale=1;
  function fit(){var s=Math.min(window.innerWidth/W,window.innerHeight/H);scale=s;cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);}
  window.addEventListener('resize',fit); fit();

  var FC = window.FaceControl;

  var VERM='#e8502e', TEAL='#2ec5b6', GOLD='#f2b134', INK='#0b0d12';
  var PINK='#ff6fa8', CAVE='#1a2a40', CAVEEDGE='#2ec5b6';

  // ---- game state ----
  // DISCRETE FLAP: each cheek puff = one upward bump (a 1 in a 1/0 world) —
  // puff·release·puff to chain, gravity sinks the balloon between puffs.
  // Cave: horizontal scrolling walls that narrow gently over time.
  var BALL_X = 110;           // fixed horizontal position
  var GRAV = 0.28;            // gravity always on (matches flappy-face)
  var FLAP_IMPULSE = -4.8;    // fixed upward impulse per puff (predictable bump)
  var MAXV = 6.5;             // max vertical speed in either direction
  var WALL_SPEED = 1.6;       // slow cave scroll
  var GAP_START = 290;        // generous initial gap — easy to survive early
  var GAP_MIN   = 160;        // minimum gap (wide even at max difficulty)
  var GAP_SHRINK = 2;         // pixels gap shrinks per gap cleared (gentle ramp)
  var WALL_W = 52;            // width of cave wall blocks
  var WALL_EVERY = 155;       // frames between new wall pairs (spaced out)
  var BALL_R = 18;            // balloon radius
  // Puff threshold: low and forgiving so a natural cheek puff triggers.
  // Hysteresis 0.18 on / 0.10 off — steady, no flutter.
  var PUFF_ON  = 0.18;
  var PUFF_OFF = 0.10;

  var st, walls, spawnT, best=0, hitStop=0, shakeAmt=0, dareBeaten=false;
  try{best=+localStorage.getItem('cf_best')||0;}catch(_){}

  // cheek puff display value (0..1), smoothed for rendering
  var cheekSmoothed=0, puffing=false;

  // test hook — exposed for validate-game + automated playability checks
  window.__st = function(){ return { st:st, puffing:puffing, PUFF_ON:PUFF_ON, walls:walls, GAP_START:GAP_START }; };

  function newRun(){
    st={phase:'ready',y:H/2,vy:0,score:0,overAt:0};
    walls=[]; spawnT=0; dareBeaten=false;
    if(AUTO){ st.phase='play'; start(); }
  }

  function start(){
    st.phase='play'; st.y=H/2; st.vy=0; st.score=0;
    walls=[]; spawnT=0; dareBeaten=false;
    runStartTs=Date.now();
    if(window.LOOP) LOOP.emit('play_start',{seed:SEED});
  }
  var runStartTs=0;

  function currentGap(){
    return Math.max(GAP_MIN, GAP_START - st.score * GAP_SHRINK);
  }

  function spawnWall(){
    var g = currentGap();
    var margin = 100;
    // First wall's gap sits near center (reachable from start); later ones vary
    var gapY = st.score===0 && walls.length===0
      ? H/2 - g/2
      : margin + rng()*(H - g - margin*2);
    walls.push({x: W + WALL_W, gapY: gapY, gap: g, scored: false});
  }

  function gameOver(){
    st.phase='over'; st.overAt=performance.now(); shakeAmt=10;
    var dur=(Date.now()-runStartTs)/1000;
    var nb=st.score>best; if(nb){best=st.score;try{localStorage.setItem('cf_best',String(best));}catch(_){}};
    if(window.J){J.death(Math.min(0.3+st.score/20,1)); if(nb) setTimeout(function(){J.fanfare();},450);}
    if(DEMO) window.__demoScore=st.score;
    if(window.LOOP) LOOP.emit('game_over',{score:st.score,dur_s:+dur.toFixed(1)});
    if(BOT){ botRunsDone++; if(botRunsDone>=BOT_RUNS) window.__botDone=true; else setTimeout(function(){newRun();},700); }
    if(DEMO){ setTimeout(function(){ st.phase='cta'; ctaAt=performance.now(); setTimeout(function(){window.__demoDone=true;},3200); }, 1400); }
  }
  var botRunsDone=0, ctaAt=0;

  // ---- input: FACE ONLY. Tap/space ONLY restarts after a crash — never lifts.
  // The lift is driven exclusively by puffing cheeks (FC.sig.cheekPuff).
  function tapRestart(){ if(AUTO) return; if(st.phase==='over'&&performance.now()-st.overAt>500) newRun(); }
  window.addEventListener('keydown',function(e){ if(e.code==='Space'){e.preventDefault(); tapRestart();} });
  cv.addEventListener('pointerdown', tapRestart);

  // ---- camera start (shared FC lib) ----
  async function startCamera(){
    document.getElementById('perm').style.display='none';
    document.getElementById('ui').style.display='flex';
    await FC.start();
    newRun();
    requestAnimationFrame(frame);
  }
  document.getElementById('start').addEventListener('click', startCamera);

  // ---- AUTO autopilot (simulated face — discrete flaps, same path as human) ----
  var autoCool=0;
  function flapBall(){  // one bump per cheek puff (fixed strength — predictable)
    if(st.phase==='ready'){ st.phase='play'; start(); }
    if(st.phase!=='play') return;
    st.vy=FLAP_IMPULSE;
    if(window.J) J.hit(st.score+1);
  }

  // ---- render loop ----
  var last=performance.now();
  function frame(now){
    var dt=Math.min((now-last)/16.667,3); last=now;

    // ---- input / autopilot ----
    if(AUTO){
      if(st.phase==='ready'){ st.phase='play'; start(); }
      var giveUp = (DEMO && st.score>=6) || (BOT && st.score>=3+botRunsDone*2);
      autoCool-=dt;
      if(st.phase==='play' && !giveUp && autoCool<=0){
        var next=null;
        for(var i=0;i<walls.length;i++){ if(walls[i].x+WALL_W>BALL_X-30){ next=walls[i]; break; } }
        var target = next ? next.gapY + next.gap * 0.5 : H * 0.5;
        if(st.y > target+12 && st.vy > -1){ flapBall(); autoCool=11; cheekSmoothed=1; }
      }
      cheekSmoothed += (0 - cheekSmoothed)*0.15*dt;   // PiP cheeks pulse on each flap
      puffing = cheekSmoothed > 0.35;
    } else {
      // Human: shared FC pulse engine — each cheek puff = ONE bump, fired the
      // instant the cheeks puff. Small/fast puffs count; re-arms on partial
      // release so bumps chain. cheekSmoothed is for rendering only.
      FC.update(now);
      cheekSmoothed += (FC.sig.cheekPuff - cheekSmoothed)*0.55*dt;
      puffing = FC.gate.cheekPuff;
      if(FC.tap('cheekPuff')) flapBall();   // flapBall() itself starts from 'ready'
    }

    // ---- physics (discrete flap, identical logic to flappy-face) ----
    if(hitStop>0){ hitStop-=dt; }
    else if(st.phase==='play'){
      st.vy += GRAV*dt;
      st.vy = Math.max(-MAXV, Math.min(MAXV, st.vy));
      st.y  += st.vy*dt;

      spawnT += dt;
      if(spawnT >= WALL_EVERY){ spawnT=0; spawnWall(); }

      for(var i=walls.length-1;i>=0;i--){
        var w=walls[i];
        w.x -= WALL_SPEED*dt;
        if(!w.scored && w.x+WALL_W < BALL_X){
          w.scored=true; st.score++;
          if(window.J) J.perfect(st.score);
          if(!AUTO&&window.SHARE&&SHARE.dare!==null&&!dareBeaten&&st.score>SHARE.dare){dareBeaten=true;if(window.J)J.fanfare();SHARE.beaten(st.score);}
        }
        if(w.x < -WALL_W) walls.splice(i,1);
        var ballTop = st.y - BALL_R, ballBot = st.y + BALL_R;
        if(BALL_X+BALL_R > w.x && BALL_X-BALL_R < w.x+WALL_W){
          if(ballTop < w.gapY || ballBot > w.gapY+w.gap) gameOver();
        }
      }
      if(st.y < BALL_R+4 || st.y > H-BALL_R-4) gameOver();
    }

    // ---- draw ----
    cx.save();
    if(shakeAmt>0.3){ cx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt); }
    shakeAmt *= Math.pow(0.85,dt);

    // Background: cave atmosphere
    var bg = cx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#0a1520'); bg.addColorStop(0.5,'#0d1e35'); bg.addColorStop(1,'#0a1520');
    cx.fillStyle=bg; cx.fillRect(0,0,W,H);

    // Subtle cave rock texture via vertical lines
    cx.strokeStyle='rgba(46,197,182,0.04)'; cx.lineWidth=1;
    for(var xi=0;xi<W;xi+=18){ cx.beginPath(); cx.moveTo(xi,0); cx.lineTo(xi,H); cx.stroke(); }

    // Cave walls
    for(var j=0;j<walls.length;j++){
      var wall=walls[j];
      var gt=cx.createLinearGradient(wall.x,0,wall.x+WALL_W,0);
      gt.addColorStop(0,'#1a3050'); gt.addColorStop(1,'#102240');
      cx.fillStyle=gt;
      cx.fillRect(wall.x, 0, WALL_W, wall.gapY);
      cx.fillStyle=CAVEEDGE; cx.fillRect(wall.x, wall.gapY-3, WALL_W, 3);
      var gb2=cx.createLinearGradient(wall.x,0,wall.x+WALL_W,0);
      gb2.addColorStop(0,'#1a3050'); gb2.addColorStop(1,'#102240');
      cx.fillStyle=gb2;
      cx.fillRect(wall.x, wall.gapY+wall.gap, WALL_W, H-wall.gapY-wall.gap);
      cx.fillStyle=CAVEEDGE; cx.fillRect(wall.x, wall.gapY+wall.gap, WALL_W, 3);
    }

    // Balloon
    var by = st ? st.y : H/2;
    var puffAmt = cheekSmoothed;
    cx.save();
    cx.translate(BALL_X, by);

    var tilt = st ? Math.max(-0.3, Math.min(0.3, -(st.vy||0)*0.04)) : 0;
    cx.rotate(tilt);

    var bRadX = BALL_R + puffAmt*5;
    var bRadY = BALL_R + puffAmt*8;
    var ballColor = cx.createRadialGradient(-4,-6,2,0,0,bRadX+4);
    ballColor.addColorStop(0,'#ff9fd4');
    ballColor.addColorStop(0.5,PINK);
    ballColor.addColorStop(1,'#c0005a');
    cx.fillStyle=ballColor;
    cx.beginPath(); cx.ellipse(0,0,bRadX,bRadY,0,0,Math.PI*2); cx.fill();

    cx.fillStyle='rgba(255,255,255,0.35)';
    cx.beginPath(); cx.ellipse(-5,-7,6,4,Math.PI*0.3,0,Math.PI*2); cx.fill();

    cx.fillStyle='#c0005a';
    cx.beginPath(); cx.ellipse(0,bRadY+1,3,3,0,0,Math.PI*2); cx.fill();

    cx.strokeStyle='rgba(255,255,255,0.4)'; cx.lineWidth=1.5;
    cx.beginPath(); cx.moveTo(0,bRadY+4);
    cx.bezierCurveTo(4,bRadY+14,-4,bRadY+24,2,bRadY+38);
    cx.stroke();

    cx.restore();

    // Webcam PiP — drawn via FC.drawPiP so recording captures the face
    var camW=118, camH=88, cxp=W-camW-12, cyp=12;
    if(!AUTO){
      // Use FC.drawPiP for mirrored webcam + active border + control bar
      FC.drawPiP(cx, cxp, cyp, camW, camH, puffing, cheekSmoothed*1.4, W, H);
    } else {
      // Simulated face for demo/bot: smiley with puffed cheeks
      cx.save();
      cx.strokeStyle='rgba(255,255,255,0.3)'; cx.lineWidth=2;
      cx.beginPath();
      if(cx.roundRect) cx.roundRect(cxp,cyp,camW,camH,12); else cx.rect(cxp,cyp,camW,camH);
      cx.stroke();
      cx.beginPath();
      if(cx.roundRect) cx.roundRect(cxp,cyp,camW,camH,12); else cx.rect(cxp,cyp,camW,camH);
      cx.clip();
      var fcx = cxp + camW/2, fcy = cyp + camH/2;
      cx.fillStyle='#241a12'; cx.fillRect(cxp,cyp,camW,camH);

      var faceR = 28 + puffAmt*4;
      cx.fillStyle='#f5c07a';
      cx.beginPath(); cx.arc(fcx,fcy,faceR,0,Math.PI*2); cx.fill();

      var cheekPuffR = puffAmt * 14;
      if(cheekPuffR > 1){
        cx.fillStyle='rgba(255,120,120,0.7)';
        cx.beginPath(); cx.ellipse(fcx-faceR+4, fcy+2, cheekPuffR, cheekPuffR*0.85, 0, 0, Math.PI*2); cx.fill();
        cx.beginPath(); cx.ellipse(fcx+faceR-4, fcy+2, cheekPuffR, cheekPuffR*0.85, 0, 0, Math.PI*2); cx.fill();
      }

      var browRaise = puffAmt * 8;
      cx.strokeStyle='#5a3a1a'; cx.lineWidth=2.5; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(fcx-16,fcy-14-browRaise); cx.lineTo(fcx-7,fcy-16-browRaise); cx.stroke();
      cx.beginPath(); cx.moveTo(fcx+7,fcy-16-browRaise); cx.lineTo(fcx+16,fcy-14-browRaise); cx.stroke();

      var eyeOpen = 1 - puffAmt*0.3;
      cx.fillStyle='#2a1a0a';
      cx.beginPath(); cx.ellipse(fcx-11,fcy-7,3.5,3.5*eyeOpen,0,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.ellipse(fcx+11,fcy-7,3.5,3.5*eyeOpen,0,0,Math.PI*2); cx.fill();

      if(puffAmt > 0.2){
        var mR = 4 + puffAmt*2;
        cx.fillStyle='#3a1a0a';
        cx.beginPath(); cx.ellipse(fcx,fcy+10,mR,mR*0.8,0,0,Math.PI*2); cx.fill();
      } else {
        cx.strokeStyle='#3a1a0a'; cx.lineWidth=2; cx.lineCap='round';
        cx.beginPath(); cx.arc(fcx,fcy+10,7,0.2,Math.PI-0.2); cx.stroke();
      }
      cx.restore();
    }

    // Status label under PiP
    var fcLabel;
    if(AUTO){ fcLabel='DEMO'; }
    else {
      var raw = FC.statusLabel();
      fcLabel = raw || (puffing ? 'PUFF CHEEKS!' : 'puff your cheeks');
    }
    cx.fillStyle=(fcLabel.indexOf('http')>=0||fcLabel.indexOf('blocked')>=0)?GOLD:'rgba(255,255,255,0.6)';
    cx.font='700 9px Menlo,monospace'; cx.textAlign='center';
    cx.fillText(fcLabel.toUpperCase(), cxp+camW/2, cyp+camH+22);

    // Score
    cx.textAlign='center'; cx.fillStyle='#fff'; cx.font='900 56px -apple-system,Helvetica,Arial';
    if(st&&(st.phase==='play'||st.phase==='over')) cx.fillText(st.score,W/2,90);
    cx.fillStyle='rgba(255,255,255,0.4)'; cx.font='600 12px Menlo,monospace'; cx.fillText('BEST '+best,W/2,112);

    // Gap indicator (cave narrowing bar)
    if(st&&st.phase==='play'){
      var g=currentGap();
      var pct = Math.max(0,(g-GAP_MIN)/(GAP_START-GAP_MIN));
      var barW=80, barH=6, barX=(W-barW)/2, barY=122;
      cx.fillStyle='rgba(255,255,255,0.1)'; cx.fillRect(barX,barY,barW,barH);
      var barColor=pct>0.5?TEAL:(pct>0.2?GOLD:VERM);
      cx.fillStyle=barColor; cx.fillRect(barX,barY,barW*pct,barH);
      cx.fillStyle='rgba(255,255,255,0.3)'; cx.font='600 9px Menlo,monospace'; cx.textAlign='center';
      cx.fillText('CAVE WIDTH',W/2,barY+barH+11);
    }

    // Ready prompt
    if(st&&st.phase==='ready'){
      cx.fillStyle=PINK; cx.font='800 18px -apple-system,Helvetica,Arial'; cx.textAlign='center';
      cx.globalAlpha=0.6+0.4*Math.sin(now/300);
      cx.fillText('PUFF\u00B7RELEASE\u00B7PUFF \u2014 EACH PUFF IS A BUMP',W/2,H/2-40); cx.globalAlpha=1;
    }

    // Over screen
    if(st&&st.phase==='over'){
      cx.fillStyle='rgba(11,13,18,0.6)'; cx.fillRect(0,0,W,H);
      cx.fillStyle=VERM; cx.font='900 42px -apple-system,Helvetica,Arial'; cx.textAlign='center';
      cx.fillText('POPPED.',W/2,H/2-30);
      cx.fillStyle='#fff'; cx.font='800 24px -apple-system,Helvetica,Arial';
      cx.fillText(st.score+' gaps',W/2,H/2+8);
      if(!AUTO){ cx.fillStyle=TEAL; cx.font='700 15px -apple-system,Helvetica,Arial';
        cx.globalAlpha=0.6+0.4*Math.sin(now/280); cx.fillText('tap to float again',W/2,H/2+50); cx.globalAlpha=1; }
    }

    // CTA (demo only)
    if(st&&st.phase==='cta'){
      var t=(now-ctaAt)/1000, e=Math.min(1,t*2.2);
      cx.fillStyle='rgba(11,13,18,'+(0.82*e)+')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha=e; cx.textAlign='center';
      cx.fillStyle='#fff'; cx.font='900 36px -apple-system,Helvetica,Arial'; cx.fillText('CHEEK FLOAT',W/2,H/2-30);
      cx.fillStyle=TEAL; cx.font='700 17px -apple-system,Helvetica,Arial'; cx.fillText('puff your cheeks. float the balloon.',W/2,H/2+6);
      cx.fillStyle=PINK; cx.font='900 24px -apple-system,Helvetica,Arial'; cx.fillText('▶ PLAY NOW',W/2,H/2+48);
      cx.globalAlpha=1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- recording (shared FC lib) ----
  var recBtn=document.getElementById('rec');
  recBtn.addEventListener('click',function(){
    var started=FC.toggleRecord(cv,'cheek-float.webm',function(){
      recBtn.textContent='● RECORD'; recBtn.classList.remove('on');
      if(window.LOOP) LOOP.emit('recording_saved',{score:st?st.score:0});
    });
    if(started){ recBtn.textContent='■ STOP & SAVE'; recBtn.classList.add('on'); }
  });

  // AUTO mode: skip camera prompt
  if(AUTO){ document.getElementById('perm').style.display='none'; newRun(); requestAnimationFrame(frame); }
})();
</script>
