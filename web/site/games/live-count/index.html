<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function rngRange(lo, hi) { return lo + rng() * (hi - lo); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  var MAX_VIEWERS = 9999;
  var RISE_RATE   = 28;    // viewers/sec while holding
  var DECAY_RATE  = 18;    // viewers/sec when not holding
  var DROP_SPEED  = 220;   // viewers/sec during a drop event
  var DROP_RECOVER= 140;   // viewers/sec recovery after surviving a drop
  var CASH_COOLDOWN = 1.2; // sec after cashing out before re-engaging

  // ---- state ----
  var phase;           // title | challenge | play | over | cta
  var viewers;         // current viewer count (float)
  var peakViewers;
  var totalFollowers;  // score
  var holding;         // is thumb down?
  var dropActive;      // are we in a drop event?
  var dropDuration;    // how long the current drop lasts
  var dropElapsed;     // time spent in current drop
  var nextDropTimer;   // countdown to next drop (only valid when !dropActive)
  var recovering;      // after surviving a drop, quick recovery spike
  var recoverTimer;
  var cashCooldown;
  var runStartTs, overAt, ctaAt, challengeAt;
  var flashes;
  var dareBeaten;
  var hitStop, shakeAmt, zoom;
  var best = 0;
  try { best = +localStorage.getItem('lc_best') || 0; } catch (_) {}

  // demo vars
  var demoStep, demoTimer, demoNearFired;
  // bot vars
  var botRunsDone, botPhase, botHoldTimer, botReleaseTimer, botActionsLeft;

  function newGame() {
    phase = 'title';
    flashes = []; dareBeaten = false;
    hitStop = 0; shakeAmt = 0; zoom = 1;
    overAt = 0; ctaAt = 0; challengeAt = 0;
    botRunsDone = 0;
    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1300);
      return;
    }
    if (BOT) { startRun(); }
  }

  function initPlayState() {
    viewers      = rngRange(80, 140);
    peakViewers  = viewers;
    totalFollowers = 0;
    holding      = false;
    dropActive   = false;
    dropDuration = 0;
    dropElapsed  = 0;
    nextDropTimer = rngRange(2.5, 4.5);
    recovering   = false;
    recoverTimer = 0;
    cashCooldown = 0;
  }

  function startRun() {
    initPlayState();
    phase        = 'play';
    runStartTs   = Date.now();
    // demo state
    demoStep     = 0;
    demoTimer    = 2.0;   // first hold: 2 seconds
    demoNearFired = false;
    // bot state
    botPhase        = 'hold';
    botHoldTimer    = rngRange(1.8, 3.2);
    botReleaseTimer = rngRange(0.4, 0.9);
    botActionsLeft  = rngRange(4, 7) | 0;  // bot does K cash-outs then goes passive (dies)
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function cashOut() {
    var gained = Math.floor(viewers * (0.4 + 0.6 * (viewers / MAX_VIEWERS)));
    gained = Math.max(1, gained);
    totalFollowers += gained;
    peakViewers = Math.max(peakViewers, viewers);
    holding = false;
    cashCooldown = CASH_COOLDOWN;
    var label = '+' + commaNum(gained);
    if (gained > 500) {
      flash(label, GOLD, 52);
      hitStop = 0.05; zoom = 1.025;
      if (window.J) J.gold();
    } else if (gained > 150) {
      flash(label, TEAL, 44);
      if (window.J) J.perfect(1);
    } else {
      flash(label, TEAL, 38);
      if (window.J) J.hit(1);
    }
    if (window.LOOP) LOOP.emit('cash_out', { viewers: Math.round(viewers), gained: gained, total: totalFollowers });
    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && totalFollowers > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(totalFollowers);
    }
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    shakeAmt = 10;
    var mag = Math.max(0.3, Math.min(1, peakViewers / 3000));
    if (window.J) J.death(mag);
    var isNew = totalFollowers > best;
    if (isNew) {
      best = totalFollowers;
      try { localStorage.setItem('lc_best', String(best)); } catch (_) {}
      setTimeout(function () { if (window.J) J.fanfare(); }, 500);
    }
    if (window.LOOP) LOOP.emit('game_over', { score: totalFollowers, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = totalFollowers;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(resetRun, 900);
      }
    }
  }

  function resetRun() {
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }
  function commaNum(n) { return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
  function pctTop(score) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 600)))); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 520, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function pressStart(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play' && cashCooldown <= 0) { holding = true; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: totalFollowers, unit: 'followers' }); return;
      }
      resetRun();
    }
  }
  function pressEnd() {
    if (DEMO || BOT) return;
    if (phase === 'play' && holding && cashCooldown <= 0) { cashOut(); }
  }

  cv.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    pressStart((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  cv.addEventListener('pointerup', pressEnd);
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') pressStart(); });
  window.addEventListener('keyup',   function (e) { if (e.code === 'Space') pressEnd(); });

  // ---- demo autopilot ----
  // Steps:
  //  0 → hold 2s → cash out (builds count nicely)
  //  1 → wait 0.6s → hold again
  //  2 → hold through a drop (near-fail moment at low viewers) → cash out
  //  3 → wait 0.5s → hold again (final hold, let drops kill us)
  //  4 → passive, drops will drain to 0
  function demoAutopilot(dt) {
    if (phase !== 'play') return;
    demoTimer -= dt;
    switch (demoStep) {
      case 0: // hold to build count
        holding = true;
        if (demoTimer <= 0) {
          cashOut();
          demoStep = 1; demoTimer = 0.65;
        }
        break;
      case 1: // brief pause
        holding = false;
        if (demoTimer <= 0) {
          holding = true;
          demoStep = 2; demoTimer = 2.5;
        }
        break;
      case 2: // hold through drop — near-fail
        holding = true;
        if (viewers < 40 && !demoNearFired) {
          demoNearFired = true;
          flash('SO CLOSE', VERM, 40);
          shakeAmt = Math.max(shakeAmt, 5);
          if (window.J) J.near();
          if (window.LOOP) LOOP.emit('near_miss', { viewers: Math.round(viewers) });
        }
        if (demoTimer <= 0) {
          cashOut();
          demoStep = 3; demoTimer = 0.55;
        }
        break;
      case 3: // pause then final hold
        holding = false;
        if (demoTimer <= 0) {
          holding = true;
          demoStep = 4; demoTimer = 9999;
        }
        break;
      case 4: // final collapse — hold but then let go during drop for full drain speed
        // Drop kills us fast: don't hold during drop
        if (dropActive) {
          holding = false;  // full drain speed (220/s) during drop
        } else {
          holding = true;   // hold between drops (looks human)
          recovering = false;
          nextDropTimer = Math.min(nextDropTimer, 0.3); // drop fires fast
        }
        break;
    }
  }

  // ---- bot autopilot ----
  // Bot does K cash-outs then goes passive (stops holding) so the drop kills it.
  function botAutopilot(dt) {
    if (phase !== 'play') return;
    botHoldTimer    -= dt;
    botReleaseTimer -= dt;

    if (botPhase === 'hold') {
      if (cashCooldown <= 0) holding = true;
      if (botHoldTimer <= 0) {
        if (holding && cashCooldown <= 0) {
          cashOut();
          botActionsLeft--;
        }
        if (botActionsLeft <= 0) {
          // go fully passive — drops will kill us
          botPhase = 'passive';
        } else {
          botPhase = 'release';
          botReleaseTimer = rngRange(0.3, 0.8);
          botHoldTimer    = rngRange(1.5, 3.2);
        }
      }
    } else if (botPhase === 'release') {
      holding = false;
      if (botReleaseTimer <= 0) {
        botPhase = 'hold';
      }
    } else {
      // passive: not holding — force rapid drain so game ends quickly
      holding = false;
      recovering = false;       // cancel any recovery bonus
      dropActive = true;        // keep drop running continuously
      dropElapsed = 0;          // reset elapsed so drop doesn't end
      dropDuration = 9999;      // effectively infinite drop
    }
  }

  // ---- simulation ----
  function simStep(dt) {
    if (phase !== 'play') return;

    if (cashCooldown > 0) { cashCooldown -= dt; if (cashCooldown < 0) cashCooldown = 0; }

    if (dropActive) {
      // During a drop: drain fast. Holding slows it but doesn't stop it.
      var drainRate = holding ? DROP_SPEED * 0.55 : DROP_SPEED;
      viewers -= drainRate * dt;
      dropElapsed += dt;
      if (window.J && viewers > 0) J.tension(Math.min(1, 1 - viewers / 300));

      if (dropElapsed >= dropDuration || viewers <= 0) {
        dropActive = false;
        if (viewers > 0) {
          if (holding) {
            // survived the drop — recovery spike
            recovering   = true;
            recoverTimer = rngRange(1.0, 2.0);
            if (window.J) J.perfect(1);
            flash('HELD IT!', TEAL, 40);
            hitStop = 0.05; zoom = 1.02;
            shakeAmt = Math.max(shakeAmt, 3);
          }
          // schedule next drop
          nextDropTimer = rngRange(1.8, 3.5);
        }
      }
    } else if (recovering) {
      viewers += DROP_RECOVER * dt;
      recoverTimer -= dt;
      if (recoverTimer <= 0) recovering = false;
    } else {
      // normal phase
      if (holding) {
        viewers += RISE_RATE * dt;
        if (window.J && viewers > 200) J.tension(Math.min(0.5, viewers / MAX_VIEWERS));
      } else {
        viewers -= DECAY_RATE * dt;
      }
      nextDropTimer -= dt;
      if (nextDropTimer <= 0) {
        // trigger a drop
        dropActive   = true;
        dropDuration = rngRange(0.8, 1.6);
        dropElapsed  = 0;
        shakeAmt     = Math.max(shakeAmt, 3);
        if (window.J) J.tension(0.8);
      }
    }

    if (viewers > MAX_VIEWERS) viewers = MAX_VIEWERS;
    peakViewers = Math.max(peakViewers, viewers);

    if (viewers <= 0) {
      viewers = 0;
      gameOver();
    }
  }

  // ---- render helpers ----
  function flickerCount(v) {
    var jitter = rng() * 6 - 3;
    return Math.max(0, Math.round(v + jitter));
  }

  function roundRect(x, y, w, h, r) {
    cx.beginPath();
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); }
    else { cx.rect(x, y, w, h); }
  }

  function drawViewerCount(now, v) {
    var display = flickerCount(v);
    var str = commaNum(display);
    var pulse = dropActive ? 1 + 0.04 * Math.sin(now / 60) : 1;
    cx.save();
    cx.translate(W / 2, H / 2 - 20);
    cx.scale(pulse, pulse);
    cx.textAlign = 'center';
    // LIVE dot
    cx.fillStyle = VERM;
    cx.font = '700 13px Menlo, monospace';
    cx.fillText('● LIVE', 0, -58);
    // main number
    var col = dropActive ? VERM : (holding ? TEAL : 'rgba(255,255,255,0.92)');
    cx.fillStyle = col;
    cx.font = '900 88px -apple-system, Helvetica, Arial';
    cx.fillText(str, 0, 0);
    // viewers label
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '500 15px -apple-system, Helvetica, Arial';
    cx.fillText('viewers', 0, 26);
    cx.restore();
  }

  function drawHoldBar(v) {
    var ratio = Math.min(1, v / MAX_VIEWERS);
    var bw = 260, bh = 8, bx = (W - bw) / 2, by = H / 2 + 50;
    cx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(bx, by, bw, bh, 4); cx.fill();
    if (ratio > 0.001) {
      var fillColor = dropActive ? VERM : (holding ? TEAL : GOLD);
      // glow on critical low
      if (ratio < 0.1) {
        cx.save();
        cx.shadowColor = VERM; cx.shadowBlur = 14;
        cx.fillStyle = VERM;
        roundRect(bx, by, bw * ratio, bh, 4); cx.fill();
        cx.restore();
      } else {
        cx.fillStyle = fillColor;
        roundRect(bx, by, bw * ratio, bh, 4); cx.fill();
      }
    }
  }

  function drawFollowers(score) {
    cx.textAlign = 'center';
    cx.fillStyle = GOLD;
    cx.font = '800 28px -apple-system, Helvetica, Arial';
    cx.fillText(commaNum(score) + ' followers', W / 2, H / 2 + 100);
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + commaNum(best), W / 2, H / 2 + 122);
  }

  function drawHoldCue(now) {
    var txt, col, pulse;
    if (cashCooldown > 0) {
      txt = 'WAIT…'; col = 'rgba(255,255,255,0.3)'; pulse = 1;
    } else if (holding) {
      txt = 'RELEASE TO CASH OUT'; col = TEAL; pulse = 0.7 + 0.3 * Math.sin(now / 200);
    } else if (dropActive) {
      txt = 'HOLD OR BAIL?'; col = VERM; pulse = 0.6 + 0.4 * Math.sin(now / 110);
    } else {
      txt = 'HOLD'; col = 'rgba(255,255,255,0.6)'; pulse = 0.6 + 0.4 * Math.sin(now / 350);
    }
    cx.globalAlpha = pulse;
    cx.textAlign = 'center';
    cx.fillStyle = col;
    cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText(txt, W / 2, H / 2 + 155);
    cx.globalAlpha = 1;
  }

  // ---- draw phases ----
  function drawTitle(now) {
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
    cx.fillText('LIVE COUNT', W / 2, H / 2 - 60);
    cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '500 16px -apple-system, Helvetica, Arial';
    cx.fillText('hold to grow your audience', W / 2, H / 2 - 18);
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '500 14px -apple-system, Helvetica, Arial';
    cx.fillText('drops can kill you. feel it out.', W / 2, H / 2 + 10);
    var pulse = 0.6 + 0.4 * Math.sin(now / 340);
    cx.globalAlpha = pulse;
    cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('TAP TO GO LIVE', W / 2, H / 2 + 70);
    cx.globalAlpha = 1;
  }

  function drawChallenge() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
    cx.fillText('FOLLOWERS TO BEAT', W / 2, H / 2 - 70);
    cx.fillStyle = GOLD; cx.font = '900 90px -apple-system, Helvetica, Arial';
    cx.fillText('1,847', W / 2, H / 2 + 20);
    cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText("today's top run", W / 2, H / 2 + 52);
  }

  function drawPlay(now) {
    drawViewerCount(now, viewers);
    drawHoldBar(viewers);
    drawFollowers(totalFollowers);
    drawHoldCue(now);

    // dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
      cx.textAlign = 'center';
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '700 14px -apple-system, Helvetica, Arial';
      var dareTxt = dareBeaten
        ? 'DARE BEATEN ✓'
        : 'BEAT ' + commaNum(SHARE.dare) + ' followers' + (SHARE.by ? ' — ' + SHARE.by : '');
      cx.fillText(dareTxt, W / 2, 52);
    }

    // tension rings while holding at high viewer count
    if (holding && viewers > 500) {
      var rings = Math.min(5, Math.floor(viewers / 500));
      for (var ri = 0; ri < rings; ri++) {
        var rrad = 90 + ri * 18 + Math.sin(now / 200 + ri) * 4;
        cx.beginPath();
        cx.arc(W / 2, H / 2 - 20, rrad, 0, Math.PI * 2);
        cx.strokeStyle = TEAL;
        cx.globalAlpha = Math.max(0, 0.09 - ri * 0.015);
        cx.lineWidth = 2;
        cx.stroke();
        cx.globalAlpha = 1;
      }
    }
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
    cx.fillText('STREAM ENDED', W / 2, 280);
    cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
    cx.fillText(commaNum(totalFollowers) + ' followers', W / 2, 328);
    var pt = pctTop(totalFollowers);
    cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 374);
    cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('better than ' + (100 - pt) + '% of streamers', W / 2, 398);

    if (!DEMO && !BOT) {
      var pulse = 0.6 + 0.4 * Math.sin(now / 290);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — GO LIVE AGAIN', W / 2, 448);
      cx.globalAlpha = 1;
      // share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(
        window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
        W / 2, SHARE_R.y + 30
      );
    }
  }

  function drawCTA(now) {
    var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
    cx.fillText('LIVE COUNT', W / 2, 300);
    cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('they got ' + commaNum(window.__demoScore || 1847) + ' followers.', W / 2, 340);
    var p3 = 0.7 + 0.3 * Math.sin(now / 250);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 28px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + commaNum(window.__demoScore || 1847), W / 2, 410);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 442);
    cx.globalAlpha = 1;
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 1000, 0.05); last = now;

    // autopilots
    if (DEMO) demoAutopilot(dt);
    if (BOT)  botAutopilot(dt);

    // simulation (frozen during hit-stop)
    if (hitStop > 0) { hitStop -= dt; }
    else { simStep(dt); }

    // juice decay
    shakeAmt *= Math.pow(0.82, dt * 60);
    zoom     += (1 - zoom) * 0.12 * dt * 60;

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // red flash overlay during drop
    if (phase === 'play' && dropActive) {
      var fa = 0.04 + 0.04 * Math.sin(now / 80);
      cx.fillStyle = 'rgba(232,80,46,' + fa + ')';
      cx.fillRect(0, 0, W, H);
    }

    if (phase === 'title')     drawTitle(now);
    else if (phase === 'challenge') drawChallenge();
    else if (phase === 'play') drawPlay(now);
    else if (phase === 'over') drawOver(now);
    else if (phase === 'cta')  drawCTA(now);

    // floating reward flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt * 60;
      var alpha = Math.max(0, 1 - fl.t / 50);
      cx.globalAlpha = alpha;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 80 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 50) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
