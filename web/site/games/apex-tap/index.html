<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- persistent best ----
  var best = 0;
  try { best = +localStorage.getItem('at_best') || 0; } catch (_) {}

  // ---- game state ----
  var state, flashes, hitStop, zoom, shakeAmt, dareBeaten;
  var runStartTs, botRunsDone = 0;
  var ctaAt = 0, challengeAt = 0;

  // Ball physics constants
  var BALL_R = 18;
  var BASE_BOUNCE_H = 200;   // initial apex height above floor (px)
  var FLOOR_Y = H - 80;      // y of the floor

  // ---- apex window ----
  // The "apex" is the top of the arc. We accept a tap as "apex hit"
  // when the ball is within APEX_WINDOW px of true apex.
  // Window shrinks with each successful tap.
  var BASE_WINDOW = 44;      // starting apex window half-height (px)

  function newGame() {
    state = {
      phase: 'title',         // title | challenge | play | over | cta
      ball: {
        y: FLOOR_Y - BALL_R,
        vy: 0,
        bounceH: BASE_BOUNCE_H, // current arc amplitude
        ascending: false,
        apexY: FLOOR_Y - BASE_BOUNCE_H - BALL_R // current target apex y
      },
      score: 0,
      combo: 0,
      overAt: 0,
      tapUsed: false           // ensures only one tap per bounce cycle counts
    };
    flashes = [];
    hitStop = 0;
    zoom = 1;
    shakeAmt = 0;
    dareBeaten = false;

    if (DEMO) {
      state.score = 0;
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1300);
      return;
    }
    if (BOT) { startRun(); return; }
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 10))));
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    // launch the ball upward
    launchBall();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function launchBall() {
    var b = state.ball;
    b.y = FLOOR_Y - BALL_R;
    // velocity to reach desired apex: v = sqrt(2 * g * h), using g=0.55
    var g = gravity();
    b.vy = -Math.sqrt(2 * g * b.bounceH);
    b.ascending = true;
    b.apexY = FLOOR_Y - BALL_R - b.bounceH;
    state.tapUsed = false;
  }

  function gravity() {
    // gravity increases slightly with score so the window shrinks
    return 0.55 + state.score * 0.012;
  }

  function apexWindow() {
    // half-height of the accept zone (shrinks with score, min 8px)
    return Math.max(8, BASE_WINDOW - state.score * 2.2);
  }

  function tapApex() {
    var b = state.ball;
    var win = apexWindow();
    var dist = Math.abs(b.y - b.apexY);
    var hit = dist <= win;
    var perfect = dist <= win * 0.25;
    var nearMiss = !hit && dist <= win * 1.7;

    if (state.tapUsed) return; // already tapped this bounce
    state.tapUsed = true;

    if (nearMiss && !hit) {
      shakeAmt = 4;
      if (window.J) J.near();
      flash('SO CLOSE', VERM, 38);
      if (window.LOOP) LOOP.emit('near_miss', { dist: +dist.toFixed(1), window: +win.toFixed(1) });
      // near miss = game over (too far off)
      triggerGameOver();
      return;
    }

    if (!hit) {
      // missed completely
      triggerGameOver();
      return;
    }

    // --- successful tap ---
    state.score++;
    state.combo++;

    var ratio = 1 - (dist / win);  // 0=edge, 1=center

    if (perfect) {
      hitStop = 55; zoom = 1.03; shakeAmt = 2;
      if (window.J) J.perfect(state.combo);
      flash('PERFECT', TEAL, 46);
    } else {
      hitStop = 0;
      if (window.J) J.hit(state.combo);
    }

    // gold milestone every 10
    if (state.score % 10 === 0) {
      if (window.J) J.gold();
      flash('×' + state.score, GOLD, 52);
    }

    // tension rises with score
    if (window.J) J.tension(Math.min(state.score / 30, 1));

    // dare beaten check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }

    if (window.LOOP) LOOP.emit('apex_hit', { n: state.score, dist: +dist.toFixed(1), perfect: perfect, ratio: +ratio.toFixed(3) });

    // increase speed: next bounce is higher (faster, shorter window)
    state.ball.bounceH = Math.min(BASE_BOUNCE_H + state.score * 8, FLOOR_Y - 120 - BALL_R);
    launchBall();
  }

  function triggerGameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.score / 30, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) {
      best = state.score;
      try { localStorage.setItem('at_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +(dur.toFixed(1)) });

    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 600);
      }
    }
  }

  function resetRun() {
    state.score = 0; state.combo = 0; flashes = [];
    state.ball.bounceH = BASE_BOUNCE_H;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { tapApex(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'bounces' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // Demo script: deliberate offsets from apex (px). Negative = tap slightly early (before apex).
  // Positive = tap slightly late (after apex).  'miss' = intentional game-over tap far off.
  // 'nearmiss' = tap just outside the window for the near-fail beat.
  // demoWaits = extra frames of hesitation before each move.
  var demoScript  = [-6, 8, -4, 10, 'nearmiss', -3, 'miss'];
  var demoWaits   = [28, 22, 35, 50, 38, 42, 25];  // hesitation beats per move
  var demoIdx     = 0, demoWait = 40;
  var demoArmed   = false; // true once ball is near apex and we should evaluate

  // bot state
  var botArmed    = false, botOffset = null;

  function autopilot(now) {
    if (state.phase !== 'play') return;
    var b = state.ball;

    if (DEMO) {
      // only act near the apex (ascending → descending transition)
      var nearApex = b.ascending && (b.y - b.apexY) < 30;
      if (!nearApex && !demoArmed) return;
      if (nearApex) demoArmed = true;

      if (demoWait > 0) { demoWait--; return; }
      if (state.tapUsed) { demoArmed = false; return; }

      var want = demoScript[Math.min(demoIdx, demoScript.length - 1)];

      if (want === 'miss') {
        // tap when ball is well past the window (descending, far from apex)
        var pastApex = !b.ascending && (b.y - b.apexY) > apexWindow() * 2.5;
        if (pastApex) { demoArmed = false; demoIdx++; tapApex(); }
        return;
      }
      if (want === 'nearmiss') {
        // tap when ball is just outside the apex window
        var justOutside = b.ascending && Math.abs(b.y - b.apexY) < apexWindow() * 1.5 && Math.abs(b.y - b.apexY) > apexWindow() * 0.9;
        if (justOutside || (!b.ascending && b.y < b.apexY + apexWindow() * 2)) {
          demoArmed = false;
          demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
          demoIdx++;
          tapApex();
        }
        return;
      }

      // numeric offset: tap when ball.y is at (apexY + want) on ascending pass or near peak
      var target = b.apexY + want;
      if (b.ascending && Math.abs(b.y - target) < 8) {
        demoArmed = false;
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 28;
        demoIdx++;
        tapApex();
      } else if (!b.ascending && b.y > b.apexY + Math.abs(want) + 10) {
        // passed the window descending — tap now (late, still inside window for small want)
        demoArmed = false;
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 28;
        demoIdx++;
        tapApex();
      }

    } else if (BOT) {
      // bot: aim for apex with gaussian error
      var nearApexBot = b.ascending && Math.abs(b.y - b.apexY) < 40;
      if (!nearApexBot && !botArmed) return;
      if (nearApexBot) botArmed = true;
      if (state.tapUsed) { botArmed = false; botOffset = null; return; }

      if (botOffset === null) {
        // mostly hits (within window) but occasionally misses
        // After BOT_RUNS-worth of bounces, force a miss to end the run
        var errScale = apexWindow() * 0.55;
        botOffset = gauss() * errScale;
        // roughly 20% chance per tap of being outside window — natural loss
        if (rng() < 0.18) botOffset = apexWindow() * (1.2 + rng() * 0.6) * (rng() < 0.5 ? 1 : -1);
      }

      var tgt = b.apexY + botOffset;
      if (Math.abs(b.y - tgt) < 6 || (!b.ascending && b.y > tgt + 4)) {
        botArmed = false;
        var savedOffset = botOffset;
        botOffset = null;
        tapApex();
      }
    }
  }

  // ---- render helpers ----
  function drawBall(bx, by, streak) {
    // glow intensity grows with combo
    var glowR = BALL_R + Math.min(streak * 2, 14);
    var grd = cx.createRadialGradient(bx, by, 2, bx, by, glowR);
    var comboAlpha = Math.min(0.7, 0.2 + streak * 0.05);
    grd.addColorStop(0,   TEAL);
    grd.addColorStop(0.5, 'rgba(46,197,182,0.8)');
    grd.addColorStop(1,   'rgba(46,197,182,' + comboAlpha + ')');
    cx.beginPath();
    cx.arc(bx, by, glowR, 0, Math.PI * 2);
    cx.fillStyle = grd;
    cx.fill();
    // solid core
    cx.beginPath();
    cx.arc(bx, by, BALL_R, 0, Math.PI * 2);
    cx.fillStyle = TEAL;
    cx.fill();
    // highlight
    cx.beginPath();
    cx.arc(bx - BALL_R * 0.3, by - BALL_R * 0.3, BALL_R * 0.35, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.fill();
  }

  function drawApexMarker(apexY, win) {
    // faint zone indicator
    cx.save();
    cx.globalAlpha = 0.18;
    cx.fillStyle = GOLD;
    cx.fillRect(W / 2 - 32, apexY - win, 64, win * 2);
    cx.globalAlpha = 0.55;
    cx.strokeStyle = GOLD;
    cx.lineWidth = 1.5;
    cx.setLineDash([4, 5]);
    cx.beginPath();
    cx.moveTo(W / 2 - 44, apexY);
    cx.lineTo(W / 2 + 44, apexY);
    cx.stroke();
    cx.setLineDash([]);
    cx.restore();
  }

  // ---- main loop ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;
    var b = state.ball;

    // physics (skip during hit-stop)
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      if (state.phase === 'play') {
        var g = gravity();
        b.vy += g * dt;
        b.y  += b.vy * dt;

        // detect apex transition (ascending → descending)
        if (b.ascending && b.vy >= 0) {
          b.ascending = false;
        }

        // bounce off floor
        if (b.y >= FLOOR_Y - BALL_R) {
          b.y = FLOOR_Y - BALL_R;
          // if ball hits floor without a tap registered this cycle, game over
          if (!state.tapUsed) {
            triggerGameOver();
          } else {
            // Shouldn't happen in normal flow since launchBall resets, but safety net
            state.tapUsed = false;
            b.vy = -Math.sqrt(2 * g * b.bounceH);
            b.ascending = true;
            b.apexY = FLOOR_Y - BALL_R - b.bounceH;
          }
        }

        autopilot(now);
      }
    }

    // juice: shake + zoom decay
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // floor line
    cx.fillStyle = 'rgba(255,255,255,0.12)';
    cx.fillRect(0, FLOOR_Y, W, 2);

    // ---- challenge card ----
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('28', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 432);
    }

    // ---- play ----
    if (state.phase === 'play' || state.phase === 'over') {
      // apex window indicator (only during play)
      if (state.phase === 'play') {
        drawApexMarker(b.apexY, apexWindow());
      }

      // ball (show frozen at last position on over)
      if (state.phase === 'play' || (state.phase === 'over' && hitStop > 0)) {
        drawBall(W / 2, b.y, state.combo);
      }

      // score display
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(
          dareBeaten
            ? 'DARE BEATEN ✓'
            : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''),
          W / 2, 148
        );
      }

      // window size hint (shrinking label)
      if (state.phase === 'play') {
        var win = apexWindow();
        var winAlpha = Math.min(0.7, win / BASE_WINDOW);
        cx.globalAlpha = winAlpha;
        cx.fillStyle = VERM;
        cx.font = '600 11px Menlo, monospace';
        cx.fillText('window ' + Math.round(win * 2) + 'px', W / 2, H - 30);
        cx.globalAlpha = 1;
      }
    }

    // ---- over screen ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('MISSED IT.', W / 2, 296);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' bounces', W / 2, 342);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // ---- title ----
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('APEX TAP', W / 2, 270);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('tap at the peak.', W / 2, 308);
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 348);
      cx.globalAlpha = 1;
    }

    // ---- CTA (demo only) ----
    if (state.phase === 'cta') {
      var tCta = (now - ctaAt) / 1000, ease = Math.min(1, tCta * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('APEX TAP', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('' + (window.__demoScore || 28) + ' bounces. your move.', W / 2, 332);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 28), W / 2, 402);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 438);
      cx.globalAlpha = 1;
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>

</html>
