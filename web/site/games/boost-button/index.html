<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo/bot clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var DEMO_TARGET = 9312;   // traced final banked reach of the demo script

  var state, flashes, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, dareBeaten = false, shakeAmt = 0, challengeAt = 0;
  try { best = +localStorage.getItem('bb_best') || 0; } catch (_) {}

  function fmt(n) {
    n = Math.round(n); var s = n < 0 ? '-' : ''; n = Math.abs(n);
    var parts = [];
    while (n >= 1000) { parts.push(('00' + (n % 1000)).slice(-3)); n = Math.floor(n / 1000); }
    parts.push(n);
    return s + parts.reverse().join(',');
  }
  function pctTop(s) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 9000)))); }

  function newGame() {
    state = { phase: 'title', score: 0, reach: 0, meter: 0, combo: 0, banks: 0, jackpot: false, overAt: 0 };
    flashes = []; dareBeaten = false; hitStop = 0; zoom = 1; shakeAmt = 0;
    if (window.J) J.tension(0);
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (BOT) botTarget = 0.78 + rng() * 0.2;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- the two moves ----
  // BOOST: pump reach into the post (variable reward), fill the shadowban meter.
  // fixedV: demo uses a deterministic ladder so the final score is reproducible.
  function doBoost(fixedV) {
    if (state.phase !== 'play') return;
    var v, jackpot = false;
    if (fixedV !== undefined) {
      v = fixedV;
    } else {
      var base = 380;
      v = Math.round(base * (1 + state.combo * 0.18) * (0.55 + 0.9 * rng()));
      if (rng() < 0.06) { v *= 6; jackpot = true; }
    }
    state.combo++;
    state.reach += v;
    var inc;
    if (fixedV !== undefined) inc = 0.075 + state.banks * 0.014 + state.combo * 0.005;
    else inc = (0.06 + state.banks * 0.012 + state.combo * 0.005) * (0.8 + 0.4 * rng());
    state.meter += inc;

    if (window.J) { J.hit(state.combo); if (jackpot) J.gold(); J.tension(Math.min(state.meter, 1)); }
    flash('+' + fmt(v), jackpot ? GOLD : '#fff', jackpot ? 34 : 24);
    if (jackpot) { flash('JACKPOT ×6', GOLD, 30); shakeAmt = 4; zoom = 1.03; hitStop = 3; }
    else shakeAmt = Math.max(shakeAmt, 1.2);

    if (state.meter >= 1) { shadowban(); return; }
    if (window.LOOP) LOOP.emit('boost', { reach: state.reach, meter: +state.meter.toFixed(3), combo: state.combo, jackpot: jackpot });
  }

  // BANK: lock in reach before the meter trips. Partial reset (×0.35) — the algorithm remembers.
  function doBank() {
    if (state.phase !== 'play' || state.reach === 0) return;
    var bankedAt = state.meter;
    var gain = state.reach;
    state.score += gain;
    state.reach = 0; state.combo = 0;
    state.meter *= 0.35; state.banks++;
    var near = bankedAt > 0.8;
    if (window.J) { if (near) J.near(); J.perfect(state.banks); J.tension(state.meter); }
    flash(near ? 'SAVED!' : 'BANKED +' + fmt(gain), near ? TEAL : GOLD, near ? 40 : 30);
    if (near) {
      hitStop = 3; zoom = 1.03; shakeAmt = 3;
      if (window.LOOP) LOOP.emit('near_miss', { meter: +bankedAt.toFixed(3), banked: gain });
    } else { zoom = 1.02; }

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true; flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    if (window.LOOP) LOOP.emit('bank', { gain: gain, score: state.score, banks: state.banks, near: near });
  }

  function shadowban() {
    state.phase = 'over'; state.overAt = performance.now();
    var lost = state.reach; state.reach = 0; state.combo = 0;
    shakeAmt = 14; zoom = 1.05; hitStop = 6;
    flash('SHADOWBAN', VERM, 48);
    if (lost > 0) flash('-' + fmt(lost) + ' LOST', VERM, 28);
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) { J.death(Math.min(0.4 + lost / 8000, 1)); if (newBest) setTimeout(function () { J.fanfare(); }, 450); }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('bb_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), lost: lost });
    if (DEMO) setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3600); }, 2800);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    state.score = 0; state.reach = 0; state.meter = 0; state.combo = 0; state.banks = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var BOOST_R = { x: 210, y: 528, w: 182, h: 152 };
  var BANK_R  = { x: 20,  y: 548, w: 158, h: 132 };
  var SHARE_R = { x: W / 2 - 130, y: 540, w: 260, h: 48 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      if (x !== undefined && inR(BANK_R, x, y)) { doBank(); return; }
      doBoost();                              // BOOST is the default thumb target (the conditioned move)
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'reach' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') { e.preventDefault(); if (state.phase === 'play') doBoost(); else tap(); }
    else if (e.key === 'b' || e.key === 'B') { if (state.phase === 'play') doBank(); }
  });

  // ---- demo autopilot (mirror-neuron arc) ----
  // b = boost, k = bank. Greedy build → near-fail (meter ~0.95) → save → one more push → shadowban.
  // Hesitation (demoWaits) keeps it human, never robotic. The long wait before the round-3 bank
  // is the "it's over" pause before the last-second save.
  var demoActions = [
    'b','b','b','b','k',                 // round 1: easy reach, bank
    'b','b','b','b','b','k',              // round 2: greedier, bank
    'b','b','b','b','b','b','k',          // round 3: NEAR-FAIL at meter ~0.95, then SAVED
    'b','b','b','b','b','b'               // round 4: one more push → SHADOWBAN (spectacle)
  ];
  var demoWaits = [
    18, 20, 16, 22, 44,
    18, 20, 16, 18, 20, 42,
    22, 26, 24, 30, 34, 38, 80,
    18, 20, 18, 20, 18, 18
  ];
  var demoIdx = 0, demoWait = 30;

  // ---- bot autopilot (imperfect, guaranteed to die) ----
  var botRunsDone = 0, botTarget = 0.85, botTick = 12;

  function autopilot() {
    if (state.phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait -= 1; return; }
      var a = demoActions[demoIdx];
      if (!a) return;
      if (a === 'b') doBoost(Math.round(400 * (1 + (state.combo + 1) * 0.18)));
      else doBank();
      demoIdx++;
      demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 25;
    } else if (BOT) {
      if (botTick > 0) { botTick -= 1; return; }
      if (state.meter > 0.92) { doBoost(); }                       // doomed push once the meter is hot
      else if (state.meter < botTarget) { doBoost(); }
      else { if (rng() < 0.3) doBoost(); else { doBank(); botTarget = 0.78 + rng() * 0.2; } }
      botTick = 8 + Math.floor(rng() * 8);
    }
  }

  // ---- render ----
  function meterColor(m) {
    // teal (safe) → gold (building) → vermillion (danger) → deep red (doom)
    if (m < 0.5) { var t = m / 0.5; return 'rgb(' + Math.round(46 + (242 - 46) * t) + ',' + Math.round(197 + (177 - 197) * t) + ',' + Math.round(182 + (52 - 182) * t) + ')'; }
    if (m < 0.8) { var t2 = (m - 0.5) / 0.3; return 'rgb(' + Math.round(242 + (232 - 242) * t2) + ',' + Math.round(177 + (80 - 177) * t2) + ',' + Math.round(52 + (46 - 52) * t2) + ')'; }
    var t3 = Math.min(1, (m - 0.8) / 0.2); return 'rgb(' + Math.round(232 + (160 - 232) * t3) + ',' + Math.round(80 + (30 - 80) * t3) + ',' + Math.round(46 + (28 - 46) * t3) + ')';
  }

  var CARD = { x: 30, y: 150, w: 345, h: 300 };
  var METER = { x: 336, y: 164, w: 22, h: 272 };

  function drawPostCard(now, active) {
    // card body
    var hot = state.meter > 0.8;
    cx.save();
    if (hot && active) { var sh = (Math.random() - 0.5) * 3 * (state.meter - 0.8) * 5; cx.translate(sh, 0); }
    cx.fillStyle = active ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.03)';
    cx.strokeStyle = hot ? VERM : 'rgba(255,255,255,0.14)';
    cx.lineWidth = hot ? 2 : 1.2;
    cx.beginPath();
    cx.roundRect ? cx.roundRect(CARD.x, CARD.y, CARD.w, CARD.h, 16) : cx.rect(CARD.x, CARD.y, CARD.w, CARD.h);
    cx.fill(); cx.stroke();
    cx.restore();

    // post mock (the conditioned path: a promoted post)
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.beginPath(); cx.arc(58, 186, 13, 0, 7); cx.fill();
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '700 12px -apple-system, Helvetica, Arial'; cx.textAlign = 'left';
    cx.fillText('Promoted post', 78, 184);
    cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 10px -apple-system, Helvetica, Arial';
    cx.fillText('sponsored · boosted', 78, 198);
    cx.fillStyle = 'rgba(255,255,255,0.07)';
    cx.fillRect(CARD.x + 22, CARD.y + 56, CARD.w - 80, 70);

    // reach number (the prize — grows + glows with size)
    var reachMag = Math.min(1, state.reach / 6000);
    var rsize = 48 + reachMag * 30;
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '700 12px -apple-system, Helvetica, Arial';
    cx.fillText('UNBANKED REACH', CARD.x + CARD.w / 2 - 16, CARD.y + 150);
    if (state.reach > 0) {
      cx.shadowColor = hot ? VERM : GOLD; cx.shadowBlur = 18 + reachMag * 22;
      cx.fillStyle = hot ? VERM : '#fff';
      cx.font = '900 ' + rsize + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fmt(state.reach), CARD.x + CARD.w / 2 - 16, CARD.y + 150 + 38);
      cx.shadowBlur = 0;
    } else {
      cx.fillStyle = 'rgba(255,255,255,0.22)'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('0', CARD.x + CARD.w / 2 - 16, CARD.y + 150 + 38);
    }
    // combo multiplier
    if (state.combo > 1 && active) {
      cx.fillStyle = TEAL; cx.font = '800 18px Menlo, monospace';
      cx.fillText('×' + state.combo, CARD.x + CARD.w / 2 - 16, CARD.y + 150 + 64);
    }

    // shadowban meter (vertical, fills bottom→top)
    cx.fillStyle = 'rgba(255,255,255,0.07)';
    cx.beginPath(); cx.roundRect ? cx.roundRect(METER.x, METER.y, METER.w, METER.h, 6) : cx.rect(METER.x, METER.y, METER.w, METER.h); cx.fill();
    var fillH = METER.h * Math.min(1, state.meter);
    var mc = meterColor(state.meter);
    if (fillH > 2) {
      cx.save();
      cx.shadowColor = mc; cx.shadowBlur = hot ? 16 : 6;
      cx.fillStyle = mc;
      cx.beginPath(); cx.roundRect ? cx.roundRect(METER.x, METER.y + METER.h - fillH, METER.w, fillH, 6) : cx.rect(METER.x, METER.y + METER.h - fillH, METER.w, fillH); cx.fill();
      cx.restore();
    }
    // meter label
    cx.textAlign = 'center';
    cx.save(); cx.translate(METER.x + METER.w / 2, METER.y + METER.h / 2); cx.rotate(-Math.PI / 2);
    cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '700 10px Menlo, monospace';
    cx.fillText('SHADOWBAN METER ' + Math.round(state.meter * 100) + '%', 0, 3);
    cx.restore();
    if (hot && active) {
      var p = 0.55 + 0.45 * Math.sin(now / 120);
      cx.globalAlpha = p; cx.fillStyle = VERM; cx.font = '800 11px -apple-system, Helvetica, Arial';
      cx.fillText('⚠ RISK', METER.x + METER.w / 2, METER.y - 8); cx.globalAlpha = 1;
    }
  }

  function drawButtons(now) {
    // BANK (left, teal — the cash-out)
    var bp = 0.6 + 0.4 * Math.sin(now / 360);
    cx.fillStyle = 'rgba(46,197,182,' + (0.18 + 0.1 * bp) + ')';
    cx.strokeStyle = TEAL; cx.lineWidth = 2;
    cx.beginPath(); cx.roundRect ? cx.roundRect(BANK_R.x, BANK_R.y, BANK_R.w, BANK_R.h, 16) : cx.rect(BANK_R.x, BANK_R.y, BANK_R.w, BANK_R.h); cx.fill(); cx.stroke();
    cx.textAlign = 'center'; cx.fillStyle = TEAL;
    cx.font = '900 26px -apple-system, Helvetica, Arial';
    cx.fillText('BANK', BANK_R.x + BANK_R.w / 2, BANK_R.y + 50);
    cx.fillStyle = 'rgba(46,197,182,0.7)'; cx.font = '700 12px -apple-system, Helvetica, Arial';
    cx.fillText('lock in reach', BANK_R.x + BANK_R.w / 2, BANK_R.y + 76);

    // BOOST (right, vermillion — the thumb's conditioned move, bigger, pulses)
    var pp = 0.7 + 0.3 * Math.sin(now / 220);
    cx.shadowColor = VERM; cx.shadowBlur = 18 * pp;
    cx.fillStyle = 'rgba(232,80,46,' + (0.9) + ')';
    cx.beginPath(); cx.roundRect ? cx.roundRect(BOOST_R.x, BOOST_R.y, BOOST_R.w, BOOST_R.h, 18) : cx.rect(BOOST_R.x, BOOST_R.y, BOOST_R.w, BOOST_R.h); cx.fill();
    cx.shadowBlur = 0;
    cx.fillStyle = '#fff'; cx.font = '900 34px -apple-system, Helvetica, Arial';
    cx.fillText('BOOST', BOOST_R.x + BOOST_R.w / 2, BOOST_R.y + 64);
    cx.fillStyle = 'rgba(255,255,255,0.85)'; cx.font = '700 13px -apple-system, Helvetica, Arial';
    cx.fillText('⚡ tap to reach', BOOST_R.x + BOOST_R.w / 2, BOOST_R.y + 92);
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.fillText('fills the meter', BOOST_R.x + BOOST_R.w / 2, BOOST_R.y + 112);
  }

  var ctaAt = 0, last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // autopilot timing — hitStop freezes the scripted hand so big hits "bite" (decayed every frame)
    if (hitStop > 0) hitStop -= dt;
    else autopilot();

    // juice transforms: decaying shake + zoom-pulse
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(242,177,52,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // top HUD: score (banked) + best
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(fmt(state.score), W / 2, 60);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '700 12px -apple-system, Helvetica, Arial';
      cx.fillText('REACH BANKED · BEST ' + fmt(best), W / 2, 82);
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + fmt(SHARE.dare) + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 108);
      }
    }

    // stage (post card + buttons)
    if (state.phase === 'title' || state.phase === 'play') {
      drawPostCard(now, state.phase === 'play');
      drawButtons(now);
    } else if (state.phase === 'over') {
      cx.globalAlpha = 0.4; drawPostCard(now, false); cx.globalAlpha = 1;
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 78px -apple-system, Helvetica, Arial';
      cx.fillText(fmt(DEMO_TARGET), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top banked reach", W / 2, 430);
    }

    // floating reward text
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('BOOST BUTTON', W / 2, 116);
      cx.fillStyle = VERM; cx.font = '700 16px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP BOOST TO START', W / 2, 696); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('boost the post. bank before the ban.', W / 2, 716);
    }

    // game over (the loss-aversion frame)
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('SHADOWBAN.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(fmt(state.score) + ' reach', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 696);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)'; cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 24) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card (beat 6)
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('BOOST BUTTON', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they banked ' + fmt(window.__demoScore || DEMO_TARGET) + ' reach. your move.', W / 2, 342);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + fmt(window.__demoScore || DEMO_TARGET), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5; cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
