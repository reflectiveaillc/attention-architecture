<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);

  var BOT_ERR  = +qs.get('err') || 46;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;

  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);

  function rungW(n) { return 250 - (n - 1) * 13; }                  // 250 .. 133
  function perfectR(w) { return w * 0.06; }
  function goodR(w) { return w * 0.22; }

  var state, marker, climberY, fallers, debris, flashes, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, dareBeaten = false, shakeAmt = 0, challengeAt = 0, ctaAt = 0;
  try { best = +localStorage.getItem('cl_best') || 0; } catch (_) {}

  function newGame() {

    var near = dist > goodR(w);                        // edge of the rung — the sliver

    } else {
      gain = base; state.combo = 0;
      if (window.J) J.hit(state.rung);

    flash('+' + gain, perfect ? GOLD : TEAL, 30);

    if (state.rung > RUNGS) { topped(); return; }

    setMarker(state.rung);
  }

  var climberHop = 0;
  function topped() {
    state.won = true;
    state.rung = RUNGS;
    if (window.J) { J.fanfare(); J.gold(); }
    flash('TOPPED IT', GOLD, 46);
    gameOver();
  }

  function miss(off) {
    // death spectacle: the climber falls the whole way down
    var y = rungY(state.rung);
    fallers.push({ x: marker.cx, y: y - 16, vy: -2.2, r: 0, vr: 0.06, c: VERM, rad: 9 });

      setTimeout(function () { window.__demoDone = true; }, 3600); }, 2800);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    state.rung = 1; state.score = 0; state.combo = 0; state.perfectCount = 0; state.won = false;
    fallers = []; debris = []; flashes = []; climberY = rungY(1); climberHop = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);

  var demoWaits = [28, 34, 22, 44, 30, 62, 26, 40, 24]; // beats of hesitation before each lock

  function rungColor(n) {

  }

    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ladder rails (two faint verticals)
    cx.strokeStyle = 'rgba(255,255,255,0.06)'; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(W / 2 - 64, rungY(RUNGS) - 8); cx.lineTo(W / 2 - 64, BOTTOM_Y + 8);
    cx.moveTo(W / 2 + 64, rungY(RUNGS) - 8); cx.lineTo(W / 2 + 64, BOTTOM_Y + 8); cx.stroke();

      // perfect zone band

      cx.globalAlpha = 0.25; cx.lineWidth = 9; cx.beginPath();
      cx.moveTo(marker.x, cy - 24); cx.lineTo(marker.x, cy + 24); cx.stroke(); cx.globalAlpha = 1;
      // marker head dot

      // climber on current rung (with hop offset)
      var hopOff = Math.max(0, climberHop) * 14;
      drawClimber(marker.cx, climberY - hopOff);
    } else if (state.phase === 'play' && !marker) {

    } else if (state.rung >= 1 && state.phase !== 'play' && !state.won && state.phase !== 'title') {
      // resting climber for over-screen (unless it fell)
      if (fallers.length === 0) drawClimber(W / 2, rungY(state.rung) - 16);

    // falling climber (death spectacle)
    for (var f = fallers.length - 1; f >= 0; f--) {
      var p = fallers[f];
      p.vy += 0.42 * dt; p.y += p.vy * dt; p.r += p.vr * dt;
      cx.save(); cx.translate(p.x, p.y); cx.rotate(p.r); cx.globalAlpha = 0.95;
      cx.fillStyle = p.c; cx.beginPath(); cx.arc(0, 0, p.rad, 0, Math.PI * 2); cx.fill();
      cx.restore(); cx.globalAlpha = 1;
      if (p.y > H + 60) fallers.splice(f, 1);
    }
    // debris
    for (var d = debris.length - 1; d >= 0; d--) {
      var b = debris[d];
      b.vy += 0.35 * dt; b.x += b.vx * dt; b.y += b.vy * dt; b.r += b.vr * dt; b.life += dt;
      cx.save(); cx.translate(b.x, b.y); cx.rotate(b.r); cx.globalAlpha = Math.max(0, 1 - b.life / 50);
      cx.fillStyle = b.c; cx.fillRect(-b.s / 2, -b.s / 2, b.s, b.s);
      cx.restore(); cx.globalAlpha = 1;
      if (b.life > 50) debris.splice(d, 1);
    }

    // score + rung readout
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 92);
      cx.fillStyle = 'rgba(255,255,255,0.42)';
      cx.font = '700 12px Menlo, monospace';
      cx.fillText('CLOUT · RUNG ' + Math.min(state.rung, RUNGS) + '/' + RUNGS, W / 2, 112);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 132);

        cx.fillStyle = GOLD; cx.font = '900 ' + cs + 'px -apple-system, Helvetica, Arial';
        cx.fillText('×' + state.combo, W / 2, 168);

      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 188);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('400', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top climb", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('CLOUT LADDER', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO CLIMB', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = state.won ? GOLD : VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(state.won ? 'TOPPED IT.' : 'FELL OFF.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' clout', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of climbers', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;

        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('CLOUT LADDER', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he hit ' + (window.__demoScore || 400) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 400), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  function drawClimber(x, y) {
    // glowing vermillion dot — the "you" climbing the feed
    cx.save();
    cx.shadowColor = VERM; cx.shadowBlur = 14;
    cx.fillStyle = VERM;
    cx.beginPath(); cx.arc(x, y, 9, 0, Math.PI * 2); cx.fill();
    cx.restore();
    cx.fillStyle = '#fff'; cx.globalAlpha = 0.7;
    cx.beginPath(); cx.arc(x - 2, y - 2, 2.4, 0, Math.PI * 2); cx.fill();
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
