<!--
  LOOP / attention-architecture — Beat Skip
  Mechanic: 16-bar loop, beat every BPM_INTERVAL ms. Every 8th beat is SILENT.
  Tap on normal beats (green window), skip the silent one.
  Streak = consecutive correct actions (tap OR skip). Bar 16 ends the run.
  Circuits: 01-rpe, 02-novelty, 04-loss.
  Modes:
    ?demo=1&seed=7   scripted demo clip, mirror-neuron arc
    ?bot=1&runs=N    imperfect autopilot, N runs, sets __botDone

  html,body{margin:0;padding:0;height:100%;background:#0b0d12;overflow:hidden;
            -webkit-user-select:none;user-select:none;touch-action:manipulation;}

<script>
(function(){
  'use strict';
  var W=405,H=720;
  var qs=new URLSearchParams(location.search);
  var DEMO=qs.get('demo')==='1';
  var BOT=qs.get('bot')==='1';
  var BOT_RUNS=+qs.get('runs')||3;
  var SEED=+qs.get('seed')||42;

  // mulberry32 seeded RNG
  function mulberry32(a){
    return function(){
      a|=0;a=a+0x6D2B79F5|0;
      var t=Math.imul(a^a>>>15,1|a);
      t=t+Math.imul(t^t>>>7,61|t)^t;
      return((t^t>>>14)>>>0)/4294967296;
    };
  }
  var rng=mulberry32(SEED);

  var cv=document.getElementById('c'),cx=cv.getContext('2d');
  var dpr=Math.min(window.devicePixelRatio||1,2),scale=1;
  function fit(){
    var vw=window.innerWidth,vh=window.innerHeight;
    scale=Math.min(vw/W,vh/H);
    cv.style.width=(W*scale)+'px';cv.style.height=(H*scale)+'px';
    cv.width=W*dpr;cv.height=H*dpr;
    cx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',fit);fit();

  var VERM='#e8502e',TEAL='#2ec5b6',GOLD='#f2b134',INK='#0b0d12';

  // ---- game constants ----
  var BPM=120;
  var BEAT_MS=60000/BPM;           // ms per beat ~500ms
  var SILENT_EVERY=8;              // every 8th beat is the silent hole
  var TOTAL_BEATS=32;              // 16 bars × 2 beats = 32 beats total in a run
  var TAP_WINDOW=BEAT_MS*0.42;     // ±42% of beat = good tap zone
  var MISS_AFTER=BEAT_MS*0.7;      // if no tap by this offset after beat → missed

  // ---- state ----
  var phase,beats,beatIdx,runStartTs,lastBeatTs,nextBeatIn;
  var streak,maxStreak,combo,score;
  var overAt=0,ctaAt=0,challengeAt=0;
  var flashes=[];
  var hitStop=0,shakeAmt=0,zoom=1;
  var dareBeaten=false;
  var best=0;
  try{best=+localStorage.getItem('bs_best')||0;}catch(_){}

  var botRunsDone=0;

  // visual pulsers
  var ringScale=1,ringAlpha=0;
  var silentGlow=0;   // pulses when the silent beat fires
  var beatPulse=0;    // pulsing ring on the main tap zone
  var lastBeatWasSilent=false;

  // beat plan for current run: array of {silent:bool} length TOTAL_BEATS
  // silent beats are at index 7,15,23,31 (0-indexed)
  function buildBeatPlan(){
    var plan=[];
    for(var i=0;i<TOTAL_BEATS;i++){
      plan.push({silent:((i+1)%SILENT_EVERY===0)});
    }
    return plan;
  }

  function pctTop(s){
    return Math.max(1,Math.min(99,Math.round(100*Math.exp(-s/12))));
  }

  // ---- new game / reset ----
  function newGame(){
    beats=buildBeatPlan();
    beatIdx=0;
    streak=0;maxStreak=0;combo=0;score=0;
    flashes=[];hitStop=0;shakeAmt=0;zoom=1;
    ringScale=1;ringAlpha=0;silentGlow=0;beatPulse=0;
    dareBeaten=false;lastBeatWasSilent=false;

    if(DEMO){
      phase='challenge';
      challengeAt=performance.now();
      setTimeout(startRun,1250);
      return;
    }
    if(BOT){
      phase='title';
      startRun();
      return;
    }
    phase='title';
  }

  function startRun(){
    phase='play';
    runStartTs=Date.now();
    beatIdx=0;
    nextBeatIn=300;   // first beat comes quickly
    lastBeatTs=performance.now()+nextBeatIn;
    if(window.LOOP) LOOP.emit('play_start',{seed:SEED});
  }

  // ---- input ----
  var MUTE_R={x:W-46,y:10,w:38,h:38};
  var SHARE_R={x:W/2-125,y:486,w:250,h:46};
  function inR(r,x,y){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;}

  // When a normal beat fires: player must tap within TAP_WINDOW ms on each side
  // When a silent beat fires: player must NOT tap during it
  // We track: tapped=false each beat, and resolve after MISS_AFTER ms

  var beatResolved=false;   // did we already resolve this beat?
  var tappedThisBeat=false;

  function tap(px,py){
    if(DEMO||BOT) return;
    if(px!==undefined&&inR(MUTE_R,px,py)&&window.J){J.toggleMute();return;}
    if(phase==='title'){startRun();return;}
    if(phase==='over'&&performance.now()-overAt>350){
      if(px!==undefined&&inR(SHARE_R,px,py)&&window.SHARE){
        SHARE.send({score:score,unit:'streak'});return;
      }
      newGame();
      if(window.LOOP) LOOP.emit('restart',{});
      return;
    }
    if(phase!=='play') return;

    // register tap for current beat resolution
    tappedThisBeat=true;

    // evaluate immediately if we're inside a beat window
    var now=performance.now();
    var elapsed=now-lastBeatTs;  // time since the last beat fired
    var currentBeat=beats[beatIdx];
    if(!currentBeat) return;

    if(!beatResolved){
      if(currentBeat.silent){
        // tapping on a silent beat = WRONG
        beatResolved=true;
        wrongAction('tapped the hole');
      } else {
        // normal beat: check if we're in the tap window
        // elapsed can be negative (tapped before beat) — use nextBeatIn leftover too
        // We allow tapping slightly early (up to TAP_WINDOW before beat)
        var timeToNext=lastBeatTs-now; // positive if beat hasn't fired yet
        var inWindow=(elapsed>=0&&elapsed<=TAP_WINDOW)||(timeToNext>=0&&timeToNext<=TAP_WINDOW);
        if(inWindow){
          beatResolved=true;
          correctTap();
        } else {
          // early or very late tap — treat as wrong timing
          beatResolved=true;
          wrongAction('off-beat tap');
        }
      }
    }
  }

  function correctTap(){
    streak++;combo++;
    if(combo>=4&&window.J) J.gold();
    else if(combo>=2&&window.J) J.perfect(combo);
    else if(window.J) J.hit(combo);
    if(window.J) J.tension(Math.min(streak/20,1));
    score=Math.max(score,streak);
    hitStop=3;
    ringScale=1.4;ringAlpha=1;
    flash(combo>=4?'GOLDEN':combo>=2?'SNAP!':'HIT',combo>=4?GOLD:combo>=2?TEAL:VERM,combo>=4?48:40);
    if(window.LOOP) LOOP.emit('beat_hit',{streak:streak,combo:combo,beat:beatIdx});
    // dare check
    if(!DEMO&&!BOT&&window.SHARE&&SHARE.dare!==null&&!dareBeaten&&streak>SHARE.dare){
      dareBeaten=true;
      flash('DARE BEATEN',TEAL,44);
      if(window.J) J.fanfare();
      SHARE.beaten(streak);
    }
  }

  function correctSkip(){
    streak++;combo++;
    if(window.J) J.near();  // the "silence moment" — audible release
    if(window.J) J.tension(Math.min(streak/20,1));
    score=Math.max(score,streak);
    silentGlow=1;
    flash('SKIPPED',TEAL,38);
    if(window.LOOP) LOOP.emit('beat_skip',{streak:streak,beat:beatIdx});
    // dare check
    if(!DEMO&&!BOT&&window.SHARE&&SHARE.dare!==null&&!dareBeaten&&streak>SHARE.dare){
      dareBeaten=true;
      flash('DARE BEATEN',TEAL,44);
      if(window.J) J.fanfare();
      SHARE.beaten(streak);
    }
  }

  function wrongAction(reason){
    var loss=streak;
    streak=0;combo=0;
    shakeAmt=8;
    if(window.J) J.death(Math.min(0.2+loss/20,1));
    flash('MISS',VERM,52);
    if(window.LOOP) LOOP.emit('near_miss',{beat:beatIdx,reason:reason,lost:loss});
    // after a miss the run ends
    endRun();
  }

  function endRun(){
    phase='over';
    overAt=performance.now();
    var dur=(Date.now()-runStartTs)/1000;
    var newBest=score>best;
    if(newBest){best=score;try{localStorage.setItem('bs_best',String(best));}catch(_){}}
    if(window.J){
      J.death(0.4);
      if(newBest) setTimeout(function(){J.fanfare();},450);
    }
    if(DEMO) window.__demoScore=score;
    if(window.LOOP) LOOP.emit('game_over',{score:score,dur_s:+dur.toFixed(1)});

    if(DEMO){
      setTimeout(function(){
        phase='cta';ctaAt=performance.now();
        setTimeout(function(){window.__demoDone=true;},3600);
      },2400);
    }
    if(BOT){
      botRunsDone++;
      if(botRunsDone>=BOT_RUNS){window.__botDone=true;}
      else setTimeout(function(){
        newGame();
        if(window.LOOP) LOOP.emit('restart',{});
      },700);
    }
  }

  function runCompleted(){
    // ran all beats successfully
    phase='over';
    overAt=performance.now();
    var dur=(Date.now()-runStartTs)/1000;
    var newBest=score>best;
    if(newBest){best=score;try{localStorage.setItem('bs_best',String(best));}catch(_){}}
    if(window.J){J.fanfare();}
    if(DEMO) window.__demoScore=score;
    if(window.LOOP) LOOP.emit('game_over',{score:score,dur_s:+dur.toFixed(1)});
    flash('PERFECT RUN',GOLD,52);

    if(DEMO){
      setTimeout(function(){
        phase='cta';ctaAt=performance.now();
        setTimeout(function(){window.__demoDone=true;},3600);
      },2400);
    }
    if(BOT){
      botRunsDone++;
      if(botRunsDone>=BOT_RUNS){window.__botDone=true;}
      else setTimeout(function(){
        newGame();
        if(window.LOOP) LOOP.emit('restart',{});
      },700);
    }
  }

  function flash(txt,color,size){flashes.push({txt:txt,color:color,size:size,t:0});}

  // ---- autopilots ----
  // Demo script: hesitation (demoWaits), near-fail at beat 14, real fail at beat 16
  var demoScript=[
    // [beatIdx, action]: 'tap'|'skip'|'miss_tap'(tap on silent)|'miss_skip'(miss a normal)
    {at:0,act:'tap'},{at:1,act:'tap'},{at:2,act:'tap'},{at:3,act:'tap'},
    {at:4,act:'tap'},{at:5,act:'tap'},{at:6,act:'tap'},
    {at:7,act:'skip'},   // silent — skip it (correct)
    {at:8,act:'tap'},{at:9,act:'tap'},{at:10,act:'tap'},{at:11,act:'tap'},
    {at:12,act:'tap'},{at:13,act:'tap'},{at:14,act:'tap'},
    // near-fail: almost tap on silent (14), correct at last moment
    {at:15,act:'near_skip'},  // hesitate, then skip (recovery)
    {at:16,act:'tap'},{at:17,act:'tap'},{at:18,act:'tap'},
    // the fail: tap on the next silent beat
    {at:23,act:'miss_tap'}
  ];
  var demoWaits={
    0:300,1:250,2:280,3:310,4:260,5:290,6:240,7:180,
    8:270,9:260,10:300,11:280,12:260,13:290,14:310,15:380,
    16:270,17:260,18:280,19:310
  };
  var demoScriptIdx=0;
  var botEarlyMs=60;  // bot fires tap this many ms before the window closes

  function autoBotAction(beatObj,elapsed){
    if(!beatObj) return;
    if(beatObj.silent){
      // bot correctly skips silent beats, but sometimes (last few runs) messes up
      var totalRun=beatIdx+botRunsDone*TOTAL_BEATS;
      var shouldMiss=BOT&&botRunsDone===BOT_RUNS-1&&beatIdx>=14;
      if(shouldMiss){
        // tap on silent = end run
        tappedThisBeat=true;
        beatResolved=true;
        wrongAction('bot tapped silent');
      }
      // else: silently don't tap = correct skip (resolved in beat advance)
    } else {
      // tap near the middle-ish of the window with variance
      var targetOffset=BEAT_MS*0.25+rng()*BEAT_MS*0.1;
      if(elapsed>=targetOffset&&!tappedThisBeat&&!beatResolved){
        tappedThisBeat=true;
        beatResolved=true;
        correctTap();
        beatPulse=1;
      }
    }
  }

  function autoDemoAction(beatObj,elapsed,beatFiredNow){
    if(!beatObj||beatResolved) return;
    var si=demoScriptIdx;
    var entry=null;
    for(var i=0;i<demoScript.length;i++){
      if(demoScript[i].at===beatIdx){entry=demoScript[i];break;}
    }
    var wait=demoWaits[beatIdx]||260;

    if(beatObj.silent){
      if(entry&&entry.act==='miss_tap'){
        // tap on the silent beat = fail demo
        if(elapsed>=wait&&!tappedThisBeat&&!beatResolved){
          tappedThisBeat=true;beatResolved=true;
          wrongAction('demo tapped hole');
        }
      } else if(entry&&entry.act==='near_skip'){
        // hesitate very long, then DON'T tap (correct skip, recovered)
        // just let it resolve naturally
      }
      // default: don't tap (correct skip, resolved in advance)
    } else {
      // normal beat — tap with hesitation
      if(elapsed>=wait&&!tappedThisBeat&&!beatResolved){
        tappedThisBeat=true;beatResolved=true;
        correctTap();
        beatPulse=1;
      }
    }
  }

  // ---- input listeners ----
  window.addEventListener('pointerdown',function(e){
    var r=cv.getBoundingClientRect();
    tap((e.clientX-r.left)/scale,(e.clientY-r.top)/scale);
  });
  window.addEventListener('keydown',function(e){if(e.code==='Space') tap();});

  // ---- main loop ----
  var last=performance.now();
  function frame(now){
    var dt=Math.min((now-last)/16.667,3);last=now;

    // ---- beat clock ----
    if(phase==='play'){
      var elapsed=now-lastBeatTs;
      var currentBeat=beats[beatIdx];

      // fire autopilot for bot/demo
      if((BOT||DEMO)&&currentBeat){
        if(DEMO) autoDemoAction(currentBeat,elapsed,false);
        else if(BOT) autoBotAction(currentBeat,elapsed);
      }

      // beat resolution: check if we've passed MISS_AFTER without resolving
      if(!beatResolved&&elapsed>=MISS_AFTER&&currentBeat){
        beatResolved=true;
        if(currentBeat.silent){
          // nobody tapped during silent window = CORRECT skip
          correctSkip();
        } else {
          // nobody tapped on a normal beat = MISS
          wrongAction('missed beat');
        }
      }

      // advance to next beat
      if(elapsed>=BEAT_MS&&beatResolved){
        beatIdx++;
        if(beatIdx>=TOTAL_BEATS){
          runCompleted();
        } else {
          lastBeatTs=now;
          beatResolved=false;
          tappedThisBeat=false;
          lastBeatWasSilent=beats[beatIdx]?beats[beatIdx].silent:false;
          beatPulse=0;
        }
      }

      // beatPulse when beat fires (elapsed near 0)
      if(elapsed>=0&&elapsed<32&&!beatResolved===false||elapsed<16){
        // visual pulse on each beat
      }
    }

    // ---- juice decays ----
    if(hitStop>0) hitStop-=dt;
    shakeAmt*=Math.pow(0.83,dt);
    zoom+=(1-zoom)*0.14*dt;
    ringAlpha*=Math.pow(0.92,dt);
    ringScale+=(1-ringScale)*0.1*dt;
    silentGlow*=Math.pow(0.88,dt);
    beatPulse*=Math.pow(0.9,dt);

    // ---- draw ----
    cx.save();
    if(shakeAmt>0.3||zoom>1.001){
      var sx=(rng()-0.5)*shakeAmt,sy=(rng()-0.5)*shakeAmt;
      cx.translate(W/2+sx,H/2+sy);cx.scale(zoom,zoom);cx.translate(-W/2,-H/2);
    }

    // background
    cx.fillStyle=INK;cx.fillRect(-20,-20,W+40,H+40);
    var bg=cx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'rgba(46,197,182,0.05)');
    bg.addColorStop(1,'rgba(232,80,46,0.07)');
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);

    // ---- phase renders ----
    if(phase==='title'){
      drawTitle(now);
    } else if(phase==='challenge'){
      drawChallenge(now);
    } else if(phase==='play'){
      drawPlay(now);
    } else if(phase==='over'){
      drawOver(now);
    } else if(phase==='cta'){
      drawCTA(now);
    }

    // flashes
    for(var k=flashes.length-1;k>=0;k--){
      var fl=flashes[k];fl.t+=dt;
      var a=Math.max(0,1-fl.t/38);
      cx.globalAlpha=a;cx.textAlign='center';
      cx.fillStyle=fl.color;
      cx.font='900 '+(fl.size+fl.t*0.4)+'px -apple-system,Helvetica,Arial';
      cx.fillText(fl.txt,W/2,260-fl.t*1.0);
      cx.globalAlpha=1;
      if(fl.t>38) flashes.splice(k,1);
    }

    // mute toggle (human only)
    if(!DEMO&&!BOT&&window.J){
      cx.textAlign='center';
      cx.globalAlpha=0.5;
      cx.font='16px -apple-system,Helvetica,Arial';
      cx.fillStyle='#fff';
      cx.fillText(J.muted?'🔇':'🔊',MUTE_R.x+MUTE_R.w/2,MUTE_R.y+26);
      cx.globalAlpha=1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- renderers ----
  function drawTitle(now){
    cx.textAlign='center';
    cx.fillStyle='#fff';cx.font='900 52px -apple-system,Helvetica,Arial';
    cx.fillText('BEAT SKIP',W/2,280);
    cx.fillStyle='rgba(255,255,255,0.55)';cx.font='600 15px -apple-system,Helvetica,Arial';
    cx.fillText('tap the beat. skip the silence.',W/2,318);
    var pulse=0.55+0.45*Math.sin(now/320);
    cx.globalAlpha=pulse;cx.fillStyle=VERM;
    cx.font='700 20px -apple-system,Helvetica,Arial';
    cx.fillText('TAP TO START',W/2,370);
    cx.globalAlpha=1;
    cx.fillStyle='rgba(255,255,255,0.28)';cx.font='600 12px -apple-system,Helvetica,Arial';
    cx.fillText('32 beats. one hole. don\'t tap it.',W/2,406);
  }

  function drawChallenge(now){
    cx.textAlign='center';
    cx.fillStyle='rgba(255,255,255,0.5)';cx.font='800 16px Menlo,monospace';
    cx.fillText('STREAK TO BEAT',W/2,298);
    cx.fillStyle=GOLD;cx.font='900 96px -apple-system,Helvetica,Arial';
    cx.fillText('24',W/2,402);
    cx.fillStyle='rgba(255,255,255,0.35)';cx.font='600 13px -apple-system,Helvetica,Arial';
    cx.fillText("today's top run",W/2,432);
  }

  function drawPlay(now){
    var elapsed=now-lastBeatTs;
    var pct=Math.min(elapsed/BEAT_MS,1);
    var currentBeat=beats[beatIdx];
    var isSilent=currentBeat&&currentBeat.silent;

    // progress bar (bar number)
    var bar=Math.floor(beatIdx/2);  // 2 beats per bar, 16 bars
    cx.fillStyle='rgba(255,255,255,0.15)';
    cx.fillRect(40,60,W-80,6);
    cx.fillStyle=isSilent?VERM:TEAL;
    cx.fillRect(40,60,(W-80)*(beatIdx/TOTAL_BEATS),6);

    // bar label
    cx.textAlign='center';
    cx.fillStyle='rgba(255,255,255,0.4)';cx.font='600 12px Menlo,monospace';
    cx.fillText('BAR '+(bar+1)+' / 16',W/2,50);

    // beat dots row — show 8 dots (current octet), highlight current, grey silence
    var octetStart=Math.floor(beatIdx/8)*8;
    var dotSpacing=38,dotR=10;
    var totalDotW=8*dotSpacing;
    var dotStartX=W/2-totalDotW/2+dotSpacing/2;
    for(var d=0;d<8;d++){
      var bi=octetStart+d;
      var bx=dotStartX+d*dotSpacing;
      var by=108;
      var isSilentDot=(bi+1)%8===0;
      var isDone=bi<beatIdx;
      var isCurrent=bi===beatIdx;
      if(isCurrent){
        // animated dot
        var bpAlpha=0.5+0.5*Math.cos(elapsed*Math.PI/BEAT_MS);
        cx.beginPath();cx.arc(bx,by,dotR,0,Math.PI*2);
        if(isSilentDot){
          cx.fillStyle='rgba(232,80,46,0.2)';cx.fill();
          cx.strokeStyle=VERM;cx.lineWidth=2;cx.stroke();
          // show warning
          cx.fillStyle='rgba(232,80,46,0.7)';
          cx.font='700 11px Menlo,monospace';
          cx.fillText('○',bx,by+4);
        } else {
          cx.fillStyle='rgba(46,197,182,'+(0.3+0.5*bpAlpha)+')';cx.fill();
          cx.strokeStyle=TEAL;cx.lineWidth=2;cx.stroke();
        }
      } else if(isDone){
        cx.beginPath();cx.arc(bx,by,dotR*0.65,0,Math.PI*2);
        cx.fillStyle=isSilentDot?'rgba(232,80,46,0.5)':'rgba(255,255,255,0.3)';cx.fill();
      } else {
        cx.beginPath();cx.arc(bx,by,dotR*0.5,0,Math.PI*2);
        cx.fillStyle=isSilentDot?'rgba(232,80,46,0.2)':'rgba(255,255,255,0.12)';cx.fill();
      }
    }

    // ---- main tap zone ----
    var cx2=W/2,cy2=420,bigR=140;
    // silent glow layer
    if(silentGlow>0.01){
      cx.beginPath();cx.arc(cx2,cy2,bigR+20,0,Math.PI*2);
      cx.fillStyle='rgba(46,197,182,'+silentGlow*0.18+')';cx.fill();
    }

    // beat progress arc
    cx.beginPath();
    cx.arc(cx2,cy2,bigR,(-Math.PI/2),(-Math.PI/2)+2*Math.PI*pct);
    cx.strokeStyle=isSilent?'rgba(232,80,46,0.35)':'rgba(255,255,255,0.12)';
    cx.lineWidth=6;cx.stroke();

    // sweep arc (remaining)
    cx.beginPath();
    cx.arc(cx2,cy2,bigR,(-Math.PI/2)+2*Math.PI*pct,(-Math.PI/2)+2*Math.PI);
    cx.strokeStyle=isSilent?VERM:TEAL;
    cx.lineWidth=isSilent?3:4;cx.stroke();

    // ring pulse on hit
    if(ringAlpha>0.05){
      cx.beginPath();cx.arc(cx2,cy2,bigR*ringScale,0,Math.PI*2);
      cx.strokeStyle='rgba(46,197,182,'+ringAlpha*0.7+')';
      cx.lineWidth=3;cx.stroke();
    }

    // centre display
    if(isSilent){
      // big SILENCE indicator
      cx.textAlign='center';
      cx.fillStyle='rgba(232,80,46,0.9)';
      cx.font='900 28px Menlo,monospace';
      cx.fillText('— — —',cx2,cy2-14);
      cx.fillStyle='rgba(255,255,255,0.45)';
      cx.font='600 13px -apple-system,Helvetica,Arial';
      cx.fillText('SKIP THIS ONE',cx2,cy2+14);
    } else {
      cx.textAlign='center';
      cx.fillStyle='rgba(255,255,255,0.9)';
      cx.font='900 26px -apple-system,Helvetica,Arial';
      cx.fillText('TAP',cx2,cy2-8);
      if(combo>=2){
        cx.fillStyle=combo>=4?GOLD:TEAL;
        cx.font='800 16px -apple-system,Helvetica,Arial';
        cx.fillText('×'+combo,cx2,cy2+18);
      }
    }

    // streak counter
    cx.textAlign='center';
    cx.fillStyle='rgba(255,255,255,0.92)';
    cx.font='800 72px -apple-system,Helvetica,Arial';
    cx.fillText(streak,W/2,210);
    cx.fillStyle='rgba(255,255,255,0.38)';
    cx.font='600 12px Menlo,monospace';
    cx.fillText('STREAK',W/2,228);

    // best label
    cx.fillStyle='rgba(255,255,255,0.28)';
    cx.font='600 12px -apple-system,Helvetica,Arial';
    cx.fillText('BEST '+best,W/2,248);

    // dare banner
    if(!DEMO&&!BOT&&window.SHARE&&SHARE.dare!==null){
      cx.fillStyle=dareBeaten?TEAL:GOLD;
      cx.font='800 14px -apple-system,Helvetica,Arial';
      cx.fillText(dareBeaten?'DARE BEATEN ✓':'BEAT '+SHARE.dare+(SHARE.by?' — by '+SHARE.by:''),W/2,590);
    }

    // bottom hint
    cx.fillStyle='rgba(255,255,255,0.18)';cx.font='600 11px -apple-system,Helvetica,Arial';
    cx.fillText('every 8th beat is silent — don\'t tap it',W/2,660);
  }

  function drawOver(now){
    cx.fillStyle='rgba(11,13,18,0.6)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    cx.fillStyle=VERM;cx.font='900 40px -apple-system,Helvetica,Arial';
    cx.fillText(score>=TOTAL_BEATS?'FLAWLESS.':'MISSED.',W/2,300);
    cx.fillStyle='#fff';cx.font='800 26px -apple-system,Helvetica,Arial';
    cx.fillText(streak+' streak',W/2,344);
    var pt=pctTop(streak);
    cx.fillStyle=GOLD;cx.font='900 22px -apple-system,Helvetica,Arial';
    cx.fillText('TOP '+pt+'% TODAY',W/2,390);
    cx.fillStyle='rgba(255,255,255,0.5)';cx.font='600 13px -apple-system,Helvetica,Arial';
    cx.fillText('better than '+(100-pt)+'% of players',W/2,414);

    if(!DEMO&&!BOT){
      var p2=0.6+0.4*Math.sin(now/280);
      cx.globalAlpha=p2;cx.fillStyle=TEAL;
      cx.font='700 17px -apple-system,Helvetica,Arial';
      cx.fillText('TAP — ONE MORE TRY',W/2,460);
      cx.globalAlpha=1;
      // share pill
      cx.fillStyle='rgba(242,177,52,0.14)';
      cx.strokeStyle=GOLD;cx.lineWidth=1.5;
      cx.beginPath();
      if(cx.roundRect) cx.roundRect(SHARE_R.x,SHARE_R.y,SHARE_R.w,SHARE_R.h,23);
      else cx.rect(SHARE_R.x,SHARE_R.y,SHARE_R.w,SHARE_R.h);
      cx.fill();cx.stroke();
      cx.fillStyle=GOLD;cx.font='800 16px -apple-system,Helvetica,Arial';
      cx.fillText(window.SHARE&&SHARE.dare!==null&&dareBeaten?'⚡ DARE THEM BACK':'⚡ DARE A FRIEND',W/2,SHARE_R.y+30);
    }
  }

  function drawCTA(now){
    var t=(now-ctaAt)/1000,ease=Math.min(1,t*2.2);
    cx.fillStyle='rgba(11,13,18,'+(0.78*ease)+')';cx.fillRect(0,0,W,H);
    cx.globalAlpha=ease;cx.textAlign='center';
    cx.fillStyle='#fff';cx.font='900 52px -apple-system,Helvetica,Arial';
    cx.fillText('BEAT SKIP',W/2,300);
    cx.fillStyle='rgba(255,255,255,0.7)';cx.font='700 18px -apple-system,Helvetica,Arial';
    cx.fillText('they got '+(window.__demoScore||24)+'. your move.',W/2,342);
    var p3=0.7+0.3*Math.sin(now/240);
    cx.fillStyle=VERM;cx.globalAlpha=ease*p3;
    cx.font='900 30px -apple-system,Helvetica,Arial';
    cx.fillText('BEAT '+(window.__demoScore||24),W/2,406);
    cx.globalAlpha=ease;
    cx.fillStyle=TEAL;cx.font='700 16px -apple-system,Helvetica,Arial';
    cx.fillText('link in bio',W/2,440);
    cx.globalAlpha=1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
