    drawLives();

    // Dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
      cx.textAlign = 'center';
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 14px -apple-system, Helvetica, Arial';
      cx.fillText(
        dareBeaten ? 'DARE BEATEN ✓' : ('BEAT ' + SHARE.dare + (SHARE.by ? ' — ' + SHARE.by : '')),
        W / 2, 120
      );
    }

    // Phase label
    cx.textAlign = 'center';
    if (phase === 'memorize') {
      // Timer bar
      var barW = W - GRID_PAD * 2;
      var filled = (memorizeTimer / 3.0) * barW;
      cx.fillStyle = 'rgba(255,255,255,0.10)';
      cx.fillRect(GRID_PAD, 136, barW, 6);
      cx.fillStyle = TEAL;
      cx.fillRect(GRID_PAD, 136, filled, 6);

      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 13px Menlo, monospace';
      cx.fillText('MEMORIZE', W / 2, 130);

      // Draw full grid (show all tiles)
      drawGrid(true, -1);
    } else if (phase === 'recall') {
      cx.fillStyle = VERM;
      cx.font = '700 13px Menlo, monospace';
      cx.fillText("WHERE'S THE MISSING TILE?", W / 2, 130);

      // Draw grid with missing slot
      drawGrid(false, emptySlot());
    }

    // Grid bottom label: streak if active
    if (streak >= 2) {
      var gh = GRID_TOP + gridHeight() + 18;
      cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText(streak + ' IN A ROW', W / 2, gh);
    }
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
    cx.fillText('MISSED IT.', W / 2, 295);
    cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
    cx.fillText(score + ' points', W / 2, 342);
    var pt = pctTop(score);
    cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 388);
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 412);

    if (!DEMO && !BOT) {
      var p2 = 0.65 + 0.35 * Math.sin(now / 290);
      cx.globalAlpha = p2;
      cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — ONE MORE TRY', W / 2, 458);
      cx.globalAlpha = 1;
      // Share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      drawRoundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(
        window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
        W / 2, SHARE_R.y + 30
      );
    }
  }

  function drawCTA(now) {
    var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease; cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
    cx.fillText('MISSING TILE', W / 2, 298);
    cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('change blindness got me on round 4', W / 2, 338);
    var p3 = 0.7 + 0.3 * Math.sin(now / 250);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 30px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + (window.__demoScore || 35), W / 2, 406);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 440);
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
