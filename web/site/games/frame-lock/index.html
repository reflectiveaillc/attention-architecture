<title>Frame Lock — Tilt</title>
<!--
  LOOP / attention-architecture — Frame Lock

<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  var BAR_X = 52, BAR_Y = 400, BAR_W = 301, BAR_H = 18;
  var NEEDLE_PERIOD = 1600;   // ms for one full sweep (left→right)
  var SWEET_W = 28;           // sweet-spot zone width (px on BAR)
  var PERFECT_W = 8;          // perfect zone (narrower)
  var NEAR_W = 14;            // near zone
  var LIVES_MAX = 3;

  // timing windows in ms from the center of sweet-spot
  // These correspond to pixel distance / pixels-per-ms
  function msFromCenter(needleX, sweetCx) {
    // pixels offset → ms offset (NEEDLE_PERIOD / BAR_W ms per pixel)
    return Math.abs(needleX - sweetCx) * (NEEDLE_PERIOD / BAR_W);
  }

  // state
  var phase, score, lives, combo, streak, hitStop, shakeAmt, zoom;
  var needleX, needleDir, needleSpeed;
  var sweetX;   // center of sweet-spot on BAR (BAR_X + offset into BAR_W)
  var flashes, overAt, runStartTs, best;
  var dareBeaten, ctaAt;
  var botRunsDone, botTarget, botFired;

  try { best = +localStorage.getItem('fl_best') || 0; } catch(_){}
  if (!best) best = 0;

  function newGame() {
    phase = DEMO ? 'challenge' : (BOT ? 'play' : 'title');
    score = 0; lives = LIVES_MAX; combo = 0; streak = 0;
    hitStop = 0; shakeAmt = 0; zoom = 1;
    flashes = []; overAt = 0; dareBeaten = false;
    ctaAt = 0;
    botRunsDone = 0; botTarget = null; botFired = false;
    resetNeedle();
    pickSweetSpot();
    if (DEMO) {
      challengeStartAt = performance.now();
      setTimeout(startRun, 1250);
    } else if (BOT) {
      startRun();
    }
  }

  var challengeStartAt = 0;

  function resetNeedle() {
    needleX = BAR_X;
    needleDir = 1;
    needleSpeed = BAR_W / NEEDLE_PERIOD * 16.667; // px per frame @60fps
  }

  function pickSweetSpot() {
    // sweet-spot center: fixed for reproducibility, changes each "round"
    var margin = SWEET_W / 2 + 4;
    sweetX = BAR_X + margin + rng() * (BAR_W - margin * 2);
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 10))));
  }

  // ---- tap / judge ----
  function doTap() {
    if (phase !== 'play') return;
    var dist = Math.abs(needleX - sweetX);
    var halfSweet = SWEET_W / 2;

    if (dist > halfSweet) {
      // MISS — outside the window entirely
      lives--;
      combo = 0;
      shakeAmt = 7;
      var missMs = Math.round(msFromCenter(needleX, sweetX));
      flash('MISS  ' + missMs + 'ms', VERM, 36);
      if (window.J) J.death(0.4);
      if (window.LOOP) LOOP.emit('tap_miss', { dist_ms: missMs, score: score });
      if (lives <= 0) {
        gameOver();
      } else {
        // Advance sweet-spot after miss
        pickSweetSpot();
        if (window.J) J.tension(Math.min(score / 20, 1));
      }
      return;
    }

    // HIT — inside window
    var ms = Math.round(msFromCenter(needleX, sweetX));
    var perfect = dist <= PERFECT_W / 2;
    var near    = !perfect && dist <= NEAR_W / 2;

    score++;
    combo++;
    streak++;

    var hitMs = ms;
    if (perfect) {
      hitStop = 5;
      zoom = 1.025;
      flash('PERFECT  0ms', TEAL, 42);
      if (window.J) J.perfect(streak);
      if (window.LOOP) LOOP.emit('tap_perfect', { score: score });
    } else if (near) {
      hitStop = 2;
      flash('NICE  ' + hitMs + 'ms', GOLD, 38);
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { dist_ms: hitMs, score: score });
    } else {
      flash(hitMs + 'ms', 'rgba(255,255,255,0.75)', 34);
      if (window.J) J.hit(combo);
    }

    // tension rises with score
    if (window.J) J.tension(Math.min(score / 20, 1));

    // dare beaten check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score >= SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }

    if (window.LOOP) LOOP.emit('tap_hit', { score: score, dist_ms: hitMs, perfect: perfect });

    // after a hit: advance needle speed slightly, pick new sweet-spot
    needleSpeed = (BAR_W / NEEDLE_PERIOD * 16.667) * (1 + score * 0.035);
    pickSweetSpot();
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (window.J) {
      J.death(Math.min(0.3 + score / 30, 1));
      if (newBest) setTimeout(function() { J.fanfare(); }, 450);
    }
    if (newBest) { best = score; try { localStorage.setItem('fl_best', String(best)); } catch(_){} }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function() {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function() { window.__demoDone = true; }, 3600);
      }, 2300);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function() { resetRun(); }, 700);
      }
    }
  }

  function resetRun() {
    score = 0; lives = LIVES_MAX; combo = 0; streak = 0;
    flashes = []; dareBeaten = false;
    resetNeedle();
    pickSweetSpot();
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W/2 - 125, y: 500, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play') { doTap(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'ms' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function(e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function(e) { if (e.code === 'Space') tap(); });

  // ---- demo & bot autopilots ----
  // Demo script: offset errors in px from sweet-spot center
  // Arc: good → good → near-fail sliver → SAVE perfect → good → MISS (real death)
  // demoWaits: how many frames to wait after needle enters proximity before dropping
  var demoScript  = [6, -9, 12, 0, -6, 'miss'];
  var demoWaits   = [32, 28, 22, 55, 35, 20];  // hesitation frames (human feel)
  var demoIdx     = 0, demoWait = 36, demoApproaching = false;

  function autopilot() {
    if (phase !== 'play') return;

    if (DEMO) {
      var step = demoScript[Math.min(demoIdx, demoScript.length - 1)];

      if (step === 'miss') {
        // wait until needle is far from sweet-spot then tap (bad miss)
        var distFromSweet = Math.abs(needleX - sweetX);
        if (distFromSweet > SWEET_W / 2 + 20 && demoWait <= 0) {
          demoIdx++;
          doTap();
          demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
          demoApproaching = false;
        } else {
          if (demoWait > 0) demoWait--;
        }
        return;
      }

      // target: sweetX + step
      var target = sweetX + step;
      var distToTarget = needleX - target;
      var speed = needleSpeed * needleDir;

      // detect when approaching target
      if (!demoApproaching && Math.abs(distToTarget) < 30) {
        demoApproaching = true;
      }

      if (demoApproaching) {
        if (demoWait > 0) {
          demoWait--;
          return;
        }
        // fire when within 0.8 * speed
        if (Math.abs(distToTarget) <= Math.abs(speed) * 0.7) {
          demoIdx++;
          demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
          demoApproaching = false;
          doTap();
        }
      }
      return;
    }

    if (BOT) {
      if (botTarget === null) {
        // imperfect: aim at sweet center with gaussian error
        botTarget = sweetX + gauss() * 12;
        botFired = false;
      }
      if (!botFired) {
        var d2 = needleX - botTarget;
        var sp = needleSpeed * needleDir;
        if (Math.abs(d2) <= Math.abs(sp) * 0.7) {
          botFired = true;
          botTarget = null;
          doTap();
        }
      }
    }
  }

  // ---- render helpers ----
  function drawBar(now) {
    // Track background
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    cx.beginPath();
    cx.roundRect ? cx.roundRect(BAR_X, BAR_Y, BAR_W, BAR_H, 9) : cx.rect(BAR_X, BAR_Y, BAR_W, BAR_H);
    cx.fill();

    // Sweet spot zone (semi-transparent)
    var halfSweet = SWEET_W / 2;
    cx.fillStyle = 'rgba(242,177,52,0.18)';
    cx.beginPath();
    cx.roundRect ? cx.roundRect(sweetX - halfSweet, BAR_Y - 2, SWEET_W, BAR_H + 4, 5) : cx.rect(sweetX - halfSweet, BAR_Y - 2, SWEET_W, BAR_H + 4);
    cx.fill();

    // Perfect zone (brighter)
    var halfPerf = PERFECT_W / 2;
    cx.fillStyle = 'rgba(242,177,52,0.55)';
    cx.beginPath();
    cx.roundRect ? cx.roundRect(sweetX - halfPerf, BAR_Y - 2, PERFECT_W, BAR_H + 4, 3) : cx.rect(sweetX - halfPerf, BAR_Y - 2, PERFECT_W, BAR_H + 4);
    cx.fill();

    // Sweet-spot glow lines
    cx.strokeStyle = GOLD;
    cx.lineWidth = 1.5;
    cx.globalAlpha = 0.6 + 0.4 * Math.sin(now / 180);
    cx.beginPath(); cx.moveTo(sweetX, BAR_Y - 6); cx.lineTo(sweetX, BAR_Y + BAR_H + 6); cx.stroke();
    cx.globalAlpha = 1;

    // Needle
    var needlePulse = 1 + 0.08 * Math.sin(now / 60);
    var nW = 6 * needlePulse;
    var distToSweet = Math.abs(needleX - sweetX);
    var inZone = distToSweet < halfSweet;
    cx.fillStyle = inZone ? TEAL : VERM;
    cx.shadowColor = inZone ? TEAL : VERM;
    cx.shadowBlur = inZone ? 14 : 6;
    cx.beginPath();
    cx.roundRect ? cx.roundRect(needleX - nW/2, BAR_Y - 4, nW, BAR_H + 8, 3) : cx.rect(needleX - nW/2, BAR_Y - 4, nW, BAR_H + 8);
    cx.fill();
    cx.shadowBlur = 0;

    // Arrow indicators pointing toward sweet spot (tension cue)
    var arrowAlpha = 0.3 + 0.3 * Math.abs(Math.sin(now / 200));
    cx.globalAlpha = arrowAlpha;
    cx.fillStyle = GOLD;
    cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    // small arrows above bar pointing to sweet spot
    if (needleX < sweetX - halfSweet) {
      cx.fillText('▶', sweetX - halfSweet - 8, BAR_Y - 10);
    } else if (needleX > sweetX + halfSweet) {
      cx.fillText('◀', sweetX + halfSweet + 8, BAR_Y - 10);
    }
    cx.globalAlpha = 1;
  }

  function drawFilmFrame(now) {
    // Cinematic film-strip visual to reinforce "frame" metaphor
    var FX = 52, FY = 160, FW = 301, FH = 200;

    // Film frame border
    cx.strokeStyle = 'rgba(255,255,255,0.12)';
    cx.lineWidth = 2;
    cx.strokeRect(FX, FY, FW, FH);

    // Sprocket holes (left + right)
    cx.fillStyle = 'rgba(255,255,255,0.07)';
    for (var i = 0; i < 4; i++) {
      var hy = FY + 20 + i * 50;
      cx.fillRect(FX - 14, hy, 10, 28);
      cx.fillRect(FX + FW + 4, hy, 10, 28);
    }

    // Film content: the "looping animation" — a shape that cycles position
    // The money-frame is when the shape aligns with the center crosshair
    var cyclePx = (needleX - BAR_X) / BAR_W;  // 0..1 matches needle pos
    var cx_ = FX + FW/2, cy_ = FY + FH/2;

    // Animated subject: circle sweeping across a beam
    var subjectX = FX + 20 + cyclePx * (FW - 40);
    var subjectY = cy_;
    var alignedFraction = 1 - Math.abs(subjectX - cx_) / (FW/2);
    var glow = Math.max(0, alignedFraction * 1.4 - 0.4);

    // Beam / horizon line
    cx.strokeStyle = 'rgba(255,255,255,0.08)';
    cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(FX + 4, cy_); cx.lineTo(FX + FW - 4, cy_); cx.stroke();

    // Center crosshair (the "perfect frame" marker)
    cx.strokeStyle = 'rgba(242,177,52,' + (0.2 + 0.3 * Math.sin(now/200)) + ')';
    cx.lineWidth = 1;
    cx.setLineDash([3, 4]);
    cx.beginPath(); cx.moveTo(cx_, FY + 8); cx.lineTo(cx_, FY + FH - 8); cx.stroke();
    cx.setLineDash([]);

    // Subject (glows gold when aligned)
    var r = 18 + glow * 8;
    cx.shadowColor = GOLD;
    cx.shadowBlur = glow * 30;
    cx.fillStyle = glow > 0.4 ? GOLD : 'rgba(255,255,255,0.55)';
    cx.beginPath(); cx.arc(subjectX, subjectY, r, 0, Math.PI * 2); cx.fill();
    cx.shadowBlur = 0;

    // "FRAME" label + cycle counter
    cx.fillStyle = 'rgba(255,255,255,0.2)';
    cx.font = '500 10px Menlo, monospace';
    cx.textAlign = 'left';
    cx.fillText('FRAME  ' + (Math.floor(cyclePx * 24) + 1).toString().padStart(2,'0') + '/24', FX + 8, FY + FH - 8);
    cx.textAlign = 'right';
    cx.fillText(glow > 0.6 ? '★ LOCK' : 'SCANNING', FX + FW - 8, FY + FH - 8);
  }

  function drawLives() {
    cx.textAlign = 'left';
    cx.font = '700 13px -apple-system, Helvetica, Arial';
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.fillText('LOCKS', 52, 385);
    cx.textAlign = 'right';
    for (var i = 0; i < LIVES_MAX; i++) {
      cx.fillStyle = i < lives ? VERM : 'rgba(255,255,255,0.15)';
      cx.beginPath(); cx.arc(W - 52 - i * 22, 380, 7, 0, Math.PI*2); cx.fill();
    }
  }

  function drawScore() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 72px -apple-system, Helvetica, Arial';
    cx.fillText(score, W/2, 100);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('BEST  ' + best, W/2, 122);
    if (combo >= 3) {
      var comboPulse = 1 + 0.12 * Math.sin(performance.now() / 120);
      cx.save();
      cx.translate(W/2, 148);
      cx.scale(comboPulse, comboPulse);
      cx.fillStyle = GOLD;
      cx.font = '900 ' + Math.min(22 + combo, 32) + 'px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText('×' + combo + ' COMBO', 0, 0);
      cx.restore();
    }
  }

  // ---- main loop ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // advance needle (bounce)
    if (hitStop > 0) {
      hitStop -= dt;
    } else if (phase === 'play') {
      needleX += needleSpeed * needleDir * dt;
      if (needleX >= BAR_X + BAR_W) { needleX = BAR_X + BAR_W; needleDir = -1; }
      if (needleX <= BAR_X)          { needleX = BAR_X;          needleDir =  1; }
      autopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W/2 + sx, H/2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W/2, -H/2);
    }
    shakeAmt *= Math.pow(0.83, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W+40, H+40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('FRAME LOCK', W/2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 15px -apple-system, Helvetica, Arial';
      cx.fillText('tap the moment.  chase the zero.', W/2, 330);
      var p = 0.55 + 0.45 * Math.sin(now/310);
      cx.globalAlpha = p;
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W/2, 370);
      cx.globalAlpha = 1;
    }

    // ---- CHALLENGE CARD (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('28', W/2, 408);
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's best", W/2, 438);
    }

    // ---- PLAY ----
    if (phase === 'play') {
      drawFilmFrame(now);
      drawBar(now);
      drawLives();
      drawScore();

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.textAlign = 'center';
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by '+SHARE.by : ''), W/2, 154);
      }

      // TAP instruction (early)
      if (score === 0) {
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('TAP WHEN THE NEEDLE HITS GOLD', W/2, 470);
      }
    }

    // ---- OVER ----
    if (phase === 'over') {
      drawFilmFrame(now);
      drawBar(now);
      drawScore();

      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0,0,W,H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('FRAME MISSED.', W/2, 310);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' locked', W/2, 356);
      var pt = pctTop(score);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W/2, 396);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('faster than ' + (100-pt) + '% of players', W/2, 418);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now/280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE LOCK', W/2, 462);
        cx.globalAlpha = 1;

        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W/2, SHARE_R.y + 30);
      }
    }

    // ---- CTA (demo) ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('FRAME LOCK', W/2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they locked ' + (window.__demoScore || 28) + '. your move.', W/2, 335);
      var p3 = 0.7 + 0.3 * Math.sin(now/240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 28), W/2, 405);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 440);
      cx.globalAlpha = 1;
    }

    // ---- flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 560 - fl.t * 1.6);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // mute toggle
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w/2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
