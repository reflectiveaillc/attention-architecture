<meta charset="UTF-8">

<title>Save Later Guilt — Tilt</title>
<!--
  LOOP / attention-architecture — Save Later Guilt
  Circuits: 04-loss (drowning in saves), 06-zeigarnik (one more post), 08-investment (the growing pile).
  Mechanic: posts fly by; swipe right to save, left to skip.
  Saved posts stack at bottom; if the stack fills the screen, you drown.
  The win is learning to stop saving.
  Modes:
    ?demo=1&seed=7        scripted mirror-neuron clip → __demoDone
    ?bot=1&runs=N&seed=5  imperfect autoplay N runs → __botDone

<style>

               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<body>

<script>window.LOOP_GAME = 'save-later-guilt';</script>
<script src="../../js/loop-events.js"></script>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // post card dimensions
  var CARD_H = 54, CARD_W = 320;
  // stack sits at bottom, grows upward; max stack that fills screen (danger zone)
  var MAX_STACK = Math.floor((H - 120) / CARD_H); // ~10 cards fills screen

  // post templates (text labels, deterministic)
  var POST_TYPES = [
    { label: 'RECIPE YOU\'LL NEVER MAKE', color: TEAL },
    { label: 'TRAVEL INSPO', color: GOLD },
    { label: 'WORKOUT ROUTINE', color: VERM },
    { label: 'MOTIVATIONAL QUOTE', color: '#a78bfa' },
    { label: 'DIY HACK', color: TEAL },
    { label: 'MUST-WATCH VIDEO', color: VERM },
    { label: 'OUTFIT IDEAS', color: GOLD },
    { label: 'BOOK RECS', color: '#60a5fa' },
    { label: 'LIFE ADVICE', color: TEAL },
    { label: 'PRODUCT REVIEW', color: GOLD },
    { label: 'MEME', color: VERM },
    { label: 'TUTORIAL', color: '#34d399' },
  ];
  var typeIdx = 0;
  function nextPostType() {
    var t = POST_TYPES[typeIdx % POST_TYPES.length];
    typeIdx++;
    return t;
  }

  var state, flashes, fallers, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var challengeAt = 0, ctaAt = 0;
  try { best = +localStorage.getItem('slg_best') || 0; } catch (_) {}

  // current flying post
  var flyPost = null;        // { x, y, vx, label, color, phase:'fly'|'settle' }
  var FLY_SPEED = 4.2;       // px/frame (increases over time)
  var postSpeed = FLY_SPEED;
  var skipCount = 0;         // posts skipped (score)
  var saveCount = 0;         // posts saved (stack size)
  var savedStack = [];       // array of { label, color } from bottom to top

  function pctTop(skipped) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-skipped / 8))));
  }

  function newGame() {
    savedStack = []; skipCount = 0; saveCount = 0; dareBeaten = false;
    flashes = []; fallers = []; typeIdx = 0; postSpeed = FLY_SPEED; flyPost = null;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    state = { phase: 'title', score: 0, overAt: 0 };
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    spawnPost();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnPost() {
    var pt = nextPostType();
    // posts enter from the right, travel left; alternate entry side for variety
    var fromRight = rng() > 0.3;
    flyPost = {
      x: fromRight ? W + 60 : -60,
      y: H * 0.28 + (rng() - 0.5) * 80,
      vx: fromRight ? -postSpeed : postSpeed,
      label: pt.label,
      color: pt.color,
      fromRight: fromRight,
      swiped: false
    };
  }

  // called when player SAVES (swipe right) or SKIPS (swipe left)
  function doSave() {
    if (!flyPost || flyPost.swiped) return;
    flyPost.swiped = true;
    saveCount++;
    savedStack.push({ label: flyPost.label, color: flyPost.color });
    var stackH = savedStack.length * CARD_H;
    if (stackH >= H - 100) {
      // drowned — stack reached top
      if (window.J) J.death(Math.min(0.3 + saveCount / 20, 1));
      gameOver('DROWNED');
      return;
    }
    // hit feedback
    var combo = saveCount;
    if (window.J) {
      J.hit(combo);
      J.tension(Math.min(savedStack.length / MAX_STACK, 1));
    }
    if (combo % 5 === 0 && combo > 0) { hitStop = 3; zoom = 1.03; if (window.J) J.gold(); }
    flash('+SAVED', flyPost.color, 32);
    if (window.LOOP) LOOP.emit('post_saved', { n: saveCount, stack: savedStack.length });
    flyPost = null;
    setTimeout(spawnPost, 220);

    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && skipCount > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(skipCount);
    }
  }

  function doSkip() {
    if (!flyPost || flyPost.swiped) return;
    flyPost.swiped = true;
    skipCount++;
    state.score = skipCount;
    // perfect skip — near miss if the stack was already high
    var danger = savedStack.length / MAX_STACK;
    if (danger > 0.7) {
      flash('NICE SKIP', TEAL, 34);
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { n: skipCount, stack: savedStack.length });
      shakeAmt = 3;
    } else {
      if (window.J) J.hit(skipCount);
    }
    if (window.LOOP) LOOP.emit('post_skipped', { n: skipCount });
    flyPost = null;
    // slight slowdown reward for skipping — resist the pull
    postSpeed = Math.max(FLY_SPEED, FLY_SPEED + saveCount * 0.18 - skipCount * 0.04);
    setTimeout(spawnPost, 180);

    // dare check on skips too
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && skipCount > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(skipCount);
    }
  }

  function gameOver(reason) {
    reason = reason || 'DROWNED';
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 9;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = skipCount > best;
    if (window.J) { J.death(Math.min(0.4 + saveCount / 30, 1)); if (newBest) setTimeout(function () { J.fanfare(); }, 450); }
    if (newBest) { best = skipCount; try { localStorage.setItem('slg_best', String(best)); } catch (_) {} }
    state.score = skipCount;
    if (window.LOOP) LOOP.emit('game_over', { score: skipCount, saves: saveCount, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = skipCount;
      setTimeout(function () {
        state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(resetRun, 900);
    }
  }

  function resetRun() {
    savedStack = []; skipCount = 0; saveCount = 0; flashes = []; fallers = [];
    typeIdx = 0; postSpeed = FLY_SPEED; flyPost = null; dareBeaten = false;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  var SAVE_R  = { x: W / 2 + 30, y: H * 0.28 - 60, w: 160, h: 160 };
  var SKIP_R  = { x: W / 2 - 190, y: H * 0.28 - 60, w: 160, h: 160 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // swipe tracking
  var swipeStartX = null, swipeStartY = null;
  function onPointerDown(e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
    if (window.J && inR(MUTE_R, x, y)) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: skipCount, unit: 'skipped' }); return;
      }
      resetRun(); return;
    }
    swipeStartX = x; swipeStartY = y;
  }
  function onPointerUp(e) {
    if (DEMO || BOT) return;
    if (state.phase !== 'play' || swipeStartX === null) { swipeStartX = null; return; }
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale;
    var dx = x - swipeStartX;
    swipeStartX = null;
    if (Math.abs(dx) > 20) {
      if (dx > 0) doSave();
      else doSkip();
    }
  }
  window.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    if (e.key === 'ArrowRight') doSave();
    if (e.key === 'ArrowLeft')  doSkip();
    if (e.code === 'Space' && state.phase !== 'play') {
      if (state.phase === 'title') startRun();
      else if (state.phase === 'over' && performance.now() - state.overAt > 350) resetRun();
    }
  });

  // ---- bot / demo autopilot ----
  // demo: scripted sequence — save several posts (building guilt), then some skips,
  // near-fail (stack almost full), one risky save → then drowns.
  // pattern: s=save, k=skip, d=drown
  var demoScript = ['k','k','s','s','k','s','s','s','k','s','s','s','s','s','DROWN'];
  var demoIdx = 0, demoWait = 0;
  var demoWaits = [38, 42, 28, 50, 35, 30, 45, 25, 55, 30, 28, 40, 22, 48, 0];
  var botRunsDone = 0;
  // bot saves aggressively early → drowns naturally
  var botActionsLeft = 0;
  var botSaveBias = 0.78; // bot mostly saves → stack fills → game_over

  function autopilot() {
    if (!flyPost || flyPost.swiped || state.phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var act = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (act === 'DROWN') { doSave(); return; }
      demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
      demoIdx++;
      if (act === 's') doSave();
      else doSkip();
    } else if (BOT) {
      if (botActionsLeft <= 0) {
        // bot takes action each frame the post is in view
        botActionsLeft = Math.floor(8 + rng() * 20); // hesitation frames
      }
      botActionsLeft--;
      if (botActionsLeft <= 0) {
        // bot saves with high bias — fills stack → drowns
        if (rng() < botSaveBias) doSave();
        else doSkip();
      }
    }
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // move flying post
    if (hitStop > 0) { hitStop -= dt; }
    else {
      if (flyPost && !flyPost.swiped && state.phase === 'play') {
        flyPost.x += flyPost.vx * dt;
        // if post flies fully offscreen without action → auto-skip (missed it)
        var offLeft = flyPost.vx < 0 && flyPost.x < -CARD_W - 20;
        var offRight = flyPost.vx > 0 && flyPost.x > W + CARD_W + 20;
        if (offLeft || offRight) {
          // missed — counts as skip (you let it go)
          skipCount++;
          state.score = skipCount;
          if (window.J) J.hit(skipCount);
          if (window.LOOP) LOOP.emit('post_skipped', { n: skipCount, auto: true });
          flyPost = null;
          postSpeed = Math.min(12, FLY_SPEED + saveCount * 0.18);
          spawnPost();
        }
        autopilot();
      }
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // --- saved stack (bottom, grows up) ---
    var stackTop = H;
    for (var i = 0; i < savedStack.length; i++) {
      var sy2 = H - (i + 1) * CARD_H;
      drawCard(savedStack[i].label, savedStack[i].color, W / 2 - CARD_W / 2, sy2, CARD_W, CARD_H - 4, i / MAX_STACK);
      stackTop = sy2;
    }

    // danger meter glow above stack
    if (savedStack.length > 0) {
      var danger = savedStack.length / MAX_STACK;
      var dangerColor = danger > 0.7 ? VERM : danger > 0.4 ? GOLD : TEAL;
      cx.fillStyle = 'rgba(' + hexToRgb(dangerColor) + ',' + (danger * 0.25) + ')';
      cx.fillRect(0, Math.max(0, stackTop - 8), W, 8);
      // tension sound
      if (state.phase === 'play' && window.J && Math.random() < 0.01) {
        J.tension(danger);
      }
    }

    // --- flying post card ---
    if (flyPost && state.phase === 'play') {
      drawCard(flyPost.label, flyPost.color, flyPost.x - CARD_W / 2, flyPost.y - CARD_H / 2, CARD_W, CARD_H - 4, 0);
      // swipe hint arrows (human mode)
      if (!DEMO && !BOT) {
        cx.globalAlpha = 0.25 + 0.1 * Math.sin(now / 400);
        cx.fillStyle = '#fff';
        cx.font = '700 22px -apple-system, Helvetica, Arial';
        cx.textAlign = 'left';
        cx.fillText('← SKIP', flyPost.x - CARD_W / 2 - 80, flyPost.y + 7);
        cx.textAlign = 'right';
        cx.fillText('SAVE →', flyPost.x + CARD_W / 2 + 80, flyPost.y + 7);
        cx.globalAlpha = 1;
      }
    }

    // --- score display ---
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(skipCount, W / 2, 80);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('SKIPPED  •  BEST ' + best, W / 2, 102);
      // saved count
      cx.fillStyle = savedStack.length > MAX_STACK * 0.7 ? VERM : 'rgba(255,255,255,0.4)';
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText('PILE: ' + savedStack.length + ' / ' + MAX_STACK, W / 2, 122);
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 145);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('POSTS SKIPPED TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('14', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // title screen
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('SAVE LATER GUILT', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('posts are coming.', W / 2, 300);
      cx.fillText('skip them or drown in saves.', W / 2, 322);
      cx.fillStyle = VERM;
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 380); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.25)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('← skip   save →', W / 2, 410);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      cx.globalAlpha = Math.max(0, 1 - fl.t / 40);
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // game over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.65)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('DROWNED.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(skipCount + ' skipped', W / 2, 335);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('(' + saveCount + ' saved — that\'s why)', W / 2, 360);
      var pt = pctTop(skipCount);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 400);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — SKIP MORE THIS TIME', W / 2, 448);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t2 = (now - ctaAt) / 1000, ease = Math.min(1, t2 * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('SAVE LATER GUILT', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('she skipped ' + (window.__demoScore || 14) + '. drown her score.', W / 2, 330);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 14), W / 2, 395);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 428);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // draw a post card with a label
  function drawCard(label, accent, x, y, w, h, danger) {
    cx.save();
    // background
    var alpha = 0.13 + danger * 0.1;
    cx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
    if (cx.roundRect) cx.roundRect(x, y, w, h, 10);
    else { cx.beginPath(); cx.rect(x, y, w, h); }
    cx.fill();
    // accent left strip
    cx.fillStyle = accent;
    cx.globalAlpha = 0.85;
    if (cx.roundRect) {
      cx.beginPath(); cx.roundRect(x, y, 5, h, [10, 0, 0, 10]); cx.fill();
    } else { cx.fillRect(x, y, 5, h); }
    cx.globalAlpha = 1;
    // label text
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.font = '700 11px Menlo, monospace';
    cx.textAlign = 'left';
    var txt = label.length > 26 ? label.slice(0, 25) + '…' : label;
    cx.fillText(txt, x + 16, y + h / 2 + 4);
    // bookmark icon right
    cx.fillStyle = accent;
    cx.globalAlpha = 0.7;
    cx.font = '14px -apple-system, Arial';
    cx.textAlign = 'right';
    cx.fillText('⊞', x + w - 12, y + h / 2 + 5);
    cx.globalAlpha = 1;
    cx.restore();
  }

  // hex color to r,g,b string for rgba
  function hexToRgb(hex) {
    hex = hex.replace('#', '');
    var r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
    return r + ',' + g + ',' + b;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
