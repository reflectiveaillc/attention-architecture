<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // Mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ─── GENRE DEFINITIONS ────────────────────────────────────────────────────
  // G0: catch falling dots  G1: dodge rising bars  G2: tap lit tile  G3: trace line
  var GENRES = ['catch', 'dodge', 'tap', 'trace'];
  var GENRE_NAMES   = ['COOKING',  'PRANK',    'DANCE',   'ASMR'];
  var GENRE_COLORS  = [TEAL,       VERM,       GOLD,      '#b19af5'];
  var GENRE_SUBS    = ['catch the drops', 'dodge the rush', 'hit the beat', 'follow the path'];
  var GENRE_DUR     = 10;   // seconds per genre
  var TOTAL_GENRES  = 4;

  // ─── STATE ────────────────────────────────────────────────────────────────
  var phase, runStartTs, score, lives, genreIdx, genreTimer, dareBeaten;
  var hitStop, zoom, shakeAmt;
  var flashes = [];
  var overAt = 0, ctaAt = 0, challengeAt = 0;

  // G0 — catch
  var drops = [];
  var catcherX = W / 2;
  var catcherTarget = W / 2;

  // G1 — dodge
  var bars = [];
  var dodgerX = W / 2;
  var dodgerTarget = W / 2;
  var dodgerAlive = true;

  // G2 — tap
  var tiles = [];       // {x, y, w, h, lit, age, hit}
  var tilePhase = 0;

  // G3 — trace
  var tracePath = [];   // [{x,y}]
  var traceIdx  = 0;
  var traceProgress = 0; // 0–1

  var botRunsDone = 0;
  var botPassiveFrames = 0; // frames bot goes passive so death-path fires

  // demo
  var demoPhase = 0; // 0=challenge, 1=play, 2=cta
  var demoGenresPlayed = 0;

  // ─── INPUT ────────────────────────────────────────────────────────────────
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  var pointerX = W / 2, pointerY = H / 2;
  var pointerDown = false;
  var lastTapX = null, lastTapY = null, tapConsumed = false;

  function onPointer(e, down) {
    var r = cv.getBoundingClientRect();
    pointerX = (e.clientX - r.left) / scale;
    pointerY = (e.clientY - r.top)  / scale;
    if (down) { pointerDown = true; lastTapX = pointerX; lastTapY = pointerY; tapConsumed = false; }
    else        pointerDown = false;
  }
  window.addEventListener('pointerdown', function(e) {
    if (DEMO || BOT) return;
    onPointer(e, true);
    // mute
    if (inR(MUTE_R, pointerX, pointerY) && window.J) { J.toggleMute(); tapConsumed = true; return; }
    // title tap to start
    if (phase === 'title') { beginRun(); tapConsumed = true; return; }
    // over — share or restart
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (inR(SHARE_R, pointerX, pointerY) && window.SHARE) { SHARE.send({ score: score, unit: 'genres' }); tapConsumed = true; return; }
      resetRun(); tapConsumed = true; return;
    }
  });
  window.addEventListener('pointermove', function(e) { if (DEMO || BOT) return; onPointer(e, false); });
  window.addEventListener('pointerup',   function(e) { if (DEMO || BOT) return; pointerDown = false; });

  // ─── GAME INIT ────────────────────────────────────────────────────────────
  function newGame() {
    phase = 'title';
    score = 0; lives = 3; genreIdx = 0; genreTimer = 0; dareBeaten = false;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    flashes = [];
    drops = []; bars = []; tiles = []; tracePath = []; traceIdx = 0; traceProgress = 0;
    catcherX = W / 2; catcherTarget = W / 2;
    dodgerX  = W / 2; dodgerTarget  = W / 2; dodgerAlive = true;
    tilePhase = 0;
    demoGenresPlayed = 0;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(function() { beginRun(); }, 1250);
      return;
    }
    if (BOT) { beginRun(); return; }
  }

  function beginRun() {
    phase = 'play';
    runStartTs = Date.now();
    genreIdx   = 0;
    genreTimer = 0;
    score      = 0;
    lives      = 3;
    initGenre(0);
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function resetRun() {
    drops = []; bars = []; tiles = []; tracePath = []; traceIdx = 0; traceProgress = 0;
    catcherX = W / 2; dodgerX = W / 2; dodgerAlive = true;
    botPassiveFrames = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    beginRun();
  }

  // ─── GENRE SETUP ─────────────────────────────────────────────────────────
  function initGenre(idx) {
    var g = GENRES[idx % TOTAL_GENRES];
    drops = []; bars = []; tiles = []; tracePath = []; traceIdx = 0; traceProgress = 0;
    catcherX = W / 2; catcherTarget = W / 2;
    dodgerX  = W / 2; dodgerTarget  = W / 2; dodgerAlive = true;
    tilePhase = 0;

    if (g === 'catch') {
      spawnDrop();
    } else if (g === 'dodge') {
      spawnBars(3);
    } else if (g === 'tap') {
      spawnTileGrid();
    } else if (g === 'trace') {
      buildTracePath();
    }
  }

  // ─── G0: CATCH ───────────────────────────────────────────────────────────
  var CATCH_R = 28; // catcher radius
  function spawnDrop() {
    var x = 40 + rng() * (W - 80);
    drops.push({ x: x, y: -14, r: 12 + rng() * 8, vy: 3.5 + rng() * 2, caught: false, missed: false, age: 0 });
  }

  // ─── G1: DODGE ───────────────────────────────────────────────────────────
  var BAR_H = 28;
  function spawnBars(n) {
    var gap = 100 + rng() * 60;
    var gx  = 30 + rng() * (W - 30 - gap);
    for (var i = 0; i < n; i++) {
      bars.push({ x: (i === 0 ? 0 : gx + gap), w: (i === 0 ? gx : W - gx - gap),
                  y: H + i * 0, vy: -(2.5 + rng()), hit: false });
    }
    // actually spawn two bars leaving a gap
    bars = [];
    var gapW = 110 + rng() * 60;
    var gapX = 20 + rng() * (W - gapW - 40);
    bars.push({ x: 0,       w: gapX,          y: H + 40, vy: -(2.8 + rng() * 1.5), hit: false });
    bars.push({ x: gapX + gapW, w: W - gapX - gapW, y: H + 40, vy: -(2.8 + rng() * 1.5), hit: false });
  }

  // ─── G2: TAP TILE ─────────────────────────────────────────────────────────
  var TILE_COLS = 3, TILE_ROWS = 4;
  var TILE_W = 110, TILE_H = 110, TILE_PAD = 8;
  var TILE_OX, TILE_OY;
  function spawnTileGrid() {
    TILE_OX = (W - TILE_COLS * TILE_W - (TILE_COLS - 1) * TILE_PAD) / 2;
    TILE_OY = 200;
    tiles = [];
    for (var r = 0; r < TILE_ROWS; r++) {
      for (var c = 0; c < TILE_COLS; c++) {
        tiles.push({
          col: c, row: r,
          x: TILE_OX + c * (TILE_W + TILE_PAD),
          y: TILE_OY + r * (TILE_H + TILE_PAD),
          w: TILE_W, h: TILE_H,
          lit: false, age: 0, hit: false, miss: false
        });
      }
    }
    lightNextTile();
  }
  function lightNextTile() {
    tiles.forEach(function(t) { t.lit = false; t.age = 0; t.hit = false; t.miss = false; });
    var t = tiles[Math.floor(rng() * tiles.length)];
    t.lit = true; t.age = 0;
  }

  // ─── G3: TRACE ────────────────────────────────────────────────────────────
  function buildTracePath() {
    tracePath = [];
    var pts = 6 + Math.floor(rng() * 4);
    for (var i = 0; i < pts; i++) {
      tracePath.push({
        x: 50 + rng() * (W - 100),
        y: 150 + rng() * (H - 300)
      });
    }
    traceIdx      = 0;
    traceProgress = 0;
  }

  // ─── SCORE HELPERS ────────────────────────────────────────────────────────
  function pctTop(sc) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-sc / 6)))); }

  function addScore(pts) {
    score += pts;
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }
  }

  function loseLife(mag) {
    lives = Math.max(0, lives - 1);
    shakeAmt = 8;
    if (window.J) J.death(mag || 0.5);
    if (lives <= 0) gameOver();
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 12;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.death(0.9);
    if (DEMO) window.__demoScore = score;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function() {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function() { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function() { resetRun(); }, 600);
    }
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ─── GENRE TRANSITION ─────────────────────────────────────────────────────
  var transitionTimer = 0;
  var IN_TRANSITION = false;
  function nextGenre() {
    if (genreIdx >= TOTAL_GENRES - 1) {
      // completed all 4 genres — score big and loop or end
      score += 10;
      flash('FIN!', GOLD, 52);
      if (window.J) J.fanfare();
      // After 4 genres the run ends naturally as a win/loop
      // For simplicity: keep cycling but no more lives refill
      genreIdx++;
      var nextIdx = genreIdx % TOTAL_GENRES;
      if (window.LOOP) LOOP.emit('genre_complete', { genre: GENRES[genreIdx - 1], score: score });
      showTransition(nextIdx, function() { initGenre(nextIdx); });
      demoGenresPlayed++;
    } else {
      genreIdx++;
      var ni = genreIdx;
      if (window.LOOP) LOOP.emit('genre_complete', { genre: GENRES[ni - 1], score: score });
      flash('NEXT GENRE', GENRE_COLORS[ni % TOTAL_GENRES], 32);
      if (window.J) J.hit(genreIdx);
      showTransition(ni, function() { initGenre(ni); });
      demoGenresPlayed++;
    }
    genreTimer = 0;
  }

  var transCard = null;
  function showTransition(idx, cb) {
    IN_TRANSITION = true;
    transCard = { idx: idx, t: 0, cb: cb, done: false };
  }

  // ─── BOT AUTOPILOT ────────────────────────────────────────────────────────
  // Bot plays K genres actively, then goes passive (misses everything) so death fires.
  var BOT_ACTIVE_GENRES = 2;

  function autopilot(dt) {
    if (phase !== 'play' || IN_TRANSITION) return;
    var g = GENRES[genreIdx % TOTAL_GENRES];
    var passive = BOT && (demoGenresPlayed >= BOT_ACTIVE_GENRES || botPassiveFrames > 0);

    if (DEMO) {
      autopilotDemo(g, dt);
    } else if (BOT) {
      if (!passive) {
        autopilotBotActive(g, dt);
      } else {
        botPassiveFrames++;
        // Go passive: let all drops miss, don't dodge, don't tap, don't trace
        // This ensures the bot hits game_over naturally
      }
    }
  }

  // ─── DEMO AUTOPILOT ───────────────────────────────────────────────────────
  // Mirror-neuron arc: play well for genres 0+1, wobble on genre 2, fail on genre 3
  var demoHesitationFrames = 0;
  var demoNearFail = false; // flag set once

  function autopilotDemo(g, dt) {
    var genreFrac = genreTimer / (GENRE_DUR * 60);
    var overallFrac = (genreIdx + genreFrac) / TOTAL_GENRES;

    // Hesitation: add random pauses for human feel
    if (demoHesitationFrames > 0) { demoHesitationFrames--; return; }

    if (g === 'catch') {
      demoAutoCatch(overallFrac);
    } else if (g === 'dodge') {
      demoAutoDodge(overallFrac, dt);
    } else if (g === 'tap') {
      demoAutoTap(overallFrac);
    } else if (g === 'trace') {
      demoAutoTrace(overallFrac, dt);
    }
  }

  function demoAutoCatch(frac) {
    var drop = drops[0];
    if (!drop || drop.caught || drop.missed) return;
    var wantX = frac > 0.75 ? drop.x + (rng() - 0.5) * 60 : drop.x + (rng() - 0.5) * 20;
    catcherTarget = wantX;
    // Occasional hesitation
    if (rng() < 0.008) demoHesitationFrames = Math.floor(10 + rng() * 20);
  }

  function demoAutoDodge(frac, dt) {
    var danger = bars.filter(function(b) { return !b.hit && b.y < H && b.y + BAR_H > 0; });
    if (!danger.length) return;
    // find safe gap
    var safeX = W / 2;
    // find a gap between bars
    var sorted = danger.slice().sort(function(a, b) { return a.x - b.x; });
    if (sorted.length >= 2) {
      safeX = sorted[0].x + sorted[0].w + (sorted[1].x - sorted[0].x - sorted[0].w) / 2;
    } else if (sorted[0].x > W / 2) {
      safeX = sorted[0].x / 2;
    } else {
      safeX = sorted[0].x + sorted[0].w + (W - sorted[0].x - sorted[0].w) / 2;
    }
    // near-fail: at frac ~0.6 the demo wobbles close
    if (frac > 0.5 && frac < 0.7 && !demoNearFail) {
      safeX += (rng() - 0.5) * 80;
      demoNearFail = true;
    }
    dodgerTarget = safeX + (rng() - 0.5) * 15;
    if (rng() < 0.006) demoHesitationFrames = Math.floor(8 + rng() * 18);
  }

  function demoAutoTap(frac) {
    // Tap the lit tile, with occasional miss at high frac
    var lit = tiles.filter(function(t) { return t.lit && !t.hit; })[0];
    if (!lit) return;
    var willMiss = frac > 0.85; // fail on last genre
    if (lit.age > 35 + (willMiss ? -15 : 0)) {
      // simulate tap
      if (!willMiss) {
        tapTile(lit.x + lit.w / 2, lit.y + lit.h / 2);
      }
      // if willMiss: don't tap, tile expires
    }
  }

  function demoAutoTrace(frac, dt) {
    // Follow path but at frac > 0.8 stop following (fail)
    if (frac > 0.8) {
      // Stop tracing — let it time out
      return;
    }
    if (tracePath.length < 2) return;
    var target = tracePath[Math.min(traceIdx, tracePath.length - 1)];
    // Move pointer toward target
    var dx = target.x - pointerX, dy = target.y - pointerY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 20) {
      traceIdx = Math.min(traceIdx + 1, tracePath.length - 1);
    }
    pointerX += dx * 0.07;
    pointerY += dy * 0.07;
    pointerDown = true;
  }

  // ─── BOT ACTIVE AUTOPILOT ─────────────────────────────────────────────────
  function autopilotBotActive(g, dt) {
    if (g === 'catch') {
      var drop = drops[0];
      if (drop && !drop.caught && !drop.missed) {
        catcherTarget = drop.x + (rng() - 0.5) * 40;
      }
    } else if (g === 'dodge') {
      var sorted2 = bars.filter(function(b){ return !b.hit && b.y + BAR_H > 0 && b.y < H; })
                       .sort(function(a,b){ return a.x - b.x; });
      if (sorted2.length >= 2) {
        dodgerTarget = sorted2[0].x + sorted2[0].w + (sorted2[1].x - sorted2[0].x - sorted2[0].w) / 2;
      } else if (sorted2.length === 1) {
        dodgerTarget = sorted2[0].x > W / 2 ? sorted2[0].x / 2 : sorted2[0].x + sorted2[0].w + 40;
      }
      dodgerTarget += (rng() - 0.5) * 30;
    } else if (g === 'tap') {
      var lit2 = tiles.filter(function(t){ return t.lit && !t.hit; })[0];
      if (lit2 && lit2.age > 25) {
        tapTile(lit2.x + lit2.w / 2, lit2.y + lit2.h / 2);
      }
    } else if (g === 'trace') {
      if (tracePath.length >= 2) {
        var target2 = tracePath[Math.min(traceIdx, tracePath.length - 1)];
        var dx2 = target2.x - pointerX, dy2 = target2.y - pointerY;
        var dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
        if (dist2 < 20) traceIdx = Math.min(traceIdx + 1, tracePath.length - 1);
        pointerX += dx2 * 0.07;
        pointerY += dy2 * 0.07;
        pointerDown = true;
      }
    }
  }

  // ─── TAP TILE HIT ─────────────────────────────────────────────────────────
  function tapTile(tx, ty) {
    var hit = false;
    tiles.forEach(function(t) {
      if (t.lit && !t.hit && tx >= t.x && tx <= t.x + t.w && ty >= t.y && ty <= t.y + t.h) {
        t.hit = true; t.lit = false;
        addScore(1);
        flash('+1', GENRE_COLORS[2], 36);
        hitStop = 3; zoom = 1.02;
        if (window.J) J.hit(score);
        if (window.LOOP) LOOP.emit('tile_hit', { score: score });
        setTimeout(function() { if (phase === 'play') lightNextTile(); }, 300);
        hit = true;
      }
    });
    return hit;
  }

  // Handle human tap-tile input
  function handlePlayTap(tx, ty) {
    var g = GENRES[genreIdx % TOTAL_GENRES];
    if (g === 'tap') {
      tapTile(tx, ty);
    }
  }

  // ─── UPDATE GENRES ────────────────────────────────────────────────────────
  function updateCatch(dt) {
    // Move catcher toward target
    catcherX += (catcherTarget - catcherX) * 0.18 * dt;
    catcherX = Math.max(CATCH_R, Math.min(W - CATCH_R, catcherX));

    // Update drops
    for (var i = drops.length - 1; i >= 0; i--) {
      var d = drops[i];
      d.y  += d.vy * dt;
      d.age += dt;

      // Check catch
      if (!d.caught && !d.missed) {
        var dx = d.x - catcherX, dy2 = d.y - (H - 80);
        if (Math.sqrt(dx * dx + dy2 * dy2) < CATCH_R + d.r) {
          d.caught = true;
          addScore(1);
          flash('+1', TEAL, 36);
          hitStop = 2; zoom = 1.015;
          if (window.J) J.hit(score);
          if (window.LOOP) LOOP.emit('drop_caught', { score: score });
          drops.splice(i, 1);
          // Spawn next drop
          spawnDrop();
          continue;
        }
        // Missed — fell off bottom
        if (d.y > H + d.r) {
          d.missed = true;
          flash('MISS', VERM, 32);
          if (window.J) J.near();
          if (window.LOOP) LOOP.emit('near_miss', { genre: 'catch' });
          loseLife(0.4);
          drops.splice(i, 1);
          if (phase === 'play') spawnDrop();
          continue;
        }
      }
    }

    // Human: move catcher with pointer X
    if (!DEMO && !BOT) {
      catcherTarget = pointerX;
    }
  }

  function updateDodge(dt) {
    // Move dodger toward target
    dodgerX += (dodgerTarget - dodgerX) * 0.22 * dt;
    dodgerX = Math.max(16, Math.min(W - 16, dodgerX));

    // Human: follow pointer
    if (!DEMO && !BOT) {
      dodgerTarget = pointerX;
    }

    var dodgerY = H - 140;

    // Update bars
    var allGone = true;
    for (var i = bars.length - 1; i >= 0; i--) {
      var b = bars[i];
      b.y += b.vy * dt;
      if (b.y + BAR_H > -H) allGone = false;

      // Collision with dodger
      if (!b.hit && b.y < dodgerY + 20 && b.y + BAR_H > dodgerY - 20) {
        if (dodgerX > b.x && dodgerX < b.x + b.w) {
          b.hit = true;
          shakeAmt = 10;
          if (window.J) J.death(0.5);
          if (window.LOOP) LOOP.emit('bar_hit', {});
          loseLife(0.5);
        }
      }
      // Remove if gone off top
      if (b.y + BAR_H < 0) { bars.splice(i, 1); }
    }

    // Spawn new wave when current bars mostly gone
    if (bars.length < 2 && phase === 'play') {
      spawnBars(2);
      if (window.J) J.tension(Math.min(genreTimer / (GENRE_DUR * 60), 1));
    }
  }

  var tileTimer = 0;
  var TILE_WINDOW = 90; // frames to tap lit tile
  function updateTap(dt) {
    tileTimer += dt;

    // Human taps handled by pointer events
    if (!DEMO && !BOT && pointerDown && !tapConsumed && lastTapX !== null) {
      handlePlayTap(lastTapX, lastTapY);
      tapConsumed = true;
    }

    // Check if lit tile timed out
    var lit = tiles.filter(function(t) { return t.lit; })[0];
    if (lit) {
      lit.age += dt;
      if (lit.age > TILE_WINDOW) {
        lit.lit = false;
        lit.miss = true;
        flash('TOO SLOW', VERM, 30);
        if (window.J) J.near();
        loseLife(0.3);
        if (phase === 'play') setTimeout(function() { lightNextTile(); }, 300);
      }
    }
  }

  var traceTimer = 0;
  var TRACE_TIMEOUT = 300; // frames without progress = fail
  var traceNoProgressTimer = 0;
  function updateTrace(dt) {
    if (tracePath.length < 2) return;

    // Human: pointer controls trace
    if (!DEMO && !BOT) {
      pointerDown = pointerDown; // already tracked
    }

    if (!pointerDown) {
      traceNoProgressTimer += dt;
      if (traceNoProgressTimer > TRACE_TIMEOUT) {
        flash('LOST THE PATH', VERM, 28);
        if (window.J) J.near();
        loseLife(0.35);
        traceNoProgressTimer = 0;
        traceIdx = 0; // reset path
        buildTracePath();
      }
      return;
    }

    traceNoProgressTimer = 0;
    // Advance traceProgress toward next point
    var target = tracePath[traceIdx];
    var px = pointerX, py = pointerY;
    var dx = target.x - px, dy = target.y - py;
    var dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 30) {
      traceIdx++;
      if (traceIdx >= tracePath.length) {
        // Completed path!
        addScore(2);
        flash('+2 PATH', GENRE_COLORS[3], 38);
        hitStop = 3; zoom = 1.02;
        if (window.J) J.perfect(score);
        if (window.LOOP) LOOP.emit('path_complete', { score: score });
        buildTracePath();
        traceIdx = 0;
      }
    }
  }

  // ─── FRAME ────────────────────────────────────────────────────────────────
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // transition card timer
    if (transCard) {
      transCard.t += dt;
      if (transCard.t > 90 && !transCard.done) {
        transCard.done = true;
        IN_TRANSITION = false;
        transCard.cb();
        transCard = null;
      }
    }

    if (phase === 'play' && !IN_TRANSITION) {
      genreTimer += dt;

      // Tension ramp
      var tensionFrac = genreTimer / (GENRE_DUR * 60);
      if (window.J) J.tension(Math.min(tensionFrac * 0.4 + genreIdx * 0.2, 1));

      // Genre tick
      if (hitStop > 0) { hitStop -= dt; }
      else {
        var g = GENRES[genreIdx % TOTAL_GENRES];
        if (g === 'catch') updateCatch(dt);
        else if (g === 'dodge') updateDodge(dt);
        else if (g === 'tap')   updateTap(dt);
        else if (g === 'trace') updateTrace(dt);

        // Auto drive for demo/bot
        autopilot(dt);
      }

      // Genre timer
      if (genreTimer >= GENRE_DUR * 60) {
        nextGenre();
      }
    }

    // Juice decay
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // ── DRAW ──
    cx.save();
    // shake/zoom transform
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx2 = (Math.random() - 0.5) * shakeAmt;
      var sy2 = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx2, H / 2 + sy2);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // BG
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    var gc = GENRE_COLORS[genreIdx % TOTAL_GENRES];
    bg.addColorStop(0, hexToRgba(gc, 0.07));
    bg.addColorStop(1, 'rgba(232,80,46,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ── PHASES ──
    if (phase === 'challenge') drawChallenge(now);
    else if (phase === 'title') drawTitle(now);
    else if (phase === 'play') {
      drawHUD(now);
      if (IN_TRANSITION && transCard) drawTransitionCard(now);
      else drawGenre(now);
    }
    else if (phase === 'over') drawOver(now);
    else if (phase === 'cta') drawCTA(now);

    // Flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // Mute toggle
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial'; cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ─── DRAW HELPERS ─────────────────────────────────────────────────────────
  function hexToRgba(hex, a) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  function drawHUD(now) {
    // Genre label bar
    var gc2 = GENRE_COLORS[genreIdx % TOTAL_GENRES];
    var gn = GENRE_NAMES[genreIdx % TOTAL_GENRES];
    cx.fillStyle = hexToRgba(gc2, 0.15);
    cx.fillRect(0, 0, W, 52);
    cx.textAlign = 'center';
    cx.fillStyle = gc2;
    cx.font = '900 22px -apple-system, Helvetica, Arial';
    cx.fillText(gn, W / 2, 34);

    // Genre progress bar
    var frac2 = Math.min(genreTimer / (GENRE_DUR * 60), 1);
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.fillRect(0, 52, W, 4);
    cx.fillStyle = gc2;
    cx.fillRect(0, 52, W * frac2, 4);

    // Score
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 48px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(score, W / 2, 110);

    // Lives
    for (var li = 0; li < 3; li++) {
      cx.globalAlpha = li < lives ? 1 : 0.2;
      cx.fillStyle = VERM;
      cx.font = '18px -apple-system, Helvetica, Arial';
      cx.fillText('♥', 24 + li * 26, 34);
    }
    cx.globalAlpha = 1;

    // Genre dots (progress)
    for (var gi = 0; gi < TOTAL_GENRES; gi++) {
      cx.beginPath();
      cx.arc(W - 24 - (TOTAL_GENRES - 1 - gi) * 18, 26, 6, 0, Math.PI * 2);
      cx.fillStyle = gi <= genreIdx ? GENRE_COLORS[gi] : 'rgba(255,255,255,0.15)';
      cx.fill();
    }

    // Sub-label
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(GENRE_SUBS[genreIdx % TOTAL_GENRES], W / 2, 128);

    // Dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W / 2, 148);
    }
  }

  function drawGenre(now) {
    var g = GENRES[genreIdx % TOTAL_GENRES];
    if (g === 'catch') drawCatch(now);
    else if (g === 'dodge') drawDodge(now);
    else if (g === 'tap') drawTap(now);
    else if (g === 'trace') drawTrace(now);
  }

  // G0
  function drawCatch(now) {
    // Catcher
    cx.beginPath();
    cx.arc(catcherX, H - 80, CATCH_R, 0, Math.PI * 2);
    cx.fillStyle = TEAL;
    cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,0.4)';
    cx.lineWidth = 2; cx.stroke();

    // Glow ring (combo)
    if (score > 3) {
      cx.beginPath();
      cx.arc(catcherX, H - 80, CATCH_R + 6 + Math.sin(now / 200) * 3, 0, Math.PI * 2);
      cx.strokeStyle = hexToRgba(TEAL, 0.3); cx.lineWidth = 3; cx.stroke();
    }

    // Drops
    drops.forEach(function(d) {
      cx.beginPath();
      cx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      cx.fillStyle = TEAL;
      cx.fill();
      cx.beginPath();
      cx.arc(d.x - d.r * 0.28, d.y - d.r * 0.28, d.r * 0.3, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.fill();
    });
  }

  // G1
  function drawDodge(now) {
    var dodgerY = H - 140;
    // Dodger — pulsing triangle
    cx.save();
    cx.translate(dodgerX, dodgerY);
    cx.beginPath();
    cx.moveTo(0, -20); cx.lineTo(14, 14); cx.lineTo(-14, 14); cx.closePath();
    cx.fillStyle = VERM; cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,0.35)'; cx.lineWidth = 1.5; cx.stroke();
    cx.restore();

    // Bars
    bars.forEach(function(b) {
      var danger = b.y < dodgerY + 60 && b.y + BAR_H > dodgerY - 40;
      cx.fillStyle = danger ? '#ff4422' : VERM;
      cx.globalAlpha = 0.85;
      cx.fillRect(b.x, b.y, b.w, BAR_H);
      cx.globalAlpha = 1;
      // Stripe detail
      cx.fillStyle = 'rgba(0,0,0,0.2)';
      cx.fillRect(b.x, b.y, b.w, 5);
    });
  }

  // G2
  function drawTap(now) {
    tiles.forEach(function(t) {
      var pulse = t.lit ? 0.7 + 0.3 * Math.sin(now / 120) : 1;
      cx.save();
      cx.globalAlpha = t.hit ? 0 : (t.miss ? 0.2 : pulse);
      // Tile bg
      cx.fillStyle = t.lit ? GENRE_COLORS[2] : 'rgba(255,255,255,0.06)';
      cx.strokeStyle = t.lit ? GOLD : 'rgba(255,255,255,0.1)';
      cx.lineWidth = t.lit ? 2.5 : 1;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(t.x, t.y, t.w, t.h, 14);
      else cx.rect(t.x, t.y, t.w, t.h);
      cx.fill(); cx.stroke();
      // Timer ring on lit tile
      if (t.lit) {
        var timerFrac = 1 - t.age / TILE_WINDOW;
        cx.beginPath();
        cx.arc(t.x + t.w / 2, t.y + t.h / 2, 28, -Math.PI / 2, -Math.PI / 2 + timerFrac * Math.PI * 2);
        cx.strokeStyle = 'rgba(255,255,255,0.5)'; cx.lineWidth = 3; cx.stroke();
      }
      cx.restore();
    });
  }

  // G3
  function drawTrace(now) {
    if (tracePath.length < 2) return;

    // Draw full path (dimmed)
    cx.beginPath();
    cx.moveTo(tracePath[0].x, tracePath[0].y);
    for (var i = 1; i < tracePath.length; i++) {
      cx.lineTo(tracePath[i].x, tracePath[i].y);
    }
    cx.strokeStyle = 'rgba(177,154,245,0.2)';
    cx.lineWidth = 8; cx.lineCap = 'round'; cx.lineJoin = 'round';
    cx.stroke();

    // Completed segments
    if (traceIdx > 0) {
      cx.beginPath();
      cx.moveTo(tracePath[0].x, tracePath[0].y);
      for (var j = 1; j <= Math.min(traceIdx, tracePath.length - 1); j++) {
        cx.lineTo(tracePath[j].x, tracePath[j].y);
      }
      cx.strokeStyle = GENRE_COLORS[3];
      cx.lineWidth = 8; cx.lineCap = 'round'; cx.lineJoin = 'round';
      cx.stroke();
    }

    // Waypoint dots
    tracePath.forEach(function(pt, idx) {
      cx.beginPath();
      cx.arc(pt.x, pt.y, 9, 0, Math.PI * 2);
      cx.fillStyle = idx <= traceIdx ? GENRE_COLORS[3] : 'rgba(177,154,245,0.3)';
      cx.fill();
    });

    // Current target highlight
    var cur = tracePath[Math.min(traceIdx, tracePath.length - 1)];
    cx.beginPath();
    cx.arc(cur.x, cur.y, 14 + Math.sin(now / 150) * 3, 0, Math.PI * 2);
    cx.strokeStyle = GENRE_COLORS[3]; cx.lineWidth = 2; cx.stroke();

    // Pointer trail
    if (pointerDown) {
      cx.beginPath();
      cx.arc(pointerX, pointerY, 10, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(177,154,245,0.6)'; cx.fill();
    }

    // Hint
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText(pointerDown ? '' : 'hold & trace the path', W / 2, H - 40);
  }

  function drawTransitionCard(now) {
    var t2 = transCard.t / 90;
    var ease = Math.min(1, t2 * 2.5);
    var gc3 = GENRE_COLORS[transCard.idx % TOTAL_GENRES];
    cx.fillStyle = hexToRgba(INK, 0.85 * ease); cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '700 14px Menlo, monospace';
    cx.fillText('GENRE SWITCH', W / 2, 300);
    cx.fillStyle = gc3; cx.font = '900 52px -apple-system, Helvetica, Arial';
    cx.fillText(GENRE_NAMES[transCard.idx % TOTAL_GENRES], W / 2, 370);
    cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 16px -apple-system, Helvetica, Arial';
    cx.fillText(GENRE_SUBS[transCard.idx % TOTAL_GENRES], W / 2, 408);
    cx.globalAlpha = 1;
  }

  function drawChallenge(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
    cx.fillText('SCORE TO BEAT', W / 2, 290);
    cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
    cx.fillText('12', W / 2, 390);
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
    cx.fillText("4 genres — can you beat it?", W / 2, 424);
  }

  function drawTitle(now) {
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
    cx.fillText('GENRE SHUFFLE', W / 2, 270);
    cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('4 genres. 40 seconds.', W / 2, 310);

    // Genre preview pills
    GENRE_NAMES.forEach(function(n, i) {
      cx.fillStyle = hexToRgba(GENRE_COLORS[i], 0.2);
      cx.strokeStyle = GENRE_COLORS[i]; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(W / 2 - 80, 340 + i * 44, 160, 32, 16);
      else cx.rect(W / 2 - 80, 340 + i * 44, 160, 32);
      cx.fill(); cx.stroke();
      cx.fillStyle = GENRE_COLORS[i]; cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText(n + ' — ' + GENRE_SUBS[i], W / 2, 340 + i * 44 + 22);
    });

    var p = 0.6 + 0.4 * Math.sin(now / 300);
    cx.globalAlpha = p; cx.fillStyle = VERM;
    cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('TAP TO START', W / 2, 542);
    cx.globalAlpha = 1;
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';

    cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
    cx.fillText('WIPED OUT.', W / 2, 290);
    cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
    cx.fillText(score + ' genres', W / 2, 334);
    var pt2 = pctTop(score);
    cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt2 + '% TODAY', W / 2, 378);
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('better than ' + (100 - pt2) + '% of players', W / 2, 402);

    if (!DEMO && !BOT) {
      var p2 = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = p2; cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — ONE MORE TRY', W / 2, 448);
      cx.globalAlpha = 1;
      // Share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  function drawCTA(now) {
    var elapsed = (now - ctaAt) / 1000, ease = Math.min(1, elapsed * 2.2);
    cx.fillStyle = hexToRgba(INK, 0.82 * ease); cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease; cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
    cx.fillText('GENRE SHUFFLE', W / 2, 292);
    cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('they scored ' + (window.__demoScore || 12) + '. your move.', W / 2, 334);
    var p3 = 0.7 + 0.3 * Math.sin(now / 240);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 30px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + (window.__demoScore || 12), W / 2, 402);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 436);
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
