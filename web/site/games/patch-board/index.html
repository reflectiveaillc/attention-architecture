<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // CALM palette — vermillion avoided
  var INK  = '#0b0d12';
  var TEAL = '#2ec5b6';
  var GOLD = '#f2b134';
  var SOFT = '#8aa3a0';

  var TOTAL = 12;
  var MISSIONS = [
    { emoji: '⭐', name: 'Star',    hue: 48  },
    { emoji: '❤️', name: 'Heart',   hue: 340 },
    { emoji: '🔥', name: 'Spark',   hue: 28  },
    { emoji: '🌙', name: 'Night',   hue: 220 },
    { emoji: '🍃', name: 'Leaf',    hue: 145 },
    { emoji: '💎', name: 'Gem',     hue: 178 },
    { emoji: '⚡', name: 'Bolt',    hue: 52  },
    { emoji: '🎯', name: 'Aim',     hue: 355 },
    { emoji: '🎨', name: 'Color',   hue: 280 },
    { emoji: '📍', name: 'Pin',     hue: 195 },
    { emoji: '✋', name: 'Reach',   hue: 30  },
    { emoji: '🌊', name: 'Wave',    hue: 188 }
  ];

  // board layout: 4 rows × 3 cols
  var COLS = 3, ROWS = 4;
  var BOARD_L = 62, BOARD_R = W - 62;
  var BOARD_T = 285, BOARD_B = H - 95;
  var CELL_W = (BOARD_R - BOARD_L) / COLS;
  var CELL_H = (BOARD_B - BOARD_T) / ROWS;
  function slotPos(i) {
    var col = i % COLS, row = Math.floor(i / COLS);
    return {
      x: BOARD_L + col * CELL_W + CELL_W / 2,
      y: BOARD_T + row * CELL_H + CELL_H / 2
    };
  }

  // state
  var phase;            // 'title' | 'play' | 'complete' | 'cta'
  var patches;          // 12 slots: null or { missionIdx, scale, popT }
  var sequence;         // order of mission indices to drift
  var seqPos;           // which mission is currently drifting
  var completedCount;
  var card;             // { x, y, missionIdx, speed }
  var flashes, particles;
  var hitStop, zoom, shakeAmt;
  var runStartTs, completeAt, ctaAt;
  var runsDone, botRunsDone;

  // input rects
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 115, y: 500, w: 230, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function shuffleArr(a) {
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
  }

  function buildSequence() {
    var base = [];
    for (var i = 0; i < TOTAL; i++) base.push(i);
    if (DEMO || BOT) return base;          // deterministic for autopilots
    shuffleArr(base);
    return base;
  }

  function spawnCard() {
    if (seqPos >= sequence.length) { card = null; return; }
    card = {
      x: W + 60,
      y: 182,
      missionIdx: sequence[seqPos],
      speed: 1.4 + seqPos * 0.06
    };
  }

  function newGame() {
    rng = mulberry32(SEED + (runsDone || 0) * 2654435761 | 0);
    phase = (DEMO || BOT) ? 'play' : 'title';
    patches = [];
    for (var i = 0; i < TOTAL; i++) patches.push(null);
    sequence = buildSequence();
    seqPos = 0;
    completedCount = 0;
    flashes = []; particles = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    completeAt = 0; ctaAt = 0;
    spawnCard();

    if (DEMO) {
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED, mode: 'demo' });
      demoStart();
    } else if (BOT) {
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED, mode: 'bot' });
    }
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function claimMission() {
    if (phase !== 'play' || completedCount >= TOTAL || !card) return;
    var mi = card.missionIdx;
    var m = MISSIONS[mi];

    // fill next empty slot
    patches[completedCount] = {
      missionIdx: mi,
      scale: 0,
      popT: 0
    };
    completedCount++;
    seqPos++;

    if (window.J) J.calm(completedCount);
    hitStop = 3;
    zoom = 1.025;
    shakeAmt = 1.5;
    addFlash(m.name + ' patch', colorFor(m.hue), 30, card.x, card.y - 45);
    spawnParticles(card.x, card.y, m.hue);

    if (window.LOOP) LOOP.emit('patch_claimed', { name: m.name, n: completedCount });

    if (completedCount >= TOTAL) {
      setTimeout(boardComplete, 450);
    } else {
      spawnCard();
    }
  }

  function boardComplete() {
    phase = 'complete';
    completeAt = performance.now();
    shakeAmt = 2;
    if (window.J) J.calm(TOTAL + 1);
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: completedCount, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = completedCount;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2600);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 1100);
    }
  }

  function resetRun() {
    runsDone = (runsDone || 0) + 1;
    newGame();
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('restart', {});
  }

  function colorFor(hue) {
    return 'hsl(' + hue + ',70%,62%)';
  }

  function addFlash(txt, color, size, x, y) {
    flashes.push({ txt: txt, color: color, size: size, x: x || W / 2, y: y || H / 2, t: 0 });
  }

  function spawnParticles(x, y, hue) {
    for (var i = 0; i < 14; i++) {
      var ang = rng() * Math.PI * 2;
      var spd = 1.2 + rng() * 2.2;
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 1.2,
        life: 1, hue: hue + (rng() - 0.5) * 30
      });
    }
  }

  // ---- demo / bot autopilots ----
  // Calm demo arc: settle → deepen → resolve → soft invitation.
  var demoStep = 0, demoTimer = 0;
  var demoWaits = [120, 100, 90, 80, 75, 70, 65, 60, 55, 50, 45, 40];

  function demoStart() {
    demoStep = 0;
    demoTimer = 200;
  }

  function demoPump(dt) {
    if (phase !== 'play') return;
    demoTimer -= dt;
    if (demoTimer > 0) return;
    claimMission();
    demoStep++;
    demoTimer = demoWaits[Math.min(demoStep, demoWaits.length - 1)] || 45;
  }

  var botTimer = 0;
  function botPump(dt) {
    if (phase !== 'play' || !card) return;
    botTimer -= dt;
    if (botTimer > 0) return;
    // imperfect: tap when card crosses a "comfortable" zone near center
    if (card.x > W / 2 - 50 && card.x < W / 2 + 60) {
      claimMission();
      botTimer = 40 + rng() * 55;
    }
  }

  // ---- human input ----
  function cardHit(ex, ey) {
    if (!card) return false;
    return ex >= card.x - 44 && ex <= card.x + 44 && ey >= card.y - 44 && ey <= card.y + 44;
  }

  function tap(ex, ey) {
    if (DEMO || BOT) return;
    if (ex !== undefined && inR(MUTE_R, ex, ey) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play') {
      if (ex !== undefined && cardHit(ex, ey)) { claimMission(); return; }
      return;
    }
    if (phase === 'complete' && performance.now() - completeAt > 350) {
      if (ex !== undefined && inR(SHARE_R, ex, ey) && window.SHARE) {
        SHARE.send({ score: completedCount, unit: 'patches' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') {
      if (!DEMO && !BOT && phase === 'play' && card) claimMission();
      else tap();
    }
  });

  // ---- render helpers ----
  function drawBadge(px, py, r, hue, scale) {
    cx.save();
    cx.translate(px, py);
    cx.scale(scale, scale);

    // scalloped badge edge
    var n = 16;
    cx.beginPath();
    for (var i = 0; i <= n; i++) {
      var ang = (i / n) * Math.PI * 2;
      var rr = r + (i % 2 === 0 ? 4 : 0);
      var x = Math.cos(ang) * rr, y = Math.sin(ang) * rr;
      if (i === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
    }
    cx.closePath();

    var g = cx.createRadialGradient(-r * 0.35, -r * 0.35, 2, 0, 0, r + 4);
    g.addColorStop(0, 'hsl(' + hue + ',55%,58%)');
    g.addColorStop(0.6, 'hsl(' + hue + ',62%,46%)');
    g.addColorStop(1, 'hsl(' + hue + ',55%,34%)');
    cx.fillStyle = g;
    cx.fill();
    cx.lineWidth = 2;
    cx.strokeStyle = 'rgba(255,255,255,0.25)';
    cx.stroke();

    // inner ring
    cx.beginPath(); cx.arc(0, 0, r * 0.72, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(0,0,0,0.15)'; cx.lineWidth = 1.5; cx.stroke();

    cx.restore();
  }

  function drawEmptySlot(px, py, r) {
    cx.beginPath();
    cx.arc(px, py, r, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(255,255,255,0.12)';
    cx.setLineDash([5, 5]);
    cx.lineWidth = 2;
    cx.stroke();
    cx.setLineDash([]);

    cx.beginPath();
    cx.arc(px, py, r - 8, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(255,255,255,0.06)';
    cx.lineWidth = 1;
    cx.stroke();
  }

  function drawCard(c) {
    var m = MISSIONS[c.missionIdx];
    var x = c.x, y = c.y;

    cx.save();
    cx.shadowColor = 'rgba(46,197,182,0.22)';
    cx.shadowBlur = 18;
    cx.fillStyle = '#151922';
    cx.strokeStyle = 'rgba(255,255,255,0.18)';
    cx.lineWidth = 1.5;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(x - 44, y - 44, 88, 88, 18);
    else cx.rect(x - 44, y - 44, 88, 88);
    cx.fill(); cx.stroke();
    cx.restore();

    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.font = '30px -apple-system, Helvetica, Arial';
    cx.fillText(m.emoji, x, y - 6);

    cx.textBaseline = 'alphabetic';
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '700 11px -apple-system, Helvetica, Arial';
    cx.fillText(m.name.toUpperCase(), x, y + 28);
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // decay juice
    if (hitStop > 0) hitStop -= dt;
    shakeAmt *= Math.pow(0.88, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // animate patch pop-ins
    for (var i = 0; i < TOTAL; i++) {
      var p = patches[i];
      if (p) {
        p.popT += dt;
        p.scale += (1 - p.scale) * 0.14 * dt;
      }
    }

    // drift card
    if (card && phase === 'play' && hitStop <= 0) {
      card.x -= card.speed * dt;
      if (card.x < -70) card.x = W + 70;
    }

    // autopilots
    if (DEMO && hitStop <= 0) demoPump(dt);
    if (BOT  && hitStop <= 0) botPump(dt);

    // juice transforms
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-10, -10, W + 20, H + 20);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(0.55, 'rgba(11,13,18,0)');
    bg.addColorStop(1, 'rgba(242,177,52,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // title
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('PATCH BOARD', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 17px -apple-system, Helvetica, Arial';
      cx.fillText('tap drifting patches · fill the board', W / 2, 340);
      var pulse = 0.55 + 0.45 * Math.sin(now / 500);
      cx.globalAlpha = pulse;
      cx.fillStyle = GOLD;
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO BEGIN', W / 2, 400);
      cx.globalAlpha = 1;
    }

    // play / complete / cta all show the board
    if (phase === 'play' || phase === 'complete' || phase === 'cta') {
      // header progress
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('PATCHES', W / 2, 48);
      cx.fillStyle = '#fff';
      cx.font = '800 34px -apple-system, Helvetica, Arial';
      cx.fillText(completedCount + ' / ' + TOTAL, W / 2, 82);

      // mini progress dots
      for (var d = 0; d < TOTAL; d++) {
        var dx = W / 2 - (TOTAL - 1) * 7 + d * 14;
        var dy = 104;
        cx.beginPath(); cx.arc(dx, dy, 4, 0, Math.PI * 2);
        cx.fillStyle = patches[d] ? TEAL : 'rgba(255,255,255,0.12)';
        cx.fill();
      }

      // board background
      cx.fillStyle = 'rgba(255,255,255,0.03)';
      cx.strokeStyle = 'rgba(255,255,255,0.08)';
      cx.lineWidth = 1;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(BOARD_L - 10, BOARD_T - 10, BOARD_R - BOARD_L + 20, BOARD_B - BOARD_T + 20, 16);
      else cx.rect(BOARD_L - 10, BOARD_T - 10, BOARD_R - BOARD_L + 20, BOARD_B - BOARD_T + 20);
      cx.fill(); cx.stroke();

      // slots and patches
      for (var i = 0; i < TOTAL; i++) {
        var pos = slotPos(i);
        var p = patches[i];
        if (!p) {
          drawEmptySlot(pos.x, pos.y, 32);
        } else {
          var m = MISSIONS[p.missionIdx];
          drawBadge(pos.x, pos.y, 32, m.hue, p.scale);
          cx.textAlign = 'center';
          cx.textBaseline = 'middle';
          cx.font = '22px -apple-system, Helvetica, Arial';
          cx.fillText(m.emoji, pos.x, pos.y + 1);
          cx.textBaseline = 'alphabetic';
        }
      }

      // drifting mission card
      if (phase === 'play' && card) drawCard(card);

      // complete overlay
      if (phase === 'complete') {
        cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
        cx.textAlign = 'center';
        cx.fillStyle = TEAL;
        cx.font = '900 40px -apple-system, Helvetica, Arial';
        cx.fillText('BOARD FULL', W / 2, 310);
        cx.fillStyle = 'rgba(255,255,255,0.75)';
        cx.font = '600 18px -apple-system, Helvetica, Arial';
        cx.fillText('all ' + TOTAL + ' patches in place', W / 2, 348);
        cx.fillStyle = GOLD;
        cx.font = '800 22px -apple-system, Helvetica, Arial';
        cx.fillText(TOTAL + ' patches completed', W / 2, 392);

        if (!DEMO && !BOT) {
          var p2 = 0.6 + 0.4 * Math.sin(now / 350);
          cx.globalAlpha = p2;
          cx.fillStyle = TEAL;
          cx.font = '700 17px -apple-system, Helvetica, Arial';
          cx.fillText('TAP TO FILL ANOTHER', W / 2, 450);
          cx.globalAlpha = 1;
          // share pill
          cx.fillStyle = 'rgba(242,177,52,0.14)';
          cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
          else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
          cx.fill(); cx.stroke();
          cx.fillStyle = GOLD;
          cx.font = '800 15px -apple-system, Helvetica, Arial';
          cx.fillText('⚡ SHARE BOARD', W / 2, SHARE_R.y + 30);
        }
      }
    }

    // demo CTA (soft invitation)
    if (phase === 'cta') {
      var te = (now - ctaAt) / 1000, ease = Math.min(1, te * 2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('PATCH BOARD', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '600 18px -apple-system, Helvetica, Arial';
      cx.fillText('the board filled. nothing left empty.', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 300);
      cx.globalAlpha = ease * p3;
      cx.fillStyle = TEAL;
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 420);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 452);
      cx.globalAlpha = 1;
    }

    // floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '800 ' + (fl.size + fl.t * 0.35) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var pt = particles[i];
      pt.vy += 0.08 * dt; pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.life -= 0.025 * dt;
      if (pt.life <= 0) { particles.splice(i, 1); continue; }
      cx.globalAlpha = pt.life;
      cx.fillStyle = 'hsl(' + pt.hue + ',70%,62%)';
      cx.beginPath(); cx.arc(pt.x, pt.y, 3.5, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  runsDone = 0; botRunsDone = 0;
  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
