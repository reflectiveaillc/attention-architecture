<meta charset="UTF-8">

<title>Live Count Climb — Tilt</title>
<!--
  LOOP / attention-architecture — Live Count Climb
  Circuits: 03 social (the live counter is the conditioned path),
            01 RPE (variable reward per lock-in), 04 loss (the run you'll miss).
  Modes:
    ?demo=1&seed=7        scripted run for clip capture, sets window.__demoDone
    ?bot=1&runs=3&seed=5  imperfect autoplay for traffic sim, sets window.__botDone
    ?dare=<n>[&by=name]   incoming challenge
    ?clip=ID&src=tiktok   attribution (see js/loop-events.js)

-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'live-count-climb';</script>
<script src="../../js/loop-events.js"></script>

<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 14;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var BASE_TARGET = 120, TARGET_STEP = 25;
  var AMP_BASE = 22, AMP_STEP = 2.6;
  var SPEED_BASE = 0.055, SPEED_STEP = 0.004;
  var JITTER_BASE = 3.2, JITTER_STEP = 0.38;
  var PERFECT_W = 2.6, GOOD_W = 9, NEAR_W = 16;

  var state, flashes, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, dareBeaten = false, shakeAmt = 0, challengeAt = 0, ctaAt = 0;
  try { best = +localStorage.getItem('lcc_best') || 0; } catch (_) {}

  function newGame() {
    state = {
      phase: 'title',
      round: 0,
      target: 0,
      count: 0,
      countVel: 0,
      phaseAng: 0,
      amp: 0,
      speed: 0,
      jitterAmp: 0,
      score: 0,
      combo: 0,
      overAt: 0
    };
    flashes = []; dareBeaten = false;
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1200);
      return;
    }
    if (BOT) startRun();
  }

  function setRound(r) {
    state.round = r;
    state.target = BASE_TARGET + r * TARGET_STEP;
    state.amp = AMP_BASE + r * AMP_STEP;
    state.speed = SPEED_BASE + r * SPEED_STEP;
    state.jitterAmp = JITTER_BASE + r * JITTER_STEP;
    state.phaseAng = rng() * Math.PI * 2;
    state.count = state.target + Math.sin(state.phaseAng) * state.amp + (rng() - 0.5) * state.jitterAmp;
    state.countVel = Math.cos(state.phaseAng) * state.amp * state.speed;
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0; state.combo = 0; setRound(0);
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 1100))));
  }

  function lockIn() {
    if (state.phase !== 'play') return;
    var offset = state.count - state.target;
    var diff = Math.abs(offset);
    var gained;
    if (diff <= PERFECT_W) {
      gained = Math.round(state.target * 2);
      state.score += gained; state.combo++;
      hitStop = 5; zoom = 1.04;
      flash('PERFECT +' + gained, TEAL, 44);
      if (window.J) { J.perfect(state.combo); J.hit(state.round + 1); }
    } else if (diff <= GOOD_W) {
      gained = Math.round(state.target);
      state.score += gained; state.combo = 0;
      flash('+' + gained, GOLD, 38);
      if (window.J) J.hit(state.round + 1);
    } else if (diff <= NEAR_W) {
      gained = Math.round(Math.max(0, state.target - diff * 10));
      state.score += gained; state.combo = 0;
      shakeAmt = 5;
      flash('SO CLOSE', VERM, 36);
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { round: state.round, diff: +diff.toFixed(2), score: state.score });
    } else {
      gameOver(diff / state.target);
      return;
    }
    if (window.J) J.tension(Math.min(state.round / 15, 1));
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    if (window.LOOP) LOOP.emit('count_locked', { round: state.round, target: state.target, diff: +diff.toFixed(2), score: state.score, perfect: diff <= PERFECT_W });
    setRound(state.round + 1);
  }

  function gameOver(mag) {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) { J.death(Math.min(0.35 + state.round / 18, 1)); }
    if (DEMO) window.__demoScore = state.score;
    if (state.score > best) {
      best = state.score;
      try { localStorage.setItem('lcc_best', String(best)); } catch (_) {}
      if (window.J) setTimeout(function () { J.fanfare(); }, 500);
    }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 800);
    }
  }

  function resetRun() {
    state.score = 0; state.combo = 0; flashes = []; dareBeaten = false;
    setRound(0);
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 512, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { lockIn(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'viewers' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // human ignores autopilots; autopilots ignore human input.
  // demo arc: clean opens → hesitation builds → near-fail/recovery ~60% → real miss
  var demoScript = [
    { diff: 0, wait: 24 },
    { diff: 0, wait: 18 },
    { diff: 4, wait: 28 },
    { diff: 0, wait: 36 },
    { diff: -6, wait: 52 },          // hesitation
    { diff: -13, wait: 42 },         // near-fail recovery (reads as "it's over")
    { diff: 0, wait: 22 },           // perfect save
    { diff: 5, wait: 34 },
    { diff: 'miss', wait: 16 }       // the fail
  ];
  var demoIdx = 0, demoWait = 0;
  var botRunsDone = 0, botTarget = null;

  function autopilot() {
    if (state.phase !== 'play') return;
    var offset = state.count - state.target;
    var v = state.countVel;
    var step = demoScript[Math.min(demoIdx, demoScript.length - 1)];
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      if (step.diff === 'miss') {
        if (Math.abs(offset) >= NEAR_W + 10) { demoIdx++; demoWait = step.wait || 18; lockIn(); }
        return;
      }
      var thresh = Math.abs(v) * 0.65 + Math.max(1.2, state.jitterAmp * 0.55);
      if (Math.abs(offset - step.diff) <= thresh) {
        lockIn();
        demoIdx++;
        var next = demoScript[Math.min(demoIdx, demoScript.length - 1)];
        demoWait = next ? (next.wait || 26) : 26;
      }
    } else if (BOT) {
      if (botTarget === null) botTarget = gauss() * BOT_ERR;
      var bThresh = Math.abs(v) * 0.65 + Math.max(1.0, state.jitterAmp * 0.5);
      if (Math.abs(offset - botTarget) <= bThresh) { botTarget = null; lockIn(); }
    }
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // count simulation — frozen during hit-stop
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      state.phaseAng += state.speed * dt + (rng() - 0.5) * 0.012 * dt;
      state.count = state.target + Math.sin(state.phaseAng) * state.amp + (rng() - 0.5) * state.jitterAmp;
      state.countVel = Math.cos(state.phaseAng) * state.amp * state.speed;
      autopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    var displayCount = Math.round(state.count);

    // live badge
    var pulse = 0.6 + 0.4 * Math.sin(now / 260);
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(255,255,255,0.9)'; cx.font = '700 13px -apple-system, Helvetica, Arial';
    cx.fillText('LIVE', 46, 34);
    cx.fillStyle = 'rgba(232,80,46,' + pulse + ')';
    cx.beginPath(); cx.arc(30, 29, 5, 0, Math.PI * 2); cx.fill();

    // round
    cx.textAlign = 'right';
    cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('ROUND ' + (state.round + 1), W - 18, 34);

    // central count
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 96px -apple-system, Helvetica, Arial';
    cx.fillText(displayCount, W / 2, 285);

    // target
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
    cx.fillText('GO LIVE AT', W / 2, 332);
    cx.fillStyle = GOLD; cx.font = '900 40px -apple-system, Helvetica, Arial';
    cx.fillText(state.target, W / 2, 375);

    // closeness ring
    if (state.phase === 'play') {
      var offset = state.count - state.target;
      var diff = Math.abs(offset);
      var ringR = 110 + Math.min(50, diff * 2.2);
      var ringPct = Math.max(0, 1 - diff / NEAR_W);
      cx.lineWidth = 5;
      cx.strokeStyle = diff <= PERFECT_W ? TEAL : (diff <= GOOD_W ? GOLD : VERM);
      cx.globalAlpha = 0.25 + ringPct * 0.55;
      cx.beginPath();
      cx.arc(W / 2, 285 - 28, ringR, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ringPct);
      cx.stroke();
      cx.globalAlpha = 1;
    }

    // score strip
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('VIEWERS LOCKED', W / 2, 430);
      cx.fillStyle = '#fff'; cx.font = '800 44px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 475);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 500);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 148);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 86px -apple-system, Helvetica, Arial';
      cx.fillText('2150', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('LIVE COUNT', W / 2, 250);
      cx.fillText('CLIMB', W / 2, 300);
      var p1 = 0.6 + 0.4 * Math.sin(now / 300);
      cx.fillStyle = VERM; cx.globalAlpha = p1; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO GO LIVE', W / 2, 360); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('lock the count. don\'t jump early.', W / 2, 390);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('MISSED.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' viewers locked', W / 2, 335);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 382);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 406);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('LIVE COUNT CLIMB', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('locked ' + (window.__demoScore || 2150) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 2150), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
