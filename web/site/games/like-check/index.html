<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  // Each "tick" the like count enters one of three states:
  //   'rise' — count actually goes up (correct tap)
  //   'hold' — count stays (wrong tap = fail)
  //   'fake' — count jumps then snaps back within same tick (wrong tap = fail)
  // Window: the count is displayed in 'active' state for TAP_WINDOW frames,
  // then the result is revealed. Player must tap only during a 'rise'.
  var BASE_LIKES = 1247;
  var TAP_WINDOW  = 52;  // frames the event is "live" (≈0.87s @60fps)
  var SETTLE_TIME = 28;  // frames between events
  var REVEAL_TIME = 36;  // frames showing result before next

  // ---- state ----
  var phase, score, combo, lives, round, runStartTs;
  var eventKind, eventPhase, eventTimer, likeCount, displayLike, pendingDelta;
  var dareBeaten = false;
  var flashes = [];
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var tapped = false, tapResult = null; // 'hit' | 'miss' | 'false'
  var overAt = 0, ctaAt = 0;
  var best = 0;
  try { best = +localStorage.getItem('lc_best') || 0; } catch (_) {}

  // bot state
  var botRunsDone = 0;
  // demo state
  var demoScript = null, demoIdx = 0, demoWaits = [], demoWait = 0, demoPhase = 0;

  function pctTop(s) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 9)))); }

  function newGame() {
    phase = DEMO ? 'challenge' : BOT ? 'play' : 'title';
    score = 0; combo = 0; lives = 3; round = 0; dareBeaten = false;
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
    likeCount = BASE_LIKES + Math.floor(rng() * 800);

    eventKind = null; eventPhase = null; eventTimer = 0; tapped = false; tapResult = null;

    if (DEMO) {

      startRun();

  }

  function buildDemoScript() {
    // Each entry: { kind: 'rise'|'hold'|'fake', tap: true|false|null (null=let expire) }
    // Arc: rise(tap)×3 → near-miss fake(tap→miss, recover) → rise×2 → fake(tap→miss) = death
    // But contract says near-fail then recovery → then the real fail.
    // We'll make: 4 correct rises, then a close-call (fake, human almost taps = no tap, survives),
    // then 2 more rises, then a fake where the "player" taps = last life lost = game over.
    demoScript = [
      { kind: 'rise', tap: true },   // 0
      { kind: 'rise', tap: true },   // 1
      { kind: 'fake', tap: false },  // 2 — phantom, player wisely waits (near-fail avoided)
      { kind: 'rise', tap: true },   // 3
      { kind: 'rise', tap: true },   // 4
      { kind: 'hold', tap: false },  // 5 — hold, player correctly passes
      { kind: 'rise', tap: true },   // 6 — recovery feel
      { kind: 'fake', tap: true },   // 7 — FAKE tapped → lose a life (spectacle)
      { kind: 'fake', tap: true },   // 8 — FAKE tapped again → another life lost
      { kind: 'fake', tap: true },   // 9 — FAKE tapped → last life → GAME OVER
    ];
    // Hesitation waits before tapping (in frames after event appears)
    demoWaits = [18, 14, 99, 16, 12, 99, 15, 10, 8, 6];
  }

  function startRun() {
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    scheduleNextEvent();
  }

  function scheduleNextEvent() {
    if (phase !== 'play') return;
    round++;
    // Each round: more fakes introduced
    var fakeChance = Math.min(0.55, 0.1 + round * 0.04);
    var holdChance = 0.15;
    var r = rng();
    if (r < fakeChance) eventKind = 'fake';
    else if (r < fakeChance + holdChance) eventKind = 'hold';
    else eventKind = 'rise';
    eventPhase = 'active';
    eventTimer = 0;
    tapped = false; tapResult = null;
    // Compute the display delta for fakes/rises
    pendingDelta = Math.floor(rng() * 12) + 3;
    if (eventKind === 'rise') displayLike = likeCount + pendingDelta;
    else if (eventKind === 'fake') displayLike = likeCount + pendingDelta; // appears to rise
    else displayLike = likeCount; // hold: no change shown
    // tension rises with score
    if (window.J) J.tension(Math.min(score / 20, 1));
  }

  function resolveEvent() {
    // called when TAP_WINDOW expires without tap (or immediately after tap)
    eventPhase = 'reveal';
    eventTimer = 0;
    // If rise and not tapped: miss (timeout)
    // If rise and tapped: hit
    // If hold/fake and tapped: miss
    // If hold/fake and not tapped: survived (no score)
    if (eventKind === 'rise') {
      if (tapped) {
        // HIT
        tapResult = 'hit';
        likeCount += pendingDelta;
        displayLike = likeCount;
        score++;
        combo++;
        var isStreak = combo >= 3;
        var isGold   = combo >= 6;
        if (isGold && window.J)   { J.gold(); hitStop = 5; zoom = 1.04; }
        else if (isStreak && window.J) { J.perfect(combo); hitStop = 4; zoom = 1.03; }
        else if (window.J) J.hit(combo);
        flash(isGold ? '+' + pendingDelta + ' ★' : isStreak ? '+' + pendingDelta + ' ×' + combo : '+' + pendingDelta, isGold ? GOLD : isStreak ? TEAL : VERM, isGold ? 40 : 34);
        if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
          dareBeaten = true; flash('DARE BEATEN', TEAL, 44);
          if (window.J) J.fanfare(); SHARE.beaten(score);
        }
        if (window.LOOP) LOOP.emit('like_hit', { score: score, combo: combo });
      } else {
        // Missed a real rise
        tapResult = 'miss';
        combo = 0;
        loseLife('MISSED!');
      }
    } else if (eventKind === 'fake' || eventKind === 'hold') {
      if (tapped) {
        // Tapped a fake/hold: bad
        tapResult = 'false';
        combo = 0;
        displayLike = likeCount; // snap back
        if (eventKind === 'fake') shakeAmt = 4;
        loseLife(eventKind === 'fake' ? 'FAKE!' : 'HOLD!');
        if (window.LOOP) LOOP.emit('near_miss', { kind: eventKind, score: score });
      } else {
        // Correctly ignored — no score, but survived
        tapResult = 'survived';
        displayLike = likeCount; // snap back
        // small positive reinforcement
        flash('SAFE', 'rgba(255,255,255,0.6)', 26);
      }
    }
  }

  function loseLife(msg) {
    lives--;
    flash(msg, VERM, 38);
    if (window.J) J.near();
    shakeAmt = Math.max(shakeAmt, 5);
    if (lives <= 0) {
      setTimeout(function () { gameOver(); }, 180);
    }
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (window.J) { J.death(Math.min(0.3 + score / 20, 1)); if (newBest) setTimeout(function () { J.fanfare(); }, 450); }
    if (DEMO) window.__demoScore = score;
    if (newBest) { best = score; try { localStorage.setItem('lc_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 700);
    }
  }

  function resetRun() {
    score = 0; combo = 0; lives = 3; round = 0; dareBeaten = false;
    likeCount = BASE_LIKES + Math.floor(rng() * 800);
    displayLike = likeCount;
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
    tapped = false; tapResult = null; eventKind = null; eventPhase = null;
    if (window.LOOP) LOOP.emit('restart', {});
    phase = 'play';
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 516, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { phase = 'play'; startRun(); return; }
    if (phase === 'play' && eventPhase === 'active' && !tapped) {
      tapped = true;
      resolveEvent();
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'likes' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo autopilot ----
  function demoAutopilot() {
    if (phase !== 'play' || eventPhase !== 'active' || tapped) return;
    if (demoIdx >= demoScript.length) return;
    var step = demoScript[demoIdx];
    // match current event kind
    if (eventKind !== step.kind) return;
    var shouldTap = step.tap;
    if (!shouldTap) return; // let it expire naturally
    // wait for hesitation
    if (demoWait > 0) { demoWait--; return; }
    // tap!
    tapped = true;
    demoIdx++;
    demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 14;
    resolveEvent();
  }

  // ---- bot autopilot ----
  // Imperfect: ~78% accuracy (hits rises, sometimes taps fakes, sometimes misses rises)
  var botDecided = false, botWillTap = false, botWaitFrames = 0;
  function botAutopilot() {
    if (phase !== 'play' || eventPhase !== 'active') return;
    if (!botDecided) {
      botDecided = true;
      // Decide: if rise, tap with 85% prob; if fake/hold, tap with 20% prob
      if (eventKind === 'rise') botWillTap = rng() < 0.85;
      else botWillTap = rng() < 0.20;
      botWaitFrames = Math.floor(rng() * 20) + 8;
    }
    if (!botWillTap) return;
    if (botWaitFrames > 0) { botWaitFrames--; return; }
    if (!tapped) {
      tapped = true;
      botDecided = false;
      resolveEvent();
    }
  }

  // ---- heart drawing ----
  function drawHeart(cx, x, y, size, color, alpha) {
    cx.save();
    cx.globalAlpha = alpha !== undefined ? alpha : 1;
    cx.fillStyle = color || VERM;
    cx.beginPath();
    cx.translate(x, y);
    var s = size;
    cx.moveTo(0, s * 0.3);
    cx.bezierCurveTo(-s * 0.5, -s * 0.2, -s, s * 0.2, 0, s * 0.8);
    cx.bezierCurveTo(s, s * 0.2, s * 0.5, -s * 0.2, 0, s * 0.3);
    cx.fill();
    cx.restore();
  }

  // ---- post card drawing ----
  function formatLikes(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // advance event timer
    if (phase === 'play') {
      if (eventPhase === 'active') {
        eventTimer += dt;
        // demo autopilot checks per frame
        if (DEMO) {
          demoAutopilot();
        } else if (BOT) {
          botAutopilot();
        }
        // window expired without tap
        if (!tapped && eventTimer >= TAP_WINDOW) {
          tapped = true; // sentinel
          resolveEvent();
        }
      } else if (eventPhase === 'reveal') {
        eventTimer += dt;
        if (eventTimer >= REVEAL_TIME) {
          eventPhase = null;
          botDecided = false;
          // for demo: advance to next script step when 'not tapped' steps expire
          if (DEMO && demoIdx < demoScript.length) {
            var step = demoScript[demoIdx];
            if (step.kind === eventKind && !step.tap) {
              demoIdx++;
              demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 14;
            }
          }
          scheduleNextEvent();
        }
      } else if (eventPhase === null) {
        // settle gap between events
        eventTimer += dt;
        if (eventTimer >= SETTLE_TIME) scheduleNextEvent();
      }
    }

    // juice decay
    if (hitStop > 0) { hitStop -= dt; }
    if (shakeAmt > 0.1) shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // --- draw ---
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    if (phase === 'title') drawTitle(now);
    else if (phase === 'challenge') drawChallenge();
    else if (phase === 'play' || phase === 'over') { drawPost(now); if (phase === 'over') drawOverlay(now); }
    else if (phase === 'cta') drawCTA(now);

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawTitle(now) {
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
    cx.fillText('LIKE CHECK', W / 2, 275);
    cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '500 15px -apple-system, Helvetica, Arial';

    drawPostCard(W / 2, 490, 1247, false, null, now, 0.5);
  }

  function drawChallenge() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
    cx.fillText('SCORE TO BEAT', W / 2, 290);
    cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
    cx.fillText('21', W / 2, 395);
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText("today's high score", W / 2, 425);
  }

  function drawPost(now) {
    // HUD: score + lives
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = '800 62px -apple-system, Helvetica, Arial';
    cx.fillText(score, W / 2, 96);
    cx.fillStyle = 'rgba(255,255,255,0.38)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + best, W / 2, 118);
    // lives hearts
    for (var i = 0; i < 3; i++) {
      var hx = W / 2 - 22 + i * 22;
      drawHeart(cx, hx, 138, 8, i < lives ? VERM : 'rgba(255,255,255,0.15)');
    }
    // dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 14px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 162);
    }
    // post card
    var cardAlive = phase === 'play';
    drawPostCard(W / 2, 390, displayLike, cardAlive, eventKind, now, 1.0);
    // instruction text
    if (phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.28)'; cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('tap ♥ when it rises — don\'t fall for fakes', W / 2, 570);
    }
  }

  function drawPostCard(cx_x, cx_y, likes, active, kind, now, alpha) {
    // card
    var cw = 290, ch = 220, cr = 18;
    var rx = cx_x - cw / 2, ry = cx_y - ch / 2;
    cx.globalAlpha = alpha;
    cx.fillStyle = 'rgba(255,255,255,0.07)';
    cx.strokeStyle = 'rgba(255,255,255,0.12)'; cx.lineWidth = 1.5;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(rx, ry, cw, ch, cr); else cx.rect(rx, ry, cw, ch);
    cx.fill(); cx.stroke();

    // avatar placeholder
    cx.fillStyle = 'rgba(255,255,255,0.18)';
    cx.beginPath(); cx.arc(rx + 28, ry + 22, 14, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '600 11px -apple-system';
    cx.textAlign = 'left';
    cx.fillText('your_post', rx + 48, ry + 19);
    cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '500 10px -apple-system';
    cx.fillText('2 min ago', rx + 48, ry + 32);

    // "image" area
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    cx.fillRect(rx + 10, ry + 48, cw - 20, 90);
    // gradient shimmer on image area when active
    if (active && kind) {
      var t = now / 1000;
      var shimmer = 0.04 + 0.03 * Math.sin(t * 6);
      cx.fillStyle = kind === 'rise' ? 'rgba(46,197,182,' + shimmer + ')' :
                     kind === 'fake' ? 'rgba(242,177,52,' + shimmer * 0.8 + ')' :
                     'rgba(255,255,255,0.01)';
      cx.fillRect(rx + 10, ry + 48, cw - 20, 90);
    }

    // heart + like count
    var heartColor;
    if (!active || !kind) heartColor = 'rgba(255,255,255,0.35)';
    else if (kind === 'rise') heartColor = VERM;
    else if (kind === 'fake') heartColor = GOLD;
    else heartColor = 'rgba(255,255,255,0.35)';

    // heart pulse when rise or fake
    var heartScale = 1;
    if (active && (kind === 'rise' || kind === 'fake')) {
      heartScale = 1 + 0.12 * Math.abs(Math.sin(now / 120));
    }
    cx.save();
    cx.translate(rx + 26, ry + 162);
    cx.scale(heartScale, heartScale);
    cx.translate(-(rx + 26), -(ry + 162));
    drawHeart(cx, rx + 26, ry + 162, 12, heartColor);
    cx.restore();

    // like count — flicker animation when active
    var showLikes = likes;
    cx.textAlign = 'left';
    cx.fillStyle = heartColor === 'rgba(255,255,255,0.35)' ? 'rgba(255,255,255,0.65)' : heartColor;
    cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText(formatLikes(showLikes), rx + 46, ry + 168);

    // comment/share icons faded
    cx.fillStyle = 'rgba(255,255,255,0.22)';
    cx.font = '13px -apple-system'; cx.textAlign = 'left';
    cx.fillText('💬  48   ↗  12', rx + 86, ry + 168);

    // caption line
    cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '500 11px -apple-system';
    cx.textAlign = 'left';
    cx.fillText('checking in 🌅  #goodmorning', rx + 12, ry + 196);

    cx.textAlign = 'center';
    cx.globalAlpha = 1;
  }

  function drawOverlay(now) {
    cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
    cx.fillText('CHECKED OUT.', W / 2, 290);
    cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
    cx.fillText(score + ' real likes caught', W / 2, 334);
    var pt = pctTop(score);
    cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 378);
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('sharper than ' + (100 - pt) + '% of players', W / 2, 402);
    if (!DEMO && !BOT) {
      var p = 0.6 + 0.4 * Math.sin(now / 290);
      cx.globalAlpha = p; cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — TRY AGAIN', W / 2, 448); cx.globalAlpha = 1;
      // share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  function drawCTA(now) {
    var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease; cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
    cx.fillText('LIKE CHECK', W / 2, 292);
    cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('they caught ' + (window.__demoScore || 21) + ' real rises. your move.', W / 2, 336);
    var p3 = 0.7 + 0.3 * Math.sin(now / 240);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 28px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + (window.__demoScore || 21), W / 2, 404);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 436);
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
