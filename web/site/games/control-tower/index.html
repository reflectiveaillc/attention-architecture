<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var CX = W / 2, CY = H / 2 + 30; // radar center
  var RADAR_R = 160;                // radar radius
  var CENTER_R = 22;                // breach zone radius
  var TAP_R = 26;                   // tap hit radius per blip

  // event types: color, label, speed multiplier
  var TYPES = [
    { color: TEAL,  label: 'STREAM',  spd: 1.0 },
    { color: VERM,  label: 'SIGNAL',  spd: 1.35 },
    { color: GOLD,  label: 'TREND',   spd: 0.75 },
    { color: '#a78bfa', label: 'VIRAL', spd: 1.6 }
  ];

  var state, flashes, blips, particles;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var dareBeaten = false;
  var runStartTs = 0;
  var best = 0;
  try { best = +localStorage.getItem('ct_best') || 0; } catch (_) {}

  // phases: title | challenge | play | over | cta
  function newGame() {
    state = {
      phase: 'title',
      score: 0,
      routed: 0,
      combo: 0,
      overAt: 0,
      spawnTimer: 0,
      spawnInterval: 120,  // frames
      sweepAngle: 0,       // radar sweep angle
      tension: 0
    };
    blips = [];
    flashes = [];
    particles = [];
    dareBeaten = false;
    rng = mulberry32(SEED);

    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    blips = [];
    state.score = 0;
    state.routed = 0;
    state.combo = 0;
    state.spawnTimer = 0;
    state.spawnInterval = 120;
    state.tension = 0;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnBlip() {
    // random angle on perimeter
    var angle = rng() * Math.PI * 2;
    var typeIdx = Math.floor(rng() * TYPES.length);
    // VIRAL events are rare
    if (typeIdx === 3 && rng() > 0.25) typeIdx = Math.floor(rng() * 3);
    var t = TYPES[typeIdx];
    var baseSpd = 0.55 + state.routed * 0.012;
    baseSpd = Math.min(baseSpd, 1.6);
    blips.push({
      x: CX + Math.cos(angle) * RADAR_R,
      y: CY + Math.sin(angle) * RADAR_R,
      angle: angle,
      typeIdx: typeIdx,
      color: t.color,
      label: t.label,
      spd: baseSpd * t.spd,
      r: RADAR_R,           // current radius from center
      routed: false,
      dead: false,
      pulse: 0,
      flashT: 0
    });
  }

  function routeBlip(b) {
    b.routed = true;
    b.dead = true;
    state.score++;
    state.routed++;
    state.combo++;
    var isGold = b.typeIdx === 3; // VIRAL
    var isPerfect = b.r < 55;    // routed close to center = perfect (clutch!)
    if (window.J) {
      if (isGold) { J.gold(); hitStop = 5; zoom = 1.03; }
      else if (isPerfect) { J.perfect(state.combo); hitStop = 4; zoom = 1.025; }
      else { J.hit(state.combo); }
      J.tension(Math.min(state.tension, 1));
    }
    if (isGold) { flash('VIRAL ROUTED', GOLD, 40); hitStop = 6; }
    else if (isPerfect) { flash('CLUTCH +' + state.combo, TEAL, 38); }
    else if (state.combo >= 5) { flash('×' + state.combo, VERM, 36); }
    // emit
    if (window.LOOP) LOOP.emit('blip_routed', { n: state.score, type: b.label, combo: state.combo, clutch: isPerfect });
    // burst particles
    for (var i = 0; i < 6; i++) {
      var pa = rng() * Math.PI * 2;
      particles.push({ x: b.x, y: b.y, vx: Math.cos(pa) * (1 + rng() * 2), vy: Math.sin(pa) * (1 + rng() * 2), color: b.color, life: 28 + rng() * 20, t: 0 });
    }
    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
  }

  function blipBreaches(b) {
    b.dead = true;
    state.combo = 0;
    state.tension = 0;
    shakeAmt = 8;
    if (window.J) J.near();
    flash('BREACH!', VERM, 42);
    if (window.LOOP) LOOP.emit('near_miss', { n: state.score, type: b.label });
    // particles splash outward from center
    for (var i = 0; i < 10; i++) {
      var pa = rng() * Math.PI * 2;
      particles.push({ x: CX, y: CY, vx: Math.cos(pa) * (2 + rng() * 3), vy: Math.sin(pa) * (2 + rng() * 3), color: VERM, life: 35, t: 0 });
    }
    gameOver();
  }

  function gameOver() {
    if (state.phase !== 'play') return;
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 11;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.score / 50, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) {
      best = state.score;
      try { localStorage.setItem('ct_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 800);
      }
    }
  }

  function resetRun() {
    blips = [];
    particles = [];
    state.score = 0;
    state.routed = 0;
    state.combo = 0;
    state.spawnTimer = 0;
    state.spawnInterval = 120;
    state.tension = 0;
    dareBeaten = false;
    botRoutedThisRun = 0;
    botGonePassive = false;
    botTapWait = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 14))));
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 530, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      // find closest blip within tap radius
      var best_d = TAP_R * 2, hit_b = null;
      for (var i = 0; i < blips.length; i++) {
        var b = blips[i];
        if (b.dead) continue;
        var dx = b.x - px, dy = b.y - py;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < TAP_R + 10 && d < best_d) { best_d = d; hit_b = b; }
      }
      if (hit_b) { routeBlip(hit_b); }
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'routed' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilot ----
  // demo: pre-scripted sequence
  // script entries: {waitFrames, blipIdx} or special strings
  var demoPhase = 0;
  var demoWaitFrames = 0;
  var demoScript = [
    // beat 1-6: confident quick routes
    { wait: 38, action: 'route_nearest' },
    { wait: 32, action: 'route_nearest' },
    { wait: 35, action: 'route_nearest' },
    { wait: 44, action: 'route_nearest' },
    { wait: 30, action: 'route_nearest' },
    { wait: 36, action: 'route_nearest' },
    // ~60%: near-fail — blip slips close, then recovered
    { wait: 55, action: 'route_closest' },  // hesitate, route clutch
    { wait: 28, action: 'route_nearest' },
    { wait: 38, action: 'route_nearest' },
    // beat: let a blip breach (the real fail)
    { wait: 80, action: 'miss' }
  ];
  var demoScriptIdx = 0;
  var botRunsDone = 0;
  // bot: routes K events then goes fully passive so a blip naturally breaches center
  var BOT_K = 7;   // number of events to route before going passive
  var botRoutedThisRun = 0;
  var botTapWait = 0;
  var botGonePassive = false;

  function autopilot(dt) {
    if (state.phase !== 'play') return;
    if (DEMO) {
      demoPilot(dt);
    } else if (BOT) {
      botPilot(dt);
    }
  }

  function demoPilot(dt) {
    if (demoScriptIdx >= demoScript.length) return;
    var step = demoScript[demoScriptIdx];
    demoWaitFrames -= dt;
    if (demoWaitFrames > 0) return;

    if (step.action === 'miss') {
      // do nothing — let the closest blip breach on its own
      // script exhausted — game will end naturally on breach
      demoScriptIdx++;
      return;
    }
    // find a blip to route
    var target = null;
    if (step.action === 'route_closest') {
      // route the one closest to center (most dangerous, clutch save)
      var min_r = 999;
      for (var i = 0; i < blips.length; i++) {
        if (!blips[i].dead && blips[i].r < min_r) { min_r = blips[i].r; target = blips[i]; }
      }
    } else {
      // route nearest by overall distance (newest/easiest)
      var max_r = -1;
      for (var i = 0; i < blips.length; i++) {
        if (!blips[i].dead && blips[i].r > max_r) { max_r = blips[i].r; target = blips[i]; }
      }
    }
    if (target) {
      routeBlip(target);
      demoScriptIdx++;
      demoWaitFrames = demoScript[demoScriptIdx] ? demoScript[demoScriptIdx].wait : 999;
    }
  }

  function botPilot(dt) {
    // after BOT_K routes, go passive forever — let blips breach naturally
    if (botGonePassive) return;
    if (botRoutedThisRun >= BOT_K) {
      botGonePassive = true;
      return;
    }
    botTapWait -= dt;
    if (botTapWait > 0) return;
    // find a blip to route — closest to center first (prevents accidental early breach)
    var candidates = [];
    for (var i = 0; i < blips.length; i++) {
      if (!blips[i].dead) candidates.push(blips[i]);
    }
    if (candidates.length === 0) return;
    candidates.sort(function (a, b) { return a.r - b.r; });
    routeBlip(candidates[0]);
    botRoutedThisRun++;
    botTapWait = 20 + rng() * 18;
  }

  // ---- render ----
  var challengeAt = 0, ctaAt = 0, last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // update hitStop — DECAY every frame
    if (hitStop > 0) { hitStop -= dt; }

    // update game
    if (state.phase === 'play') {
      state.sweepAngle += 0.018 * dt;
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnBlip();
        state.spawnInterval = Math.max(55, state.spawnInterval - 0.5);
        state.spawnTimer = state.spawnInterval;
      }
      // move blips inward (only if not frozen by hitStop)
      if (hitStop <= 0) {
        for (var i = blips.length - 1; i >= 0; i--) {
          var b = blips[i];
          if (b.dead) { blips.splice(i, 1); continue; }
          b.r -= b.spd * dt;
          b.x = CX + Math.cos(b.angle) * b.r;
          b.y = CY + Math.sin(b.angle) * b.r;
          b.pulse += 0.12 * dt;
          if (b.r <= CENTER_R) { blipBreaches(b); }
        }
        autopilot(dt);
      } else {
        // still run autopilot even during hitstop (for demo timing)
        // but blips don't move
      }
      // update tension
      var closestR = RADAR_R;
      for (var i = 0; i < blips.length; i++) {
        if (!blips[i].dead && blips[i].r < closestR) closestR = blips[i].r;
      }
      state.tension = 1 - closestR / RADAR_R;
      if (window.J && state.tension > 0.5) J.tension(state.tension);
    }

    // particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.t += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.05 * dt;
      if (p.t >= p.life) particles.splice(i, 1);
    }
    // flashes age
    for (var k = flashes.length - 1; k >= 0; k--) {
      flashes[k].t += dt;
      if (flashes[k].t > 44) flashes.splice(k, 1);
    }

    // ---- draw ----
    cx.save();
    // juice transforms
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.10 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createRadialGradient(CX, CY, 0, CX, CY, RADAR_R * 1.2);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ===== RADAR SCREEN =====
    // outer ring glow
    var glow = cx.createRadialGradient(CX, CY, RADAR_R - 8, CX, CY, RADAR_R + 8);
    glow.addColorStop(0, 'rgba(46,197,182,0.18)');
    glow.addColorStop(1, 'rgba(46,197,182,0)');
    cx.fillStyle = glow;
    cx.beginPath(); cx.arc(CX, CY, RADAR_R + 8, 0, Math.PI * 2); cx.fill();

    // radar rings
    cx.strokeStyle = 'rgba(46,197,182,0.13)'; cx.lineWidth = 1;
    for (var ri = 1; ri <= 3; ri++) {
      cx.beginPath(); cx.arc(CX, CY, RADAR_R * ri / 3.5, 0, Math.PI * 2); cx.stroke();
    }
    cx.strokeStyle = 'rgba(46,197,182,0.25)'; cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(CX, CY, RADAR_R, 0, Math.PI * 2); cx.stroke();

    // cross-hairs
    cx.strokeStyle = 'rgba(46,197,182,0.1)'; cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(CX - RADAR_R, CY); cx.lineTo(CX + RADAR_R, CY); cx.stroke();
    cx.beginPath(); cx.moveTo(CX, CY - RADAR_R); cx.lineTo(CX, CY + RADAR_R); cx.stroke();

    // radar sweep
    if (state.phase === 'play' || state.phase === 'over') {
      var sweepGrad = cx.createConicalGradient
        ? null  // not universal
        : null;
      // draw sweep as a gradient arc
      cx.save();
      cx.translate(CX, CY);
      cx.rotate(state.sweepAngle);
      var sg = cx.createLinearGradient(0, 0, RADAR_R, 0);
      sg.addColorStop(0, 'rgba(46,197,182,0.35)');
      sg.addColorStop(1, 'rgba(46,197,182,0)');
      cx.beginPath();
      cx.moveTo(0, 0);
      cx.arc(0, 0, RADAR_R, -0.35, 0.02);
      cx.closePath();
      cx.fillStyle = sg;
      cx.fill();
      cx.restore();
    }

    // center breach zone
    var danger = state.tension > 0.7 ? (0.5 + 0.5 * Math.sin(now * 0.015)) : 0;
    var cring = cx.createRadialGradient(CX, CY, 0, CX, CY, CENTER_R + 4);
    cring.addColorStop(0, 'rgba(232,80,46,' + (0.25 + danger * 0.25) + ')');
    cring.addColorStop(1, 'rgba(232,80,46,0)');
    cx.fillStyle = cring;
    cx.beginPath(); cx.arc(CX, CY, CENTER_R + 4, 0, Math.PI * 2); cx.fill();
    cx.strokeStyle = 'rgba(232,80,46,' + (0.5 + danger * 0.4) + ')';
    cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(CX, CY, CENTER_R, 0, Math.PI * 2); cx.stroke();
    // center dot
    cx.fillStyle = 'rgba(232,80,46,' + (0.6 + danger * 0.3) + ')';
    cx.beginPath(); cx.arc(CX, CY, 5, 0, Math.PI * 2); cx.fill();

    // ===== BLIPS =====
    for (var i = 0; i < blips.length; i++) {
      var b = blips[i];
      if (b.dead) continue;
      var pulse = 0.85 + 0.15 * Math.sin(b.pulse);
      var rad = 9 * pulse;
      // glow
      var bg2 = cx.createRadialGradient(b.x, b.y, 0, b.x, b.y, rad * 2.5);
      bg2.addColorStop(0, b.color + 'aa');
      bg2.addColorStop(1, b.color + '00');
      cx.fillStyle = bg2;
      cx.beginPath(); cx.arc(b.x, b.y, rad * 2.5, 0, Math.PI * 2); cx.fill();
      // blip body
      cx.fillStyle = b.color;
      cx.beginPath(); cx.arc(b.x, b.y, rad, 0, Math.PI * 2); cx.fill();
      // inner bright dot
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.beginPath(); cx.arc(b.x, b.y, 3, 0, Math.PI * 2); cx.fill();
      // tail line toward center
      var tx = CX + Math.cos(b.angle) * (b.r + 18);
      var ty = CY + Math.sin(b.angle) * (b.r + 18);
      cx.strokeStyle = b.color + '44'; cx.lineWidth = 1;
      cx.beginPath(); cx.moveTo(b.x, b.y); cx.lineTo(tx, ty); cx.stroke();
      // label
      cx.textAlign = 'center'; cx.fillStyle = b.color;
      cx.font = '600 9px Menlo, monospace';
      cx.fillText(b.label, b.x, b.y - rad - 4);
    }

    // ===== PARTICLES =====
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var a = Math.max(0, 1 - p.t / p.life);
      cx.globalAlpha = a;
      cx.fillStyle = p.color;
      cx.beginPath(); cx.arc(p.x, p.y, 3 * a, 0, Math.PI * 2); cx.fill();
    }
    cx.globalAlpha = 1;

    // ===== SCORE HEADER =====
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 60px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 85);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 106);
      cx.fillStyle = TEAL;
      cx.font = '700 11px Menlo, monospace';
      cx.fillText('EVENTS ROUTED', W / 2, 122);
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 143);
      }
    }

    // ===== FLASHES (floating reward text) =====
    for (var k = 0; k < flashes.length; k++) {
      var fl = flashes[k];
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, CY - 60 - fl.t * 0.7);
      cx.globalAlpha = 1;
    }

    // ===== TITLE SCREEN =====
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('CONTROL TOWER', W / 2, 260);
      cx.fillStyle = TEAL; cx.font = '700 14px Menlo, monospace';
      cx.fillText('REROUTE EVERY SIGNAL', W / 2, 292);
      cx.fillStyle = VERM; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.55 + 0.45 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillText('TAP TO TAKE CONTROL', W / 2, 334);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText("don't let anything reach the center", W / 2, 364);
      // type legend
      var ly = 600;
      cx.font = '600 11px Menlo, monospace';
      for (var ti = 0; ti < TYPES.length; ti++) {
        var t = TYPES[ti];
        var lx = 60 + ti * 72;
        cx.fillStyle = t.color;
        cx.beginPath(); cx.arc(lx, ly, 6, 0, Math.PI * 2); cx.fill();
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.fillText(t.label, lx, ly + 18);
      }
    }

    // ===== CHALLENGE CARD (demo beat 1) =====
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 310);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('47', W / 2, 412);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's control record", W / 2, 444);
    }

    // ===== GAME OVER CARD =====
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('BREACH.', W / 2, 312);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' routed', W / 2, 353);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 396);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('clearer than ' + (100 - pt) + '% of controllers', W / 2, 418);
      if (!DEMO && !BOT) {
        var p2 = 0.55 + 0.45 * Math.sin(now / 290);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — TAKE BACK CONTROL', W / 2, 463);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ===== DEMO CTA CARD =====
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('CONTROL TOWER', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('I cleared ' + (window.__demoScore || 47) + ' without a breach.', W / 2, 340);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 13px Menlo, monospace';
      cx.fillText("can you top the tower?", W / 2, 366);
      var p3 = 0.65 + 0.35 * Math.sin(now / 260);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 47), W / 2, 416);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 446);
      cx.globalAlpha = 1;
    }

    // ===== MUTE TOGGLE (human only) =====
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // init demo script wait
  if (DEMO) demoWaitFrames = demoScript[0] ? demoScript[0].wait : 30;

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
