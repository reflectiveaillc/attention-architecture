<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // Palette of soft calm card tones (avoid vermillion)
  var CARD_PALETTES = [
    { bg: '#2a3f5f', accent: TEAL,   label: 'recipe ideas'     },
    { bg: '#3d4a2e', accent: '#8ecb6a', label: 'garden inspo'   },
    { bg: '#4a2e4a', accent: '#c97fd4', label: 'reading list'   },
    { bg: '#2e3d4a', accent: TEAL,   label: 'travel dreams'    },
    { bg: '#4a3d2e', accent: GOLD,   label: 'morning rituals'  },
    { bg: '#2e4a3d', accent: '#6acb9e', label: 'calm corners'  },
    { bg: '#4a4a2e', accent: '#cbc46a', label: 'future ideas'  },
    { bg: '#2e2e4a', accent: '#8080e0', label: 'things to try' }
  ];

  // --- Game state ---
  var cards, savedCount, runStartTs, phase, overAt, ctaAt, demoAt;
  var flashes, particles;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var botRunsDone = 0;
  var BOX_Y = H - 155;    // top of the keepsake box
  var BOX_H = 120;
  var BOX_W = 260;
  var BOX_X = (W - BOX_W) / 2;
  var CARD_W = 200, CARD_H = 88;
  var SPAWN_INTERVAL = 80; // frames between new cards
  var spawnTimer = 0;
  var lastSaveStep = 0;    // for J.calm step counter

  // Bot state
  var botActionsLeft = 0;
  var botPassive = false;

  // Demo state
  var demoPhase = 0;  // 0=settle, 1=deepen, 2=resolve, 3=cta
  var demoSavesDone = 0;
  var demoTarget = null;
  var demoWait = 60;
  var DEMO_SAVES_TARGET = 7;  // save 7 cards in demo

  function newGame() {
    cards = [];
    flashes = [];
    particles = [];
    savedCount = 0;
    phase = 'title';
    hitStop = 0; shakeAmt = 0; zoom = 1;
    spawnTimer = 0;
    lastSaveStep = 0;
    demoPhase = 0; demoSavesDone = 0; demoTarget = null; demoWait = 60;
    botPassive = false; botActionsLeft = 0;

    if (DEMO) {
      phase = 'play';
      demoAt = performance.now();
      spawnCard();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    } else if (BOT) {
      startRun();
    }
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    spawnTimer = 0;
    savedCount = 0;
    cards = []; flashes = []; particles = [];
    // Bot: will save ~5 cards then go passive so cards fill and timer-lose triggers
    botActionsLeft = 5 + Math.floor(rng() * 3); // 5-7 saves
    botPassive = false;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // --- Card spawning ---
  function spawnCard() {
    var p = CARD_PALETTES[Math.floor(rng() * CARD_PALETTES.length)];
    // Alternate spawn from left or right side
    var fromLeft = rng() > 0.5;
    var startX = fromLeft ? -CARD_W - 10 : W + 10;
    var targetX = 20 + Math.floor(rng() * (W - CARD_W - 40));
    var speed = (0.4 + rng() * 0.5) * (fromLeft ? 1 : -1);
    var y = 80 + Math.floor(rng() * (BOX_Y - 200));
    // drift speed on Y (gentle float)
    var vy = (rng() - 0.5) * 0.15;
    cards.push({
      x: startX,
      y: y,
      w: CARD_W, h: CARD_H,
      vx: speed, vy: vy,
      palette: p,
      saving: false,      // animating toward box
      saveT: 0,
      fromX: 0, fromY: 0,
      opacity: 0,         // fade in
      settled: false,     // has reached a resting x in the play field
      restX: targetX,
      drifting: true,     // still drifting through
      age: 0
    });
  }

  // --- Save a card ---
  function saveCard(card) {
    if (card.saving || card.saved) return;
    card.saving = true;
    card.saveT = 0;
    card.fromX = card.x;
    card.fromY = card.y;
    savedCount++;
    lastSaveStep++;
    // Calm sound: gentle bell
    if (window.J) J.calm(lastSaveStep);
    // zoom pulse on save
    zoom = 1.015;
    // Floating reward text
    flash('+saved', TEAL, 22, card.x + card.w / 2, card.y);
    if (window.LOOP) LOOP.emit('card_saved', { n: savedCount });
  }

  function flash(txt, color, size, x, y) {
    flashes.push({ txt: txt, color: color, size: size, x: x || W / 2, y: y || H / 2 - 80, t: 0 });
  }

  // Box fill particles
  function spawnParticle(x, y) {
    for (var i = 0; i < 5; i++) {
      particles.push({
        x: x, y: y,
        vx: (rng() - 0.5) * 2.5,
        vy: -1 - rng() * 2,
        r: 2 + rng() * 3,
        color: rng() > 0.5 ? TEAL : GOLD,
        life: 1.0
      });
    }
  }

  // --- Game over: called when enough cards drift off screen or after DEMO_SAVES_TARGET in demo ---
  var missedCards = 0;
  var MAX_MISSED = 8; // bot: cards drift away, game ends

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    shakeAmt = 3; // gentle end
    if (window.LOOP) LOOP.emit('game_over', { score: savedCount, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = savedCount;
      // After a brief pause, show CTA
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () {
          if (window.LOOP) LOOP.emit('restart', {});
          startRun();
        }, 600);
      }
    }
  }

  // --- Input ---
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRunHuman(); return; }
    if (phase === 'play') {
      // hit test cards (topmost first)
      for (var i = cards.length - 1; i >= 0; i--) {
        var c = cards[i];
        if (c.saving || c.saved) continue;
        if (px >= c.x && px <= c.x + c.w && py >= c.y && py <= c.y + c.h) {
          saveCard(c);
          return;
        }
      }
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (window.LOOP) LOOP.emit('restart', {});
      startRunHuman();
    }
  }

  function startRunHuman() {
    phase = 'play';
    runStartTs = Date.now();
    cards = []; flashes = []; particles = [];
    savedCount = 0; missedCards = 0;
    spawnTimer = 0; lastSaveStep = 0;
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });

  // --- Autopilots ---
  function autopilot(dt) {
    if (phase !== 'play') return;

    if (DEMO) {
      demoAutopilot(dt);
    } else if (BOT) {
      botAutopilot(dt);
    }
  }

  function demoAutopilot(dt) {
    // Demo arc: settle(0-5s) → deepen(5-11s) → resolve(11-15s) → end
    var elapsed = (performance.now() - demoAt) / 1000;

    if (demoSavesDone >= DEMO_SAVES_TARGET) {
      // Done saving, trigger game over
      if (phase === 'play') gameOver();
      return;
    }

    // pick a target card if we don't have one
    if (demoTarget === null) {
      // find an available settled card
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        if (!c.saving && !c.saved && c.settled && !c.saving) {
          demoTarget = c;
          // Hesitation delay varies by arc phase
          if (elapsed < 5) demoWait = 60 + Math.floor(rng() * 40);       // settle: slow
          else if (elapsed < 11) demoWait = 35 + Math.floor(rng() * 30); // deepen: medium
          else demoWait = 20 + Math.floor(rng() * 20);                   // resolve: quicker
          break;
        }
      }
    }

    if (demoTarget) {
      if (demoTarget.saved || (demoTarget.saving && demoTarget.saveT > 0.5)) {
        demoTarget = null; demoSavesDone++;
        return;
      }
      if (demoWait > 0) { demoWait -= dt; return; }
      // save it
      if (!demoTarget.saving) {
        saveCard(demoTarget);
        demoTarget = null;
        demoSavesDone++;
      }
    }
  }

  function botAutopilot(dt) {
    if (botPassive) return; // let cards drift away to trigger game_over

    // Save a card if available
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      if (!c.saving && !c.saved && c.settled) {
        if (botActionsLeft > 0) {
          saveCard(c);
          botActionsLeft--;
          if (botActionsLeft <= 0) botPassive = true;
        }
        return;
      }
    }
  }

  // --- Main update loop ---
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (phase === 'play') {
      // Spawn cards on interval
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnCard();
        spawnTimer = SPAWN_INTERVAL;
        // bot: reduce interval as game goes on
        if (BOT && !botPassive) SPAWN_INTERVAL = Math.max(40, SPAWN_INTERVAL - 2);
      }

      // Update cards
      for (var i = cards.length - 1; i >= 0; i--) {
        var c = cards[i];
        c.age += dt;
        // Fade in
        if (c.opacity < 1) c.opacity = Math.min(1, c.opacity + 0.04 * dt);

        if (c.saving) {
          // Animate card flying into box
          c.saveT = Math.min(1, c.saveT + 0.045 * dt);
          var t = easeInOut(c.saveT);
          var destX = BOX_X + BOX_W / 2 - CARD_W / 2;
          var destY = BOX_Y + 10;
          c.x = lerp(c.fromX, destX, t);
          c.y = lerp(c.fromY, destY, t);
          c.opacity = 1 - (c.saveT > 0.7 ? (c.saveT - 0.7) / 0.3 : 0);
          if (c.saveT >= 1) {
            // Spawn particle burst at box
            spawnParticle(BOX_X + BOX_W / 2, BOX_Y + 20);
            // hit-stop briefly
            hitStop = 2;
            cards.splice(i, 1);
          }
          continue;
        }

        // Drift: card enters screen and settles at restX
        if (c.drifting) {
          c.x += c.vx * dt;
          c.y += c.vy * dt;
          // Check if on screen
          var onScreen = c.x > -10 && c.x < W - 20;
          if (onScreen) {
            // Settle toward rest position (slow drift)
            var dx = c.restX - c.x;
            if (Math.abs(dx) < 3) {
              c.x = c.restX;
              c.vx = (rng() - 0.5) * 0.1; // gentle sway
              c.drifting = false;
              c.settled = true;
            } else {
              c.vx += dx * 0.003 * dt;
              c.vx *= 0.97; // damping
            }
          }
        } else {
          // Settled: gentle sway
          c.x += c.vx * dt;
          c.y += c.vy * dt;
          // Clamp to play area
          if (c.x < 10) { c.x = 10; c.vx = Math.abs(c.vx) * 0.5; }
          if (c.x > W - CARD_W - 10) { c.x = W - CARD_W - 10; c.vx = -Math.abs(c.vx) * 0.5; }
          if (c.y < 60) { c.y = 60; c.vy = Math.abs(c.vy) * 0.5; }
          if (c.y > BOX_Y - CARD_H - 10) { c.y = BOX_Y - CARD_H - 10; c.vy = -Math.abs(c.vy) * 0.5; }
        }

        // Cards that drift fully off screen (missed)
        if (c.age > 300 && !c.settled) {
          cards.splice(i, 1);
          if (!DEMO) {
            missedCards++;
            if (!BOT && missedCards >= MAX_MISSED) gameOver();
            // For BOT: passive mode means we let enough cards accumulate as missed
            if (BOT && botPassive && missedCards >= MAX_MISSED) gameOver();
          }
        }
      }

      // Demo: end after enough saves
      if (DEMO && demoSavesDone >= DEMO_SAVES_TARGET && phase === 'play') {
        // slight delay then game over
      }

      // Run autopilot
      if (hitStop > 0) { hitStop -= dt; }
      else autopilot(dt);
    }

    // Update particles
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.vy += 0.06 * dt;
      pt.life -= 0.025 * dt;
      if (pt.life <= 0) particles.splice(p, 1);
    }

    // Update flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      flashes[k].t += dt;
      if (flashes[k].t > 45) flashes.splice(k, 1);
    }

    // Juice decay
    shakeAmt *= Math.pow(0.88, dt);
    zoom += (1 - zoom) * 0.1 * dt;

    // --- Render ---
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)'); bg.addColorStop(1, 'rgba(46,197,182,0.01)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // Draw the keepsake box
    drawBox(now);

    // Draw cards
    for (var ci = 0; ci < cards.length; ci++) {
      drawCard(cards[ci], now);
    }

    // Draw particles
    for (var pi = 0; pi < particles.length; pi++) {
      var pt2 = particles[pi];
      cx.globalAlpha = Math.max(0, pt2.life);
      cx.fillStyle = pt2.color;
      cx.beginPath();
      cx.arc(pt2.x, pt2.y, pt2.r, 0, Math.PI * 2);
      cx.fill();
    }
    cx.globalAlpha = 1;

    // Score display
    if (phase === 'play' || phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '700 38px -apple-system, Helvetica, Arial';
      cx.fillText(savedCount, W / 2, 58);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('saved', W / 2, 74);
    }

    // Floating flash texts
    for (var fi = 0; fi < flashes.length; fi++) {
      var fl = flashes[fi];
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.8);
      cx.globalAlpha = 1;
    }

    // Title screen
    if (phase === 'title') {
      cx.fillStyle = 'rgba(11,13,18,0.72)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '800 48px -apple-system, Helvetica, Arial';
      cx.fillText('SAVE BOX', W / 2, 300);
      cx.fillStyle = TEAL; cx.font = '600 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 400);
      cx.globalAlpha = pulse;
      cx.fillText('TAP A CARD TO KEEP IT', W / 2, 346);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('keep what matters', W / 2, 378);
    }

    // Game over / run end
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '800 36px -apple-system, Helvetica, Arial';
      cx.fillText('KEPT ' + savedCount, W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '600 17px -apple-system, Helvetica, Arial';
      cx.fillText('things that mattered', W / 2, 332);
      if (!DEMO && !BOT) {
        var p2 = 0.65 + 0.35 * Math.sin(now / 350);
        cx.fillStyle = TEAL; cx.globalAlpha = p2;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO FILL IT AGAIN', W / 2, 390);
        cx.globalAlpha = 1;
      }
    }

    // Demo CTA card
    if (phase === 'cta') {
      var t2 = (now - ctaAt) / 1000, ease2 = Math.min(1, t2 * 2.0);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease2) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease2; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '800 50px -apple-system, Helvetica, Arial';
      cx.fillText('SAVE BOX', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.65)'; cx.font = '600 19px -apple-system, Helvetica, Arial';
      cx.fillText('keep what calls to you', W / 2, 342);
      var p3 = 0.7 + 0.3 * Math.sin(now / 280);
      cx.fillStyle = TEAL; cx.globalAlpha = ease2 * p3;
      cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 408);
      cx.globalAlpha = ease2;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 444);
      cx.globalAlpha = 1;
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // Draw the keepsake box
  function drawBox(now) {
    var fillRatio = Math.min(savedCount / 12, 1);
    // Box shadow / glow
    cx.save();
    cx.shadowColor = TEAL;
    cx.shadowBlur = 6 + Math.sin(now / 800) * 3;
    // Box body
    cx.fillStyle = 'rgba(46,197,182,0.07)';
    cx.strokeStyle = 'rgba(46,197,182,0.3)';
    cx.lineWidth = 1.5;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(BOX_X, BOX_Y, BOX_W, BOX_H, 12);
    else cx.rect(BOX_X, BOX_Y, BOX_W, BOX_H);
    cx.fill(); cx.stroke();
    cx.shadowBlur = 0;

    // Fill indicator (soft rising fill)
    if (fillRatio > 0) {
      var fillH = (BOX_H - 10) * fillRatio;
      var gy = cx.createLinearGradient(0, BOX_Y + BOX_H - fillH, 0, BOX_Y + BOX_H);
      gy.addColorStop(0, 'rgba(46,197,182,0.15)');
      gy.addColorStop(1, 'rgba(46,197,182,0.30)');
      cx.fillStyle = gy;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(BOX_X + 2, BOX_Y + BOX_H - fillH - 2, BOX_W - 4, fillH, [0, 0, 10, 10]);
      else cx.rect(BOX_X + 2, BOX_Y + BOX_H - fillH - 2, BOX_W - 4, fillH);
      cx.fill();
    }

    // Box label
    cx.fillStyle = 'rgba(46,197,182,0.55)';
    cx.textAlign = 'center';
    cx.font = '600 11px Menlo, monospace';
    cx.fillText('KEEPSAKE BOX', W / 2, BOX_Y + 18);

    // Horizontal divider line
    cx.strokeStyle = 'rgba(46,197,182,0.2)'; cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(BOX_X + 8, BOX_Y + 24); cx.lineTo(BOX_X + BOX_W - 8, BOX_Y + 24); cx.stroke();

    // Stack of saved card thumbnails (shown as small stacked lines)
    var maxShow = Math.min(savedCount, 5);
    for (var s = 0; s < maxShow; s++) {
      var ty = BOX_Y + 36 + s * 14;
      var tw = (BOX_W - 40) * (0.6 + rng() * 0.0); // stable width
      var hue = (160 + s * 30) % 360;
      cx.fillStyle = 'hsla(' + hue + ',55%,55%,0.35)';
      if (cx.roundRect) cx.roundRect(BOX_X + 20, ty, tw, 10, 3);
      else cx.rect(BOX_X + 20, ty, tw, 10);
      cx.fill();
    }
    if (savedCount > 5) {
      cx.fillStyle = 'rgba(46,197,182,0.4)';
      cx.font = '500 10px -apple-system, Helvetica, Arial';
      cx.fillText('+' + (savedCount - 5) + ' more', W / 2, BOX_Y + 110);
    }

    cx.restore();
  }

  // Draw a drifting card
  function drawCard(c, now) {
    cx.save();
    cx.globalAlpha = c.opacity * (c.saving ? Math.max(0, 1 - (c.saveT > 0.7 ? (c.saveT - 0.7) / 0.3 : 0)) : 1);
    cx.translate(c.x + c.w / 2, c.y + c.h / 2);
    // gentle tilt based on sway
    var tilt = c.vx * 0.04;
    cx.rotate(tilt);

    // Card shadow
    cx.shadowColor = 'rgba(0,0,0,0.4)';
    cx.shadowBlur = 8;
    cx.shadowOffsetY = 3;

    // Card body
    cx.fillStyle = c.palette.bg;
    cx.strokeStyle = c.palette.accent + '44';
    cx.lineWidth = 1.5;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(-c.w / 2, -c.h / 2, c.w, c.h, 14);
    else cx.rect(-c.w / 2, -c.h / 2, c.w, c.h);
    cx.fill(); cx.stroke();
    cx.shadowBlur = 0;

    // Accent top bar
    cx.fillStyle = c.palette.accent + '33';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(-c.w / 2, -c.h / 2, c.w, 8, [14, 14, 0, 0]);
    else cx.rect(-c.w / 2, -c.h / 2, c.w, 8);
    cx.fill();

    // Bookmark ribbon (the conditioned path icon — top-right corner)
    cx.fillStyle = c.palette.accent;
    cx.beginPath();
    cx.moveTo(c.w / 2 - 22, -c.h / 2);
    cx.lineTo(c.w / 2, -c.h / 2);
    cx.lineTo(c.w / 2, -c.h / 2 + 28);
    cx.lineTo(c.w / 2 - 11, -c.h / 2 + 20);
    cx.lineTo(c.w / 2 - 22, -c.h / 2 + 28);
    cx.closePath();
    cx.fill();

    // Card label
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.textAlign = 'left';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText(c.palette.label, -c.w / 2 + 14, -c.h / 2 + 32);

    // Decorative lines (content placeholder)
    cx.fillStyle = 'rgba(255,255,255,0.18)';
    for (var li = 0; li < 2; li++) {
      var lw = li === 0 ? c.w - 40 : c.w - 80;
      if (cx.roundRect) cx.roundRect(-c.w / 2 + 14, -c.h / 2 + 46 + li * 14, lw, 6, 3);
      else cx.rect(-c.w / 2 + 14, -c.h / 2 + 46 + li * 14, lw, 6);
      cx.fill();
    }

    // Gentle pulse on hovered/available cards
    if (!c.saving && c.settled) {
      var p = 0.15 + 0.08 * Math.sin(now / 600 + c.fromX);
      cx.strokeStyle = c.palette.accent;
      cx.lineWidth = 1;
      cx.globalAlpha = cx.globalAlpha * p;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(-c.w / 2 - 3, -c.h / 2 - 3, c.w + 6, c.h + 6, 17);
      else cx.rect(-c.w / 2 - 3, -c.h / 2 - 3, c.w + 6, c.h + 6);
      cx.stroke();
    }

    cx.restore();
  }

  // Helpers
  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
