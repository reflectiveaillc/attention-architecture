<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lights Out — Tilt</title>
<!--
  LOOP / attention-architecture — Lights Out

  Engine: calm
  Modes:
    ?demo=1&seed=7        scripted calm arc ~16s → soft CTA → window.__demoDone=true
    ?bot=1&runs=N&seed=5  imperfect autopilot, N runs, window.__botDone=true

<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'lights-out';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  // global rng — seeded once, evolves per run so each bot run is different
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- grid constants ----
  var COLS = 5, ROWS = 7;
  var CELL_W = 64, CELL_H = 64, GAP = 8;
  var GRID_W = COLS * CELL_W + (COLS - 1) * GAP;
  var GRID_H = ROWS * CELL_H + (ROWS - 1) * GAP;
  var GRID_X = (W - GRID_W) / 2;
  var GRID_Y = (H - GRID_H) / 2 - 20;
  var TOTAL = COLS * ROWS; // 35

  // ---- run state ----
  var phase;       // 'play' | 'over' | 'cta'
  var grid;        // array of { on, glow, flicker }
  var litCount;
  var score;
  var runStartTs;
  var runOverAt = 0;
  var ctaAt = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [];
  var best = 0;
  try { best = +localStorage.getItem('lo_best') || 0; } catch (_) {}

  // ---- bot / demo autopilot state ----
  var botRunsDone = 0;
  var autoQueue = [];   // ordered list of cell indices to extinguish
  var autoStep  = 0;
  var autoDelay = 0;    // fractional frames remaining before next action

  // ---- grid helpers ----
  function cellIndex(col, row) { return row * COLS + col; }
  function cellRect(col, row) {
    return {
      x: GRID_X + col * (CELL_W + GAP),
      y: GRID_Y + row * (CELL_H + GAP),
      w: CELL_W, h: CELL_H
    };
  }

  function buildGrid() {
    grid = [];
    for (var i = 0; i < TOTAL; i++) {
      grid.push({ on: true, glow: 1.0, flicker: rng() * 0.10 });
    }
    litCount = TOTAL;
  }

  // Build an extinction order: for demo a row-by-row sweep with slight shuffle;
  // for bot a fully randomised order (re-seeded from current rng state).
  function buildQueue() {
    var order = [];
    for (var i = 0; i < TOTAL; i++) order.push(i);
    // Fisher-Yates using current rng
    for (var i = order.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
    }
    return order;
  }

  function startRun() {
    phase = 'play';
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    buildGrid();
    score = 0;
    runStartTs = Date.now();
    autoQueue = buildQueue();
    autoStep  = 0;
    // initial hesitation before first action (frames at 60fps)
    autoDelay = DEMO ? 52 : 8;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // extinguish one cell
  function extinguish(idx) {
    if (idx < 0 || idx >= grid.length) return;
    var cell = grid[idx];
    if (!cell.on) return;
    cell.on = false;
    litCount--;
    score++;

    if (window.J) J.calm(score);

    zoom = Math.max(zoom, 1.016);

    var remaining = litCount;
    if (remaining === 0) {
      flash('ALL DARK', TEAL, 40);
      zoom = 1.04; shakeAmt = 2.5;
      if (window.J) J.calm(score + 4);
    } else if (remaining <= 3) {
      flash(remaining + ' left', TEAL, 28);
    }

    if (window.LOOP) LOOP.emit('light_out', { n: score, remaining: litCount });

    if (litCount === 0) gameOver();
  }

  function gameOver() {
    phase = 'over';
    runOverAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (newBest) {
      best = score;
      try { localStorage.setItem('lo_best', String(best)); } catch (_) {}
      if (window.J) setTimeout(function () { J.calm(14); }, 350);
    }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2000);
      return;
    }

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 600);
      }
      return;
    }
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0, x: W / 2, y: H / 2 - 40 });
  }

  // ---- autopilot timing ----
  function nextAutoDelay(step) {
    if (DEMO) {
      var frac = step / TOTAL;
      if (frac < 0.30) return 42 + rng() * 16;   // settle: slow
      if (frac < 0.65) return 26 + rng() * 12;   // deepen: medium
      return 14 + rng() * 8;                      // resolve: quicken
    }
    // bot: faster, uniform-ish
    return 6 + rng() * 5;
  }

  function autopilot(dt) {
    if (phase !== 'play') return;
    if (hitStop > 0) return; // respect hit-stop
    if (autoDelay > 0) { autoDelay -= dt; return; }
    if (autoStep >= autoQueue.length) return;
    var idx = autoQueue[autoStep];
    autoStep++;
    extinguish(idx);
    autoDelay = nextAutoDelay(autoStep);
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 540, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function hitCell(px, py) {
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var rect = cellRect(c, r);
        if (px >= rect.x && px <= rect.x + rect.w &&
            py >= rect.y && py <= rect.y + rect.h) {
          return cellIndex(c, r);
        }
      }
    }
    return -1;
  }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'play') {
      if (px !== undefined) {
        var idx = hitCell(px, py);
        if (idx >= 0) extinguish(idx);
      }
      return;
    }
    if (phase === 'over' && performance.now() - runOverAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: score, unit: 'lights off' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') tap();
  });

  // ---- render ----
  function ambientLevel() {
    return TOTAL > 0 ? litCount / TOTAL : 0;
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop decays every frame; autopilot only fires when hitStop <= 0
    if (hitStop > 0) {
      hitStop -= dt;
    } else if (DEMO || BOT) {
      autopilot(dt);
    }

    // juice decay
    zoom      += (1 - zoom) * 0.14 * dt;
    shakeAmt  *= Math.pow(0.82, dt);

    // cell glow smooth fade
    var amb = ambientLevel();
    for (var i = 0; i < grid.length; i++) {
      var cell = grid[i];
      var target = cell.on
        ? (0.80 + cell.flicker * Math.sin(now / 900 + i * 1.3))
        : 0;
      cell.glow += (target - cell.glow) * 0.09 * dt;
      if (!cell.on && cell.glow < 0.01) cell.glow = 0;
    }

    // canvas transforms for juice
    cx.save();
    if (shakeAmt > 0.15 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);

    // ambient room warm glow (fades as lights go out)
    if (amb > 0.02) {
      var roomGlow = cx.createRadialGradient(W / 2, H * 0.4, 0, W / 2, H * 0.4, W * 0.8);
      roomGlow.addColorStop(0, 'rgba(160,190,255,' + (0.08 * amb) + ')');
      roomGlow.addColorStop(1, 'rgba(80,110,200,0)');
      cx.fillStyle = roomGlow;
      cx.fillRect(0, 0, W, H);
    }

    // grid cells
    for (var row = 0; row < ROWS; row++) {
      for (var col = 0; col < COLS; col++) {
        var idx = cellIndex(col, row);
        var cell = grid[idx];
        var rect = cellRect(col, row);
        var g = cell.glow;

        if (g > 0.005) {
          // glow halo
          var haloR = CELL_W * 0.80 * g;
          var halo = cx.createRadialGradient(
            rect.x + rect.w / 2, rect.y + rect.h / 2, 0,
            rect.x + rect.w / 2, rect.y + rect.h / 2, haloR
          );
          halo.addColorStop(0, 'rgba(180,220,255,' + (0.35 * g) + ')');
          halo.addColorStop(1, 'rgba(180,220,255,0)');
          cx.fillStyle = halo;
          cx.fillRect(
            rect.x - haloR * 0.5, rect.y - haloR * 0.5,
            rect.w + haloR, rect.h + haloR
          );

          // cell face
          var bri = Math.round(28 + 52 * g);
          cx.fillStyle = 'hsl(210,' + Math.round(38 + 28 * g) + '%,' + bri + '%)';
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(rect.x, rect.y, rect.w, rect.h, 10);
          else              cx.rect(rect.x, rect.y, rect.w, rect.h);
          cx.fill();

          // top highlight sheen
          if (g > 0.25) {
            cx.fillStyle = 'rgba(255,255,255,' + (0.16 * g) + ')';
            cx.fillRect(rect.x + 8, rect.y + 6, rect.w - 16, (rect.h - 12) * 0.32);
          }
        } else {
          // off: dark socket
          cx.fillStyle = 'rgba(18,22,32,0.9)';
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(rect.x, rect.y, rect.w, rect.h, 10);
          else              cx.rect(rect.x, rect.y, rect.w, rect.h);
          cx.fill();
          cx.strokeStyle = 'rgba(50,70,90,0.28)';
          cx.lineWidth = 1;
          cx.beginPath();
          if (cx.roundRect) cx.roundRect(rect.x + 0.5, rect.y + 0.5, rect.w - 1, rect.h - 1, 10);
          else              cx.rect(rect.x + 0.5, rect.y + 0.5, rect.w - 1, rect.h - 1);
          cx.stroke();
        }
      }
    }

    // score display (top)
    if (phase === 'play' || phase === 'over') {
      cx.textAlign = 'center';
      var scoreAlpha = 0.18 + 0.82 * (1 - amb);
      cx.fillStyle = 'rgba(255,255,255,' + scoreAlpha + ')';
      cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 88);
      cx.fillStyle = 'rgba(255,255,255,0.28)';
      cx.font = '500 11px -apple-system, Helvetica, Arial';
      cx.fillText('LIGHTS OFF', W / 2, 108);
      if (best > 0) {
        cx.fillStyle = 'rgba(255,255,255,0.2)';
        cx.font = '500 10px -apple-system, Helvetica, Arial';
        cx.fillText('BEST ' + best, W / 2, 124);
      }

      // progress bar under grid
      var barY = GRID_Y + GRID_H + 16;
      cx.fillStyle = 'rgba(50,70,90,0.35)';
      cx.fillRect(GRID_X, barY, GRID_W, 3);
      if (score > 0) {
        cx.fillStyle = TEAL;
        cx.fillRect(GRID_X, barY, GRID_W * (score / TOTAL), 3);
      }
    }

    // floating texts
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 36);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '800 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 36) flashes.splice(k, 1);
    }

    // game over overlay
    if (phase === 'over') {
      var overT = Math.min(1, (performance.now() - runOverAt) / 700);
      cx.fillStyle = 'rgba(11,13,18,' + (0.65 * overT) + ')';
      cx.fillRect(0, 0, W, H);

      cx.globalAlpha = overT;
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '800 34px -apple-system, Helvetica, Arial';
      cx.fillText('ROOM IS DARK', W / 2, 296);
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' lights off', W / 2, 336);
      cx.fillStyle = 'rgba(255,255,255,0.40)';
      cx.font = '500 12px -apple-system, Helvetica, Arial';
      var elapsed = ((Date.now() - runStartTs) / 1000).toFixed(1);
      cx.fillText('in ' + elapsed + 's', W / 2, 360);

      if (!DEMO && !BOT) {
        var pulse = 0.55 + 0.45 * Math.sin(now / 340);
        cx.globalAlpha = overT * pulse;
        cx.fillStyle = TEAL;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO GO AGAIN', W / 2, 456);
        cx.globalAlpha = overT;

        // share pill
        cx.fillStyle = 'rgba(46,197,182,0.12)';
        cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else              cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = TEAL;
        cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE YOUR DARK', W / 2, SHARE_R.y + 29);
      }
      cx.globalAlpha = 1;
    }

    // demo CTA card (calm: soft invitation, no dare framing)
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.86 * ease) + ')';
      cx.fillRect(0, 0, W, H);

      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '800 38px -apple-system, Helvetica, Arial';
      cx.fillText('LIGHTS OUT', W / 2, 286);

      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '500 17px -apple-system, Helvetica, Arial';
      cx.fillText('one room at a time.', W / 2, 322);

      var p2 = 0.65 + 0.35 * Math.sin(now / 300);
      cx.globalAlpha = ease * p2;
      cx.fillStyle = TEAL;
      cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 392);

      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.36)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 424);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.42;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- boot ----
  startRun();
  requestAnimationFrame(frame);
})();
</script>
