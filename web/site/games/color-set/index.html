<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Color Set — Tilt</title>
<!--
  LOOP / attention-architecture — Color Set (calm engine)
  Conditioned path: palette-collection / makeup unboxing. Tap drifting swatches
  to fill 16 spectrum slots left→right. Full palette = calm completion glow.
  Circuits: 06-zeigarnik, 05-ease, 02-novelty. Engine: calm.
  Modes:
    ?demo=1&seed=7      scripted calm arc ~16s → soft CTA, sets window.__demoDone
    ?bot=1&runs=N&seed=5  imperfect autopilot, N full-palette runs, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'color-set';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // Seeded RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // 16 evenly spaced hues for the full visible spectrum
  var SPECTRUM_HUES = [0, 23, 45, 70, 95, 120, 145, 170, 195, 220, 245, 270, 295, 320, 340, 355];
  var SLOT_COUNT = 16;
  var SWATCH_R = 26;

  // --- State ---
  var phase, slots, swatches, flashes, runStartTs, best;
  var score, collected, endAt, ctaAt, completeAt;
  var hitStop, zoom, shakeAmt;
  var botRunsDone, demoIdx, demoWait, botWait, botMiss;
  best = 0;
  try { best = +localStorage.getItem('cs_best') || 0; } catch (_) {}

  var SLOT_Y = H - 88;
  var SLOT_SPACING = (W - 32) / SLOT_COUNT;
  var SLOT_X0 = 16 + SLOT_SPACING / 2;
  function slotX(i) { return SLOT_X0 + i * SLOT_SPACING; }

  // --- Zones ---
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function newGame() {
    phase      = 'title';
    slots      = new Array(SLOT_COUNT).fill(null);
    swatches   = [];
    flashes    = [];
    collected  = 0;
    score      = 0;
    endAt      = 0;
    ctaAt      = 0;
    completeAt = 0;
    hitStop    = 0;
    zoom       = 1;
    shakeAmt   = 0;
    botRunsDone = 0;
    demoIdx    = 0;
    demoWait   = 0;
    botWait    = 0;
    botMiss    = 0;

    if (BOT) setTimeout(startPlay, 200);
    if (DEMO) setTimeout(startPlay, 1500);
  }

  function startPlay() {
    if (phase === 'play' || phase === 'complete' || phase === 'over' || phase === 'cta') return;
    phase = 'play';
    runStartTs = Date.now();
    spawnInitialSwatches();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnInitialSwatches() {
    var count = 3;
    for (var i = 0; i < count; i++) spawnSwatch();
  }

  function huesInFlight() {
    var set = {};
    for (var s = 0; s < swatches.length; s++) set[swatches[s].hueIdx] = true;
    return set;
  }

  function spawnSwatch() {
    var inFlight = huesInFlight();
    var available = [];
    for (var i = 0; i < SLOT_COUNT; i++) {
      if (slots[i] === null && !inFlight[i]) available.push(i);
    }
    if (available.length === 0) return;
    var idx = available[Math.floor(rng() * available.length)];
    var hue = SPECTRUM_HUES[idx];
    var fromLeft = rng() > 0.5;
    var yPos = 130 + rng() * (SLOT_Y - 180 - SWATCH_R * 2);
    swatches.push({
      hueIdx: idx,
      hue: hue,
      x: fromLeft ? -SWATCH_R - 10 - rng() * 40 : W + SWATCH_R + 10 + rng() * 40,
      y: yPos,
      vx: fromLeft ? (1.0 + rng() * 0.7) : -(1.0 + rng() * 0.7),
      vy: (rng() - 0.5) * 0.25,
      pulsePhase: rng() * Math.PI * 2,
      glow: 0
    });
  }

  function keepFlowing() {
    if (phase !== 'play' || collected >= SLOT_COUNT) return;
    if (swatches.length < 3) spawnSwatch();
  }

  // --- Input (coordinate-passing) ---
  function tap(x, y) {
    if (DEMO || BOT) return;
    tapAt(x, y);
  }

  function tapAt(x, y) {
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startPlay(); return; }
    if (phase === 'play' && x !== undefined) { tryCollectAt(x, y); return; }
    if ((phase === 'complete' || phase === 'over') && performance.now() - (completeAt || endAt) > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'shades' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  function tryCollectAt(px, py) {
    var bestD = SWATCH_R + 16, bestI = -1;
    for (var i = 0; i < swatches.length; i++) {
      var s = swatches[i];
      var d = Math.sqrt((px - s.x) * (px - s.x) + (py - s.y) * (py - s.y));
      if (d < bestD) { bestD = d; bestI = i; }
    }
    if (bestI >= 0) collectSwatch(bestI);
  }

  function collectSwatch(i) {
    var sw = swatches[i];
    swatches.splice(i, 1);
    slots[sw.hueIdx] = sw.hue;
    collected++;
    score = collected;

    if (window.J) J.calm(collected);

    // Calm juice: very brief hit-stop, soft zoom pulse, micro shake only on full set
    hitStop = 2;
    zoom = 1.02;
    if (collected === SLOT_COUNT) {
      zoom = 1.04;
      shakeAmt = 2;
    }

    var labels = ['LOVELY', 'SOFT', 'WARM', 'PURE', 'GENTLE', 'FRESH', 'EASY', 'QUIET'];
    flash(labels[Math.floor(rng() * labels.length)], TEAL, 28);

    if (window.LOOP) LOOP.emit('swatch_collected', { slot: sw.hueIdx, n: collected });

    if (collected >= SLOT_COUNT) {
      completeGame();
    } else {
      keepFlowing();
      keepFlowing();
    }
  }

  function completeGame() {
    phase = 'complete';
    completeAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;

    if (score > best) {
      best = score;
      try { localStorage.setItem('cs_best', String(best)); } catch (_) {}
    }

    if (window.J) J.calm(16);
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 3200);
      return;
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    slots      = new Array(SLOT_COUNT).fill(null);
    swatches   = [];
    flashes    = [];
    collected  = 0;
    score      = 0;
    hitStop    = 0;
    zoom       = 1;
    shakeAmt   = 0;
    completeAt = 0;
    endAt      = 0;
    botMiss    = 0;
    phase      = 'play';
    runStartTs = Date.now();
    spawnInitialSwatches();
    if (window.LOOP) LOOP.emit('restart', {});
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // --- Autopilot (demo + bot) ---
  // Hesitation pattern for demo: slow settle, quicker middle, lingering resolve
  var demoWaits = [40, 28, 30, 25, 26, 24, 26, 22, 24, 26, 28, 30, 34, 36, 40, 45];

  function autopilot(now) {
    if (phase !== 'play' || swatches.length === 0) return;

    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      // Collect lowest hueIdx available (left-to-right spectrum sweep)
      var bestI = -1, bestSlot = 999;
      for (var i = 0; i < swatches.length; i++) {
        if (swatches[i].hueIdx < bestSlot) { bestSlot = swatches[i].hueIdx; bestI = i; }
      }
      if (bestI < 0) return;
      var s = swatches[bestI];
      // Wait until the target is comfortably inside the canvas
      if (s.x < 50 || s.x > W - 50) return;
      tapAt(s.x + (rng() - 0.5) * 6, s.y + (rng() - 0.5) * 6);
      demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 35;
      demoIdx++;
    } else if (BOT) {
      if (botWait > 0) { botWait--; return; }
      var s = swatches[Math.floor(rng() * swatches.length)];
      if (!s) return;
      if (rng() > 0.18) {
        tapAt(s.x + (rng() - 0.5) * 20, s.y + (rng() - 0.5) * 20);
      } else {
        // deliberate miss: tap empty space (imperfection, no penalty)
        botMiss++;
      }
      botWait = Math.floor(18 + rng() * 28);
    }
  }

  // --- Render helpers ---
  function drawSwatch(s, now) {
    var pulse = 1 + 0.04 * Math.sin(now / 400 + s.pulsePhase);
    var r = SWATCH_R * pulse;
    cx.save();
    // Soft glow on the most recent swatches (only during play)
    if (s.glow > 0) {
      cx.shadowColor = 'hsl(' + s.hue + ',80%,70%)';
      cx.shadowBlur  = 16 * s.glow;
    }
    cx.beginPath();
    cx.arc(s.x, s.y, r, 0, Math.PI * 2);
    var g = cx.createRadialGradient(s.x - r * 0.3, s.y - r * 0.3, 0, s.x, s.y, r);
    g.addColorStop(0, 'hsl(' + s.hue + ',72%,72%)');
    g.addColorStop(1, 'hsl(' + s.hue + ',68%,48%)');
    cx.fillStyle = g;
    cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,0.25)';
    cx.lineWidth = 1.5;
    cx.stroke();
    cx.shadowBlur = 0;
    cx.restore();
  }

  function drawSlot(i, now) {
    var x = slotX(i), y = SLOT_Y;
    var filled = slots[i] !== null;
    var hue = filled ? slots[i] : null;
    var r = 12;

    cx.save();
    cx.beginPath();
    cx.arc(x, y, r, 0, Math.PI * 2);
    if (filled) {
      var age = (phase === 'complete') ? (now - completeAt) : 9999;
      var glow = (age < 3000) ? Math.max(0, 1 - age / 3000) : 0;
      if (glow > 0) {
        cx.shadowColor = 'hsl(' + hue + ',80%,70%)';
        cx.shadowBlur = 14 * glow;
      }
      var g2 = cx.createRadialGradient(x - 3, y - 3, 0, x, y, r);
      g2.addColorStop(0, 'hsl(' + hue + ',75%,72%)');
      g2.addColorStop(1, 'hsl(' + hue + ',68%,50%)');
      cx.fillStyle = g2;
      cx.fill();
      cx.shadowBlur = 0;
      if (phase === 'complete') {
        var shimmer = 0.35 + 0.35 * Math.sin(now / 220 + i * 0.5);
        cx.strokeStyle = 'rgba(255,255,255,' + shimmer + ')';
        cx.lineWidth = 1;
        cx.stroke();
      }
    } else {
      cx.fillStyle = 'rgba(255,255,255,0.04)';
      cx.fill();
      cx.strokeStyle = 'rgba(255,255,255,0.16)';
      cx.lineWidth = 1.5;
      cx.stroke();
    }
    cx.restore();
  }

  function drawPaletteBar(now) {
    cx.save();
    cx.fillStyle = 'rgba(255,255,255,0.05)';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(10, SLOT_Y - 18, W - 20, 36, 18);
    else cx.rect(10, SLOT_Y - 18, W - 20, 36);
    cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,0.08)';
    cx.lineWidth = 1;
    cx.stroke();
    cx.restore();
    for (var i = 0; i < SLOT_COUNT; i++) drawSlot(i, now);
  }

  // --- Main loop ---
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (phase === 'play') {
      for (var i = swatches.length - 1; i >= 0; i--) {
        var s = swatches[i];
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.y < 110 + SWATCH_R) { s.y = 110 + SWATCH_R; s.vy = Math.abs(s.vy); }
        if (s.y > SLOT_Y - 60 - SWATCH_R) { s.y = SLOT_Y - 60 - SWATCH_R; s.vy = -Math.abs(s.vy); }
        if (s.x < -SWATCH_R - 50 || s.x > W + SWATCH_R + 50) {
          swatches.splice(i, 1);
          keepFlowing();
        }
      }
      keepFlowing();
    }

    // hit-stop decay + autopilot (autopilots ignore human input; human ignores autopilots)
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      if ((DEMO || BOT) && phase === 'play') autopilot(now);
    }

    // juice transforms: save/restore around the whole frame draw
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.10 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(100,80,200,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // title / settle card
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 44px -apple-system, Helvetica, Arial';
      cx.fillText('COLOR SET', W / 2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('collect every shade', W / 2, 318);
      var pulse = 0.5 + 0.5 * Math.sin(now / 380);
      cx.globalAlpha = 0.55 + 0.45 * pulse;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText(DEMO ? 'settling in…' : 'TAP A SWATCH TO START', W / 2, 362);
      cx.globalAlpha = 1;
      for (var pi = 0; pi < SLOT_COUNT; pi++) {
        cx.beginPath();
        cx.arc(slotX(pi), SLOT_Y, 12, 0, Math.PI * 2);
        cx.fillStyle = 'hsl(' + SPECTRUM_HUES[pi] + ',65%,58%)';
        cx.fill();
      }
      drawPaletteBar(now);
    }

    // play
    if (phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(collected, W / 2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('of ' + SLOT_COUNT + ' shades', W / 2, 110);
      cx.fillStyle = 'rgba(255,255,255,0.22)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('collect the full spectrum', W / 2, 138);

      for (var si = 0; si < swatches.length; si++) drawSwatch(swatches[si], now);
      drawPaletteBar(now);
    }

    // complete (full palette, calm glow, holds still)
    if (phase === 'complete') {
      var tComp = (now - completeAt) / 1000;
      var ease = Math.min(1, tComp * 1.6);

      for (var ci = 0; ci < swatches.length; ci++) drawSwatch(swatches[ci], now);
      drawPaletteBar(now);

      // soft rainbow glow across the palette
      cx.save();
      cx.globalAlpha = Math.min(0.32, ease * 0.32);
      var glowGrad = cx.createLinearGradient(0, SLOT_Y - 32, W, SLOT_Y + 32);
      for (var gi = 0; gi < SLOT_COUNT; gi++) {
        glowGrad.addColorStop(gi / (SLOT_COUNT - 1), 'hsl(' + SPECTRUM_HUES[gi] + ',70%,60%)');
      }
      cx.fillStyle = glowGrad;
      cx.fillRect(0, SLOT_Y - 32, W, 64);
      cx.restore();

      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 88);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('all ' + SLOT_COUNT + ' shades', W / 2, 112);

      if (ease > 0.5) {
        cx.globalAlpha = (ease - 0.5) * 2;
        cx.fillStyle = TEAL;
        cx.font = '700 22px -apple-system, Helvetica, Arial';
        cx.fillText('FULL SPECTRUM', W / 2, 298);
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.font = '500 15px -apple-system, Helvetica, Arial';
        cx.fillText('every shade, side by side', W / 2, 328);
      }
      cx.globalAlpha = 1;

      if (!DEMO && !BOT && tComp > 1.4) {
        var pp = 0.6 + 0.4 * Math.sin(now / 320);
        cx.globalAlpha = pp;
        cx.fillStyle = TEAL;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO COLLECT AGAIN', W / 2, 420);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE YOUR PALETTE', W / 2, SHARE_R.y + 30);
      }
    }

    // demo soft CTA
    if (phase === 'cta') {
      var tCta = (now - ctaAt) / 1000;
      var ctaEase = Math.min(1, tCta * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ctaEase) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ctaEase;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('COLOR SET', W / 2, 284);
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '500 17px -apple-system, Helvetica, Arial';
      cx.fillText('grow your own palette', W / 2, 322);
      var ctaPulse = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL;
      cx.globalAlpha = ctaEase * ctaPulse;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 396);
      cx.globalAlpha = ctaEase;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // floating reward text
    for (var fi = flashes.length - 1; fi >= 0; fi--) {
      var fl = flashes[fi]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 224 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(fi, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
