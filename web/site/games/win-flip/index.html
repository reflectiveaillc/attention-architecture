        // Fill + glow
        if (state.targetGreen) {
          cx.fillStyle = 'rgba(78,203,113,0.18)';
          cx.beginPath();
          cx.arc(W / 2, circY, circR, 0, Math.PI * 2);
          cx.fill();
          cx.fillStyle = '#4ecb71';
          cx.font = '900 28px -apple-system, Helvetica, Arial';
          cx.fillText('TAP', W / 2, circY + 10);
        } else {
          cx.fillStyle = 'rgba(255,255,255,0.08)';
          cx.beginPath();
          cx.arc(W / 2, circY, circR, 0, Math.PI * 2);
          cx.fill();
          cx.fillStyle = 'rgba(255,255,255,0.2)';
          cx.font = '700 20px -apple-system, Helvetica, Arial';
          cx.fillText('WAIT', W / 2, circY + 8);
        }
      }

      // WAIT: big "HOLD" visual
      if (rule === 'WAIT') {
        cx.fillStyle = 'rgba(242,177,52,0.08)';
        cx.beginPath();
        cx.arc(W / 2, H / 2 + 30, 90, 0, Math.PI * 2);
        cx.fill();
        cx.strokeStyle = GOLD;
        cx.lineWidth = 3;
        cx.beginPath();
        cx.arc(W / 2, H / 2 + 30, 90, 0, Math.PI * 2);
        cx.stroke();
        cx.fillStyle = GOLD; cx.font = '900 26px -apple-system, Helvetica, Arial';
        cx.fillText('HOLD', W / 2, H / 2 + 38);
        // tap count warning
        if (state.tapCount > 0) {
          cx.fillStyle = VERM; cx.font = '800 18px -apple-system, Helvetica, Arial';
          cx.fillText('YOU TAPPED! ×' + state.tapCount, W / 2, H / 2 + 100);
        }
      }

      // FAST: tap counter display
      if (rule === 'FAST') {
        cx.fillStyle = VERM; cx.font = '900 80px -apple-system, Helvetica, Arial';
        cx.fillText(state.tapCount, W / 2, H / 2 + 55);
        cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('taps', W / 2, H / 2 + 82);
      }

      // SLOW: single tap indicator
      if (rule === 'SLOW') {
        var slCircR = 60;
        var tapDone = state.tapCount >= 1;
        cx.strokeStyle = tapDone ? TEAL : 'rgba(255,255,255,0.3)';
        cx.lineWidth = 3;
        cx.beginPath(); cx.arc(W / 2, H / 2 + 30, slCircR, 0, Math.PI * 2); cx.stroke();
        if (tapDone) {
          cx.fillStyle = 'rgba(46,197,182,0.15)';
          cx.beginPath(); cx.arc(W / 2, H / 2 + 30, slCircR, 0, Math.PI * 2); cx.fill();
          cx.fillStyle = TEAL; cx.font = '900 22px -apple-system, Helvetica, Arial';
          cx.fillText('DONE ✓', W / 2, H / 2 + 38);
        } else {
          cx.fillStyle = 'rgba(255,255,255,0.15)';
          cx.font = '700 17px -apple-system, Helvetica, Arial';
          cx.fillText('ONE TAP', W / 2, H / 2 + 38);
        }
      }

      // Score display
      cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 88);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 110);

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — ' + SHARE.by : ''), W / 2, 132);
      }

      // Flip pulse on new rule
      if (state.pulseAmt > 0) {
        cx.strokeStyle = ruleColor;
        cx.lineWidth = 2 + state.pulseAmt * 3;
        cx.globalAlpha = state.pulseAmt * 0.4;
        cx.strokeRect(4, 4, W - 8, H - 8);
        cx.globalAlpha = 1;
      }
    }

    // ===== Game Over =====
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('FLIPPED.', W / 2, 284);
      cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText(state.failReason ? '(' + state.failReason + ')' : '', W / 2, 316);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' flips', W / 2, 352);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 398);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('the rules beat you. they always do.', W / 2, 422);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — FLIP IT BACK', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ===== Demo CTA =====
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 52px -apple-system, Helvetica, Arial';
      cx.fillText('WIN FLIP', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('the rule changed. he lost. you won\'t.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 24), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 445);
      cx.globalAlpha = 1;
    }

    // ===== Floating reward text =====
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dtF;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
