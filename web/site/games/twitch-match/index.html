  function genPair(matchProb, decoyProb) {
    var leftType = Math.floor(rng() * SHAPE_COUNT);
    var leftColor = Math.floor(rng() * COLORS.length);
    var r2 = rng();

      rightType = leftType;

    } else {

      rightType = (leftType + 1 + Math.floor(rng() * (SHAPE_COUNT - 1))) % SHAPE_COUNT;
      rightColor = Math.floor(rng() * COLORS.length);

    return { leftType: leftType, leftColor: leftColor, rightType: rightType, rightColor: rightColor, isMatch: isMatch };

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 192);
      }

      // Timer bar
      var timerProgress = state.answered ? 0 : Math.max(0, state.pairTimer / state.pairDuration);
      var barW = 300, barH = 6, barX = (W - barW) / 2, barY = 208;
      cx.fillStyle = 'rgba(255,255,255,0.1)'; cx.fillRect(barX, barY, barW, barH);
      var timerColor = timerProgress > 0.4 ? TEAL : timerProgress > 0.2 ? GOLD : VERM;
      cx.fillStyle = timerColor; cx.fillRect(barX, barY, barW * timerProgress, barH);

      // Shapes display area
      var shapeY = 380, shapeSize = 120;
      var leftX = W / 2 - 90, rightX = W / 2 + 90;

      // Shape panels background
      cx.fillStyle = 'rgba(255,255,255,0.05)';
      cx.beginPath();
      if (cx.roundRect) {
        cx.roundRect(leftX - shapeSize / 2 - 14, shapeY - shapeSize / 2 - 14, shapeSize + 28, shapeSize + 28, 16);
      } else {
        cx.rect(leftX - shapeSize / 2 - 14, shapeY - shapeSize / 2 - 14, shapeSize + 28, shapeSize + 28);
      }
      cx.fill();
      cx.fillStyle = 'rgba(255,255,255,0.05)';
      cx.beginPath();
      if (cx.roundRect) {
        cx.roundRect(rightX - shapeSize / 2 - 14, shapeY - shapeSize / 2 - 14, shapeSize + 28, shapeSize + 28, 16);
      } else {
        cx.rect(rightX - shapeSize / 2 - 14, shapeY - shapeSize / 2 - 14, shapeSize + 28, shapeSize + 28);
      }
      cx.fill();

      if (p) {
        var alpha = 1;
        if (state.answered && state.revealTimer > 0) {
          alpha = Math.min(1, state.revealTimer / 8);
        }
        cx.globalAlpha = alpha;
        drawShape(p.leftType, leftX, shapeY, shapeSize, COLORS[p.leftColor]);
        drawShape(p.rightType, rightX, shapeY, shapeSize, COLORS[p.rightColor]);
        cx.globalAlpha = 1;

        // Result overlay
        if (state.answered && state.revealTimer > 0) {
          var revA = Math.min(1, state.revealTimer / 10);
          if (state.answerResult === 'correct') {
            cx.globalAlpha = revA;
            cx.fillStyle = TEAL; cx.font = '900 28px -apple-system, Helvetica, Arial';
            cx.fillText('✓', W / 2, shapeY + 10);
            cx.globalAlpha = 1;
          } else if (state.answerResult === 'wrong' || state.answerResult === 'miss') {
            cx.globalAlpha = revA;
            cx.fillStyle = VERM; cx.font = '900 28px -apple-system, Helvetica, Arial';
            cx.fillText('✗', W / 2, shapeY + 10);
            cx.globalAlpha = 1;
          }
        }
      }

      // "VS" divider
      cx.fillStyle = 'rgba(255,255,255,0.18)'; cx.font = '700 14px Menlo, monospace';
      cx.fillText('VS', W / 2, shapeY + 8);

      // Instruction reminder (fades out)
      if (state.round < 5) {
        var fade = Math.max(0, 1 - state.round / 5);
        cx.globalAlpha = fade * 0.6;
        cx.fillStyle = '#fff'; cx.font = '500 13px -apple-system, Helvetica, Arial';
        cx.fillText('TAP = MATCH   IGNORE = DIFFERENT', W / 2, shapeY + 90);
        cx.globalAlpha = 1;
      }

      // Round counter
      cx.fillStyle = 'rgba(255,255,255,0.25)'; cx.font = '500 12px Menlo, monospace';
      cx.fillText('ROUND ' + state.round, W / 2, 248);
    }

    // ---- Game over ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG MOVE.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' matches', W / 2, 348);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 460); cx.globalAlpha = 1;
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- Demo CTA card ----
    if (state.phase === 'cta') {
      var t = (now - state.ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('TWITCH MATCH', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '600 18px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 21) + ' matches.', W / 2, 334);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 21), W / 2, 402);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // ---- Floating flash texts ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 220 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
