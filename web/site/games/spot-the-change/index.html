<script>
(function () {
  'use strict';

  var BOT  = qs.get('bot')  === '1';

  // ---- seeded RNG (mulberry32) ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);

      return ((t ^ t >>> 14) >>> 0) / 4294967296;

  var rng = mulberry32(SEED);

  // ---- Game state ----

    var c, tries = 0;

  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function cellAt(x, y) {
    var col = Math.floor((x - GRID_X) / CELL_W);
    var row = Math.floor((y - GRID_Y) / CELL_H);
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return -1;

      flash('DARE BEATEN', TEAL, 42);

  // ---- drawing ----
  function drawShape(shape, x, y, size, color, alpha) {

    cx.fillStyle = color;
    cx.strokeStyle = 'rgba(255,255,255,0.15)';

      cx.beginPath(); cx.rect(x - size / 2, y - size / 2, size, size); cx.fill(); cx.stroke();

      // triangle
      cx.beginPath();
      cx.moveTo(x, y - size / 2);
      cx.lineTo(x + size / 2, y + size / 2);
      cx.lineTo(x - size / 2, y + size / 2);
      cx.closePath(); cx.fill(); cx.stroke();

      // diamond
      cx.beginPath();
      cx.moveTo(x, y - size / 2);
      cx.lineTo(x + size / 2, y);
      cx.lineTo(x, y + size / 2);
      cx.lineTo(x - size / 2, y);
      cx.closePath(); cx.fill(); cx.stroke();

      drawGrid(currentData, now);

      cx.fillText(flashPhase === 0 ? '▌ A' : 'B ▐', W / 2, GRID_Y - 12);

      var barW = 200, barH = 5;
      var barX = W / 2 - barW / 2, barY = GRID_Y + ROWS * CELL_H + 16;
      cx.fillStyle = 'rgba(255,255,255,0.10)';
      cx.fillRect(barX, barY, barW, barH);
      cx.fillStyle = speedRatio > 0.8 ? VERM : (speedRatio > 0.5 ? GOLD : TEAL);
      cx.fillRect(barX, barY, barW * speedRatio, barH);
      cx.fillStyle = 'rgba(255,255,255,0.25)'; cx.font = '600 10px Menlo, monospace';

        cx.font = '800 13px -apple-system, Helvetica, Arial';

    }

    // ---- GAME OVER ----
    if (phase === 'over') {
      // dim overlay
      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('MISSED IT.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' spotted', W / 2, 345);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('sharper than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462); cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- DEMO CTA ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('SPOT THE CHANGE', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('she spotted ' + (window.__demoScore || 14) + '. your eye faster?', W / 2, 335);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 14), W / 2, 405);
      cx.globalAlpha = ease;

      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ---- mute toggle ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
