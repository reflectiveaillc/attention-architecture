<script type="module">
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;
  var AUTO = DEMO || BOT;                 // no camera in scripted modes

  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio||1,2), scale=1;
  function fit(){var s=Math.min(window.innerWidth/W,window.innerHeight/H);scale=s;cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);}
  window.addEventListener('resize',fit); fit();

  var PINK='#e83d6e', ROSE='#ff7eb3', TEAL='#2ec5b6', GOLD='#f2b134', INK='#0b0d12';
  var MAGENTA='#ff4da6', LAVENDER='#c970ff';

  // ---- shared FaceControl lib ----
  var FC = window.FaceControl;

  // ---- game state ----
  // FACE-CONTROL TUNING — forgiving for real pucker detection:
  //   PUCKER_ON  : threshold to start puckering (natural expression, not maximal)
  //   PUCKER_OFF : hysteresis — stays "on" until signal drops this low
  //   SHOOT_COOL : frames between shots (low so a held pucker keeps firing)
  var PUCKER_ON=0.20, PUCKER_OFF=0.10, SHOOT_COOL=6;
  // Difficulty ramp: first 7s are easy (slow targets, big hearts), then gently escalates
  var PHASE_EASY_S=7;

  var puckerSmoothed=0, isPuckering=false;
  var st, targets, projectiles, particles, best=0, shakeAmt=0, dareBeaten=false;
  try{best=+localStorage.getItem('kc_best')||0;}catch(_){}
  var runStartTs=0, botRunsDone=0, ctaAt=0;

  // test hook — validated by validate-game.mjs and auto-checks
  window.__st=function(){return {st:st, isPuckering:isPuckering, puckerSmoothed:puckerSmoothed, targets:targets, PUCKER_ON:PUCKER_ON};};

  // difficulty ramp helpers
  function elapsed(){ return st && runStartTs ? Math.max(0,(Date.now()-runStartTs)/1000) : 0; }
  function easyPhase(){ return elapsed()<PHASE_EASY_S; }
  // target speed: starts slow, ramps after easy phase
  function targetSpeed(){ return easyPhase() ? 0.8+rng()*0.5 : 1.1+rng()*1.0; }
  // target radius: large at first, slightly smaller after ramp
  function targetRadius(){ return easyPhase() ? 32+rng()*14 : 24+rng()*14; }

  // Target hearts drifting across the screen
  function makeTarget(){
    var side=rng()<0.5; // left or right edge
    var x=side ? -40 : W+40;
    var y=100+rng()*(H-250);
    var spd=targetSpeed();
    var vx=side ? spd : -spd;
    var vy=(rng()-0.5)*0.5;
    return {x:x, y:y, vx:vx, vy:vy, r:targetRadius(), life:1, popping:false, popT:0};
  }

  // Projectile kiss-hearts shot from center-bottom
  function makeProjectile(power){
    var spread=(rng()-0.5)*50;
    var spd=8+power*4;
    var angle=(-Math.PI/2)+(spread/180*Math.PI);
    return {x:W/2, y:H-120, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, r:12+power*5, life:1, age:0};
  }

  // Burst particles on pop
  function makeParticles(x,y,n){
    var out=[];
    for(var i=0;i<n;i++){
      var a=rng()*Math.PI*2, spd=2+rng()*4;
      out.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,r:4+rng()*6,col:rng()<0.5?PINK:ROSE});
    }
    return out;
  }

  function newRun(){
    st={phase:'ready',score:0,overAt:0};
    targets=[]; projectiles=[]; particles=[];
    spawnCool=0; shootCool=0; dareBeaten=false;
    if(AUTO){ st.phase='play'; start(); }
  }
  var spawnCool=0, shootCool=0;
  // spawn first target immediately so the player has something to aim at

  function start(){
    st.phase='play'; st.score=0;
    targets=[]; projectiles=[]; particles=[];
    // First target spawns immediately near center so player can score right away
    targets.push({x:W/2+(rng()<0.5?-80:80), y:H/2-40, vx:(rng()<0.5?0.7:-0.7), vy:0, r:38, life:1, popping:false, popT:0});
    spawnCool=40; shootCool=0; dareBeaten=false;
    runStartTs=Date.now();
    if(window.LOOP) LOOP.emit('play_start',{seed:SEED});
  }

  function shootKiss(power){
    if(st.phase==='ready'){ st.phase='play'; start(); }
    if(st.phase!=='play') return;
    if(shootCool>0) return;
    projectiles.push(makeProjectile(power));
    // fire a spread shot so a rough aim still hits
    projectiles.push(makeProjectile(power*0.8));
    if(power>0.5) projectiles.push(makeProjectile(power*0.6));
    shootCool=SHOOT_COOL;
    if(window.J) J.hit(st.score+1);
    if(window.LOOP) LOOP.emit('kiss_fired',{power:+power.toFixed(2)});
  }

  function popTarget(t,proj){
    t.popping=true; t.popT=0;
    st.score++;
    shakeAmt=5;
    var ps=makeParticles(t.x,t.y,10);
    for(var k=0;k<ps.length;k++) particles.push(ps[k]);
    if(window.J) J.perfect(st.score);
    if(!AUTO&&window.SHARE&&SHARE.dare!==null&&!dareBeaten&&st.score>SHARE.dare){
      dareBeaten=true; if(window.J)J.fanfare(); SHARE.beaten(st.score);
    }
    if(window.LOOP) LOOP.emit('heart_popped',{score:st.score});
  }

  function gameOver(){
    if(st.phase!=='play') return;
    st.phase='over'; st.overAt=performance.now(); shakeAmt=8;
    var dur=(Date.now()-runStartTs)/1000;
    var nb=st.score>best; if(nb){best=st.score;try{localStorage.setItem('kc_best',String(best));}catch(_){}};
    if(window.J){J.death(Math.min(0.3+st.score/15,1)); if(nb)setTimeout(function(){J.fanfare();},450);}
    if(DEMO) window.__demoScore=st.score;
    if(window.LOOP) LOOP.emit('game_over',{score:st.score,dur_s:+dur.toFixed(1)});
    if(BOT){ botRunsDone++; if(botRunsDone>=BOT_RUNS) window.__botDone=true; else setTimeout(function(){newRun();},700); }
    if(DEMO){ setTimeout(function(){ st.phase='cta'; ctaAt=performance.now(); setTimeout(function(){window.__demoDone=true;},3200); },1400); }
  }

  // Game timer — 30s rounds
  var ROUND_S=30;
  function timeLeft(){ return Math.max(0, ROUND_S - (Date.now()-runStartTs)/1000); }

  // ---- input: FACE ONLY. Tap/space ONLY restarts after a crash — never shoots.
  // The core mechanic is driven exclusively by puckering your lips (FC.sig.pucker).
  function tapRestart(){ if(AUTO) return; if(st.phase==='over'&&performance.now()-st.overAt>500){newRun();return;} }
  window.addEventListener('keydown',function(e){ if(e.code==='Space'){e.preventDefault(); tapRestart();} });
  cv.addEventListener('pointerdown', tapRestart);

  // ---- camera start (shared FaceControl lib — proven detection for all face games) ----
  async function startCamera(){
    document.getElementById('perm').style.display='none';
    document.getElementById('ui').style.display='flex';
    await FC.start();               // secure-context check + camera + MediaPipe (in the lib)
    newRun();
    requestAnimationFrame(frame);
  }
  document.getElementById('start').addEventListener('click', startCamera);

  // ---- AUTO autopilot (simulated face — does NOT route through FC) ----
  // Demo: aim for ~6 pops then "choke" (stop puckering) → game timer runs out → game_over
  // Bot: shoot steadily for N runs
  var autoCool=0;
  function autoPucker(){
    if(st.phase!=='play') return 0;
    var giveUp=(DEMO&&st.score>=6)||(BOT&&st.score>=3+botRunsDone*2);
    if(giveUp) return 0;
    // shoot whenever there's a visible target — use moderate value so PiP reads naturally
    var hasTgt=targets.filter(function(t){return !t.popping;}).length>0;
    return hasTgt ? 0.85 : 0.25;
  }

  // ---- render / game loop ----
  var last=performance.now();
  function frame(now){
    var dt=Math.min((now-last)/16.667,3); last=now;

    if(AUTO){
      // AUTO drives game directly with simulated pucker (does NOT use FC)
      autoCool-=dt;
      if(st.phase==='play'){
        var ap=autoPucker();
        puckerSmoothed+=(ap-puckerSmoothed)*0.18*dt;
        if(puckerSmoothed>PUCKER_ON&&autoCool<=0&&shootCool<=0){ shootKiss(puckerSmoothed); autoCool=8; }
      } else {
        puckerSmoothed+=(0-puckerSmoothed)*0.12*dt;
      }
    } else {
      // Human mode: shared FC pulse engine — one pucker = ONE kiss (a 1 in a
      // 1/0 world), fired the instant the lips purse. Small/fast puckers count;
      // re-arms on partial release so kisses chain. No hold-to-spray.
      FC.update(now);
      puckerSmoothed+=(FC.sig.pucker-puckerSmoothed)*0.55*dt;  // rendering only
      isPuckering = FC.gate.pucker;
      if(FC.tap('pucker')){
        if(st.phase==='ready'){ st.phase='play'; start(); }
        if(shootCool<=0) shootKiss(1.2);   // fixed strength — predictable
      }
    }

    shootCool-=dt; if(shootCool<0)shootCool=0;

    if(st.phase==='play'){
      // timer check
      if(timeLeft()<=0){ gameOver(); }

      // spawn targets — keep at least 2 on screen during easy phase, up to 5 later
      spawnCool-=dt;
      var maxT=easyPhase()?3:5, minT=easyPhase()?2:1;
      var activeT=targets.filter(function(t){return !t.popping;}).length;
      var spawnInterval=easyPhase()?20+rng()*15:28+rng()*20;
      if(spawnCool<=0&&activeT<maxT){
        targets.push(makeTarget()); spawnCool=spawnInterval;
      }
      // ensure minimum targets on screen during easy phase
      if(activeT<minT&&spawnCool>8){ spawnCool=8; }

      // move targets
      for(var i=targets.length-1;i>=0;i--){
        var t=targets[i];
        if(t.popping){ t.popT+=dt; if(t.popT>12) targets.splice(i,1); continue; }
        t.x+=t.vx*dt; t.y+=t.vy*dt;
        // bounce off top/bottom
        if(t.y<40) t.vy=Math.abs(t.vy);
        if(t.y>H-40) t.vy=-Math.abs(t.vy);
        // remove if off screen
        if(t.x<-80||t.x>W+80) targets.splice(i,1);
      }

      // move projectiles and collision
      for(var j=projectiles.length-1;j>=0;j--){
        var pr=projectiles[j];
        pr.x+=pr.vx*dt; pr.y+=pr.vy*dt; pr.age+=dt;
        pr.life=Math.max(0,1-pr.age/50);
        if(pr.life<=0||pr.y<-40||pr.x<-50||pr.x>W+50){ projectiles.splice(j,1); continue; }
        // hit test
        var hit=false;
        for(var k=0;k<targets.length;k++){
          var tg=targets[k];
          if(tg.popping) continue;
          var dx=pr.x-tg.x, dy=pr.y-tg.y;
          if(Math.sqrt(dx*dx+dy*dy)<tg.r+pr.r){ popTarget(tg,pr); projectiles.splice(j,1); hit=true; break; }
        }
      }

      // particles
      for(var p=particles.length-1;p>=0;p--){
        var pt=particles[p];
        pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=0.12*dt;
        pt.life-=0.04*dt;
        if(pt.life<=0) particles.splice(p,1);
      }
    }

    // ---- draw ----
    cx.save();
    if(shakeAmt>0.3){cx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt);} shakeAmt*=Math.pow(0.87,dt);

    // background gradient
    var bg=cx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#1a0a14'); bg.addColorStop(1,'#0b0d12');
    cx.fillStyle=bg; cx.fillRect(0,0,W,H);

    // draw ambient floating sparkle BG
    for(var s=0;s<8;s++){
      var sx=((s*137+now*0.03)%W), sy=((s*71+now*0.02)%H);
      cx.globalAlpha=0.06+0.04*Math.sin(now/700+s); cx.fillStyle=PINK;
      drawHeart(cx,sx,sy,6); cx.globalAlpha=1;
    }

    // draw targets
    for(var i=0;i<targets.length;i++){
      var t=targets[i];
      if(t.popping){
        var pe=t.popT/12, pa=1-pe;
        cx.globalAlpha=pa;
        cx.save(); cx.translate(t.x,t.y); cx.scale(1+pe*1.5,1+pe*1.5);
        cx.fillStyle=ROSE; drawHeart(cx,0,0,t.r);
        cx.restore(); cx.globalAlpha=1;
      } else {
        var pulse=1+0.07*Math.sin(now/400+i);
        cx.save(); cx.translate(t.x,t.y); cx.scale(pulse,pulse);
        // glow
        cx.shadowColor=PINK; cx.shadowBlur=18;
        cx.fillStyle=PINK; drawHeart(cx,0,0,t.r);
        cx.shadowBlur=0;
        // inner lighter
        cx.fillStyle=ROSE; cx.globalAlpha=0.5; drawHeart(cx,0,0,t.r*0.55); cx.globalAlpha=1;
        cx.restore();
      }
    }

    // draw projectiles
    for(var j=0;j<projectiles.length;j++){
      var pr=projectiles[j];
      cx.globalAlpha=pr.life*0.9;
      cx.fillStyle=MAGENTA; cx.shadowColor=ROSE; cx.shadowBlur=12;
      drawHeart(cx,pr.x,pr.y,pr.r);
      cx.shadowBlur=0; cx.globalAlpha=1;
    }

    // draw particles
    for(var p=0;p<particles.length;p++){
      var pt=particles[p];
      cx.globalAlpha=pt.life; cx.fillStyle=pt.col;
      drawHeart(cx,pt.x,pt.y,pt.r*pt.life);
      cx.globalAlpha=1;
    }

    // webcam PiP (composited INTO the canvas so recordings capture the face)
    var camW=118, camH=88, cxp=W-camW-12, cyp=12;
    if(!AUTO){
      // Human mode: draw real webcam via FC.drawPiP (mirrors, red border when active)
      FC.drawPiP(cx, cxp, cyp, camW, camH, isPuckering, Math.min(1,puckerSmoothed*1.3), W, H);
      // status label
      var fcLabel = FC.statusLabel() || (FC.sig.pucker > PUCKER_ON ? 'PUCKER UP!' : 'slight pucker fires!');
      cx.fillStyle=(fcLabel.indexOf('http')>=0||fcLabel.indexOf('blocked')>=0)?GOLD:'rgba(255,255,255,0.55)';
      cx.font='700 9px Menlo,monospace'; cx.textAlign='center';
      cx.fillText(fcLabel.toUpperCase(), cxp+camW/2, cyp+camH+22);
    } else {
      // AUTO mode: simulated face (cheeks puff, brows raise, duck-mouth) — does NOT use FC
      cx.save();
      var puckActive=puckerSmoothed>0.15;
      cx.strokeStyle=puckActive?PINK:'rgba(255,255,255,0.3)';
      cx.lineWidth=puckActive?3:2;
      cx.beginPath(); if(cx.roundRect) cx.roundRect(cxp,cyp,camW,camH,12); else cx.rect(cxp,cyp,camW,camH); cx.stroke();
      cx.clip();
      cx.fillStyle='#1a0a14'; cx.fillRect(cxp,cyp,camW,camH);
      var fcx=cxp+camW/2, fcy=cyp+camH/2;
      var pk=puckerSmoothed;
      // face circle
      cx.fillStyle='#f5c88a'; cx.beginPath(); cx.arc(fcx,fcy,28,0,Math.PI*2); cx.fill();
      // cheeks puff out with pucker
      var chk=pk*10;
      cx.fillStyle='rgba(255,150,170,0.45)';
      cx.beginPath(); cx.ellipse(fcx-20,fcy+4,8+chk,5+chk*0.5,0,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.ellipse(fcx+20,fcy+4,8+chk,5+chk*0.5,0,0,Math.PI*2); cx.fill();
      // brows raise with pucker
      var browLift=pk*8;
      cx.strokeStyle='#5a3a1a'; cx.lineWidth=2.5; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(fcx-18,fcy-14-browLift); cx.quadraticCurveTo(fcx-10,fcy-18-browLift,fcx-3,fcy-14-browLift); cx.stroke();
      cx.beginPath(); cx.moveTo(fcx+3,fcy-14-browLift); cx.quadraticCurveTo(fcx+10,fcy-18-browLift,fcx+18,fcy-14-browLift); cx.stroke();
      // eyes wide with pucker
      var eyeR=4+pk*2;
      cx.fillStyle='#222'; cx.beginPath(); cx.arc(fcx-11,fcy-6,eyeR,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(fcx+11,fcy-6,eyeR,0,Math.PI*2); cx.fill();
      cx.fillStyle='#fff'; cx.globalAlpha=0.7;
      cx.beginPath(); cx.arc(fcx-9,fcy-8,1.5,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(fcx+13,fcy-8,1.5,0,Math.PI*2); cx.fill();
      cx.globalAlpha=1;
      // mouth: puckers into a small oval / duck-face
      var mouthW=6+pk*4, mouthH=4+pk*12;
      cx.fillStyle='#c0516a';
      cx.beginPath(); cx.ellipse(fcx,fcy+12,mouthW,mouthH,0,0,Math.PI*2); cx.fill();
      // lip highlight
      cx.fillStyle='rgba(255,200,200,0.5)';
      cx.beginPath(); cx.ellipse(fcx,fcy+12-mouthH*0.4,mouthW*0.6,mouthH*0.25,0,0,Math.PI*2); cx.fill();
      // hearts shooting from mouth when puckering (cute effect)
      if(pk>0.4){
        cx.fillStyle=ROSE; cx.globalAlpha=pk*0.8;
        drawHeart(cx,fcx,fcy+12-mouthH-6,5*pk);
        cx.globalAlpha=1;
      }
      cx.restore();
      cx.fillStyle='rgba(255,255,255,0.55)'; cx.font='700 9px Menlo,monospace'; cx.textAlign='center';
      cx.fillText('DEMO', cxp+camW/2, cyp+camH+22);
    }

    // score
    cx.textAlign='center'; cx.fillStyle='#fff'; cx.font='900 56px -apple-system,Helvetica,Arial';
    if(st&&(st.phase==='play'||st.phase==='over')) cx.fillText(st.score,W/2,90);
    cx.fillStyle='rgba(255,255,255,0.4)'; cx.font='600 12px Menlo,monospace';
    cx.fillText('BEST '+best,W/2,112);

    // timer bar
    if(st&&st.phase==='play'){
      var tl=timeLeft(), frac=tl/ROUND_S;
      cx.fillStyle='rgba(255,255,255,0.1)'; cx.fillRect(24,H-56,W-48,8);
      var tcol = frac>0.3?TEAL:(frac>0.15?GOLD:PINK);
      cx.fillStyle=tcol; cx.fillRect(24,H-56,(W-48)*frac,8);
      cx.fillStyle='rgba(255,255,255,0.5)'; cx.font='700 11px Menlo,monospace'; cx.textAlign='center';
      cx.fillText(Math.ceil(tl)+'s',W/2,H-42);
    }

    // ready
    if(st&&st.phase==='ready'){
      cx.fillStyle=PINK; cx.font='800 18px -apple-system,Helvetica,Arial';
      cx.globalAlpha=0.6+0.4*Math.sin(now/300);
      cx.fillText('PUCKER YOUR LIPS TO SHOOT HEARTS',W/2,H/2-40); cx.globalAlpha=1;
    }

    // game over
    if(st&&st.phase==='over'){
      cx.fillStyle='rgba(11,13,18,0.6)'; cx.fillRect(0,0,W,H);
      cx.fillStyle=PINK; cx.font='900 42px -apple-system,Helvetica,Arial'; cx.textAlign='center';
      cx.fillText('SMOOCH!',W/2,H/2-30);
      cx.fillStyle='#fff'; cx.font='800 24px -apple-system,Helvetica,Arial';
      cx.fillText(st.score+' hearts',W/2,H/2+8);
      if(!AUTO){ cx.fillStyle=TEAL; cx.font='700 15px -apple-system,Helvetica,Arial';
        cx.globalAlpha=0.6+0.4*Math.sin(now/280); cx.fillText('pucker to kiss again',W/2,H/2+50); cx.globalAlpha=1; }
    }

    // cta (demo mode)
    if(st&&st.phase==='cta'){
      var t=(now-ctaAt)/1000, e=Math.min(1,t*2.2);
      cx.fillStyle='rgba(11,13,18,'+(0.82*e)+')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha=e;
      cx.fillStyle='#fff'; cx.font='900 40px -apple-system,Helvetica,Arial'; cx.textAlign='center';
      cx.fillText('KISS CAM',W/2,H/2-30);
      cx.fillStyle=TEAL; cx.font='700 17px -apple-system,Helvetica,Arial';
      cx.fillText('pucker up. pop hearts. look ridiculous.',W/2,H/2+6);
      cx.fillStyle=PINK; cx.font='900 24px -apple-system,Helvetica,Arial';
      cx.fillText('▶ PLAY NOW',W/2,H/2+52);
      cx.globalAlpha=1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // draw a heart shape centered at (x,y) with radius r
  function drawHeart(ctx,x,y,r){
    if(r<=0) return;
    ctx.save(); ctx.translate(x,y-r*0.1);
    ctx.beginPath();
    var s=r/10;
    ctx.moveTo(0,-s*2);
    ctx.bezierCurveTo(s*5,-s*8, s*12,-s*2, 0, s*6);
    ctx.bezierCurveTo(-s*12,-s*2, -s*5,-s*8, 0,-s*2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ---- recording (shared FaceControl lib) ----
  var recBtn=document.getElementById('rec');
  recBtn.addEventListener('click',function(){
    var started=FC.toggleRecord(cv,'kiss-cam.webm',function(){
      recBtn.textContent='● RECORD'; recBtn.classList.remove('on');
      if(window.LOOP) LOOP.emit('recording_saved',{score:st?st.score:0});
    });
    if(started){ recBtn.textContent='■ STOP & SAVE'; recBtn.classList.add('on'); }
  });

  // scripted modes auto-start (no camera prompt)
  if(AUTO){ document.getElementById('perm').style.display='none'; newRun(); requestAnimationFrame(frame); }
})();
</script>
