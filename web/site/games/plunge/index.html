<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 150;
  var SEED = +qs.get('seed') || 42;

  // ---- deterministic RNG ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function rnd(a, b) { return a + (b - a) * rng(); }
  function rndInt(a, b) { return Math.floor(rnd(a, b + 1)); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  // ---- canvas setup ----
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // ---- palette / constants ----
  var INK    = '#0b0d12';
  var TEAL   = '#2ec5b6';
  var VERM   = '#e8502e';
  var GOLD   = '#f2b134';
  var WHITE  = '#ffffff';

  var LANE_W = W / 3;
  var LANES = [LANE_W / 2, W / 2, W - LANE_W / 2];
  // mid-screen: panes rise through the whole bottom half → ~1.6s of reaction
  // horizon (was H-120 ≈ 0.6s, too punishing on phones — Manuel playtest 07-17)
  var COMET_Y = Math.round(H * 0.5);
  var PANE_H = 14;
  var SWIPE_DY = 34;        // min vertical travel for a swipe
  var SWIPE_RATIO = 0.35;   // |dx/dy| threshold for left/right

  // v2 share / mute hit zones (human mode only)
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 552, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  var STAGE_CFG = [
    {}, // dummy index 0
    // windows calibrated so ~150ms-sd timing (avg player proxy) dies panes 14–24:
    // stage 1 ≈ 99%/pane, 2 ≈ 96%, 3 ≈ 92%, 4 ≈ 85%, 5 = elite
    { name: 'WARM-UP', banner: 'STAGE 1 — WARM-UP',  speed: 4.2, spacing: 260, cleanWin: 92, grazeWin: 124 },
    { name: 'AIM',     banner: 'STAGE 2 — AIM',      speed: 4.8, spacing: 240, cleanWin: 86, grazeWin: 114 },
    { name: 'DOUBLES', banner: 'STAGE 3 — DOUBLES',  speed: 5.5, spacing: 212, cleanWin: 84, grazeWin: 110, doubleRate: 0.22 },
    { name: 'THE WALL',banner: 'STAGE 4 — THE WALL', speed: 6.7, spacing: 180, cleanWin: 58, grazeWin: 78, doubleRate: 0.25, fakeRate: 0.25 },
    { name: 'BEYOND',  banner: 'STAGE 5 — BEYOND',   speed: 7.6, spacing: 158, cleanWin: 38, grazeWin: 52, doubleRate: 0.35, tripleRate: 0.18, fakeRate: 0.35 }
  ];

  // ---- state ----
  var state, panes, shards, sparks, flashes, glowRings, cracks, bloom, rings;
  var comet = { lane: 1, x: LANES[1], vx: 0 };
  var shake = 0, banner = null, vignette = { t: 0 };
  var runStartTs = 0, best = 0, bestCombo = 0;
  var nextPaneN = 1, lastSpawnY = 0;
  var ctaAt = 0, botRunsDone = 0;
  var last = performance.now();
  // v2 juice / share layer state
  var hitStop = 0, zoom = 1, dareBeaten = false, challengeAt = 0;

  try { best = +localStorage.getItem('plunge_best') || 0; } catch (_) { best = 0; }
  try { bestCombo = +localStorage.getItem('plunge_combo') || 0; } catch (_) { bestCombo = 0; }

  function newGame() {
    state = {
      phase: 'title', // title | challenge | play | dying | over | cta
      score: 0,
      combo: 0,
      runCombo: 0,
      stage: 1,
      overAt: 0,
      deathStart: 0,
      impactX: LANES[1],
      impactY: COMET_Y
    };
    panes = []; shards = []; sparks = []; flashes = []; glowRings = []; cracks = []; bloom = []; rings = [];
    comet = { lane: 1, x: LANES[1], vx: 0 };
    shake = 0; banner = null; vignette = { t: 0 };
    nextPaneN = 1; lastSpawnY = H + 90;
    runStartTs = Date.now();
    botPlan = null;
    hitStop = 0; zoom = 1; dareBeaten = false; challengeAt = 0;
    demoIdx = 0; demoWait = 0;
    if (window.J) J.tension(0);
    if (DEMO) {
      buildDemoPanes();
      // v2 demo beat 1: competitive challenge card primes the score to beat
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startDemoRun, 1250);
      return;
    }
    if (BOT) {
      state.phase = 'play';
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
  }

  function startDemoRun() {
    if (state.phase !== 'challenge') return;
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function stageOf(n) {
    if (n >= 21) return 5;
    if (n >= 16) return 4;
    if (n >= 11) return 3;
    if (n >= 6) return 2;
    return 1;
  }

  function cfgFor(n) { return STAGE_CFG[stageOf(n)]; }

  function generateLane(n, prevLane, isBurst, burstIdx, burstLen) {
    var stage = stageOf(n);
    var r = rng();
    // stage 1: center bias, small moves
    if (stage === 1) {
      if (n <= 2) return 1;
      if (r < 0.6) return prevLane;
      if (r < 0.8) return (prevLane + 1) % 3;
      return (prevLane + 2) % 3;
    }
    // stage 2: simple alternation
    if (stage === 2) {
      if (r < 0.55) return (prevLane + 1) % 3;
      if (r < 0.75) return (prevLane + 2) % 3;
      return prevLane;
    }
    // stage 3: singles move freely; bursts are handled by burstLanes()
    if (stage === 3) {
      if (r < 0.55) return (prevLane + 1) % 3;
      if (r < 0.8) return (prevLane + 2) % 3;
      return prevLane;
    }
    // stage 4: syncopated, repeats allowed
    if (stage === 4) {
      if (r < 0.25) return prevLane;
      if (r < 0.55) return (prevLane + 1) % 3;
      if (r < 0.85) return (prevLane + 2) % 3;
      return 1;
    }
    // stage 5: chaos
    if (r < 0.22) return prevLane;
    if (r < 0.50) return (prevLane + 1) % 3;
    if (r < 0.78) return (prevLane + 2) % 3;
    return 1;
  }

  // simpler burst helper: returns lane sequence for a burst starting from prevLane
  function burstLanes(stage, prevLane) {
    if (stage === 3) {
      // opposite-ish pair
      var second = (prevLane + 1 + rndInt(0, 1)) % 3;
      return [second, (second + 1 + rndInt(0, 1)) % 3];
    }
    // stage 5 triple: spread
    var a = (prevLane + 1) % 3;
    var b = (a + 1) % 3;
    return [a, b, prevLane];
  }

  // velocity breathes: waves of accel/decel whose amplitude grows with stage —
  // complexity rises as tempo VARIATION, not just monotonic speed-up
  var WAVE_AMP = [0, 0, 0.08, 0.15, 0.22, 0.28]; // by stage

  function spawnPane(n, overrides) {
    var cfg = cfgFor(n);
    var wave = 1 + WAVE_AMP[stageOf(n)] * Math.sin(n * 1.9);
    var p = {
      n: n,
      y: H + 70,
      lane: 1,
      speed: cfg.speed * wave,
      spacing: cfg.spacing,
      cleanWin: cfg.cleanWin,
      grazeWin: cfg.grazeWin,
      gold: rng() < (1 / 6),
      fake: false,
      flickerY: 0,
      shiftY: 0,
      shifted: false,
      smashed: false,
      done: false
    };
    if (overrides) for (var k in overrides) if (overrides.hasOwnProperty(k)) p[k] = overrides[k];
    return p;
  }

  function lastPaneLane() {
    for (var i = panes.length - 1; i >= 0; i--) if (!panes[i].done) return panes[i].lane;
    return 1;
  }

  function queuePanes() {
    var cfg = cfgFor(nextPaneN);
    // gauge spawn room from the newest ACTIVE pane — smashed panes freeze in
    // place and must not block the queue (graze at the comet deadlocked it)
    var newestActive = null;
    for (var qi = panes.length - 1; qi >= 0; qi--) {
      if (!panes[qi].smashed && !panes[qi].done) { newestActive = panes[qi]; break; }
    }
    var needSpawn = !newestActive || newestActive.y <= H + 70 - cfg.spacing;
    if (!needSpawn) return;

    var prevLane = lastPaneLane();
    var stage = stageOf(nextPaneN);
    var burst = null;

    // decide burst
    if (rng() < (cfg.doubleRate || 0)) {
      var len = (stage === 5 && rng() < (cfg.tripleRate || 0)) ? 3 : 2;
      burst = burstLanes(stage, prevLane);
      // ensure burst starts different from prevLane when possible
      if (burst[0] === prevLane && len > 1) burst[0] = (prevLane + 1) % 3;
    }

    if (burst) {
      var gap = (stage === 5) ? 96 : 112;
      for (var i = 0; i < len; i++) {
        var lane = burst[i];
        var p = spawnPane(nextPaneN, { lane: lane });
        if (i > 0) {
          p.y = panes[panes.length - 1].y + gap;
          p.spacing = gap;
        }
        maybeFake(p);
        panes.push(p);
        nextPaneN++;
      }
    } else {
      var lane = generateLane(nextPaneN, prevLane);
      var p = spawnPane(nextPaneN, { lane: lane });
      maybeFake(p);
      panes.push(p);
      nextPaneN++;
    }
  }

  function maybeFake(p) {
    var cfg = cfgFor(p.n);
    if (cfg.fakeRate && rng() < cfg.fakeRate) {
      p.fake = true;
      p.flickerY = H * 0.58;
      p.shiftY = H * 0.46;
      p.newLane = (p.lane + 1 + rndInt(0, 1)) % 3;
    }
  }

  function activePane() {
    for (var i = 0; i < panes.length; i++) if (!panes[i].done && !panes[i].smashed) return panes[i];
    return null;
  }

  function paneInWindow(p) {
    var dy = Math.abs(p.y - COMET_Y);
    return dy <= p.grazeWin;
  }

  function hitResult(p, lane) {
    var dy = Math.abs(p.y - COMET_Y);
    if (p.lane !== lane) return 'miss';
    if (dy <= p.cleanWin) return 'smash';
    if (dy <= p.grazeWin) return 'graze';
    return 'miss';
  }

  // ---- input ----
  var dragStartX = 0, dragStartY = 0, dragStarted = false, dashedThisTouch = false;

  function tap(x, y) {
    if (DEMO || BOT) return false;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return true; }
    if (state.phase === 'title') { startRun(); return true; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'panes' }); return true;
      }
      resetRun(); return true;
    }
    return false;
  }

  function onPointerDown(e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
    if (tap(x, y)) return;
    dragStartX = e.clientX; dragStartY = e.clientY; dragStarted = true; dashedThisTouch = false;
  }
  function onPointerMove(e) {
    if (DEMO || BOT || !dragStarted || dashedThisTouch) return;
    var dx = e.clientX - dragStartX;
    var dy = e.clientY - dragStartY;
    if (dy > SWIPE_DY) { dashedThisTouch = true; dashBySwipe(dx, dy); }
  }
  function onPointerUp(e) {
    if (DEMO || BOT) return;
    dragStarted = false;
  }
  function onKey(e) {
    if (DEMO || BOT) return;
    if (e.code === 'ArrowLeft')  { e.preventDefault(); dash(0); }
    if (e.code === 'ArrowDown' || e.code === 'Space') { e.preventDefault(); dash(1); }
    if (e.code === 'ArrowRight') { e.preventDefault(); dash(2); }
  }
  cv.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerUp);
  window.addEventListener('keydown', onKey);

  function dashBySwipe(dx, dy) {
    var ratio = dx / dy;
    var lane = 1;
    if (ratio < -SWIPE_RATIO) lane = 0;
    else if (ratio > SWIPE_RATIO) lane = 2;
    dash(lane);
  }

  function startRun() {
    if (state.phase === 'play' || state.phase === 'challenge') return;
    newGame();
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    newGame();
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function dash(lane) {
    if (DEMO || BOT) return;
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 260) { resetRun(); return; }
    if (state.phase !== 'play') return;
    comet.lane = lane;
    resolveDash(lane);
  }

  function resolveDash(lane) {
    var candidates = [];
    for (var i = 0; i < panes.length; i++) {
      var p = panes[i];
      if (p.done || p.smashed) continue;
      if (paneInWindow(p)) candidates.push(p);
    }
    if (!candidates.length) { shatter('miss'); return; }
    candidates.sort(function (a, b) { return Math.abs(a.y - COMET_Y) - Math.abs(b.y - COMET_Y); });
    var p = candidates[0];
    var r = hitResult(p, lane);
    if (r === 'smash') doSmash(p, false);
    else if (r === 'graze') doGraze(p);
    else shatter('wrong');
  }

  function doSmash(p, fromDemo) {
    p.smashed = true;
    state.score++;
    var gold = p.gold;
    var addCombo = gold ? 2 : 1;
    state.combo += addCombo;
    state.runCombo = Math.max(state.runCombo, state.combo);
    glowRings.push({ t: 0 });
    spawnShards(p, gold ? 28 : 14, gold);
    // v2 juice
    hitStop = gold ? 5 : 2;
    zoom = gold ? 1.04 : 1.02;
    shake += gold ? 5 : 3;
    flash(gold ? '+2' : '×' + state.combo, gold ? GOLD : VERM, gold ? 46 : 40);
    // v2 sound
    if (window.J) {
      if (gold) { J.gold(); J.perfect(state.combo); }
      else J.hit(state.combo);
    }
    // v2 dare beaten
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    var st = DEMO ? state.stage : stageOf(state.score);
    if (!DEMO && st !== state.stage) { state.stage = st; showStageBanner(st); }
    if (window.LOOP) LOOP.emit('smash', { n: state.score, combo: state.combo, lane: p.lane, gold: gold, stage: st });
  }

  function doGraze(p) {
    p.smashed = true;
    state.score++;
    spawnSparks(16);
    flash('SO CLOSE', TEAL, 36);
    if (window.J) J.near();
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    if (window.LOOP) LOOP.emit('near_miss', { n: state.score });
  }

  function shatter(reason) {
    if (state.phase !== 'play') return;
    state.phase = 'dying';
    state.deathStart = performance.now();
    state.impactX = comet.x;
    state.impactY = COMET_Y;
    // mark active pane dead so it doesn't cause second shatter
    var p = activePane(); if (p) p.done = true;
    var newBestScore = state.score > best;
    var newBestCombo = state.runCombo > bestCombo;
    if (newBestScore) { best = state.score; try { localStorage.setItem('plunge_best', String(best)); } catch (_) {} }
    if (newBestCombo) { bestCombo = state.runCombo; try { localStorage.setItem('plunge_combo', String(bestCombo)); } catch (_) {} }
    spawnCracks(state.impactX, state.impactY);
    spawnBloom(state.impactX, state.impactY, glowRings.length);
    // v2 death spectacle + sound
    shake = 10;
    if (window.J) {
      J.death(Math.min(0.25 + state.score / 35, 1));
      if (newBestScore || newBestCombo) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = state.score;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });

    var deathDur = BOT ? 220 : 420;
    setTimeout(function () {
      state.phase = 'over';
      state.overAt = performance.now();
      if (DEMO) {
        setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
          setTimeout(function () { window.__demoDone = true; }, 3500);
        }, 2200);
      }
      if (BOT) {
        botRunsDone++;
        if (botRunsDone >= BOT_RUNS) window.__botDone = true;
        else setTimeout(function () { resetRun(); }, 500);
      }
    }, deathDur);
  }

  function showStageBanner(s) {
    banner = { stage: s, t: 0 };
    if (window.LOOP) LOOP.emit('stage', { s: s });
  }

  // ---- effects ----
  function spawnShards(p, count, gold) {
    var sx = LANES[p.lane];
    var sy = p.y;
    for (var i = 0; i < count; i++) {
      var ang = rnd(0, Math.PI * 2);
      var spd = rnd(2.2, 7);
      shards.push({
        x: sx + Math.cos(ang) * rnd(0, 18),
        y: sy,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 1.2,
        life: 1,
        decay: rnd(0.018, 0.038),
        color: gold ? GOLD : VERM,
        size: rnd(2, 6),
        rot: rnd(0, Math.PI * 2),
        vr: rnd(-0.15, 0.15)
      });
    }
  }

  function spawnSparks(count) {
    for (var i = 0; i < count; i++) {
      var ang = rnd(-Math.PI / 2 - 0.6, -Math.PI / 2 + 0.6);
      var spd = rnd(1.5, 5);
      sparks.push({
        x: comet.x,
        y: COMET_Y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 1,
        decay: rnd(0.03, 0.07),
        color: rng() < 0.5 ? GOLD : WHITE,
        size: rnd(1, 3)
      });
    }
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  function spawnCracks(ix, iy) {
    for (var i = 0; i < 16; i++) {
      var ang = (i / 16) * Math.PI * 2 + rnd(-0.25, 0.25);
      var c = {
        x: ix, y: iy,
        ang: ang,
        len: 0,
        maxLen: rnd(180, 540),
        width: rnd(0.8, 2.4),
        branches: []
      };
      var branches = rndInt(1, 3);
      for (var b = 0; b < branches; b++) {
        c.branches.push({ at: rnd(0.25, 0.75), ang: ang + rnd(-0.9, 0.9), len: 0, maxLen: rnd(30, 110) });
      }
      cracks.push(c);
    }
  }

  function spawnBloom(ix, iy, ringCount) {
    var waves = Math.max(4, Math.min(ringCount, 24));
    for (var w = 0; w < waves; w++) {
      var pts = [];
      var count = 16 + Math.floor(w * 0.9);
      var baseSpeed = 1.6 + w * 0.34;
      for (var i = 0; i < count; i++) {
        var ang = (i / count) * Math.PI * 2 + rnd(-0.18, 0.18);
        var spd = baseSpeed * rnd(0.75, 1.35);
        var color = (w % 3 === 0) ? GOLD : ((w % 3 === 1) ? VERM : WHITE);
        pts.push({
          x: ix, y: iy,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          life: 1,
          decay: rnd(0.007, 0.014),
          color: color,
          size: rnd(1.5, 4),
          delay: w * 28

      }
      bloom.push({ particles: pts, born: performance.now() });
    }
  }

  // ---- autopilots ----
  var botPlan = null;
  // v2 demo: human-feeling hesitation + near-fail/recovery arc
  var demoIdx = 0, demoWait = 0;
  var demoWaits = [22, 18, 28, 14, 32, 20, 38, 16, 26, 12, 48, 24, 30, 18, 34, 20, 28, 16];
  function autopilot(now) {
    if (state.phase !== 'play') return;
    if (DEMO) demoPilot();
    else if (BOT) botPilot(now);
  }

  function demoPilot() {
    if (demoWait > 0) { demoWait--; return; }
    var p = activePane();
    if (!p || p.demoLane === undefined) return;
    if (p.demoLane === -1) { /* intentional fail: wait for impact */ return; }
    // near-fail + recovery: hesitate on the fake pane until it shifts, then save in graze band
    if (p.fake && !p.shifted) return;
    var cleanTop = COMET_Y + p.cleanWin * 0.5;
    var grazeTop = COMET_Y + (p.cleanWin + p.grazeWin) * 0.55;
    if (p.graze) {
      if (p.y <= grazeTop && p.y > COMET_Y + p.cleanWin) {
        comet.lane = p.demoLane; resolveDash(p.demoLane);
        demoWait = demoWaits[Math.min(demoIdx++, demoWaits.length - 1)] || 20;
      }
    } else {
      if (p.y <= cleanTop && p.y >= COMET_Y - p.cleanWin) {
        comet.lane = p.demoLane; resolveDash(p.demoLane);
        demoWait = demoWaits[Math.min(demoIdx++, demoWaits.length - 1)] || 20;
      }
    }
  }

  function buildDemoPanes() {
    panes = [];
    nextPaneN = 1;
    // compressed stage montage for ~23s clip, final score = 18 → "BEAT 18 PANES"
    var script = [
      { n: 1, lane: 1, y: 0, gold: false },
      { n: 2, lane: 1, y: 300, gold: false },
      { n: 3, lane: 0, y: 600, gold: false }, // stage 2 banner at score 3
      { n: 4, lane: 1, y: 900, gold: false },
      { n: 5, lane: 2, y: 1200, gold: false },
      { n: 6, lane: 0, y: 1500, gold: false }, // stage 3 banner, double start
      { n: 7, lane: 2, y: 1590, gold: false },
      { n: 8, lane: 1, y: 1800, gold: true },
      { n: 9, lane: 2, y: 2100, gold: false }, // stage 4 banner
      { n: 10, lane: 0, y: 2400, gold: false },
      // v2 near-fail + recovery (~60%): fake pane shifts lane at the last instant, saved as graze
      { n: 11, lane: 0, newLane: 2, fake: true, graze: true, y: 2700, gold: false },
      { n: 12, lane: 0, y: 3000, gold: false },
      { n: 13, lane: 2, y: 3300, gold: false },
      { n: 14, lane: 1, y: 3600, gold: false },
      { n: 15, lane: 2, y: 3900, gold: false },
      { n: 16, lane: 0, y: 4200, gold: false },
      { n: 17, lane: 2, y: 4500, gold: false },
      { n: 18, lane: 1, y: 4800, gold: true },
      { n: 19, lane: -1, y: 5100, gold: false } // fail
    ];
    var startY = H + 70;
    for (var i = 0; i < script.length; i++) {
      var s = script[i];
      var cfg = cfgFor(s.n);
      var overrides = {
        y: startY + s.y,
        lane: Math.max(0, s.lane),
        speed: 5.2,              // demo speed: tense but readable
        spacing: 240,
        cleanWin: 36,
        grazeWin: 52,
        gold: s.gold,
        demoLane: s.lane
      };
      if (s.fake) {
        overrides.fake = true;
        overrides.newLane = s.newLane;
        // shift in the upper graze band so the save reads as a near-fail
        overrides.flickerY = COMET_Y + overrides.grazeWin + 10;
        overrides.shiftY = COMET_Y + (overrides.cleanWin + overrides.grazeWin) / 2;
        overrides.demoLane = s.newLane;
      }
      var p = spawnPane(s.n, overrides);
      p.graze = !!s.graze;
      panes.push(p);
    }
    // stage banners fire at demo score boundaries
    state.demoBanners = { 3: 2, 6: 3, 9: 4 };
  }

  function botPilot(now) {
    var p = activePane();
    if (!p) return;
    var commitY = COMET_Y + 160; // bot commits to a lane once pane enters perception zone
    if (!botPlan || botPlan.n !== p.n) {
      if (p.y > commitY) return; // too far to react yet
      var idealY = COMET_Y + 8; // slightly below comet for a clean hit
      var framesToIdeal = Math.max(0, (p.y - idealY) / p.speed);
      var reactionMs = 25 + gauss() * BOT_ERR;
      botPlan = {
        n: p.n,
        lane: p.lane,
        dashAt: now + framesToIdeal * 16.667 + reactionMs,
        sawFake: false
      };
    }
    // react to fake shift if time allows
    if (p.fake && p.shifted && !botPlan.sawFake) {
      botPlan.lane = p.lane;
      botPlan.dashAt += 60 + gauss() * 45;
      botPlan.sawFake = true;
    }
    if (now >= botPlan.dashAt && paneInWindow(p)) { // eager plans wait for the window, like a human would
      botPlan = null;
      comet.lane = p.lane;
      resolveDash(p.lane);
    }
  }

  // ---- physics / update ----
  function update(dt) {
    if (state.phase !== 'play') return;
    if (!DEMO) queuePanes();
    ensureStage();

    // move comet horizontally to target lane
    var targetX = LANES[comet.lane];
    comet.x += (targetX - comet.x) * 0.28 * dt;

    // move panes
    for (var i = 0; i < panes.length; i++) {
      var p = panes[i];
      if (p.smashed || p.done) continue;
      p.y -= p.speed * dt;
      // fake-out flicker and shift
      if (p.fake && !p.shifted && p.y <= p.flickerY && p.y > p.shiftY) {
        p.flicker = true;
      }
      if (p.fake && !p.shifted && p.y <= p.shiftY) {
        p.lane = p.newLane;
        p.shifted = true;
        p.flicker = false;
      }
      // pane passes comet without smash -> fail
      if (p.y < COMET_Y - p.grazeWin && !p.smashed && !p.done) {
        shatter('late');
        return;
      }
    }

    // demo stage banners
    if (DEMO && state.demoBanners && state.demoBanners[state.score]) {
      var st = state.demoBanners[state.score];
      if (state.stage !== st) { state.stage = st; showStageBanner(st); }
    }

    // v2 rising tension
    if (window.J) J.tension(Math.min(state.score / 30, 1));

    // clean up off-screen panes
    while (panes.length && panes[0].y < -60) panes.shift();
  }

  function ensureStage() {
    if (DEMO) return; // demo banners are scripted (compressed montage) — don't double-fire by real score
    var st = stageOf(state.score + 1);
    if (st > state.stage) { state.stage = st; showStageBanner(st); }
  }

  function updateEffects(dt) {
    for (var i = shards.length - 1; i >= 0; i--) {
      var s = shards[i];
      s.x += s.vx * dt; s.y += s.vy * dt;
      s.vy += 0.18 * dt; s.rot += s.vr * dt;
      s.life -= s.decay * dt;
      if (s.life <= 0) shards.splice(i, 1);
    }
    for (var i = sparks.length - 1; i >= 0; i--) {
      var s = sparks[i];
      s.x += s.vx * dt; s.y += s.vy * dt;
      s.vy += 0.12 * dt;
      s.life -= s.decay * dt;
      if (s.life <= 0) sparks.splice(i, 1);
    }
    for (var i = flashes.length - 1; i >= 0; i--) {
      var f = flashes[i]; f.t += dt;
      if (f.t > 42) flashes.splice(i, 1);
    }
    for (var i = 0; i < glowRings.length; i++) glowRings[i].t += dt;
    if (banner) { banner.t += dt; if (banner.t > 65) banner = null; }
    vignette.t += dt;

    // cracks grow
    if (state.phase === 'dying') {
      var progress = clamp((performance.now() - state.deathStart) / (BOT ? 200 : 400), 0, 1);
      for (var i = 0; i < cracks.length; i++) {
        var c = cracks[i];
        c.len = c.maxLen * easeOutCubic(progress);
        for (var b = 0; b < c.branches.length; b++) {
          var br = c.branches[b];
          br.len = br.maxLen * easeOutCubic(progress);
        }
      }
    }

    // bloom
    var now = performance.now();
    for (var i = bloom.length - 1; i >= 0; i--) {
      var wave = bloom[i];
      var allDead = true;
      for (var j = wave.particles.length - 1; j >= 0; j--) {
        var p = wave.particles[j];
        if (now - wave.born < p.delay) { allDead = false; continue; }
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= Math.pow(0.985, dt); p.vy *= Math.pow(0.985, dt);
        p.life -= p.decay * dt;
        if (p.life > 0) allDead = false; else wave.particles.splice(j, 1);
      }
      if (allDead) bloom.splice(i, 1);
    }
  }

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  // ---- render ----
  function drawBackground(stage) {

  function drawPanes() {
    for (var i = 0; i < panes.length; i++) {
      var p = panes[i];

      var y = p.y;

      var gapX = LANES[p.lane];

  function drawComet(stage) {
    var x = comet.x + (shake > 0 ? (rng() - 0.5) * shake * 1.5 : 0);
    var y = COMET_Y + (shake > 0 ? (rng() - 0.5) * shake : 0);

    cx.save();

    var tg = cx.createLinearGradient(x, y, x, y + tailLen);

    cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 474);
    if (!DEMO && !BOT) {
      var pulse = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = pulse; cx.fillStyle = TEAL;
      cx.font = '800 18px -apple-system, Helvetica, Arial';
      cx.fillText('SWIPE — PLUNGE AGAIN', W / 2, 520);
      cx.globalAlpha = 1;
      // v2 share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  function drawCTA() {
    var t = (performance.now() - ctaAt) / 1000;
    var ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.save(); cx.globalAlpha = ease; cx.textAlign = 'center';
    cx.fillStyle = WHITE; cx.font = '900 56px -apple-system, Helvetica, Arial';
    cx.fillText('PLUNGE', W / 2, 286);
    cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
    if (DEMO) {
      cx.fillText('he smashed ' + (window.__demoScore || 18) + '. your move.', W / 2, 332);
      var pulse = 0.7 + 0.3 * Math.sin(performance.now() / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * pulse;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 18) + ' PANES', W / 2, 410);
    } else {
      cx.fillText('the fail is the best part.', W / 2, 332);
      var pulse = 0.7 + 0.3 * Math.sin(performance.now() / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * pulse;
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ ONE MORE PLUNGE', W / 2, 410);
    }
    cx.globalAlpha = ease; cx.fillStyle = TEAL;
    cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 444);
    cx.restore();
  }

  // ---- main loop ----
  function frame(now) {
    var rawDt = (now - last) / 16.667; last = now;
    var dt = Math.min(rawDt, 3);
    if (state.phase === 'dying') dt *= BOT ? 0.5 : 0.25;

    // v2 hit-stop: freeze play physics on big impacts, keep effects animating
    if (hitStop > 0) { hitStop -= dt; }
    else {
      autopilot(now);
      update(dt);
    }
    updateEffects(dt);

    // v2 juice transforms: decaying shake + zoom-pulse
    cx.save();
    if (shake > 0.2 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shake, sy = (rng() - 0.5) * shake;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shake *= Math.pow(0.86, dt); zoom += (1 - zoom) * 0.12 * dt;

    var st = Math.max(state.stage, 1);
    drawBackground(st);
    drawShaft(st);
    drawPanes();
    drawComet(st);
    drawShards();
    drawSparks();
    drawFlashes();
    drawBanner();
    drawVignette(st);

    if (state.phase === 'dying') {
      drawCracks();
      drawBloom();
    }
    if (state.phase === 'over') {
      drawBloom();
      drawOver();
    }
    if (state.phase === 'cta') drawCTA();
    if (state.phase === 'challenge') drawChallenge();
    if (state.phase === 'play') { drawScore(); drawDareBanner(); }
    if (state.phase === 'title') drawTitle();

    drawMute();

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
