<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var scale = 1;
  function fit() {
    var s = Math.min(window.innerWidth / W, window.innerHeight / H);
    scale = s;
    cv.style.width = (W * s) + 'px'; cv.style.height = (H * s) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- the lever bar ----
  var BAR_X = 42, BAR_W = W - 84, BAR_Y = 512, BAR_H = 18;
  // zones as |distance from center 0.5|: jackpot ≤.04, big ≤.12, small ≤.26, else miss
  function zoneOf(p) {
    var d = Math.abs(p - 0.5);
    if (d <= 0.04) return 'jackpot';
    if (d <= 0.12) return 'big';
    if (d <= 0.26) return 'small';
    return 'miss';
  }
  var PAY = { jackpot: 50, big: 15, small: 5, miss: 0 };
  var WITHHOLD_P = 0.18;   // variable-ratio: sometimes the reward is just... not given
  var MAX_PULLS = DEMO ? 99 : BOT ? 12 : 40;

  var st, flashes, burst, fakeCount, fakeExposed, runStartTs, botRunsDone = 0;
  var totalPullsEver = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false, challengeAt = 0;
  var best = 0;
  try { best = +localStorage.getItem('lr_best') || 0; } catch (_) {}

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 11))));
  }

  function newRun() {
    var wasEver = st ? st.everStarted : false;
    st = {
      phase: 'title',
      everStarted: wasEver,
      p: 0, dir: 1, speed: 0.011,
      pulls: 0, rewards: 0, score: 0, streak: 0, missRow: 0,
      stopped: false, stopT: 0, lastZone: null, lastPay: 0, withheld: false,
      overAt: 0
    };
    flashes = []; burst = [];
    fakeCount = 1180 + Math.floor(rng() * 220);
    fakeExposed = false;
    logFeed = []; logQueue = [];
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    if (DEMO) {
      st.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT || wasEver) {
      st.phase = 'play';
      startRun();
    }
  }
  function startRun() {
    st.phase = 'play'; st.everStarted = true;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    pushLog('SUBJECT CONNECTED. Experiment running.', 'sys');
  }

  // ---- the experiment log (the shock layer) ----
  var logFeed = [], logQueue = [];
  function pushLog(text, kind) {
    logQueue.push({ text: text, kind: kind || 'call', shown: 0 });
    if (window.LOOP && kind === 'call') LOOP.emit('callout_shown', { n: st.pulls, text: text.slice(0, 60) });
  }
  // callout script: pull-count thresholds (compressed in demo so the clip catches them)
  var CALLOUTS = [
    { at: DEMO ? 2 : 5,  text: 'Feel the anticipation before the marker lands? Dopamine peaks BEFORE the reward, not after. [CIRCUIT 01]' },
    { at: DEMO ? 4 : 9,  text: 'That near-miss fired your reward circuits almost as hard as a win. Slot machines are built on this. [CIRCUIT 01+04]' },
    { at: DEMO ? 5 : 14, text: 'The "playing now" counter is FAKE. It exists to keep you here. It worked. [CIRCUIT 03]', expose: true },
    { at: DEMO ? 6 : 19, text: 'Rewards are withheld on a variable-ratio schedule — the strongest compulsion pattern known. Pigeons in Skinner boxes behave exactly like you are right now. [CIRCUIT 01]' },
    { at: 26, text: 'The streak counter exists so that quitting feels like LOSING something. [CIRCUIT 04]' },
    { at: 33, text: 'Still here. Every app on your phone runs this same experiment on you, daily, without telling you.' }
  ];
  var calloutIdx = 0;
  function checkCallouts() {
    while (calloutIdx < CALLOUTS.length && st.pulls >= CALLOUTS[calloutIdx].at) {
      var c = CALLOUTS[calloutIdx++];
      pushLog(c.text, 'call');
      if (c.expose) fakeExposed = true;
    }
  }

  // ---- pull ----
  function pull() {
    if (st.stopped || st.phase !== 'play') return;
    st.stopped = true; st.stopT = performance.now();
    st.pulls++; totalPullsEver++;
    fakeCount += Math.floor(rng() * 7) - 2;
    var z = zoneOf(st.p), pay = PAY[z], withheld = false;
    var d = Math.abs(st.p - 0.5);
    var nearMiss = z !== 'jackpot' && d <= 0.075;

    if (z !== 'miss' && rng() < WITHHOLD_P && !(DEMO && demoIdx !== 2)) {
      withheld = true; pay = 0;
      pushLog('Reward WITHHELD on purpose. (You will pull again anyway.)', 'sys');
    }
    st.lastZone = z; st.lastPay = pay; st.withheld = withheld;

    if (z === 'miss') { st.missRow++; st.streak = 0; flash('MISS', 'rgba(255,255,255,0.45)', 34); }
    else if (withheld) { st.missRow = 0; st.streak = 0; flash('. . .', VERM, 38); }
    else {
      st.missRow = 0; st.streak++; st.rewards++;
      st.score += pay * Math.max(1, Math.min(st.streak, 5));
      if (z === 'jackpot') { flash('JACKPOT +' + pay, GOLD, 46); spawnBurst(); }
      else if (nearMiss) { flash('SO CLOSE — +' + pay, VERM, 36); }
      else flash('+' + pay, TEAL, 34);
    }

    // sound + juice (synthesized, human mode only)
    if (z === 'jackpot') {
      if (window.J) J.gold();
      hitStop = 5; zoom = 1.03; shakeAmt = 4;
    } else if (nearMiss) {
      if (window.J) J.near();
      shakeAmt = 5;
    } else if (z !== 'miss' && !withheld) {
      if (window.J) J.hit(Math.max(1, st.streak));
    } else if (withheld) {
      if (window.J) J.near();
    }

    if (nearMiss && window.LOOP) LOOP.emit('near_miss', { n: st.pulls, d: +d.toFixed(3) });
    if (window.LOOP) LOOP.emit('lever_pull', { n: st.pulls, zone: z, pay: pay, withheld: withheld, streak: st.streak });
    checkCallouts();

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && st.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(st.score);
    }

    if (window.J) J.tension(Math.min(st.pulls / MAX_PULLS, 1));

    setTimeout(function () {
      st.stopped = false;
      st.speed = 0.011 + st.pulls * 0.00028;
      if (st.missRow >= 3 || st.pulls >= MAX_PULLS) killScreen();
    }, DEMO ? 950 : 650);
  }

  function killScreen() {
    st.phase = 'over'; st.overAt = performance.now();
    shakeAmt = 9;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = st.score > best;
    if (newBest) { best = st.score; try { localStorage.setItem('lr_best', String(best)); } catch (_) {} }
    if (window.J) {
      J.death(Math.min(0.3 + st.score / 400, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = st.score;
    if (window.LOOP) LOOP.emit('game_over', { score: st.score, pulls: st.pulls, rewards: st.rewards, dur_s: +dur.toFixed(1) });
    if (DEMO) setTimeout(function () { st.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3600); }, 2600);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) window.__botDone = true;
      else setTimeout(function () { newRun(); if (window.LOOP) LOOP.emit('restart', {}); }, 800);
    }
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }
  function spawnBurst() {
    for (var i = 0; i < 26; i++) burst.push({
      x: W / 2, y: BAR_Y, vx: gauss() * 3.2, vy: -2 - rng() * 4, t: 0,
      c: rng() < 0.5 ? GOLD : VERM
    });
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 572, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (st.phase === 'title') { startRun(); return; }
    if (st.phase === 'play') { pull(); return; }
    if (st.phase === 'over' && performance.now() - st.overAt > 500) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: st.score, unit: 'points' }); return;
      }
      newRun(); if (window.LOOP) LOOP.emit('restart', {}); startRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- autopilots ----
  // demo v2: human-feeling run with a near-fail + recovery beat, then the real death.
  // score to beat: the scripted run ends at 185 points.
  var demoScript = [0.02, 0.09, 0.30, 0.10, 0.20, 0.33, 0.03, 0.08, 0.32, 0.34, 0.31];
  var demoWaits = [38, 30, 46, 28, 54, 36, 42, 32, 28, 24, 20];
  var demoIdx = 0, demoWait = 40;
  var botTarget = null;
  function autopilot() {
    if (st.phase !== 'play' || st.stopped) return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      if (demoIdx >= demoScript.length) return;
      var want = demoScript[demoIdx];
      var d = Math.abs(st.p - 0.5);
      if (Math.abs(d - want) <= st.speed * 0.7) { demoIdx++; demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30; pull(); }
    } else if (BOT) {
      if (botTarget === null) botTarget = Math.min(0.49, Math.abs(gauss() * 0.16));
      var db = Math.abs(st.p - 0.5);
      if (Math.abs(db - botTarget) <= st.speed * 0.7) { botTarget = null; pull(); }
    }
  }

  // ---- render ----
  var ctaAt = 0, last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (st.phase === 'play' && !st.stopped) {
      if (hitStop > 0) { hitStop -= dt; }
      else {
        st.p += st.speed * st.dir * dt;
        if (st.p >= 1) { st.p = 1; st.dir = -1; }
        if (st.p <= 0) { st.p = 0; st.dir = 1; }
        autopilot();
      }
    }

    // juice transforms (save/restore around the whole frame)
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg — lab grid
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    cx.strokeStyle = 'rgba(255,255,255,0.04)'; cx.lineWidth = 1;
    for (var gx = 0; gx <= W; gx += 27) { cx.beginPath(); cx.moveTo(gx, 0); cx.lineTo(gx, H); cx.stroke(); }
    for (var gy = 0; gy <= H; gy += 27) { cx.beginPath(); cx.moveTo(0, gy); cx.lineTo(W, gy); cx.stroke(); }

    // header
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '700 11px Menlo, monospace';
    cx.fillText('EXPERIMENT 0' + (1 + (totalPullsEver > 0 ? 1 : 0)) + ' — SUBJECT: YOU', 20, 34);
    // fake live counter
    cx.textAlign = 'right'; cx.font = '700 11px Menlo, monospace';
    if (!fakeExposed) {
      cx.fillStyle = TEAL;
      cx.fillText('● ' + fakeCount + ' playing now', W - 20, 34);
    } else {
      cx.fillStyle = VERM;
      cx.fillText('● ' + fakeCount + ' playing now — FAKE', W - 20, 34);
      cx.strokeStyle = VERM; cx.beginPath();
      cx.moveTo(W - 178, 30); cx.lineTo(W - 78, 30); cx.stroke();
    }

    if (st.phase === 'play' || st.phase === 'over') {
      // score + streak
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(st.score, W / 2, 118);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 12px Menlo, monospace';
      cx.fillText('PULLS ' + st.pulls + '   REWARDS ' + st.rewards + (st.streak > 1 ? '   STREAK x' + Math.min(st.streak, 5) : ''), W / 2, 144);

      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && st.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 168);
      }

      // experiment log
      var ly = 200;
      cx.textAlign = 'left'; cx.font = '600 11px Menlo, monospace';
      cx.fillStyle = 'rgba(255,255,255,0.25)';
      cx.fillText('— LIVE EXPERIMENT LOG —', 24, ly - 16);
      var visible = logFeed.slice(-4);
      for (var li = 0; li < visible.length; li++) {
        var entry = visible[li];
        cx.fillStyle = entry.kind === 'call' ? VERM : 'rgba(255,255,255,0.45)';
        var lines = wrap(entry.text.slice(0, Math.ceil(entry.shown)), 52);
        for (var wl = 0; wl < lines.length; wl++) { cx.fillText(lines[wl], 24, ly); ly += 15; }
        ly += 6;
      }
      // type-on effect
      if (logQueue.length && (!logFeed.length || logFeed[logFeed.length - 1].shown >= logFeed[logFeed.length - 1].text.length)) {
        logFeed.push(logQueue.shift());
      }
      if (logFeed.length) {
        var cur = logFeed[logFeed.length - 1];
        if (cur.shown < cur.text.length) cur.shown += 2.2 * dt;
      }

      // the lever bar
      cx.fillStyle = 'rgba(255,255,255,0.08)';
      cx.fillRect(BAR_X, BAR_Y, BAR_W, BAR_H);
      // zones
      zoneRect(0.26, 'rgba(46,197,182,0.25)');
      zoneRect(0.12, 'rgba(46,197,182,0.55)');
      zoneRect(0.04, GOLD);
      // marker
      var mx = BAR_X + st.p * BAR_W;
      cx.fillStyle = '#fff';
      cx.fillRect(mx - 2, BAR_Y - 10, 4, BAR_H + 20);
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px Menlo, monospace';
      cx.fillText(st.phase === 'play' ? 'TAP TO PULL THE LEVER' : '', W / 2, BAR_Y + 58);
    }

    // particles
    for (var b = burst.length - 1; b >= 0; b--) {
      var pt = burst[b]; pt.t += dt; pt.vy += 0.18 * dt;
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      cx.globalAlpha = Math.max(0, 1 - pt.t / 50);
      cx.fillStyle = pt.c; cx.fillRect(pt.x - 3, pt.y - 3, 6, 6);
      cx.globalAlpha = 1;
      if (pt.t > 50) burst.splice(b, 1);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      cx.globalAlpha = Math.max(0, 1 - fl.t / 42);
      cx.textAlign = 'center'; cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 420 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // title
    if (st.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('LAB RAT', W / 2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 14px Menlo, monospace';
      cx.fillText('a game that tells you', W / 2, 318);
      cx.fillText('how it\'s manipulating you.', W / 2, 338);
      cx.fillStyle = VERM; cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.globalAlpha = 0.6 + 0.4 * Math.sin(now / 300);
      cx.fillText('TAP TO BEGIN THE EXPERIMENT', W / 2, 400);
      cx.globalAlpha = 1;
    }

    // demo challenge card
    if (st.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('185', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // kill screen
    if (st.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.88)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 15px Menlo, monospace';
      cx.fillText('— EXPERIMENT COMPLETE —', W / 2, 200);
      cx.fillStyle = '#fff'; cx.font = '800 30px -apple-system, Helvetica, Arial';
      cx.fillText('Subject: you.', W / 2, 250);
      cx.font = '600 15px Menlo, monospace';
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      var dur = ((st.overAt ? Date.now() : Date.now()) - runStartTs) / 1000;
      cx.fillText('time given: ' + Math.floor(dur / 60) + ':' + String(Math.floor(dur % 60)).padStart(2, '0'), W / 2, 300);
      cx.fillText('lever pulls: ' + st.pulls, W / 2, 324);
      cx.fillText('rewards: ' + st.rewards + '  (ratio engineered)', W / 2, 348);
      var pt = pctTop(st.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText(st.score + ' POINTS', W / 2, 384);
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 414);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px Menlo, monospace';
      cx.fillText('better than ' + (100 - pt) + '% of subjects', W / 2, 438);
      cx.fillStyle = VERM; cx.font = '700 14px Menlo, monospace';
      cx.fillText('every app you own runs this', W / 2, 482);
      cx.fillText('experiment on you. daily.', W / 2, 502);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 12px Menlo, monospace';
      cx.fillText('they just never tell you.', W / 2, 522);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE PULL  (circuit 06, by the way)', W / 2, 548);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (typeof cx.roundRect === 'function') cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA
    if (st.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('LAB RAT', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('subject scored ' + (window.__demoScore || 0) + '. your move.', W / 2, 330);
      cx.fillStyle = VERM; cx.globalAlpha = ease * (0.7 + 0.3 * Math.sin(now / 240));
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 0), W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function zoneRect(halfW, color) {
    cx.fillStyle = color;
    cx.fillRect(BAR_X + (0.5 - halfW) * BAR_W, BAR_Y, halfW * 2 * BAR_W, BAR_H);
  }
  function wrap(text, n) {
    var words = text.split(' '), lines = [], cur = '';
    for (var i = 0; i < words.length; i++) {
      if ((cur + ' ' + words[i]).trim().length > n) { lines.push(cur.trim()); cur = words[i]; }
      else cur += ' ' + words[i];
    }
    if (cur.trim()) lines.push(cur.trim());
    return lines;
  }

  newRun();
  requestAnimationFrame(frame);
})();
