      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- title ----
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('INPUT ROULETTE', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('every screen wants a different move', W / 2, 328);

      // sample icons
      var previewVerbs = ['tap', 'swipe-up', 'double-tap', 'long-press', 'drag'];
      var ix = W / 2 - 80;
      for (var pi = 0; pi < previewVerbs.length; pi++) {
        var pv = previewVerbs[pi];
        drawIcon(pv, ix, 420, 52, VERB_COLORS[pv], 0.55 + 0.3 * Math.sin(now / 400 + pi));
        ix += 40;
      }

      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 500);
      cx.globalAlpha = 1;
    }

    // ---- challenge card (demo beat 1) ----
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('STREAK TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('7', W / 2, 408);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top streak", W / 2, 440);
    }

    // ---- play screen ----
    if (state.phase === 'play' && state.verb) {
      var elapsed2 = now - state.roundStart;
      var progress = Math.min(1, elapsed2 / state.windowMs);
      var verbColor = VERB_COLORS[state.verb] || TEAL;
      var timeLeft = Math.max(0, (state.windowMs - elapsed2) / 1000);

      // big icon, pulsing
      var iconSize = 140;
      var iconPulse = 1 + 0.04 * Math.sin(now / 120);
      drawIcon(state.verb, W / 2, H / 2 - 30, iconSize * iconPulse, verbColor, 1);

      // verb label
      cx.textAlign = 'center';
      cx.fillStyle = verbColor;
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText(VERB_LABELS[state.verb], W / 2, H / 2 + 58);

      // sub-label
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText(VERB_SUBS[state.verb], W / 2, H / 2 + 82);

      // timer bar at top (depleting)
      var barW = W - 60, barH = 6, barX = 30, barY = 160;
      cx.fillStyle = 'rgba(255,255,255,0.1)';
      cx.beginPath();
      cx.roundRect ? cx.roundRect(barX, barY, barW, barH, 3) : cx.rect(barX, barY, barW, barH);
      cx.fill();
      // fill based on time remaining
      var fillW = barW * (1 - progress);
      // color shifts red as time runs out
      var danger = Math.max(0, (progress - 0.6) / 0.4);
      var barColor = danger > 0.5 ? VERM : verbColor;
      cx.fillStyle = barColor;
      cx.globalAlpha = 0.85;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(barX, barY, fillW, barH, 3);
      else cx.rect(barX, barY, fillW, barH);
      cx.fill();
      cx.globalAlpha = 1;

      // streak counter top-left
      cx.textAlign = 'left';
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText('STREAK', 30, 136);
      cx.fillStyle = '#fff';
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText(state.streak, 30, 155);

      // best top-right
      cx.textAlign = 'right';
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST', W - 30, 136);
      cx.fillStyle = 'rgba(255,255,255,0.6)';
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText(best, W - 30, 155);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.textAlign = 'center';
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — ' + SHARE.by : ''), W / 2, 200);
      }

      // urgency flash when < 0.4s
      if (timeLeft < 0.4 && window.J && !DEMO && !BOT) {
        if (!state._tensionFired) {
          state._tensionFired = true;
          J.near();
        }
      } else {
        state._tensionFired = false;
      }
    }

    // ---- result flash ----
    if (state.phase === 'result') {
      // dim overlay
      cx.fillStyle = state.result === 'correct'
        ? 'rgba(46,197,182,0.07)'
        : 'rgba(232,80,46,0.07)';
      cx.fillRect(0, 0, W, H);

      var resultColor = state.result === 'correct' ? TEAL : VERM;
      cx.textAlign = 'center';
      cx.fillStyle = resultColor;
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText(
        state.result === 'correct' ? '✓' : (state.result === 'timeout' ? 'TIME!' : '✗'),
        W / 2, H / 2 - 10
      );

      if (state.result === 'correct') {
        cx.fillStyle = 'rgba(255,255,255,0.6)';
        cx.font = '700 18px -apple-system, Helvetica, Arial';
        cx.fillText('STREAK  ' + state.streak, W / 2, H / 2 + 30);
      }
    }

    // ---- game over ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG MOVE.', W / 2, 288);
      cx.fillStyle = '#fff';
      cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(state.streak + ' streak', W / 2, 334);
      var pt = pctTop(state.streak);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 378);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 402);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 450);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // ---- demo CTA ----
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.5);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('INPUT ROULETTE', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('he hit ' + (window.__demoScore || 7) + '. your fingers faster?', W / 2, 332);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 7), W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 435);
      cx.globalAlpha = 1;
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, (fl.y || H / 2 - 20) - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
