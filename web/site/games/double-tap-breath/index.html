<!--
  LOOP / attention-architecture — Double Tap Breath

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 190;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134', MIST = 'rgba(255,255,255,0.45)';
  var PERFECT_MS = 110, GOOD_MS = 260, DOUBLE_TAP_MS = 260, MAX_MISS = 3;
  var BASE_HEART = 132, AMP_HEART = 38;

  var state, runStartTs, last = performance.now(), hitStop = 0, zoom = 1, shakeAmt = 0, flashes = [];
  var botRunsDone = 0, dareBeaten = false, ctaAt = 0;

  function newGame() {
    state = {
      phase: 'title',
      score: 0, streak: 0, misses: 0,
      breathPhase: 0, breathDur: 4.0,
      overAt: 0, lastAttemptAt: -99999, lockUntil: 0,
      demoIdx: 0, demoDurs: [], demoAmps: [], demoTotalMs: 0,
      botNextBeat: 0, botTarget: 0
    };
    flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    if (DEMO) { buildDemoSchedule(); startRun(); }
    if (BOT) startRun();
  }

  // demo arc: settle → deepen → resolve, ~16s of breaths
  function buildDemoSchedule() {
    state.demoDurs = [4.0, 4.5, 4.5, 3.0];
    state.demoAmps  = [0.72, 0.90, 1.00, 0.78];
    state.breathDur = state.demoDurs[0];
    state.demoTotalMs = 0;
    for (var i = 0; i < state.demoDurs.length; i++) state.demoTotalMs += state.demoDurs[i] * 1000;
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0; state.streak = 0; state.misses = 0; state.breathPhase = 0; state.lastAttemptAt = -99999;
    runStartTs = performance.now();
    if (DEMO) { state.demoIdx = 0; state.breathDur = state.demoDurs[0]; }
    if (BOT) { state.botNextBeat = state.breathDur * 1000; state.botTarget = gauss() * BOT_ERR; }
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function resetRun() {
    state.phase = 'title';
    state.score = 0; state.streak = 0; state.misses = 0; state.breathPhase = 0;
    if (window.LOOP) LOOP.emit('restart', {});
  }

  function gameOver(reason) {
    state.phase = 'over'; state.overAt = performance.now();
    var dur = (state.overAt - runStartTs) / 1000;
    if (window.J) J.calm(state.score);                    // calm engine: only soft chimes
    if (DEMO) window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), reason: reason });
    if (DEMO) {
      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1500);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else { setTimeout(function () { startRun(); }, 1000); }
    }
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 100, y: 520, w: 200, h: 44 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  var lastTapAt = 0;
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    var now = performance.now();
    if (state.phase === 'title') { startRun(); state.lockUntil = now + 280; return; }
    if (state.phase === 'over') {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'breaths' }); return;
      }
      if (now - state.overAt > 350) resetRun();
      return;
    }
    if (state.phase !== 'play') return;
    // double-tap: the conditioned gesture
    if (lastTapAt && now - lastTapAt < DOUBLE_TAP_MS) { lastTapAt = 0; attemptBeat(now); }
    else { lastTapAt = now; }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  function attemptBeat(now) {
    if (state.phase !== 'play') return;
    if (now < state.lockUntil) return;
    if (now - state.lastAttemptAt < state.breathDur * 500) return; // one attempt per breath
    state.lastAttemptAt = now;
    var phase = state.breathPhase;
    var dPhase = Math.min(phase, 1 - phase);                       // distance to nearest beat (0 or 1)
    var offMs = dPhase * state.breathDur * 1000;
    var perfect = offMs < PERFECT_MS;
    var good = offMs < GOOD_MS;
    if (perfect) {
      state.score++; state.streak++;
      flash('+1', GOLD, 40);
      hitStop = 4; zoom = 1.02; shakeAmt = 1.4;
      if (window.J) J.calm(state.streak);
      if (window.LOOP) LOOP.emit('breath_synced', { n: state.score, quality: 'perfect', offset_ms: Math.round(offMs) });
    } else if (good) {
      state.score++; state.streak = 0;
      flash('soft', TEAL, 34);
      zoom = 1.01; shakeAmt = 0.6;
      if (window.J) J.calm(state.score);
      if (window.LOOP) LOOP.emit('near_miss', { n: state.score, offset_ms: Math.round(offMs) });
      if (window.LOOP) LOOP.emit('breath_synced', { n: state.score, quality: 'good', offset_ms: Math.round(offMs) });
    } else {
      state.misses++; state.streak = 0;
      flash('drift', MIST, 28);
      if (window.LOOP) LOOP.emit('breath_missed', { n: state.score, offset_ms: Math.round(offMs) });
      if (state.misses >= MAX_MISS) { gameOver('missed'); }
    }
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 40);
      if (window.J) J.calm(state.score);
      SHARE.beaten(state.score);
    }
  }

  // ---- demo / bot autopilots ----
  function currentAmp() {
    if (DEMO && state.demoIdx < state.demoAmps.length) return AMP_HEART * state.demoAmps[state.demoIdx];
    return AMP_HEART;
  }

  function autopilot(now) {
    if (state.phase !== 'play') return;
    if (DEMO) {
      if (state.demoIdx >= state.demoDurs.length) {
        if (now - runStartTs > state.demoTotalMs + 900) gameOver('complete');
        return;
      }
      var beatAt = 0;
      for (var i = 0; i <= state.demoIdx; i++) beatAt += state.demoDurs[i] * 1000;
      var jitter = gauss() * 70; // human-feeling hesitation around the exhale beat
      if (now - runStartTs >= beatAt + jitter) {
        attemptBeat(now);
        state.demoIdx++;
        if (state.demoIdx < state.demoDurs.length) state.breathDur = state.demoDurs[state.demoIdx];
      }
    } else if (BOT) {
      if (state.score >= 12) { gameOver('complete'); return; } // cap each bot run
      if (now - runStartTs >= state.botNextBeat + state.botTarget) {
        attemptBeat(now);
        state.botNextBeat += state.breathDur * 1000;
        state.botTarget = gauss() * BOT_ERR;
      }
    }
  }

  // ---- render ----
  function heartPath(x, y, size) {
    var h = size * 0.3;
    cx.beginPath();
    cx.moveTo(x, y + h);
    cx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + h);
    cx.bezierCurveTo(x - size / 2, y + (size + h) / 2, x, y + (size + h) / 2, x, y + size);
    cx.bezierCurveTo(x, y + (size + h) / 2, x + size / 2, y + (size + h) / 2, x + size / 2, y + h);
    cx.bezierCurveTo(x + size / 2, y, x, y, x, y + h);
    cx.closePath();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // advance breath; freeze on hit-stop and decay it every frame
    if (hitStop > 0) { hitStop -= dt; }
    else {
      if (state.phase === 'play') {
        state.breathPhase = (state.breathPhase + dt / (60 * state.breathDur)) % 1;
        autopilot(now);
      } else if (state.phase === 'title') {
        state.breathPhase = (state.breathPhase + dt / (60 * 4.0)) % 1;
      }
    }

    // decay juice transforms
    zoom += (1 - zoom) * 0.12 * dt;
    shakeAmt *= Math.pow(0.88, dt);

    cx.save();
    if (shakeAmt > 0.1 || zoom > 1.001) {
      var sx = Math.sin(now / 90) * shakeAmt;
      var sy = Math.cos(now / 110) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)'); bg.addColorStop(1, 'rgba(242,177,52,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // pulsing heart
    var amp = currentAmp();
    var pulse = (1 - Math.cos(state.breathPhase * 2 * Math.PI)) / 2; // 0 at beat, 1 at inhale peak
    var heartSize = BASE_HEART + amp * pulse;
    var heartY = H / 2 - heartSize / 2;

    // soft beat ring near the exhale
    var dPhase = Math.min(state.breathPhase, 1 - state.breathPhase);
    var ringAlpha = Math.max(0, 1 - dPhase * 5) * 0.25;
    if (ringAlpha > 0) {
      cx.beginPath(); cx.arc(W / 2, H / 2, heartSize * 0.62, 0, Math.PI * 2);
      cx.strokeStyle = 'rgba(46,197,182,' + ringAlpha + ')'; cx.lineWidth = 2; cx.stroke();
    }

    // heart glow + fill
    cx.save();
    cx.shadowBlur = 26 * pulse + 14;
    cx.shadowColor = 'rgba(46,197,182,0.32)';
    var g = cx.createRadialGradient(W / 2, H / 2 - heartSize * 0.18, heartSize * 0.12, W / 2, H / 2, heartSize * 0.6);
    g.addColorStop(0, '#5fd6c9'); g.addColorStop(1, TEAL);
    cx.fillStyle = g;
    heartPath(W / 2, heartY, heartSize);
    cx.fill();
    cx.restore();

    // score
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Menlo, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 14px -apple-system, Menlo, Arial';
      cx.fillText(state.score === 1 ? 'BREATH SYNCED' : 'BREATHS SYNCED', W / 2, 122);
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Menlo, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 152);
      }
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 38px -apple-system, Menlo, Arial';
      cx.fillText('DOUBLE TAP', W / 2, 248);
      cx.fillText('BREATH', W / 2, 288);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 16px -apple-system, Menlo, Arial';
      var p = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = p; cx.fillText('double tap on the exhale', W / 2, 540); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Menlo, Arial';
      cx.fillText('tap to begin', W / 2, 566);
    }

    // floating reward text
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Menlo, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 70 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.45)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 38px -apple-system, Menlo, Arial';
      cx.fillText(state.misses >= MAX_MISS ? 'let go' : 'soft end', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Menlo, Arial';
      cx.fillText(state.score + ' breaths', W / 2, 345);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Menlo, Arial';
      cx.fillText('synced with the exhale', W / 2, 372);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Menlo, Arial';
        cx.fillText('TAP — BREATHE AGAIN', W / 2, 440); cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Menlo, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ SHARE', W / 2, SHARE_R.y + 29);
      }
    }

    // demo CTA card — soft invitation
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Menlo, Arial';
      cx.fillText('DOUBLE TAP', W / 2, 286);
      cx.fillText('BREATH', W / 2, 330);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Menlo, Arial';
      cx.fillText('breathe with your thumb', W / 2, 374);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 26px -apple-system, Menlo, Arial';
      cx.fillText('▶ REACH IT', W / 2, 434);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 15px -apple-system, Menlo, Arial';
      cx.fillText('link in bio', W / 2, 468);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Menlo, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
