<meta charset="UTF-8">

<title>Candle Out — Tilt</title>
<!--
  LOOP / attention-architecture — Candle Out
  Engine: calm. Circuits: 05-ease, 07-timing, 06-zeigarnik.
  Conditioned path: the single light left on as security against sleep.
  Mechanic: hold to let the flame burn lower; release it fully.
  Modes:
    ?demo=1&seed=7   scripted calm arc ~16s → soft CTA, sets window.__demoDone
    ?bot=1&runs=N    imperfect hold-and-release, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'candle-out';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game state ----
  // flame: 0 (out) to 1 (full burn)
  // player holds → flame shrinks; release → flame recovers slightly
  // goal: drive flame fully to 0
  var phase = 'title'; // title | play | out | cta
  var flame = 1.0;         // current flame intensity
  var holding = false;
  var runStartTs = 0;
  var score = 0;           // seconds of peaceful darkness (0 until flame out)
  var outAt = 0, ctaAt = 0;

  // juice
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var flashes = [];

  // flicker noise
  var flickerPhase = 0;

  // bot state
  var botRunsDone = 0;
  var botHolding = false;
  var botNextToggle = 0;
  var botPassive = false;   // after K actions, go passive so flame recovers and we can extinguish

  // demo state
  var demoT = 0; // elapsed seconds since demo play started

  function startRun() {
    phase = 'play';
    flame = 1.0;
    holding = false;
    flickerPhase = rng() * Math.PI * 2;
    runStartTs = Date.now();
    outAt = 0;
    flashes = [];
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function extinguish() {
    phase = 'out';
    outAt = performance.now();
    score = Math.round((Date.now() - runStartTs) / 100) / 10; // time in seconds to completion
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: score });
    if (window.LOOP) LOOP.emit('candle_out', { dur_s: score });
    if (window.J) J.calm(4);
    flash('still.', TEAL, 28);

    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { restartRun(); }, 800);
      }
    }
  }

  function restartRun() {
    botPassive = false;
    botHolding = false;
    botNextToggle = 0;
    demoT = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function pointerDown(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play') { holding = true; }
    if (phase === 'out' && performance.now() - outAt > 400) { restartRun(); }
  }
  function pointerUp() {
    if (DEMO || BOT) return;
    if (phase === 'play') { holding = false; }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    pointerDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointerup', pointerUp);
  window.addEventListener('pointercancel', pointerUp);
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') { e.preventDefault(); pointerDown(); }
  });
  window.addEventListener('keyup', function (e) {
    if (e.code === 'Space') pointerUp();
  });

  // ---- demo autopilot ----
  // Arc: settle (0-4s, gentle hold/release cycles) →
  //      deepen (4-10s, longer holds, flame getting low) →
  //      resolve (10-14s, sustained hold to extinction) →
  //      (flame out triggers 'out' phase → cta)
  function demoAutopilot(dt) {
    if (phase !== 'play') return;
    demoT += dt / 60; // approximate seconds at 60fps

    if (demoT < 4) {
      // settle phase: gentle 1s hold / 0.5s release cycles
      var cycle = demoT % 1.5;
      holding = cycle < 1.0;
    } else if (demoT < 10) {
      // deepen: 2s hold / 0.5s release
      var cycle2 = (demoT - 4) % 2.5;
      holding = cycle2 < 2.0;
    } else {
      // resolve: sustained hold until flame out
      holding = true;
    }
  }

  // ---- bot autopilot ----
  // Imperfect: hold for random durations, release briefly, eventually extinguish
  function botAutopilot(dt, now) {
    if (phase !== 'play') return;
    // After botPassive timeout the flame should drain to 0 (pure hold)
    if (!botPassive) {
      if (now >= botNextToggle) {
        botHolding = !botHolding;
        if (botHolding) {
          // hold for 0.8–2.5s
          botNextToggle = now + (0.8 + rng() * 1.7) * 1000;
        } else {
          // release for 0.2–0.8s
          botNextToggle = now + (0.2 + rng() * 0.6) * 1000;
        }
        // after ~5 cycles go passive (pure hold) to drain the candle
        if (rng() < 0.18) { botPassive = true; }
      }
      holding = botHolding;
    } else {
      holding = true; // sustained hold → flame drains to 0 → extinguish fires
    }
  }

  // ---- render helpers ----
  function drawFlame(cx, cx_, cy, intensity, flicker, now) {
    if (intensity <= 0) return;
    var fl = intensity;
    var baseW = 18 + fl * 22;
    var baseH = 20 + fl * 50;
    var flk = 1 + flicker * 0.12 * fl;

    // outer glow
    var gRadius = baseW * 3 * fl;
    var gx = cx.createRadialGradient(cx_, cy, 0, cx_, cy, gRadius);
    gx.addColorStop(0, 'rgba(242,177,52,' + (0.18 * fl) + ')');
    gx.addColorStop(0.5, 'rgba(242,177,52,' + (0.06 * fl) + ')');
    gx.addColorStop(1, 'rgba(242,177,52,0)');
    cx.fillStyle = gx;
    cx.beginPath();
    cx.arc(cx_, cy, gRadius, 0, Math.PI * 2);
    cx.fill();

    // flame body
    cx.save();
    cx.translate(cx_, cy);
    cx.scale(flk, 1);

    var fGrad = cx.createRadialGradient(0, 0, 0, 0, -baseH * 0.3, baseH);
    fGrad.addColorStop(0, 'rgba(255,255,200,' + (0.95 * fl) + ')');
    fGrad.addColorStop(0.25, 'rgba(255,200,80,' + (0.9 * fl) + ')');
    fGrad.addColorStop(0.6, 'rgba(242,177,52,' + (0.75 * fl) + ')');
    fGrad.addColorStop(1, 'rgba(200,80,30,0)');

    cx.beginPath();
    cx.moveTo(0, 0);
    cx.bezierCurveTo(-baseW * 0.7, -baseH * 0.3,
                     -baseW * 0.5, -baseH * 0.7,
                     0, -baseH);
    cx.bezierCurveTo(baseW * 0.5, -baseH * 0.7,
                     baseW * 0.7, -baseH * 0.3,
                     0, 0);
    cx.fillStyle = fGrad;
    cx.fill();
    cx.restore();
  }

  function drawCandle(cx, cx_, baseY, fl) {
    var cH = 160, cW = 36;
    var cy = baseY - cH;
    // wax body gradient
    var wax = cx.createLinearGradient(cx_ - cW / 2, 0, cx_ + cW / 2, 0);
    wax.addColorStop(0, '#c8b89a');
    wax.addColorStop(0.35, '#ede0cc');
    wax.addColorStop(0.7, '#d4c4a8');
    wax.addColorStop(1, '#a89070');
    cx.fillStyle = wax;
    cx.fillRect(cx_ - cW / 2, cy, cW, cH);

    // melted wax drips
    cx.fillStyle = 'rgba(237,224,204,0.7)';
    cx.beginPath();
    cx.ellipse(cx_, cy, cW / 2, 6, 0, 0, Math.PI * 2);
    cx.fill();

    // wick
    var wickH = 12 + fl * 4;
    cx.strokeStyle = '#3a2a1a';
    cx.lineWidth = 2;
    cx.beginPath();
    cx.moveTo(cx_, cy);
    cx.lineTo(cx_, cy - wickH);
    cx.stroke();

    return cy - wickH; // flame origin y
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    requestAnimationFrame(frame);
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // autopilots
    if (DEMO) demoAutopilot(dt);
    if (BOT)  botAutopilot(dt, now);

    // flame physics
    if (phase === 'play') {
      flickerPhase += dt * 0.07;
      var flicker = Math.sin(flickerPhase) + Math.sin(flickerPhase * 2.3 + 1) * 0.5;

      if (holding) {
        // holding → snuff down (rate faster when high, slower near zero)
        var snuffRate = 0.003 + flame * 0.004;
        flame -= snuffRate * dt;
        // calm step sound
        if (window.J) {
          var step = Math.round((1 - flame) * 4);
          if (dt > 0 && Math.random() < 0.02 * dt) J.calm(step);
        }
      } else {
        // released → slow recovery (wick breathes back, but not fully)
        var recoverRate = 0.001 + (1 - flame) * 0.001;
        flame += recoverRate * dt;
      }

      flame = Math.max(0, Math.min(1, flame));

      if (flame <= 0) {
        holding = false;
        extinguish();
      }
    }

    // juice decay
    if (hitStop > 0) hitStop -= dt;
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // ---- draw ----
    cx.save();
    // juice transforms
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shakeAmt, sy = (rng() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background: fades darker as flame goes out
    var bgAlpha = 0.04 + flame * 0.08;
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    // ambient warm glow from candle
    var ambientGrad = cx.createRadialGradient(W / 2, H * 0.55, 0, W / 2, H * 0.55, 300);
    ambientGrad.addColorStop(0, 'rgba(242,177,52,' + (0.08 * flame) + ')');
    ambientGrad.addColorStop(1, 'rgba(242,177,52,0)');
    cx.fillStyle = ambientGrad;
    cx.fillRect(0, 0, W, H);

    // --- candle & flame ---
    var candleX = W / 2;
    var baseY = H - 180;
    var flickerNow = Math.sin(flickerPhase) + Math.sin(flickerPhase * 2.3 + 1) * 0.4;
    var flameY = drawCandle(cx, candleX, baseY, flame);
    if (phase === 'play' || phase === 'out') {
      if (flame > 0) drawFlame(cx, candleX, flameY, flame, flickerNow, now);
    }

    // --- hold indicator: a soft ring around wick base when holding ---
    if (phase === 'play' && holding && flame > 0) {
      var ringR = 28 + (1 - flame) * 14;
      var ringAlpha = 0.25 + (1 - flame) * 0.3;
      cx.beginPath();
      cx.arc(candleX, flameY, ringR, 0, Math.PI * 2);
      cx.strokeStyle = 'rgba(46,197,182,' + ringAlpha + ')';
      cx.lineWidth = 1.5;
      cx.stroke();
    }

    // --- flame progress bar: subtle line on left edge ---
    if (phase === 'play') {
      var barH = H * 0.4, barY = H / 2 - barH / 2;
      cx.fillStyle = 'rgba(255,255,255,0.06)';
      cx.fillRect(12, barY, 3, barH);
      cx.fillStyle = 'rgba(242,177,52,' + (0.5 + flame * 0.3) + ')';
      cx.fillRect(12, barY + barH * (1 - flame), 3, barH * flame);
    }

    // --- title screen ---
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '300 36px -apple-system, Helvetica, Arial';
      cx.fillText('candle out', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '400 14px -apple-system, Helvetica, Arial';
      cx.fillText('hold to let it go', W / 2, 296);
      var pulse = 0.45 + 0.35 * Math.sin(now / 700);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('touch to begin', W / 2, 340);
      cx.globalAlpha = 1;
    }

    // --- play HUD: soft instruction ---
    if (phase === 'play') {
      cx.textAlign = 'center';
      var hintA = 0.22 + (holding ? 0.08 : 0) + flame * 0.1;
      cx.fillStyle = 'rgba(255,255,255,' + hintA + ')';
      cx.font = '300 13px -apple-system, Helvetica, Arial';
      cx.fillText(holding ? 'hold...' : 'hold to dim it', W / 2, H - 68);
    }

    // --- out / darkness screen ---
    if (phase === 'out') {
      var elapsed = (performance.now() - outAt) / 1000;
      var fadeIn = Math.min(1, elapsed * 0.6);
      // full dark overlay
      cx.fillStyle = 'rgba(11,13,18,' + (0.92 * fadeIn) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = fadeIn;
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '300 18px -apple-system, Helvetica, Arial';
      cx.fillText('you let it go.', W / 2, H / 2 - 24);
      cx.fillStyle = 'rgba(46,197,182,0.65)';
      cx.font = '300 12px -apple-system, Helvetica, Arial';
      cx.fillText(score.toFixed(1) + 's in the dark', W / 2, H / 2 + 10);
      if (!DEMO && !BOT && elapsed > 1.0) {
        var p2 = 0.45 + 0.3 * Math.sin(now / 600);
        cx.globalAlpha = fadeIn * p2;
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.font = '300 12px -apple-system, Helvetica, Arial';
        cx.fillText('hold to try again', W / 2, H / 2 + 50);
        cx.globalAlpha = 1;
      }
      cx.globalAlpha = 1;
    }

    // --- demo CTA ---
    if (phase === 'cta') {
      var tc = (performance.now() - ctaAt) / 1000;
      var ease = Math.min(1, tc * 2.0);
      cx.fillStyle = 'rgba(11,13,18,' + (0.88 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '300 32px -apple-system, Helvetica, Arial';
      cx.fillText('candle out', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '300 15px -apple-system, Helvetica, Arial';
      cx.fillText('let the last light go', W / 2, 334);
      var p3 = 0.65 + 0.25 * Math.sin(now / 500);
      cx.globalAlpha = ease * p3;
      cx.fillStyle = TEAL;
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 390);
      cx.globalAlpha = ease * 0.5;
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '300 12px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 418);
      cx.globalAlpha = 1;
    }

    // --- floating text flashes ---
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 55);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '300 ' + (fl.size + fl.t * 0.2) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 60 - fl.t * 0.4);
      cx.globalAlpha = 1;
      if (fl.t > 55) flashes.splice(k, 1);
    }

    // --- mute toggle (human only) ---
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.4;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
  }

  // kick off
  if (DEMO) {
    phase = 'play';
    flame = 1.0;
    flickerPhase = rng() * Math.PI * 2;
    runStartTs = Date.now();
    demoT = 0;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  } else if (BOT) {
    startRun();
  } else {
    phase = 'title';
    flame = 1.0;
  }

  requestAnimationFrame(frame);
})();
</script>
