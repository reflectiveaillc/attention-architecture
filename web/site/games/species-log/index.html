      var a = active[i];
      cx.save();
      cx.translate(a.x, a.y);
      cx.globalAlpha = 0.9;
      cx.shadowColor = TEAL; cx.shadowBlur = 10;
      cx.fillStyle = TEAL;
      drawSpecies(cx, a.sp, 0, 0, a.scale, 1);
      cx.shadowBlur = 0;
      cx.restore();
    }
  }

  function elapsed() { return state.phase === 'play' ? (Date.now() - runStartTs) / 1000 : 0; }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      spawnTimer -= dt;
      if (spawnTimer <= 0) spawn();
      for (var i = active.length - 1; i >= 0; i--) {
        var a = active[i];
        a.x += a.vx * dt;
        if (a.x < -90) active.splice(i, 1);
      }
      autopilot();
    }

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(0.55, 'rgba(11,13,18,0)');
    bg.addColorStop(1, 'rgba(242,177,52,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SPECIES LOG', W / 2, 260);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillText('TAP TO START', W / 2, 310); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('log every silhouette you recognize', W / 2, 340);
    }

    if (state.phase === 'play' || state.phase === 'over') {
      drawSightWindow();
      drawActive();

      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = '800 54px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '/' + species.length, W / 2, 88);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('SPECIES LOGGED', W / 2, 108);
      var el = elapsed();
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '700 14px Menlo, monospace';
      cx.textAlign = 'left';
      cx.fillText(el.toFixed(1) + 's', 24, 60);
      cx.textAlign = 'right';
      cx.fillText('BEST ' + (bestTime ? bestTime.toFixed(1) + 's' : '—'), W - 24, 60);

      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.textAlign = 'center';
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'LOG ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 138);
      }
    }

    if (state.phase === 'play' || state.phase === 'over') drawGuide();

    for (var k = floats.length - 1; k >= 0; k--) {
      var fl = floats[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.save(); cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.7);
      cx.restore();
      if (fl.t > 40) floats.splice(k, 1);
    }

    if (state.phase === 'over' && !DEMO && !BOT) {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('GUIDE CLOSED', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' species logged', W / 2, 332);
      var dur = (Date.now() - runStartTs) / 1000;
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText(dur.toFixed(2) + 's', W / 2, 372);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('best ' + (bestTime ? bestTime.toFixed(2) + 's' : '—'), W / 2, 396);
      var p2 = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = p2; cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — OPEN A NEW GUIDE', W / 2, 456);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(46,197,182,0.14)';
      cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
      cx.beginPath();
      cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 22) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = TEAL; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ SHARE YOUR GUIDE', W / 2, SHARE_R.y + 29);
    }

    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('SPECIES LOG', W / 2, 286);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore || 15) + ' species. your life-list is waiting.', W / 2, 328);
      var p3 = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 394);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 426);
      cx.globalAlpha = 1;
    }

    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '18px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 27);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
