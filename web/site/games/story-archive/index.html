<title>Story Archive — Tilt</title>
<!--
  LOOP / attention-architecture — Story Archive
  Circuits: 04-loss (preserved, not lost), 08-investment (the collage grows),
            05-ease (one-tap, no fail).
  Modes (query params):
    ?demo=1&seed=7        calm clip arc (~16s play) → soft CTA, sets window.__demoDone
    ?bot=1&runs=3&seed=5  imperfect autoplay N runs, sets window.__botDone
    ?clip=ID&src=tiktok   attribution (see js/loop-events.js)
    ?sink=URL             event sink override
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'story-archive';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134', CREAM = '#f5f1e8';
  var SESSION_TARGET = 18;

  var state, memories, active, runStartTs, overAt, ctaAt, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, flashes = [];
  try { best = +localStorage.getItem('sa_best') || 0; } catch (_) {}

  function colorFor(key) {
    if (key === 'gold') return GOLD;
    if (key === 'cream') return CREAM;
    return TEAL;
  }

  function newGame() {
    state = { phase: 'title', score: 0, target: SESSION_TARGET };
    memories = []; active = null; flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    if (DEMO) startRun();
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0;
    memories = []; active = spawnRing();
    runStartTs = Date.now();
    if (DEMO) demoPlayStarted = performance.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnRing() {
    var margin = 42;
    var x = margin + rng() * (W - margin * 2);
    var y = 170 + rng() * (H - 340);
    var r = 22 + rng() * 40;
    var roll = rng();
    var hue = roll < 0.45 ? 'teal' : (roll < 0.75 ? 'gold' : 'cream');
    return {
      x: x, y: y, r: r,
      progress: 0,
      speed: 0.005 + rng() * 0.003,
      hue: hue, alpha: 0.22 + rng() * 0.2,
      pulse: 0, stamped: false
    };
  }

  function stamp() {
    if (!active || active.stamped) return;
    active.stamped = true;
    active.progress = 1;
    state.score++;
    var words = ['kept', 'saved', 'held', 'soft', 'yours', 'here', 'quiet'];
    var txt = words[Math.floor(rng() * words.length)];
    flash(txt, colorFor(active.hue), 34, active.x, active.y - active.r - 18);
    if (window.J) J.calm(state.score);
    hitStop = 2.5;
    zoom = 1.015;
    shakeAmt = 1.2;
    memories.push(active);
    if (window.LOOP) LOOP.emit('memory_kept', { n: state.score, hue: active.hue });
    if (state.score >= state.target) gameOver();
    else active = spawnRing();
  }

  function gameOver() {
    state.phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (newBest) { best = state.score; try { localStorage.setItem('sa_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = state.score;
      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500); }, 650);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { startRun(); }, 900);
    }
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 110, y: 486, w: 220, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && active && !active.stamped) { stamp(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'memories' }); return;
      }
      startRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  var demoScript = [0.35, 0.70, 0.50, 0.85, 0.60]; // target progress to tap
  var demoWaits  = [20, 18, 24, 20, 22];         // hesitation frames after each stamp
  var demoIdx = 0, demoWait = 0, demoPlayStarted = 0;
  var botRunsDone = 0, botTarget = null;

  function checkDemoTime() {
    if (!DEMO || state.phase !== 'play') return;
    if (performance.now() - demoPlayStarted > 16000) gameOver();
  }

  function autopilot() {
    if (!active || state.phase !== 'play' || active.stamped) return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var want = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (active.progress >= want) {
        stamp();
        demoIdx++;
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 20;
      }
    } else if (BOT) {
      if (botTarget === null) botTarget = 0.20 + rng() * 0.70;
      if (active.progress >= botTarget) { botTarget = null; stamp(); }
    }
  }

  function flash(txt, color, size, fx, fy) { flashes.push({ txt: txt, color: color, size: size, x: fx, y: fy, t: 0 }); }

  // ---- render ----
  var ctaAt = 0, last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play' && active && !active.stamped) {
      active.progress += active.speed * dt;
      if (active.progress >= 1) { active.progress = 1; stamp(); }
      else autopilot();
    }
    checkDemoTime();

    // juice transforms: decaying shake + zoom-pulse
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.88, dt); zoom += (1 - zoom) * 0.10 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createRadialGradient(W / 2, H / 2, 20, W / 2, H / 2, H / 1.4);
    bg.addColorStop(0, 'rgba(46,197,182,0.08)');
    bg.addColorStop(0.6, 'rgba(242,177,52,0.04)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // stamped memories collage
    for (var i = 0; i < memories.length; i++) {
      var m = memories[i], c = colorFor(m.hue);
      m.pulse += 0.03 * dt;
      var glow = 1 + Math.sin(m.pulse) * 0.08;
      cx.globalAlpha = m.alpha;
      cx.strokeStyle = c; cx.lineWidth = 1.5;
      cx.beginPath(); cx.arc(m.x, m.y, m.r * glow, 0, Math.PI * 2); cx.stroke();
      cx.globalAlpha = m.alpha * 0.45;
      cx.fillStyle = c;
      cx.beginPath(); cx.arc(m.x, m.y, m.r * 0.35, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
    }

    // active ring
    if (state.phase === 'play' && active) {
      var c = colorFor(active.hue);
      cx.globalAlpha = 0.9;
      cx.strokeStyle = c; cx.lineWidth = 3.5;
      cx.beginPath();
      cx.arc(active.x, active.y, active.r, -Math.PI / 2, -Math.PI / 2 + active.progress * Math.PI * 2);
      cx.stroke();
      // inner memory disc
      cx.globalAlpha = 0.35;
      cx.fillStyle = c;
      cx.beginPath(); cx.arc(active.x, active.y, active.r * 0.35, 0, Math.PI * 2); cx.fill();
      // trail dot
      var ang = -Math.PI / 2 + active.progress * Math.PI * 2;
      var ax = active.x + active.r * Math.cos(ang);
      var ay = active.y + active.r * Math.sin(ang);
      cx.globalAlpha = 0.8;
      cx.beginPath(); cx.arc(ax, ay, 3, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
    }

    // floating reward text
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '800 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // score
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 92);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('memories kept · BEST ' + best, W / 2, 116);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('STORY ARCHIVE', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillText('TAP TO KEEP A MEMORY', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('nothing disappears', W / 2, 360);
    }

    // game over card (calm resolve)
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.45)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('ARCHIVED.', W / 2, 296);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' memories', W / 2, 340);
      cx.fillStyle = GOLD; cx.font = '900 20px -apple-system, Helvetica, Arial';
      cx.fillText('your collage grew', W / 2, 376);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — KEEP MORE', W / 2, 444);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.12)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE THE CALM', W / 2, SHARE_R.y + 29);
      }
    }

    // demo CTA card (soft invitation)
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.72 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('STORY ARCHIVE', W / 2, 298);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' memories kept', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
