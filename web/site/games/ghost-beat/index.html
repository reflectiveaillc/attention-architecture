  // ---- Timing (performance.now based — works in headless too) ----
  var BPM = 128;

  var BAR_DUR  = BEAT_DUR * 4;    // seconds

  var ghostPositions = []; // fraction 0..1 within each bar

      cx.beginPath(); cx.moveTo(x, wY - h * 0.5); cx.lineTo(x, wY + h * 0.5); cx.stroke();
    }

      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 295);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('12', W/2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W/2, 432);
    }

    // ==== PLAY ====
    if (phase === 'play') {
      var elapsed2 = gameTime();
      var currentBar = Math.min(TOTAL_BARS-1, Math.max(0, Math.floor(elapsed2/BAR_DUR)));
      var barProgress = Math.max(0, Math.min(1, (elapsed2 - currentBar*BAR_DUR)/BAR_DUR));

      cx.textAlign='center';
      cx.fillStyle='rgba(255,255,255,0.35)'; cx.font='600 11px Menlo, monospace';
      cx.fillText('BAR '+(currentBar+1)+' / '+TOTAL_BARS, W/2, 82);

      // Score
      cx.fillStyle='rgba(255,255,255,0.92)'; cx.font='900 88px -apple-system, Helvetica, Arial';
      cx.fillText(score, W/2, 192);
      cx.fillStyle='rgba(255,255,255,0.3)'; cx.font='600 13px -apple-system, Helvetica, Arial';
      cx.fillText('GHOSTS CAUGHT', W/2, 216);

      // Waveform
      drawWaveform(now, elapsed2);

      // Ripples (post-catch only)
      for (var i2=0; i2<ghosts.length; i2++) {
        var gx=ghosts[i2];
        if (gx.caught && !gx._rippled) { gx._rippled=true; ripples.push({x:W/2,y:440+(rng()-0.5)*60,t:0}); }
      }
      for (var ri=ripples.length-1; ri>=0; ri--) {
        var rp=ripples[ri]; rp.t+=dt;
        var rad=rp.t*3.5, alpha=Math.max(0,1-rp.t/22);
        cx.save(); cx.globalAlpha=alpha*0.8; cx.strokeStyle=TEAL; cx.lineWidth=2;
        cx.beginPath(); cx.arc(rp.x,rp.y,rad,0,Math.PI*2); cx.stroke(); cx.restore();
        if (rp.t>25) ripples.splice(ri,1);
      }

      // Dare banner
      if (!DEMO&&!BOT&&window.SHARE&&SHARE.dare!==null) {
        cx.fillStyle=dareBeaten?TEAL:GOLD; cx.font='800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten?'DARE BEATEN ✓':('BEAT '+SHARE.dare+(SHARE.by?' — '+SHARE.by:'')), W/2, 250);
      }

      // Subtle prompt
      cx.globalAlpha = 0.2+0.1*Math.sin(now/200);
      cx.fillStyle='#fff'; cx.font='500 12px -apple-system, Helvetica, Arial';
      cx.fillText('TAP WHEN YOU FEEL IT', W/2, 625); cx.globalAlpha=1;
    }

    // ==== OVER ====
    if (phase === 'over') {
      drawWaveform(now, TOTAL_BARS*BAR_DUR);
      cx.fillStyle='rgba(11,13,18,0.62)'; cx.fillRect(0,0,W,H);
      cx.textAlign='center';
      cx.fillStyle=VERM; cx.font='900 38px -apple-system, Helvetica, Arial';
      cx.fillText('HEARD IT.', W/2, 285);
      cx.fillStyle='#fff'; cx.font='800 28px -apple-system, Helvetica, Arial';
      cx.fillText(score+' / '+TOTAL_BARS+' ghosts', W/2, 332);
      var pt=pctTop(score);
      cx.fillStyle=GOLD; cx.font='900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP '+pt+'% TODAY', W/2, 372);
      cx.fillStyle='rgba(255,255,255,0.5)'; cx.font='600 13px -apple-system, Helvetica, Arial';
      cx.fillText('sharper than '+(100-pt)+'% of listeners', W/2, 396);
      if (!DEMO&&!BOT) {
        var p2=0.6+0.4*Math.sin(now/290);
        cx.globalAlpha=p2; cx.fillStyle=TEAL; cx.font='700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — 16 MORE BARS', W/2, 448); cx.globalAlpha=1;
        drawRoundRect(SHARE_R.x,SHARE_R.y,SHARE_R.w,SHARE_R.h,23,'rgba(242,177,52,0.13)',GOLD);
        cx.fillStyle=GOLD; cx.font='800 16px -apple-system, Helvetica, Arial';
        cx.fillText((window.SHARE&&SHARE.dare!==null&&dareBeaten)?'⚡ DARE THEM BACK':'⚡ DARE A FRIEND', W/2, SHARE_R.y+30);
      }
    }

    // ==== CTA (demo) ====
    if (phase === 'cta') {
      var t2=(now-ctaAt)/1000, ease=Math.min(1,t2*2.2);
      cx.fillStyle='rgba(11,13,18,'+(0.8*ease)+')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha=ease; cx.textAlign='center';
      cx.fillStyle='#fff'; cx.font='900 44px -apple-system, Helvetica, Arial';
      cx.fillText('GHOST BEAT', W/2, 295);
      cx.fillStyle='rgba(255,255,255,0.7)'; cx.font='700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they caught '+(window.__demoScore||12)+' ghosts. your ears sharper?', W/2, 340);
      var p3=0.7+0.3*Math.sin(now/250);
      cx.fillStyle=VERM; cx.globalAlpha=ease*p3;
      cx.font='900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT '+(window.__demoScore||12), W/2, 408);
      cx.globalAlpha=ease; cx.fillStyle=TEAL; cx.font='700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 440); cx.globalAlpha=1;
    }

    // ==== Flashes ====
    for (var k=flashes.length-1; k>=0; k--) {
      var fl=flashes[k]; fl.t+=dt;
      var fa=Math.max(0,1-fl.t/38);
      cx.globalAlpha=fa; cx.textAlign='center';
      cx.fillStyle=fl.color; cx.font='900 '+(fl.size+fl.t*0.4)+'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 260-fl.t*0.7); cx.globalAlpha=1;
      if (fl.t>38) flashes.splice(k,1);
    }

    // Mute toggle (human only)
    if (!DEMO&&!BOT&&window.J) {
      cx.textAlign='center'; cx.globalAlpha=0.5;
      cx.font='16px -apple-system, Helvetica, Arial'; cx.fillStyle='#fff';
      cx.fillText(J.muted?'🔇':'🔊', MUTE_R.x+MUTE_R.w/2, MUTE_R.y+26); cx.globalAlpha=1;
    }

    cx.restore();
  }

  newGame();
  // Schedule first bar audio immediately (bar 0)
  // (will be re-scheduled once startRun is called; this is a no-op for title phase)
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
