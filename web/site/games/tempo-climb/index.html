<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  var LANE_X = W / 2;
  var LANE_W = 6;
  var DOT_R = 18;          // dot radius
  var HIT_LINE_Y = H - 140; // where player must tap
  var HIT_WINDOW = 42;     // px from hit line = valid hit
  var MISS_WINDOW = 70;    // px below hit line = missed
  var START_BPM = 80;
  var BPM_STEP = 10;       // BPM added every 8 beats
  var MAX_BPM = 220;
  var MISS_LIMIT = 2;      // misses in a row → game over
  var DEMO_SCORE = 42;     // displayed on challenge card

  // ---- state ----
  var dots, flashes, hitStop, zoom, shakeAmt;
  var bpm, beatInterval, beatsOnLevel, totalBeats, consecutiveMisses;
  var score, combo, bestCombo, best;
  var phase, runStartTs, overAt, ctaAt, dareBeaten;

  // demo script

  var demoOffsets = [-5, 10, -8, 22, -3, 30, -12, 5, 35, -8, 14, -28, 'near-fail', 20, 'miss', 'miss'];
  var demoHesitation = [8, 12, 6, 20, 9, 25, 7, 15, 30, 10, 18, 28, 35, 14, 10, 10];

      botActionsLeft = 12 + Math.floor(rng() * 8);

  function startHumanRun() {
    dots = []; flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    bpm = START_BPM; beatInterval = 60 / bpm;
    beatsOnLevel = 0; totalBeats = 0; consecutiveMisses = 0;
    score = 0; combo = 0; dareBeaten = false;
    nextBeatTime = performance.now() / 1000 + 0.5;
    runStartTs = Date.now();
    phase = 'play';
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED, bpm: bpm });
  }

  function pctTop(s) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 20)))); }

  // spawn a dot at top, traveling to hit line
  function spawnDot() {
    var travelTime = beatInterval;           // dot arrives at hit line in exactly 1 beat
    dots.push({
      y: -DOT_R,
      targetTime: performance.now() / 1000 + travelTime,
      speed: (HIT_LINE_Y + DOT_R) / travelTime, // px/s
      hit: false, missed: false, dead: false,
      alpha: 1
    });
  }

  function registerTap() {
    // find the closest dot to hit line that hasn't been hit
    var now = performance.now() / 1000;
    var best_dot = null, best_dist = Infinity;
    for (var i = 0; i < dots.length; i++) {
      var d = dots[i];
      if (d.hit || d.missed || d.dead) continue;
      var dy = Math.abs(d.y - HIT_LINE_Y);
      if (dy < HIT_WINDOW && dy < best_dist) { best_dot = d; best_dist = dy; }
    }
    if (best_dot) {
      hitDot(best_dot);
    } else {
      // early tap or miss — no penalty for early taps (reward precision only)
    }
  }

  function hitDot(dot) {
    dot.hit = true;
    var err = Math.abs(dot.y - HIT_LINE_Y);
    var perfect = err < 10;
    var near = err >= 28;
    combo++;
    if (combo > bestCombo) bestCombo = combo;
    score++;
    if (window.J) {
      if (perfect) { J.perfect(combo); hitStop = 5; zoom = 1.025; }
      else if (near) { J.near(); shakeAmt = 3; }
      else J.hit(combo);
      J.tension(Math.min(score / 50, 1));

    if (perfect) flash('PERFECT', TEAL, 44);

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
      dareBeaten = true; flash('DARE BEATEN', TEAL, 44); if (window.J) J.fanfare(); SHARE.beaten(score);
    }

  }

  function missedDot(dot) {
    dot.missed = true; dot.dead = true;
    consecutiveMisses++;
    combo = 0;
    if (window.J) J.near();
    flash('MISS', VERM, 40);
    shakeAmt = 5;
    if (window.LOOP) LOOP.emit('beat_miss', { score: score, bpm: Math.round(bpm), consecutive: consecutiveMisses });
    if (consecutiveMisses >= MISS_LIMIT) { gameOver(); }
  }

  function advanceTempo() {
    beatsOnLevel++;
    totalBeats++;
    if (beatsOnLevel >= 8) {
      beatsOnLevel = 0;
      var newBpm = Math.min(bpm + BPM_STEP, MAX_BPM);
      if (newBpm !== bpm) {
        bpm = newBpm; beatInterval = 60 / bpm;
        flash(Math.round(bpm) + ' BPM', GOLD, 36);
        if (window.J) J.gold();
        if (window.LOOP) LOOP.emit('tempo_up', { bpm: Math.round(bpm), level: Math.floor((bpm - START_BPM) / BPM_STEP) });
      }
    }
  }

        phase = 'scoreboard';

          phase = 'cta'; ctaAt = performance.now();
          setTimeout(function () { window.__demoDone = true; }, 3600);
        }, 2300);
      }, 1800);

      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(resetBotRun, 700);
    }

  function resetBotRun() {
    dots = []; flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    bpm = START_BPM; beatInterval = 60 / bpm;
    beatsOnLevel = 0; totalBeats = 0; consecutiveMisses = 0;
    score = 0; combo = 0;
    nextBeatTime = performance.now() / 1000 + 0.4;

    if (window.LOOP) LOOP.emit('play_start', { seed: SEED, bpm: bpm });

    if (window.LOOP) LOOP.emit('restart', {});
    startHumanRun();

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startHumanRun(); return; }
    if (phase === 'play') { registerTap(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'BPM' }); return;
      }
      resetHumanRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space' || e.code === 'ArrowDown') tap(); });

  // ---- autopilots ----
  function demoPilot() {
    if (phase !== 'play') return;
    // find the dot closest to hit line
    var target = null;
    for (var i = 0; i < dots.length; i++) {
      var d = dots[i];
      if (!d.hit && !d.missed && !d.dead) {
        if (!target || Math.abs(d.y - HIT_LINE_Y) < Math.abs(target.y - HIT_LINE_Y)) target = d;
      }
    }
    if (!target) return;
    var entry = demoOffsets[Math.min(demoIdx, demoOffsets.length - 1)];
    if (entry === 'miss') {
      // let it pass — do nothing
      demoIdx++;
      return;
    }
    if (entry === 'near-fail') {
      // tap very late — sliver save
      var dy = target.y - HIT_LINE_Y;
      if (dy > 30 && dy < HIT_WINDOW) {
        if (demoWaitFrames > 0) { demoWaitFrames--; return; }
        demoIdx++;
        demoWaitFrames = demoHesitation[Math.min(demoIdx, demoHesitation.length - 1)] || 10;
        registerTap();
      }
      return;
    }
    // normal offset tap
    var targetY = HIT_LINE_Y + entry;
    if (target.y >= targetY - 4) {
      if (demoWaitFrames > 0) { demoWaitFrames--; return; }
      demoIdx++;
      demoWaitFrames = demoHesitation[Math.min(demoIdx, demoHesitation.length - 1)] || 10;
      registerTap();
    }
  }

  function botPilot() {
    if (phase !== 'play') return;
    // after K actions, go passive so natural misses fire
    if (botPassive) return;
    for (var i = 0; i < dots.length; i++) {
      var d = dots[i];
      if (!d.hit && !d.missed && !d.dead) {
        var dy = d.y - HIT_LINE_Y;
        var err = gauss() * 14; // imperfect
        if (Math.abs(dy - err) < 8) {
          if (botActionsLeft <= 0) { botPassive = true; return; }
          botActionsLeft--;
          registerTap();
          return;
        }
      }
    }
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;
    var nowSec = now / 1000;

    // --- spawn beats ---
    if (phase === 'play' && nowSec >= nextBeatTime) {
      spawnDot();
      advanceTempo();
      nextBeatTime = nowSec + beatInterval;
    }

    // --- update dots ---
    if (phase === 'play') {
      for (var i = dots.length - 1; i >= 0; i--) {
        var d = dots[i];
        if (d.dead) { dots.splice(i, 1); continue; }
        if (!d.hit) {
          d.y += d.speed * (16.667 / 1000) * dt; // px per frame
          // check if fully passed hit line without being hit
          if (!d.missed && d.y > HIT_LINE_Y + MISS_WINDOW) {
            missedDot(d);
          }
        } else {
          // hit dots fade and float up briefly then die
          d.alpha -= 0.07 * dt;
          d.y -= 1.5 * dt;
          if (d.alpha <= 0) { d.dead = true; }
        }
      }
    }

    // --- autopilots ---
    if (hitStop > 0) hitStop -= dt;
    else {
      if (DEMO) demoPilot();
      if (BOT)  botPilot();

    // --- juice transforms ---
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt); zoom += (1 - zoom) * 0.14 * dt;

    // --- background ---
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);

    cx.lineWidth = LANE_W;

    cx.setLineDash([8, 6]);
    cx.beginPath(); cx.moveTo(W / 2 - 100, HIT_LINE_Y); cx.lineTo(W / 2 + 100, HIT_LINE_Y);
    cx.stroke(); cx.setLineDash([]);

    // hit zone arc rings (indicate window)
    cx.strokeStyle = 'rgba(46,197,182,0.18)';
    cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(LANE_X, HIT_LINE_Y, DOT_R + 4, 0, Math.PI * 2); cx.stroke();

    // --- dots ---
    for (var j = 0; j < dots.length; j++) {
      var dot = dots[j];
      if (dot.dead) continue;
      var distToLine = Math.abs(dot.y - HIT_LINE_Y);
      var proximity = Math.max(0, 1 - distToLine / 180);
      // glow behind dot
      if (proximity > 0.3) {
        var glowR = DOT_R + 14 * proximity;
        var grd = cx.createRadialGradient(LANE_X, dot.y, 0, LANE_X, dot.y, glowR);
        var bpmNorm = (bpm - START_BPM) / (MAX_BPM - START_BPM);
        // use explicit rgba strings instead of hex substitution
        var glowInner = dot.hit ? 'rgba(46,197,182,0.35)' : (bpmNorm > 0.6 ? 'rgba(232,80,46,0.35)' : bpmNorm > 0.3 ? 'rgba(242,177,52,0.35)' : 'rgba(46,197,182,0.35)');
        grd.addColorStop(0, glowInner);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        cx.globalAlpha = proximity * 0.5 * dot.alpha;
        cx.fillStyle = grd; cx.beginPath(); cx.arc(LANE_X, dot.y, glowR, 0, Math.PI * 2); cx.fill();
        cx.globalAlpha = 1;
      }
      // dot body
      var bpmNorm2 = (bpm - START_BPM) / (MAX_BPM - START_BPM);
      var col = dot.hit ? TEAL : (bpmNorm2 > 0.6 ? VERM : bpmNorm2 > 0.3 ? GOLD : TEAL);
      cx.globalAlpha = dot.alpha;
      cx.fillStyle = col;
      cx.beginPath(); cx.arc(LANE_X, dot.y, DOT_R, 0, Math.PI * 2); cx.fill();

      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.beginPath(); cx.arc(LANE_X - 5, dot.y - 5, DOT_R * 0.4, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
    }

    // --- HUD ---
    if (phase === 'play' || phase === 'over') {
      // BPM display top center
      cx.textAlign = 'center';
      cx.fillStyle = GOLD;
      cx.font = '700 13px Menlo, monospace';
      cx.fillText(Math.round(bpm) + ' BPM', W / 2, 36);

      // score
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 72px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 100);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 122);

      // combo display (only show if > 1)
      if (combo > 1) {
        var comboSize = Math.min(28, 16 + combo * 0.8);
        var comboAlpha = Math.min(1, 0.6 + combo * 0.03);
        cx.globalAlpha = comboAlpha;
        cx.fillStyle = TEAL;
        cx.font = '900 ' + comboSize + 'px -apple-system, Helvetica, Arial';
        cx.fillText('×' + combo, W / 2, 148);
        cx.globalAlpha = 1;
      }

      // consecutive miss warning
      if (consecutiveMisses === 1 && phase === 'play') {
        cx.fillStyle = VERM;
        cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText('ONE MORE MISS = OVER', W / 2, H - 60);
      }

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — ' + SHARE.by : ''), W / 2, 162);
      }
    }

    // --- challenge card (demo beat 1) ---
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(DEMO_SCORE, W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // --- title ---
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('TEMPO CLIMB', W / 2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('tap the beat. ride the ramp.', W / 2, 316);
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('miss 2 in a row — it cuts', W / 2, 340);
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 392); cx.globalAlpha = 1;
    }

    // --- flashes ---
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 60 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // --- game over overlay ---
    if (phase === 'over' || phase === 'scoreboard') {
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var cutLabel = consecutiveMisses >= MISS_LIMIT ? 'TRACK CUT.' : 'MISSED.';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(cutLabel, W / 2, 295);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' beats', W / 2, 340);
      cx.fillStyle = GOLD; cx.font = '700 16px Menlo, monospace';
      cx.fillText('PEAKED ' + Math.round(bpm) + ' BPM', W / 2, 368);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 402);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 422);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 270);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — TRY AGAIN', W / 2, 462); cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // --- demo CTA ---
    if (phase === 'cta') {
      var elapsed = (now - ctaAt) / 1000, ease = Math.min(1, elapsed * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('TEMPO CLIMB', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they hit ' + (window.__demoScore || DEMO_SCORE) + '. can you go faster?', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 230);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || DEMO_SCORE), W / 2, 404);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // --- mute toggle (human only) ---
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
