<body>

<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var SOFT_BG   = 'rgba(46,197,182,0.07)';
  var CARD_BG   = 'rgba(255,255,255,0.06)';
  var CARD_SEL  = 'rgba(46,197,182,0.18)';

  // ---- polls data ----
  var POLLS = [
    { q: 'tea or coffee?',          a: 'tea',         b: 'coffee'     },
    { q: 'morning or night?',       a: 'morning',     b: 'night'      },
    { q: 'beach or mountains?',     a: 'beach',       b: 'mountains'  },
    { q: 'read or watch?',          a: 'read',        b: 'watch'      },
    { q: 'city or countryside?',    a: 'city',        b: 'countryside'},
    { q: 'phone or laptop?',        a: 'phone',       b: 'laptop'     },
    { q: 'silence or music?',       a: 'silence',     b: 'music'      },
    { q: 'plan or improvise?',      a: 'plan',        b: 'improvise'  },
    { q: 'early bird or night owl?',a: 'early bird',  b: 'night owl'  },
    { q: 'sweet or salty?',         a: 'sweet',       b: 'salty'      },
    { q: 'window or aisle?',        a: 'window',      b: 'aisle'      },
    { q: 'cook or order in?',       a: 'cook',        b: 'order in'   },
  ];

  // shuffle with seeded RNG
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  // ---- state ----
  var polls, pollIdx, pollsDone;
  var phase;             // 'title' | 'play' | 'reveal' | 'over' | 'cta'
  var revealStart, revealDur;
  var fadeIn, fadeInDur;
  var chosen;            // 'a' | 'b' | null
  var barA, barB;        // 0..1 target values (filled after pick)
  var barADisp, barBDisp;// displayed (animated)
  var score;             // how many polls answered (meaningful number)
  var runStartTs;
  var hitStop, zoom, shakeAmt;
  var flashes;
  var ctaAt;

  // bot
  var botRunsDone, botActed;

  // demo
  var demoPhaseStart, demoPhase;
  // demo scripted picks: which button to tap at each poll (0=A, 1=B)
  var demoPicks = [0, 1, 0, 1, 0, 0, 1, 1, 0, 1, 1, 0];
  var demoWaitFrames;    // frames before bot-demo acts

  function initState() {
    polls      = shuffle(POLLS);
    pollIdx    = 0;
    pollsDone  = 0;
    phase      = DEMO || BOT ? 'play' : 'title';
    chosen     = null;
    barA = barB = 0.5;
    barADisp = barBDisp = 0;
    revealStart = 0; revealDur = 900;
    fadeIn = 0; fadeInDur = 600;
    score  = 0;
    runStartTs = Date.now();
    hitStop = 0; zoom = 1; shakeAmt = 0;
    flashes = [];
    ctaAt   = 0;
    botRunsDone = 0;
    botActed    = false;
    demoPhase   = 'settle';
    demoPhaseStart = performance.now();
    demoWaitFrames = DEMO ? 55 : 25;   // demo hesitates more
    if (DEMO || BOT) {
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    }
  }

  // ---- per-poll setup ----
  function loadPoll() {
    chosen   = null;
    barA = barB = 0.5;
    barADisp = barBDisp = 0;
    fadeIn   = performance.now();
  }

  // ---- pick answer ----
  function pick(side) {
    if (chosen !== null) return;
    chosen = side;
    // soft asymmetric reveal — neither side crushes the other
    // A gets 55-70%, B gets 45-30% (or vice versa, randomised gently)
    var aWt = 0.45 + rng() * 0.25;
    if (side === 'b') aWt = 1 - aWt;
    barA = aWt;
    barB = 1 - aWt;

    score++;
    hitStop = 3;   // tiny freeze (calm — brief)
    zoom    = 1.015;

    if (window.J) J.calm(score);
    if (window.LOOP) LOOP.emit('poll_answered', { poll: polls[pollIdx % polls.length].q, side: side, n: score });

    revealStart = performance.now();
    phase = 'reveal';
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size || 28, t: 0 }); }

  // ---- after reveal, advance ----
  function nextPoll() {
    pollIdx++;
    pollsDone++;

    // CALM game ends after a set of polls (e.g. 6 in bot/demo, 8 for human)
    var limit = DEMO ? 6 : BOT ? 4 : 8;
    if (pollsDone >= limit) {
      endGame();
      return;
    }
    loadPoll();
    phase = 'play';
  }

  function endGame() {
    phase = 'over';
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = score;
      ctaAt = performance.now();
      setTimeout(function () { phase = 'cta'; }, 400);
      setTimeout(function () { window.__demoDone = true; }, 4200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () {
          // reset for next run
          polls      = shuffle(POLLS);
          pollIdx    = 0;
          pollsDone  = 0;
          chosen     = null;
          barA = barB = 0.5;
          barADisp = barBDisp = 0;
          score      = 0;
          runStartTs = Date.now();
          flashes    = [];
          botActed   = false;
          phase      = 'play';
          loadPoll();
          if (window.LOOP) LOOP.emit('restart', {});
          if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
        }, 600);
      }
    }
  }

  // ---- input hit regions ----
  var MUTE_R  = { x: W - 46,         y: 10,  w: 38, h: 38 };
  var BTN_A_R = { x: W / 2 - 175,    y: 430, w: 160, h: 70 };
  var BTN_B_R = { x: W / 2 + 15,     y: 430, w: 160, h: 70 };

  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') {
      phase = 'play';
      loadPoll();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    if (phase === 'play') {
      if (x !== undefined && inR(BTN_A_R, x, y)) { pick('a'); return; }
      if (x !== undefined && inR(BTN_B_R, x, y)) { pick('b'); return; }
    }
    if (phase === 'over' && performance.now() - revealStart > 500) {
      // restart
      polls      = shuffle(POLLS);
      pollIdx    = 0;
      pollsDone  = 0;
      chosen     = null;
      barA = barB = 0.5;
      barADisp = barBDisp = 0;
      score      = 0;
      runStartTs = Date.now();
      flashes    = [];
      phase      = 'play';
      loadPoll();
      if (window.LOOP) LOOP.emit('restart', {});
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });

  // ---- autopilots ----
  function autopilot(now) {
    if (!DEMO && !BOT) return;
    if (phase !== 'play') return;

    if (hitStop > 0) return;   // wait for any freeze

    if (demoWaitFrames > 0) { demoWaitFrames--; return; }

    if (!botActed) {
      botActed = true;
      var side;
      if (DEMO) {
        side = demoPicks[pollIdx % demoPicks.length] === 0 ? 'a' : 'b';
      } else {
        side = rng() < 0.5 ? 'a' : 'b';
      }
      pick(side);
    }
  }

  // after reveal, auto-advance
  function checkRevealDone(now) {
    if (phase !== 'reveal') return;
    if (now - revealStart > revealDur) {
      botActed = false;
      demoWaitFrames = DEMO ? 48 : 20;
      nextPoll();
    }
  }

  // ---- easing ----
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ---- draw helpers ----
  function roundRect(x, y, w, h, r) {
    cx.beginPath();
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); }
    else {
      cx.moveTo(x + r, y);
      cx.lineTo(x + w - r, y); cx.arcTo(x + w, y,     x + w, y + r,     r);
      cx.lineTo(x + w, y + h - r); cx.arcTo(x + w, y + h, x + w - r, y + h, r);
      cx.lineTo(x + r, y + h); cx.arcTo(x,     y + h, x,     y + h - r, r);
      cx.lineTo(x, y + r); cx.arcTo(x, y,         x + r, y,             r);
      cx.closePath();
    }
  }

  // ---- render ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // decay juice
    if (hitStop > 0) hitStop -= dt; else autopilot(now);
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    checkRevealDone(now);

    // animated bar fill
    barADisp += (barA - barADisp) * 0.08 * dt;
    barBDisp += (barB - barBDisp) * 0.08 * dt;

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(242,177,52,0.04)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- title screen ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '700 36px -apple-system, Helvetica, Arial';
      cx.fillText('POLL NO STAKES', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '400 17px -apple-system, Helvetica, Arial';
      cx.fillText('just your opinion.', W / 2, 340);
      var pulse = 0.55 + 0.45 * Math.sin(now / 700);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '600 16px -apple-system, Helvetica, Arial';
      cx.fillText('tap to begin', W / 2, 400);
      cx.globalAlpha = 1;
    }

    // ---- play / reveal ----
    if (phase === 'play' || phase === 'reveal') {
      var poll = polls[pollIdx % polls.length];
      var fadeAlpha = Math.min(1, (now - fadeIn) / fadeInDur);
      cx.globalAlpha = fadeAlpha;

      // question
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '300 26px -apple-system, Helvetica, Arial';
      // wrap long questions
      var words = poll.q.split(' '), line = '', lines = [];
      for (var w = 0; w < words.length; w++) {
        var test = line ? line + ' ' + words[w] : words[w];
        cx.font = '300 26px -apple-system, Helvetica, Arial';
        if (cx.measureText(test).width > 330 && line) { lines.push(line); line = words[w]; }
        else line = test;
      }
      if (line) lines.push(line);
      var qY = 220;
      for (var li = 0; li < lines.length; li++) {
        cx.fillText(lines[li], W / 2, qY + li * 36);
      }

      // poll counter dots
      var limit = DEMO ? 6 : BOT ? 4 : 8;
      var dotSpacing = 14, dotR = 4;
      var dotsW = limit * dotSpacing;
      var dotStartX = W / 2 - dotsW / 2 + dotSpacing / 2;
      for (var d = 0; d < limit; d++) {
        cx.beginPath();
        cx.arc(dotStartX + d * dotSpacing, 170, dotR, 0, Math.PI * 2);
        if (d < pollsDone) { cx.fillStyle = TEAL; }
        else if (d === pollsDone) { cx.fillStyle = 'rgba(46,197,182,0.45)'; }
        else { cx.fillStyle = 'rgba(255,255,255,0.15)'; }
        cx.fill();
      }

      // buttons
      var btnY = 430, btnH = 70, btnW = 160, gapX = W / 2 - 175;
      var btnAx = gapX, btnBx = W / 2 + 15;

      // button A
      var aSelected = chosen === 'a';
      var bSelected = chosen === 'b';
      cx.fillStyle = aSelected ? CARD_SEL : CARD_BG;
      roundRect(btnAx, btnY, btnW, btnH, 16);
      cx.fill();
      if (aSelected) {
        cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
        roundRect(btnAx, btnY, btnW, btnH, 16); cx.stroke();
      }
      cx.fillStyle = aSelected ? TEAL : 'rgba(255,255,255,0.75)';
      cx.font = '600 18px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText(poll.a, btnAx + btnW / 2, btnY + btnH / 2 + 7);

      // button B
      cx.fillStyle = bSelected ? CARD_SEL : CARD_BG;
      roundRect(btnBx, btnY, btnW, btnH, 16);
      cx.fill();
      if (bSelected) {
        cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
        roundRect(btnBx, btnY, btnW, btnH, 16); cx.stroke();
      }
      cx.fillStyle = bSelected ? TEAL : 'rgba(255,255,255,0.75)';
      cx.font = '600 18px -apple-system, Helvetica, Arial';
      cx.fillText(poll.b, btnBx + btnW / 2, btnY + btnH / 2 + 7);

      // reveal bars (after choosing)
      if (phase === 'reveal' || chosen !== null) {
        var revT = Math.min(1, (now - revealStart) / revealDur);
        var barY = 530, barH = 14, barW = 330, barX = W / 2 - barW / 2;
        var aFill = barADisp * barW;
        var bFill = barBDisp * barW;

        // bar background
        roundRect(barX, barY, barW, barH, 7);
        cx.fillStyle = 'rgba(255,255,255,0.08)'; cx.fill();

        // A side
        roundRect(barX, barY, aFill, barH, 7);
        cx.fillStyle = aSelected ? TEAL : 'rgba(46,197,182,0.45)'; cx.fill();

        // B side
        roundRect(barX + barW - bFill, barY, bFill, barH, 7);
        cx.fillStyle = bSelected ? GOLD : 'rgba(242,177,52,0.45)'; cx.fill();

        // percentages
        cx.font = '500 13px -apple-system, Helvetica, Arial';
        cx.textAlign = 'left';
        var aPct = Math.round(barADisp * 100);
        cx.fillStyle = aSelected ? TEAL : 'rgba(255,255,255,0.5)';
        cx.fillText(aPct + '%', barX, barY + barH + 18);
        cx.textAlign = 'right';
        cx.fillStyle = bSelected ? GOLD : 'rgba(255,255,255,0.5)';
        cx.fillText((100 - aPct) + '%', barX + barW, barY + barH + 18);

        // "you picked" note
        var pickLabel = chosen === 'a' ? poll.a : poll.b;
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.font = '400 12px -apple-system, Helvetica, Arial';
        cx.globalAlpha = fadeAlpha * Math.min(1, revT * 2.5);
        cx.fillText('you picked ' + pickLabel, W / 2, barY - 12);
        cx.globalAlpha = fadeAlpha;
      }

      cx.globalAlpha = 1;
    }

    // ---- over screen ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '300 22px -apple-system, Helvetica, Arial';
      cx.fillText('that\'s your take.', W / 2, 290);
      cx.fillStyle = TEAL;
      cx.font = '700 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 370);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '400 16px -apple-system, Helvetica, Arial';
      cx.fillText('opinions shared', W / 2, 400);

      if (!DEMO && !BOT) {
        var p2 = 0.55 + 0.45 * Math.sin(now / 700);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '600 16px -apple-system, Helvetica, Arial';
        cx.fillText('tap to go again', W / 2, 470);
        cx.globalAlpha = 1;
      }
    }

    // ---- demo CTA card ----
    if (phase === 'cta') {
      var t2 = (now - ctaAt) / 1000, ease = Math.min(1, t2 * 2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '700 38px -apple-system, Helvetica, Arial';
      cx.fillText('POLL NO STAKES', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '300 19px -apple-system, Helvetica, Arial';
      cx.fillText('just your opinion. no wrong answer.', W / 2, 340);
      var p3 = 0.65 + 0.35 * Math.sin(now / 600);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '700 24px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 412);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '400 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 445);
      cx.globalAlpha = 1;
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 35);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '600 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 35) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  initState();
  if (DEMO || BOT) loadPoll();
  requestAnimationFrame(frame);
})();
</script>
