  window.addEventListener('pointerdown', function (e) {

  });
  window.addEventListener('pointermove', function (e) {
    if (!dragging || DEMO || BOT || state.phase !== 'play') return;

    var x = (e.clientX - r.left) / scale;

  });
  window.addEventListener('pointerup', function () { dragging = false; });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- physics ----
  function spawnDrip(segIndex) {
    // angle mapped to horizontal position on the visible cylinder face
    var angleX = (rng() - 0.5) * PILLAR_W;
    var dist = Math.abs(angleX - pillar.guideX);
    var caught = dist < 34;
    var perfect = dist < 12;
    drips.push({
      segIndex: segIndex,
      x: W / 2 + angleX,
      y: PILLAR_TOP + segIndex * (PILLAR_H / SEGMENTS) + (PILLAR_H / SEGMENTS) / 2,
      vy: 0.8 + rng() * 0.7,
      angleX: angleX,
      caught: caught,
      perfect: perfect,
      landed: false,
      t: 0

  function scoreDrip(d) {
    var points = d.perfect ? 100 : 50;
    state.score += points;
    pool = Math.min(1, pool + 0.04);
    flash(d.perfect ? '+100' : '+50', d.perfect ? GOLD : TEAL, d.perfect ? 32 : 24);

    for (var i = 0; i < drips.length; i++) {
      var d = drips[i];
      if (!d.landed && d.y > bestY) { bestY = d.y; target = d; }

      var err = DEMO ? (rng() - 0.5) * 10 : gauss() * 14;
      pillar.targetGuideX = Math.max(-PILLAR_W / 2, Math.min(PILLAR_W / 2, target.angleX + err));

      pillar.targetGuideX *= 0.95;
    }
  }

  function gauss() {
    var u = 1 - rng(), v = rng();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);

    bg.addColorStop(1, 'rgba(242,177,52,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    drawPillar();
    drawPool();
    drawDrips();
    drawGlowOverlay();

    // score / progress
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 76);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('GLOW', W / 2, 98);

      cx.fillStyle = 'rgba(255,255,255,0.12)';

    // title / settle

      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('WAX MELT', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';

      cx.globalAlpha = pulse; cx.fillText('TAP TO IGNITE', W / 2, 326); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';

    // completion card
    if (state.phase === 'over') {

      cx.textAlign = 'center';

      cx.fillText('MELTED.', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' glow', W / 2, 344);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      var pct = Math.round((state.score / 1600) * 100);
      cx.fillText('smoothness ' + Math.min(100, pct) + '%', W / 2, 374);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 300);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — LIGHT ANOTHER', W / 2, 430);
        cx.globalAlpha = 1;
        // share pill

      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('WAX MELT', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('slow melt. soft glow. yours to guide.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 404);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 438);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
