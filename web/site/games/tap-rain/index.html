<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 18;
  var SEED = +qs.get('seed') || (DEMO ? 7 : 42);

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134', MIST = '#a8c5d9';
  var GROUND_Y = 520, TILT_VIS = 28, POOL_TOP = 560, POOL_BOTTOM = 690, POOL_W = 108;
  var ROLL_SPEED = 3.8, SINK_SPEED = 2.6, FILL_PER_DROP = 3.5; // 100 / 3.5 ≈ 29 drops to full

  var state, flashes, runStartTs, demoStartTs, ctaAt, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false, botRunsDone = 0;
  try { best = +localStorage.getItem('tap_rain_best') || 0; } catch (_) {}

  function newGame() {
    state = {
      phase: DEMO || BOT ? 'play' : 'title',
      tilt: 0, tiltTarget: 0,
      drops: [],
      pool: 0, caught: 0,
      spawnT: 0, spawnInterval: 0.55,
      overAt: 0, demoT: 0
    };
    Object.defineProperty(state, 'score', {
      get: function () { return Math.floor(this.pool); },
      configurable: true
    });
    flashes = []; dareBeaten = false;
    if (DEMO || BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    state.drops = []; state.pool = 0; state.caught = 0; state.spawnT = 0;
    runStartTs = Date.now();
    if (DEMO) demoStartTs = performance.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnDrop() {
    var x = 24 + rng() * (W - 48);
    var hue = rng() < 0.25 ? 46 : (rng() < 0.6 ? 168 : 200); // gold or teal/blue mist
    state.drops.push({
      x: x, y: -12, r: 3 + rng() * 3,
      vy: 2.2 + rng() * 1.4,
      vx: 0,
      mode: 'fall',
      hue: hue,
      alpha: 0.85
    });
  }

  function demoSpawnInterval(t) {
    if (t < 3) return 0.85;
    if (t < 9) return 0.48;
    if (t < 14) return 0.38;
    return 999;
  }

  function catchDrop(d) {
    if (state.phase !== 'play') return;
    state.pool = Math.min(100, state.pool + FILL_PER_DROP);
    state.caught++;
    flashes.push({ txt: '+' + FILL_PER_DROP + '%', color: TEAL, size: 26, t: 0, x: d.x, y: d.y });
    hitStop = 2; shakeAmt = Math.max(shakeAmt, 1.6); zoom = 1.006;
    if (window.J) J.calm(state.caught);
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.pool > SHARE.dare) {
      dareBeaten = true;
      flashes.push({ txt: 'DARE BEATEN', color: TEAL, size: 34, t: 0, x: W / 2, y: 250 });
      if (window.J) J.calm(6);
      SHARE.beaten(state.score);
    }
    if (window.LOOP) LOOP.emit('drop_caught', { n: state.caught, pool: +state.pool.toFixed(1) });
    if (state.pool >= 100) { state.pool = 100; gameOver(); }
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (newBest) { best = state.score; try { localStorage.setItem('tap_rain_best', String(best)); } catch (_) {} }
    if (window.J) J.calm(5);
    if (DEMO) window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      var untilCTA = Math.max(0, 16000 - (performance.now() - demoStartTs));
      setTimeout(function () {
        state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, untilCTA);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) window.__botDone = true;
      else setTimeout(function () { resetRun(); }, 700);
    }
  }

  function resetRun() {
    state.drops = []; state.pool = 0; state.caught = 0; state.spawnT = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 118, y: 502, w: 236, h: 44 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function setTiltFromX(x) { state.tiltTarget = clamp((x - W / 2) / (W / 2), -1, 1); }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && window.SHARE && inR(SHARE_R, x, y)) {
        SHARE.send({ score: state.score, unit: '%' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointermove', function (e) {
    if (DEMO || BOT || state.phase !== 'play') return;
    var r = cv.getBoundingClientRect();
    setTiltFromX((e.clientX - r.left) / scale);
  });

  // ---- autopilot ----
  function autopilot() {
    if (!(DEMO || BOT) || state.phase !== 'play') return;
    var desired = 0, weight = 0;
    for (var i = 0; i < state.drops.length; i++) {
      var d = state.drops[i];
      if (d.mode === 'fall' && d.y > GROUND_Y - 150) {
        var u = 1 - (GROUND_Y - d.y) / 150;
        desired += ((W / 2 - d.x) / (W / 2)) * u; weight += u;
      } else if (d.mode === 'roll') {
        desired += (W / 2 - d.x) / (W / 2); weight += 1;
      }
    }
    var target = weight ? clamp(desired / weight, -1, 1) : 0;
    var noise = 0;
    if (DEMO) noise = Math.sin(state.demoT * 1.1) * 0.18 + gauss() * 0.07;
    else noise = gauss() * (BOT_ERR / 25);
    state.tiltTarget = clamp(target + noise, -1, 1);
  }

  // ---- render ----
  function drawDrop(d) {
    cx.save();
    cx.globalAlpha = d.alpha;
    var g = cx.createRadialGradient(d.x - d.r * 0.3, d.y - d.r * 0.3, 0, d.x, d.y, d.r * 1.6);
    var c = d.hue === 46 ? 'hsl(46,90%,62%)' : 'hsl(168,70%,62%)';
    g.addColorStop(0, '#fff');
    g.addColorStop(0.5, c);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    cx.fillStyle = g;
    cx.beginPath();
    cx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    cx.fill();
    if (d.mode === 'fall') {
      cx.strokeStyle = 'rgba(255,255,255,0.25)';
      cx.lineWidth = 1;
      cx.beginPath();
      cx.moveTo(d.x, d.y); cx.lineTo(d.x, d.y - d.vy * 5);
      cx.stroke();
    }
    cx.restore();
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // smooth tilt toward target
    state.tilt += (state.tiltTarget - state.tilt) * 0.14 * dt;

    if (hitStop > 0) hitStop -= dt;
    else if (state.phase === 'play') {
      var dtSec = dt / 60;
      state.spawnT += dtSec;
      var interval = DEMO ? demoSpawnInterval(state.demoT) : state.spawnInterval;
      while (state.spawnT >= interval) {
        state.spawnT -= interval;
        spawnDrop();
      }
      if (DEMO) {
        state.demoT += dtSec;
        if (state.demoT >= 15.5 && state.pool < 100) {
          state.pool = 100;
          gameOver();
        }
      }

      for (var i = state.drops.length - 1; i >= 0; i--) {
        var d = state.drops[i];
        if (d.mode === 'fall') {
          d.y += d.vy * dt;
          if (d.y >= GROUND_Y - d.r) {
            d.mode = 'roll'; d.y = GROUND_Y; d.vx = state.tilt * ROLL_SPEED;
          }
        } else if (d.mode === 'roll') {
          d.x += d.vx * dt;
          if (Math.abs(d.x - W / 2) <= POOL_W / 2 + d.r + 8) {
            d.mode = 'sink'; d.vx *= 0.25; d.vy = SINK_SPEED;
          } else if (d.x < -35 || d.x > W + 35) {
            d.mode = 'fade'; d.vx = 0;
          }
        } else if (d.mode === 'sink') {
          d.x += d.vx * dt; d.y += d.vy * dt; d.alpha -= 0.025 * dt;
          if (d.y >= POOL_BOTTOM - d.r || d.alpha <= 0.3) {
            catchDrop(d);
            state.drops.splice(i, 1);
            if (state.phase === 'over') break;
            continue;
          }
        } else if (d.mode === 'fade') {
          d.x += d.vx * dt; d.alpha -= 0.035 * dt;
          if (d.alpha <= 0) { state.drops.splice(i, 1); continue; }
        }
        if (d.y > H + 40 || d.x < -60 || d.x > W + 60) state.drops.splice(i, 1);
      }
      autopilot();
    }

    shakeAmt *= Math.pow(0.88, dt); zoom += (1 - zoom) * 0.12 * dt;

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(0.55, 'rgba(11,13,18,0)');
    bg.addColorStop(1, 'rgba(46,197,182,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ground / surface
    var ly = GROUND_Y + state.tilt * TILT_VIS;
    var ry = GROUND_Y - state.tilt * TILT_VIS;
    cx.fillStyle = 'rgba(46,197,182,0.08)';
    cx.beginPath();
    cx.moveTo(0, ly); cx.lineTo(W, ry); cx.lineTo(W, H); cx.lineTo(0, H); cx.closePath();
    cx.fill();
    cx.strokeStyle = 'rgba(46,197,182,0.35)';
    cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(0, ly); cx.lineTo(W, ry); cx.stroke();

    // pool
    var poolH = POOL_BOTTOM - POOL_TOP;
    var fillH = poolH * (state.pool / 100);
    var px = (W - POOL_W) / 2;
    cx.fillStyle = 'rgba(46,197,182,0.12)';
    cx.fillRect(px, POOL_TOP, POOL_W, poolH);
    var pg = cx.createLinearGradient(0, POOL_BOTTOM - fillH, 0, POOL_BOTTOM);
    pg.addColorStop(0, 'rgba(46,197,182,0.55)');
    pg.addColorStop(1, 'rgba(46,197,182,0.25)');
    cx.fillStyle = pg;
    cx.fillRect(px + 2, POOL_BOTTOM - fillH, POOL_W - 4, fillH);
    cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
    cx.strokeRect(px + 1.5, POOL_TOP + 1.5, POOL_W - 3, poolH - 3);

    // drops
    for (var k = 0; k < state.drops.length; k++) drawDrop(state.drops[k]);

    // score
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '%', W / 2, 92);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('POOL FULL AT 100', W / 2, 118);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best + '%', W / 2, 142);
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + '%' + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 172);
      }
    }

    // flashes
    for (var f = flashes.length - 1; f >= 0; f--) {
      var fl = flashes[f]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 42);
      cx.save(); cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.35) + 'px -apple-system, Helvetica, Arial';
      var fx = fl.x || W / 2;
      var fy = (fl.y || 250) - fl.t * 0.7;
      cx.fillText(fl.txt, fx, fy);
      cx.restore();
      if (fl.t > 42) flashes.splice(f, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('TAP RAIN', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillText('SLIDE TO TILT', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('guide the rain into the pool', W / 2, 360);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('POOL FULL', W / 2, 292);
      cx.fillStyle = '#fff'; cx.font = '800 30px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '%', W / 2, 342);
      var dur = ((Date.now() - runStartTs) / 1000).toFixed(1);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText(dur + 's of rain', W / 2, 374);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — CATCH MORE RAIN', W / 2, 466);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(46,197,182,0.14)';
        cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 22);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = TEAL; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ SHARE THE CALM', W / 2, SHARE_R.y + 29);
      }
    }

    // demo CTA
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('TAP RAIN', W / 2, 296);
      cx.fillStyle = 'rgba(255,255,255,0.78)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('the rain slows when the pool is full', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 250);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
