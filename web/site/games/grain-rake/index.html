<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Grain Rake — Tilt</title>
<!--
  LOOP / attention-architecture — Grain Rake (calm engine)
  Circuits: 05-ease, 07-timing, 08-investment.
  Modes (query params):
    ?demo=1&seed=7        scripted calm arc ~16s → soft CTA, sets window.__demoDone
    ?bot=1&runs=3&seed=5  imperfect autopilot N runs, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'grain-rake';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134', SAND = '#6b7a5f';
  var COLS = 27, ROWS = 48;
  var cellW = W / COLS, cellH = H / ROWS;
  var RAKE_R = 34;

  var cells, rake, state, runStartTs, overAt, ctaAt;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var best = 0, dareBeaten = false, botRunsDone = 0, botStepIdx = 0;
  var lastCrossTs = 0, lastCombEmit = 0;
  var flashes = [];
  try { best = +localStorage.getItem('gr_best') || 0; } catch (_) {}

  function initCells() {
    cells = [];
    for (var r = 0; r < ROWS; r++) {
      var row = [];
      for (var c = 0; c < COLS; c++) {
        row.push({
          combed: 0,
          angle: 0,
          grain: rng() * Math.PI * 2,
          jitterX: (rng() - 0.5) * cellW * 0.55,
          jitterY: (rng() - 0.5) * cellH * 0.55,
        });
      }
      cells.push(row);
    }
  }

  function coverage() {
    var n = 0;
    for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) if (cells[r][c].combed > 0.5) n++;
    return n / (ROWS * COLS);
  }

  function newGame() {
    initCells();
    state = { phase: 'title', score: 0, dur: 0 };
    rake = { x: W / 2, y: H / 2, vx: 0, vy: 0, active: false };
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false; botStepIdx = 0;
    lastCrossTs = 0; lastCombEmit = 0; flashes = [];
    if (DEMO) setTimeout(startRun, 1200);
    else if (BOT) setTimeout(startRun, 300);
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    rake.active = true;
    if (DEMO) { rake.x = W * 0.1; rake.y = H * 0.07; }
    else if (BOT) { rake.x = W * 0.08 + gauss() * 10; rake.y = H * 0.08 + gauss() * 8; }
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function completeGame() {
    if (state.phase !== 'play') return;
    state.phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    state.dur = dur;
    var score = Math.min(100, Math.round(coverage() * 100));
    state.score = score;
    if (score > best) { best = score; try { localStorage.setItem('gr_best', String(best)); } catch (_) {} }
    if (window.J) J.calm(5);
    zoom = 1.02;
    flash('GARDEN COMPLETE', TEAL, 40);
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now(); setTimeout(function () { window.__demoDone = true; }, 3500); }, 1200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) window.__botDone = true;
      else setTimeout(function () { newGame(); startRun(); }, 900);
    }
  }

  function resetRun() {
    newGame();
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  function normalizeAngle(a) { while (a > Math.PI) a -= Math.PI * 2; while (a < -Math.PI) a += Math.PI * 2; return a; }
  function lerpAngle(a, b, t) { var d = normalizeAngle(b - a); return a + d * t; }

  function rakeStep(x, y, dx, dy, strength) {
    var spd = Math.sqrt(dx * dx + dy * dy);
    if (spd < 0.35) return;
    var angle = Math.atan2(dy, dx);
    var c0 = Math.floor((x - RAKE_R) / cellW), c1 = Math.ceil((x + RAKE_R) / cellW);
    var r0 = Math.floor((y - RAKE_R) / cellH), r1 = Math.ceil((y + RAKE_R) / cellH);
    var crossed = 0, combed = 0;
    for (var r = Math.max(0, r0); r <= Math.min(ROWS - 1, r1); r++) {
      for (var c = Math.max(0, c0); c <= Math.min(COLS - 1, c1); c++) {
        var cell = cells[r][c];
        var cx_ = c * cellW + cellW / 2, cy = r * cellH + cellH / 2;
        if (Math.hypot(cx_ - x, cy - y) > RAKE_R) continue;
        if (cell.combed > 0.25) {
          var adiff = Math.abs(normalizeAngle(angle - cell.angle));
          if (adiff > Math.PI / 3) {
            cell.combed = Math.max(0, cell.combed - strength * 0.8);
            crossed++;
            continue;
          }
        }
        cell.angle = cell.combed > 0.15 ? lerpAngle(cell.angle, angle, 0.25) : angle;
        cell.combed = Math.min(1, cell.combed + strength);
        combed++;
      }
    }
    if (combed > 0) {
      var nowTs = Date.now();
      if (nowTs - lastCombEmit > 250 && window.LOOP) {
        lastCombEmit = nowTs;
        LOOP.emit('comb', { coverage: +coverage().toFixed(3), cells: combed });
      }
      if (window.J && !DEMO && !BOT) J.calm(Math.min(7, Math.floor(coverage() * 8) + 1));
    }
    if (crossed > 0) {
      shakeAmt = 2.2;
      hitStop = 2.5;
      flash('crossed', 'rgba(255,255,255,0.25)', 18);
      var nowTs2 = Date.now();
      if (nowTs2 - lastCrossTs > 400 && window.LOOP) {
        lastCrossTs = nowTs2;
        LOOP.emit('near_miss', { crossed: crossed, coverage: +coverage().toFixed(3) });
      }
      if (window.J && !DEMO && !BOT) J.calm(1);
    }
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) resetRun();
  }

  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
    if (inR(MUTE_R, x, y)) { if (window.J) J.toggleMute(); return; }
    rake.active = true;
    rake.x = x; rake.y = y; rake.vx = 0; rake.vy = 0;
    if (state.phase === 'title') startRun();
  });
  window.addEventListener('pointermove', function (e) {
    if (DEMO || BOT) return;
    if (!rake.active) return;
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
    rake.vx = x - rake.x; rake.vy = y - rake.y;
    rake.x = x; rake.y = y;
  });
  window.addEventListener('pointerup', function () { if (DEMO || BOT) return; rake.active = false; rake.vx = 0; rake.vy = 0; });
  window.addEventListener('pointercancel', function () { if (DEMO || BOT) return; rake.active = false; rake.vx = 0; rake.vy = 0; });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  var demoScript = [];
  for (var i = 0; i < 16; i++) {
    var t = i / 15;
    var speed = i < 4 ? 6.0 + rng() * 1.2 : (i < 12 ? 8.2 + rng() * 1.0 : 7.0 + rng() * 1.2);
    demoScript.push({
      y: H * 0.07 + t * H * 0.86,
      wait: 14 + Math.round(rng() * 14),
      speed: speed
    });
  }
  var demoIdx = 0, demoWait = 0, demoSide = 0;

  function autopilot() {
    if (state.phase !== 'play') return;
    if (DEMO) {
      if (demoIdx >= demoScript.length) { completeGame(); return; }
      if (demoWait > 0) { demoWait--; return; }
      var s = demoScript[demoIdx];
      var tx = demoSide === 0 ? W * 0.92 : W * 0.08;
      var dx = tx - rake.x, dy = s.y - rake.y;
      var dist = Math.hypot(dx, dy);
      if (dist < 10) {
        demoSide = 1 - demoSide;
        demoIdx++;
        demoWait = s.wait;
        if (demoIdx >= demoScript.length && window.LOOP) LOOP.emit('rake_pass', { n: demoIdx, coverage: +coverage().toFixed(3) });
        return;
      }
      var ang = Math.atan2(dy, dx);
      rake.vx = Math.cos(ang) * s.speed; rake.vy = Math.sin(ang) * s.speed;
      rake.x += rake.vx; rake.y += rake.vy;
      rakeStep(rake.x, rake.y, rake.vx, rake.vy, 0.16);
    } else if (BOT) {
      var sweepCount = 18;
      if (botStepIdx >= sweepCount) { completeGame(); return; }
      var by = H * 0.06 + botStepIdx * (H * 0.9 / sweepCount) + gauss() * 10;
      var tx = (botStepIdx % 2 === 0) ? W * 0.94 : W * 0.06;
      var dx = tx - rake.x, dy = by - rake.y;
      var dist = Math.hypot(dx, dy);
      if (dist < 14) { botStepIdx++; return; }
      var ang = Math.atan2(dy, dx);
      var speed = 7.0 + gauss() * 1.4;
      rake.vx = Math.cos(ang) * speed; rake.vy = Math.sin(ang) * speed;
      rake.x += rake.vx; rake.y += rake.vy;
      rakeStep(rake.x, rake.y, rake.vx, rake.vy, 0.15);
    }
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // update rake (frozen during hit-stop)
    if (hitStop > 0) hitStop -= dt;
    else if (state.phase === 'play') autopilot();

    var cov = coverage();
    state.score = Math.min(100, Math.round(cov * 100));
    if (state.phase === 'play' && cov >= 0.86) completeGame();

    // juice decay
    shakeAmt *= Math.pow(0.88, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)'); bg.addColorStop(1, 'rgba(242,177,52,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // garden cells
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var cell = cells[r][c];
        var cx_ = c * cellW + cellW / 2, cy = r * cellH + cellH / 2;
        if (cell.combed > 0.35) {
          cx.globalAlpha = Math.min(1, cell.combed);
          cx.strokeStyle = TEAL;
          cx.lineWidth = 1.2;
          cx.beginPath();
          var len = cellW * 0.55;
          cx.moveTo(cx_ - Math.cos(cell.angle) * len / 2, cy - Math.sin(cell.angle) * len / 2);
          cx.lineTo(cx_ + Math.cos(cell.angle) * len / 2, cy + Math.sin(cell.angle) * len / 2);
          cx.stroke();
          cx.globalAlpha = 1;
        } else {
          cx.globalAlpha = 0.45 + cell.combed * 0.3;
          cx.fillStyle = SAND;
          var gx = cx_ + cell.jitterX, gy = cy + cell.jitterY;
          cx.beginPath(); cx.arc(gx, gy, 1.2, 0, Math.PI * 2); cx.fill();
          var gx2 = cx_ + Math.cos(cell.grain) * cellW * 0.2, gy2 = cy + Math.sin(cell.grain) * cellH * 0.2;
          cx.beginPath(); cx.arc(gx2, gy2, 0.9, 0, Math.PI * 2); cx.fill();
          cx.globalAlpha = 1;
        }
      }
    }

    // rake
    if (state.phase === 'play' || state.phase === 'over') {
      cx.save();
      cx.translate(rake.x, rake.y);
      cx.strokeStyle = 'rgba(255,255,255,0.18)'; cx.lineWidth = 1.5;
      for (var t = -3; t <= 3; t++) {
        cx.beginPath(); cx.moveTo(t * 7, -22); cx.lineTo(t * 7, 22); cx.stroke();
      }
      cx.strokeStyle = 'rgba(46,197,182,0.28)'; cx.lineWidth = 2.5;
      cx.beginPath(); cx.moveTo(-32, 0); cx.lineTo(32, 0); cx.stroke();
      cx.restore();
    }

    // score
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '%', W / 2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best + '%', W / 2, 110);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('GRAIN RAKE', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('DRAG TO RAKE', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('one quiet garden. clean parallel lines.', W / 2, 360);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // completion card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.42)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('GARDEN COMPLETE', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '% raked', W / 2, 345);
      var pt = Math.max(1, Math.min(99, Math.round(100 * Math.exp(-state.score / 25))));
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 388);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — RAKE AGAIN', W / 2, 452);
        cx.globalAlpha = 1;
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('GRAIN RAKE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('rake your own quiet lines', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 405);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 435);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial'; cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
