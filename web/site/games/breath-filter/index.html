<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO    = qs.get('demo') === '1';
  var BOT     = qs.get('bot')  === '1';
  var BOT_RUNS = Math.max(1, +qs.get('runs') || 3);
  var SEED    = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // --- Constants ---
  var MAX_BREATHS = 6;      // cycles to complete a session
  // Bot mode uses compressed durations so 2 sessions fit within the 120s timeout
  var INHALE_DUR  = BOT ? 1.4 : 4.0;   // seconds for a full inhale
  var EXHALE_DUR  = BOT ? 1.4 : 4.0;   // seconds for a full exhale

  // --- Global game state ---
  var phase;        // 'title' | 'play' | 'over' | 'cta'
  var breathPhase;  // 'idle' | 'inhale' | 'exhale'
  var held;         // boolean — is thumb/key held down?
  var inhaleT;      // progress seconds in current inhale
  var exhaleT;      // progress seconds in current exhale
  var cycles;       // completed cycles (score)
  var warmth;       // 0–1 visual warmth
  var clarity;      // 0–1 visual clarity
  var overAt, ctaAt, runStartTs;
  var sessionEnded; // guard to prevent double-ending

  // --- Juice ---
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [];
  var orbs    = [];
  var orbTimer = 0;

  // --- Bot state (persists across runs) ---
  var botRunsDone = 0;
  // Per-run bot state (reset each run)
  var botHolding, botHeldFor, botPausedFor, botTargetHold, botTargetPause;

  function newBotCycle() {
    // Imperfect: variance around exact durations, but always >= required
    // to ensure cycles complete (not too short to miss the threshold)
    botTargetHold  = INHALE_DUR  * (1.05 + rng() * 0.20);
    botTargetPause = EXHALE_DUR  * (1.05 + rng() * 0.20);
  }

  // --- Demo state ---
  // Demo script: each entry is [holdDur_s, pauseBefore_s]
  var demoScript = [
    [3.8, 1.3],   // breath 1 – settle
    [4.0, 0.9],   // breath 2 – deepen
    [4.1, 0.8],   // breath 3
    [3.9, 0.9],   // breath 4
    [4.0, 1.0],   // breath 5 – resolve
    [3.8, 0.9]    // breath 6 – completion
  ];
  var demoStep, demoPhase, demoTimer;
  // demoPhase: 'pause' | 'hold'

  // --- Init a new session ---
  function initSession() {
    phase        = 'play';
    breathPhase  = 'idle';
    held         = false;
    inhaleT      = 0;
    exhaleT      = 0;
    cycles       = 0;
    warmth       = 0;
    clarity      = 0;
    sessionEnded = false;
    flashes      = [];
    runStartTs   = Date.now();

    // reset per-run bot
    botHolding      = false;
    botHeldFor      = 0;
    botPausedFor    = 0;
    newBotCycle();

    // reset demo step
    demoStep  = 0;
    demoPhase = 'pause';
    demoTimer = 0;

    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function startGame() {
    phase = 'title';
    if (BOT || DEMO) {
      initSession();
    }
  }

  // --- End a session ---
  function endSession() {
    if (sessionEnded) return;
    sessionEnded = true;
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    window.__demoScore = cycles;
    if (window.J) J.calm(Math.max(1, cycles));
    if (window.LOOP) LOOP.emit('game_over', { score: cycles, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2200);
    }

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () {
          initSession();
        }, 100);
      }
    }
  }

  // --- Complete a breath cycle ---
  function completeCycle() {
    cycles++;
    if (window.J) J.calm(cycles);
    flash(cycles === MAX_BREATHS ? 'complete' : '+1 breath', TEAL, 26);
    if (window.LOOP) LOOP.emit('breath_cycle', { n: cycles, warmth: +warmth.toFixed(2) });
    if (cycles >= MAX_BREATHS) {
      zoom = 1.025;
      // BOT mode: end immediately so runs stay within the 120s timeout
      setTimeout(endSession, BOT ? 50 : 700);
    } else {
      breathPhase = 'idle';
    }
  }

  // --- Floating text ---
  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // --- Input ---
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function pressDown(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { initSession(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) { initSession(); return; }
    if (phase === 'play') held = true;
  }
  function pressUp() {
    if (DEMO || BOT) return;
    held = false;
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    pressDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointerup',    function () { pressUp(); });
  window.addEventListener('pointerleave', function () { pressUp(); });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') { e.preventDefault(); pressDown(); } });
  window.addEventListener('keyup',   function (e) { if (e.code === 'Space') pressUp(); });

  // --- Autopilot (demo + bot) ---
  function autopilot(dt) {
    if (phase !== 'play' || sessionEnded) return;

    if (DEMO) {
      if (demoStep >= demoScript.length) {
        // All scripted steps done — end
        held = false;
        endSession();
        return;
      }
      var step = demoScript[demoStep];
      demoTimer += dt;
      if (demoPhase === 'pause') {
        held = false;
        if (demoTimer >= step[1]) {
          demoPhase = 'hold';
          demoTimer = 0;
          held = true;
        }
      } else {
        held = true;
        if (demoTimer >= step[0]) {
          held = false;
          demoPhase = 'pause';
          demoTimer = 0;
          demoStep++;
        }
      }
    } else if (BOT) {
      if (!botHolding) {
        botPausedFor += dt;
        held = false;
        if (botPausedFor >= botTargetPause) {
          botHolding   = true;
          botHeldFor   = 0;
          botPausedFor = 0;
          held = true;
        }
      } else {
        botHeldFor += dt;
        held = true;
        if (botHeldFor >= botTargetHold) {
          botHolding = false;
          botHeldFor = 0;
          held = false;
          newBotCycle();
        }
      }
    }
  }

  // --- Physics / breath simulation ---
  function update(dt) {
    if (phase !== 'play') return;

    // Warm/clarity track held state smoothly
    if (held) {
      warmth  = Math.min(1, warmth  + dt / INHALE_DUR);
      clarity = Math.min(1, clarity + dt / INHALE_DUR);
    } else {
      warmth  = Math.max(0, warmth  - dt / EXHALE_DUR);
      clarity = Math.max(0, clarity - dt / EXHALE_DUR);
    }

    // Breath cycle state machine
    if (breathPhase === 'idle') {
      if (held) {
        breathPhase = 'inhale';
        inhaleT = 0;
      }
    } else if (breathPhase === 'inhale') {
      if (held) {
        inhaleT += dt;
        if (inhaleT >= INHALE_DUR) {
          breathPhase = 'exhale';
          exhaleT = 0;
          inhaleT = INHALE_DUR;
        }
      } else {
        // released before full inhale — reset
        breathPhase = 'idle';
        inhaleT = 0;
      }
    } else if (breathPhase === 'exhale') {
      if (!held) {
        exhaleT += dt;
        if (exhaleT >= EXHALE_DUR) {
          exhaleT = EXHALE_DUR;
          breathPhase = 'idle';
          completeCycle();
        }
      } else {
        // re-held — reset exhale
        exhaleT = 0;
      }
    }
  }

  // --- Particle orbs ---
  function spawnOrb() {
    var hue = 175 + warmth * (-20);
    orbs.push({
      x: W * 0.18 + rng() * W * 0.64,
      y: H * 0.5 + (rng() - 0.5) * H * 0.22,
      r: 6 + rng() * 18,
      vy: -(0.25 + rng() * 0.45),
      alpha: 0.10 + rng() * 0.09,
      hue: hue,
      life: 0,
      maxLife: 70 + rng() * 55
    });
    if (orbs.length > 40) orbs.splice(0, 1);
  }

  // --- Draw helpers ---
  function lerp(a, b, t) { return a + (b - a) * t; }

  function drawBackground() {
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);

    // Ambient teal glow — breathes with warmth
    var glowR = 115 + warmth * 65;
    var glowA = 0.04 + warmth * 0.10;
    var gr = cx.createRadialGradient(W / 2, H * 0.42, 0, W / 2, H * 0.42, glowR);
    gr.addColorStop(0, 'rgba(46,197,182,' + (glowA * 2.2) + ')');
    gr.addColorStop(0.5,'rgba(46,197,182,' + glowA + ')');
    gr.addColorStop(1,  'rgba(46,197,182,0)');
    cx.fillStyle = gr; cx.fillRect(0, 0, W, H);

    // Gold warmth haze on deep inhale
    if (warmth > 0.35) {
      var wa = (warmth - 0.35) / 0.65 * 0.065;
      var wg = cx.createRadialGradient(W / 2, H * 0.38, 0, W / 2, H * 0.38, 170);
      wg.addColorStop(0, 'rgba(242,177,52,' + (wa * 1.6) + ')');
      wg.addColorStop(1, 'rgba(242,177,52,0)');
      cx.fillStyle = wg; cx.fillRect(0, 0, W, H);
    }
  }

  function drawOrbs() {
    for (var i = orbs.length - 1; i >= 0; i--) {
      var o = orbs[i]; o.life += 1; o.y += o.vy;
      if (o.life > o.maxLife) { orbs.splice(i, 1); continue; }
      var fi = Math.min(1, o.life / 12);
      var fo = Math.max(0, 1 - (o.life - o.maxLife * 0.6) / (o.maxLife * 0.4));
      cx.beginPath();
      cx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
      cx.fillStyle = 'hsla(' + o.hue + ',55%,65%,' + (o.alpha * fi * fo) + ')';
      cx.fill();
    }
  }

  function drawBreathOrb(now) {
    var cx2 = W / 2, cy2 = H * 0.42;
    var baseR = 70 + warmth * 55;
    var pulse = Math.sin(now / 1900) * 2.5;
    var r = baseR + pulse;
    var hue = 185 - warmth * 22;

    // Soft layered glow
    var layers = 5;
    for (var i = layers; i >= 1; i--) {
      var frac = i / layers;
      var lr = r * (0.45 + frac * 0.65);
      var a = (0.035 + clarity * 0.055) * (1 - frac * 0.55);
      cx.beginPath();
      cx.arc(cx2, cy2, lr, 0, Math.PI * 2);
      cx.fillStyle = 'hsla(' + hue + ',58%,56%,' + a + ')';
      cx.fill();
    }

    // Core
    var cg = cx.createRadialGradient(cx2, cy2, 0, cx2, cy2, 26 + clarity * 24);
    cg.addColorStop(0, 'hsla(' + hue + ',68%,72%,' + (0.16 + clarity * 0.34) + ')');
    cg.addColorStop(0.5,'hsla(' + hue + ',60%,60%,' + (0.10 + clarity * 0.18) + ')');
    cg.addColorStop(1,  'hsla(' + hue + ',50%,50%,0)');
    cx.beginPath(); cx.arc(cx2, cy2, 26 + clarity * 24, 0, Math.PI * 2);
    cx.fillStyle = cg; cx.fill();

    // Outer ring
    cx.beginPath(); cx.arc(cx2, cy2, r, 0, Math.PI * 2);
    cx.strokeStyle = 'hsla(' + hue + ',55%,65%,' + (0.04 + clarity * 0.22) + ')';
    cx.lineWidth = 1.5; cx.stroke();
  }

  function drawBreathRing() {
    var cx2 = W / 2, cy2 = H * 0.42;
    var r = 108 + warmth * 54;
    var progress, direction, ringAlpha;
    if (breathPhase === 'inhale') {
      progress  = Math.min(1, inhaleT / INHALE_DUR);
      direction = 1;
      ringAlpha = 0.5 + warmth * 0.28;
    } else if (breathPhase === 'exhale') {
      progress  = 1 - Math.min(1, exhaleT / EXHALE_DUR);
      direction = 1;
      ringAlpha = 0.32 + (1 - warmth) * 0.18;
    } else {
      return;
    }
    var start = -Math.PI / 2;
    var end   = start + Math.PI * 2 * progress;
    var hue = 185 - warmth * 22;

    cx.beginPath(); cx.arc(cx2, cy2, r, start, end);
    cx.strokeStyle = 'hsla(' + hue + ',65%,62%,' + ringAlpha + ')';
    cx.lineWidth = 2.5; cx.lineCap = 'round'; cx.stroke();

    // Tip glow
    if (progress > 0.01) {
      var tx = cx2 + Math.cos(end) * r, ty = cy2 + Math.sin(end) * r;
      var tg = cx.createRadialGradient(tx, ty, 0, tx, ty, 13);
      tg.addColorStop(0, 'hsla(' + hue + ',70%,75%,0.42)');
      tg.addColorStop(1, 'rgba(0,0,0,0)');
      cx.beginPath(); cx.arc(tx, ty, 13, 0, Math.PI * 2);
      cx.fillStyle = tg; cx.fill();
    }
  }

  function drawPrompt(now) {
    cx.textAlign = 'center';
    var y = H * 0.42 + 168;
    if (breathPhase === 'idle') {
      var p = 0.4 + 0.35 * Math.sin(now / 720);
      cx.globalAlpha = p;
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '400 15px -apple-system, Helvetica, Arial';
      cx.fillText('hold to inhale', W / 2, y);
      cx.globalAlpha = 1;
    } else if (breathPhase === 'inhale') {
      cx.globalAlpha = 0.7;
      cx.fillStyle = TEAL;
      cx.font = '500 15px -apple-system, Helvetica, Arial';
      cx.fillText('inhaling  •••', W / 2, y);
      cx.globalAlpha = 1;
    } else if (breathPhase === 'exhale') {
      var ep = 0.5 + 0.3 * Math.sin(now / 520);
      cx.globalAlpha = ep;
      cx.fillStyle = 'rgba(46,197,182,0.65)';
      cx.font = '500 15px -apple-system, Helvetica, Arial';
      cx.fillText('release  •••', W / 2, y);
      cx.globalAlpha = 1;
    }
  }

  function drawCycleMarkers() {
    var dotR = 4, gap = 18;
    var totalW = MAX_BREATHS * (dotR * 2) + (MAX_BREATHS - 1) * gap;
    var sx = (W - totalW) / 2, sy = H * 0.42 + 200;
    for (var i = 0; i < MAX_BREATHS; i++) {
      var dx = sx + i * (dotR * 2 + gap) + dotR;
      cx.beginPath(); cx.arc(dx, sy, dotR, 0, Math.PI * 2);
      cx.fillStyle = i < cycles ? 'rgba(46,197,182,0.72)' : 'rgba(255,255,255,0.11)';
      cx.fill();
    }
  }

  // --- Main loop ---
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 1000, 0.10); last = now;

    // Autopilot (sets held before update)
    if ((DEMO || BOT) && hitStop <= 0) autopilot(dt);

    // Hit-stop decay
    if (hitStop > 0) { hitStop -= dt; if (hitStop < 0) hitStop = 0; }
    else update(dt);

    // Spawn ambient orbs during play
    if (phase === 'play') {
      orbTimer += dt;
      if (orbTimer > 0.16 + rng() * 0.22) { orbTimer = 0; spawnOrb(); }
    }

    // Decay juice
    shakeAmt *= Math.pow(0.80, dt * 60);
    zoom     += (1 - zoom) * 0.10 * dt * 60;

    // --- DRAW ---
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx2 = (Math.random() - 0.5) * shakeAmt;
      var sy2 = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx2, H / 2 + sy2); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    drawBackground();
    drawOrbs();

    // Title
    if (phase === 'title') {
      drawBreathOrb(now);
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.88)';
      cx.font = '700 34px -apple-system, Helvetica, Arial';
      cx.fillText('BREATH FILTER', W / 2, H * 0.42 - 158);
      cx.fillStyle = 'rgba(46,197,182,0.6)';
      cx.font = '400 14px -apple-system, Helvetica, Arial';
      cx.fillText('hold to inhale. release to exhale.', W / 2, H * 0.42 - 126);
      var tp = 0.5 + 0.35 * Math.sin(now / 620);
      cx.globalAlpha = tp;
      cx.fillStyle = TEAL;
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('tap to begin', W / 2, H * 0.42 + 190);
      cx.globalAlpha = 1;
      drawCycleMarkers();
    }

    // Play
    if (phase === 'play') {
      drawBreathOrb(now);
      drawBreathRing();
      drawPrompt(now);
      drawCycleMarkers();
      if (cycles > 0) {
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(46,197,182,0.4)';
        cx.font = '400 12px -apple-system, Helvetica, Arial';
        cx.fillText(cycles + ' of ' + MAX_BREATHS, W / 2, H * 0.42 - 152);
      }
    }

    // Over
    if (phase === 'over') {
      drawBreathOrb(now);
      cx.fillStyle = 'rgba(11,13,18,0.5)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.82)';
      cx.font = '600 26px -apple-system, Helvetica, Arial';
      cx.fillText(cycles >= MAX_BREATHS ? 'complete' : 'session over', W / 2, H * 0.42 - 58);
      cx.fillStyle = TEAL;
      cx.font = '300 54px -apple-system, Helvetica, Arial';
      cx.fillText(cycles, W / 2, H * 0.42 + 8);
      cx.fillStyle = 'rgba(46,197,182,0.48)';
      cx.font = '400 14px -apple-system, Helvetica, Arial';
      cx.fillText('breath' + (cycles === 1 ? '' : 's') + ' completed', W / 2, H * 0.42 + 38);
      if (!DEMO && !BOT) {
        var pp = 0.55 + 0.3 * Math.sin(now / 500);
        cx.globalAlpha = pp;
        cx.fillStyle = 'rgba(255,255,255,0.38)';
        cx.font = '400 14px -apple-system, Helvetica, Arial';
        cx.fillText('tap to breathe again', W / 2, H * 0.42 + 118);
        cx.globalAlpha = 1;
      }
      drawCycleMarkers();
    }

    // Demo CTA
    if (phase === 'cta') {
      var t2  = (now - ctaAt) / 1000;
      var eas = Math.min(1, t2 * 2.4);
      drawBreathOrb(now);
      cx.fillStyle = 'rgba(11,13,18,' + (0.72 * eas) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = eas;
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '700 36px -apple-system, Helvetica, Arial';
      cx.fillText('BREATH FILTER', W / 2, H * 0.42 - 52);
      cx.fillStyle = 'rgba(255,255,255,0.44)';
      cx.font = '400 15px -apple-system, Helvetica, Arial';
      cx.fillText('your breath is the filter', W / 2, H * 0.42 - 12);
      var p4 = 0.72 + 0.28 * Math.sin(now / 400);
      cx.globalAlpha = eas * p4;
      cx.fillStyle = TEAL;
      cx.font = '600 22px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, H * 0.42 + 50);
      cx.globalAlpha = eas;
      cx.fillStyle = 'rgba(46,197,182,0.48)';
      cx.font = '400 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, H * 0.42 + 80);
      cx.globalAlpha = 1;
    }

    // Floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt * 60;
      var fa = Math.max(0, 1 - fl.t / 52);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '600 ' + fl.size + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H * 0.42 - 82 - fl.t * 0.45);
      cx.globalAlpha = 1;
      if (fl.t > 52) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.42;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  startGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
