<meta charset="UTF-8">

<title>Dead Center — Tilt</title>
<!--
  LOOP / attention-architecture — Dead Center
  Circuits: 01-rpe (variable reward), 05-ease (aim-lab conditioned path), 07-timing.
  Modes:
    ?demo=1&seed=7        mirror-neuron video arc → __demoDone
    ?bot=1&runs=N&seed=5  imperfect autopilot, N runs → __botDone
  Mechanic: reticle shrinks toward bullseye. Tap when it's exactly on center.
  Score = best (lowest) center-distance in pixels across all levels. Lower = better.

<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

  canvas { display:block; background:#0b0d12; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'dead-center';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  var BX = W / 2, BY = H / 2;           // bullseye position (canvas center)
  var RING_START = 160;                   // reticle starts at this radius
  var RING_MIN   = 4;                    // smallest reticle radius before auto-fail
  var SHRINK_BASE = 32;                  // px/s at level 1
  var SHRINK_INC  = 7;                   // extra px/s per level

  // ---- state ----
  var phase, level, score, bestDist, runStartTs;
  var ringR, shrinkRate;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var flashes = [], dareBeaten = false;
  var challengeAt = 0, ctaAt = 0, overAt = 0;
  var liveDist = 99;  // current ring center-distance (for display)

  // persistent best across runs (lower = better)
  var pb = 99;
  try { pb = +(localStorage.getItem('dc_pb') || 99); } catch (_) {}

  // ---- bot state ----
  var botRunsDone = 0;
  // bot skill: how close to center it tries to tap (gaussian error in px)
  // starts decent but degrades each level so it eventually misses
  var botError = 0;
  var botActed  = false;

  // ---- demo state ----
  // demo script: list of {delay_ms, errorPx} — errorPx is distance from center when bot taps
  // arc: nail center early → get close → near-fail recovery → real fail
  var demoScript = [
    { delay: 820,  err: 2.1  },   // level 1 — nearly perfect
    { delay: 740,  err: 5.4  },   // level 2 — good
    { delay: 910,  err: 9.7  },   // level 3 — hesitation, decent
    { delay: 680,  err: 3.1  },   // level 4 — snap, great
    { delay: 1050, err: 14.2 },   // level 5 — near-fail (big miss but survives)
    { delay: 760,  err: 4.8  },   // level 6 — recovery / save
    { delay: 890,  err: 24.0 },   // level 7 — real fail (reticle too small)
  ];
  var demoIdx = 0, demoTimer = 0, demoActed = false;
  var demoFinalScore = 0;

  // ---- init ----
  function newGame() {
    phase    = DEMO ? 'challenge' : (BOT ? 'play' : 'title');
    level    = 1;
    score    = 0;
    bestDist = 99;
    flashes  = [];
    dareBeaten = false;
    hitStop = 0; shakeAmt = 0; zoom = 1;

    if (DEMO) {
      challengeAt = performance.now();
      demoIdx = 0; demoTimer = 0; demoActed = false; demoFinalScore = 0;
      setTimeout(function () { startLevel(); }, 1300);
      return;
    }
    if (BOT) { startLevel(); return; }
  }

  function startLevel() {
    phase = 'play';
    ringR = RING_START;
    shrinkRate = SHRINK_BASE + (level - 1) * SHRINK_INC;
    liveDist = ringR;
    hitStop = 0;
    botActed = false;
    demoActed = false;
    // reset demo timer with jitter each level
    demoTimer = 0;
    if (level === 1 && !runStartTs) {
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    }
  }

  function tap(fromAuto) {
    if (phase !== 'play') return;
    if (!fromAuto && (DEMO || BOT)) return;   // human locked out during autopilots

    // distance from center = current ring radius (reticle center = bullseye, ring at ringR)
    // "pixel-perfect" = tap when ring radius is smallest = best score
    var dist = Math.round(ringR * 10) / 10;
    var perfect = dist <= 5;
    var nearMiss = dist <= 15 && !perfect;
    var hit = dist <= 30;

    // update best
    if (dist < bestDist) bestDist = dist;

    if (window.J) {
      if (perfect)  { J.perfect(level); }
      else if (nearMiss) { J.near(); }
      else if (hit) { J.hit(level); }
      J.tension(Math.min((level - 1) / 8, 1));
    }

    if (perfect)  { hitStop = 5; zoom = 1.03; }
    if (nearMiss) { shakeAmt = 4; }

    var label = '';
    if (perfect)   { label = 'BULLSEYE'; flash('BULLSEYE', TEAL, 48); }
    else if (nearMiss) { label = 'SO CLOSE'; flash('SO CLOSE', GOLD, 40);
      if (window.LOOP) LOOP.emit('near_miss', { dist: dist, level: level }); }
    else if (hit)  { label = 'GOOD'; flash('GOOD', '#fff', 36); }
    else           { label = 'MISS'; }

    if (window.LOOP) LOOP.emit('tap', { dist: dist, level: level, label: label });

    if (!hit && !perfect && !nearMiss) {
      // missed — game over immediately
      endRun(dist);
      return;
    }

    // passed this level — advance
    score += Math.max(1, Math.round(30 - dist));   // more points the closer
    level++;

    // check dare
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten) {
      var dareVal = +SHARE.dare;
      if (bestDist < dareVal) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 40);
        if (window.J) J.fanfare();
        SHARE.beaten(Math.round(bestDist * 10) / 10);
      }
    }

    startLevel();
  }

  function endRun(finalDist) {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 9;
    var mag = Math.min(1, (finalDist || 40) / 40);
    if (window.J) {
      J.death(mag);
      if (bestDist < pb) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (bestDist < pb) {
      pb = bestDist;
      try { localStorage.setItem('dc_pb', String(pb)); } catch (_) {}
    }
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: Math.round(bestDist * 10) / 10, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = Math.round(bestDist * 10) / 10;
      demoFinalScore = window.__demoScore;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3700);
      }, 2400);
      return;
    }

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 700);
      }
    }
  }

  function resetRun() {
    level = 1;
    score = 0;
    bestDist = 99;
    flashes = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    runStartTs = Date.now();
    botActed = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startLevel();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 496, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var rect = cv.getBoundingClientRect();
    var x = (e.clientX - rect.left) / scale;
    var y = (e.clientY - rect.top)  / scale;
    if (inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { runStartTs = Date.now(); startLevel(); return; }
    if (phase === 'play') { tap(false); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: Math.round(bestDist * 10) / 10, unit: 'px' }); return;
      }
      resetRun();
    }
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') {
      if (DEMO || BOT) return;
      if (phase === 'title') { runStartTs = Date.now(); startLevel(); return; }
      if (phase === 'play') { tap(false); return; }
      if (phase === 'over' && performance.now() - overAt > 350) resetRun();
    }
  });

  // ---- autopilots ----
  function autopilot(dt) {
    if (phase !== 'play') return;

    if (DEMO) {
      var step = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      demoTimer += dt * 16.667;   // dt in frames, convert to ms
      if (!demoActed && demoTimer >= step.delay) {
        demoActed = true;
        // force the ring to be at the target error distance
        ringR = step.err;
        tap(true);
        demoIdx++;
      }
    } else if (BOT) {
      // bot: each level it waits a random moment then taps
      // error grows each level so it eventually misses (ring is too small → miss)
      if (!botActed) {
        botError = (rng() * 12 + 2) * (1 + (level - 1) * 0.5);
        var triggerR = botError + rng() * 5;
        if (ringR <= triggerR + 2) {
          // snap ring to exact error distance for determinism
          ringR = Math.max(0, botError);
          botActed = true;
          tap(true);
        }
      }
    }
  }

  // ---- percentage rank (lower dist = better) ----
  function pctTop(dist) {
    // dist 0 = top 1%, dist 30 = ~top 70%
    return Math.max(1, Math.min(99, Math.round(100 * (1 - Math.exp(-dist / 10)))));
  }

  // ---- render ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // shrink reticle
    if (hitStop > 0) { hitStop -= dt; }
    else if (phase === 'play') {
      ringR -= shrinkRate * (dt / 60);
      liveDist = ringR;
      autopilot(dt);
      // auto-fail if reticle collapses before tap
      if (ringR <= RING_MIN) {
        ringR = RING_MIN;
        endRun(ringR + 20);   // big miss — ring collapsed
      }
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createRadialGradient(BX, BY, 0, BX, BY, 260);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- PLAY phase — draw bullseye + reticle ----
    if (phase === 'play' || phase === 'over') {
      // concentric target rings (decorative)
      var rings = [RING_START, RING_START * 0.72, RING_START * 0.48, RING_START * 0.26];
      for (var ri = 0; ri < rings.length; ri++) {
        var rr = rings[ri];
        cx.beginPath(); cx.arc(BX, BY, rr, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(255,255,255,0.06)'; cx.lineWidth = 1.5;
        cx.stroke();
      }
      // bullseye dot
      cx.beginPath(); cx.arc(BX, BY, 5, 0, Math.PI * 2);
      cx.fillStyle = VERM; cx.fill();
      // center crosshair
      cx.strokeStyle = 'rgba(232,80,46,0.5)'; cx.lineWidth = 1;
      cx.beginPath(); cx.moveTo(BX - 20, BY); cx.lineTo(BX + 20, BY); cx.stroke();
      cx.beginPath(); cx.moveTo(BX, BY - 20); cx.lineTo(BX, BY + 20); cx.stroke();

      if (phase === 'play') {
        // shrinking reticle ring
        var rFrac = Math.max(0, ringR / RING_START);
        var glow = 'rgba(46,197,182,' + (0.15 + 0.5 * (1 - rFrac)) + ')';
        // glow fill
        cx.beginPath(); cx.arc(BX, BY, Math.max(RING_MIN, ringR), 0, Math.PI * 2);
        cx.fillStyle = glow; cx.fill();
        // ring border
        var ringAlpha = 0.5 + 0.5 * (1 - rFrac);
        cx.beginPath(); cx.arc(BX, BY, Math.max(RING_MIN, ringR), 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(46,197,182,' + ringAlpha + ')'; cx.lineWidth = 2.5;
        cx.stroke();

        // distance indicator text
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.55)';
        cx.font = '700 14px Menlo, monospace';
        cx.fillText(Math.round(ringR) + ' px', BX, BY + RING_START + 30);

        // level indicator
        cx.fillStyle = 'rgba(255,255,255,0.88)';
        cx.font = '800 52px -apple-system, Helvetica, Arial';
        cx.fillText('LV ' + level, W / 2, 96);

        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('PB ' + (pb < 99 ? pb.toFixed(1) + ' px' : '—'), W / 2, 120);

        // dare banner
        if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
          cx.fillStyle = dareBeaten ? TEAL : GOLD;
          cx.font = '800 14px -apple-system, Helvetica, Arial';
          cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + ' px', W / 2, 146);
        }

        // tension ring pulse at high levels
        if (level >= 5) {
          var tensePulse = 0.5 + 0.5 * Math.sin(now / 120);
          cx.beginPath(); cx.arc(BX, BY, RING_MIN + 2, 0, Math.PI * 2);
          cx.strokeStyle = 'rgba(232,80,46,' + tensePulse * 0.8 + ')'; cx.lineWidth = 3;
          cx.stroke();
        }
      }
    }

    // ---- CHALLENGE card (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('2.1', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('px from center — today\'s best', W / 2, 432);
    }

    // ---- TITLE card ----
    if (phase === 'title') {
      // draw target art
      var rings2 = [RING_START, RING_START * 0.68, RING_START * 0.4, RING_START * 0.18];
      for (var ri2 = 0; ri2 < rings2.length; ri2++) {
        cx.beginPath(); cx.arc(BX, BY - 40, rings2[ri2], 0, Math.PI * 2);
        cx.strokeStyle = ri2 % 2 === 0 ? 'rgba(232,80,46,0.35)' : 'rgba(46,197,182,0.25)';
        cx.lineWidth = 2; cx.stroke();
      }
      cx.beginPath(); cx.arc(BX, BY - 40, 7, 0, Math.PI * 2);
      cx.fillStyle = VERM; cx.fill();

      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('DEAD CENTER', W / 2, BY + 60);
      cx.fillStyle = VERM; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillText('TAP THE CENTER', W / 2, BY + 100);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('hit when the ring hits zero. lower is better.', W / 2, BY + 128);
      if (pb < 99) {
        cx.fillStyle = GOLD; cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText('PB ' + pb.toFixed(1) + ' px', W / 2, BY + 155);
      }
    }

    // ---- OVER card ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('MISSED.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(bestDist.toFixed(1) + ' px', W / 2, 338);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('closest to center', W / 2, 360);
      var pt = pctTop(bestDist);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 398);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 420);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 464);
        cx.globalAlpha = 1;

        // SHARE pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // ---- CTA card (demo beat 6) ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('DEAD CENTER', W / 2, 298);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('their best: ' + (demoFinalScore || '2.1') + ' px. yours?', W / 2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (demoFinalScore || '2.1') + ' px', W / 2, 404);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // ---- flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 90 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
