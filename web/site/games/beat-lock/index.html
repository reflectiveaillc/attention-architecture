<script>
(function () {
  'use strict';

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  var TOTAL_BEATS  = 32;
  var BEAT_MS      = 500;     // one beat = 500 ms (120 BPM feel)
  var BAR_Y        = 480;     // vertical center of the pulse bar
  var BAR_H        = 52;      // height of the bar track
  var BAR_PAD      = 36;      // horizontal padding for the track
  var PEAK_WIN     = 0.13;    // fraction of beat duration considered "peak"
  var GOOD_WIN     = 0.26;    // good window (wider, lower reward)

  var beatIdx;     // current beat number 0-31

  var beatStart;   // timestamp of beat start

  var tappedThisBeat;
  var runStartTs;
  var overAt, ctaAt, challengeAt;

  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var botRunsDone = 0;
  var best = 0;
  try { best = +localStorage.getItem('bl_best') || 0; } catch (_) {}

  // ---- helper: percentage top ----
  function pctTop(s) {

  // ---- flash text ----
  function flash(txt, color, size) {

  // ---- init / restart ----
  function newGame() {
    phase = 'title';
    beatIdx = 0; beatPhase = 0; beatStart = 0;
    combo = 0; score = 0; maxCombo = 0;
    tappedThisBeat = false;
    dareBeaten = false;
    flashes = [];

    overAt = 0; ctaAt = 0;

      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);

    }
    if (BOT) {
      startRun();
    }
  }

  function startRun() {
    phase = 'play';
    beatIdx = 0; beatPhase = 0; combo = 0; score = 0; maxCombo = 0;
    tappedThisBeat = false;
    runStartTs = Date.now();
    beatStart = performance.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- tap handler — core mechanic ----
  function doTap(x, y) {
    if (phase === 'title') { startRun(); return; }

    if (!DEMO && !BOT && phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && y !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'combo' }); return;
      }
      resetRun(); return;
    }

    if (phase !== 'play') return;
    if (tappedThisBeat) return;     // only one tap per beat
    tappedThisBeat = true;

    // evaluate timing: beatPhase 0..1, peak is at 1.0 (left edge of bar) wrapping to 0=right
    // The bar sweeps 0→1 over BEAT_MS ms. Peak = when bar head reaches right edge (beatPhase near 1).
    var dist = Math.abs(beatPhase - 1.0);
    if (dist > 0.5) dist = 1 - dist;   // wrap

    var isPeak = dist <= PEAK_WIN;
    var isGood = dist <= GOOD_WIN;

    if (isPeak) {
      combo++;
      score += combo;          // combo multiplier: beat 1 = +1, beat 2 = +2 … stacks fast
      if (combo > maxCombo) maxCombo = combo;
      hitStop = 4; zoom = 1.025;
      shakeAmt = 2;
      if (window.J) { J.perfect(combo); J.tension(Math.min(combo / 16, 1)); }
      if (combo >= 4) flash('×' + combo, GOLD, 44);
      else flash('LOCKED', TEAL, 40);
      if (window.LOOP) LOOP.emit('beat_lock', { beat: beatIdx, combo: combo, timing: 'perfect' });
      // dare check
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true; flash('DARE BEATEN', TEAL, 40);
        if (window.J) J.fanfare();
        SHARE.beaten(score);
      }
    } else if (isGood) {
      combo++;
      score += Math.ceil(combo * 0.6);
      if (combo > maxCombo) maxCombo = combo;
      shakeAmt = 1;
      if (window.J) { J.hit(combo); J.tension(Math.min(combo / 16, 1)); }
      flash('+' + Math.ceil(combo * 0.6), TEAL, 34);
      if (window.LOOP) LOOP.emit('beat_lock', { beat: beatIdx, combo: combo, timing: 'good' });
    } else {
      // miss
      var lost = combo;
      combo = 0;
      shakeAmt = 6;
      if (window.J) { J.near(); }
      flash('OFF BEAT', VERM, 38);
      if (window.LOOP) LOOP.emit('near_miss', { beat: beatIdx, lost: lost });
    }
  }

  function missedBeat() {
    // player didn't tap — combo resets
    var lost = combo;
    combo = 0;
    shakeAmt = 4;
    if (window.J) J.near();
    flash('MISSED', VERM, 36);
    if (window.LOOP) LOOP.emit('near_miss', { beat: beatIdx, lost: lost });
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (window.J) {
      J.death(Math.min(0.3 + score / 200, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (newBest) {
      best = score;
      try { localStorage.setItem('bl_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1), max_combo: maxCombo });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    rng = mulberry32(SEED + botRunsDone * 97);
    startRun();
  }

  // ---- input regions ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 558, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale;
    var py = (e.clientY - r.top) / scale;
    if (inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    doTap(px, py);
  });
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    if (e.code === 'Space') doTap();

  // ---- demo / bot autopilot ----
  // Demo script: array of desired tap timing offsets from peak (in beat-phase fraction).
  // Positive = late, negative = early. 'miss' = skip the beat (no tap).
  // Arc: good → good → perfect → perfect → near-fail(late miss+recovery) → perfect → miss (spectacle)
  var demoScript = [
    { off: 0.18 },   // beat 0: slightly late (good)
    { off: -0.15 },  // beat 1: slightly early
    { off: 0.08 },   // beat 2: close
    { off: 0.04 },   // beat 3: near-perfect
    { off: 0.01 },   // beat 4: PERFECT (combo 5)
    { off: 0.00 },   // beat 5: PERFECT
    { off: -0.22 },  // beat 6: wobbly (near-fail read)
    { off: 0.02 },   // beat 7: SAVE — perfect
    { off: 0.03 },   // beat 8: PERFECT (recovery)
    'miss',          // beat 9: intentional MISS (combo reset spectacle = game over)
  ];
  var demoIdx = 0;
  // Hesitation delays in frames before each scripted tap
  var demoWaits = [32, 28, 24, 20, 18, 16, 40, 12, 10, 0];
  var demoFrameCount = 0;
  var demoPendingIdx = -1;   // beat index we're waiting to fire
  var demoWaitRemaining = 0;
  var demoFired = false;     // has the current beat's action been queued?

  // Bot: random gaussian error around peak
  var botTapAt = -1;         // beatPhase at which bot will tap this beat

  function scheduleBot() {
    // imperfect bot: most taps within ±0.18, occasionally wider
    var err = (rng() - 0.5) * 0.35;
    botTapAt = Math.max(0.7, Math.min(0.99, 1.0 + err));
  }

  // ---- advance beat logic ----
  function advanceBeat() {
    // called once per beat
    if (phase !== 'play') return;

    // if player didn't tap, it's a miss
    if (!tappedThisBeat && !DEMO && !BOT) {
      missedBeat();

    beatIdx++;
    if (beatIdx >= TOTAL_BEATS) {
      // after 32 beats, game ends — score is the final score
      gameOver();
      return;
    }

    tappedThisBeat = false;
    demoFired = false;
    if (BOT) scheduleBot();
  }

  // ---- autopilot (called every frame while phase=play) ----

    if (phase !== 'play') return;

    if (DEMO) {
      var scriptEntry = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (demoIdx >= demoScript.length) return;  // script done, wait for game over

        var isGood = dist <= GOOD_WIN;

          if (combo > maxCombo) maxCombo = combo;
          hitStop = 4; zoom = 1.025; shakeAmt = 2;

        } else if (isGood) {

          shakeAmt = 1;
          if (window.J) { J.hit(combo); J.tension(Math.min(combo / 16, 1)); }

          var lost = combo; combo = 0; shakeAmt = 6;
          if (window.J) J.near();
          flash('OFF BEAT', VERM, 38);
          if (window.LOOP) LOOP.emit('near_miss', { beat: beatIdx, lost: lost });
        }
      }
    } else if (BOT) {
      if (botTapAt < 0) { scheduleBot(); return; }
      if (beatPhase >= botTapAt && !tappedThisBeat) {
        tappedThisBeat = true;
        var dist2 = Math.abs(beatPhase - 1.0);
        if (dist2 > 0.5) dist2 = 1 - dist2;
        var isPeak2 = dist2 <= PEAK_WIN;
        var isGood2 = dist2 <= GOOD_WIN;
        if (isPeak2) {
          combo++; score += combo;
          if (combo > maxCombo) maxCombo = combo;
          if (window.J) { J.perfect(combo); J.tension(Math.min(combo / 16, 1)); }
        } else if (isGood2) {
          combo++; score += Math.ceil(combo * 0.6);
          if (combo > maxCombo) maxCombo = combo;
          if (window.J) J.hit(combo);
        } else {
          combo = 0;
          if (window.J) J.near();
        }
        botTapAt = -1;
        if (window.LOOP) LOOP.emit('beat_lock', { beat: beatIdx, combo: combo });
      }

  }

  // ---- render ----
  var last = performance.now();

  function drawBar(now) {
    // Bar track
    var trackX = BAR_PAD, trackW = W - BAR_PAD * 2;
    var trackY = BAR_Y - BAR_H / 2;

    // Track background
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(trackX, trackY, trackW, BAR_H, 10);
    else cx.rect(trackX, trackY, trackW, BAR_H);
    cx.fill();

    // Peak zone indicator (subtle gold zone at right edge)
    var peakW = trackW * PEAK_WIN * 2;
    cx.globalAlpha = 0.18;
    cx.fillStyle = GOLD;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(trackX + trackW - peakW - 2, trackY + 4, peakW, BAR_H - 8, 6);
    else cx.rect(trackX + trackW - peakW - 2, trackY + 4, peakW, BAR_H - 8);
    cx.fill();
    cx.globalAlpha = 1;

    // Sweeping head — fills from left to right over 0→1 beat phase
    var headX = trackX + beatPhase * trackW;
    var glow = cx.createLinearGradient(trackX, 0, headX, 0);
    var comboHue = Math.min(combo * 10, 120);  // 0 = red, combo climbs to green
    var bright = 0.3 + Math.min(combo * 0.05, 0.5);
    glow.addColorStop(0, 'rgba(46,197,182,0.04)');
    glow.addColorStop(0.7, 'hsl(' + (170 - comboHue) + ',70%,' + (44 + combo * 2) + '%)');
    glow.addColorStop(1, combo >= 4 ? GOLD : TEAL);
    cx.fillStyle = glow;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(trackX, trackY + 2, headX - trackX, BAR_H - 4, 8);
    else cx.rect(trackX, trackY + 2, headX - trackX, BAR_H - 4);
    cx.fill();

    // Pulse "head" glow — a bright orb at the leading edge
    var orb = cx.createRadialGradient(headX, BAR_Y, 0, headX, BAR_Y, 30);
    var pulseAlpha = 0.5 + 0.5 * Math.sin(now * 0.012);
    orb.addColorStop(0, combo >= 4 ? 'rgba(242,177,52,0.9)' : 'rgba(46,197,182,0.9)');
    orb.addColorStop(1, 'rgba(0,0,0,0)');
    cx.globalAlpha = 0.7 + 0.3 * pulseAlpha;
    cx.fillStyle = orb;
    cx.fillRect(headX - 30, trackY - 8, 60, BAR_H + 16);
    cx.globalAlpha = 1;

    // Beat counter marks along the top of the track
    cx.fillStyle = 'rgba(255,255,255,0.15)';
    for (var i = 1; i < TOTAL_BEATS; i++) {
      var mx = trackX + (i / TOTAL_BEATS) * trackW;
      cx.fillRect(mx - 0.5, trackY + 2, 1, 6);
    }
  }

  function drawCombo(now) {
    if (combo < 2) return;
    var scale2 = 1 + Math.min(combo * 0.03, 0.4);
    cx.save();
    cx.translate(W / 2, 370);
    cx.scale(scale2, scale2);
    cx.textAlign = 'center';
    var alpha = Math.min(1, 0.5 + combo * 0.1);
    cx.fillStyle = combo >= 8 ? GOLD : TEAL;
    cx.globalAlpha = alpha;
    cx.font = '900 ' + Math.min(52 + combo * 2, 82) + 'px -apple-system, Helvetica, Arial';
    cx.fillText('×' + combo, 0, 0);
    cx.globalAlpha = 1;
    cx.restore();
  }

  function drawBeatDots(now) {
    // Show remaining beats as dots below the bar
    var dotR = 4, dotSpacing = 10;
    var totalW = TOTAL_BEATS * dotSpacing;
    var startX = W / 2 - totalW / 2 + dotSpacing / 2;
    var dotY = BAR_Y + BAR_H / 2 + 24;
    for (var i = 0; i < TOTAL_BEATS; i++) {
      var dx = startX + i * dotSpacing;
      if (i < beatIdx) {
        cx.fillStyle = 'rgba(255,255,255,0.25)';
      } else if (i === beatIdx) {
        cx.fillStyle = combo >= 4 ? GOLD : TEAL;
        cx.globalAlpha = 0.7 + 0.3 * Math.sin(now * 0.025);
      } else {
        cx.fillStyle = 'rgba(255,255,255,0.08)';
      }
      cx.beginPath();
      cx.arc(dx, dotY, i === beatIdx ? dotR + 1 : dotR - 1, 0, Math.PI * 2);
      cx.fill();
      cx.globalAlpha = 1;
    }
  }

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Advance beat timer
    if (phase === 'play') {
      var elapsed = now - beatStart;
      beatPhase = Math.min(elapsed / BEAT_MS, 1);
      if (elapsed >= BEAT_MS) {
        // beat ended — if demo script says 'miss', handle here
        var scriptEntry = DEMO ? demoScript[Math.min(demoIdx, demoScript.length - 1)] : null;
        if (DEMO && scriptEntry === 'miss' && demoIdx < demoScript.length && !tappedThisBeat) {
          // player missed — register miss
          var lost3 = combo; combo = 0; shakeAmt = 6;
          if (window.J) J.death(0.6);
          flash('MISSED', VERM, 38);
          demoIdx++;
          if (window.LOOP) LOOP.emit('near_miss', { beat: beatIdx, lost: lost3 });
          // trigger game over
          beatStart = now;
          advanceBeat();
          if (phase === 'play') gameOver();
        } else {
          if (!tappedThisBeat && !DEMO) missedBeat();
          beatStart = now;
          advanceBeat();
        }
      }
    }

    // Hit-stop: freeze autopilot advance but still decay
    if (hitStop > 0) { hitStop -= dt; }
    else if (phase === 'play') { autopilot(); }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- score display ----
    if (phase === 'play' || phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 70px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 110);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 134);
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 158);
      }
    }

    // ---- play phase ----
    if (phase === 'play') {
      // beat label
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '600 12px Menlo, monospace';
      cx.fillText('BEAT ' + (beatIdx + 1) + ' / ' + TOTAL_BEATS, W / 2, 178);

      drawCombo(now);
      drawBar(now);
      drawBeatDots(now);

      // tap hint (only first few beats or if combo=0)
      if (beatIdx < 3 || combo === 0) {
        var p = 0.45 + 0.45 * Math.sin(now * 0.008);
        cx.globalAlpha = p * 0.7;
        cx.fillStyle = '#fff';
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText('TAP AT THE PEAK', W / 2, BAR_Y + BAR_H / 2 + 68);
        cx.globalAlpha = 1;
      }
    }

    // ---- challenge card ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD;
      cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('28', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 432);
    }

    // ---- game over ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('OFF BEAT.', W / 2, 290);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' pts  ×' + maxCombo + ' best', W / 2, 334);
      var pt = pctTop(score);
      cx.fillStyle = GOLD;
      cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 380);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 404);

      if (!DEMO && !BOT) {
        var p2 = 0.55 + 0.45 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 448);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- CTA card (demo only) ----
    if (phase === 'cta') {
      var tt = (now - ctaAt) / 1000, ease = Math.min(1, tt * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT LOCK', W / 2, 288);
      cx.fillStyle = 'rgba(255,255,255,0.72)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 28) + '. lock yours.', W / 2, 328);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 28), W / 2, 398);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // ---- title card ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT LOCK', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.55 + 0.45 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP ON THE BEAT', W / 2, 328); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('32 beats. lock the peak. stack combos.', W / 2, 358);
      // Draw a teaser bar
      var demoPhase = ((now % BEAT_MS) / BEAT_MS);
      var trackX2 = BAR_PAD, trackW2 = W - BAR_PAD * 2;
      cx.fillStyle = 'rgba(255,255,255,0.05)';
      cx.fillRect(trackX2, 420, trackW2, 40);
      var hx = trackX2 + demoPhase * trackW2;
      cx.fillStyle = TEAL; cx.globalAlpha = 0.5;
      cx.fillRect(trackX2, 420, hx - trackX2, 40);
      cx.globalAlpha = 1;
      var orb2 = cx.createRadialGradient(hx, 440, 0, hx, 440, 24);
      orb2.addColorStop(0, 'rgba(46,197,182,0.8)');
      orb2.addColorStop(1, 'rgba(0,0,0,0)');
      cx.fillStyle = orb2; cx.fillRect(hx - 24, 420, 48, 40);
    }

    // ---- floating flash texts ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
