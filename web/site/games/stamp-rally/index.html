<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 0.18;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var SLOT = 88, GAP = 14;
  var gridX = (W - (3 * SLOT + 2 * GAP)) / 2;
  var gridY = 200;
  var DEMO_LIFE = 700; // ms per stamp in demo

  var state, flashes, runStartTs, best = 0, dareBeaten = false;
  var hitStop = 0, zoom = 1, shakeAmt = 0, challengeAt = 0, ctaAt = 0;
  try { best = +localStorage.getItem('stamp_best') || 0; } catch (_) {}

  function newGame() {
    state = {
      phase: 'title',
      total: 0,
      card: 0,
      collected: new Array(9).fill(false),
      icons: [],
      active: null,
      combo: 0,
      overAt: 0,
      redeemUntil: 0,
      settleUntil: 0

    flashes = []; dareBeaten = false;
    ensureCardIcons(0);
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1200);
      return;
    }
    if (BOT) startRun();
  }

  function ensureCardIcons(cardIdx) {
    if (state.icons[cardIdx]) return;
    var arr = [];
    for (var i = 0; i < 9; i++) arr.push((i + cardIdx * 4) % 9);
    state.icons[cardIdx] = arr;
  }

  function slotPos(i) {
    var c = i % 3, r = Math.floor(i / 3);
    return { x: gridX + c * (SLOT + GAP), y: gridY + r * (SLOT + GAP) };
  }

  function stampLife(total) {
    if (DEMO) return DEMO_LIFE;
    return Math.max(520, 1500 - total * 34); // 1.5s → 0.52s across 27 stamps
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    nextStamp();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function nextStamp() {
    if (state.phase !== 'play' || state.active || state.total >= 27) return;
    var slotIdx = state.total % 9;
    var cardIdx = Math.floor(state.total / 9);
    if (slotIdx === 0) {
      state.card = cardIdx;
      state.collected = new Array(9).fill(false);
      ensureCardIcons(cardIdx);
    }
    var life = stampLife(state.total);
    state.active = {
      slot: slotIdx,
      icon: state.icons[cardIdx][slotIdx],
      life: life,
      maxLife: life,
      born: performance.now()
    };
  }

  function collect() {
    var a = state.active;
    if (!a || state.redeemUntil > performance.now()) return;
    var ratio = a.life / a.maxLife;
    var perfect = ratio > 0.60;
    var near = ratio < 0.18;
    state.collected[a.slot] = true;
    state.total++;
    if (perfect) state.combo++; else state.combo = 0;

    if (window.J) {
      if (perfect) J.perfect(state.combo);
      else if (near) J.near();
      else J.hit(state.combo || 1);
      J.tension(Math.min(state.total / 27, 1));
    }
    if (perfect) { hitStop = 5; zoom = 1.04; flash('PERFECT', TEAL, 44); }
    else if (near) { shakeAmt = 4; flash('SO CLOSE!', VERM, 40); if (window.LOOP) LOOP.emit('near_miss', { n: state.total, ratio: +ratio.toFixed(2) }); }
    else { flash('+1', GOLD, 36); }

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.total > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.total);
    }
    if (window.LOOP) LOOP.emit('stamp_collected', { n: state.total, perfect: perfect, near: near });

    state.active = null;
    var now = performance.now();
    if (state.total >= 27) {
      flash('FULL SET!', GOLD, 54);
      hitStop = 14; zoom = 1.08;
      if (window.J) { J.fanfare(); J.tension(0); }
      setTimeout(function () { gameOver(true); }, 950);
    } else if (state.total % 9 === 0) {
      flash('CARD COMPLETE!', GOLD, 46);
      hitStop = 10; zoom = 1.06;
      if (window.J) { J.fanfare(); }
      state.redeemUntil = now + 900;
    } else {
      state.settleUntil = now + (DEMO ? demoWaitMs(state.total) : 80);
    }
  }

  function gameOver(win) {
    state.phase = 'over';
    state.overAt = performance.now();
    if (!win) shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.total > best;
    if (newBest) { best = state.total; try { localStorage.setItem('stamp_best', String(best)); } catch (_) {} }
    if (window.J) {

    if (BOT) {

      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }

  function resetRun() {
    state.total = 0; state.card = 0; state.combo = 0;
    state.collected = new Array(9).fill(false);
    state.active = null; state.redeemUntil = 0; state.settleUntil = 0;
    flashes = []; dareBeaten = false;
    ensureCardIcons(0);
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }
  function pctTop(score) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 9)))); }

  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };

  function tap(x, y) {
    if (DEMO || BOT) return;

    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && state.active && performance.now() > state.redeemUntil) { collect(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.total, unit: 'stamps' }); return;

      resetRun();

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();

  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // settle time (ms) after each collected stamp before the next appears. Long pause before the near-fail builds tension.
  var demoWaits = [320, 360, 300, 380, 320, 360, 420, 300, 360, 320, 400, 320, 360, 300, 830, 320, 360, 380, 320, 360, 400, 320, 360, 300];
  var demoIdx = 0, botRunsDone = 0, botTarget = null;
  function demoWaitMs(total) {
    var idx = Math.min(total - 1, demoWaits.length - 1);

    var a = state.active;
    if (!a || state.phase !== 'play' || state.redeemUntil > performance.now()) return;

  // ---- stamp icon helpers ----
  function iconColor(type) {
    var pal = [TEAL, VERM, GOLD, TEAL, VERM, GOLD, '#fff', TEAL, VERM];
    return pal[type % pal.length];
  }
  function drawPoly(n, R) {
    cx.beginPath();
    for (var i = 0; i < n; i++) {
      var ang = -Math.PI / 2 + i * 2 * Math.PI / n;
      var px = Math.cos(ang) * R, py = Math.sin(ang) * R;
      if (i === 0) cx.moveTo(px, py); else cx.lineTo(px, py);
    }
    cx.closePath(); cx.fill();
  }
  function drawStar(R, r) {
    cx.beginPath();
    for (var i = 0; i < 10; i++) {
      var ang = -Math.PI / 2 + i * Math.PI / 5;
      var rad = i % 2 === 0 ? R : r;
      var px = Math.cos(ang) * rad, py = Math.sin(ang) * rad;
      if (i === 0) cx.moveTo(px, py); else cx.lineTo(px, py);
    }
    cx.closePath(); cx.fill();
  }
  function drawHeart(R) {
    cx.beginPath();
    cx.moveTo(0, R * 0.5);
    cx.bezierCurveTo(R, -R * 0.4, R * 0.2, -R, 0, -R * 0.6);
    cx.bezierCurveTo(-R * 0.2, -R, -R, -R * 0.4, 0, R * 0.5);
    cx.fill();
  }
  function drawIcon(type, x, y, s) {
    cx.save();
    cx.translate(x, y);
    cx.fillStyle = iconColor(type);
    cx.strokeStyle = iconColor(type);
    cx.lineWidth = 3;
    var R = s / 2.3;
    switch (type) {
      case 0: // circle
        cx.beginPath(); cx.arc(0, 0, R, 0, Math.PI * 2); cx.fill(); break;
      case 1: // square
        cx.fillRect(-R, -R, R * 2, R * 2); break;
      case 2: // triangle
        cx.beginPath(); cx.moveTo(0, -R); cx.lineTo(R, R * 0.55); cx.lineTo(-R, R * 0.55); cx.closePath(); cx.fill(); break;
      case 3: // star
        drawStar(R, R * 0.45); break;
      case 4: // heart
        drawHeart(R); break;
      case 5: // diamond
        cx.beginPath(); cx.moveTo(0, -R); cx.lineTo(R, 0); cx.lineTo(0, R); cx.lineTo(-R, 0); cx.closePath(); cx.fill(); break;
      case 6: // cross

        cx.closePath(); cx.fill();
        break;
      case 8: // hexagon
        drawPoly(6, R); break;
    }
    cx.restore();
  }

  // ---- render ----
  function drawCardBase() {
    var pad = 18;
    var cw = 3 * SLOT + 2 * GAP + pad * 2;
    var ch = 3 * SLOT + 2 * GAP + pad * 2;

    cx.fillStyle = 'rgba(255,255,255,0.04)';
    cx.strokeStyle = 'rgba(255,255,255,0.18)';
    cx.lineWidth = 2;
    if (cx.roundRect) { cx.beginPath(); cx.roundRect(cx0, cy0, cw, ch, 18); cx.fill(); cx.stroke(); }
    else { cx.strokeRect(cx0, cy0, cw, ch); cx.fillRect(cx0, cy0, cw, ch); }
  }

  function drawSlot(i, activeHere, collectedHere, now) {
    var p = slotPos(i);
    var cx0 = p.x + SLOT / 2, cy0 = p.y + SLOT / 2;
    // slot backing
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    cx.beginPath(); cx.arc(cx0, cy0, SLOT / 2 - 4, 0, Math.PI * 2); cx.fill();
    if (collectedHere) {
      var icon = state.icons[state.card][i];
      drawIcon(icon, cx0, cy0, SLOT * 0.75);
    } else if (activeHere) {
      var a = state.active;
      var pulse = 1 + 0.10 * Math.sin(now / 120);
      var frac = Math.max(0, a.life / a.maxLife);

      cx.strokeStyle = frac < 0.20 ? VERM : (frac < 0.50 ? GOLD : 'rgba(255,255,255,0.55)');
      cx.lineWidth = 4;
      cx.beginPath();
      cx.arc(cx0, cy0, SLOT / 2 - 2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * frac);
      cx.stroke();
      // active stamp icon pulsing
      cx.save(); cx.translate(cx0, cy0); cx.scale(pulse, pulse);
      drawIcon(a.icon, 0, 0, SLOT * 0.72);
      cx.restore();
    }
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // state machine: spawn next stamp when ready
    if (state.phase === 'play' && !state.active && now > state.redeemUntil && now > state.settleUntil) {
      nextStamp();
    }

    // tick active stamp (frozen during hit-stop)
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play' && state.active && now > state.redeemUntil) {
      var a = state.active;
      a.life -= 16.667 * dt; // life stored in ms
      if (a.life <= 0) {
        state.active = null;
        if (window.LOOP) LOOP.emit('near_miss', { n: state.total, timed_out: true });
        gameOver(false);
      } else {
        autopilot();
      }
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // card + slots
    drawCardBase();
    var redeeming = now < state.redeemUntil;
    for (var i = 0; i < 9; i++) {
      drawSlot(i, !redeeming && state.active && state.active.slot === i, state.collected[i], now);
    }

    // card progress / combo
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.total, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('CARD ' + (state.card + 1) + ' · BEST ' + best, W / 2, 120);
      if (state.combo > 1) {
        cx.fillStyle = GOLD;
        cx.font = '900 22px -apple-system, Helvetica, Arial';
        cx.fillText('×' + state.combo, W / 2, 150);
      }
      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 176);
      }
    }

    // redeem overlay
    if (redeeming) {
      var t = 1 - (state.redeemUntil - now) / 900;
      cx.fillStyle = 'rgba(11,13,18,' + (0.55 * t) + ')'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = GOLD; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('CARD ' + (state.card + 1) + ' REDEEMED', W / 2, 350);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('next card up…', W / 2, 382);
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('24', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 270 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('STAMP RALLY', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO CLAIM', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('3 cards. 27 stamps. one reward.', W / 2, 360);
    }

    // game over / win
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var won = state.total >= 27;
      cx.fillStyle = won ? GOLD : VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(won ? 'FULL SET!' : 'MISSED IT.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.total + ' stamps', W / 2, 345);
      var pt = pctTop(state.total);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('STAMP RALLY', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 24) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 24), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
