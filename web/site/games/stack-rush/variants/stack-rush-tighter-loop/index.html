<meta charset="UTF-8">

<title>Stack Rush — Tilt</title>
<!--
  LOOP / attention-architecture — Stack Rush (MVP game, docs/mvp.md)
  Circuits: 01 RPE (variable reward per placement), 04 loss (the run you'll lose),
            06 Zeigarnik (one more try).
  Modes (query params):
    ?demo=1&seed=7        scripted run for clip capture (perfects → near-miss → miss → CTA),
                          sets window.__demoDone when finished
    ?bot=1&runs=3&seed=7  imperfect autoplay for traffic simulation, sets window.__botDone
    ?clip=ID&src=tiktok   attribution (see js/loop-events.js)

-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'stack-rush';</script>
<script src="../../../js/loop-events.js"></script>
<script src="../../../js/juice.js"></script>
<script src="../../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 16;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var BLOCK_H = 34, BASE_W = 240, PERFECT_PX = 7, NEAR_MISS_R = 0.28;

  var state, flashes, fallers, cam, runStartTs, placedThisRun, best = 0;
  var hitStop = 0, zoom = 1, dareBeaten = false, shakeAmt = 0, challengeAt = 0;
  try { best = +localStorage.getItem('sr_best') || 0; } catch (_) {}

  function newGame() {
    state = {
      phase: 'title',              // title | challenge | play | over | cta
      stack: [{ x: W / 2, w: BASE_W, hue: 168 }],   // bottom block
      mover: null, dir: 1, speed: 2.3,
      score: 0, combo: 0, overAt: 0
    };
    flashes = []; fallers = []; cam = 0; placedThisRun = 0; dareBeaten = false;
    if (DEMO) {
      prebuildDemoStack();
      // mirror-neuron beat 1: the challenge card primes "score to beat"
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  // demo/video angle (competitive instinct): open MID-RUN, deep in a tall tower
  // that has tapered down to a very thin top — the viewer expects the fail.
  function prebuildDemoStack() {
    var x = W / 2, n = 27;
    for (var i = 1; i <= n; i++) {
      var w = BASE_W - Math.round(i * (BASE_W - 56) / n);
      x += (rng() - 0.5) * 7;
      state.stack.push({ x: x, w: w, hue: (168 + i * 14) % 360 });
    }
    state.score = n;
    cam = Math.max(0, (state.stack.length - 1) * BLOCK_H - 260);
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 11))));
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    spawnMover();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnMover() {
    var top = state.stack[state.stack.length - 1];
    var range = W / 2 + top.w / 2 - 4;   // can travel fully past either edge → misses possible
    state.mover = {
      x: W / 2 - range, w: top.w, range: range,
      hue: (top.hue + 14) % 360
    };
    state.dir = 1;
    state.speed = 2.3 + state.score * 0.09;
  }

  function drop() {
    var m = state.mover, top = state.stack[state.stack.length - 1];
    var offset = m.x - top.x;
    var overlap = m.w - Math.abs(offset);
    placedThisRun++;
    if (overlap <= 1) {                                    // MISS → game over
      fallers.push({ x: m.x, y: topY() - BLOCK_H, w: m.w, hue: m.hue, vy: -2, vr: (offset > 0 ? 1 : -1) * 0.04, r: 0 });
      state.mover = null;
      gameOver();
      return;
    }
    var perfect = Math.abs(offset) <= PERFECT_PX;
    var ratio = overlap / m.w;
    if (window.J) {
      if (perfect) J.perfect(state.combo + 1);
      else if (ratio < NEAR_MISS_R) J.near();
      else J.hit(state.score + 1);
      J.tension(Math.min(state.score / 40, 1));
    }
    if (perfect) { hitStop = 4; zoom = 1.03; }
    if (ratio < NEAR_MISS_R) shakeAmt = 5;
    var nx, nw;
    if (perfect) { nx = top.x; nw = m.w; state.combo++; }
    else {
      nw = overlap;
      nx = (Math.max(m.x - m.w / 2, top.x - top.w / 2) + Math.min(m.x + m.w / 2, top.x + top.w / 2)) / 2;
      state.combo = 0;
      // trimmed piece falls
      var cutW = m.w - overlap;
      var cutX = offset > 0 ? nx + nw / 2 + cutW / 2 : nx - nw / 2 - cutW / 2;
      fallers.push({ x: cutX, y: topY() - BLOCK_H, w: cutW, hue: m.hue, vy: -1.5, vr: (offset > 0 ? 1 : -1) * 0.05, r: 0 });
    }
    state.stack.push({ x: nx, w: nw, hue: m.hue });
    state.score++;
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    if (perfect) flash('PERFECT', TEAL, 46);
    else if (ratio < NEAR_MISS_R) { flash('SO CLOSE!', VERM, 40); if (window.LOOP) LOOP.emit('near_miss', { n: state.score, ratio: +ratio.toFixed(3) }); }
    if (window.LOOP) LOOP.emit('block_placed', { n: state.score, ratio: +ratio.toFixed(3), perfect: perfect });
    spawnMover();
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 9;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) { J.death(Math.min(0.3 + state.score / 40, 1)); if (newBest) setTimeout(function () { J.fanfare(); }, 450); }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('sr_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3600); }, 2800);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    state.stack = [{ x: W / 2, w: BASE_W, hue: 168 }];
    state.score = 0; state.combo = 0; fallers = []; cam = 0; placedThisRun = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }
  function topY() { return H - 140 - (state.stack.length - 1) * BLOCK_H + cam; }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && state.mover) { drop(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'stacked' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // demo script: desired drop offsets (px from aligned). 'miss' = drop once fully past.
  // thin-block tension run: every placement lands but trims the top thinner
  // (56 → 50 → 43 → 43 → 34 → 24 px), then the fail the viewer saw coming
  // mirror-neuron arc: 3 tense placements → 'sliver' NEAR-FAIL (tiny overlap,
  // it reads as over) → perfect SAVE on the sliver → one more → the real miss.
  // Hesitation (varied demoWait) keeps it human, never robotic.
  var demoScript = [6, -7, 8, 'sliver', 0, -10, 'miss'], demoIdx = 0, demoWait = 36;
  var demoWaits = [30, 26, 40, 55, 34, 48, 30]; // beats of hesitation before each move
  var botRunsDone = 0, botTarget = null;

  function autopilot() {
    if (!state.mover || state.phase !== 'play') return;
    var m = state.mover, top = state.stack[state.stack.length - 1];
    var offset = m.x - top.x, v = state.speed * state.dir;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var want = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (want === 'miss') { if (offset > m.w + 6) { demoIdx++; demoWait = 20; drop(); } return; }
      var target = want === 'sliver' ? m.w * 0.82 : want;
      if (Math.abs(offset - target) <= Math.abs(v) * 0.65) {
        drop();
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
        demoIdx++;
      }
    } else if (BOT) {
      if (botTarget === null) botTarget = gauss() * BOT_ERR;
      if (Math.abs(offset - botTarget) <= Math.abs(v) * 0.65) { botTarget = null; drop(); }
    }
  }

  // ---- render ----
  function blockFill(hue, y) {
    var g = cx.createLinearGradient(0, y, 0, y + BLOCK_H);
    g.addColorStop(0, 'hsl(' + hue + ',62%,58%)');
    g.addColorStop(1, 'hsl(' + hue + ',66%,44%)');
    return g;
  }

  var ctaAt = 0, last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // camera follows stack top
    var want = Math.max(0, (state.stack.length - 1) * BLOCK_H - 260);
    cam += (want - cam) * 0.08 * dt;

    // mover ping-pong (frozen during hit-stop — the impact "bites")
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play' && state.mover) {
      var m = state.mover;
      m.x += state.speed * state.dir * dt;
      if (m.x > W / 2 + m.range) { m.x = W / 2 + m.range; state.dir = -1; }
      if (m.x < W / 2 - m.range) { m.x = W / 2 - m.range; state.dir = 1; }
      autopilot();
    }

    // juice transforms: decaying shake + zoom-pulse
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // stack
    for (var i = 0; i < state.stack.length; i++) {
      var b = state.stack[i], y = H - 140 - i * BLOCK_H + cam;
      if (y > H + BLOCK_H || y < -BLOCK_H) continue;
      cx.fillStyle = blockFill(b.hue, y);
      cx.fillRect(b.x - b.w / 2, y, b.w, BLOCK_H - 2);
    }
    // mover
    if (state.phase === 'play' && state.mover) {
      var mv = state.mover, my = topY() - BLOCK_H;
      cx.fillStyle = blockFill(mv.hue, my);
      cx.fillRect(mv.x - mv.w / 2, my, mv.w, BLOCK_H - 2);
      cx.strokeStyle = 'rgba(255,255,255,0.35)'; cx.lineWidth = 1;
      cx.strokeRect(mv.x - mv.w / 2 + 0.5, my + 0.5, mv.w - 1, BLOCK_H - 3);
    }
    // falling trims
    for (var f = fallers.length - 1; f >= 0; f--) {
      var p = fallers[f];
      p.vy += 0.35 * dt; p.y += p.vy * dt + cam * 0; p.r += p.vr * dt;
      cx.save(); cx.translate(p.x, p.y + BLOCK_H / 2); cx.rotate(p.r);
      cx.globalAlpha = 0.9;
      cx.fillStyle = 'hsl(' + p.hue + ',60%,48%)';
      cx.fillRect(-p.w / 2, -BLOCK_H / 2, p.w, BLOCK_H - 2);
      cx.restore(); cx.globalAlpha = 1;
      if (p.y > H + 80) fallers.splice(f, 1);
    }

    // score
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);
      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 146);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('33', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('STACK RUSH', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO DROP', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('stack it. don’t slip.', W / 2, 360);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('SLIPPED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' stacked', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('STACK RUSH', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he stacked ' + (window.__demoScore || 33) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 33), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
