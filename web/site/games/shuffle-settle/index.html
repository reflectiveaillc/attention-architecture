<title>Shuffle Settle — Tilt</title>
<!--
  LOOP / attention-architecture — Shuffle Settle
  Circuits: 05 ease, 02 novelty, 07 timing.
  A calm shuffled deck of one-tap micro-prompts. The screen dims as it empties.
  Modes (query params):
    ?demo=1&seed=7        scripted calm arc for clip capture (~16s play + ~3.5s CTA),
                          sets window.__demoDone when finished
    ?bot=1&runs=3&seed=5  imperfect autoplay for traffic simulation, sets window.__botDone
    ?clip=ID&src=tiktok   attribution (see js/loop-events.js)
    ?sink=URL             event sink override
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

  canvas { display:block; background:#0b0d12; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'shuffle-settle';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 18;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips and bot runs are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134', VERM = '#e8502e';

  // gentle one-tap micro-prompts — each card a different tiny verb at breath pace
  var VERBS = [
    { id: 'breathe', name: 'breathe',      prompt: 'tap to inhale' },
    { id: 'dot',     name: 'a dot',        prompt: 'tap the pulse' },
    { id: 'petal',   name: 'a petal',      prompt: 'tap as it drifts' },
    { id: 'leaf',    name: 'a leaf',       prompt: 'catch it gently' },
    { id: 'stone',   name: 'a stone',      prompt: 'settle the ripple' },
    { id: 'glow',    name: 'a glow',       prompt: 'tap the soft light' },
    { id: 'ring',    name: 'a ring',       prompt: 'tap when it opens' },
    { id: 'wave',    name: 'a wave',       prompt: 'tap the crest' },
    { id: 'seed',    name: 'a seed',       prompt: 'let it land' },
    { id: 'feather', name: 'a feather',    prompt: 'tap to lift' },
    { id: 'bubble',  name: 'a bubble',     prompt: 'tap to release' },
    { id: 'moss',    name: 'moss',         prompt: 'tap the quiet spot' }
  ];
  var DECK_SIZE = VERBS.length;               // one walk through the deck, then it ends

  var state, deck, currentCard, flashes, particles;
  var runStartTs, hitStop = 0, zoom = 1, shakeAmt = 0, dim = 0;
  var botRunsDone = 0, ctaAt = 0, last = performance.now();

  // demo script: calm hesitations (frames) before each settle
  var demoIdx = 0, demoWait = 0;
  var demoWaits = [70, 65, 75, 60, 80, 55, 70, 85, 50, 75, 60, 70];

  function buildDeck() {
    var d = VERBS.slice().sort(function () { return rng() - 0.5; });
    while (d.length < DECK_SIZE) d = d.concat(VERBS.slice().sort(function () { return rng() - 0.5; }));
    return d.slice(0, DECK_SIZE);
  }

  function newGame() {
    state = { phase: 'title', score: 0, settled: 0, missed: 0, startAt: 0, overAt: 0 };
    deck = buildDeck();
    currentCard = null;
    flashes = [];
    particles = [];
    dim = 0;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    if (DEMO || BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0;
    state.settled = 0;
    state.missed = 0;
    state.startAt = Date.now();
    demoIdx = 0; demoWait = 0;
    dealCard();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function dealCard() {
    if (deck.length === 0) { endGame(); return; }
    var verb = deck.shift();
    currentCard = {
      verb: verb,
      age: 0,                                   // frames, advances by dt
      life: 330,                                // ~5.5s at 60fps, generous
      settled: false,
      missed: false,
      x: W / 2 + (rng() - 0.5) * 80,
      y: H / 2 - 10 + (rng() - 0.5) * 50,
      phaseOffset: rng() * Math.PI * 2
    };
  }

  function settleCard() {
    if (!currentCard || currentCard.settled || currentCard.missed) return;
    currentCard.settled = true;
    state.score += 10;
    state.settled++;
    if (window.J) J.calm(state.settled);
    hitStop = 3;
    zoom = 1.02;
    shakeAmt = 2.5;
    flash('+SETTLED', TEAL, 38);
    if (window.LOOP) LOOP.emit('card_settled', { verb: currentCard.verb.id, n: state.settled, remaining: deck.length });
    for (var i = 0; i < 8; i++) {
      particles.push({ x: currentCard.x, y: currentCard.y,
                       vx: (rng() - 0.5) * 4, vy: (rng() - 0.5) * 4,
                       life: 45, color: i % 2 ? TEAL : GOLD });
    }
    setTimeout(function () { advanceCard(); }, 180);
  }

  function missCard(reason) {
    if (!currentCard || currentCard.settled || currentCard.missed) return;
    currentCard.missed = true;
    state.missed++;
    if (window.LOOP) LOOP.emit('card_missed', { verb: currentCard.verb.id, reason: reason });
    setTimeout(function () { advanceCard(); }, 300);
  }

  function advanceCard() {
    currentCard = null;
    if (deck.length === 0) endGame();
    else dealCard();
  }

  function endGame() {
    state.phase = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - state.startAt) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = state.score;
      state.phase = 'cta';
      ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3500);
      return;
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else { setTimeout(function () { resetRun(); }, 600); }
    }
  }

  function resetRun() {
    deck = buildDeck();
    currentCard = null;
    flashes = [];
    particles = [];
    dim = 0;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;                   // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && currentCard) { settleCard(); return; }
    if (state.phase === 'over') {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'settled' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  function autopilot() {
    if (!currentCard || state.phase !== 'play' || currentCard.settled || currentCard.missed) return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      if (currentCard.age >= demoWaits[Math.min(demoIdx, demoWaits.length - 1)]) {
        settleCard();
        demoIdx = Math.min(demoIdx + 1, demoWaits.length - 1);
        demoWait = Math.floor(rng() * 6 + 3); // small hesitation between cards
      }
    } else if (BOT) {
      // imperfect autopilot: sometimes drifts and misses
      var errFrame = Math.floor((rng() - 0.5) * BOT_ERR * 2);
      var targetFrame = Math.floor(currentCard.life * (0.3 + rng() * 0.4)) + errFrame;
      if (currentCard.age >= targetFrame && currentCard.age < currentCard.life * 0.9) {
        settleCard();
      } else if (currentCard.age >= currentCard.life - 2) {
        missCard('timeout');
      }
    }
  }

  // ---- card visuals ----
  function drawCard(card) {
    switch (card.verb.id) {
      case 'breathe':
      case 'ring':
      case 'glow':
        drawBreathingCircle(card); break;
      case 'dot':
        drawPulsingDot(card); break;
      case 'petal':
      case 'leaf':
      case 'feather':
        drawDriftingShape(card); break;
      case 'stone':
      case 'seed':
      case 'bubble':
        drawFallingShape(card); break;
      case 'wave':
        drawWaveShape(card); break;
      case 'moss':
        drawMossShape(card); break;
      default:
        drawPulsingDot(card);
    }
  }

  function drawBreathingCircle(card) {
    var r = 58 + Math.sin(card.age * 0.05 + card.phaseOffset) * 16;
    var a = 0.55 + Math.sin(card.age * 0.05 + card.phaseOffset) * 0.15;
    cx.beginPath(); cx.arc(card.x, card.y, r, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(46,197,182,' + a + ')'; cx.lineWidth = 3; cx.stroke();
    cx.beginPath(); cx.arc(card.x, card.y, r * 0.55, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(46,197,182,' + (a * 0.22) + ')'; cx.fill();
  }

  function drawPulsingDot(card) {
    var r = 18 + Math.sin(card.age * 0.08 + card.phaseOffset) * 7;
    var a = 0.65 + Math.sin(card.age * 0.08 + card.phaseOffset) * 0.2;
    cx.beginPath(); cx.arc(card.x, card.y, r, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(242,177,52,' + a + ')'; cx.fill();
    cx.beginPath(); cx.arc(card.x, card.y, r * 0.45, 0, Math.PI * 2);
    cx.globalAlpha = 0.92; cx.fillStyle = '#fff'; cx.fill(); cx.globalAlpha = 1;
  }

  function drawDriftingShape(card) {
    var dx = Math.sin(card.age * 0.02 + card.phaseOffset) * 50;
    var dy = -Math.abs(Math.sin(card.age * 0.025)) * 22;
    cx.save();
    cx.translate(card.x + dx, card.y + dy);
    cx.rotate(card.age * 0.012);
    cx.fillStyle = 'rgba(242,177,52,0.68)';
    cx.beginPath(); cx.ellipse(0, 0, 26, 15, 0, 0, Math.PI * 2); cx.fill();
    cx.restore();
  }

  function drawFallingShape(card) {
    var drop = (card.age / card.life) * 90 - 45;
    cx.beginPath(); cx.arc(card.x, card.y + drop, 19, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(255,255,255,0.82)'; cx.fill();
    var rip = 22 + (card.age % 70) * 1.6;
    cx.beginPath(); cx.arc(card.x, card.y + 55, rip, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(46,197,182,' + (1 - (card.age % 70) / 70) + ')'; cx.lineWidth = 2; cx.stroke();
  }

  function drawWaveShape(card) {
    cx.beginPath();
    cx.strokeStyle = 'rgba(46,197,182,0.5)'; cx.lineWidth = 3;
    for (var x = 36; x < W - 36; x += 7) {
      var yy = card.y + Math.sin((x + card.age * 2) * 0.05 + card.phaseOffset) * 22;
      if (x === 36) cx.moveTo(x, yy); else cx.lineTo(x, yy);
    }
    cx.stroke();
  }

  function drawMossShape(card) {
    for (var i = 0; i < 5; i++) {
      var ang = card.phaseOffset + i * 1.26;
      var rr = 22 + i * 8;
      var mx = card.x + Math.cos(ang) * rr;
      var my = card.y + Math.sin(ang) * rr;
      cx.beginPath(); cx.arc(mx, my, 14, 0, Math.PI * 2);
      cx.fillStyle = i === 2 ? 'rgba(46,197,182,0.55)' : 'rgba(255,255,255,0.12)';
      cx.fill();
    }
  }

  // ---- render ----
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // screen dims as the deck empties
    var progress = 1 - deck.length / DECK_SIZE;
    dim += ((progress * 0.58 + 0.04) - dim) * 0.05 * dt;

    // hit-stop decays every frame; never gate autopilot without decaying it
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      if (currentCard) {
        currentCard.age += dt;
        if (currentCard.age >= currentCard.life) missCard('timeout');
      }
      autopilot();
    }

    // juice transforms: save/restore around shake + zoom
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(0.55, 'rgba(11,13,18,0)');
    bg.addColorStop(1, 'rgba(242,177,52,0.03)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // deck progress
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 13px Menlo, monospace';
    cx.fillText((DECK_SIZE - deck.length) + ' / ' + DECK_SIZE, W / 2, 70);
    cx.fillStyle = 'rgba(255,255,255,0.18)';
    cx.fillRect(W / 2 - 80, 82, 160, 4);
    cx.fillStyle = TEAL;
    cx.fillRect(W / 2 - 80, 82, 160 * (DECK_SIZE - deck.length) / DECK_SIZE, 4);

    // current card
    if (state.phase === 'play' && currentCard) {
      cx.fillStyle = 'rgba(255,255,255,0.88)';
      cx.font = '700 24px -apple-system, Helvetica, Arial';
      cx.fillText(currentCard.verb.name, W / 2, 160);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText(currentCard.verb.prompt, W / 2, 190);
      drawCard(currentCard);
      // settled halo
      if (currentCard.settled) {
        cx.globalAlpha = Math.max(0, 1 - (currentCard.age - currentCard.settledAt || 0) / 20);
        cx.beginPath(); cx.arc(currentCard.x, currentCard.y, 80, 0, Math.PI * 2);
        cx.strokeStyle = TEAL; cx.lineWidth = 2; cx.stroke();
        cx.globalAlpha = 1;
      }
    }

    // reward particles
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.life -= dt;
      cx.globalAlpha = Math.max(0, pt.life / 45);
      cx.fillStyle = pt.color;
      cx.beginPath(); cx.arc(pt.x, pt.y, 3, 0, Math.PI * 2); cx.fill();
      if (pt.life <= 0) particles.splice(p, 1);
    }
    cx.globalAlpha = 1;

    // floating reward text
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 245 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // dimming overlay — the lights go down as the deck empties
    cx.fillStyle = 'rgba(0,0,0,' + dim + ')';
    cx.fillRect(0, 0, W, H);

    // title card
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('SHUFFLE SETTLE', W / 2, 290);
      cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO SETTLE', W / 2, 340); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('a calm walk through tiny verbs', W / 2, 370);
    }

    // game over score card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.45)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('SETTLED.', W / 2, 300);
      cx.fillStyle = TEAL; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.settled + ' of ' + DECK_SIZE, W / 2, 345);
      cx.fillStyle = GOLD; cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' points', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('the deck is empty', W / 2, 420);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — SHUFFLE AGAIN', W / 2, 472);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE THE CALM', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card — soft invitation, no dare
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SHUFFLE SETTLE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('settle the shuffled feed', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.65)'; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 432);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 462);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
