<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Comment Dogpile — Tilt</title>
<!--
  LOOP / attention-architecture — Comment Dogpile
  Conditioned path: heart-liking incoming comments (the thumb already knows this
  move from IG/TikTok). The game IS that move.
  Circuits: 01 RPE (variable reward per like), 03 social (the crowd turns), 05 ease.
  Mechanic: comments scroll up the post; tap each comment's heart before it
  scrolls off. Every missed heart turns the crowd against you and speeds the scroll.
  Modes (query params):
    ?demo=1&seed=7        scripted run for clip capture (challenge -> likes ->
                          near-fail -> recovery -> real fail -> CTA), sets __demoDone
    ?bot=1&runs=3&seed=5  imperfect autoplay for traffic sim, sets __botDone
    ?dare=<n>[&by=<name>] incoming challenge banner; SHARE.beaten() when passed
    ?clip=ID&src=tiktok   attribution (see js/loop-events.js)
    ?sink=URL             event sink override
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'comment-dogpile';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || (DEMO ? 7 : (BOT ? 5 : 42));

  // deterministic RNG (mulberry32) so demo/bot clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- geometry / pacing ----
  var HEADER_B = 112;            // header bottom; comments above topLine scroll off
  var topLine  = 112;            // miss line (y < topLine & unliked => crowd +1)
  var spawnY   = 742;            // comments spawn here (just below), scroll up
  var SWEET_T = 360, SWEET_B = 440;   // perfect zone (like here => J.perfect + hitstop)
  var CLUTCH_T = 112, CLUTCH_B = 160; // clutch save zone (like here => J.near, near_miss)
  var ROW_H = 52;
  var MAX_MISS = 3;              // 3 missed hearts => crowd overruns you
  var CHALLENGE_SCORE = 28;      // shown on the demo challenge card

  // ---- content pools (seeded picks keep clips reproducible) ----
  var NAMES = ['maya','dev','kai','luna','reno','jade','theo','nora','rex','ivy',
               'sol','kit','zara','finn','remy','cleo','ash','milo','wren','pax'];
  var TEXTS = ['this is everything','no because SAME','the way i gasped',
               'who else is here at 3am','underrated','first lol','wait what',
               'tell me you...','i needed this today','obsessed',"stop it's perfect",
               "can't stop watching",'the algorithm brought me','u ate this up',
               'literally me','saving this one','ngl real','the transition tho',
               'comment section is wild','here before it blows up'];

  // ---- run state ----
  var state, flashes, pops, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var spawnTimer = 0, botRunsDone = 0, ctaAt = 0, challengeAt = 0;
  try { best = +localStorage.getItem('cd_best') || 0; } catch (_) {}

  function newGame() {
    state = {
      phase: 'title',          // title | challenge | play | over | cta
      comments: [],            // {y, name, text, hue, liked, heartPop, act, tapY, tapped}
      score: 0, combo: 0, misses: 0, spawnIdx: 0, overAt: 0
    };
    flashes = []; pops = []; spawnTimer = 12; dareBeaten = false;
    if (DEMO) {
      buildDemoPlan();
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  // demo plan: 28 likes, 3 misses. arc:
  //   10 sweet likes -> miss (1/3) -> 8 sweet likes -> miss (2/3, the "it's over"
  //   near-fail) -> 6 clutch saves (recovery, tap near the top) -> 4 sweet likes ->
  //   miss (3/3, the real fail). Hesitation encoded as varied tapY per comment.
  var demoPlan = [];
  function buildDemoPlan() {
    demoPlan = [];
    function p(act, tapY) { demoPlan.push({ act: act, tapY: tapY }); }
    for (var i = 0; i < 10; i++) p('like', 380 + (i % 5) * 11);   // 10 sweet
    p('miss', 0);
    for (var i = 0; i < 8; i++)  p('like', 390 + (i % 4) * 12);   // 8 sweet
    p('miss', 0);                                               // near-fail (2/3)
    for (var i = 0; i < 6; i++)  p('like', 135 + (i % 3) * 4);    // 6 clutch saves
    for (var i = 0; i < 4; i++)  p('like', 405 + (i % 2) * 9);    // 4 sweet
    p('miss', 0);                                               // real fail (3/3)
  }

  function pctTop(score) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 16)))); }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- comment spawning ----
  function spawnGap() { return Math.max(14, 38 - state.score * 0.45); }
  function speed()     { return 1.7 + state.score * 0.04 + state.misses * 0.4; }

  function pickContent() {
    var n = NAMES[Math.floor(rng() * NAMES.length)];
    var t = TEXTS[Math.floor(rng() * TEXTS.length)];
    var h = Math.floor(rng() * 360);
    return { name: n, text: t, hue: h };
  }

  function assignAct() {
    // demo: read the scripted plan; bot: roll an imperfect like/miss; human: none.
    if (DEMO) {
      var step = demoPlan[Math.min(state.spawnIdx, demoPlan.length - 1)];
      return { act: step.act, tapY: step.tapY };
    }
    if (BOT) {
      var pLike = Math.max(0.45, Math.min(0.9, 0.9 - state.score * 0.014));
      if (rng() < pLike) {
        var ty = 400 + gauss() * 55;
        ty = Math.max(topLine + 22, Math.min(560, ty));   // always hittable; misses come from the roll
        return { act: 'like', tapY: ty };
      }
      return { act: 'miss', tapY: 0 };
    }
    return { act: null, tapY: 0 };
  }

  function spawnComment() {
    var c = pickContent();
    var a = assignAct();
    state.comments.push({
      y: spawnY, name: c.name, text: c.text, hue: c.hue,
      liked: false, heartPop: 0, act: a.act, tapY: a.tapY, tapped: false, hx: W - 34
    });
    state.spawnIdx++;
  }

  // ---- liking / missing ----
  function likeComment(c) {
    if (c.liked || state.phase !== 'play') return;
    c.liked = true; c.heartPop = 1;
    var y = c.y;
    var perfect = y >= SWEET_T && y <= SWEET_B;
    var clutch  = y >= CLUTCH_T && y <= CLUTCH_B;
    state.combo++; state.score++;

    if (window.J) {
      if (perfect) J.perfect(state.combo);
      else if (clutch) J.near();
      else J.hit(state.combo);
    }
    if (perfect) { hitStop = 4; zoom = 1.03; flash('PERFECT', TEAL, 40); pops.push({ x: c.hx, y: c.y, t: 0, txt: '+1', color: TEAL }); }
    else if (clutch) { flash('SO CLOSE!', GOLD, 34); pops.push({ x: c.hx, y: c.y, t: 0, txt: '+1', color: GOLD }); if (window.LOOP) LOOP.emit('near_miss', { n: state.score, y: +y.toFixed(0) }); }
    else { pops.push({ x: c.hx, y: c.y, t: 0, txt: '+1', color: '#fff' }); }

    if (state.combo > 0 && state.combo % 10 === 0) { if (window.J) J.gold(); flash('COMBO ×' + state.combo, GOLD, 44); hitStop = Math.max(hitStop, 3); }

    // dare check (human only)
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    if (window.J) J.tension(state.misses / MAX_MISS);
    if (window.LOOP) LOOP.emit('comment_liked', { n: state.score, combo: state.combo, perfect: perfect, clutch: clutch });
  }

  function onMiss(c) {
    state.misses++;
    shakeAmt = 5;
    flash('MISSED', VERM, 32);
    if (window.J) { J.near(); J.tension(state.misses / MAX_MISS); }
    if (window.LOOP) LOOP.emit('comment_missed', { n: state.score, misses: state.misses });
    if (state.misses >= MAX_MISS) gameOver();
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 11;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) { J.tension(0); J.death(1); if (newBest) setTimeout(function () { J.fanfare(); }, 450); }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('cd_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) setTimeout(function () {
      state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3600);
    }, 2800);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) window.__botDone = true;
      else setTimeout(resetRun, 900);
    }
  }

  function resetRun() {
    state.comments = []; state.score = 0; state.combo = 0; state.misses = 0; state.spawnIdx = 0;
    flashes = []; pops = []; spawnTimer = 12;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      // heart hit-test: tap the topmost unliked comment whose heart is under the point
      for (var i = 0; i < state.comments.length; i++) {
        var c = state.comments[i];
        if (c.liked) continue;
        var hx = W - 34, hy = c.y;
        if (Math.abs(x - hx) <= 26 && Math.abs(y - hy) <= 26 && c.y >= topLine - 4 && c.y <= spawnY) {
          likeComment(c); return;
        }
      }
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'comments liked' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- autopilot (demo + bot) ----
  // demo/bot ignore human input; human ignores autopilots. Both run on seeded RNG.
  function autopilot() {
    if (state.phase !== 'play') return;
    // tap the topmost unliked 'like' comment that has reached its tapY (still on screen)
    for (var i = 0; i < state.comments.length; i++) {
      var c = state.comments[i];
      if (c.act === 'like' && !c.liked && !c.tapped && c.y <= c.tapY && c.y > topLine) {
        c.tapped = true;
        likeComment(c);
        return;   // one tap per frame keeps it human-feeling
      }
    }
  }

  // ---- sim (frozen during hit-stop so the impact "bites") ----
  function sim(dt) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) { spawnComment(); spawnTimer = spawnGap(); }

    var sp = speed();
    for (var i = state.comments.length - 1; i >= 0; i--) {
      var c = state.comments[i];
      c.y -= sp * dt;
      if (c.heartPop > 0.01) c.heartPop *= Math.pow(0.82, dt); else c.heartPop = 0;
      // scrolled off the top
      if (c.y < topLine) {
        if (!c.liked) onMiss(c);
        state.comments.splice(i, 1);
      }
    }
  }

  // ---- render helpers ----
  function trunc(txt, maxW) {
    if (cx.measureText(txt).width <= maxW) return txt;
    var s = txt;
    while (s.length > 1 && cx.measureText(s + '…').width > maxW) s = s.slice(0, -1);
    return s + '…';
  }

  function drawComment(c) {
    var y = c.y;
    // row backdrop (subtle, fades near the miss line so exits read as "gone")
    var fade = Math.max(0, Math.min(1, (y - topLine) / 24));
    cx.globalAlpha = fade;
    // avatar
    cx.fillStyle = 'hsl(' + c.hue + ',48%,54%)';
    cx.beginPath(); cx.arc(26, y, 13, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 12px -apple-system, Helvetica, Arial'; cx.textAlign = 'center';
    cx.fillText(c.name.charAt(0).toUpperCase(), 26, y + 4);
    // name + text
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '700 12px -apple-system, Helvetica, Arial';
    cx.fillText('@' + c.name, 48, y - 4);
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.font = '400 12px -apple-system, Helvetica, Arial';
    cx.fillText(trunc(c.text, W - 48 - 60), 48, y + 11);
    // heart (the conditioned-path target)
    var hx = W - 34;
    c.hx = hx;  // cache for floating pop origin
    cx.textAlign = 'center';
    var pop = 1 + c.heartPop * 0.6;
    cx.save();
    cx.translate(hx, y);
    cx.scale(pop, pop);
    if (c.liked) {
      cx.shadowColor = VERM; cx.shadowBlur = 12;
      cx.fillStyle = VERM;
    } else {
      cx.fillStyle = 'rgba(255,255,255,0.22)';
    }
    cx.font = '24px -apple-system, Helvetica, Arial';
    cx.fillText('♥', 0, 8);
    cx.restore();
    cx.globalAlpha = 1;
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop: freeze the sim and decay it every frame (never gate without decaying)
    if (hitStop > 0) hitStop -= dt;
    else if (state.phase === 'play') { sim(dt); autopilot(); }

    // juice transforms: decaying shake + zoom-pulse (save/transform/restore)
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // feed panel
    cx.fillStyle = 'rgba(255,255,255,0.025)'; cx.fillRect(8, HEADER_B, W - 16, H - HEADER_B - 8);
    // sweet-zone hint (faint band so precision reads on camera)
    cx.fillStyle = 'rgba(46,197,182,0.05)';
    cx.fillRect(8, SWEET_T, W - 16, SWEET_B - SWEET_T);

    // comments (draw top-down so lower ones overlap correctly)
    for (var i = 0; i < state.comments.length; i++) drawComment(state.comments[i]);

    // header divider
    cx.fillStyle = 'rgba(255,255,255,0.06)'; cx.fillRect(0, HEADER_B, W, 1);

    // ---- header ----
    cx.textAlign = 'center';
    if (state.phase !== 'title') {
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 52);
      cx.fillStyle = VERM; cx.font = '700 11px -apple-system, Helvetica, Arial';
      cx.fillText('♥ LIKES', W / 2, 70);
    }
    // crowd pips (top-left) — visible stakes
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '700 9px Menlo, monospace';
    cx.fillText('CROWD', 14, 14);
    for (var k = 0; k < MAX_MISS; k++) {
      cx.textAlign = 'center';
      cx.fillStyle = k < state.misses ? VERM : 'rgba(255,255,255,0.18)';
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillText('♥', 20 + k * 16, 30);
    }
    // best (top-right, under mute)
    cx.textAlign = 'right';
    cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '700 11px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + best, W - 12, 64);
    // dare banner (human only)
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = dareBeaten ? TEAL : GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 100);
    }

    // floating "+1" pops from liked hearts
    for (var p = pops.length - 1; p >= 0; p--) {
      var po = pops[p]; po.t += dt;
      var pa = Math.max(0, 1 - po.t / 34);
      cx.globalAlpha = pa; cx.textAlign = 'center';
      cx.fillStyle = po.color; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(po.txt, po.x, po.y - po.t * 0.7);
      cx.globalAlpha = 1;
      if (po.t > 34) pops.splice(p, 1);
    }

    // center flashes
    for (var f = flashes.length - 1; f >= 0; f--) {
      var fl = flashes[f]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(f, 1);
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(CHALLENGE_SCORE), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top dogpile", W / 2, 430);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('COMMENT DOGPILE', W / 2, 290);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP THE ♥', W / 2, 332); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('like every comment before it scrolls off', W / 2, 360);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('DOGPILED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' comments liked', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('COMMENT DOGPILE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('she liked ' + (window.__demoScore || CHALLENGE_SCORE) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || CHALLENGE_SCORE), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
