    for (var d = 0; d < words.length; d++) {

    if (decoyIdx >= 0) state.words[decoyIdx].isDecoy = true;

  function startRun() {
    state.phase = 'play';
    state.score = 0; state.combo = 0; state.bars = 0; state.round = 0;
    state.scrollSpeed = BASE_SPEED;
    state.lineIdx = 0;
    runStartTs = Date.now();

    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function advanceLine() {
    state.lineIdx++;
    state.round++;

  // called when player taps (or autopilot fires)
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }

      if (state.words[i].isActive && !state.words[i].hit) { activeWord = state.words[i]; break; }

      state.combo++;

      if (window.J) J.death(Math.min(0.3 + state.bars / 30, 1));
      shakeAmt = 10;
      gameOver();

      // scrolling words

        var w = state.words[i];
        var isActive = w.isActive && !w.hit;
        var distFromMarker = Math.abs(w.x - MARKER_X);
        var inZone = isActive && distFromMarker < HIT_WINDOW;
        var inNear = isActive && distFromMarker < NEAR_WINDOW;
        var decoyGlow = w.isDecoy && w.decoyFlash > 0;

        // word glow ring when approaching marker
        if (isActive && distFromMarker < 90) {

          cx.fill();
          cx.globalAlpha = 1;
        }

        // word text

        cx.textAlign = 'center';

        } else if (decoyGlow) {
          cx.fillStyle = VERM;

        } else {

      }

      // score

      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(state.bars, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best + ' BARS', W / 2, 118);

      // combo display
      if (state.combo >= 2) {
        var comboSize = 16 + state.combo * 2.5;
        comboSize = Math.min(comboSize, 42);
        var comboAlpha = 0.7 + 0.3 * Math.sin(now / 120);
        cx.globalAlpha = comboAlpha;
        cx.fillStyle = state.combo >= 5 ? GOLD : TEAL;
        cx.font = '900 ' + comboSize + 'px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText('×' + state.combo, W / 2, 148);

      cx.textAlign = 'right';

      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('OFF BEAT.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.bars + ' bars', W / 2, 334);
      var pt = pctTop(state.bars);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 378);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 402);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 450);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) {
          cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        } else {
          cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        }
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // ── Demo CTA card ───
    if (state.phase === 'cta') {
      var t2 = (now - ctaAt) / 1000, ease = Math.min(1, t2 * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('LIP SYNC DUEL', W / 2, 290);
      if (EXTREME) { cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial'; cx.fillText('⚡ EXTREME', W / 2, 318); }
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they sang ' + (window.__demoScore || 7) + ' bars. your move.', W / 2, EXTREME ? 348 : 332);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 7), W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // ── Flashes (floating reward text) ───
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, SCROLL_LANE_Y - 80 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ── Mute toggle (human only) ───
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
