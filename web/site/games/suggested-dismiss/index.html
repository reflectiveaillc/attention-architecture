<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO     = qs.get('demo') === '1';
  var BOT      = qs.get('bot')  === '1';
  var BOT_RUNS = +(qs.get('runs') || '3');
  var SEED     = +(qs.get('seed') || '42');

  // ── seeded RNG (mulberry32) ────────────────────────────────────────────────
  var rngState = SEED;
  function rng() {
    rngState |= 0; rngState = rngState + 0x6D2B79F5 | 0;
    var t = Math.imul(rngState ^ rngState >>> 15, 1 | rngState);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }

  // ── canvas / fit ──────────────────────────────────────────────────────────
  var cv = document.getElementById('c');
  var cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit);
  fit();

  // ── palette ───────────────────────────────────────────────────────────────
  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ── card content pools ────────────────────────────────────────────────────
  var STRANGER_NAMES = [
    'Marcus T.', 'Ava L.', 'Brandon K.', 'Chloe M.', 'Derek W.',
    'Elena R.', 'Frank B.', 'Grace H.', 'Henry S.', 'Isabel C.',
    'Jake N.', 'Kira P.', 'Leo F.', 'Mia D.', 'Nathan Y.'
  ];
  var KNOWN_NAMES = [
    'Mom', 'Best Friend', 'Coworker', 'Old Roommate', 'College BFF',
    'Boss', 'Little Bro', 'High School Crush', 'Cousin Ana', 'Teammate'
  ];
  var KNOWN_SUBS = [
    '3 mutual friends', 'Followed by @yourfriend', 'Works at Apple',
    'In your contacts', '12 mutual friends', 'Went to your school'
  ];
  var STRANGER_SUBS = [
    'Suggested for you', 'You may know them', 'People you may know',
    'Similar interests', 'Based on your network', 'New to Instagram'
  ];
  var STRANGER_COLS = ['#6c7a8d', '#8d6c7a', '#7a8d6c', '#6c8d7a', '#7a6c8d'];
  var KNOWN_COLS    = [TEAL, GOLD, VERM, '#9b59b6', '#27ae60'];

  function pick(arr) { return arr[Math.floor(rng() * arr.length)]; }

  function makeCard(isKnown) {
    if (isKnown === undefined) isKnown = rng() < 0.25;
    var name = isKnown ? pick(KNOWN_NAMES) : pick(STRANGER_NAMES);
    return {
      isKnown: isKnown,
      name: name,
      initial: name.charAt(0).toUpperCase(),
      sub: isKnown ? pick(KNOWN_SUBS) : pick(STRANGER_SUBS),
      col: isKnown ? pick(KNOWN_COLS) : pick(STRANGER_COLS)
    };
  }

  // ── game state ────────────────────────────────────────────────────────────
  var phase;        // 'title' | 'challenge' | 'play' | 'over' | 'cta'
  var score, combo, streak, mistakes;
  var cardQueue;    // Array of card objects
  var active;       // currently shown card (object) or null
  var runStartTs, overAt, challengeAt, ctaAt;
  var dareBeaten;

  // juice
  var hitStop, shakeAmt, zoom;
  var flashes;      // [{txt,color,size,y,t}]

  // card animation
  var cardX;        // animated centre-x of active card
  var cardExit;     // 0=idle, -1=exit-left, +1=exit-right
  var cardExitVel;  // px per frame
  var CARD_CX = W / 2, CARD_CY = H / 2 - 20;
  var CARD_W = 320, CARD_H = 180;

  // drag (human)
  var dragStartX = null, dragCurX = null;
  var SLIDE_THRESH = 80;

  // autopilot
  var botRunsDone, botActionsLeft, botDecideAt, botAction;
  // demo
  var demoIdx, demoFrames, demoReady;
  // demo script: action + frames to wait before acting
  // card types: false=stranger(dismiss), true=known(keep)
  var DEMO_TYPES  = [false, false, true, false, false, true, false, false, true];
  var DEMO_SCRIPT = [
    { action:'dismiss', frames:38 },
    { action:'dismiss', frames:32 },
    { action:'keep',    frames:44 },
    { action:'dismiss', frames:30 },
    { action:'dismiss', frames:55 },   // long hesitation — near-miss tension
    { action:'keep',    frames:36 },   // recovery
    { action:'dismiss', frames:31 },
    { action:'dismiss', frames:28 },
    { action:'dismiss', frames:40 }    // BURN: card #8 is known but we dismiss it
  ];

  // ── helpers ───────────────────────────────────────────────────────────────
  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size || 38, y: CARD_CY - 70, t: 0 });
  }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 14))));
  }

  function fillQueue() {
    cardQueue = [];
    if (DEMO) {
      for (var i = 0; i < DEMO_TYPES.length; i++) {
        cardQueue.push(makeCard(DEMO_TYPES[i]));
      }
    } else {
      for (var j = 0; j < 40; j++) {
        var forceKnown = (j % 4 === 2 && rng() < 0.7) ? true : undefined;
        cardQueue.push(makeCard(forceKnown));
      }
    }
  }

  function nextCard() {
    if (cardQueue.length === 0) fillQueue();
    return cardQueue.shift();
  }

  function serveCard() {
    active    = nextCard();
    cardX     = W + CARD_W / 2 + 40;  // enter from right
    cardExit  = 0;
    cardExitVel = 0;
    botDecideAt = null;
    botAction   = null;
    demoFrames  = 0;
    demoReady   = false;
  }

  // ── decision ──────────────────────────────────────────────────────────────
  function decide(dismiss) {
    if (!active || cardExit !== 0) return;

    var correct = dismiss ? !active.isKnown : active.isKnown;

    if (correct) {
      score++;
      combo++;
      streak++;
      if (window.J) {
        if (streak >= 5) { J.gold(); }
        else if (streak >= 3) { J.perfect(combo); }
        else { J.hit(combo); }
        J.tension(Math.min(score / 30, 1));
      }
      if (streak >= 5) {
        hitStop = 5;
        zoom = 1.03;
        flash('×' + streak + ' STREAK', GOLD, 44);
      } else if (streak === 3) {
        flash('STREAK ×3', TEAL, 38);
        hitStop = 2;
      } else {
        flash(dismiss ? 'DISMISSED' : 'SAVED ✓', TEAL, 34);
      }
      // dare check
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', GOLD, 44);
        if (window.J) { J.fanfare(); }
        SHARE.beaten(score);
      }
      if (window.LOOP) { LOOP.emit('card_dismissed', { score: score, streak: streak, known: active.isKnown }); }

      // slide card out, serve next after animation
      cardExit    = dismiss ? -1 : 1;
      cardExitVel = dismiss ? -22 : 22;
      var _s = score;
      setTimeout(function () {
        if (phase === 'play') { serveCard(); }
      }, 300);

    } else {
      // burned a contact
      mistakes++;
      streak = 0;
      combo  = 0;
      shakeAmt = 9;
      if (window.J) { J.death(0.5 + Math.min(mistakes, 3) * 0.15); }
      var burnMsg = active.isKnown ? 'BURNED ' + active.name.toUpperCase() + '!' : 'KEPT A STRANGER';
      flash(burnMsg, VERM, 38);
      if (window.LOOP) { LOOP.emit('contact_burned', { score: score, known: active.isKnown }); }
      cardExit    = dismiss ? -1 : 1;
      cardExitVel = dismiss ? -16 : 16;
      setTimeout(function () { doGameOver(); }, 520);
    }
  }

  // ── lifecycle ─────────────────────────────────────────────────────────────
  function doGameOver() {
    if (phase !== 'play') { return; }
    phase  = 'over';
    overAt = performance.now();
    active = null;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) { J.death(Math.min(0.4 + score / 25, 1)); }
    if (DEMO) { window.__demoScore = score; }
    if (window.LOOP) { LOOP.emit('game_over', { score: score, dur_s: +(dur.toFixed(1)) }); }
    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2600);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { doRestart(); }, 800);
      }
    }
  }

  function doStart() {
    phase      = 'play';
    runStartTs = Date.now();
    fillQueue();
    serveCard();
    if (window.LOOP) { LOOP.emit('play_start', { seed: SEED }); }
  }

  function doRestart() {
    score    = 0;
    combo    = 0;
    streak   = 0;
    mistakes = 0;
    flashes  = [];
    active   = null;
    hitStop  = 0;
    shakeAmt = 0;
    zoom     = 1;
    dragStartX = null;
    dragCurX   = null;
    botActionsLeft = 4 + Math.floor(rng() * 5);
    if (window.LOOP) { LOOP.emit('restart', {}); }
    doStart();
  }

  function newGame() {
    phase      = 'title';
    score      = 0;
    combo      = 0;
    streak     = 0;
    mistakes   = 0;
    flashes    = [];
    active     = null;
    cardQueue  = [];
    hitStop    = 0;
    shakeAmt   = 0;
    zoom       = 1;
    dareBeaten = false;
    dragStartX = null;
    dragCurX   = null;
    botRunsDone    = 0;
    botActionsLeft = 4 + Math.floor(rng() * 5);
    demoIdx    = 0;
    demoFrames = 0;
    demoReady  = false;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(function () { doStart(); }, 1300);
    } else if (BOT) {
      doStart();
    }
  }

  // ── input ─────────────────────────────────────────────────────────────────
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  var DISMISS_BTN = { x: 38, y: H - 162, w: 126, h: 52 };
  var KEEP_BTN    = { x: W - 164, y: H - 162, w: 126, h: 52 };

  function inR(r, px, py) {
    return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
  }

  function tap(px, py) {
    if (DEMO || BOT) { return; }
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) {
      J.toggleMute(); return;
    }
    if (phase === 'title') { doStart(); return; }
    if (phase === 'play' && active && cardExit === 0) {
      if (px !== undefined) {
        if (inR(DISMISS_BTN, px, py)) { decide(true); return; }
        if (inR(KEEP_BTN, px, py))    { decide(false); return; }
      }
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: score, unit: 'correct' }); return;
      }
      doRestart();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) { return; }
    var r  = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale;
    var py = (e.clientY - r.top)  / scale;
    dragStartX = px;
    dragCurX   = px;
    tap(px, py);
  });
  window.addEventListener('pointermove', function (e) {
    if (DEMO || BOT || dragStartX === null) { return; }
    var r = cv.getBoundingClientRect();
    dragCurX = (e.clientX - r.left) / scale;
  });
  window.addEventListener('pointerup', function () {
    if (DEMO || BOT) { return; }
    if (dragStartX !== null && phase === 'play' && active && cardExit === 0) {
      var dx = dragCurX - dragStartX;
      if (Math.abs(dx) > SLIDE_THRESH) { decide(dx < 0); }
    }
    dragStartX = null;
    dragCurX   = null;
  });
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) { return; }
    if (e.code === 'ArrowLeft')  { tap(DISMISS_BTN.x + 1, DISMISS_BTN.y + 1); }
    else if (e.code === 'ArrowRight') { tap(KEEP_BTN.x + 1, KEEP_BTN.y + 1); }
    else if (e.code === 'Space')       { tap(); }
  });

  // ── autopilots ────────────────────────────────────────────────────────────
  function demoAutopilot() {
    if (!active || cardExit !== 0 || phase !== 'play') { return; }
    if (demoIdx >= DEMO_SCRIPT.length) { return; }
    demoFrames++;
    var step = DEMO_SCRIPT[demoIdx];
    if (demoFrames < step.frames) { return; }
    demoFrames = 0;
    demoIdx++;
    decide(step.action === 'dismiss');
  }

  function botAutopilot() {
    if (!active || cardExit !== 0 || phase !== 'play') { return; }
    if (botDecideAt === null) {
      botDecideAt = performance.now() + 350 + rng() * 600;
      // correct while actions remain, then deliberately wrong to lose
      if (botActionsLeft > 0) {
        botAction = active.isKnown ? 'keep' : 'dismiss';
        botActionsLeft--;
      } else {
        // wrong choice: if known, dismiss it (burns a contact → game over)
        botAction = active.isKnown ? 'dismiss' : 'keep';
      }
    }
    if (performance.now() >= botDecideAt) {
      var doDismiss = (botAction === 'dismiss');
      botDecideAt = null;
      botAction   = null;
      decide(doDismiss);
    }
  }

  // ── rounded rect helper ───────────────────────────────────────────────────
  function roundRect(x, y, w, h, r) {
    cx.beginPath();
    if (cx.roundRect) {
      cx.roundRect(x, y, w, h, r);
    } else {
      cx.moveTo(x + r, y);
      cx.lineTo(x + w - r, y);
      cx.quadraticCurveTo(x + w, y, x + w, y + r);
      cx.lineTo(x + w, y + h - r);
      cx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      cx.lineTo(x + r, y + h);
      cx.quadraticCurveTo(x, y + h, x, y + h - r);
      cx.lineTo(x, y + r);
      cx.quadraticCurveTo(x, y, x + r, y);
      cx.closePath();
    }
  }

  // ── draw card ─────────────────────────────────────────────────────────────
  function drawCard(c, cx2, cy2, alpha, tilt) {
    if (!c || alpha <= 0) { return; }
    cx.save();
    cx.globalAlpha = Math.max(0, Math.min(1, alpha));
    cx.translate(cx2, cy2);
    if (tilt) { cx.rotate(tilt); }
    cx.translate(-CARD_W / 2, -CARD_H / 2);

    // shadow
    cx.shadowColor = 'rgba(0,0,0,0.55)';
    cx.shadowBlur  = 28;
    cx.shadowOffsetY = 10;

    // card body
    var g = cx.createLinearGradient(0, 0, 0, CARD_H);
    g.addColorStop(0, '#1a1d26');
    g.addColorStop(1, '#141720');
    cx.fillStyle = g;
    roundRect(0, 0, CARD_W, CARD_H, 18);
    cx.fill();

    // known border
    if (c.isKnown) {
      cx.shadowColor = TEAL;
      cx.shadowBlur  = 16;
      cx.strokeStyle = 'rgba(46,197,182,0.6)';
      cx.lineWidth   = 2;
      roundRect(0, 0, CARD_W, CARD_H, 18);
      cx.stroke();
    }
    cx.shadowColor = 'transparent';
    cx.shadowBlur  = 0;
    cx.shadowOffsetY = 0;

    // avatar
    var aR = 38, aX = 54, aY = CARD_H / 2;
    cx.fillStyle = c.col;
    cx.beginPath();
    cx.arc(aX, aY, aR, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#fff';
    cx.font = '700 26px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(c.initial, aX, aY + 9);

    // name
    cx.textAlign = 'left';
    cx.fillStyle = '#fff';
    cx.font = '700 17px -apple-system, Helvetica, Arial';
    cx.fillText(c.name, 106, CARD_H / 2 - 10);

    // sub line
    cx.fillStyle = c.isKnown ? TEAL : 'rgba(255,255,255,0.45)';
    cx.font = '500 13px -apple-system, Helvetica, Arial';
    cx.fillText(c.sub, 106, CARD_H / 2 + 13);

    // follow/keep button
    var bW = 68, bH = 28, bX = CARD_W - bW - 12, bY = CARD_H / 2 - bH / 2;
    cx.fillStyle = c.isKnown ? TEAL : 'rgba(255,255,255,0.13)';
    roundRect(bX, bY, bW, bH, 7);
    cx.fill();
    cx.fillStyle = c.isKnown ? INK : '#fff';
    cx.font = '700 12px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(c.isKnown ? 'KEEP' : 'Follow', bX + bW / 2, bY + 19);

    cx.restore();
  }

  function drawBtn(r, label, col) {
    cx.fillStyle = col;
    roundRect(r.x, r.y, r.w, r.h, 14);
    cx.fill();
    cx.fillStyle = '#fff';
    cx.font = '800 14px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(label, r.x + r.w / 2, r.y + r.h / 2 + 6);
  }

  // ── render loop ───────────────────────────────────────────────────────────
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3);
    last = now;

    // ── card slide-in ──────────────────────────────────────────────────────
    if (active && cardExit === 0 && cardX > CARD_CX + 2) {
      cardX += (CARD_CX - cardX) * 0.18 * dt;
      if (Math.abs(cardX - CARD_CX) < 2) { cardX = CARD_CX; }
    }
    // ── card slide-out ─────────────────────────────────────────────────────
    if (active && cardExit !== 0) {
      cardX += cardExitVel * dt;
    }

    // ── hit-stop decay then autopilot ─────────────────────────────────────
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      if (DEMO && phase === 'play') { demoAutopilot(); }
      if (BOT  && phase === 'play') { botAutopilot();  }
    }

    // ── juice decay ───────────────────────────────────────────────────────
    shakeAmt *= Math.pow(0.84, dt);
    zoom     += (1 - zoom) * 0.13 * dt;

    // ── draw ──────────────────────────────────────────────────────────────
    cx.save();

    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    var bgG = cx.createLinearGradient(0, 0, 0, H);
    bgG.addColorStop(0, 'rgba(46,197,182,0.05)');
    bgG.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bgG;
    cx.fillRect(0, 0, W, H);

    // ── title screen ─────────────────────────────────────────────────────
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('SUGGESTED DISMISS', W / 2, 258);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('swipe left to dismiss strangers', W / 2, 292);
      cx.fillText('swipe right to keep real contacts', W / 2, 312);
      cx.fillStyle = VERM;
      var p0 = 0.6 + 0.4 * Math.sin(now / 310);
      cx.globalAlpha = p0;
      cx.font = '800 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 368);
      cx.globalAlpha = 1;
    }

    // ── challenge card (demo beat 1) ─────────────────────────────────────
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 288);
      cx.fillStyle = GOLD;
      cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('21', W / 2, 404);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 436);
    }

    // ── play screen ───────────────────────────────────────────────────────
    if (phase === 'play') {
      // "Suggested for you" header label
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.32)';
      cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('Suggested for You', W / 2, 46);

      // score counter
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 108);
      cx.fillStyle = 'rgba(255,255,255,0.36)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('correct', W / 2, 126);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(
          dareBeaten
            ? 'DARE BEATEN ✓'
            : ('BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : '')),
          W / 2, 148
        );
      }

      // streak
      if (streak >= 2) {
        var sc = streak >= 5 ? GOLD : streak >= 3 ? TEAL : 'rgba(255,255,255,0.4)';
        cx.fillStyle = sc;
        cx.font = '700 13px -apple-system, Helvetica, Arial';
        cx.fillText('STREAK ×' + streak, W / 2, 168);
      }

      // swipe-direction overlays (drag feedback)
      if (!DEMO && !BOT && dragStartX !== null) {
        var dragOff = dragCurX - dragStartX;
        if (dragOff < -20) {
          cx.globalAlpha = Math.min(1, Math.abs(dragOff) / SLIDE_THRESH);
          cx.fillStyle = VERM;
          cx.font = '900 22px -apple-system, Helvetica, Arial';
          cx.textAlign = 'left';
          cx.fillText('DISMISS', CARD_CX - CARD_W / 2 + 18, CARD_CY + 10);
          cx.globalAlpha = 1;
        } else if (dragOff > 20) {
          cx.globalAlpha = Math.min(1, dragOff / SLIDE_THRESH);
          cx.fillStyle = TEAL;
          cx.font = '900 22px -apple-system, Helvetica, Arial';
          cx.textAlign = 'right';
          cx.fillText('KEEP', CARD_CX + CARD_W / 2 - 18, CARD_CY + 10);
          cx.globalAlpha = 1;
        }
      }

      // card
      if (active) {
        var drawCX, tilt;
        if (!DEMO && !BOT && dragStartX !== null) {
          var dOff = dragCurX - dragStartX;
          drawCX = CARD_CX + dOff;
          tilt   = dOff * 0.003;
        } else if (cardExit !== 0) {
          drawCX = cardX;
          tilt   = (cardX - CARD_CX) * 0.003;
        } else {
          drawCX = cardX;
          tilt   = 0;
        }
        var alpha = cardExit !== 0
          ? Math.max(0, 1 - Math.abs(cardX - CARD_CX) / (W * 0.55))
          : 1;
        drawCard(active, drawCX, CARD_CY, alpha, tilt);
      }

      // action buttons (human only)
      if (!DEMO && !BOT) {
        drawBtn(DISMISS_BTN, '✕  DISMISS', VERM);
        drawBtn(KEEP_BTN,    '✓  KEEP',   TEAL);
      }
    }

    // ── game over screen ──────────────────────────────────────────────────
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.62)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('BURNED.', W / 2, 290);
      cx.fillStyle = '#fff';
      cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' correct', W / 2, 335);
      var pt = pctTop(score);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 376);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 400);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — TRY AGAIN', W / 2, 448);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD;
        cx.lineWidth = 1.5;
        roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill();
        cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(
          (window.SHARE && SHARE.dare !== null && dareBeaten) ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // ── demo CTA card ─────────────────────────────────────────────────────
    if (phase === 'cta') {
      var t2   = (now - ctaAt) / 1000;
      var ease = Math.min(1, t2 * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('SUGGESTED DISMISS', W / 2, 292);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '600 17px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 8) + '. you’ll do better.', W / 2, 330);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 8), W / 2, 402);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 434);
      cx.globalAlpha = 1;
    }

    // ── floating flash text ───────────────────────────────────────────────
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      if (fa <= 0) { flashes.splice(k, 1); continue; }
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, fl.y - fl.t * 0.8);
      cx.globalAlpha = 1;
    }

    // ── mute toggle (human only) ──────────────────────────────────────────
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ── boot ─────────────────────────────────────────────────────────────────
  newGame();
  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
