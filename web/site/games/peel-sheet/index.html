<script>
(function () {
  'use strict';

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;

    cx.lineTo(x + rr, y + h); cx.quadraticCurveTo(x, y + h, x, y + h - rr);

  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
  function polyArea(pts) {
    var a = 0, n = pts.length;

  }

  // → resolve (clean screen) → soft invitation (CTA).
  var demoPath = [
    { x: SX + SW * 0.18, y: SY + SH * 0.08 },
    { x: SX + SW * 0.40, y: SY + SH * 0.22 },
    { x: SX + SW * 0.55, y: SY + SH * 0.42 },
    { x: SX + SW * 0.68, y: SY + SH * 0.58 },
    { x: SX + SW * 0.82, y: SY + SH * 0.78 },
    { x: SX + SW * 0.95, y: SY + SH * 0.94 },

  function autopilot(dt) {

      if (!demoStarted) { demoStarted = true; demoIdx = 0; demoWait = 28; }

  // ---- render ----
  function updatePhysics(dt) {
    if (state.phase !== 'play' || state.complete) return;
    var idt = Math.max(dt, 0.001);

    var dx = thumb.x - lastThumb.x;
    var dy = thumb.y - lastThumb.y;
    var spd = Math.hypot(dx, dy) / idt; // px per normalized frame

    // clamp thumb inside screen for geometry
    thumb.x = clamp(thumb.x, SX, SX + SW);
    thumb.y = clamp(thumb.y, SY, SY + SH);

    // peeled polygon A -> F(top edge at thumb.x) -> thumb -> E(left edge at thumb.y) -> A
    var F = { x: clamp(thumb.x, SX, SX + SW), y: SY };
    var E = { x: SX, y: clamp(thumb.y, SY, SY + SH) };
    var T = { x: thumb.x, y: thumb.y };

    var totalArea = SW * SH;
    state.peeled = clamp(peeledArea / totalArea, 0, 1);

    // milestones & crinkle

      crinkleTimer += idt;
      if (crinkleTimer > 28) {

        if (window.J) J.calm(calmStep++);

    } else {

      state.torn = true;
      shakeAmt = 5;
      flash('TOO FAST', GOLD, 34);
      if (window.J) J.calm(0);
      gameOver(state.score);
      return;

    // completion

    lastThumb.x = thumb.x; lastThumb.y = thumb.y;

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (hitStop > 0) { hitStop -= dt; }

    roundRectPath(SX, SY, SW, SH, RADIUS);

    // compute peel geometry
    var F = { x: clamp(thumb.x, SX, SX + SW), y: SY };
    var E = { x: SX, y: clamp(thumb.y, SY, SY + SH) };
    var T = { x: thumb.x, y: thumb.y };

    var curlOffX = -(pullDx / pullLen) * 7;
    var curlOffY = -(pullDy / pullLen) * 7;

    cx.save();
    roundRectPath(SX, SY, SW, SH, RADIUS);
    cx.clip();

    // unpeeled film polygon = screen minus peeled corner
    cx.beginPath();
    cx.moveTo(F.x, F.y);
    cx.lineTo(SX + SW, SY);
    cx.lineTo(SX + SW, SY + SH);
    cx.lineTo(SX, SY + SH);
    cx.lineTo(E.x, E.y);
    cx.lineTo(T.x, T.y);
    cx.closePath();
    var filmGrad = cx.createLinearGradient(SX, SY, SX + SW, SY + SH);
    filmGrad.addColorStop(0, 'rgba(230,235,245,0.28)');
    filmGrad.addColorStop(0.5, 'rgba(230,235,245,0.14)');
    filmGrad.addColorStop(1, 'rgba(230,235,245,0.22)');

    cx.beginPath();
    cx.moveTo(F.x, F.y); cx.lineTo(SX + SW, SY); cx.lineTo(SX + SW, SY + SH);
    cx.lineTo(SX, SY + SH); cx.lineTo(E.x, E.y); cx.lineTo(T.x, T.y); cx.closePath();
    var sheen = cx.createLinearGradient(SX, SY, SX + SW, SY);
    sheen.addColorStop(0, 'rgba(255,255,255,0.12)');
    sheen.addColorStop(0.55, 'rgba(255,255,255,0.02)');
    sheen.addColorStop(1, 'rgba(255,255,255,0.10)');
    cx.fillStyle = sheen; cx.fill();

    // dust speckles (only on unpeeled film)
    cx.save();
    cx.beginPath();
    cx.moveTo(F.x, F.y); cx.lineTo(SX + SW, SY); cx.lineTo(SX + SW, SY + SH);
    cx.lineTo(SX, SY + SH); cx.lineTo(E.x, E.y); cx.lineTo(T.x, T.y); cx.closePath();

    }
    cx.globalAlpha = 1;
    cx.restore();

    // lifted film curl (peeled polygon)
    cx.save();
    cx.translate(curlOffX, curlOffY);
    cx.beginPath();
    cx.moveTo(A.x, A.y); cx.lineTo(F.x, F.y); cx.lineTo(T.x, T.y); cx.lineTo(E.x, E.y); cx.closePath();
    cx.shadowColor = 'rgba(0,0,0,0.45)'; cx.shadowBlur = 14; cx.shadowOffsetX = 3; cx.shadowOffsetY = 5;
    var curlGrad = cx.createLinearGradient(A.x, A.y, T.x, T.y);
    curlGrad.addColorStop(0, 'rgba(210,220,235,0.18)');
    curlGrad.addColorStop(1, 'rgba(180,190,210,0.08)');
    cx.fillStyle = curlGrad; cx.fill();
    cx.shadowColor = 'transparent';
    // tear edge highlight
    cx.strokeStyle = 'rgba(255,255,255,0.25)'; cx.lineWidth = 1.2;
    cx.beginPath(); cx.moveTo(F.x, F.y); cx.quadraticCurveTo(T.x + curlOffX * 0.6, T.y + curlOffY * 0.6, E.x, E.y); cx.stroke();
    cx.restore();

    // hinge lines
    cx.strokeStyle = 'rgba(255,255,255,0.18)'; cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(A.x, A.y); cx.lineTo(F.x, F.y); cx.stroke();
    cx.beginPath(); cx.moveTo(A.x, A.y); cx.lineTo(E.x, E.y); cx.stroke();

    // tab at start corner
    cx.fillStyle = 'rgba(46,197,182,0.22)';
    cx.beginPath(); cx.arc(A.x, A.y, TAB_R, 0, Math.PI * 2); cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,0.35)'; cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(A.x, A.y, TAB_R - 4, 0, Math.PI * 2); cx.stroke();
    cx.strokeStyle = TEAL; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(A.x + 6, A.y - 8); cx.lineTo(A.x + 12, A.y - 14); cx.stroke();
    cx.beginPath(); cx.moveTo(A.x + 10, A.y - 4); cx.lineTo(A.x + 18, A.y - 10); cx.stroke();

    cx.restore(); // end screen clip

    // thumb / finger indicator
    if (state.phase === 'play' || state.phase === 'over') {
      cx.beginPath();
      cx.arc(T.x, T.y, 14, 0, Math.PI * 2);
      cx.fillStyle = DEMO || BOT ? 'rgba(255,255,255,0.18)' : 'rgba(46,197,182,0.22)';
      cx.fill();
      cx.strokeStyle = DEMO || BOT ? 'rgba(255,255,255,0.30)' : TEAL;
      cx.lineWidth = 1.5; cx.stroke();

    // score / best
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.90)';

    cx.fillText('BEST ' + best + '%', W / 2, 120);

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a;
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 252 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('PEEL SHEET', W / 2, 282);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillText('PULL THE TAB SLOWLY', W / 2, 326); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('one slow tear. one clean screen.', W / 2, 354);
    }

    // game over card
    if (state.phase === 'over' || state.phase === 'cta') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      if (state.complete) {
        cx.fillStyle = TEAL; cx.font = '900 38px -apple-system, Helvetica, Arial';
        cx.fillText('CLEAN SCREEN', W / 2, 294);
      } else if (state.torn) {
        cx.fillStyle = GOLD; cx.font = '900 38px -apple-system, Helvetica, Arial';
        cx.fillText('TORN.', W / 2, 294);
      } else {
        cx.fillStyle = 'rgba(255,255,255,0.65)'; cx.font = '900 34px -apple-system, Helvetica, Arial';
        cx.fillText('PAUSED.', W / 2, 294);
      }
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '% peeled', W / 2, 342);
      cx.fillStyle = GOLD; cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best + '%', W / 2, 374);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — PEEL AGAIN', W / 2, 430);
        cx.globalAlpha = 1;
      }
    }

    // demo soft CTA
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('PEEL SHEET', W / 2, 298);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('slow peel. clean screen.', W / 2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 398);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore(); // end juice transform
    requestAnimationFrame(frame);
  }

  var last = performance.now();
  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
