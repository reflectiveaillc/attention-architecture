    cx.textAlign = 'right'; cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '700 11px Menlo, monospace';
    cx.fillText('0%', W - 32, mTop + mH + 12);
    cx.fillText('50%', W - 32, mTop + mH / 2 + 4);
    cx.fillText('99%', W - 32, mTop + 10);

    // player and tokens
    for (i = 0; i < tokens.length; i++) drawToken(tokens[i]);
    drawPlayer();

    // top HUD
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 56px -apple-system, Helvetica, Arial';
    cx.fillText(Math.floor(state.player.pct) + '%', W / 2, 86);
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '700 13px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + best + '%', W / 2, 112);

    // combo
    if (state.player.combo > 1) {
      cx.fillStyle = GOLD; cx.font = '900 ' + (18 + Math.min(state.player.combo, 12) * 1.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText('×' + state.player.combo, W / 2, 145);
    }

    // timer bar
    var barW = 280, ratio = Math.max(0, state.timeLeft / RUN_S);
    cx.fillStyle = 'rgba(255,255,255,0.12)'; cx.fillRect((W - barW) / 2, 160, barW, 6);
    var tg = cx.createLinearGradient((W - barW) / 2, 0, (W + barW) / 2, 0);
    tg.addColorStop(0, TEAL); tg.addColorStop(0.5, GOLD); tg.addColorStop(1, VERM);
    cx.fillStyle = tg; cx.fillRect((W - barW) / 2, 160, barW * ratio, 6);

    // dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 196);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('PERCENTILE CHASE', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP LEFT / RIGHT TO DODGE & CLIMB', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('90 seconds. top 10% unlocks the dare.', W / 2, 360);
    }

    // challenge card (demo)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(DEMO_TARGET), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // floating text
    for (var k = floats.length - 1; k >= 0; k--) {
      var fl = floats[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.35) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 1.2);
      cx.globalAlpha = 1;
      if (fl.t > 45) floats.splice(k, 1);
    }

    // game over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(DEMO ? 'FELL BACK.' : 'TIME\'S UP.', W / 2, 295);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '% REACHED', W / 2, 340);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 388);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + state.score + '% of players', W / 2, 414);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE RUN', W / 2, 460);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('PERCENTILE CHASE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he hit ' + (window.__demoScore || DEMO_TARGET) + '%. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || DEMO_TARGET), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
