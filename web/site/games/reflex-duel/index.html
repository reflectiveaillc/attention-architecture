<script>
(function () {

  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || (DEMO ? 7 : (BOT ? 5 : 42));

  // deterministic RNG (mulberry32) so clips / bots are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;

  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;

    cv.width = W * dpr; cv.height = H * dpr;

  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var LIGHT_R = 18, LIGHT_GAP = 14;

  // benchmark ladder: ms upper bound, label, sub-label
  var LADDER = [
    { ms: 150, label: 'F1 START', sub: 'inhuman' },
    { ms: 190, label: 'top 2%', sub: 'of humans' },
    { ms: 215, label: 'top 9%', sub: 'of humans' },
    { ms: 250, label: 'faster than average', sub: '' },
    { ms: 300, label: 'average human', sub: '0.273s' },
    { ms: Infinity, label: 'slower than average', sub: 'tired?' }
  ];

  // ---- state ----
  var state, round, times, lights, sequenceStart, outDelay, lightsOutAt;
  var resultAt, overAt, ctaAt, runStartTs, flashUntil, flashText, flashColor;
  var autoTimer = null, botRunsDone = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var dareBeaten = false, challengeAt = 0;
  var flashes = [];
  var best = Infinity;
  try { var stored = localStorage.getItem('rd_best'); if (stored) best = +stored; } catch (_) {}

  // ---- demo v2 script: hesitation → near-fail + recovery → real fail ----
  var demoActions = [
    { type: 'react', target: 245, jitter: 40 },     // round 1: wobbly, human hesitation
    { type: 'jump',  at: 5 * 450 + 400 },            // round 2: jump-start "it's over"
    { type: 'react', target: 191, jitter: 0 },        // round 2: recovery save

  ];
  var demoIdx = 0, demoFinalJump = false;

  function newGame() {
    state = { phase: (DEMO || BOT) ? 'challenge' : 'title' };
    round = 1; times = []; flashes = [];
    lights = [false, false, false, false, false];
    sequenceStart = 0; outDelay = 0; lightsOutAt = 0;

    demoIdx = 0; demoFinalJump = false; demoDelayIdx = 0;

  function startRun() {
    state.phase = 'sequence';
    round = 1; times = []; flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    runStartTs = performance.now();
    if (window.J) J.tension(0);
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    startSequence();
  }

  function startSequence() {
    lights = [false, false, false, false, false];
    sequenceStart = performance.now();
    if (DEMO) {
      outDelay = demoOutDelays[demoDelayIdx];
      demoDelayIdx = (demoDelayIdx + 1) % demoOutDelays.length;
    } else {
      outDelay = 800 + rng() * 1600;             // 0.8 – 2.4 s, seeded
    }
    lightsOutAt = sequenceStart + 5 * 450 + outDelay;
    state.phase = 'sequence';
    scheduleAuto();
  }

  function scheduleAuto() {
    if (!DEMO && !BOT) return;
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }

    if (DEMO) {
      if (demoIdx >= demoActions.length) return;
      var act = demoActions[demoIdx++];
      if (act.final) demoFinalJump = true;
      if (act.type === 'jump') {
        autoTimer = setTimeout(function () {
          if (state.phase === 'sequence' || state.phase === 'hold') jumpStart();
        }, act.at);
        return;
      }
      var target = act.target + (act.jitter || 0);
      autoTimer = setTimeout(function () {
        if (state.phase === 'out') reactionTap();
      }, 5 * 450 + outDelay + target);
      return;
    }

    if (BOT) {
      // ~15% chance of a jump start on any given round
      if (rng() < 0.15) {
        // tap somewhere during sequence/hold, well before lights-out
        var jumpAfter = Math.max(50, rng() * (5 * 450 + outDelay - 100));
        autoTimer = setTimeout(function () {
          if (state.phase === 'sequence' || state.phase === 'hold') jumpStart();
        }, jumpAfter);
      } else {
        var ms = 170 + rng() * 210;            // 170 – 380 ms
        autoTimer = setTimeout(function () {
          if (state.phase === 'out') reactionTap();
        }, 5 * 450 + outDelay + ms);
      }
    }
  }

  function placement(ms) {
    for (var i = 0; i < LADDER.length; i++) {
      if (ms < LADDER[i].ms) {
        var prevMs = i > 0 ? LADDER[i - 1].ms : 0;
        return {
          band: LADDER[i],
          idx: i,
          nextBetterMs: prevMs,
          gapToNext: i > 0 ? ms - prevMs : null,
          gapToF1: ms - 150
        };
      }
    }
    return { band: LADDER[LADDER.length - 1], idx: LADDER.length - 1, nextBetterMs: 300, gapToNext: ms - 300, gapToF1: ms - 150 };
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  function finishRound(ms) {
    if (state.phase !== 'out') return;
    var p = placement(ms);
    times.push(ms);
    resultAt = performance.now();
    state.phase = 'result';

    // sound + juice
    if (window.J) {
      if (p.gapToNext !== null && p.gapToNext <= 25) {

        J.perfect(round); hitStop = 4; zoom = 1.03; flash('PERFECT', TEAL, 44);
      } else {
        J.hit(times.length);
      }
      J.tension(0);
    }

    if (p.gapToNext !== null && p.gapToNext <= 25) {
      if (window.LOOP) LOOP.emit('near_miss', { ms: ms });
    }

    // incoming dare (lower is better in this game)
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten) {
      var runBest = Math.min.apply(null, times);
      if (runBest < SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(runBest);
      }

    if (DEMO) {
      autoTimer = setTimeout(function () {
        if (round < 3) { round++; startSequence(); }
        else { gameOver(); }
      }, 2000);
      return;
    }

    if (BOT) {
      autoTimer = setTimeout(function () {
        if (round >= 3) {
          gameOver();
        } else {
          round++;
          autoTimer = setTimeout(startSequence, 600);
        }
      }, 600);
      return;
    }

    // human: auto-advance after ~2s, or tap
    autoTimer = setTimeout(function () {
      if (state.phase === 'result') nextRound();
    }, 2000);
  }

  function nextRound() {
    if (state.phase !== 'result') return;
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
    if (round >= 3) {
      gameOver();
      return;
    }
    round++;
    startSequence();

  function jumpStart() {
    if (state.phase !== 'sequence' && state.phase !== 'hold') return;
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
    flashText = 'JUMP START';
    flashColor = VERM;

      autoTimer = setTimeout(function () { gameOver(); }, 700);

  function gameOver() {
    var wasJump = state.phase === 'jump';
    state.phase = 'over';
    overAt = performance.now();
    var bestTime = Math.min.apply(null, times);
    var avg = Math.round(times.reduce(function (a, b) { return a + b; }, 0) / times.length);
    var dur = (performance.now() - runStartTs) / 1000;

    if (newBest) {
      best = bestTime;
      try { localStorage.setItem('rd_best', String(best)); } catch (_) {}

      // the final demo jump-start already played its death-boom

    if (DEMO) {
      window.__demoScore = bestTime;
      autoTimer = setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        autoTimer = setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        autoTimer = setTimeout(resetRun, 900);

  function resetRun() {
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }

  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function reactionTap() {
    if (state.phase !== 'out') return;
    var now = performance.now();

  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps

    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'out') { reactionTap(); return; }

  function lightX(i) {
    var totalW = 5 * (LIGHT_R * 2) + 4 * LIGHT_GAP;

  function drawLadder(playerMs) {

    cx.textAlign = 'left';
    for (var i = 0; i < ticks.length; i++) {
      var t = ticks[i], ty = yFor(t);

      cx.beginPath();

    cx.font = '800 12px -apple-system, Helvetica, Arial';

  function drawResult(ms, showLadder) {
    var p = placement(ms);
    cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '900 56px -apple-system, Helvetica, Arial';
    cx.fillText((ms / 1000).toFixed(3) + 's', W / 2, 320);

    cx.fillStyle = p.idx <= 1 ? GOLD : (p.idx === 2 ? TEAL : 'rgba(255,255,255,0.8)');
    cx.font = '800 22px -apple-system, Helvetica, Arial';
    cx.fillText(p.band.label.toUpperCase(), W / 2, 358);

    if (p.band.sub) {
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText(p.band.sub, W / 2, 380);
    }

    // ego-bait line
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    var ego;
    if (ms < 150) ego = 'inhuman. run it again.';
    else if (ms < 190) ego = 'faster than 98% of humans. still ' + (ms - 150) + 'ms from an F1 start.';
    else if (ms < 215) ego = 'faster than 91% of humans. still ' + (ms - 150) + 'ms from an F1 start.';
    else if (ms < 250) ego = 'faster than average. still ' + (ms - 150) + 'ms from an F1 start.';
    else if (ms < 300) ego = 'around average human. still ' + (ms - 150) + 'ms from an F1 start.';
    else ego = 'slower than average. F1 starts are ' + (ms - 150) + 'ms faster.';
    cx.fillText(ego, W / 2, 400);

    if (showLadder) drawLadder(ms);
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;
    var simDt = hitStop > 0 ? 0 : dt;
    if (hitStop > 0) hitStop -= dt;

    // update lights timing (frozen during hit-stop)
    if (state.phase === 'sequence' || state.phase === 'hold') {
      var elapsed = now - sequenceStart;
      for (var i = 0; i < 5; i++) lights[i] = elapsed >= i * 450;
      if (elapsed >= 5 * 450 + outDelay) {
        state.phase = 'out';
        lights = [false, false, false, false, false];
      } else if (elapsed >= 5 * 450) {
        state.phase = 'hold';
      }
      if (window.J) J.tension(Math.min(1, elapsed / (5 * 450 + outDelay)));
    } else {
      if (window.J) J.tension(0);
    }

    // flash decay
    if (flashUntil && now > flashUntil) flashUntil = 0;

    // juice transforms: save, shake + zoom, restore at end
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(232,80,46,0.07)'); bg.addColorStop(1, 'rgba(46,197,182,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // jump-start red flash
    if (flashUntil) {
      var flashA = Math.max(0, (flashUntil - now) / 700);
      cx.fillStyle = 'rgba(232,80,46,' + (0.35 * flashA) + ')';
      cx.fillRect(0, 0, W, H);
    }

    drawLights();

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('REFLEX DUEL', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('average human: 0.273s — you?', W / 2, 340);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO ARM', W / 2, 390);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('5 lights. 1 moment. don\'t jump.', W / 2, 425);
      if (best < Infinity) {
        cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('BEST ' + (best / 1000).toFixed(3) + 's', W / 2, 455);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('TIME TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('0.191', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's fastest reaction", W / 2, 430);
    }

    // sequence / hold instruction
    if (state.phase === 'sequence' || state.phase === 'hold') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('WAIT FOR IT...', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('tap when ALL lights go out', W / 2, 315);
    }

    // out: reaction window
    if (state.phase === 'out') {
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('NOW', W / 2, 295);
    }

    // result
    if (state.phase === 'result') {
      drawResult(times[times.length - 1], true);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.textAlign = 'center'; cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — NEXT ROUND', W / 2, 680);
        cx.globalAlpha = 1;
      }
    }

    // jump-start message
    if (state.phase === 'jump') {
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('JUMP START', W / 2, 310);
      cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('round voided. retrying...', W / 2, 345);
    }

    // game over
    if (state.phase === 'over') {
      var bestTime = Math.min.apply(null, times);
      var avg = Math.round(times.reduce(function (a, b) { return a + b; }, 0) / times.length);
      drawResult(bestTime, true);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 18px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + (bestTime / 1000).toFixed(3) + 's', W / 2, 228);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('AVG ' + (avg / 1000).toFixed(3) + 's', W / 2, 252);
      if (!DEMO && !BOT) {
        var p3 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p3; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE RUN', W / 2, 630);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 21); else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 28);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('REFLEX DUEL', W / 2, 290);
      var dms = window.__demoScore || 191;
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he hit ' + (dms / 1000).toFixed(3) + 's. your move.', W / 2, 335);
      var p4 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p4;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('FASTER THAN ' + (dms / 1000).toFixed(3) + 's?', W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 445);
      cx.globalAlpha = 1;
    }

    // floating text (perfect / near / dare beaten)
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 270 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // incoming dare banner (human only)
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null &&
        state.phase !== 'title' && state.phase !== 'challenge' && state.phase !== 'cta') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.textAlign = 'center'; cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + 'ms' + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 146);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
