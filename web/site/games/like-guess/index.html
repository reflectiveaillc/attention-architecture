<body>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- Post data pool ----
  // Each post: {label, actual (true like count), range [lo,hi], emoji, color}
  // Counts get progressively weirder (viral + dead posts mixed)
  var POST_POOL = [
    { label: 'sunset selfie 🌅',     actual:  1247, lo:    800, hi:   4000, color: '#e8502e' },
    { label: 'my cat hates mondays', actual:  48300, lo:  20000, hi: 120000, color: '#2ec5b6' },
    { label: 'rate my setup 💻',      actual:   892, lo:    200, hi:   3000, color: '#f2b134' },
    { label: 'just posted a reel',   actual:     7, lo:      0, hi:     50, color: '#e8502e' },
    { label: 'new song out now 🎵',   actual: 234000, lo: 100000, hi: 600000, color: '#2ec5b6' },
    { label: 'unpopular opinion:',   actual: 18700, lo:   5000, hi:  60000, color: '#f2b134' },
    { label: 'relationship goals 💕', actual:  3410, lo:   1000, hi:  10000, color: '#e8502e' },
    { label: 'this went viral ✨',    actual: 1200000, lo: 500000, hi: 3000000, color: '#2ec5b6' },
    { label: 'throwback thursday',   actual:    44, lo:      5, hi:    200, color: '#f2b134' },
    { label: 'gym check 💪',         actual:  5600, lo:   2000, hi:  15000, color: '#e8502e' },
    { label: 'morning coffee ☕',     actual:   220, lo:     50, hi:   1000, color: '#2ec5b6' },
    { label: 'new world record?',    actual: 4400000, lo: 1000000, hi: 9000000, color: '#f2b134' },
  ];

  function shufflePool() {
    var pool = POST_POOL.slice();
    for (var i = pool.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
    }
    return pool;
  }

  // ---- State ----
  var state, flashes, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var botRunsDone = 0, botRunActive = false;
  try { best = +localStorage.getItem('lg_best') || 0; } catch (_) {}

  // reveal animation
  var revealT = 0, revealDuration = 60; // frames
  var revealAnim = false;

  // Slider state
  var sliderVal = 0.5;      // 0..1 normalized position
  var sliderDragging = false;
  var sliderX0 = W / 2 - 140, sliderW = 280;

  // ---- Format numbers ----
  function fmtNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1000)    return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
    return String(n);
  }

  function guessFromSlider(post) {
    var lo = post.lo, hi = post.hi;
    return Math.round(lo + sliderVal * (hi - lo));
  }

  // Score: 0-100 based on proximity percent
  function calcScore(guess, actual) {
    var pct = Math.abs(guess - actual) / actual;
    if (pct <= 0.01) return 100;          // perfect: within 1%
    if (pct <= 0.05) return 80;
    if (pct <= 0.10) return 60;
    if (pct <= 0.20) return 40;
    if (pct <= 0.40) return 20;
    return 5;
  }

  function isPerfect(guess, actual) { return Math.abs(guess - actual) / actual <= 0.01; }
  function isNear(guess, actual) { var p = Math.abs(guess - actual) / actual; return p > 0.01 && p <= 0.10; }

  function pctTop(totalScore) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-totalScore / 200))));
  }

  // ---- Game lifecycle ----
  function newGame() {
    state = {
      phase: 'title',    // title | challenge | play | reveal | over | cta
      posts: shufflePool(),
      postIdx: 0,
      streak: 0,
      totalScore: 0,
      overAt: 0,
      ctaAt: 0,
      challengeAt: 0,
      revealAt: 0,
      lastRoundScore: 0,
      lastGuess: 0,
      maxStreak: 3,      // lose after 3 rounds (bot/demo will fire game_over)
    };
    flashes = [];
    sliderVal = 0.5;
    revealAnim = false;
    dareBeaten = false;
    hitStop = 0; zoom = 1; shakeAmt = 0;

    if (DEMO) {
      state.phase = 'challenge';
      state.challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) {
      startRun();
      return;
    }
  }

  function startRun() {
    state.phase = 'play';
    state.postIdx = 0;
    state.streak = 0;
    state.totalScore = 0;
    sliderVal = 0.5;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function currentPost() {
    return state.posts[state.postIdx % state.posts.length];
  }

  function submitGuess() {
    if (state.phase !== 'play') return;
    var post = currentPost();
    var guess = guessFromSlider(post);
    var pts = calcScore(guess, post.actual);
    var perf = isPerfect(guess, post.actual);
    var near = isNear(guess, post.actual);

    state.lastGuess = guess;
    state.lastRoundScore = pts;
    state.totalScore += pts;
    state.streak++;

    // Sound
    if (window.J) {
      if (perf)       { J.perfect(state.streak); hitStop = 5; zoom = 1.03; }
      else if (near)  { J.near(); shakeAmt = 3; }
      else            { J.hit(state.streak); }
      J.tension(Math.min(state.streak / state.maxStreak, 1));
    }

    // Floating text
    if (perf)      { flash('+100 PERFECT!', TEAL, 44); shakeAmt = 2; }
    else if (near) { flash('+' + pts + ' SO CLOSE', GOLD, 38); }
    else           { flash('+' + pts, 'rgba(255,255,255,0.9)', 36); }

    // Dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.totalScore > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN!', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.totalScore);
    }

    if (perf) {
      if (window.LOOP) LOOP.emit('guess_perfect', { post: post.label, streak: state.streak });
    } else if (near) {
      if (window.LOOP) LOOP.emit('near_miss', { post: post.label, pts: pts });
    }
    if (window.LOOP) LOOP.emit('guess_submitted', { post: post.label, guess: guess, actual: post.actual, pts: pts });

    // Transition to reveal phase
    state.phase = 'reveal';
    state.revealAt = performance.now();
    revealT = 0;
    revealAnim = true;

    // After reveal, move to next post or game over
    setTimeout(function () {
      if (state.streak >= state.maxStreak) {
        gameOver();
      } else {
        state.postIdx++;
        sliderVal = 0.5;
        state.phase = 'play';
        revealAnim = false;
      }
    }, 1800);
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    revealAnim = false;
    shakeAmt = 8;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.totalScore > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.totalScore / 400, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (newBest) {
      best = state.totalScore;
      try { localStorage.setItem('lg_best', String(best)); } catch (_) {}
    }
    if (DEMO) window.__demoScore = state.totalScore;
    if (window.LOOP) LOOP.emit('game_over', { score: state.totalScore, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        state.ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 800);
      }
    }
  }

  function resetRun() {
    state.posts = shufflePool();
    state.postIdx = 0;
    state.streak = 0;
    state.totalScore = 0;
    sliderVal = 0.5;
    revealAnim = false;
    flashes = [];
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- Input ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // Slider rect
  var SLIDER_Y = 490, SLIDER_H = 44;
  var SUBMIT_R = { x: W / 2 - 100, y: 560, w: 200, h: 48 };

  function pointerDown(px, py) {
    if (DEMO || BOT) return;
    if (inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      // Check submit button
      if (inR(SUBMIT_R, px, py)) { submitGuess(); return; }
      // Check slider area
      var sliderY0 = SLIDER_Y - 10;
      if (py >= sliderY0 - 20 && py <= sliderY0 + SLIDER_H + 20) {
        sliderDragging = true;
        var rel = (px - sliderX0) / sliderW;
        sliderVal = Math.max(0, Math.min(1, rel));
      }
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: state.totalScore, unit: 'streak' }); return;
      }
      resetRun();
    }
  }

  function pointerMove(px) {
    if (DEMO || BOT || !sliderDragging) return;
    var rel = (px - sliderX0) / sliderW;
    sliderVal = Math.max(0, Math.min(1, rel));
  }

  function pointerUp() {
    sliderDragging = false;
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    pointerDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointermove', function (e) {
    var r = cv.getBoundingClientRect();
    pointerMove((e.clientX - r.left) / scale);
  });
  window.addEventListener('pointerup', pointerUp);
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' && state.phase === 'play') submitGuess();
    if (e.code === 'ArrowLeft')  { sliderVal = Math.max(0, sliderVal - 0.02); }
    if (e.code === 'ArrowRight') { sliderVal = Math.min(1, sliderVal + 0.02); }
  });

  // ---- Demo / Bot autopilots ----
  // Demo script: per-round target accuracy (as fraction error: 0=perfect, 0.5=50% off)
  var demoScript = [
    { err: 0.25 },   // round 1: decent guess, not great
    { err: 0.03 },   // round 2: very close (near-miss tension)
    { err: 0.009 },  // round 3: PERFECT — recovery moment
  ];
  var demoIdx = 0;
  // hesitation waits in ms before each submit
  var demoWaits = [1200, 900, 1500];
  var demoWaiting = false;
  var demoPendingSubmit = false;

  function demoBotTick() {
    if (state.phase !== 'play' || demoWaiting) return;
    if (DEMO) {
      var script = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      var post = currentPost();
      var target;
      // Aim for a specific error fraction
      if (script.err <= 0.01) {
        // perfect: place guess within 1%
        target = post.actual * (1 + (rng() < 0.5 ? 1 : -1) * 0.005);
      } else {
        target = post.actual * (1 + (rng() < 0.5 ? 1 : -1) * script.err);
      }
      // clamp to range
      target = Math.max(post.lo, Math.min(post.hi, target));
      sliderVal = (target - post.lo) / (post.hi - post.lo);
      sliderVal = Math.max(0, Math.min(1, sliderVal));
      // hesitate then submit
      var wait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 1000;
      demoWaiting = true;
      demoIdx++;
      setTimeout(function () {
        demoWaiting = false;
        submitGuess();
      }, wait);
    } else if (BOT) {
      // Bot: random-ish guess
      var errFrac = 0.1 + rng() * 0.4;
      var post2 = currentPost();
      var t = post2.actual * (1 + (rng() < 0.5 ? 1 : -1) * errFrac);
      t = Math.max(post2.lo, Math.min(post2.hi, t));
      sliderVal = (t - post2.lo) / (post2.hi - post2.lo);
      sliderVal = Math.max(0, Math.min(1, sliderVal));
      demoWaiting = true;
      setTimeout(function () {
        demoWaiting = false;
        submitGuess();
      }, 600 + rng() * 800);
    }
  }

  // ---- Render ----
  var last = performance.now(), ctaEase = 0;

  function drawBlurredLikes(cx, x, y, actualN, revealPct) {
    // Draw the like count: blurred when revealPct=0, clear when revealPct=1
    cx.save();
    cx.textAlign = 'center';
    // Blurred text using shadow trick
    var alpha = revealPct;
    var blurAlpha = 1 - revealPct;
    // Blurred version (show when hidden)
    if (blurAlpha > 0.01) {
      cx.globalAlpha = blurAlpha;
      cx.filter = 'blur(' + (8 * (1 - revealPct)) + 'px)';
      cx.fillStyle = '#fff';
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText(fmtNum(actualN), x, y);
      cx.filter = 'none';
    }
    // Clear version (show on reveal)
    if (alpha > 0.01) {
      cx.globalAlpha = alpha;
      cx.fillStyle = GOLD;
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText(fmtNum(actualN), x, y);
    }
    cx.globalAlpha = 1;
    cx.restore();
  }

  function drawPost(post, revealPct, guess) {
    // Post card
    var cardX = W / 2 - 160, cardY = 160, cardW = 320, cardH = 220;
    cx.save();
    // Card bg
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    cx.strokeStyle = 'rgba(255,255,255,0.12)';
    cx.lineWidth = 1.5;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(cardX, cardY, cardW, cardH, 16);
    else cx.rect(cardX, cardY, cardW, cardH);
    cx.fill(); cx.stroke();

    // Avatar circle
    cx.fillStyle = post.color;
    cx.beginPath();
    cx.arc(cardX + 28, cardY + 28, 18, 0, Math.PI * 2);
    cx.fill();

    // Username placeholder
    cx.fillStyle = 'rgba(255,255,255,0.8)';
    cx.font = '700 13px -apple-system, Helvetica, Arial';
    cx.textAlign = 'left';
    cx.fillText('@user', cardX + 54, cardY + 24);
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '400 11px -apple-system, Helvetica, Arial';
    cx.fillText('2h ago', cardX + 54, cardY + 38);

    // Post label
    cx.fillStyle = 'rgba(255,255,255,0.9)';
    cx.font = '600 16px -apple-system, Helvetica, Arial';
    cx.textAlign = 'left';
    var lines = wrapText(cx, post.label, cardW - 24);
    for (var li = 0; li < lines.length && li < 3; li++) {
      cx.fillText(lines[li], cardX + 12, cardY + 70 + li * 22);
    }

    // Image placeholder (gradient block)
    var imgY = cardY + 120;
    var g = cx.createLinearGradient(cardX + 12, imgY, cardX + cardW - 12, imgY + 60);
    g.addColorStop(0, post.color + '33');
    g.addColorStop(1, 'rgba(255,255,255,0.04)');
    cx.fillStyle = g;
    cx.fillRect(cardX + 12, imgY, cardW - 24, 60);

    // Like section
    var likeY = cardY + cardH - 28;
    cx.fillStyle = 'rgba(255,255,255,0.6)';
    cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.textAlign = 'left';
    cx.fillText('❤', cardX + 12, likeY);

    // The hidden/revealed count
    drawBlurredLikes(cx, cardX + 100, likeY, post.actual, revealPct);

    // "likes" label
    if (revealPct > 0.5) {
      cx.globalAlpha = (revealPct - 0.5) * 2;
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '400 13px -apple-system, Helvetica, Arial';
      cx.textAlign = 'left';
      cx.fillText('likes', cardX + 130, likeY);
      cx.globalAlpha = 1;
    }

    // Your guess label (shown before reveal)
    if (revealPct < 0.5 && guess !== undefined) {
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '400 12px -apple-system, Helvetica, Arial';
      cx.textAlign = 'left';
      cx.fillText('your guess: ' + fmtNum(guess), cardX + 130, likeY);
    }

    cx.restore();
  }

  function wrapText(ctx, text, maxW) {
    var words = text.split(' ');
    var lines = [];
    var cur = '';
    for (var i = 0; i < words.length; i++) {
      var test = cur ? cur + ' ' + words[i] : words[i];
      if (ctx.measureText(test).width > maxW && cur) {
        lines.push(cur);
        cur = words[i];
      } else {
        cur = test;
      }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  function drawSlider(post) {
    var sy = SLIDER_Y, sh = SLIDER_H;
    var sx = sliderX0, sw = sliderW;
    var guess = guessFromSlider(post);

    // Track bg
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(sx, sy + sh / 2 - 4, sw, 8, 4);
    else cx.rect(sx, sy + sh / 2 - 4, sw, 8);
    cx.fill();

    // Track fill
    cx.fillStyle = VERM;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(sx, sy + sh / 2 - 4, sw * sliderVal, 8, 4);
    else cx.rect(sx, sy + sh / 2 - 4, sw * sliderVal, 8);
    cx.fill();

    // Knob
    var kx = sx + sw * sliderVal;
    cx.fillStyle = '#fff';
    cx.beginPath();
    cx.arc(kx, sy + sh / 2, 14, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = VERM;
    cx.beginPath();
    cx.arc(kx, sy + sh / 2, 8, 0, Math.PI * 2);
    cx.fill();

    // Range labels
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 11px Menlo, monospace';
    cx.textAlign = 'left';
    cx.fillText(fmtNum(post.lo), sx, sy + sh + 18);
    cx.textAlign = 'right';
    cx.fillText(fmtNum(post.hi), sx + sw, sy + sh + 18);

    // Current guess display
    cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '900 28px -apple-system, Helvetica, Arial';
    cx.fillText(fmtNum(guess), W / 2, sy - 14);
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.fillText('YOUR GUESS', W / 2, sy - 30);
  }

  function drawSubmitBtn() {
    cx.fillStyle = VERM;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(SUBMIT_R.x, SUBMIT_R.y, SUBMIT_R.w, SUBMIT_R.h, 24);
    else cx.rect(SUBMIT_R.x, SUBMIT_R.y, SUBMIT_R.w, SUBMIT_R.h);
    cx.fill();
    cx.fillStyle = '#fff';
    cx.font = '900 18px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText('REVEAL ▶', W / 2, SUBMIT_R.y + 32);
  }

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Hit-stop decay then autopilot
    if (hitStop > 0) {
      hitStop -= dt;
    } else if ((DEMO || BOT) && state.phase === 'play' && !demoWaiting) {
      demoBotTick();
    }

    // Reveal animation progress
    if (revealAnim) {
      revealT = Math.min(revealT + dt, revealDuration);
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx2 = (Math.random() - 0.5) * shakeAmt;
      var sy2 = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx2, H / 2 + sy2);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- TITLE ----
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('LIKE GUESS', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.6)';
      cx.font = '600 16px -apple-system, Helvetica, Arial';
      cx.fillText('how many likes?', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '400 13px -apple-system, Helvetica, Arial';
      cx.fillText('guess the hidden like count', W / 2, 322);
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM;
      cx.font = '800 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 380);
      cx.globalAlpha = 1;
    }

    // ---- CHALLENGE CARD (demo beat 1) ----
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('240', W / 2, 406);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's high score", W / 2, 436);
    }

    // ---- PLAY / REVEAL ----
    if (state.phase === 'play' || state.phase === 'reveal') {
      var post = currentPost();
      var revealPct = state.phase === 'reveal' ? Math.min(1, revealT / revealDuration) : 0;
      var guessToShow = state.phase === 'reveal' ? state.lastGuess : guessFromSlider(post);

      // Round indicator
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '700 13px Menlo, monospace';
      cx.fillText('POST ' + (state.postIdx + 1) + ' / ' + state.maxStreak, W / 2, 40);

      // Score
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 42px -apple-system, Helvetica, Arial';
      cx.fillText(state.totalScore, W / 2, 100);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 11px -apple-system, Helvetica, Arial';
      cx.fillText('SCORE', W / 2, 118);

      // Streak dots
      for (var s = 0; s < state.maxStreak; s++) {
        cx.beginPath();
        cx.arc(W / 2 - (state.maxStreak - 1) * 12 + s * 24, 136, 5, 0, Math.PI * 2);
        cx.fillStyle = s < state.streak ? GOLD : 'rgba(255,255,255,0.15)';
        cx.fill();
      }

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 13px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 158);
      }

      // Post card
      drawPost(post, revealPct, state.phase === 'reveal' ? guessToShow : undefined);

      // Reveal result overlay
      if (state.phase === 'reveal' && revealPct > 0.5) {
        var alpha = (revealPct - 0.5) * 2;
        cx.globalAlpha = alpha;
        cx.textAlign = 'center';
        var pts = state.lastRoundScore;
        var color2 = pts === 100 ? TEAL : pts >= 60 ? GOLD : 'rgba(255,255,255,0.7)';
        cx.fillStyle = color2;
        cx.font = '900 22px -apple-system, Helvetica, Arial';
        cx.fillText(pts === 100 ? 'PERFECT! +100' : (pts >= 60 ? 'CLOSE! +' + pts : '+' + pts), W / 2, 410);
        cx.globalAlpha = 1;
      }

      // Slider + submit (only in play phase)
      if (state.phase === 'play') {
        drawSlider(post);
        drawSubmitBtn();
      }
    }

    // ---- GAME OVER ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND OVER', W / 2, 290);
      cx.fillStyle = '#fff';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(state.totalScore, W / 2, 352);
      cx.fillStyle = 'rgba(255,255,255,0.6)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('POINTS', W / 2, 373);
      var pt = pctTop(state.totalScore);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 410);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('best: ' + best + ' pts', W / 2, 432);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — PLAY AGAIN', W / 2, 460);
        cx.globalAlpha = 1;
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- CTA CARD (demo only) ----
    if (state.phase === 'cta') {
      var t2 = (now - state.ctaAt) / 1000, ease = Math.min(1, t2 * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('LIKE GUESS', W / 2, 296);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('scored ' + (window.__demoScore || 240) + '. can you beat it?', W / 2, 336);
      var p4 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p4;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 240), W / 2, 406);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 438);
      cx.globalAlpha = 1;
    }

    // ---- Floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 36);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 220 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 36) flashes.splice(k, 1);
    }

    // ---- Mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
