<script>
(function () {

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;

  function genCircle(cx, cy, baseR, count, gapRad, amp, phases) {
    var pts = [];
    var maxA = 2 * Math.PI - gapRad;
    for (var i = 0; i < count; i++) {
      var t = i / (count - 1) * maxA;
      var w = amp * (Math.sin(2 * t + phases[0]) + 0.5 * Math.sin(5 * t + phases[1]) + 0.25 * Math.sin(11 * t + phases[2])) / 1.75;
      var r = baseR + w;
      pts.push({ x: cx + r * Math.cos(t), y: cy + r * Math.sin(t) });

  }

  function scoreFor(pts) {
    var n = pts.length, cx = 0, cy = 0;
    for (var i = 0; i < n; i++) { cx += pts[i].x; cy += pts[i].y; }
    cx /= n; cy /= n;
    var ds = [], sum = 0, d, i;
    for (i = 0; i < n; i++) {
      d = Math.hypot(pts[i].x - cx, pts[i].y - cy);
      ds.push(d); sum += d;

    var varSum = 0;
    for (i = 0; i < n; i++) { var d0 = ds[i] - mean; varSum += d0 * d0; }

    var gap = Math.hypot(pts[0].x - pts[n - 1].x, pts[0].y - pts[n - 1].y) / mean;
    var raw = 100 - 100 * (cvv + 0.8 * gap);
    var score = Math.max(0, Math.min(100, raw));

      score: +score.toFixed(1),
      cv: cvv,
      gap: gap,
      center: { x: cx, y: cy },
      radius: mean

  }

  function generateDemoPoints() {
    var phases = [rng() * 2 * Math.PI, rng() * 2 * Math.PI, rng() * 2 * Math.PI];
    var baseAmp = 3.2, wobbleAmp = 18.0, gap = 0.08, count = 60;

      var base = baseAmp * (Math.sin(2 * t + phases[0]) + 0.5 * Math.sin(5 * t + phases[1]) + 0.25 * Math.sin(11 * t + phases[2])) / 1.75;

      cx.fillStyle = TEAL;

      cx.fillText('DRAW A CIRCLE', W / 2, 360);

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);

    if (state.phase === 'over' || state.phase === 'cta') {

        cx.fillText(state.score.toFixed(1) + '%', W / 2, 300);
        cx.fillStyle = '#fff';
        cx.font = '700 17px -apple-system, Helvetica, Arial, Menlo, monospace';
        cx.fillText(verdict(state.score), W / 2, 350);
        cx.fillStyle = 'rgba(255,255,255,0.75)';
        cx.font = '600 14px -apple-system, Helvetica, Arial, Menlo, monospace';
        cx.fillText('better than ' + betterPct(state.score) + '% of players', W / 2, 380);
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.font = '600 13px -apple-system, Helvetica, Arial, Menlo, monospace';
        cx.fillText('BEST ' + best.toFixed(1) + '%', W / 2, 415);
      }
      if (!DEMO && !BOT && state.phase === 'over') {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial, Menlo, monospace';
        cx.fillText('TAP TO TRY AGAIN', W / 2, 470);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial, Menlo, monospace';
      cx.fillText('PERFECT CIRCLE', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.78)';
      cx.font = '700 20px -apple-system, Helvetica, Arial, Menlo, monospace';
      cx.fillText('most people can\'t beat ' + (window.__demoScore !== null ? window.__demoScore.toFixed(1) : '87.5') + '%', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 26px -apple-system, Helvetica, Arial, Menlo, monospace';
      cx.fillText('BEAT ' + (window.__demoScore !== null ? window.__demoScore.toFixed(1) : '87.5') + '%', W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial, Menlo, monospace';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
