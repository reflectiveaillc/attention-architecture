<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sort by Rule — Tilt</title>
<!--
  LOOP / attention-architecture — Sort by Rule
  Circuits: 06-zeigarnik (the rule is almost figured out), 05-ease (the gesture is already known),
            08-investment (each correct sort deepens commitment).
  Engine: CALM — soft bells only, no percussion/tension/death.
  Modes:
    ?demo=1&seed=7        scripted calm arc ~16s → soft CTA → window.__demoDone
    ?bot=1&runs=N&seed=5  imperfect autoplay, N runs (bot eventually LOSES), window.__botDone
-->
<style>
  html,body{margin:0;padding:0;height:100%;background:#0b0d12;overflow:hidden;
            -webkit-user-select:none;user-select:none;touch-action:manipulation;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;background:#0b0d12;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'sort-by-rule';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function(){
'use strict';

var W=405,H=720;
var qs=new URLSearchParams(location.search);
var DEMO=qs.get('demo')==='1';
var BOT=qs.get('bot')==='1';
var BOT_RUNS=+qs.get('runs')||3;
var SEED=+qs.get('seed')||42;

// mulberry32 seeded RNG
function mulberry32(a){
  return function(){
    a|=0;a=a+0x6D2B79F5|0;
    var t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
var rng=mulberry32(SEED);

var cv=document.getElementById('c'),cx=cv.getContext('2d');
var dpr=Math.min(window.devicePixelRatio||1,2),scale=1;
function fit(){
  var vw=window.innerWidth,vh=window.innerHeight;
  scale=Math.min(vw/W,vh/H);
  cv.style.width=(W*scale)+'px';cv.style.height=(H*scale)+'px';
  cv.width=W*dpr;cv.height=H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',fit);fit();

var TEAL='#2ec5b6',GOLD='#f2b134',INK='#0b0d12';
var SOFT='#a0c4c2'; // softer teal for calm aesthetic

// ──────────────────────────────────────────────
// RULE DEFINITIONS
// Each rule has: items (array of {label, group}), bins (2 labels), revealText
// The player must infer the rule from watching first few correct placements.
// ──────────────────────────────────────────────
var RULES=[
  {
    id:'even-odd',
    hint:'Something about numbers…',
    reveal:'EVEN vs ODD',
    bins:['LEFT','RIGHT'],
    binLabels:['EVEN','ODD'],
    items:[
      {label:'2',g:0},{label:'7',g:1},{label:'4',g:0},{label:'9',g:1},
      {label:'6',g:0},{label:'3',g:1},{label:'8',g:0},{label:'1',g:1},
      {label:'10',g:0},{label:'5',g:1},{label:'12',g:0},{label:'11',g:1},
      {label:'14',g:0},{label:'13',g:1},{label:'16',g:0},{label:'15',g:1},
      {label:'18',g:0},{label:'17',g:1},{label:'20',g:0},{label:'19',g:1}
    ]
  },
  {
    id:'long-short',
    hint:'Something about length…',
    reveal:'SHORT vs LONG words',
    bins:['LEFT','RIGHT'],
    binLabels:['SHORT','LONG'],
    items:[
      {label:'cat',g:0},{label:'elephant',g:1},{label:'sun',g:0},{label:'umbrella',g:1},
      {label:'map',g:0},{label:'computer',g:1},{label:'sky',g:0},{label:'butterfly',g:1},
      {label:'box',g:0},{label:'laboratory',g:1},{label:'cup',g:0},{label:'crocodile',g:1},
      {label:'hat',g:0},{label:'strawberry',g:1},{label:'bag',g:0},{label:'dictionary',g:1},
      {label:'pen',g:0},{label:'microscope',g:1},{label:'dot',g:0},{label:'helicopter',g:1}
    ]
  },
  {
    id:'vowel-consonant',
    hint:'Look at how they start…',
    reveal:'STARTS VOWEL vs CONSONANT',
    bins:['LEFT','RIGHT'],
    binLabels:['VOWEL','CONS.'],
    items:[
      {label:'apple',g:0},{label:'bird',g:1},{label:'ocean',g:0},{label:'cloud',g:1},
      {label:'ice',g:0},{label:'flame',g:1},{label:'earth',g:0},{label:'tree',g:1},
      {label:'ant',g:0},{label:'brook',g:1},{label:'echo',g:0},{label:'stone',g:1},
      {label:'owl',g:0},{label:'wave',g:1},{label:'urn',g:0},{label:'grain',g:1},
      {label:'elk',g:0},{label:'peak',g:1},{label:'iris',g:0},{label:'sword',g:1}
    ]
  },
  {
    id:'nature-made',
    hint:'Where did it come from?',
    reveal:'NATURE-MADE vs MAN-MADE',
    bins:['LEFT','RIGHT'],
    binLabels:['NATURE','MADE'],
    items:[
      {label:'rock',g:0},{label:'chair',g:1},{label:'leaf',g:0},{label:'lamp',g:1},
      {label:'river',g:0},{label:'phone',g:1},{label:'shell',g:0},{label:'knife',g:1},
      {label:'cloud',g:0},{label:'wheel',g:1},{label:'seed',g:0},{label:'glass',g:1},
      {label:'moss',g:0},{label:'key',g:1},{label:'snow',g:0},{label:'clock',g:1},
      {label:'thorn',g:0},{label:'paper',g:1},{label:'wind',g:0},{label:'bridge',g:1}
    ]
  }
];

// ──────────────────────────────────────────────
// GAME STATE
// ──────────────────────────────────────────────
var state,flashes,runStartTs;
var hitStop=0,zoom=1,shakeAmt=0;
var botRunsDone=0;
var ctaAt=0,last=performance.now();
var best=0;
try{best=+localStorage.getItem('sbr_best')||0;}catch(_){}

// visual juice vars
var revealPulse=0; // pulse on rule reveal

// ──────────────────────────────────────────────
// Item visual: a drifting card
// Each item: {label,g,x,y,vy,t,state:'drift'|'correct'|'wrong'|'done',
//             swipeDir,animT,alpha}
// ──────────────────────────────────────────────
var CARD_W=160,CARD_H=52;
var BIN_Y=560; // y top of bins
var BIN_H=80;
var BIN_L_X=60,BIN_R_X=W-60-CARD_W; // bin left/right x

function pickRule(){
  var idx=Math.floor(rng()*RULES.length);
  return RULES[idx];
}

function newGame(){
  var rule=pickRule();
  // shuffle items with seeded rng
  var items=rule.items.slice().map(function(it,i){return{label:it.label,g:it.g,idx:i};});
  for(var i=items.length-1;i>0;i--){
    var j=Math.floor(rng()*(i+1));
    var tmp=items[i];items[i]=items[j];items[j]=tmp;
  }

  state={
    phase:'title', // title|play|sealed|over|cta
    rule:rule,
    items:items,
    queue:items.slice(), // items yet to drop
    active:null,  // current drifting item
    sorted:[], // correctly sorted so far
    errors:0,  // wrong sorts
    maxErrors:3, // 3 strikes → game over
    score:0,
    overAt:0,
    sealAt:0,
    revealShown:false
  };
  flashes=[];
  hitStop=0;zoom=1;shakeAmt=0;revealPulse=0;

  if(DEMO){
    setTimeout(startRun,400);
    return;
  }
  if(BOT) startRun();
}

function startRun(){
  state.phase='play';
  runStartTs=Date.now();
  if(window.LOOP) LOOP.emit('play_start',{seed:SEED,rule:state.rule.id});
  spawnNext();
}

function spawnNext(){
  if(state.phase!=='play') return;
  if(state.queue.length===0){
    // all items sorted! seal the tray
    sealGame();
    return;
  }
  var it=state.queue.shift();
  // drift in from top center with slight x variance
  var startX=W/2-CARD_W/2+(rng()-0.5)*40;
  state.active={
    label:it.label,
    g:it.g,
    x:startX,
    y:-CARD_H-10,
    vy:1.6+(rng()*0.6),
    state:'drift',
    animT:0,
    alpha:1,
    targetX:startX, // settles here while waiting for input
    settled:false
  };
}

function sealGame(){
  state.phase='sealed';
  state.sealAt=performance.now();
  state.revealShown=true;
  if(window.J) J.calm(8);
  zoom=1.02;
  var dur=(Date.now()-runStartTs)/1000;
  var sc=state.score;
  if(sc>best){best=sc;try{localStorage.setItem('sbr_best',String(best));}catch(_){}}
  if(window.LOOP) LOOP.emit('game_over',{score:sc,dur_s:+dur.toFixed(1),result:'sealed'});
  if(window.LOOP) LOOP.emit('rule_revealed',{rule:state.rule.id,errors:state.errors});
  if(DEMO){
    window.__demoScore=sc;
    setTimeout(function(){state.phase='cta';ctaAt=performance.now();
      setTimeout(function(){window.__demoDone=true;},3600);},2800);
  }
  if(BOT){
    botRunsDone++;
    if(botRunsDone>=BOT_RUNS){window.__botDone=true;}
    else setTimeout(function(){newGame();startRun();},600);
  }
}

function gameOver(){
  state.phase='over';
  state.overAt=performance.now();
  shakeAmt=6;
  var dur=(Date.now()-runStartTs)/1000;
  var sc=state.score;
  if(sc>best){best=sc;try{localStorage.setItem('sbr_best',String(best));}catch(_){}}
  if(window.J) J.calm(0); // soft ending
  if(window.LOOP) LOOP.emit('game_over',{score:sc,dur_s:+dur.toFixed(1),result:'failed',errors:state.errors});
  if(DEMO){
    window.__demoScore=sc;
    setTimeout(function(){state.phase='cta';ctaAt=performance.now();
      setTimeout(function(){window.__demoDone=true;},3600);},2200);
  }
  if(BOT){
    botRunsDone++;
    if(botRunsDone>=BOT_RUNS){window.__botDone=true;}
    else setTimeout(function(){newGame();startRun();},600);
  }
}

function flash(txt,color,size){flashes.push({txt:txt,color:color,size:size||30,t:0});}

// ──────────────────────────────────────────────
// SORT LOGIC
// group 0 = left bin, group 1 = right bin
// ──────────────────────────────────────────────
function trySort(direction){
  // direction: 0=left, 1=right
  if(!state.active||state.active.state!=='drift'||!state.active.settled) return;
  var it=state.active;
  if(direction===it.g){
    // CORRECT
    state.score++;
    state.sorted.push({label:it.label,g:it.g});
    if(window.J) J.calm(Math.floor(state.score/3));
    if(state.score===1) zoom=1.02;
    flash('+1',TEAL,28);
    if(window.LOOP) LOOP.emit('item_sorted',{label:it.label,correct:true,n:state.score});
    it.state='correct';
    it.animT=0;
    // after animation, spawn next
    setTimeout(spawnNext,300);
  } else {
    // WRONG — gentle return, no harsh sound
    state.errors++;
    shakeAmt=2;
    flash('not that one',SOFT,22);
    if(window.LOOP) LOOP.emit('item_sorted',{label:it.label,correct:false,errors:state.errors});
    it.state='wrong';
    it.animT=0;
    // float back to center after 600ms
    setTimeout(function(){
      if(state.active&&state.active.state==='wrong'){
        state.active.state='drift';
        state.active.x=W/2-CARD_W/2+(rng()-0.5)*20;
        state.active.targetX=state.active.x;
        state.active.y=BIN_Y-CARD_H-80;
        state.active.settled=false;
      }
    },600);
    if(state.errors>=state.maxErrors){
      setTimeout(gameOver,700);
    }
  }
}

// ──────────────────────────────────────────────
// INPUT
// ──────────────────────────────────────────────
var MUTE_R={x:W-46,y:10,w:38,h:38};
function inR(r,x,y){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;}

// Drag state
var dragStart=null,dragItem=null;
var swipeThresh=50;

function pointerDown(px,py){
  if(DEMO||BOT) return;
  if(inR(MUTE_R,px,py)&&window.J){J.toggleMute();return;}
  if(state.phase==='title'){startRun();return;}
  if(state.phase==='over'&&performance.now()-state.overAt>350){
    newGame();return;
  }
  if(state.phase==='play'&&state.active&&state.active.settled&&state.active.state==='drift'){
    dragStart={x:px,y:py};
    dragItem=state.active;
  }
}

function pointerUp(px,py){
  if(DEMO||BOT) return;
  if(!dragStart||!dragItem) return;
  var dx=px-dragStart.x;
  dragStart=null;dragItem=null;
  if(Math.abs(dx)>swipeThresh){
    trySort(dx<0?0:1);
  }
}

window.addEventListener('pointerdown',function(e){
  var r=cv.getBoundingClientRect();
  pointerDown((e.clientX-r.left)/scale,(e.clientY-r.top)/scale);
});
window.addEventListener('pointerup',function(e){
  var r=cv.getBoundingClientRect();
  pointerUp((e.clientX-r.left)/scale,(e.clientY-r.top)/scale);
});
// keyboard: left/right arrow
window.addEventListener('keydown',function(e){
  if(e.code==='ArrowLeft') trySort(0);
  if(e.code==='ArrowRight') trySort(1);
});

// ──────────────────────────────────────────────
// AUTOPILOTS
// ──────────────────────────────────────────────
var demoStep=0;
var demoTimer=0;
// demo script: correct placements that gradually reveal the rule,
// then resolve with a full sealed tray
// Arc: settle(~3 items correct) → deepen(items 4-14 correct, slow) → resolve(15-20 sealed)
var demoWaits=[60,55,70,80,65,55,70,85,60,55,65,70,55,60,75,60,65,70,55,60];
var demoWaitIdx=0;

var botActionCount=0;
var BOT_MAX_CORRECT=14; // after 14 correct, bot starts making errors to lose

function autopilot(){
  if(!state.active||!state.active.settled||state.active.state!=='drift') return;
  if(state.phase!=='play') return;

  if(DEMO){
    demoTimer--;
    if(demoTimer>0) return;
    // always correct in demo
    trySort(state.active.g);
    demoTimer=demoWaits[Math.min(demoWaitIdx,demoWaits.length-1)];
    demoWaitIdx++;
  } else if(BOT){
    demoTimer--;
    if(demoTimer>0) return;
    var correct;
    if(botActionCount<BOT_MAX_CORRECT){
      // mostly correct early on, occasionally wrong
      correct=rng()<0.85;
    } else {
      // after BOT_MAX_CORRECT, start making errors to trigger game over
      correct=rng()<0.2;
    }
    botActionCount++;
    trySort(correct?state.active.g:1-state.active.g);
    demoTimer=Math.floor(30+rng()*40);
  }
}

// init demo/bot timer
function initAutopilot(){
  demoTimer=demoWaits[0];
  demoWaitIdx=0;
  demoStep=0;
  botActionCount=0;
}

// ──────────────────────────────────────────────
// RENDER HELPERS
// ──────────────────────────────────────────────
function roundRect(x,y,w,h,r){
  if(cx.roundRect){cx.roundRect(x,y,w,h,r);}
  else{
    cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);
    cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);
    cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);
    cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();
  }
}

function drawCard(it,alpha){
  alpha=alpha==null?1:alpha;
  cx.save();
  cx.globalAlpha=alpha;
  // card bg
  cx.fillStyle='rgba(46,197,182,0.12)';
  cx.strokeStyle=TEAL;
  cx.lineWidth=1.5;
  cx.beginPath();roundRect(it.x,it.y,CARD_W,CARD_H,10);cx.fill();cx.stroke();
  // label
  cx.fillStyle='#fff';
  cx.font='700 22px -apple-system,Helvetica,Arial';
  cx.textAlign='center';
  cx.textBaseline='middle';
  cx.fillText(it.label,it.x+CARD_W/2,it.y+CARD_H/2);
  cx.textBaseline='alphabetic';
  cx.restore();
}

function drawBin(x,label,highlighted,count){
  var alpha=highlighted?1:0.5;
  cx.save();
  cx.globalAlpha=alpha;
  // bin outline
  cx.fillStyle='rgba(46,197,182,0.07)';
  cx.strokeStyle=highlighted?TEAL:'rgba(46,197,182,0.3)';
  cx.lineWidth=highlighted?2:1;
  cx.beginPath();roundRect(x,BIN_Y,CARD_W,BIN_H,12);cx.fill();cx.stroke();
  // label
  cx.fillStyle=highlighted?TEAL:SOFT;
  cx.font='700 13px Menlo,monospace';
  cx.textAlign='center';
  cx.fillText('?',x+CARD_W/2,BIN_Y+30);
  // count badge
  if(count>0){
    cx.fillStyle=GOLD;
    cx.font='600 11px -apple-system,Helvetica,Arial';
    cx.fillText(count+'',x+CARD_W/2,BIN_Y+52);
  }
  cx.restore();
}

function drawBinRevealed(x,label,count){
  cx.save();
  cx.fillStyle='rgba(46,197,182,0.12)';
  cx.strokeStyle=TEAL;
  cx.lineWidth=1.5;
  cx.beginPath();roundRect(x,BIN_Y,CARD_W,BIN_H,12);cx.fill();cx.stroke();
  cx.fillStyle=TEAL;
  cx.font='800 15px -apple-system,Helvetica,Arial';
  cx.textAlign='center';
  cx.fillText(label,x+CARD_W/2,BIN_Y+34);
  cx.fillStyle=GOLD;
  cx.font='600 11px -apple-system,Helvetica,Arial';
  cx.fillText(count+'',x+CARD_W/2,BIN_Y+54);
  cx.restore();
}

// ──────────────────────────────────────────────
// MAIN FRAME
// ──────────────────────────────────────────────
function frame(now){
  var dt=Math.min((now-last)/16.667,3);last=now;

  // update active item physics
  if(state.active){
    var it=state.active;
    if(it.state==='drift'){
      if(!it.settled){
        // drift down
        it.y+=it.vy*dt;
        var settleY=BIN_Y-CARD_H-30;
        if(it.y>=settleY){
          it.y=settleY;
          it.settled=true;
          if(window.J) J.calm(0); // soft arrival chime
        }
      }
      // gentle float when settled
      if(it.settled){
        it.y+= Math.sin(now/900)*0.3*dt;
        // clamp to settle zone
        var sy=BIN_Y-CARD_H-30;
        if(it.y<sy-8) it.y=sy-8;
        if(it.y>sy+8) it.y=sy+8;
        autopilot();
      }
    } else if(it.state==='correct'){
      it.animT+=dt;
      it.alpha=Math.max(0,1-it.animT/18);
      if(it.animT>20) state.active=null;
    } else if(it.state==='wrong'){
      it.animT+=dt;
      // wobble effect
    }
  }

  // decay juice
  if(hitStop>0) hitStop-=dt; else { /* autopilot called inside settled check */ }
  shakeAmt*=Math.pow(0.85,dt);
  zoom+=(1-zoom)*0.12*dt;
  revealPulse*=Math.pow(0.92,dt);

  // ── DRAW ──
  cx.save();
  // screen shake + zoom juice
  if(shakeAmt>0.2||zoom>1.001){
    var sx=(Math.random()-0.5)*shakeAmt,sy=(Math.random()-0.5)*shakeAmt;
    cx.translate(W/2+sx,H/2+sy);cx.scale(zoom,zoom);cx.translate(-W/2,-H/2);
  }

  // BG
  cx.fillStyle=INK;cx.fillRect(-20,-20,W+40,H+40);
  var bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'rgba(46,197,182,0.04)');
  bg.addColorStop(1,'rgba(46,197,182,0.01)');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // ── TITLE ──
  if(state.phase==='title'){
    cx.textAlign='center';
    cx.fillStyle='#fff';cx.font='900 38px -apple-system,Helvetica,Arial';
    cx.fillText('SORT BY RULE',W/2,280);
    cx.fillStyle=SOFT;cx.font='600 16px -apple-system,Helvetica,Arial';
    cx.fillText('swipe to sort. infer the rule.',W/2,318);
    var p=0.6+0.4*Math.sin(now/500);
    cx.globalAlpha=p;cx.fillStyle=TEAL;
    cx.font='700 15px -apple-system,Helvetica,Arial';
    cx.fillText('TAP TO BEGIN',W/2,370);cx.globalAlpha=1;
  }

  // ── PLAY / OVER ──
  if(state.phase==='play'||state.phase==='over'||state.phase==='sealed'){
    // hint text (fades as rule becomes clear)
    var hintAlpha=Math.max(0,1-(state.score/6));
    if(hintAlpha>0.01&&!state.revealShown){
      cx.globalAlpha=hintAlpha*0.6;
      cx.fillStyle=SOFT;cx.font='500 13px Menlo,monospace';
      cx.textAlign='center';
      cx.fillText(state.rule.hint,W/2,55);
      cx.globalAlpha=1;
    }

    // score + errors display
    cx.textAlign='center';
    cx.fillStyle='rgba(255,255,255,0.9)';
    cx.font='800 52px -apple-system,Helvetica,Arial';
    cx.fillText(state.score,W/2,110);
    cx.fillStyle='rgba(255,255,255,0.35)';
    cx.font='600 12px -apple-system,Helvetica,Arial';
    cx.fillText('sorted',W/2,130);

    // error hearts
    var ex=W/2-((state.maxErrors-1)*20)/2;
    for(var i=0;i<state.maxErrors;i++){
      cx.fillStyle=i<(state.maxErrors-state.errors)?'rgba(46,197,182,0.6)':'rgba(255,255,255,0.12)';
      cx.beginPath();cx.arc(ex+i*22,155,6,0,Math.PI*2);cx.fill();
    }

    // progress dots (remaining queue)
    var total=state.items.length;
    var done=state.score;
    var dotStartX=W/2-Math.min(total,20)*8/2;
    cx.globalAlpha=0.4;
    for(var d=0;d<Math.min(total,20);d++){
      cx.fillStyle=d<done?TEAL:'rgba(255,255,255,0.2)';
      cx.beginPath();cx.arc(dotStartX+d*8,175,3,0,Math.PI*2);cx.fill();
    }
    cx.globalAlpha=1;

    // divider line with rule label (hidden until revealed)
    var ruleAlpha=state.revealShown?1:0;
    if(state.revealShown&&revealPulse<0.01) ruleAlpha=1;
    cx.globalAlpha=ruleAlpha;
    cx.strokeStyle=TEAL;cx.lineWidth=0.5;
    cx.beginPath();cx.moveTo(40,200);cx.lineTo(W-40,200);cx.stroke();
    cx.fillStyle=TEAL;cx.font='800 15px Menlo,monospace';
    cx.textAlign='center';
    if(state.revealShown){
      var rpulse=1+revealPulse*0.08;
      cx.save();cx.translate(W/2,215);cx.scale(rpulse,rpulse);cx.translate(-W/2,-215);
      cx.fillText('THE RULE: '+state.rule.reveal,W/2,215);
      cx.restore();
    }
    cx.globalAlpha=1;

    // bins
    var leftCount=state.sorted.filter(function(s){return s.g===0;}).length;
    var rightCount=state.sorted.filter(function(s){return s.g===1;}).length;
    if(state.revealShown){
      drawBinRevealed(BIN_L_X,state.rule.binLabels[0],leftCount);
      drawBinRevealed(W-BIN_L_X-CARD_W,state.rule.binLabels[1],rightCount);
    } else {
      drawBin(BIN_L_X,'?',false,leftCount);
      drawBin(W-BIN_L_X-CARD_W,'?',false,rightCount);
    }

    // bin arrows (guide) when item is settled, not yet revealed
    if(state.active&&state.active.settled&&state.active.state==='drift'&&!state.revealShown){
      var arrowA=0.3+0.3*Math.sin(now/400);
      cx.globalAlpha=arrowA;
      cx.fillStyle=SOFT;cx.font='24px -apple-system';
      cx.textAlign='center';
      cx.fillText('←',BIN_L_X+CARD_W/2,BIN_Y+BIN_H+28);
      cx.fillText('→',W-BIN_L_X-CARD_W/2,BIN_Y+BIN_H+28);
      cx.globalAlpha=1;
    }

    // active card
    if(state.active&&state.active.state!=='done'){
      var a=state.active.state==='correct'?state.active.alpha:1;
      drawCard(state.active,a);
      // swipe hint label when first item settling
      if(state.score===0&&state.active.settled&&state.active.state==='drift'){
        cx.globalAlpha=0.45;
        cx.fillStyle=SOFT;cx.font='600 11px -apple-system,Helvetica,Arial';
        cx.textAlign='center';
        cx.fillText('swipe left or right',W/2,state.active.y+CARD_H+18);
        cx.globalAlpha=1;
      }
    }

    // flashes
    for(var k=flashes.length-1;k>=0;k--){
      var fl=flashes[k];fl.t+=dt;
      var fa=Math.max(0,1-fl.t/35);
      cx.globalAlpha=fa;cx.textAlign='center';
      cx.fillStyle=fl.color;
      cx.font='700 '+(fl.size+fl.t*0.3)+'px -apple-system,Helvetica,Arial';
      cx.fillText(fl.txt,W/2,330-fl.t*1.2);
      cx.globalAlpha=1;
      if(fl.t>36) flashes.splice(k,1);
    }
  }

  // ── SEALED ──
  if(state.phase==='sealed'){
    cx.fillStyle='rgba(11,13,18,0.5)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    cx.fillStyle=TEAL;cx.font='900 28px -apple-system,Helvetica,Arial';
    cx.fillText('SORTED.',W/2,300);
    cx.fillStyle='rgba(255,255,255,0.8)';cx.font='700 17px -apple-system,Helvetica,Arial';
    cx.fillText('20 of 20 — the rule was:',W/2,336);
    cx.fillStyle=GOLD;cx.font='900 22px -apple-system,Helvetica,Arial';
    cx.fillText(state.rule.reveal,W/2,366);
    cx.fillStyle='rgba(255,255,255,0.4)';cx.font='600 12px -apple-system,Helvetica,Arial';
    cx.fillText('hiding in plain sight the whole time',W/2,390);
  }

  // ── GAME OVER ──
  if(state.phase==='over'){
    cx.fillStyle='rgba(11,13,18,0.6)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    cx.fillStyle=SOFT;cx.font='900 32px -apple-system,Helvetica,Arial';
    cx.fillText('LOST THE THREAD',W/2,295);
    cx.fillStyle='rgba(255,255,255,0.75)';cx.font='700 18px -apple-system,Helvetica,Arial';
    cx.fillText(state.score+' sorted before the slip',W/2,335);
    cx.fillStyle=GOLD;cx.font='700 15px -apple-system,Helvetica,Arial';
    cx.fillText('the rule was: '+state.rule.reveal,W/2,365);
    if(!DEMO&&!BOT){
      var p2=0.6+0.4*Math.sin(now/400);
      cx.globalAlpha=p2;cx.fillStyle=TEAL;
      cx.font='700 15px -apple-system,Helvetica,Arial';
      cx.fillText('TAP TO TRY AGAIN',W/2,415);
      cx.globalAlpha=1;
    }
  }

  // ── DEMO CTA ──
  if(state.phase==='cta'){
    var t=(now-ctaAt)/1000,ease=Math.min(1,t*2.0);
    cx.fillStyle='rgba(11,13,18,'+(0.8*ease)+')';cx.fillRect(0,0,W,H);
    cx.globalAlpha=ease;cx.textAlign='center';
    cx.fillStyle='#fff';cx.font='900 36px -apple-system,Helvetica,Arial';
    cx.fillText('SORT BY RULE',W/2,290);
    cx.fillStyle='rgba(255,255,255,0.7)';cx.font='600 16px -apple-system,Helvetica,Arial';
    cx.fillText('the pattern was right there.',W/2,324);
    var p3=0.75+0.25*Math.sin(now/320);
    cx.fillStyle=TEAL;cx.globalAlpha=ease*p3;
    cx.font='800 22px -apple-system,Helvetica,Arial';
    cx.fillText('▶ GROW YOURS',W/2,388);
    cx.globalAlpha=ease;
    cx.fillStyle='rgba(255,255,255,0.4)';cx.font='600 14px -apple-system,Helvetica,Arial';
    cx.fillText('link in bio',W/2,418);
    cx.globalAlpha=1;
  }

  // mute toggle (human only)
  if(!DEMO&&!BOT&&window.J){
    cx.textAlign='center';cx.globalAlpha=0.5;
    cx.font='16px -apple-system,Helvetica,Arial';cx.fillStyle='#fff';
    cx.fillText(J.muted?'🔇':'🔊',MUTE_R.x+MUTE_R.w/2,MUTE_R.y+26);
    cx.globalAlpha=1;
  }

  cx.restore();
  requestAnimationFrame(frame);
}

newGame();
// init autopilot timers after newGame
initAutopilot();
requestAnimationFrame(frame);

})();
</script>
