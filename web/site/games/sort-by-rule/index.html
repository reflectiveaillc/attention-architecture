<!--

            -webkit-user-select:none;user-select:none;touch-action:manipulation;}

<body>

<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function(){
'use strict';
var W=405,H=720;
var qs=new URLSearchParams(location.search);
var DEMO=qs.get('demo')==='1';
var BOT=qs.get('bot')==='1';
var BOT_RUNS=+qs.get('runs')||3;
var SEED=+qs.get('seed')||42;

function mulberry32(a){
  return function(){
    a|=0;a=a+0x6D2B79F5|0;
    var t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
var rng=mulberry32(SEED);

var cv=document.getElementById('c'),cx=cv.getContext('2d');
var dpr=Math.min(window.devicePixelRatio||1,2),scale=1;
function fit(){
  var vw=window.innerWidth,vh=window.innerHeight;
  scale=Math.min(vw/W,vh/H);
  cv.style.width=(W*scale)+'px';cv.style.height=(H*scale)+'px';
  cv.width=W*dpr;cv.height=H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',fit);fit();

var TEAL='#2ec5b6',GOLD='#f2b134',INK='#0b0d12',SOFT='#a0c4c2';

// ── RULES ──
var RULES=[
  {
    id:'even-odd',hint:'Something about numbers…',
    reveal:'EVEN vs ODD',binLabels:['EVEN','ODD'],
    items:[
      {label:'2',g:0},{label:'7',g:1},{label:'4',g:0},{label:'9',g:1},
      {label:'6',g:0},{label:'3',g:1},{label:'8',g:0},{label:'1',g:1},
      {label:'10',g:0},{label:'5',g:1},{label:'12',g:0},{label:'11',g:1},
      {label:'14',g:0},{label:'13',g:1},{label:'16',g:0},{label:'15',g:1},
      {label:'18',g:0},{label:'17',g:1},{label:'20',g:0},{label:'19',g:1}
    ]
  },
  {
    id:'long-short',hint:'Something about length…',
    reveal:'SHORT ≤4 vs LONG >4 letters',binLabels:['SHORT','LONG'],
    items:[
      {label:'cat',g:0},{label:'elephant',g:1},{label:'sun',g:0},{label:'umbrella',g:1},
      {label:'map',g:0},{label:'computer',g:1},{label:'sky',g:0},{label:'butterfly',g:1},
      {label:'box',g:0},{label:'laboratory',g:1},{label:'cup',g:0},{label:'crocodile',g:1},
      {label:'hat',g:0},{label:'strawberry',g:1},{label:'bag',g:0},{label:'dictionary',g:1},
      {label:'pen',g:0},{label:'microscope',g:1},{label:'dot',g:0},{label:'helicopter',g:1}
    ]
  },
  {
    id:'vowel-consonant',hint:'Look at how they start…',
    reveal:'STARTS WITH VOWEL vs CONSONANT',binLabels:['VOWEL','CONS.'],
    items:[
      {label:'apple',g:0},{label:'bird',g:1},{label:'ocean',g:0},{label:'cloud',g:1},
      {label:'ice',g:0},{label:'flame',g:1},{label:'earth',g:0},{label:'tree',g:1},
      {label:'ant',g:0},{label:'brook',g:1},{label:'echo',g:0},{label:'stone',g:1},
      {label:'owl',g:0},{label:'wave',g:1},{label:'urn',g:0},{label:'grain',g:1},
      {label:'elk',g:0},{label:'peak',g:1},{label:'iris',g:0},{label:'sword',g:1}
    ]
  },
  {
    id:'nature-made',hint:'Where did it come from?',
    reveal:'NATURE-MADE vs MAN-MADE',binLabels:['NATURE','MADE'],
    items:[
      {label:'rock',g:0},{label:'chair',g:1},{label:'leaf',g:0},{label:'lamp',g:1},
      {label:'river',g:0},{label:'phone',g:1},{label:'shell',g:0},{label:'knife',g:1},
      {label:'cloud',g:0},{label:'wheel',g:1},{label:'seed',g:0},{label:'glass',g:1},
      {label:'moss',g:0},{label:'key',g:1},{label:'snow',g:0},{label:'clock',g:1},
      {label:'thorn',g:0},{label:'paper',g:1},{label:'wind',g:0},{label:'bridge',g:1}
    ]
  }
];

var CARD_W=160,CARD_H=52;
var BIN_Y=556,BIN_H=80;
var BIN_L_X=52,BIN_R_X=W-52-CARD_W;
var SETTLE_Y=BIN_Y-CARD_H-28;

// ── STATE ──
var phase,rule,queue,active,sorted,errors,score,overAt,sealAt,revealShown;
var flashes=[];
var hitStop=0,zoom=1,shakeAmt=0,revealPulse=0;
var runStartTs=0;
var best=0;
try{best=+localStorage.getItem('sbr_best')||0;}catch(_){}

// autopilot
var apTimer=0;
var apWaits=[40,35,45,50,40,35,45,55,40,35,45,50,35,40,50,40,45,50,35,40];
var apIdx=0;
var botRunsDone=0;
var botActionCount=0;
var BOT_ACTIONS_THEN_FAIL=7; // after 7 total actions, force wrong every time → 3 errors → game over

var ctaAt=0,last=performance.now();

function pickRule(){
  return RULES[Math.floor(rng()*RULES.length)];
}

function shuffleItems(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(rng()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

function initRun(){
  rule=pickRule();
  var rawItems=shuffleItems(rule.items);
  queue=rawItems.slice();
  // DEMO must seal well under the 90s clip window: 6 cards ≈ a ~15s calm arc.
  if(DEMO) queue=queue.slice(0,6);
  active=null;
  sorted=[];
  errors=0;
  score=0;
  overAt=0;
  sealAt=0;
  revealShown=false;
  flashes=[];
  hitStop=0;zoom=1;shakeAmt=0;revealPulse=0;
  apIdx=0;
  botActionCount=0;
}

function startRun(){
  phase='play';
  runStartTs=Date.now();
  apTimer=apWaits[0]||60;
  apIdx=0;
  if(window.LOOP) LOOP.emit('play_start',{seed:SEED,rule:rule.id});
  spawnNext();
}

function spawnNext(){
  if(phase!=='play') return;
  if(queue.length===0){ sealGame(); return; }
  var it=queue.shift();
  var sx=W/2-CARD_W/2+(rng()-0.5)*30;
  active={
    label:it.label,g:it.g,
    x:sx,y:-CARD_H-10,
    vy:1.8+(rng()*0.5),
    state:'drift',   // drift | arriving | settled | correct | wrong
    animT:0,alpha:1
  };
}

function emitGameOver(result){
  var dur=(Date.now()-runStartTs)/1000;
  if(window.LOOP) LOOP.emit('game_over',{score:score,dur_s:+dur.toFixed(1),result:result,errors:errors});
}

function sealGame(){
  phase='sealed';
  sealAt=performance.now();
  revealShown=true;
  revealPulse=1;
  if(score>best){best=score;try{localStorage.setItem('sbr_best',String(best));}catch(_){}}
  if(window.J) J.calm(8);
  zoom=1.02;
  emitGameOver('sealed');
  if(window.LOOP) LOOP.emit('rule_revealed',{rule:rule.id,errors:errors});
  window.__demoScore=score;
  if(DEMO){
    setTimeout(function(){
      phase='cta';ctaAt=performance.now();
      setTimeout(function(){window.__demoDone=true;},3600);
    },2800);
  }
  if(BOT){
    botRunsDone++;
    if(botRunsDone>=BOT_RUNS){window.__botDone=true;}
    else setTimeout(function(){initRun();startRun();},500);
  }
}

function gameOver(){
  phase='over';
  overAt=performance.now();
  shakeAmt=5;
  revealShown=true;
  if(score>best){best=score;try{localStorage.setItem('sbr_best',String(best));}catch(_){}}
  if(window.J) J.calm(0);
  emitGameOver('failed');
  window.__demoScore=score;
  if(DEMO){
    setTimeout(function(){
      phase='cta';ctaAt=performance.now();
      setTimeout(function(){window.__demoDone=true;},3600);
    },2200);
  }
  if(BOT){
    botRunsDone++;
    if(botRunsDone>=BOT_RUNS){window.__botDone=true;}
    else setTimeout(function(){initRun();startRun();},500);
  }
}

function flash(txt,color,size){flashes.push({txt:txt,color:color,size:size||28,t:0});}

function trySort(dir){
  if(!active||active.state!=='settled') return;
  if(phase!=='play') return;
  var it=active;
  if(dir===it.g){
    score++;
    sorted.push({label:it.label,g:it.g});
    if(window.J) J.calm(Math.floor(score/4));
    flash('+1',TEAL,26);
    if(score===1) zoom=1.02;
    if(window.LOOP) LOOP.emit('item_sorted',{label:it.label,correct:true,n:score});
    it.state='correct';it.animT=0;
    setTimeout(spawnNext,280);
  } else {
    errors++;
    shakeAmt=2;
    flash('not that one',SOFT,20);
    if(window.LOOP) LOOP.emit('item_sorted',{label:it.label,correct:false,errors:errors});
    it.state='wrong';it.animT=0;
    if(errors>=3){
      setTimeout(gameOver,600);
    } else {
      // return item gently
      setTimeout(function(){
        if(active&&active.state==='wrong'){
          active.state='drift';
          active.x=W/2-CARD_W/2+(rng()-0.5)*20;
          active.y=SETTLE_Y-60;
          active.vy=0.8;
        }
      },550);
    }
  }
}

// ── INPUT ──
var MUTE_R={x:W-46,y:10,w:38,h:38};
function inR(r,x,y){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;}
var dragStart=null;

function pdDown(px,py){
  if(DEMO||BOT) return;
  if(inR(MUTE_R,px,py)&&window.J){J.toggleMute();return;}
  if(phase==='title'){startRun();return;}
  if(phase==='over'&&performance.now()-overAt>350){initRun();startRun();return;}
  if(phase==='play'&&active&&active.state==='settled') dragStart={x:px,y:py};
}
function pdUp(px,py){
  if(DEMO||BOT||!dragStart) return;
  var dx=px-dragStart.x;dragStart=null;
  if(Math.abs(dx)>45) trySort(dx<0?0:1);
}

window.addEventListener('pointerdown',function(e){
  var r=cv.getBoundingClientRect();
  pdDown((e.clientX-r.left)/scale,(e.clientY-r.top)/scale);
});
window.addEventListener('pointerup',function(e){
  var r=cv.getBoundingClientRect();
  pdUp((e.clientX-r.left)/scale,(e.clientY-r.top)/scale);
});
window.addEventListener('keydown',function(e){
  if(e.code==='ArrowLeft') trySort(0);
  if(e.code==='ArrowRight') trySort(1);
});

// ── AUTOPILOT ──
function autopilot(){
  if(!active||active.state!=='settled'||phase!=='play') return;
  if(hitStop>0) return;
  apTimer--;
  if(apTimer>0) return;

  // reset timer
  apTimer=apWaits[Math.min(apIdx,apWaits.length-1)];
  apIdx++;

  if(DEMO){
    // always correct in demo for smooth settle→deepen→resolve arc
    trySort(active.g);
  } else if(BOT){
    botActionCount++;
    var correct;
    if(botActionCount<=BOT_ACTIONS_THEN_FAIL){
      // mostly correct early — looks human
      correct=(rng()<0.85);
    } else {
      // always wrong now → 3 errors → game over
      correct=false;
    }
    trySort(correct?active.g:1-active.g);
  }
}

// ── RENDER HELPERS ──
function rr(x,y,w,h,r){
  if(cx.roundRect){cx.roundRect(x,y,w,h,r);return;}
  cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);
  cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();
}

function drawCard(it,al){
  cx.save();cx.globalAlpha=al==null?1:al;
  cx.fillStyle='rgba(46,197,182,0.13)';cx.strokeStyle=TEAL;cx.lineWidth=1.5;
  cx.beginPath();rr(it.x,it.y,CARD_W,CARD_H,10);cx.fill();cx.stroke();
  cx.fillStyle='#fff';cx.font='700 22px -apple-system,Helvetica,Arial';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(it.label,it.x+CARD_W/2,it.y+CARD_H/2);
  cx.textBaseline='alphabetic';cx.restore();
}

function drawBin(x,lbl,count,revealed){
  cx.save();
  cx.fillStyle='rgba(46,197,182,0.07)';
  cx.strokeStyle=revealed?TEAL:'rgba(46,197,182,0.25)';cx.lineWidth=revealed?2:1;
  cx.beginPath();rr(x,BIN_Y,CARD_W,BIN_H,12);cx.fill();cx.stroke();
  cx.fillStyle=revealed?TEAL:SOFT;cx.textAlign='center';
  cx.font=revealed?'800 13px -apple-system,Helvetica,Arial':'700 18px Menlo,monospace';
  cx.fillText(revealed?lbl:'?',x+CARD_W/2,BIN_Y+(revealed?30:32));
  if(count>0){
    cx.fillStyle=GOLD;cx.font='600 11px -apple-system,Helvetica,Arial';
    cx.fillText(''+count,x+CARD_W/2,BIN_Y+52);
  }
  cx.restore();
}

// ── FRAME ──
function frame(now){
  var dt=Math.min((now-last)/16.667,3);last=now;

  // update active item
  if(active){
    if(active.state==='drift'||active.state==='arriving'){
      active.y+=active.vy*dt;
      if(active.y>=SETTLE_Y){
        active.y=SETTLE_Y;
        active.state='settled';
        if(window.J) J.calm(0);
      }
    } else if(active.state==='settled'){
      // gentle float
      active.y=SETTLE_Y+Math.sin(now/900)*4;
      autopilot();
    } else if(active.state==='correct'){
      active.animT+=dt;
      active.alpha=Math.max(0,1-active.animT/16);
      if(active.animT>20){active=null;}
    } else if(active.state==='wrong'){
      active.animT+=dt;
      // wobble left-right
      var wob=Math.sin(active.animT*1.2)*5*Math.max(0,1-active.animT/18);
      active.x=(W/2-CARD_W/2)+wob;
    }
  }

  // juice decay
  if(hitStop>0) hitStop-=dt;
  shakeAmt*=Math.pow(0.84,dt);
  zoom+=(1-zoom)*0.12*dt;
  revealPulse*=Math.pow(0.92,dt);

  // ── DRAW ──
  cx.save();
  if(shakeAmt>0.2||zoom>1.001){
    var sx=(Math.random()-0.5)*shakeAmt,sy=(Math.random()-0.5)*shakeAmt;
    cx.translate(W/2+sx,H/2+sy);cx.scale(zoom,zoom);cx.translate(-W/2,-H/2);
  }

  cx.fillStyle=INK;cx.fillRect(-20,-20,W+40,H+40);
  var bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'rgba(46,197,182,0.04)');bg.addColorStop(1,'rgba(46,197,182,0.01)');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // TITLE
  if(phase==='title'){
    cx.textAlign='center';
    cx.fillStyle='#fff';cx.font='900 38px -apple-system,Helvetica,Arial';
    cx.fillText('SORT BY RULE',W/2,280);
    cx.fillStyle=SOFT;cx.font='600 16px -apple-system,Helvetica,Arial';
    cx.fillText('swipe to sort. infer the rule.',W/2,318);
    var p=0.6+0.4*Math.sin(now/500);
    cx.globalAlpha=p;cx.fillStyle=TEAL;cx.font='700 15px -apple-system,Helvetica,Arial';
    cx.fillText('TAP TO BEGIN',W/2,370);cx.globalAlpha=1;
  }

  // PLAY / OVER / SEALED common elements
  if(phase==='play'||phase==='over'||phase==='sealed'){
    // hint fades as rule becomes clear
    var hintA=revealShown?0:Math.max(0,1-score/5);
    if(hintA>0.01){
      cx.globalAlpha=hintA*0.55;cx.fillStyle=SOFT;
      cx.font='500 13px Menlo,monospace';cx.textAlign='center';
      cx.fillText(rule.hint,W/2,55);cx.globalAlpha=1;
    }

    // score
    cx.textAlign='center';
    cx.fillStyle='rgba(255,255,255,0.9)';cx.font='800 52px -apple-system,Helvetica,Arial';
    cx.fillText(''+score,W/2,110);
    cx.fillStyle='rgba(255,255,255,0.3)';cx.font='600 12px -apple-system,Helvetica,Arial';
    cx.fillText('sorted',W/2,130);

    // error dots (3 lives)
    var edx=W/2-22;
    for(var i=0;i<3;i++){
      cx.fillStyle=i<(3-errors)?'rgba(46,197,182,0.55)':'rgba(255,255,255,0.1)';
      cx.beginPath();cx.arc(edx+i*22,152,5,0,Math.PI*2);cx.fill();
    }

    // progress bar
    var total=rule.items.length;
    var barW=W-80,barX=40,barY=168;
    cx.fillStyle='rgba(255,255,255,0.08)';cx.fillRect(barX,barY,barW,3);
    cx.fillStyle=TEAL;cx.fillRect(barX,barY,barW*(score/total),3);

    // rule reveal label
    if(revealShown){
      var rpulse=1+revealPulse*0.06;
      cx.save();cx.translate(W/2,198);cx.scale(rpulse,rpulse);cx.translate(-W/2,-198);
      cx.fillStyle=TEAL;cx.font='700 13px Menlo,monospace';cx.textAlign='center';
      cx.fillText('THE RULE: '+rule.reveal,W/2,198);
      cx.restore();
    } else {
      cx.globalAlpha=0.2;cx.strokeStyle=TEAL;cx.lineWidth=0.5;
      cx.beginPath();cx.moveTo(40,185);cx.lineTo(W-40,185);cx.stroke();
      cx.globalAlpha=1;
    }

    // bins
    var lc=sorted.filter(function(s){return s.g===0;}).length;
    var rc=sorted.filter(function(s){return s.g===1;}).length;
    drawBin(BIN_L_X,rule.binLabels[0],lc,revealShown);
    drawBin(BIN_R_X,rule.binLabels[1],rc,revealShown);

    // swipe arrows when item settled (before reveal)
    if(active&&active.state==='settled'&&!revealShown){
      var aa=0.25+0.25*Math.sin(now/450);
      cx.globalAlpha=aa;cx.fillStyle=SOFT;cx.font='22px -apple-system,Helvetica,Arial';
      cx.textAlign='center';
      cx.fillText('←',BIN_L_X+CARD_W/2,BIN_Y+BIN_H+26);
      cx.fillText('→',BIN_R_X+CARD_W/2,BIN_Y+BIN_H+26);
      cx.globalAlpha=1;
    }

    // active card
    if(active&&active.state!=='done'){
      var ca=(active.state==='correct')?active.alpha:1;
      drawCard(active,ca);
      if(score===0&&active.state==='settled'){
        cx.globalAlpha=0.4;cx.fillStyle=SOFT;
        cx.font='600 11px -apple-system,Helvetica,Arial';cx.textAlign='center';
        cx.fillText('swipe left or right',W/2,active.y+CARD_H+16);
        cx.globalAlpha=1;
      }
    }

    // flashes
    for(var k=flashes.length-1;k>=0;k--){
      var fl=flashes[k];fl.t+=dt;
      var fa=Math.max(0,1-fl.t/32);
      cx.globalAlpha=fa;cx.textAlign='center';cx.fillStyle=fl.color;
      cx.font='700 '+(fl.size+fl.t*0.25)+'px -apple-system,Helvetica,Arial';
      cx.fillText(fl.txt,W/2,320-fl.t*1.0);
      cx.globalAlpha=1;
      if(fl.t>34) flashes.splice(k,1);
    }
  }

  // SEALED overlay
  if(phase==='sealed'){
    cx.fillStyle='rgba(11,13,18,0.5)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    cx.fillStyle=TEAL;cx.font='900 28px -apple-system,Helvetica,Arial';
    cx.fillText('SORTED.',W/2,294);
    cx.fillStyle='rgba(255,255,255,0.8)';cx.font='600 16px -apple-system,Helvetica,Arial';
    cx.fillText('all 20 sorted — the rule:',W/2,326);
    cx.fillStyle=GOLD;cx.font='900 20px -apple-system,Helvetica,Arial';
    cx.fillText(rule.reveal,W/2,356);
    cx.fillStyle='rgba(255,255,255,0.35)';cx.font='500 13px -apple-system,Helvetica,Arial';
    cx.fillText('hiding in plain sight the whole time',W/2,382);
  }

  // OVER overlay
  if(phase==='over'){
    cx.fillStyle='rgba(11,13,18,0.6)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    cx.fillStyle=SOFT;cx.font='900 28px -apple-system,Helvetica,Arial';
    cx.fillText('LOST THE THREAD',W/2,288);
    cx.fillStyle='rgba(255,255,255,0.7)';cx.font='600 17px -apple-system,Helvetica,Arial';
    cx.fillText(score+' sorted before the slip',W/2,320);
    cx.fillStyle=GOLD;cx.font='700 14px -apple-system,Helvetica,Arial';
    cx.fillText('rule: '+rule.reveal,W/2,350);
    if(!DEMO&&!BOT){
      var p2=0.6+0.4*Math.sin(now/400);
      cx.globalAlpha=p2;cx.fillStyle=TEAL;cx.font='700 15px -apple-system,Helvetica,Arial';
      cx.fillText('TAP TO TRY AGAIN',W/2,400);cx.globalAlpha=1;
    }
  }

  // CTA (demo)
  if(phase==='cta'){
    var ct=(now-ctaAt)/1000,ease=Math.min(1,ct*2.0);
    cx.fillStyle='rgba(11,13,18,'+(0.82*ease)+')';cx.fillRect(0,0,W,H);
    cx.globalAlpha=ease;cx.textAlign='center';
    cx.fillStyle='#fff';cx.font='900 36px -apple-system,Helvetica,Arial';
    cx.fillText('SORT BY RULE',W/2,284);
    cx.fillStyle='rgba(255,255,255,0.65)';cx.font='600 15px -apple-system,Helvetica,Arial';
    cx.fillText('the pattern was right there.',W/2,316);
    var p3=0.75+0.25*Math.sin(now/320);
    cx.fillStyle=TEAL;cx.globalAlpha=ease*p3;
    cx.font='800 22px -apple-system,Helvetica,Arial';
    cx.fillText('▶ GROW YOURS',W/2,380);
    cx.globalAlpha=ease;
    cx.fillStyle='rgba(255,255,255,0.38)';cx.font='600 13px -apple-system,Helvetica,Arial';
    cx.fillText('link in bio',W/2,410);
    cx.globalAlpha=1;
  }

  // mute toggle (human only)
  if(!DEMO&&!BOT&&window.J){
    cx.textAlign='center';cx.globalAlpha=0.45;
    cx.font='16px -apple-system,Helvetica,Arial';cx.fillStyle='#fff';
    cx.fillText(J.muted?'🔇':'🔊',MUTE_R.x+MUTE_R.w/2,MUTE_R.y+26);
    cx.globalAlpha=1;
  }

  cx.restore();
  requestAnimationFrame(frame);
}

// ── BOOT ──
phase='title';
initRun();
if(DEMO){
  phase='play';
  startRun();
} else if(BOT){
  phase='play';
  startRun();
}
requestAnimationFrame(frame);
})();
</script>
