<!--
  LOOP / attention-architecture — Tuning Match

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var SOFT_BLUE = '#6ec6f5', SOFT_LAVENDER = '#b48ef7';

  // Game constants
  var SLIDER_X = W / 2, SLIDER_Y = H - 200;
  var SLIDER_W = 280, SLIDER_H = 48;
  var SLIDER_LEFT = SLIDER_X - SLIDER_W / 2;
  var SLIDER_RIGHT = SLIDER_X + SLIDER_W / 2;
  // Target tone: A4 = 440 Hz (fixed). Player tone range: 410–470 Hz (±60 cents)
  var TARGET_FREQ = 440;
  var FREQ_MIN = 410, FREQ_MAX = 470;  // player can tune ±~120 cents

  // State
  var phase = 'title';  // title | play | over | cta
  var sliderPos = 0.5;  // 0..1 mapping FREQ_MIN..FREQ_MAX
  var playerFreq = 440;
  var centsOff = 0;      // absolute cents deviation (0=perfect)
  var best = Infinity;   // personal best (lowest cents = better)
  var runCount = 0;
  var runStartTs = 0;
  var overAt = 0;
  var ctaAt = 0;

  // Juice state
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [];

  // Demo/bot state
  var botRunsDone = 0;
  var demoPhase = 0;       // stages: 0=settle,1=deepen,2=resolve,3=done
  var demoTimer = 0;
  var demoTarget = 0.5;    // desired sliderPos
  var demoMoveSpeed = 0.001;

  // Bot state
  var botTarget = 0.5;
  var botApproaching = true;
  var botSettled = false;
  var botSettledTimer = 0;

  // Session best for demo score
  var demoScore = null;

  try { var stored = +localStorage.getItem('tm_best'); if (stored > 0) best = stored; } catch (_) {}

  // ---- helpers ----
  function sliderToFreq(pos) {
    return FREQ_MIN + pos * (FREQ_MAX - FREQ_MIN);
  }
  function freqToCents(f, target) {
    return 1200 * Math.log2(f / target);
  }
  function absCents(pos) {
    return Math.abs(freqToCents(sliderToFreq(pos), TARGET_FREQ));
  }

  // Flash floating text
  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0, y: H / 2 - 60 });
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 530, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  var dragging = false;

  function pointerToSlider(clientX, clientY) {
    var r = cv.getBoundingClientRect();
    var lx = (clientX - r.left) / scale;
    var ly = (clientY - r.top)  / scale;
    return { lx: lx, ly: ly };
  }

  function startDrag(lx, ly) {
    if (DEMO || BOT) return;
    if (inR(MUTE_R, lx, ly) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (window.SHARE && inR(SHARE_R, lx, ly)) {
        SHARE.send({ score: Math.round(centsOff), unit: 'cents off' }); return;
      }
      startRun(); return;
    }
    if (phase === 'play') {
      // Check if touching slider area
      var sliderTop    = SLIDER_Y - SLIDER_H * 1.5;
      var sliderBottom = SLIDER_Y + SLIDER_H * 1.5;
      if (ly >= sliderTop && ly <= sliderBottom) {
        dragging = true;
        updateSliderFromX(lx);
      }
    }
  }

  function moveDrag(lx) {
    if (dragging && phase === 'play') updateSliderFromX(lx);
  }

  function endDrag() {
    if (dragging && phase === 'play') {
      dragging = false;
      commitResult();
    }
  }

  function updateSliderFromX(lx) {
    var p = Math.max(0, Math.min(1, (lx - SLIDER_LEFT) / SLIDER_W));
    sliderPos = p;
    playerFreq = sliderToFreq(p);
    centsOff = Math.abs(freqToCents(playerFreq, TARGET_FREQ));
  }

  function commitResult() {
    // Called when player lifts finger / bot settles
    var cents = absCents(sliderPos);
    centsOff = cents;

    // Juice feedback based on accuracy
    if (cents < 1) {
      // Near-perfect unison
      hitStop = 5; zoom = 1.04;
      if (window.J) J.calm(3);
      flash('PERFECT UNISON', TEAL, 40);
      if (window.LOOP) LOOP.emit('near_miss', { cents: +cents.toFixed(2) }); // reuse near_miss for "almost zero"
    } else if (cents < 5) {
      if (window.J) J.calm(2);
      flash('SO CLOSE', SOFT_BLUE, 34);
      shakeAmt = 1;
    } else if (cents < 15) {
      if (window.J) J.calm(1);
      flash(Math.round(cents) + ' cents', SOFT_LAVENDER, 28);
    } else {
      if (window.J) J.calm(0);
    }

    var newBest = cents < best;
    if (newBest) {
      best = cents;
      try { localStorage.setItem('tm_best', String(best)); } catch (_) {}
      if (cents < 10) { if (window.J) J.calm(3); }
    }

    if (DEMO) window.__demoScore = Math.round(cents * 10) / 10;

    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: Math.round(cents * 10) / 10, dur_s: +dur.toFixed(1) });
    if (window.LOOP) LOOP.emit('pitch_settled', { cents: +cents.toFixed(2), new_best: newBest });

    phase = 'over';
    overAt = performance.now();

    if (DEMO) {
      // After showing result briefly, go to CTA
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 600);
      }
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var p = pointerToSlider(e.clientX, e.clientY);
    startDrag(p.lx, p.ly);
  });
  window.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    var p = pointerToSlider(e.clientX, e.clientY);
    moveDrag(p.lx);
  });
  window.addEventListener('pointerup', function () { endDrag(); });
  window.addEventListener('pointercancel', function () { endDrag(); });

  // ---- game flow ----
  function startRun() {
    phase = 'play';
    runCount++;
    runStartTs = Date.now();
    dragging = false;
    // Randomize starting position slightly off center
    sliderPos = 0.3 + rng() * 0.4;
    playerFreq = sliderToFreq(sliderPos);
    centsOff = absCents(sliderPos);
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED, run: runCount });

    // Reset bot state
    if (BOT) {
      // Bot targets a position near perfect but with imperfection
      var err = (rng() - 0.5) * 0.12;   // ~±30 cents of error from perfect
      botTarget = 0.5 + err;             // 0.5 = perfect (440Hz)
      botApproaching = true;
      botSettled = false;
      botSettledTimer = 0;
    }

    // Reset demo state per-run if needed
    if (DEMO) {
      initDemoScript();
    }
  }

  function resetRun() {
    flashes = [];
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ---- demo arc ----
  // settle → deepen → resolve → done
  // ~16 seconds total calm journey
  var demoScript2 = [
    // [duration_frames, targetPos, speed, label]
    // stage 0 (settle): start far off, slowly approach
    { dur: 90, target: 0.72, speed: 0.003, label: 'settle' },
    // stage 1 (hunt): overshoot slightly, course correct
    { dur: 80, target: 0.44, speed: 0.004, label: 'hunt' },
    // stage 2 (close): near perfect, slow approach
    { dur: 120, target: 0.503, speed: 0.001, label: 'close' },
    // stage 3 (deepen): hold near perfect — let it breathe
    { dur: 100, target: 0.5015, speed: 0.0005, label: 'deepen' },
    // stage 4 (resolve): settle into near-perfect
    { dur: 60, target: 0.5, speed: 0.0003, label: 'resolve' }
  ];
  var demoStageIdx = 0;
  var demoStageTick = 0;
  var demoCommitted = false;

  function initDemoScript() {
    demoStageIdx = 0;
    demoStageTick = 0;
    demoCommitted = false;
    sliderPos = 0.8;  // start far off
    playerFreq = sliderToFreq(sliderPos);
    centsOff = absCents(sliderPos);
  }

  function demoPilot() {
    if (phase !== 'play' || demoCommitted) return;
    var stage = demoScript2[demoStageIdx];
    if (!stage) {
      // All stages done — commit
      demoCommitted = true;
      commitResult();
      return;
    }
    demoStageTick++;
    // Ease toward stage target
    var diff = stage.target - sliderPos;
    var move = Math.sign(diff) * Math.min(Math.abs(diff), stage.speed);
    sliderPos += move;
    sliderPos = Math.max(0, Math.min(1, sliderPos));
    playerFreq = sliderToFreq(sliderPos);
    centsOff = absCents(sliderPos);

    if (demoStageTick >= stage.dur) {
      demoStageIdx++;
      demoStageTick = 0;
    }
  }

  // ---- bot autopilot ----
  // Bot slowly approaches target, overshoots a bit, comes back, then settles
  var BOT_APPROACH_SPEED = 0.006;
  var botPhase2 = 'approach';  // approach | settle | done

  function botPilot() {
    if (phase !== 'play') return;

    if (botPhase2 === 'approach') {
      var diff = botTarget - sliderPos;
      if (Math.abs(diff) < 0.005) {
        botPhase2 = 'settle';
        botSettledTimer = 0;
      } else {
        sliderPos += Math.sign(diff) * Math.min(Math.abs(diff) * 0.08, BOT_APPROACH_SPEED);
        sliderPos = Math.max(0, Math.min(1, sliderPos));
        playerFreq = sliderToFreq(sliderPos);
        centsOff = absCents(sliderPos);
      }
    } else if (botPhase2 === 'settle') {
      botSettledTimer++;
      // After settling for a moment, commit
      if (botSettledTimer > 40) {
        botPhase2 = 'approach';  // reset for next run
        commitResult();
      }
    }
  }

  // ---- visual helpers ----
  // Draw the waveform visualization showing two tones
  function drawWaves(now) {
    var cy2 = H / 2 - 40;
    var waveW = 320, waveH = 80;
    var wx = (W - waveW) / 2;

    // Target wave (fixed A440)
    cx.save();
    cx.beginPath();
    var steps = 120;
    for (var i = 0; i <= steps; i++) {
      var x = wx + (i / steps) * waveW;
      var t2 = (i / steps) * 4 * Math.PI + now / 400;  // target phase
      var y2 = cy2 + Math.sin(t2) * 28;
      if (i === 0) cx.moveTo(x, y2); else cx.lineTo(x, y2);
    }
    cx.strokeStyle = TEAL;
    cx.lineWidth = 2;
    cx.globalAlpha = 0.7;
    cx.stroke();
    cx.restore();

    // Player wave (slightly different freq based on slider)
    // Beat frequency = |playerFreq - TARGET_FREQ|
    var beatHz = Math.abs(playerFreq - TARGET_FREQ);
    var beatPhase = now * beatHz * 0.00628;  // 2π * beatHz / 1000 * now_ms

    cx.save();
    cx.beginPath();
    for (var i2 = 0; i2 <= steps; i2++) {
      var x2 = wx + (i2 / steps) * waveW;
      var t3 = (i2 / steps) * 4 * Math.PI + now / 400 + beatPhase;
      var amp = 28 + Math.sin(beatPhase + i2 * 0.1) * 4;  // slight amplitude variation from beating
      var y3 = cy2 + Math.sin(t3) * amp;
      if (i2 === 0) cx.moveTo(x2, y3); else cx.lineTo(x2, y3);
    }
    // Color shifts from lavender (far) to teal (close to unison)
    var closeness = Math.max(0, 1 - centsOff / 60);
    cx.strokeStyle = closeness > 0.9 ? TEAL : SOFT_LAVENDER;
    cx.lineWidth = 2;
    cx.globalAlpha = 0.85;
    cx.stroke();
    cx.restore();

    // Glow ring at unison when very close
    if (centsOff < 5) {
      var glowAlpha = Math.max(0, (5 - centsOff) / 5) * 0.6;
      var glowR = 32 + (5 - centsOff) * 4;
      cx.save();
      var grad = cx.createRadialGradient(W / 2, cy2, 0, W / 2, cy2, glowR);
      grad.addColorStop(0, 'rgba(46,197,182,' + (glowAlpha * 0.9) + ')');
      grad.addColorStop(1, 'rgba(46,197,182,0)');
      cx.fillStyle = grad;
      cx.beginPath();
      cx.arc(W / 2, cy2, glowR, 0, Math.PI * 2);
      cx.fill();
      cx.restore();
    }
  }

  // Draw the pitch slider
  function drawSlider(now) {
    var sy = SLIDER_Y;
    var sl = SLIDER_LEFT, sr = SLIDER_RIGHT;
    var sw = SLIDER_W;

    // Track bg
    cx.save();
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(sl, sy - 6, sw, 12, 6);
    else cx.rect(sl, sy - 6, sw, 12);
    cx.fill();

    // Fill up to handle
    var fillW = sliderPos * sw;
    var closeness = Math.max(0, 1 - centsOff / 60);
    cx.fillStyle = closeness > 0.85 ? TEAL : SOFT_LAVENDER;
    cx.globalAlpha = 0.5 + closeness * 0.4;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(sl, sy - 6, fillW, 12, 6);
    else cx.rect(sl, sy - 6, fillW, 12);
    cx.fill();
    cx.globalAlpha = 1;

    // Center mark (target)
    cx.fillStyle = TEAL;
    cx.globalAlpha = 0.4;
    cx.fillRect(sl + sw / 2 - 1, sy - 14, 2, 28);
    cx.globalAlpha = 1;

    // Target label
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(46,197,182,0.5)';
    cx.font = '600 10px Menlo, monospace';
    cx.fillText('A4 440Hz', sl + sw / 2, sy - 18);

    // Handle
    var hx = sl + sliderPos * sw;
    var pulse = 1 + (centsOff < 5 ? 0.15 * Math.sin(now / 150) : 0);
    var hr = 18 * pulse;
    // Shadow
    cx.shadowColor = closeness > 0.85 ? TEAL : SOFT_LAVENDER;
    cx.shadowBlur = closeness > 0.85 ? 16 : 8;
    cx.fillStyle = '#fff';
    cx.beginPath();
    cx.arc(hx, sy, hr, 0, Math.PI * 2);
    cx.fill();
    cx.shadowBlur = 0;
    cx.shadowColor = 'transparent';

    // Freq label on handle
    cx.fillStyle = INK;
    cx.font = '700 9px Menlo, monospace';
    cx.textAlign = 'center';
    cx.fillText(Math.round(playerFreq), hx, sy + 3.5);

    cx.restore();

    // Cents readout below slider
    cx.textAlign = 'center';
    cx.font = '800 38px -apple-system, Helvetica, Arial';
    var centsColor = centsOff < 2 ? TEAL : centsOff < 10 ? SOFT_BLUE : 'rgba(255,255,255,0.75)';
    cx.fillStyle = centsColor;
    cx.fillText(centsOff < 0.5 ? '0.0¢' : Math.round(centsOff * 10) / 10 + '¢', W / 2, sy + 68);

    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '500 12px -apple-system, Helvetica, Arial';
    cx.fillText('cents from unison', W / 2, sy + 88);
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Autopilots
    if (hitStop > 0) { hitStop -= dt; }
    else {
      if (DEMO && phase === 'play') demoPilot();
      if (BOT  && phase === 'play') botPilot();
    }

    // Juice decay
    if (shakeAmt > 0.1) shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // Transform wrap
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx2 = (Math.random() - 0.5) * shakeAmt;
      var sy2 = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx2, H / 2 + sy2);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(110,198,245,0.04)');
    bg.addColorStop(1, 'rgba(180,142,247,0.06)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // ---- title ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 40px -apple-system, Helvetica, Arial';
      cx.fillText('TUNING MATCH', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '500 15px -apple-system, Helvetica, Arial';
      cx.fillText('drag until the tones become one', W / 2, 298);
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO BEGIN', W / 2, 350);
      cx.globalAlpha = 1;
      if (best < Infinity) {
        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.font = '500 12px -apple-system, Helvetica, Arial';
        cx.fillText('best  ' + Math.round(best * 10) / 10 + '¢', W / 2, 390);
      }
    }

    // ---- play ----
    if (phase === 'play') {
      drawWaves(now);
      drawSlider(now);

      // Instruction hint
      if (!dragging && runCount <= 2) {
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.font = '500 12px -apple-system, Helvetica, Arial';
        cx.fillText('drag the slider · release to lock in', W / 2, SLIDER_Y + 110);
      }

      // Personal best badge
      if (best < Infinity) {
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.25)';
        cx.font = '500 11px Menlo, monospace';
        cx.fillText('PB  ' + Math.round(best * 10) / 10 + '¢', W / 2, 70);
      }
    }

    // ---- over ----
    if (phase === 'over') {
      // Keep wave/slider visible
      drawWaves(now);
      drawSlider(now);

      cx.fillStyle = 'rgba(11,13,18,0.55)';
      cx.fillRect(0, 0, W, H);

      cx.textAlign = 'center';
      var resultLabel = centsOff < 1 ? 'PERFECT.' : centsOff < 5 ? 'SO CLOSE.' : centsOff < 15 ? 'ALMOST.' : 'KEEP TUNING.';
      cx.fillStyle = centsOff < 5 ? TEAL : 'rgba(255,255,255,0.9)';
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText(resultLabel, W / 2, 290);

      cx.fillStyle = '#fff';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(Math.round(centsOff * 10) / 10 + '¢', W / 2, 355);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('cents from perfect unison', W / 2, 382);

      if (best < Infinity) {
        cx.fillStyle = GOLD;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('PB  ' + Math.round(best * 10) / 10 + '¢', W / 2, 414);
      }

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 300);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO TRY AGAIN', W / 2, 462);
        cx.globalAlpha = 1;

        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.12)';
        cx.strokeStyle = GOLD;
        cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText('⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- demo CTA card ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.5);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 38px -apple-system, Helvetica, Arial';
      cx.fillText('TUNING MATCH', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.6)';
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('can you reach zero?', W / 2, 326);
      var score2 = window.__demoScore != null ? window.__demoScore : (demoScore != null ? demoScore : '—');
      cx.fillStyle = TEAL;
      cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 398);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 430);
      cx.globalAlpha = 1;
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, fl.y - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // ---- mute toggle ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // Init
  if (BOT || DEMO) {
    startRun();
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
