<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;
  var BOT_MAX_LEVELS = 3;  // bot solves this many levels then triggers game over

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var TEAL2 = '#26a99c', SOFT = '#d4f0ed';

  // ---- game constants ----
  var FRAME_W = 160, FRAME_H = 210;         // picture frame size
  var FRAME_CX = W / 2, FRAME_CY = H / 2 - 30; // frame center
  var BUBBLE_R = 10;                         // spirit level bubble radius
  var TUBE_W = 160, TUBE_H = 26;            // spirit level tube
  var TUBE_CY = FRAME_CY + FRAME_H / 2 + 60; // level position
  var HOLD_MS = 1800;                        // hold-still duration to click
  var PERFECT_DEG = 0.8;                     // within this = perfect click
  var DEAD_ZONE = 0.5;                       // degrees — center snap zone

  // ---- state ----
  var phase = 'title'; // title | play | clicking | settled | over | cta
  var angle = 0;       // current frame tilt in degrees (game world)
  var targetAngle = 0; // level target (0 = straight)
  var holdTimer = 0;   // ms holding level
  var score = 0;       // levels completed
  var runStartTs = 0;
  var flashes = [];
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var ctaAt = 0, overAt = 0;

  // drag state (human)
  var dragging = false, dragStartY = 0, dragStartAngle = 0;

  // bot state
  var botRunsDone = 0;
  var botPhase = 'approach'; // approach | hold
  var botHoldCount = 0;
  var botLevels = 0;        // levels bot has solved

  // demo state
  var demoStep = 0;
  var demoScript = [];  // filled at start
  var demoT = 0;        // time in current demo step (ms)
  var demoPuzzles = 0;  // puzzles completed in demo

  // best
  var best = 0;
  try { best = +localStorage.getItem('li_best') || 0; } catch (_) {}

  // ---- puzzle generation ----
  function newPuzzle() {
    // start tilted 6-22 deg, alternating left/right
    var mag = 6 + rng() * 16;
    var sign = rng() > 0.5 ? 1 : -1;
    angle = mag * sign;
    targetAngle = 0;
    holdTimer = 0;
    phase = 'play';
  }

  function newGame() {
    score = 0; flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    botLevels = 0; botPhase = 'approach'; botHoldCount = 0;
    demoStep = 0; demoT = 0; demoPuzzles = 0;
    if (DEMO) {
      buildDemoScript();
      phase = 'play';
      // demo starts with first puzzle already set
      angle = demoScript[0].startAngle;
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    if (BOT) {
      newPuzzle();
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    phase = 'title';
  }

  // ---- demo scripting ----
  // Calm arc: settle → deepen → resolve → soft invitation
  // 3 puzzles: easy, moderate, perfect
  function buildDemoScript() {
    demoScript = [
      { startAngle: 12, targetRate: 0.018, hesitate: 900, perfect: false },
      { startAngle: -18, targetRate: 0.022, hesitate: 700, perfect: true },
      { startAngle: 9, targetRate: 0.015, hesitate: 400, perfect: true }
    ];
    angle = demoScript[0].startAngle;
  }

  // ---- level completion ----
  function levelComplete(isPerfect) {
    var step = score + 1;
    if (window.J) J.calm(step);
    if (isPerfect) {
      hitStop = 50; zoom = 1.025;
      flash('PERFECT', TEAL, 42);
      if (window.LOOP) LOOP.emit('perfect_level', { n: step });
    } else {
      flash('LEVEL!', SOFT, 36);
    }
    score++;
    if (score > best) {
      best = score;
      try { localStorage.setItem('li_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) LOOP.emit('level_complete', { n: score, perfect: isPerfect });

    // in demo, advance to next puzzle or end
    if (DEMO) {
      demoPuzzles++;
      if (demoPuzzles >= demoScript.length) {
        // demo complete — show CTA
        window.__demoScore = score;
        setTimeout(function () { phase = 'cta'; ctaAt = performance.now();
          setTimeout(function () { window.__demoDone = true; }, 3600); }, 1200);
        phase = 'settled';
        return;
      }
      // next puzzle
      setTimeout(function () {
        angle = demoScript[demoPuzzles].startAngle;
        holdTimer = 0;
        phase = 'play';
        demoStep = 0;
        demoT = 0;
      }, 1400);
      phase = 'settled';
      return;
    }

    // bot: check if done with levels
    if (BOT) {
      botLevels++;
      if (botLevels >= BOT_MAX_LEVELS) {
        // enough levels solved — call game over directly
        phase = 'settled';
        setTimeout(function () { gameOver(); }, 700);
        return;
      } else {
        botPhase = 'approach';
        botHoldCount = 0;
      }
    }

    phase = 'settled';
    setTimeout(function () {
      if (!DEMO) {
        newPuzzle();
      }
    }, BOT ? 600 : 1200);
  }

  function gameOver() {
    if (phase === 'over') return; // guard double-call
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 6;
    if (window.J) J.calm(0);  // calm close
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () {
          score = 0; botLevels = 0; botPhase = 'approach'; botHoldCount = 0;
          if (window.LOOP) LOOP.emit('restart', {});
          newPuzzle();
          runStartTs = Date.now();
          if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
        }, 800);
      }
    }
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 540, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function onPointerDown(ex, ey) {
    if (DEMO || BOT) return;
    if (inR(MUTE_R, ex, ey) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startHuman(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (inR(SHARE_R, ex, ey) && window.SHARE) {
        SHARE.send({ score: score, unit: 'leveled' }); return;
      }
      score = 0; flashes = [];
      if (window.LOOP) LOOP.emit('restart', {});
      newPuzzle();
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    if (phase === 'play') {
      dragging = true;
      dragStartY = ey;
      dragStartAngle = angle;
    }
  }

  function onPointerMove(ex, ey) {
    if (DEMO || BOT || !dragging || phase !== 'play') return;
    var dy = ey - dragStartY;
    // drag up = rotate counter-clockwise; drag down = clockwise
    angle = dragStartAngle + dy * 0.35;
    // clamp to -45..45
    angle = Math.max(-45, Math.min(45, angle));
  }

  function onPointerUp() {
    dragging = false;
  }

  function startHuman() {
    newPuzzle();
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    onPointerDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    var r = cv.getBoundingClientRect();
    onPointerMove((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerUp);

  // ---- autopilots ----
  var demoAngleVel = 0;  // smooth demo rotation

  function botAutopilot(dt) {
    if (phase !== 'play') return;
    var err = 0 - angle; // error from level
    if (Math.abs(err) < 0.4 && botPhase === 'approach') {
      botPhase = 'hold';
      botHoldCount = 0;
    }
    if (botPhase === 'hold') {
      // very gentle wiggle — stays within DEAD_ZONE so hold timer fills
      var wiggle = (rng() - 0.5) * 0.04;
      angle += wiggle * dt * 0.5;
      // also gently pull back to center to prevent drift
      angle *= (1 - 0.01 * dt);
    } else {
      // approach: move toward center with slight imperfection
      var speed = 0.04 + rng() * 0.02;
      angle += err * speed * dt;
    }
  }

  function demoAutopilot(dt) {
    if (phase !== 'play' && phase !== 'settled') return;
    if (phase !== 'play') return;
    var script = demoScript[demoPuzzles];
    if (!script) return;
    demoT += dt * 16.667;
    // smoothly move toward 0
    var err = 0 - angle;
    var rate = script.targetRate;
    // hesitate at start
    if (demoT < script.hesitate) {
      // small drift, barely moving
      angle += (rng() - 0.5) * 0.04 * dt;
      return;
    }
    // after hesitate, home in
    angle += err * rate * dt;
  }

  // ---- hold check ----
  function updateHold(dt) {
    if (phase !== 'play') return;
    var levelMs = dt * 16.667;
    if (Math.abs(angle) < DEAD_ZONE) {
      holdTimer += levelMs;
      if (holdTimer >= HOLD_MS) {
        var isPerfect = Math.abs(angle) < PERFECT_DEG * 0.5;
        levelComplete(isPerfect);
      }
    } else {
      // decay hold timer
      holdTimer = Math.max(0, holdTimer - levelMs * 0.5);
    }

  }

  // ---- flash ----
  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- draw helpers ----
  function drawFrame(cx, ang, settled) {
    // ang in degrees
    var rad = ang * Math.PI / 180;
    cx.save();
    cx.translate(FRAME_CX, FRAME_CY);
    cx.rotate(rad);

    // shadow
    cx.shadowColor = 'rgba(0,0,0,0.45)';
    cx.shadowBlur = 18;
    cx.shadowOffsetX = 4;
    cx.shadowOffsetY = 6;

    // frame outer
    var fw = FRAME_W, fh = FRAME_H, brd = 14;
    cx.fillStyle = settled ? '#c8a96e' : '#a07848';
    cx.fillRect(-fw/2 - brd, -fh/2 - brd, fw + brd*2, fh + brd*2);

    // frame inner bevel
    cx.fillStyle = settled ? '#b8934a' : '#8a6230';
    cx.fillRect(-fw/2 - brd + 4, -fh/2 - brd + 4, fw + (brd-4)*2, fh + (brd-4)*2);

    cx.shadowColor = 'transparent'; cx.shadowBlur = 0; cx.shadowOffsetX = 0; cx.shadowOffsetY = 0;

    // artwork (abstract calm art inside)
    cx.save();
    cx.beginPath();
    cx.rect(-fw/2, -fh/2, fw, fh);
    cx.clip();

    // sky gradient background
    var bg = cx.createLinearGradient(0, -fh/2, 0, fh/2);
    bg.addColorStop(0, '#c9e8f5');
    bg.addColorStop(1, '#e8f2d8');
    cx.fillStyle = bg;
    cx.fillRect(-fw/2, -fh/2, fw, fh);

    // simple minimal scene: horizon line + calm shape
    cx.fillStyle = '#8fbf8a';
    cx.fillRect(-fw/2, fh/2 - 70, fw, 70);

    // tree or simple shape
    cx.fillStyle = '#5a8c5a';
    cx.beginPath();
    cx.arc(20, fh/2 - 80, 28, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#4a7c4a';
    cx.fillRect(16, fh/2 - 52, 8, 30);

    // sun
    cx.fillStyle = '#f5d87a';
    cx.beginPath();
    cx.arc(-40, -fh/2 + 38, 18, 0, Math.PI * 2);
    cx.fill();

    cx.restore();

    // nail at top
    cx.fillStyle = '#888';
    cx.beginPath();
    cx.arc(0, -fh/2 - brd + 4, 4, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#aaa';
    cx.beginPath();
    cx.arc(0, -fh/2 - brd + 4, 2, 0, Math.PI * 2);
    cx.fill();

    cx.restore();
  }

  function drawLevel(ang, holdFrac) {
    // spirit level tube centered below frame
    var tx = W / 2, ty = TUBE_CY;
    var tw = TUBE_W, th = TUBE_H;

    // tube background
    cx.save();
    cx.beginPath();
    cx.roundRect ? cx.roundRect(tx - tw/2, ty - th/2, tw, th, th/2) : cx.rect(tx - tw/2, ty - th/2, tw, th);
    cx.fillStyle = '#1a2230';
    cx.fill();
    cx.strokeStyle = '#3a4a5a';
    cx.lineWidth = 1.5;
    cx.stroke();

    // center marker lines
    cx.strokeStyle = 'rgba(46,197,182,0.5)';
    cx.lineWidth = 1;
    cx.setLineDash([2, 2]);
    cx.beginPath();
    cx.moveTo(tx, ty - th/2 + 3);
    cx.lineTo(tx, ty + th/2 - 3);
    cx.stroke();
    cx.setLineDash([]);

    // bubble position: maps angle to horizontal offset
    // ±DEAD_ZONE degrees = center zone; ±20 deg = edge of tube
    var maxOff = tw/2 - BUBBLE_R - 4;
    var bubbleX = tx + Math.max(-maxOff, Math.min(maxOff, (ang / 20) * maxOff));

    // hold fill glow behind bubble
    if (holdFrac > 0) {
      cx.save();
      cx.beginPath();
      cx.roundRect ? cx.roundRect(tx - tw/2 + 2, ty - th/2 + 2, tw - 4, th - 4, th/2 - 2) : cx.rect(tx - tw/2 + 2, ty - th/2 + 2, tw - 4, th - 4);
      cx.clip();
      var fillW = (tw - 4) * holdFrac;
      var fillX = tx - (tw - 4)/2;
      var fillGrad = cx.createLinearGradient(fillX, 0, fillX + fillW, 0);
      fillGrad.addColorStop(0, 'rgba(46,197,182,0.08)');
      fillGrad.addColorStop(1, 'rgba(46,197,182,0.22)');
      cx.fillStyle = fillGrad;
      cx.fillRect(fillX, ty - th/2 + 2, fillW, th - 4);
      cx.restore();
    }

    // bubble
    var isLevel = Math.abs(ang) < DEAD_ZONE;
    var bubbleColor = isLevel
      ? (holdFrac > 0 ? TEAL : '#7fe8e0')
      : 'rgba(200,180,120,0.9)';
    cx.beginPath();
    cx.arc(bubbleX, ty, BUBBLE_R, 0, Math.PI * 2);
    var bg2 = cx.createRadialGradient(bubbleX - 3, ty - 3, 1, bubbleX, ty, BUBBLE_R);
    bg2.addColorStop(0, isLevel ? '#a0f0e8' : '#e8d8a0');
    bg2.addColorStop(1, bubbleColor);
    cx.fillStyle = bg2;
    cx.fill();
    cx.strokeStyle = isLevel ? TEAL : '#c8a060';
    cx.lineWidth = 1.5;
    cx.stroke();

    // hold ring around bubble
    if (holdFrac > 0 && isLevel) {
      cx.beginPath();
      cx.arc(bubbleX, ty, BUBBLE_R + 4 + holdFrac * 3, 0, Math.PI * 2 * holdFrac);
      cx.strokeStyle = TEAL;
      cx.lineWidth = 2;
      cx.globalAlpha = 0.7;
      cx.stroke();
      cx.globalAlpha = 1;
    }

    // label
    cx.textAlign = 'center';
    cx.font = '600 10px Menlo, monospace';
    cx.fillStyle = 'rgba(200,220,220,0.5)';
    cx.fillText('LEVEL', tx, ty + th/2 + 14);

    cx.restore();
  }

  function drawHint(now) {
    // Faint arrow or gesture hint on title / first puzzle
    cx.textAlign = 'center';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillStyle = 'rgba(46,197,182,0.7)';
    var pulse = 0.5 + 0.5 * Math.sin(now / 500);
    cx.globalAlpha = pulse * 0.85;
    cx.fillText('drag to straighten', W / 2, TUBE_CY + TUBE_H / 2 + 40);
    cx.globalAlpha = 1;
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop decay
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      // autopilots only run when not frozen
      if (DEMO) demoAutopilot(dt);
      else if (BOT) botAutopilot(dt);
    }

    // hold check (even in demo/bot)
    updateHold(dt);

    // juice decay
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // draw
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W/2 + sx, H/2 + sy); cx.scale(zoom, zoom); cx.translate(-W/2, -H/2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(46,197,182,0.01)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    var settled = phase === 'settled' || phase === 'cta';
    var holdFrac = Math.min(1, holdTimer / HOLD_MS);

    if (phase !== 'title') {
      drawFrame(cx, angle, settled);
      drawLevel(angle, holdFrac);
    }

    // score display (during play/settled/over)
    if (phase === 'play' || phase === 'settled' || phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.88)';
      cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 90);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 112);
    }

    // hint on first puzzle (human only)
    if (!DEMO && !BOT && phase === 'play' && score === 0) {
      drawHint(now);
    }

    // title screen
    if (phase === 'title') {
      // show a crooked frame as teaser
      drawFrame(cx, 11, false);
      // minimal level tube showing off-center
      drawLevel(11, 0);

      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('LEVEL IT', W / 2, 140);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('straighten the picture', W / 2, 172);
      var pulse = 0.55 + 0.45 * Math.sin(now / 380);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO BEGIN', W / 2, 635);
      cx.globalAlpha = 1;
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '800 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, FRAME_CY - FRAME_H / 2 - 40 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // game over
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('SETTLED.', W / 2, 310);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' leveled', W / 2, 354);
      cx.fillStyle = GOLD; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 390);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 300);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE', W / 2, 436);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.12)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // settled flash overlay
    if (phase === 'settled') {
      cx.fillStyle = 'rgba(46,197,182,0.07)'; cx.fillRect(0, 0, W, H);
    }

    // demo CTA
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.0);
      cx.fillStyle = 'rgba(11,13,18,' + (0.72 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('LEVEL IT', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.70)'; cx.font = '500 18px -apple-system, Helvetica, Arial';
      cx.fillText('straighten your world', W / 2, 335);
      var p3 = 0.75 + 0.25 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ LEVEL YOURS', W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
