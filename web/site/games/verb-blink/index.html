<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;

  }
  var rng = mulberry32(SEED);

  // canvas / DPR
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';

  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- Verbs ----
  var VERBS = [
    { id: 'TAP',        label: 'TAP',        gesture: 'tap' },
    { id: 'HOLD',       label: 'HOLD',       gesture: 'hold' },
    { id: 'SWIPE UP',   label: 'SWIPE UP',   gesture: 'swipe' },
    { id: "DON'T MOVE", label: "DON'T MOVE", gesture: 'none' },
    { id: 'DOUBLE-TAP', label: 'DOUBLE-TAP', gesture: 'double' },
  ];

  // ---- State ----
  var phase, score, combo, overAt, runStartTs;
  var currentVerb, verbTimer, verbWindow, verbTotalWindow;
  var flashes = [], dareBeaten = false;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var ctaAt = 0, challengeAt = 0;
  var verbSpeed;               // how fast the window shrinks per score level

  // none-verb state

  // double-tap state
  var lastTapTs = 0, doubleTapDone = false;

  function pctTop(s) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 10)))); }

  // ---- Game bootstrap ----
  function newGame() {
    score = 0; combo = 0; flashes = []; dareBeaten = false;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    holdActive = false; noneViolated = false; doubleTapDone = false; swipeTracking = false;

  }

  function startRun() {
    phase = 'play';
    score = 0; combo = 0; runStartTs = Date.now();
    verbSpeed = 1.0;  // starts at 1x, grows with score

  }

  function nextVerb() {
    // pick random verb (seeded)
    currentVerb = VERBS[Math.floor(rng() * VERBS.length)];
    // window shrinks as score climbs: 2000ms → min 700ms
    verbTotalWindow = Math.max(700, 2000 - score * 55);
    verbWindow = verbTotalWindow;
    holdActive = false;
    holdStartTs = 0;
    noneViolated = false;
    doubleTapDone = false;
    swipeTracking = false;
    if (window.LOOP) LOOP.emit('verb_shown', { verb: currentVerb.id, n: score });
  }

  function succeed() {
    if (phase !== 'play') return;
    combo++;
    score++;
    var near = verbWindow < verbTotalWindow * 0.15;  // used last 15%
    if (near) {
      if (window.J) J.near();
      shakeAmt = 3;
      flash('SO CLOSE!', VERM, 38);
      if (window.LOOP) LOOP.emit('near_miss', { n: score - 1 });
    } else if (combo >= 5) {
      if (window.J) J.perfect(combo);
      hitStop = 5; zoom = 1.03;
      flash('PERFECT ×' + combo, TEAL, 42);
    } else {
      if (window.J) J.hit(combo);
      flash('+1', TEAL, 36);
    }
    if (window.J) J.tension(Math.min(score / 25, 1));

    // dare beaten?
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN!', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }
    nextVerb();
  }

  function fail() {
    if (phase !== 'play') return;
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (window.J) {
      J.death(Math.min(0.3 + score / 25, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = score;
    if (newBest) { best = score; try { localStorage.setItem('vb_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { restartRun(); }, 900);
    }
  }

  function restartRun() {
    combo = 0; score = 0; flashes = [];
    holdActive = false; noneViolated = false; doubleTapDone = false; swipeTracking = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- Input handling ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function onTap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'verbs' }); return;
      }
      restartRun(); return;
    }
    if (phase !== 'play') return;

    var now = Date.now();
    var g = currentVerb.gesture;

    if (g === 'tap') { succeed(); return; }
    if (g === 'double') {
      var diff = now - lastTapTs;
      if (diff < 350) { doubleTapDone = true; succeed(); return; }
      lastTapTs = now;
      return;
    }
    if (g === 'hold' || g === 'none' || g === 'swipe') {
      // wrong gesture on hold/none/swipe = fail
      if (g === 'none') { noneViolated = true; fail(); return; }
      if (g === 'hold') { holdActive = true; holdStartTs = now; return; }
      // swipe: touch start
    }
  }

  function onPointerUp(x, y) {
    if (DEMO || BOT) return;
    if (phase !== 'play') return;
    var g = currentVerb.gesture;
    if (g === 'hold' && holdActive) {
      var held = Date.now() - holdStartTs;
      if (held >= holdRequired) { succeed(); }
      else { fail(); }
      holdActive = false;
      return;
    }
    if (g === 'swipe' && swipeTracking) {
      // if no succeed happened via move threshold, it's a short tap = fail
      // (handled in move)
    }
  }

  function onPointerMove(x, y, startY) {
    if (DEMO || BOT) return;
    if (phase !== 'play') return;
    if (currentVerb.gesture === 'swipe') {
      if (!swipeTracking) { swipeTracking = true; swipeStartY = startY; return; }
      var dy = swipeStartY - y;  // positive = upward
      if (dy >= swipeThreshold) { succeed(); swipeTracking = false; }
    }
  }

  // pointer events wired with drag tracking
  var pointerDownY = 0;
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale;
    var y = (e.clientY - r.top)  / scale;

  window.addEventListener('pointerup', function (e) {

    var y = (e.clientY - r.top)  / scale;

    if (!swipeTracking) return;

    var x = (e.clientX - r.left) / scale;
    var y = (e.clientY - r.top)  / scale;
    onPointerMove(x, y, pointerDownY);

  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') onTap();
    if (e.code === 'ArrowUp' && phase === 'play' && !DEMO && !BOT && currentVerb && currentVerb.gesture === 'swipe') succeed();
  });

  // ---- Bot / Demo autopilot ----
  var botRunsDone = 0;
  // demo script: sequence of outcomes — success/success/success/near-miss/success/fail
  // The "beat" indices tell the demo what to do at each step
  var demoActions = ['hit','hit','hit','near','hit','fail'];
  var demoIdx = 0;
  // demoWaits: how many frames to wait before acting (varied for human feel)
  var demoWaits = [55, 38, 48, 70, 35, 30];
  var demoFrameCount = 0;
  var demoActed = false;

  function autopilot() {
    if (phase !== 'play') return;
    if (DEMO) {
      demoFrameCount++;
      if (demoActed) return;
      var wait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)];
      if (demoFrameCount < wait) return;
      var action = demoActions[Math.min(demoIdx, demoActions.length - 1)];
      demoActed = true;
      if (action === 'fail') {
        fail();
      } else if (action === 'near') {
        // force the timer to be almost expired to get near-miss sound
        verbWindow = verbTotalWindow * 0.10;
        succeed();
      } else {
        succeed();
      }
      demoIdx++;
      demoFrameCount = 0;
      demoActed = false;

      demoFrameCount++;

      var maxWait = Math.floor(verbTotalWindow / 16.667 * 0.85);

        // bot fails occasionally for natural runs
        if (rng() < 0.18) { fail(); }
        else { succeed(); }
        demoFrameCount = 0;
      }
    }
  }

  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

        hitStop -= dt;

          if (currentVerb.gesture === 'none') {
            succeed();
          } else if (currentVerb.gesture === 'hold' && holdActive) {
            // held long enough — succeed
            succeed(); holdActive = false;

            fail();
          }

          autopilot();
        }

      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---------- TITLE ----------
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';

      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillText('TAP TO START', W / 2, 334);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('do exactly what it says', W / 2, 366);

    // ---------- CHALLENGE CARD (demo beat 1) ----------
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';

      cx.fillText("today's top run", W / 2, 432);

    // ---------- PLAY ----------
    if (phase === 'play') {
      // score
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 72px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 100);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 124);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — by ' + SHARE.by : ''), W / 2, 148);
      }

      // timer arc (background ring)
      var fraction = Math.max(0, verbWindow / verbTotalWindow);
      var r2 = 110;
      cx.save();
      cx.translate(W / 2, H / 2 + 20);
      // bg ring
      cx.beginPath(); cx.arc(0, 0, r2, 0, Math.PI * 2);
      cx.strokeStyle = 'rgba(255,255,255,0.07)'; cx.lineWidth = 8; cx.stroke();
      // active arc
      var arcColor = fraction > 0.35 ? TEAL : VERM;
      cx.beginPath();
      cx.arc(0, 0, r2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * fraction);
      cx.strokeStyle = arcColor; cx.lineWidth = 8;
      cx.lineCap = 'round'; cx.stroke();
      cx.restore();

      // combo glow ring
      if (combo >= 3) {
        var gSize = Math.min(combo * 0.04, 0.3);
        cx.save();
        cx.translate(W / 2, H / 2 + 20);
        cx.shadowColor = GOLD;
        cx.shadowBlur = 20 + combo * 4;
        cx.beginPath(); cx.arc(0, 0, r2 + 10, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(242,177,52,' + Math.min(combo * 0.12, 0.7) + ')';
        cx.lineWidth = 4 + combo; cx.stroke();
        cx.restore();
      }

      // verb label (big, center of ring)
      var vSize = currentVerb.label.length > 9 ? 44 : 56;
      cx.save();
      cx.translate(W / 2, H / 2 + 20);
      // pulse with urgency when time is low
      var urgency = fraction < 0.3 ? (1 + (1 - fraction / 0.3) * 0.06 * Math.sin(now / 60)) : 1;
      cx.scale(urgency, urgency);
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillStyle = '#fff';
      cx.font = '900 ' + vSize + 'px -apple-system, Helvetica, Arial';
      cx.fillText(currentVerb.label, 0, 0);
      cx.textBaseline = 'alphabetic';
      cx.restore();

      // hold progress indicator
      if (currentVerb.gesture === 'hold' && holdActive) {
        var hProg = Math.min((Date.now() - holdStartTs) / holdRequired, 1);
        cx.save();
        cx.translate(W / 2, H / 2 + 20);
        cx.beginPath();
        cx.arc(0, 0, r2 - 22, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * hProg);
        cx.strokeStyle = GOLD; cx.lineWidth = 5; cx.lineCap = 'round'; cx.stroke();
        cx.restore();
      }
    }

    // ---------- GAME OVER ----------
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG MOVE.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' verbs', W / 2, 344);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 388);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 412);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 454);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) { cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); }
        else { cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h); }
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---------- DEMO CTA CARD ----------
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('VERB BLINK', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 6) + '. your move.', W / 2, 344);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 6), W / 2, 412);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 446);
      cx.globalAlpha = 1;
    }

    // ---------- FLOATING FLASHES ----------
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 42);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.45) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // ---------- MUTE TOGGLE (human only) ----------
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
