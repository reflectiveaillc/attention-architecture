    iconIdx = iconOrder[roundIdx % iconOrder.length];

    answered = false;
    answerCorrect = false;
    /* build 3 choices: correct + 2 wrong (seeded) */
    var icon = ICONS[iconIdx];
    var wrongPool = [];
    for (var i = 0; i < ICONS.length; i++) {
      if (i !== iconIdx) wrongPool.push(ICONS[i].name);

    /* also use icon's own alts first */
    var alts = icon.alts.slice();
    /* shuffle alts */
    for (var j = alts.length - 1; j > 0; j--) {
      var ki = Math.floor(rng() * (j + 1));
      var t2 = alts[j]; alts[j] = alts[ki]; alts[ki] = t2;

    var w1 = alts[0] || wrongPool[0];
    var w2 = alts[1] || wrongPool[1];
    choices = [icon.name, w1, w2];

    for (var m = choices.length - 1; m > 0; m--) {
      var ni = Math.floor(rng() * (m + 1));
      var tc = choices[m]; choices[m] = choices[ni]; choices[ni] = tc;

    correctChoice = choices.indexOf(icon.name);
    roundTs = performance.now();
    if (window.J) J.tension(roundIdx / ICONS_PER_ROUND);

    if (window.J) {
      J.death(0.4);
      if (score > best) setTimeout(function () { J.fanfare(); }, 450);
    }
    shakeAmt = 7;
    if (score > best) {
      best = score;
      try { localStorage.setItem('nn_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
  }

  function resetRun() {
    flashes = []; shakeAmt = 0; zoom = 1; hitStop = 0; roundIdx = 0; score = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRound();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  /* ── input ── */
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { runStartTs = Date.now(); startRound(); return; }
    if (phase === 'play' && !answered) {
      for (var i = 0; i < BTNS.length; i++) {
        if (x !== undefined && inR(BTNS[i], x, y)) { doAnswer(i); return; }
      }
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'pts' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Digit1') tap(BTNS[0].x + 1, BTNS[0].y + 1);
    if (e.code === 'Digit2') tap(BTNS[1].x + 1, BTNS[1].y + 1);
    if (e.code === 'Digit3') tap(BTNS[2].x + 1, BTNS[2].y + 1);
    if (e.code === 'Space') tap();
  });

  /* ── demo / bot autopilots ── */
  /* demo script: which choice + at which blur stage to tap */
  var demoScript = [
    { stage: 1, correct: true  },   /* early correct – high score */
    { stage: 0, correct: true  },   /* PERFECT – very early */
    { stage: 2, correct: true  },   /* medium early */
    { stage: 3, correct: false },   /* WRONG – near-fail tension */
    { stage: 1, correct: true  },   /* recovery */
    { stage: 2, correct: true  },   /* holding on */
    { stage: 4, correct: false },   /* another wrong – real fail */
    { stage: 4, correct: true  },   /* last round scrapes by */
  ];
  var demoStep = 0;
  /* hesitation waits (frames) before answering */
  var demoWaits = [52, 18, 38, 60, 28, 44, 55, 70];

  var botRunsDone = 0;

  function autopilot() {
    if (phase !== 'play' || answered) return;
    if (DEMO) {
      var step = demoScript[Math.min(demoStep, demoScript.length - 1)];
      /* wait until blur has revealed enough to match the target stage */
      if (stageIdx < step.stage) return;
      /* also add hesitation based on demoWaits (approximate frame count via blur decay) */
      var wait = demoWaits[Math.min(demoStep, demoWaits.length - 1)];
      /* translate frame wait to blur delta (REVEAL_SPEED * 60fps ≈ 0.36/s) */
      var blurThreshold = Math.max(0.01, STAGES[Math.min(step.stage, STAGES.length-1)].blur - wait * REVEAL_SPEED);
      if (blurAmt > blurThreshold) return;
      /* pick answer */
      var choice;
      if (step.correct) {
        choice = correctChoice;
      } else {
        /* pick a wrong answer */
        choice = (correctChoice + 1 + Math.floor(rng() * 2)) % 3;
      }
      demoStep++;
      doAnswer(choice);
    } else if (BOT) {
      /* bot: randomly chooses correct ~70% of time, but waits to a random blur stage */
      var targetStage = Math.min(Math.floor(rng() * 5), 4);
      if (stageIdx < targetStage) return;
      var correct = rng() < 0.65;
      var botChoice = correct ? correctChoice : ((correctChoice + 1) % 3);
      doAnswer(botChoice);
    }
  }

  /* ── blur renderer ── */
  /* Renders the icon to an offscreen canvas, applies a pixelation/blur trick */
  var offCv = document.createElement('canvas');
  offCv.width = 180; offCv.height = 180;
  var offCx = offCv.getContext('2d');

  function renderIcon(iconI, blur) {
    /* draw at low res for pixelation effect */
    var px = Math.max(2, Math.round(blur * 36));  /* pixel size for pixelation */
    var small = Math.max(6, Math.round(180 / px));
    /* render icon full size to temp */
    offCx.clearRect(0, 0, 180, 180);
    offCx.save();
    offCx.translate(90, 90);
    ICONS[iconI].draw(offCx);
    offCx.restore();

    if (blur > 0.05) {
      /* pixelate: draw small, scale back up */
      var tmp = document.createElement('canvas');
      tmp.width = small; tmp.height = small;
      var tc = tmp.getContext('2d');
      tc.imageSmoothingEnabled = false;
      tc.drawImage(offCv, 0, 0, small, small);

      cx.imageSmoothingEnabled = false;
      cx.drawImage(tmp, W/2 - 90, 240 - 90, 180, 180);
      cx.imageSmoothingEnabled = true;
    } else {
      cx.drawImage(offCv, W/2 - 90, 240 - 90);
    }
  }

  /* ── draw buttons ── */
  function drawButtons(highlight, wrongHighlight) {
    for (var i = 0; i < BTNS.length; i++) {
      var b = BTNS[i];
      var isCorrect = (i === correctChoice);
      var bg, border, textCol;
      if (answered) {
        if (isCorrect) { bg = 'rgba(46,197,182,0.25)'; border = TEAL; textCol = TEAL; }
        else if (i === wrongHighlight) { bg = 'rgba(232,80,46,0.25)'; border = VERM; textCol = VERM; }
        else { bg = 'rgba(255,255,255,0.04)'; border = 'rgba(255,255,255,0.15)'; textCol = 'rgba(255,255,255,0.3)'; }
      } else if (highlight === i) {
        bg = 'rgba(242,177,52,0.2)'; border = GOLD; textCol = GOLD;
      } else {
        bg = 'rgba(255,255,255,0.06)'; border = 'rgba(255,255,255,0.25)'; textCol = '#fff';
      }
      cx.fillStyle = bg;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(b.x, b.y, b.w, b.h, 12);
      else cx.rect(b.x, b.y, b.w, b.h);
      cx.fill();
      cx.strokeStyle = border; cx.lineWidth = 1.5;
      cx.stroke();
      cx.fillStyle = textCol;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText(choices[i], b.x + b.w / 2, b.y + b.h / 2 + 7);
    }
  }

  /* ── main loop ── */
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    /* update blur */
    if (phase === 'play' && !answered) {
      blurAmt = Math.max(0, blurAmt - REVEAL_SPEED * dt);
      /* advance stage based on blur */
      for (var s = STAGES.length - 1; s >= 0; s--) {
        if (blurAmt <= STAGES[s].blur) { stageIdx = s; break; }
      }
      /* if fully revealed and unanswered, auto-miss */
      if (blurAmt <= 0 && !answered) {
        doAnswer(-1); /* wrong – no match */
      }
      /* run autopilot (if needed) */
      if (hitStop > 0) { hitStop -= dt; } else { autopilot(); }
    } else {
      if (hitStop > 0) hitStop -= dt;
    }

    /* juice: shake + zoom decay */
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W/2 + sx, H/2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W/2, -H/2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    /* bg */
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    /* ── TITLE phase ── */
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('NOSTALGIA', W/2, 280);
      cx.fillStyle = GOLD; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('NAME', W/2, 328);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('name it before it reveals', W/2, 366);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.fillStyle = VERM; cx.globalAlpha = pulse;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W/2, 420);
      cx.globalAlpha = 1;
    }

    /* ── CHALLENGE card (demo beat 1) ── */
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('2400', W/2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's high score", W/2, 432);
    }

    /* ── PLAY phase ── */
    if (phase === 'play') {
      /* score top */
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W/2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + (roundIdx + 1) + ' / ' + ICONS_PER_ROUND, W/2, 108);

      /* dare banner */
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '700 13px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W/2, 130);
      }

      /* points available indicator */
      var curStage = STAGES[Math.min(stageIdx, STAGES.length - 1)];
      cx.fillStyle = stageIdx <= 1 ? GOLD : (stageIdx <= 2 ? TEAL : 'rgba(255,255,255,0.4)');
      cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText(curStage.label + ' available', W/2, 155);

      /* blur reveal bar */
      var barW = 260, barH = 6;
      var barX = W/2 - barW/2, barY = 170;
      cx.fillStyle = 'rgba(255,255,255,0.1)';
      cx.fillRect(barX, barY, barW, barH);
      cx.fillStyle = stageIdx <= 1 ? GOLD : TEAL;
      cx.fillRect(barX, barY, barW * blurAmt, barH);

      /* icon area */
      var iconX = W/2, iconY = 285;
      /* background card */
      cx.fillStyle = 'rgba(255,255,255,0.07)';
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(iconX - 100, iconY - 100, 200, 200, 16);
      else cx.rect(iconX - 100, iconY - 100, 200, 200);
      cx.fill();

      renderIcon(iconIdx, blurAmt);

      /* choices */
      drawButtons(-1, answered && !answerCorrect ? choices.indexOf(choices.find(function(_, i){ return i !== correctChoice && answered; })) : -1);
    }

    /* ── OVER phase ── */
    if (phase === 'over') {
      /* draw last icon fading */
      cx.globalAlpha = 0.3;
      renderIcon(iconIdx, 0);
      cx.globalAlpha = 1;

      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('GAME OVER', W/2, 280);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' pts', W/2, 328);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W/2, 370);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W/2, 394);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — PLAY AGAIN', W/2, 444);
        cx.globalAlpha = 1;
        /* share pill */
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          (window.SHARE && SHARE.dare !== null && dareBeaten) ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W/2, SHARE_R.y + 30
        );
      }
    }

    /* ── CTA card (demo beat 6) ── */
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('NOSTALGIA', W/2, 286);
      cx.fillStyle = GOLD; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('NAME', W/2, 334);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('can you beat ' + (window.__demoScore || 2400) + '?', W/2, 374);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 2400), W/2, 424);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 454);
      cx.globalAlpha = 1;
    }

    /* ── floating flashes ── */
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 210 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 44) flashes.splice(k, 1);
    }

    /* ── mute toggle (human only) ── */
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  /* ── bot runner ── */
  function runBot() {
    if (botRunsDone >= BOT_RUNS) { window.__botDone = true; return; }
    /* reset RNG and state for each run */
    rng = mulberry32(SEED + botRunsDone * 13);
    buildOrder();
    score = 0; roundIdx = 0; flashes = [];
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED + botRunsDone * 13 });
    doNextBotRound();
  }

  function doNextBotRound() {
    if (roundIdx >= ICONS_PER_ROUND) {
      /* game over for this bot run */
      var dur = (Date.now() - runStartTs) / 1000;
      if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        if (window.LOOP) LOOP.emit('restart', {});
        setTimeout(runBot, 200);
      }
      return;
    }
    iconIdx = iconOrder[roundIdx % iconOrder.length];
    stageIdx = 0;
    blurAmt = STAGES[0].blur;
    answered = false;
    answerCorrect = false;
    var icon = ICONS[iconIdx];
    var alts = icon.alts.slice();
    choices = [icon.name, alts[0] || 'Unknown', alts[1] || 'Other'];
    /* shuffle */
    for (var m = choices.length - 1; m > 0; m--) {
      var ni = Math.floor(rng() * (m + 1));
      var tc = choices[m]; choices[m] = choices[ni]; choices[ni] = tc;
    }
    correctChoice = choices.indexOf(icon.name);
    roundTs = performance.now();

    /* bot picks answer after a random blur stage */
    var targetStage = Math.min(Math.floor(rng() * 5), 4);
    var correct = rng() < 0.65;
    var botChoice = correct ? correctChoice : ((correctChoice + 1) % 3);
    /* simulate time passing for blur to reach targetStage */
    var targetBlur = STAGES[targetStage].blur;
    var framesNeeded = Math.ceil((STAGES[0].blur - targetBlur) / REVEAL_SPEED);
    var delay = Math.max(80, framesNeeded * 16);
    setTimeout(function () {
      /* update state to simulate reveal */
      blurAmt = targetBlur;
      stageIdx = targetStage;
      /* actually answer */
      answered = true;
      answerCorrect = (botChoice === correctChoice);
      var pts = answerCorrect ? STAGES[Math.min(stageIdx, STAGES.length - 1)].pts : 0;
      score += pts;
      roundIdx++;
      if (window.LOOP) LOOP.emit(answerCorrect ? 'answer_correct' : 'answer_wrong', { pts: pts, round: roundIdx });
      setTimeout(doNextBotRound, 100);
    }, delay);
  }

  /* ── start ── */
  if (BOT) {
    newGame();
    /* run bot entirely via its own loop, not autopilot() in frame() */
    runBot();
  } else {
    newGame();
  }
  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
