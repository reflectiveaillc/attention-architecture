<script>
(function () {
  'use strict';

  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  var DOT_COLORS = [
    '#e8502e', // vermillion

    '#f2b134', // gold

    '#f97316', // orange
  ];

  // Dot positions (6 dots arranged in 2 rows of 3)
  var DOTS = [];
  (function () {
    var cols = 3, rows = 2;

    var startY = 280;
    var padY = 130;
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        DOTS.push({
          x: padX + dotR + c * (dotR * 2 + padX),

  // best chain stored locally

    var last2 = state.chain.length > 1 ? state.chain[state.chain.length - 2] : -1;

    var idx = state.showIdx;

      // light up the dot
      var dotIdx = state.chain[idx];
      dotPulse[dotIdx] = 1.0;
      if (window.J) J.hit(idx + 1);
      state.showIdx++;
      // next step: off period then next dot (or switch to input)
      state.showTimer = SHOW_ON + SHOW_OFF;
    } else {
      // finished showing — player's turn
      state.phase = 'input';
      state.input = [];
    }
  }

  function handleTap(dotIdx) {
    if (state.phase !== 'input') return;
    var expected = state.chain[state.input.length];
    state.input.push(dotIdx);
    dotPulse[dotIdx] = 0.85;

    if (dotIdx !== expected) {
      // WRONG
      state.wrongDot = dotIdx;
      state.wrongTimer = 30;
      shakeAmt = 7;
      if (window.J) J.death(Math.min(0.2 + state.chain.length / 14, 1));
      gameOver();
      return;
    }

    // correct
    if (state.input.length === state.chain.length) {
      // completed chain!
      state.score = state.chain.length;
      state.combo++;
      var isPerfect = state.score % 5 === 0;
      hitStop = isPerfect ? 4 : 2;
      zoom = isPerfect ? 1.04 : 1.02;
      if (window.J) {
        if (isPerfect) { J.perfect(state.combo); J.gold(); }
        else J.hit(state.combo);
        J.tension(Math.min(state.score / 12, 1));

      var txt = isPerfect ? 'PERFECT' : '+' + state.score;
      var col = isPerfect ? GOLD : TEAL;
      flash(txt, col, isPerfect ? 46 : 36);

    if (DEMO || BOT) return;

  // Demo script: actions to take when it's input phase

  var demoScript = [

    { chains: 1, action: 'correct' },

    { chains: 2, action: 'correct' },
    // chain 3 (len 3): correct

    // chain 4 (len 4): correct
    { chains: 4, action: 'correct' },

  var demoBaseWait = 22; // baseline between taps

    var extra = 0;
    if (script && script.hesitate && demoInputStep === state.chain.length - 1) {
      // last dot in chain 6 — big hesitation (near-fail read)
      extra = 40;

    return demoBaseWait + Math.floor(rng() * 12) + extra;
  }

  function autopilot() {
    if (state.phase === 'over' || state.phase === 'cta' || state.phase === 'challenge') return;

    if (DEMO) {
      if (state.phase !== 'input') return;
      if (demoWait > 0) { demoWait--; return; }

      var script = demoScript[Math.min(demoStep, demoScript.length - 1)];
      if (!script) return;

      var chainLen = state.chain.length;
      var isLastInput = demoInputStep === chainLen - 1;

      // which dot to tap
      var dotToTap;
      if (script.action === 'wrong_last' && isLastInput) {
        // pick a wrong dot
        var correct = state.chain[demoInputStep];
        var wrongs = [];
        for (var i = 0; i < DOTS.length; i++) { if (i !== correct) wrongs.push(i); }

      } else {
        dotToTap = state.chain[demoInputStep];
      }

      handleTap(dotToTap);

      if (demoInputStep >= chainLen || script.action === 'wrong_last' && isLastInput) {
        // done with this chain's input pass
        demoStep++;
        demoInputStep = 0;
        demoHesitated = false;
        demoWait = demoBaseWait + 8;

        demoWait = demoWaitForInput();

      if (state.phase !== 'input') return;

      var correct2 = state.chain[state.input.length];

      var dot;
      if (err) {
        var pool = [];
        for (var j = 0; j < DOTS.length; j++) { if (j !== correct2) pool.push(j); }
        dot = pool[Math.floor(rng() * pool.length)];
      } else {
        dot = correct2;

      handleTap(dot);
      demoWait = 14 + Math.floor(rng() * 16);

  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // decay dot pulses

      state.wrongTimer -= dt;
      if (state.wrongTimer <= 0) state.wrongDot = -1;

        cx.font = '800 14px -apple-system, Helvetica, Arial';

      }
    }

    // ---- GAME OVER ----
    if (state.phase === 'over') {
      drawDots(now, false); // show the dots behind overlay
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG!', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText('chain of ' + state.score, W / 2, 338);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 382);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 406);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 452);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- CTA CARD (demo) ----
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('COLOR CHAIN', W / 2, 296);
      cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 7) + '. beat it.', W / 2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 7), W / 2, 406);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;

    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 220 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // score (during play — shown above)
    // mute toggle
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawDots(now, staticMode) {
    for (var i = 0; i < DOTS.length; i++) {
      var d = DOTS[i];
      var pulse = dotPulse[i];
      var isWrong = (i === state.wrongDot && state.wrongTimer > 0);
      var baseCol = d.color;

      // glow ring for lit dot
      if (pulse > 0.05 || staticMode) {
        var glowAlpha = staticMode ? 0.18 : pulse * 0.6;
        var glowR = d.r + 12 + (staticMode ? 0 : pulse * 8);
        cx.beginPath();
        cx.arc(d.x, d.y, glowR, 0, Math.PI * 2);
        cx.fillStyle = isWrong ? 'rgba(232,80,46,0.3)' : hexAlpha(baseCol, glowAlpha);
        cx.fill();
      }

      // dot body
      cx.beginPath();
      cx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      if (isWrong) {
        cx.fillStyle = '#e8502e';
      } else if (pulse > 0.05) {
        // brighten
        var bright = 0.35 + pulse * 0.65;
        cx.fillStyle = hexAlpha(baseCol, bright + 0.35);
      } else if (staticMode) {
        cx.fillStyle = hexAlpha(baseCol, 0.25);
      } else {
        cx.fillStyle = hexAlpha(baseCol, 0.18);
      }
      cx.fill();

      // bright center when lit
      if (pulse > 0.1 && !staticMode) {
        cx.beginPath();
        cx.arc(d.x, d.y, d.r * 0.55, 0, Math.PI * 2);
        cx.fillStyle = hexAlpha('#ffffff', pulse * 0.55);
        cx.fill();
      }

      // border
      cx.beginPath();
      cx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      cx.strokeStyle = isWrong ? VERM : (pulse > 0.05 ? baseCol : hexAlpha(baseCol, 0.4));
      cx.lineWidth = pulse > 0.05 ? 3 : 1.5;
      cx.stroke();
    }
  }

  // draw small indicator pips above play area showing chain progress
  function drawChainDots(total, done) {
    var pipR = 5, gap = 12, totalW = total * (pipR * 2 + gap) - gap;
    var startX = W / 2 - totalW / 2;
    for (var i = 0; i < total; i++) {
      var px = startX + i * (pipR * 2 + gap) + pipR;
      cx.beginPath();
      cx.arc(px, 154, pipR, 0, Math.PI * 2);
      cx.fillStyle = i < done ? TEAL : 'rgba(255,255,255,0.2)';
      cx.fill();
    }
  }

  function hexAlpha(hex, alpha) {
    // convert hex color to rgba string
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(3) + ')';
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
