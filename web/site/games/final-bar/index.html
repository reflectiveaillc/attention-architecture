<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = Math.max(1, +qs.get('runs') || 3);
  var SEED = +qs.get('seed') || 42;

  // ---- deterministic RNG (mulberry32) ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  // ---- canvas / dpr ----
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // ---- palette ----
  var INK  = '#0b0d12';
  var TEAL = '#2ec5b6';
  var GOLD = '#f2b134';
  // calm game: no vermillion

  // ---- game constants ----
  var TOTAL_BARS    = 8;
  // Each bar has N beat slots. Player taps on the beat; early/late tracked.
  var BEATS_PER_BAR = 4;
  var TOTAL_BEATS   = TOTAL_BARS * BEATS_PER_BAR;  // 32

  // BPM = 72 (calm groove), one beat = ~833ms at 60fps
  var BPM           = 72;
  var BEAT_MS       = (60 / BPM) * 1000; // ~833ms
  var TAP_WINDOW    = BEAT_MS * 0.38;    // ±38% of beat for "on-time"

  // ---- state ----
  var phase;           // 'title' | 'play' | 'resolve' | 'over' | 'cta'
  var beatClock;       // ms elapsed since run start (tracks musical time)
  var currentBeat;     // 0-based beat index
  var tapResults;      // array of {beat, timing} — 'perfect','good','miss'
  var score;           // 0-100 based on accuracy
  var runStartTs;
  var hitStop, zoom, shakeAmt;
  var flashes;
  var resolveAt;       // timestamp when resolve phase started
  var ctaAt;
  var overAt;

  // particles for resolve bloom
  var particles;

  // progress ring pulse
  var ringPulse;

  // bot state
  var botRunsDone = 0;

  // ---- input rects ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };

  function inR(r, x, y) {
    return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
  }

  // ---- scoring helpers ----
  function scoreRun() {
    // tally results: perfect=3, good=1, miss=0
    var total = 0, perfect = 0, good = 0, miss = 0;
    for (var i = 0; i < tapResults.length; i++) {
      var r = tapResults[i];
      if (r === 'perfect') { total += 3; perfect++; }
      else if (r === 'good') { total += 1; good++; }
      else { miss++; }
    }
    // score 0-100
    var maxPts = TOTAL_BEATS * 3;
    var pct = Math.round((total / maxPts) * 100);
    return { score: pct, perfect: perfect, good: good, miss: miss };
  }

  // ---- flash text ----
  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size || 36, t: 0 });
  }

  // ---- particle bloom for resolve ----
  function spawnParticles() {
    particles = [];
    for (var i = 0; i < 28; i++) {
      var angle = (i / 28) * Math.PI * 2 + rng() * 0.3;
      var speed = 1.2 + rng() * 2.2;
      particles.push({
        x: W / 2,
        y: H / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 3 + rng() * 5,
        alpha: 1,
        hue: 170 + rng() * 40  // teal-to-gold range
      });
    }
  }

  // ---- game init ----
  function newGame() {
    phase      = 'title';
    beatClock  = 0;
    currentBeat = 0;
    tapResults = [];
    score      = 0;
    hitStop    = 0;
    zoom       = 1;
    shakeAmt   = 0;
    flashes    = [];
    particles  = [];
    ringPulse  = 0;
    resolveAt  = 0;
    ctaAt      = 0;
    overAt     = 0;

    if (DEMO) {
      startRun();
    } else if (BOT) {
      startRun();
    }
  }

  function startRun() {
    phase      = 'play';
    beatClock  = 0;
    currentBeat = 0;
    tapResults = [];
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- tap handler ----
  function registerTap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }

    if (phase === 'title') {
      startRun();
      return;
    }

    if (phase === 'over' && performance.now() - overAt > 350) {
      newGame();
      return;
    }

    if (phase !== 'play') return;

    doTap();
  }

  function doTap() {
    // Find the nearest beat to snap to
    var beatPos = beatClock % BEAT_MS;           // how far into current beat
    var nearestBeat = Math.round(beatClock / BEAT_MS); // which beat we're near
    nearestBeat = Math.max(0, Math.min(TOTAL_BEATS - 1, nearestBeat));

    // Only register if we haven't already tapped this beat
    if (tapResults[nearestBeat] !== undefined) {
      // Try next beat
      nearestBeat = Math.min(TOTAL_BEATS - 1, nearestBeat + 1);
      if (tapResults[nearestBeat] !== undefined) return;
    }

    var offset = Math.abs(beatClock - nearestBeat * BEAT_MS);
    var result;
    if (offset <= TAP_WINDOW * 0.4) {
      result = 'perfect';
      hitStop = 50;
      zoom = 1.018;
      flash('PERFECT', TEAL, 32);
      if (window.J) J.calm(3);
      if (window.LOOP) LOOP.emit('tap_perfect', { beat: nearestBeat });
    } else if (offset <= TAP_WINDOW) {
      result = 'good';
      flash('NICE', 'rgba(200,240,235,0.9)', 26);
      if (window.J) J.calm(2);
      if (window.LOOP) LOOP.emit('tap_good', { beat: nearestBeat });
    } else {
      result = 'miss';
      shakeAmt = 1.5;
      flash('EARLY', 'rgba(180,180,180,0.6)', 22);
      if (window.J) J.calm(1);
    }

    tapResults[nearestBeat] = result;
    ringPulse = 1;
  }

  // ---- end / resolve ----
  function finishRun() {
    if (phase !== 'play') return;

    // Fill any un-tapped beats as miss
    for (var i = 0; i < TOTAL_BEATS; i++) {
      if (tapResults[i] === undefined) tapResults[i] = 'miss';
    }

    var res = scoreRun();
    score = res.score;

    phase = 'resolve';
    resolveAt = performance.now();
    zoom = 1.04;
    shakeAmt = 0;

    spawnParticles();
    if (window.J) J.calm(5);

    window.__demoScore = score;

    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });

    // After resolve animation (~3.5s), go to over/cta
    setTimeout(function () {
      if (DEMO) {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      } else if (BOT) {
        botRunsDone++;
        if (botRunsDone >= BOT_RUNS) {
          window.__botDone = true;
        } else {
          newGame();
          startRun();
        }
      } else {
        phase = 'over';
        overAt = performance.now();
      }
    }, 3400);
  }

  // ---- autopilots ----
  // Demo script: tap timings per beat (offset from perfect, in ms)
  // Creates a human-feeling calm arc: settle → deepen → resolve
  var demoTapOffsets = [
    // Bar 1: slightly hesitant
    120, 80, -60, 200,
    // Bar 2: settling in
    -40, 100, 50, -30,
    // Bar 3: deepening, mostly on time
    -20, 30, -50, 60,
    // Bar 4: very good
    10, -15, 25, -10,
    // Bar 5: perfect flow
    -5, 8, -12, 5,
    // Bar 6: one slight stumble
    0, -8, 140, 10,
    // Bar 7: recovery, near-perfect
    -10, 5, -5, 10,
    // Bar 8: resolve — land beautifully on time
    0, 5, -8, 3
  ];

  var demoBeatFired = [];
  var demoBeatScheduled = false;

  function scheduleDemoTaps() {
    if (demoBeatScheduled) return;
    demoBeatScheduled = true;
    for (var b = 0; b < TOTAL_BEATS; b++) {
      (function (beat) {
        var offsetMs = demoTapOffsets[beat] || 0;
        var targetMs = beat * BEAT_MS + offsetMs + BEAT_MS * 0.1;
        setTimeout(function () {
          if (phase === 'play' && !demoBeatFired[beat]) {
            demoBeatFired[beat] = true;
            var offset = Math.abs(offsetMs);
            var result;
            if (offset <= TAP_WINDOW * 0.4) { result = 'perfect'; zoom = 1.018; if (window.J) J.calm(3); flash('PERFECT', TEAL, 30); }
            else if (offset <= TAP_WINDOW) { result = 'good'; if (window.J) J.calm(2); flash('NICE', 'rgba(200,240,235,0.9)', 24); }
            else { result = 'miss'; if (window.J) J.calm(1); }
            tapResults[beat] = result;
            ringPulse = 1;
          }
        }, targetMs);
      })(b);
    }
  }

  // Bot autopilot: imperfect random taps, some misses
  var botBeatFired = [];

  function scheduleBotTaps() {
    for (var b = 0; b < TOTAL_BEATS; b++) {
      (function (beat) {
        // Bot misses ~25% of beats, rest have random offset
        var willTap = rng() > 0.25;
        if (!willTap) return;
        var offsetMs = (rng() - 0.5) * BEAT_MS * 0.7;
        var targetMs = beat * BEAT_MS + offsetMs + BEAT_MS * 0.1;
        setTimeout(function () {
          if (phase === 'play' && !botBeatFired[beat]) {
            botBeatFired[beat] = true;
            var offset = Math.abs(offsetMs);
            var result;
            if (offset <= TAP_WINDOW * 0.4) { result = 'perfect'; }
            else if (offset <= TAP_WINDOW) { result = 'good'; }
            else { result = 'miss'; }
            tapResults[beat] = result;
            ringPulse = 1;
          }
        }, Math.max(50, targetMs));
      })(b);
    }
  }

  // ---- input events ----
  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    registerTap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') registerTap();
  });

  // ---- drawing helpers ----
  function drawRoundRect(x, y, w, h, r) {
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); }
    else {
      cx.moveTo(x + r, y);
      cx.lineTo(x + w - r, y);
      cx.quadraticCurveTo(x + w, y, x + w, y + r);
      cx.lineTo(x + w, y + h - r);
      cx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      cx.lineTo(x + r, y + h);
      cx.quadraticCurveTo(x, y + h, x, y + h - r);
      cx.lineTo(x, y + r);
      cx.quadraticCurveTo(x, y, x + r, y);
      cx.closePath();
    }
  }

  // ---- main loop ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3);
    last = now;

    // ---- advance game clock ----
    if (phase === 'play') {
      beatClock += dt * 16.667; // convert frames to ms

      // Schedule autopilots on first frame
      if (DEMO && !demoBeatScheduled) scheduleDemoTaps();
      if (BOT && botBeatFired.length === 0 && botBeatFired._scheduled !== true) {
        botBeatFired._scheduled = true;
        scheduleBotTaps();
      }

      // Check if all 8 bars have passed
      if (beatClock >= TOTAL_BEATS * BEAT_MS) {
        finishRun();
      }
    }

    // decay juice
    if (hitStop > 0) hitStop -= dt * 16.667; // ms
    shakeAmt *= Math.pow(0.88, dt);
    zoom += (1 - zoom) * 0.10 * dt;
    ringPulse *= Math.pow(0.90, dt);

    // ---- juice transform wrapper ----
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // ---- background ----
    cx.fillStyle = INK;
    cx.fillRect(-10, -10, W + 20, H + 20);

    // Soft ambient gradient, calm teal
    var bg = cx.createRadialGradient(W / 2, H / 2, 60, W / 2, H / 2, H * 0.8);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // ---- title screen ----
    if (phase === 'title') {
      drawTitle(now);
    }

    // ---- play screen ----
    if (phase === 'play') {
      drawPlay(now);
    }

    // ---- resolve screen ----
    if (phase === 'resolve') {
      drawResolve(now);
    }

    // ---- over screen (human only) ----
    if (phase === 'over') {
      drawOver(now);
    }

    // ---- demo CTA ----
    if (phase === 'cta') {
      drawCTA(now);
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 320 - fl.t * 1.2);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.globalAlpha = 0.45;
      cx.textAlign = 'center';
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- draw phases ----

  function drawTitle(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(46,197,182,0.18)';
    // soft halo
    var halo = cx.createRadialGradient(W/2, H/2-40, 0, W/2, H/2-40, 200);
    halo.addColorStop(0, 'rgba(46,197,182,0.12)');
    halo.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = halo;
    cx.fillRect(0, 0, W, H);

    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '300 18px -apple-system, Helvetica, Arial';
    cx.fillText('THE', W / 2, 260);

    cx.fillStyle = '#fff';
    cx.font = '700 56px -apple-system, Helvetica, Arial';
    cx.fillText('FINAL BAR', W / 2, 320);

    cx.fillStyle = 'rgba(46,197,182,0.85)';
    cx.font = '400 15px -apple-system, Helvetica, Arial';
    cx.fillText('8 bars. tap along. let it end.', W / 2, 358);

    // pulsing tap prompt
    var p = 0.55 + 0.45 * Math.sin(now / 700);
    cx.globalAlpha = p;
    cx.fillStyle = TEAL;
    cx.font = '600 20px -apple-system, Helvetica, Arial';
    cx.fillText('TAP TO BEGIN', W / 2, 430);
    cx.globalAlpha = 1;

    // soft note symbols
    drawNoteDecorations(now, 0.25);
  }

  function drawNoteDecorations(now, alpha) {
    var notePos = [
      { x: 90, y: 420, size: 18, freq: 1200 },
      { x: 315, y: 390, size: 14, freq: 900 },
      { x: 70, y: 280, size: 10, freq: 1500 },
      { x: 340, y: 500, size: 12, freq: 1100 }
    ];
    for (var i = 0; i < notePos.length; i++) {
      var n = notePos[i];
      var drift = Math.sin(now / n.freq + i) * 6;
      var a = alpha * (0.3 + 0.2 * Math.sin(now / 800 + i * 1.3));
      cx.globalAlpha = a;
      cx.fillStyle = TEAL;
      cx.font = n.size + 'px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText('♩', n.x, n.y + drift);
    }
    cx.globalAlpha = 1;
  }

  function drawPlay(now) {
    var barIdx  = Math.floor(beatClock / BEAT_MS / BEATS_PER_BAR);   // 0-7
    var beatIdx = Math.floor(beatClock / BEAT_MS);                    // 0-31
    var beatFrac = (beatClock % BEAT_MS) / BEAT_MS;                  // 0-1 within beat

    cx.textAlign = 'center';

    // ---- bar progress label ----
    var barLabel = Math.min(barIdx + 1, TOTAL_BARS);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '500 13px Menlo, monospace';
    cx.fillText('BAR ' + barLabel + ' / ' + TOTAL_BARS, W / 2, 55);

    // ---- big beat number in bar (1-4) ----
    var beatInBar = (beatIdx % BEATS_PER_BAR) + 1;
    var beatPulse = Math.pow(1 - beatFrac, 2);
    var bigSize = 80 + beatPulse * 12;
    cx.fillStyle = 'rgba(255,255,255,' + (0.06 + beatPulse * 0.08) + ')';
    cx.font = '200 ' + bigSize + 'px -apple-system, Helvetica, Arial';
    cx.fillText(beatInBar, W / 2, 160);

    // ---- 8-bar progress track ----
    drawBarTrack(barIdx, beatFrac, beatIdx, now);

    // ---- beat grid: 4 dots per row, 8 rows ----
    drawBeatGrid(beatIdx, beatFrac, now);

    // ---- tap zone hint at bottom ----
    drawTapHint(beatFrac, now);

    // ---- soft note ambience ----
    drawNoteDecorations(now, 0.15);
  }

  function drawBarTrack(barIdx, beatFrac, beatIdx, now) {
    var trackX = 40, trackY = 195, trackW = W - 80, barW = trackW / TOTAL_BARS;

    // Completed bars
    for (var b = 0; b < TOTAL_BARS; b++) {
      var bx = trackX + b * barW;
      var done = b < barIdx;
      var active = b === barIdx;

      if (done) {
        // Evaluate how well that bar was played
        var barScore = 0;
        for (var i = 0; i < BEATS_PER_BAR; i++) {
          var bi = b * BEATS_PER_BAR + i;
          if (tapResults[bi] === 'perfect') barScore += 2;
          else if (tapResults[bi] === 'good') barScore += 1;
        }
        var barAlpha = 0.4 + 0.5 * (barScore / (BEATS_PER_BAR * 2));
        cx.fillStyle = 'rgba(46,197,182,' + barAlpha + ')';
        cx.beginPath();
        drawRoundRect(bx + 2, trackY, barW - 4, 8, 4);
        cx.fill();
      } else if (active) {
        // Active bar: fill proportional to beat progress
        var barFrac = (beatIdx % BEATS_PER_BAR + beatFrac) / BEATS_PER_BAR;

        // Track background
        cx.fillStyle = 'rgba(46,197,182,0.12)';
        cx.beginPath();
        drawRoundRect(bx + 2, trackY, barW - 4, 8, 4);
        cx.fill();

        // Fill
        cx.fillStyle = 'rgba(46,197,182,0.7)';
        cx.beginPath();
        drawRoundRect(bx + 2, trackY, Math.max(4, (barW - 4) * barFrac), 8, 4);
        cx.fill();
      } else {
        // Future bar
        cx.fillStyle = 'rgba(255,255,255,0.06)';
        cx.beginPath();
        drawRoundRect(bx + 2, trackY, barW - 4, 8, 4);
        cx.fill();
      }
    }

    // Bar 8 glow hint
    if (barIdx === TOTAL_BARS - 1) {
      var glowP = 0.5 + 0.5 * Math.sin(now / 300);
      cx.shadowColor = GOLD;
      cx.shadowBlur = 12 * glowP;
      cx.fillStyle = 'rgba(242,177,52,0.25)';
      cx.beginPath();
      drawRoundRect(trackX + (TOTAL_BARS - 1) * barW + 2, trackY - 2, barW - 4, 12, 4);
      cx.fill();
      cx.shadowBlur = 0;
    }
  }

  function drawBeatGrid(beatIdx, beatFrac, now) {
    var gridX = 60, gridY = 250;
    var dotSpacing = (W - 120) / (BEATS_PER_BAR - 1);
    var rowSpacing = 52;

    for (var bar = 0; bar < TOTAL_BARS; bar++) {
      for (var b = 0; b < BEATS_PER_BAR; b++) {
        var bi = bar * BEATS_PER_BAR + b;
        var dx = gridX + b * dotSpacing;
        var dy = gridY + bar * rowSpacing;
        var result = tapResults[bi];
        var isCurrent = (bi === beatIdx);
        var isPast = (bi < beatIdx);

        var dotR = 8;

        if (result === 'perfect') {
          // Perfect: bright teal glow
          cx.shadowColor = TEAL;
          cx.shadowBlur = isCurrent ? 16 : 8;
          cx.fillStyle = TEAL;
          cx.beginPath();
          cx.arc(dx, dy, dotR, 0, Math.PI * 2);
          cx.fill();
          cx.shadowBlur = 0;
          // inner sparkle
          cx.fillStyle = 'rgba(255,255,255,0.9)';
          cx.beginPath();
          cx.arc(dx, dy, dotR * 0.35, 0, Math.PI * 2);
          cx.fill();
        } else if (result === 'good') {
          // Good: medium teal
          cx.fillStyle = 'rgba(46,197,182,0.55)';
          cx.beginPath();
          cx.arc(dx, dy, dotR, 0, Math.PI * 2);
          cx.fill();
        } else if (result === 'miss') {
          // Miss: dim
          cx.fillStyle = 'rgba(255,255,255,0.1)';
          cx.beginPath();
          cx.arc(dx, dy, dotR * 0.6, 0, Math.PI * 2);
          cx.fill();
        } else if (isCurrent) {
          // Current beat: pulsing ring
          var p = 1 - beatFrac;
          cx.strokeStyle = 'rgba(46,197,182,' + (0.5 + p * 0.5) + ')';
          cx.lineWidth = 2;
          cx.beginPath();
          cx.arc(dx, dy, dotR * (0.9 + p * 0.4), 0, Math.PI * 2);
          cx.stroke();
          cx.fillStyle = 'rgba(46,197,182,' + (0.15 + p * 0.15) + ')';
          cx.beginPath();
          cx.arc(dx, dy, dotR, 0, Math.PI * 2);
          cx.fill();
        } else if (isPast) {
          // Past, not tapped: faint miss
          cx.fillStyle = 'rgba(255,255,255,0.07)';
          cx.beginPath();
          cx.arc(dx, dy, dotR * 0.55, 0, Math.PI * 2);
          cx.fill();
        } else {
          // Future: ghosted
          cx.fillStyle = 'rgba(255,255,255,0.08)';
          cx.beginPath();
          cx.arc(dx, dy, dotR * 0.7, 0, Math.PI * 2);
          cx.fill();
        }
      }
    }
  }

  function drawTapHint(beatFrac, now) {
    // Large soft circle at bottom — visual tap affordance
    var cy2 = 676, cr = 44;
    var pulse = 0.5 + 0.5 * (1 - beatFrac) * (1 - beatFrac);
    var glowA = 0.08 + pulse * 0.12 + ringPulse * 0.18;

    cx.fillStyle = 'rgba(46,197,182,' + glowA + ')';
    cx.beginPath();
    cx.arc(W / 2, cy2, cr + ringPulse * 8, 0, Math.PI * 2);
    cx.fill();

    cx.strokeStyle = 'rgba(46,197,182,' + (0.25 + pulse * 0.4) + ')';
    cx.lineWidth = 1.5;
    cx.beginPath();
    cx.arc(W / 2, cy2, cr, 0, Math.PI * 2);
    cx.stroke();

    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(46,197,182,' + (0.5 + pulse * 0.4) + ')';
    cx.font = '600 14px -apple-system, Helvetica, Arial';
    cx.fillText('TAP', W / 2, cy2 + 5);
  }

  function drawResolve(now) {
    var t = (now - resolveAt) / 1000;  // seconds since resolve
    var fadeIn = Math.min(1, t * 1.5);

    // Fade to soft black
    var blackFade = Math.min(1, Math.max(0, (t - 1.2) / 1.8));
    cx.fillStyle = 'rgba(11,13,18,' + (blackFade * 0.72) + ')';
    cx.fillRect(0, 0, W, H);

    // Golden glow bloom
    var bloomR = 80 + t * 60;
    var bloom = cx.createRadialGradient(W/2, H/2, 0, W/2, H/2, bloomR);
    bloom.addColorStop(0, 'rgba(242,177,52,' + (0.18 * fadeIn * Math.max(0, 1 - t/3)) + ')');
    bloom.addColorStop(0.5, 'rgba(46,197,182,' + (0.1 * fadeIn) + ')');
    bloom.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bloom;
    cx.fillRect(0, 0, W, H);

    // Particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx * dt * 0.7;
      p.y += p.vy * dt * 0.7;
      p.alpha *= Math.pow(0.96, dt);
      if (p.alpha < 0.01) { particles.splice(i, 1); continue; }
      var pa = Math.min(fadeIn, p.alpha) * (1 - blackFade * 0.6);
      cx.globalAlpha = pa;
      var pg = cx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      pg.addColorStop(0, 'hsl(' + p.hue + ',70%,72%)');
      pg.addColorStop(1, 'rgba(11,13,18,0)');
      cx.fillStyle = pg;
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      cx.fill();
      cx.globalAlpha = 1;
    }

    // "The end" text fade-in, then fade-out
    var textAlpha = Math.min(1, t * 2) * Math.max(0, 1 - (t - 2.0) * 1.5);
    if (textAlpha > 0) {
      cx.globalAlpha = textAlpha;
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '300 36px -apple-system, Helvetica, Arial';
      cx.fillText('resolved.', W / 2, H / 2 - 10);
      cx.fillStyle = 'rgba(242,177,52,0.7)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('bar 8 of 8', W / 2, H / 2 + 22);
      cx.globalAlpha = 1;
    }
  }

  // dt is available in outer scope during frame — reuse for particle physics
  var dt = 1;

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.78)';
    cx.fillRect(0, 0, W, H);

    var res = { score: score };
    cx.textAlign = 'center';

    cx.fillStyle = 'rgba(46,197,182,0.65)';
    cx.font = '300 15px Menlo, monospace';
    cx.fillText('PHRASE COMPLETE', W / 2, 285);

    cx.fillStyle = '#fff';
    cx.font = '700 64px -apple-system, Helvetica, Arial';
    cx.fillText(score, W / 2, 360);

    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '400 14px -apple-system, Helvetica, Arial';
    cx.fillText('flow score', W / 2, 382);

    // Label based on score
    var label = score >= 90 ? 'IN THE FLOW' : score >= 70 ? 'FINDING IT' : score >= 50 ? 'ALMOST' : 'KEEP LISTENING';
    cx.fillStyle = TEAL;
    cx.font = '600 18px -apple-system, Helvetica, Arial';
    cx.fillText(label, W / 2, 420);

    // Tap to play again
    var p = 0.55 + 0.45 * Math.sin(now / 800);
    cx.globalAlpha = p;
    cx.fillStyle = 'rgba(46,197,182,0.8)';
    cx.font = '500 15px -apple-system, Helvetica, Arial';
    cx.fillText('tap to feel it again', W / 2, 480);
    cx.globalAlpha = 1;
  }

  function drawCTA(now) {
    var t = (now - ctaAt) / 1000;
    var ease = Math.min(1, t * 2.5);

    cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')';
    cx.fillRect(0, 0, W, H);

    // Soft teal halo
    var halo = cx.createRadialGradient(W/2, H/2-30, 0, W/2, H/2-30, 220);
    halo.addColorStop(0, 'rgba(46,197,182,' + (0.08 * ease) + ')');
    halo.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = halo;
    cx.fillRect(0, 0, W, H);

    cx.globalAlpha = ease;
    cx.textAlign = 'center';

    cx.fillStyle = 'rgba(255,255,255,0.9)';
    cx.font = '300 18px -apple-system, Helvetica, Arial';
    cx.fillText('THE', W / 2, 285);

    cx.fillStyle = '#fff';
    cx.font = '700 48px -apple-system, Helvetica, Arial';
    cx.fillText('FINAL BAR', W / 2, 338);

    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '400 16px -apple-system, Helvetica, Arial';
    cx.fillText('8 bars. one phrase. let it resolve.', W / 2, 372);

    // Pulsing CTA
    var p = 0.7 + 0.3 * Math.sin(now / 350);
    cx.fillStyle = TEAL;
    cx.globalAlpha = ease * p;
    cx.font = '600 22px -apple-system, Helvetica, Arial';
    cx.fillText('▶ REACH IT', W / 2, 438);
    cx.globalAlpha = ease;

    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '400 13px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 468);
    cx.globalAlpha = 1;
  }

  // ---- start ----
  newGame();

  // Patch dt access into drawResolve via frame closure
  var _frame = frame;
  frame = function (now) {
    var prevLast = last;
    dt = Math.min((now - prevLast) / 16.667, 3);
    _frame(now);
  };

  requestAnimationFrame(frame);
})();
</script>
</body>
