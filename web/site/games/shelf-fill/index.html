<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shelf Fill — Tilt</title>
<!--
  LOOP / attention-architecture — Shelf Fill
  Circuits: 06-zeigarnik (the incomplete set), 05-ease (thumb recognizes the gesture),
            08-investment (the shelf is yours, slowly owned).
  Modes:
    ?demo=1&seed=7   scripted calm arc ~16s → soft CTA → window.__demoDone
    ?bot=1&runs=N    imperfect autopilot, N runs → window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'shelf-fill';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var TEAL2 = '#26a89c';  // darker teal for shelf wood

  // --- shelf layout ---
  var COLS = 5, ROWS = 3, TOTAL = COLS * ROWS;   // 15 items
  var CELL_W = 54, CELL_H = 52;
  var SHELF_X = W / 2 - (COLS * CELL_W) / 2;     // left edge of shelf grid
  var SHELF_Y = 220;                               // top edge of first row

  // item shapes (icons drawn with canvas paths — no images)
  // shapes: 0=book, 1=plant, 2=candle, 3=vase, 4=frame, 5=mug, 6=crystal, 7=globe
  var SHAPE_COUNT = 8;

  // pastel-ish teal-to-gold palette
  var ITEM_COLORS = [
    '#2ec5b6','#f2b134','#6ec4b8','#f9c95c',
    '#4dd0c4','#e8a020','#88d8cf','#fad080'
  ];

  // floating item state
  var floatItem = null;   // { x, y, vx, vy, shape, color, slotIdx, phase }
  // slot idx: 0-14 in fill order

  // game state
  var phase;       // 'title' | 'play' | 'over' | 'cta'
  var filled;      // array of booleans length 15
  var nextSlot;    // next slot to fill
  var score;       // items placed
  var runStartTs;
  var shakeAmt = 0, zoom = 1, hitStop = 0;
  var flashes = [];
  var botRunsDone = 0;
  var ctaAt = 0;
  var overAt = 0;

  // items settled on shelf: [{slotIdx, shape, color, glow, glowT}]
  var shelvedItems = [];

  // MUTE toggle rect (human only)
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 550, w: 250, h: 46 };

  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function slotPos(idx) {
    var col = idx % COLS, row = Math.floor(idx / COLS);
    return {
      x: SHELF_X + col * CELL_W + CELL_W / 2,
      y: SHELF_Y + row * CELL_H + CELL_H / 2
    };
  }

  function spawnFloating() {
    if (nextSlot >= TOTAL) return;
    var shape = Math.floor(rng() * SHAPE_COUNT);
    var color = ITEM_COLORS[Math.floor(rng() * ITEM_COLORS.length)];
    // spawn at random position above shelf, drifting gently
    var startX = 60 + rng() * (W - 120);
    var startY = H * 0.75 + rng() * 60;  // lower half, feels "reachable"
    floatItem = {
      x: startX,
      y: startY,
      vx: (rng() - 0.5) * 0.4,
      vy: -0.3 - rng() * 0.3,
      shape: shape,
      color: color,
      slotIdx: nextSlot,
      landed: false
    };
  }

  function newGame() {
    phase = DEMO ? 'play' : (BOT ? 'play' : 'title');
    filled = new Array(TOTAL).fill(false);
    nextSlot = 0;
    score = 0;
    shakeAmt = 0; zoom = 1; hitStop = 0;
    flashes = [];
    shelvedItems = [];
    floatItem = null;
    if (phase === 'play') {
      runStartTs = Date.now();
      spawnFloating();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    }
  }

  function placeItem() {
    if (!floatItem || floatItem.landed) return;
    var idx = floatItem.slotIdx;
    var pos = slotPos(idx);

    // animate item snapping to shelf
    floatItem.landed = true;
    floatItem.targetX = pos.x;
    floatItem.targetY = pos.y;

    // settle
    setTimeout(function () {
      shelvedItems.push({
        slotIdx: idx,
        shape: floatItem.shape,
        color: floatItem.color,
        glow: 1.0,
        glowT: 0
      });
      filled[idx] = true;
      score++;
      nextSlot++;

      // juice
      hitStop = 3;
      zoom = 1.015;
      if (window.J) J.calm(score);
      flash('+' + score, TEAL, 30);

      if (window.LOOP) LOOP.emit('item_placed', { n: score, slot: idx });

      // check win
      if (score >= TOTAL) {
        // shelf is full — end the session
        setTimeout(function () {
          endGame();
        }, 600);
        floatItem = null;
      } else {
        floatItem = null;
        // spawn next item after a beat
        setTimeout(function () {
          if (phase === 'play') spawnFloating();
        }, 280);
      }
    }, 220);
  }

  function endGame() {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 0;
    zoom = 1.03;
    if (window.J) J.calm(score + 3);  // soft resolution tone
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetGame(); }, 800);
      }
    }
  }

  function resetGame() {
    if (window.LOOP) LOOP.emit('restart', {});
    newGame();
    phase = 'play';
    runStartTs = Date.now();
    spawnFloating();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- input ----
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') {
      phase = 'play';
      runStartTs = Date.now();
      spawnFloating();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    if (phase === 'play') {
      placeItem();
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 400) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'items' }); return;
      }
      resetGame();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'Enter') tap();
  });

  // ---- demo autopilot ----
  // calm arc: place items one by one, gentle hesitation between each
  // ~16 seconds total for 15 items
  var demoWaits = [
    70, 65, 80, 60, 90,   // first row: settle
    75, 70, 85, 65, 80,   // second row: deepen
    90, 75, 100, 80, 70   // third row: resolve
  ];
  var demoTick = 0, demoNextPlace = 0;

  // ---- bot autopilot ----
  var botTick = 0, botNextPlace = 0;

  function autopilot(now) {
    if (!floatItem || floatItem.landed || phase !== 'play') return;

    if (DEMO) {
      if (now < demoNextPlace) return;
      placeItem();
      var w = demoWaits[Math.min(score, demoWaits.length - 1)] || 70;
      demoNextPlace = now + w * 16.667;  // wait N frames at 60fps
    } else if (BOT) {
      if (now < botNextPlace) return;
      // bot places with small random delay (imperfect timing)
      var delay = 800 + rng() * 1200;
      botNextPlace = now + delay;
      placeItem();
    }
  }

  // ---- draw helpers ----
  function drawShelf() {
    // draw 3 shelf boards
    for (var row = 0; row < ROWS; row++) {
      var sy = SHELF_Y + row * CELL_H + CELL_H;
      // shelf board
      cx.fillStyle = TEAL2;
      cx.globalAlpha = 0.55;
      cx.fillRect(SHELF_X - 6, sy - 3, COLS * CELL_W + 12, 6);
      cx.globalAlpha = 1;

      // shelf shadow
      cx.fillStyle = 'rgba(0,0,0,0.25)';
      cx.fillRect(SHELF_X - 6, sy + 3, COLS * CELL_W + 12, 4);
    }

    // shelf back wall (subtle)
    cx.strokeStyle = 'rgba(46,197,182,0.12)';
    cx.lineWidth = 1;
    for (var c = 0; c <= COLS; c++) {
      cx.beginPath();
      cx.moveTo(SHELF_X + c * CELL_W, SHELF_Y);
      cx.lineTo(SHELF_X + c * CELL_W, SHELF_Y + ROWS * CELL_H);
      cx.stroke();
    }
  }

  function drawItem(x, y, shape, color, alpha) {
    cx.save();
    cx.globalAlpha = alpha !== undefined ? alpha : 1;
    cx.translate(x, y);
    cx.strokeStyle = color;
    cx.fillStyle = color;
    cx.lineWidth = 2;
    cx.lineCap = 'round';
    cx.lineJoin = 'round';

    var s = 18; // half-size
    switch (shape) {
      case 0: // book — rect with spine
        cx.fillStyle = color;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.9;
        cx.fillRect(-s * 0.7, -s, s * 1.4, s * 1.8);
        cx.fillStyle = 'rgba(0,0,0,0.2)';
        cx.fillRect(-s * 0.7, -s, 5, s * 1.8);
        cx.strokeStyle = 'rgba(255,255,255,0.3)';
        cx.lineWidth = 1;
        cx.strokeRect(-s * 0.7, -s, s * 1.4, s * 1.8);
        break;

      case 1: // plant in pot
        // pot
        cx.fillStyle = color;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1);
        cx.beginPath();
        cx.moveTo(-s * 0.7, s * 0.2);
        cx.lineTo(-s * 0.5, s * 0.8);
        cx.lineTo(s * 0.5, s * 0.8);
        cx.lineTo(s * 0.7, s * 0.2);
        cx.closePath();
        cx.fill();
        // stem
        cx.strokeStyle = 'rgba(255,255,255,0.6)';
        cx.lineWidth = 2;
        cx.beginPath();
        cx.moveTo(0, s * 0.2);
        cx.lineTo(0, -s * 0.4);
        cx.stroke();
        // leaves
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.beginPath();
        cx.ellipse(-s * 0.4, -s * 0.5, s * 0.4, s * 0.25, -0.5, 0, Math.PI * 2);
        cx.fill();
        cx.beginPath();
        cx.ellipse(s * 0.4, -s * 0.7, s * 0.35, s * 0.22, 0.5, 0, Math.PI * 2);
        cx.fill();
        break;

      case 2: // candle
        cx.fillStyle = color;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.9;
        cx.fillRect(-s * 0.35, -s * 0.6, s * 0.7, s * 1.4);
        // flame
        cx.fillStyle = GOLD;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1);
        cx.beginPath();
        cx.ellipse(0, -s * 0.8, s * 0.18, s * 0.3, 0, 0, Math.PI * 2);
        cx.fill();
        // wick
        cx.strokeStyle = 'rgba(0,0,0,0.5)';
        cx.lineWidth = 1.5;
        cx.beginPath();
        cx.moveTo(0, -s * 0.6);
        cx.lineTo(0, -s * 0.55);
        cx.stroke();
        break;

      case 3: // vase
        cx.fillStyle = color;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.88;
        cx.beginPath();
        cx.moveTo(0, -s);
        cx.bezierCurveTo(s * 0.8, -s * 0.5, s, s * 0.2, s * 0.5, s * 0.8);
        cx.lineTo(-s * 0.5, s * 0.8);
        cx.bezierCurveTo(-s, s * 0.2, -s * 0.8, -s * 0.5, 0, -s);
        cx.fill();
        cx.strokeStyle = 'rgba(255,255,255,0.25)';
        cx.lineWidth = 1;
        cx.stroke();
        break;

      case 4: // picture frame
        cx.strokeStyle = color;
        cx.lineWidth = 4;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1);
        cx.strokeRect(-s * 0.8, -s, s * 1.6, s * 1.8);
        cx.fillStyle = 'rgba(255,255,255,0.06)';
        cx.fillRect(-s * 0.8, -s, s * 1.6, s * 1.8);
        // inner mount
        cx.strokeStyle = 'rgba(255,255,255,0.2)';
        cx.lineWidth = 1;
        cx.strokeRect(-s * 0.5, -s * 0.7, s, s * 1.2);
        break;

      case 5: // mug
        cx.fillStyle = color;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.9;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(-s * 0.65, -s * 0.5, s * 1.1, s * 1.4, 4) :
          cx.rect(-s * 0.65, -s * 0.5, s * 1.1, s * 1.4);
        cx.fill();
        // handle
        cx.strokeStyle = color;
        cx.lineWidth = 3;
        cx.beginPath();
        cx.arc(s * 0.65, s * 0.2, s * 0.35, -Math.PI * 0.4, Math.PI * 0.4);
        cx.stroke();
        break;

      case 6: // crystal / gem
        cx.fillStyle = color;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.8;
        cx.beginPath();
        cx.moveTo(0, -s);
        cx.lineTo(s * 0.6, -s * 0.2);
        cx.lineTo(s * 0.4, s * 0.8);
        cx.lineTo(-s * 0.4, s * 0.8);
        cx.lineTo(-s * 0.6, -s * 0.2);
        cx.closePath();
        cx.fill();
        cx.strokeStyle = 'rgba(255,255,255,0.4)';
        cx.lineWidth = 1;
        cx.stroke();
        // inner facet
        cx.beginPath();
        cx.moveTo(0, -s * 0.3);
        cx.lineTo(s * 0.3, s * 0.4);
        cx.lineTo(-s * 0.3, s * 0.4);
        cx.closePath();
        cx.strokeStyle = 'rgba(255,255,255,0.25)';
        cx.stroke();
        break;

      case 7: // globe
        cx.fillStyle = 'transparent';
        cx.globalAlpha = (alpha !== undefined ? alpha : 1);
        cx.strokeStyle = color;
        cx.lineWidth = 2.5;
        cx.beginPath();
        cx.arc(0, -s * 0.1, s * 0.8, 0, Math.PI * 2);
        cx.stroke();
        // latitude lines
        cx.lineWidth = 1;
        cx.globalAlpha = (alpha !== undefined ? alpha : 1) * 0.4;
        cx.strokeStyle = color;
        cx.beginPath();
        cx.arc(0, -s * 0.1, s * 0.8, 0, Math.PI, true);  // equator half
        cx.stroke();
        cx.beginPath();
        cx.ellipse(0, -s * 0.1, s * 0.35, s * 0.8, 0, 0, Math.PI * 2);
        cx.stroke();
        // stand
        cx.globalAlpha = (alpha !== undefined ? alpha : 1);
        cx.lineWidth = 2.5;
        cx.strokeStyle = color;
        cx.beginPath();
        cx.moveTo(-s * 0.4, s * 0.7);
        cx.lineTo(s * 0.4, s * 0.7);
        cx.moveTo(0, s * 0.7);
        cx.lineTo(0, s * 0.7 - 4);
        cx.stroke();
        break;
    }
    cx.restore();
  }

  function drawSlotDots() {
    // draw empty slots as faint dotted outlines
    for (var i = 0; i < TOTAL; i++) {
      if (filled[i]) continue;
      var pos = slotPos(i);
      cx.save();
      cx.strokeStyle = 'rgba(46,197,182,0.15)';
      cx.lineWidth = 1;
      cx.setLineDash([3, 4]);
      cx.strokeRect(SHELF_X + (i % COLS) * CELL_W + 4,
                    SHELF_Y + Math.floor(i / COLS) * CELL_H + 4,
                    CELL_W - 8, CELL_H - 8);
      cx.restore();
    }
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // juice: decay
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.10 * dt;

    // update floating item drift
    if (floatItem && !floatItem.landed && phase === 'play') {
      // gentle bob
      floatItem.vy += Math.sin(now / 900 + floatItem.slotIdx) * 0.012;
      floatItem.x += floatItem.vx * dt;
      floatItem.y += floatItem.vy * dt;
      // bounce off sides softly
      if (floatItem.x < 40)  { floatItem.x = 40;  floatItem.vx = Math.abs(floatItem.vx) * 0.5; }
      if (floatItem.x > W-40){ floatItem.x = W-40; floatItem.vx = -Math.abs(floatItem.vx) * 0.5; }
      if (floatItem.y < H * 0.55) { floatItem.vy += 0.08; }  // gentle gravity pull back to lower half
      if (floatItem.y > H * 0.88) { floatItem.vy -= 0.1; }
      autopilot(now);
    }

    // snap-to animation: item moves toward shelf slot
    if (floatItem && floatItem.landed) {
      floatItem.x += (floatItem.targetX - floatItem.x) * 0.25 * dt;
      floatItem.y += (floatItem.targetY - floatItem.y) * 0.25 * dt;
    }

    // hitStop: freeze sim update but still render
    if (hitStop > 0) hitStop -= dt;

    // --- draw ---
    cx.save();
    // juice transforms
    if (shakeAmt > 0.3 || zoom > 1.002) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    // subtle gradient
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(46,197,182,0.01)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    if (phase === 'title') {
      // title screen
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('SHELF FILL', W / 2, 290);
      cx.fillStyle = 'rgba(46,197,182,0.85)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 360);
      cx.globalAlpha = pulse;
      cx.fillText('TAP TO PLACE', W / 2, 340);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText("fill the shelf. it's yours.", W / 2, 372);

      // draw a preview shelf
      cx.save();
      cx.translate(0, 80);
      drawShelf();
      // show a few items on shelf
      var previewColors = [ITEM_COLORS[0], ITEM_COLORS[1], ITEM_COLORS[4]];
      for (var pi = 0; pi < 3; pi++) {
        var ppos = slotPos(pi);
        drawItem(ppos.x, ppos.y, pi % SHAPE_COUNT, previewColors[pi], 0.65);
      }
      cx.restore();

      cx.restore();
      requestAnimationFrame(frame);
      return;
    }

    if (phase === 'play' || (phase === 'over')) {
      // draw shelf background panel
      cx.fillStyle = 'rgba(46,197,182,0.04)';
      cx.fillRect(SHELF_X - 10, SHELF_Y - 10, COLS * CELL_W + 20, ROWS * CELL_H + 20);

      drawShelf();
      drawSlotDots();

      // draw settled items
      for (var si = 0; si < shelvedItems.length; si++) {
        var item = shelvedItems[si];
        var spos = slotPos(item.slotIdx);
        // glow fade
        if (item.glow > 0) {
          cx.save();
          cx.shadowColor = item.color;
          cx.shadowBlur = 14 * item.glow;
          drawItem(spos.x, spos.y, item.shape, item.color);
          item.glow -= 0.02 * dt;
          if (item.glow < 0) item.glow = 0;
          cx.restore();
        } else {
          drawItem(spos.x, spos.y, item.shape, item.color);
        }
      }

      // draw floating item (if in flight)
      if (floatItem) {
        // glow indicator: point toward next empty slot
        var tpos = slotPos(floatItem.slotIdx);
        // draw a soft arrow/line from item to slot (hint)
        cx.save();
        cx.strokeStyle = 'rgba(46,197,182,0.18)';
        cx.lineWidth = 1;
        cx.setLineDash([4, 6]);
        cx.beginPath();
        cx.moveTo(floatItem.x, floatItem.y);
        cx.lineTo(tpos.x, tpos.y);
        cx.stroke();
        cx.restore();

        // glow around floating item
        cx.save();
        cx.shadowColor = floatItem.color;
        cx.shadowBlur = 12;
        drawItem(floatItem.x, floatItem.y, floatItem.shape, floatItem.color);
        cx.restore();
      }

      // shelf progress indicator
      var prog = score / TOTAL;
      cx.fillStyle = 'rgba(255,255,255,0.12)';
      cx.fillRect(SHELF_X, SHELF_Y + ROWS * CELL_H + 14, COLS * CELL_W, 3);
      cx.fillStyle = TEAL;
      cx.fillRect(SHELF_X, SHELF_Y + ROWS * CELL_H + 14, COLS * CELL_W * prog, 3);

      // score / item count
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' / ' + TOTAL + ' placed', W / 2, SHELF_Y - 22);

      // prompt to tap (human only, during play)
      if (phase === 'play' && floatItem && !floatItem.landed && !DEMO && !BOT) {
        var tapAlpha = 0.5 + 0.5 * Math.sin(now / 500);
        cx.globalAlpha = tapAlpha;
        cx.fillStyle = TEAL;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('tap to place →', W / 2, H - 80);
        cx.globalAlpha = 1;
      }
    }

    // game over / completion state
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.5)';
      cx.fillRect(0, 0, W, H);

      // shelf glow overlay (the shelf full at last)
      cx.save();
      cx.shadowColor = TEAL;
      cx.shadowBlur = 30;
      cx.strokeStyle = TEAL;
      cx.lineWidth = 2;
      cx.globalAlpha = 0.4;
      cx.strokeRect(SHELF_X - 10, SHELF_Y - 10, COLS * CELL_W + 20, ROWS * CELL_H + 20);
      cx.restore();

      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('COMPLETE.', W / 2, 530);
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('the shelf is yours', W / 2, 562);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 380);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('tap — fill another', W / 2, 600);
        cx.globalAlpha = 1;

        // share pill
        cx.fillStyle = 'rgba(46,197,182,0.1)';
        cx.strokeStyle = TEAL;
        cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = TEAL;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE YOUR SHELF', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.0);
      cx.fillStyle = 'rgba(11,13,18,' + (0.80 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('SHELF FILL', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '600 18px -apple-system, Helvetica, Arial';
      cx.fillText('fill yours — one tap at a time', W / 2, 332);
      var p3 = 0.75 + 0.25 * Math.sin(now / 300);
      cx.fillStyle = TEAL;
      cx.globalAlpha = ease * p3;
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // floating flash texts
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 35);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, SHELF_Y - 40 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 35) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
