<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  var TRACK_Y    = H / 2;         // vertical center of the bouncing bar track
  var TRACK_H    = 32;            // height of the slider bar
  var TRACK_L    = 40;            // left margin of track
  var TRACK_R    = W - 40;        // right margin
  var TRACK_W    = TRACK_R - TRACK_L;
  var BASE_ZONE  = 120;           // initial target zone width (px)
  var MIN_ZONE   = 28;            // narrowest zone
  var BASE_SPEED = 3.8;           // initial slider speed px/frame equiv

  // ---- state ----
  var state, flashes, runStartTs;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var dareBeaten = false, ctaAt = 0;
  var botRunsDone = 0;

  // MUTE / SHARE rects
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 8))));
  }

  // ---- newGame ----
  function newGame() {
    flashes = [];
    dareBeaten = false;
    state = {
      phase: 'title',   // title | challenge | play | over | cta
      links: 0,         // successful taps = chain links
      combo: 0,
      bar: { x: TRACK_L, dir: 1 },   // slider position (left edge)
      barW: 70,                        // slider width shrinks per hit
      speed: BASE_SPEED,
      zone: { x: 0, w: BASE_ZONE },   // target zone
      overAt: 0,
      cooldown: 0,      // brief lock after tap so no double-fire
      lastHitRatio: 1
    };
    placeZone();

    if (DEMO) {
      state.phase = 'challenge';
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
  }

  function placeZone() {
    var margin = 16;
    var max = TRACK_W - state.zone.w - margin * 2;
    state.zone.x = TRACK_L + margin + Math.floor(rng() * max);
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- tap / drop ----
  function drop() {
    if (state.phase !== 'play') return;
    if (state.cooldown > 0) return;

    var barCenter = state.bar.x + state.barW / 2;
    var zoneL = state.zone.x;
    var zoneR = state.zone.x + state.zone.w;
    var hit = barCenter >= zoneL && barCenter <= zoneR;

    // ratio of how centered the hit was (1 = perfect center)
    var zoneMid = (zoneL + zoneR) / 2;
    var halfZone = state.zone.w / 2;
    var ratio = hit ? (1 - Math.abs(barCenter - zoneMid) / halfZone) : 0;
    state.lastHitRatio = ratio;

    if (!hit) {
      // MISS
      if (window.J) J.death(Math.min(0.3 + state.links / 20, 1));
      shakeAmt = 10;
      flash('MISS!', VERM, 48);
      if (window.LOOP) LOOP.emit('chain_miss', { links: state.links });
      gameOver();
      return;
    }

    // HIT
    state.links++;
    state.combo++;
    state.cooldown = 18; // ~300ms lock

    var perfect = ratio > 0.78;
    var nearMiss = ratio < 0.22;

    if (window.J) {
      if (perfect) { J.perfect(state.combo); }
      else if (nearMiss) { J.near(); }
      else { J.hit(state.combo); }
      J.tension(Math.min(state.links / 18, 1));
    }

    if (perfect) { hitStop = 5; zoom = 1.03; flash('PERFECT', TEAL, 46); }
    else if (nearMiss) { shakeAmt = 4; flash('SO CLOSE!', GOLD, 38); }

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.links > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.links);
    }

    if (window.LOOP) LOOP.emit('link_added', { n: state.links, ratio: +ratio.toFixed(3), perfect: perfect });
    if (nearMiss && window.LOOP) LOOP.emit('near_miss', { n: state.links, ratio: +ratio.toFixed(3) });

    // difficulty progression: zone shrinks, speed rises
    var newZoneW = Math.max(MIN_ZONE, BASE_ZONE - state.links * 5.5);
    state.zone.w = newZoneW;
    state.speed  = BASE_SPEED + state.links * 0.24;
    state.barW   = Math.max(20, 70 - state.links * 2.2);

    // nudge bar away from current position for freshness
    placeZone();
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = false;
    try {
      var prev = +localStorage.getItem('dc_best') || 0;
      if (state.links > prev) { newBest = true; localStorage.setItem('dc_best', String(state.links)); }
    } catch (_) {}
    if (window.J) {
      J.death(Math.min(0.3 + state.links / 20, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (window.LOOP) LOOP.emit('game_over', { score: state.links, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = state.links;
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 800);
    }
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    newGame();
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- input ----
  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { drop(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: state.links, unit: 'links' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- DEMO script ----
  // mirror-neuron arc: 5 good hits → near-fail recovery → 1 more → real miss
  // demoScript: target ratios (0-1 within zone). 'miss' = deliberate miss. 'near' = edge-scrape ratio.
  var demoScript = [0.82, 0.65, 0.88, 0.71, 0.55, 0.16, 0.79, 'miss'];
  // hesitation frames before each tap
  var demoWaits  = [38, 28, 44, 32, 52, 65, 35, 30];
  var demoIdx = 0, demoWait = 50;

  // ---- BOT ----
  var botMissAt = Math.floor(6 + rng() * 5); // bot misses after N links

  function autopilot(dt) {
    if (state.phase !== 'play') return;
    if (state.cooldown > 0) { state.cooldown -= dt; return; }

    if (DEMO) {
      if (demoWait > 0) { demoWait -= dt; return; }
      var want = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (want === 'miss') {
        // move bar to a guaranteed miss position (past zone)
        // We drop when bar is clearly outside zone
        var bCenter = state.bar.x + state.barW / 2;
        var zL = state.zone.x, zR = state.zone.x + state.zone.w;
        var outOfZone = bCenter < zL - 30 || bCenter > zR + 30;
        if (outOfZone) {
          demoIdx++;
          demoWait = 20;
          drop();
        }
        return;
      }
      // target hit at `want` ratio within zone
      var zoneMid  = state.zone.x + state.zone.w / 2;
      var halfZone = state.zone.w / 2;
      var targetX  = zoneMid + (want - 0.5) * state.zone.w - state.barW / 2;
      var barCenter = state.bar.x + state.barW / 2;
      var dist = Math.abs(barCenter - targetX - state.barW / 2);
      if (dist <= state.speed * 1.1) {
        demoIdx++;
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
        drop();
      }
    } else if (BOT) {
      // bot plays well until botMissAt, then guarantees a miss
      if (state.links >= botMissAt) {
        // wait until clearly outside zone then drop
        var bC = state.bar.x + state.barW / 2;
        var zL2 = state.zone.x, zR2 = state.zone.x + state.zone.w;
        if (bC < zL2 - 20 || bC > zR2 + 20) { drop(); }
        return;
      }
      // aim at zone center with slight noise
      var noise = (rng() - 0.5) * state.zone.w * 0.45;
      var aim   = state.zone.x + state.zone.w / 2 + noise - state.barW / 2;
      var bc2   = state.bar.x + state.barW / 2;
      if (Math.abs(bc2 - aim - state.barW / 2) <= state.speed * 1.1) { drop(); }
    }
  }

  // ---- render helpers ----
  function drawTrack(now) {
    var tY = TRACK_Y;
    // track background
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    cx.fillRect(TRACK_L, tY, TRACK_W, TRACK_H);

    // target zone — pulses brighter as links grow
    var zonePulse = 0.38 + 0.18 * Math.sin(now / 220);
    var tension   = Math.min(state.links / 18, 1);
    var zoneColor = tension > 0.6 ? VERM : GOLD;
    cx.fillStyle = zoneColor;
    cx.globalAlpha = zonePulse;
    cx.fillRect(state.zone.x, tY, state.zone.w, TRACK_H);
    cx.globalAlpha = 1;

    // zone border
    cx.strokeStyle = zoneColor;
    cx.lineWidth   = 2;
    cx.globalAlpha = 0.9;
    cx.strokeRect(state.zone.x + 1, tY + 1, state.zone.w - 2, TRACK_H - 2);
    cx.globalAlpha = 1;

    // slider bar (the moving block)
    var bY = tY;
    var bx = state.bar.x;
    var g  = cx.createLinearGradient(bx, bY, bx + state.barW, bY);
    g.addColorStop(0, TEAL);
    g.addColorStop(1, '#1fa898');
    cx.fillStyle = g;
    cx.fillRect(bx, bY, state.barW, TRACK_H);
    cx.strokeStyle = 'rgba(255,255,255,0.4)';
    cx.lineWidth   = 1.5;
    cx.strokeRect(bx + 0.5, bY + 0.5, state.barW - 1, TRACK_H - 1);
  }

  function drawLinks() {
    // visual chain links in a grid below the track
    var startY = TRACK_Y + TRACK_H + 36;
    var dotR   = 8;
    var gap    = 22;
    var cols   = 12;
    cx.textAlign = 'center';
    for (var i = 0; i < Math.max(state.links, 1); i++) {
      var col = i % cols;
      var row = Math.floor(i / cols);
      var cx2 = TRACK_L + col * gap + gap / 2;
      var cy2 = startY + row * gap;
      var age = state.links - i;
      var bright = age === 1 ? 1 : Math.max(0.35, 1 - age * 0.055);
      cx.globalAlpha = bright;
      cx.fillStyle = i % 3 === 0 ? GOLD : (i % 3 === 1 ? TEAL : VERM);
      cx.beginPath(); cx.arc(cx2, cy2, dotR, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
    }
  }

  // ---- frame ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // cooldown tick
    if (state.cooldown > 0) state.cooldown -= dt;

    // move bar (ping-pong), frozen during hit-stop
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      state.bar.x += state.speed * state.bar.dir * dt;
      if (state.bar.x + state.barW >= TRACK_R) { state.bar.x = TRACK_R - state.barW; state.bar.dir = -1; }
      if (state.bar.x <= TRACK_L) { state.bar.x = TRACK_L; state.bar.dir = 1; }
      autopilot(dt);
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom     += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- title ----
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('DARE CHAIN', W / 2, 268);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('tap to land in the zone', W / 2, 304);
      cx.fillText('chain dares. outlast everyone.', W / 2, 326);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM;
      cx.font = '800 20px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 380);
      cx.globalAlpha = 1;
    }

    // ---- challenge card (demo beat 1) ----
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 296);
      cx.fillStyle = GOLD;
      cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('7', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's dare chain", W / 2, 430);
    }

    // ---- play ----
    if (state.phase === 'play') {
      // score
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 72px -apple-system, Helvetica, Arial';
      cx.fillText(state.links, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('LINKS', W / 2, 118);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(
          dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''),
          W / 2, 146
        );
      }

      // tension bar above track
      var tension = Math.min(state.links / 18, 1);
      if (tension > 0) {
        var tBarW = TRACK_W * tension;
        cx.fillStyle = tension > 0.7 ? VERM : GOLD;
        cx.globalAlpha = 0.55;
        cx.fillRect(TRACK_L, TRACK_Y - 12, tBarW, 5);
        cx.globalAlpha = 1;
      }

      drawTrack(now);
      drawLinks();

      // zone width indicator
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '600 11px Menlo, monospace';
      var zonePct = Math.round((state.zone.w / BASE_ZONE) * 100);
      cx.fillText('WINDOW ' + zonePct + '%', W / 2, TRACK_Y - 20);

      // combo indicator
      if (state.combo > 1) {
        var glow = 0.7 + 0.3 * Math.sin(now / 160);
        cx.globalAlpha = glow;
        cx.fillStyle = state.combo > 5 ? GOLD : TEAL;
        cx.font = '900 ' + Math.min(28, 18 + state.combo * 1.3) + 'px -apple-system, Helvetica, Arial';
        cx.fillText('×' + state.combo, W / 2, TRACK_Y - 38);
        cx.globalAlpha = 1;
      }
    }

    // ---- game over ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('CHAIN BROKE.', W / 2, 286);
      cx.fillStyle = '#fff';
      cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.links + ' links', W / 2, 332);
      var pt = pctTop(state.links);
      cx.fillStyle = GOLD;
      cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 376);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 398);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — REBUILD THE CHAIN', W / 2, 450);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // ---- CTA card (demo beat 6) ----
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('DARE CHAIN', W / 2, 292);
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they hit ' + (window.__demoScore || 7) + ' links. your move.', W / 2, 336);
      var p3 = 0.72 + 0.28 * Math.sin(now / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 7), W / 2, 402);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 436);
      cx.globalAlpha = 1;
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 236 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>

</html>
