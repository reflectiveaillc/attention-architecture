<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);

      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;

  // CALM palette: ink + teal + gold + soft rose. Vermillion avoided.
  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134', ROSE = '#e98ba6';
  var D = 2600;                 // feed depth (one session) — the feed that ends
  var DRIFT = 1.3;              // baseline auto-scroll (px/frame) — the feed always moves
  var DEMO_EXTRA = 2.3;         // demo autopilot extra scroll velocity
  var FOCAL_Y = H * 0.46;       // the still point petals drift through

  var state, pads, glows, flashes, mist, scrollY, runsDone = 0, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, stillAt = 0, ctaAt = 0, NOW = 0;
  try { best = +localStorage.getItem('ep_best') || 0; } catch (_) {}

  function seedRun() { rng = mulberry32((SEED + runsDone * 2654435761) | 0); }

  // ---- world generation (seeded) ----
  function genPads() {
    pads = [];
    var y = 120, pid = 0;
    while (y < D) {
      var px = 70 + rng() * (W - 140);
      var gold = rng() < 0.12;                       // ~12% golden lotus (novelty / resolve beat)
      var r = 30 + rng() * 14;
      var nP = 1 + Math.floor(rng() * 3);            // 1..3 petals per pad
      var pad = { x: px, worldY: y, r: r, gold: gold, sway: rng() * 6.283, petals: [] };

        var rose = !gold && rng() < 0.3;

          lx: Math.cos(ang) * rad, ly: Math.sin(ang) * rad,
          ang: ang, gold: gold, rose: rose, caught: false,
          phase: rng() * 6.283, spin: 0.2 + rng() * 0.5

      y += 120 + rng() * 70;
    }
  }
  function genMist() {
    mist = [];
    for (var i = 0; i < 22; i++) mist.push({
      x: rng() * W, y: rng() * H, r: 1 + rng() * 2.4,
      sp: 0.15 + rng() * 0.5, a: 0.04 + rng() * 0.12, ph: rng() * 6.283
    });
  }

  function newGame() {
    state = { phase: 'title', petals: 0, overAt: 0 };   // title | play | still | over | cta
    glows = []; flashes = []; scrollY = 0; hitStop = 0; zoom = 1; shakeAmt = 0; runsDone = 0;
    seedRun(); genPads(); genMist();

  }

  function startRun() {
    seedRun(); genPads(); genMist();
    state.petals = 0; scrollY = 0; hitStop = 0; zoom = 1; shakeAmt = 0; glows = []; flashes = [];
    catchWait = 0; demoCatchIdx = 0; botVar = 0;
    state.phase = 'play'; runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED + runsDone });
  }

  // ---- coordinate helper: world -> screen for a petal ----
  function petalScreen(p, pad) {
    var psy = pad.worldY - scrollY + (H - 120);
    var sway = Math.sin(NOW * 0.0006 + pad.sway) * 4;
    var bob = Math.sin(NOW * 0.0011 + p.phase) * 3;
    return { x: pad.x + p.lx + sway, y: psy + p.ly + bob };
  }

  function catchPetal(pad, p) {
    if (!p || p.caught) return;
    p.caught = true;
    state.petals++;
    var sp = petalScreen(p, pad);
    var col = p.gold ? GOLD : (p.rose ? ROSE : TEAL);
    glows.push({ x: sp.x, y: sp.y, r: p.gold ? 78 : 48, alpha: p.gold ? 0.95 : 0.6, gold: p.gold, t: 0 });
    flashes.push({ txt: p.gold ? '✿ bloom' : '✿', color: col, size: p.gold ? 30 : 22, t: 0, x: sp.x, y: sp.y });
    if (window.J) J.calm(state.petals % 6);        // calm-engine: soft bells only
    if (p.gold) { hitStop = 3; zoom = 1.025; shakeAmt = 2; }   // tiny bite on the resolve beat
    if (window.LOOP) LOOP.emit('petal_caught', { n: state.petals, gold: p.gold });
  }

  // find nearest catchable petal to a screen point
  function findNear(tx, ty, radius) {
    var best = null, bd = radius, gold = null, gdb = radius + 44;
    for (var i = 0; i < pads.length; i++) {
      var pad = pads[i], psy = pad.worldY - scrollY + (H - 120);
      if (psy < -60 || psy > H + 60) continue;
      for (var j = 0; j < pad.petals.length; j++) {
        var p = pad.petals[j]; if (p.caught) continue;
        var sp = petalScreen(p, pad);
        var d = Math.hypot(sp.x - tx, sp.y - ty);
        if (p.gold && d < gdb) { gdb = d; gold = { pad: pad, p: p }; }
        if (d < bd) { bd = d; best = { pad: pad, p: p }; }
      }
    }
    return gold || best;
  }

  function gameOver() {
    if (state.phase === 'over' || state.phase === 'cta') return;
    state.phase = 'over'; state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.petals > best;
    if (window.J) J.calm(0);                                   // a single soft bell as the feed ends
    if (newBest) { best = state.petals; try { localStorage.setItem('ep_best', String(best)); } catch (_) {} }
    if (DEMO) window.__demoScore = state.petals;
    if (window.LOOP) { LOOP.emit('feed_ended', {}); LOOP.emit('game_over', { score: state.petals, dur_s: +dur.toFixed(1) }); }
    if (DEMO) setTimeout(function () {
      state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3500);
    }, 2000);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) window.__botDone = true;
      else setTimeout(resetRun, 900);
    }
  }

  function resetRun() {
    runsDone++;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0, x: W / 2, y: H / 2 }); }

  // ---- input (coordinate-passing, human only) ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 120, y: 506, w: 240, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

      resetRun();
    }
  }

  // drag-to-scroll (swipe up = go deeper) + tap-to-catch on the same surface
  var dragging = false, downCY = 0, lastCY = 0, downT = 0;
  function pcoord(e) { var r = cv.getBoundingClientRect(); return { x: (e.clientX - r.left) / scale, y: (e.clientY - r.top) / scale }; }

    var c = pcoord(e);

    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (inR(SHARE_R, c.x, c.y) && window.SHARE) { SHARE.send({ score: state.petals, unit: 'petals' }); return; }
      resetRun(); return;
    }
    if (state.phase === 'play') { dragging = false; downCY = e.clientY; lastCY = e.clientY; downT = performance.now(); }
  });
  window.addEventListener('pointermove', function (e) {
    if (DEMO || BOT || state.phase !== 'play') return;
    if (lastCY === 0) return;
    var d = lastCY - e.clientY;                    // swipe up (d>0) -> scroll down into the pond
    scrollY += d / scale;
    lastCY = e.clientY;
    if (scrollY < 0) scrollY = 0; if (scrollY > D) scrollY = D;
    if (Math.abs(e.clientY - downCY) > 6) dragging = true;   // moved -> it's a scroll, not a tap
  });

    if (DEMO || BOT) return;

    }
    dragging = false; lastCY = 0;
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') { e.preventDefault(); tap(W / 2, FOCAL_Y); }
  });

  // ---- demo / bot autopilots (ignore human input; seeded) ----
  var demoWaits = [34, 46, 30, 52, 38, 44, 30, 40, 36, 32, 42, 34];  // beats of hesitation
  var catchWait = 0, demoCatchIdx = 0, botVar = 0, botRunsDone = 0;

  function botExtra() { if (rng() < 0.02) botVar = (rng() - 0.5) * 1.2; return 1.9 + botVar; }

  function autopilotCatch() {

    var pick = findNear(W / 2, FOCAL_Y, 78);
    if (!pick) return;
    if (DEMO) {
      catchPetal(pick.pad, pick.p);
      catchWait = demoWaits[Math.min(demoCatchIdx, demoWaits.length - 1)] || 34;
      demoCatchIdx++;

      if (rng() < 0.72) catchPetal(pick.pad, pick.p);   // imperfect: ~28% missed
      catchWait = 16 + rng() * 24;
    }
  }

  // ---- render ----
  function drawPetalFlower(p, pad) {
    var sp = petalScreen(p, pad);
    var sz = p.gold ? 9 : 7;
    var col = p.gold ? GOLD : (p.rose ? ROSE : TEAL);
    var psy = pad.worldY - scrollY + (H - 120);
    // glow halo
    var g = cx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, sz * 2.6);
    g.addColorStop(0, p.gold ? 'rgba(242,177,52,0.55)' : (p.rose ? 'rgba(233,139,166,0.45)' : 'rgba(46,197,182,0.42)'));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = g; cx.beginPath(); cx.arc(sp.x, sp.y, sz * 2.6, 0, 6.283); cx.fill();
    // five-petal bloom
    cx.save(); cx.translate(sp.x, sp.y); cx.rotate(p.phase + NOW * 0.0002 * p.spin);
    for (var k = 0; k < 5; k++) {
      cx.save(); cx.rotate(k * 6.283 / 5);
      cx.fillStyle = col; cx.globalAlpha = 0.92;
      cx.beginPath(); cx.ellipse(0, sz * 0.62, sz * 0.5, sz * 0.95, 0, 0, 6.283); cx.fill();
      cx.restore();
    }
    cx.fillStyle = '#fff'; cx.globalAlpha = 0.95;
    cx.beginPath(); cx.arc(0, 0, sz * 0.42, 0, 6.283); cx.fill();
    cx.restore(); cx.globalAlpha = 1;
  }

  var last = performance.now();
  function frame(now) {
    NOW = now;
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // ---- sim ----
    if (state.phase === 'title') {
      scrollY = (scrollY + DRIFT * 0.5 * dt) % D;            // idle drift on the title screen
    } else if (state.phase === 'play') {
      if (hitStop > 0) {                                     // hit-stop freezes the sim — but ALWAYS decay it
        hitStop -= dt;
      } else {
        var v = DRIFT;
        if (DEMO) v += DEMO_EXTRA;
        else if (BOT) v += botExtra();
        scrollY += v * dt;

        else {

          else if (DEMO || BOT) autopilotCatch();

    cx.save();

      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // ---- water ----
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0d1a1e'); bg.addColorStop(0.5, '#0b0d12'); bg.addColorStop(1, '#070a0e');
    cx.fillStyle = bg; cx.fillRect(-20, -20, W + 40, H + 40);

    var sheen = cx.createLinearGradient(0, 0, 0, 220);
    sheen.addColorStop(0, 'rgba(46,197,182,0.08)'); sheen.addColorStop(1, 'rgba(46,197,182,0)');
    cx.fillStyle = sheen; cx.fillRect(0, 0, W, 220);
    // parallax surface lines
    cx.strokeStyle = 'rgba(46,197,182,0.05)'; cx.lineWidth = 1;
    var off = (scrollY * 0.5) % 46;
    for (var ly = -46; ly < H + 46; ly += 46) {
      var yy = ly - off + 0.5;
      cx.beginPath(); cx.moveTo(0, yy); cx.lineTo(W, yy); cx.stroke();
    }

    // mist

      var mt = mist[m]; mt.y -= mt.sp * dt; if (mt.y < -8) { mt.y = H + 8; mt.x = rng() * W; }

      cx.beginPath(); cx.arc(mt.x, mt.y, mt.r, 0, 6.283); cx.fill();

    for (var i = 0; i < pads.length; i++) {
      var pad = pads[i], psy = pad.worldY - scrollY + (H - 120);
      if (psy < -80 || psy > H + 80) continue;
      var sway = Math.sin(NOW * 0.0006 + pad.sway) * 4;
      cx.save(); cx.translate(pad.x + sway, psy);
      cx.fillStyle = 'rgba(18,54,62,0.5)';
      cx.beginPath(); cx.ellipse(0, 0, pad.r, pad.r * 0.68, 0, 0, 6.283); cx.fill();
      cx.strokeStyle = 'rgba(46,197,182,0.22)'; cx.lineWidth = 1; cx.stroke();
      // notch
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.beginPath();
      cx.moveTo(0, 0); cx.lineTo(pad.r * 0.96, -pad.r * 0.06); cx.lineTo(pad.r * 0.96, pad.r * 0.06); cx.closePath(); cx.fill();
      cx.restore();
      for (var j = 0; j < pad.petals.length; j++) {
        var p = pad.petals[j]; if (!p.caught) drawPetalFlower(p, pad);
      }
    }

    // water brighten: each catch lays a soft glow that fades (the reward, then release)
    for (var gi = glows.length - 1; gi >= 0; gi--) {
      var gl = glows[gi]; gl.t += dt;
      var a = Math.max(0, gl.alpha * (1 - gl.t / 90));
      if (a <= 0) { glows.splice(gi, 1); continue; }
      var rad = gl.r * (1 + gl.t * 0.02);
      var grd = cx.createRadialGradient(gl.x, gl.y, 0, gl.x, gl.y, rad);
      grd.addColorStop(0, gl.gold ? 'rgba(242,177,52,' + (a * 0.5) + ')' : 'rgba(46,197,182,' + (a * 0.45) + ')');
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      cx.fillStyle = grd; cx.beginPath(); cx.arc(gl.x, gl.y, rad, 0, 6.283); cx.fill();
    }

    // floating reward text (rises + fades)
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // score (a count of presence, not a competition)
    if (state.phase === 'play' || state.phase === 'still' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '800 40px -apple-system, Helvetica, Arial';
      cx.fillText('✿  ' + state.petals, W / 2, 70);
      cx.fillStyle = 'rgba(255,255,255,0.32)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 92);
    }

    // stillness card (the feed ends)
    if (state.phase === 'still') {
      var st = (now - stillAt) / 2000, se = Math.min(1, st * 2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.45 * se) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = se; cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('the pond goes still', W / 2, H / 2);
      cx.globalAlpha = 1;
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('ENDLESS POND', W / 2, 300);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillText('TAP TO BEGIN', W / 2, 350); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('scroll. catch a petal. it ends.', W / 2, 380);
    }

    // game over (calm: no rank, no dare — a soft closing)
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('the pond went still.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.petals + ' petals gathered', W / 2, 348);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('the feed that ends', W / 2, 376);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 300);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — DRIFT AGAIN', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill (soft — calm games skip the dare frame, keep a gentle pass-it-on)
        cx.fillStyle = 'rgba(242,177,52,0.14)'; cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ PASS IT ON', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card (soft invitation, not a dare)
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('ENDLESS POND', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.78)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('the feed that ends. reach it.', W / 2, 342);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5; cx.font = '16px -apple-system, Helvetica, Arial'; cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
