<script>
(function () {
  'use strict';

  // ---- deterministic RNG ----
  function mulberry32(a) {

      a |= 0; a = a + 0x6D2B79F5 | 0;

  }

  function randInt(n) { return Math.floor(rng() * n); }
  function pick(arr) { return arr[randInt(arr.length)]; }

  // ---- canvas + fit ----
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;

    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // ---- palette / fonts ----
  var INK = '#0b0d12', VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var FONT = '-apple-system, BlinkMacSystemFont, Helvetica, Arial';
  var MONO = 'Menlo, monospace';
  var COLORS = { red: VERM, teal: TEAL, gold: GOLD };

  // ---- rule system: each round adds one rule to the stack ----
  // a rule is a required attribute value. max 6 rules; after that values rotate.
  var RULE_DEFS = [
    { key: 'color', values: ['red', 'teal', 'gold'],
      labels: { red: 'RED', teal: 'TEAL', gold: 'GOLD' }, hasColor: true },
    { key: 'size', values: ['small', 'big'],
      labels: { small: 'SMALL', big: 'BIG' } },
    { key: 'pos', values: ['left', 'right', 'center'],
      labels: { left: 'LEFT', right: 'RIGHT', center: 'CENTER' } },

      labels: { circle: 'CIRCLE', square: 'SQUARE', triangle: 'TRIANGLE' } },
    { key: 'border', values: ['solid', 'none'],
      labels: { solid: 'SOLID', none: 'PLAIN' } },
    { key: 'dots', values: ['1', '2', '3'],
      labels: { '1': '1 DOT', '2': '2 DOTS', '3': '3 DOTS' } }
  ];

  // ---- state ----
  var state, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var challengeAt = 0, ctaAt = 0;
  var flashes = [], particles = [];
  try { best = +localStorage.getItem('rs_best') || 0; } catch (_) {}

  function newGame() {
    flashes = []; particles = [];
    state = {
      phase: 'title',
      score: 0,
      rules: [],           // current rule stack
      round: 0,            // current round (1-based during play)
      item: null,          // active scrolling item
      nextAt: 0,           // frames until next item spawns
      overAt: 0,
      durBase: 80          // base scroll duration in frames

    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1200);
      return;
    }
    if (BOT) startRun();
  }

  function addRule() {
    if (state.rules.length < RULE_DEFS.length) {
      // add a new rule type
      var def = RULE_DEFS[state.rules.length];
      var val = pick(def.values);
      state.rules.push({ key: def.key, val: val, def: def });
    } else {
      // stack is full: swap one rule's value for fresh novelty
      var idx = randInt(state.rules.length);
      var r = state.rules[idx];
      var vals = r.def.values.filter(function (v) { return v !== r.val; });
      r.val = pick(vals);
    }
  }

  function targetAttrs() {
    var attrs = { color: 'red', size: 'big', pos: 'center', shape: 'circle', border: 'none', dots: '1' };
    for (var i = 0; i < state.rules.length; i++) {
      var r = state.rules[i];
      attrs[r.key] = r.val;
    }
    return attrs;
  }

  function spawnItem() {
    state.round++;
    var attrs = targetAttrs();
    var valid;
    if (DEMO) {
      // fixed demo sequence: valid / invalid pattern that ends in a wrong-tap fail
      var pattern = [true, false, true, false, true, true, true, false, true, false];
      valid = pattern[(state.round - 1) % pattern.length];
    } else {
      valid = rng() < 0.58; // 58% valid items
    }
    if (!valid) {
      // violate exactly one active rule (subtle distractor)
      if (state.rules.length > 0) {
        var idx = randInt(state.rules.length);
        var r = state.rules[idx];
        var bad = pick(r.def.values.filter(function (v) { return v !== r.val; }));
        attrs[r.key] = bad;
      } else {
        // fallback before rules exist (shouldn't happen)
        attrs.color = pick(['teal', 'gold']);
      }
    }
    // speed climbs with score; cap duration at ~0.9s
    var dur = Math.max(52, state.durBase - state.score * 2.4);
    state.item = {
      attrs: attrs,
      valid: valid,
      life: 0,
      duration: dur,
      y: H + 90,
      judged: false
    };
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0;
    state.rules = [];
    state.round = 0;
    state.nextAt = 0;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    spawnItem();
  }

  function nextRound() {
    state.score++;
    addRule();
    spawnParticleBurst();
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    if (window.J) {
      J.hit(state.score);
      J.tension(Math.min(state.score / 10, 1));
    }
    flash('RULE ' + state.score, GOLD, 38);
    if (window.LOOP) LOOP.emit('rule_added', { n: state.score, rules: state.rules.length });
    // tiny pause before the next item scrolls in
    state.nextAt = 18;
  }

  function correctTap() {
    if (state.item.judged) return;
    state.item.judged = true;
    if (state.item.valid) {
      // quick decision = perfect
      if (state.item.life < 0.35) {
        if (window.J) J.perfect(state.score + 1);
        hitStop = 5; zoom = 1.03;
        flash('PERFECT', TEAL, 46);

      nextRound();
    } else {
      // tapped a distractor -> fail
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { n: state.score, valid: false });
      gameOver();
    }
  }

  function finalizeItem() {
    if (!state.item || state.item.judged) return;
    state.item.judged = true;
    if (state.item.valid) {
      // missed a valid item -> fail
      gameOver();
    } else {
      // correctly ignored -> advance
      nextRound();
    }
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(Math.min(0.35 + state.score / 25, 1));
      J.tension(0);
      if (newBest) setTimeout(function () { J.fanfare(); }, 400);

    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('rs_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });

      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();

    state.phase = 'play';
    state.score = 0;
    state.rules = [];

    state.item = null;

    dareBeaten = false;

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 520, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

    { type: 'correct', wait: 16 },  // r1
    { type: 'correct', wait: 20 },  // r2
    { type: 'correct', wait: 38 },  // r3 hesitation
    { type: 'correct', wait: 22 },  // r4
    { type: 'correct', wait: 28 },  // r5
    { type: 'late', wait: 12 },     // r6 near-fail (~60%), then taps at life 0.82
    { type: 'correct', wait: 10 },  // r7 recovery
    { type: 'correct', wait: 34 },  // r8

  var botRunsDone = 0, botWait = 0, botTarget = null;

      else if (s.type === 'late') wantTap = state.item.valid;

      else { /* ignore: do nothing; will finalize when item scrolls off */ }

    }

  function itemX(it) {
    var p = it.attrs.pos;
    if (p === 'left') return 95;
    if (p === 'right') return W - 95;

  }
  function itemSize(it) { return it.attrs.size === 'big' ? 132 : 84; }

  function drawShape(it, x, y, sz) {
    var s = it.attrs.shape;
    cx.fillStyle = 'rgba(255,255,255,0.9)';
    var hs = sz * 0.28;
    if (s === 'circle') {
      cx.beginPath();
      cx.arc(x, y, hs, 0, Math.PI * 2);
      cx.fill();
    } else if (s === 'square') {
      cx.fillRect(x - hs, y - hs, hs * 2, hs * 2);
    } else {
      // triangle
      cx.beginPath();
      cx.moveTo(x, y - hs);
      cx.lineTo(x + hs, y + hs);
      cx.lineTo(x - hs, y + hs);
      cx.closePath();
      cx.fill();
    }
  }

  function drawDots(it, x, y, sz) {
    var n = +it.attrs.dots;
    if (n <= 0) return;
    cx.fillStyle = INK;
    var r = 4;
    if (n === 1) {
      cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2); cx.fill();
    } else if (n === 2) {
      cx.beginPath(); cx.arc(x - 7, y, r, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(x + 7, y, r, 0, Math.PI * 2); cx.fill();
    } else {
      cx.beginPath(); cx.arc(x, y - 5, r, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(x - 7, y + 5, r, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(x + 7, y + 5, r, 0, Math.PI * 2); cx.fill();
    }
  }

  function drawItem(it) {
    var x = itemX(it), sz = itemSize(it);
    var half = sz / 2;
    var fill = COLORS[it.attrs.color] || VERM;
    var y = it.y;

    // card shadow / depth
    cx.fillStyle = 'rgba(0,0,0,0.25)';
    cx.fillRect(x - half + 4, y - half + 4, sz, sz);

    // card body

    g.addColorStop(0, fill);
    g.addColorStop(1, shade(fill, -0.15));
    cx.fillStyle = g;
    roundRect(x - half, y - half, sz, sz, 16);
    cx.fill();

    // border rule
    if (it.attrs.border === 'solid') {
      cx.strokeStyle = 'rgba(255,255,255,0.85)';
      cx.lineWidth = 3;
      roundRect(x - half + 1.5, y - half + 1.5, sz - 3, sz - 3, 14);
      cx.stroke();

    // shape + dots
    drawShape(it, x, y, sz);
    drawDots(it, x, y, sz);

    // subtle label for accessibility / clarity
    cx.fillStyle = 'rgba(11,13,18,0.65)';
    cx.font = '700 11px ' + FONT;
    cx.textAlign = 'center';
    cx.fillText(it.attrs.dots + ' DOT' + (it.attrs.dots === '1' ? '' : 'S'), x, y + half - 12);
  }

  function shade(hex, p) {
    var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    r = Math.max(0, Math.min(255, Math.round(r + (p < 0 ? r : 255 - r) * p)));
    g = Math.max(0, Math.min(255, Math.round(g + (p < 0 ? g : 255 - g) * p)));
    b = Math.max(0, Math.min(255, Math.round(b + (p < 0 ? b : 255 - b) * p)));
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  function roundRect(x, y, w, h, r) {
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); return; }
    cx.beginPath();
    cx.moveTo(x + r, y);
    cx.lineTo(x + w - r, y);
    cx.quadraticCurveTo(x + w, y, x + w, y + r);
    cx.lineTo(x + w, y + h - r);
    cx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    cx.lineTo(x + r, y + h);
    cx.quadraticCurveTo(x, y + h, x, y + h - r);
    cx.lineTo(x, y + r);
    cx.quadraticCurveTo(x, y, x + r, y);
    cx.closePath();
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 11))));
  }

  function ruleLabel(r) {
    return r.def.labels[r.val];
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // sim update (decaying hit-stop per contract)
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      if (state.nextAt > 0) {
        state.nextAt -= dt;
        if (state.nextAt <= 0) spawnItem();
      } else if (state.item) {
        state.item.life += dt / state.item.duration;
        state.item.y = H + 90 - state.item.life * (H + 200);
        if (state.item.life >= 1) {
          finalizeItem();
        } else {
          autopilot();
        }
      }
    }

    // decay juice
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.life -= 0.02 * dt;
      if (pt.life <= 0) particles.splice(p, 1);
    }

    // ---- draw ----
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // rule stack header
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '700 12px ' + FONT;
    cx.fillText('RULES TO HOLD', W / 2, 42);

    var startY = 62, pillH = 26, gap = 6;
    var y = startY;
    for (var i = 0; i < state.rules.length; i++) {
      var r = state.rules[i];
      var label = ruleLabel(r);
      cx.font = '800 14px ' + FONT;
      var tw = cx.measureText(label).width + 32;
      var px = W / 2 - tw / 2;
      cx.fillStyle = 'rgba(255,255,255,0.08)';
      roundRect(px, y, tw, pillH, 13); cx.fill();
      if (r.def.hasColor) {
        cx.fillStyle = COLORS[r.val];
        cx.beginPath(); cx.arc(px + 14, y + pillH / 2, 6, 0, Math.PI * 2); cx.fill();
      }
      cx.fillStyle = '#fff';
      cx.textAlign = 'left';
      cx.fillText(label, px + (r.def.hasColor ? 28 : 14), y + 18);
      cx.textAlign = 'center';
      y += pillH + gap;
    }

    // active item
    if (state.phase === 'play' && state.item && state.nextAt <= 0) {
      drawItem(state.item);
    }

    // particles
    for (var j = 0; j < particles.length; j++) {
      var pt = particles[j];
      cx.globalAlpha = Math.max(0, pt.life);
      cx.fillStyle = pt.color;
      cx.beginPath(); cx.arc(pt.x, pt.y, 3, 0, Math.PI * 2); cx.fill();
    }
    cx.globalAlpha = 1;

    // score / best (play + over)
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 52px ' + FONT;
      cx.fillText(state.score, W / 2, H - 118);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px ' + FONT;
      cx.fillText('BEST ' + best, W / 2, H - 96);
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px ' + FONT;
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, H - 70);
      }
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px ' + FONT;
      cx.fillText(fl.txt, W / 2, 260 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title card
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px ' + FONT;
      cx.fillText('RULE STACK', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px ' + FONT;
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP RED. IGNORE THE REST.', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px ' + FONT;
      cx.fillText('each round adds one more rule.', W / 2, 360);
    }

    // demo challenge card
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px ' + MONO;
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px ' + FONT;
      cx.fillText('6', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px ' + FONT;
      cx.fillText("today's deep run", W / 2, 430);
    }

    // game over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px ' + FONT;
      cx.fillText('SLIPPED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 28px ' + FONT;
      cx.fillText('HELD ' + state.score + ' RULES', W / 2, 350);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px ' + FONT;
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 398);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px ' + FONT;
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 422);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px ' + FONT;
        cx.fillText('TAP — ONE MORE TRY', W / 2, 470);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px ' + FONT;
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px ' + FONT;
      cx.fillText('RULE STACK', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px ' + FONT;
      cx.fillText('he held ' + (window.__demoScore || 6) + ' rules. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px ' + FONT;
      cx.fillText('BEAT ' + (window.__demoScore || 6), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px ' + FONT;
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px ' + FONT;
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
