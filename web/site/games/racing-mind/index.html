<title>Racing Mind — Tilt</title>
<!--
  LOOP / attention-architecture — Racing Mind
  Circuits: 01-rpe (variable reward per catch), 06-zeigarnik (one more thought),
            07-timing (tap before it escapes).
  Engine: viral
  Mechanic: thought bubbles race across screen; tap to set each one down.
            every catch slows the spawn rate and dims the background.
  Modes:
    ?demo=1&seed=7   scripted mirror-neuron arc → sets window.__demoDone
    ?bot=1&runs=N    imperfect autopilot, N runs → sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'racing-mind';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- thought snippets ----
  var THOUGHTS = [
    'did I lock the door?', 'what if they hate me', 'reply to that email',
    'why did I say that', 'am I behind?', 'check the bank', 'just one more',
    "can't sleep", 'what time is it', 'tomorrow though', 'they noticed',
    'don\'t forget', 'is this okay?', 'start over', 'almost midnight',
    'one more scroll', 'say something', 'why not me', 'what if it fails',
    'breath', 'just breathe', 'let it go', 'it\'s fine', 'tomorrow',
    'good enough', 'you\'re okay', 'rest now', 'shhh', 'settle'
  ];

  // ---- game state ----
  var phase;            // 'title' | 'challenge' | 'play' | 'over' | 'cta'
  var bubbles;          // active thought bubbles
  var flashes;          // floating reward texts
  var score, combo, runStartTs;
  var hitStop, shakeAmt, zoom;
  var dareBeaten;
  var spawnInterval;    // frames between spawns (decreases with each miss, increases with catches)
  var spawnTimer;
  var bgDim;            // 0=black 1=full-lit; dims as score goes up
  var overAt, ctaAt, challengeAt;
  var botRunsDone = 0;
  var best = 0;
  try { best = +localStorage.getItem('rm_best') || 0; } catch (_) {}

  // ---- bubble factory ----
  var BUBBLE_R = 28;
  var THOUGHT_COLORS = [VERM, TEAL, GOLD, '#a78bfa', '#fb923c'];

  function spawnBubble() {
    // bubbles enter from left or right
    var fromLeft = rng() < 0.5;
    var lane = Math.floor(rng() * 4); // 4 vertical lanes
    var yCenter = 180 + lane * 120;
    var speed = (2.4 + score * 0.07 + rng() * 1.2) * (fromLeft ? 1 : -1);
    var word = THOUGHTS[Math.floor(rng() * THOUGHTS.length)];
    var col = THOUGHT_COLORS[Math.floor(rng() * THOUGHT_COLORS.length)];
    bubbles.push({
      x: fromLeft ? -BUBBLE_R - 10 : W + BUBBLE_R + 10,
      y: yCenter + (rng() - 0.5) * 40,
      vx: speed,
      r: BUBBLE_R + Math.floor(rng() * 10),
      word: word,
      col: col,
      caught: false,
      catchT: 0,   // frames since caught (for shrink animation)
      wobble: rng() * Math.PI * 2,
      escaping: false
    });
  }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 12))));
  }

  function newGame() {
    phase = 'title';
    bubbles = []; flashes = [];
    score = 0; combo = 0;
    hitStop = 0; shakeAmt = 0; zoom = 1;
    dareBeaten = false;
    spawnInterval = 90;   // frames between spawns (starts slow)
    spawnTimer = 60;
    bgDim = 1.0;          // starts lit, dims toward 0 as score grows
    overAt = 0; ctaAt = 0; challengeAt = 0;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); }
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    bubbles = [];
    spawnTimer = 30;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function catchBubble(b) {
    b.caught = true;
    score++;
    combo++;
    // every catch: slow spawn rate (more calm) and dim background
    spawnInterval = Math.min(140, spawnInterval + 5);
    bgDim = Math.max(0.08, bgDim - 0.04);

    var perfect = combo >= 3;
    if (window.J) {
      if (perfect) J.perfect(combo);
      else J.hit(combo);
      J.tension(Math.min(score / 30, 1));
    }
    if (perfect) { hitStop = 5; zoom = 1.025; }
    shakeAmt = Math.max(shakeAmt, perfect ? 4 : 1.5);

    var label = combo >= 5 ? 'SETTLED ×' + combo : combo >= 3 ? 'FLOW ×' + combo : '+1';
    var col = combo >= 5 ? GOLD : combo >= 3 ? TEAL : VERM;
    flash(label, col, combo >= 3 ? 36 : 28, b.x, b.y);

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 42, W / 2, 340);
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }

    if (window.LOOP) LOOP.emit('thought_caught', { n: score, combo: combo });

    // check win: if bgDim is near 0 and mind is settled, trigger gentle over
    if (score >= 20 && bgDim <= 0.1 && bubbles.filter(function(b2){ return !b2.caught; }).length === 0) {
      setTimeout(mindSettled, 600);
    }
  }

  function bubbleEscaped() {
    // a thought got away — speed up, brighten, break combo
    combo = 0;
    spawnInterval = Math.max(30, spawnInterval - 18);
    bgDim = Math.min(1.0, bgDim + 0.12);
    shakeAmt = Math.max(shakeAmt, 7);
    if (window.J) J.near();
    flash('ESCAPED!', VERM, 32, W / 2, 300);
    if (window.LOOP) LOOP.emit('near_miss', { n: score });
    // if too many escape, game over
    if (spawnInterval <= 30) {
      gameOver();
    }
  }

  function mindSettled() {
    if (phase !== 'play') return;
    // peaceful ending — all thoughts set down
    gameOver(true);
  }

  function gameOver(peaceful) {
    if (phase !== 'play') return;
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (!peaceful) shakeAmt = 10;
    if (window.J) {
      if (peaceful) J.fanfare();
      else J.death(Math.min(0.3 + score / 30, 1));
    }
    if (DEMO) window.__demoScore = score;
    var newBest = score > best;
    if (newBest) { best = score; try { localStorage.setItem('rm_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 800);
      }
    }
  }

  function resetRun() {
    score = 0; combo = 0;
    bubbles = []; flashes = [];
    spawnInterval = 90; spawnTimer = 60;
    bgDim = 1.0;
    hitStop = 0; shakeAmt = 0; zoom = 1;
    dareBeaten = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, col, sz, x, y) {
    flashes.push({ txt: txt, col: col, sz: sz, x: x || W / 2, y: y || H / 2 - 60, t: 0 });
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play') {
      if (px === undefined) return; // require actual tap position for bubble hit detection
      // find closest bubble to tap
      var hit = null, best2 = 9999;
      for (var i = 0; i < bubbles.length; i++) {
        var b = bubbles[i];
        if (b.caught) continue;
        var dx = b.x - px, dy = b.y - py;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b.r + 14 && dist < best2) { best2 = dist; hit = b; }
      }
      if (hit) catchBubble(hit);
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: score, unit: 'thoughts' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(W / 2, H / 2); });

  // ---- demo/bot autopilot ----
  // demo script: indices into bubbles[] to catch, with hesitation waits
  var demoStep = 0, demoWait = 0;
  // near-fail at step 5: let one escape (wobble), then recover with 4 catches
  var demoMissAt = 5;       // let bubble #5 escape intentionally (near-fail tension beat)
  var demoPassiveAfter = 12; // after 12 catches in bot mode, go passive so escapes accumulate → game_over

  function autopilot() {
    if (phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      // find leftmost uncaught bubble approaching center
      var target = null;
      for (var i = 0; i < bubbles.length; i++) {
        var b = bubbles[i];
        if (b.caught || b.escaping) continue;
        // near-fail: intentionally miss step demoMissAt by ignoring the closest bubble once
        if (demoStep === demoMissAt) {
          // skip this bubble; it will escape and trigger tension
          continue;
        }
        // target bubble closest to horizontal center
        var dx = Math.abs(b.x - W / 2);
        if (target === null || dx < Math.abs(target.x - W / 2)) target = b;
      }
      // if near-fail step and bubble not yet escaped, don't catch — wait for escape
      if (demoStep === demoMissAt) {
        // wait until the escape fires or a new bubble appears further right
        return;
      }
      if (target) {
        // hesitation: varied wait before catching
        var hesitate = 8 + Math.floor(rng() * 20);
        demoWait = hesitate;
        catchBubble(target);
        demoStep++;
        // after step 8 (recovery beat), slow down a bit for spectacle
        if (demoStep === 8) demoWait = 35;
      }
    } else if (BOT) {
      // imperfect bot: catch bubbles with some probability, go passive after K catches
      if (score >= demoPassiveAfter) return; // passive — let escapes kill the run
      var best3 = null, bestDist = 9999;
      for (var j = 0; j < bubbles.length; j++) {
        var bj = bubbles[j];
        if (bj.caught || bj.escaping) continue;
        var dx2 = Math.abs(bj.x - W / 2);
        if (dx2 < bestDist) { bestDist = dx2; best3 = bj; }
      }
      if (best3 && rng() < 0.55) { // ~55% catch rate = imperfect
        catchBubble(best3);
      }
    }
  }

  // ---- render ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // ---- update ----
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      if (phase === 'play') {
        // spawn
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnBubble();
          spawnTimer = spawnInterval + (rng() - 0.5) * 20;
        }
        // move bubbles
        for (var i = bubbles.length - 1; i >= 0; i--) {
          var b = bubbles[i];
          if (b.caught) {
            b.catchT += dt;
            if (b.catchT > 25) bubbles.splice(i, 1);
            continue;
          }
          b.x += b.vx * dt;
          b.wobble += 0.06 * dt;
          // escaped?
          if ((b.vx > 0 && b.x > W + b.r + 20) || (b.vx < 0 && b.x < -b.r - 20)) {
            if (!b.escaping) {
              b.escaping = true;
              bubbleEscaped();
            }
            bubbles.splice(i, 1);
          }
        }
        autopilot();
      }
    }

    // decay juice
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // ---- draw ----
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // bg — dims as score rises (racing mind quieting)
    var dimmed = (phase === 'play' || phase === 'over') ? bgDim : 1.0;
    var bgR = Math.round(11 * dimmed), bgG = Math.round(13 * dimmed), bgB = Math.round(18 * dimmed);
    cx.fillStyle = 'rgb(' + bgR + ',' + bgG + ',' + bgB + ')';
    cx.fillRect(-20, -20, W + 40, H + 40);

    // subtle gradient
    if (dimmed > 0.05) {
      var bg = cx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, H * 0.7);
      bg.addColorStop(0, 'rgba(46,197,182,' + (0.04 * dimmed) + ')');
      bg.addColorStop(1, 'rgba(232,80,46,' + (0.05 * dimmed) + ')');
      cx.fillStyle = bg; cx.fillRect(0, 0, W, H);
    }

    // title
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('RACING MIND', W / 2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '600 16px -apple-system, Helvetica, Arial';
      cx.fillText('thoughts racing at 2am', W / 2, 318);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillText('TAP A THOUGHT TO SET IT DOWN', W / 2, 370);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.28)'; cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('catch them all. slow the loop.', W / 2, 400);
    }

    // challenge card (demo beat 1)
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('THOUGHTS SET DOWN', W / 2, 290);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('27', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("score to beat", W / 2, 432);
    }

    // bubbles
    if (phase === 'play' || phase === 'over') {
      for (var bi = 0; bi < bubbles.length; bi++) {
        var bb = bubbles[bi];
        var bAlpha = 1;
        var bScale = 1;
        if (bb.caught) {
          bAlpha = Math.max(0, 1 - bb.catchT / 18);
          bScale = 1 + bb.catchT * 0.05;
        }
        cx.save();
        cx.globalAlpha = bAlpha;
        cx.translate(bb.x, bb.y + Math.sin(bb.wobble) * 3);
        cx.scale(bScale, bScale);

        // bubble circle
        cx.beginPath();
        cx.arc(0, 0, bb.r, 0, Math.PI * 2);
        cx.fillStyle = bb.col + '22';
        cx.fill();
        cx.strokeStyle = bb.col;
        cx.lineWidth = 1.8;
        cx.stroke();

        // glint
        cx.beginPath();
        cx.arc(-bb.r * 0.28, -bb.r * 0.28, bb.r * 0.18, 0, Math.PI * 2);
        cx.fillStyle = 'rgba(255,255,255,0.22)';
        cx.fill();

        // thought text
        cx.fillStyle = '#fff';
        var fontSize = Math.max(8, Math.min(11, bb.r * 0.38));
        cx.font = '600 ' + fontSize + 'px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        // wrap text if needed
        var words = bb.word.split(' ');
        var line1 = '', line2 = '';
        if (words.length <= 2) {
          line1 = bb.word;
        } else {
          var mid = Math.ceil(words.length / 2);
          line1 = words.slice(0, mid).join(' ');
          line2 = words.slice(mid).join(' ');
        }
        if (line2) {
          cx.fillText(line1, 0, -fontSize * 0.6);
          cx.fillText(line2, 0,  fontSize * 0.8);
        } else {
          cx.fillText(line1, 0, fontSize * 0.35);
        }
        cx.restore();
      }
    }

    // score display
    if (phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,' + (0.5 + 0.5 * dimmed) + ')';
      cx.font = '800 60px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 90);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 114);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 136);
      }

      // calm meter (visual indicator — line that shrinks as mind quiets)
      var meterW = 200 * bgDim;
      cx.fillStyle = 'rgba(255,255,255,0.15)';
      cx.fillRect(W / 2 - 100, H - 48, 200, 4);
      cx.fillStyle = bgDim > 0.5 ? VERM : bgDim > 0.2 ? GOLD : TEAL;
      cx.fillRect(W / 2 - 100, H - 48, meterW, 4);
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '500 10px -apple-system, Helvetica, Arial';
      cx.fillText('mind racing', W / 2 - 100, H - 54);
      cx.fillText('calm', W / 2 + 100, H - 54);
    }

    // floating flashes
    for (var fi = flashes.length - 1; fi >= 0; fi--) {
      var fl = flashes[fi]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 35);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.col;
      cx.font = '900 ' + (fl.sz + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.9);
      cx.globalAlpha = 1;
      if (fl.t > 35) flashes.splice(fi, 1);
    }

    // game over card
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('MIND RACING.', W / 2, 298);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' thoughts', W / 2, 342);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 386);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('calmer than ' + (100 - pt) + '% of players', W / 2, 410);
      if (!DEMO && !BOT) {
        var p2 = 0.65 + 0.35 * Math.sin(now / 290);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — TRY AGAIN', W / 2, 458);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 29);
      }
    }

    // demo CTA card
    if (phase === 'cta') {
      var tCta = (now - ctaAt) / 1000, ease = Math.min(1, tCta * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('RACING MIND', W / 2, 298);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore || 27) + ' thoughts set down.', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 27), W / 2, 404);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 434);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
