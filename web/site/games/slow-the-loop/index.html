<title>Slow the Loop — Tilt</title>
<!--
  LOOP / attention-architecture — Slow the Loop
  Engine: calm. Circuits: 01-rpe, 05-ease, 07-timing.
  Mechanic: tap once per loop to lengthen its period and dim the screen.
  The loop slows until it stops — you break the seamless feed.
  Modes:
    ?demo=1&seed=7   scripted calm arc ~16s → soft invitation CTA → __demoDone
    ?bot=1&runs=N&seed=5  imperfect autopilot, eventually stops tapping → loop runs out → game_over → __botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'slow-the-loop';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var SOFT_BLUE = '#4a90c4', SOFT_LAVENDER = '#9b8ec4';

  // ---- game state ----
  // The loop is a visual animation. Its period starts at BASE_PERIOD ms.
  // Each tap stretches it by PERIOD_ADD ms and dims the screen by DIM_STEP.
  // When period >= MAX_PERIOD the loop dissolves → game_over with taps as score.
  var BASE_PERIOD  = 1200;   // ms — starting loop period
  var PERIOD_ADD   = 600;    // ms added per tap
  var MAX_PERIOD   = 10000;  // ms — loop dissolves at this point
  var DIM_STEP     = 0.052;  // alpha added to darkness overlay per tap
  var MAX_TAPS     = Math.ceil((MAX_PERIOD - BASE_PERIOD) / PERIOD_ADD); // 15

  // Phases: intro | play | over | cta
  var phase, taps, period, loopT, runStartTs, overAt, ctaAt;
  var shakeAmt, zoom, hitStop;
  var flashes;
  var botRunsDone = 0, botTapsDone = 0, botMaxTaps = 0, botActive = false;

  function newGame() {
    phase      = 'intro';
    taps       = 0;
    period     = BASE_PERIOD;
    loopT      = 0;
    shakeAmt   = 0;
    zoom       = 1;
    hitStop    = 0;
    flashes    = [];
    overAt     = 0;
    ctaAt      = 0;
    runStartTs = 0;

    if (DEMO) {
      // Skip intro, go straight to play — demo arc: tap 8 times (deepen) then resolve
      startRun();
      return;
    }
    if (BOT) {
      startRun();
    }
  }

  function startRun() {
    phase      = 'play';
    taps       = 0;
    period     = BASE_PERIOD;
    loopT      = 0;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });

    if (BOT) {
      // Bot taps some amount then goes passive — loop eventually runs past its exit condition
      // We'll make bot tap between 3 and MAX_TAPS-2 times to eventually reach game_over
      botTapsDone = 0;
      botMaxTaps  = 3 + Math.floor(rng() * (MAX_TAPS - 5));
      botActive   = true;
    }
  }

  function doTap() {
    if (phase !== 'play') return;
    taps++;
    period += PERIOD_ADD;
    // calm sound — soft bell deeper with each tap
    if (window.J) J.calm(taps);
    // gentle zoom-pulse and mild shake on each tap
    zoom     = 1.018;
    shakeAmt = 1.5;
    // hit-stop: freeze 40ms
    hitStop  = 2.4; // frames at ~60fps
    // floating text — depth milestone labels
    var label = tapLabel(taps);
    if (label) flashText(label, TEAL, 32);
    // emit event
    if (window.LOOP) LOOP.emit('loop_slowed', { taps: taps, period_ms: Math.round(period) });
    // check win condition: loop dissolved
    if (period >= MAX_PERIOD) {
      finishRun(true);
    }
  }

  function tapLabel(n) {
    if (n === 3)  return 'SETTLING';
    if (n === 6)  return 'DEEPENING';
    if (n === 9)  return 'STILLNESS';
    if (n === 12) return 'DISSOLVING';
    return null;
  }

  // The loop "runs out" if the player stops tapping — after a grace period
  // of 2× the current loop period without a tap, the loop snaps back
  // and game_over fires (the loop was too fast to hold).
  var lastTapTime = 0;

  function checkIdle(now) {
    if (phase !== 'play') return;
    if (taps === 0) return; // haven't tapped yet, still on the first loop
    var timeSinceTap = now - lastTapTime;
    // If the player misses 2 full loops, the seamless loop "snaps" back
    var gracePeriod = period * 2;
    if (timeSinceTap > gracePeriod) {
      // the loop escaped back — near miss if close to dissolving
      if (taps >= MAX_TAPS - 3) {
        if (window.LOOP) LOOP.emit('near_miss', { taps: taps });
        flashText('SO CLOSE', SOFT_LAVENDER, 38);
      }
      finishRun(false);
    }
  }

  function finishRun(dissolved) {
    phase  = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    // calm: no death sound; gentle calm resolution tone
    if (window.J) J.calm(dissolved ? taps + 2 : taps);
    shakeAmt = dissolved ? 0 : 3;
    if (window.LOOP) LOOP.emit('game_over', { score: taps, dur_s: +dur.toFixed(1), dissolved: dissolved });
    window.__demoScore = taps;

    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
      return;
    }
    if (BOT) {
      botRunsDone++;
      botActive = false;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 800);
      }
    }
  }

  function resetRun() {
    taps     = 0;
    period   = BASE_PERIOD;
    loopT    = 0;
    flashes  = [];
    hitStop  = 0;
    shakeAmt = 0;
    zoom     = 1;
    lastTapTime = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flashText(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- demo autopilot ----
  // Calm arc: settle (taps 1-3) → deepen (4-6) → resolve (7-9) → soft invitation
  // Timed so the full arc is ~14s before game_over
  var demoTaps = [
    1200, 1800, 2200, 2700, 3300, 3900, 4600, 5400, 6400  // ms offsets from run start
  ];
  var demoTapIdx = 0;
  var demoStartTime = 0;

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 500, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'intro') { startRun(); lastTapTime = performance.now(); return; }
    if (phase === 'play') {
      lastTapTime = performance.now();
      doTap();
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 400) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: taps, unit: 'slowed' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') tap();
  });

  // ---- loop animation ----
  // A gentle circular/orbital pattern that represents the "feed loop"
  // As period grows, the motion slows; as dim increases, background darkens
  function drawLoop(now, dt) {
    loopT += dt * 16.667; // convert dt (frames) to ms
    var progress = (loopT % period) / period; // 0..1 within current loop
    var dim      = Math.min(1, (taps * DIM_STEP));
    var bg_alpha = dim * 0.88;

    // Background darkness — increases each tap
    if (bg_alpha > 0) {
      cx.fillStyle = 'rgba(11,13,18,' + bg_alpha + ')';
      cx.fillRect(0, 0, W, H);
    }

    var cx_ = W / 2, cy_ = H / 2;
    var angle = progress * Math.PI * 2;
    // brightness fades as we dim
    var brightness = 1 - dim * 0.7;
    var slowFactor = BASE_PERIOD / period; // 1 at start, shrinks toward 0

    // Outer ring — the "loop"
    var ringR = 120 + 30 * Math.sin(angle * 2);
    var ringAlpha = 0.18 + 0.25 * brightness;
    cx.beginPath();
    cx.arc(cx_, cy_, ringR, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(46,197,182,' + ringAlpha + ')';
    cx.lineWidth = 1.5 + (1 - slowFactor) * 3;
    cx.stroke();

    // Orbiting dot — the content piece looping
    var dotX = cx_ + Math.cos(angle) * ringR;
    var dotY = cy_ + Math.sin(angle) * ringR;
    var dotR = 8 + (1 - slowFactor) * 6;
    var dotAlpha = 0.55 + 0.45 * brightness;

    // glow
    var grd = cx.createRadialGradient(dotX, dotY, 0, dotX, dotY, dotR * 3);
    grd.addColorStop(0, 'rgba(46,197,182,' + (dotAlpha * 0.7) + ')');
    grd.addColorStop(1, 'rgba(46,197,182,0)');
    cx.fillStyle = grd;
    cx.beginPath();
    cx.arc(dotX, dotY, dotR * 3, 0, Math.PI * 2);
    cx.fill();

    // dot core
    cx.beginPath();
    cx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(46,197,182,' + dotAlpha + ')';
    cx.fill();

    // Secondary inner ring — the "feed" pattern
    var inner = 55 + 12 * Math.sin(angle * 3 + 1.2);
    var innerAlpha = 0.1 + 0.12 * brightness;
    cx.beginPath();
    cx.arc(cx_, cy_, inner, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(155,142,196,' + innerAlpha + ')';
    cx.lineWidth = 1;
    cx.stroke();

    // Inner orbiting dot — the sub-loop
    var innerDotX = cx_ + Math.cos(-angle * 1.5 + Math.PI) * inner;
    var innerDotY = cy_ + Math.sin(-angle * 1.5 + Math.PI) * inner;
    cx.beginPath();
    cx.arc(innerDotX, innerDotY, 4, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(155,142,196,' + (innerAlpha * 2.5) + ')';
    cx.fill();

    // Period label — shows how slow the loop is
    var secs = (period / 1000).toFixed(1);
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,' + (0.18 * brightness + 0.05) + ')';
    cx.font = '500 12px Menlo, monospace';
    cx.fillText(secs + 's loop', W / 2, H / 2 + 170);

    // Tap prompt pulse — dims as the loop deepens
    var promptAlpha = Math.max(0, 0.5 * brightness) * (0.5 + 0.5 * Math.sin(now / 800));
    if (promptAlpha > 0.04 && taps < MAX_TAPS - 1) {
      cx.fillStyle = 'rgba(46,197,182,' + promptAlpha + ')';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO SLOW', W / 2, H / 2 + 200);
    }
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // === juice: decay ===
    shakeAmt *= Math.pow(0.80, dt);
    zoom     += (1 - zoom) * 0.14 * dt;

    // === autopilots (before hitStop gate) ===
    // DEMO: fire taps at scripted times
    if (DEMO && phase === 'play') {
      if (demoStartTime === 0) demoStartTime = now;
      var elapsed = now - demoStartTime;
      while (demoTapIdx < demoTaps.length && elapsed >= demoTaps[demoTapIdx]) {
        lastTapTime = now;
        doTap();
        demoTapIdx++;
        if (phase !== 'play') break;
      }
    }

    // BOT: tap at intervals proportional to current period, then go passive
    if (BOT && phase === 'play' && botActive) {
      if (botTapsDone < botMaxTaps) {
        // tap roughly once per loop with some jitter
        var timeSinceLast = now - lastTapTime;
        var targetInterval = period * (0.85 + rng() * 0.3);
        if (lastTapTime === 0) { targetInterval = period * 0.6; }
        if (timeSinceLast >= targetInterval) {
          lastTapTime = now;
          doTap();
          botTapsDone++;
          if (phase !== 'play') botActive = false;
        }
      } else {
        // Bot has stopped tapping — idle so the checkIdle timer fires game_over
        botActive = false;
      }
    }

    // hit-stop: freeze sim (decay it so autopilot isn't gated forever)
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      // idle check — fires game_over if player missed loops
      if (phase === 'play' && lastTapTime > 0) checkIdle(now);
    }

    // === draw ===
    cx.save();
    // juice transforms
    if (shakeAmt > 0.1 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shakeAmt * 2;
      var sy = (rng() - 0.5) * shakeAmt * 2;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    // soft gradient
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(155,142,196,0.04)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    if (phase === 'intro') {
      drawIntro(now);
    } else if (phase === 'play') {
      drawLoop(now, dt);
      drawHUD(now);
    } else if (phase === 'over') {
      drawLoop(now, dt);
      drawOver(now);
    } else if (phase === 'cta') {
      drawCTA(now);
    }

    // floating reward texts
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 60 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.globalAlpha = 0.45;
      cx.textAlign = 'center';
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawIntro(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.88)';
    cx.font = '800 38px -apple-system, Helvetica, Arial';
    cx.fillText('SLOW THE LOOP', W / 2, H / 2 - 40);
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '400 16px -apple-system, Helvetica, Arial';
    cx.fillText('tap to stretch the loop longer', W / 2, H / 2 + 4);
    cx.fillText('until it stops.', W / 2, H / 2 + 28);
    var pulse = 0.55 + 0.45 * Math.sin(now / 500);
    cx.globalAlpha = pulse;
    cx.fillStyle = TEAL;
    cx.font = '600 15px -apple-system, Helvetica, Arial';
    cx.fillText('TAP TO BEGIN', W / 2, H / 2 + 80);
    cx.globalAlpha = 1;
  }

  function drawHUD(now) {
    // tap count top center
    cx.textAlign = 'center';
    var dimAlpha = Math.max(0.12, 0.9 - taps * DIM_STEP * 0.9);
    cx.fillStyle = 'rgba(255,255,255,' + dimAlpha + ')';
    cx.font = '700 52px -apple-system, Helvetica, Arial';
    cx.fillText(taps, W / 2, 90);
    cx.fillStyle = 'rgba(255,255,255,' + (dimAlpha * 0.5) + ')';
    cx.font = '500 12px -apple-system, Helvetica, Arial';
    cx.fillText('slows', W / 2, 112);
    // dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
      cx.fillStyle = GOLD;
      cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 140);
    }
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.52)';
    cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    var dissolved = period >= MAX_PERIOD;
    if (dissolved) {
      cx.fillStyle = TEAL;
      cx.font = '800 36px -apple-system, Helvetica, Arial';
      cx.fillText('LOOP DISSOLVED', W / 2, H / 2 - 70);
    } else {
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '700 30px -apple-system, Helvetica, Arial';
      cx.fillText('LOOP ESCAPED', W / 2, H / 2 - 70);
    }
    cx.fillStyle = '#fff';
    cx.font = '800 58px -apple-system, Helvetica, Arial';
    cx.fillText(taps, W / 2, H / 2 - 10);
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '500 14px -apple-system, Helvetica, Arial';
    cx.fillText('slows', W / 2, H / 2 + 18);

    if (!DEMO && !BOT) {
      var p = 0.6 + 0.4 * Math.sin(now / 400);
      cx.globalAlpha = p;
      cx.fillStyle = TEAL;
      cx.font = '600 16px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — TRY AGAIN', W / 2, H / 2 + 66);
      cx.globalAlpha = 1;
      // share pill
      cx.fillStyle = 'rgba(242,177,52,0.12)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  function drawCTA(now) {
    var t = (now - ctaAt) / 1000;
    var ease = Math.min(1, t * 2.0);
    // fully dark — the loop is gone
    cx.fillStyle = 'rgba(11,13,18,' + (0.95 * ease) + ')';
    cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    // soft teal title
    cx.fillStyle = TEAL;
    cx.font = '800 34px -apple-system, Helvetica, Arial';
    cx.fillText('SLOW THE LOOP', W / 2, H / 2 - 80);
    cx.fillStyle = 'rgba(255,255,255,0.7)';
    cx.font = '400 17px -apple-system, Helvetica, Arial';
    cx.fillText('the feed that ends.', W / 2, H / 2 - 42);
    cx.fillText('yours took ' + (window.__demoScore || taps) + ' slows.', W / 2, H / 2 - 16);
    var p = 0.7 + 0.3 * Math.sin(now / 320);
    cx.fillStyle = TEAL;
    cx.globalAlpha = ease * p;
    cx.font = '700 22px -apple-system, Helvetica, Arial';
    cx.fillText('▶ REACH IT', W / 2, H / 2 + 42);
    cx.globalAlpha = ease;
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '500 14px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, H / 2 + 80);
    cx.globalAlpha = 1;
  }

  // ---- init ----
  newGame();
  requestAnimationFrame(frame);
})();
</script>
