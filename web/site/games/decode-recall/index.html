<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- Word bank ----
  var WORDS_SHORT  = ['CAT','SUN','MAP','RUN','KEY','HIT','FOX','JAW'];
  var WORDS_MED    = ['STAR','BLOW','GRIP','TREK','PUMP','CLAN','GUST','FLAW'];
  var WORDS_LONG   = ['SPEED','BLAZE','FROST','CRUSH','DRIFT','PERCH','STRIVE','RHYTHM','PHANTOM','BLOSSOM'];

  // 12 symbol draw functions
  function drawSymbol(x, y, sz, symIdx, color) {
    cx.save();
    cx.translate(x, y);
    cx.strokeStyle = color;
    cx.fillStyle   = color;
    cx.lineWidth   = 2;
    cx.lineCap = 'round'; cx.lineJoin = 'round';
    var h = sz * 0.5;
    switch (symIdx % 12) {
      case 0:  // triangle
        cx.beginPath(); cx.moveTo(0,-h); cx.lineTo(h,h); cx.lineTo(-h,h); cx.closePath(); cx.stroke(); break;
      case 1:  // circle
        cx.beginPath(); cx.arc(0,0,h,0,Math.PI*2); cx.stroke(); break;
      case 2:  // diamond
        cx.beginPath(); cx.moveTo(0,-h); cx.lineTo(h,0); cx.lineTo(0,h); cx.lineTo(-h,0); cx.closePath(); cx.stroke(); break;
      case 3:  // X
        cx.beginPath(); cx.moveTo(-h,-h); cx.lineTo(h,h); cx.moveTo(h,-h); cx.lineTo(-h,h); cx.stroke(); break;
      case 4:  // square
        cx.strokeRect(-h,-h,sz,sz); break;
      case 5:  // plus
        cx.beginPath(); cx.moveTo(0,-h); cx.lineTo(0,h); cx.moveTo(-h,0); cx.lineTo(h,0); cx.stroke(); break;
      case 6:  // 5-pointed star
        cx.beginPath();
        for (var p=0;p<5;p++){
          var a0=(p/5)*Math.PI*2-Math.PI/2, a1=((p+0.5)/5)*Math.PI*2-Math.PI/2;
          cx[p===0?'moveTo':'lineTo'](Math.cos(a0)*h,Math.sin(a0)*h);
          cx.lineTo(Math.cos(a1)*h*0.42,Math.sin(a1)*h*0.42);
        }
        cx.closePath(); cx.stroke(); break;
      case 7:  // arrow right
        cx.beginPath(); cx.moveTo(-h,0); cx.lineTo(h,0);
        cx.moveTo(h*0.3,-h*0.5); cx.lineTo(h,0); cx.lineTo(h*0.3,h*0.5); cx.stroke(); break;
      case 8:  // lightning
        cx.beginPath(); cx.moveTo(-h,-h*0.3); cx.lineTo(0,-h*0.3); cx.lineTo(-h*0.3,h*0.3); cx.lineTo(h,h*0.3); cx.stroke(); break;
      case 9:  // two concentric arcs
        cx.beginPath(); cx.arc(0,0,h,0.4,Math.PI*2-0.4); cx.stroke();
        cx.beginPath(); cx.arc(0,0,h*0.5,0.4,Math.PI*2-0.4); cx.stroke(); break;
      case 10: // zig-zag
        cx.beginPath(); cx.moveTo(-h,0); cx.lineTo(-h*0.33,-h); cx.lineTo(h*0.33,h); cx.lineTo(h,0); cx.stroke(); break;
      case 11: // moon
        cx.beginPath(); cx.arc(0,0,h,0.55,Math.PI*2-0.55); cx.stroke();
        cx.fillStyle=INK; cx.beginPath(); cx.arc(h*0.28,0,h*0.72,0.3,Math.PI*2-0.3); cx.fill(); break;
    }
    cx.restore();
  }

  // ---- Cipher helpers ----
  var ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  function buildCipher(lettersNeeded, cipherSize) {
    var needed = lettersNeeded.slice();
    // Fill remaining slots with random unused letters
    var remaining = ALPHA.filter(function(l){ return needed.indexOf(l)===-1; });
    for (var i = 0; i < cipherSize - needed.length; i++) {
      var ri = Math.floor(rng() * remaining.length);
      needed.push(remaining.splice(ri,1)[0]);
    }
    // Shuffle
    for (var k=needed.length-1;k>0;k--){
      var j=Math.floor(rng()*(k+1)); var t=needed[k]; needed[k]=needed[j]; needed[j]=t;
    }
    var cipher={}, rev={};
    for (var s=0;s<needed.length;s++){ cipher[s]=needed[s]; rev[needed[s]]=s; }
    return {cipher:cipher, rev:rev, size:needed.length, pairs:needed.map(function(l,i){return{sym:i,letter:l};})};
  }

  // ---- Game state ----
  var state, flashes, hitStop, zoom, shakeAmt, dareBeaten, runStartTs;
  var best = 0;
  try { best = +localStorage.getItem('dr_best') || 0; } catch(_){}

  // Bot tracking
  var botRunsDone = 0;
  // Demo tracking
  var demoWordIdx = 0;
  var demoNearFailDone = false;

  function newGame() {
    rng = mulberry32(SEED);
    botRunsDone = 0;
    demoWordIdx = 0;
    demoNearFailDone = false;
    state = makeRunState();
    flashes=[]; hitStop=0; zoom=1; shakeAmt=0; dareBeaten=false;

    if (DEMO) {
      state.phase = 'challenge';
      setTimeout(startRound, 1250);
      return;
    }
    if (BOT) {
      startRound();
      return;
    }
    // human: show title
    state.phase = 'title';
  }

  function makeRunState() {
    return {
      phase: 'title',
      round: 0,
      score: 0,
      lives: 3,    // mistakes allowed per word (lose one per wrong tap)
      totalMistakes: 0,
      word: '',
      cipher: null, rev: null, pairs: [],
      studyTimer: 0, studyDur: 0,
      typed: [],
      wrongFlash: 0,
      overAt: 0, ctaAt: 0,
      combo: 0,
      // demo/bot state
      botMistakeCount: 0,
      _demoPhase: 0  // 0=normal, 1=near-fail injected, 2=death run
    };
  }

  // words chosen per round for demo
  var DEMO_WORDS = ['CAT','STAR','SPEED','CRUSH','BLAZE','STRIVE','PHANTOM'];

  function pickWord(round) {
    if (DEMO) return DEMO_WORDS[Math.min(demoWordIdx++, DEMO_WORDS.length-1)];
    if (round < 3) return WORDS_SHORT[Math.floor(rng()*WORDS_SHORT.length)];
    if (round < 6) return WORDS_MED[Math.floor(rng()*WORDS_MED.length)];
    return WORDS_LONG[Math.floor(rng()*WORDS_LONG.length)];
  }

  function cipherSize(round) {
    return Math.min(12, 6 + Math.floor(round/2)*2);
  }
  function studyDur(round) {
    // In demo/bot, study very briefly so the clip stays within time budget
    if (DEMO || BOT) return 1400;
    return Math.max(6000, 10000 - round*350);
  }

  function startRound() {
    state.round++;
    state.lives = 3;
    state.typed = [];
    state.wrongFlash = 0;
    state.combo = 0;
    state.botMistakeCount = 0;

    var word = pickWord(state.round);
    state.word = word;

    // collect unique letters
    var letters = [];
    for (var i=0;i<word.length;i++){
      if (letters.indexOf(word[i])===-1) letters.push(word[i]);
    }
    var cs = cipherSize(state.round);
    var cObj = buildCipher(letters, cs);
    state.cipher = cObj.cipher; state.rev = cObj.rev; state.pairs = cObj.pairs;

    state.studyDur  = studyDur(state.round);
    state.studyTimer = state.studyDur;
    state.phase = 'study';

    if (state.round === 1) {
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', {seed:SEED});
    }
    if (window.J) J.tension(Math.min((state.round-1)/8, 1));
  }

  function inputLetter(letter) {
    if (state.phase !== 'recall') return;
    var expected = state.word[state.typed.length];
    if (letter === expected) {
      state.typed.push(letter);
      state.combo++;
      if (window.J) J.hit(state.combo);
      flash('+' + (10 * state.round), TEAL, 26);
      if (state.typed.length === state.word.length) {
        wordComplete();
      }
    } else {
      state.lives--;
      state.totalMistakes++;
      state.wrongFlash = 20;
      state.combo = 0;
      shakeAmt = 5;
      if (window.J) J.near();
      flash('✗', VERM, 34);
      if (window.LOOP) LOOP.emit('near_miss', {round:state.round, idx:state.typed.length});
      if (state.lives <= 0) {
        gameOver();
      }
    }
  }

  function wordComplete() {
    var points = state.word.length * 10 * state.round;
    state.score += points;
    if (window.J) J.perfect(state.round);
    hitStop = 5; zoom = 1.03;
    flash('✓ +' + points, GOLD, 32);
    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare!==null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN!', TEAL, 38);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    if (window.LOOP) LOOP.emit('word_solved', {round:state.round, word:state.word, score:state.score});
    state.phase = 'transition';
    setTimeout(function(){
      if (state.phase === 'transition') startRound();
    }, 700);
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.round/10, 1));
      if (newBest) setTimeout(function(){ J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('dr_best', String(best)); } catch(_){} }
    if (window.LOOP) LOOP.emit('game_over', {score:state.score, dur_s:+(dur).toFixed(1)});
    if (DEMO) {
      setTimeout(function(){
        state.phase = 'cta';
        state.ctaAt = performance.now();
        setTimeout(function(){ window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function(){ resetRun(); }, 500);
      }
    }
  }

  function resetRun() {
    demoWordIdx = 0;
    demoNearFailDone = false;
    state = makeRunState();
    flashes=[]; hitStop=0; zoom=1; shakeAmt=0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRound();
  }

  function flash(txt, color, size) {
    flashes.push({txt:txt, color:color, size:size, t:0});
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score/80))));
  }

  // ---- Input ----
  var MUTE_R  = {x:W-46, y:10, w:38, h:38};
  var SHARE_R = {x:W/2-125, y:486, w:250, h:46};
  function inR(r,x,y){ return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x!==undefined && inR(MUTE_R,x,y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title')  { startRound(); return; }
    if (state.phase === 'recall') { tapKey(x, y); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x!==undefined && inR(SHARE_R,x,y) && window.SHARE) {
        SHARE.send({score:state.score, unit:'words'}); return;
      }
      rng = mulberry32(SEED);
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function(e){
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function(e){
    if (state.phase==='recall') {
      var k = e.key.toUpperCase();
      if (k.length===1 && k>='A' && k<='Z') inputLetter(k);
    } else if (e.code==='Space') tap();
  });

  // ---- Keyboard layout ----
  var KEY_COLS = 4;
  var KEY_W = 86, KEY_H = 58, KEY_GAP = 7;
  var KEY_START_X = (W - (KEY_COLS * KEY_W + (KEY_COLS-1)*KEY_GAP)) / 2;
  var KEY_START_Y = 478;

  function getKeyRect(idx) {
    var col = idx % KEY_COLS, row = Math.floor(idx/KEY_COLS);
    return { x: KEY_START_X + col*(KEY_W+KEY_GAP), y: KEY_START_Y + row*(KEY_H+KEY_GAP), w: KEY_W, h: KEY_H };
  }

  function tapKey(kx, ky) {
    for (var i=0; i<state.pairs.length; i++) {
      var r = getKeyRect(i);
      if (kx>=r.x && kx<=r.x+r.w && ky>=r.y && ky<=r.y+r.h) {
        inputLetter(state.pairs[i].letter); return;
      }
    }
  }

  // ---- Demo / Bot autopilot ----
  // Called every frame when hitStop<=0 and phase is study or recall
  var autopilotWait = 0;

  function autopilot(dt) {
    if (!DEMO && !BOT) return;
    if (autopilotWait > 0) { autopilotWait -= dt; return; }

    if (state.phase === 'study') {
      // Just wait — study timer handles transition to recall
      return;
    }

    if (state.phase !== 'recall') return;

    var round = state.round;
    var nextLetter = state.word[state.typed.length];
    if (!nextLetter) return;

    if (DEMO) {
      // Mirror-neuron arc:
      // Round 2: inject one wrong tap (near-fail) then recover
      if (round === 2 && state.typed.length === 1 && !demoNearFailDone) {
        demoNearFailDone = true;
        var wrong = null;
        for (var i=0; i<state.pairs.length; i++) {
          if (state.pairs[i].letter !== nextLetter) { wrong=state.pairs[i].letter; break; }
        }
        if (wrong) { inputLetter(wrong); autopilotWait = 50; return; }
      }
      // Round 4: die — pump 3 wrong taps quickly
      if (round === 4) {
        var badLetter = null;
        for (var j=0; j<state.pairs.length; j++) {
          if (state.pairs[j].letter !== nextLetter) { badLetter=state.pairs[j].letter; break; }
        }
        if (badLetter) { inputLetter(badLetter); autopilotWait = 20; return; }
      }
      // Normal typing with human-feeling hesitation
      var delay = 20 + Math.floor(rng() * 25);
      autopilotWait = delay;
      inputLetter(nextLetter);
    }

    if (BOT) {
      // Bot plays mostly correctly but makes 3 mistakes per word, then dies
      // After BOT_MAX_ROUNDS rounds, force mistakes to kill run
      var BOT_SURVIVE_ROUNDS = 4; // survive up to 4 rounds per run
      var shouldFail = round > BOT_SURVIVE_ROUNDS;
      if (shouldFail || state.botMistakeCount < 3 && Math.floor(rng()*5) === 0) {
        // Make a mistake
        var bl = null;
        for (var k=0; k<state.pairs.length; k++) {
          if (state.pairs[k].letter !== nextLetter) { bl=state.pairs[k].letter; break; }
        }
        if (bl && !shouldFail) {
          state.botMistakeCount++;
          inputLetter(bl); autopilotWait = 12; return;
        }
        if (shouldFail && bl) {
          inputLetter(bl); autopilotWait = 15; return;
        }
      }
      // Type correctly
      var d = 8 + Math.floor(rng() * 15);
      autopilotWait = d;
      inputLetter(nextLetter);
    }
  }

  // ---- Draw ----
  function drawCipherTable() {
    var pairs = state.pairs;
    if (!pairs || !pairs.length) return;
    var cols = 3;
    var cellW = 114, cellH = 36;
    var gridW = cols * cellW;
    var sx = (W - gridW) / 2;
    var sy = 138;
    for (var i=0; i<pairs.length; i++) {
      var col = i%cols, row = Math.floor(i/cols);
      var cx2 = sx + col*cellW + 14;
      var cy2 = sy + row*cellH + cellH/2;
      drawSymbol(cx2, cy2, 17, pairs[i].sym, 'rgba(255,255,255,0.82)');
      cx.fillStyle = 'rgba(255,255,255,0.28)';
      cx.font = '600 12px Menlo, monospace'; cx.textAlign='left';
      cx.fillText('→', cx2+14, cy2+5);
      cx.fillStyle = TEAL;
      cx.font = '700 19px Menlo, monospace';
      cx.fillText(pairs[i].letter, cx2+30, cy2+7);
    }
  }

  function drawWordInSymbols(yPos) {
    var word = state.word;
    if (!word || !state.rev) return;
    var sz = 21, gap = 46;
    var totalW = word.length * gap;
    var sx = W/2 - totalW/2 + gap/2;
    for (var i=0; i<word.length; i++) {
      var sym = state.rev[word[i]];
      var color = state.typed[i] ? GOLD : 'rgba(255,255,255,0.85)';
      drawSymbol(sx + i*gap, yPos, sz, sym, color);
      cx.strokeStyle = state.typed[i] ? GOLD : 'rgba(255,255,255,0.3)';
      cx.lineWidth=1.5;
      cx.beginPath(); cx.moveTo(sx+i*gap-15,yPos+sz); cx.lineTo(sx+i*gap+15,yPos+sz); cx.stroke();
    }
  }

  function drawTypedLetters(yPos) {
    var word = state.word, gap = 46;
    var totalW = word.length * gap;
    var sx = W/2 - totalW/2 + gap/2;
    cx.textAlign='center';
    for (var i=0; i<word.length; i++) {
      var letter = state.typed[i];
      if (letter) {
        cx.fillStyle=GOLD; cx.font='700 21px Menlo, monospace';
        cx.fillText(letter, sx+i*gap, yPos+6);
      } else if (i===state.typed.length) {
        var blink = Math.sin(performance.now()/200)>0;
        if (blink){ cx.fillStyle=TEAL; cx.font='700 21px Menlo, monospace'; cx.fillText('_', sx+i*gap, yPos+6); }
      }
    }
  }

  function drawKeyboard() {
    cx.textAlign='center';
    for (var i=0; i<state.pairs.length; i++) {
      var r = getKeyRect(i);
      var isNext = state.pairs[i].letter === state.word[state.typed.length];
      cx.fillStyle = isNext ? 'rgba(46,197,182,0.14)' : 'rgba(255,255,255,0.06)';
      cx.strokeStyle = isNext ? 'rgba(46,197,182,0.55)' : 'rgba(255,255,255,0.13)';
      cx.lineWidth=1.2;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(r.x,r.y,r.w,r.h,8); else cx.rect(r.x,r.y,r.w,r.h);
      cx.fill(); cx.stroke();
      drawSymbol(r.x+20, r.y+r.h/2, 13, state.pairs[i].sym, isNext?TEAL:'rgba(255,255,255,0.65)');
      cx.fillStyle = isNext ? TEAL : 'rgba(255,255,255,0.5)';
      cx.font='600 15px Menlo, monospace';
      cx.fillText(state.pairs[i].letter, r.x+r.w*0.7, r.y+r.h*0.63);
    }
  }

  function drawLives() {
    cx.textAlign='left'; cx.font='18px -apple-system, Helvetica, Arial';
    for (var i=0; i<3; i++) {
      cx.globalAlpha = i<state.lives ? 1 : 0.2;
      cx.fillStyle=VERM; cx.fillText('♥', 20+i*26, 33);
    }
    cx.globalAlpha=1;
  }

  function drawStudyBar(progress) {
    var bx=20, by=H-18, bw=W-40, bh=5;
    cx.fillStyle='rgba(255,255,255,0.09)';
    cx.beginPath(); if(cx.roundRect)cx.roundRect(bx,by,bw,bh,3); else cx.rect(bx,by,bw,bh); cx.fill();
    cx.fillStyle = progress>0.35 ? TEAL : VERM;
    cx.beginPath();
    var fw = bw * Math.max(0, progress);
    if(cx.roundRect)cx.roundRect(bx,by,fw,bh,3); else cx.rect(bx,by,fw,bh);
    cx.fill();
  }

  // ---- Main render loop ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // study timer
    if (state.phase === 'study') {
      state.studyTimer -= 16.667 * dt;
      if (state.studyTimer <= 0) {
        state.phase = 'recall';
        autopilotWait = 30; // short pause before bot starts typing
        if (window.J) J.tension(Math.min(state.round/6, 1));
      }
    }

    // hitStop decay + autopilot
    if (hitStop > 0) { hitStop -= dt; }
    else { autopilot(dt); }

    // juice
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx2 = (Math.random()-0.5)*shakeAmt, sy2 = (Math.random()-0.5)*shakeAmt;
      cx.translate(W/2+sx2, H/2+sy2); cx.scale(zoom,zoom); cx.translate(-W/2,-H/2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1-zoom) * 0.12 * dt;

    // bg
    cx.fillStyle=INK; cx.fillRect(-20,-20,W+40,H+40);
    var bg=cx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'rgba(46,197,182,0.05)');
    bg.addColorStop(1,'rgba(232,80,46,0.06)');
    cx.fillStyle=bg; cx.fillRect(0,0,W,H);

    // ---- TITLE ----
    if (state.phase==='title') {
      cx.textAlign='center';
      cx.fillStyle='#fff'; cx.font='900 40px -apple-system, Helvetica, Arial';
      cx.fillText('DECODE RECALL', W/2, 255);
      cx.fillStyle='rgba(255,255,255,0.45)'; cx.font='600 15px -apple-system, Helvetica, Arial';
      cx.fillText('memorize the cipher. decode the word.', W/2, 292);
      cx.fillStyle='rgba(255,255,255,0.25)'; cx.font='600 13px -apple-system, Helvetica, Arial';
      cx.fillText('can you hold it long enough to crack it?', W/2, 316);
      var pulse = 0.6 + 0.4*Math.sin(now/300);
      cx.globalAlpha=pulse; cx.fillStyle=VERM; cx.font='700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W/2, 368); cx.globalAlpha=1;
    }

    // ---- CHALLENGE CARD ----
    if (state.phase==='challenge') {
      cx.textAlign='center';
      cx.fillStyle='rgba(255,255,255,0.5)'; cx.font='800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 298);
      cx.fillStyle=GOLD; cx.font='900 96px -apple-system, Helvetica, Arial';
      cx.fillText('140', W/2, 398);
      cx.fillStyle='rgba(255,255,255,0.35)'; cx.font='600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W/2, 430);
    }

    // ---- STUDY ----
    if (state.phase==='study') {
      cx.textAlign='center';
      cx.fillStyle='rgba(255,255,255,0.38)'; cx.font='700 13px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + state.round + '  ·  SCORE ' + state.score, W/2, 48);
      cx.fillStyle=TEAL; cx.font='800 14px Menlo, monospace';
      cx.fillText('MEMORIZE THE CIPHER', W/2, 112);
      drawCipherTable();
      drawStudyBar(state.studyTimer / state.studyDur);
      drawLives();
      cx.fillStyle='rgba(255,255,255,0.88)'; cx.font='800 34px -apple-system, Helvetica, Arial';
      cx.textAlign='right'; cx.fillText(state.score, W-18, 44); cx.textAlign='center';
    }

    // ---- RECALL ----
    if (state.phase==='recall') {
      cx.textAlign='center';
      cx.fillStyle='rgba(255,255,255,0.38)'; cx.font='700 13px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + state.round + '  ·  SCORE ' + state.score, W/2, 48);
      cx.fillStyle=VERM; cx.font='800 14px Menlo, monospace';
      cx.fillText('DECODE FROM MEMORY', W/2, 88);
      drawWordInSymbols(158);
      drawTypedLetters(202);
      if (state.wrongFlash > 0) {
        cx.fillStyle='rgba(232,80,46,' + (state.wrongFlash/20)*0.28+')';
        cx.fillRect(0,0,W,H);
        state.wrongFlash = Math.max(0, state.wrongFlash - dt*2);
      }
      drawKeyboard();
      drawLives();
      cx.fillStyle='rgba(255,255,255,0.88)'; cx.font='800 34px -apple-system, Helvetica, Arial';
      cx.textAlign='right'; cx.fillText(state.score, W-18, 44); cx.textAlign='center';
      if (!DEMO && !BOT && window.SHARE && SHARE.dare!==null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font='800 13px -apple-system, Helvetica, Arial'; cx.textAlign='center';
        cx.fillText(dareBeaten?'DARE BEATEN ✓':'BEAT '+SHARE.dare+(SHARE.by?' — dared by '+SHARE.by:''), W/2, 70);
      }
    }

    // ---- TRANSITION ----
    if (state.phase==='transition') {
      cx.textAlign='center';
      cx.fillStyle=GOLD; cx.font='900 50px -apple-system, Helvetica, Arial';
      cx.fillText('✓', W/2, H/2-30);
      cx.fillStyle='rgba(255,255,255,0.7)'; cx.font='700 24px Menlo, monospace';
      cx.fillText(state.word, W/2, H/2+24);
    }

    // ---- GAME OVER ----
    if (state.phase==='over') {
      cx.fillStyle='rgba(11,13,18,0.6)'; cx.fillRect(0,0,W,H);
      cx.textAlign='center';
      cx.fillStyle=VERM; cx.font='900 38px -apple-system, Helvetica, Arial';
      cx.fillText('MIND BLANK.', W/2, 292);
      cx.fillStyle='#fff'; cx.font='800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' pts', W/2, 337);
      var pt=pctTop(state.score);
      cx.fillStyle=GOLD; cx.font='900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP '+pt+'% TODAY', W/2, 382);
      cx.fillStyle='rgba(255,255,255,0.5)'; cx.font='600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than '+(100-pt)+'% of players', W/2, 406);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4*Math.sin(now/280);
        cx.globalAlpha=p2; cx.fillStyle=TEAL; cx.font='700 15px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — CRACK ANOTHER', W/2, 454); cx.globalAlpha=1;
        cx.fillStyle='rgba(242,177,52,0.14)'; cx.strokeStyle=GOLD; cx.lineWidth=1.5;
        cx.beginPath();
        if(cx.roundRect)cx.roundRect(SHARE_R.x,SHARE_R.y,SHARE_R.w,SHARE_R.h,23); else cx.rect(SHARE_R.x,SHARE_R.y,SHARE_R.w,SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle=GOLD; cx.font='800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE&&SHARE.dare!==null&&dareBeaten?'⚡ DARE THEM BACK':'⚡ DARE A FRIEND', W/2, SHARE_R.y+30);
      }
    }

    // ---- CTA ----
    if (state.phase==='cta') {
      var tCTA=(now-state.ctaAt)/1000, ease=Math.min(1,tCTA*2.2);
      cx.fillStyle='rgba(11,13,18,'+(0.78*ease)+')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha=ease; cx.textAlign='center';
      cx.fillStyle='#fff'; cx.font='900 38px -apple-system, Helvetica, Arial';
      cx.fillText('DECODE RECALL', W/2, 290);
      cx.fillStyle='rgba(255,255,255,0.7)'; cx.font='700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they scored '+(window.__demoScore||140)+'. your cipher.', W/2, 328);
      var p3=0.7+0.3*Math.sin(now/240);
      cx.fillStyle=VERM; cx.globalAlpha=ease*p3; cx.font='900 28px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT '+(window.__demoScore||140), W/2, 397);
      cx.globalAlpha=ease; cx.fillStyle=TEAL; cx.font='700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 430);
      cx.globalAlpha=1;
    }

    // flashes
    for (var k=flashes.length-1; k>=0; k--) {
      var fl=flashes[k]; fl.t+=dt;
      var fa=Math.max(0,1-fl.t/40);
      cx.globalAlpha=fa; cx.textAlign='center'; cx.fillStyle=fl.color;
      cx.font='900 '+(fl.size+fl.t*0.4)+'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 240-fl.t*0.7);
      cx.globalAlpha=1;
      if (fl.t>40) flashes.splice(k,1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign='center'; cx.globalAlpha=0.5;
      cx.font='16px -apple-system, Helvetica, Arial'; cx.fillStyle='#fff';
      cx.fillText(J.muted?'🔇':'🔊', MUTE_R.x+MUTE_R.w/2, MUTE_R.y+26);
      cx.globalAlpha=1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
