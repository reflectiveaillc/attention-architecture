<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deck Build — Tilt</title>
<!--
  LOOP / attention-architecture — Deck Build
  Circuits: 06 Zeigarnik (incomplete set pulls), 01 RPE (which type next),
            08 investment (every kept card is a sunk step).
  Modes:
    ?demo=1&seed=7        scripted run for clip capture, sets window.__demoDone
    ?bot=1&runs=3&seed=5  imperfect autoplay for traffic sim, sets window.__botDone
    ?clip=ID&src=tiktok   attribution (see js/loop-events.js)
    ?sink=URL             event sink override
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'deck-build';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var TYPES = [
    { name: 'FIRE',  color: '#e8502e', glyph: 'triangle' },
    { name: 'AQUA',  color: '#2ec5b6', glyph: 'circle'   },
    { name: 'GOLD',  color: '#f2b134', glyph: 'star'     },
    { name: 'LEAF',  color: '#66bb6a', glyph: 'diamond'  },
    { name: 'WIND',  color: '#81d4fa', glyph: 'swirl'    },
    { name: 'STONE', color: '#a1887f', glyph: 'square'   },
    { name: 'VOID',  color: '#ab47bc', glyph: 'pentagon' },
    { name: 'ICE',   color: '#e0f7fa', glyph: 'hexagon'  },
    { name: 'BOLT',  color: '#ffeb3b', glyph: 'bolt'     },
    { name: 'SOUL',  color: '#f48fb1', glyph: 'heart'    }
  ];
  var CARD_W = 120, CARD_H = 160;
  var SLOT_W = 60, SLOT_H = 80;
  var CENTER_X = W / 2, CENTER_Y = H / 2 - 35;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR = +qs.get('err') || 12;
  var SEED = +qs.get('seed') || 42;

  // ---- RNG ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  // ---- canvas setup ----
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // ---- state ----
  var state, drawPile, deck, discards;
  var current, animCard, nextDelay;
  var runStartTs, overAt, challengeAt = 0, ctaAt = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var flashes = [];
  var best = 0;
  try { best = +localStorage.getItem('db_best') || 0; } catch (_) {}

  function newGame() {
    state = { phase: 'title', score: 0, dur: 0, win: false, bustType: null };
    drawPile = []; deck = new Array(10).fill(null); discards = new Array(10).fill(0);
    current = null; animCard = null; nextDelay = 0; dareBeaten = false;
    flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    buildDrawPile();
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1200);
    } else if (BOT) {
      startRun();
    }
  }

  function buildDrawPile() {
    var base = [];
    for (var i = 0; i < TYPES.length; i++) { base.push(i, i); }
    // Fisher-Yates with seeded rng
    for (var j = base.length - 1; j > 0; j--) {
      var k = Math.floor(rng() * (j + 1));
      var tmp = base[j]; base[j] = base[k]; base[k] = tmp;
    }
    drawPile = base;
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    demoIdx = 0; demoWait = demoWaits[0]; demoHover = null; nearFailDone = false;
    botWait = 0; botRunsDone = 0;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    nextCard();
  }

  function nextCard() {
    if (drawPile.length === 0 || state.phase !== 'play') return;
    var t = drawPile.pop();
    current = {
      type: t,
      x: W + CARD_W,
      y: CENTER_Y,
      tx: CENTER_X,
      ty: CENTER_Y,
      scale: 0.75,
      tscale: 1
    };
  }

  function uniqueInDeck() {
    var seen = {};
    for (var i = 0; i < deck.length; i++) if (deck[i] !== null) seen[deck[i]] = 1;
    return Object.keys(seen).length;
  }

  function keep() {
    if (!current || state.phase !== 'play') return;
    var t = current.type;
    var slot = deck.indexOf(null);
    if (slot === -1) return; // deck full, shouldn't happen in normal flow
    deck[slot] = t;
    var to = slotPos(slot);
    animCard = { type: t, x: current.x, y: current.y, tx: to.x, ty: to.y, scale: current.scale, tscale: SLOT_W / CARD_W, life: 1 };
    current = null; nextDelay = 10;
    var uniq = uniqueInDeck();
    if (uniq === 10 && deck.indexOf(null) === -1) { hitStop = 5; zoom = 1.04; }
    else if (deck.indexOf(null) === -1) { hitStop = 3; zoom = 1.025; }
    if (window.J) {
      if (uniq === 10 && deck.indexOf(null) === -1) J.fanfare();
      else if (uniq === TYPES.length - 1 && deck.indexOf(null) === -1) J.gold();
      else J.hit(uniq);
      J.tension(1 - drawPile.length / 20);
    }
    if (window.LOOP) LOOP.emit('keep', { type: t, unique: uniq, draw_left: drawPile.length });
    flash('+' + TYPES[t].name, TYPES[t].color, 34);
    checkEnd();
  }

  function discard() {
    if (!current || state.phase !== 'play') return;
    var t = current.type;
    discards[t]++;
    var needed = deck.indexOf(t) === -1;
    var fatal = needed && discards[t] >= 2;
    var recoverable = needed && discards[t] === 1;
    if (fatal) shakeAmt = 8;
    animCard = { type: t, x: current.x, y: current.y, tx: -CARD_W - 30, ty: H + 80, scale: current.scale, tscale: 0.4, life: 1 };
    current = null; nextDelay = 10;
    if (window.J) {
      if (fatal) J.death(0.6);
      else if (recoverable) J.near();
      else J.hit(1);
      J.tension(1 - drawPile.length / 20);
    }
    if (window.LOOP) {
      if (recoverable) LOOP.emit('near_miss', { type: t, copies_left: 2 - discards[t] });
      LOOP.emit('discard', { type: t, needed: needed, fatal: fatal, draw_left: drawPile.length });
    }
    if (recoverable) flash('MISSED', VERM, 28);
    checkEnd();
  }

  function checkEnd() {
    if (state.phase !== 'play') return;
    var uniq = uniqueInDeck();
    state.score = uniq;
    // full deck
    if (deck.indexOf(null) === -1) {
      gameOver(uniq === TYPES.length, uniq === TYPES.length ? 'complete' : 'full');
      return;
    }
    // bust: both copies of a needed type discarded
    for (var i = 0; i < TYPES.length; i++) {
      if (deck.indexOf(i) === -1 && discards[i] >= 2) {
        gameOver(false, 'bust', i);
        return;
      }
    }
    // ran out of cards
    if (drawPile.length === 0) {
      gameOver(false, 'empty');
      return;
    }
  }

  function gameOver(win, reason, bustType) {
    state.phase = 'over';
    state.win = win;
    state.bustType = bustType;
    state.score = uniqueInDeck();
    overAt = performance.now();
    if (!win && reason !== 'bust') shakeAmt = 7; // spectacle on empty/full bust
    if (window.J) {
      if (win) J.fanfare();
      else if (reason !== 'bust') J.death(Math.min(0.25 + state.score / 15, 1));
      J.tension(0);
    }
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    var dur = (Date.now() - runStartTs) / 1000;
    if (state.score > best) { best = state.score; try { localStorage.setItem('db_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), win: win, reason: reason });
    if (DEMO) {
      window.__demoScore = state.score;
      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600); }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else { setTimeout(resetRun, 900); }
    }
  }

  function resetRun() {
    deck = new Array(10).fill(null); discards = new Array(10).fill(0);
    current = null; animCard = null; nextDelay = 0; dareBeaten = false;
    flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    buildDrawPile();
    state.phase = 'play'; state.win = false; state.bustType = null;
    runStartTs = Date.now();
    botWait = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    nextCard();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }
  function slotPos(i) {
    var col = i % 5, row = i < 5 ? 0 : 1;
    return { x: 17 + col * 75 + SLOT_W / 2, y: H - 205 + row * 95 + SLOT_H / 2 };
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 8, w: 38, h: 38 };
  var KEEP_R = { x: W / 2 + 2, y: H - 72, w: W / 2 - 2, h: 72 };
  var DISCARD_R = { x: 0, y: H - 72, w: W / 2 - 2, h: 72 };
  var SHARE_R = { x: W / 2 - 125, y: 470, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'cards' }); return;
      }
      resetRun(); return;
    }
    if (state.phase !== 'play' || !current || x === undefined) return;
    if (inR(KEEP_R, x, y)) keep();
    else if (inR(DISCARD_R, x, y)) discard();
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowRight') { if (!DEMO && !BOT && state.phase === 'play' && current) keep(); }
    else if (e.code === 'ArrowDown' || e.code === 'ArrowLeft') { if (!DEMO && !BOT && state.phase === 'play' && current) discard(); }
    else if (e.code === 'Enter' && state.phase === 'title') startRun();
  });

  // ---- demo / bot autopilots ----
  var demoWaits = [38, 32, 44, 28, 52, 36, 40, 30, 48, 34, 40, 95, 38, 42, 30, 40, 34, 36, 32, 30];
  var NEAR_FAIL_AFTER = 10, FAIL_IDX = 15;
  var demoIdx = 0, demoWait = 0, demoHover = null, nearFailDone = false;
  var botRunsDone = 0, botWait = 0;

  function demoIntent(t) {
    var inDeck = deck.indexOf(t) !== -1;
    var wanted = !inDeck && deck.indexOf(null) !== -1;
    // near-fail: first wanted card after threshold — hover discard, then keep
    if (!nearFailDone && demoIdx >= NEAR_FAIL_AFTER && wanted) {
      if (!state.nearFailTimer) state.nearFailTimer = 55;
      state.nearFailTimer--;
      demoHover = state.nearFailTimer > 25 ? 'discard' : 'keep';
      if (state.nearFailTimer <= 0) { demoHover = null; nearFailDone = true; return 'keep'; }
      return null; // still hesitating
    }
    // forced fail beat
    if (demoIdx >= FAIL_IDX) {
      if (inDeck || deck.indexOf(null) === -1) return 'keep'; // waste a slot
      return 'discard'; // discard a needed card
    }
    // normal smart play
    if (inDeck || deck.indexOf(null) === -1) return 'discard';
    return 'keep';
  }

  function autopilot() {
    if (!current || state.phase !== 'play') return;
    if (demoWait > 0) { demoWait--; return; }
    var intent = demoIntent(current.type);
    if (intent === null) return;
    if (intent === 'keep') keep(); else discard();
    demoIdx++;
    demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
  }

  function botAutopilot() {
    if (!current || state.phase !== 'play') return;
    if (botWait > 0) { botWait--; return; }
    var t = current.type;
    var inDeck = deck.indexOf(t) !== -1;
    var action;
    if (deck.indexOf(null) === -1) action = 'discard'; // full, no choice
    else if (inDeck) action = rng() < 0.18 ? 'keep' : 'discard';
    else action = rng() < 0.10 ? 'discard' : 'keep';
    if (action === 'keep') keep(); else discard();
    botWait = 8 + Math.floor(rng() * 14);
  }

  // ---- render helpers ----
  function drawGlyph(glyph, px, py, s) {
    cx.save();
    cx.translate(px, py);
    cx.beginPath();
    cx.fillStyle = 'rgba(255,255,255,0.95)';
    switch (glyph) {
      case 'triangle':
        cx.moveTo(0, -s); cx.lineTo(-s * 0.9, s * 0.7); cx.lineTo(s * 0.9, s * 0.7); cx.closePath();
        break;
      case 'circle':
        cx.arc(0, 0, s * 0.72, 0, Math.PI * 2);
        break;
      case 'star':
        for (var i = 0; i < 10; i++) {
          var a = -Math.PI / 2 + i * Math.PI / 5;
          var r = i % 2 === 0 ? s : s * 0.42;
          cx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        cx.closePath();
        break;
      case 'diamond':
        cx.moveTo(0, -s); cx.lineTo(s * 0.75, 0); cx.lineTo(0, s); cx.lineTo(-s * 0.75, 0); cx.closePath();
        break;
      case 'swirl':
        cx.arc(0, 0, s * 0.65, 0, Math.PI * 2);
        cx.fill(); cx.beginPath();
        cx.strokeStyle = 'rgba(255,255,255,0.95)'; cx.lineWidth = s * 0.16;
        for (var k = 0; k < 20; k++) {
          var ang = k * 0.35;
          var rad = (k / 20) * s * 0.55;
          var sx = Math.cos(ang) * rad, sy = Math.sin(ang) * rad;
          if (k === 0) cx.moveTo(sx, sy); else cx.lineTo(sx, sy);
        }
        cx.stroke();
        cx.restore();
        return;
      case 'square':
        cx.rect(-s * 0.65, -s * 0.65, s * 1.3, s * 1.3);
        break;
      case 'pentagon':
        for (var p = 0; p < 5; p++) {
          var pa = -Math.PI / 2 + p * Math.PI * 2 / 5;
          if (p === 0) cx.moveTo(Math.cos(pa) * s, Math.sin(pa) * s);
          else cx.lineTo(Math.cos(pa) * s, Math.sin(pa) * s);
        }
        cx.closePath();
        break;
      case 'hexagon':
        for (var h = 0; h < 6; h++) {
          var ha = -Math.PI / 2 + h * Math.PI / 3;
          if (h === 0) cx.moveTo(Math.cos(ha) * s * 0.85, Math.sin(ha) * s * 0.85);
          else cx.lineTo(Math.cos(ha) * s * 0.85, Math.sin(ha) * s * 0.85);
        }
        cx.closePath();
        break;
      case 'bolt':
        cx.moveTo(s * 0.25, -s); cx.lineTo(-s * 0.35, s * 0.1); cx.lineTo(-s * 0.05, s * 0.1);
        cx.lineTo(-s * 0.25, s); cx.lineTo(s * 0.35, -s * 0.1); cx.lineTo(s * 0.05, -s * 0.1); cx.closePath();
        break;
      case 'heart':
        cx.moveTo(0, s * 0.25);
        cx.bezierCurveTo(-s * 0.55, -s * 0.55, -s, -s * 0.15, -s, -s * 0.35);
        cx.bezierCurveTo(-s, -s * 0.8, -s * 0.25, -s * 0.85, 0, -s * 0.45);
        cx.bezierCurveTo(s * 0.25, -s * 0.85, s, -s * 0.8, s, -s * 0.35);
        cx.bezierCurveTo(s, -s * 0.15, s * 0.55, -s * 0.55, 0, s * 0.25);
        cx.closePath();
        break;
    }
    cx.fill();
    cx.restore();
  }

  function drawCard(t, x, y, w, h, alpha) {
    alpha = alpha === undefined ? 1 : alpha;
    var info = TYPES[t];
    if (!info) return;   // guard: type index can go stale mid-animation
    var g = cx.createLinearGradient(x - w / 2, y - h / 2, x - w / 2, y + h / 2);
    g.addColorStop(0, info.color);
    g.addColorStop(1, shade(info.color, -0.25));
    cx.save();
    cx.globalAlpha = alpha;
    roundRect(x - w / 2, y - h / 2, w, h, 10);
    cx.fillStyle = g; cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,0.25)'; cx.lineWidth = 1.5;
    cx.stroke();
    cx.fillStyle = 'rgba(255,255,255,0.9)';
    cx.textAlign = 'center';
    cx.font = '800 13px -apple-system, Helvetica, Arial';
    cx.fillText(info.name, x, y - h / 2 + 22);
    drawGlyph(info.glyph, x, y, w * 0.22);
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.font = '700 9px Menlo, monospace';
    cx.fillText('TILT', x, y + h / 2 - 14);
    cx.restore();
  }

  function shade(hex, p) {
    var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    r = Math.max(0, Math.min(255, Math.round(r + r * p)));
    g = Math.max(0, Math.min(255, Math.round(g + g * p)));
    b = Math.max(0, Math.min(255, Math.round(b + b * p)));
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  function roundRect(x, y, w, h, r) {
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); return; }
    var rr = Math.min(r, w / 2, h / 2);
    cx.beginPath();
    cx.moveTo(x + rr, y);
    cx.lineTo(x + w - rr, y); cx.quadraticCurveTo(x + w, y, x + w, y + rr);
    cx.lineTo(x + w, y + h - rr); cx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    cx.lineTo(x + rr, y + h); cx.quadraticCurveTo(x, y + h, x, y + h - rr);
    cx.lineTo(x, y + rr); cx.quadraticCurveTo(x, y, x + rr, y);
    cx.closePath();
  }

  function drawTracker() {
    var size = 30, gap = 9, total = 10 * size + 9 * gap;
    var startX = (W - total) / 2 + size / 2;
    for (var i = 0; i < TYPES.length; i++) {
      var x = startX + i * (size + gap), y = 48;
      var collected = deck.indexOf(i) !== -1;
      var dead = discards[i] >= 2 && !collected;
      var possible = !collected && !dead;
      var isCurrent = current && current.type === i;
      cx.save();
      if (collected) {
        cx.fillStyle = TYPES[i].color;
        cx.beginPath(); cx.arc(x, y, size / 2, 0, Math.PI * 2); cx.fill();
        drawGlyph(TYPES[i].glyph, x, y, size * 0.3);
      } else {
        cx.strokeStyle = dead ? 'rgba(255,255,255,0.12)' : TYPES[i].color;
        cx.lineWidth = 2;
        cx.beginPath(); cx.arc(x, y, size / 2 - 1, 0, Math.PI * 2); cx.stroke();
        if (!dead) {
          var pulse = 0.35 + 0.25 * Math.sin(performance.now() / 200 + i);
          cx.globalAlpha = isCurrent ? pulse + 0.25 : 0.25;
          cx.fillStyle = TYPES[i].color;
          cx.beginPath(); cx.arc(x, y, size / 2 - 3, 0, Math.PI * 2); cx.fill();
        }
        if (dead) {
          cx.strokeStyle = 'rgba(232,80,46,0.6)'; cx.lineWidth = 2;
          cx.beginPath(); cx.moveTo(x - 8, y - 8); cx.lineTo(x + 8, y + 8); cx.stroke();
          cx.beginPath(); cx.moveTo(x + 8, y - 8); cx.lineTo(x - 8, y + 8); cx.stroke();
        }
      }
      cx.restore();
    }
  }

  function drawDeck() {
    for (var i = 0; i < 10; i++) {
      var p = slotPos(i);
      var t = deck[i];
      cx.save();
      if (t === null) {
        cx.strokeStyle = 'rgba(255,255,255,0.12)'; cx.lineWidth = 2;
        roundRect(p.x - SLOT_W / 2, p.y - SLOT_H / 2, SLOT_W, SLOT_H, 8);
        cx.stroke();
      } else {
        drawCard(t, p.x, p.y, SLOT_W, SLOT_H, 1);
      }
      cx.restore();
    }
  }

  function drawButtons() {
    var now = performance.now();
    // discard
    var dLit = demoHover === 'discard';
    cx.save();
    cx.fillStyle = dLit ? 'rgba(232,80,46,0.35)' : 'rgba(232,80,46,0.18)';
    roundRect(DISCARD_R.x, DISCARD_R.y, DISCARD_R.w, DISCARD_R.h, 18);
    cx.fill();
    cx.strokeStyle = VERM; cx.lineWidth = 2;
    cx.stroke();
    cx.fillStyle = '#fff'; cx.textAlign = 'center';
    cx.font = '800 18px -apple-system, Helvetica, Arial';
    cx.fillText('DISCARD', DISCARD_R.x + DISCARD_R.w / 2, DISCARD_R.y + 44);
    cx.restore();
    // keep
    var kLit = demoHover === 'keep';
    cx.save();
    cx.fillStyle = kLit ? 'rgba(46,197,182,0.35)' : 'rgba(46,197,182,0.18)';
    roundRect(KEEP_R.x, KEEP_R.y, KEEP_R.w, KEEP_R.h, 18);
    cx.fill();
    cx.strokeStyle = TEAL; cx.lineWidth = 2;
    cx.stroke();
    cx.fillStyle = '#fff'; cx.textAlign = 'center';
    cx.font = '800 18px -apple-system, Helvetica, Arial';
    cx.fillText('KEEP', KEEP_R.x + KEEP_R.w / 2, KEEP_R.y + 44);
    cx.restore();
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 4.5))));
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (hitStop > 0) { hitStop -= dt; }
    else {
      // card animation
      if (current) {
        current.x += (current.tx - current.x) * 0.16 * dt;
        current.y += (current.ty - current.y) * 0.16 * dt;
        current.scale += (current.tscale - current.scale) * 0.12 * dt;
      }
      if (animCard) {
        animCard.x += (animCard.tx - animCard.x) * 0.22 * dt;
        animCard.y += (animCard.ty - animCard.y) * 0.22 * dt;
        animCard.scale += (animCard.tscale - animCard.scale) * 0.1 * dt;
        animCard.life -= 0.045 * dt;
        if (animCard.life <= 0) animCard = null;
      }
      if (nextDelay > 0) {
        nextDelay -= dt;
        if (nextDelay <= 0 && state.phase === 'play') nextCard();
      }
      // autopilots
      if (DEMO) autopilot();
      else if (BOT) botAutopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // draw pile counter
    cx.save();
    cx.textAlign = 'right';
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '700 12px -apple-system, Helvetica, Arial';
    cx.fillText('DRAW PILE', W - 16, 26);
    cx.fillStyle = GOLD;
    cx.font = '900 28px -apple-system, Helvetica, Arial';
    cx.fillText(drawPile.length, W - 16, 52);
    cx.restore();

    // tracker
    drawTracker();

    // deck slots
    drawDeck();

    // current card
    if (current) {
      drawCard(current.type, current.x, current.y, CARD_W * current.scale, CARD_H * current.scale, 1);
    }
    if (animCard) {
      drawCard(animCard.type, animCard.x, animCard.y, CARD_W * animCard.scale, CARD_H * animCard.scale, animCard.life);
    }

    // buttons
    if (state.phase === 'play') drawButtons();

    // score / banner during play
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 38px -apple-system, Helvetica, Arial';
      cx.fillText(uniqueInDeck() + '/10', W / 2, 108);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 128);
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 152);
      }
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('DECK BUILD', W / 2, 290);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO START', W / 2, 340); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('one of each. build the set.', W / 2, 370);
    }

    // challenge card
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('8', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('complete the full set', W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      if (state.win) {
        cx.fillStyle = TEAL; cx.font = '900 40px -apple-system, Helvetica, Arial';
        cx.fillText('COMPLETE SET.', W / 2, 290);
        // full-set spread
        for (var s = 0; s < 10; s++) {
          var t = deck[s];
          if (t === null) continue;
          var fanX = W / 2 - 175 + s * 39;
          var fanY = H / 2 + 15;
          var rot = (s - 4.5) * 0.06;
          cx.save(); cx.translate(fanX, fanY); cx.rotate(rot);
          drawCard(t, 0, 0, 50, 68, 1);
          cx.restore();
        }
      } else {
        cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
        cx.fillText(TYPES[state.bustType] ? TYPES[state.bustType].name + ' BUST' : 'BUST.', W / 2, 300);
        cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
        cx.fillText(state.score + ' of 10 cards', W / 2, 345);
        var pt = pctTop(state.score);
        cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
        cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
        cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      }
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('DECK BUILD', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they built ' + (window.__demoScore || 8) + '/10. your move.', W / 2, 330);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 8), W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
