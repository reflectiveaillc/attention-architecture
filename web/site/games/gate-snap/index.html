<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  // The "silhouette" is a rounded rect in the center of the canvas.
  // The "gate" is a rect that starts large and shrinks. Player taps when gate matches silhouette.
  var SIL_CX = W / 2, SIL_CY = H / 2 - 20;
  var SIL_W = 110, SIL_H = 160;   // silhouette size (fixed reference)
  var GATE_START_SCALE = 2.6;       // gate starts this multiple of sil size
  var GATE_END_SCALE   = 0.55;      // gate shrinks to this multiple (overshoot past sil = miss)
  var SHRINK_DURATION  = 2200;      // ms to shrink from start to end (gets faster each round)
  var PERFECT_BAND     = 0.06;      // ±6% of sil size = perfect
  var GOOD_BAND        = 0.18;      // ±18% = good
  var NEAR_BAND        = 0.30;      // ±30% = near miss

  // ---- state ----
  var state, flashes, hitStop, zoom, shakeAmt, dareBeaten;
  var runStartTs, best = 0, botRunsDone = 0;
  try { best = +localStorage.getItem('gs_best') || 0; } catch (_) {}

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 8))));
  }

  function newGame() {
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    flashes = [];
    state = {
      phase: 'title',   // title | challenge | play | over | cta
      score: 0,
      combo: 0,
      round: 0,
      gate: null,       // current gate state
      fakes: [],        // fake silhouette decoys flashing
      jitter: 0,        // gate jitter amount
      overAt: 0,
      roundResult: null  // 'perfect'|'good'|'near'|'miss'
    };
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    spawnRound();
  }

  function roundDuration() {
    // gets faster each round, floor at 700ms
    return Math.max(700, SHRINK_DURATION - state.round * 90);
  }

  function spawnRound() {
    state.round++;
    var dur = roundDuration();
    state.gate = {
      startTime: performance.now(),
      duration: dur,
      // random number of fakes (0-2 early, up to 3 later)
      fakeCount: Math.min(3, Math.floor(rng() * (1 + Math.floor(state.round / 3)))),
      tapped: false
    };
    // spawn fake silhouettes at random offsets
    state.fakes = [];
    for (var i = 0; i < state.gate.fakeCount; i++) {
      // fakes appear at random times during the shrink (biased toward the danger zone)
      state.fakes.push({
        flashAt: dur * (0.3 + rng() * 0.55),   // ms from round start
        duration: 80 + rng() * 100,
        offsetX: (rng() - 0.5) * 60,
        offsetY: (rng() - 0.5) * 50,
        alpha: 0,
        alive: true
      });
    }
    // jitter increases with score
    state.jitter = Math.min(8, state.score * 0.35);
    if (window.J) J.tension(Math.min(state.score / 20, 1));
  }

  function gateScale(elapsed, duration) {
    // linear shrink from GATE_START_SCALE to GATE_END_SCALE
    var t = Math.min(elapsed / duration, 1);
    return GATE_START_SCALE + (GATE_END_SCALE - GATE_START_SCALE) * t;
  }

  function snap() {
    if (!state.gate || state.gate.tapped) return;
    state.gate.tapped = true;
    var elapsed = performance.now() - state.gate.startTime;
    var dur = state.gate.duration;
    var sc = gateScale(elapsed, dur);
    // how close to 1.0 (perfect match)
    var diff = Math.abs(sc - 1.0);
    var result;
    if (diff <= PERFECT_BAND) result = 'perfect';
    else if (diff <= GOOD_BAND)  result = 'good';
    else if (diff <= NEAR_BAND)  result = 'near';
    else                          result = 'miss';

    state.roundResult = result;

    if (result === 'miss') {
      gameOver('miss');
      return;
    }

    // score points
    var pts = result === 'perfect' ? 3 : result === 'good' ? 2 : 1;
    state.combo = result === 'near' ? 0 : state.combo + 1;
    if (result === 'perfect' || result === 'good') {
      state.score += pts + state.combo;
    } else {
      state.score += 1;
    }

    // sound
    if (window.J) {
      if (result === 'perfect') { J.perfect(state.combo); hitStop = 5; zoom = 1.03; }
      else if (result === 'good') { J.hit(state.combo + 1); }
      else { J.near(); shakeAmt = 4; }
    }
    // near miss sound event
    if (result === 'near') {
      if (window.LOOP) LOOP.emit('near_miss', { round: state.round, diff: +diff.toFixed(3) });
    }
    // floating text
    if (result === 'perfect') flash('PERFECT', TEAL, 46);
    else if (result === 'good') flash('+' + pts + (state.combo > 1 ? ' ×' + state.combo : ''), GOLD, 38);
    else flash('SO CLOSE', VERM, 36);

    if (window.LOOP) LOOP.emit('gate_snap', { round: state.round, result: result, score: state.score });

    // dare beaten?
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }

    // next round after brief pause (longer for perfect to enjoy hit-stop)
    setTimeout(spawnRound, result === 'perfect' ? 380 : 260);
  }

  function autoSnapFail() {
    // gate missed entirely (reached end_scale without tap)
    if (state.gate && !state.gate.tapped) {
      state.gate.tapped = true;
      gameOver('timeout');
    }
  }

  function gameOver(reason) {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.score / 20, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('gs_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), reason: reason });

    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 800);
      }
    }
  }

  function resetRun() {
    state.score = 0; state.combo = 0; state.round = 0;
    flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    state.gate = null; state.fakes = [];
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && state.gate && !state.gate.tapped) { snap(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: '%' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilot ----
  // Demo arc: challenge card → hesitant perfect → good → near-miss (looks like dead) → recovery → another perfect → MISS (spectacle)
  // Encoded as target diff from scale=1.0: negative = early (gate still big), positive = late (gate too small)
  // 'hesitate' entries add extra wait before firing
  var demoScript = [
    { diff: 0.03, wait: 520 },   // round 1: near-perfect, slight hesitation
    { diff: -0.08, wait: 460 },  // round 2: good, a bit early
    { diff: 0.25, wait: 680 },   // round 3: near-miss (reads as dead) — tension peak
    { diff: 0.02, wait: 380 },   // round 4: perfect recovery (the save!)
    { diff: -0.05, wait: 440 },  // round 5: good
    { diff: 0.45, wait: 720 }    // round 6: real miss — spectacle (gate went way past)
  ];
  var demoIdx = 0, demoPendingSnap = false, demoSnapAt = 0;

  // Bot: just pick a random diff from [-0.25, 0.25] with some misses sprinkled in
  var botAction = null;

  function autopilot(now) {
    if (!state.gate || state.gate.tapped || state.phase !== 'play') return;

    if (DEMO) {
      var script = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (!demoPendingSnap) {
        // schedule the snap: compute target elapsed time
        var targetScale = 1.0 + script.diff;
        var dur = state.gate.duration;
        // solve for elapsed: targetScale = START + (END - START) * t → t = (targetScale - START) / (END - START)
        var t = (targetScale - GATE_START_SCALE) / (GATE_END_SCALE - GATE_START_SCALE);
        t = Math.max(0.05, Math.min(0.95, t));
        var targetElapsed = t * dur;
        demoSnapAt = state.gate.startTime + targetElapsed + script.wait * 0.01; // wait is "think time" in ms added to natural hesitation
        // Add the wait as actual delay in sim by scheduling slightly later
        demoSnapAt = state.gate.startTime + targetElapsed;
        // hesitation: we wait script.wait ms PAST when autopilot would otherwise trigger
        demoPendingSnap = true;
      }
      if (now >= demoSnapAt) {
        demoPendingSnap = false;
        demoIdx++;
        snap();
      }
    } else if (BOT) {
      if (botAction === null) {
        // 20% chance of a deliberate miss for realism
        if (rng() < 0.20) {
          botAction = { diff: 0.5 + rng() * 0.3 }; // too late = miss
        } else {
          botAction = { diff: (rng() - 0.5) * 0.28 }; // somewhere in good/near range
        }
      }
      var elapsed = now - state.gate.startTime;
      var sc = gateScale(elapsed, state.gate.duration);
      var currentDiff = sc - 1.0;
      // fire when current diff passes our target
      if (Math.abs(currentDiff - botAction.diff) < 0.04 || elapsed > state.gate.duration * 0.92) {
        botAction = null;
        snap();
      }
    }
  }

  // ---- render helpers ----
  function drawSilhouette(x, y, w, h, alpha, color) {
    var r = 22;
    cx.globalAlpha = alpha;
    cx.fillStyle = color || 'rgba(46,197,182,0.18)';
    cx.strokeStyle = color ? 'transparent' : TEAL;
    cx.lineWidth = 2.5;
    cx.beginPath();
    if (cx.roundRect) {
      cx.roundRect(x - w / 2, y - h / 2, w, h, r);
    } else {
      cx.rect(x - w / 2, y - h / 2, w, h);
    }
    cx.fill();
    if (!color) cx.stroke();
    cx.globalAlpha = 1;
  }

  function drawGate(x, y, gw, gh, sc, jx, jy, alpha) {
    // Gate drawn as 4 corner brackets closing in
    var r = 18;
    var ox = x + jx, oy = y + jy;
    cx.globalAlpha = alpha;
    cx.strokeStyle = VERM;
    cx.lineWidth = 3.5;
    // draw as full rounded rect outline that pulses vermillion
    cx.beginPath();
    if (cx.roundRect) {
      cx.roundRect(ox - gw / 2, oy - gh / 2, gw, gh, r);
    } else {
      cx.rect(ox - gw / 2, oy - gh / 2, gw, gh);
    }
    cx.stroke();

    // corner brackets emphasis
    var bLen = Math.min(gw, gh) * 0.22;
    cx.lineWidth = 5;
    cx.strokeStyle = '#fff';
    cx.globalAlpha = alpha * 0.6;
    var corners = [
      [ox - gw/2, oy - gh/2, 1, 1],
      [ox + gw/2, oy - gh/2, -1, 1],
      [ox - gw/2, oy + gh/2, 1, -1],
      [ox + gw/2, oy + gh/2, -1, -1]
    ];
    for (var i = 0; i < corners.length; i++) {
      var cc = corners[i];
      cx.beginPath();
      cx.moveTo(cc[0] + cc[2] * bLen, cc[1]);
      cx.lineTo(cc[0], cc[1]);
      cx.lineTo(cc[0], cc[1] + cc[3] * bLen);
      cx.stroke();
    }
    cx.globalAlpha = 1;
  }

  // ---- main render loop ----
  var challengeAt = 0, ctaAt = 0, last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // tick hitStop decay first
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      // gate shrinks + autopilot runs only when not in hit-stop
      if (state.phase === 'play' && state.gate && !state.gate.tapped) {
        var elapsed = now - state.gate.startTime;
        if (elapsed >= state.gate.duration) {
          autoSnapFail();
        } else {
          autopilot(now);
          // update fakes
          for (var fi = 0; fi < state.fakes.length; fi++) {
            var fk = state.fakes[fi];
            if (!fk.alive) continue;
            var fAge = elapsed - fk.flashAt;
            if (fAge >= 0 && fAge < fk.duration) {
              fk.alpha = Math.min(1, fAge / 30) * Math.max(0, 1 - (fAge - fk.duration + 40) / 40);
            } else if (fAge >= fk.duration) {
              fk.alpha = 0;
              fk.alive = false;
            } else {
              fk.alpha = 0;
            }
          }
        }
      }
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.83, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- PLAY phase ----
    if (state.phase === 'play' && state.gate) {
      var gElapsed = now - state.gate.startTime;
      var sc = gateScale(Math.min(gElapsed, state.gate.duration), state.gate.duration);
      var gw = SIL_W * sc, gh = SIL_H * sc;

      // closeness to perfect — glow when close
      var diff = Math.abs(sc - 1.0);
      var closeGlow = Math.max(0, 1 - diff / GOOD_BAND);

      // jitter on gate (bait)
      var jx = 0, jy = 0;
      if (state.jitter > 0) {
        jx = (Math.random() - 0.5) * state.jitter;
        jy = (Math.random() - 0.5) * state.jitter;
      }

      // subtle bg pulse when close
      if (closeGlow > 0.5) {
        cx.fillStyle = 'rgba(242,177,52,' + (closeGlow * 0.08) + ')';
        cx.fillRect(0, 0, W, H);
      }

      // draw fake silhouettes (decoys)
      for (var fi2 = 0; fi2 < state.fakes.length; fi2++) {
        var fk2 = state.fakes[fi2];
        if (fk2.alpha > 0) {
          drawSilhouette(SIL_CX + fk2.offsetX, SIL_CY + fk2.offsetY,
                         SIL_W * 0.85, SIL_H * 0.85, fk2.alpha * 0.55,
                         'rgba(232,80,46,0.35)');
        }
      }

      // draw true silhouette (the target)
      drawSilhouette(SIL_CX, SIL_CY, SIL_W, SIL_H, 1.0);

      // perfect zone visual hint (subtle ring at scale=1.0)
      var hintW = SIL_W * (1 + PERFECT_BAND), hintH = SIL_H * (1 + PERFECT_BAND);
      cx.globalAlpha = 0.18;
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SIL_CX - hintW/2, SIL_CY - hintH/2, hintW, hintH, 24);
      else cx.rect(SIL_CX - hintW/2, SIL_CY - hintH/2, hintW, hintH);
      cx.stroke();
      cx.globalAlpha = 1;

      // gate alpha pulses gold when in perfect band
      var gateAlpha = diff <= PERFECT_BAND ? 1.0 : 0.85;
      if (diff <= PERFECT_BAND) {
        // gold flash on gate
        cx.globalAlpha = 0.55;
        cx.strokeStyle = GOLD; cx.lineWidth = 5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SIL_CX - gw/2 + jx, SIL_CY - gh/2 + jy, gw, gh, 18);
        else cx.rect(SIL_CX - gw/2 + jx, SIL_CY - gh/2 + jy, gw, gh);
        cx.stroke();
        cx.globalAlpha = 1;
      }
      drawGate(SIL_CX, SIL_CY, gw, gh, sc, jx, jy, gateAlpha);

      // progress bar at bottom (shows gate closing)
      var prog = Math.min(gElapsed / state.gate.duration, 1);
      cx.fillStyle = 'rgba(255,255,255,0.08)';
      cx.fillRect(30, H - 60, W - 60, 6);
      var barColor = diff <= PERFECT_BAND ? GOLD : diff <= GOOD_BAND ? TEAL : VERM;
      cx.fillStyle = barColor;
      cx.fillRect(30, H - 60, (W - 60) * prog, 6);

      // combo badge
      if (state.combo >= 2) {
        cx.textAlign = 'center';
        cx.fillStyle = GOLD;
        cx.font = '900 ' + (20 + state.combo * 2) + 'px -apple-system, Helvetica, Arial';
        cx.globalAlpha = 0.9;
        cx.fillText('×' + state.combo, W / 2, SIL_CY - SIL_H / 2 - 20);
        cx.globalAlpha = 1;
      }

      // tap hint early game
      if (state.round <= 2) {
        var pulse = 0.5 + 0.5 * Math.sin(now / 200);
        cx.globalAlpha = pulse * 0.7;
        cx.textAlign = 'center';
        cx.fillStyle = '#fff';
        cx.font = '600 14px -apple-system, Helvetica, Arial';
        cx.fillText('TAP WHEN THE GATE MATCHES', W / 2, SIL_CY + SIL_H / 2 + 40);
        cx.globalAlpha = 1;
      }
    }

    // score
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);
      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 146);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('18', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top snap", W / 2, 430);
    }

    // floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title screen
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('GATE SNAP', W / 2, 280);
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse2 = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse2;
      cx.fillText('TAP WHEN IT FITS', W / 2, 330);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('snap the gate to the shape.', W / 2, 360);
    }

    // game over / score card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('SNAPPED.', W / 2, 300);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' points', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD;
      cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — SNAP AGAIN', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect
          ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23)
          : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('GATE SNAP', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they hit ' + (window.__demoScore || 18) + '. your move.', W / 2, 342);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 18), W / 2, 412);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 444);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
