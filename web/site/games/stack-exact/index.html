<meta charset="UTF-8">

<!--

  Modes:

    ?bot=1&runs=N&seed imperfect autoplay, N runs, sets window.__botDone

<style>

               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'stack-exact';</script>
<script src="../../js/loop-events.js"></script>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO     = qs.get('demo') === '1';
  var BOT      = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED     = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // palette — calm: teal/gold, avoid vermillion
  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var TEAL2 = '#1a9e91';

  // layout
  var BLOCK_H   = 36;
  var BASE_W    = 200;
  var PERFECT_PX = 8;   // within this offset = perfect (± px)
  var TARGET_BLOCKS = 10; // complete a tower of 10

  // juice state
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [];

  // game state
  var state, runStartTs, botRunsDone = 0, botTarget = null;
  var demoStep = 0, demoWait = 0;

  // demo script — calm offsets in px (positive = right of center, 0 = perfect)
  // arc: settle → deepen → resolve → 10th perfect → glow
  var demoOffsets  = [4, -3, 5, -2, 3, -4, 2, -1, 1, 0];
  // hesitation beats before each drop (frames at ~60fps)
  var demoWaits    = [50, 45, 55, 42, 48, 38, 44, 40, 36, 30];
  var demoStarted  = false, ctaAt = 0;

  function newGame() {
    state = {
      phase: 'title',   // title | play | complete | cta | over
      stack: [{ x: W / 2, w: BASE_W }],   // base block
      mover: null, dir: 1, speed: 1.8,
      score: 0, perfectStreak: 0,
      overAt: 0, completeAt: 0,
      glowPulse: 0
    };
    flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    botTarget = null; demoStep = 0; demoWait = 0; demoStarted = false;
    if (BOT) { startRun(); return; }
    if (DEMO) { startRun(); return; }
    // human: show title
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    spawnMover();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnMover() {
    var top = state.stack[state.stack.length - 1];
    // range: mover can travel from far left to far right past the top block edges
    var half = top.w / 2 + 60;
    state.mover = {
      x: W / 2 - half,  // start at left edge of range
      w: top.w,
      half: half,
      startX: W / 2 - half
    };
    state.dir = 1;
    // gentle speed ramp — calm
    state.speed = 1.8 + state.score * 0.04;
  }

  function topY() {
    return H - 100 - state.stack.length * BLOCK_H;
  }

  function drop() {
    if (state.phase !== 'play' || !state.mover) return;
    var m   = state.mover;
    var top = state.stack[state.stack.length - 1];
    var offset = m.x - top.x;
    var overlap = m.w - Math.abs(offset);

    if (overlap <= 0) {
      // missed completely — game over for bot; human just loses
      gameOver();
      return;
    }

    var perfect = Math.abs(offset) <= PERFECT_PX;

    // calm sound only
    if (window.J) J.calm(state.score + 1);

    var nx, nw;
    if (perfect) {
      nx = top.x; nw = m.w;
      state.perfectStreak++;
      hitStop = 3;
      zoom = 1.015;
      flash('+EXACT', TEAL, 28);
    } else {
      nw = overlap;
      nx = (Math.max(m.x - m.w / 2, top.x - top.w / 2) +
            Math.min(m.x + m.w / 2, top.x + top.w / 2)) / 2;
      state.perfectStreak = 0;
      shakeAmt = 1.5;
    }

    state.stack.push({ x: nx, w: nw });
    state.score++;

    if (window.LOOP) LOOP.emit('block_placed', {
      n: state.score, offset: +Math.abs(offset).toFixed(1), perfect: perfect
    });

    // check completion
    if (state.score >= TARGET_BLOCKS) {
      completeRun();
      return;
    }

    // if top block is too thin to continue, end it
    if (nw < 6) {
      gameOver();
      return;
    }

    spawnMover();
  }

  function completeRun() {
    state.phase = 'complete';
    state.completeAt = performance.now();
    state.glowPulse = 0;
    if (window.J) J.calm(11);
    hitStop = 5; zoom = 1.025;
    var dur = (Date.now() - runStartTs) / 1000;
    window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      // wait ~2.5s on complete glow, then CTA
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2600);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 700);
    }
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 5;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.calm(0);
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 700);
    }
    if (DEMO) {
      // demo shouldn't normally hit game_over, but just in case
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1800);
    }
  }

  function resetRun() {
    state.stack = [{ x: W / 2, w: BASE_W }];
    state.score = 0; state.perfectStreak = 0;
    flashes = []; hitStop = 0; zoom = 1; shakeAmt = 0;
    botTarget = null; demoStep = 0; demoWait = 0; demoStarted = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 120, y: 490, w: 240, h: 44 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && state.mover) { drop(); return; }
    if ((state.phase === 'over' || state.phase === 'complete') &&
        performance.now() - Math.max(state.overAt, state.completeAt) > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'blocks' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- autopilot (demo + bot) ----
  function autopilot() {
    if (!state.mover || state.phase !== 'play') return;
    var m   = state.mover;
    var top = state.stack[state.stack.length - 1];
    var v   = state.speed * state.dir;

    if (DEMO) {
      // wait for hesitation beats
      if (demoWait > 0) { demoWait--; return; }
      if (demoStep >= demoOffsets.length) {
        // should have completed, but safety — just drop
        drop(); return;
      }
      var wantOffset = demoOffsets[demoStep];
      var target = top.x + wantOffset;
      if (Math.abs(m.x - target) <= Math.abs(v) * 0.7) {
        demoStep++;
        demoWait = demoWaits[Math.min(demoStep, demoWaits.length - 1)] || 36;
        drop();
      }
      return;
    }

    if (BOT) {
      // imperfect: gaussian error, bot will accumulate imperfection until block too thin
      if (botTarget === null) {
        // deliberately introduce growing error so bot eventually loses
        var baseErr = 10 + botRunsDone * 5;
        botTarget = top.x + (rng() - 0.5) * baseErr * 2;
      }
      if (Math.abs(m.x - botTarget) <= Math.abs(v) * 0.7) {
        botTarget = null;
        drop();
      }
    }
  }

  // ---- render helpers ----
  function blockColor(i, total) {
    // calm gradient: deep teal at base → gold/soft at top
    var t = total <= 1 ? 0 : i / (total - 1);
    var r1 = 0x2e, g1 = 0xc5, b1 = 0xb6; // teal
    var r2 = 0xf2, g2 = 0xb1, b2 = 0x34; // gold
    var rr = Math.round(r1 + (r2 - r1) * t);
    var gg = Math.round(g1 + (g2 - g1) * t);
    var bb = Math.round(b1 + (b2 - b1) * t);
    return 'rgb(' + rr + ',' + gg + ',' + bb + ')';
  }

  function drawBlock(x, w, y, color, alpha) {
    if (alpha !== undefined) cx.globalAlpha = alpha;
    var grad = cx.createLinearGradient(x - w/2, y, x - w/2, y + BLOCK_H - 2);
    grad.addColorStop(0, color);
    grad.addColorStop(1, 'rgba(0,0,0,0.18)');
    cx.fillStyle = grad;
    cx.fillRect(x - w / 2, y, w, BLOCK_H - 3);
    // subtle top highlight
    cx.fillStyle = 'rgba(255,255,255,0.18)';
    cx.fillRect(x - w / 2, y, w, 3);
    if (alpha !== undefined) cx.globalAlpha = 1;
  }

  function drawMoverOutline(x, w, y) {
    cx.strokeStyle = 'rgba(255,255,255,0.45)';
    cx.lineWidth = 1.5;
    cx.strokeRect(x - w / 2 + 0.5, y + 0.5, w - 1, BLOCK_H - 4);
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // advance mover
    if (hitStop > 0) {
      hitStop -= dt;
    } else if (state.phase === 'play' && state.mover) {
      var m = state.mover;
      m.x += state.speed * state.dir * dt;
      var rng_bound = W / 2 + m.half;
      var lft_bound = W / 2 - m.half;
      if (m.x > rng_bound) { m.x = rng_bound; state.dir = -1; }
      if (m.x < lft_bound) { m.x = lft_bound; state.dir =  1; }
      autopilot();
    }

    // glow pulse on complete
    if (state.phase === 'complete' || state.phase === 'cta') {
      state.glowPulse = (state.glowPulse || 0) + dt * 0.04;
    }

    // juice transform wrapper
    cx.save();
    if (shakeAmt > 0.15 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.10 * dt;

    // background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    // calm ambient glow
    var bg = cx.createRadialGradient(W/2, H*0.6, 0, W/2, H*0.6, H*0.7);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // draw stack
    var st = state.stack;
    var baseY = H - 100;
    for (var i = 0; i < st.length; i++) {
      var b  = st[i];
      var by = baseY - i * BLOCK_H;
      if (by > H + BLOCK_H || by < -BLOCK_H) continue;
      var col = blockColor(i, TARGET_BLOCKS + 1);
      // glow on complete
      if ((state.phase === 'complete' || state.phase === 'cta') && i > 0) {
        var gv = 0.5 + 0.5 * Math.sin(state.glowPulse * Math.PI * 2 - i * 0.3);
        cx.shadowColor = TEAL;
        cx.shadowBlur  = 8 + 8 * gv;
      }
      drawBlock(b.x, b.w, by, col);
      cx.shadowBlur = 0;
    }

    // draw mover block
    if (state.phase === 'play' && state.mover) {
      var mv  = state.mover;
      var mvy = baseY - st.length * BLOCK_H;
      var mcol = blockColor(st.length, TARGET_BLOCKS + 1);
      drawBlock(mv.x, mv.w, mvy, mcol);
      drawMoverOutline(mv.x, mv.w, mvy);
      // alignment guide — soft vertical line showing top block center
      var top = st[st.length - 1];
      cx.strokeStyle = 'rgba(255,255,255,0.10)';
      cx.lineWidth = 1;
      cx.setLineDash([3, 5]);
      cx.beginPath();
      cx.moveTo(top.x, mvy + BLOCK_H);
      cx.lineTo(top.x, mvy - 20);
      cx.stroke();
      cx.setLineDash([]);
    }

    // progress indicator — dots or number
    if (state.phase === 'play' || state.phase === 'complete') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' / ' + TARGET_BLOCKS, W / 2, 44);
      // soft dot row
      var dotW = 10, dotGap = 14, dotStartX = W/2 - ((TARGET_BLOCKS-1) * dotGap) / 2;
      for (var d = 0; d < TARGET_BLOCKS; d++) {
        cx.beginPath();
        cx.arc(dotStartX + d * dotGap, 58, 3.5, 0, Math.PI * 2);
        if (d < state.score) {
          cx.fillStyle = TEAL;
          cx.shadowColor = TEAL; cx.shadowBlur = 6;
        } else {
          cx.fillStyle = 'rgba(255,255,255,0.15)';
          cx.shadowBlur = 0;
        }
        cx.fill();
        cx.shadowBlur = 0;
      }
    }

    // floating reward texts
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 36);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 220 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 36) flashes.splice(k, 1);
    }

    // title screen
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 42px -apple-system, Helvetica, Arial';
      cx.fillText('STACK EXACT', W / 2, 290);
      cx.fillStyle = 'rgba(46,197,182,0.9)';
      cx.font = '500 18px -apple-system, Helvetica, Arial';
      var pulse = 0.65 + 0.35 * Math.sin(now / 700);
      cx.globalAlpha = pulse;
      cx.fillText('tap when it lines up', W / 2, 334);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.28)';
      cx.font = '400 12px -apple-system, Helvetica, Arial';
      cx.fillText('10 perfect placements = done', W / 2, 362);
    }

    // complete screen
    if (state.phase === 'complete') {
      cx.fillStyle = 'rgba(11,13,18,0.45)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var gp = 0.8 + 0.2 * Math.sin(state.glowPulse * Math.PI * 2);
      cx.fillStyle = TEAL;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.shadowColor = TEAL; cx.shadowBlur = 18 * gp;
      cx.fillText('TOWER COMPLETE', W / 2, 288);
      cx.shadowBlur = 0;
      cx.fillStyle = 'rgba(255,255,255,0.88)';
      cx.font = '700 22px -apple-system, Helvetica, Arial';
      cx.fillText(state.perfectStreak > 6 ? 'nearly perfect' : 'well placed', W / 2, 328);
      cx.fillStyle = GOLD;
      cx.font = '800 20px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' stacked', W / 2, 368);
      if (!DEMO && !BOT) {
        cx.fillStyle = 'rgba(255,255,255,0.55)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        var pulse2 = 0.65 + 0.35 * Math.sin(now / 650);
        cx.globalAlpha = pulse2;
        cx.fillText('tap to stack again', W / 2, 410);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(46,197,182,0.14)';
        cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 22);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = TEAL;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('share your tower', W / 2, SHARE_R.y + 28);
      }
    }

    // game over screen (bot or thin-block miss)
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText('LOST IT', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 18px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' of ' + TARGET_BLOCKS, W / 2, 336);
      if (!DEMO && !BOT) {
        var pulse3 = 0.65 + 0.35 * Math.sin(now / 600);
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.globalAlpha = pulse3;
        cx.fillText('tap — try again', W / 2, 380);
        cx.globalAlpha = 1;
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t2 = (now - ctaAt) / 1000;
      var ease = Math.min(1, t2 * 2.5);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 44px -apple-system, Helvetica, Arial';
      cx.fillText('STACK EXACT', W / 2, 296);
      cx.fillStyle = 'rgba(255,255,255,0.70)';
      cx.font = '500 18px -apple-system, Helvetica, Arial';
      cx.fillText('line it up. build it clean.', W / 2, 334);
      var p3 = 0.7 + 0.3 * Math.sin(now / 500);
      cx.fillStyle = TEAL;
      cx.globalAlpha = ease * p3;
      cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 404);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 438);
      cx.globalAlpha = 1;
    }

    // mute toggle — human only
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
