<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO     = qs.get('demo') === '1';
  var BOT      = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED     = +qs.get('seed') || 42;

  // BOT/DEMO: compress the 60s game timer so runs finish quickly
  // BOT: 15x compression = 4s real-time per run
  // DEMO: 4x compression = 15s real-time for 60s game
  var SIM_SCALE = BOT ? 15 : (DEMO ? 4 : 1);

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), ctx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  var TOPICS = [
    { tag: 'cooking',   good: true  }, { tag: 'fitness',   good: true  },
    { tag: 'jazz',      good: true  }, { tag: 'travel',    good: true  },
    { tag: 'design',    good: true  }, { tag: 'science',   good: true  },
    { tag: 'crypto',    good: false }, { tag: 'drama',     good: false },
    { tag: 'ads',       good: false }, { tag: 'rage bait', good: false },
    { tag: 'clickbait', good: false }, { tag: 'scam',      good: false },
    { tag: 'politics',  good: false }, { tag: 'memes',     good: false },
  ];
  var GOOD_BG = ['#1a3a3a','#1e3520','#2a2040','#1a2a40'];
  var BAD_BG  = ['#3a1a1a','#2a1a0e','#2a1a30','#1e1e1e'];

  var CARD_W = 340, CARD_H = 108, CARD_X = (W - CARD_W) / 2;
  var LONG_MS = 600, GAME_SECS = 60;

  // ---- State ----
  var phase;
  var score, purity, combo;
  var simTimeLeft;   // in simulated seconds (ticks down at SIM_SCALE × real speed)
  var overAt, ctaAt;
  var cards, flashes;
  var pressId, pressStart;
  var hitStop, zoom, shake, dareBeaten;
  var best;
  try { best = +localStorage.getItem('fyp_best') || 0; } catch(_) { best = 0; }

  // Bot state
  var botRunsDone, botNextActionAt, botPassive, botHoldCard;

  // Demo state (timestamp-based, no frame counting)
  var demoStartedRun, demoNextActionAt, demoScriptIdx, demoHoldCard, demoHoldEnd;
  // Demo script: after startRun, fire actions at offsets from runStartTs (ms, wall time)
  // arc: challenge(1.2s) → purge bad → purge bad → keep good → purge bad (hesitation) →
  //      NEAR-FAIL: keep bad (purity drops, tension) → recovery purge → purge → timer expires
  var DEMO_ACTIONS = [
    { at: 620,  act: 'dismiss' },   // purge bad — correct
    { at: 1100, act: 'dismiss' },   // purge bad — correct
    { at: 1600, act: 'keep'    },   // keep good — correct
    { at: 2300, act: 'dismiss' },   // purge bad — hesitation
    { at: 2900, act: 'keep'    },   // NEAR-FAIL: keep bad content (purity drops)
    { at: 3600, act: 'dismiss' },   // recovery
    { at: 4100, act: 'dismiss' },   // purge
    // after 4.1s, passive — timer (4x compressed) runs out: ~60/4 = 15s real but already 4s in → 11s left
    // Total real time: ~1.2s challenge + ~15s game = ~16.2s → well within 24s target
  ];

  function pickTopic() { return TOPICS[Math.floor(rng() * TOPICS.length)]; }

  function makeCard(y) {
    var t = pickTopic();
    return {
      id: (rng() * 1e9) | 0,
      y: y, topic: t,
      bg: (t.good ? GOOD_BG : BAD_BG)[Math.floor(rng() * 4)],
      hue: Math.floor(rng() * 360),
      views: ((rng() * 900 + 100) | 0),
      age:   ((rng() * 47  + 1)   | 0),
      offX: 0, alpha: 1,
      done: false, pressing: false, pulseT: 0,
    };
  }

  function initCards() {
    cards = [];
    for (var i = 0; i < 3; i++) cards.push(makeCard(148 + i * (CARD_H + 14)));
  }

  function ensureCards() {
    var active = 0, maxY = 148;
    for (var i = 0; i < cards.length; i++) {
      if (!cards[i].done) { active++; if (cards[i].y > maxY) maxY = cards[i].y; }
    }
    while (active < 3) { cards.push(makeCard(maxY + CARD_H + 14)); active++; maxY += CARD_H + 14; }
  }

  function newGame() {
    phase = 'title';
    score = 0; purity = 100; combo = 0;
    simTimeLeft = GAME_SECS;
    overAt = 0; ctaAt = 0;
    cards = []; flashes = [];
    pressId = -1; pressStart = 0;
    hitStop = 0; zoom = 1; shake = 0; dareBeaten = false;
    botRunsDone = 0; botNextActionAt = 0; botPassive = false; botHoldCard = null;
    demoScriptIdx = 0; demoNextActionAt = 0; demoHoldCard = null; demoHoldEnd = 0; demoStartedRun = 0;
    initCards();
    if (DEMO) { phase = 'challenge'; demoNextActionAt = performance.now() + 1250; return; }
    if (BOT)  { startRun(); return; }
  }

  function startRun() {
    phase = 'play';
    simTimeLeft = GAME_SECS;
    initCards();
    var now = performance.now();
    demoStartedRun = now;
    // bot: first action in 200ms
    botNextActionAt = now + 200;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function pctTop(s) { return Math.max(1, Math.min(99, (100 * Math.exp(-s / 28)) | 0)); }
  function flash(txt, col, sz) { flashes.push({ txt: txt, col: col, sz: sz, t: 0 }); }

  function dismissCard(card) {
    if (card.done) return;
    card.done = true; card.pressing = false; card.pulseT = 0;
    if (card.topic.good) {
      purity = Math.max(0, purity - 12); combo = 0; shake = 5;
      flash('WRONG!', VERM, 38);
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { tag: card.topic.tag, score: score });
    } else {
      combo++; score++; purity = Math.min(100, purity + 3);
      if (combo >= 3) {
        hitStop = 4; zoom = 1.02;
        flash('×' + combo + ' COMBO!', GOLD, 42);
        if (window.J) J.perfect(combo);
      } else {
        flash('+1', TEAL, 30);
        if (window.J) J.hit(combo);
      }
      if (purity >= 90 && window.J) J.gold();
      if (window.J) J.tension(Math.min(combo / 8, 1));
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true; flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare(); SHARE.beaten(score);
      }
      if (window.LOOP) LOOP.emit('topic_purged', { tag: card.topic.tag, combo: combo, score: score });
    }
    card.offX = card.topic.good ? -W : W;
    ensureCards();
  }

  function keepCard(card) {
    if (card.done) return;
    card.done = true; card.pressing = false; card.pulseT = 0;
    if (!card.topic.good) {
      purity = Math.max(0, purity - 8); combo = 0; shake = 4;
      flash('POLLUTED!', VERM, 36);
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { tag: card.topic.tag, score: score });
    } else {
      flash('✓', TEAL, 28);
      if (window.J) J.hit(1);
    }
    ensureCards();
  }

  function gameOver() {
    if (phase !== 'play') return;
    phase = 'over'; overAt = performance.now();
    shake = 8;
    var dur = (Date.now() - (demoStartedRun || Date.now())) / 1000;
    var nb = score > best;
    if (window.J) { J.death(Math.min(0.3 + score / 60, 1)); if (nb) setTimeout(function(){ J.fanfare(); }, 450); }
    if (DEMO) window.__demoScore = score;
    if (nb) { best = score; try { localStorage.setItem('fyp_best', String(best)); } catch(_){} }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) setTimeout(function() {
      phase = 'cta'; ctaAt = performance.now();
      setTimeout(function() { window.__demoDone = true; }, 3600);
    }, 2200);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function(){ resetBot(); }, 400);
    }
  }

  function resetBot() {
    score = 0; purity = 100; combo = 0;
    flashes = []; botPassive = false; botHoldCard = null;
    botNextActionAt = performance.now() + 200;
    initCards();
    phase = 'play';
    simTimeLeft = GAME_SECS;
    demoStartedRun = performance.now();
    if (window.LOOP) LOOP.emit('restart', {});
  }

  // ---- Input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 488, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function findCard(px, py) {
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      if (c.done) continue;
      if (px >= CARD_X + c.offX && px <= CARD_X + c.offX + CARD_W && py >= c.y && py <= c.y + CARD_H) return c;
    }
    return null;
  }
  window.addEventListener('pointerdown', function(e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale, py = (e.clientY - r.top) / scale;
    if (inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (inR(SHARE_R, px, py) && window.SHARE) { SHARE.send({ score: score, unit: '%' }); return; }
      resetBot(); return;
    }
    if (phase !== 'play') return;
    var card = findCard(px, py);
    if (card) { pressId = card.id; pressStart = performance.now(); card.pressing = true; }
  });
  window.addEventListener('pointerup', function(e) {
    if (DEMO || BOT) return;
    if (pressId < 0) return;
    var held = performance.now() - pressStart;
    for (var i = 0; i < cards.length; i++) {
      if (cards[i].id === pressId) {
        cards[i].pressing = false; cards[i].pulseT = 0;
        if (!cards[i].done) { if (held >= LONG_MS) dismissCard(cards[i]); else keepCard(cards[i]); }
        break;
      }
    }
    pressId = -1;
  });
  window.addEventListener('pointercancel', function() {
    pressId = -1;
    for (var i = 0; i < cards.length; i++) { cards[i].pressing = false; cards[i].pulseT = 0; }
  });

  // ---- Autopilots ----
  function firstActiveCard() {
    for (var i = 0; i < cards.length; i++) { if (!cards[i].done) return cards[i]; }
    return null;
  }

  function runDemoAutopilot(now) {
    // Challenge phase: wait 1250ms then start run
    if (phase === 'challenge') {
      if (now >= demoNextActionAt) startRun();
      return;
    }
    if (phase !== 'play') return;

    // If currently simulating a long-press hold, continue it
    if (demoHoldCard) {
      var elapsed = now - (demoHoldEnd - 650);
      demoHoldCard.pulseT = Math.min(1, elapsed / 650);
      if (now >= demoHoldEnd) {
        var hc = demoHoldCard; demoHoldCard = null;
        dismissCard(hc);
      }
      return;
    }

    // Fire next scripted action if it's time
    if (demoScriptIdx < DEMO_ACTIONS.length) {
      var act = DEMO_ACTIONS[demoScriptIdx];
      var wallOffset = now - demoStartedRun;  // ms since run began
      if (wallOffset >= act.at) {
        var card = firstActiveCard();
        if (!card) return;
        if (act.act === 'dismiss') {
          // simulate long-press
          demoHoldCard = card;
          demoHoldEnd = now + 650;
          card.pressing = true; card.pulseT = 0;
        } else {
          keepCard(card);
        }
        demoScriptIdx++;
      }
    }
    // after all actions, passive — timer runs out
  }

  function runBotAutopilot(now) {
    if (phase !== 'play') return;
    if (botPassive) return;

    // Continue a simulated hold
    if (botHoldCard && !botHoldCard.done) {
      var e = now - (botHoldCard._holdStart || now);
      botHoldCard.pulseT = Math.min(1, e / 500);
      if (botHoldCard.pulseT >= 1) {
        var bc = botHoldCard; botHoldCard = null;
        dismissCard(bc);
        botNextActionAt = now + ((rng() * 200 + 100) | 0);
      }
      return;
    }
    if (botHoldCard) { botHoldCard = null; } // was done by other path

    if (now < botNextActionAt) return;

    // After BOT_MAX_ACTIONS, go passive (timer kills the run)
    var BOT_MAX = 10;
    if ((botRunsDone * BOT_MAX + (score + 1)) > BOT_RUNS * BOT_MAX) {
      botPassive = true; return;
    }

    var c = firstActiveCard();
    if (!c) return;

    var correct = rng() < 0.70;
    if (!c.topic.good && correct) {
      // dismiss: simulate hold
      botHoldCard = c; c._holdStart = now;
      c.pressing = true; c.pulseT = 0;
    } else {
      keepCard(c);
      botNextActionAt = now + ((rng() * 200 + 80) | 0);
    }
  }

  // ---- Draw card ----
  function drawCard(c) {
    if (c.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.translate(CARD_X + c.offX, c.y);
    ctx.fillStyle = c.bg;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(0, 0, CARD_W, CARD_H, 14); else ctx.rect(0, 0, CARD_W, CARD_H);
    ctx.fill();
    // thumbnail
    var tw=70, th=CARD_H-18, tx=12, ty=9;
    var tg = ctx.createLinearGradient(tx, ty, tx+tw, ty+th);
    tg.addColorStop(0, 'hsl('+c.hue+',48%,32%)'); tg.addColorStop(1, 'hsl('+c.hue+',60%,18%)');
    ctx.fillStyle = tg;
    ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(tx,ty,tw,th,8); else ctx.rect(tx,ty,tw,th); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(tx+tw/2-8, ty+th/2-9); ctx.lineTo(tx+tw/2+9, ty+th/2); ctx.lineTo(tx+tw/2-8, ty+th/2+9);
    ctx.closePath(); ctx.fill();
    // tag
    ctx.fillStyle = c.topic.good ? TEAL : VERM;
    ctx.font = '700 11px -apple-system,Helvetica,Arial'; ctx.textAlign = 'left';
    ctx.fillText('#' + c.topic.tag.toUpperCase(), tx+tw+10, 28);
    ctx.fillStyle = 'rgba(255,255,255,0.88)'; ctx.font = '600 13px -apple-system,Helvetica,Arial';
    ctx.fillText(c.topic.good ? 'You might enjoy this' : 'Suggested for you', tx+tw+10, 50);
    ctx.fillStyle = 'rgba(255,255,255,0.38)'; ctx.font = '500 11px -apple-system,Helvetica,Arial';
    ctx.fillText(c.views+'K views  •  '+c.age+'h ago', tx+tw+10, 68);
    // long-press arc
    if (c.pressing && c.pulseT > 0) {
      var pr=18, pcx=CARD_W-28, pcy=CARD_H/2;
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(pcx,pcy,pr,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle=VERM; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(pcx,pcy,pr,-Math.PI/2,-Math.PI/2+c.pulseT*Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.65)';
      ctx.font='600 8px Menlo,monospace'; ctx.textAlign='center';
      ctx.fillText('NOT INT', pcx, pcy+pr+11);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.16)'; ctx.font='500 9px Menlo,monospace'; ctx.textAlign='right';
      ctx.fillText('hold → not interested', CARD_W-8, CARD_H-9);
    }
    ctx.restore();
  }

  function drawPurityBar() {
    var bx=20, by=110, bw=W-40, bh=8;
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(bx,by,bw,bh,4); else ctx.rect(bx,by,bw,bh); ctx.fill();
    var fw=bw*(purity/100);
    ctx.fillStyle=purity>70?TEAL:purity>40?GOLD:VERM;
    ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(bx,by,fw,bh,4); else ctx.rect(bx,by,fw,bh); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='600 10px Menlo,monospace';
    ctx.textAlign='left';  ctx.fillText('FEED PURITY', bx, by-4);
    ctx.textAlign='right'; ctx.fillText((purity|0)+'%', bx+bw, by-4);
  }

  // ---- Frame loop ----
  var last = performance.now();
  function frame(now) {
    var rawDt = Math.min((now - last) / 16.667, 3);
    last = now;

    // Advance sim timer (scaled)
    if (phase === 'play') {
      simTimeLeft -= rawDt * SIM_SCALE / 60;
      if (simTimeLeft <= 0) { simTimeLeft = 0; gameOver(); }
      if (simTimeLeft < 10 && window.J) J.tension(1 - simTimeLeft / 10);
    }

    // Autopilots (timestamp-driven, not dt-driven)
    if (DEMO) runDemoAutopilot(now);
    if (BOT)  runBotAutopilot(now);

    // Decay juice (use rawDt so visuals feel normal speed)
    if (hitStop > 0) hitStop -= rawDt; // don't gate on hitStop here (it doesn't block autopilot now)
    shake *= Math.pow(0.85, rawDt);
    zoom  += (1 - zoom) * 0.12 * rawDt;

    // Human long-press polling
    if (!DEMO && !BOT && pressId >= 0 && phase === 'play') {
      var held = now - pressStart;
      for (var i = 0; i < cards.length; i++) {
        if (cards[i].id === pressId) {
          cards[i].pulseT = Math.min(1, held / LONG_MS);
          if (cards[i].pulseT >= 1 && !cards[i].done) { dismissCard(cards[i]); pressId = -1; }
          break;
        }
      }
    }

    // Animate cards
    var active = 0;
    for (var j = cards.length - 1; j >= 0; j--) {
      var c = cards[j];
      if (c.done) {
        c.offX += c.offX < 0 ? -18 * rawDt : 18 * rawDt;
        c.alpha = Math.max(0, c.alpha - 0.06 * rawDt);
        if (c.alpha <= 0) cards.splice(j, 1);
      } else {
        if (phase === 'play') {
          c.y -= 0.3 * rawDt;
          if (c.y + CARD_H < 122) { keepCard(c); }  // scroll off top → passive keep
        }
        active++;
      }
    }
    if (phase === 'play' && active < 2) ensureCards();

    // === DRAW ===
    ctx.save();
    if (shake > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shake, sy = (Math.random() - 0.5) * shake;
      ctx.translate(W/2 + sx, H/2 + sy); ctx.scale(zoom, zoom); ctx.translate(-W/2, -H/2);
    }
    ctx.fillStyle = INK; ctx.fillRect(-20, -20, W + 40, H + 40);
    var bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Title
    if (phase === 'title') {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff'; ctx.font = '900 48px -apple-system,Helvetica,Arial';
      ctx.fillText('FYP TRAIN', W/2, 280);
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '600 15px -apple-system,Helvetica,Arial';
      ctx.fillText('you are the algorithm', W/2, 316);
      ctx.fillStyle = VERM; ctx.font = '700 17px -apple-system,Helvetica,Arial';
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(now / 320);
      ctx.fillText('TAP TO START', W/2, 372); ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '500 12px -apple-system,Helvetica,Arial';
      ctx.fillText('hold → not interested  •  tap → keep', W/2, 402);
    }

    // Challenge card (demo beat 1)
    if (phase === 'challenge') {
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '800 16px Menlo,monospace';
      ctx.fillText('SCORE TO BEAT', W/2, 300);
      ctx.fillStyle = GOLD; ctx.font = '900 96px -apple-system,Helvetica,Arial';
      ctx.fillText('28', W/2, 404);
      ctx.fillStyle = 'rgba(255,255,255,0.32)'; ctx.font = '600 13px -apple-system,Helvetica,Arial';
      ctx.fillText("today's top curator", W/2, 438);
    }

    // Play HUD
    if (phase === 'play') {
      var tLeft = Math.ceil(simTimeLeft);
      ctx.textAlign = 'center';
      ctx.fillStyle = tLeft <= 10 ? VERM : 'rgba(255,255,255,0.85)';
      ctx.font = '800 36px -apple-system,Helvetica,Arial';
      ctx.fillText(tLeft + 's', W/2, 46);
      ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '700 13px -apple-system,Helvetica,Arial';
      ctx.fillText('PURGED ' + score, W/2, 66);
      if (combo >= 2) {
        var cs = Math.min(20 + combo * 2, 38);
        ctx.fillStyle = GOLD; ctx.font = '900 ' + cs + 'px -apple-system,Helvetica,Arial';
        ctx.fillText('×' + combo + ' COMBO', W/2, 88);
      }
      drawPurityBar();
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        ctx.fillStyle = dareBeaten ? TEAL : GOLD;
        ctx.font = '800 13px -apple-system,Helvetica,Arial';
        ctx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — by ' + SHARE.by : ''), W/2, 133);
      }
      for (var ci = cards.length - 1; ci >= 0; ci--) drawCard(cards[ci]);
      ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.font = '500 10px Menlo,monospace';
      ctx.fillText('HOLD — not interested   TAP — keep', W/2, H - 12);
    }

    // Score card / over
    if (phase === 'over') {
      ctx.fillStyle = 'rgba(11,13,18,0.72)'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.fillStyle = VERM; ctx.font = '900 36px -apple-system,Helvetica,Arial';
      ctx.fillText('FEED CLOSED.', W/2, 285);
      ctx.fillStyle = '#fff'; ctx.font = '800 26px -apple-system,Helvetica,Arial';
      ctx.fillText(score + ' topics purged', W/2, 328);
      ctx.fillStyle = GOLD; ctx.font = '700 17px -apple-system,Helvetica,Arial';
      ctx.fillText('PURITY: ' + (purity | 0) + '%', W/2, 356);
      var pt = pctTop(score);
      ctx.fillStyle = GOLD; ctx.font = '900 22px -apple-system,Helvetica,Arial';
      ctx.fillText('TOP ' + pt + '% TODAY', W/2, 394);
      ctx.fillStyle = 'rgba(255,255,255,0.42)'; ctx.font = '600 12px -apple-system,Helvetica,Arial';
      ctx.fillText('cleaner than ' + (100 - pt) + '% of players', W/2, 416);
      if (!DEMO && !BOT) {
        ctx.globalAlpha = 0.6 + 0.4 * Math.sin(now / 280); ctx.fillStyle = TEAL;
        ctx.font = '700 16px -apple-system,Helvetica,Arial';
        ctx.fillText('TAP — TRAIN AGAIN', W/2, 454); ctx.globalAlpha = 1;
        ctx.fillStyle = 'rgba(242,177,52,0.14)'; ctx.strokeStyle = GOLD; ctx.lineWidth = 1.5;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else ctx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = GOLD; ctx.font = '800 16px -apple-system,Helvetica,Arial';
        ctx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W/2, SHARE_R.y + 30);
      }
    }

    // Demo CTA
    if (phase === 'cta') {
      var tCta = (now - ctaAt) / 1000, ease = Math.min(1, tCta * 2.2);
      ctx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')'; ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = ease; ctx.textAlign = 'center';
      ctx.fillStyle = '#fff'; ctx.font = '900 46px -apple-system,Helvetica,Arial';
      ctx.fillText('FYP TRAIN', W/2, 294);
      ctx.fillStyle = 'rgba(255,255,255,0.68)'; ctx.font = '700 17px -apple-system,Helvetica,Arial';
      ctx.fillText('they purged ' + (window.__demoScore || 28) + '. your turn.', W/2, 334);
      ctx.fillStyle = VERM; ctx.globalAlpha = ease * (0.7 + 0.3 * Math.sin(now / 240));
      ctx.font = '900 30px -apple-system,Helvetica,Arial';
      ctx.fillText('▶ BEAT ' + (window.__demoScore || 28), W/2, 404);
      ctx.globalAlpha = ease; ctx.fillStyle = TEAL; ctx.font = '700 15px -apple-system,Helvetica,Arial';
      ctx.fillText('link in bio', W/2, 438); ctx.globalAlpha = 1;
    }

    // Flashes
    for (var fi = flashes.length - 1; fi >= 0; fi--) {
      var fl = flashes[fi]; fl.t += rawDt;
      var fa = Math.max(0, 1 - fl.t / 38);
      ctx.globalAlpha = fa; ctx.textAlign = 'center'; ctx.fillStyle = fl.col;
      ctx.font = '900 ' + (fl.sz + fl.t * 0.35) + 'px -apple-system,Helvetica,Arial';
      ctx.fillText(fl.txt, W/2, 222 - fl.t * 0.5);
      ctx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(fi, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      ctx.textAlign = 'center'; ctx.globalAlpha = 0.5;
      ctx.font = '16px -apple-system,Helvetica,Arial'; ctx.fillStyle = '#fff';
      ctx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
