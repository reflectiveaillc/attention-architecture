<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Brow Lift — Tilt</title>
<!--
  LOOP / attention-architecture — Brow Lift (FACE-CONTROL engine, shared lib)
  Raise your EYEBROWS to levitate a glowing orb over gaps between platforms.
  Relax to let it fall. The webcam is composited into the game canvas (corner PiP)
  so a single recording captures BOTH the game and your permanently surprised face.
  Tech: shared face-control.js (MediaPipe FaceLandmarker, FC.sig.browRaise) + getUserMedia
        + MediaRecorder (canvas.captureStream → downloadable webm).
  Funny-face payoff: eyebrows glued to the ceiling trying to keep the orb floating.
  Modes: ?demo=1 / ?bot=1 run AUTO with no camera — simulated face animates
         eyebrows raising + cheeks puffing to match the control.
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:none;
               font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
  video { display:none; }
  #ui { position:fixed; left:0; right:0; bottom:max(16px,env(safe-area-inset-bottom)); display:flex; gap:10px; justify-content:center; z-index:10; }
  button { background:#12151d; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:99px;
           padding:12px 20px; font-size:15px; font-weight:800; cursor:pointer; }
  button.rec { background:#e8502e; border-color:#e8502e; }
  button.rec.on { animation:pulse 1s infinite; }
  @keyframes pulse { 50% { opacity:.55; } }
  #perm { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:24px; z-index:20; background:#0b0d12; }
  #perm h1 { font-size:34px; font-weight:900; margin:0; }
  #perm p { color:rgba(255,255,255,.6); font-size:15px; max-width:320px; margin:0; }
  #perm .big { background:#e8502e; border-color:#e8502e; font-size:18px; padding:16px 28px; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="perm">
  <h1>BROW LIFT</h1>
  <p>Raise your <b>eyebrows</b> to levitate the orb. Relax to let it fall. Navigate the gaps without touching the walls. Your face rides in the corner — record it and share the surprise.</p>
  <button class="big" id="start">▶ ALLOW CAMERA &amp; PLAY</button>
  <p style="font-size:12px;opacity:.5">camera stays on your device — nothing is uploaded</p>
</div>
<div id="ui" style="display:none">
  <button id="rec" class="rec">● RECORD</button>
</div>
<script>window.LOOP_GAME = 'brow-lift';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script src="../../js/face-control.js"></script>
<script type="module">
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;
  var AUTO = DEMO || BOT;                 // no camera in scripted modes

  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio||1,2), scale=1;
  function fit(){var s=Math.min(window.innerWidth/W,window.innerHeight/H);scale=s;cv.style.width=(W*s)+'px';cv.style.height=(H*s)+'px';cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);}
  window.addEventListener('resize',fit); fit();

  var VERM='#e8502e', TEAL='#2ec5b6', GOLD='#f2b134', PURPLE='#a855f7', INK='#0b0d12';

  // ---- shared FaceControl lib ----
  var FC = window.FaceControl;

  // ---- game state ----
  // Orb physics tuned for FACE control: gentle gravity + moderate lift.
  // Discrete-flap physics (mirrors flappy-face): each brow raise = one fixed impulse
  var ORB_X = 120;           // fixed horizontal position (like bird in flappy)
  var GRAV = 0.28;           // gravity always on — each brow raise is one discrete flap
  var FLAP_IMPULSE = -4.8;   // fixed upward impulse per eyebrow raise (predictable bump)
  var MAX_VY = 6.5;          // terminal velocity cap
  var WALL_W = 58;           // wall pair width
  var GAP = 290;             // big gap — very forgiving for imprecise face control
  var WALL_EVERY = 155;      // spawn interval (frames) — wide spacing, lots of breathing room
  var WALL_SPEED = 1.6;      // slow walls — face reaction lag is high, needs time

  var st, walls, spawnT, best=0, hitStop=0, shakeAmt=0, dareBeaten=false;
  try{best=+localStorage.getItem('bl_best')||0;}catch(_){}
  var browSmoothed=0, isBrowActive=false, wasLifting=false;

  function newRun(){
    st={phase:'ready',y:H/2,vy:0,score:0,overAt:0};
    walls=[]; spawnT=0;
    if(AUTO){ st.phase='play'; start(); }
  }
  function start(){
    st.phase='play'; st.y=H/2; st.vy=0; st.score=0; walls=[]; spawnT=0; dareBeaten=false;
    runStartTs=Date.now();
    if(window.LOOP) LOOP.emit('play_start',{seed:SEED});
  }
  var runStartTs=0;
  // Test hook — lets validators inspect live state headlessly.
  window.__st = function(){ return { st:st, walls:walls, GAP:GAP, GRAV:GRAV, FLAP_IMPULSE:FLAP_IMPULSE, MAX_VY:MAX_VY, WALL_SPEED:WALL_SPEED, isBrowActive:isBrowActive, browSmoothed:browSmoothed }; };

  function spawnWall(){
    // first wall's gap sits near center so the orb starting at H/2 can reach it;
    // later walls vary within safe margins.
    var margin=110;
    var gy = (st.score===0 && walls.length===0) ? H/2-GAP/2 : margin+rng()*(H-GAP-margin*2);
    walls.push({x:W+WALL_W, gapY:gy, scored:false});
  }

  function gameOver(){
    st.phase='over'; st.overAt=performance.now(); shakeAmt=12;
    var dur=(Date.now()-runStartTs)/1000;
    var nb=st.score>best; if(nb){best=st.score;try{localStorage.setItem('bl_best',String(best));}catch(_){}};
    if(window.J){J.death(Math.min(0.3+st.score/20,1)); if(nb) setTimeout(function(){J.fanfare();},450);}
    if(DEMO) window.__demoScore=st.score;
    if(window.LOOP) LOOP.emit('game_over',{score:st.score,dur_s:+dur.toFixed(1)});
    if(BOT){ botRunsDone++; if(botRunsDone>=BOT_RUNS) window.__botDone=true; else setTimeout(function(){newRun();},700); }
    if(DEMO){ setTimeout(function(){ st.phase='cta'; ctaAt=performance.now(); setTimeout(function(){window.__demoDone=true;},3200); }, 1400); }
  }
  var botRunsDone=0, ctaAt=0;

  // ---- input: FACE ONLY. Tap/space ONLY restarts after a crash — never lifts.
  // The lift is driven exclusively by raising your eyebrows (FC.sig.browRaise).
  function tapRestart(){ if(AUTO) return; if(st.phase==='over'&&performance.now()-st.overAt>500) newRun(); }
  window.addEventListener('keydown',function(e){ if(e.code==='Space'){e.preventDefault(); tapRestart();} });
  cv.addEventListener('pointerdown', tapRestart);

  // ---- camera start (shared FC lib) ----
  async function startCamera(){
    document.getElementById('perm').style.display='none';
    document.getElementById('ui').style.display='flex';
    await FC.start();
    newRun();
    requestAnimationFrame(frame);
  }
  document.getElementById('start').addEventListener('click', startCamera);

  // ---- AUTO autopilot (does NOT go through FC — pure scripted sim) ----
  var autoCool=0;
  function flapOrb(){  // one bump per eyebrow raise (fixed strength — predictable)
    if(st.phase==='ready'){ st.phase='play'; start(); }
    if(st.phase!=='play') return;
    st.vy=FLAP_IMPULSE;
    if(window.J) J.hit(st.score+1);
  }

  // ---- render loop ----
  var last=performance.now();
  function frame(now){
    var dt=Math.min((now-last)/16.667,3); last=now;

    if(AUTO){
      // AUTO: scripted sim — discrete flaps toward the next gap (same path as human)
      var giveUp = (DEMO && st.score>=6) || (BOT && st.score>=3+botRunsDone*2);
      autoCool-=dt;
      if(st.phase==='play' && !giveUp && autoCool<=0){
        var next=null; for(var i=0;i<walls.length;i++){ if(walls[i].x+WALL_W>ORB_X-30){ next=walls[i]; break; } }
        var target = next ? next.gapY+GAP*0.42 : H*0.45;
        if(st.y>target+12 && st.vy>-1){ flapOrb(); autoCool=11; browSmoothed=1; }
      }
      browSmoothed += (0 - browSmoothed)*0.15*dt;   // PiP brows pulse up on each flap
      isBrowActive = browSmoothed > 0.35;
    } else {
      // Human: face ONLY — no tap/keyboard fallback for the mechanic.
      // DISCRETE FLAP via the lib's edge-triggered pulse engine: each eyebrow
      // RAISE is one tap (a 1 in a 1/0 world) — raise·relax·raise to chain.
      // No frowning needed: gravity brings the orb down on its own.
      FC.update(now);
      browSmoothed += (FC.sig.browRaise - browSmoothed)*0.55*dt;  // rendering only
      isBrowActive = FC.gate.browRaise;
      wasLifting = isBrowActive;
      if(FC.tap('browRaise')) flapOrb();   // flapOrb() itself starts from 'ready'
    }

    if(hitStop>0){hitStop-=dt;}
    else if(st.phase==='play'){
      // Physics: gravity always pulls down; each brow raise is one upward impulse
      st.vy += GRAV * dt;
      st.vy = Math.max(-MAX_VY, Math.min(MAX_VY, st.vy));
      st.y += st.vy * dt;

      // Spawn walls
      spawnT+=dt; if(spawnT>=WALL_EVERY){spawnT=0; spawnWall();}
      for(var i=walls.length-1;i>=0;i--){
        var p=walls[i]; p.x -= WALL_SPEED*dt;
        if(!p.scored && p.x+WALL_W<ORB_X){ p.scored=true; st.score++; if(window.J)J.perfect(st.score);
          if(!AUTO&&window.SHARE&&SHARE.dare!==null&&!dareBeaten&&st.score>SHARE.dare){dareBeaten=true;if(window.J)J.fanfare();SHARE.beaten(st.score);}
        }
        if(p.x<-WALL_W) walls.splice(i,1);
        // Collision: orb radius ~16
        if(ORB_X+16>p.x && ORB_X-16<p.x+WALL_W){
          if(st.y-16<p.gapY || st.y+16>p.gapY+GAP){ gameOver(); break; }
        }
      }
      if(st.y>H-20||st.y<-40) gameOver();
    }

    // ---- draw ----
    cx.save();
    if(shakeAmt>0.3){cx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt);} shakeAmt*=Math.pow(0.85,dt);

    // Background gradient
    var bg=cx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#0a0818'); bg.addColorStop(1,'#0b0d12');
    cx.fillStyle=bg; cx.fillRect(0,0,W,H);

    // Draw star field (static, decorative)
    cx.fillStyle='rgba(255,255,255,0.12)';
    var starRng = mulberry32(9999);
    for(var s=0;s<40;s++){
      var sx=starRng()*W, sy=starRng()*H, sr=starRng()*1.5+0.5;
      cx.beginPath(); cx.arc(sx,sy,sr,0,Math.PI*2); cx.fill();
    }

    // Draw walls (glowing purple/teal)
    for(var j=0;j<walls.length;j++){
      var pp=walls[j];
      var gt=cx.createLinearGradient(pp.x,0,pp.x+WALL_W,0);
      gt.addColorStop(0,'#7c3aed'); gt.addColorStop(1,'#a855f7');
      cx.fillStyle=gt;
      cx.fillRect(pp.x,0,WALL_W,pp.gapY);
      var gb=cx.createLinearGradient(pp.x,0,pp.x+WALL_W,0);
      gb.addColorStop(0,'#7c3aed'); gb.addColorStop(1,'#a855f7');
      cx.fillStyle=gb;
      cx.fillRect(pp.x,pp.gapY+GAP,WALL_W,H-pp.gapY-GAP);
      cx.strokeStyle='rgba(168,85,247,0.6)'; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(pp.x,0); cx.lineTo(pp.x,pp.gapY); cx.stroke();
      cx.beginPath(); cx.moveTo(pp.x,pp.gapY+GAP); cx.lineTo(pp.x,H); cx.stroke();
    }

    // Draw orb
    var oy = st ? st.y : H/2;
    var ovy = st ? st.vy : 0;
    cx.save(); cx.translate(ORB_X, oy);

    var glowSize = isBrowActive ? 38 : 26;
    var glowAlpha = isBrowActive ? 0.35 : 0.15;
    var glowGrad = cx.createRadialGradient(0,0,4,0,0,glowSize);
    glowGrad.addColorStop(0,'rgba(168,85,247,'+(glowAlpha*2.5)+')');
    glowGrad.addColorStop(0.5,'rgba(99,102,241,'+glowAlpha+')');
    glowGrad.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=glowGrad; cx.beginPath(); cx.arc(0,0,glowSize,0,Math.PI*2); cx.fill();

    var orbGrad = cx.createRadialGradient(-5,-5,2,0,0,16);
    if(isBrowActive){
      orbGrad.addColorStop(0,'#e0d0ff');
      orbGrad.addColorStop(0.5,'#a855f7');
      orbGrad.addColorStop(1,'#6d28d9');
    } else {
      orbGrad.addColorStop(0,'#c4b5fd');
      orbGrad.addColorStop(0.5,'#7c3aed');
      orbGrad.addColorStop(1,'#4c1d95');
    }
    cx.fillStyle=orbGrad; cx.beginPath(); cx.arc(0,0,16,0,Math.PI*2); cx.fill();

    var tiltAngle = Math.max(-0.5, Math.min(0.5, ovy*0.05));
    cx.fillStyle='rgba(255,255,255,0.25)'; cx.beginPath(); cx.ellipse(-5,-6,5,3,tiltAngle,0,Math.PI*2); cx.fill();

    if(isBrowActive){
      cx.fillStyle='rgba(168,85,247,0.4)';
      for(var t=0;t<3;t++){
        var ty=8+t*8, tx=(Math.random()-0.5)*10;
        cx.beginPath(); cx.arc(tx,ty,3-t*0.8,0,Math.PI*2); cx.fill();
      }
    }
    cx.restore();

    // ---- webcam PiP (FC.drawPiP mirrors FC.video; border reddens when active) ----
    var camW=118, camH=88, cxp=W-camW-12, cyp=12;
    if(!AUTO){
      FC.drawPiP(cx, cxp, cyp, camW, camH, isBrowActive, Math.min(1, browSmoothed * 1.3), W, H);
    } else {
      // Simulated face for demo/bot: eyebrows raising + cheeks puffing
      cx.save();
      cx.strokeStyle='rgba(255,255,255,0.3)'; cx.lineWidth=2;
      cx.beginPath(); cx.roundRect?cx.roundRect(cxp,cyp,camW,camH,12):cx.rect(cxp,cyp,camW,camH); cx.stroke();
      cx.beginPath(); cx.roundRect?cx.roundRect(cxp,cyp,camW,camH,12):cx.rect(cxp,cyp,camW,camH);
      cx.clip();
      cx.fillStyle='#1a1025'; cx.fillRect(cxp,cyp,camW,camH);
      var fcx=cxp+camW/2, fcy=cyp+camH/2;
      cx.fillStyle='#f4c084'; cx.beginPath(); cx.arc(fcx,fcy,28,0,Math.PI*2); cx.fill();
      if(browSmoothed>0.2){
        var puff=browSmoothed*8;
        cx.fillStyle='rgba(255,150,120,0.4)';
        cx.beginPath(); cx.ellipse(fcx-20,fcy+4,10+puff,7+puff*0.5,0,0,Math.PI*2); cx.fill();
        cx.beginPath(); cx.ellipse(fcx+20,fcy+4,10+puff,7+puff*0.5,0,0,Math.PI*2); cx.fill();
      }
      var eyeH = 3 + browSmoothed*3;
      cx.fillStyle='#2a1a0a'; cx.beginPath(); cx.ellipse(fcx-10,fcy-4,4,eyeH,0,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.ellipse(fcx+10,fcy-4,4,eyeH,0,0,Math.PI*2); cx.fill();
      var browRaise = browSmoothed * 16;
      var browY = fcy-16-browRaise;
      cx.strokeStyle='#2a1a0a'; cx.lineWidth=2.5; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(fcx-18,browY+2); cx.quadraticCurveTo(fcx-10,browY-4,fcx-2,browY+1); cx.stroke();
      cx.beginPath(); cx.moveTo(fcx+18,browY+2); cx.quadraticCurveTo(fcx+10,browY-4,fcx+2,browY+1); cx.stroke();
      if(browSmoothed>0.3){
        cx.strokeStyle='rgba(160,100,50,0.3)'; cx.lineWidth=1;
        for(var wl=0;wl<3;wl++){
          var wy=browY-6-wl*5;
          cx.beginPath(); cx.moveTo(fcx-16,wy); cx.lineTo(fcx+16,wy); cx.stroke();
        }
      }
      var mouthOpen = browSmoothed * 0.5;
      cx.strokeStyle='#2a1a0a'; cx.lineWidth=2; cx.fillStyle='#2a1a0a';
      if(mouthOpen > 0.1){
        cx.beginPath(); cx.ellipse(fcx,fcy+14,6,3+mouthOpen*8,0,0,Math.PI*2); cx.fill();
      } else {
        cx.beginPath(); cx.arc(fcx,fcy+14,5,0.1,Math.PI-0.1); cx.stroke();
      }
      cx.restore();
    }

    // Status label under PiP
    var fcLabel = AUTO ? 'DEMO' : (FC.statusLabel() || (FC.sig.browRaise > 0.18 ? 'BROWS UP!' : 'raise your brows'));
    cx.fillStyle=(fcLabel.indexOf('http')>=0||fcLabel.indexOf('blocked')>=0)?GOLD:'rgba(255,255,255,0.55)';
    cx.font='700 9px Menlo,monospace'; cx.textAlign='center';
    cx.fillText(fcLabel.toUpperCase(), cxp+camW/2, cyp+camH+22);

    // Score
    cx.textAlign='center'; cx.fillStyle='#fff'; cx.font='900 56px -apple-system,Helvetica,Arial';
    if(st&&(st.phase==='play'||st.phase==='over')) cx.fillText(st.score,W/2,90);
    cx.fillStyle='rgba(255,255,255,0.4)'; cx.font='600 12px Menlo,monospace'; cx.fillText('BEST '+best,W/2,112);

    // Lift indicator (vertical bar on left)
    if(st&&st.phase==='play'){
      var barH=160, barX=22, barY=H/2-barH/2;
      cx.fillStyle='rgba(255,255,255,0.08)'; cx.fillRect(barX-6,barY,12,barH);
      var fillH=barH*Math.max(0,Math.min(1,browSmoothed));
      var barGrad=cx.createLinearGradient(0,barY+barH,0,barY+barH-fillH);
      barGrad.addColorStop(0,'#7c3aed'); barGrad.addColorStop(1,'#a855f7');
      cx.fillStyle=barGrad; cx.fillRect(barX-6,barY+barH-fillH,12,fillH);
      cx.fillStyle=isBrowActive?'#a855f7':'rgba(255,255,255,0.3)';
      cx.beginPath(); cx.moveTo(barX,barY-8); cx.lineTo(barX-6,barY+2); cx.lineTo(barX+6,barY+2); cx.closePath(); cx.fill();
    }

    // Ready state
    if(st&&st.phase==='ready'){
      cx.fillStyle=PURPLE; cx.font='800 18px -apple-system,Helvetica,Arial';
      cx.globalAlpha=0.6+0.4*Math.sin(now/300); cx.fillText('RAISE\u00B7RELAX\u00B7RAISE \u2014 EACH LIFT IS A FLAP',W/2,H/2-40); cx.globalAlpha=1;
    }

    // Over state
    if(st&&st.phase==='over'){
      cx.fillStyle='rgba(11,13,18,0.65)'; cx.fillRect(0,0,W,H);
      cx.fillStyle=VERM; cx.font='900 42px -apple-system,Helvetica,Arial'; cx.textAlign='center'; cx.fillText('DROPPED.',W/2,H/2-30);
      cx.fillStyle='#fff'; cx.font='800 24px -apple-system,Helvetica,Arial'; cx.fillText(st.score+' gaps',W/2,H/2+8);
      if(!AUTO){ cx.fillStyle=TEAL; cx.font='700 15px -apple-system,Helvetica,Arial';
        cx.globalAlpha=0.6+0.4*Math.sin(now/280); cx.fillText('tap to try again — face controls the lift',W/2,H/2+50); cx.globalAlpha=1; }
    }

    // CTA state (demo end)
    if(st&&st.phase==='cta'){
      var t=(now-ctaAt)/1000, e=Math.min(1,t*2.2);
      cx.fillStyle='rgba(11,13,18,'+(0.82*e)+')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha=e;
      cx.fillStyle='#fff'; cx.font='900 40px -apple-system,Helvetica,Arial'; cx.textAlign='center'; cx.fillText('BROW LIFT',W/2,H/2-30);
      cx.fillStyle=TEAL; cx.font='700 17px -apple-system,Helvetica,Arial'; cx.fillText('raise your brows. levitate. record the look.',W/2,H/2+6);
      cx.fillStyle=VERM; cx.font='900 24px -apple-system,Helvetica,Arial'; cx.fillText('▶ PLAY NOW',W/2,H/2+52);
      cx.globalAlpha=1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- recording (shared FC lib) ----
  var recBtn=document.getElementById('rec');
  recBtn.addEventListener('click',function(){
    var started=FC.toggleRecord(cv,'brow-lift.webm',function(){
      recBtn.textContent='● RECORD'; recBtn.classList.remove('on');
      if(window.LOOP) LOOP.emit('recording_saved',{score:st?st.score:0});
    });
    if(started){ recBtn.textContent='■ STOP & SAVE'; recBtn.classList.add('on'); }
  });

  // Scripted modes auto-start (no camera prompt)
  if(AUTO){ document.getElementById('perm').style.display='none'; newRun(); requestAnimationFrame(frame); }
})();
</script>
</body>
</html>
