<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ── game rules ─────────────────────────────────────────────────
  // Rules cycle: 'tap-green'  → 'tap-red' → 'tap-none' → 'tap-both'
  var RULES = ['tap-green', 'tap-red', 'tap-none', 'tap-both'];
  var RULE_LABELS = {
    'tap-green': 'TAP GREEN',
    'tap-red':   'TAP RED',
    'tap-none':  'TAP NOTHING',
    'tap-both':  'TAP BOTH'
  };
  var RULE_SUBS = {
    'tap-green': 'dodge the red',
    'tap-red':   'dodge the green',
    'tap-none':  'don\'t tap anything',
    'tap-both':  'tap green and red'
  };
  var FLIP_INTERVAL = 4000; // ms
  var MAX_FLIPS = 10;       // survive 10 flips → win
  var TILE_CYCLE = 900;     // ms between tile appearances
  var TILE_W = 100, TILE_H = 100;
  var COLS = 3, ROWS = 4;   // 3x4 grid of tile positions
  var TILE_APPEAR_DUR = 500; // ms tile is visible

  // ── state ──────────────────────────────────────────────────────
  var state, flashes, hitStop, shakeAmt, zoom, dareBeaten;
  var runStartTs, best = 0, botRunsDone = 0, ctaAt = 0;
  try { best = +localStorage.getItem('rf_best') || 0; } catch (_) {}

  function newGame() {
    state = {
      phase: 'title',  // title | challenge | play | win | over | cta
      ruleIdx: 0,
      flips: 0,
      score: 0,
      combo: 0,
      lives: 3,
      // tile state
      tile: null,       // { x, y, color, appear, alive }
      tileTimer: 0,
      flipTimer: 0,
      overAt: 0,
      winAt: 0,
      flipFlash: 0,     // ms, new-rule flash
      flipRule: ''      // rule text shown during flip
    };
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1; dareBeaten = false;

    if (DEMO) {
      state.phase = 'challenge';
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
  }

  function startRun() {
    state.phase = 'play';
    state.ruleIdx = 0;
    state.flips = 0;
    state.score = 0;
    state.combo = 0;
    state.lives = 3;
    state.tileTimer = 0;
    state.flipTimer = 0;
    state.tile = null;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    spawnTile();
  }

  // ── tile logic ──────────────────────────────────────────────────
  function currentRule() { return RULES[state.ruleIdx % RULES.length]; }

  function spawnTile() {
    if (state.phase !== 'play') return;
    // pick random grid cell
    var col = Math.floor(rng() * COLS);
    var row = Math.floor(rng() * ROWS);
    var cx_ = 60 + col * 100;
    var cy_ = 220 + row * 110;
    // color: mostly green/red, occasionally both (for tap-both rule)
    var color = rng() < 0.5 ? 'green' : 'red';
    // for tap-both rule, sometimes spawn a pair
    state.tile = {
      x: cx_, y: cy_,
      color: color,
      appear: Date.now(),
      tapped: false,
      alive: true
    };
    // For tap-both, also spawn a second tile
    if (currentRule() === 'tap-both' && rng() < 0.7) {
      // pick another cell
      var col2 = (col + 1 + Math.floor(rng() * (COLS - 1))) % COLS;
      var row2 = Math.floor(rng() * ROWS);
      state.tile2 = {
        x: 60 + col2 * 100,
        y: 220 + row2 * 110,
        color: color === 'green' ? 'red' : 'green',
        appear: Date.now(),
        tapped: false,
        alive: true
      };
    } else {
      state.tile2 = null;
    }
    state.tileTimer = 0;
  }

  function evaluateTap(tappedColor) {
    var rule = currentRule();
    var correct = false;
    if (rule === 'tap-green' && tappedColor === 'green') correct = true;
    if (rule === 'tap-red'   && tappedColor === 'red')   correct = true;
    if (rule === 'tap-none')  correct = false; // tapping anything = wrong
    if (rule === 'tap-both') {
      // correct only if green tapped; wrong if red (handled by tap both tracking)
      correct = true; // partial: we accept any tap in tap-both as "progress"
    }
    return correct;
  }

  function onTileHit(correct, tileObj) {
    if (!tileObj || !tileObj.alive) return;
    tileObj.tapped = true;
    tileObj.alive = false;
    if (correct) {
      state.score++;
      state.combo++;
      var isGold = state.combo >= 5;
      if (window.J) {
        if (isGold) J.gold();
        else if (state.combo >= 3) J.perfect(state.combo);
        else J.hit(state.combo);
      }
      if (isGold) { hitStop = 3; zoom = 1.03; flash('+' + (isGold ? '2' : '1') + ' ×' + state.combo, GOLD, 36); }
      else if (state.combo >= 3) { hitStop = 2; flash('+1 ×' + state.combo, TEAL, 34); }
      else { flash('+1', TEAL, 30); }
      if (window.LOOP) LOOP.emit('tile_hit', { score: state.score, combo: state.combo });
      // dare check
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(state.score);
      }
    } else {
      loseLife();
    }
  }

  function onMiss(tileObj) {
    // tile expired without being tapped
    if (!tileObj || !tileObj.alive) return;
    tileObj.alive = false;
    var rule = currentRule();
    if (rule === 'tap-none') {
      // didn't tap = correct!
      state.score++;
      state.combo++;
      if (window.J) J.hit(state.combo);
      flash('+1 RESISTED', TEAL, 30);
      if (window.LOOP) LOOP.emit('tile_resist', { score: state.score });
    } else if (rule === 'tap-both') {
      // needed to tap both; if second tile also missed, lose life
      // handled after checking tile2
      loseLife();
    } else {
      // tap-green or tap-red — missing = wrong
      loseLife();
    }
  }

  function loseLife() {
    state.lives = Math.max(0, state.lives - 1);
    state.combo = 0;
    shakeAmt = 5;
    var nearMiss = state.lives === 1;
    if (window.J) {
      if (nearMiss) J.near();
      else J.tension(1 - state.lives / 3);
    }
    if (nearMiss) {
      flash('LAST LIFE!', VERM, 36);
      if (window.LOOP) LOOP.emit('near_miss', { lives: state.lives, score: state.score });
    } else {
      flash('MISS', VERM, 30);
    }
    if (state.lives <= 0) {
      gameOver();
    }
  }

  function doFlip() {
    state.ruleIdx = (state.ruleIdx + 1) % RULES.length;
    state.flips++;
    state.flipFlash = 1200;
    state.flipTimer = 0;
    state.tile = null;
    state.tile2 = null;
    hitStop = 5;
    shakeAmt = 3;
    if (window.J) J.tension(Math.min(state.flips / MAX_FLIPS, 1));
    if (window.LOOP) LOOP.emit('rule_flip', { flip: state.flips, rule: currentRule() });
    if (state.flips >= MAX_FLIPS) {
      win();
      return;
    }
    // Spawn new tile after brief delay
    setTimeout(function () { if (state.phase === 'play') spawnTile(); }, 400);
  }

  function win() {
    state.phase = 'win';
    state.winAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) { J.fanfare(); }
    if (newBest) { best = state.score; try { localStorage.setItem('rf_best', String(best)); } catch (_) {} }
    if (DEMO) window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), won: true });
    flash('YOU SURVIVED!', GOLD, 48);
    // transition to cta for demo, or to over-like win card for human/bot
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { restartRun(); }, 900);
    }
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 9;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.score / 30, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('rf_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), won: false });
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { restartRun(); }, 900);
    }
  }

  function restartRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    rng = mulberry32(SEED + botRunsDone * 31);
    newGame();
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ── demo autopilot ──────────────────────────────────────────────
  var demoTick = 0;
  // Script: [action, delay_frames]
  // 'hit' = tap correct, 'miss' = ignore (miss tile), 'wrong' = tap wrong color, 'none' = tap nothing on tap-none
  var demoScript = [
    // early: correct taps, building combo
    { act: 'hit', wait: 18 },
    { act: 'hit', wait: 22 },
    { act: 'hit', wait: 16 },
    // near-fail moment (~60%): miss a tile → lose a life
    { act: 'miss', wait: 30 },
    // recovery: nail the next few
    { act: 'hit', wait: 20 },
    { act: 'hit', wait: 15 },
    // rule flips handled automatically, but after flip 5 demo survives one more
    { act: 'hit', wait: 18 },
    // final fail: tap wrong color
    { act: 'wrong', wait: 12 },
    { act: 'wrong', wait: 8 },
    { act: 'wrong', wait: 8 }
  ];
  var demoIdx = 0, demoWait = 30;
  var demoActed = false;

  // ── bot autopilot ───────────────────────────────────────────────
  var botWait = 0;
  var botPassive = false; // after K correct actions, go passive so natural lose fires

  function autopilot(dt) {
    if (!state.tile || state.phase !== 'play') return;
    if (DEMO) {
      demoTick += dt;
      if (demoWait > 0) { demoWait -= dt; return; }
      var entry = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (!entry) return;
      var tile = state.tile;
      if (!tile || !tile.alive) return;
      if (!demoActed) {
        demoActed = true;
        if (entry.act === 'hit') {
          // tap the correct tile
          var rule = currentRule();
          var correctColor = (rule === 'tap-green') ? 'green' :
                             (rule === 'tap-red')   ? 'red'   : tile.color;
          if (tile.color === correctColor) {
            onTileHit(true, tile);
          } else if (state.tile2 && state.tile2.color === correctColor) {
            onTileHit(true, state.tile2);
          } else {
            onTileHit(false, tile); // no matching tile
          }
        } else if (entry.act === 'miss') {
          // let tile expire naturally — but we accelerate by not acting
          // force expiry now for demo pacing
          onMiss(tile);
          if (state.tile2) onMiss(state.tile2);
        } else if (entry.act === 'wrong') {
          // tap the wrong color
          var rule2 = currentRule();
          var wrongColor = (rule2 === 'tap-green') ? 'red' : 'green';
          var wrongTile = (tile.color === wrongColor) ? tile : (state.tile2 && state.tile2.color === wrongColor) ? state.tile2 : tile;
          onTileHit(false, wrongTile);
        }
        demoWait = demoScript[Math.min(demoIdx, demoScript.length - 1)].wait || 20;
        demoIdx++;
        demoActed = false;
        if (state.phase === 'play') spawnTile();
      }
    } else if (BOT) {
      botWait -= dt;
      if (botWait > 0) return;
      var t = state.tile;
      if (!t || !t.alive) return;
      // bot goes passive after 12 correct to let natural lose fire
      var botCorrectCount = state.score;
      if (botCorrectCount > 12) { botPassive = true; }
      if (botPassive) {
        // let tiles expire → loseLife → gameOver
        onMiss(t);
        if (state.tile2) onMiss(state.tile2);
        if (state.phase === 'play') spawnTile();
        botWait = 20 + rng() * 20;
        return;
      }
      // imperfect bot: 80% correct, 20% wrong
      var rule3 = currentRule();
      var doCorrect = rng() < 0.80;
      if (rule3 === 'tap-none') {
        // tap-none: correct = don't tap; bot taps 20% of time (wrong)
        if (!doCorrect) {
          onTileHit(false, t);
          if (state.phase === 'play') spawnTile();
        } else {
          // wait for tile to expire
          onMiss(t);
          if (state.tile2) onMiss(state.tile2);
          if (state.phase === 'play') spawnTile();
        }
      } else {
        var correctC = (rule3 === 'tap-green') ? 'green' : (rule3 === 'tap-red') ? 'red' : t.color;
        if (doCorrect) {
          var hitT = (t.color === correctC) ? t : (state.tile2 && state.tile2.color === correctC ? state.tile2 : t);
          onTileHit(true, hitT);
        } else {
          var wrongC = correctC === 'green' ? 'red' : 'green';
          var wrongT2 = (t.color === wrongC) ? t : (state.tile2 && state.tile2.color === wrongC ? state.tile2 : t);
          onTileHit(false, wrongT2);
        }
        if (state.phase === 'play') spawnTile();
      }
      botWait = 18 + rng() * 25;
    }
  }

  // ── input ───────────────────────────────────────────────────────
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 530, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function getTileAt(px, py) {
    var tiles = [];
    if (state.tile  && state.tile.alive)  tiles.push(state.tile);
    if (state.tile2 && state.tile2.alive) tiles.push(state.tile2);
    for (var i = 0; i < tiles.length; i++) {
      var t = tiles[i];
      if (px >= t.x - TILE_W / 2 && px <= t.x + TILE_W / 2 &&
          py >= t.y - TILE_H / 2 && py <= t.y + TILE_H / 2) {
        return t;
      }
    }
    return null;
  }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      var rule = currentRule();
      if (rule === 'tap-none') {
        // tapping anything = wrong
        loseLife();
        return;
      }
      var hitTile = getTileAt(px, py);
      if (hitTile) {
        var correct = false;
        if (rule === 'tap-green' && hitTile.color === 'green') correct = true;
        if (rule === 'tap-red'   && hitTile.color === 'red')   correct = true;
        if (rule === 'tap-both')  correct = true;
        onTileHit(correct, hitTile);
        // for tap-both: check if we need the second tile too
        if (rule === 'tap-both') {
          var other = (hitTile === state.tile) ? state.tile2 : state.tile;
          if (!other || !other.alive) {
            // already tapped other, fine
          }
          // we'll wait for the other tap
        }
        if (state.phase === 'play' && !state.tile && !state.tile2) spawnTile();
      } else {
        // tapped empty space — counts as wrong for tap-none (handled above)
        // for other rules: no penalty (just missed the tile)
      }
      return;
    }
    if ((state.phase === 'over' || state.phase === 'win') && performance.now() - state.overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'flips' }); return;
      }
      restartRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') tap(W / 2, H / 2);
  });

  // ── render helpers ──────────────────────────────────────────────
  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 12))));
  }

  function ruleColor(rule) {
    if (rule === 'tap-green') return TEAL;
    if (rule === 'tap-red')   return VERM;
    if (rule === 'tap-none')  return 'rgba(255,255,255,0.6)';
    if (rule === 'tap-both')  return GOLD;
    return '#fff';
  }

  // ── main loop ───────────────────────────────────────────────────
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // tile expiry timer
    if (state.phase === 'play') {
      state.flipTimer  += dt * 16.667;
      state.tileTimer  += dt * 16.667;
      if (state.flipFlash > 0) state.flipFlash -= dt * 16.667;

      // flip rule every FLIP_INTERVAL ms
      if (state.flipTimer >= FLIP_INTERVAL) {
        doFlip();
      }

      // tile expires after TILE_APPEAR_DUR
      if (state.tileTimer >= TILE_APPEAR_DUR && state.tile && state.tile.alive) {
        var rule4 = currentRule();
        if (rule4 === 'tap-none') {
          // surviving = correct
          onMiss(state.tile);
          if (state.tile2 && state.tile2.alive) onMiss(state.tile2);
        } else if (rule4 === 'tap-both') {
          // if not both tapped, lose life
          if (!state.tile.tapped || (state.tile2 && !state.tile2.tapped)) {
            if (state.tile.alive)  onMiss(state.tile);
            if (state.tile2 && state.tile2.alive) onMiss(state.tile2);
          }
        } else {
          if (state.tile.alive) onMiss(state.tile);
          if (state.tile2 && state.tile2.alive) onMiss(state.tile2);
        }
        state.tileTimer = 0;
        if (state.phase === 'play') spawnTile();
      }

      // autopilot
      if (hitStop > 0) { hitStop -= dt; }
      else { autopilot(dt); }
    }

    // ── juice transforms ──────────────────────────────────────────
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shakeAmt, sy = (rng() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // ── background ────────────────────────────────────────────────
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ── PLAY phase ────────────────────────────────────────────────
    if (state.phase === 'play') {
      var rule = currentRule();

      // flip progress bar
      var flipProg = Math.min(state.flipTimer / FLIP_INTERVAL, 1);
      cx.fillStyle = 'rgba(255,255,255,0.08)';
      cx.fillRect(20, 30, W - 40, 6);
      cx.fillStyle = ruleColor(rule);
      cx.globalAlpha = 0.7;
      cx.fillRect(20, 30, (W - 40) * flipProg, 6);
      cx.globalAlpha = 1;

      // flip counter
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 11px Menlo, monospace';
      cx.fillText('FLIP ' + state.flips + '/' + MAX_FLIPS, W / 2, 24);

      // score top-right
      cx.textAlign = 'right';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 38px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W - 24, 90);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 11px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W - 24, 110);

      // lives (hearts) top-left
      cx.textAlign = 'left';
      cx.font = '20px -apple-system, Helvetica, Arial';
      for (var li = 0; li < 3; li++) {
        cx.globalAlpha = li < state.lives ? 1 : 0.18;
        cx.fillStyle = VERM;
        cx.fillText('♥', 20 + li * 28, 90);
      }
      cx.globalAlpha = 1;

      // current rule banner
      var ruleAlpha = state.flipFlash > 0 ? Math.min(1, state.flipFlash / 400) : 0.85;
      var ruleScale = state.flipFlash > 0 ? 1 + 0.18 * Math.min(1, state.flipFlash / 300) : 1;
      cx.save();
      cx.translate(W / 2, 148);
      cx.scale(ruleScale, ruleScale);
      cx.textAlign = 'center';
      cx.fillStyle = ruleColor(rule);
      cx.globalAlpha = ruleAlpha;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText(RULE_LABELS[rule], 0, 0);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText(RULE_SUBS[rule], 0, 22);
      cx.globalAlpha = 1;
      cx.restore();

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.textAlign = 'center';
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 13px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W / 2, 180);
      }

      // draw tiles
      var tiles = [];
      if (state.tile  && state.tile.alive)  tiles.push(state.tile);
      if (state.tile2 && state.tile2.alive) tiles.push(state.tile2);
      for (var ti = 0; ti < tiles.length; ti++) {
        var t = tiles[ti];
        var age = (Date.now() - t.appear) / TILE_APPEAR_DUR;
        var tAlpha = Math.max(0, 1 - age);
        var tColor = t.color === 'green' ? TEAL : VERM;
        // should-tap highlight ring
        var isTarget = (rule === 'tap-green' && t.color === 'green') ||
                       (rule === 'tap-red'   && t.color === 'red')   ||
                        rule === 'tap-both';
        cx.save();
        cx.globalAlpha = 0.1 + 0.9 * tAlpha;
        // glow ring for target
        if (isTarget && age < 0.6) {
          cx.shadowColor = tColor;
          cx.shadowBlur = 18 + 8 * Math.sin(now / 150);
        }
        cx.fillStyle = tColor;
        // tile background
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(t.x - TILE_W / 2, t.y - TILE_H / 2, TILE_W, TILE_H, 18);
        else cx.rect(t.x - TILE_W / 2, t.y - TILE_H / 2, TILE_W, TILE_H);
        cx.globalAlpha = (0.15 + 0.12 * tAlpha);
        cx.fill();
        cx.shadowBlur = 0;
        // tile border
        cx.strokeStyle = tColor;
        cx.lineWidth = 2.5;
        cx.globalAlpha = 0.7 * tAlpha;
        cx.stroke();
        // tile label
        cx.globalAlpha = tAlpha;
        cx.fillStyle = tColor;
        cx.textAlign = 'center';
        cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText(t.color.toUpperCase(), t.x, t.y + 5);
        // timer ring (SVG-style arc)
        var arcFrac = 1 - age;
        cx.beginPath();
        cx.arc(t.x, t.y, TILE_W * 0.44, -Math.PI / 2, -Math.PI / 2 + arcFrac * 2 * Math.PI);
        cx.strokeStyle = tColor;
        cx.lineWidth = 3;
        cx.globalAlpha = 0.55 * tAlpha;
        cx.stroke();
        cx.shadowBlur = 0;
        cx.restore();
      }

      // tap-none zone indicator
      if (rule === 'tap-none') {
        cx.save();
        cx.strokeStyle = 'rgba(255,255,255,0.12)';
        cx.lineWidth = 1.5;
        cx.setLineDash([6, 6]);
        cx.strokeRect(40, 200, W - 80, 380);
        cx.setLineDash([]);
        cx.restore();
      }
    }

    // ── TITLE phase ───────────────────────────────────────────────
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('RULE FLIP', W / 2, 280);
      cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('the rule changes.', W / 2, 320);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('tap green · tap red · tap nothing · tap both', W / 2, 348);
      cx.fillText('survive 10 flips', W / 2, 368);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 420);
      cx.globalAlpha = 1;
    }

    // ── CHALLENGE card (demo beat 1) ──────────────────────────────
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 295);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('28', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 432);
    }

    // ── GAME OVER card ────────────────────────────────────────────
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('FLIPPED OUT.', W / 2, 295);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' scored', W / 2, 340);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('survived ' + state.flips + ' flips', W / 2, 366);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 402);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — NEXT FLIP', W / 2, 448);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ── WIN card ──────────────────────────────────────────────────
    if (state.phase === 'win') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = GOLD;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('SURVIVED!', W / 2, 295);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' scored', W / 2, 340);
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('all 10 flips cleared', W / 2, 366);
      var pt2 = pctTop(state.score);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt2 + '% TODAY', W / 2, 402);
      if (!DEMO && !BOT) {
        var p3 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p3;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — PLAY AGAIN', W / 2, 448);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ── DEMO CTA card ─────────────────────────────────────────────
    if (state.phase === 'cta') {
      var t2 = (now - ctaAt) / 1000, ease = Math.min(1, t2 * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('RULE FLIP', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they scored ' + (window.__demoScore || 28) + '. the rule just flipped.', W / 2, 330);
      var p4 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p4;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 28), W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // ── floating reward text ──────────────────────────────────────
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 190 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ── mute toggle (human only) ──────────────────────────────────
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
