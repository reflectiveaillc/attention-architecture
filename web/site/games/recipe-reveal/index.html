  Circuits: 01 RPE (variable reward per ingredient), 06 Zeigarnik (one more dish),
            05 ease (the swipe is a gesture the thumb already knows from recipe reels).
  Conditioned path: recipe-reveal / cooking videos. The player's thumb already

                          the hook clip's landing beat), sets window.__demoDone

<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 7;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ingredients — drawn as colored chips (no external assets). BAKE is the final
  // ingredient in every recipe; swiping it bakes the dish (the reveal beat).
  var ING = {
    FLOUR:  { label: 'Flour',  color: '#f4f1e8', ink: INK },
    MILK:   { label: 'Milk',   color: '#eaf4ff', ink: INK },
    EGG:    { label: 'Egg',    color: '#ffe9a8', ink: INK },
    SUGAR:  { label: 'Sugar',  color: '#f2b134', ink: INK },
    BUTTER: { label: 'Butter', color: '#ffd54a', ink: INK },
    BAKE:   { label: 'Bake',   color: '#e8502e', ink: '#fff' }
  };
  var KEYS = Object.keys(ING);
  // each dish = 3 ingredients + BAKE. Sequential pick keeps the demo reproducible.
  var DISHES = [
    { name: 'PANCAKES', recipe: ['FLOUR', 'MILK',  'EGG',   'BAKE'] },
    { name: 'COOKIES',  recipe: ['BUTTER','SUGAR', 'FLOUR', 'BAKE'] },
    { name: 'OMELETTE', recipe: ['EGG',  'BUTTER','MILK',  'BAKE'] },
    { name: 'BREAD',    recipe: ['FLOUR','MILK',  'BUTTER','BAKE'] },
    { name: 'MUFFINS',  recipe: ['SUGAR','FLOUR', 'MILK',  'BAKE'] }
  ];
  var CHALLENGE_SCORE = 16;                  // demo's scripted final score

  var state, flashes, smokes, fly, cam, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, dareBeaten = false, shakeAmt = 0, challengeAt = 0;
  try { best = +localStorage.getItem('rr_best') || 0; } catch (_) {}

  var BOWL_X = W / 2, BOWL_Y = 188, BOWL_W = 156, BOWL_H = 64;
  var CARD_W = 64, CARD_H = 64, CONVEYOR_Y = 600;

  function newGame() {
    state = {
      phase: 'title',             // title | challenge | play | bake | over | cta
      dishIdx: 0, recipe: DISHES[0].recipe, dishName: DISHES[0].name,
      step: 0, bowl: [],           // ingredients already in the bowl this dish
      cards: [], score: 0, combo: 0, dishes: 0,
      speed: 1.3, spawnT: 30, bakeT: 0, bakeFail: false, revealName: '', overAt: 0
    };
    flashes = []; smokes = []; fly = null;
    if (DEMO) {
      state.phase = 'challenge';  // beat 1: prime the competitive frame
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function pctTop(score) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 11)))); }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function nextDish() {
    state.dishIdx++;
    var d = DISHES[state.dishIdx % DISHES.length];
    state.recipe = d.recipe; state.dishName = d.name;
    state.step = 0; state.bowl = []; state.cards = [];
    state.speed = 1.3 + state.dishes * 0.18;
    state.spawnT = 26;
  }

  // spawn an ingredient card onto the conveyor. ~50% the needed ingredient,
  // ~50% a distractor — the order-memory + reaction challenge.
  function spawnCard() {
    var need = state.recipe[state.step];
    var key;
    if (rng() < 0.5) key = need;
    else { do { key = KEYS[Math.floor(rng() * KEYS.length)]; } while (key === need); }
    state.cards.push({ key: key, x: -CARD_W, y: CONVEYOR_Y, rot: 0, flung: false, pop: 0 });
  }

  // find the rightmost (most urgent) on-conveyor card matching a predicate
  function findCard(pred) {
    var best = null;
    for (var i = 0; i < state.cards.length; i++) {
      var c = state.cards[i];
      if (c.flung) continue;
      if (c.x < -CARD_W / 2 || c.x > W + CARD_W / 2) continue;
      if (pred(c) && (best === null || c.x > best.x)) best = c;
    }
    return best;
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // the SWIPE: send an ingredient card up into the bowl (tap or drag both register
  // as the gesture the thumb already knows). Correctness is decided here.
  function fling(card, isAuto) {
    if (!card || card.flung) return;
    if (state.phase !== 'play') return;
    card.flung = true;
    fly = { key: card.key, x: card.x, y: card.y, rot: card.rot, t: 0 };

    var need = state.recipe[state.step];
    var correct = (card.key === need);
    var nearEdge = card.x > W - 95;          // grabbed at the last instant

    if (correct) {
      state.score++; state.combo++;
      if (window.J) {
        if (nearEdge) J.near();
        J.hit(state.combo);
        J.tension(Math.min(state.score / 40, 1));
      }
      if (nearEdge) { shakeAmt = 5; flash('SO CLOSE!', VERM, 40);
        if (window.LOOP) LOOP.emit('near_miss', { n: state.score, x: +card.x.toFixed(0) });
      } else { shakeAmt = 2; flash('+1', TEAL, 34); }
      if (state.combo >= 3) flash('×' + state.combo, GOLD, 30);

      // BAKE is the last ingredient → flinging it bakes (the reveal beat)
      if (card.key === 'BAKE' && state.step === state.recipe.length - 1) {
        hitStop = 5; zoom = 1.04;
        startBake(false);
      } else {
        state.bowl.push(card.key);
        state.step++;
      }
      if (window.LOOP) LOOP.emit('ingredient_swiped', { n: state.score, key: card.key, correct: true, near: nearEdge });

      // incoming dare check
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
        dareBeaten = true; flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare(); SHARE.beaten(state.score);
      }
    } else {
      // wrong order → comedic fail that still closes the loop (a reveal of a burnt mess)
      if (window.J) { J.death(Math.min(0.3 + state.score / 40, 1)); }
      if (window.LOOP) LOOP.emit('ingredient_swiped', { n: state.score, key: card.key, correct: false });
      startBake(true);
    }
  }

  // the bake reveal — the conditioned "wait for the final dish" payoff.
  // success → dish name in gold; fail → burnt spectacle (peak-end rule).
  function startBake(fail) {
    state.phase = 'bake';
    state.bakeT = fail ? 70 : 90;
    state.bakeFail = fail;
    state.revealName = fail ? 'MYSTERY MESS' : state.dishName;
    // smoke particles — gold for a clean bake, charred for a fail
    var n = fail ? 22 : 16, col = fail ? '#3a3a3a' : GOLD;
    for (var i = 0; i < n; i++) {
      smokes.push({
        x: BOWL_X + (rng() - 0.5) * BOWL_W, y: BOWL_Y - 6,
        vx: (rng() - 0.5) * 1.6, vy: -1.2 - rng() * 1.6,
        r: 8 + rng() * 14, t: 0, life: 50 + rng() * 30, color: col, fail: fail
      });
    }
    if (fail) { shakeAmt = 9; flash('WRONG ORDER', VERM, 38); }
    else {
      zoom = 1.05; flash(state.dishName, GOLD, 40);
      if (window.J) { J.perfect(state.combo); J.gold(); J.fanfare(); }
      state.dishes++;
      if (window.LOOP) LOOP.emit('dish_baked', { name: state.dishName, n: state.dishes });
    }
  }

  function endBake() {
    if (state.bakeFail) { gameOver(); return; }
    // small bonus for finishing a dish — keeps the score climbing meaningfully
    state.score += 3;
    if (!DEMO && !BOT && state.score > best) { best = state.score; try { localStorage.setItem('rr_best', String(best)); } catch (_) {} }
    nextDish();
    state.phase = 'play';
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) { if (newBest) setTimeout(function () { J.fanfare(); }, 450); }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('rr_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3600); }, 2800);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    state.dishIdx = 0; state.recipe = DISHES[0].recipe; state.dishName = DISHES[0].name;
    state.step = 0; state.bowl = []; state.cards = [];
    state.score = 0; state.combo = 0; state.dishes = 0; state.speed = 1.3; state.spawnT = 30;
    smokes = []; fly = null;
    botCorrects = 0; botWrong = 4;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      var c = findCard(function () { return true; });
      if (c && x !== undefined && Math.abs(x - c.x) <= CARD_W && Math.abs(y - c.y) <= CARD_H) { fling(c, false); return; }
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'dishes' }); return;
      }
      resetRun();
    }
  }
  var press = null;
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
    press = { x: x, y: y, t: performance.now() };
    tap(x, y);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // mirror-neuron arc: hesitant corrects → a sliver NEAR-FAIL on the bake (grabbed
  // at the last instant, reads as "it's over") → perfect SAVE → one more dish →
  // the real fail (wrong ingredient → burnt spectacle). demoWait = human hesitation.
  // 10 correct swipes (2 dishes baked) + 2 dish bonuses = 16, then the fail.
  var demoPlan = [
    { a: 'correct', wait: 24 },
    { a: 'correct', wait: 20 },
    { a: 'correct', wait: 30 },
    { a: 'correct', wait: 22 },     // dish1 BAKE → reveal
    { a: 'correct', wait: 26 },
    { a: 'correct', wait: 22 },
    { a: 'correct', wait: 30 },
    { a: 'nearfail', wait: 40 },    // dish2 BAKE, grabbed at the edge → near_miss + save → reveal
    { a: 'correct', wait: 24 },     // dish3
    { a: 'correct', wait: 28 },
    { a: 'wrong',   wait: 34 }      // the real fail
  ];
  var demoIdx = 0, demoWait = 26, botRunsDone = 0, botWait = 0, botWrong = 4, botCorrects = 0;

  function autopilot() {
    if (state.phase !== 'play' || hitStop > 0) return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var plan = demoPlan[Math.min(demoIdx, demoPlan.length - 1)];
      var done = false;
      if (plan.a === 'correct' || plan.a === 'nearfail') {
        var c = findCard(function (card) { return card.key === state.recipe[state.step]; });
        if (c) {
          if (plan.a === 'nearfail' && c.x < W - 90) return;  // wait till it's about to scroll off
          fling(c, true); done = true;
        }
      } else if (plan.a === 'wrong') {
        var w = findCard(function (card) { return card.key !== state.recipe[state.step]; });
        if (w) { fling(w, true); done = true; }
      }
      if (done) { demoIdx++; demoWait = (demoPlan[Math.min(demoIdx, demoPlan.length - 1)] || {}).wait || 26; }
      else { demoWait = 4; }   // no suitable card yet, retry shortly
    } else if (BOT) {
      if (botWait > 0) { botWait--; return; }
      // only attempt a wrong swipe after a few corrects, then ~12% per opportunity
      if (botCorrects >= 3 && botWrong <= 0 && rng() < 0.12) {
        var wb = findCard(function (card) { return card.key !== state.recipe[state.step]; });
        if (wb) { fling(wb, true); botWait = 30; return; }
      }
      var bc = findCard(function (card) { return card.key === state.recipe[state.step]; });
      if (bc) { fling(bc, true); botCorrects++; botWrong = 3 + Math.floor(rng() * 4); botWait = 10 + Math.floor(rng() * 26); }
      else { botWrong--; botWait = 4; }
    }
  }

  // ---- render helpers ----
  function chipPath(x, y, w, h, r) {
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(x, y, w, h, r);
    else cx.rect(x, y, w, h);
  }
  function drawIngredient(x, y, key, alpha, scale) {
    var g = ING[key], w = CARD_W * (scale || 1), h = CARD_H * (scale || 1);
    cx.globalAlpha = alpha == null ? 1 : alpha;
    // soft drop shadow
    cx.fillStyle = 'rgba(0,0,0,0.35)';
    chipPath(x - w / 2 + 2, y - h / 2 + 4, w, h, 14); cx.fill();
    // body
    cx.fillStyle = g.color;
    chipPath(x - w / 2, y - h / 2, w, h, 14); cx.fill();
    // rim
    cx.strokeStyle = 'rgba(11,13,18,0.18)'; cx.lineWidth = 1.5;
    chipPath(x - w / 2, y - h / 2, w, h, 14); cx.stroke();
    // label
    cx.fillStyle = g.ink; cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.font = '800 ' + (13 * (scale || 1)) + 'px -apple-system, Helvetica, Arial';
    cx.fillText(g.label.toUpperCase(), x, y + 1);
    cx.globalAlpha = 1; cx.textBaseline = 'alphabetic';
  }
  function drawBowl() {
    var bx = BOWL_X, by = BOWL_Y;
    // bowl glow when a bake is happening
    if (state.phase === 'bake') {
      var gg = cx.createRadialGradient(bx, by, 10, bx, by, 130);
      gg.addColorStop(0, state.bakeFail ? 'rgba(232,80,46,0.35)' : 'rgba(242,177,52,0.40)');
      gg.addColorStop(1, 'rgba(242,177,52,0)');
      cx.fillStyle = gg; cx.fillRect(bx - 140, by - 140, 280, 200);
    }
    // bowl body
    var bg = cx.createLinearGradient(0, by - 20, 0, by + BOWL_H);
    bg.addColorStop(0, '#3a4a52'); bg.addColorStop(1, '#1d2a30');
    cx.fillStyle = bg;
    cx.beginPath();
    cx.ellipse(bx, by + 18, BOWL_W / 2, BOWL_H / 2 + 6, 0, 0, Math.PI * 2);
    cx.fill();
    // rim
    cx.strokeStyle = TEAL; cx.lineWidth = 3;
    cx.beginPath(); cx.ellipse(bx, by - 6, BOWL_W / 2, 16, 0, 0, Math.PI * 2); cx.stroke();
    // ingredients inside (accumulating this dish)
    for (var i = 0; i < state.bowl.length; i++) {
      var k = state.bowl[i], g = ING[k];
      var px = bx + (i - 1.5) * 26, py = by + 10 + (i % 2) * 8;
      cx.fillStyle = g.color; cx.globalAlpha = 0.95;
      cx.beginPath(); cx.arc(px, py, 11, 0, Math.PI * 2); cx.fill();
    }
    cx.globalAlpha = 1;
  }

  var ctaAt = 0, last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop decays every frame — NEVER gate the sim on hitStop without decaying it
    if (hitStop > 0) hitStop -= dt;
    else if (state.phase === 'play') {
      // spawn + scroll the conveyor
      state.spawnT -= dt;
      if (state.spawnT <= 0) {
        spawnCard();
        state.spawnT = Math.max(28, 78 - state.dishes * 6);
      }
      for (var i = state.cards.length - 1; i >= 0; i--) {
        var c = state.cards[i];
        if (c.flung) { state.cards.splice(i, 1); continue; }
        c.x += state.speed * dt;
        if (c.x > W + CARD_W / 2) {
          // a needed ingredient scrolled off the end → you missed it → fail
          // (demo's fail is scripted via the 'wrong' intention, so just drop it there)
          if (!DEMO && c.key === state.recipe[state.step]) { state.cards.splice(i, 1); startBake(true); }
          else state.cards.splice(i, 1);
        }
      }
      autopilot();
    } else if (state.phase === 'bake') {
      state.bakeT -= dt;
      if (state.bakeT <= 0) endBake();
    }

    // flying ingredient (the swipe arc into the bowl)
    if (fly) {
      fly.t += dt;
      fly.x += (BOWL_X - fly.x) * 0.32 * dt;
      fly.y += (BOWL_Y - fly.y) * 0.32 * dt;
      fly.rot += 0.08 * dt;
      if (fly.t > 14) fly = null;
    }

    // juice transforms: decaying shake + zoom-pulse, wrapped save/restore
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    drawBowl();

    // smoke (bake / fail spectacle)
    for (var s = smokes.length - 1; s >= 0; s--) {
      var p = smokes[s];
      p.x += p.vx * dt; p.y += p.vy * dt; p.vy -= 0.01 * dt; p.r += 0.3 * dt; p.t += dt;
      var a = Math.max(0, 0.5 * (1 - p.t / p.life));
      cx.globalAlpha = a;
      cx.fillStyle = p.color;
      cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
      if (p.t > p.life) smokes.splice(s, 1);
    }

    // flying ingredient
    if (fly) drawIngredient(fly.x, fly.y, fly.key, 1, 1 - fly.t * 0.04);

    // recipe sequence chips (the order to follow)
    if (state.phase === 'play' || state.phase === 'bake') {
      var ry = 270, total = state.recipe.length, cw = 60, gap = 6;
      var startX = W / 2 - (total * cw + (total - 1) * gap) / 2 + cw / 2;
      for (var r = 0; r < total; r++) {
        var rx = startX + r * (cw + gap), key = state.recipe[r];
        var done = r < state.step, cur = r === state.step && state.phase === 'play';
        cx.globalAlpha = done ? 0.35 : 1;
        drawIngredient(rx, ry, key, null, 0.85);
        if (done) { cx.globalAlpha = 0.6; cx.fillStyle = TEAL; cx.font = '700 14px -apple-system'; cx.textAlign = 'center'; cx.fillText('✓', rx + 20, ry - 18); }
        if (cur) {
          cx.globalAlpha = 0.9; cx.strokeStyle = VERM; cx.lineWidth = 2.5;
          chipPath(rx - 27, ry - 27, 54, 54, 12); cx.stroke();
        }
        cx.globalAlpha = 1;
      }
      cx.textAlign = 'center'; cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '700 11px Menlo, monospace'; cx.fillText('SWIPE IN ORDER', W / 2, ry - 40);
    }

    // conveyor cards
    if (state.phase === 'play') {
      for (var ci = 0; ci < state.cards.length; ci++) {
        var cc = state.cards[ci];
        drawIngredient(cc.x, cc.y, cc.key, 1, 1);
      }
      // conveyor rail
      cx.strokeStyle = 'rgba(255,255,255,0.08)'; cx.lineWidth = 1;
      cx.beginPath(); cx.moveTo(0, CONVEYOR_Y + CARD_H / 2 + 6); cx.lineTo(W, CONVEYOR_Y + CARD_H / 2 + 6); cx.stroke();
    }

    // score
    if (state.phase === 'play' || state.phase === 'bake' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 60px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);
      // combo escalation — stakes must be visible
      if (state.combo >= 2) {
        var cs = 16 + Math.min(state.combo, 10);
        cx.fillStyle = state.combo >= 5 ? GOLD : TEAL;
        cx.font = '900 ' + cs + 'px -apple-system, Helvetica, Arial';
        cx.fillText('COMBO ×' + state.combo, W / 2, 150);
      }
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 168);
      }
    }

    // bake reveal banner
    if (state.phase === 'bake') {
      var bt = 1 - state.bakeT / (state.bakeFail ? 70 : 90);
      var ease = Math.min(1, bt * 2.2);
      cx.textAlign = 'center';
      if (state.bakeFail) {
        cx.fillStyle = VERM; cx.globalAlpha = ease;
        cx.font = '900 30px -apple-system, Helvetica, Arial';
        cx.fillText('BURNT!', W / 2, 350);
        cx.fillStyle = '#fff'; cx.font = '800 30px -apple-system, Helvetica, Arial';
        cx.fillText(state.revealName, W / 2, 392);
        cx.globalAlpha = 1;
      } else {
        cx.fillStyle = GOLD; cx.globalAlpha = ease;
        cx.font = '700 16px Menlo, monospace'; cx.fillText('OUT OF THE OVEN', W / 2, 320);
        cx.font = '900 46px -apple-system, Helvetica, Arial'; cx.fillText(state.revealName, W / 2, 372);
        cx.globalAlpha = 1;
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(CHALLENGE_SCORE), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top kitchen", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('RECIPE REVEAL', W / 2, 320);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP AN INGREDIENT', W / 2, 360); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('swipe in order. wait for the bake.', W / 2, 388);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('BURNT IT.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' cooked', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of cooks', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — COOK AGAIN', W / 2, 462);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)'; cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        chipPath(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('RECIPE REVEAL', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they cooked ' + (window.__demoScore || CHALLENGE_SCORE) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || CHALLENGE_SCORE), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    if (window.J) J.tension(state.phase === 'play' ? Math.min(state.score / 40, 1) : 0);
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
