<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Score Shield — Tilt</title>
<!--
  LOOP / attention-architecture — Score Shield
  Circuits: 01-rpe (variable reward per block), 04-loss (shield erosion),
            08-investment (score you set = the thing at risk).
  Engine: viral — dare someone to break your shield.
  Modes:
    ?demo=1&seed=7   mirror-neuron clip: challenge card → tense play → near-fail → real fail → CTA
    ?bot=1&runs=N&seed=M  imperfect autopilot for N runs → window.__botDone
    ?dare=<n>        show BEAT <n> banner; flash DARE BEATEN when passed
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'score-shield';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- constants ----
  var SHIELD_W    = 80;   // paddle width
  var SHIELD_H    = 14;
  var SHIELD_Y    = H - 100;
  var BALL_R      = 9;
  var MAX_HP      = 5;
  var BALL_BASE_SPEED = 3.2;

  // ---- state ----
  var phase, score, combo, hp, shield, balls, particles, flashes;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var dareBeaten = false;
  var runStartTs, overAt;
  var ctaAt = 0, challengeAt = 0;
  var pointerX = W / 2;
  var botRunsDone = 0;

  // best persisted
  var best = 0;
  try { best = +localStorage.getItem('ss_best') || 0; } catch (_) {}

  function pctTop(s) { return Math.max(1, Math.min(99, Math.round(100*Math.exp(-s/14)))); }

  function newGame() {
    phase  = DEMO ? 'challenge' : (BOT ? 'play' : 'title');
    score  = 0; combo = 0; hp = MAX_HP;
    shield = { x: W / 2, w: SHIELD_W };
    balls  = []; particles = []; flashes = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    dareBeaten = false;
    if (DEMO) {
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
    } else if (BOT) {
      startRun();
    }
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    spawnBall();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- ball spawning ----
  function ballSpeed() { return BALL_BASE_SPEED + score * 0.06; }

  function spawnBall() {
    if (phase !== 'play') return;
    var x = 40 + rng() * (W - 80);
    var angle = Math.PI * 0.5 + (rng() - 0.5) * 0.8; // mostly downward
    var sp = ballSpeed();
    balls.push({ x: x, y: 40, vx: Math.cos(angle) * sp, vy: Math.abs(Math.sin(angle)) * sp, r: BALL_R, hue: Math.floor(rng()*360) });
  }

  // ---- particle burst ----
  function burst(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var a = rng() * Math.PI * 2, sp = 1 + rng() * 4;
      particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color:color, r: 2+rng()*3 });
    }
  }

  function flash(txt, color, size) {
    flashes.push({ txt:txt, color:color, size:size, t:0 });
  }

  // ---- block logic ----
  function tryBlock(b) {
    // check if ball passes through shield zone
    var sx = shield.x - shield.w / 2;
    var ex = shield.x + shield.w / 2;
    if (b.x >= sx && b.x <= ex && b.y + b.r >= SHIELD_Y && b.y + b.r < SHIELD_Y + SHIELD_H + 8) {
      return true;
    }
    return false;
  }

  function onBlock(b, idx) {
    balls.splice(idx, 1);
    score++;
    combo++;
    var isCrit = combo > 0 && combo % 4 === 0;
    if (window.J) {
      if (isCrit) { J.perfect(combo); J.gold(); }
      else J.hit(combo);
      J.tension(Math.min(score / 30, 1));
    }
    if (isCrit) { hitStop = 4; zoom = 1.025; flash('×'+combo+' COMBO!', GOLD, 38); burst(b.x, SHIELD_Y, GOLD, 18); }
    else { burst(b.x, SHIELD_Y, TEAL, 10); }

    // dare beaten check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score >= SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN!', TEAL, 42);
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }
    if (window.LOOP) LOOP.emit('ball_blocked', { n: score, combo: combo });
    spawnBall();
  }

  function onMiss(b, idx) {
    balls.splice(idx, 1);
    combo = 0;
    hp--;
    shakeAmt = 5 + hp * 0.5; // shake more when lower hp
    burst(b.x, b.y, VERM, 14);
    flash('BREACH!', VERM, 36);
    if (window.J) {
      J.near();
      J.tension(Math.max(0, (MAX_HP - hp) / MAX_HP));
    }
    if (window.LOOP) LOOP.emit('near_miss', { hp: hp, n: score });
    if (hp <= 0) {
      gameOver();
    } else {
      spawnBall();
    }
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 10;
    balls = [];
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (window.J) {
      J.death(Math.min(0.3 + score / 30, 1));
      if (newBest) setTimeout(function() { J.fanfare(); }, 450);
    }
    if (newBest) { best = score; try { localStorage.setItem('ss_best', String(best)); } catch(_){} }
    if (DEMO) window.__demoScore = score;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function() {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function() { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function() { resetRun(); }, 600);
      }
    }
  }

  function resetRun() {
    score = 0; combo = 0; hp = MAX_HP;
    shield = { x: W/2, w: SHIELD_W };
    balls = []; particles = []; flashes = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    dareBeaten = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W/2 - 125, y: 500, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'pts' }); return;
      }
      resetRun(); return;
    }
  }

  window.addEventListener('pointermove', function(e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    pointerX = (e.clientX - r.left) / scale;
  });
  window.addEventListener('pointerdown', function(e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    pointerX = (e.clientX - r.left) / scale;
    tap(pointerX, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function(e) {
    if (e.code === 'Space') tap();
    if (e.code === 'ArrowLeft')  pointerX = Math.max(SHIELD_W/2, pointerX - 20);
    if (e.code === 'ArrowRight') pointerX = Math.min(W - SHIELD_W/2, pointerX + 20);
  });

  // ---- demo script ----
  // Mirror-neuron arc: challenge card (1.2s) → imperfect but tense play → near-fail
  // (hp drops to 1) → narrow save → real death
  // Demo steers shield via demoTargetX
  var demoTargetX = W / 2;
  var demoPhase2 = 0; // sub-phase: 0=normal, 1=near-fail, 2=post-recovery
  var demoBlockCount = 0;
  var demoMissed = false;
  var demoNearFail = false;
  var demoShouldDie = false;
  var demoMissCount = 0;

  // Bot autopilot state
  var botTargetX = W / 2;
  var botMissProb = 0.18; // bot misses some to ensure game_over

  function autopilot(dt) {
    if (phase !== 'play') return;
    if (DEMO) {
      demoPilot(dt);
    } else if (BOT) {
      botPilot(dt);
    }
  }

  function demoPilot(dt) {
    // Move toward demo target with human-feeling lag
    var spd = 3.5 + rng() * 1.5;
    var dx = demoTargetX - shield.x;
    shield.x += Math.sign(dx) * Math.min(Math.abs(dx), spd * dt);
    shield.x = Math.max(SHIELD_W/2, Math.min(W - SHIELD_W/2, shield.x));

    if (balls.length === 0) return;
    var b = balls[0];

    // Determine where ball will hit at SHIELD_Y
    var eta = (SHIELD_Y - b.y) / Math.max(b.vy, 0.1);
    var predictX = b.x + b.vx * eta;
    // wrap bounces off walls
    while (predictX < BALL_R || predictX > W - BALL_R) {
      if (predictX < BALL_R) predictX = BALL_R*2 - predictX;
      if (predictX > W - BALL_R) predictX = 2*(W-BALL_R) - predictX;
    }

    if (!demoNearFail && demoBlockCount < 8) {
      // Normal play: aim with slight wobble for humanness
      demoTargetX = predictX + (rng() - 0.5) * 22;
    } else if (demoNearFail && !demoMissed) {
      // The near-fail: deliberately miss (hp goes to 1)
      demoTargetX = predictX + (predictX > W/2 ? 90 : -90);
      if (hp === 1) { demoMissed = true; }
    } else if (demoMissed && demoMissCount < 2) {
      // Recovery: narrow save with tight aim
      demoTargetX = predictX + (rng()-0.5) * 8;
    } else if (demoMissCount >= 2) {
      // Real death: deliberately miss
      demoShouldDie = true;
      demoTargetX = predictX + (predictX > W/2 ? 110 : -110);
    }
    // Trigger near-fail at block 8
    if (demoBlockCount >= 8 && !demoNearFail) demoNearFail = true;
  }

  function botPilot(dt) {
    if (balls.length === 0) return;
    var b = balls[0];
    // decide target for this ball (per-ball randomness)
    if (botTargetX === null) {
      // ~18% chance to deliberately miss (ensures game_over eventually)
      if (rng() < botMissProb) {
        botTargetX = b.x > W/2 ? b.x + 120 : b.x - 120;
      } else {
        botTargetX = b.x + gauss() * 22;
      }
    }
    var spd = 4.5;
    var dx = botTargetX - shield.x;
    shield.x += Math.sign(dx) * Math.min(Math.abs(dx), spd * dt);
    shield.x = Math.max(SHIELD_W/2, Math.min(W - SHIELD_W/2, shield.x));
  }
  var botCurrentBallId = -1;

  // ---- draw helpers ----
  function drawShield(alpha) {
    alpha = alpha === undefined ? 1 : alpha;
    cx.globalAlpha = alpha;
    // shield glow proportional to score
    var glow = Math.min(score / 20, 1);
    if (glow > 0.1) {
      cx.shadowBlur = 8 + glow * 14;
      cx.shadowColor = TEAL;
    }
    var g = cx.createLinearGradient(shield.x - shield.w/2, SHIELD_Y, shield.x + shield.w/2, SHIELD_Y + SHIELD_H);
    g.addColorStop(0, TEAL);
    g.addColorStop(1, '#1a9e96');
    cx.fillStyle = g;
    cx.beginPath();
    cx.roundRect
      ? cx.roundRect(shield.x - shield.w/2, SHIELD_Y, shield.w, SHIELD_H, 7)
      : cx.rect(shield.x - shield.w/2, SHIELD_Y, shield.w, SHIELD_H);
    cx.fill();
    cx.shadowBlur = 0; cx.shadowColor = 'transparent';
    cx.globalAlpha = 1;
  }

  function drawBall(b) {
    cx.shadowBlur = 10; cx.shadowColor = 'hsl(' + b.hue + ',75%,60%)';
    cx.fillStyle = 'hsl(' + b.hue + ',72%,62%)';
    cx.beginPath(); cx.arc(b.x, b.y, b.r, 0, Math.PI*2); cx.fill();
    cx.shadowBlur = 0; cx.shadowColor = 'transparent';
  }

  function drawHP() {
    var pip = 20, gap = 8, totalW = MAX_HP*pip + (MAX_HP-1)*gap;
    var sx = W/2 - totalW/2;
    for (var i = 0; i < MAX_HP; i++) {
      cx.fillStyle = i < hp ? VERM : 'rgba(255,255,255,0.12)';
      cx.beginPath(); cx.arc(sx + i*(pip+gap) + pip/2, H - 42, pip/2, 0, Math.PI*2); cx.fill();
    }
  }

  function drawParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= 0.035 * dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      cx.globalAlpha = p.life;
      cx.fillStyle = p.color;
      cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI*2); cx.fill();
      cx.globalAlpha = 1;
    }
  }

  function drawFlashes(dt) {
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t/40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t*0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 260 - fl.t*0.5);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }
  }

  function drawScoreBar() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 64px -apple-system, Helvetica, Arial';
    cx.fillText(score, W/2, 90);
    cx.fillStyle = 'rgba(255,255,255,0.38)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + best, W/2, 112);
    // dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : ('BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : '')), W/2, 140);
    }
  }

  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop decay — MUST decay or autopilot never runs
    if (hitStop > 0) { hitStop -= dt; }
    else {
      // physics update
      if (phase === 'play') {
        // move shield toward pointer (human)
        if (!DEMO && !BOT) {
          var dx2 = pointerX - shield.x;
          shield.x += dx2 * 0.22 * dt;
          shield.x = Math.max(SHIELD_W/2, Math.min(W - SHIELD_W/2, shield.x));
        }
        autopilot(dt);

        // move balls
        for (var i = balls.length - 1; i >= 0; i--) {
          var b = balls[i];
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          // wall bounce
          if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx); }
          if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx); }
          if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy); }

          // shield collision
          if (b.vy > 0 && tryBlock(b)) {
            if (DEMO && demoShouldDie) {
              onMiss(b, i); // force miss for dramatic death
            } else {
              // demo near-fail: deliberately miss the first hit after demoNearFail triggers
              if (DEMO && demoNearFail && !demoMissed && hp > 1) {
                onMiss(b, i);
                demoMissCount++;
              } else if (DEMO && demoMissed && demoMissCount < 2) {
                onBlock(b, i);
                demoBlockCount++;
                demoMissCount++;
              } else {
                onBlock(b, i);
                if (DEMO) demoBlockCount++;
                // reset bot target after each ball resolved
                botTargetX = null;
              }
            }
            break;
          }

          // missed (ball passed below shield)
          if (b.y - b.r > H) {
            if (DEMO && !demoNearFail) {
              // in demo early phase, keep catching (don't let ball escape early)
              b.y = 40; b.x = 40 + rng()*(W-80);
            } else {
              onMiss(b, i);
              botTargetX = null;
            }
            break;
          }
        }
      }
    }

    // ---- draw ----
    cx.save();
    // juice transforms
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx2 = (Math.random()-0.5)*shakeAmt, sy2 = (Math.random()-0.5)*shakeAmt;
      cx.translate(W/2 + sx2, H/2 + sy2); cx.scale(zoom, zoom); cx.translate(-W/2, -H/2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W+40, H+40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // shield zone divider line
    cx.strokeStyle = 'rgba(46,197,182,0.12)';
    cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(0, SHIELD_Y + SHIELD_H + 4); cx.lineTo(W, SHIELD_Y + SHIELD_H + 4); cx.stroke();

    // ---- title ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('SCORE SHIELD', W/2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('block everything. defend your rank.', W/2, 318);
      var p0 = 0.6 + 0.4*Math.sin(now/300);
      cx.globalAlpha = p0; cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W/2, 366); cx.globalAlpha = 1;
      drawShield(0.4);
    }

    // ---- challenge card (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.48)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('24', W/2, 406);
      cx.fillStyle = 'rgba(255,255,255,0.32)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's shield", W/2, 436);
    }

    // ---- play / over (game canvas layer) ----
    if (phase === 'play' || phase === 'over') {
      drawScoreBar();
      // balls
      for (var bi = 0; bi < balls.length; bi++) drawBall(balls[bi]);
      // shield
      drawShield();
      // hp pips
      drawHP();
    }

    // particles
    if (phase === 'play' || phase === 'over') drawParticles(dt);

    // flashes
    drawFlashes(dt);

    // ---- over overlay ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.58)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('SHIELD DOWN.', W/2, 306);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' pts', W/2, 350);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W/2, 396);
      cx.fillStyle = 'rgba(255,255,255,0.52)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100-pt) + '% of players', W/2, 420);
      if (!DEMO && !BOT) {
        var p1 = 0.6 + 0.4*Math.sin(now/280);
        cx.globalAlpha = p1; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — DEFEND AGAIN', W/2, 462); cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.13)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect
          ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23)
          : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W/2, SHARE_R.y + 30);
      }
    }

    // ---- demo CTA card ----
    if (phase === 'cta') {
      var tCta = (now - ctaAt) / 1000, eas = Math.min(1, tCta * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78*eas) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = eas; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('SCORE SHIELD', W/2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they held ' + (window.__demoScore || 14) + ' pts. can you?', W/2, 342);
      var p2 = 0.7 + 0.3*Math.sin(now/240);
      cx.fillStyle = VERM; cx.globalAlpha = eas * p2;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 14), W/2, 412);
      cx.globalAlpha = eas;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 444);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w/2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
