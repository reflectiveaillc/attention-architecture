        cx.beginPath(); cx.moveTo(-h*0.22, -h*0.38); cx.lineTo(-h*0.12, -h*0.38); cx.lineTo(-h*0.06, -h*0.32); cx.stroke();

  // ── Stories ────────────────────────────────────────────────────────────────
  var STORIES = [

        { label: 'IT RINGS',   bg: '#281510', icon: 'alarm'  },

        { label: 'STIR',       bg: '#18180e', icon: 'stir'   },

  // ── Layout constants ───────────────────────────────────────────────────────

  var PANELS_Y = 350;

  var SHOW_TIME_MS = DEMO ? 600 : 2000;

  // ── State ──────────────────────────────────────────────────────────────────
  var phase, runStartTs, errors, round, storyIdx;
  var currentOrder;   // array of 4 ints, currentOrder[slot] = panelIndex
  var revealIdx, revealAt;
  var dragIdx, dragOffX, dragOffY, dragX, dragY;
  var flashes = [], hitStop = 0, zoom = 1, shakeAmt = 0;
  var dareBeaten = false, challengeAt, ctaAt;
  var botRunsDone = 0;
  var best;
  try { best = +localStorage.getItem('ss_best') || 0; } catch (_) { best = 0; }

  // demo-mode state machine
  var demoPhase, demoTimer, demoStepsDone;

  function mulberryArr(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function scramble() {
    var s;
    do { s = mulberryArr([0,1,2,3]); }
    while (s.every(function (v, i) { return v === i; }));
    return s;
  }

  function chooseStory() {
    return Math.floor(rng() * STORIES.length);
  }

  function panelX(slot) {
    var totalW = 4 * PANEL_W + 3 * PANEL_GAP;
    return (W - totalW) / 2 + slot * (PANEL_W + PANEL_GAP);
  }

  function isCorrect() {
    return currentOrder[0]===0 && currentOrder[1]===1 && currentOrder[2]===2 && currentOrder[3]===3;
  }

  function flash(txt, color, sz) { flashes.push({ txt: txt, color: color, size: sz, t: 0 }); }

  // ── Start / reset ──────────────────────────────────────────────────────────
  function newGame() {
    errors = 0; round = 0; flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false; dragIdx = -1;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      demoPhase = 'challenge';
      demoTimer  = 1250;
      return;
    }
    if (BOT) { doStartRun(); return; }

    runStartTs = Date.now();

    doNewRound(DEMO ? 4 : chooseStory());
  }

  function doNewRound(idx) {
    storyIdx = idx;
    currentOrder = scramble();
    revealIdx = 0;
    revealAt  = performance.now();
    phase     = 'reveal';
    demoStepsDone = 0;
  }

  // ── Win / lose ─────────────────────────────────────────────────────────────
  function onRoundWin() {
    round++;
    var perfect = errors === 0;
    if (perfect) { if (window.J) J.perfect(round); hitStop = 6; zoom = 1.035; flash('PERFECT!', TEAL, 40); }
    else          { if (window.J) J.hit(round);    flash('DONE!', GOLD, 36); }
    if (window.J) J.tension(Math.min(round / 5, 1));

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && errors < SHARE.dare) {
      dareBeaten = true; flash('DARE BEATEN!', TEAL, 44);
      if (window.J) J.fanfare(); SHARE.beaten(errors);

    } else {
      setTimeout(function () { errors = 0; doNewRound(DEMO ? (4 + round) % 5 : chooseStory()); }, BOT ? 200 : 900);
    }
  }

  function doSwap(a, b) {
    var tmp = currentOrder[a]; currentOrder[a] = currentOrder[b]; currentOrder[b] = tmp;
  }

  function tryPlacePanel(fromSlot, toSlot) {
    if (fromSlot === toSlot) return;
    doSwap(fromSlot, toSlot);
    if (window.LOOP) LOOP.emit('panel_moved', { from: fromSlot, to: toSlot });
    if (isCorrect()) {
      onRoundWin();
    } else {
      if (window.J) J.near();
      shakeAmt = 2;
    }
  }

  function doGameOver() {
    phase = 'over';
    var dur = (Date.now() - runStartTs) / 1000;
    var sc  = errors;
    if (best === 0 || sc < best) { best = sc; try { localStorage.setItem('ss_best', String(best)); } catch (_) {} }
    if (window.J) { J.death(Math.min(0.3 + sc / 8, 1)); if (sc === 0) setTimeout(function () { J.fanfare(); }, 500); }

      demoTimer  = 2200;

      else setTimeout(function () { doReset(); }, 700);
    }

  function doReset() {
    errors = 0; round = 0; flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0; dragIdx = -1;
    if (window.LOOP) LOOP.emit('restart', {});
    doStartRun();
  }

  // ── Demo state-machine (tick-driven, called every frame) ───────────────────
  // demoPhase: 'challenge' | 'wait_start' | 'playing' | 'score_card' | 'cta'
  // demoTimer: ms remaining in current state
  // demoStepsDone: how many swaps done in current play round

  // Pre-baked swap sequences for demo rounds (indices into slots 0-3)
  // Round 0 (story 4 = MESSAGE): make 1 wrong swap then 1 correct → win with errors=1
  // Round 1 (story 0 = ALARM):   make 1 wrong swap then fix → win with errors=1
  // Round 2 (story 1 = COFFEE):  near-fail recovery → 2 wrong swaps → game over
  var demoPlays = [
    // [from, to, isWrong, waitMs]
    [ [1,3,false,500], [0,2,false,600], [1,3,false,700], 'win_path' ],   // round 0: 3 valid swaps
    [ [2,3,true,800], [2,3,false,550], [0,1,false,650], 'win_path' ],    // round 1: wrong then fix
    [ [3,2,true,900], [1,0,true,700], 'lose_path' ]                      // round 2: 2 wrongs → force over
  ];

  function tickDemo(dt) {
    if (!DEMO) return;
    demoTimer -= dt * 16.667; // dt is in frames

    if (demoPhase === 'challenge') {
      if (demoTimer <= 0) { demoPhase = 'wait_start'; demoTimer = 200; doStartRun(); }
      return;
    }
    if (demoPhase === 'wait_start') {
      if (demoTimer <= 0) { demoPhase = 'playing'; demoTimer = 800; }
      return;
    }
    if (demoPhase === 'playing') {
      if (phase !== 'play') return; // still in reveal
      if (demoTimer > 0) return;

      var playSeq = demoPlays[round] || demoPlays[demoPlays.length - 1];
      var steps   = playSeq.filter(function (x) { return Array.isArray(x); });
      var path    = playSeq[playSeq.length - 1];

      if (demoStepsDone < steps.length) {
        var step = steps[demoStepsDone];
        var from = step[0], to = step[1], isWrong = step[2], wait = step[3];
        if (isWrong) {
          doSwap(from, to);
          errors++;
          if (window.J) J.near();
          if (window.LOOP) LOOP.emit('near_miss', { errors: errors });
          shakeAmt = 3;
          flash('WRONG', VERM, 28);
          demoStepsDone++;
          demoTimer = wait;
        } else {
          // correct move: actually fix the array towards sorted
          // find first out-of-order element and swap it to its correct place
          var fixed = false;
          for (var fi = 0; fi < 4 && !fixed; fi++) {
            if (currentOrder[fi] !== fi) {
              for (var fj = fi + 1; fj < 4 && !fixed; fj++) {
                if (currentOrder[fj] === fi) {
                  doSwap(fi, fj);
                  fixed = true;
                }
              }
            }
          }
          demoStepsDone++;
          demoTimer = wait;
          if (isCorrect()) { onRoundWin(); demoPhase = 'playing'; demoTimer = 900; return; }
        }
      } else {
        // all steps done for this round
        if (path === 'lose_path') {
          // force game over — just call it
          doGameOver();
        } else {
          // force correct and win
          currentOrder = [0,1,2,3];
          onRoundWin();
          demoPhase = 'playing'; demoTimer = 900;
        }
      }
    }
    if (demoPhase === 'score_card') {
      if (demoTimer <= 0) { demoPhase = 'cta'; demoTimer = 3500; ctaAt = performance.now(); phase = 'cta'; }
      return;
    }
    if (demoPhase === 'cta') {
      if (demoTimer <= 0 && !window.__demoDone) { window.__demoDone = true; }
      return;
    }
  }

  // ── Bot autopilot ──────────────────────────────────────────────────────────
  var botWait = 0, botSwapsDone = 0;
  function tickBot(dt) {
    if (!BOT || phase !== 'play' || window.__botDone) return;
    botWait -= dt * 16.667;
    if (botWait > 0) return;
    botWait = 350 + rng() * 300;

    // find first wrong panel and fix it (occasionally make an error)
    var doErr = rng() < 0.25;
    if (doErr) {
      var a2 = Math.floor(rng() * 4), b2 = (a2 + 1 + Math.floor(rng() * 3)) % 4;
      doSwap(a2, b2); errors++;
      if (window.J) J.near();
      botSwapsDone++;
    } else {
      var fixed = false;
      for (var fi = 0; fi < 4 && !fixed; fi++) {
        if (currentOrder[fi] !== fi) {
          for (var fj = fi + 1; fj < 4 && !fixed; fj++) {
            if (currentOrder[fj] === fi) { doSwap(fi, fj); fixed = true; }
          }
        }
      }
      botSwapsDone++;
      if (isCorrect()) { onRoundWin(); botSwapsDone = 0; return; }
    }
    // Safety: if we've done too many swaps without winning, just force the win
    if (botSwapsDone > 12) {
      currentOrder = [0,1,2,3];
      onRoundWin(); botSwapsDone = 0;
    }
  }

  // ── Input ──────────────────────────────────────────────────────────────────
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W/2 - 125, y: 520, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h; }

  function slotAt(x, y) {
    var totalW = 4 * PANEL_W + 3 * PANEL_GAP;
    var ox = (W - totalW) / 2;
    if (y < PANELS_Y - 10 || y > PANELS_Y + PANEL_H + 10) return -1;
    var rel = x - ox;
    if (rel < 0 || rel > totalW) return -1;
    return Math.max(0, Math.min(3, Math.floor(rel / (PANEL_W + PANEL_GAP))));
  }

  function onDown(x, y) {
    if (DEMO || BOT) return;
    if (inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { doStartRun(); return; }
    if (phase === 'over') {
      if (inR(SHARE_R, x, y) && window.SHARE) { SHARE.send({ score: errors, unit: 'errors' }); return; }
      doReset(); return;
    }
    if (phase === 'play') {
      var s = slotAt(x, y);
      if (s >= 0) { dragIdx = s; dragOffX = x - (panelX(s) + PANEL_W/2); dragOffY = y - (PANELS_Y + PANEL_H/2); dragX = x; dragY = y; }
    }
  }
  function onMove(x, y) { if (DEMO || BOT || dragIdx < 0) return; dragX = x; dragY = y; }
  function onUp(x, y) {
    if (DEMO || BOT || dragIdx < 0) return;
    var t = slotAt(x, y);
    if (t >= 0 && t !== dragIdx) tryPlacePanel(dragIdx, t);
    dragIdx = -1;
  }

  var bcr;
  function getBCR() { try { bcr = cv.getBoundingClientRect(); } catch(_) {} }
  getBCR(); window.addEventListener('resize', getBCR);

  cv.addEventListener('pointerdown', function (e) { var r = cv.getBoundingClientRect(); onDown((e.clientX-r.left)/scale,(e.clientY-r.top)/scale); });
  cv.addEventListener('pointermove', function (e) { var r = cv.getBoundingClientRect(); onMove((e.clientX-r.left)/scale,(e.clientY-r.top)/scale); });
  cv.addEventListener('pointerup',   function (e) { var r = cv.getBoundingClientRect(); onUp((e.clientX-r.left)/scale,(e.clientY-r.top)/scale); });

  // ── Draw helpers ───────────────────────────────────────────────────────────
  function drawPanel(panelDef, x, y, w, h, alpha, numLabel, correct) {
    cx.save();
    cx.globalAlpha = alpha !== undefined ? alpha : 1;
    cx.fillStyle = panelDef.bg;
    if (cx.roundRect) { cx.beginPath(); cx.roundRect(x, y, w, h, 10); cx.fill(); }
    else cx.fillRect(x, y, w, h);
    cx.strokeStyle = correct ? TEAL : 'rgba(255,255,255,0.16)';
    cx.lineWidth   = correct ? 2 : 1;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(x, y, w, h, 10); else cx.rect(x, y, w, h);
    cx.stroke();
    drawIcon(panelDef.icon, x + w/2, y + h*0.43, w * 0.6);
    cx.fillStyle = 'rgba(255,255,255,0.82)';
    cx.font = 'bold 8px -apple-system, Helvetica, Arial'; cx.textAlign = 'center';
    cx.fillText(panelDef.label, x + w/2, y + h - 12);
    if (numLabel !== undefined) {
      cx.fillStyle = GOLD; cx.font = 'bold 10px Menlo, monospace';
      cx.fillText(String(numLabel), x + w/2, y + 14);
    }
    cx.restore();
  }

  function pctBetter(errs) {
    return Math.max(1, Math.min(99, 100 - Math.round(12 * Math.exp(-errs * 0.7 + 0.5))));
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // tick autopilots
    if (DEMO) tickDemo(dt);
    if (BOT && !window.__botDone) tickBot(dt);

    // juice decay
    if (hitStop > 0) hitStop -= dt;
    zoom += (1 - zoom) * 0.12 * dt;
    shakeAmt *= Math.pow(0.83, dt);

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random()-0.5)*shakeAmt, sy = (Math.random()-0.5)*shakeAmt;
      cx.translate(W/2+sx, H/2+sy); cx.scale(zoom, zoom); cx.translate(-W/2, -H/2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W+40, H+40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    var story = STORIES[storyIdx !== undefined ? storyIdx : 0];

    // title ──────────────────────────────────────────────────────────────────
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('STORY SEQUENCE', W/2, 230);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 14px -apple-system';
      cx.fillText('watch the order.', W/2, 262);
      cx.fillText('put it back.', W/2, 282);
      for (var pi = 0; pi < 4; pi++) {
        drawPanel(STORIES[0].panels[pi], panelX(pi), PANELS_Y, PANEL_W, PANEL_H, 0.28, pi+1, false);
      }
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillStyle = VERM;
      cx.font = '700 15px -apple-system'; cx.textAlign = 'center';
      cx.fillText('TAP TO START', W/2, 560); cx.globalAlpha = 1;
    }

    // challenge card ─────────────────────────────────────────────────────────
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 14px Menlo, monospace';
      cx.fillText('ERRORS TO BEAT', W/2, 295);
      cx.fillStyle = GOLD; cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('0', W/2, 405);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system';
      cx.fillText('a perfect run', W/2, 430);
    }

    // reveal ─────────────────────────────────────────────────────────────────
    if (phase === 'reveal') {
      var elapsed = now - revealAt;
      var newIdx  = Math.floor(elapsed / SHOW_TIME_MS);
      if (newIdx > revealIdx) { revealIdx = newIdx; }
      if (revealIdx >= 4) {
        phase = 'play';
        dragIdx = -1; demoStepsDone = 0;
        if (DEMO) { demoPhase = 'playing'; demoTimer = 600; }
      } else {
        cx.textAlign = 'center';
        cx.fillStyle = GOLD; cx.font = '800 13px Menlo, monospace';
        cx.fillText(story.title, W/2, 130);
        cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 11px -apple-system';
        cx.fillText('PANEL ' + (revealIdx+1) + ' OF 4', W/2, 150);
        for (var di = 0; di < 4; di++) {
          cx.fillStyle = di <= revealIdx ? TEAL : 'rgba(255,255,255,0.18)';
          cx.beginPath(); cx.arc(W/2 - 30 + di*20, 168, 5, 0, Math.PI*2); cx.fill();
        }
        var pw = 176, ph = 248, px2 = (W-pw)/2, py2 = 200;
        drawPanel(story.panels[revealIdx], px2, py2, pw, ph, 1, revealIdx+1, false);
        var frac = (elapsed % SHOW_TIME_MS) / SHOW_TIME_MS;
        cx.fillStyle = 'rgba(255,255,255,0.1)'; cx.fillRect(50, 470, W-100, 5);
        cx.fillStyle = TEAL; cx.fillRect(50, 470, (W-100)*frac, 5);
        cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 11px -apple-system';
        cx.fillText('memorise the order', W/2, 494);
      }
    }

    // play ───────────────────────────────────────────────────────────────────
    if (phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = GOLD; cx.font = '800 12px Menlo, monospace';
      cx.fillText(story.title, W/2, 132);
      cx.fillStyle = '#fff'; cx.font = '900 20px -apple-system, Helvetica, Arial';
      cx.fillText('PUT IN ORDER', W/2, 158);
      cx.fillStyle = 'rgba(255,255,255,0.42)'; cx.font = '600 11px -apple-system';
      cx.fillText('drag panels into sequence', W/2, 176);
      cx.fillStyle = errors > 0 ? VERM : 'rgba(255,255,255,0.3)';
      cx.font = '700 12px -apple-system';
      cx.fillText(errors === 0 ? 'NO ERRORS' : errors + ' ERROR' + (errors > 1 ? 'S' : ''), W/2, 196);

      // slot backgrounds
      for (var si = 0; si < 4; si++) {
        cx.fillStyle = 'rgba(255,255,255,0.05)';
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(panelX(si), PANELS_Y, PANEL_W, PANEL_H, 8);
        else cx.rect(panelX(si), PANELS_Y, PANEL_W, PANEL_H);
        cx.fill();
        cx.fillStyle = 'rgba(255,255,255,0.18)'; cx.font = '600 9px Menlo';
        cx.textAlign = 'center';
        cx.fillText(String(si+1), panelX(si) + PANEL_W/2, PANELS_Y + PANEL_H + 14);
      }
      // panels
      for (var s2 = 0; s2 < 4; s2++) {
        if (s2 === dragIdx) continue;
        var pd = story.panels[currentOrder[s2]];
        drawPanel(pd, panelX(s2), PANELS_Y, PANEL_W, PANEL_H, 1, currentOrder[s2]+1, currentOrder[s2]===s2);
      }
      if (dragIdx >= 0) {
        var dpc = story.panels[currentOrder[dragIdx]];
        drawPanel(dpc, dragX - PANEL_W/2 - dragOffX, dragY - PANEL_H/2 - dragOffY, PANEL_W, PANEL_H, 0.84, currentOrder[dragIdx]+1, false);
      }

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '700 11px -apple-system'; cx.textAlign = 'center';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + ' errors', W/2, 562);
      }

      cx.fillStyle = 'rgba(255,255,255,0.28)'; cx.font = '600 10px Menlo';
      cx.textAlign = 'center';
      cx.fillText('ROUND ' + (round+1) + ' / 3', W/2, 588);
    }

    // over ───────────────────────────────────────────────────────────────────
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0,0,W,H);
      cx.textAlign = 'center';
      var ov_label = errors === 0 ? 'FLAWLESS.' : 'SCRAMBLED.';
      cx.fillStyle  = errors === 0 ? TEAL : VERM;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText(ov_label, W/2, 285);
      cx.fillStyle = '#fff'; cx.font = '800 20px -apple-system';
      cx.fillText(errors + ' error' + (errors === 1 ? '' : 's'), W/2, 326);
      var pct = pctBetter(errors);
      cx.fillStyle = GOLD; cx.font = '900 20px -apple-system';
      cx.fillText('TOP ' + pct + '% TODAY', W/2, 366);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 11px -apple-system';
      cx.fillText('better than ' + pct + '% of players', W/2, 386);

      if (!DEMO && !BOT) {
        var pp = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = pp; cx.fillStyle = TEAL;
        cx.font = '700 15px -apple-system'; cx.textAlign = 'center';
        cx.fillText('TAP — ONE MORE TRY', W/2, 440); cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.12)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 14px -apple-system';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W/2, SHARE_R.y + 29);
      }
    }

    // cta ────────────────────────────────────────────────────────────────────
    if (phase === 'cta') {
      var tt = (now - ctaAt) / 1000, ease = Math.min(1, tt * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('STORY SEQUENCE', W/2, 286);
      cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 17px -apple-system';
      var sc2 = (window.__demoScore !== undefined) ? window.__demoScore : 0;
      cx.fillText(sc2 === 0 ? 'they got 0 errors. you?' : 'they had ' + sc2 + ' error' + (sc2===1?'':'s') + '. beat it.', W/2, 324);
      var p3  = 0.72 + 0.28 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + sc2 + ' ERRORS', W/2, 390);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 14px -apple-system';
      cx.fillText('link in bio', W/2, 420);
      cx.globalAlpha = 1;
    }

    // floating flashes ───────────────────────────────────────────────────────
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 248 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // mute toggle (human only) ───────────────────────────────────────────────
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.48;
      cx.font = '15px -apple-system'; cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w/2, MUTE_R.y + 25);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
