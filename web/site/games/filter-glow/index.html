<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- filter definitions ----
  // Each filter has a name, a glow color, and a visual effect applied to the face
  var FILTERS = [
    { name: 'SMOOTH',     color: '#ffbbdd', glow: 'rgba(255,180,220,0.55)', blur: 4,  satMul: 1.0, sizeMul: 1.00 },
    { name: 'GLOW UP',    color: '#ffe0a0', glow: 'rgba(255,220,130,0.60)', blur: 2,  satMul: 1.2, sizeMul: 1.02 },
    { name: 'PORCELAIN',  color: '#e8d0ff', glow: 'rgba(200,160,255,0.55)', blur: 6,  satMul: 0.8, sizeMul: 1.01 },
    { name: 'VIVID',      color: '#ff8855', glow: 'rgba(255,120,80,0.55)',  blur: 1,  satMul: 1.6, sizeMul: 1.00 },
    { name: 'EYE LIFT',   color: '#88ddff', glow: 'rgba(100,210,255,0.55)', blur: 2,  satMul: 1.1, sizeMul: 1.03 },
    { name: 'JAW SHARP',  color: '#ccffee', glow: 'rgba(80,255,180,0.50)', blur: 0,  satMul: 1.0, sizeMul: 1.00 },
    { name: 'BLUSH',      color: '#ffaacc', glow: 'rgba(255,100,160,0.55)', blur: 3,  satMul: 1.3, sizeMul: 1.01 },
    { name: 'BRIGHTEN',   color: '#ffffaa', glow: 'rgba(255,255,100,0.50)', blur: 2,  satMul: 1.1, sizeMul: 1.00 },
    { name: 'CONTOUR',    color: '#bb99ff', glow: 'rgba(180,100,255,0.55)', blur: 1,  satMul: 1.0, sizeMul: 1.00 },
    { name: 'ANGEL',      color: '#ffffff', glow: 'rgba(255,255,255,0.65)', blur: 8,  satMul: 0.7, sizeMul: 1.04 },
  ];

  // glitch colors for the break sequence
  var GLITCH_COLORS = ['#e8502e', '#2ec5b6', '#f2b134', '#ff00ff', '#00ffff', '#ffffff'];

  var BREAK_AT = 12; // layers before the face starts glitching heavily
  var MAX_LAYERS = 18; // point at which the face shatters (game over)

  // ---- state ----
  var state, flashes, particles, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  try { best = +localStorage.getItem('fg_best') || 0; } catch (_) {}

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 8))));
  }

  // ---- face drawing ----
  // The face is drawn procedurally: an oval head, eyes, nose hint, mouth
  // As layers accumulate the face gets glowier, smoother, more absurd
  function drawFace(cx, cx2, cy, layers, glitchPhase) {
    var totalBlur = 0, totalSatMul = 1, totalSizeMul = 1;
    var glowLayers = [];
    for (var i = 0; i < Math.min(layers, FILTERS.length); i++) {
      var fi = state.filterOrder[i];
      var f = FILTERS[fi];
      totalBlur += f.blur;
      totalSatMul *= f.satMul;
      totalSizeMul *= f.sizeMul;
      glowLayers.push(f);
    }

    var faceSize = 80 * totalSizeMul;
    var glitchStrength = Math.max(0, (layers - BREAK_AT) / (MAX_LAYERS - BREAK_AT));

    // Outer glow rings (one per recent filter layer, stacked)
    for (var g = glowLayers.length - 1; g >= Math.max(0, glowLayers.length - 4); g--) {
      var ringR = faceSize + (glowLayers.length - g) * 14;
      var glowG = cx.createRadialGradient(cx2, cy, ringR * 0.7, cx2, cy, ringR);
      glowG.addColorStop(0, glowLayers[g].glow);
      glowG.addColorStop(1, 'rgba(0,0,0,0)');
      cx.fillStyle = glowG;
      cx.beginPath(); cx.ellipse(cx2, cy, ringR, ringR * 1.1, 0, 0, Math.PI * 2); cx.fill();
    }

    // Glitch offset
    var gox = glitchStrength > 0 ? (rng() - 0.5) * 18 * glitchStrength : 0;
    var goy = glitchStrength > 0 ? (rng() - 0.5) * 8 * glitchStrength : 0;

    // Skin tone — goes from warm to overexposed
    var skinL = Math.min(90, 62 + layers * 1.8);
    var skinSat = Math.min(100, Math.max(0, (40 * totalSatMul)));
    var skinColor = 'hsl(20,' + skinSat + '%,' + skinL + '%)';

    // Face oval
    cx.save();
    if (glitchStrength > 0) {
      // Draw chromatic aberration copies
      cx.globalAlpha = 0.4 * glitchStrength;
      cx.fillStyle = 'rgba(255,0,80,0.5)';
      cx.beginPath(); cx.ellipse(cx2 + gox + 6, cy + goy, faceSize * 0.82, faceSize, 0, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = 'rgba(0,255,200,0.5)';
      cx.beginPath(); cx.ellipse(cx2 + gox - 6, cy + goy, faceSize * 0.82, faceSize, 0, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
    }
    cx.fillStyle = skinColor;
    cx.beginPath(); cx.ellipse(cx2 + gox, cy + goy, faceSize * 0.82, faceSize, 0, 0, Math.PI * 2); cx.fill();

    // Face sheen / filter overlay gradient
    if (layers > 0) {
      var lastF = FILTERS[state.filterOrder[Math.min(layers-1, FILTERS.length-1)]];
      var sheen = cx.createLinearGradient(cx2 - faceSize, cy - faceSize, cx2 + faceSize, cy + faceSize);
      sheen.addColorStop(0, 'rgba(255,255,255,' + (0.08 + layers * 0.012) + ')');
      sheen.addColorStop(0.5, lastF.glow.replace('0.5', String(0.12 + layers * 0.008)).replace('0.55', String(0.12 + layers * 0.008)).replace('0.6', String(0.12 + layers * 0.008)).replace('0.65', String(0.12 + layers * 0.008)));
      sheen.addColorStop(1, 'rgba(255,255,255,0.04)');
      cx.fillStyle = sheen;
      cx.beginPath(); cx.ellipse(cx2 + gox, cy + goy, faceSize * 0.82, faceSize, 0, 0, Math.PI * 2); cx.fill();
    }

    // Eyes — get bigger/glowier with eye-lift layers
    var eyeSpread = faceSize * 0.36;
    var eyeSize = 13 + layers * 0.4 * (totalSizeMul - 0.98);
    var eyeLY = cy + goy - faceSize * 0.15;
    for (var side = -1; side <= 1; side += 2) {
      var ex = cx2 + gox + side * eyeSpread;
      // white
      cx.fillStyle = 'rgba(255,255,255,' + Math.min(1, 0.9 + layers * 0.01) + ')';
      cx.beginPath(); cx.ellipse(ex, eyeLY, eyeSize + 2, eyeSize * 0.65, 0, 0, Math.PI * 2); cx.fill();
      // iris
      var irisHue = (200 + layers * 15) % 360;
      cx.fillStyle = 'hsl(' + irisHue + ',80%,' + Math.min(70, 40 + layers * 2) + '%)';
      cx.beginPath(); cx.ellipse(ex, eyeLY, eyeSize * 0.6, eyeSize * 0.6, 0, 0, Math.PI * 2); cx.fill();
      // pupil
      cx.fillStyle = '#000';
      cx.beginPath(); cx.ellipse(ex, eyeLY, eyeSize * 0.25, eyeSize * 0.25, 0, 0, Math.PI * 2); cx.fill();
      // eye glow
      if (layers > 3) {
        var eg = cx.createRadialGradient(ex, eyeLY, 0, ex, eyeLY, eyeSize * 1.4);
        eg.addColorStop(0, 'rgba(180,220,255,' + (0.3 + layers * 0.025) + ')');
        eg.addColorStop(1, 'rgba(0,0,0,0)');
        cx.fillStyle = eg; cx.globalAlpha = 0.7;
        cx.beginPath(); cx.ellipse(ex, eyeLY, eyeSize * 1.4, eyeSize * 1.4, 0, 0, Math.PI * 2); cx.fill();
        cx.globalAlpha = 1;
      }
    }

    // Nose (subtle)
    cx.strokeStyle = 'rgba(0,0,0,' + (0.15 - layers * 0.008) + ')';
    cx.lineWidth = 1.5; cx.lineCap = 'round';
    cx.beginPath();
    cx.moveTo(cx2 + gox - 5, cy + goy + faceSize * 0.1);
    cx.lineTo(cx2 + gox, cy + goy + faceSize * 0.22);
    cx.lineTo(cx2 + gox + 5, cy + goy + faceSize * 0.1);
    cx.stroke();

    // Lips — get plumper/redder
    var lipY = cy + goy + faceSize * 0.44;
    var lipW = faceSize * (0.38 + layers * 0.006);
    var lipH = 8 + layers * 0.3;
    var lipHue = 350 - layers * 2;
    var lipSat = Math.min(100, 60 + layers * 3);
    cx.fillStyle = 'hsl(' + lipHue + ',' + lipSat + '%,50%)';
    cx.beginPath();
    cx.ellipse(cx2 + gox, lipY, lipW, lipH, 0, 0, Math.PI * 2);
    cx.fill();
    // lip sheen
    cx.fillStyle = 'rgba(255,255,255,' + (0.2 + layers * 0.02) + ')';
    cx.beginPath();
    cx.ellipse(cx2 + gox, lipY - lipH * 0.3, lipW * 0.5, lipH * 0.35, 0, 0, Math.PI * 2);
    cx.fill();

    cx.restore();

    // Heavy glitch artifacts near break
    if (glitchStrength > 0.3 && glitchPhase) {
      cx.save();
      cx.globalAlpha = glitchStrength * 0.7;
      // horizontal scan-line tears
      for (var sl = 0; sl < 4; sl++) {
        var slY = cy - faceSize + rng() * faceSize * 2;
        var slH = 2 + rng() * 5;
        var slOff = (rng() - 0.5) * 30 * glitchStrength;
        cx.fillStyle = GLITCH_COLORS[Math.floor(rng() * GLITCH_COLORS.length)];
        cx.fillRect(cx2 - faceSize + slOff, slY, faceSize * 1.6, slH);
      }
      cx.restore();
    }
  }

  // ---- particles ----
  function spawnFilterBurst(x, y, color) {
    for (var i = 0; i < 12; i++) {
      var angle = rng() * Math.PI * 2;
      var speed = 2 + rng() * 4;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        color: color, r: 3 + rng() * 4, t: 0, life: 35 + rng() * 20
      });
    }
  }

  function spawnShatterBurst(x, y) {
    for (var i = 0; i < 30; i++) {
      var angle = rng() * Math.PI * 2;
      var speed = 3 + rng() * 8;
      var col = GLITCH_COLORS[Math.floor(rng() * GLITCH_COLORS.length)];
      particles.push({
        x: x + (rng()-0.5)*60, y: y + (rng()-0.5)*60,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 3,
        color: col, r: 4 + rng() * 8, t: 0, life: 50 + rng() * 30,
        shard: true
      });
    }
  }

  // ---- game logic ----
  function newGame() {
    state = {
      phase: 'title',    // title | challenge | play | over | cta
      layers: 0,
      filterOrder: [],
      glitchPhase: false,
      overAt: 0,
      score: 0
    };
    // Pre-generate random filter order (seeded)
    var pool = [];
    for (var i = 0; i < FILTERS.length; i++) pool.push(i);
    // shuffle
    for (var j = pool.length - 1; j > 0; j--) {
      var k = Math.floor(rng() * (j + 1));
      var tmp = pool[j]; pool[j] = pool[k]; pool[k] = tmp;
    }
    // repeat to allow stacking past 10
    state.filterOrder = pool.concat(pool.slice());
    flashes = []; particles = []; dareBeaten = false;

    if (DEMO) {
      // beat 1: challenge card
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
  }

  function startRun() {
    state.phase = 'play';
    state.layers = 0;
    state.score = 0;
    state.glitchPhase = false;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // Tap: add a filter layer
  function addLayer() {
    if (state.phase !== 'play') return;
    var layerIdx = state.layers;
    var fi = state.filterOrder[layerIdx % state.filterOrder.length];
    var f = FILTERS[fi];
    state.layers++;
    state.score = state.layers;

    var glitchStrength = Math.max(0, (state.layers - BREAK_AT) / (MAX_LAYERS - BREAK_AT));

    // Sound
    if (window.J) {
      if (state.layers >= MAX_LAYERS) {
        J.death(1.0);
      } else if (glitchStrength > 0.5) {
        J.tension(glitchStrength);
        J.near();
      } else if (state.layers % 5 === 0) {
        J.gold();
        hitStop = 5; zoom = 1.04;
      } else if (glitchStrength > 0) {
        J.tension(glitchStrength);
        J.hit(state.layers);
      } else {
        J.hit(state.layers);
        J.tension(Math.min(state.layers / BREAK_AT, 0.9));
      }
    }

    // Juice
    if (state.layers % 5 === 0 && state.layers < MAX_LAYERS) {
      hitStop = 4; zoom = 1.035;
      flash(f.name + '!', f.color, 38);
    } else if (state.layers < MAX_LAYERS) {
      flash('+' + f.name, f.color, 28);
    }

    // Particle burst
    spawnFilterBurst(W / 2, H / 2, f.color);

    // Dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }

    // Emit near_miss when approaching break
    if (state.layers === BREAK_AT) {
      if (window.LOOP) LOOP.emit('near_miss', { layers: state.layers });
      shakeAmt = 4;
    }

    // Glitch starts
    if (state.layers >= BREAK_AT) {
      state.glitchPhase = true;
      shakeAmt = Math.max(shakeAmt, (state.layers - BREAK_AT) * 0.8);
    }

    // Emit layer event
    if (window.LOOP) LOOP.emit('filter_added', { layer: state.layers, filter: f.name });

    // Game over at max layers
    if (state.layers >= MAX_LAYERS) {
      triggerShatter();
    }
  }

  function triggerShatter() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 12;
    zoom = 1.08;
    hitStop = 0; // don't freeze on death
    spawnShatterBurst(W / 2, H / 2);

    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (newBest) {
      best = state.score;
      try { localStorage.setItem('fg_best', String(best)); } catch (_) {}
    }
    if (window.J) {
      J.death(1.0);
      if (newBest) setTimeout(function () { J.fanfare(); }, 500);
    }
    if (DEMO) window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      // score card ~2.2s, then CTA ~3.5s
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetBotRun(); }, 600);
      }
    }
  }

  function resetBotRun() {
    state.layers = 0; state.score = 0; state.glitchPhase = false;
    flashes = []; particles = [];
    botActionsDone = 0; BOT_ACTION_MAX = 0; botTick = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 130, y: 492, w: 260, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { addLayer(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'layers' }); return;
      }
      // restart
      flashes = []; particles = []; dareBeaten = false;
      if (window.LOOP) LOOP.emit('restart', {});
      startRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- autopilots ----
  var botRunsDone = 0;
  // Bot: tap at intervals, play K layers then stop tapping so shatter fires naturally
  var botTick = 0, botActionsDone = 0, BOT_ACTION_MAX = 0;

  // Demo script: layer counts at which to tap, with hesitation frames
  // Arc: fast start → near-fail tension (slows down) → brief recovery → shatter
  var demoScript = [
    { wait: 28 }, { wait: 22 }, { wait: 30 }, { wait: 18 }, { wait: 35 },
    // layer 5 — gold milestone, good moment
    { wait: 40 }, { wait: 25 }, { wait: 20 }, { wait: 28 }, { wait: 32 },
    // layer 10 — near break, hesitation
    { wait: 60, tension: true }, { wait: 45, tension: true },
    // layers 12 — BREAK_AT, glitch starts — recovery attempt
    { wait: 80, tension: true }, { wait: 55, tension: true },
    // layer 14 — pushes further into glitch zone
    { wait: 90, tension: true }, { wait: 70, tension: true },
    // layers 16-17 — inevitable doom
    { wait: 50 }, { wait: 40 },
    // layer 18 (MAX) — shatter
  ];
  var demoIdx = 0, demoWait = 50; // initial delay before first tap

  function autopilot(dt) {
    if (state.phase !== 'play') return;

    if (DEMO) {
      if (demoWait > 0) { demoWait -= dt; return; }
      if (demoIdx < demoScript.length) {
        addLayer();
        var step = demoScript[demoIdx] || { wait: 30 };
        demoWait = step.wait;
        demoIdx++;
      }
      // If demoIdx >= demoScript.length, all layers placed, shatter should have fired
    } else if (BOT) {
      // Bot taps every ~20 frames, but plays at most MAX_LAYERS taps total
      if (BOT_ACTION_MAX === 0) {
        // random completion point: between 10 and MAX_LAYERS (always hits game_over)
        BOT_ACTION_MAX = MAX_LAYERS + 1; // always reach shatter
        botActionsDone = 0;
        botTick = 0;
      }
      botTick -= dt;
      if (botTick <= 0 && botActionsDone < BOT_ACTION_MAX) {
        addLayer();
        botActionsDone++;
        botTick = 18 + rng() * 15;
      }
    }
  }

  // ---- render ----
  var ctaAt = 0, challengeAt = 0, last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop decay (CRITICAL: decay before calling autopilot)
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      autopilot(dt);
    }

    // juice
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.11 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- TITLE ----
    if (state.phase === 'title') {
      // Draw face with 0 layers as preview
      drawFace(cx, W / 2, H / 2 - 40, 0, false);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('FILTER GLOW', W / 2, H / 2 + 115);
      cx.fillStyle = VERM; cx.font = '700 16px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillText('TAP TO STACK FILTERS', W / 2, H / 2 + 148);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('pile them on until it breaks.', W / 2, H / 2 + 172);
    }

    // ---- CHALLENGE CARD ----
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('LAYERS TO BEAT', W / 2, 295);
      cx.fillStyle = GOLD; cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('14', W / 2, 408);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 438);
    }

    // ---- PLAY ----
    if (state.phase === 'play' || state.phase === 'over') {
      // Glitch bg flash near shatter
      var glitchStr = Math.max(0, (state.layers - BREAK_AT) / (MAX_LAYERS - BREAK_AT));
      if (glitchStr > 0.4 && state.phase === 'play') {
        cx.fillStyle = 'rgba(232,80,46,' + (glitchStr * 0.07) + ')';
        cx.fillRect(0, 0, W, H);
      }

      // Draw face
      if (state.phase === 'play') {
        drawFace(cx, W / 2, H / 2 - 30, state.layers, state.glitchPhase);
      } else {
        // On game over — shattered effect: draw fragmented face
        drawFace(cx, W / 2, H / 2 - 30, state.layers, true);
      }

      // Layer counter
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 100);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best + ' LAYERS', W / 2, 124);

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 152);
      }

      // Filter name bar (current layer)
      if (state.phase === 'play' && state.layers > 0) {
        var curFi = state.filterOrder[(state.layers - 1) % state.filterOrder.length];
        var curF = FILTERS[curFi];
        cx.fillStyle = curF.color;
        cx.font = '700 18px Menlo, monospace';
        cx.fillText(curF.name, W / 2, H - 110);
      }

      // Tap hint
      if (state.phase === 'play' && state.layers < 3 && !DEMO && !BOT) {
        var tp = 0.5 + 0.5 * Math.sin(now / 300);
        cx.globalAlpha = tp;
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO ADD FILTER', W / 2, H - 72);
        cx.globalAlpha = 1;
      }

      // Tension meter (visual stakes bar)
      if (state.phase === 'play') {
        var barW = W - 80, barH = 6;
        var barX = 40, barY = H - 48;
        cx.fillStyle = 'rgba(255,255,255,0.12)';
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(barX, barY, barW, barH, 3);
        else cx.rect(barX, barY, barW, barH);
        cx.fill();
        var fill = state.layers / MAX_LAYERS;
        var barColor = fill < 0.55 ? TEAL : fill < 0.75 ? GOLD : VERM;
        cx.fillStyle = barColor;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(barX, barY, barW * fill, barH, 3);
        else cx.rect(barX, barY, barW * fill, barH);
        cx.fill();
        // label
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.font = '600 10px Menlo, monospace';
        cx.textAlign = 'left'; cx.fillText('FILTER STACK', barX, barY - 6);
        cx.textAlign = 'right'; cx.fillText(state.layers + '/' + MAX_LAYERS, barX + barW, barY - 6);
        cx.textAlign = 'center';
      }
    }

    // ---- GAME OVER ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('SHATTERED.', W / 2, 286);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' layers stacked', W / 2, 332);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 378);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 402);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — STACK AGAIN', W / 2, 452);
        cx.globalAlpha = 1;
        // share zone
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- DEMO CTA ----
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('FILTER GLOW', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('she stacked ' + (window.__demoScore || 14) + '. your move.', W / 2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 14), W / 2, 404);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 436);
      cx.globalAlpha = 1;
    }

    // ---- particles ----
    for (var pi = particles.length - 1; pi >= 0; pi--) {
      var p = particles[pi];
      p.t += dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.25 * dt;
      var a = Math.max(0, 1 - p.t / p.life);
      cx.globalAlpha = a;
      if (p.shard) {
        cx.save();
        cx.translate(p.x, p.y);
        cx.rotate(p.t * 0.1);
        cx.fillStyle = p.color;
        cx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.4);
        cx.restore();
      } else {
        cx.fillStyle = p.color;
        cx.beginPath(); cx.arc(p.x, p.y, p.r * (1 - p.t / p.life * 0.5), 0, Math.PI * 2); cx.fill();
      }
      cx.globalAlpha = 1;
      if (p.t >= p.life) particles.splice(pi, 1);
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 140 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
