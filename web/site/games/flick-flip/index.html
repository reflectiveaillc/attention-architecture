<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 18;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var BIN_LX = 105, BIN_RX = 300, BIN_Y = H - 120;
  var BIN_W = 170, BIN_H = 90, TILE_S = 70, FLIGHT_DUR = 25;

  var state, bins, tile, flashes, runStartTs, best = 0;
  var score = 0, combo = 0, peakCombo = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var challengeAt = 0, ctaAt = 0, overAt = 0, lastSwap = 0;
  try { best = +localStorage.getItem('ff_best') || 0; } catch (_) {}

  function newGame() {
    state = { phase: 'title' };
    bins = { left: 'recycle', right: 'trash', swapAnim: 0, prevLeft: 'recycle', prevRight: 'trash' };
    tile = null; flashes = []; score = 0; combo = 0; peakCombo = 0; dareBeaten = false;
    lastSwap = performance.now();
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1200);
      return;
    }
    if (BOT) startRun();
  }

  function typeColor(t) { return t === 'trash' ? VERM : TEAL; }
  function isCorrect(side, t) { return bins[side] === t; }
  function correctSide(t) { return bins.left === t ? 'left' : 'right'; }
  function otherSide(s) { return s === 'left' ? 'right' : 'left'; }

  function pctTop(s) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 11)))); }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    lastSwap = performance.now();
    spawnTile();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnTile() {
    var t = 'recycle';
    if (DEMO && demoIdx < demoScript.length) {
      t = demoTypeForAction(demoScript[demoIdx]);
    } else if (!DEMO) {
      t = rng() > 0.5 ? 'trash' : 'recycle';
    }
    tile = {
      type: t, x: W / 2, y: 150, state: 'idle',
      flicks: 0, side: null, idleT: 0, maxIdle: 180,
      flightT: 0, startX: W / 2, startY: 150,
      targetX: W / 2, targetY: 150, r: 0
    };
  }

  function flick(side) {
    if (!tile || state.phase !== 'play') return;
    if (tile.state === 'landed') return;
    tile.flicks++;
    tile.side = side;
    tile.state = 'flying';
    tile.startX = tile.x; tile.startY = tile.y;
    tile.targetX = side === 'left' ? BIN_LX : BIN_RX;
    tile.targetY = BIN_Y + 10;
    tile.flightT = 0;
    if (window.LOOP) LOOP.emit('tile_flicked', { side: side, type: tile.type, first: tile.flicks === 1 });
  }

  function landTile() {
    var correct = isCorrect(tile.side, tile.type);
    if (correct) {
      score++;
      if (tile.flicks === 1) { combo++; } else { combo = 0; }
      if (combo > peakCombo) peakCombo = combo;
      flash('+1', typeColor(tile.type), 38);
      if (combo > 1) flash('×' + combo, GOLD, 30);
      if (window.J) {
        if (combo > 0 && combo % 10 === 0) { J.gold(); }
        else if (combo > 0 && combo % 5 === 0) { J.perfect(combo); }
        else { J.hit(combo || 1); }
        J.tension(Math.min(score / 30, 1));
      }
      if (combo > 0 && combo % 5 === 0) { hitStop = 5; zoom = 1.04; }
      else { hitStop = 2; zoom = 1.02; }
      if (window.LOOP) LOOP.emit('tile_sorted', { score: score, combo: combo, flicks: tile.flicks });
      tile = null;
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(score);
      }
      if (DEMO) demoAdvance();
      setTimeout(function () { if (state.phase === 'play') spawnTile(); }, 140);
    } else {
      if (window.J) J.death(Math.min(0.3 + score / 30, 1));
      gameOver();
    }
  }

  function swapLabels() {
    bins.prevLeft = bins.left; bins.prevRight = bins.right;
    var tmp = bins.left; bins.left = bins.right; bins.right = tmp;
    bins.swapAnim = 20;
    if (DEMO && tile && demoIdx < demoScript.length) tile.type = demoTypeForAction(demoScript[demoIdx]);
    flash('FLIPPED!', GOLD, 34);
    if (window.LOOP) LOOP.emit('bin_swap', { left: bins.left, right: bins.right });
  }

  function gameOver() {
    state.phase = 'over';
    overAt = performance.now();
    shakeAmt = 10; zoom = 0.96; hitStop = 10;
    if (window.J) J.tension(0);
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (newBest) {
      best = score;
      try { localStorage.setItem('ff_best', String(best)); } catch (_) {}
      if (window.J) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = score;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    score = 0; combo = 0; peakCombo = 0; dareBeaten = false;
    tile = null; flashes = []; botDrift = null;
    bins = { left: 'recycle', right: 'trash', swapAnim: 0, prevLeft: 'recycle', prevRight: 'trash' };
    lastSwap = performance.now();
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0, y: 250 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 520, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'sorted' }); return;
      }
      resetRun();
    }
  }

  var drag = null;
  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
    if (state.phase === 'play' && !(window.J && inR(MUTE_R, x, y))) drag = { id: e.pointerId, startX: x, curX: x };

  window.addEventListener('pointermove', function (e) {
    if (!drag || drag.id !== e.pointerId) return;
    var r = cv.getBoundingClientRect();
    drag.curX = (e.clientX - r.left) / scale;
  });
  window.addEventListener('pointerup', function (e) {
    if (!drag || drag.id !== e.pointerId) return;
    var dx = drag.curX - drag.startX;
    var side = dx > 18 ? 'right' : (dx < -18 ? 'left' : (drag.curX > W / 2 ? 'right' : 'left'));
    flick(side);
    drag = null;
  });
  window.addEventListener('pointercancel', function () { drag = null; });
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') flick('left');
    if (e.code === 'ArrowRight' || e.code === 'KeyD') flick('right');
    if (e.code === 'Space') tap();

  // ---- demo / bot autopilots ----
  var CHALLENGE_SCORE = 15;
  var demoScript = [
    { wait: 22, side: 'left' },
    { wait: 28, side: 'right' },
    { wait: 20, side: 'left' },
    { wait: 26, side: 'right' },
    { wait: 32, side: 'left' },
    { wait: 24, side: 'left' },
    { wait: 22, side: 'left' },
    { wait: 30, side: 'right' },
    { wait: 26, side: 'left' },
    { wait: 40, side: 'right', redirect: ['right', 'left'], redirectWait: 20 },
    { wait: 28, side: 'right' },
    { wait: 30, side: 'left' },
    { wait: 36, side: 'left' },
    { wait: 28, side: 'right' },
    { wait: 32, side: 'right' },
    { wait: 22, side: 'left', fail: true }
  ];
  var demoIdx = 0, demoWait = 0, demoRedirect = null;
  var botRunsDone = 0, botDrift = null;

  function demoTypeForAction(cmd) {
    if (cmd.redirect) return bins[cmd.redirect[1]];
    if (cmd.fail) return bins[cmd.side] === 'trash' ? 'recycle' : 'trash';
    return bins[cmd.side];
  }
  function demoAdvance() {
    demoIdx++;
    demoWait = demoIdx < demoScript.length ? demoScript[demoIdx].wait : 0;
  }

  function autopilot() {
    if (!tile || state.phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var cmd = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (!cmd) return;
      if (tile.state === 'idle') {
        if (cmd.redirect) {
          flick(cmd.redirect[0]);
          demoRedirect = { wait: cmd.redirectWait, side: cmd.redirect[1] };
        } else {
          flick(cmd.side);
        }
        return;
      }
      if (demoRedirect && tile.state === 'flying' && tile.side === cmd.redirect[0]) {
        demoRedirect.wait--;
        if (demoRedirect.wait <= 0) {
          flick(demoRedirect.side);
          if (window.J) J.near();
          if (window.LOOP) LOOP.emit('near_miss', { n: score, recovered: true });
          demoRedirect = null;
        }
        return;
      }
    } else if (BOT) {
      if (tile.state !== 'idle') return;
      if (botDrift === null) botDrift = gauss() * BOT_ERR;
      var want = correctSide(tile.type);
      var wrong = otherSide(want);
      var pick = botDrift > BOT_ERR * 0.55 ? wrong : want;
      botDrift = null;
      flick(pick);
    }
  }

  // ---- render ----
  function hexToRgba(hex, a) {
    var v = parseInt(hex.slice(1), 16);
    return 'rgba(' + ((v >> 16) & 255) + ',' + ((v >> 8) & 255) + ',' + (v & 255) + ',' + a + ')';
  }
  function roundRect(x, y, w, h, r) {
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); return; }
    var rr = Math.min(r, w / 2, h / 2);
    cx.moveTo(x + rr, y);
    cx.arcTo(x + w, y, x + w, y + h, rr);
    cx.arcTo(x + w, y + h, x, y + h, rr);
    cx.arcTo(x, y + h, x, y, rr);
    cx.arcTo(x, y, x + w, y, rr);
  }

  function drawBin(side) {
    var x = side === 'left' ? BIN_LX : BIN_RX;
    var label = bins[side];
    var color = typeColor(label);
    var bx = x - BIN_W / 2, by = BIN_Y - BIN_H / 2;
    cx.fillStyle = hexToRgba(color, 0.16);
    cx.strokeStyle = color;
    cx.lineWidth = 2;
    cx.beginPath();
    roundRect(bx, by, BIN_W, BIN_H, 16);
    cx.fill(); cx.stroke();
    cx.fillStyle = '#fff';
    cx.textAlign = 'center';
    cx.font = '800 18px -apple-system, Helvetica, Arial';
    cx.fillText(label.toUpperCase(), x, BIN_Y + 7);
  }

  function drawSwapAnim() {
    if (bins.swapAnim <= 0) return;
    var p = bins.swapAnim / 20;
    var d = BIN_RX - BIN_LX;
    cx.globalAlpha = p;
    cx.fillStyle = '#fff';
    cx.font = '800 18px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(bins.prevLeft.toUpperCase(), BIN_LX + d * (1 - p), BIN_Y + 7);
    cx.fillText(bins.prevRight.toUpperCase(), BIN_RX - d * (1 - p), BIN_Y + 7);
    cx.globalAlpha = 1;
    bins.swapAnim -= 1;
  }

  function drawTile() {
    if (!tile) return;
    var s = TILE_S, x = tile.x, y = tile.y;
    var color = typeColor(tile.type);
    cx.save();
    cx.translate(x, y);
    if (tile.state === 'flying') cx.rotate(tile.r || 0);
    if (tile.state === 'idle') {
      var pulse = 1 + 0.03 * Math.sin(performance.now() / 200);
      cx.scale(pulse, pulse);
    }
    cx.fillStyle = hexToRgba(color, 0.92);
    cx.strokeStyle = color;
    cx.lineWidth = 2;
    cx.beginPath();
    roundRect(-s / 2, -s / 2, s, s, 14);
    cx.fill(); cx.stroke();
    cx.fillStyle = '#fff';
    cx.textAlign = 'center';
    cx.font = '900 28px -apple-system, Helvetica, Arial';
    cx.fillText(tile.type === 'trash' ? 'T' : 'R', 0, 10);
    cx.font = '700 10px -apple-system, Helvetica, Arial';
    cx.fillText(tile.type.toUpperCase(), 0, 24);
    cx.restore();
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop freezes sim, but always decays
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      if (now - lastSwap >= 5000) { lastSwap = now; swapLabels(); }
      if (tile) {
        if (tile.state === 'idle') {
          tile.y += 0.45 * dt;
          tile.idleT += dt;
          if (tile.idleT > tile.maxIdle) { gameOver(); }
        } else if (tile.state === 'flying') {
          tile.flightT += dt;
          var t = Math.min(1, tile.flightT / FLIGHT_DUR);
          var e = t * (2 - t);
          tile.x = tile.startX + (tile.targetX - tile.startX) * e;
          tile.y = tile.startY + (tile.targetY - tile.startY) * e;
          tile.r = (tile.side === 'left' ? -1 : 1) * 0.25 * e;
          if (t >= 1) landTile();
        }
      }
      autopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001 || zoom < 0.999) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // bins
    drawBin('left'); drawBin('right'); drawSwapAnim();

    // tile
    drawTile();

    // score / best / dare
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 146);
      }
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 42);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, fl.y - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('FLICK FLIP', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('FLICK TO SORT', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('the bins swap every 5 seconds.', W / 2, 360);
    }

    // challenge card (demo)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(CHALLENGE_SCORE), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG BIN.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' sorted', W / 2, 345);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('FLICK FLIP', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he sorted ' + (window.__demoScore || CHALLENGE_SCORE) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || CHALLENGE_SCORE), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
