<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 18;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var TRACK_Y = 420, PAD = 38, MARK_R = 16;
  var BASE_ZONE = 180, MIN_ZONE = 26, PERFECT_PX = 6;

  var state, runStartTs, overAt, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, flashes = [];
  var dareBeaten = false, botRunsDone = 0, challengeScore = 6;

  function loadBest() { try { best = +localStorage.getItem('kd_best') || 0; } catch (_) {} }
  loadBest();

  function resetState() {
    state = {
      phase: 'title',
      score: 0, combo: 0, round: 0,
      zoneW: BASE_ZONE, speed: 5.5, dir: 1, markerX: PAD + MARK_R,
      overAt: 0
    };
    flashes = [];
    dareBeaten = false;
    hitStop = 0; zoom = 1; shakeAmt = 0;
  }

  function spawnRound() {
    state.markerX = PAD + MARK_R;
    state.dir = 1;
  }

  function newGame() {
    resetState();
    if (DEMO) {
      state.phase = 'challenge';
      challengeScore = 6;
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0; state.combo = 0; state.round = 0;
    state.zoneW = BASE_ZONE; state.speed = 5.5;
    runStartTs = Date.now();
    spawnRound();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 11))));
  }

  function drop() {
    if (state.phase !== 'play') return;
    var center = W / 2;
    var d = state.markerX - center;
    var half = state.zoneW / 2;
    var absD = Math.abs(d);
    var perfect = absD <= PERFECT_PX;
    var success = absD <= half;
    var nearMargin = state.zoneW * 0.22;
    var near = success && absD > half - nearMargin;

    if (!success) {
      gameOver();
      return;
    }

    state.round++;
    state.score++;

    // juice + sound
    if (window.J) {
      if (perfect) J.perfect(state.combo + 1);
      else if (near) J.near();
      else J.hit(state.score);
      J.tension(Math.min(state.score / 20, 1));
    }
    if (perfect) { hitStop = 5; zoom = 1.03; }
    else if (near) { hitStop = 3; shakeAmt = 5; }
    else { hitStop = 2; }

    if (perfect) {
      state.combo++;
      flash('PERFECT', TEAL, 46);
      if (window.J && state.combo >= 3) J.gold();
    } else if (near) { flash('SO CLOSE!', VERM, 40); if (window.LOOP) LOOP.emit('near_miss', { n: state.score, ratio: +(absD / half).toFixed(3) }); }
    else { flash('SAFE', GOLD, 34); state.combo = 0; }

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }

    if (window.LOOP) LOOP.emit('round_cleared', { n: state.score, perfect: perfect, near: near, ratio: +(absD / half).toFixed(3) });

    // escalate
    state.zoneW = Math.max(MIN_ZONE, state.zoneW * 0.86);
    state.speed += 0.45;
    spawnRound();
  }

  function gameOver() {
    state.phase = 'over';
    overAt = performance.now();
    shakeAmt = 11;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) { J.tension(0); J.death(Math.min(0.35 + state.score / 30, 1)); if (newBest) setTimeout(function () { J.fanfare(); }, 450); }
    if (newBest) { best = state.score; try { localStorage.setItem('kd_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = state.score;
      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500); }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    state.score = 0; state.combo = 0; state.round = 0;
    state.zoneW = BASE_ZONE; state.speed = 5.5;
    spawnRound();
    runStartTs = Date.now();
    botTarget = null;
    if (window.LOOP) LOOP.emit('restart', {});
    state.phase = 'play';
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 520, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { drop(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'survived' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- autopilots ----
  // demo: human-feeling stop-the-marker run. ratios are relative to half-zone width.
  var demoScript = [0.25, -0.35, 0.15, 0.82, -0.2, -0.88, 0.05, 0.65, -0.55, 1.25];
  var demoWaits = [34, 28, 36, 42, 26, 55, 32, 40, 30, 24, 18];
  var demoIdx = 0, demoWait = 0;
  var botTarget = null, ctaAt = 0;

  function autopilot() {
    if (state.phase !== 'play') return;
    var half = state.zoneW / 2;
    var offset = state.markerX - W / 2;
    var v = state.speed * state.dir;
    if (DEMO) {
      if (demoWait > 0) { demoWait -= 1; return; }
      var wantRatio = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (wantRatio === undefined) return;
      var target = wantRatio * half;
      if (Math.abs(offset - target) <= Math.abs(v) * 0.65) {
        drop();
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
        demoIdx++;
      }
    } else if (BOT) {
      if (botTarget === null) botTarget = gauss() * BOT_ERR;
      if (Math.abs(offset - botTarget) <= Math.abs(v) * 0.65) { botTarget = null; drop(); }
    }
  }

  // ---- render helpers ----
  function roundRectPath(x, y, w, h, r) {
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); return; }
    var rr = Math.min(r, w / 2, h / 2);
    cx.moveTo(x + rr, y);
    cx.lineTo(x + w - rr, y); cx.quadraticCurveTo(x + w, y, x + w, y + rr);
    cx.lineTo(x + w, y + h - rr); cx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    cx.lineTo(x + rr, y + h); cx.quadraticCurveTo(x, y + h, x, y + h - rr);
    cx.lineTo(x, y + rr); cx.quadraticCurveTo(x, y, x + rr, y);
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // sim update (frozen during hit-stop)
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      state.markerX += state.speed * state.dir * dt;
      if (state.markerX > W - PAD - MARK_R) { state.markerX = W - PAD - MARK_R; state.dir = -1; }
      if (state.markerX < PAD + MARK_R) { state.markerX = PAD + MARK_R; state.dir = 1; }
      autopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.10)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // track line
    cx.strokeStyle = 'rgba(255,255,255,0.12)'; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(PAD, TRACK_Y); cx.lineTo(W - PAD, TRACK_Y); cx.stroke();

    // safe zone
    var zLeft = W / 2 - state.zoneW / 2;
    cx.fillStyle = 'rgba(46,197,182,0.16)';
    cx.beginPath(); roundRectPath(zLeft, TRACK_Y - 10, state.zoneW, 20, 10); cx.fill();
    cx.strokeStyle = 'rgba(46,197,182,0.55)'; cx.lineWidth = 2;
    cx.beginPath(); roundRectPath(zLeft, TRACK_Y - 10, state.zoneW, 20, 10); cx.stroke();

    // zone center tick
    cx.strokeStyle = 'rgba(255,255,255,0.25)'; cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(W / 2, TRACK_Y - 14); cx.lineTo(W / 2, TRACK_Y + 14); cx.stroke();

    // marker
    if (state.phase === 'play' || state.phase === 'over') {
      var mr = MARK_R + (state.combo ? Math.min(state.combo * 1.5, 10) : 0);
      var g = cx.createRadialGradient(state.markerX - 5, TRACK_Y - 5, 2, state.markerX, TRACK_Y, mr);
      g.addColorStop(0, '#fff'); g.addColorStop(0.25, VERM); g.addColorStop(1, '#9e2b16');
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(state.markerX, TRACK_Y, mr, 0, Math.PI * 2); cx.fill();
      cx.strokeStyle = 'rgba(255,255,255,0.5)'; cx.lineWidth = 2;
      cx.beginPath(); cx.arc(state.markerX, TRACK_Y, mr + 2, 0, Math.PI * 2); cx.stroke();
    }

    // combo ring
    if (state.combo > 0) {
      cx.strokeStyle = TEAL; cx.globalAlpha = 0.35;
      cx.lineWidth = 2 + state.combo;
      cx.beginPath(); cx.arc(W / 2, 96, 50 + state.combo * 2, 0, Math.PI * 2); cx.stroke();
      cx.globalAlpha = 1;
    }

    // score
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 72px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 122);
      cx.fillText(state.score === 1 ? 'ROUND SURVIVED' : 'ROUNDS SURVIVED', W / 2, 146);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 176);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(challengeScore), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's knockout threshold", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('KNOCKOUT DARE', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO DARE', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('stop the marker in the zone. one try.', W / 2, 360);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('KNOCKED OUT.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' survived', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 470);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath(); roundRectPath(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('KNOCKOUT DARE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they survived ' + (window.__demoScore || 9) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 9), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
