<meta charset="UTF-8">

<title>Soap Squeeze — Tilt</title>
<!--
  LOOP / attention-architecture — Soap Squeeze
  Engine: calm. Circuits: 05-ease, 01-rpe, 06-zeigarnik.
  Conditioned path: soap-cutting / glycerin-squish ASMR — the thumb already
  knows the press-and-crumble move from short-form feeds. The game IS that move.

  Modes:
    ?demo=1&seed=7        scripted ~16s calm arc → soft CTA → window.__demoDone
    ?bot=1&runs=N&seed=5  imperfect autopilot, N runs, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'soap-squeeze';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var SOAP_W = 300, SOAP_H = 120, SOAP_R = 16;
  var BAR_X = W / 2, BAR_Y = H / 2 - 10;
  var MAX_PRESSES = 10;

  var state, runStartTs, overAt, ctaAt;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [], chips = [];
  var botRunsDone = 0, botTimer = 0;
  var demoIdx = 0, demoWait = 0;
  var sessionDone = false;

  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function newGame() {
    state = {
      phase: DEMO || BOT ? 'play' : 'title',
      presses: 0,
      dents: [],
      cracks: [],
      crumbles: 0
    };
    flashes = []; chips = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    sessionDone = false;
    demoIdx = 0; demoWait = 35;
    botTimer = 20;

    if (DEMO || BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function addDent() {
    // thumb-shaped depression: offset clusters toward the middle as the bar fills
    var spread = 90 * (1 - Math.min(state.presses, MAX_PRESSES - 1) / (MAX_PRESSES - 1));
    var xOff = (rng() - 0.5) * spread * 2;
    var yOff = (rng() - 0.5) * 28;
    state.dents.push({
      x: xOff, y: yOff,
      rx: 38 + rng() * 14, ry: 22 + rng() * 10,
      depth: 0.55 + rng() * 0.25,
      cx: -0.5 - rng() * 0.2, cy: -0.2 + rng() * 0.2
    });
  }

  function press() {
    if (state.phase !== 'play' || sessionDone) return;
    state.presses++;
    addDent();

    // calm sound only
    if (window.J) J.calm(state.presses);

    // juice
    hitStop = 5;
    zoom = 1.02;
    shakeAmt = 2;

    var word = state.presses === MAX_PRESSES ? 'CRUMBLE' : (state.presses % 3 === 0 ? 'soft' : '+1');
    flash(word, state.presses === MAX_PRESSES ? GOLD : TEAL, 38);

    // generate surface cracks once the bar is half-pressed
    if (state.presses >= MAX_PRESSES / 2 && state.cracks.length === 0) {
      for (var ci = 0; ci < 10; ci++) {
        state.cracks.push({
          sx: (rng() - 0.5) * SOAP_W * 0.7,
          sy: (rng() - 0.5) * SOAP_H * 0.6,
          ex: (rng() - 0.5) * 22,
          ey: (rng() - 0.5) * 16
        });
      }
    }

    if (window.LOOP) LOOP.emit('press', { n: state.presses, total: MAX_PRESSES });

    if (state.presses >= MAX_PRESSES) {
      sessionDone = true;
      setTimeout(function () { crumble(); }, 220);
    }
  }

  function crumble() {
    if (state.phase === 'crumble' || state.phase === 'over') return;
    state.phase = 'crumble';
    shakeAmt = 7;
    zoom = 1.03;
    if (window.J) J.calm(MAX_PRESSES + 1);

    // spawn soap shavings from the bar volume
    var colors = ['#f5f3ed', '#e9e6dc', '#ded9cc', '#d4d0c4', '#c8c4b8'];
    for (var i = 0; i < 72; i++) {
      var px = BAR_X + (rng() - 0.5) * SOAP_W;
      var py = BAR_Y + (rng() - 0.5) * SOAP_H;
      chips.push({
        x: px, y: py,
        vx: (rng() - 0.5) * 7,
        vy: -3 - rng() * 6,
        vr: (rng() - 0.5) * 0.18,
        r: 0,
        w: 6 + rng() * 14,
        h: 3 + rng() * 8,
        color: colors[Math.floor(rng() * colors.length)],
        life: 1
      });
    }

    setTimeout(function () { gameOver(); }, 900);
  }

  function gameOver() {
    if (state.phase === 'over') return;
    state.phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (DEMO) window.__demoScore = state.presses;
    if (window.J) J.calm(state.presses);
    if (window.LOOP) LOOP.emit('game_over', { score: state.presses, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 700);
      }
    }
  }

  function resetRun() {
    state = { phase: 'play', presses: 0, dents: [], cracks: [], crumbles: 0 };
    flashes = []; chips = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    sessionDone = false;
    demoIdx = 0; demoWait = 35;
    botTimer = 20;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { press(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) { resetRun(); }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // Demo timing (frames at 60fps): 10 presses with humanizing hesitation
  var demoWaits = [55, 65, 60, 70, 58, 63, 57, 54, 52, 48];

  function autopilot(dt) {
    if (state.phase !== 'play' || sessionDone) return;
    if (DEMO) {
      if (demoWait > 0) { demoWait -= dt; return; }
      if (state.presses < MAX_PRESSES) {
        press();
        demoIdx++;
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 40;
      }
    } else if (BOT) {
      if (botTimer > 0) { botTimer -= dt; return; }
      press();
      botTimer = 18 + rng() * 32;
    }
  }

  // ---- render ----
  function soapGradient(y) {
    var g = cx.createLinearGradient(0, y - SOAP_H / 2, 0, y + SOAP_H / 2);
    g.addColorStop(0, '#faf8f2');
    g.addColorStop(0.5, '#f5f3ed');
    g.addColorStop(1, '#e9e6dc');
    return g;
  }

  function drawRoundedRect(x, y, w, h, r) {
    var x0 = x - w / 2, y0 = y - h / 2;
    var rr = Math.min(r, w / 2, h / 2);
    cx.beginPath();
    cx.moveTo(x0 + rr, y0);
    cx.lineTo(x0 + w - rr, y0);
    cx.quadraticCurveTo(x0 + w, y0, x0 + w, y0 + rr);
    cx.lineTo(x0 + w, y0 + h - rr);
    cx.quadraticCurveTo(x0 + w, y0 + h, x0 + w - rr, y0 + h);
    cx.lineTo(x0 + rr, y0 + h);
    cx.quadraticCurveTo(x0, y0 + h, x0, y0 + h - rr);
    cx.lineTo(x0, y0 + rr);
    cx.quadraticCurveTo(x0, y0, x0 + rr, y0);
    cx.closePath();
  }

  function drawSoap() {
    var deform = Math.min(state.presses / MAX_PRESSES, 1);
    var w = SOAP_W * (1 - deform * 0.04);
    var h = SOAP_H * (1 - deform * 0.06);

    // soft shadow
    cx.save();
    cx.shadowColor = 'rgba(46,197,182,0.16)';
    cx.shadowBlur = 24 + deform * 16;
    cx.shadowOffsetY = 10;
    cx.fillStyle = soapGradient(BAR_Y);
    drawRoundedRect(BAR_X, BAR_Y + 4, w, h, SOAP_R);
    cx.fill();
    cx.restore();

    // bar body
    cx.fillStyle = soapGradient(BAR_Y);
    drawRoundedRect(BAR_X, BAR_Y, w, h, SOAP_R);
    cx.fill();

    // top highlight sheen
    var sheen = cx.createLinearGradient(0, BAR_Y - h / 2, 0, BAR_Y);
    sheen.addColorStop(0, 'rgba(255,255,255,0.55)');
    sheen.addColorStop(1, 'rgba(255,255,255,0)');
    cx.fillStyle = sheen;
    drawRoundedRect(BAR_X, BAR_Y - h * 0.05, w * 0.92, h * 0.45, SOAP_R * 0.8);
    cx.fill();

    // dents
    for (var i = 0; i < state.dents.length; i++) {
      var d = state.dents[i];
      cx.save();
      cx.translate(BAR_X + d.x, BAR_Y + d.y);
      cx.scale(1, d.ry / d.rx);
      var shade = cx.createRadialGradient(0, 0, 0, 0, 0, d.rx);
      shade.addColorStop(0, 'rgba(90,85,75,' + (d.depth * 0.35) + ')');
      shade.addColorStop(0.6, 'rgba(140,133,120,' + (d.depth * 0.18) + ')');
      shade.addColorStop(1, 'rgba(250,248,242,0)');
      cx.fillStyle = shade;
      cx.beginPath(); cx.arc(0, 0, d.rx, 0, Math.PI * 2); cx.fill();
      cx.restore();

      // chalky crumb highlight at dent edge
      cx.save();
      cx.translate(BAR_X + d.x, BAR_Y + d.y - 4);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.beginPath();
      cx.ellipse(d.cx * d.rx, d.cy * d.ry, d.rx * 0.12, d.ry * 0.12, 0, 0, Math.PI * 2);
      cx.fill();
      cx.restore();
    }

    // tiny surface cracks after half the bar is pressed
    if (state.cracks.length > 0) {
      cx.strokeStyle = 'rgba(90,85,75,0.10)';
      cx.lineWidth = 1;
      var visibleCracks = Math.min(state.cracks.length, Math.max(0, state.presses - 3));
      for (var c = 0; c < visibleCracks; c++) {
        var ck = state.cracks[c];
        cx.beginPath();
        cx.moveTo(BAR_X + ck.sx, BAR_Y + ck.sy);
        cx.lineTo(BAR_X + ck.sx + ck.ex, BAR_Y + ck.sy + ck.ey);
        cx.stroke();
      }
    }
  }

  function drawPile() {
    // a soft mound of shavings at the bottom-center
    var moundH = 26 + Math.min(chips.length * 0.3, 40);
    cx.fillStyle = '#e9e6dc';
    cx.beginPath();
    cx.ellipse(BAR_X, BAR_Y + SOAP_H / 2 + 20, SOAP_W * 0.55, moundH, 0, Math.PI, 0);
    cx.fill();
    cx.fillStyle = '#ded9cc';
    cx.beginPath();
    cx.ellipse(BAR_X - 30, BAR_Y + SOAP_H / 2 + 24, 40, 12, 0, Math.PI, 0);
    cx.fill();
    cx.beginPath();
    cx.ellipse(BAR_X + 36, BAR_Y + SOAP_H / 2 + 26, 34, 10, 0, Math.PI, 0);
    cx.fill();
  }

  var last = performance.now();
  ctaAt = 0;

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop must decay every frame
    if (hitStop > 0) hitStop -= dt;
    else autopilot(dt);

    zoom += (1 - zoom) * 0.12 * dt;
    shakeAmt *= Math.pow(0.85, dt);

    // chip physics
    for (var i = chips.length - 1; i >= 0; i--) {
      var p = chips[i];
      p.vy += 0.45 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.r += p.vr * dt;
      if (p.y > BAR_Y + SOAP_H / 2 + 60) {
        p.vy *= -0.35;
        p.vx *= 0.75;
        p.y = BAR_Y + SOAP_H / 2 + 60;
      }
      p.life -= 0.006 * dt;
      if (p.life <= 0) chips.splice(i, 1);
    }

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shakeAmt;
      var sy = (rng() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createRadialGradient(BAR_X, BAR_Y, 0, BAR_X, BAR_Y, 360);
    bg.addColorStop(0, 'rgba(46,197,182,0.08)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // title
    if (state.phase === 'title') {
      drawSoap();
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SOAP SQUEEZE', W / 2, 160);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillText('TAP TO SQUISH', W / 2, 210); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('10 presses crumble the bar', W / 2, 240);
    }

    // play / crumble / over
    if (state.phase !== 'title' && state.phase !== 'cta') {
      if (state.phase !== 'crumble' && state.phase !== 'over') drawSoap();
      else drawPile();

      // draw remaining chips
      for (var k = 0; k < chips.length; k++) {
        var c = chips[k];
        cx.save();
        cx.translate(c.x, c.y); cx.rotate(c.r);
        cx.globalAlpha = Math.max(0, c.life);
        cx.fillStyle = c.color;
        cx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
        cx.restore();
      }
      cx.globalAlpha = 1;

      // score
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.presses, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('of ' + MAX_PRESSES + ' presses', W / 2, 122);
    }

    // flashes
    for (var f = flashes.length - 1; f >= 0; f--) {
      var fl = flashes[f]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, BAR_Y - 110 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(f, 1);
    }

    // over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('CRUMBLED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.presses + ' presses', W / 2, 345);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('satisfying', W / 2, 385);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — PRESS ANOTHER', W / 2, 462);
        cx.globalAlpha = 1;
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '300 13px Menlo, monospace';
      cx.fillText('SOAP SQUEEZE', W / 2, 280);
      cx.fillStyle = '#fff'; cx.font = '700 30px -apple-system, Helvetica, Arial';
      cx.fillText('press the waxy bar until it crumbles.', W / 2, 332);
      var p3 = 0.75 + 0.25 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 430);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
