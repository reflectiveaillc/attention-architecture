<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Clock Melt — Tilt</title>
<!--
  LOOP / attention-architecture — Clock Melt
  Engine: calm. Circuits: 07-timing, 05-ease, 06-zeigarnik.
  Conditioned path: the 2am bedside-clock-watching that makes time stretch.
  Modes:
    ?demo=1&seed=7        scripted calm arc ~14s → soft CTA ~3.5s → __demoDone
    ?bot=1&runs=N&seed=5  imperfect autoplay, N runs, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'clock-melt';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var SOFT_WHITE = 'rgba(220,230,240,0.92)';
  var CLOCK_CX = W / 2, CLOCK_CY = H / 2 - 30, CLOCK_R = 110;

  // Speed: natural = 1 revolution in 18 seconds (fast ticking anxiety clock)
  //         held   = 1 revolution in 90 seconds (10% of natural drift)
  // Game ends when minute hand completes ONE full revolution.
  // Score = holdAccum (seconds the hand was slowed).
  var NATURAL_RADS_PER_SEC = (2 * Math.PI) / 18;  // ~18s per rev unimpeded
  var HELD_RADS_PER_SEC    = (2 * Math.PI) / 90;  // ~90s per rev fully held

  var state, hitStop, zoom, shakeAmt, botRunsDone;
  var runStartTs, flashes, holding;

  function newState() {
    return {
      phase: 'title',      // title | play | over | cta
      handAngle: -Math.PI / 2,   // 12 o'clock
      angleAccum: 0,             // total radians traveled (ends at 2*PI)
      dimLevel: 0,               // 0..1, dims as you hold
      holdAccum: 0,              // seconds held — the score
      totalTime: 0,
      overAt: 0, ctaAt: 0
    };
  }

  function newGame() {
    state = newState();
    hitStop = 0; zoom = 1; shakeAmt = 0; flashes = []; holding = false;
    botRunsDone = 0;
    if (DEMO) { startRun(); return; }
    if (BOT)  { startRun(); return; }
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    if (window.J) J.calm(0);
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  function gameOver() {
    if (state.phase === 'over' || state.phase === 'cta') return;
    state.phase = 'over';
    state.overAt = performance.now();
    var score = Math.round(state.holdAccum);
    var dur_s = +((Date.now() - runStartTs) / 1000).toFixed(1);
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: dur_s });
    if (window.J) J.calm(4);
    flash('time lets go', TEAL, 18);

    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        state.phase = 'cta';
        state.ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2500);
      return;
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 600);
      }
    }
  }

  function resetRun() {
    state.handAngle = -Math.PI / 2;
    state.angleAccum = 0;
    state.dimLevel = 0;
    state.holdAccum = 0;
    state.totalTime = 0;
    state.overAt = 0; state.ctaAt = 0;
    state.phase = 'play';
    flashes = []; holding = false;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('restart', {});
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- Input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function onDown(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { holding = true; return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      state = newState();
      startRun();
    }
  }
  function onUp() {
    if (DEMO || BOT) return;
    holding = false;
  }

  cv.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    onDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  cv.addEventListener('pointerup', onUp);
  cv.addEventListener('pointercancel', onUp);
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowDown') { e.preventDefault(); onDown(); }
  });
  window.addEventListener('keyup', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowDown') onUp();
  });

  // ---- Demo / Bot autopilots ----
  // Demo arc: settle → deepen → resolve → soft drift → end
  // Total: ~14s of play, then game_over fires naturally (angleAccum hits 2*PI)
  // Strategy: hold most of the time to stretch the clock to ~14s
  //   but release periodically for human feel
  var demoHolding = false;
  var demoPhases = [
    // [fromS, toS, holdFraction]
    [0.0, 1.5, 0.0],   // settle — just watch it tick
    [1.5, 5.0, 0.9],   // first deep hold
    [5.0, 6.2, 0.0],   // brief release (hesitation)
    [6.2, 10.0, 0.95], // deepen
    [10.0, 12.5, 0.8], // resolve, slightly easing
    [12.5, 999, 0.0],  // let it go — natural speed carries to game_over
  ];

  // Bot: alternating hold/release; after 1 full passive period the hand
  // completes the revolution and gameOver fires.
  var botHolding = false;
  var botNextChange = 0;
  // Bot goes fully passive after ~10s so the hand runs at natural speed
  // and completes the revolution (18s natural, ~10s already used → 8s more = ~18s total)
  var BOT_GO_PASSIVE_AT = 10; // seconds into the run

  var demoPrevT = 0;

  function autopilot(dt) {
    if (state.phase !== 'play') return;
    if (DEMO) {
      var t = state.totalTime;
      var wantHold = false;
      for (var i = 0; i < demoPhases.length; i++) {
        var p = demoPhases[i];
        if (t >= p[0] && t < p[1]) {
          // modulate slightly to look human
          var phase = (t - p[0]) / Math.max(0.1, p[1] - p[0]);
          var osc = Math.sin(phase * Math.PI * 4 + rng() * 0.3);
          wantHold = p[2] > 0 && osc > (1 - p[2] * 2);
          break;
        }
      }
      demoHolding = wantHold;
      holding = demoHolding;
    } else if (BOT) {
      if (state.totalTime >= BOT_GO_PASSIVE_AT) {
        // passive: release completely, natural speed → gameOver in ~8s more
        botHolding = false;
        holding = false;
        return;
      }
      botNextChange -= dt;
      if (botNextChange <= 0) {
        botHolding = !botHolding;
        botNextChange = 0.7 + rng() * 1.8;
      }
      holding = botHolding;
    }
  }

  // ---- Draw clock ----
  function drawClockFace() {
    var dim = state.dimLevel;
    var faceAlpha = 0.12 + (1 - dim) * 0.58;

    // Ambient glow
    var g = cx.createRadialGradient(CLOCK_CX, CLOCK_CY, 0, CLOCK_CX, CLOCK_CY, CLOCK_R * 1.7);
    g.addColorStop(0, 'rgba(46,197,182,' + ((0.04 + (1 - dim) * 0.06)) + ')');
    g.addColorStop(1, 'rgba(46,197,182,0)');
    cx.fillStyle = g;
    cx.fillRect(0, 0, W, H);

    // Face
    cx.beginPath();
    cx.arc(CLOCK_CX, CLOCK_CY, CLOCK_R, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(16,20,32,' + (0.55 + dim * 0.40) + ')';
    cx.fill();
    cx.strokeStyle = 'rgba(46,197,182,' + faceAlpha + ')';
    cx.lineWidth = 2.5; cx.stroke();

    // Ticks
    for (var i = 0; i < 12; i++) {
      var a = (i / 12) * Math.PI * 2 - Math.PI / 2;
      var tL = (i % 3 === 0) ? 14 : 8;
      var tx1 = CLOCK_CX + Math.cos(a) * (CLOCK_R - 4);
      var ty1 = CLOCK_CY + Math.sin(a) * (CLOCK_R - 4);
      var tx2 = CLOCK_CX + Math.cos(a) * (CLOCK_R - 4 - tL);
      var ty2 = CLOCK_CY + Math.sin(a) * (CLOCK_R - 4 - tL);
      cx.beginPath(); cx.moveTo(tx1, ty1); cx.lineTo(tx2, ty2);
      cx.strokeStyle = 'rgba(46,197,182,' + (faceAlpha * 0.85) + ')';
      cx.lineWidth = (i % 3 === 0) ? 2 : 1; cx.stroke();
    }

    // Hour hand (static ~3 o'clock, bedside context)
    var hourA = Math.PI * 0.5;
    cx.beginPath();
    cx.moveTo(CLOCK_CX, CLOCK_CY);
    cx.lineTo(CLOCK_CX + Math.cos(hourA) * CLOCK_R * 0.55,
              CLOCK_CY + Math.sin(hourA) * CLOCK_R * 0.55);
    cx.strokeStyle = 'rgba(220,230,240,' + (faceAlpha * 0.75) + ')';
    cx.lineWidth = 4; cx.lineCap = 'round'; cx.stroke();

    // Minute hand — melts when held
    var meltFactor = dim;
    var handLen = CLOCK_R * 0.78;
    var tipX = CLOCK_CX + Math.cos(state.handAngle) * handLen;
    var tipY = CLOCK_CY + Math.sin(state.handAngle) * handLen + meltFactor * 20;
    var cpX = CLOCK_CX + Math.cos(state.handAngle) * handLen * 0.5;
    var cpY = CLOCK_CY + Math.sin(state.handAngle) * handLen * 0.5 + meltFactor * 9;
    cx.beginPath();
    cx.moveTo(CLOCK_CX, CLOCK_CY);
    cx.quadraticCurveTo(cpX, cpY, tipX, tipY);
    cx.strokeStyle = holding ? TEAL : 'rgba(220,230,240,0.88)';
    cx.lineWidth = 3.5; cx.lineCap = 'round'; cx.stroke();

    // Tip glow when held
    if (holding && dim < 0.92) {
      cx.beginPath();
      cx.arc(tipX, tipY, 6.5, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(46,197,182,0.28)'; cx.fill();
      cx.beginPath();
      cx.arc(tipX, tipY, 3, 0, Math.PI * 2);
      cx.fillStyle = TEAL; cx.fill();
    }

    // Center dot
    cx.beginPath();
    cx.arc(CLOCK_CX, CLOCK_CY, 5, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(220,230,240,' + Math.min(1, faceAlpha + 0.2) + ')'; cx.fill();

    // Darkness overlay
    if (dim > 0) {
      cx.fillStyle = 'rgba(11,13,18,' + (dim * 0.88) + ')';
      cx.fillRect(0, 0, W, H);
    }
  }

  // Progress arc (outer rim) showing how far hand has traveled
  function drawProgress() {
    var pct = state.angleAccum / (2 * Math.PI);
    if (pct < 0.01) return;
    var startA = -Math.PI / 2;
    var endA   = startA + pct * 2 * Math.PI;
    cx.beginPath();
    cx.arc(CLOCK_CX, CLOCK_CY, CLOCK_R + 6, startA, endA);
    cx.strokeStyle = 'rgba(46,197,182,' + (0.15 + (1 - state.dimLevel) * 0.25) + ')';
    cx.lineWidth = 3; cx.lineCap = 'round'; cx.stroke();
  }

  // ---- Frame loop ----
  var last = performance.now();
  function frame(now) {
    var dtMs = Math.min(now - last, 100);
    last = now;
    var dt = dtMs / 1000;

    cx.save();
    // juice: shake + zoom
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dtMs / 16.667);
    zoom += (1 - zoom) * 0.10 * dtMs / 16.667;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);

    if (state.phase === 'play') {
      // autopilot runs even if hitStop > 0 (it's just an input decision)
      autopilot(dt);

      // decay hit-stop; only advance hand if no hitStop
      if (hitStop > 0) {
        hitStop -= dt;
      } else {
        var speed = holding ? HELD_RADS_PER_SEC : NATURAL_RADS_PER_SEC;
        var dAngle = speed * dt;
        state.handAngle  += dAngle;
        state.angleAccum += dAngle;
        state.totalTime  += dt;
        if (holding) {
          state.holdAccum += dt;
          state.dimLevel = Math.min(0.90, state.dimLevel + dt * 0.055);
          // calm bell every ~1.5s of holding
          if (window.J && Math.floor(state.holdAccum * 0.67) > Math.floor((state.holdAccum - dt) * 0.67)) {
            J.calm(Math.min(5, Math.floor(state.holdAccum / 2)));
          }
        } else {
          state.dimLevel = Math.max(0, state.dimLevel - dt * 0.04);
        }

        // check for revolution complete → game over
        if (state.angleAccum >= 2 * Math.PI) {
          // tiny overshoot fix
          state.handAngle  -= (state.angleAccum - 2 * Math.PI);
          state.angleAccum  = 2 * Math.PI;
          gameOver();
        }
      }

      drawClockFace();
      drawProgress();

      // Hold ring
      if (holding && state.dimLevel < 0.88) {
        var rA = 0.18 + 0.12 * Math.sin(now / 380);
        cx.beginPath();
        cx.arc(CLOCK_CX, CLOCK_CY, CLOCK_R + 12, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(46,197,182,' + rA + ')';
        cx.lineWidth = 2.5; cx.stroke();
      }

      // Soft hold prompt (fades once used)
      if (state.totalTime < 6 && state.holdAccum < 0.5) {
        var pa = Math.max(0, (1 - state.totalTime / 5)) * (0.4 + 0.4 * Math.sin(now / 500));
        cx.globalAlpha = pa;
        cx.textAlign = 'center';
        cx.fillStyle = TEAL;
        cx.font = '500 14px -apple-system, Helvetica, Arial';
        cx.fillText('hold to slow', W / 2, CLOCK_CY + CLOCK_R + 44);
        cx.globalAlpha = 1;
      }

      // Time subtitle
      if (state.totalTime < 3) {
        var ta = Math.max(0, 1 - state.totalTime * 0.45);
        cx.globalAlpha = ta;
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(220,230,240,0.5)';
        cx.font = '300 13px -apple-system, Helvetica, Arial';
        cx.fillText('2:47 am', W / 2, CLOCK_CY - CLOCK_R - 32);
        cx.globalAlpha = 1;
      }

      // Score indicator
      cx.textAlign = 'right';
      cx.fillStyle = 'rgba(46,197,182,0.55)';
      cx.font = '500 13px Menlo, monospace';
      cx.fillText(state.holdAccum.toFixed(1) + 's', W - 18, H - 22);
    }

    if (state.phase === 'title') {
      // Show clock at start
      drawClockFace();
      cx.textAlign = 'center';
      cx.fillStyle = SOFT_WHITE;
      cx.font = '300 28px -apple-system, Helvetica, Arial';
      cx.fillText('clock melt', W / 2, CLOCK_CY - CLOCK_R - 50);
      cx.fillStyle = 'rgba(220,230,240,0.4)';
      cx.font = '300 14px -apple-system, Helvetica, Arial';
      cx.fillText('hold to slow the night', W / 2, CLOCK_CY - CLOCK_R - 24);
      var pulse = 0.45 + 0.45 * Math.sin(now / 600);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '400 14px -apple-system, Helvetica, Arial';
      cx.fillText('tap & hold', W / 2, CLOCK_CY + CLOCK_R + 44);
      cx.globalAlpha = 1;
    }

    if (state.phase === 'over') {
      drawClockFace();
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(220,230,240,0.5)';
      cx.font = '300 15px -apple-system, Helvetica, Arial';
      cx.fillText('you held the night for', W / 2, 254);
      cx.fillStyle = TEAL;
      cx.font = '100 80px -apple-system, Helvetica, Arial';
      cx.fillText(Math.round(state.holdAccum).toFixed(0), W / 2, 346);
      cx.fillStyle = 'rgba(46,197,182,0.55)';
      cx.font = '300 16px -apple-system, Helvetica, Arial';
      cx.fillText('seconds', W / 2, 374);
      cx.fillStyle = 'rgba(220,230,240,0.35)';
      cx.font = '300 12px -apple-system, Helvetica, Arial';
      cx.fillText('time let go', W / 2, 406);
      if (!DEMO && !BOT) {
        var p2 = 0.45 + 0.45 * Math.sin(now / 550);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '400 14px -apple-system, Helvetica, Arial';
        cx.fillText('tap to try again', W / 2, 462);
        cx.globalAlpha = 1;
      }
    }

    if (state.phase === 'cta') {
      var elapsed = (now - state.ctaAt) / 1000;
      var ease = Math.min(1, elapsed * 1.8);
      cx.fillStyle = 'rgba(11,13,18,0.92)'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = SOFT_WHITE;
      cx.font = '300 22px -apple-system, Helvetica, Arial';
      cx.fillText('clock melt', W / 2, 276);
      cx.fillStyle = 'rgba(220,230,240,0.45)';
      cx.font = '300 14px -apple-system, Helvetica, Arial';
      cx.fillText('hold longer than ' + (window.__demoScore || 7) + 's', W / 2, 308);
      var p3 = 0.55 + 0.45 * Math.sin(now / 380);
      cx.globalAlpha = ease * p3;
      cx.fillStyle = TEAL;
      cx.font = '500 20px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 376);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(46,197,182,0.4)';
      cx.font = '300 13px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 408);
      cx.globalAlpha = 1;
    }

    // Floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dtMs / 16.667;
      var fa = Math.max(0, 1 - fl.t / 55);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '300 ' + (fl.size + fl.t * 0.12) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, CLOCK_CY - CLOCK_R - 58 - fl.t * 0.3);
      cx.globalAlpha = 1;
      if (fl.t > 55) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
