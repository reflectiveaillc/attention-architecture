<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  var PARRY_WINDOW = 0.18;   // ±seconds around the perfect beat
  var PERFECT_WIN  = 0.07;   // inner window for PERFECT
  var BASE_TEMPO   = 1.8;    // seconds between beats at round 1
  var TEMPO_SCALE  = 0.93;   // tempo multiplier per parry success
  var PLAYER_HP    = 5;      // health points
  var ARENA_CX     = W / 2;
  var ARENA_CY     = H / 2 + 30;
  var ARENA_R      = 100;    // attack orbit radius

  // ---- state ----
  var state, flashes, hitStop, shakeAmt, zoom, dareBeaten;
  var runStartTs, best = 0;
  var ctaAt = 0;
  try { best = +localStorage.getItem('pp_best') || 0; } catch (_) {}

  // ---- helper ----
  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size || 36, t: 0 }); }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 9))));
  }

  // ---- new game ----
  function newGame() {
    state = {
      phase: 'title',   // title | challenge | play | over | cta
      hp: PLAYER_HP,
      parries: 0,
      combo: 0,
      round: 1,
      tempo: BASE_TEMPO,
      // attack state
      attackAngle: Math.PI / 2,  // angle of the incoming attack (from attacker → player)
      attackProgress: 0,         // 0=just spawned 1=at player
      attackSpeed: 1 / BASE_TEMPO,
      attackActive: false,
      parryResult: null,         // null | 'perfect' | 'good' | 'miss' | 'early'
      parryResultTimer: 0,
      lastParryAt: 0,
      overAt: 0,
      // ring pulse (visual)
      ringPulse: 0,
      // telegraph ring
      telegraphRadius: ARENA_R * 1.6,
      // flash ring on parry
      parryFlash: 0,
      parryFlashColor: TEAL,
    };
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1; dareBeaten = false;

    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
    // human: wait on title
  }

  var challengeAt = 0;

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    spawnAttack();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnAttack() {
    // pick a random angle for the attack to come from
    state.attackAngle = rng() * Math.PI * 2;
    state.attackProgress = 0;
    state.attackActive = true;
    state.parryResult = null;
    state.parryResultTimer = 0;
    // tension rises with round
    if (window.J) J.tension(Math.min((state.round - 1) / 12, 1));
  }

  // ---- parry logic ----
  function tryParry() {
    if (state.phase !== 'play' || !state.attackActive) return;
    var t = state.attackProgress;  // 0..1, 1 = at player
    // parry window: 1 - PARRY_WINDOW .. 1 + PARRY_WINDOW (in progress units)
    var winHalf = PARRY_WINDOW * state.attackSpeed;  // progress units
    var dist = Math.abs(t - 1.0);
    if (dist > winHalf) {
      // too early or too late — take damage
      state.hp = Math.max(0, state.hp - 1);
      shakeAmt = 6;
      state.parryResult = t < (1.0 - winHalf) ? 'early' : 'miss';
      state.parryResultTimer = 60;
      if (window.J) J.near();
      flash('TOO ' + (t < (1.0 - winHalf) ? 'EARLY' : 'LATE'), VERM, 34);
      if (window.LOOP) LOOP.emit('near_miss', { t: +t.toFixed(3), hp_left: state.hp });
      if (state.hp <= 0) { gameOver(); return; }
      // still let them continue — spawn next
      state.attackActive = false;
      setTimeout(function () { if (state.phase === 'play') spawnAttack(); }, 600);
    } else {
      // within window
      var perfect = dist <= (PERFECT_WIN * state.attackSpeed);
      state.parryResult = perfect ? 'perfect' : 'good';
      state.parryResultTimer = 50;
      state.parryFlash = 1;
      state.parryFlashColor = perfect ? GOLD : TEAL;
      state.parries++;
      state.combo++;
      if (perfect) {
        hitStop = 5; zoom = 1.03;
        if (window.J) J.perfect(state.combo);
        flash('PERFECT', GOLD, 44);
        if (window.LOOP) LOOP.emit('perfect_parry', { n: state.parries, combo: state.combo });
      } else {
        if (window.J) J.hit(state.combo);
        flash('PARRIED', TEAL, 36);
        if (window.LOOP) LOOP.emit('parry', { n: state.parries, combo: state.combo });
      }
      // dare check
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.parries > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(state.parries);
      }
      state.round++;
      state.tempo = Math.max(0.55, BASE_TEMPO * Math.pow(TEMPO_SCALE, state.round - 1));
      state.attackSpeed = 1 / state.tempo;
      state.attackActive = false;
      // next attack shortly
      var gap = Math.max(220, 500 - state.round * 18);
      setTimeout(function () { if (state.phase === 'play') spawnAttack(); }, gap);
    }
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.parries > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.parries / 30, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (newBest) {
      best = state.parries;
      try { localStorage.setItem('pp_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) LOOP.emit('game_over', { score: state.parries, dur_s: +(dur.toFixed(1)) });
    if (DEMO) {
      window.__demoScore = state.parries;
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2300);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 700);
      }
    }
  }

  function resetRun() {
    state.hp = PLAYER_HP;
    state.parries = 0;
    state.combo = 0;
    state.round = 1;
    state.tempo = BASE_TEMPO;
    state.attackSpeed = 1 / BASE_TEMPO;
    state.attackActive = false;
    state.parryResult = null;
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { tryParry(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.parries, unit: 'parries' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- DEMO / BOT autopilots ----
  // Demo script: a list of timing offsets from perfect (in progress units, positive = slightly late)
  // Negative = slightly early, 'miss' = miss entirely (hp-1), 'early' = press way too early
  var demoScript = [0.04, -0.03, 0.06, 0.02, 'near', -0.02, 0.05, 'miss'];
  var demoIdx = 0;
  // hesitation waits in frames before each action
  var demoWaits = [22, 28, 18, 35, 40, 24, 30, 20];
  var demoWait = 20;
  var demoFired = false;

  var botRunsDone = 0;
  // bot: randomly choose offset each attack; gradually worsen
  var botPendingParry = false;
  var botFireAt = -1;  // game-time second to fire

  function autopilot(now) {
    if (state.phase !== 'play') return;

    if (DEMO) {
      if (!state.attackActive) { demoFired = false; return; }
      if (demoFired) return;
      if (demoWait > 0) { demoWait--; return; }
      var want = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      demoIdx++;
      demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 26;

      if (want === 'miss') {
        // wait until attack is past window then press
        if (state.attackProgress < 1.0 + PARRY_WINDOW * state.attackSpeed + 0.05) return;
        demoFired = true;
        demoIdx--; // reuse the wait count
        tryParry();
      } else if (want === 'near') {
        // sliver - press near the very edge of the window
        var edge = 1.0 - PARRY_WINDOW * state.attackSpeed * 0.15;
        if (state.attackProgress < edge) return;
        demoFired = true;
        tryParry();
      } else {
        // fire when progress hits 1.0 + offset
        var target = 1.0 + want;
        if (state.attackProgress < target) return;
        demoFired = true;
        tryParry();
      }
    } else if (BOT) {
      if (!state.attackActive) { botPendingParry = false; return; }
      if (botPendingParry) return;
      // bot accuracy degrades after round 6 to eventually miss and die
      var accuracy = state.round <= 6 ? 0.92 : Math.max(0, 0.92 - (state.round - 6) * 0.13);
      // decide offset
      var err = (rng() - 0.5) * 0.08;
      var missRoll = rng();
      var fireOffset;
      if (missRoll > accuracy) {
        // deliberately miss — press way too early
        fireOffset = -(PARRY_WINDOW * state.attackSpeed) - 0.08;
      } else {
        fireOffset = err;
      }
      botPendingParry = true;
      var fireAt = 1.0 + fireOffset;
      // poll until progress reaches fireAt
      (function waitAndFire() {
        if (state.phase !== 'play' || !state.attackActive) { botPendingParry = false; return; }
        if (state.attackProgress >= fireAt) {
          botPendingParry = false;
          tryParry();
        } else {
          requestAnimationFrame(waitAndFire);
        }
      })();
    }
  }

  // ---- render helpers ----
  function drawHPDots(hp, maxHp, cx2) {
    var dotR = 6, gap = 18, total = maxHp * (dotR * 2 + gap) - gap;
    var sx = W / 2 - total / 2;
    for (var i = 0; i < maxHp; i++) {
      var x = sx + i * (dotR * 2 + gap) + dotR;
      cx2.beginPath();
      cx2.arc(x, H - 60, dotR, 0, Math.PI * 2);
      if (i < hp) {
        cx2.fillStyle = VERM;
        cx2.fill();
        // glow
        cx2.shadowColor = VERM;
        cx2.shadowBlur = 8;
        cx2.fill();
        cx2.shadowBlur = 0;
      } else {
        cx2.strokeStyle = 'rgba(255,255,255,0.2)';
        cx2.lineWidth = 1.5;
        cx2.stroke();
      }
    }
  }

  function drawAttackOrb(progress, angle) {
    // attacker stays at edge; orb travels toward center
    var startX = ARENA_CX + Math.cos(angle) * ARENA_R * 1.55;
    var startY = ARENA_CY + Math.sin(angle) * ARENA_R * 1.55;
    var endX = ARENA_CX;
    var endY = ARENA_CY;
    var x = startX + (endX - startX) * Math.min(progress, 1.4);
    var y = startY + (endY - startY) * Math.min(progress, 1.4);
    var t = Math.min(progress, 1.0);
    var size = 14 + t * 6;  // grows as it approaches

    // danger glow increases near impact
    var danger = Math.max(0, (t - 0.6) / 0.4);
    cx.shadowColor = VERM;
    cx.shadowBlur = 4 + danger * 20;
    cx.beginPath();
    cx.arc(x, y, size, 0, Math.PI * 2);
    // color: white → vermillion as it closes
    var r = Math.round(255 * (1 - danger) + 232 * danger);
    var g2 = Math.round(255 * (1 - danger) + 80 * danger);
    var b = Math.round(255 * (1 - danger) + 46 * danger);
    cx.fillStyle = 'rgb(' + r + ',' + g2 + ',' + b + ')';
    cx.fill();
    cx.shadowBlur = 0;

    // trail
    for (var tr = 1; tr <= 4; tr++) {
      var tp = progress - tr * 0.055;
      if (tp < 0) break;
      var tx2 = startX + (endX - startX) * Math.min(tp, 1.4);
      var ty2 = startY + (endY - startY) * Math.min(tp, 1.4);
      cx.globalAlpha = 0.12 * (5 - tr) / 5;
      cx.beginPath();
      cx.arc(tx2, ty2, size * 0.7, 0, Math.PI * 2);
      cx.fillStyle = VERM;
      cx.fill();
    }
    cx.globalAlpha = 1;
  }

  function drawPlayer(ringPulse, parryFlash, parryFlashColor) {
    // outer ring (telegraph) — fades as attack approaches
    var ringAlpha = 0.18;
    cx.beginPath();
    cx.arc(ARENA_CX, ARENA_CY, ARENA_R, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(255,255,255,' + ringAlpha + ')';
    cx.lineWidth = 1.5;
    cx.stroke();

    // parry flash ring
    if (parryFlash > 0) {
      cx.beginPath();
      cx.arc(ARENA_CX, ARENA_CY, ARENA_R * (1 + (1 - parryFlash) * 0.4), 0, Math.PI * 2);
      cx.strokeStyle = parryFlashColor;
      cx.lineWidth = 3 * parryFlash;
      cx.globalAlpha = parryFlash;
      cx.stroke();
      cx.globalAlpha = 1;
    }

    // player orb
    cx.shadowColor = TEAL;
    cx.shadowBlur = 12 + ringPulse * 16;
    cx.beginPath();
    cx.arc(ARENA_CX, ARENA_CY, 22, 0, Math.PI * 2);
    cx.fillStyle = TEAL;
    cx.fill();
    cx.shadowBlur = 0;

    // inner highlight
    cx.beginPath();
    cx.arc(ARENA_CX - 5, ARENA_CY - 5, 8, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.fill();
  }

  function drawParryWindow(progress) {
    // arc on the ring showing the parry window
    if (progress < 0.4 || !state.attackActive) return;
    // only show when attack is 40%+ through
    var visible = Math.min((progress - 0.4) / 0.3, 1);
    var winHalf = PARRY_WINDOW * state.attackSpeed;
    var winFrac = winHalf / 1.0;
    // the window is at progress=1.0 in angular terms: map to angle along ring
    // show as arc highlight on the ring
    cx.beginPath();
    cx.arc(ARENA_CX, ARENA_CY, ARENA_R, state.attackAngle + Math.PI - winFrac * 0.8, state.attackAngle + Math.PI + winFrac * 0.8);
    cx.strokeStyle = GOLD;
    cx.lineWidth = 3;
    cx.globalAlpha = visible * 0.7;
    cx.stroke();
    cx.globalAlpha = 1;
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // update hitStop / attack progress
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      if (state.phase === 'play' && state.attackActive) {
        state.attackProgress += state.attackSpeed * dt * (1 / 60);
        // if attack reaches player without parry → miss penalty
        if (state.attackProgress >= 1.0 + PARRY_WINDOW * state.attackSpeed + 0.12) {
          // attack landed, player didn't parry
          state.hp = Math.max(0, state.hp - 1);
          shakeAmt = 7;
          if (window.J) J.near();
          flash('TOOK HIT!', VERM, 34);
          state.attackActive = false;
          state.combo = 0;
          if (window.LOOP) LOOP.emit('near_miss', { progress: +(state.attackProgress.toFixed(3)), hp_left: state.hp });
          if (state.hp <= 0) {
            gameOver();
          } else {
            setTimeout(function () { if (state.phase === 'play') spawnAttack(); }, 550);
          }
        }
        autopilot(now);
      }
    }

    // juice decays
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;
    if (state.parryFlash > 0) state.parryFlash -= dt * 0.06;
    // ring pulse
    state.ringPulse = 0.5 + 0.5 * Math.sin(now / 320);

    // === DRAW ===
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createRadialGradient(ARENA_CX, ARENA_CY, 0, ARENA_CX, ARENA_CY, 320);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // TITLE SCREEN
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('PULSE PARRY', W / 2, 280);
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 310);
      cx.globalAlpha = pulse;
      cx.fillText('TAP TO PARRY', W / 2, 332);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('time it. survive.', W / 2, 362);
      drawPlayer(state.ringPulse, 0, TEAL);
      drawHPDots(PLAYER_HP, PLAYER_HP, cx);
    }

    // CHALLENGE CARD (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('24', W / 2, 402);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's best parrier", W / 2, 432);
    }

    // PLAY
    if (state.phase === 'play' || state.phase === 'over') {
      // draw attack orb
      if (state.attackActive && state.phase === 'play') {
        drawAttackOrb(state.attackProgress, state.attackAngle);
        drawParryWindow(state.attackProgress);
      }

      // player
      drawPlayer(state.ringPulse, state.parryFlash, state.parryFlashColor);

      // HP dots
      drawHPDots(state.hp, PLAYER_HP, cx);

      // combo ring glow
      if (state.combo >= 3) {
        cx.beginPath();
        cx.arc(ARENA_CX, ARENA_CY, ARENA_R + 8, 0, Math.PI * 2);
        cx.strokeStyle = GOLD;
        cx.lineWidth = 1.5 + state.combo * 0.4;
        cx.globalAlpha = 0.45 + Math.sin(now / 180) * 0.15;
        cx.stroke();
        cx.globalAlpha = 1;
      }

      // score + combo
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.parries, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);

      if (state.combo >= 2 && state.phase === 'play') {
        cx.fillStyle = GOLD;
        cx.font = '800 22px -apple-system, Helvetica, Arial';
        cx.globalAlpha = 0.85 + 0.15 * Math.sin(now / 150);
        cx.fillText('×' + state.combo + ' COMBO', W / 2, 148);
        cx.globalAlpha = 1;
      }

      // round / tempo indicator
      if (state.phase === 'play') {
        cx.fillStyle = 'rgba(255,255,255,0.22)';
        cx.font = '600 11px Menlo, monospace';
        cx.textAlign = 'right';
        cx.fillText('BPM ' + Math.round(60 / state.tempo), W - 16, H - 80);
        cx.textAlign = 'center';
      }

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 148);
      }
    }

    // FLASHES
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // GAME OVER card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('BROKEN.', W / 2, 300);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.parries + ' parries', W / 2, 346);
      var pt = pctTop(state.parries);
      cx.fillStyle = GOLD;
      cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 393);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('faster than ' + (100 - pt) + '% of players', W / 2, 417);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 285);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) {
          cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        } else {
          cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        }
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // CTA card (demo only)
    if (state.phase === 'cta') {
      var elapsed = (now - ctaAt) / 1000;
      var ease = Math.min(1, elapsed * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.80 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('PULSE PARRY', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.72)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they parried ' + (window.__demoScore || 24) + '. your turn.', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 245);
      cx.globalAlpha = ease * p3;
      cx.fillStyle = VERM;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 24), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 444);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
