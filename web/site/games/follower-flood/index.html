<script>
(function () {
  'use strict';

  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;

    cv.width = W * dpr; cv.height = H * dpr;

  function spawnNote() {

      kind: kind,
      pop: 0

  function rewardFor(note) {
    if (note.kind === 'viral') return 15 + state.combo * 2;
    var base = 1 + Math.floor(rng() * 3);          // 1..3 — variable reward (RPE)

  function acceptNote(note, fromTap) {

    var i = state.notes.indexOf(note);

    var near = note.y < NEAR_TOP;
    var r = rewardFor(note);
    state.followers += r;
    state.combo++;
    state.accepted++;
    acceptedThisRun++;
    note.pop = 1;
    poppers.push({ x: note.x, y: note.y, t: 0, r: r, kind: note.kind });

    if (window.J) {
      if (note.kind === 'viral') { J.gold(); J.perfect(state.combo); }

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.followers > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();

    if (window.LOOP) LOOP.emit('follow_accepted', { n: state.accepted, reward: r, near: near, viral: note.kind === 'viral' });
  }

  function missNote(note) {
    var i = state.notes.indexOf(note);
    if (i < 0) return;
    state.notes.splice(i, 1);
    var penalty = 9 + Math.floor(state.combo * 0.3);
    state.followers -= penalty;
    state.combo = 0;

  }

    var peak = state.followers;

    if (DEMO) window.__demoScore = peak;

    if (window.LOOP) LOOP.emit('game_over', { score: peak, dur_s: +dur.toFixed(1) });

      setTimeout(function () { window.__demoDone = true; }, 3600); }, 2800);
    if (BOT) {

      else setTimeout(function () { resetRun(); }, 900);
    }

    state.vy = 1.55; state.accepted = 0; state.missed = 0;
    state.followers = 5; state.combo = 0; state.milestone = 25;
    poppers = []; acceptedThisRun = 0; dareBeaten = false;
    botTargetY = null; botWillAccept = true; demoIdx = 0; demoWait = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };

      if (x === undefined) return;
      // accept the topmost (most urgent) note under the finger
      var hit = null;
      for (var i = 0; i < state.notes.length; i++) {
        var n = state.notes[i];

  // mirror-neuron arc: a stream of human-feeling accepts with hesitation, one

  // (varied demoWait) keeps it human, never robotic.

  // then save (near-miss), 'miss' = never accept (let it scroll off).
  var demoScript = ['a','a','a','a','a','a','a','a','a','a','a','a','a','sliver','a','a','a','a','miss','miss','miss','miss','miss'];
  var demoWaits  = [ 28, 36, 24, 42, 30, 38, 26, 44, 30, 34, 46, 28, 40, 70, 30, 38, 44, 32,  0,    0,    0,    0,    0];
  var demoIdx = 0, demoWait = 0;

    var t = null;

    if (state.phase !== 'play') return;

      var act = demoScript[demoIdx];
      if (act === 'miss') return;                       // let it scroll off; missNote advances demoIdx

      if (act === 'sliver') {
        if (t.y <= 104) { acceptNote(t, false); demoIdx++; }
        return;
      }
      // 'a' — accept once it has risen into a comfortable band
      if (t.y <= 380) {
        acceptNote(t, false);
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
        demoIdx++;
      }
    } else if (BOT) {
      // play a human-plausible number of accepts, then go passive so misses
      // drain followers to 0 and the game's own lose path fires
      if (botActions >= botGiveUp) return;
      if (botTargetY === null) {
        botWillAccept = rng() < 0.84;
        botTargetY = botWillAccept ? (210 + Math.abs(gauss()) * 170) : null;
      }
      if (botWillAccept && botTargetY !== null && t.y <= botTargetY) {
        acceptNote(t, false); botTargetY = null; botActions++;
      }
      // miss path: do nothing; missNote resets botTargetY
    }
  }

  // ---- render ----
  function roundRect(x, y, w, h, r) {
    if (cx.roundRect) { cx.beginPath(); cx.roundRect(x, y, w, h, r); return; }
    cx.beginPath(); cx.moveTo(x + r, y); cx.arcTo(x + w, y, x + w, y + h, r);
    cx.arcTo(x + w, y + h, x, y + h, r); cx.arcTo(x, y + h, x, y, r); cx.arcTo(x, y, x + w, y, r); cx.closePath();
  }

  function drawNote(n) {

    var alpha = n.y > H - 6 ? Math.max(0, (H + CARD_H - n.y) / CARD_H) : 1;

    cx.beginPath(); cx.arc(ax, ay, 19, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = 'rgba(255,255,255,0.85)'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.font = '800 17px -apple-system, Helvetica, Arial';
    cx.fillText(n.name.charAt(0).toUpperCase(), ax, ay + 1);

    cx.font = '500 12px -apple-system, Helvetica, Arial';
    cx.fillText(n.kind === 'viral' ? 'viral — started following you' : 'started following you', x + 58, y + 40);
    // follow pill (the conditioned-path affordance)

          missNote(n);

      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    cx.fillStyle = fade; cx.fillRect(0, 0, W, 150);

    for (var k = 0; k < state.notes.length; k++) drawNote(state.notes[k]);

    // accept poppers
    for (var p = poppers.length - 1; p >= 0; p--) {
      var pp = poppers[p]; pp.t += dt;
      var a = Math.max(0, 1 - pp.t / 34);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = pp.kind === 'viral' ? GOLD : TEAL;
      cx.font = '900 ' + (22 + pp.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText('+' + pp.r, pp.x, pp.y - pp.t * 1.1);
      cx.globalAlpha = 1;
      if (pp.t > 34) poppers.splice(p, 1);
    }

    // score (follower total)
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 60px -apple-system, Helvetica, Arial';
      cx.fillText(state.followers, W / 2, 60);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('FOLLOWERS', W / 2, 78);

      if (state.combo >= 3) {
        var cs = 16 + Math.min(state.combo, 30) * 0.5;
        cx.fillStyle = state.combo >= 10 ? TEAL : 'rgba(255,255,255,0.7)';
        cx.font = '900 ' + cs + 'px -apple-system, Helvetica, Arial';
        cx.fillText('×' + state.combo, W / 2, 108);
      }
      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 134);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('38', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // flashes
    for (var f = flashes.length - 1; f >= 0; f--) {
      var fl = flashes[f]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);

      if (fl.t > 40) flashes.splice(f, 1);

    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('FOLLOWER FLOOD', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO ACCEPT', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';

      // a single demo notification so the title reads as the game
      var dn = { x: W / 2, y: 470, name: 'maya.k', hue: 200, kind: 'normal' };
      drawNote(dn);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('CANCELLED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.followers + ' followers', W / 2, 345);
      var pt = pctTop(state.followers);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('FOLLOWER FLOOD', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they hit ' + (window.__demoScore || 38) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 38), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
