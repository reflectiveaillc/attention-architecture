<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Number Vault — Tilt</title>
<!--
  LOOP / attention-architecture — Number Vault
  Circuits: 01 RPE (digit span as social currency), 06 Zeigarnik (one more digit),
            03 Social (benchmark ego bait).
  Mechanic: flash a number string, type it back. Length grows each round.
  Score = longest string correctly recalled (honest working-memory digit span).
  Modes:
    ?demo=1&seed=7   scripted run: challenge card → human hesitation → near-fail → fail → CTA
    ?bot=1&runs=N&seed=M  imperfect autoplay, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
  /* number pad overlay */
  #pad { position:absolute; bottom:0; left:50%; transform:translateX(-50%);
         display:none; flex-direction:column; gap:6px;
         padding:10px; background:rgba(11,13,18,0.96); border-radius:16px 16px 0 0;
         width:100%; max-width:405px; box-sizing:border-box; }
  #pad.show { display:flex; }
  .padrow { display:flex; gap:6px; justify-content:center; }
  .pkey { flex:1; max-width:110px; height:60px; border-radius:10px; border:none; outline:none;
          background:rgba(255,255,255,0.10); color:#fff;
          font:700 24px -apple-system, Helvetica, Arial; cursor:pointer;
          transition:background .08s; }
  .pkey:active, .pkey.pressed { background:rgba(232,80,46,0.45); }
  #pbackspace { background:rgba(242,177,52,0.12); font-size:18px; color:#f2b134; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="pad">
    <div class="padrow">
      <button class="pkey" data-d="1">1</button>
      <button class="pkey" data-d="2">2</button>
      <button class="pkey" data-d="3">3</button>
    </div>
    <div class="padrow">
      <button class="pkey" data-d="4">4</button>
      <button class="pkey" data-d="5">5</button>
      <button class="pkey" data-d="6">6</button>
    </div>
    <div class="padrow">
      <button class="pkey" data-d="7">7</button>
      <button class="pkey" data-d="8">8</button>
      <button class="pkey" data-d="9">9</button>
    </div>
    <div class="padrow">
      <button class="pkey" id="pbackspace" data-d="back">⌫</button>
      <button class="pkey" data-d="0">0</button>
      <button class="pkey" id="psubmit" data-d="ok" style="background:rgba(46,197,182,0.18);color:#2ec5b6;">OK</button>
    </div>
  </div>
</div>
<script>window.LOOP_GAME = 'number-vault';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- state ----
  var phase = 'title'; // title | challenge | flash | input | feedback | over | cta
  var roundLen = 3;           // digits in current round
  var target   = '';          // the number string to recall
  var typed    = '';          // what the player has typed so far
  var score    = 0;           // best (longest) string recalled
  var scoreThisRun = 0;       // highest correct length in this run
  var round    = 0;           // rounds attempted
  var flashIdx = 0;           // which pair is currently flashing
  var flashTimer = 0;         // countdown in frames
  var FLASH_PAIR_DUR = 90;    // ~1.5s per 2-digit chunk @60fps
  var feedbackOk   = false;
  var feedbackTimer = 0;
  var runStartTs = 0;
  var overAt     = 0;
  var ctaAt      = 0;
  var challengeAt = 0;
  var dareBeaten  = false;
  var flashes     = [];
  var hitStop     = 0;
  var shakeAmt    = 0;
  var zoom        = 1;
  var best        = 0;
  try { best = +localStorage.getItem('nv_best') || 0; } catch (_) {}

  // pad element
  var pad = document.getElementById('pad');

  function showPad(v) {
    if (DEMO || BOT) return;
    pad.className = v ? 'show' : '';
  }

  // ---- number generation ----
  function genDigits(n) {
    var s = '';
    for (var i = 0; i < n; i++) s += Math.floor(rng() * 10);
    return s;
  }

  // ---- game flow ----
  function startGame() {
    roundLen = 3;
    target = ''; typed = '';
    score = 0; scoreThisRun = 0; round = 0;
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
    dareBeaten = false;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    beginRound();
  }

  function beginRound() {
    target   = genDigits(roundLen);
    typed    = '';
    flashIdx = 0;
    flashTimer = FLASH_PAIR_DUR;
    phase = 'flash';
    if (window.J) J.tension(Math.min((roundLen - 3) / 9, 1));
    showPad(false);
  }

  function advanceFlash(dt) {
    flashTimer -= dt;
    if (flashTimer > 0) return;
    // next pair
    var pairs = Math.ceil(target.length / 2);
    flashIdx++;
    if (flashIdx >= pairs) {
      // done flashing — go to input
      phase = 'input';
      typed = '';
      showPad(true);
    } else {
      flashTimer = FLASH_PAIR_DUR;
    }
  }

  function submitInput() {
    showPad(false);
    var correct = (typed === target);
    feedbackOk    = correct;
    feedbackTimer = 60; // ~1s
    phase = 'feedback';
    if (correct) {
      scoreThisRun = roundLen;
      if (roundLen > score) score = roundLen;
      round++;
      if (window.J) {
        if (roundLen >= 7) J.perfect(round);
        else J.hit(round);
      }
      if (roundLen >= 7) { hitStop = 5; zoom = 1.02; }
      flash(roundLen + ' DIGITS!', TEAL, 40);
      // check dare beaten
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', GOLD, 36);
        if (window.J) J.fanfare();
        SHARE.beaten(score);
      }
    } else {
      shakeAmt = 8;
      if (window.J) J.death(Math.min(0.2 + score / 12, 1));
      flash('WRONG!', VERM, 44);
    }
    if (window.LOOP) LOOP.emit('round_result', { len: roundLen, correct: correct, round: round });
  }

  function afterFeedback() {
    if (feedbackOk) {
      roundLen++;
      beginRound();
    } else {
      triggerGameOver();
    }
  }

  function triggerGameOver() {
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (window.J) {
      J.death(Math.min(0.3 + score / 12, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (newBest) {
      best = score;
      try { localStorage.setItem('nv_best', String(best)); } catch (_) {}
    }
    if (DEMO) window.__demoScore = score;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { restartBot(); }, 800);
    }
    showPad(false);
  }

  function restartBot() {
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
    if (window.LOOP) LOOP.emit('restart', {});
    startGame();
  }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 6))));
  }

  function flash(txt, col, sz) {
    flashes.push({ txt: txt, color: col, size: sz, t: 0 });
  }

  // ---- input wiring (human) ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // canvas taps (title / over screens)
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startGame(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'digits' }); return;
      }
      flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
      if (window.LOOP) LOOP.emit('restart', {});
      startGame();
    }
  }

  cv.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    var k = e.key;
    if (phase === 'title') { startGame(); return; }
    if (phase === 'input') {
      if (k >= '0' && k <= '9') { typed += k; pressAnim(k); }
      else if (k === 'Backspace') typed = typed.slice(0, -1);
      else if (k === 'Enter') { if (typed.length === target.length) submitInput(); }
    }
    if (phase === 'over' && k === ' ') { tap(); }
  });

  // pad buttons
  function pressAnim(d) { /* handled by CSS :active */ }

  pad.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var btn = e.target.closest('[data-d]');
    if (!btn) return;
    e.preventDefault();
    var d = btn.getAttribute('data-d');
    if (phase !== 'input') return;
    if (d === 'back') {
      typed = typed.slice(0, -1);
    } else if (d === 'ok') {
      if (typed.length === target.length) submitInput();
    } else {
      if (typed.length < target.length) typed += d;
    }
    btn.classList.add('pressed');
    setTimeout(function () { btn.classList.remove('pressed'); }, 100);
  });

  // ---- demo / bot autopilots ----
  // Demo: play rounds 3→4→5 (OK, OK, wrong at 6). Human-feel: varies hesitation.
  // Near-fail at round 2 (intentionally wait too long → recover), then fail at round 3.
  var demoActions = [
    // {roundLen, makeError: false|true, hesitate: frames}
    { len: 3, err: false, hesitate: 45 },   // recall correctly, quick
    { len: 4, err: false, hesitate: 65 },   // recall correctly, slight pause
    { len: 5, err: false, hesitate: 90 },   // near-fail moment — long hesitation, then saves it
    { len: 6, err: true,  hesitate: 40 },   // the fail — wrong answer
  ];
  var demoStep = 0;       // which demoAction we're on
  var demoHesitate = 0;   // frames left to hesitate before acting
  var demoReady = false;  // waiting for flash to finish then hesitate
  var botRunsDone = 0;
  var botCorrectRounds = 0;  // how many correct rounds bot gets before failing

  function resetBotAccuracy() {
    // bot makes it 2-4 correct rounds before a mistake
    botCorrectRounds = 2 + Math.floor(rng() * 3);
  }

  function botTypeAnswer(correct) {
    // type the correct or wrong answer character by character
    if (correct) {
      typed = target;
    } else {
      // mistype one digit
      var pos  = Math.floor(rng() * target.length);
      var wrong = String((parseInt(target[pos]) + 1 + Math.floor(rng() * 8)) % 10);
      typed = target.slice(0, pos) + wrong + target.slice(pos + 1);
    }
  }

  var botActed = false;  // did bot already act this input phase?

  function autopilot() {
    if (phase === 'flash') {
      // wait until flash is done (handled by advanceFlash)
      demoReady = false;
      botActed  = false;
    }

    if (DEMO) {
      if (phase === 'input' && !demoReady) {
        // start hesitating
        var act = demoActions[Math.min(demoStep, demoActions.length - 1)];
        demoHesitate = act.hesitate;
        demoReady = true;
      }
      if (phase === 'input' && demoReady) {
        if (demoHesitate > 0) { demoHesitate--; return; }
        // now type answer
        var act2 = demoActions[Math.min(demoStep, demoActions.length - 1)];
        // near-fail: at round 5 (demoStep==2), type hesitantly — nearly wrong but correct
        if (act2.err) {
          typed = target; // actually wrong — but we put a wrong digit
          var p2 = Math.floor(rng() * target.length);
          var w2 = String((parseInt(target[p2]) + 1) % 10);
          typed = target.slice(0, p2) + w2 + target.slice(p2 + 1);
        } else {
          typed = target;
        }
        demoStep++;
        demoReady = false;
        submitInput();
      }
    } else if (BOT) {
      if (phase === 'input' && !botActed) {
        botActed = true;
        var correct = (round < botCorrectRounds);
        botTypeAnswer(correct);
        submitInput();
        if (!correct) resetBotAccuracy();
      }
    }
  }

  // ---- rendering ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // advance flash phase
    if (phase === 'flash') advanceFlash(dt);

    // feedback countdown
    if (phase === 'feedback') {
      feedbackTimer -= dt;
      if (feedbackTimer <= 0) afterFeedback();
    }

    // bot/demo autopilot
    if ((DEMO || BOT) && (phase === 'input' || phase === 'flash')) {
      if (hitStop > 0) hitStop -= dt;
      else autopilot();
    } else {
      if (hitStop > 0) hitStop -= dt;
    }

    // juice transforms: decaying shake + zoom
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.83, dt);
    zoom += (1 - zoom) * 0.13 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---------- title ----------
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('NUMBER VAULT', W / 2, 280);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('remember the number. type it back.', W / 2, 322);
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillStyle = VERM;
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 376);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('how many digits can you hold?', W / 2, 408);
    }

    // ---------- challenge card (demo beat 1) ----------
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD; cx.font = '900 104px -apple-system, Helvetica, Arial';
      cx.fillText('5', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("digit span — can you beat it?", W / 2, 430);
    }

    // ---------- flash phase ----------
    if (phase === 'flash') {
      var pairs = Math.ceil(target.length / 2);
      var currentPair = flashIdx < pairs ? target.slice(flashIdx * 2, flashIdx * 2 + 2) : '';
      var progress = flashIdx / pairs;

      // round info
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px Menlo, monospace';
      cx.fillText('ROUND ' + (round + 1) + '  —  ' + roundLen + ' DIGITS', W / 2, 80);

      // progress dots
      var dotW = 10, dotGap = 6;
      var totalDotW = pairs * (dotW + dotGap) - dotGap;
      var dotX0 = W / 2 - totalDotW / 2;
      for (var d = 0; d < pairs; d++) {
        cx.beginPath();
        cx.arc(dotX0 + d * (dotW + dotGap) + dotW / 2, 108, dotW / 2, 0, Math.PI * 2);
        cx.fillStyle = d < flashIdx ? TEAL : (d === flashIdx ? GOLD : 'rgba(255,255,255,0.2)');
        cx.fill();
      }

      // flash countdown bar (under dots)
      var barW = 260, barH = 4;
      var barX = W / 2 - barW / 2;
      cx.fillStyle = 'rgba(255,255,255,0.1)';
      cx.fillRect(barX, 124, barW, barH);
      var elapsed = FLASH_PAIR_DUR - flashTimer;
      cx.fillStyle = GOLD;
      cx.fillRect(barX, 124, barW * Math.min(elapsed / FLASH_PAIR_DUR, 1), barH);

      // big digit display
      if (currentPair) {
        var flAlpha = 1;
        // fade out last 20 frames
        if (flashTimer < 20) flAlpha = flashTimer / 20;
        cx.globalAlpha = flAlpha;
        cx.textAlign = 'center';

        // glow effect
        cx.shadowColor = TEAL;
        cx.shadowBlur = 24;
        cx.fillStyle = '#fff';
        cx.font = '900 128px Menlo, monospace';
        cx.fillText(currentPair, W / 2, 360);
        cx.shadowBlur = 0;
        cx.globalAlpha = 1;
      }

      // tension: rising streak indicator
      if (roundLen >= 5) {
        var tX = W / 2, tY = 430;
        cx.textAlign = 'center';
        cx.fillStyle = roundLen >= 8 ? VERM : (roundLen >= 6 ? GOLD : TEAL);
        cx.font = '700 13px -apple-system, Helvetica, Arial';
        cx.fillText(roundLen + '-digit recall', tX, tY);
      }
    }

    // ---------- input phase ----------
    if (phase === 'input') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px Menlo, monospace';
      cx.fillText('TYPE IT BACK', W / 2, 80);

      // digit slots
      var slots = target.length;
      var slotW = Math.min(52, (W - 60) / slots);
      var slotH = 66;
      var slotGap = 6;
      var slotTotalW = slots * (slotW + slotGap) - slotGap;
      var slotX0 = W / 2 - slotTotalW / 2;
      var slotY = 200;

      for (var s = 0; s < slots; s++) {
        var sx = slotX0 + s * (slotW + slotGap);
        var filled = s < typed.length;
        var isActive = s === typed.length;

        // slot bg
        cx.fillStyle = filled ? 'rgba(46,197,182,0.15)' : 'rgba(255,255,255,0.06)';
        cx.strokeStyle = filled ? TEAL : (isActive ? VERM : 'rgba(255,255,255,0.18)');
        cx.lineWidth = isActive ? 2 : 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(sx, slotY, slotW, slotH, 8);
        else cx.rect(sx, slotY, slotW, slotH);
        cx.fill(); cx.stroke();

        if (filled) {
          cx.fillStyle = '#fff';
          cx.font = '900 ' + (slotW > 44 ? 34 : 28) + 'px Menlo, monospace';
          cx.textAlign = 'center';
          cx.fillText(typed[s], sx + slotW / 2, slotY + slotH * 0.66);
        } else if (isActive) {
          // cursor blink
          var blink = Math.sin(now / 200) > 0;
          if (blink) {
            cx.fillStyle = VERM;
            cx.fillRect(sx + slotW / 2 - 1.5, slotY + slotH * 0.6, 3, slotH * 0.22);
          }
        }
      }

      // submit hint
      if (typed.length === target.length) {
        var p3 = 0.6 + 0.4 * Math.sin(now / 260);
        cx.globalAlpha = p3; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText('tap OK or press Enter', W / 2, 318);
        cx.globalAlpha = 1;
      }

      // dare banner during input
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + ' digits', W / 2, 148);
      }
    }

    // ---------- feedback phase ----------
    if (phase === 'feedback') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px Menlo, monospace';
      cx.fillText('YOU TYPED', W / 2, 140);

      // show typed vs target
      var fslots = target.length;
      var fslotW = Math.min(52, (W - 60) / fslots);
      var fslotH = 66;
      var fslotGap = 6;
      var fslotTotalW = fslots * (fslotW + fslotGap) - fslotGap;
      var fslotX0 = W / 2 - fslotTotalW / 2;
      var fslotY = 170;

      for (var fs = 0; fs < fslots; fs++) {
        var fsx = fslotX0 + fs * (fslotW + fslotGap);
        var charMatch = (typed[fs] === target[fs]);
        cx.fillStyle = charMatch ? 'rgba(46,197,182,0.18)' : 'rgba(232,80,46,0.2)';
        cx.strokeStyle = charMatch ? TEAL : VERM;
        cx.lineWidth = 2;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(fsx, fslotY, fslotW, fslotH, 8);
        else cx.rect(fsx, fslotY, fslotW, fslotH);
        cx.fill(); cx.stroke();
        cx.fillStyle = '#fff';
        cx.font = '900 ' + (fslotW > 44 ? 34 : 28) + 'px Menlo, monospace';
        cx.textAlign = 'center';
        cx.fillText(typed[fs] !== undefined ? typed[fs] : '_', fsx + fslotW / 2, fslotY + fslotH * 0.66);
      }

      if (!feedbackOk) {
        // show correct answer
        cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 12px Menlo, monospace';
        cx.textAlign = 'center';
        cx.fillText('was: ' + target, W / 2, fslotY + fslotH + 20);
      }
    }

    // ---------- score display (flash/input/feedback/over) ----------
    if (phase !== 'title' && phase !== 'challenge' && phase !== 'cta') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 520);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST SPAN: ' + (best > score ? best : score) + ' digits', W / 2, 542);
    }

    // ---------- over screen ----------
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('VAULT LOCKED.', W / 2, 280);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + '-digit span', W / 2, 325);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 368);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 392);
      if (!DEMO && !BOT) {
        var p4 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p4; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 440);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---------- demo CTA ----------
    if (phase === 'cta') {
      var ct = (now - ctaAt) / 1000, ease = Math.min(1, ct * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('NUMBER VAULT', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('he recalled ' + (window.__demoScore || 5) + ' digits. your move.', W / 2, 334);
      var p5 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p5;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 5), W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 434);
      cx.globalAlpha = 1;
    }

    // ---------- floating reward texts ----------
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 480 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ---------- mute toggle (human only) ----------
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- bootstrap ----
  function init() {
    if (DEMO) {
      // beat 1: challenge card
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(function () {
        startGame();
      }, 1250);
    } else if (BOT) {
      resetBotAccuracy();
      startGame();
    }
    // else: show title screen and wait for tap
    requestAnimationFrame(frame);
  }

  init();
})();
</script>
</body>
</html>
