<title>Dimmer Switch — Tilt</title>
<!--
  LOOP / attention-architecture — Dimmer Switch (calm engine)
  Conditioned path: the 2am doomscroll hold. The thumb already knows this move
  from Instagram/TikTok — the game IS that move, finished.
  Circuits: 05-ease, 07-timing, 06-zeigarnik.
  Modes (query params):
    ?demo=1&seed=7        scripted calm arc (settle -> deepen -> resolve -> CTA),
                          sets window.__demoDone when finished
    ?bot=1&runs=3&seed=7  imperfect autopilot, N runs, sets window.__botDone
    ?clip=ID&src=tiktok   attribution (see js/loop-events.js)

               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<body>

<script>window.LOOP_GAME = 'dimmer-switch';</script>
<script src="../../js/loop-events.js"></script>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // CALM palette — teal + soft gold, no vermillion
  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12', BONE = '#e8eef2';

  // physics (tuned in seconds; dts = seconds, dtf = 60fps frame-units)
  var HOLD_RATE    = 0.085;   // brightness lost per second while holding  (~12s exhale to black)
  var RESTORE_RATE = 0.15;   // brightness creeps back per second while released (gentle)
  var SCORE_RATE   = 90;      // darkness gathered per second at full dim
  var BLACK_BONUS  = 500;
  var BLACK_EPS    = 0.004;   // B at/below => the screen is fully dark => the end
  var FAIL_EPS     = 0.992;   // committed + B recovers above => the light came back

  var AFFIRM = ['', 'exhale', 'deeper', 'slower', 'let it go', 'drift', 'heavier',
                'surrender', 'almost', 'going dark', 'black'];

  var state, B, holding, holdX, holdY, score, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, lastStep = 0, minB = 1, creepFlag = false;
  var flashes = [], ripples = [], ctaAt = 0;
  try { best = +localStorage.getItem('ds_best') || 0; } catch (_) {}

  function newGame() {
    state = { phase: 'title', overAt: 0 };   // title | play | over | cta
    B = 1; holding = false; holdX = W / 2; holdY = H * 0.62;
    score = 0; lastStep = 0; minB = 1; creepFlag = false;
    flashes = []; ripples = [];
    if (DEMO) { startRun(); return; }        // calm demo: straight into the exhale
    if (BOT) { botRunsDone = 0; startRun(); }
  }

  function startRun() {
    state.phase = 'play';
    B = 1; score = 0; lastStep = 0; minB = 1; creepFlag = false;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function pctTop(s) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 900)))); }

  // the end frame: full black
  function reachBlack() {
    B = 0;
    score += BLACK_BONUS;
    hitStop = 2; zoom = 1.015; shakeAmt = 1.5;   // gentle zoom-pulse — the most beautiful frame
    flash('BLACK', TEAL, 40);
    if (window.J) J.calm(10);
    if (window.LOOP) LOOP.emit('black_reached', { score: Math.floor(score) });
    gameOver(true);
  }

  // the light came back — the feed didn't end
  function lightReturned() {
    if (window.LOOP) LOOP.emit('light_returned', { score: Math.floor(score) });
    gameOver(false);
  }

  function gameOver(reachedBlack) {
    state.phase = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var s = Math.floor(score);
    var newBest = s > best;
    if (window.J && !reachedBlack) J.calm(0);   // soft, never a death boom (calm engine)
    if (newBest) { best = s; try { localStorage.setItem('ds_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: s, dur_s: +dur.toFixed(1), reached_black: reachedBlack });
    if (DEMO) {
      window.__demoScore = s;
      // let the black frame sit (the resolve beat) before the soft CTA
      setTimeout(function () {
        state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1300);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input (human) ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 506, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function pressDown(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human input
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); holding = true; holdX = x; holdY = y; return; }
    if (state.phase === 'play') { holding = true; holdX = x; holdY = y; return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: Math.floor(score), unit: 'dim' }); return;
      }
      resetRun();
    }
  }
  function pressUp() { holding = false; }
  function toCanvas(e) {
    var r = cv.getBoundingClientRect();
    return { x: (e.clientX - r.left) / scale, y: (e.clientY - r.top) / scale };
  }
  window.addEventListener('pointerdown', function (e) { var p = toCanvas(e); pressDown(p.x, p.y); });
  window.addEventListener('pointerup', pressUp);
  window.addEventListener('pointercancel', pressUp);
  window.addEventListener('pointermove', function (e) { if (holding) { var p = toCanvas(e); holdX = p.x; holdY = p.y; } });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space' && !e.repeat) { if (state.phase === 'title') { startRun(); holding = true; holdX = W / 2; holdY = H * 0.62; } else if (state.phase === 'play') holding = true; else if (state.phase === 'over' && performance.now() - state.overAt > 350) resetRun(); } });
  window.addEventListener('keyup', function (e) { if (e.code === 'Space') holding = false; });

  // ---- demo / bot autopilots ----
  var botRunsDone = 0, botRelease = 0;
  // calm demo arc: settle (hold) -> creep-back (near-fail, light almost returns) ->
  // re-commit -> deepen -> resolve to black. Hesitation lives in the timing.
  function demoIntent(t) {
    if (t < 1.3) return true;     // settle
    if (t < 1.7) return false;    // creep back
    if (t < 2.0) return true;     // re-commit
    if (t < 2.2) return false;    // wobble
    return true;                  // deepen -> resolve
  }
  function autopilot() {
    if (state.phase !== 'play') return;
    if (DEMO) {
      var t = (Date.now() - runStartTs) / 1000;
      var intent = demoIntent(t);
      holding = intent;
      if (intent) { holdX = W / 2 + Math.sin(t * 1.7) * 9; holdY = H * 0.62 + Math.cos(t * 1.3) * 7; }
    } else if (BOT) {
      if (botRelease > 0) { botRelease -= 1; holding = false; }
      else if (rng() < 0.010) { botRelease = 10 + Math.floor(rng() * 8); holding = false; }  // ~0.16-0.30s imperfect release
      else { holding = true; holdX = W / 2 + gauss() * 7; holdY = H * 0.62 + gauss() * 7; }
    }
  }

  // ---- sim ----
  function stepSim(dts, dtf) {
    if (state.phase !== 'play') return;
    autopilot();
    if (hitStop > 0) { hitStop -= dtf; return; }   // big moment freezes the sim a breath

    var committed = B < 0.95;
    if (holding) {
      B -= HOLD_RATE * dts;
      score += (1 - B) * SCORE_RATE * dts;          // darkness gathered (the meaningful number)
      if (B < minB) minB = B;
      if (creepFlag && B < 0.85) {                   // caught the creep-back -> saved
        creepFlag = false;
        if (window.LOOP) LOOP.emit('near_miss', { depth: +(1 - B).toFixed(3) });
      }
      if (holdX !== undefined) ripples.push({ x: holdX, y: holdY, t: 0 });
    } else if (committed) {
      B += RESTORE_RATE * dts;
      if (B > 0.9 && minB < 0.85 && !creepFlag) creepFlag = true;   // light creeping back (near-fail seed)
      if (B >= FAIL_EPS) { lightReturned(); return; }
    } else {
      B += RESTORE_RATE * dts;                      // pre-commit: just a tap, gentle return
    }
    if (B < 0) B = 0;
    if (B > 1) B = 1;

    // depth milestones -> soft bell ladder + affirmations
    var step = Math.min(10, Math.floor((1 - B) * 10));
    if (step > lastStep) {
      for (var s = lastStep + 1; s <= step; s++) {
        if (window.J) J.calm(s);
        if (AFFIRM[s]) flash(AFFIRM[s].toUpperCase(), s >= 8 ? GOLD : TEAL, 22 + s);
        if (window.LOOP) LOOP.emit('dimmer_milestone', { depth: s / 10, score: Math.floor(score) });
      }
      lastStep = step;
    }

    if (B <= BLACK_EPS) reachBlack();
  }

  // ---- render ----
  function rr(x, y, w, h, r) { if (cx.roundRect) cx.roundRect(x, y, w, h, r); else cx.rect(x, y, w, h); }

  var FEED = [
    { y: 150, h: 150 }, { y: 330, h: 190 }, { y: 560, h: 130 }
  ];

  function drawFeed(now) {
    // the late-night social feed, faint and teal — the object being put down
    cx.fillStyle = 'rgba(46,197,182,0.025)'; cx.fillRect(0, 0, W, H);
    FEED.forEach(function (p, i) {
      var a = 0.05 + 0.02 * (i % 2);
      cx.fillStyle = 'rgba(46,197,182,' + a + ')';
      cx.beginPath(); rr(24, p.y, W - 48, p.h, 14); cx.fill();
      // avatar + lines
      cx.fillStyle = 'rgba(232,238,242,0.06)';
      cx.beginPath(); cx.arc(48, p.y + 26, 11, 0, 7); cx.fill();
      cx.fillRect(70, p.y + 20, 90, 6);
      cx.fillRect(70, p.y + 32, 50, 5);
      cx.fillRect(40, p.y + 60, W - 80, p.h - 80);
      cx.fillStyle = 'rgba(242,177,52,0.06)';   // a faint gold heart — calm palette, no vermillion
      cx.beginPath(); cx.arc(W - 52, p.y + p.h - 22, 7, 0, 7); cx.fill();
    });
    // the 2am clock + status — the doomscroll scene
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(232,238,242,0.5)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('2:47', 16, 34);
    cx.fillStyle = 'rgba(232,238,242,0.35)'; cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.fillText('AM', 60, 34);
    cx.textAlign = 'right';
    cx.fillStyle = 'rgba(232,238,242,0.3)';
    cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.fillText('||||  43%', W - 56, 34);
  }

  function drawBreath(now) {
    if (B <= 0.001) return;                       // black is black — nothing visible
    var r = 70 + (1 - B) * 150 + Math.sin(now / 650) * 4;
    var g = cx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, r);
    g.addColorStop(0, 'rgba(46,197,182,' + (0.34 * B) + ')');
    g.addColorStop(0.7, 'rgba(46,197,182,' + (0.10 * B) + ')');
    g.addColorStop(1, 'rgba(46,197,182,0)');
    cx.fillStyle = g; cx.fillRect(0, 0, W, H);
    cx.strokeStyle = 'rgba(46,197,182,' + (0.45 * B) + ')';
    cx.lineWidth = 2;
    cx.beginPath(); cx.arc(W / 2, H / 2, r * 0.5, 0, 7); cx.stroke();
    cx.fillStyle = 'rgba(232,238,242,' + (0.5 * B) + ')';
    cx.beginPath(); cx.arc(W / 2, H / 2, 3, 0, 7); cx.fill();
  }

  function drawRipples(dtf) {
    for (var i = ripples.length - 1; i >= 0; i--) {
      var rp = ripples[i]; rp.t += dtf;
      var a = Math.max(0, (1 - rp.t / 26)) * B;
      if (a <= 0.01) { if (rp.t > 26) ripples.splice(i, 1); continue; }
      cx.strokeStyle = 'rgba(46,197,182,' + a + ')';
      cx.lineWidth = 2;
      cx.beginPath(); cx.arc(rp.x, rp.y, 8 + rp.t * 2.2, 0, 7); cx.stroke();
      if (rp.t > 26) ripples.splice(i, 1);
    }
  }

  var last = performance.now();
  function frame(now) {
    var dtf = Math.min((now - last) / 16.667, 3); last = now;
    var dts = dtf / 60;

    stepSim(dts, dtf);

    // juice transforms: gentle shake + zoom-pulse (calm, so mild)
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dtf); zoom += (1 - zoom) * 0.12 * dtf;

    // base + feed (the lit screen)
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    drawFeed(now);

    // the dimmer overlay — this IS the screen dimming toward black
    if (state.phase === 'play' || state.phase === 'over' || state.phase === 'cta') {
      cx.fillStyle = 'rgba(11,13,18,' + (1 - B) + ')';
      cx.fillRect(0, 0, W, H);
    }

    // breath guide + ripples (fade with the screen, gone at black)
    if (state.phase === 'play' || state.phase === 'title') {
      drawBreath(now);
      if (state.phase === 'play') drawRipples(dtf);
    }

    // depth meter (right edge)
    if (state.phase === 'play' && B > 0.001) {
      var my = 130, mh = 440, depth = 1 - B;
      cx.fillStyle = 'rgba(255,255,255,' + (0.06 * B) + ')';
      cx.fillRect(W - 22, my, 4, mh);
      cx.fillStyle = 'rgba(46,197,182,' + (0.7 * B) + ')';
      cx.fillRect(W - 22, my + mh * (1 - depth), 4, mh * depth);
    }

    // score (gathers as you dim)
    if (state.phase === 'play' && B > 0.001) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5 * B + 0.25;
      cx.fillStyle = BONE; cx.font = '800 30px -apple-system, Helvetica, Arial';
      cx.fillText(Math.floor(score), W / 2, 92);
      cx.globalAlpha = 0.4 * B + 0.15;
      cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 112);
      cx.globalAlpha = 1;
    }

    // affirmation flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dtf;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.35) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 80 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = BONE; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('DIMMER SWITCH', W / 2, 250);
      cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('PRESS & HOLD', W / 2, 300); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(232,238,242,0.4)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('hold the dimmer through one exhale.', W / 2, 326);
      cx.fillStyle = 'rgba(232,238,242,0.3)'; cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('let the screen go dark.', W / 2, 346);
    }

    // game over (human only — demo holds pure black, bot skips)
    if (state.phase === 'over' && !DEMO && !BOT) {
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var reached = B <= 0.001;
      cx.fillStyle = reached ? TEAL : 'rgba(232,238,242,0.85)';
      cx.font = '900 34px -apple-system, Helvetica, Arial';
      cx.fillText(reached ? 'THE FEED ENDED.' : 'THE LIGHT CAME BACK.', W / 2, 290);
      cx.fillStyle = BONE; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(Math.floor(score) + ' dim', W / 2, 336);
      cx.fillStyle = 'rgba(232,238,242,0.5)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText(((Date.now() - runStartTs) / 1000).toFixed(1) + 's exhale', W / 2, 360);
      var pt = pctTop(Math.floor(score));
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 402);
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('calmer than ' + (100 - pt) + '% of players', W / 2, 424);
      var p2 = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = p2; cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — ONE MORE EXHALE', W / 2, 470);
      cx.globalAlpha = 1;
      // share zone
      cx.fillStyle = 'rgba(46,197,182,0.12)';
      cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
      cx.beginPath(); rr(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); cx.fill(); cx.stroke();
      cx.fillStyle = TEAL; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText('⚡ SHARE THE EXHALE', W / 2, SHARE_R.y + 30);
    }

    // demo CTA — soft invitation (calm arc resolution)
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = BONE; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('DIMMER SWITCH', W / 2, 290);
      cx.fillStyle = 'rgba(232,238,242,0.75)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('he dimmed the feed to black.', W / 2, 330);
      cx.fillStyle = 'rgba(232,238,242,0.55)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('can you hold the exhale?', W / 2, 356);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 420);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 452);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
