<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---------- note generation ----------
  // Durations in ms (varied lengths to make PB meaningful)
  var NOTE_DURATIONS = [600, 900, 1200, 800, 1500, 700, 1100, 1000, 1300, 850];
  var TOTAL_NOTES = 10;

  function genNotes() {
    var arr = [];
    for (var i = 0; i < TOTAL_NOTES; i++) {
      // shuffle note durations using seeded RNG
      arr.push(NOTE_DURATIONS[i]);
    }
    // seeded shuffle
    for (var j = arr.length - 1; j > 0; j--) {
      var k = Math.floor(rng() * (j + 1));
      var tmp = arr[j]; arr[j] = arr[k]; arr[k] = tmp;
    }
    return arr;
  }

  // ---------- state ----------
  var phase, notes, noteIdx, noteStartMs, holdStartMs, holding, errors, totalError;
  var noteRevealMs, phaseStartMs, runStartTs;
  var flashes, hitStop, zoom, shakeAmt, dareBeaten;
  var best = Infinity; // lower is better (total ms error)
  var ctaAt = 0, overAt = 0, challengeAt = 0;
  try { var saved = +localStorage.getItem('ph_best'); if (!isNaN(saved) && saved > 0) best = saved; } catch(_) {}

  // bot/demo tracking
  var botRunsDone = 0;

  function newGame() {
    rng = mulberry32(SEED); // reset rng each game for reproducibility
    notes      = genNotes();
    noteIdx    = 0;
    holding    = false;
    holdStartMs= 0;
    noteStartMs= 0;
    errors     = [];
    totalError = 0;
    flashes    = [];
    hitStop    = 0;
    zoom       = 1;
    shakeAmt   = 0;
    dareBeaten = false;
    phase      = 'title';

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    phase      = 'play';
    noteIdx    = 0;
    holding    = false;
    errors     = [];
    totalError = 0;
    runStartTs = Date.now();
    startNote();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function startNote() {
    noteStartMs = performance.now();
    holdStartMs = 0;
    holding     = false;
    if (window.J) J.tension(noteIdx / TOTAL_NOTES);
  }

  function pressDown() {
    if (phase !== 'play' || holding) return;
    holding     = true;
    holdStartMs = performance.now();
  }

  function pressUp() {
    if (phase !== 'play' || !holding) return;
    holding = false;
    var heldMs   = performance.now() - holdStartMs;
    var targetMs = notes[noteIdx];
    var errMs    = Math.abs(heldMs - targetMs);
    errors.push(errMs);
    totalError += errMs;

    // classify
    var isPerfect = errMs < 40;
    var isGood    = errMs < 120;
    var isNear    = errMs < 220;

    if (isPerfect) {
      flash('PERFECT', TEAL, 46);
      hitStop = 4; zoom = 1.03;
      if (window.J) J.perfect(noteIdx + 1);
    } else if (isGood) {
      flash('+' + Math.round(errMs) + 'ms', GOLD, 38);
      if (window.J) J.hit(noteIdx + 1);
    } else if (isNear) {
      flash('SO CLOSE  +' + Math.round(errMs) + 'ms', VERM, 34);
      shakeAmt = 4;
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { note: noteIdx, err_ms: Math.round(errMs) });
    } else {
      flash('+' + Math.round(errMs) + 'ms', 'rgba(255,255,255,0.6)', 32);
      shakeAmt = 3;
      if (window.J) J.hit(1); // low-pitch thud
    }

    if (window.LOOP) LOOP.emit('note_held', { note: noteIdx, target_ms: targetMs, held_ms: Math.round(heldMs), err_ms: Math.round(errMs), perfect: isPerfect });

    noteIdx++;
    if (noteIdx >= TOTAL_NOTES) {
      // all notes done
      setTimeout(gameOver, 500);
    } else {
      // brief gap then next note
      setTimeout(startNote, 400);
    }
  }

  function gameOver() {
    phase  = 'over';
    overAt = performance.now();

    var newBest = totalError < best;
    if (window.J) {
      J.death(Math.min(0.3 + totalError / 5000, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    shakeAmt = newBest ? 3 : 7;

    if (DEMO) window.__demoScore = Math.round(totalError);

    if (newBest && totalError > 0) {
      best = totalError;
      try { localStorage.setItem('ph_best', String(best)); } catch(_) {}
      flash('NEW BEST', GOLD, 44);
      if (window.J) J.gold();
    }

    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && totalError < SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(Math.round(totalError));
    }

    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: Math.round(totalError), dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 900);
      }
    }
  }

  function resetRun() {
    rng = mulberry32(SEED + botRunsDone);
    notes = genNotes();
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---------- input ----------
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  var pointerDown = false;
  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var r  = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale;
    var py = (e.clientY - r.top)  / scale;
    if (inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play') { pointerDown = true; pressDown(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: Math.round(totalError), unit: 'ms' }); return;
      }
      resetRun();
    }
  });
  window.addEventListener('pointerup', function (e) {
    if (DEMO || BOT) return;
    if (pointerDown) { pointerDown = false; pressUp(); }
  });
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    if (e.code === 'Space') {
      if (phase === 'title') { startRun(); return; }
      if (phase === 'play') pressDown();
    }
  });
  window.addEventListener('keyup', function (e) {
    if (DEMO || BOT) return;
    if (e.code === 'Space' && phase === 'play') pressUp();
  });

  // ---------- demo / bot autopilot ----------
  // Demo: 10 notes, scripted errors to create near-perfection itch
  // Hesitation varies per note to feel human
  // Near-fail recovery at ~60% (note 6), then real fail at end
  var demoErrors   = [55, -80, 30, -25, 120, 40, -180, 15, -60, 350]; // ms offset from perfect (neg=early)
  var demoHesitate = [340, 280, 420, 260, 500, 310, 450, 290, 380, 600]; // ms after note-reveal before pressing
  var demoPressedAt = 0, demoWaiting = false, demoHoldTimer = null;

  function botErrForNote(idx) {
    // imperfect bot: mostly 50-200ms off, occasionally much worse
    return (rng() * 200 - 50);
  }

  // autopilot is called each frame when phase==='play'
  var autoPressScheduled = false, autoReleaseAt = 0, autoIsHolding = false;

  function autopilot(now) {
    if (phase !== 'play') return;
    if (noteIdx >= TOTAL_NOTES) return;

    var target = notes[noteIdx];

    if (DEMO) {
      if (!autoPressScheduled && !autoIsHolding) {
        // schedule press after hesitation
        var hesitate = demoHesitate[Math.min(noteIdx, demoHesitate.length - 1)];
        var pressAt  = noteStartMs + hesitate;
        if (now >= pressAt) {
          autoIsHolding = true;
          autoPressScheduled = true;
          var errOffset = demoErrors[Math.min(noteIdx, demoErrors.length - 1)];
          var holdDur   = Math.max(50, target + errOffset);
          autoReleaseAt = now + holdDur;
          pressDown();
        }
      } else if (autoIsHolding && now >= autoReleaseAt) {
        autoIsHolding      = false;
        autoPressScheduled = false;
        pressUp();
      }
    } else if (BOT) {
      if (!autoPressScheduled && !autoIsHolding) {
        var botHesitate = 200 + rng() * 400;
        var pressAt2 = noteStartMs + botHesitate;
        if (now >= pressAt2) {
          autoIsHolding      = true;
          autoPressScheduled = true;
          var botErr   = botErrForNote(noteIdx);
          var holdDur2 = Math.max(50, target + botErr);
          autoReleaseAt = now + holdDur2;
          pressDown();
        }
      } else if (autoIsHolding && now >= autoReleaseAt) {
        autoIsHolding      = false;
        autoPressScheduled = false;
        pressUp();
      }
    }
  }

  // reset autopilot state each note
  var _origStartNote = startNote;
  startNote = function () {
    autoPressScheduled = false;
    autoIsHolding      = false;
    autoReleaseAt      = 0;
    _origStartNote();
  };

  // ---------- draw helpers ----------
  function pctTop(errMs) {
    // lower err = better rank. 0-500ms → top 1-60%
    return Math.max(1, Math.min(99, Math.round(1 + 58 * (errMs / 5000))));
  }

  function drawNoteBar(now, idx, targetMs) {
    // Visual: a glowing bar that fills over targetMs duration
    var cx2 = cx;
    var bx = 40, bw = W - 80, by = H / 2 - 20, bh = 40;
    var elapsed = now - noteStartMs;
    var progress = Math.min(1, elapsed / targetMs);

    // background track
    cx2.fillStyle = 'rgba(255,255,255,0.08)';
    cx2.beginPath();
    if (cx2.roundRect) cx2.roundRect(bx, by, bw, bh, 8); else cx2.rect(bx, by, bw, bh);
    cx2.fill();

    // the "note" fill — only shows while note is playing (brief reveal)
    // Show the bar filling up like a progress bar during the note duration window
    // But hide progress from player — just show the beat-indicator glow
    // When NOT holding: bar shows as flat idle glow
    // When holding: fill extends right based on elapsed hold time
    var holdElapsed = holding ? (now - holdStartMs) : 0;
    var holdProgress = Math.min(1, holdElapsed / targetMs);

    // target zone glow: subtle pulse, not fully revealing the target
    var pulse = 0.5 + 0.5 * Math.sin(now / (targetMs / (2 * Math.PI)));

    // held fill
    if (holding) {
      cx2.fillStyle = holdProgress > 1.05 ? VERM : TEAL;
      cx2.beginPath();
      if (cx2.roundRect) cx2.roundRect(bx, by, bw * holdProgress, bh, 8); else cx2.rect(bx, by, bw * holdProgress, bh);
      cx2.fill();
    }

    // border
    cx2.strokeStyle = 'rgba(255,255,255,0.25)';
    cx2.lineWidth   = 1.5;
    cx2.beginPath();
    if (cx2.roundRect) cx2.roundRect(bx, by, bw, bh, 8); else cx2.rect(bx, by, bw, bh);
    cx2.stroke();

    // pulsing center dot — the "note" beat indicator
    var dotR = 8 + 3 * pulse;
    cx2.fillStyle = holding ? GOLD : 'rgba(255,255,255,0.5)';
    cx2.globalAlpha = 0.8 + 0.2 * pulse;
    cx2.beginPath();
    cx2.arc(bx + bw / 2, by + bh / 2, dotR, 0, Math.PI * 2);
    cx2.fill();
    cx2.globalAlpha = 1;
  }

  function drawWaveform(now) {
    // Animated waveform representing the sustained note
    var cx2 = cx;
    var targetMs = notes[noteIdx];
    // Phase of note from 0..1 using sin based on note duration
    var elapsed  = now - noteStartMs;
    var freq     = 1 / (targetMs / 1000) * 3; // 3 cycles over duration

    cx2.save();
    cx2.strokeStyle = holding ? TEAL : 'rgba(255,255,255,0.25)';
    cx2.lineWidth   = 2.5;
    cx2.globalAlpha = holding ? 0.85 : 0.35;
    cx2.beginPath();
    var waveMid = H / 2 + 70;
    var waveW   = W - 80;
    var waveH   = 28;
    for (var i = 0; i <= waveW; i += 2) {
      var t   = i / waveW;
      var amp = holding ? waveH : waveH * 0.3;
      var ofs = amp * Math.sin(2 * Math.PI * freq * t + now / (targetMs / (2 * Math.PI)));
      if (i === 0) cx2.moveTo(40 + i, waveMid + ofs);
      else         cx2.lineTo(40 + i, waveMid + ofs);
    }
    cx2.stroke();
    cx2.restore();
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // juice transforms

    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom     += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign  = 'center';
      cx.fillStyle  = '#fff';
      cx.font       = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('PULSE HOLD', W / 2, 280);
      cx.fillStyle  = 'rgba(255,255,255,0.5)';
      cx.font       = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('hold the note. release on beat.', W / 2, 318);
      cx.fillStyle  = 'rgba(255,255,255,0.3)';
      cx.font       = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('10 notes · lowest total error wins', W / 2, 342);
      var pulse2 = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse2;
      cx.fillStyle   = VERM;
      cx.font        = '800 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 400);
      cx.globalAlpha = 1;
      if (best < Infinity) {
        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.font      = '600 12px -apple-system, Helvetica, Arial';
        cx.fillText('BEST  ' + Math.round(best) + ' ms total error', W / 2, 438);
      }
    }

    // ---- CHALLENGE CARD (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign  = 'center';
      cx.fillStyle  = 'rgba(255,255,255,0.45)';
      cx.font       = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 296);
      cx.fillStyle  = GOLD;
      cx.font       = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('312', W / 2, 406);
      cx.fillStyle  = 'rgba(255,255,255,0.3)';
      cx.font       = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('ms total error — top run today', W / 2, 436);
    }

    // ---- PLAY ----
    if (phase === 'play' && noteIdx < TOTAL_NOTES) {
      // note counter
      cx.textAlign  = 'center';
      cx.fillStyle  = 'rgba(255,255,255,0.5)';
      cx.font       = '600 13px Menlo, monospace';
      cx.fillText('NOTE ' + (noteIdx + 1) + ' / ' + TOTAL_NOTES, W / 2, 54);

      // running total error
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font      = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(Math.round(totalError) + ' ms', W / 2, 110);
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font      = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('total error', W / 2, 132);
      if (best < Infinity) {
        cx.fillStyle = GOLD;
        cx.font      = '600 12px -apple-system, Helvetica, Arial';
        cx.fillText('BEST ' + Math.round(best) + ' ms', W / 2, 152);
      }

      // note bar
      drawNoteBar(now, noteIdx, notes[noteIdx]);
      drawWaveform(now);

      // hold instruction
      var isHolding = holding;
      cx.textAlign  = 'center';
      cx.fillStyle  = isHolding ? TEAL : 'rgba(255,255,255,0.5)';
      var instrPulse = 0.55 + 0.45 * Math.sin(now / 280);
      if (!isHolding) cx.globalAlpha = instrPulse;
      cx.font        = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText(isHolding ? 'HOLD...' : 'HOLD', W / 2, H / 2 + 130);
      cx.globalAlpha = 1;
      cx.fillStyle   = 'rgba(255,255,255,0.25)';
      cx.font        = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('release when the note ends', W / 2, H / 2 + 152);

      // previous errors list
      if (errors.length > 0) {
        var listY = H - 170;
        cx.fillStyle = 'rgba(255,255,255,0.25)';
        cx.font      = '600 11px Menlo, monospace';
        cx.textAlign = 'center';
        var showN = Math.min(errors.length, 5);
        for (var i = 0; i < showN; i++) {
          var eIdx = errors.length - showN + i;
          var e    = Math.round(errors[eIdx]);
          var col  = e < 40 ? TEAL : e < 120 ? GOLD : e < 220 ? VERM : 'rgba(255,255,255,0.35)';
          cx.fillStyle = col;
          cx.fillText('• ' + e + ' ms', W / 2, listY + i * 18);
        }
      }

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font      = '800 14px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + ' ms' + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 180);
      }
    }

    // ---- OVER ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';

      var scoreLabel = Math.round(totalError) + ' ms';
      cx.fillStyle = VERM;
      cx.font      = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('DONE.', W / 2, 272);
      cx.fillStyle = '#fff';
      cx.font      = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(scoreLabel + ' total error', W / 2, 318);

      var pt = pctTop(totalError);
      cx.fillStyle = GOLD;
      cx.font      = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 362);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font      = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 386);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 300);
        cx.globalAlpha = p2;
        cx.fillStyle   = TEAL;
        cx.font        = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 440);
        cx.globalAlpha = 1;

        // share pill
        cx.fillStyle   = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD;
        cx.lineWidth   = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font      = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- CTA (demo) ----
    if (phase === 'cta') {
      var t    = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign   = 'center';
      cx.fillStyle   = '#fff';
      cx.font        = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('PULSE HOLD', W / 2, 290);
      cx.fillStyle   = 'rgba(255,255,255,0.7)';
      cx.font        = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore || 312) + ' ms total error.', W / 2, 330);
      cx.fillText('think you can beat that?', W / 2, 356);
      var p3 = 0.7 + 0.3 * Math.sin(now / 250);
      cx.fillStyle   = VERM;
      cx.globalAlpha = ease * p3;
      cx.font        = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 312), W / 2, 418);
      cx.globalAlpha = ease;
      cx.fillStyle   = TEAL;
      cx.font        = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 450);
      cx.globalAlpha = 1;
    }

    // ---- flashes ----
    for (var fk = flashes.length - 1; fk >= 0; fk--) {
      var fl = flashes[fk]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign   = 'center';
      cx.fillStyle   = fl.color;
      cx.font        = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 220 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(fk, 1);
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign   = 'center';
      cx.globalAlpha = 0.5;
      cx.font        = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle   = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>

</html>
