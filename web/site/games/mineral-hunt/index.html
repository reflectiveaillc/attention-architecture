<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mineral Hunt — Tilt</title>
<!--
  LOOP / attention-architecture — Mineral Hunt
  Circuits: 06 Zeigarnik (complete the case), 01 RPE (which mineral next?), 02 novelty (8 shapes).
  Modes:
    ?demo=1&seed=7     scripted run for clip capture, sets window.__demoDone
    ?bot=1&runs=N&seed=5  imperfect autoplay, sets window.__botDone
    ?dare=<n>          incoming challenge from share link
    ?clip=ID&src=tiktok attribution
    ?sink=URL          event sink override
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'mineral-hunt';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function randInt(n) { return Math.floor(rng() * n); }
  function seededShuffle(arr, seed) {
    var r = mulberry32(seed);
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(r() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var COLS = 10, ROWS = 13, CELL = 28, GAP = 2;
  var GX = Math.floor((W - (COLS * (CELL + GAP) - GAP)) / 2);
  var GY = 188;
  var BUDGET = 30;

  var MINERALS = [
    { name: 'GARNET', hue: 350, shape: 'circle' },
    { name: 'CITRINE', hue: 44, shape: 'diamond' },
    { name: 'AMETHYST', hue: 270, shape: 'hexagon' },
    { name: 'JADE', hue: 158, shape: 'ellipse' },
    { name: 'SAPPHIRE', hue: 210, shape: 'triangle' },
    { name: 'RUBY', hue: 345, shape: 'heart' },
    { name: 'TOPAZ', hue: 38, shape: 'star' },
    { name: 'OPAL', hue: 178, shape: 'crescent' }
  ];

  function inShape(shape, u, v) {
    switch (shape) {
      case 'circle': return u * u + v * v <= 0.36;
      case 'diamond': return Math.abs(u) + Math.abs(v) <= 0.92;
      case 'hexagon': return Math.max(Math.abs(u), Math.abs(u) * 0.5 + Math.abs(v) * 0.866) <= 0.72;
      case 'ellipse': return (u * u) / (0.48 * 0.48) + (v * v) / (0.82 * 0.82) <= 1;
      case 'triangle': return v >= -0.62 && v <= 0.78 - Math.abs(u) * 1.1;
      case 'heart':
        var d = u * u + (v - 0.05) * (v - 0.05);
        var notch = u > 0.25 && v < 0.1 && (u - 0.45) * (u - 0.45) + v * v < 0.28;
        return d <= 0.58 && !notch;
      case 'star': {
        var rad = Math.sqrt(u * u + v * v);
        if (rad < 0.001) return true;
        var ang = Math.atan2(v, u);
        var sector = Math.abs(((ang % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI) - Math.PI);
        var R = 0.26 + 0.36 * (1 - Math.min(sector / (Math.PI / 5), 1));
        return rad <= R;
      }
      case 'crescent': {
        var d1 = u * u + v * v;
        var d2 = (u - 0.42) * (u - 0.42) + v * v;
        return d1 <= 0.62 && d2 >= 0.26;
      }
    }
    return false;
  }

  var state, flashes, runStartTs, dareBeaten = false;
  var hitStop = 0, zoom = 1, shakeAmt = 0, combo = 0, challengeAt = 0, ctaAt = 0;
  var demoPlan = [], demoIdx = 0, demoWait = 0, demoStall = 0;
  var demoWaits = [5, 8, 6, 11, 7, 5, 10, 6, 8, 7, 5, 12, 6];
  var botRunsDone = 0, botWait = 0;

  function buildLevel(idx) {
    var cells = [];
    var count = 0;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var u = (c - (COLS - 1) / 2) / ((COLS - 1) / 2);
        var v = (r - (ROWS - 1) / 2) / ((ROWS - 1) / 2);
        var inside = inShape(MINERALS[idx].shape, u, v);
        cells.push({ c: c, r: r, isMineral: inside, state: 'hidden', chipT: 0 });
        if (inside) count++;
      }
    }
    var threshold = Math.max(10, Math.ceil(count * 0.5));
    return { idx: idx, cells: cells, count: count, threshold: threshold, budget: BUDGET, revealed: 0 };
  }

  function newGame() {
    state = {
      phase: 'title',
      level: null,
      levelIdx: 0,
      score: 0,
      overAt: 0,
      totalChips: 0
    };
    flashes = []; combo = 0; dareBeaten = false;
    demoPlan = [];
    if (DEMO) {
      for (var i = 0; i < MINERALS.length; i++) demoPlan.push(makeDemoPlan(i, buildLevel(i)));
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1200);
      return;
    }
    if (BOT) startRun();
  }

  function makeDemoPlan(levelIdx, level) {
    var mineral = [], empty = [];
    for (var i = 0; i < level.cells.length; i++) {
      if (level.cells[i].isMineral) mineral.push(i);
      else empty.push(i);
    }
    mineral = seededShuffle(mineral, SEED + levelIdx * 41);
    empty = seededShuffle(empty, SEED + levelIdx * 41 + 67);
    var need = level.threshold;
    if (levelIdx === 4) {            // near-fail + recovery at ~60%
      return empty.slice(0, 14).concat(mineral.slice(0, need));
    } else if (levelIdx === 6) {     // the real fail
      return empty.slice(0, level.budget);
    }
    return mineral.slice(0, need);
  }

  function startRun() {
    state.levelIdx = 0;
    state.score = 0;
    state.totalChips = 0;
    combo = 0;
    nextLevel();
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function nextLevel() {
    if (state.levelIdx >= MINERALS.length) {
      gameOver(true);
      return;
    }
    state.level = buildLevel(state.levelIdx);
    demoIdx = 0; demoWait = demoWaits[0];
    botWait = 0;
  }

  function identify() {
    var m = MINERALS[state.levelIdx];
    state.score++;
    flash(m.name, hsl(m.hue, 70, 60), 42);
    flash('COLLECTED', GOLD, 26);
    hitStop = 5; zoom = 1.04; shakeAmt = 0;
    if (window.J) { J.gold(); J.fanfare(); }
    if (window.LOOP) LOOP.emit('mineral_identified', { idx: state.levelIdx, name: m.name, score: state.score });
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 40);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    state.levelIdx++;
    nextLevel();
  }

  function chip(cellIdx, fromAuto) {
    if (!state.level) return;
    var cell = state.level.cells[cellIdx];
    if (!cell || cell.state !== 'hidden') return;
    cell.state = 'chipped';
    cell.chipT = 1;
    state.level.budget--;
    state.totalChips++;
    var cxp = GX + cell.c * (CELL + GAP) + CELL / 2;
    var cyp = GY + cell.r * (CELL + GAP) + CELL / 2;

    if (cell.isMineral) {
      state.level.revealed++;
      combo++;
      if (window.J) J.hit(combo);
      floating('+' + combo, TEAL, 22, cxp, cyp);
      if (window.LOOP) LOOP.emit('chip', { mineral_idx: state.levelIdx, mineral: true, combo: combo, remaining: state.level.budget });
    } else {
      combo = 0;
      shakeAmt = 3.5;
      if (window.J) J.hit(1);
      floating('empty', 'rgba(255,255,255,0.6)', 14, cxp, cyp);
      if (window.LOOP) LOOP.emit('chip', { mineral_idx: state.levelIdx, mineral: false, combo: 0, remaining: state.level.budget });
    }

    if (window.J) J.tension(Math.min(1, 1 - state.level.budget / BUDGET));

    if (state.level.revealed >= state.level.threshold) {
      identify();
      return;
    }

    if (state.level.budget <= 0) {
      gameOver(false);
      return;
    }

    if (state.level.budget <= 3 && state.level.revealed < state.level.threshold) {
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { remaining: state.level.budget, needed: state.level.threshold - state.level.revealed });
    }
  }

  function gameOver(won) {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = won ? 0 : 8;
    if (window.J) { J.tension(0); J.death(won ? 0.1 : Math.min(0.3 + (8 - state.score) / 10, 1)); if (won) setTimeout(function () { J.fanfare(); }, 300); }
    if (DEMO) window.__demoScore = state.score;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), won: won });
    if (DEMO) {
      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 700);
    }
  }

  function resetRun() {
    state.level = null;
    state.levelIdx = 0;
    state.score = 0;
    state.totalChips = 0;
    combo = 0;
    flashes = [];
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0, x: W / 2, y: 260 }); }
  function floating(txt, color, size, x, y) { flashes.push({ txt: txt, color: color, size: size, t: 0, x: x, y: y, float: true }); }

  function hsl(h, s, l) { return 'hsl(' + h + ',' + s + '%,' + l + '%)'; }
  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 3.2))));
  }

  function cellAt(x, y) {
    var c = Math.floor((x - GX) / (CELL + GAP));
    var r = Math.floor((y - GY) / (CELL + GAP));
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return -1;
    return r * COLS + c;
  }

  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 510, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && state.level) {
      var idx = cellAt(x, y);
      if (idx >= 0) chip(idx, false);
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'specimens' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  function autopilot() {
    if (state.phase !== 'play' || !state.level) return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var plan = demoPlan[state.levelIdx];
      if (!plan || demoIdx >= plan.length) {
        // plan exhausted without a natural end — choke deliberately so the
        // demo ALWAYS reaches game_over → __demoDone (never stalls the clip)
        demoStall++;
        if (demoStall === 50 && state.phase === 'play') gameOver(false);
        return;
      }
      demoStall = 0;
      var idx = plan[demoIdx];
      chip(idx, true);
      demoIdx++;
      demoWait = demoWaits[demoIdx % demoWaits.length] || 6;
    } else if (BOT) {
      if (botWait > 0) { botWait--; return; }
      var hidden = [];
      for (var i = 0; i < state.level.cells.length; i++) if (state.level.cells[i].state === 'hidden') hidden.push(i);
      if (hidden.length === 0) return;
      var pick = hidden[randInt(hidden.length)];
      chip(pick, true);
      botWait = 6 + randInt(8);
    }
  }

  function roundRect(x, y, w, h, r) {
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); return; }
    var rr = Math.min(r, w / 2, h / 2);
    cx.beginPath();
    cx.moveTo(x + rr, y);
    cx.arcTo(x + w, y, x + w, y + h, rr);
    cx.arcTo(x + w, y + h, x, y + h, rr);
    cx.arcTo(x, y + h, x, y, rr);
    cx.arcTo(x, y, x + w, y, rr);
    cx.closePath();
  }

  function drawDisplayCase() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '700 11px Menlo, monospace';
    cx.fillText('DISPLAY CASE', W / 2, 34);
    var slotR = 18, startX = (W - (MINERALS.length * (slotR * 2 + 10) - 10)) / 2 + slotR;
    var y = 62;
    for (var i = 0; i < MINERALS.length; i++) {
      var x = startX + i * (slotR * 2 + 10);
      cx.beginPath();
      cx.arc(x, y, slotR, 0, Math.PI * 2);
      cx.fillStyle = i < state.score ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)';
      cx.fill();
      cx.strokeStyle = (state.phase === 'play' && state.levelIdx === i) ? TEAL : 'rgba(255,255,255,0.2)';
      cx.lineWidth = state.levelIdx === i ? 2 : 1;
      cx.stroke();
      if (i < state.score) {
        cx.beginPath();
        cx.arc(x, y, 9, 0, Math.PI * 2);
        cx.fillStyle = hsl(MINERALS[i].hue, 72, 58);
        cx.fill();
        cx.shadowBlur = 0;
      } else {
        cx.fillStyle = 'rgba(255,255,255,0.12)';
        cx.font = '600 10px Menlo, monospace';
        cx.fillText('?', x, y + 3);
      }
    }
  }

  function rockFill(x, y) {
    var g = cx.createLinearGradient(x, y, x + CELL, y + CELL);
    g.addColorStop(0, '#2a2d35');
    g.addColorStop(1, '#1a1d24');
    return g;
  }

  function drawGrid() {
    if (!state.level) return;
    var lvl = state.level;
    for (var i = 0; i < lvl.cells.length; i++) {
      var cell = lvl.cells[i];
      var x = GX + cell.c * (CELL + GAP);
      var y = GY + cell.r * (CELL + GAP);
      if (cell.state === 'hidden') {
        var t = 1 - cell.chipT * 0.2;
        cx.save();
        cx.translate(x + CELL / 2, y + CELL / 2);
        cx.scale(t, t);
        cx.translate(-(x + CELL / 2), -(y + CELL / 2));
        cx.fillStyle = rockFill(x, y);
        cx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
        cx.strokeStyle = 'rgba(255,255,255,0.08)';
        cx.lineWidth = 1;
        cx.strokeRect(x + 1.5, y + 1.5, CELL - 3, CELL - 3);
        cx.restore();
      } else {
        var sc = 1 - cell.chipT * 0.45;
        cx.save();
        cx.translate(x + CELL / 2, y + CELL / 2);
        cx.scale(sc, sc);
        cx.translate(-(x + CELL / 2), -(y + CELL / 2));
        cx.globalAlpha = 1 - cell.chipT * 0.7;
        if (cell.isMineral) {
          var glow = cx.createRadialGradient(x + CELL / 2, y + CELL / 2, 2, x + CELL / 2, y + CELL / 2, CELL);
          glow.addColorStop(0, hsl(MINERALS[lvl.idx].hue, 80, 70));
          glow.addColorStop(1, hsl(MINERALS[lvl.idx].hue, 70, 45));
          cx.fillStyle = glow;
        } else {
          cx.fillStyle = '#11141a';
        }
        cx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
        cx.restore();
        cx.globalAlpha = 1;
        if (cell.chipT > 0) cell.chipT -= 0.04;
        if (cell.chipT < 0) cell.chipT = 0;
      }
    }
  }

  function drawHUD() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.9)';
    cx.font = '800 52px -apple-system, Helvetica, Arial';
    cx.fillText(state.score, W / 2, 128);
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('of 8 specimens', W / 2, 148);

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 14px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 170);
    }

    if (state.level && state.phase === 'play') {
      var barW = 180, barH = 8, bx = (W - barW) / 2, by = 630;
      cx.fillStyle = 'rgba(255,255,255,0.12)';
      cx.fillRect(bx, by, barW, barH);
      var pct = Math.max(0, state.level.budget / BUDGET);
      cx.fillStyle = pct < 0.2 ? VERM : pct < 0.5 ? GOLD : TEAL;
      cx.fillRect(bx, by, barW * pct, barH);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '700 11px Menlo, monospace';
      cx.fillText(state.level.budget + ' CHIPS LEFT', W / 2, by + 22);
    }

    if (combo > 1 && state.phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('×' + combo, W / 2, 600);
    }
  }

  function drawTitle() {
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
    cx.fillText('MINERAL HUNT', W / 2, 300);
    cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';
    var pulse = 0.6 + 0.4 * Math.sin(performance.now() / 300);
    cx.globalAlpha = pulse; cx.fillText('CHIP THE ROCK. REVEAL THE CRYSTAL.', W / 2, 345); cx.globalAlpha = 1;
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('collect all 8 specimens', W / 2, 372);
  }

  function drawChallenge() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
    cx.fillText('SCORE TO BEAT', W / 2, 300);
    cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
    cx.fillText('6', W / 2, 400);
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText("today's top haul", W / 2, 430);
  }

  function drawOver() {
    cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    var won = state.score >= MINERALS.length;
    cx.fillStyle = won ? TEAL : VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
    cx.fillText(won ? 'COLLECTION COMPLETE' : 'CRUMBLED.', W / 2, 300);
    cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
    cx.fillText(state.score + ' specimen' + (state.score === 1 ? '' : 's'), W / 2, 345);
    var pt = pctTop(state.score);
    cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
    cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
    if (!DEMO && !BOT) {
      var p2 = 0.6 + 0.4 * Math.sin(performance.now() / 280);
      cx.globalAlpha = p2; cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  function drawCTA() {
    var t = (performance.now() - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease; cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
    cx.fillText('MINERAL HUNT', W / 2, 300);
    cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
    cx.fillText('they found ' + (window.__demoScore || 6) + '. your move.', W / 2, 340);
    var p3 = 0.7 + 0.3 * Math.sin(performance.now() / 240);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 30px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + (window.__demoScore || 6), W / 2, 410);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 442);
    cx.globalAlpha = 1;
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play' && state.level) {
      autopilot();
    }

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    var vignette = cx.createRadialGradient(W / 2, GY + ROWS * (CELL + GAP) / 2, 20, W / 2, GY + ROWS * (CELL + GAP) / 2, 220);
    vignette.addColorStop(0, 'rgba(255,255,255,0.04)');
    vignette.addColorStop(1, 'rgba(255,255,255,0)');
    cx.fillStyle = vignette;
    cx.fillRect(GX - 10, GY - 10, COLS * (CELL + GAP) + 20, ROWS * (CELL + GAP) + 20);

    drawDisplayCase();

    if (state.phase === 'title') drawTitle();
    else if (state.phase === 'challenge') drawChallenge();
    else {
      drawGrid();
      if (state.phase === 'play' || state.phase === 'over') drawHUD();
    }

    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.35) + 'px -apple-system, Helvetica, Arial';
      var fy = fl.float ? fl.y - fl.t * 1.2 : fl.y - fl.t * 0.7;
      cx.fillText(fl.txt, fl.x, fy);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    if (state.phase === 'over') drawOver();
    if (state.phase === 'cta') drawCTA();

    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
