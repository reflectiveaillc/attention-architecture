<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mineral Hunt — Tilt</title>
<!--
  LOOP / attention-architecture — Mineral Hunt
  Circuits: 06-zeigarnik (missing specimen), 01-rpe (variable chip reveals), 02-novelty (each mineral).
  Mechanic: Tap to chip tiles off a stone face; reveal fragments to ID the mineral.
            Collect all 8 specimens to complete the case.
  Modes:
    ?demo=1&seed=7        mirror-neuron arc clip, sets window.__demoDone
    ?bot=1&runs=N&seed=5  imperfect autoplay N runs, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'mineral-hunt';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- Mineral definitions (8 specimens) ----
  // Each has a name, color palette, shape type, and reveal threshold
  var MINERALS = [
    { name: 'QUARTZ',    color: '#d4e8f0', glow: '#b0d8f0', shape: 'hex',    chips: 12, rarity: 1 },
    { name: 'AMETHYST',  color: '#9b6db5', glow: '#c89fe0', shape: 'cluster',chips: 14, rarity: 2 },
    { name: 'PYRITE',    color: '#c8a83c', glow: '#f2d060', shape: 'cubic',   chips: 10, rarity: 1 },
    { name: 'MALACHITE', color: '#2ec56c', glow: '#5eff9e', shape: 'band',    chips: 13, rarity: 2 },
    { name: 'OBSIDIAN',  color: '#2a2a3a', glow: '#5a5a8a', shape: 'sharp',   chips: 11, rarity: 1 },
    { name: 'GARNET',    color: '#c83c3c', glow: '#ff7070', shape: 'dodec',   chips: 15, rarity: 3 },
    { name: 'AZURITE',   color: '#2050c0', glow: '#60a0ff', shape: 'tabular', chips: 13, rarity: 2 },
    { name: 'SELENITE',  color: '#f0ede8', glow: '#fffbe8', shape: 'blade',   chips: 14, rarity: 2 }
  ];

  // Grid of chips: 5x8 = 40 tiles covering the stone face
  var COLS = 5, ROWS = 8, TOTAL_TILES = COLS * ROWS;
  var TILE_W = 66, TILE_H = 54;
  var GRID_X = (W - COLS * TILE_W) / 2;
  var GRID_Y = 170;

  // ---- Game state ----
  var phase, tiles, revealed, mineralIdx, specimenFound, collection,
      chipCount, flashes, shakeAmt, hitStop, zoom,
      runStartTs, botRunsDone, dareBeaten, challengeAt, ctaAt, overAt,
      combo, currentScore, finalScore;

  function newGame() {
    phase = DEMO ? 'challenge' : (BOT ? 'play' : 'title');
    specimenFound = false;
    collection = [];
    dareBeaten = false;
    combo = 0;
    currentScore = 0;
    finalScore = 0;
    flashes = [];
    shakeAmt = 0;
    hitStop = 0;
    zoom = 1;
    botRunsDone = 0;

    if (DEMO) {
      challengeAt = performance.now();
      setTimeout(function () { startStone(); }, 1200);
      return;
    }
    if (BOT) { startStone(); return; }
  }

  function startStone() {
    // Pick a random mineral
    mineralIdx = Math.floor(rng() * MINERALS.length);
    var mineral = MINERALS[mineralIdx];
    // Build tile grid — some tiles already "chipped" based on rng
    tiles = [];
    for (var i = 0; i < TOTAL_TILES; i++) {
      tiles.push({
        chipped: false,
        crackLevel: 0,    // 0-3 visual crack stages
        gx: i % COLS,
        gy: Math.floor(i / COLS)
      });
    }
    revealed = 0;
    chipCount = mineral.chips;
    specimenFound = false;

    if (phase !== 'play') phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED, mineral: MINERALS[mineralIdx].name });
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 5))));
  }

  function chipTile(idx) {
    if (idx < 0 || idx >= TOTAL_TILES) return;
    var t = tiles[idx];
    if (t.chipped) return;
    t.crackLevel = Math.min(3, t.crackLevel + 1);
    if (t.crackLevel >= 3 || rng() < 0.55) {
      t.chipped = true;
      revealed++;
      combo++;
      var mineral = MINERALS[mineralIdx];
      var isGold = mineral.rarity === 3;
      var isPerfect = (revealed === 1 || revealed === chipCount);
      if (window.J) {
        if (isPerfect) J.perfect(combo);
        else if (isGold) J.gold();
        else J.hit(combo);
        J.tension(Math.min(revealed / chipCount, 1));
      }
      if (isPerfect) { hitStop = 4; zoom = 1.025; }
      // Flash text
      if (revealed === 1) flash('FIRST CHIP!', TEAL, 32);
      else if (revealed >= chipCount - 1) flash('SO CLOSE!', VERM, 36);

      if (window.LOOP) LOOP.emit('chip', { n: revealed, mineral: mineral.name });

      // Check if enough revealed
      if (revealed >= chipCount) {
        collectSpecimen();
      }
    } else {
      t.crackLevel++;
      // near-miss — cracking but not revealing
      if (rng() < 0.3) {
        shakeAmt = 2;
        if (window.J) J.near();
        flash('SO CLOSE!', GOLD, 28);
        if (window.LOOP) LOOP.emit('near_miss', { n: revealed });
      }
    }
  }

  function collectSpecimen() {
    var mineral = MINERALS[mineralIdx];
    collection.push(mineralIdx);
    currentScore = collection.length;
    specimenFound = true;
    hitStop = 6;
    zoom = 1.04;
    shakeAmt = 4;

    if (window.J) { J.fanfare(); }
    flash(mineral.name + ' ✓', GOLD, 38);

    if (window.LOOP) LOOP.emit('specimen_found', { mineral: mineral.name, n: currentScore });

    // Dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && currentScore > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 40);
      if (window.J) J.fanfare();
      SHARE.beaten(currentScore);
    }

    // Check win (all 8 collected)
    if (collection.length >= 8) {
      setTimeout(function () { gameOver(true); }, 800);
    } else if (DEMO && collection.length >= 3) {
      // Demo ends after 3 specimens for timing
      setTimeout(function () { gameOver(false); }, 600);
    } else if (BOT && collection.length >= 2) {
      // Bot goes passive after 2, letting the stone run out of moves
      setTimeout(function () { gameOver(false); }, 400);
    } else {
      // Next stone after a beat
      setTimeout(function () {
        startStone();
      }, 900);
    }
  }

  function gameOver(won) {
    phase = 'over';
    overAt = performance.now();
    finalScore = currentScore;
    if (DEMO) window.__demoScore = finalScore;

    var dur = (Date.now() - runStartTs) / 1000;
    shakeAmt = won ? 2 : 7;
    if (window.J) {
      if (won) J.fanfare();
      else J.death(Math.min(0.3 + finalScore / 8, 1));
    }
    if (window.LOOP) LOOP.emit('game_over', { score: finalScore, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () {
          resetRun();
        }, 600);
      }
    }
  }

  function resetRun() {
    collection = [];
    currentScore = 0;
    combo = 0;
    dareBeaten = false;
    flashes = [];
    if (window.LOOP) LOOP.emit('restart', {});
    startStone();
    phase = 'play';
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0, x: W / 2, y: 140 });
  }

  // ---- Input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 530, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startStone(); phase = 'play'; runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED }); return; }
    if (phase === 'play') {
      // Determine which tile was tapped
      var tx = px - GRID_X, ty = py - GRID_Y;
      var col = Math.floor(tx / TILE_W), row = Math.floor(ty / TILE_H);
      if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
        chipTile(row * COLS + col);
      }
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: finalScore, unit: 'specimens' }); return;
      }
      // Restart
      collection = []; currentScore = 0; combo = 0; dareBeaten = false; flashes = [];
      if (window.LOOP) LOOP.emit('restart', {});
      startStone(); phase = 'play';
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- Demo / Bot autopilots ----
  // Demo script: tap specific tiles in a sequence that builds tension
  var demoScript = [
    { col: 2, row: 3 }, { col: 1, row: 4 }, { col: 3, row: 4 }, { col: 2, row: 5 },
    { col: 0, row: 3 }, { col: 4, row: 3 }, { col: 2, row: 2 }, { col: 1, row: 2 },
    { col: 3, row: 2 }, { col: 2, row: 1 }, { col: 1, row: 5 }, { col: 3, row: 5 },
    { col: 0, row: 4 }, { col: 4, row: 4 }, { col: 2, row: 6 }
  ];
  var demoWaits = [38, 28, 45, 32, 52, 29, 41, 36, 48, 30, 55, 27, 43, 31, 38];
  var demoIdx = 0, demoWait = 40;

  // Bot randomizes taps
  var botWait = 0, botNextCol = 0, botNextRow = 0;

  function autopilot() {
    if (phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      if (demoIdx >= demoScript.length) return;
      var step = demoScript[demoIdx];
      var idx = step.row * COLS + step.col;
      if (idx < TOTAL_TILES && tiles[idx] && !tiles[idx].chipped) {
        chipTile(idx);
      } else {
        // find next unchipped tile
        for (var i = 0; i < TOTAL_TILES; i++) {
          if (!tiles[i].chipped) { chipTile(i); break; }
        }
      }
      demoWait = demoWaits[demoIdx % demoWaits.length] || 32;
      demoIdx++;
    } else if (BOT) {
      if (botWait > 0) { botWait--; return; }
      // Pick a random unchipped tile
      var unchipped = [];
      for (var j = 0; j < TOTAL_TILES; j++) {
        if (tiles && tiles[j] && !tiles[j].chipped) unchipped.push(j);
      }
      if (unchipped.length > 0) {
        var pick = unchipped[Math.floor(rng() * unchipped.length)];
        chipTile(pick);
      }
      botWait = Math.floor(rng() * 20) + 12;
    }
  }

  // ---- Drawing helpers ----
  function drawCrystalShape(mineral, cx2, x, y, size, alpha) {
    cx2.globalAlpha = alpha;
    cx2.fillStyle = mineral.color;
    cx2.strokeStyle = mineral.glow;
    cx2.lineWidth = 2;

    var s = size;
    cx2.beginPath();
    if (mineral.shape === 'hex') {
      for (var i = 0; i < 6; i++) {
        var a = Math.PI / 3 * i - Math.PI / 6;
        i === 0 ? cx2.moveTo(x + s * Math.cos(a), y + s * Math.sin(a))
                : cx2.lineTo(x + s * Math.cos(a), y + s * Math.sin(a));
      }
    } else if (mineral.shape === 'cluster') {
      // Multiple smaller hexagons
      for (var c = 0; c < 3; c++) {
        var ox = (c - 1) * s * 0.6, oy = c % 2 === 0 ? 0 : -s * 0.3;
        cx2.save(); cx2.translate(ox, oy);
        cx2.beginPath();
        for (var ci = 0; ci < 6; ci++) {
          var ca = Math.PI / 3 * ci;
          ci === 0 ? cx2.moveTo(x + s * 0.6 * Math.cos(ca), y + s * 0.6 * Math.sin(ca))
                   : cx2.lineTo(x + s * 0.6 * Math.cos(ca), y + s * 0.6 * Math.sin(ca));
        }
        cx2.closePath(); cx2.fill(); cx2.stroke();
        cx2.restore();
      }
      cx2.globalAlpha = 1; return;
    } else if (mineral.shape === 'cubic') {
      cx2.rect(x - s * 0.7, y - s * 0.7, s * 1.4, s * 1.4);
    } else if (mineral.shape === 'band') {
      cx2.rect(x - s, y - s * 0.45, s * 2, s * 0.9);
    } else if (mineral.shape === 'sharp') {
      cx2.moveTo(x, y - s);
      cx2.lineTo(x + s * 0.6, y + s * 0.3);
      cx2.lineTo(x, y + s * 0.6);
      cx2.lineTo(x - s * 0.6, y + s * 0.3);
    } else if (mineral.shape === 'dodec') {
      for (var di = 0; di < 8; di++) {
        var da = Math.PI * 2 / 8 * di;
        di === 0 ? cx2.moveTo(x + s * Math.cos(da), y + s * Math.sin(da))
                 : cx2.lineTo(x + s * Math.cos(da), y + s * Math.sin(da));
      }
    } else if (mineral.shape === 'tabular') {
      cx2.rect(x - s * 0.9, y - s * 0.5, s * 1.8, s);
    } else if (mineral.shape === 'blade') {
      cx2.moveTo(x, y - s);
      cx2.lineTo(x + s * 0.25, y);
      cx2.lineTo(x, y + s);
      cx2.lineTo(x - s * 0.25, y);
    } else {
      cx2.arc(x, y, s, 0, Math.PI * 2);
    }
    cx2.closePath();
    cx2.fill();
    cx2.stroke();
    cx2.globalAlpha = 1;
  }

  function drawStoneGrid() {
    if (!tiles) return;
    var mineral = MINERALS[mineralIdx];
    var revealRatio = revealed / chipCount;

    for (var i = 0; i < TOTAL_TILES; i++) {
      var t = tiles[i];
      var tx = GRID_X + t.gx * TILE_W;
      var ty = GRID_Y + t.gy * TILE_H;

      if (t.chipped) {
        // Revealed fragment — show mineral color
        var fragAlpha = 0.7 + 0.3 * revealRatio;
        cx.globalAlpha = fragAlpha;
        cx.fillStyle = mineral.color;
        // Draw fragment shape
        cx.beginPath();
        cx.roundRect ? cx.roundRect(tx + 3, ty + 3, TILE_W - 6, TILE_H - 6, 4)
                     : cx.rect(tx + 3, ty + 3, TILE_W - 6, TILE_H - 6);
        cx.fill();
        // Glow on revealed
        cx.globalAlpha = 0.3 * fragAlpha;
        cx.fillStyle = mineral.glow;
        cx.fill();
        cx.globalAlpha = 1;
      } else {
        // Rock tile — darker/lighter based on crack level
        var rockLight = 25 + t.crackLevel * 6;
        cx.globalAlpha = 1;
        cx.fillStyle = 'hsl(220,' + (8 + t.crackLevel * 3) + '%,' + rockLight + '%)';
        cx.beginPath();
        cx.roundRect ? cx.roundRect(tx + 1, ty + 1, TILE_W - 2, TILE_H - 2, 3)
                     : cx.rect(tx + 1, ty + 1, TILE_W - 2, TILE_H - 2);
        cx.fill();

        // Crack lines
        if (t.crackLevel > 0) {
          cx.strokeStyle = 'rgba(255,255,255,' + (0.08 * t.crackLevel) + ')';
          cx.lineWidth = 1;
          cx.beginPath();
          cx.moveTo(tx + TILE_W * 0.3, ty + TILE_H * 0.2);
          cx.lineTo(tx + TILE_W * 0.6, ty + TILE_H * 0.7);
          if (t.crackLevel > 1) {
            cx.moveTo(tx + TILE_W * 0.7, ty + TILE_H * 0.25);
            cx.lineTo(tx + TILE_W * 0.4, ty + TILE_H * 0.65);
          }
          cx.stroke();
        }

        // Tile border
        cx.strokeStyle = 'rgba(255,255,255,0.06)';
        cx.lineWidth = 1;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(tx + 1, ty + 1, TILE_W - 2, TILE_H - 2, 3)
                     : cx.rect(tx + 1, ty + 1, TILE_W - 2, TILE_H - 2);
        cx.stroke();
      }
    }
  }

  function drawCollectionCase() {
    // Bottom strip: display case showing 8 specimen slots
    var caseY = GRID_Y + ROWS * TILE_H + 20;
    var slotW = 40, slotH = 38, slotSpacing = 6;
    var totalW = 8 * (slotW + slotSpacing) - slotSpacing;
    var caseX = (W - totalW) / 2;

    cx.fillStyle = 'rgba(255,255,255,0.04)';
    cx.strokeStyle = 'rgba(255,255,255,0.12)';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.roundRect ? cx.roundRect(caseX - 8, caseY - 6, totalW + 16, slotH + 18, 8)
                 : cx.rect(caseX - 8, caseY - 6, totalW + 16, slotH + 18);
    cx.fill(); cx.stroke();

    for (var i = 0; i < 8; i++) {
      var sx = caseX + i * (slotW + slotSpacing);
      var sy = caseY;
      var filled = collection.indexOf(i) >= 0;

      cx.globalAlpha = filled ? 1 : 0.25;
      cx.fillStyle = filled ? MINERALS[i].color : 'rgba(255,255,255,0.08)';
      cx.strokeStyle = filled ? MINERALS[i].glow : 'rgba(255,255,255,0.15)';
      cx.lineWidth = 1;
      cx.beginPath();
      cx.roundRect ? cx.roundRect(sx, sy, slotW, slotH, 4) : cx.rect(sx, sy, slotW, slotH);
      cx.fill(); cx.stroke();

      if (filled) {
        // Mini mineral name
        cx.globalAlpha = 1;
        cx.fillStyle = INK;
        cx.font = '500 7px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(MINERALS[i].name.slice(0, 3), sx + slotW / 2, sy + slotH - 6);
      }
      cx.globalAlpha = 1;
    }

    // Label
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '600 10px Menlo, monospace';
    cx.textAlign = 'center';
    cx.fillText('SPECIMEN CASE — ' + collection.length + '/8', W / 2, caseY + slotH + 14);
  }

  function drawRevealBar() {
    if (!tiles) return;
    var barX = GRID_X, barY = GRID_Y - 18, barW = COLS * TILE_W, barH = 6;
    var ratio = Math.min(revealed / chipCount, 1);

    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.beginPath();
    cx.roundRect ? cx.roundRect(barX, barY, barW, barH, 3) : cx.rect(barX, barY, barW, barH);
    cx.fill();

    if (ratio > 0) {
      var g = cx.createLinearGradient(barX, 0, barX + barW * ratio, 0);
      g.addColorStop(0, TEAL); g.addColorStop(1, GOLD);
      cx.fillStyle = g;
      cx.beginPath();
      cx.roundRect ? cx.roundRect(barX, barY, barW * ratio, barH, 3) : cx.rect(barX, barY, barW * ratio, barH);
      cx.fill();
    }
  }

  function drawMineralHint() {
    if (!tiles) return;
    var mineral = MINERALS[mineralIdx];
    var ratio = revealed / chipCount;
    if (ratio < 0.2) return; // No hint until 20% revealed

    var hintAlpha = Math.max(0, (ratio - 0.2) / 0.5);
    cx.globalAlpha = hintAlpha * 0.85;
    cx.textAlign = 'center';
    cx.fillStyle = mineral.glow;
    cx.font = '700 11px Menlo, monospace';

    var label = ratio < 0.5 ? '???' : ratio < 0.8 ? mineral.name.slice(0, 4) + '...' : mineral.name + '?';
    cx.fillText(label, W / 2, GRID_Y - 30);
    cx.globalAlpha = 1;
  }

  // ---- Render loop ----
  var last = performance.now(), ctaLocal = 0;

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Decay hit-stop — call autopilot only when not frozen
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      autopilot();
    }

    // Juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy2 = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy2);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ----- TITLE -----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('MINERAL HUNT', W / 2, 240);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('chip the rock. find the crystal.', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('collect all 8 specimens', W / 2, 308);
      // Pulse CTA
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO CHIP', W / 2, 380);
      cx.globalAlpha = 1;
    }

    // ----- CHALLENGE CARD -----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SPECIMENS TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('5', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top hunt", W / 2, 432);
    }

    // ----- PLAY -----
    if (phase === 'play') {
      // Mineral hint (top)
      drawMineralHint();

      // Current mineral name (top label)
      if (tiles) {
        var mineral = MINERALS[mineralIdx];
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.font = '600 11px Menlo, monospace';
        cx.fillText('CHIPPING: ' + (revealed >= chipCount * 0.5 ? mineral.name + '?' : '???'), W / 2, 155);
      }

      // Reveal progress bar
      drawRevealBar();

      // Stone grid
      drawStoneGrid();

      // Collection case
      drawCollectionCase();

      // Score (top)
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(collection.length, W / 2, 100);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 11px -apple-system, Helvetica, Arial';
      cx.fillText('SPECIMENS', W / 2, 120);

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '700 13px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' · ' + SHARE.by : ''), W / 2, 138);
      }
    }

    // ----- GAME OVER -----
    if (phase === 'over') {
      // Still draw the grid underneath
      drawRevealBar();
      drawStoneGrid();
      drawCollectionCase();

      cx.fillStyle = 'rgba(11,13,18,0.65)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';

      var won2 = finalScore >= 8;
      cx.fillStyle = won2 ? GOLD : VERM;
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText(won2 ? 'COLLECTION COMPLETE!' : 'THE ROCK WINS.', W / 2, 280);

      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(finalScore + ' specimens', W / 2, 322);

      var pt = pctTop(finalScore);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 366);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of hunters', W / 2, 390);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — HUNT AGAIN', W / 2, 440);
        cx.globalAlpha = 1;

        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23)
                     : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ----- DEMO CTA -----
    if (phase === 'cta') {
      if (!ctaLocal) ctaLocal = now;
      var ct = (now - ctaLocal) / 1000, ease = Math.min(1, ct * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('MINERAL HUNT', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('found ' + (window.__demoScore || 3) + ' specimens. find more.', W / 2, 328);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 3), W / 2, 396);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 428);
      cx.globalAlpha = 1;
    }

    // ----- FLASHES -----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 36);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 36) flashes.splice(k, 1);
    }

    // ----- MUTE TOGGLE (human only) -----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
