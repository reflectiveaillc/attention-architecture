<title>DON'T BREAK THE COMBO — tap to the beat</title>
<style>
  html,body{margin:0;height:100%;background:#0a0612;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none;font-family:'Arial Black',Arial,sans-serif}
  #c{display:block;width:100vw;height:100vh}

<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const P=new URLSearchParams(location.search),DEMO=P.get('demo')==='1';
let seed=(+P.get('seed')||7)>>>0;const rnd=()=>{seed=(seed*1664525+1013904223)>>>0;return seed/4294967296;};
let W,H,DPR;function fit(){DPR=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}addEventListener('resize',fit);

const BPM=138, BEAT=60000/BPM;
let combo=0,best=0,pop=0,pops=[],lastBeat=0,broke=0,t0=performance.now();
function hit(x,y){ combo++; best=Math.max(best,combo); pop=1; if(x!=null)pops.push({x,y,r:0,a:1,h:(combo*8)%360}); }
function tap(e){ if(DEMO)return; e&&e.preventDefault(); let px=W/2,py=H*0.5; if(e&&e.touches&&e.touches[0]){px=e.touches[0].clientX;py=e.touches[0].clientY;} else if(e&&e.clientX!=null){px=e.clientX;py=e.clientY;} hit(px,py); }
cv.addEventListener('pointerdown',tap);addEventListener('keydown',e=>{if(e.code==='Space')tap();});

function frame(now){
  const t=(now-t0);
  // demo: auto-hit on every beat, combo screams upward, tease a near-break at the end
  if(DEMO){
    if(now-lastBeat>=BEAT*0.42){ lastBeat=now; hit(W/2, H*0.52); } // frantic climb → big number
    if(t>7800 && broke===0){ broke=now; }          // dramatic pause (near break)
    if(broke && now-broke>700 && !window.__demoDone){ window.__demoScore=best; window.__demoDone=true; }
  }
  pop*=0.9;
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#14082a');g.addColorStop(1,'#2a0a2a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // beat flash bg
  ctx.fillStyle='rgba(255,80,200,'+(0.10*pop)+')';ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H*0.52;
  // pulsing ring
  const R=W*0.30*(1+0.12*pop);
  ctx.lineWidth=W*0.03;ctx.strokeStyle='hsl('+((combo*8)%360)+',90%,60%)';
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke();
  ctx.lineWidth=W*0.012;ctx.strokeStyle='rgba(255,255,255,'+(0.3+0.6*pop)+')';
  ctx.beginPath();ctx.arc(cx,cy,R*0.82,0,7);ctx.stroke();
  // pops
  for(const p of pops){p.r+=10;p.a*=0.9;ctx.strokeStyle='hsla('+p.h+',90%,65%,'+p.a+')';ctx.lineWidth=5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.stroke();}
  pops=pops.filter(p=>p.a>0.05);
  // combo number (huge, screaming)
  ctx.textAlign='center';ctx.fillStyle='#fff';
  ctx.font='900 '+Math.round(W*0.3*(1+0.10*pop))+'px Arial Black';
  ctx.fillText('×'+combo,cx,cy+W*0.1);
  ctx.fillStyle='#ff4fd8';ctx.font='800 '+Math.round(W*0.075)+'px Arial';
  ctx.fillText('COMBO',cx,cy-R-H*0.02);
  // TAP prompt
  const pulse=0.5+0.5*Math.sin(now/70);
  ctx.fillStyle='rgba(255,255,255,'+(0.55+0.45*pulse)+')';
  ctx.font='900 '+Math.round(W*0.105)+'px Arial Black';
  ctx.fillText('KEEP TAPPING!',cx,H*0.15+pulse*4);
  ctx.font=Math.round(W*0.12)+'px Arial';ctx.fillText('👆',cx,H*0.86+pulse*6);
  ctx.fillStyle='#ffd23f';ctx.font='800 '+Math.round(W*0.06)+'px Arial';
  ctx.fillText("DON'T BREAK IT",cx,H*0.92);
  if(DEMO && broke){ // near-break flash
    ctx.fillStyle='rgba(255,40,40,'+(0.4*(1-(now-broke)/700))+')';ctx.fillRect(0,0,W,H);
  }
  requestAnimationFrame(frame);
}
fit();lastBeat=performance.now();requestAnimationFrame(frame);
</script>
