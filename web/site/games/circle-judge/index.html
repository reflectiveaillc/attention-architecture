<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c');
  var cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- state ----
  var phase = 'title';   // title | challenge | play | over | cta
  var pts = [];          // raw pointer path [{x,y}]
  var drawing = false;
  var score = 0, pb = 0;
  var runStartTs = 0;
  var dareBeaten = false;

  // juice vars
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [];

  // result from last scored circle
  var lastScore = 0, lastDetail = null; // {roundness, closure, radiusCv}

  // demo / bot state
  var challengeScore = 87; // shown in challenge card
  var ctaAt = 0;
  var botRunsDone = 0;
  var demoPhaseT = 0;      // time tracking within demo sequence

  try { pb = +localStorage.getItem('cj_pb') || 0; } catch (_) {}

  // ---- geometry helpers ----
  function centroid(ps) {
    var sx = 0, sy = 0;
    for (var i = 0; i < ps.length; i++) { sx += ps[i].x; sy += ps[i].y; }
    return { x: sx / ps.length, y: sy / ps.length };
  }

  function meanRadius(ps, cx2, cy2) {
    var s = 0;
    for (var i = 0; i < ps.length; i++) {
      var dx = ps[i].x - cx2, dy = ps[i].y - cy2;
      s += Math.sqrt(dx * dx + dy * dy);
    }
    return s / ps.length;
  }

  function scoreCircle(ps) {
    if (ps.length < 12) return 0;
    var c = centroid(ps);
    var mr = meanRadius(ps, c.x, c.y);
    if (mr < 20) return 0; // too tiny

    // roundness: std-dev of radius / mean radius → 0 = perfect circle
    var varR = 0;
    for (var i = 0; i < ps.length; i++) {
      var dx = ps[i].x - c.x, dy = ps[i].y - c.y;
      var r = Math.sqrt(dx * dx + dy * dy);
      varR += (r - mr) * (r - mr);
    }
    var sdR = Math.sqrt(varR / ps.length);
    var roundness = Math.max(0, 1 - sdR / mr);   // 1 = perfect

    // closure: distance from last point to first point, normalised by radius
    var dx0 = ps[0].x - ps[ps.length - 1].x;
    var dy0 = ps[0].y - ps[ps.length - 1].y;
    var gap  = Math.sqrt(dx0 * dx0 + dy0 * dy0);
    var closure = Math.max(0, 1 - gap / (mr * 1.6)); // 1 = closed

    // angular coverage: sample angles, make sure we went ~full circle
    var angles = [];
    for (var i = 0; i < ps.length; i++) {
      angles.push(Math.atan2(ps[i].y - c.y, ps[i].x - c.x));
    }
    // check coverage via bucket grid
    var buckets = new Array(16).fill(false);
    for (var i = 0; i < angles.length; i++) {
      var bi = Math.floor(((angles[i] + Math.PI) / (2 * Math.PI)) * 16) % 16;
      buckets[bi] = true;
    }
    var covered = buckets.filter(Boolean).length;
    var coverage = covered / 16;               // 1 = went full circle

    // weighted perfection %
    var raw = roundness * 0.55 + closure * 0.25 + coverage * 0.20;
    return Math.round(raw * 100);
  }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 35))));
  }

  // ---- game flow ----
  function startGame() {
    phase = 'title';
    pts = []; drawing = false;
    score = 0; lastScore = 0; lastDetail = null;
    dareBeaten = false;
    flashes = [];
  }

  function startPlay() {
    phase = 'play';
    pts = []; drawing = false;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function finishDraw() {
    if (pts.length < 8) { pts = []; drawing = false; return; }
    var s = scoreCircle(pts);
    score = s;
    lastScore = s;

    // juice based on score
    if (s >= 95) {
      hitStop = 5; zoom = 1.04; shakeAmt = 1;
      if (window.J) { J.perfect(1); J.gold(); }
      flash('PERFECT CIRCLE', GOLD, 46);
    } else if (s >= 80) {
      hitStop = 3; zoom = 1.02;
      if (window.J) J.perfect(1);
      flash('CLEAN', TEAL, 40);
    } else if (s >= 60) {
      if (window.J) J.hit(1);
      flash('DECENT', '#fff', 34);
    } else if (s >= 40) {
      if (window.J) J.near();
      flash('ROUGH', VERM, 32);
    } else {
      shakeAmt = 6;
      if (window.J) J.death(0.4);
      flash('KEEP TRYING', VERM, 30);
    }

    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && s > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN!', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(s);
    }

    var newPB = s > pb;
    if (newPB) {
      pb = s;
      try { localStorage.setItem('cj_pb', String(pb)); } catch (_) {}
      if (window.J) setTimeout(function () { J.fanfare(); }, 300);
    }

    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: s, dur_s: +dur.toFixed(1) });
    if (window.LOOP) LOOP.emit('circle_drawn', { score: s, pts_count: pts.length });

    if (DEMO) {
      window.__demoScore = s;
    }

    phase = 'over';
    drawing = false;
  }

  function restart() {
    pts = []; drawing = false;
    score = 0; lastScore = 0;
    if (window.LOOP) LOOP.emit('restart', {});
    startPlay();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, px, py) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }

  function pointerStart(px, py) {
    if (DEMO || BOT) return;
    if (inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startPlay(); return; }
    if (phase === 'over') {
      if (window.performance.now() - overAt > 350) {
        if (inR(SHARE_R, px, py) && window.SHARE) {
          SHARE.send({ score: lastScore, unit: '%' }); return;
        }
        restart();
      }
      return;
    }
    if (phase === 'play') {
      drawing = true;
      pts = [{ x: px, y: py }];
    }
  }

  function pointerMove(px, py) {
    if (DEMO || BOT || !drawing || phase !== 'play') return;
    pts.push({ x: px, y: py });
  }

  function pointerEnd() {
    if (DEMO || BOT || !drawing || phase !== 'play') return;
    finishDraw();
  }

  var overAt = 0;
  // wrap the phase='over' moment so we can guard rapid re-taps
  var _origFinishDraw = finishDraw;
  finishDraw = function () {
    _origFinishDraw();
    overAt = performance.now();
    if (DEMO) {
      // demo: score card 2.2s, then cta
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { restart(); }, 600);
      }
    }
  };

  function evtCoords(e) {
    var r = cv.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) / scale, y: (src.clientY - r.top) / scale };
  }

  cv.addEventListener('pointerdown', function (e) {
    var c2 = evtCoords(e); pointerStart(c2.x, c2.y);
  });
  cv.addEventListener('pointermove', function (e) {
    var c2 = evtCoords(e); pointerMove(c2.x, c2.y);
  });
  cv.addEventListener('pointerup',   pointerEnd);
  cv.addEventListener('pointercancel', pointerEnd);

  // ---- demo / bot autopilots ----
  // Demo arc: challenge card (1.2s) → human-feeling wobbly circle with hesitation
  // → score 72 (near-miss recovery moment) → second draw → score 93 (the peak)
  // → over card 2.2s → CTA 3.5s
  var demoStep = 0;
  // bot autopilot: simulate finger tracing a slightly-wobbly circle
  var botAngle = 0, botActive = false, botCx = W / 2, botCy = H / 2;
  var botR = 130, botPoints = [], botPtIdx = 0;
  var botPhaseTimer = 0;

  function generateBotCircle(cx2, cy2, r, noise) {
    var pts2 = [];
    var n = 60 + Math.floor(rng() * 20);
    for (var i = 0; i <= n; i++) {
      var a = (i / n) * 2 * Math.PI;
      var nr = r + (rng() - 0.5) * noise * r;
      pts2.push({ x: cx2 + Math.cos(a) * nr, y: cy2 + Math.sin(a) * nr });
    }
    return pts2;
  }

  // demo: generate a scripted circle path for the demo trace
  var demoCirclePts = [];
  var demoTraceIdx  = 0;
  var demoTraceSpeed = 3; // pts per frame
  var demoWait = 0;       // frames to hesitate
  var demoSubStep = 0;    // 0=wait, 1=trace, 2=done

  function initDemoTrace(cx2, cy2, r, noise) {
    demoCirclePts = [];
    var n = 70;
    var startAngle = -Math.PI / 2; // start at top
    for (var i = 0; i <= n; i++) {
      var a = startAngle + (i / n) * 2 * Math.PI;
      var nr = r + (rng() - 0.5) * noise * r;
      demoCirclePts.push({ x: cx2 + Math.cos(a) * nr, y: cy2 + Math.sin(a) * nr });
    }
    demoTraceIdx = 0;
    demoSubStep = 'waiting';
    demoWait = 40; // ~0.67s hesitation before starting
  }

  function demoCenY() { return H * 0.48; }

  // Called each frame when DEMO is active
  function runDemoAutopilot(dt) {
    if (phase === 'challenge') return; // handled by setTimeout
    if (phase === 'cta' || phase === 'over') return; // wait for timeouts

    if (phase === 'play') {
      if (demoSubStep === 'waiting') {
        demoWait -= dt;
        if (demoWait <= 0) {
          demoSubStep = 'tracing';
          pts = [demoCirclePts[0]];
          drawing = true;
          demoTraceIdx = 1;
        }
        return;
      }
      if (demoSubStep === 'tracing') {
        // add a few pts per frame for natural feel, with occasional hesitation
        var speed = 3 + (rng() < 0.1 ? -1 : 0);
        for (var i = 0; i < speed && demoTraceIdx < demoCirclePts.length; i++) {
          pts.push(demoCirclePts[demoTraceIdx]);
          demoTraceIdx++;
        }
        if (window.J) J.tension(demoTraceIdx / demoCirclePts.length);
        if (demoTraceIdx >= demoCirclePts.length) {
          demoSubStep = 'done';
          finishDraw();
        }
        return;
      }
    }
  }

  // Bot autopilot: draw imperfect circles and score them
  var botCirclePts = [], botPtPtr = 0, botWait = 0, botDone = false;

  function initBotTrace() {
    var noise = 0.12 + rng() * 0.18; // variable imperfection
    botCirclePts = generateBotCircle(W / 2, H * 0.48, 110 + rng() * 30, noise);
    botPtPtr = 0;
    botWait = 20;
    pts = [];
    drawing = false;
  }

  function runBotAutopilot(dt) {
    if (botDone) return;
    if (phase === 'over') return; // finishDraw handles restart
    if (phase !== 'play') return;
    if (botWait > 0) { botWait -= dt; return; }

    if (botPtPtr === 0) {
      pts = [botCirclePts[0]];
      drawing = true;
      botPtPtr = 1;
      return;
    }
    var speed = 4;
    for (var i = 0; i < speed && botPtPtr < botCirclePts.length; i++) {
      pts.push(botCirclePts[botPtPtr]);
      botPtPtr++;
    }
    if (botPtPtr >= botCirclePts.length) {
      finishDraw();
      if (!window.__botDone) initBotTrace(); // pre-prep next
    }
  }

  // ---- render helpers ----
  function drawStrokeGhost() {
    // Guide ring (faint)
    cx.save();
    cx.strokeStyle = 'rgba(255,255,255,0.07)';
    cx.lineWidth = 1.5;
    cx.setLineDash([6, 8]);
    cx.beginPath();
    cx.arc(W / 2, H * 0.48, 130, 0, 2 * Math.PI);
    cx.stroke();
    cx.setLineDash([]);
    cx.restore();
  }

  function drawPlayerStroke() {
    if (pts.length < 2) return;
    cx.save();
    cx.strokeStyle = TEAL;
    cx.lineWidth = 3;
    cx.lineCap = 'round';
    cx.lineJoin = 'round';
    cx.globalAlpha = 0.9;
    cx.beginPath();
    cx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) cx.lineTo(pts[i].x, pts[i].y);
    cx.stroke();
    cx.restore();
  }

  function drawScoreCircle(s) {
    // Show the final circle colored by score
    if (pts.length < 2) return;
    var c2 = centroid(pts);
    var mr = meanRadius(pts, c2.x, c2.y);
    var color = s >= 90 ? GOLD : s >= 70 ? TEAL : s >= 50 ? '#fff' : VERM;
    cx.save();
    cx.strokeStyle = color;
    cx.lineWidth = 3;
    cx.globalAlpha = 0.8;
    cx.beginPath();
    cx.arc(c2.x, c2.y, mr, 0, 2 * Math.PI);
    cx.stroke();
    // draw the actual stroke too, faint
    cx.strokeStyle = 'rgba(255,255,255,0.25)';
    cx.lineWidth = 2;
    cx.beginPath();
    cx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) cx.lineTo(pts[i].x, pts[i].y);
    cx.stroke();
    cx.restore();
  }

  // ---- main render ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // autopilots
    if (DEMO) runDemoAutopilot(dt);
    if (BOT && !window.__botDone)  runBotAutopilot(dt);

    // juice decay
    if (hitStop > 0) hitStop -= dt;

    cx.save();
    // screen shake + zoom
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(232,80,46,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- challenge card (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText(challengeScore, W / 2, 410);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top circle", W / 2, 440);
    }

    // ---- title screen ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('CIRCLE JUDGE', W / 2, 270);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('draw a circle. one stroke.', W / 2, 312);
      // animated guide circle
      cx.strokeStyle = 'rgba(46,197,182,0.2)';
      cx.lineWidth = 2;
      cx.setLineDash([8, 10]);
      cx.beginPath();
      cx.arc(W / 2, H * 0.55, 110, 0, 2 * Math.PI);
      cx.stroke();
      cx.setLineDash([]);
      // pulse tap prompt
      var pulse = 0.55 + 0.45 * Math.sin(now / 350);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, H * 0.82);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('PB ' + (pb > 0 ? pb + '%' : '—'), W / 2, H * 0.88);
    }

    // ---- play screen ----
    if (phase === 'play') {
      drawStrokeGhost();
      drawPlayerStroke();
      // PB badge top
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('PB ' + (pb > 0 ? pb + '%' : '—'), W / 2, 50);
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + '%' + (SHARE.by ? ' — by ' + SHARE.by : ''), W / 2, 75);
      }
      // prompt
      if (pts.length < 2 && !drawing) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = 'rgba(255,255,255,0.6)';
        cx.font = '500 15px -apple-system, Helvetica, Arial';
        cx.fillText('draw your circle', W / 2, H * 0.82);
        cx.globalAlpha = 1;
      }
    }

    // ---- over screen ----
    if (phase === 'over') {
      drawScoreCircle(lastScore);
      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var scoreColor = lastScore >= 90 ? GOLD : lastScore >= 70 ? TEAL : lastScore >= 50 ? '#fff' : VERM;
      cx.fillStyle = scoreColor;
      cx.font = '900 86px -apple-system, Helvetica, Arial';
      cx.fillText(lastScore + '%', W / 2, 340);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('perfection', W / 2, 374);
      var pt = pctTop(lastScore);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 416);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('PB ' + pb + '%', W / 2, 440);
      if (!DEMO && !BOT) {
        var p3 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p3;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — DRAW AGAIN', W / 2, 466);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- demo CTA card ----
    if (phase === 'cta') {
      var elapsed = (now - ctaAt) / 1000;
      var ease = Math.min(1, elapsed * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('CIRCLE JUDGE', W / 2, 298);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '600 17px -apple-system, Helvetica, Arial';
      cx.fillText('they scored ' + (window.__demoScore || 93) + '%. your move.', W / 2, 340);
      var p4 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p4;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 93) + '%', W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // ---- floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- boot ----
  startGame();

  if (DEMO) {
    // mirror-neuron arc:
    // beat 1: challenge card ~1.2s
    phase = 'challenge';
    setTimeout(function () {
      // beat 2+: start play with wobbly circle (score ~72 = near-miss)
      startPlay();
      initDemoTrace(W / 2, H * 0.48, 115, 0.22); // noisier = wobblier
    }, 1250);
  } else if (BOT) {
    startPlay();
    initBotTrace();
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
