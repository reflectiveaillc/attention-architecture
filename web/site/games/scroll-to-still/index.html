<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---------- feed card data ----------
  var CARD_H = 110, CARD_GAP = 14, CARD_W = W - 48;
  var CARD_COLORS = [
    ['rgba(46,197,182,0.18)', 'rgba(46,197,182,0.5)'],
    ['rgba(242,177,52,0.12)', 'rgba(242,177,52,0.4)'],
    ['rgba(80,120,200,0.15)', 'rgba(80,120,200,0.45)'],
    ['rgba(180,90,200,0.12)', 'rgba(180,90,200,0.4)'],
    ['rgba(100,200,120,0.12)', 'rgba(100,200,120,0.4)']
  ];

  // Generate a pool of card descriptors
  var CARD_TEXTS = [
    ['✨', 'the moment you almost stopped'],
    ['🌊', 'keep going, it gets better'],
    ['💭', 'wait for it...'],
    ['🎵', 'one more, just one more'],
    ['🔮', 'you won\'t believe what\'s next'],
    ['🌙', 'can\'t sleep, too much to see'],
    ['⚡', 'this one will change your mind'],
    ['🕊', 'breathe. still here.'],
    ['🌿', 'the feed never runs out'],
    ['🫧', 'nothing and everything'],
    ['🌅', 'you can stop anytime'],
    ['🎯', 'almost there']
  ];

  function makeCard(idx) {
    var ci = idx % CARD_COLORS.length;
    var ti = idx % CARD_TEXTS.length;
    return {
      colorPair: CARD_COLORS[ci],
      emoji: CARD_TEXTS[ti][0],
      text:  CARD_TEXTS[ti][1],
      accent: 0.3 + rng() * 0.5
    };
  }

  // ---------- state ----------
  var phase;          // 'title' | 'play' | 'still' | 'cta'
  var feedY;          // top of feed scroll offset (pixels scrolled)
  var speed;          // current scroll speed px/frame
  var friction;       // accumulated friction [0..1]
  var dimAlpha;       // overlay darkness [0..1]
  var score;          // seconds active before going still
  var runStartTs;
  var cards;          // array of card objects with y positions
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var flashes = [];
  var stillAt = 0, ctaAt = 0;
  var botRunsDone = 0;
  var calStep = 0;    // calm bell step counter
  var lastCalmAt = 0;

  // For bot/demo: track swipes
  var botSwipeTimer = 0;
  var botSwiped = 0;
  var BOT_MAX_SWIPES = 8 + Math.floor(rng() * 5); // bot eventually stops, friction kills it

  // Demo timing
  var demoPhase = 0;     // 0=scrolling, 1=deepening, 2=resolving, 3=cta
  var demoPhaseAt = 0;
  var demoSwipeCount = 0;
  var DEMO_SWIPES_SETTLE  = 4;
  var DEMO_SWIPES_DEEPEN  = 4;
  var DEMO_SWIPES_RESOLVE = 3;

  function initCards() {
    cards = [];
    for (var i = 0; i < 30; i++) {
      cards.push(makeCard(i));
    }
  }

  function cardY(idx) {
    // Y position of card idx relative to feedY=0 meaning top of first card at H-CARD_H-60
    return H - CARD_H - 60 - idx * (CARD_H + CARD_GAP) + feedY;
  }

  function newGame() {
    phase = 'title';
    feedY = 0;
    speed = 0;
    friction = 0;
    dimAlpha = 0;
    score = 0;
    flashes = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    calStep = 0; lastCalmAt = 0;
    demoPhase = 0; demoPhaseAt = 0; demoSwipeCount = 0;
    botSwipeTimer = 0; botSwiped = 0;
    BOT_MAX_SWIPES = 8 + Math.floor(rng() * 5);
    initCards();
    if (DEMO) { startPlay(); return; }
    if (BOT)  { startPlay(); return; }
  }

  function startPlay() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // A swipe adds speed and friction
  function doSwipe() {
    if (phase !== 'play') return;
    // Each swipe: add burst of speed, increase friction
    var burst = 3.5 * (1 - friction * 0.7);
    speed += burst;
    friction = Math.min(friction + 0.11, 1);
    dimAlpha = Math.min(dimAlpha + 0.07, 1);
    // calm bell on swipe
    var now2 = performance.now();
    if (now2 - lastCalmAt > 200) {
      if (window.J) J.calm(calStep++);
      lastCalmAt = now2;
    }
    // gentle zoom-pulse on first few swipes
    if (friction < 0.35) zoom = 1.015;
    if (friction > 0.7) {
      flash('slowing...', 'rgba(46,197,182,0.9)', 20);
      shakeAmt = 1.5;
    }
    if (window.LOOP) LOOP.emit('swipe', { friction: +friction.toFixed(2) });
  }

  function goStill() {
    phase = 'still';
    stillAt = performance.now();
    score = Math.round((Date.now() - runStartTs) / 100) / 10; // tenths of seconds
    shakeAmt = 0.5;
    if (window.J) J.calm(calStep++);
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: +score.toFixed(1), dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      // After still settles for ~2s, show cta
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 800);
      }
    }
  }

  function resetRun() {
    feedY = 0; speed = 0; friction = 0; dimAlpha = 0;
    score = 0; flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
    calStep = 0; lastCalmAt = 0;
    botSwipeTimer = 0; botSwiped = 0;
    BOT_MAX_SWIPES = 8 + Math.floor(rng() * 5);
    initCards();
    if (window.LOOP) LOOP.emit('restart', {});
    startPlay();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---------- input ----------
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  var touchStartY = null, touchLastY = null;

  function onPointerDown(e) {
    if (DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    var cx2 = (e.clientX - r.left) / scale;
    var cy2 = (e.clientY - r.top) / scale;
    if (inR(MUTE_R, cx2, cy2) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startPlay(); return; }
    if (phase === 'still' && performance.now() - stillAt > 400) { resetRun(); return; }
    if (phase === 'play') {
      touchStartY = e.clientY;
      touchLastY  = e.clientY;
    }
  }

  function onPointerMove(e) {
    if (DEMO || BOT) return;
    if (phase !== 'play' || touchStartY === null) return;
    var dy = touchLastY - e.clientY; // positive = swipe up
    touchLastY = e.clientY;
    if (dy > 2) {
      // Each significant move during swipe gesture
      var r = cv.getBoundingClientRect();
      var px = dy / scale;
      speed += px * 0.18 * (1 - friction * 0.6);
      friction = Math.min(friction + 0.015, 1);
      dimAlpha = Math.min(dimAlpha + 0.008, 1);
      var now2 = performance.now();
      if (now2 - lastCalmAt > 300) {
        if (window.J) J.calm(calStep++);
        lastCalmAt = now2;
      }
      if (window.LOOP) LOOP.emit('swipe', { friction: +friction.toFixed(2) });
    }
  }

  function onPointerUp(e) {
    if (DEMO || BOT) return;
    touchStartY = null; touchLastY = null;
  }

  // Also handle discrete taps as swipe
  window.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      if (DEMO || BOT) return;
      if (phase === 'title') { startPlay(); return; }
      if (phase === 'play') doSwipe();
      if (phase === 'still' && performance.now() - stillAt > 400) resetRun();
    }
  });

  // ---------- autopilot ----------
  function autopilot(dt) {
    if (phase !== 'play') return;
    if (DEMO) {
      demoPilot(dt);
    } else if (BOT) {
      botPilot(dt);
    }
  }

  var demoPilotTimer = 0;
  // Demo swipe intervals change by phase (settle/deepen/resolve)
  var DEMO_INTERVALS = [38, 28, 48]; // frames between swipes per arc segment

  function demoPilot(dt) {
    demoPilotTimer += dt;
    var interval = DEMO_INTERVALS[Math.min(demoPhase, DEMO_INTERVALS.length - 1)];
    if (demoPilotTimer >= interval) {
      demoPilotTimer = 0;
      doSwipe();
      demoSwipeCount++;
      // arc progression
      if (demoPhase === 0 && demoSwipeCount >= DEMO_SWIPES_SETTLE) {
        demoPhase = 1; demoSwipeCount = 0;
      } else if (demoPhase === 1 && demoSwipeCount >= DEMO_SWIPES_DEEPEN) {
        demoPhase = 2; demoSwipeCount = 0;
      } else if (demoPhase === 2 && demoSwipeCount >= DEMO_SWIPES_RESOLVE) {
        // Stop swiping — let friction take it to still naturally
        demoPhase = 3; demoSwipeCount = 0;
      }
      // phase 3: no more swipes, friction does the work
    }
  }

  var botPilotTimer = 0;
  function botPilot(dt) {
    botPilotTimer += dt;
    // Bot swipes every ~25-45 frames, stops after BOT_MAX_SWIPES
    var interval = 25 + Math.floor(rng() * 20);
    if (botSwiped < BOT_MAX_SWIPES && botPilotTimer >= interval) {
      botPilotTimer = 0;
      doSwipe();
      botSwiped++;
    }
    // After bot stops swiping, friction decays speed to 0 → game_over fires in physics
  }

  // ---------- draw helpers ----------
  function drawCard(card, y, alpha) {
    if (y > H + CARD_H || y < -CARD_H) return;
    cx.save();
    cx.globalAlpha = alpha;
    // Card bg
    var g = cx.createLinearGradient(24, y, 24 + CARD_W, y + CARD_H);
    g.addColorStop(0, card.colorPair[0]);
    g.addColorStop(1, card.colorPair[1]);
    cx.fillStyle = g;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(24, y, CARD_W, CARD_H, 16);
    else cx.rect(24, y, CARD_W, CARD_H);
    cx.fill();
    // Subtle border
    cx.strokeStyle = 'rgba(255,255,255,0.08)';
    cx.lineWidth = 1;
    cx.stroke();
    // Emoji
    cx.font = '28px -apple-system, Helvetica, Arial';
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(255,255,255,0.9)';
    cx.fillText(card.emoji, 44, y + 44);
    // Text
    cx.font = '500 13px -apple-system, Helvetica, Arial';
    cx.fillStyle = 'rgba(255,255,255,0.65)';
    cx.fillText(card.text, 44, y + 70);
    // Fake interaction bar
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.fillRect(44, y + CARD_H - 22, CARD_W - 40, 1);
    cx.font = '11px -apple-system, Helvetica, Arial';
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.fillText('❤ ' + (120 + Math.floor(card.accent * 800)), 44, y + CARD_H - 8);
    cx.fillText('↗ share', CARD_W - 30, y + CARD_H - 8);
    cx.restore();
  }

  function drawFeed(dimA) {
    // How many cards are visible
    for (var i = 0; i < cards.length; i++) {
      var y = cardY(i);
      if (y > H + CARD_H * 2 || y < -CARD_H * 2) continue;
      var cardAlpha = 1 - dimA * 0.85;
      drawCard(cards[i], y, cardAlpha);
    }
  }

  // ---------- main loop ----------
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3);
    last = now;

    // Physics: decay speed by friction each frame
    if (phase === 'play') {
      if (hitStop > 0) { hitStop -= dt; }
      else {
        // Friction decelerates continuously
        var decel = 0.055 + friction * 0.12;
        speed = Math.max(0, speed - decel * dt);
        feedY += speed * dt;

        // Autopilot (demo/bot)
        autopilot(dt);

        // Check if fully stopped
        if (speed < 0.05 && friction >= 0.08) {
          goStill();
        }
      }
    }

    // Juice decay
    shakeAmt *= Math.pow(0.88, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // -- Draw --
    cx.save();
    if (shakeAmt > 0.15 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);

    if (phase === 'title') {
      drawTitle(now);
    } else if (phase === 'play' || phase === 'still') {
      // Feed
      var fdAlpha = (phase === 'still') ? Math.min(dimAlpha + (performance.now() - stillAt) / 2000, 1) : dimAlpha;
      drawFeed(fdAlpha);
      // Dim overlay (darkness from friction)
      cx.fillStyle = 'rgba(11,13,18,' + (fdAlpha * 0.72) + ')';
      cx.fillRect(0, 0, W, H);
      // Speed trail lines (suggest motion)
      if (speed > 0.5 && phase === 'play') {
        cx.save();
        cx.globalAlpha = Math.min(speed / 8, 0.35) * (1 - fdAlpha * 0.8);
        for (var li = 0; li < 6; li++) {
          var lx = 30 + (li / 5) * (W - 60);
          var lh = speed * 3 + 8;
          var lg2 = cx.createLinearGradient(lx, H / 2 - lh / 2, lx, H / 2 + lh / 2);
          lg2.addColorStop(0, 'transparent');
          lg2.addColorStop(0.5, 'rgba(46,197,182,0.6)');
          lg2.addColorStop(1, 'transparent');
          cx.fillStyle = lg2;
          cx.fillRect(lx - 1, H / 2 - lh / 2, 2, lh);
        }
        cx.restore();
      }
      // Friction indicator — a thin bar at top
      if (phase === 'play') drawFrictionBar(fdAlpha);
      // "Still" state fade-to-black + message
      if (phase === 'still') drawStill(now);
    } else if (phase === 'cta') {
      // Full black + CTA
      cx.fillStyle = INK;
      cx.fillRect(0, 0, W, H);
      drawCTA(now);
    }

    // Floating text flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '600 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 40 - fl.t * 1.2);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // Mute toggle
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawTitle(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.9)';
    cx.font = '700 36px -apple-system, Helvetica, Arial';
    cx.fillText('SCROLL TO STILL', W / 2, H / 2 - 60);
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '400 15px -apple-system, Helvetica, Arial';
    cx.fillText('swipe up. feel it slow.', W / 2, H / 2 - 24);
    var pulse = 0.5 + 0.5 * Math.sin(now / 600);
    cx.globalAlpha = 0.6 + 0.4 * pulse;
    cx.fillStyle = TEAL;
    cx.font = '600 14px -apple-system, Helvetica, Arial';
    cx.fillText('swipe up to begin', W / 2, H / 2 + 40);
    cx.globalAlpha = 1;
  }

  function drawFrictionBar(alpha) {
    // Thin bar at bottom showing friction level
    var bw = (W - 80) * friction;
    cx.save();
    cx.globalAlpha = 0.6 * (1 - alpha * 0.5);
    // background track
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.fillRect(40, H - 32, W - 80, 3);
    // fill
    var fg = cx.createLinearGradient(40, 0, 40 + (W - 80), 0);
    fg.addColorStop(0, TEAL);
    fg.addColorStop(1, 'rgba(46,197,182,0.3)');
    cx.fillStyle = fg;
    cx.fillRect(40, H - 32, bw, 3);
    cx.restore();
    // label
    cx.save();
    cx.globalAlpha = 0.35 * (1 - alpha * 0.4);
    cx.fillStyle = 'rgba(255,255,255,0.6)';
    cx.font = '10px Menlo, monospace';
    cx.textAlign = 'center';
    cx.fillText('resistance', W / 2, H - 16);
    cx.restore();
  }

  function drawStill(now) {
    var elapsed = (now - stillAt) / 1000;
    var fadeIn = Math.min(elapsed / 1.2, 1);
    // Deep dark overlay
    cx.fillStyle = 'rgba(11,13,18,' + (fadeIn * 0.88) + ')';
    cx.fillRect(0, 0, W, H);
    if (fadeIn > 0.3) {
      var ta = (fadeIn - 0.3) / 0.7;
      cx.save();
      cx.globalAlpha = ta;
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '300 22px -apple-system, Helvetica, Arial';
      cx.fillText('still.', W / 2, H / 2 - 20);
      cx.fillStyle = TEAL;
      cx.font = '600 48px -apple-system, Helvetica, Arial';
      cx.fillText(score.toFixed(1) + 's', W / 2, H / 2 + 44);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '400 13px -apple-system, Helvetica, Arial';
      cx.fillText('you held the scroll', W / 2, H / 2 + 78);
      if (!DEMO && !BOT && elapsed > 1.2) {
        var pulse = 0.55 + 0.45 * Math.sin(now / 500);
        cx.globalAlpha = ta * pulse;
        cx.fillStyle = 'rgba(46,197,182,0.8)';
        cx.font = '500 13px -apple-system, Helvetica, Arial';
        cx.fillText('tap to try again', W / 2, H / 2 + 120);
      }
      cx.restore();
    }
  }

  function drawCTA(now) {
    var elapsed = (now - ctaAt) / 1000;
    var ease = Math.min(elapsed * 1.8, 1);
    cx.save();
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    // Title
    cx.fillStyle = 'rgba(255,255,255,0.9)';
    cx.font = '700 34px -apple-system, Helvetica, Arial';
    cx.fillText('SCROLL TO STILL', W / 2, H / 2 - 80);
    // Invitation line
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '400 16px -apple-system, Helvetica, Arial';
    cx.fillText('the feed that ends.', W / 2, H / 2 - 40);
    // CTA button
    var p = 0.7 + 0.3 * Math.sin(now / 380);
    cx.globalAlpha = ease * p;
    cx.fillStyle = TEAL;
    cx.font = '700 22px -apple-system, Helvetica, Arial';
    cx.fillText('▶ REACH IT', W / 2, H / 2 + 24);
    cx.globalAlpha = ease;
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '400 13px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, H / 2 + 60);
    cx.restore();
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
