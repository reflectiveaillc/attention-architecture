<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO    = qs.get('demo') === '1';
  var BOT     = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED    = +qs.get('seed') || 42;

  // ── mulberry32 seeded RNG ──
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  // ── canvas / DPR ──
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ── wire geometry constants ──
  // The wire is a piecewise sine path parameterised by distance "dist" (0..∞)
  // Wire segments: every SEG_LEN px of travel a new curve kicks in.
  // The dot moves DOWN the canvas; the canvas scrolls up.
  var SEG_LEN  = 160;   // px per sinusoidal segment
  var WIRE_R   = 10;    // half-width of tolerance zone (touch edge = near-miss, exceed = death)
  var DOT_R    = 6;     // dot radius
  var SCROLL_SPD = 1.8; // px per frame at start — increases with distance

  // Persistence
  var best = 0;
  try { best = +localStorage.getItem('ww_best') || 0; } catch (_) {}

  // ── game state ──
  var phase;           // 'title' | 'challenge' | 'play' | 'over' | 'cta'
  var dist;            // how far the dot has traveled (px) — the score
  var dotX;            // dot's horizontal position (canvas coords)
  var dotY;            // dot's Y on canvas (fixed around H*0.55)
  var speed;           // current scroll speed px/frame
  var camY;            // scroll offset
  var pressed;         // is pointer/key currently held?
  var runStartTs;
  var dareBeaten = false;
  var overAt = 0, challengeAt = 0, ctaAt = 0;
  var finalScore = 0;

  // juice
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var flashes = [];    // {txt, color, size, x, y, t}
  var particles = [];  // death sparks

  // wire state — we generate segments ahead and cache them
  // each segment: { startDist, amp, freq, phase, cx, cy }
  // wire centerX at dist d = wireX(d)
  var segs = [];

  function genSeg(startDist) {
    var prevAmp = segs.length ? segs[segs.length - 1].amp : 0;
    // amplitude grows with distance, capped
    var maxAmp = Math.min(80, 20 + startDist * 0.06);
    var amp   = prevAmp * 0.5 + (rng() * maxAmp * 0.7 + maxAmp * 0.3);
    var freq  = rng() * 0.012 + 0.006;    // oscillations per px
    var ph    = rng() * Math.PI * 2;
    // center bias: wire center drifts but stays within W*0.15 ... W*0.85
    var prevC = segs.length ? segs[segs.length - 1].cx : W / 2;
    var drift = (rng() - 0.5) * 60;
    var cx2   = Math.max(W * 0.2, Math.min(W * 0.8, prevC + drift));
    segs.push({ startDist: startDist, amp: amp, freq: freq, ph: ph, cx: cx2 });
  }

  function wireX(d) {
    // find which segment d falls in
    var seg = segs[0];
    for (var i = segs.length - 1; i >= 0; i--) {
      if (d >= segs[i].startDist) { seg = segs[i]; break; }
    }
    var local = d - seg.startDist;
    return seg.cx + Math.sin(seg.freq * local + seg.ph) * seg.amp;
  }

  // wireX at canvas Y given camY
  function wireCX(canvasY) {
    var d = dist + (H * 0.55 - canvasY);  // how far "ahead" this Y is
    return wireX(d);
  }

  function initWire() {
    segs = [];
    // first segment: straight-ish to ease the player in
    segs.push({ startDist: 0, amp: 8, freq: 0.005, ph: 0, cx: W / 2 });
    for (var i = 1; i <= 6; i++) genSeg(i * SEG_LEN);
  }

  function ensureSegsAhead() {
    var lastSeg = segs[segs.length - 1];
    while (lastSeg.startDist < dist + H * 1.5) {
      genSeg(lastSeg.startDist + SEG_LEN);
      lastSeg = segs[segs.length - 1];
    }
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 900))));
  }

  function cmScore(score) {
    return Math.round(score / 10); // 10px = 1cm for display
  }

  // ── new game ──
  function newGame() {
    phase = 'title';
    dist = 0; camY = 0; speed = SCROLL_SPD;
    dotX = W / 2; dotY = H * 0.55;
    pressed = false;
    dareBeaten = false;
    hitStop = 0; shakeAmt = 0; zoom = 1;
    flashes = []; particles = [];
    rng = mulberry32(SEED);
    initWire();

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1300);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    dotX = wireX(0);
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    finalScore = cmScore(dist);
    shakeAmt = 10;
    var mag = Math.min(0.2 + dist / 5000, 1);
    if (window.J) { J.death(mag); if (finalScore > cmScore(best)) setTimeout(function () { J.fanfare(); }, 450); }
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = dist > best;
    if (newBest) { best = dist; try { localStorage.setItem('ww_best', String(best)); } catch (_) {} }
    if (DEMO) { window.__demoScore = finalScore; }
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && finalScore >= SHARE.dare) {
      dareBeaten = true;
    }
    spawnDeathParticles();
    if (window.LOOP) LOOP.emit('game_over', { score: finalScore, dur_s: +(dur).toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2500);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 700);
    }
  }

  function resetRun() {
    dist = 0; camY = 0; speed = SCROLL_SPD;
    dotX = W / 2; dotY = H * 0.55;
    pressed = false; dareBeaten = false;
    flashes = []; particles = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    rng = mulberry32(SEED + botRunsDone * 7);
    initWire();
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function spawnDeathParticles() {
    for (var i = 0; i < 20; i++) {
      var angle = rng() * Math.PI * 2;
      var spd   = rng() * 3 + 1;
      particles.push({
        x: dotX, y: dotY,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
        r: rng() * 4 + 2,
        color: [VERM, GOLD, TEAL][Math.floor(rng() * 3)],
        life: 1.0
      });
    }
  }

  function flash(txt, color, size, x, y) {
    flashes.push({ txt: txt, color: color, size: size, x: x || W / 2, y: y || H * 0.4, t: 0 });
  }

  // ── deviation & near-miss logic ──
  var lastNearMiss = -999;   // dist at last near_miss event
  var tensionX = 0;          // 0..1 for J.tension

  function checkDeviation() {
    var wx = wireX(dist);
    var dev = Math.abs(dotX - wx);
    var r = dev / WIRE_R;    // 0 = centered, 1 = edge, >1 = death

    // tension rises with deviation
    tensionX = Math.min(1, r * 0.8 + dist / 10000 * 0.2);
    if (window.J) J.tension(tensionX);

    if (r >= 1.0) {
      // death
      gameOver();
      return;
    }
    if (r > 0.7 && dist - lastNearMiss > 200) {
      lastNearMiss = dist;
      if (window.J) J.near();
      flash('SO CLOSE', VERM, 36, W / 2, H * 0.35);
      shakeAmt = Math.max(shakeAmt, 4);
      if (window.LOOP) LOOP.emit('near_miss', { dist: Math.round(dist), r: +r.toFixed(3) });
    }

    // milestone rewards every 100cm
    var cm = cmScore(dist);
    var prevCm = cmScore(dist - speed);
    if (Math.floor(cm / 100) > Math.floor(prevCm / 100) && cm > 0) {
      hitStop = 5;
      zoom = 1.025;
      if (window.J) J.gold();
      flash(cm + 'cm', GOLD, 48, W / 2, H * 0.38);
      if (window.LOOP) LOOP.emit('milestone', { cm: cm });
    } else if (Math.floor(cm / 20) > Math.floor(prevCm / 20) && cm > 0) {
      if (window.J) J.hit(Math.floor(cm / 20));
      flash('+' + cm + 'cm', TEAL, 32, W / 2, H * 0.4);
      if (window.LOOP) LOOP.emit('checkpoint', { cm: cm });
    }

    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && cm > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(cm);
    }
  }

  // ── input ──
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // Holding shifts the dot RIGHT; not holding drifts dot LEFT (wire pulls it back)
  // This gives a "steady hold" mechanic
  var HOLD_FORCE  =  2.2;    // px/frame rightward when held
  var DRIFT_FORCE = -1.1;    // px/frame leftward when not held (gravity back to center)
  var DOT_MAX_VX  = 3.5;
  var dotVX = 0;

  function pointerDown(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: finalScore, unit: 'cm' }); return;
      }
      resetRun(); return;
    }
    pressed = true;
  }
  function pointerUp() {
    if (DEMO || BOT) return;
    pressed = false;
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    pointerDown((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointerup', pointerUp);
  window.addEventListener('pointercancel', pointerUp);
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') { e.preventDefault(); pointerDown(); } });
  window.addEventListener('keyup',   function (e) { if (e.code === 'Space') pointerUp(); });

  // ── demo / bot autopilots ──
  // Demo: follow the wire with human-feeling hesitation + one near-miss + final fail
  var demoState = 'normal'; // 'normal' | 'near' | 'fail'
  var demoNearAt = 1400;    // dist at which we start the near-fail
  var demoFailAt = 1900;    // dist at which we deliberately overshoot
  var demoHesitateTimer = 0;
  var demoHold = false;

  var botRunsDone = 0;
  var botErr = 0;          // current bot target offset from wire center
  var botErrTimer = 0;

  function autopilot(dt) {
    if (!state_play()) return;
    var wx = wireX(dist);

    if (DEMO) {
      // hesitation: occasionally pause input for a beat
      demoHesitateTimer -= dt;
      if (demoHesitateTimer < 0 && rng() < 0.012) {
        demoHesitateTimer = 8 + rng() * 14;
      }
      var hesitating = demoHesitateTimer > 0;

      if (dist > demoFailAt) {
        // deliberate fail: push far right
        demoHold = true;
        return;
      }
      if (dist > demoNearAt && demoState !== 'fail') {
        demoState = 'near';
        // near-fail: overshoot slightly then rescue
        var target = wx + WIRE_R * 0.8;
        demoHold = dotX < target;
        // after 200px of near-miss, go back to center
        if (dist > demoNearAt + 220) demoState = 'rescue';
        return;
      }
      if (demoState === 'rescue') {
        // rescue: aim for center
        demoHold = dotX < wx;
        if (Math.abs(dotX - wx) < 2) demoState = 'normal2';
        return;
      }
      if (!hesitating) {
        // normal: track center with slight human wobble
        var target2 = wx + (gauss() * 2);
        demoHold = dotX < target2;
      }
      return;
    }

    if (BOT) {
      // bot: track center with gaussian offset, change offset periodically
      botErrTimer -= dt;
      if (botErrTimer <= 0) {
        botErr = gauss() * (WIRE_R * 0.55);
        botErrTimer = 30 + rng() * 50;
      }
      var botTarget = wx + botErr;
      botHeld = dotX < botTarget;
      // bot loses eventually: after 4000px start making increasingly bad errors
      if (dist > 4000) {
        var extraErr = (dist - 4000) / 800;
        botErr = gauss() * (WIRE_R * (0.55 + extraErr));
        if (Math.abs(botErr) > WIRE_R * 1.1) {
          // this will cause death
          botHeld = botErr > 0;
        }
      }
    }
  }

  function state_play() { return phase === 'play'; }
  var botHeld = false;

  // ── update dot position ──
  function updateDot(dt) {
    var inputHeld = DEMO ? demoHold : (BOT ? botHeld : pressed);

    if (inputHeld) {
      dotVX += HOLD_FORCE * dt;
    } else {
      // when not held, spring toward wire center
      var wx = wireX(dist);
      var pull = (wx - dotX) * 0.04 * dt;
      dotVX += pull + DRIFT_FORCE * 0.3 * dt;
    }

    // clamp velocity
    dotVX = Math.max(-DOT_MAX_VX, Math.min(DOT_MAX_VX, dotVX));
    // damping
    dotVX *= Math.pow(0.88, dt);

    dotX += dotVX * dt;
    // clamp to canvas bounds
    dotX = Math.max(DOT_R, Math.min(W - DOT_R, dotX));
  }

  // ── render helpers ──
  function drawWire(scrollOffset) {
    // draw wire segments visible on screen
    var topDist    = dist - H * 0.55;
    var bottomDist = dist + H * 0.45;

    cx.lineWidth = WIRE_R * 2;
    cx.lineCap   = 'round';

    // glow trail: color based on deviation
    var wx = wireX(dist);
    var dev = Math.abs(dotX - wx) / WIRE_R;
    var danger = Math.min(1, dev);
    var r = Math.round(46 + danger * (232 - 46));
    var g = Math.round(197 - danger * (197 - 80));
    var b = Math.round(182 - danger * (182 - 46));
    cx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',0.35)';
    cx.beginPath();
    var step = 4;
    for (var d = topDist; d <= bottomDist; d += step) {
      var wX = wireX(d);
      var cY  = dotY - (d - dist);
      if (d === topDist) cx.moveTo(wX, cY);
      else cx.lineTo(wX, cY);
    }
    cx.stroke();

    // inner wire (bright)
    cx.lineWidth = 2;
    cx.strokeStyle = 'rgba(255,255,255,0.7)';
    cx.beginPath();
    for (var d2 = topDist; d2 <= bottomDist; d2 += step) {
      var wX2 = wireX(d2);
      var cY2 = dotY - (d2 - dist);
      if (d2 === topDist) cx.moveTo(wX2, cY2);
      else cx.lineTo(wX2, cY2);
    }
    cx.stroke();

    // danger highlight near where dot is
    if (dev > 0.5) {
      cx.lineWidth = 2.5;
      cx.strokeStyle = 'rgba(232,80,46,' + (dev - 0.5) * 2 * 0.8 + ')';
      cx.beginPath();
      var dFrom = dist - 30, dTo = dist + 30;
      for (var d3 = dFrom; d3 <= dTo; d3 += 2) {
        var wX3 = wireX(d3);
        var cY3 = dotY - (d3 - dist);
        if (d3 === dFrom) cx.moveTo(wX3, cY3);
        else cx.lineTo(wX3, cY3);
      }
      cx.stroke();
    }
  }

  function drawDot() {
    var wx = wireX(dist);
    var dev = Math.abs(dotX - wx) / WIRE_R;
    // pulsing glow intensity based on deviation
    var glowA = 0.25 + dev * 0.55;

    // outer glow
    var grad = cx.createRadialGradient(dotX, dotY, 0, dotX, dotY, DOT_R * 2.8);
    grad.addColorStop(0, 'rgba(46,197,182,' + glowA + ')');
    grad.addColorStop(1, 'rgba(46,197,182,0)');
    cx.fillStyle = grad;
    cx.beginPath();
    cx.arc(dotX, dotY, DOT_R * 2.8, 0, Math.PI * 2);
    cx.fill();

    // dot
    cx.beginPath();
    cx.arc(dotX, dotY, DOT_R, 0, Math.PI * 2);
    cx.fillStyle = dev < 0.5 ? TEAL : VERM;
    cx.fill();
    cx.strokeStyle = '#fff';
    cx.lineWidth = 1.5;
    cx.stroke();
  }

  function drawParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.vy += 0.15 * dt;
      p.x  += p.vx * dt;
      p.y  += p.vy * dt;
      p.life -= 0.025 * dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      cx.globalAlpha = p.life;
      cx.beginPath();
      cx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      cx.fillStyle = p.color;
      cx.fill();
      cx.globalAlpha = 1;
    }
  }

  function drawFlashes(dt) {
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }
  }

  // ── frame loop ──
  var last = performance.now();

  function frame(now) {
    requestAnimationFrame(frame);
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // ── update ──
    if (hitStop > 0) {
      hitStop -= dt;
      // don't update game sim during hit-stop
    } else if (phase === 'play') {
      dist   += speed * dt;
      speed   = SCROLL_SPD + dist * 0.0003;   // gentle ramp
      speed   = Math.min(speed, 4.0);

      ensureSegsAhead();
      autopilot(dt);
      updateDot(dt);
      checkDeviation();
    } else if (phase === 'over' || phase === 'cta') {
      // particles still move
    }

    // ── draw ──
    cx.save();

    // juice transforms
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.83, dt);
    zoom     += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    if (phase === 'play' || phase === 'over') {
      drawWire();
      drawParticles(dt);
      drawDot();
    }

    // score display
    if (phase === 'play') {
      var cm = cmScore(dist);
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(cm + 'cm', W / 2, 88);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + cmScore(best) + 'cm', W / 2, 112);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + 'cm' + (SHARE.by ? ' — ' + SHARE.by : ''), W / 2, 136);
      }
    }

    // challenge card (demo beat 1)
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('DISTANCE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 80px -apple-system, Helvetica, Arial';
      cx.fillText('183cm', W / 2, 390);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 420);
    }

    // title
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('WIRE WALK', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 16px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillText("HOLD to guide. let go to drift.", W / 2, 330);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText("don't touch the wire", W / 2, 360);
    }

    drawFlashes(dt);

    // game over card
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('TOUCHED.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(finalScore + 'cm', W / 2, 335);
      var pt = pctTop(finalScore);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 378);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 402);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 450);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA
    if (phase === 'cta') {
      var t  = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('WIRE WALK', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('went ' + (window.__demoScore || 183) + 'cm. your hand steadier?', W / 2, 335);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 183) + 'cm', W / 2, 402);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 436);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
