<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);

  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 8))));

    hitStop = isTarget ? 10 : 3;
    zoom = isTarget ? 1.04 : 1.015;
    flash(isTarget ? 'FOUND IT!' : '+' + (isTarget ? 25 : 10), isTarget ? GOLD : TEAL, isTarget ? 52 : 34);
    for (var i = 0; i < 10; i++) {
      particles.push({
        x: L.x, y: L.y,
        vx: (rng() - 0.5) * 6, vy: (rng() - 0.5) * 6,
        life: 1, color: L.color
      });

    if (window.LOOP) LOOP.emit('spot_revealed', { n: state.score, energy: +state.energy.toFixed(1), isTarget: isTarget });

  function gameOver(reason) {

    state.overAt = performance.now();
    shakeAmt = reason === 'dead' ? 10 : 6;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(reason === 'dead' ? Math.min(0.35 + state.score / 25, 1) : 0.25);

    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), reason: reason });

  function resetRun() {
    generateMap();
    state.score = 0; state.energy = START_ENERGY; state.combo = 0; state.phase = 'play';
    flashlight.x = W / 2; flashlight.y = H / 2 + 90; flashlight.tx = W / 2; flashlight.ty = H / 2 + 90;
    flashes = []; particles = []; botTarget = null; dareBeaten = false; nearMissCd = 0; overReason = 'dead';
    if (window.LOOP) LOOP.emit('restart', {});

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 510, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function screenToGame(ex, ey) {
    var r = cv.getBoundingClientRect();
    return { x: (ex - r.left) / scale, y: (ey - r.top) / scale };

    if (DEMO || BOT) return;

    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {

  function pointerMove(ex, ey) {
    if (DEMO || BOT) return;
    if (state.phase !== 'play') return;

  // ---- demo / bot autopilots ----
  var demoPath = [], demoIdx = 0, demoWait = 0, demoWaits = [];

  function buildDemoPath() {

    demoPath = [];

      return Math.hypot(L.x - target.x, L.y - target.y) > MAX_RADIUS * 1.35;
    }).sort(function (a, b) {
      return Math.hypot(a.x - flashlight.x, a.y - flashlight.y) - Math.hypot(b.x - flashlight.x, b.y - flashlight.y);
    })[0];
    if (!recover) recover = landmarks.slice().sort(function (a, b) {
      return Math.hypot(b.x - target.x, b.y - target.y) - Math.hypot(a.x - target.x, a.y - target.y);
    })[0];
    revealedOrder.push({ x: recover.x, y: recover.y, pause: 0 });

    for (var k = 0; k < 5; k++) {
      wander.push({ x: randRange(PAD, W - PAD), y: randRange(120, H - PAD - 40), pause: 0 });

  }

    return MIN_RADIUS + (MAX_RADIUS - MIN_RADIUS) * (state.energy / START_ENERGY);
  }

  function autopilot() {

    var speed = 5.5, r = flashlightRadius();

      if (demoWait > 0) { demoWait--; return; }

      var dist = Math.hypot(flashlight.x - wp.x, flashlight.y - wp.y);

        demoIdx++;

      }

        var L = landmarks[botTarget];
        var err = gauss() * 14;
        var ang = Math.atan2(L.y - flashlight.y, L.x - flashlight.x) + err * 0.02;

  function drawLandmark(L) {
    cx.save();
    cx.translate(L.x, L.y);
    var glow = L.type === 'target' ? 16 : 8;
    var grd = cx.createRadialGradient(0, 0, 2, 0, 0, glow);

        var a = t + i * Math.PI / 2;
        cx.moveTo(Math.cos(a) * 12, Math.sin(a) * 12);
        cx.lineTo(Math.cos(a) * 18, Math.sin(a) * 18);

  function drawMapBase() {

    cx.strokeStyle = 'rgba(46,197,182,0.08)'; cx.lineWidth = 1;
    for (var x = 30; x < W; x += 45) { cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, H); cx.stroke(); }
    for (var y = 30; y < H; y += 45) { cx.beginPath(); cx.moveTo(0, y); cx.lineTo(W, y); cx.stroke(); }

  var last = performance.now();

    var dt = Math.min((now - last) / 16.667, 3); last = now;

        drawLandmark(landmarks[j]);
        cx.globalAlpha = 1;
      }
    }
    if (!target.revealed) {
      cx.globalAlpha = 0.18;
      drawLandmark(target);
      cx.globalAlpha = 1;

    cx.strokeStyle = 'rgba(255,255,255,0.25)'; cx.lineWidth = 2;
    cx.beginPath(); cx.arc(flashlight.x, flashlight.y, rad, 0, Math.PI * 2); cx.stroke();
    cx.fillStyle = 'rgba(255,255,255,0.08)'; cx.beginPath(); cx.arc(flashlight.x, flashlight.y, rad * 0.92, 0, Math.PI * 2); cx.fill();

    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.life -= 0.025 * dt;
      cx.globalAlpha = Math.max(0, pt.life);
      cx.fillStyle = pt.color;
      cx.beginPath(); cx.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
      if (pt.life <= 0) particles.splice(p, 1);
    }

    // top HUD
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'left';
      cx.fillStyle = '#fff'; cx.font = '800 44px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, 24, 78);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('SPOTS', 24, 96);
      // battery bar
      var bx = 110, by = 54, bw = 170, bh = 12;
      cx.fillStyle = 'rgba(255,255,255,0.12)'; cx.fillRect(bx, by, bw, bh);
      var ecol = state.energy > 50 ? TEAL : (state.energy > 20 ? GOLD : VERM);
      cx.fillStyle = ecol; cx.fillRect(bx, by, bw * (state.energy / START_ENERGY), bh);
      cx.strokeStyle = 'rgba(255,255,255,0.25)'; cx.lineWidth = 1; cx.strokeRect(bx, by, bw, bh);
      cx.textAlign = 'right';
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 12px -apple-system, Helvetica, Arial';
      cx.fillText(Math.round(state.energy) + '%', bx + bw, 48);
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.textAlign = 'center';
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 124);
      }

    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;

      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;

    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('MAP UNCOVER', W / 2, 270);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('DRAG THE LIGHT', W / 2, 320); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('find the marked spot before the light dies', W / 2, 350);
    }

    // challenge card
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('17', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // game over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = overReason === 'found' ? GOLD : VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(overReason === 'found' ? 'MARKED FOUND!' : 'LIGHT DIED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' spots found', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 470);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('MAP UNCOVER', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('she found ' + (window.__demoScore || 17) + ' spots. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 17), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
