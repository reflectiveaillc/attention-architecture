(function () {

  // ── seeded RNG (mulberry32) ─────────────────────────────────────────────
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;

    { action: 'hit',  wait: 44 },   // beat 3 — confident

  var DEMO_SCORE = 7; // announced on challenge card

  function newGame() {
    state = {
      phase: 'title',   // title | challenge | play | over | cta
      score: 0,
      combo: 0,
      level: 1,
      // morph engine
      lookSeq: [],      // ordered sequence of looks for this morph cycle
      targetIdx: 0,     // which look in lookSeq is TARGET
      morphT: 0,        // 0..1 position in morph cycle
      morphMs: BASE_MORPH_MS,
      targetFrac: TARGET_FRAC,
      // for rendering: current interpolated look
      curLook: null,
      nextLook: null,
      lookProgress: 0,  // 0..1 between curLook and nextLook
      // window tracking
      inWindow: false,
      windowOpen: 0,    // time (now) when window opened
      overAt: 0,
      locked: false,    // true for a beat after correct lock (visual)
      lockedAt: 0,
    };
    flashes = [];
    dareBeaten = false;
    demoStep = 0;
    demoTimer = 0;

    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
    // human: show title
  }

  function buildLookSeq() {
    // pick 3-5 looks for this morph cycle, place target at a random slot
    var count = 3 + Math.floor(rng() * 3);  // 3..5
    var pool = LOOKS.slice();
    // shuffle pool
    for (var i = pool.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
    }
    var seq = pool.slice(0, count);
    var tIdx = Math.floor(rng() * count);
    return { seq: seq, targetIdx: tIdx };
  }

  function startRound() {
    var res = buildLookSeq();
    state.lookSeq    = res.seq;
    state.targetIdx  = res.targetIdx;
    state.morphT     = 0;
    state.lookProgress = 0;
    state.inWindow   = false;
    state.locked     = false;
    // morph speed increases each level
    var lvlPct = Math.min(1, (state.level - 1) / 12);
    state.morphMs    = BASE_MORPH_MS - (BASE_MORPH_MS - MIN_MORPH_MS) * lvlPct;
    state.targetFrac = TARGET_FRAC  - (TARGET_FRAC   - MIN_FRAC)     * lvlPct;
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0;
    state.combo = 0;
    state.level = 1;
    runStartTs  = Date.now();
    startRound();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });

  // ── tap logic ────────────────────────────────────────────────────────────
  function onTap() {
    if (state.phase !== 'play') return;
    if (state.locked) return; // already locked this round, wait for next
    if (state.inWindow) {
      // CORRECT — locked!
      lockedHit();
    } else {
      // WRONG — early or late
      wrongTap();
    }
  }

  function lockedHit() {
    state.locked  = true;
    state.lockedAt = performance.now();
    state.score++;
    state.combo++;
    state.level = 1 + Math.floor(state.score / 3);

    // how precise? measure how centered in the window
    var progress  = state.morphT;  // 0..1 in cycle
    // target window: starts at tStart, ends at tEnd (wrapping)
    // approximate center proximity
    var tLen  = state.targetFrac;
    var tStart = state.targetIdx / state.lookSeq.length;
    var tMid   = tStart + tLen / 2;
    var dist   = Math.abs(progress - tMid);
    var isPerfect = dist < tLen * 0.15;
    var isGold    = dist < tLen * 0.05 && state.combo > 2;

      if (isGold)         J.gold();
      else if (isPerfect) J.perfect(state.combo);
      else                J.hit(state.combo);
      J.tension(Math.min((state.level - 1) / 10, 1));

      if (window.J) J.fanfare();

      score: state.score, combo: state.combo,
      look: state.lookSeq[state.targetIdx].name,
      perfect: isPerfect, gold: isGold
    });

    // after brief lock pause, move to next round
    setTimeout(function () {
      if (state.phase === 'play') {
        startRound();
      }
    }, 320);
  }

  function wrongTap() {
    // tapped when not in window — game over
    shakeAmt = 8;
    if (window.J) J.death(Math.min(0.3 + state.score / 20, 1));
    flash('WRONG LOOK', VERM, 40);

  function gameOver() {
    state.phase  = 'over';
    state.overAt = performance.now();
    var newBest = state.score > best;
    if (newBest) {
      best = state.score;
      try { localStorage.setItem('fml_best', String(best)); } catch (_) {}

      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 800);

  function resetRun() {
    state.score = 0;
    state.combo = 0;
    state.level = 1;

  function autopilot(dt) {
    if (state.phase !== 'play') return;

    if (DEMO) {
      demoTimer -= dt * 16.667; // convert frame-units to ms-ish
      if (demoStep >= demoScript.length) return;
      var step = demoScript[demoStep];
      if (demoTimer > 0) return;

      var action = step.action;
      if (action === 'hit') {
        // tap in the middle of the window
        if (state.inWindow) {
          onTap();
          demoStep++;
          demoTimer = step.wait;
        }
      } else if (action === 'near') {
        // tap very close to window end — near-miss feel, but still correct
        if (state.inWindow) {
          // wait until late in window before tapping
          var tStart = state.targetIdx / state.lookSeq.length;
          var tEnd   = tStart + state.targetFrac;
          var distToEnd = (tEnd - state.morphT);
          if (distToEnd < 0.04) { // almost at the end
            onTap();
            demoStep++;
            demoTimer = step.wait;
          }
        }
      } else if (action === 'miss') {
        // tap when definitely out of window — triggers gameOver
        if (!state.inWindow && !state.locked) {
          onTap(); // wrong tap
          demoStep++;
        }
      }
      return;
    }

    if (BOT) {
      if (state.locked) return;
      // bot: tries to tap in window with ~80% accuracy, sometimes misses
      if (state.inWindow) {
        var tStart = state.targetIdx / state.lookSeq.length;
        var tMid   = tStart + state.targetFrac / 2;
        // tap near the midpoint of the window, with some noise
        var noise  = gauss() * 0.03;
        var wantT  = tMid + noise;
        if (Math.abs(state.morphT - wantT) < 0.015) {
          // sometimes bot misses (20% chance per run) after a few locks
          var missChance = botRunsDone === BOT_RUNS - 1 ? 0.35 : 0.18;
          if (rng() < missChance && state.score > 2) {
            // wait for window to close — will miss
          } else {
            onTap();
          }
        }
      } else {
        // occasionally tap out of window (mistake)
        if (!state.locked && state.score > 2 && rng() < 0.003) {
          onTap(); // wrong tap, ends run
        }
      }
    }

  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play')  { onTap(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'locks' }); return;
      }
      resetRun();

    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);

  // ── rendering helpers ────────────────────────────────────────────────────
  // Draw a procedural face mesh morphing between two looks
  // We render: oval head, eyes, brows, lips, decorative glow layer
  function lerp(a, b, t) { return a + (b - a) * t; }
  function lerpHue(a, b, t) {
    var d = b - a;
    if (d > 180) d -= 360;
    if (d < -180) d += 360;
    return (a + d * t + 360) % 360;
  }

  function drawFace(cx, x, y, lookA, lookB, t, highlightWindow, lockedRing) {
    var hue  = lerpHue(lookA.hue, lookB.hue, t);
    var brow = lerp(lookA.brows, lookB.brows, t);
    var lip  = lerp(lookA.lips, lookB.lips, t);
    var eye  = lerp(lookA.eyes, lookB.eyes, t);

    var skinH = hue, skinS = 28, skinL = 72;
    var glowA = lookA.glow, glowB = lookB.glow;

    // ── face oval ──
    var fW = 108, fH = 130;
    var grad = cx.createRadialGradient(x, y - 10, 10, x, y, fW * 0.7);
    grad.addColorStop(0, 'hsl(' + skinH + ',' + skinS + '%,' + (skinL + 8) + '%)');
    grad.addColorStop(1, 'hsl(' + skinH + ',' + skinS + '%,' + (skinL - 14) + '%)');
    cx.beginPath();
    cx.ellipse(x, y, fW / 2, fH / 2, 0, 0, Math.PI * 2);
    cx.fillStyle = grad;
    cx.fill();

    // ── filter glow aura (the "look" identifier) ──
    var auraGrad = cx.createRadialGradient(x, y, fW * 0.3, x, y, fW * 0.9);
    auraGrad.addColorStop(0, 'rgba(0,0,0,0)');
    // mix glowA and glowB by t — approximate with alpha
    cx.beginPath();
    cx.ellipse(x, y, fW / 2 + 18, fH / 2 + 18, 0, 0, Math.PI * 2);
    // glow A
    cx.globalAlpha = (1 - t) * 0.45;
    cx.strokeStyle = glowA;
    cx.lineWidth   = 12 + (1 - t) * 8;
    cx.stroke();
    // glow B
    cx.globalAlpha = t * 0.45;
    cx.strokeStyle = glowB;
    cx.lineWidth   = 12 + t * 8;
    cx.stroke();
    cx.globalAlpha = 1;

    // ── eyes ──
    var eyeY  = y - 18;
    var eyeRX = 16, eyeRY = 11 * eye;
    [-1, 1].forEach(function (side) {
      var ex = x + side * 32;
      // white
      cx.beginPath();
      cx.ellipse(ex, eyeY, eyeRX, eyeRY, 0, 0, Math.PI * 2);
      cx.fillStyle = '#fff';
      cx.fill();
      // iris
      var irisGrad = cx.createRadialGradient(ex - 2, eyeY - 2, 1, ex, eyeY, 8);
      irisGrad.addColorStop(0, 'hsl(' + hue + ',70%,55%)');
      irisGrad.addColorStop(1, 'hsl(' + hue + ',80%,28%)');
      cx.beginPath();
      cx.ellipse(ex, eyeY, 9, 9 * Math.min(eye, 1), 0, 0, Math.PI * 2);
      cx.fillStyle = irisGrad;
      cx.fill();
      // pupil
      cx.beginPath();
      cx.ellipse(ex, eyeY, 4, 4 * Math.min(eye, 1), 0, 0, Math.PI * 2);
      cx.fillStyle = '#000';
      cx.fill();
      // highlight
      cx.beginPath();
      cx.ellipse(ex - 3, eyeY - 3, 2, 2, 0, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.fill();
    });

    // ── brows ──
    var browY  = eyeY - 14 - (brow - 0.6) * 8;
    var browTilt = (brow - 0.7) * 5; // angry vs gentle
    [-1, 1].forEach(function (side) {
      var bx = x + side * 32;
      cx.beginPath();
      cx.moveTo(bx - 14, browY + side * browTilt);
      cx.quadraticCurveTo(bx, browY - brow * 4, bx + 14, browY - side * browTilt);
      cx.strokeStyle = 'hsl(' + ((hue + 30) % 360) + ',40%,28%)';
      cx.lineWidth   = 3 + brow * 2;
      cx.lineCap = 'round';
      cx.stroke();
    });

    // ── nose ──
    cx.beginPath();
    cx.moveTo(x - 7, y + 12);
    cx.quadraticCurveTo(x, y + 22, x + 7, y + 12);
    cx.strokeStyle = 'hsl(' + skinH + ',' + skinS + '%,' + (skinL - 20) + '%)';
    cx.lineWidth = 1.8;
    cx.stroke();

    // ── lips ──
    var lipY  = y + 36;
    var lipW  = 34 * (0.6 + lip * 0.4);
    var lipH  = 9 + lip * 5;
    var lipHue = (hue + 340) % 360;
    // upper lip
    cx.beginPath();
    cx.moveTo(x - lipW / 2, lipY);
    cx.bezierCurveTo(x - lipW / 4, lipY - lipH * 0.9,
                     x + lipW / 4, lipY - lipH * 0.9,
                     x + lipW / 2, lipY);
    cx.bezierCurveTo(x + lipW / 4, lipY - lipH * 0.4,
                     x - lipW / 4, lipY - lipH * 0.4,
                     x - lipW / 2, lipY);
    cx.fillStyle = 'hsl(' + lipHue + ',60%,' + (35 + lip * 20) + '%)';
    cx.fill();
    // lower lip
    cx.beginPath();
    cx.moveTo(x - lipW / 2, lipY);
    cx.bezierCurveTo(x - lipW / 3, lipY + lipH * 1.1,
                     x + lipW / 3, lipY + lipH * 1.1,
                     x + lipW / 2, lipY);
    cx.fillStyle = 'hsl(' + lipHue + ',55%,' + (40 + lip * 18) + '%)';
    cx.fill();

    // ── filter label (look name) ──
    cx.textAlign = 'center';
    var labelAlpha = 1;
    cx.globalAlpha = labelAlpha;
    cx.font = '900 13px Menlo, monospace';
    cx.fillStyle = 'hsl(' + hue + ',70%,75%)';
    cx.fillText(lookA.name, x, y + fH / 2 + 22);
    cx.globalAlpha = 1;

    // ── lock ring (when in target window) ──
    if (highlightWindow) {
      var pulse = 0.65 + 0.35 * Math.sin(performance.now() / 90);
      cx.beginPath();
      cx.ellipse(x, y, fW / 2 + 6, fH / 2 + 6, 0, 0, Math.PI * 2);
      cx.strokeStyle = GOLD;
      cx.lineWidth   = 4;
      cx.globalAlpha = pulse;
      cx.stroke();
      cx.globalAlpha = 1;
    }

    // ── locked confirmation ring ──
    if (lockedRing > 0) {
      cx.beginPath();
      cx.ellipse(x, y, fW / 2 + 10, fH / 2 + 10, 0, 0, Math.PI * 2);
      cx.strokeStyle = TEAL;
      cx.lineWidth   = 5;
      cx.globalAlpha = lockedRing;
      cx.stroke();
      cx.globalAlpha = 1;
    }
  }

  // Draw the target look in the corner (what to aim for)
  function drawTarget(target) {
    var tx = 72, ty = 120, r = 50;
    // bg circle
    cx.beginPath();
    cx.arc(tx, ty, r, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(242,177,52,0.10)';
    cx.strokeStyle = GOLD;
    cx.lineWidth = 1.5;
    cx.fill();
    cx.stroke();
    // mini face for target
    cx.save();
    cx.beginPath();
    cx.arc(tx, ty, r - 2, 0, Math.PI * 2);
    cx.clip();
    cx.scale(0.38, 0.38);
    var sx = tx / 0.38, sy = ty / 0.38;
    drawFace(cx, sx, sy, target, target, 0, false, 0);
    cx.restore();
    cx.textAlign = 'center';
    cx.font = '700 10px Menlo, monospace';
    cx.fillStyle = GOLD;
    cx.fillText('TARGET', tx, ty + r + 14);
    cx.font = '900 12px Menlo, monospace';
    cx.fillStyle = '#fff';
    cx.fillText(target.name, tx, ty + r + 28);
  }

  // Draw the morph progress bar (shows where we are in cycle)
  function drawMorphBar(morphT, targetIdx, seqLen, targetFrac) {
    var bx = 40, by = H - 110, bw = W - 80, bh = 8;
    // background
    cx.fillStyle = 'rgba(255,255,255,0.10)';
    cx.beginPath();
    cx.roundRect ? cx.roundRect(bx, by, bw, bh, 4) : cx.fillRect(bx, by, bw, bh);
    cx.fill();
    // target window highlight
    var tStart = (targetIdx / seqLen) * bw;
    var tLen   = targetFrac * bw;
    cx.fillStyle = 'rgba(242,177,52,0.4)';
    cx.beginPath();
    cx.roundRect ? cx.roundRect(bx + tStart, by, tLen, bh, 4) : cx.fillRect(bx + tStart, by, tLen, bh);
    cx.fill();
    // morph cursor
    var cur = morphT * bw;
    cx.fillStyle = '#fff';
    cx.beginPath();
    cx.arc(bx + cur, by + bh / 2, 6, 0, Math.PI * 2);
    cx.fill();
    // label
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.fillText('TAP WHEN IT MATCHES', W / 2, by + bh + 18);
  }

  // ── main loop ─────────────────────────────────────────────────────────────
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3);
    last = now;

    // ── update morph state ──
    if (state.phase === 'play' && !state.locked) {
      var cycleFrac = dt * 16.667 / state.morphMs;
      state.morphT = (state.morphT + cycleFrac) % 1;

      // which look are we closest to?
      var seqLen = state.lookSeq.length;
      var slot   = state.morphT * seqLen;
      var curIdx = Math.floor(slot) % seqLen;
      var nxtIdx = (curIdx + 1) % seqLen;
      state.lookProgress = slot - Math.floor(slot);
      state.curLook  = state.lookSeq[curIdx];
      state.nextLook = state.lookSeq[nxtIdx];

      // check if cursor is in target window
      var tStart = state.targetIdx / seqLen;
      var tEnd   = tStart + state.targetFrac;
      var wasIn  = state.inWindow;
      state.inWindow = (state.morphT >= tStart && state.morphT < tEnd);

      // near-miss: just left window without tapping
      if (wasIn && !state.inWindow) {
        if (window.J) J.near();
        flash('SO CLOSE', VERM, 34);
        if (window.LOOP) LOOP.emit('near_miss', { score: state.score });
        // missed the window — game over (timer-based failure)
        setTimeout(function () {
          if (state.phase === 'play' && !state.locked) {
            // give one more pass before dying — increase tension
            if (window.J) J.tension(0.9);
          }
        }, 100);
      }

      // rising tension as level climbs
      if (state.inWindow && window.J) {
        J.tension(Math.min((state.level - 1) / 10, 1));
      }

      if (hitStop > 0) {
        hitStop -= dt;
      } else {
        autopilot(dt);
      }
    }

    // ── juice transforms ──
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom     += (1 - zoom) * 0.14 * dt;

    // ── background ──
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // ── title screen ──
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('FACE MORPH LOCK', W / 2, 280);
      cx.fillStyle = VERM;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = pulse;
      cx.fillText('TAP WHEN IT MATCHES', W / 2, 330);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('lock the look. beat the speed.', W / 2, 365);
    }

    // ── challenge card (demo beat 1) ──
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(DEMO_SCORE), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 432);
    }

    // ── play screen ──
    if (state.phase === 'play') {
      // score + level
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(String(state.score), W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.40)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 144);
      }

      // target look indicator (top-left mini face)
      if (state.lookSeq.length > 0) {
        drawTarget(state.lookSeq[state.targetIdx]);
      }

      // main face (morph)
      var lockedRingA = 0;
      if (state.locked) {
        var elapsed = now - state.lockedAt;
        lockedRingA = Math.max(0, 1 - elapsed / 320);
      }

      if (state.curLook && state.nextLook) {
        drawFace(cx, W / 2, H / 2 + 20,
                 state.curLook, state.nextLook,
                 state.lookProgress,
                 state.inWindow && !state.locked,
                 lockedRingA);
      }

      // morph progress bar at bottom
      if (state.lookSeq.length > 0) {
        drawMorphBar(state.morphT, state.targetIdx,
                     state.lookSeq.length, state.targetFrac);
      }

      // combo indicator
      if (state.combo > 1) {
        var comboScale = Math.min(1 + (state.combo - 1) * 0.12, 2.0);
        cx.textAlign = 'right';
        cx.fillStyle = state.combo > 4 ? GOLD : TEAL;
        cx.font = '900 ' + Math.round(20 * comboScale) + 'px -apple-system, Helvetica, Arial';
        cx.globalAlpha = 0.85;
        cx.fillText('×' + state.combo, W - 28, 96);
        cx.globalAlpha = 1;
      }
    }

    // ── game over / score card ──
    if (state.phase === 'over') {
      // dark overlay
      cx.fillStyle = 'rgba(11,13,18,0.60)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG LOOK.', W / 2, 300);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' locks', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD;
      cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 390);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('faster than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 270);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE LOOK', W / 2, 460);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD;
        cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect
          ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23)
          : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill();
        cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // ── demo CTA card ──
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('FACE MORPH LOCK', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || DEMO_SCORE) + ' locks. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 230);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || DEMO_SCORE), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 444);
      cx.globalAlpha = 1;
    }

    // ── floating reward flashes ──
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // ── mute toggle (human only) ──
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
