<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // Seeded RNG (mulberry32) — demo clips and bot runs are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // Calm palette: teal + soft tones, no vermillion
  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var SOFT_MINT = '#5fbfa8', SOFT_SKY = '#4aa8c2', SOFT_LAV = '#8f8bd4';

  // Grid layout
  var COLS = 5, ROWS = 6, TOTAL = COLS * ROWS;
  var R = 34;
  var MARGIN_TOP = 140, MARGIN_BOTTOM = 40;
  var cellW = W / COLS;
  var cellH = (H - MARGIN_TOP - MARGIN_BOTTOM) / ROWS;

  // Wave / session settings
  var TARGET_WAVES = 3;
  var REFILL_STAGGER = 4;          // frames between wave-refill bubbles
  var POP_TTL = 10;                // frames for pop micro-burst

  // State
  var state, bubbles, flashes, runStartTs, ctaAt, overAt;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var best = 0, dareBeaten = false;
  try { best = +localStorage.getItem('bg_best') || 0; } catch (_) {}

  function posFor(i) {
    var c = i % COLS, r = Math.floor(i / COLS);
    return { x: (c + 0.5) * cellW, y: MARGIN_TOP + (r + 0.5) * cellH };
  }

  function makeBubble(i, alive) {
    return {
      i: i,
      alive: alive,
      scale: alive ? 0 : 0,
      growing: alive,
      popping: false,
      popT: 0,
      parts: []
    };
  }

  function newGame() {
    bubbles = [];
    for (var i = 0; i < TOTAL; i++) bubbles.push(makeBubble(i, true));
    state = {
      phase: (DEMO || BOT) ? 'play' : 'title',
      wave: 0,
      score: 0,
      refillQueue: [],
      refillTimer: 0
    };
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;

    if (DEMO) { demoIdx = 0; demoWait = 55; }
    if (BOT)  { botTimer = 0; }

    if (DEMO || BOT) { startRun(); }
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- Bubble juice: spawn, pop, refill, wave clear ----
  function spawnAt(i) {
    if (bubbles[i].alive) return;
    bubbles[i] = makeBubble(i, true);
  }

  function popBubble(b) {
    if (!b.alive || b.popping) return;
    b.popping = true;
    b.alive = false;
    b.popT = 0;
    b.parts = [];
    var p = posFor(b.i);
    for (var k = 0; k < 7; k++) {
      var a = rng() * Math.PI * 2;
      var sp = 2 + rng() * 3.5;
      b.parts.push({ x: p.x, y: p.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0 });
    }

    state.score++;
    var step = Math.min(state.score, 12);
    if (window.J) J.calm(step);
    flash('+1', TEAL, 22, p.x, p.y - R);
    if (window.LOOP) LOOP.emit('bubble_popped', { n: state.score });

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 40);
      if (window.J) J.calm(0);
      SHARE.beaten(state.score);
    }

    checkWaveClear();
  }

  function checkWaveClear() {
    var alive = 0;
    for (var i = 0; i < TOTAL; i++) if (bubbles[i].alive && !bubbles[i].popping) alive++;
    if (alive === 0 && state.wave < TARGET_WAVES) waveClear();
  }

  function waveClear() {
    state.wave++;
    hitStop = 8;
    zoom = 1.025;
    shakeAmt = 2.5;
    if (window.J) J.calm(state.wave + 6);
    flash(state.wave >= TARGET_WAVES ? 'ALL CLEAR' : 'WAVE ' + state.wave, TEAL, 44);
    if (window.LOOP) LOOP.emit('wave_cleared', { n: state.wave });

    if (state.wave >= TARGET_WAVES) {
      setTimeout(gameOver, 420);
      return;
    }

    // Refill every empty cell in a soft wave
    var empties = [];
    for (var i = 0; i < TOTAL; i++) if (!bubbles[i].alive) empties.push(i);
    for (var i = empties.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var t = empties[i]; empties[i] = empties[j]; empties[j] = t;
    }
    state.refillQueue = empties;
    state.refillTimer = REFILL_STAGGER;
  }

  function gameOver() {
    if (state.phase === 'over' || state.phase === 'cta') return;
    state.phase = 'over';
    overAt = performance.now();
    shakeAmt = 3;
    var dur = (Date.now() - runStartTs) / 1000;
    if (state.score > best) {
      best = state.score;
      try { localStorage.setItem('bg_best', String(best)); } catch (_) {}
    }
    window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1600);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 900);
      }
    }
  }

  function resetRun() {
    bubbles = [];
    for (var i = 0; i < TOTAL; i++) bubbles.push(makeBubble(i, true));
    state.wave = 0;
    state.score = 0;
    state.refillQueue = [];
    state.refillTimer = 0;
    state.phase = 'play';
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    if (DEMO) { demoIdx = 0; demoWait = 40; }
    if (BOT) { botTimer = 0; }
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size, x, y) {
    flashes.push({ txt: txt, color: color, size: size, x: x || W / 2, y: y || H / 2, t: 0 });
  }

  // ---- Input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 110, y: 500, w: 220, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function hitBubble(x, y) {
    for (var i = 0; i < TOTAL; i++) {
      var b = bubbles[i];
      if (!b.alive || b.popping) continue;
      var p = posFor(i);
      var dx = x - p.x, dy = y - p.y;
      if (dx * dx + dy * dy <= R * R) return b;
    }
    return null;
  }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'popped' }); return;
      }
      resetRun(); return;
    }
    if (state.phase !== 'play') return;
    var b = hitBubble(x, y);
    if (b) popBubble(b);
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- Demo / Bot autopilot ----
  var demoIdx = 0, demoWait = 0;
  var demoWaits = [12, 9, 14, 10, 8, 13, 11, 9, 15, 10, 8, 12, 10, 9, 14, 11, 8, 12, 10, 9, 13, 11, 10, 8, 14, 10, 9, 12, 11, 10];

  var botRunsDone = 0, botTimer = 0;
  var BOT_INTERVAL = 7;

  function autopilot() {
    if (state.phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait -= 1; return; }
      if (state.wave >= TARGET_WAVES) return;
      var alive = [];
      for (var i = 0; i < TOTAL; i++) if (bubbles[i].alive && !bubbles[i].popping) alive.push(bubbles[i]);
      if (!alive.length) return;
      var pick = alive[Math.floor(rng() * alive.length)];
      popBubble(pick);
      demoIdx++;
      demoWait = demoWaits[demoIdx % demoWaits.length] || 10;
    } else if (BOT) {
      botTimer -= 1;
      if (botTimer <= 0) {
        botTimer = BOT_INTERVAL + Math.floor(rng() * 5);
        var alive = [];
        for (var i = 0; i < TOTAL; i++) if (bubbles[i].alive && !bubbles[i].popping) alive.push(bubbles[i]);
        if (alive.length && rng() < 0.85) {
          popBubble(alive[Math.floor(rng() * alive.length)]);
        }
      }
    }
  }

  // ---- Render helpers ----
  function roundRect(ctx, x, y, w, h, r) {
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); return; }
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawBubble(b, now) {
    var p = posFor(b.i);
    if (b.growing) {
      b.scale += (1 - b.scale) * 0.14;
      if (Math.abs(1 - b.scale) < 0.005) { b.scale = 1; b.growing = false; }
    }
    var s = b.scale;

    if (b.popping) {
      var prog = Math.min(1, b.popT / POP_TTL);
      var rr = R * (1 + prog * 0.55) * s;
      cx.beginPath();
      cx.arc(p.x, p.y, rr, 0, Math.PI * 2);
      cx.strokeStyle = 'rgba(46,197,182,' + (0.7 * (1 - prog)) + ')';
      cx.lineWidth = 2 + prog * 2;
      cx.stroke();
      // inner puff
      cx.beginPath();
      cx.arc(p.x, p.y, rr * 0.6, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(255,255,255,' + (0.2 * (1 - prog)) + ')';
      cx.fill();
      return;
    }

    var r = R * s;
    cx.save();
    cx.shadowColor = TEAL;
    cx.shadowBlur = 8;
    var g = cx.createRadialGradient(p.x - r * 0.35, p.y - r * 0.35, r * 0.15, p.x, p.y, r);
    g.addColorStop(0, 'rgba(255,255,255,0.20)');
    g.addColorStop(0.5, 'rgba(46,197,182,0.28)');
    g.addColorStop(1, 'rgba(46,197,182,0.10)');
    cx.beginPath();
    cx.arc(p.x, p.y, r, 0, Math.PI * 2);
    cx.fillStyle = g;
    cx.fill();
    cx.shadowBlur = 0;
    cx.strokeStyle = 'rgba(46,197,182,0.55)';
    cx.lineWidth = 2;
    cx.stroke();

    // soft specular highlight
    cx.beginPath();
    cx.arc(p.x - r * 0.35, p.y - r * 0.35, r * 0.18, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(255,255,255,0.28)';
    cx.fill();
    cx.restore();
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Hit-stop: decay every frame; only freeze sim updates (not draw juice)
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      autopilot();

      // Wave refill
      if (state.refillQueue.length) {
        state.refillTimer -= dt;
        if (state.refillTimer <= 0) {
          spawnAt(state.refillQueue.shift());
          state.refillTimer = REFILL_STAGGER;
        }
      }
    }

    // Update pop / particle physics
    for (var i = 0; i < TOTAL; i++) {
      var b = bubbles[i];
      if (b.popping) {
        b.popT += dt;
        for (var k = 0; k < b.parts.length; k++) {
          var pt = b.parts[k];
          pt.life += dt;
          pt.x += pt.vx * dt;
          pt.y += pt.vy * dt;
          pt.vy += 0.12 * dt;
        }
        if (b.popT > POP_TTL) { b.popping = false; b.parts = []; }
      }
    }

    // Juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.11 * dt;

    // Background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createRadialGradient(W / 2, H * 0.45, 0, W / 2, H * 0.45, 300);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // Bubbles
    for (var i = 0; i < TOTAL; i++) drawBubble(bubbles[i], now);

    // Pop particles
    for (var i = 0; i < TOTAL; i++) {
      var b = bubbles[i];
      if (!b.parts.length) continue;
      var p = posFor(i);
      for (var k = 0; k < b.parts.length; k++) {
        var pt = b.parts[k];
        var a = Math.max(0, 1 - pt.life / 18);
        if (a <= 0) continue;
        cx.globalAlpha = a;
        cx.fillStyle = TEAL;
        cx.beginPath();
        cx.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2);
        cx.fill();
      }
      cx.globalAlpha = 1;
    }

    // Top score / progress
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 90);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('wave ' + (Math.min(state.wave + 1, TARGET_WAVES)) + ' of ' + TARGET_WAVES + ' · best ' + best, W / 2, 116);

      // Incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 146);
      }
    }

    // Title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(46,197,182,0.55)';
      cx.font = '300 13px Menlo, monospace';
      cx.fillText('BUBBLE GRID', W / 2, 260);
      cx.fillStyle = '#fff';
      cx.font = '800 38px -apple-system, Helvetica, Arial';
      cx.fillText('pop every bubble', W / 2, 308);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '400 16px -apple-system, Helvetica, Arial';
      cx.fillText('three waves of soft pops', W / 2, 342);
      var pulse = 0.5 + 0.5 * Math.sin(now / 550);
      cx.globalAlpha = 0.45 + 0.3 * pulse;
      cx.fillStyle = TEAL;
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('tap to begin', W / 2, 390);
      cx.globalAlpha = 1;
    }

    // Game over overlay
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.62)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '700 36px -apple-system, Helvetica, Arial';
      cx.fillText('soft reset.', W / 2, 300);
      cx.fillStyle = '#fff';
      cx.font = '600 22px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' popped', W / 2, 344);
      if (state.score === best && best > 0) {
        cx.fillStyle = GOLD;
        cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText('new best', W / 2, 372);
      }
      if (!DEMO && !BOT) {
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD;
        cx.lineWidth = 1.5;
        roundRect(cx, SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);

        var p2 = 0.6 + 0.4 * Math.sin(now / 320);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '500 15px -apple-system, Helvetica, Arial';
        cx.fillText('tap to pop again', W / 2, 460);
        cx.globalAlpha = 1;
      }
    }

    // Demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(46,197,182,0.6)';
      cx.font = '300 13px Menlo, monospace';
      cx.fillText('BUBBLE GRID', W / 2, 278);
      cx.fillStyle = '#fff';
      cx.font = '700 36px -apple-system, Helvetica, Arial';
      cx.fillText('all three waves cleared.', W / 2, 330);
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '400 17px -apple-system, Helvetica, Arial';
      cx.fillText('your thumb knows this pop.', W / 2, 368);
      var p3 = 0.7 + 0.3 * Math.sin(now / 340);
      cx.fillStyle = TEAL;
      cx.globalAlpha = ease * p3;
      cx.font = '700 22px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 430);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 460);
      cx.globalAlpha = 1;
    }

    // Floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 1.1);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
