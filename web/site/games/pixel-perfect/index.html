  // ---- Pattern / level logic ----
  // For each level we pick a pattern and build an ordered list of pixel indices to place
  // The cursor sweeps between pixels sequentially; the player must tap at each target
  function pickPattern(level) {
    var idx = Math.floor(rng() * PATTERNS.length);
    var pat = PATTERNS[idx];
    // collect filled pixel indices in raster order
    var targets = [];
    for (var i = 0; i < pat.pixels.length; i++) {
      if (pat.pixels[i] === 1) targets.push(i);
    }
    // shuffle targets so placement order isn't top-left obvious
    for (var j = targets.length - 1; j > 0; j--) {
      var k = Math.floor(rng() * (j + 1));
      var tmp = targets[j]; targets[j] = targets[k]; targets[k] = tmp;
    }
    // Tolerance: starts wide, shrinks per level. Min 2 frames.
    var tolerance = Math.max(2, 18 - level * 1.5);
    return { pat: pat, targets: targets, tolerance: tolerance, color: PALETTE[level % PALETTE.length] };
  }

  // Cursor sweeps across all cells (not just targets) for challenge
  // Speed increases each level
  function cursorSpeed(level) {
    return 0.4 + level * 0.18;  // cells per frame
  }

  function newGame() {
    state = {

      level: 0,
      score: 0,

      missed: false,
      overAt: 0,
      ctaAt: 0,
      levelData: null,
      cursor: 0,         // current cell index (float, wraps)
      cursorDir: 1,
      pixelsLeft: 0,     // remaining pixels to place in current level

  function startRun() {
    state.phase = 'play';

  function startLevel() {
    var ld = pickPattern(state.level);

    state.cursor = 0;
    state.cursorDir = 1;
    state.pixelsLeft = ld.targets.length;

  function placeTap() {
    if (state.phase !== 'play') return;
    var ld = state.levelData;
    if (!ld) return;
    var totalCells = ld.pat.grid * ld.pat.grid;
    var curCell = Math.floor(state.cursor) % totalCells;
    if (curCell < 0) curCell += totalCells;

    var dist = Math.min(
      Math.abs(curCell - target),
      totalCells - Math.abs(curCell - target)

      state.placed.push(target);
      state.targetIdx++;
      state.streak++;

          Math.abs(curCell - target),
          totalCells - Math.abs(curCell - target)

      if (curCell2 < 0) curCell2 += totalCells;
      var speed2 = cursorSpeed(state.level);
      var tol2 = ld.tolerance * speed2;
      var dist4 = Math.min(
        Math.abs(curCell2 - target),
        totalCells - Math.abs(curCell2 - target)

        } else {
          placeTapForBot(0);
        }
        botActionWait = 5 + Math.floor(rng() * 10);

    if (state.phase !== 'play') return;
    var ld = state.levelData;
    if (!ld) return;
    var totalCells = ld.pat.grid * ld.pat.grid;
    var target = ld.targets[state.targetIdx];

    if (curCell < 0) curCell += totalCells;
    var dist = Math.min(

      totalCells - Math.abs(curCell - target)

    // Temporarily override cursor position relative to target

    var tol = ld.tolerance * speed;

    if (cellOffset === 0) {

    } else {
      // Miss: place cursor far from target
      state.cursor = (target + cellOffset) % totalCells;
    }
    placeTap();

      if (state.phase === 'play' && state.levelData) {
        var totalCells = state.levelData.pat.grid * state.levelData.pat.grid;
        state.cursor += cursorSpeed(state.level) * state.cursorDir * dt;
        // Bounce cursor
        if (state.cursor >= totalCells) {
          state.cursor = totalCells - 1;
          state.cursorDir = -1;
        }
        if (state.cursor < 0) {
          state.cursor = 0;
          state.cursorDir = 1;

    }
    shakeAmt *= Math.pow(0.84, dt); zoom += (1 - zoom) * 0.12 * dt;

    // BG

    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- Draw based on phase ----
    if (state.phase === 'title') {
      drawTitle(now);
    } else if (state.phase === 'challenge') {
      drawChallenge();
    } else if (state.phase === 'play' || state.phase === 'levelup') {
      drawPlay(now, dt);
    } else if (state.phase === 'over') {
      drawPlay(now, dt);
      drawOver(now);
    } else if (state.phase === 'cta') {
      drawPlay(now, dt);
      drawOver(now);
      drawCTA(now);
    }

    // Floating reward texts
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 42);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 220 - fl.t * 0.7);

    cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';

    cx.fillText('place each pixel exactly', W/2, 298);
    cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';

    var pat = PATTERNS[0]; // heart
    var n = pat.grid, cell = 20;
    var ox = W/2 - n * cell / 2;
    var oy2 = cy - n * cell / 2;
    for (var i = 0; i < pat.pixels.length; i++) {
      if (!pat.pixels[i]) continue;
      var col = i % n, row = Math.floor(i / n);
      cx.fillStyle = color;
      cx.globalAlpha = 0.85;
      cx.fillRect(ox + col * cell + 1, oy2 + row * cell + 1, cell - 2, cell - 2);
    }
    cx.globalAlpha = 1;
  }

  function drawChallenge() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
    cx.fillText('SCORE TO BEAT', W/2, 300);
    cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
    cx.fillText('12', W/2, 400);
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText("today's top run", W/2, 432);
  }

  function drawPlay(now, dt) {
    var ld = state.levelData;
    if (!ld) return;

    var layout = gridLayout(ld.pat);
    var n = layout.n, cell = layout.cellSize, ox = layout.ox, oy = layout.oy;
    var totalCells = n * n;

    // Current cursor cell
    var curCell = Math.floor(state.cursor) % totalCells;
    if (curCell < 0) curCell += totalCells;
    var curTarget = ld.targets[state.targetIdx];

    // Score + level HUD
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 64px -apple-system, Helvetica, Arial';
    cx.fillText(state.score, W/2, 90);
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + best, W/2, 112);

    // Level indicator
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '700 14px Menlo, monospace';
    cx.fillText('LEVEL ' + (state.level + 1) + '  —  ' + ld.pat.name, W/2, 136);

    // Dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 14px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W/2, 158);
    }

    // Progress bar: pixels placed / total
    var totalPixels = ld.targets.length;
    var placed = state.placed.length;
    var barW = 200, barH = 6;
    var barX = W/2 - barW/2, barY = oy - 28;
    cx.fillStyle = 'rgba(255,255,255,0.12)';
    cx.fillRect(barX, barY, barW, barH);
    cx.fillStyle = ld.color;
    cx.fillRect(barX, barY, barW * (placed / Math.max(1, totalPixels)), barH);

    // Pixels remaining label
    cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 11px Menlo, monospace';
    cx.fillText((totalPixels - placed) + ' pixels left', W/2, barY - 6);

    // Grid cells
    for (var i = 0; i < n * n; i++) {
      var col = i % n, row = Math.floor(i / n);
      var px = ox + col * cell, py = oy + row * cell;

      // Is this a target pixel?
      var isTarget = ld.pat.pixels[i] === 1;
      // Is it already placed?
      var isPlaced = state.placed.indexOf(i) !== -1;
      // Is it the current active target?
      var isCurrentTarget = (i === curTarget);
      // Is cursor here?
      var isCursor = (i === curCell);
      // Is wrong pixel?
      var isWrong = (i === state.wrongPixel && (performance.now() - state.wrongAt) < 400);

      // Cell background
      cx.fillStyle = 'rgba(255,255,255,0.04)';
      cx.fillRect(px + 1, py + 1, cell - 2, cell - 2);

      // Grid lines
      cx.strokeStyle = 'rgba(255,255,255,0.08)'; cx.lineWidth = 0.5;
      cx.strokeRect(px + 0.5, py + 0.5, cell, cell);

      if (isPlaced) {
        // Placed pixels glow in level color
        cx.fillStyle = ld.color;
        cx.globalAlpha = 0.9;
        cx.fillRect(px + 1, py + 1, cell - 2, cell - 2);
        // Inner bright center
        cx.fillStyle = '#fff';
        cx.globalAlpha = 0.3;
        cx.fillRect(px + 3, py + 3, cell - 6, cell - 6);
        cx.globalAlpha = 1;
      } else if (isWrong) {
        // Wrong cell flash red
        cx.fillStyle = VERM;
        cx.globalAlpha = 0.8 * Math.max(0, 1 - (performance.now() - state.wrongAt) / 400);
        cx.fillRect(px + 1, py + 1, cell - 2, cell - 2);
        cx.globalAlpha = 1;
      } else if (isCurrentTarget && isTarget) {
        // Active target: pulsing outline to help player aim
        var pulse = 0.5 + 0.5 * Math.sin(now / 120);
        cx.strokeStyle = ld.color;
        cx.lineWidth = 2;
        cx.globalAlpha = pulse;
        cx.strokeRect(px + 2, py + 2, cell - 4, cell - 4);
        cx.globalAlpha = 0.18;
        cx.fillStyle = ld.color;
        cx.fillRect(px + 1, py + 1, cell - 2, cell - 2);
        cx.globalAlpha = 1;
      } else if (isTarget) {
        // Unfilled target pixel: subtle ghost
        cx.fillStyle = ld.color;
        cx.globalAlpha = 0.12;
        cx.fillRect(px + 1, py + 1, cell - 2, cell - 2);
        cx.globalAlpha = 1;
      }

      // Cursor highlight: sweeping indicator
      if (isCursor && state.phase === 'play') {
        var highlightA = 0.55 + 0.45 * Math.sin(now / 80);
        cx.strokeStyle = '#fff';
        cx.lineWidth = 1.5;
        cx.globalAlpha = highlightA;
        cx.strokeRect(px + 1.5, py + 1.5, cell - 3, cell - 3);
        cx.globalAlpha = 1;
      }
    }

    // Tension glow ring around grid as level increases
    var tension = Math.min(state.level / 7, 1);
    if (tension > 0.1) {
      var glow = cx.createRadialGradient(W/2, oy + layout.gridH/2, layout.gridW/2 * 0.9,
                                          W/2, oy + layout.gridH/2, layout.gridW/2 * 1.5);
      glow.addColorStop(0, 'rgba(232,80,46,' + (0.06 * tension) + ')');
      glow.addColorStop(1, 'rgba(232,80,46,0)');
      cx.fillStyle = glow;
      cx.fillRect(0, oy - 40, W, layout.gridH + 80);
    }

    // TAP hint during play
    if (!DEMO && !BOT && state.phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.28)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('TAP when cursor hits the target', W/2, oy + layout.gridH + 24);
    }

    // Level up banner
    if (state.phase === 'levelup') {
      cx.fillStyle = 'rgba(11,13,18,0.65)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = GOLD; cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('LEVEL ' + (state.level + 2), W/2, H/2 - 10);
      cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('tighter tolerance…', W/2, H/2 + 22);
    }
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
    cx.fillText('MISPLACED.', W/2, 300);
    cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
    cx.fillText(state.score + ' pixels placed', W/2, 345);
    var pt = pctTop(state.score);
    cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W/2, 392);
    cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('better than ' + (100 - pt) + '% of players', W/2, 416);
    if (!DEMO && !BOT) {
      var p2 = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = p2; cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — TRY AGAIN', W/2, 462);
      cx.globalAlpha = 1;
      // Share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) { cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); }
      else { cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h); }
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
      cx.fillText(
        window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
        W/2, SHARE_R.y + 30
      );
    }
  }

  function drawCTA(now) {
    var t = (now - state.ctaAt) / 1000, ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.80 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease; cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
    cx.fillText('PIXEL PERFECT', W/2, 300);
    cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
    cx.fillText('placed ' + (window.__demoScore || 12) + '. can you beat it?', W/2, 342);
    var p3 = 0.7 + 0.3 * Math.sin(now / 240);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 30px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + (window.__demoScore || 12), W/2, 410);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W/2, 444);
    cx.globalAlpha = 1;
  }

  // ---- Boot ----
  newGame();
  requestAnimationFrame(frame);
})();
</script>
