        cx.textAlign = 'center';
        cx.fillText(patternRevealed ? PATTERNS[patternIndex].name : 'PATTERN HIDDEN', W / 2, seqY + slotW + 28);

        // timer bar
        if (state.showChoices) {
          var barW = 300, barH = 6;
          var ratio = Math.max(0, state.timer / state.maxTimer);
          cx.fillStyle = 'rgba(255,255,255,0.12)';
          roundRectPath((W - barW) / 2, 190, barW, barH, 3);
          cx.fill();
          var barColor = ratio > 0.5 ? TEAL : (ratio > 0.22 ? GOLD : VERM);
          cx.fillStyle = barColor;
          roundRectPath((W - barW) / 2, 190, barW * ratio, barH, 3);
          cx.fill();
        } else {
          // flash progress
          var flashRatio = Math.max(0, state.flashTimer / state.maxFlash);
          cx.fillStyle = 'rgba(255,255,255,0.12)';
          roundRectPath((W - 300) / 2, 190, 300, 6, 3);
          cx.fill();
          cx.fillStyle = TEAL;
          roundRectPath((W - 300) / 2, 190, 300 * (1 - flashRatio), 6, 3);
          cx.fill();
          cx.fillStyle = 'rgba(255,255,255,0.4)';
          cx.font = '700 13px -apple-system, Helvetica, Arial';
          cx.textAlign = 'center';
          cx.fillText('MEMORIZE', W / 2, 178);
        }

        // choices
        if (state.showChoices) {
          choiceRects = [];
          var cw = 140, ch = 66, cgap = 14;
          var cols = 2, rows = 2;
          var gridW = cols * cw + (cols - 1) * cgap;
          var gx = (W - gridW) / 2;
          var gy = 420;
          for (var c = 0; c < 4; c++) {
            var col = c % 2, row = Math.floor(c / 2);
            var rx = gx + col * (cw + cgap);
            var ry = gy + row * (ch + cgap);
            choiceRects.push({ x: rx, y: ry, w: cw, h: ch });
            var isSelected = state.answered && c === lastAnswerIdx;
            var isCorrect = state.choices[c] === state.current.ans;
            drawChoiceRect(choiceRects[c], state.choices[c], isSelected, isCorrect, isSelected && !isCorrect);
          }
        }
      }
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 360 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // game over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('MISSED IT.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' sequences', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        roundRectPath(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('NUMBER RIDDLE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('she solved ' + (window.__demoScore || 7) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 7), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + MUTE_R.h / 2);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
