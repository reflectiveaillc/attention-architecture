<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // Grid config
  var COLS = 5, ROWS = 6;
  var CELL = 64;         // cell size in px
  var GRID_X = (W - COLS * CELL) / 2;
  var GRID_Y = 170;
  var DIRT_COUNT = COLS * ROWS; // all cells dirty at start

  // Juice state
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var flashes = [];
  function flash(txt, color, size, cx0, cy0) {
    flashes.push({ txt: txt, color: color, size: size || 36,
                   x: cx0 || W / 2, y: cy0 || H / 2 - 60, t: 0 });
  }

  // ---- Game state ----
  var state, runStartTs, best = 0, dareBeaten = false, ctaAt = 0, challengeAt = 0;
  try { best = +localStorage.getItem('cs_best') || 0; } catch (_) {}

  function newGrid() {
    var cells = [];
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        // dirt intensity 0..3 — seeded
        cells.push({ r: r, c: c, dirty: 1 + Math.floor(rng() * 3), clean: false,
                     dirtyPct: 0.6 + rng() * 0.4 });
      }
    }
    return cells;
  }

  function countDirty(cells) {
    return cells.filter(function (ce) { return !ce.clean; }).length;
  }

  function newGame() {
    // re-seed rng so each run is deterministic per seed
    rng = mulberry32(SEED);
    state = {
      phase: 'title',   // title | challenge | play | over | cta
      cells: newGrid(),
      cleaned: 0,
      combo: 0,
      timeMs: 0,        // elapsed ms (lower = better)
      overAt: 0
    };
    flashes = []; dareBeaten = false;
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
  }

  function startRun() {
    rng = mulberry32(SEED);      // re-seed for reproducibility
    state.cells = newGrid();
    state.phase = 'play';
    state.cleaned = 0;
    state.combo = 0;
    state.timeMs = 0;
    runStartTs = performance.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function cleanCell(idx) {
    var ce = state.cells[idx];
    if (!ce || ce.clean) return;
    ce.clean = true;
    state.cleaned++;
    state.combo++;

    var combo = state.combo;
    var cx0 = GRID_X + ce.c * CELL + CELL / 2;
    var cy0 = GRID_Y + ce.r * CELL + CELL / 2;

    if (window.J) {
      if (combo >= 5) { J.perfect(combo); hitStop = 3; zoom = 1.025; }
      else { J.hit(combo); }
      J.tension(Math.min(state.cleaned / DIRT_COUNT, 1));
    }
    if (combo >= 5) { flash('×' + combo + ' COMBO!', GOLD, 38, cx0, cy0 - 20); hitStop = 3; }
    else if (combo >= 3) { flash('COMBO ×' + combo, TEAL, 32, cx0, cy0 - 20); }
    else { flash('+1', 'rgba(255,255,255,0.8)', 26, cx0, cy0 - 20); }

    // near-miss: last few cells
    var remaining = countDirty(state.cells);
    if (remaining === 2 && window.J) J.near();
    if (remaining === 2) flash('ALMOST!', VERM, 34);

    if (window.LOOP) LOOP.emit('cell_cleaned', { n: state.cleaned, combo: combo, remaining: remaining });

    if (remaining === 0) {
      gameOver();
    }
  }

  // score: ms elapsed (lower = better, but we store it and show rank)
  function finalScore() {
    return Math.round(state.timeMs);
  }

  function pctTop(ms) {
    // Lower is better. Simulate rough distribution around 18s
    var frac = Math.max(0, Math.min(1, (ms - 5000) / 30000));
    return Math.max(1, Math.min(99, Math.round(frac * 98 + 1)));
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    state.timeMs = performance.now() - runStartTs;
    shakeAmt = 7;
    var sc = finalScore();
    var dur = sc / 1000;
    var newBest = (best === 0 || sc < best);
    if (window.J) {
      J.death(0.4);
      if (newBest) setTimeout(function () { J.fanfare(); }, 400);
    }
    if (newBest) {
      best = sc;
      try { localStorage.setItem('cs_best', String(best)); } catch (_) {}
    }
    if (DEMO) window.__demoScore = sc;
    if (window.SHARE && !DEMO && !BOT && SHARE.dare !== null && sc < SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN!', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(sc);
    }
    if (window.LOOP) LOOP.emit('game_over', { score: sc, dur_s: +dur.toFixed(2) });
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2600);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { restartRun(); }, 700);
    }
  }

  function restartRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ---- Input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 500, w: 250, h: 46 };
  function inR(r, px, py) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }

  function cellAt(px, py) {
    var c = Math.floor((px - GRID_X) / CELL);
    var r = Math.floor((py - GRID_Y) / CELL);
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return -1;
    return r * COLS + c;
  }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      if (px !== undefined) {
        var idx = cellAt(px, py);
        if (idx >= 0) cleanCell(idx);
        else state.combo = 0; // tapped outside grid breaks combo
      }
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: finalScore(), unit: 'ms' }); return;
      }
      restartRun();
    }
  }

  // pointer tracking for drag-to-clean
  var lastCleaned = -1;
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale, py = (e.clientY - r.top) / scale;
    lastCleaned = -1;
    tap(px, py);
  });
  window.addEventListener('pointermove', function (e) {
    if (!(e.buttons & 1)) return;
    if (DEMO || BOT) return;
    if (state.phase !== 'play') return;
    var r = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale, py = (e.clientY - r.top) / scale;
    var idx = cellAt(px, py);
    if (idx >= 0 && idx !== lastCleaned) {
      lastCleaned = idx;
      cleanCell(idx);
    }
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') tap();
  });

  // ---- Bot / Demo autopilots ----
  var botRunsDone = 0;
  var botQueue = [];     // indices to clean in order
  var botQueueIdx = 0;
  var botTimer = 0;      // ticks before next action

  // Demo script: list of {idx, wait} actions (hesitation baked in)
  // We produce a near-fail (pause on second-to-last) then clean it,
  // then skip a beat and finish quickly — human-feeling arc.
  var demoQueue = [];
  var demoQueueIdx = 0;
  var demoTimer = 0;

  function buildBotQueue(cells) {
    // random sweep order for bot
    var indices = cells.map(function (_, i) { return i; });
    // shuffle
    for (var i = indices.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
    }
    return indices;
  }

  function buildDemoQueue(cells) {
    // near-sequential sweep — feels like a pro run
    // left-to-right, top-to-bottom, with hesitation waits
    var q = [];
    var idx = [];
    for (var r = 0; r < ROWS; r++) {
      var rowIdxs = [];
      for (var c = 0; c < COLS; c++) rowIdxs.push(r * COLS + c);
      // reverse every other row (S-curve)
      if (r % 2 === 1) rowIdxs.reverse();
      rowIdxs.forEach(function (i) { idx.push(i); });
    }
    // Build queue with timing
    // ~60% through: near-fail long pause
    var nearFailAt = Math.floor(idx.length * 0.6);
    idx.forEach(function (i, pos) {
      var wait;
      if (pos === nearFailAt) wait = 55;          // hesitation = near-fail
      else if (pos > nearFailAt && pos <= nearFailAt + 2) wait = 38; // recovery
      else wait = 12 + Math.floor(rng() * 10);    // normal human cadence
      q.push({ idx: i, wait: wait });
    });
    return q;
  }

  function autopilot() {
    if (state.phase !== 'play') return;
    if (DEMO) {
      if (demoQueue.length === 0) return;
      demoTimer--;
      if (demoTimer > 0) return;
      if (demoQueueIdx >= demoQueue.length) return;
      var action = demoQueue[demoQueueIdx++];
      cleanCell(action.idx);
      var next = demoQueue[demoQueueIdx];
      demoTimer = next ? next.wait : 20;
    } else if (BOT) {
      botTimer--;
      if (botTimer > 0) return;
      if (botQueueIdx >= botQueue.length) return;
      cleanCell(botQueue[botQueueIdx++]);
      botTimer = 8 + Math.floor(rng() * 12); // imperfect cadence
    }
  }

  // ---- Render helpers ----
  function drawDirtCell(ce, x, y) {
    var d = ce.dirty;
    // base dirty fill
    var alpha = 0.35 + d * 0.18;
    cx.fillStyle = 'rgba(180,120,60,' + alpha + ')';
    cx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
    // dirt blobs (deterministic per cell position)
    cx.save();
    cx.beginPath();
    cx.rect(x + 2, y + 2, CELL - 4, CELL - 4);
    cx.clip();
    cx.fillStyle = 'rgba(120,70,20,' + (0.25 + d * 0.1) + ')';
    for (var b = 0; b < d + 1; b++) {
      var bx = x + 6 + (ce.c * 13 + b * 17) % (CELL - 12);
      var by = y + 6 + (ce.r * 11 + b * 23) % (CELL - 12);
      cx.beginPath();
      cx.arc(bx, by, 4 + b * 2, 0, Math.PI * 2);
      cx.fill();
    }
    cx.restore();
  }

  function drawCleanCell(ce, x, y) {
    // sparkle clean tile
    cx.fillStyle = 'rgba(46,197,182,0.12)';
    cx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
    // small sparkle
    cx.fillStyle = 'rgba(46,197,182,0.55)';
    cx.font = '14px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText('✦', x + CELL / 2, y + CELL / 2 + 5);
  }

  function drawGrid() {
    state.cells.forEach(function (ce) {
      var gx = GRID_X + ce.c * CELL;
      var gy = GRID_Y + ce.r * CELL;
      // cell background
      cx.fillStyle = ce.clean ? 'rgba(46,197,182,0.08)' : 'rgba(180,120,60,0.15)';
      cx.fillRect(gx + 1, gy + 1, CELL - 2, CELL - 2);
      cx.strokeStyle = ce.clean ? 'rgba(46,197,182,0.25)' : 'rgba(180,120,60,0.3)';
      cx.lineWidth = 1;
      cx.strokeRect(gx + 1, gy + 1, CELL - 2, CELL - 2);
      if (!ce.clean) drawDirtCell(ce, gx, gy);
      else drawCleanCell(ce, gx, gy);
    });
  }

  function fmtTime(ms) {
    var s = (ms / 1000).toFixed(2);
    return s + 's';
  }

  // Progress bar below timer
  function drawProgress() {
    var total = DIRT_COUNT;
    var pct = state.cleaned / total;
    var bx = GRID_X, by = GRID_Y - 14, bw = COLS * CELL, bh = 6;
    cx.fillStyle = 'rgba(255,255,255,0.1)';
    cx.fillRect(bx, by, bw, bh);
    cx.fillStyle = pct > 0.8 ? TEAL : pct > 0.4 ? GOLD : VERM;
    cx.fillRect(bx, by, bw * pct, bh);
  }

  // ---- Main frame loop ----
  var last = performance.now(), ctaClosed = false;
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // update timer
    if (state.phase === 'play') {
      state.timeMs = now - runStartTs;
    }

    // hit-stop decay + autopilot gate
    if (hitStop > 0) { hitStop -= dt; }
    else { autopilot(); }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.15 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // --- TITLE ---
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('CLEAN SWEEP', W / 2, 260);
      cx.fillStyle = TEAL;
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('fastest sweep wins', W / 2, 298);
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO SWEEP', W / 2, 360);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('swipe across every dirty cell', W / 2, 392);
      // draw faded grid preview
      cx.globalAlpha = 0.25;
      drawGrid();
      cx.globalAlpha = 1;
    }

    // --- CHALLENGE CARD (demo beat 1) ---
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '800 15px Menlo, monospace';
      cx.fillText('TIME TO BEAT', W / 2, 280);
      cx.fillStyle = GOLD;
      cx.font = '900 80px -apple-system, Helvetica, Arial';
      cx.fillText('8.73s', W / 2, 380);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText("today's fastest sweep", W / 2, 412);
    }

    // --- PLAY ---
    if (state.phase === 'play' || state.phase === 'over') {
      // timer display
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '900 56px Menlo, monospace';
      var dispMs = state.phase === 'over' ? state.timeMs : (now - runStartTs);
      cx.fillText(fmtTime(dispMs), W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText(best > 0 ? 'BEST ' + fmtTime(best) : 'NO BEST YET', W / 2, 118);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + fmtTime(SHARE.dare) + (SHARE.by ? ' — ' + SHARE.by : ''), W / 2, 144);
      }

      drawProgress();
      drawGrid();

      // cells left indicator
      var remaining = countDirty(state.cells);
      cx.textAlign = 'center';
      cx.fillStyle = remaining <= 3 ? VERM : 'rgba(255,255,255,0.5)';
      cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText(remaining + ' left', W / 2, GRID_Y + ROWS * CELL + 24);
    }

    // --- GAME OVER OVERLAY ---
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      var sc = finalScore();
      var pt = pctTop(sc);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('SWEPT!', W / 2, 282);
      cx.fillStyle = '#fff';
      cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(fmtTime(sc), W / 2, 326);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 368);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('faster than ' + (100 - pt) + '% of sweepers', W / 2, 392);
      if (!DEMO && !BOT) {
        var p2 = 0.55 + 0.45 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — SWEEP AGAIN', W / 2, 450);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // --- DEMO CTA ---
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.0);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('CLEAN SWEEP', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they swept in ' + fmtTime(window.__demoScore || 8730) + '. your move.', W / 2, 332);
      var p3 = 0.65 + 0.35 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + fmtTime(window.__demoScore || 8730), W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // --- FLASHES (floating text) ---
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      if (a <= 0) { flashes.splice(k, 1); continue; }
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 1.5);
      cx.globalAlpha = 1;
    }

    // --- MUTE TOGGLE (human only) ---
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- Init autopilot queues ----
  // These are built after the first startRun() populates state.cells
  var _origStartRun = startRun;
  startRun = function () {
    _origStartRun();
    // rebuild queues after grid is created
    if (DEMO) {
      demoQueue = buildDemoQueue(state.cells);
      demoQueueIdx = 0;
      demoTimer = demoQueue[0] ? demoQueue[0].wait : 20;
    } else if (BOT) {
      botQueue = buildBotQueue(state.cells);
      botQueueIdx = 0;
      botTimer = 10;
    }
  };

  function pctTop(ms) {
    var frac = Math.max(0, Math.min(1, (ms - 5000) / 30000));
    return Math.max(1, Math.min(99, Math.round(frac * 98 + 1)));
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
