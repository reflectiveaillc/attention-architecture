  // ---- filter overlays (outermost = index 0 = peeled first; innermost = last = peeled last) ----
  var filters = [
    { label: 'glow',     draw: fGlow },
    { label: 'warm',     draw: fWarm },

  function fGlow() {                                  // glam halo + sparkles

  // ---- state ----
  var state, flashes, peelFx, runStartTs, best = 0;

  try { best = +localStorage.getItem('fr_best') || 0; } catch (_) {}

  function newFreckles() {
    var arr = [], fx = FACE.cx, fy = FACE.cy, n = 14 + Math.floor(rng() * 6);
    for (var i = 0; i < n; i++) {
      var side = rng() < 0.5 ? -1 : 1;
      var x = fx + side * (24 + rng() * 46);
      var y = fy + 6 + rng() * 56;
      arr.push({ x: x, y: y, r: 0.9 + rng() * 1.2, a: 0.5 + rng() * 0.4 });

  function newGame() {
    state = { phase: 'title', peeledCount: 0, score: 0, freckles: newFreckles(), lastPeelTs: 0, overAt: 0, settleAt: 0 };

    if (DEMO) { startRun(); return; }   // calm demo: straight into the settle→deepen arc

  function pctTop(s) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 250)))); }

    state.phase = 'play';

  function peel() {

    if (state.peeledCount >= filters.length) return;
    var idx = state.peeledCount;
    var now = performance.now();
    var dtMs = state.lastPeelTs ? (now - state.lastPeelTs) : 2000;
    var calmBonus = Math.max(0, Math.min(12, Math.floor(dtMs / 2000) * 4));  // reward gentle pacing

    if (state.peeledCount >= filters.length) {

  function finishSettle() {
    if (state.phase !== 'settle') return;

    state.phase = 'over'; state.overAt = performance.now();

    if (BOT) {

  function resetRun() {
    flashes = []; peelFx = null; glowAmt = 0; zoom = 1;

  function flash(txt, color, size, y) { flashes.push({ txt: txt, color: color, size: size, t: 0, y: y }); }

  function tap(x, y) {

  // ---- demo / bot autopilots (calm: peel every layer in order, with hesitation) ----
  // demoWaits are beats of hesitation before each peel — keeps the arc human,

  var demoWaits = [78, 96, 70, 104, 82, 88, 92];

  function autopilot() {
    if (state.phase !== 'play') return;

    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      peel();

    } else if (BOT) {
      if (botWait > 0) { botWait--; return; }
      peel();
      botWait = Math.max(40, Math.min(170, 80 + Math.round(gauss() * 38)));

  // ---- render ----
  function drawFace(now) {
    var breathe = Math.sin(now / 760) * 3;
    cx.save();
    cx.translate(0, breathe);

    // remaining filters, innermost first so the outermost remaining sits on top

      cx.restore();
      cx.globalAlpha = 1;

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // gate the autopilot behind a decaying hit-stop (kept for parity; calm never sets it)
    if (hitStop > 0) hitStop -= dt;
    else if (state.phase === 'play') autopilot();

    // settle breath deepens the glow
    if (state.phase === 'settle') { settleTimer += dt; glowAmt = Math.min(1, glowAmt + 0.02 * dt); }
    // advance the peeling-layer lift-off animation
    if (peelFx) { peelFx.t += dt; if (peelFx.t >= 24) peelFx = null; }

    // juice transforms: very subtle zoom-pulse only (calm — no screen shake)
    cx.save();
    if (zoom > 1.001) {
      cx.translate(W / 2, H / 2); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createRadialGradient(FACE.cx, FACE.cy, 40, FACE.cx, FACE.cy, 300);
    bg.addColorStop(0, 'rgba(46,197,182,0.10)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);
    // calm glow flash on peel / settle
    if (glowAmt > 0.01) {
      var gg = cx.createRadialGradient(FACE.cx, FACE.cy, 30, FACE.cx, FACE.cy, 260);
      gg.addColorStop(0, 'rgba(46,197,182,' + (0.22 * glowAmt) + ')');
      gg.addColorStop(1, 'rgba(46,197,182,0)');
      cx.fillStyle = gg; cx.fillRect(0, 0, W, H);

    drawFace(now);

    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '700 12px Menlo, monospace';

    if (state.phase === 'play' || state.phase === 'settle' || state.phase === 'over') {
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 106);
      // restore progress — 7 segments, filled left→right as filters peel
      var segs = filters.length, sw = 22, gap = 6, tot = segs * sw + (segs - 1) * gap;
      var sx0 = W / 2 - tot / 2, sy = 122;
      for (var s = 0; s < segs; s++) {
        var filled = s < state.peeledCount;
        if (filled) { cx.fillStyle = TEAL; cx.fillRect(sx0 + s * (sw + gap), sy, sw, 5); }
        else { cx.fillStyle = 'rgba(255,255,255,0.14)'; cx.fillRect(sx0 + s * (sw + gap), sy, sw, 5); }
      }
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 11px -apple-system, Helvetica, Arial';
      cx.fillText(state.peeledCount + ' / ' + segs + ' peeled', W / 2, 140);
    }

    // flashes (floating reward text)
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, fl.y - fl.t * 0.55);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('FILTER RESTORE', W / 2, 290);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO PEEL', W / 2, 332); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('tap gently. breathe back to real.', W / 2, 360);
    }

    // game over (calm score card)
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.58)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('RESTORED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' points', W / 2, 344);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 388);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('gentler hands, realer face', W / 2, 412);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE BREATH', W / 2, 488);
        cx.globalAlpha = 1;
        // share pill (calm — share, no dare)
        cx.fillStyle = 'rgba(46,197,182,0.14)';
        cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 22)
                     : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = TEAL; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE', W / 2, SHARE_R.y + 29);
      }
    }

    // demo CTA — soft invitation
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('FILTER RESTORE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.78)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('peel back to your real face.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
