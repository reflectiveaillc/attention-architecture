    if (state.card) drawCard(state.card);

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt * 60;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 270 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('FOLLOWER', W / 2, 310);
      cx.fillText('FACE-OFF', W / 2, 356);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO START', W / 2, 420); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('swipe right for real followers.', W / 2, 450);
      cx.fillText('left for bots. 60 seconds.', W / 2, 470);
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT — ' + DEMO_TARGET, W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 84px -apple-system, Helvetica, Arial';
      cx.fillText(DEMO_TARGET, W / 2, 396);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 426);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(state.lives <= 0 ? 'BOT GOT YOU.' : 'TIME’S UP.', W / 2, 330);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' followers', W / 2, 380);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 422);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 446);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 492);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        rrPath(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('FOLLOWER FACE-OFF', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('she got ' + (window.__demoScore || DEMO_TARGET) + '. your move.', W / 2, 342);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || DEMO_TARGET), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.55;
      cx.font = '18px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    if (shakeAmt > 0.2 || zoom > 1.001) cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
