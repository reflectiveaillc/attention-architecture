<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = Math.max(1, +qs.get('runs') || 3);
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- juice state ----
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var flashes = [];
  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size || 36, t: 0 }); }

  // ---- game state ----
  var phase; // 'title' | 'challenge' | 'play' | 'transition' | 'over' | 'fin' | 'cta'
  var bossIdx = 0;          // 0-7
  var bossesBeaten = 0;
  var bossTimer = 0;        // countdown seconds remaining for current boss
  var bossResult = null;    // 'win' | 'lose' during transition/over
  var overAt = 0, challengeAt = 0, transAt = 0, ctaAt = 0, finAt = 0;
  var runStartTs = 0;
  var dareBeaten = false;
  var totalScore = 0;       // bosses beaten (meaningful number)

  // ---- bot tracking ----
  var botRunsDone = 0;

  // ---- 8 boss definitions ----
  // Each boss: { name, color, draw(dt), update(dt) → 'alive'|'win'|'lose', onTap(x,y), onPointer(x,y), reset() }
  // Kept inside closure so they share juice helpers
  var boss = null;

  // ---------- BOSS 1: DODGE THE SPIRAL ----------
  function makeBoss1() {
    var px = W / 2, py = H / 2;   // player dot
    var bullets = [];
    var angle = 0;
    var PLAYER_R = 18, BULLET_R = 8;
    var t = 0;
    var pointerX = px, pointerY = py;
    function spawnSpiral() {
      var cx2 = W / 2, cy2 = H / 2 + 30;
      var a = angle;
      for (var i = 0; i < 3; i++) {
        var ai = a + (i * Math.PI * 2 / 3);
        bullets.push({ x: cx2, y: cy2, vx: Math.cos(ai) * 2.8, vy: Math.sin(ai) * 2.8 });
      }
      angle += 0.35;
    }
    return {
      name: 'DODGE', color: VERM,
      reset: function () { bullets = []; angle = 0; t = 0; px = W / 2; py = H * 0.6; pointerX = px; pointerY = py; },
      onPointer: function (x, y) { pointerX = x; pointerY = y; },
      update: function (dt) {
        t += dt;
        if (t % 30 < dt * 1.01) spawnSpiral();
        // move player toward pointer (human drag; bot sets pointer)
        px += (pointerX - px) * 0.18 * dt;
        py += (pointerY - py) * 0.18 * dt;
        px = Math.max(PLAYER_R, Math.min(W - PLAYER_R, px));
        py = Math.max(PLAYER_R + 80, Math.min(H - PLAYER_R - 80, py));
        for (var i = bullets.length - 1; i >= 0; i--) {
          var b = bullets[i];
          b.x += b.vx * dt; b.y += b.vy * dt;
          if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) { bullets.splice(i, 1); continue; }
          var dx = b.x - px, dy = b.y - py;
          if (dx * dx + dy * dy < (PLAYER_R + BULLET_R) * (PLAYER_R + BULLET_R)) return 'lose';
        }
        return 'alive';
      },
      draw: function () {
        // center emitter
        cx.beginPath(); cx.arc(W / 2, H / 2 + 30, 14, 0, Math.PI * 2);
        cx.fillStyle = VERM; cx.fill();
        // bullets
        for (var i = 0; i < bullets.length; i++) {
          var b = bullets[i];
          cx.beginPath(); cx.arc(b.x, b.y, BULLET_R, 0, Math.PI * 2);
          cx.fillStyle = '#ff7a5a'; cx.fill();
        }
        // player
        cx.beginPath(); cx.arc(px, py, PLAYER_R, 0, Math.PI * 2);
        cx.fillStyle = TEAL; cx.fill();
        cx.strokeStyle = '#fff'; cx.lineWidth = 2; cx.stroke();
        // aim guide (subtle)
        cx.beginPath(); cx.arc(px, py, PLAYER_R + 6, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(46,197,182,0.3)'; cx.lineWidth = 1; cx.stroke();
      },
      autopilot: function (dt) {
        // bot dodges: move away from nearest bullet
        if (!bullets.length) { pointerX = W / 2; pointerY = H * 0.6; return; }
        var nb = bullets[0], nd = Infinity;
        for (var i = 0; i < bullets.length; i++) {
          var dx = bullets[i].x - px, dy = bullets[i].y - py, d = dx * dx + dy * dy;
          if (d < nd) { nd = d; nb = bullets[i]; }
        }
        var dx = nb.x - px, dy = nb.y - py;
        pointerX = px - dx * 3 + (rng() - 0.5) * 60;
        pointerY = py - dy * 3 + (rng() - 0.5) * 60;
      }
    };
  }

  // ---------- BOSS 2: TAP THE SHRINKING ZONE ----------
  function makeBoss2() {
    var zones = [], t = 0, tapsNeeded = 5, tapped = 0;
    function spawnZone() {
      var r = 48 + rng() * 30;
      zones.push({ x: 60 + rng() * (W - 120), y: 200 + rng() * (H - 400), r: r, maxR: r, born: t });
    }
    return {
      name: 'ZONE TAP', color: TEAL,
      reset: function () { zones = []; t = 0; tapped = 0; spawnZone(); },
      onTap: function (x, y) {
        for (var i = zones.length - 1; i >= 0; i--) {
          var z = zones[i];
          var dx = x - z.x, dy = y - z.y;
          if (dx * dx + dy * dy < z.r * z.r) {
            tapped++;
            if (window.J) J.hit(tapped);
            flash('+1', TEAL, 32);
            zones.splice(i, 1);
            if (tapped >= tapsNeeded) return 'win';
            spawnZone();
            return 'alive';
          }
        }
        return 'alive';
      },
      update: function (dt) {
        t += dt;
        for (var i = zones.length - 1; i >= 0; i--) {
          zones[i].r = zones[i].maxR * Math.max(0, 1 - (t - zones[i].born) / 90);
          if (zones[i].r < 4) return 'lose';
        }
        return 'alive';
      },
      draw: function () {
        for (var i = 0; i < zones.length; i++) {
          var z = zones[i];
          var ratio = z.r / z.maxR;
          cx.beginPath(); cx.arc(z.x, z.y, z.r, 0, Math.PI * 2);
          cx.fillStyle = 'rgba(46,197,182,' + (0.15 + ratio * 0.15) + ')'; cx.fill();
          cx.strokeStyle = ratio < 0.25 ? VERM : TEAL; cx.lineWidth = 3; cx.stroke();
          cx.textAlign = 'center'; cx.fillStyle = '#fff';
          cx.font = '700 18px -apple-system, Helvetica, Arial';
          cx.fillText('TAP', z.x, z.y + 7);
        }
        cx.textAlign = 'center'; cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.font = '600 14px -apple-system, Helvetica, Arial';
        cx.fillText(tapped + '/' + tapsNeeded + ' zones', W / 2, 170);
      },
      autopilot: function () {
        // bot taps the zone center after a short delay (imperfect timing)
        if (zones.length && rng() < 0.06) {
          var z = zones[0];
          var jitter = (rng() - 0.5) * z.r * 1.4;
          return this.onTap(z.x + jitter, z.y + jitter);
        }
        return 'alive';
      }
    };
  }

  // ---------- BOSS 3: HOLD THROUGH STATIC ----------
  function makeBoss3() {
    var held = false, holdDur = 0, NEED = 90, staticNoise = [];
    function genNoise() {
      staticNoise = [];
      for (var i = 0; i < 80; i++) staticNoise.push({ x: rng() * W, y: 100 + rng() * (H - 200), s: 2 + rng() * 4 });
    }
    genNoise();
    return {
      name: 'HOLD', color: GOLD,
      reset: function () { held = false; holdDur = 0; genNoise(); },
      onPointerDown: function () { held = true; },
      onPointerUp:   function () { held = false; holdDur = 0; },
      update: function (dt) {
        // regenerate noise occasionally
        if (Math.random() < 0.04) genNoise();
        if (held) { holdDur += dt; if (holdDur >= NEED) return 'win'; }
        else if (holdDur > 0) { holdDur = Math.max(0, holdDur - dt * 1.5); }
        return 'alive';
      },
      draw: function () {
        var prog = holdDur / NEED;
        // static overlay
        cx.fillStyle = 'rgba(255,255,255,0.03)';
        for (var i = 0; i < staticNoise.length; i++) {
          var n = staticNoise[i];
          cx.fillRect(n.x, n.y, n.s, n.s);
        }
        // hold arc
        cx.beginPath();
        cx.arc(W / 2, H / 2, 80, -Math.PI / 2, -Math.PI / 2 + prog * Math.PI * 2);
        cx.strokeStyle = GOLD; cx.lineWidth = 10; cx.lineCap = 'round'; cx.stroke();
        cx.beginPath(); cx.arc(W / 2, H / 2, 80, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(242,177,52,0.15)'; cx.lineWidth = 10; cx.stroke();
        // center label
        cx.textAlign = 'center';
        cx.fillStyle = held ? GOLD : 'rgba(255,255,255,0.5)';
        cx.font = '900 ' + (held ? '22' : '20') + 'px -apple-system, Helvetica, Arial';
        cx.fillText(held ? 'HOLDING' : 'HOLD', W / 2, H / 2 + 8);
        if (!held && holdDur > 0) {
          cx.fillStyle = VERM; cx.font = '700 14px -apple-system, Helvetica, Arial';
          cx.fillText('RELEASED — KEEP HOLDING', W / 2, H / 2 + 40);
        }
      },
      autopilot: function () {
        // bot holds imperfectly — sometimes releases
        if (!held && rng() < 0.08) { held = true; }
        if (held && rng() < 0.005) { held = false; holdDur = Math.max(0, holdDur - 10); }
        return 'alive';
      }
    };
  }

  // ---------- BOSS 4: STEER A FALLING SHARD ----------
  function makeBoss4() {
    var sx = W / 2, vy = 1.8, vx = 0;
    var gates = [], t = 0, survived = 0, NEED = 4;
    var pointerX = W / 2;
    function spawnGate() {
      var gw = 70 + rng() * 50;
      gates.push({ x: 40 + rng() * (W - 80 - gw), y: -40, w: gw, speed: 2 + rng() * 1.5 });
    }
    spawnGate();
    return {
      name: 'STEER', color: '#a78bfa',
      reset: function () { sx = W / 2; vx = 0; gates = []; t = 0; survived = 0; pointerX = W / 2; spawnGate(); },
      onPointer: function (x) { pointerX = x; },
      update: function (dt) {
        t += dt;
        // horizontal steering
        var dx = pointerX - sx;
        vx += dx * 0.012 * dt;
        vx *= Math.pow(0.92, dt);
        sx += vx * dt;
        sx = Math.max(12, Math.min(W - 12, sx));
        // gates fall
        var hit = false;
        for (var i = gates.length - 1; i >= 0; i--) {
          gates[i].y += gates[i].speed * dt;
          if (gates[i].y > H + 40) {
            gates.splice(i, 1);
            survived++;
            if (survived >= NEED) return 'win';
            spawnGate();
            if (window.J) J.hit(survived);
            flash('THROUGH!', TEAL, 30);
            continue;
          }
          // collision: shard must pass THROUGH the gate gap, not hit the walls
          var gy = gates[i].y, gx = gates[i].x, gw = gates[i].w;
          if (gy > H * 0.4 && gy < H * 0.4 + 60) { // check at player zone
            var shardInGate = sx >= gx && sx <= gx + gw;
            // Actually: gate falls toward shard. check overlap
          }
          // simpler: gate is a horizontal bar with a gap; shard is falling from top
          // Gate y moves downward. Shard is at ~H*0.7 fixed (we draw it falling visually)
          var shard_y = H * 0.68;
          if (gates[i].y >= shard_y - 30 && gates[i].y <= shard_y + 30) {
            if (sx < gates[i].x || sx > gates[i].x + gates[i].w) { hit = true; }
          }
        }
        if (hit) return 'lose';
        return 'alive';
      },
      draw: function () {
        // shard (player) — diamond shape
        var sy2 = H * 0.68;
        cx.save(); cx.translate(sx, sy2);
        cx.beginPath(); cx.moveTo(0, -18); cx.lineTo(10, 0); cx.lineTo(0, 18); cx.lineTo(-10, 0); cx.closePath();
        cx.fillStyle = '#a78bfa'; cx.fill();
        cx.strokeStyle = '#fff'; cx.lineWidth = 1.5; cx.stroke();
        cx.restore();
        // gates (horizontal bars with gap)
        for (var i = 0; i < gates.length; i++) {
          var g = gates[i];
          cx.fillStyle = VERM;
          cx.fillRect(0, g.y, g.x, 14);
          cx.fillRect(g.x + g.w, g.y, W - g.x - g.w, 14);
        }
        cx.textAlign = 'center'; cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.font = '600 14px -apple-system, Helvetica, Arial';
        cx.fillText(survived + '/' + NEED + ' gates', W / 2, 170);
      },
      autopilot: function () {
        if (gates.length) {
          var g = gates[0];
          var midGap = g.x + g.w / 2;
          pointerX = midGap + (rng() - 0.5) * 30;
        }
        return 'alive';
      }
    };
  }

  // ---------- BOSS 5: RHYTHM TAP (tap on the beat) ----------
  function makeBoss5() {
    var t = 0, beat = 0, tapped = 0, NEED = 5, WINDOW = 18, nextBeat = 30, missed = 0;
    var pulseT = 0;
    return {
      name: 'RHYTHM', color: GOLD,
      reset: function () { t = 0; beat = 0; tapped = 0; missed = 0; nextBeat = 30; pulseT = 0; },
      onTap: function () {
        var diff = Math.abs(t - nextBeat);
        if (diff < WINDOW) {
          tapped++;
          if (window.J) J.hit(tapped);
          if (diff < WINDOW * 0.4) { if (window.J) J.perfect(tapped); flash('PERFECT', TEAL, 36); }
          else flash('GOOD', GOLD, 30);
          nextBeat += 40;
          if (tapped >= NEED) return 'win';
        } else if (diff < WINDOW * 2.5) {
          missed++;
          if (window.J) J.near();
          flash('EARLY', VERM, 26);
          if (missed >= 3) return 'lose';
        }
        return 'alive';
      },
      update: function (dt) {
        t += dt;
        pulseT += dt;
        if (t > nextBeat + WINDOW * 2) {
          missed++;
          if (window.J) J.near();
          flash('MISS', VERM, 28);
          nextBeat += 40;
          if (missed >= 3) return 'lose';
        }
        return 'alive';
      },
      draw: function () {
        var timeToNext = nextBeat - t;
        var prog = Math.max(0, Math.min(1, 1 - timeToNext / 40));
        var inWindow = Math.abs(t - nextBeat) < WINDOW;
        var r = 60 + (inWindow ? 10 * Math.sin(t * 0.4) : 0);
        cx.beginPath(); cx.arc(W / 2, H / 2, r, 0, Math.PI * 2);
        cx.fillStyle = inWindow ? 'rgba(242,177,52,0.2)' : 'rgba(242,177,52,0.08)'; cx.fill();
        cx.strokeStyle = inWindow ? GOLD : 'rgba(242,177,52,0.4)';
        cx.lineWidth = inWindow ? 5 : 3; cx.stroke();
        // progress ring
        cx.beginPath(); cx.arc(W / 2, H / 2, 80, -Math.PI / 2, -Math.PI / 2 + prog * Math.PI * 2);
        cx.strokeStyle = GOLD; cx.lineWidth = 6; cx.lineCap = 'round'; cx.stroke();
        cx.textAlign = 'center';
        cx.fillStyle = inWindow ? GOLD : 'rgba(255,255,255,0.5)';
        cx.font = '900 ' + (inWindow ? '24' : '20') + 'px -apple-system, Helvetica, Arial';
        cx.fillText(inWindow ? 'NOW' : 'TAP', W / 2, H / 2 + 8);
        cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
        cx.fillText(tapped + '/' + NEED + ' hits  ' + missed + '/3 misses', W / 2, 170);
      },
      autopilot: function () {
        var diff = t - nextBeat;
        if (Math.abs(diff) < WINDOW * 0.8 && rng() < 0.35) {
          return this.onTap();
        }
        return 'alive';
      }
    };
  }

  // ---------- BOSS 6: AVOID THE WALLS (shrinking corridor) ----------
  function makeBoss6() {
    var py = H * 0.6, px = W / 2;
    var wallLeft = 0, wallRight = W, t = 0;
    var PLAYER_R = 16;
    var pointerX = px;
    return {
      name: 'WALLS', color: TEAL,
      reset: function () { py = H * 0.6; px = W / 2; wallLeft = 0; wallRight = W; t = 0; pointerX = px; },
      onPointer: function (x) { pointerX = x; },
      update: function (dt) {
        t += dt;
        wallLeft  = Math.min(W / 2 - 40, wallLeft  + 0.35 * dt);
        wallRight = Math.max(W / 2 + 40, wallRight - 0.35 * dt);
        if (wallRight - wallLeft < 80) { wallLeft = W / 2 - 40; wallRight = W / 2 + 40; }
        px += (pointerX - px) * 0.15 * dt;
        px = Math.max(wallLeft + PLAYER_R, Math.min(wallRight - PLAYER_R, px));
        if (px - PLAYER_R <= wallLeft || px + PLAYER_R >= wallRight) return 'lose';
        if (t >= 120) return 'win'; // 8s survival = win
        if (window.J && t % 30 < dt) J.tension(Math.min(t / 120, 1));
        return 'alive';
      },
      draw: function () {
        var prog = Math.min(1, t / 120);
        // walls
        cx.fillStyle = VERM;
        cx.fillRect(0, 0, wallLeft, H);
        cx.fillRect(wallRight, 0, W - wallRight, H);
        // corridor edge glow
        var gL = cx.createLinearGradient(wallLeft, 0, wallLeft + 30, 0);
        gL.addColorStop(0, 'rgba(232,80,46,0.6)'); gL.addColorStop(1, 'rgba(232,80,46,0)');
        cx.fillStyle = gL; cx.fillRect(wallLeft, 0, 30, H);
        var gR = cx.createLinearGradient(wallRight - 30, 0, wallRight, 0);
        gR.addColorStop(0, 'rgba(232,80,46,0)'); gR.addColorStop(1, 'rgba(232,80,46,0.6)');
        cx.fillStyle = gR; cx.fillRect(wallRight - 30, 0, 30, H);
        // player
        cx.beginPath(); cx.arc(px, py, PLAYER_R, 0, Math.PI * 2);
        cx.fillStyle = TEAL; cx.fill();
        cx.strokeStyle = '#fff'; cx.lineWidth = 2; cx.stroke();
        // timer arc
        cx.beginPath(); cx.arc(W / 2, 600, 40, -Math.PI / 2, -Math.PI / 2 + prog * Math.PI * 2);
        cx.strokeStyle = TEAL; cx.lineWidth = 5; cx.lineCap = 'round'; cx.stroke();
        cx.textAlign = 'center'; cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.font = '600 14px -apple-system, Helvetica, Arial';
        cx.fillText('SURVIVE', W / 2, 608);
      },
      autopilot: function () {
        pointerX = W / 2 + (rng() - 0.5) * (wallRight - wallLeft) * 0.5;
        return 'alive';
      }
    };
  }

  // ---------- BOSS 7: SWIPE STREAK (swipe left/right alternating) ----------
  function makeBoss7() {
    var t = 0, streak = 0, NEED = 6, lastDir = null, nextDir = 'right', prompt = 0, PROMPT_DUR = 30;
    var swipeStartX = null;
    function nextPrompt() { nextDir = (rng() < 0.5) ? 'left' : 'right'; prompt = PROMPT_DUR; }
    nextPrompt();
    return {
      name: 'SWIPE', color: VERM,
      reset: function () { t = 0; streak = 0; lastDir = null; nextPrompt(); swipeStartX = null; },
      onSwipe: function (dir) {
        if (dir === nextDir) {
          streak++;
          if (window.J) J.hit(streak);
          flash(dir === 'right' ? '→ YES' : '← YES', TEAL, 32);
          if (streak >= NEED) return 'win';
          nextPrompt();
        } else {
          streak = Math.max(0, streak - 1);
          if (window.J) J.near();
          flash('WRONG WAY', VERM, 28);
          if (streak === 0 && t > 60) return 'lose';
        }
        return 'alive';
      },
      onPointerDown: function (x) { swipeStartX = x; },
      onPointerUp:   function (x) {
        if (swipeStartX === null) return 'alive';
        var dx = x - swipeStartX;

    cx.fillText('BEAT ' + (window.__demoScore || bossesBeaten), W / 2, 402);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 438);
    cx.globalAlpha = 1;
  }

  // ---- kick off ----
  initGame();
  if (BOT) {
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    startBoss();
  } else if (DEMO) {
    // demo starts with challenge card, then auto-runs
    phase = 'challenge';
    challengeAt = performance.now();
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    setTimeout(function () { startBoss(); }, 1300);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
