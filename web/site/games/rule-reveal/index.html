<script>
(function () {

  // mulberry32 seeded RNG
  function mulberry32(a) {

      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);

  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // ---- Shape/colour vocabulary ----
  // 4 shapes × 4 colours = 16 glyphs
  // The hidden RULE is: shape cycles in a fixed order (circle→square→triangle→diamond)
  // AND colour shifts +1 each step (TEAL→GOLD→#9b5fcf→#e87d2e).

  var SHAPE_NAMES  = ['circle', 'square', 'triangle', 'diamond'];

  function seqAt(n) {

      cx2.moveTo(x, y - r);

      cx2.moveTo(x,        y - r);
      cx2.lineTo(x + r,    y);
      cx2.lineTo(x,        y + r);
      cx2.lineTo(x - r,    y);
      cx2.closePath(); cx2.fill();

  var SEQ_LEN = 5;            // how many sequence steps shown

      fade:    1.0,             // blank slot fade (1=full, 0=gone → time-out miss)
      fadeSpd: 0.004,           // fraction per ms
      lastMs:  0,               // timestamp of last step start

      ruleAt:  0,

    if (DEMO) { startDemoArc(); return; }
  }

  function startRun() {
    state.phase   = 'play';
    state.step    = 0;
    state.streak  = 0;
    state.score   = 0;
    state.fade    = 1.0;
    state.lastMs  = performance.now();
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // Build choice array: correct answer + 3 distractors (random other glyphs, no dupes)
  function buildChoices(correctStep) {
    var correct = seqAt(correctStep);
    var pool = [];
    for (var s = 0; s < 4; s++) {
      for (var c = 0; c < 4; c++) {
        if (s === correct.shape && c === correct.colour) continue;
        pool.push({ shape: s, colour: c });
      }
    }
    // shuffle pool
    for (var i = pool.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
    }
    var choices = pool.slice(0, 3);
    var insAt = Math.floor(rng() * 4);
    choices.splice(insAt, 0, correct);
    return { choices: choices, correctIdx: insAt };
  }

  var currentChoices = null;

  function ensureChoices() {
    if (!currentChoices) currentChoices = buildChoices(state.step);
  }

  function attempt(idx) {
    if (state.phase !== 'play') return;
    ensureChoices();
    if (idx === currentChoices.correctIdx) {

      state.streak++;
      state.score++;
      state.step++;

      state.lastMs = performance.now();

    var seqStartX = W / 2 - ((SEQ_LEN - 1) / 2) * seqSpacing;
    cx.fillStyle = 'rgba(255,255,255,0.12)';
    cx.font = '500 11px -apple-system, Helvetica, Arial';
    cx.fillText('sequence', W / 2, seqY - seqR - 14);

    for (var si = 0; si < SEQ_LEN; si++) {
      var stepIdx = state.step - SEQ_LEN + si;
      var sx2 = seqStartX + si * seqSpacing;

        cx.save(); cx.globalAlpha = 0.1;
        cx.strokeStyle = '#fff'; cx.lineWidth = 1;
        cx.beginPath(); cx.arc(sx2, seqY, seqR, 0, Math.PI * 2); cx.stroke();
        cx.restore();

        var g2 = seqAt(stepIdx);

    cx.beginPath();
    cx.arc(blankX, blankY, blankR + 4, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * state.fade);
    cx.strokeStyle = fadeCol; cx.lineWidth = 3; cx.globalAlpha = 0.9;
    cx.stroke();
    cx.restore();

    cx.setLineDash([6, 5]);
    cx.beginPath(); cx.arc(blankX, blankY, blankR, 0, Math.PI * 2);
    cx.strokeStyle = 'rgba(255,255,255,0.22)'; cx.lineWidth = 2;
    cx.stroke(); cx.setLineDash([]);
    cx.restore();

    cx.textAlign = 'center';

    cx.fillText('what comes next?', blankX, blankY + blankR + 18);

      cx2c.strokeStyle = 'rgba(255,255,255,0.14)';
      cx2c.lineWidth = 1.5;
      if (cx2c.roundRect) cx2c.roundRect(r2.x, r2.y, r2.w, r2.h, 12);
      else cx2c.rect(r2.x, r2.y, r2.w, r2.h);
      cx2c.fill(); cx2c.stroke();
      cx2c.restore();

      // Shape
      drawShape(cx, ch.shape, COLOURS[ch.colour], r2.x + r2.w / 2, r2.y + r2.h / 2, 22);
    }

    // Score display (bottom)
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '500 12px -apple-system, Helvetica, Arial'; cx.textAlign = 'center';
    cx.fillText('correct: ' + state.score + '  ·  best: ' + best, W / 2, H - 36);
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';

    if (state.ruleShown) {
      // Won — rule revealed
      cx.fillStyle = GOLD;
      cx.font = '800 32px -apple-system, Helvetica, Arial';
      cx.fillText('RULE REVEALED', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '600 16px -apple-system, Helvetica, Arial';
      cx.fillText(RULE_LABEL, W / 2, 325);
      cx.fillStyle = TEAL; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' found in a row', W / 2, 368);
    } else {
      // Lost — missed or timed out
      cx.fillStyle = 'rgba(255,255,255,0.8)';
      cx.font = '700 28px -apple-system, Helvetica, Arial';
      cx.fillText('streak broken', W / 2, 295);
      cx.fillStyle = TEAL; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText(state.streak + ' in a row', W / 2, 335);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('the pattern was right there', W / 2, 366);
    }

    if (!DEMO && !BOT) {
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO TRY AGAIN', W / 2, 430);
      cx.globalAlpha = 1;
    }
  }

  function drawCTA(now) {
    var t = (now - ctaAt) / 1000;
    var ease = Math.min(1, t * 2.0);
    cx.save();
    cx.fillStyle = 'rgba(11,13,18,' + (0.82 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '800 40px -apple-system, Helvetica, Arial';
    cx.fillText('RULE REVEAL', W / 2, 290);
    cx.fillStyle = 'rgba(255,255,255,0.65)'; cx.font = '500 16px -apple-system, Helvetica, Arial';
    cx.fillText('the pattern was right there all along', W / 2, 326);
    cx.fillStyle = TEAL; cx.font = '700 20px -apple-system, Helvetica, Arial';
    var pulse = 0.75 + 0.25 * Math.sin(now / 280);
    cx.globalAlpha = ease * pulse;
    cx.fillText('▶ REACH IT', W / 2, 400);
    cx.globalAlpha = ease;
    cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '500 13px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 432);
    cx.restore();
    window.__demoScore = state.score;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
