<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO     = qs.get('demo') === '1';
  var BOT      = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED     = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  // canvas + fit()
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // Grid: 4×4 = 8 pairs
  var COLS = 4, ROWS = 4, NUM_PAIRS = 8;
  var CARD_W = 80, CARD_H = 100, CARD_GAP = 10;
  var GRID_X = (W - (COLS * (CARD_W + CARD_GAP) - CARD_GAP)) / 2;
  var GRID_Y = 148;

  // Emoji symbols as card faces
  var EMOJIS = ['🌅','🏠','🎸','🐾','🌊','🎯','🍕','🎭'];
  var CARD_HUES = [168, 24, 48, 200, 280, 340, 90, 310];

  // ---- state ----
  var cards, flipped, matched, flips, phase, runStartTs, dareBeaten;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [];
  var botRunsDone = 0;
  var overAt = 0, challengeAt = 0, ctaAt = 0;
  var best = Infinity;
  try { var _b = +localStorage.getItem('fp_best'); if (_b > 0) best = _b; } catch (_) {}

  function cardPos(i) {
    return {
      x: GRID_X + (i % COLS) * (CARD_W + CARD_GAP),
      y: GRID_Y + Math.floor(i / COLS) * (CARD_H + CARD_GAP)
    };
  }

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function newGame() {
    var deck = [];
    for (var i = 0; i < NUM_PAIRS; i++) {
      deck.push({ id: i, emoji: EMOJIS[i], hue: CARD_HUES[i], face: false, matched: false, flipAnim: 0 });
      deck.push({ id: i, emoji: EMOJIS[i], hue: CARD_HUES[i], face: false, matched: false, flipAnim: 0 });
    }
    shuffle(deck);
    cards = deck;
    flipped = [];
    matched = 0;
    flips = 0;
    dareBeaten = false;
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    phase = 'title';

    // reset autopilot
    apState = 'idle';
    apTimer = 0;
    apQueue = null;
    apQueueIdx = 0;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- tap a card (index in cards[]) ----
  // Returns true if the tap was accepted
  function tapCard(idx) {
    if (phase !== 'play') return false;
    var c = cards[idx];
    if (c.matched || c.face) return false;
    if (flipped.length >= 2) return false;  // waiting for flip-back

    c.face = true;
    flipped.push(idx);

    if (flipped.length === 2) {
      flips++;
      var a = cards[flipped[0]], b = cards[flipped[1]];
      if (a.id === b.id) {
        // MATCH
        matched++;
        a.matched = b.matched = true;
        flipped = [];
        if (window.J) {
          if (matched === NUM_PAIRS) { J.gold(); hitStop = 5; zoom = 1.03; }
          else J.hit(matched);
          J.tension(matched / NUM_PAIRS);
        }
        flash(matched === NUM_PAIRS ? 'CLEARED!' : 'MATCH!', TEAL, matched === NUM_PAIRS ? 52 : 38);
        if (matched === NUM_PAIRS) {
          setTimeout(winGame, 400);
        }
      } else {
        // MISMATCH — flip back after delay
        if (window.J) J.near();
        shakeAmt = 3;
        flash('NOPE', VERM, 32);
        if (window.LOOP) LOOP.emit('near_miss', { flips: flips });
        var fa = flipped[0], fb = flipped[1];
        flipped = [];  // clear IMMEDIATELY so autopilot doesn't re-enter during timeout
        setTimeout(function () {
          if (cards[fa]) cards[fa].face = false;
          if (cards[fb]) cards[fb].face = false;
        }, 900);
        return 'mismatch';
      }
    }
    return true;
  }

  function winGame() {
    if (phase === 'over') return;
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = flips < best;
    if (window.J) { J.fanfare(); if (newBest) setTimeout(function () { J.gold(); }, 500); }
    if (newBest) { best = flips; try { localStorage.setItem('fp_best', String(best)); } catch (_) {} }
    if (DEMO) window.__demoScore = flips;
    if (window.LOOP) LOOP.emit('game_over', { score: flips, dur_s: +dur.toFixed(1) });
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && flips <= SHARE.dare) {
      dareBeaten = true; flash('DARE BEATEN!', TEAL, 44);
      if (window.J) J.fanfare(); SHARE.beaten(flips);
    }
    if (DEMO) {
      setTimeout(function () { phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(botRestart, 600);
    }
  }

  function botRestart() {
    rng = mulberry32(SEED + botRunsDone * 1337);
    if (window.LOOP) LOOP.emit('restart', {});
    newGame();
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  function pctTop(flips) {
    // fewer flips = better; perfect is NUM_PAIRS flips, bad is ~3*NUM_PAIRS
    var normalized = Math.max(0, flips - NUM_PAIRS) / (NUM_PAIRS * 2);
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-3 * (1 - normalized)))));
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 530, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play') {
      for (var i = 0; i < cards.length; i++) {
        var p = cardPos(i);
        if (px >= p.x && px <= p.x + CARD_W && py >= p.y && py <= p.y + CARD_H) {
          tapCard(i); return;
        }
      }
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: flips, unit: 'flips' }); return;
      }
      rng = mulberry32(SEED + 9999);
      if (window.LOOP) LOOP.emit('restart', {});
      newGame(); startRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'Enter') tap(W / 2, H / 2);
  });

  // ---- Autopilot (demo + bot) ----
  // State machine: idle → pick1 (choose first card, wait) → pick2 (choose second, wait for result)
  // → [mismatch_wait if mismatch] → idle (pick next pair)
  var apState = 'idle';   // idle | wait_pick1 | wait_pick2 | wait_flipback
  var apTimer = 0;        // countdown in frames
  var apQueue = null;     // array of {a, b, correct} steps
  var apQueueIdx = 0;
  var apFirst = -1;       // first card tapped in current turn

  function buildDemoQueue() {
    // Build pair map
    var pm = {};
    for (var i = 0; i < cards.length; i++) {
      var id = cards[i].id;
      if (!pm[id]) pm[id] = [];
      pm[id].push(i);
    }
    var ids = [0,1,2,3,4,5,6,7];
    var q = [];
    // Mirror-neuron arc: 3 clean matches, 1 mismatch (tension peak), then recover all remaining
    // Match 0, 1, 2
    q.push({ a: pm[ids[0]][0], b: pm[ids[0]][1] });
    q.push({ a: pm[ids[1]][0], b: pm[ids[1]][1] });
    q.push({ a: pm[ids[2]][0], b: pm[ids[2]][1] });
    // MISMATCH: pick first of pair 3 + first of pair 4 (near-fail tension)
    q.push({ a: pm[ids[3]][0], b: pm[ids[4]][0], mismatch: true });
    // Recovery: correct remaining pairs 3-7
    q.push({ a: pm[ids[3]][0], b: pm[ids[3]][1] });
    q.push({ a: pm[ids[4]][0], b: pm[ids[4]][1] });
    q.push({ a: pm[ids[5]][0], b: pm[ids[5]][1] });
    q.push({ a: pm[ids[6]][0], b: pm[ids[6]][1] });
    q.push({ a: pm[ids[7]][0], b: pm[ids[7]][1] });
    return q;
  }

  function buildBotQueue() {
    var pm = {};
    for (var i = 0; i < cards.length; i++) {
      var id = cards[i].id;
      if (!pm[id]) pm[id] = [];
      pm[id].push(i);
    }
    var ids = [0,1,2,3,4,5,6,7];
    // shuffle order
    for (var k = ids.length - 1; k > 0; k--) {
      var j = Math.floor(rng() * (k + 1));
      var t = ids[k]; ids[k] = ids[j]; ids[j] = t;
    }
    var q = [];
    for (var n = 0; n < ids.length; n++) {
      // ~25% chance of a mismatch before the correct pair
      if (rng() < 0.25 && n < ids.length - 1) {
        q.push({ a: pm[ids[n]][0], b: pm[ids[n+1]][0], mismatch: true });
      }
      q.push({ a: pm[ids[n]][0], b: pm[ids[n]][1] });
    }
    return q;
  }

  // hesitation wait in frames at 60fps
  var DEMO_WAITS  = [32, 26, 40, 22, 55, 30, 44, 28, 50, 35, 38, 25];
  var BOT_WAIT_LO = 14, BOT_WAIT_HI = 28;

  function apWait() {
    if (DEMO) return DEMO_WAITS[apQueueIdx % DEMO_WAITS.length];
    return BOT_WAIT_LO + Math.floor(rng() * (BOT_WAIT_HI - BOT_WAIT_LO));
  }

  function autopilot() {
    if (phase !== 'play') return;
    if (hitStop > 0) return;   // frozen

    if (apQueue === null) {
      apQueue = DEMO ? buildDemoQueue() : buildBotQueue();
      apQueueIdx = 0;
      apState = 'idle';
      apTimer = apWait();
    }

    if (apTimer > 0) { apTimer--; return; }

    if (apState === 'idle') {
      if (apQueueIdx >= apQueue.length) return;  // done
      // Start picking: pick first card
      var step = apQueue[apQueueIdx];
      // Skip if card already matched (previous mismatch then it got matched via a correct pair)
      if (cards[step.a].matched && cards[step.b].matched) { apQueueIdx++; return; }
      // If it's a mismatch step but one of the cards is now matched, skip
      if (step.mismatch && (cards[step.a].matched || cards[step.b].matched)) { apQueueIdx++; return; }
      // Tap first card
      var idxA = step.a;
      // If already face-up from a previous mismatch that hasn't flipped back, wait
      if (cards[idxA].face && !cards[idxA].matched) { apTimer = 8; return; }
      if (!cards[idxA].matched) {
        apFirst = idxA;
        tapCard(idxA);
        apState = 'pick2';
        apTimer = DEMO ? Math.floor(apWait() / 2) : (BOT_WAIT_LO + Math.floor(rng() * 10));
      } else {
        // card already matched (by a prior step), pick its partner or skip
        apQueueIdx++;
      }
    } else if (apState === 'pick2') {
      var step2 = apQueue[apQueueIdx];
      var idxB = step2.b;
      // If idxB is already matched, skip whole step
      if (cards[idxB].matched) { apQueueIdx++; apState = 'idle'; apTimer = 4; return; }
      // If idxB face-up from prior mismatch, wait
      if (cards[idxB].face && !cards[idxB].matched) { apTimer = 8; return; }
      var res = tapCard(idxB);
      apQueueIdx++;
      if (res === 'mismatch') {
        // Wait for flip-back animation (900ms ≈ 54 frames at 60fps)
        apState = 'mismatch_wait';
        apTimer = 58;
      } else {
        apState = 'idle';
        apTimer = apWait();
      }
    } else if (apState === 'mismatch_wait') {
      // Cards are flipping back; wait is handled by apTimer countdown
      apState = 'idle';
      apTimer = apWait();
    }
  }

  // ---- render ----
  function drawCard(i, now) {
    var c = cards[i], p = cardPos(i);
    var x = p.x, y = p.y;

    // Animate flip: face=true → flipAnim → 1; face=false → flipAnim → 0
    var target = (c.face || c.matched) ? 1 : 0;
    c.flipAnim += (target - c.flipAnim) * 0.15;

    var fa = c.flipAnim;
    // scaleX: 0→0.5 show back, 0.5→1 show front
    var sx = Math.abs(2 * fa - 1);  // 1→0→1
    var showFront = fa > 0.5;
    var drawW = Math.max(1, CARD_W * sx);
    var ox = x + (CARD_W - drawW) / 2;

    cx.save();
    if (c.matched) {
      // matched: teal glow
      cx.shadowColor = TEAL;
      cx.shadowBlur  = 10 + 4 * Math.sin(now / 500 + i * 0.7);
    }

    if (!showFront) {
      // back face
      cx.fillStyle = '#1a1d28';
      cx.strokeStyle = 'rgba(255,255,255,0.10)';
      cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(ox, y, drawW, CARD_H, 8); else cx.rect(ox, y, drawW, CARD_H);
      cx.fill(); cx.stroke();
      // dot pattern
      if (sx > 0.25 && !c.matched) {
        cx.globalAlpha = 0.15 * sx;
        cx.fillStyle = TEAL;
        for (var dx = 0; dx < 3; dx++) for (var dy = 0; dy < 4; dy++) {
          cx.beginPath();
          cx.arc(ox + drawW * (dx + 0.7) / 4, y + CARD_H * (dy + 0.6) / 5, 2, 0, Math.PI * 2);
          cx.fill();
        }
        cx.globalAlpha = 1;
      }
    } else {
      // front face
      var hueStr = 'hsl(' + c.hue + ',55%,52%)';
      cx.fillStyle = c.matched ? 'hsl(' + c.hue + ',50%,36%)' : hueStr;
      cx.strokeStyle = c.matched ? 'rgba(46,197,182,0.6)' : 'rgba(255,255,255,0.20)';
      cx.lineWidth = c.matched ? 2 : 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(ox, y, drawW, CARD_H, 8); else cx.rect(ox, y, drawW, CARD_H);
      cx.fill(); cx.stroke();
      // emoji
      if (sx > 0.15) {
        cx.globalAlpha = Math.min(1, sx * 2 - 0.3);
        cx.font = '30px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.9)';
        cx.fillText(c.emoji, x + CARD_W / 2, y + CARD_H / 2 + 11);
        cx.globalAlpha = 1;
      }
    }
    cx.restore();
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop: freeze sim but decay
    if (hitStop > 0) { hitStop -= dt; }
    else { autopilot(); }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx2 = (Math.random() - 0.5) * shakeAmt, sy2 = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx2, H / 2 + sy2); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- CHALLENGE CARD ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 294);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('18', W / 2, 396);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('flips to clear all pairs', W / 2, 432);
    }

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('FLIP PAIRS', W / 2, 268);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 310);
      cx.globalAlpha = pulse; cx.fillText('TAP TO START', W / 2, 318); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('match all pairs. fewer flips = better.', W / 2, 352);
      if (best < Infinity) {
        cx.fillStyle = GOLD; cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText('BEST: ' + best + ' flips', W / 2, 382);
      }
    }

    // ---- PLAY/OVER: grid + header ----
    if (phase === 'play' || phase === 'over') {
      // flip count header
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(flips, W / 2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('FLIPS' + (best < Infinity ? '   BEST ' + best : ''), W / 2, 110);

      // progress bar
      var barW = 200, barH = 5, barX = (W - barW) / 2, barY = 122;
      cx.fillStyle = 'rgba(255,255,255,0.08)';
      cx.beginPath(); if (cx.roundRect) cx.roundRect(barX, barY, barW, barH, 2); else cx.rect(barX, barY, barW, barH); cx.fill();
      cx.fillStyle = TEAL;
      var fw = barW * (matched / NUM_PAIRS);
      cx.beginPath(); if (cx.roundRect) cx.roundRect(barX, barY, fw, barH, 2); else cx.rect(barX, barY, fw, barH); cx.fill();

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + ' flips', W / 2, 138);
      }

      // cards
      for (var i = 0; i < cards.length; i++) drawCard(i, now);
    }

    // ---- OVER overlay ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.65)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('CLEARED!', W / 2, 295);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(flips + ' flips', W / 2, 342);
      var pt = pctTop(flips);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 384);
      cx.fillStyle = 'rgba(255,255,255,0.48)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better memory than ' + (100 - pt) + '% of players', W / 2, 408);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 290);
        cx.globalAlpha = p2; cx.fillStyle = VERM; cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — BEAT YOUR SCORE', W / 2, 455); cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)'; cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- CTA (demo) ----
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial'; cx.fillText('FLIP PAIRS', W / 2, 294);
      cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('I cleared it in ' + (window.__demoScore || 18) + ' flips.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3; cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 18), W / 2, 410);
      cx.globalAlpha = ease; cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 448); cx.globalAlpha = 1;
    }

    // floating reward text
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      cx.globalAlpha = Math.max(0, 1 - fl.t / 38);
      cx.textAlign = 'center'; cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 232 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial'; cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
