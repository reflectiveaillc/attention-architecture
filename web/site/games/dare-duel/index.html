<script>
(function () {
  'use strict';
  var W = 405, H = 720;

  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game config ----
  var CARD_W = 280, CARD_H = 72;
  var CARD_X = W / 2;          // center x of falling card
  var TAP_ZONE_Y = H - 170;    // y of tap zone (center of catch strip)
  var TAP_ZONE_H = 90;         // height of catch window
  var TAP_ZONE_TOP = TAP_ZONE_Y - TAP_ZONE_H / 2;
  var GAME_DURATION = BOT ? 8 : 60;  // bot: short run so game_over fires fast
  var LIVES_MAX = 3;

  // dare label pools — varied to feel organic
  var DARE_TEXTS = [
    'send this', 'top score?', 'dare u', 'beat this',
    'your turn', 'can u top?', 'try me', 'one shot'
  ];
  // hot dares are the ones that must be tapped or you lose a life
  var HOT_TEXTS = ['HOT DARE', 'MUST SEND', 'DOUBLE DARE'];

  // ---- state ----
  var state, flashes, runStartTs;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var dareBeaten = false, challengeAt = 0, ctaAt = 0;
  var last = performance.now();
  var botRunsDone = 0;

  function newGame() {
    rng = mulberry32(SEED); // reset RNG each game for reproducibility
    state = {
      phase: 'title',    // title | challenge | play | over | cta
      cards: [],
      score: 0,
      combo: 0,
      lives: LIVES_MAX,
      timeLeft: GAME_DURATION,
      spawnTimer: 0,
      spawnInterval: 1.6,   // seconds between cards
      baseSpeed: 90,        // px/s
      overAt: 0,
      tapped: false         // player tapped this frame
    };
    flashes = [];
    dareBeaten = false;

    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
    // human: show title
  }

  function startRun() {
    state.phase = 'play';
    state.cards = [];
    state.score = 0;
    state.combo = 0;
    state.lives = LIVES_MAX;
    state.timeLeft = GAME_DURATION;
    state.spawnTimer = 0;
    state.spawnInterval = 1.6;
    state.baseSpeed = 90;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnCard() {
    var isHot = rng() < 0.3;
    var txt = isHot
      ? HOT_TEXTS[Math.floor(rng() * HOT_TEXTS.length)]
      : DARE_TEXTS[Math.floor(rng() * DARE_TEXTS.length)];
    // x wobbles slightly left/right of center
    var xOff = (rng() - 0.5) * 60;
    state.cards.push({
      x: W / 2 + xOff,
      y: -CARD_H / 2 - 10,
      txt: txt,
      hot: isHot,
      speed: state.baseSpeed * (0.88 + rng() * 0.24),
      tapped: false,
      missed: false,
      alpha: 1,
      scale: 1,
      rot: (rng() - 0.5) * 0.04
    });
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 18))));
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 8;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.death(Math.min(0.3 + state.score / 30, 1));
    if (DEMO) window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(resetRun, 800);
    }
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size || 40, t: 0 });
  }

  // ---- tap handler ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 492, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'dares' }); return;
      }
      resetRun(); return;
    }
    if (state.phase === 'play') {
      state.tapped = true;
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- process a tap in play phase ----
  function processTap() {
    // find topmost card in tap zone
    var hit = null, hitIdx = -1;
    for (var i = state.cards.length - 1; i >= 0; i--) {
      var c = state.cards[i];
      if (c.tapped || c.missed) continue;
      var cy = c.y;
      if (cy >= TAP_ZONE_TOP && cy <= TAP_ZONE_TOP + TAP_ZONE_H) {
        if (!hit || c.y > hit.y) { hit = c; hitIdx = i; }
      }
    }

    if (!hit) {
      // tapped outside zone — wobble penalty feel but no penalty in core rules
      shakeAmt = 2;
      return;
    }

    // determine quality by position within window
    var center = TAP_ZONE_Y;
    var dist = Math.abs(hit.y - center);
    var ratio = dist / (TAP_ZONE_H / 2);  // 0 = perfect, 1 = edge
    var perfect = ratio < 0.18;
    var hot = hit.hot;

    hit.tapped = true;
    state.score++;
    state.combo++;

    // dare-beaten check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }

    if (window.J) {
      if (perfect) J.perfect(state.combo);
      else if (hot)  J.gold();
      else           J.hit(state.combo);
      J.tension(Math.min(state.score / 30, 1));
    }

    if (perfect)    { hitStop = 5; zoom = 1.025; flash('PERFECT', TEAL, 46); }
    else if (hot)   { hitStop = 3; flash('HOT!', GOLD, 44); }
    else            { flash('+' + state.combo, VERM, 36 + Math.min(state.combo * 2, 12)); }

    if (perfect || hot) shakeAmt = 3;

    if (window.LOOP) LOOP.emit('dare_sent', { score: state.score, combo: state.combo, perfect: perfect, hot: hot });

    // animate card out: shrink + fade
    hit.scale = 1.12;
    hit.fadeOut = true;
  }

  // ---- autopilot (demo / bot) ----
  // Demo script: series of (relative) delays in frames before tapping
  var demoScript = [26, 31, 22, 45, 19, 38, 28, 55, 22, 30, 40, 'miss', 25, 27];
  var demoIdx = 0, demoWait = 20;
  var demoWaits = [26, 22, 31, 42, 18, 35, 27, 50, 22, 28, 36, 0, 24, 26];
  var botWait = 0;

  function autopilot() {
    if (state.phase !== 'play') return;

    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var action = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      // find a card in zone
      var inZone = state.cards.filter(function(c){ return !c.tapped && !c.missed && c.y >= TAP_ZONE_TOP && c.y <= TAP_ZONE_TOP + TAP_ZONE_H; });
      if (action === 'miss') {
        // intentionally let this card pass — near-fail moment
        demoIdx++;
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 28;
        return;
      }
      if (inZone.length > 0) {
        state.tapped = true;
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 28;
        demoIdx++;
      }
    } else if (BOT) {
      // bot: tap cards with some imperfection; short GAME_DURATION ensures game_over fires
      if (botWait > 0) { botWait--; return; }
      var inZoneB = state.cards.filter(function(c){ return !c.tapped && !c.missed && c.y >= TAP_ZONE_TOP && c.y <= TAP_ZONE_TOP + TAP_ZONE_H; });
      if (inZoneB.length > 0) {
        var shouldTap = rng() < 0.70; // miss 30% of the time
        if (shouldTap) state.tapped = true;
        botWait = Math.floor(3 + rng() * 6);
      }
    }
  }

  // ---- render ----
  var last2 = performance.now();
  function frame(now) {
    var dt = Math.min((now - last2) / 16.667, 3); last2 = now;

    // hit-stop: decay every frame so autopilot never stays frozen
    if (hitStop > 0) { hitStop -= dt; }

    // process tap
    if (state.tapped) { state.tapped = false; processTap(); }

    // physics + logic (skip during hit-stop)
    if (hitStop <= 0 && state.phase === 'play') {
      // timer
      state.timeLeft -= dt * (1 / 60);
      if (state.timeLeft <= 0) { state.timeLeft = 0; gameOver(); }

      // ramp difficulty
      var elapsed = GAME_DURATION - state.timeLeft;
      state.baseSpeed    = 90  + elapsed * 1.8;
      state.spawnInterval = Math.max(0.65, 1.6 - elapsed * 0.015);

      // spawn cards
      state.spawnTimer -= dt * (1 / 60);
      if (state.spawnTimer <= 0) {
        spawnCard();
        state.spawnTimer = state.spawnInterval * (0.82 + rng() * 0.36);
      }

      // move cards + miss detection
      for (var i = state.cards.length - 1; i >= 0; i--) {
        var c = state.cards[i];
        if (!c.tapped || c.fadeOut) {
          if (!c.tapped) {
            c.y += c.speed * dt * (1 / 60);
          }
          // fade-out animation for tapped cards
          if (c.fadeOut) {
            c.alpha -= 0.08 * dt;
            c.scale  += 0.015 * dt;
            if (c.alpha <= 0) { state.cards.splice(i, 1); continue; }
          }
          // miss detection: card fully below tap zone without being tapped
          if (!c.tapped && !c.missed && c.y > TAP_ZONE_TOP + TAP_ZONE_H + CARD_H / 2 + 10) {
            c.missed = true;
            state.combo = 0;
            if (c.hot) {
              state.lives--;
              shakeAmt = 6;
              flash('MISSED!', VERM, 42);
              if (window.LOOP) LOOP.emit('near_miss', { score: state.score, hot: true });
              if (window.J) J.near();
              if (state.lives <= 0 && state.phase === 'play') { gameOver(); }
            }
          }
          // remove off-screen non-hot missed cards
          if (c.missed && c.y > H + CARD_H) { state.cards.splice(i, 1); continue; }
        }
      }

      // autopilot must run AFTER physics so it sees card positions this frame
      autopilot();
    } else if (state.phase === 'play' && hitStop > 0) {
      // during hit-stop only run autopilot (returns early if card not in zone anyway)
      autopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(232,80,46,0.05)'); bg.addColorStop(1, 'rgba(46,197,182,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // draw tap zone strip
    if (state.phase === 'play') {
      cx.strokeStyle = 'rgba(242,177,52,0.18)'; cx.lineWidth = 1;
      cx.setLineDash([6, 6]);
      cx.beginPath(); cx.moveTo(40, TAP_ZONE_TOP); cx.lineTo(W - 40, TAP_ZONE_TOP); cx.stroke();
      cx.beginPath(); cx.moveTo(40, TAP_ZONE_TOP + TAP_ZONE_H); cx.lineTo(W - 40, TAP_ZONE_TOP + TAP_ZONE_H); cx.stroke();
      cx.setLineDash([]);
      // "TAP HERE" label
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(242,177,52,0.3)';
      cx.font = '700 11px Menlo, monospace';
      cx.fillText('TAP TO SEND', W / 2, TAP_ZONE_Y + 5);
    }

    // draw falling dare cards
    for (var j = 0; j < state.cards.length; j++) {
      var card = state.cards[j];
      if (card.alpha <= 0) continue;
      cx.save();
      cx.globalAlpha = card.alpha;
      cx.translate(card.x, card.y);
      cx.rotate(card.rot);
      cx.scale(card.scale, card.scale);
      // card background
      var grad = cx.createLinearGradient(-CARD_W / 2, -CARD_H / 2, CARD_W / 2, CARD_H / 2);
      if (card.hot) {
        grad.addColorStop(0, 'rgba(232,80,46,0.22)');
        grad.addColorStop(1, 'rgba(232,80,46,0.10)');
        cx.strokeStyle = VERM;
      } else {
        grad.addColorStop(0, 'rgba(255,255,255,0.10)');
        grad.addColorStop(1, 'rgba(255,255,255,0.04)');
        cx.strokeStyle = 'rgba(255,255,255,0.25)';
      }
      cx.fillStyle = grad;
      cx.lineWidth = card.hot ? 1.5 : 1;
      cx.beginPath();
      if (cx.roundRect) { cx.roundRect(-CARD_W/2, -CARD_H/2, CARD_W, CARD_H, 16); }
      else { cx.rect(-CARD_W/2, -CARD_H/2, CARD_W, CARD_H); }
      cx.fill(); cx.stroke();
      // card text
      cx.textAlign = 'center';
      cx.fillStyle = card.hot ? VERM : '#fff';
      cx.font = '800 ' + (card.hot ? '19' : '17') + 'px -apple-system, Helvetica, Arial';
      cx.fillText(card.txt, 0, -6);
      // sub line
      cx.fillStyle = card.hot ? 'rgba(232,80,46,0.7)' : 'rgba(255,255,255,0.4)';
      cx.font = '600 11px -apple-system, Helvetica, Arial';
      cx.fillText(card.hot ? '⚡ tap or lose a life' : '⚡ dare link', 0, 16);
      cx.restore();
    }

    // timer bar (top)
    if (state.phase === 'play') {
      var tRatio = Math.max(0, state.timeLeft / GAME_DURATION);
      var barW = (W - 60) * tRatio;
      cx.fillStyle = 'rgba(255,255,255,0.08)';
      cx.fillRect(30, 36, W - 60, 5);
      var barColor = tRatio > 0.4 ? TEAL : VERM;
      cx.fillStyle = barColor;
      cx.fillRect(30, 36, barW, 5);

      // lives dots
      for (var li = 0; li < LIVES_MAX; li++) {
        cx.beginPath();
        cx.arc(W / 2 + (li - 1) * 18, 60, 5, 0, Math.PI * 2);
        cx.fillStyle = li < state.lives ? GOLD : 'rgba(255,255,255,0.15)';
        cx.fill();
      }

      // score
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 118);

      // combo if > 1
      if (state.combo > 1) {
        var comboSize = Math.min(28, 18 + state.combo);
        cx.fillStyle = GOLD;
        cx.font = '900 ' + comboSize + 'px -apple-system, Helvetica, Arial';
        var bright = Math.sin(performance.now() / 80) * 0.15 + 0.85;
        cx.globalAlpha = bright;
        cx.fillText('×' + state.combo + ' COMBO', W / 2, 148);
        cx.globalAlpha = 1;
        if (window.J && state.combo % 5 === 0) J.tension(Math.min(state.combo / 15, 1));
      }

      // incoming dare banner (if dare param set)
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 170);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('21', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 432);
    }

    // flashes (floating text)
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.65);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // title screen
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('DARE DUEL', W / 2, 270);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO SEND DARES', W / 2, 320); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('60 seconds. catch every dare.', W / 2, 354);
      cx.fillStyle = GOLD; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('HOT DARES = tap or lose a life', W / 2, 376);
    }

    // game over screen
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText(state.lives <= 0 ? 'DARED OUT.' : 'TIME\'S UP.', W / 2, 295);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' dares sent', W / 2, 342);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 388);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 412);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE RUN', W / 2, 458);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) { cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); }
        else { cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h); }
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var tCta = (now - ctaAt) / 1000, ease = Math.min(1, tCta * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('DARE DUEL', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they sent ' + (window.__demoScore || 21) + ' dares. your 60s.', W / 2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 21), W / 2, 406);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 438);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
