<script>

      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');

      if (window.LOOP) LOOP.emit('loot_banked', { round: state.round, gain: gain, perfect: perfect, edge: edge });

        if (window.J) J.fanfare(); SHARE.beaten(state.score);
      }
      if (DEMO) { demoIdx++; demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)]; }
      if (BOT) { botTarget = null; botWait = 12 + Math.floor(rng() * 22); }
      setRound(state.round + 1);
    } else {                                             // released outside the gold zone -> SLAM
      slam();
    }
  }

  function slam() {
    state.holding = false;
    state.slamAnim = 1;
    shakeAmt = 7;
    if (window.J) J.death(0.5);
    var edge = Math.min(Math.abs(state.fill - (state.gCenter - state.gHalf)),
                        Math.abs(state.fill - (state.gCenter + state.gHalf)));
    if (edge < state.gHalf * 0.25) {

  function explode() {                                   // held past the top -> boom

  function gameOver(kind) {
    state.phase = 'over';
    state.overAt = performance.now();
    state.deathKind = kind;
    if (window.J) J.tension(0);
    var dur = (Date.now() - runStartTs) / 1000;

    if (DEMO) setTimeout(function () {
      state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3600);

      else setTimeout(resetRun, 900);

  }

  function resetRun() {

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- particles ----
  function spawnGems(n) {

        x: W / 2 + (rng() - 0.5) * 70, y: 535,
        vx: (rng() - 0.5) * 4.5, vy: -4 - rng() * 3.5,

      particles.push({
        x: W / 2, y: 590, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2,

      });

  // ---- input ----

  // demo script: desired release offset within the gold zone, in gHalf units
  // (0 = dead center = perfect, +-0.9 = the sliver save, 'overflow' = don't let go -> boom).
  // mirror-neuron arc: clean perfect -> two normal holds -> the SLIVER near-fail save
  // at ~60% -> one more -> the real fail (explosion the viewer saw coming).
  // Hesitation (demoWaits) before each hold keeps it human, never robotic.
  var demoScript = [0.0, -0.35, 0.45, 0.9, -0.3, 0.55, 'overflow'], demoIdx = 0, demoWait = 0;
  var demoWaits = [28, 36, 30, 60, 34, 44, 24];

  function autopilot() {
    if (state.phase !== 'play') return;
    if (!state.holding) {
      if (DEMO) { if (demoWait > 0) demoWait--; else state.holding = true; }
      else if (BOT) { if (botWait > 0) botWait--; else { botTarget = gauss() * BOT_ERR; state.holding = true; } }
      return;
    }

    if (DEMO) {

      if (want === 'overflow') return;                 // never release -> fill hits 1.0 -> explode
      var target = state.gCenter + want * state.gHalf;
      if (state.fill >= target) release();
    } else if (BOT) {
      var t = state.gCenter + botTarget * state.gHalf;
      if (state.fill >= t) release();

  }

  function chestBody(alpha) {

    cx.rotate(-openAnim * 0.75);                        // swings back as it opens
    cx.translate(-W / 2, -(y + h));

    g.addColorStop(0, '#d54a2e'); g.addColorStop(1, '#9a3522');

    cx.strokeStyle = GOLD; cx.lineWidth = 3;
    cx.beginPath(); (cx.roundRect ? cx.roundRect(x + 1.5, y + 1.5, w - 3, h - 3, 8) : cx.rect(x + 1.5, y + 1.5, w - 3, h - 3)); cx.stroke();

    if (state.slamAnim > 0) state.slamAnim = Math.max(0, state.slamAnim - dt * 0.08);
    if (state.deadAnim > 0) state.deadAnim = Math.max(0, state.deadAnim - dt * 0.02);

    // ---- juice transforms: decaying shake + zoom-pulse ----
    cx.save();

      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- pressure bar ----
    var bx = W / 2 - BAR_W / 2;
    // track
    cx.fillStyle = 'rgba(255,255,255,0.05)';
    cx.beginPath(); (cx.roundRect ? cx.roundRect(bx, BAR_TOP, BAR_W, BAR_H, 14) : cx.rect(bx, BAR_TOP, BAR_W, BAR_H)); cx.fill();
    // gold zone band (the target)
    var zTop = BAR_BOT - (state.gCenter + state.gHalf) * BAR_H;
    var zBot = BAR_BOT - (state.gCenter - state.gHalf) * BAR_H;
    cx.fillStyle = 'rgba(242,177,52,0.18)';
    cx.fillRect(bx, zTop, BAR_W, zBot - zTop);
    cx.strokeStyle = GOLD; cx.lineWidth = 2; cx.setLineDash([6, 4]);
    cx.beginPath(); cx.moveTo(bx, zTop); cx.lineTo(bx + BAR_W, zTop);
    cx.moveTo(bx, zBot); cx.lineTo(bx + BAR_W, zBot); cx.stroke(); cx.setLineDash([]);

    var fillH = state.fill * BAR_H, fillTop = BAR_BOT - fillH;
    if (fillH > 0) {
      cx.save(); cx.beginPath(); (cx.roundRect ? cx.roundRect(bx, BAR_TOP, BAR_W, BAR_H, 14) : cx.rect(bx, BAR_TOP, BAR_W, BAR_H)); cx.clip();
      var fg = cx.createLinearGradient(0, BAR_BOT, 0, BAR_TOP);
      fg.addColorStop(0, TEAL); fg.addColorStop(0.55, GOLD); fg.addColorStop(1, VERM);
      cx.fillStyle = fg; cx.fillRect(bx, fillTop, BAR_W, fillH);

      cx.restore();
    }
    // bar frame
    cx.strokeStyle = 'rgba(255,255,255,0.18)'; cx.lineWidth = 1.5;
    cx.beginPath(); (cx.roundRect ? cx.roundRect(bx, BAR_TOP, BAR_W, BAR_H, 14) : cx.rect(bx, BAR_TOP, BAR_W, BAR_H)); cx.stroke();

    // stakes-visible: chest glows + trembles as pressure nears the top
    var heat = Math.max(0, state.fill - 0.6) / 0.4;
    if (heat > 0 && state.phase === 'play') {

      cx.shadowColor = VERM; cx.shadowBlur = 24 * heat;
      cx.fillStyle = 'rgba(232,80,46,' + (0.15 * heat) + ')';
      cx.fillRect(0, 0, W, H);
      cx.restore();

    // ---- chest ----
    var dead = state.deathKind === 'explode' && state.deadAnim > 0;
    var tremor = (state.phase === 'play' && state.fill > 0.85) ? (Math.random() - 0.5) * 3 * (state.fill - 0.85) * 6 : 0;
    cx.save();
    cx.translate(tremor, 0);
    if (!dead) {

        cx.globalAlpha = state.openAnim;
        for (var gi = 0; gi < 5; gi++) {
          var gx = W / 2 - 45 + gi * 22, gy = 595;
          cx.fillStyle = gi % 2 ? TEAL : GOLD;
          cx.beginPath(); cx.moveTo(gx, gy - 9); cx.lineTo(gx + 8, gy); cx.lineTo(gx, gy + 9); cx.lineTo(gx - 8, gy); cx.closePath(); cx.fill();
        }

    // ---- particles ----
    for (var i = particles.length - 1; i >= 0; i--) {

      cx.save(); cx.translate(p.x, p.y); cx.rotate(p.rot); cx.globalAlpha = Math.max(0, Math.min(1, p.life / 30));
      cx.fillStyle = p.color;
      if (p.kind === 'gem') {
        cx.beginPath(); cx.moveTo(0, -p.size); cx.lineTo(p.size, 0); cx.lineTo(0, p.size); cx.lineTo(-p.size, 0); cx.closePath(); cx.fill();

    // ---- HUD: score + combo + dare banner ----
    if (state.phase === 'play' || state.phase === 'over') {

      cx.font = '800 60px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('GEMS  ·  BEST ' + best, W / 2, 108);
      // combo escalation — grows/brightens with combo
      if (state.combo > 1) {
        var cs = 16 + Math.min(state.combo, 12) * 1.6;

      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(CHALLENGE), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top haul", W / 2, 430);
    }

    // ---- floating reward text ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 42);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // ---- title ----
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('LONG PRESS LOOT', W / 2, 270);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('HOLD TO FILL', W / 2, 318); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('release in the gold. hold too long and it pops.', W / 2, 348);
    }

    // ---- game over ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.58)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(state.deathKind === 'explode' ? 'BOOM.' : 'SLAMMED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' gems', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('HOLD — ONE MORE TRY', W / 2, 460);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)'; cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- demo CTA card ----
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.76 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('LONG PRESS LOOT', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he banked ' + (window.__demoScore || CHALLENGE) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || CHALLENGE), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
