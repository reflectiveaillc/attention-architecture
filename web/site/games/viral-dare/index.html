<script>
(function () {
  'use strict';

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;

    ripples.push({ x: f.x, y: f.y, r: 0, maxR: 60, t: 0, color: f.color });

    particles.push({ x: f.x, y: f.y - 20, txt: '+' + gain, t: 0, color: GOLD, size: 22 + Math.min(combo * 2, 18) });

    for (var rr = ripples.length - 1; rr >= 0; rr--) {

        cx.globalAlpha = 1;

        cx.beginPath(); cx.arc(f.x, f.y, fr + 10, 0, Math.PI * 2); cx.fill();

      cx.globalAlpha = f.cooldown > 0 ? 0.5 : 1;
      cx.beginPath(); cx.arc(f.x, f.y, fr, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;

    var pt = pctTop(views);
    cx.fillStyle = GOLD;
    cx.font = '900 22px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 428);
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('more viral than ' + (100 - pt) + '% of posts', W / 2, 450);

    if (!DEMO && !BOT) {
      var p = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = p;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — DARE AGAIN', W / 2, 502);
      cx.globalAlpha = 1;

      // share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD;
      cx.font = '800 16px -apple-system, Helvetica, Arial';
      var shareLabel = (window.SHARE && SHARE.dare !== null && dareBeaten) ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND';
      cx.fillText(shareLabel, W / 2, SHARE_R.y + 30);
    }
  }

  function drawCta(now) {
    var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.4);
    cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease; cx.textAlign = 'center';

    cx.fillStyle = '#fff';
    cx.font = '900 46px -apple-system, Helvetica, Arial';
    cx.fillText('VIRAL DARE', W / 2, 290);

    cx.fillStyle = 'rgba(255,255,255,0.7)';
    cx.font = '700 19px -apple-system, Helvetica, Arial';
    cx.fillText('they got ' + (window.__demoScore || 73) + ' views.', W / 2, 332);

    var p = 0.7 + 0.3 * Math.sin(now / 240);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p;
    cx.font = '900 34px -apple-system, Helvetica, Arial';
    cx.fillText('▶ BEAT ' + (window.__demoScore || 73), W / 2, 402);

    cx.globalAlpha = ease;
    cx.fillStyle = TEAL;
    cx.font = '700 15px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 434);
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
