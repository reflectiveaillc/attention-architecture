<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- shape types ----
  // Each shape has a COLOR (left=TEAL side, right=VERM side) and a visual form
  // LEFT zone = teal  (x < W/2), RIGHT zone = vermillion (x > W/2)
  var SHAPES = [
    { label: 'circle',   side: 'L', color: TEAL  },
    { label: 'square',   side: 'R', color: VERM  },
    { label: 'triangle', side: 'L', color: TEAL  },
    { label: 'diamond',  side: 'R', color: VERM  },
    { label: 'star',     side: 'L', color: TEAL  },
    { label: 'hex',      side: 'R', color: VERM  },
  ];
  // Ambiguous stage: shapes that are "mixed" (trickier color-shape combos)
  var AMB_SHAPES = [
    { label: 'circle',   side: 'R', color: VERM  },
    { label: 'square',   side: 'L', color: TEAL  },
    { label: 'triangle', side: 'R', color: VERM  },
    { label: 'diamond',  side: 'L', color: TEAL  },
  ];

  // game state
  var state, flashes, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var botRunsDone = 0, ctaAt = 0, challengeAt = 0;
  try { best = +localStorage.getItem('ss_best') || 0; } catch (_) {}

  // current falling shape
  var faller = null;

  function pickShape(ambig) {
    var pool = ambig ? AMB_SHAPES : SHAPES;
    return pool[Math.floor(rng() * pool.length)];
  }

  function newGame() {
    state = {
      phase: 'title',   // title | challenge | play | over | cta
      score: 0,
      combo: 0,
      speed: 2.2,       // px per frame the shape falls
      overAt: 0,
      ambig: false,
    };
    flashes = []; faller = null; dareBeaten = false;

    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0;
    state.combo = 0;
    state.speed = 2.2;
    state.ambig = false;
    runStartTs = Date.now();
    spawnFaller();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // deadline y-position (shapes must be sorted before crossing this line)
  var DEADLINE = H - 140;
  // zone centers
  var ZONE_L = W / 4;          // left zone center x
  var ZONE_R = (3 * W) / 4;    // right zone center x
  var ZONE_W = W / 2 - 20;     // zone width
  var ZONE_H = 90;              // zone height
  var ZONE_Y = H - 80;         // zone top y

  function spawnFaller() {
    var ambig = state.score >= 10;
    var shape = pickShape(ambig);
    faller = {
      shape: shape,
      x: W / 2,
      y: -50,
      size: 36,
      speed: state.speed,
      settled: false,
      sortedSide: null,
      sortedX: null,
      sortedY: null,
      sortAnim: 0,    // 0..1 for fly-to-zone animation
      dead: false,
      nearMissRead: false,
    };
  }

  function sortShape(side) {
    if (!faller || faller.settled || faller.dead) return;
    var correct = (side === faller.shape.side);
    faller.settled = true;
    faller.sortedSide = side;
    faller.sortedX = side === 'L' ? ZONE_L : ZONE_R;
    faller.sortedY = ZONE_Y + ZONE_H / 2;
    faller.sortAnim = 0;

    if (correct) {
      state.score++;
      state.combo++;
      // near-miss detection: shape was close to deadline
      var nearMiss = faller.y > DEADLINE - 55;
      if (state.combo >= 5 && state.score % 5 === 0) {
        if (window.J) J.gold();
        hitStop = 5; zoom = 1.03;
        flash('×' + state.combo, GOLD, 46);
        if (window.LOOP) LOOP.emit('combo', { n: state.combo, score: state.score });
      } else if (state.combo >= 3) {
        if (window.J) J.perfect(state.combo);
        zoom = 1.02;
        flash('×' + state.combo, TEAL, 40);
      } else {
        if (window.J) J.hit(state.combo);
      }
      if (nearMiss) {
        if (window.J) J.near();
        flash('SO CLOSE!', VERM, 38);
        shakeAmt = 4;
        if (window.LOOP) LOOP.emit('near_miss', { score: state.score, y: +faller.y.toFixed(1) });
      }
      if (window.J) J.tension(Math.min(state.score / 35, 1));

      // dare check
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(state.score);
      }

      // speed ramp
      state.speed = 2.2 + state.score * 0.11;
      // ambig shapes after score 10
      state.ambig = state.score >= 10;

      if (window.LOOP) LOOP.emit('sorted', { score: state.score, combo: state.combo, correct: true });

      // new best
      if (state.score > best) {
        best = state.score;
        try { localStorage.setItem('ss_best', String(best)); } catch (_) {}
      }
    } else {
      // wrong sort — game over
      state.combo = 0;
      if (window.J) J.death(Math.min(0.3 + state.score / 35, 1));
      shakeAmt = 8;
      if (window.LOOP) LOOP.emit('sorted', { score: state.score, combo: 0, correct: false });
      faller.dead = true;
      setTimeout(gameOver, 480);
    }
  }

  function fallerMissedDeadline() {
    // shape crossed the deadline without being sorted — game over
    if (window.J) J.death(Math.min(0.3 + state.score / 35, 1));
    shakeAmt = 9;
    faller.dead = true;
    faller.settled = true;
    if (window.LOOP) LOOP.emit('missed', { score: state.score });
    setTimeout(gameOver, 400);
  }

  function gameOver() {
    if (state.phase !== 'play') return;
    state.phase = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = state.score;
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2500);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 700);
      }
    }
  }

  function resetRun() {
    state.score = 0; state.combo = 0; state.speed = 2.2; state.ambig = false;
    flashes = []; faller = null;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 12))));
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  // left/right tap zones (entire left/right half of screen during play)
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      if (x === undefined) return; // keyboard fallback (not used for play)
      if (x < W / 2) {
        sortShape('L');
      } else {
        sortShape('R');
      }
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'sorted' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'ArrowLeft')  { if (!DEMO && !BOT) sortShape('L'); }
    if (e.code === 'ArrowRight') { if (!DEMO && !BOT) sortShape('R'); }
  });

  // ---- demo / bot autopilots ----
  // demo script: 'L'/'R' correct, 'wrong-L'/'wrong-R' intentional mistake near end
  // demoWaits: frames of hesitation before acting on each shape
  var demoScript   = ['L','R','L','R','L','R','R','L','R','L','wrong-L','done'];
  var demoWaits    = [22, 18, 25, 20, 30, 16, 28, 22, 18, 45,    14,      0 ];
  var demoIdx      = 0;
  var demoWaitLeft = 0;
  var demoPending  = false; // waiting for faller to be ready after spawn

  // Bot: picks correct side with some chance of mistake
  var BOT_ERR_RATE = 0.08; // 8% chance wrong per shape
  var botPendingWait = 0;  // frames to wait before acting

  function autopilot() {
    if (state.phase !== 'play' || !faller || faller.settled || faller.dead) return;

    if (DEMO) {
      if (demoWaitLeft > 0) { demoWaitLeft--; return; }
      var want = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (want === 'done') return; // script exhausted, let shape fall to deadline → game over
      // act when shape is in visible area and has fallen enough for drama
      if (faller.y < 120) return; // wait for shape to appear
      var side;
      if (want === 'wrong-L') { side = 'L'; /* wrong if shape's correct is R */ if (faller.shape.side === 'L') side = 'R'; }
      else if (want === 'wrong-R') { side = 'R'; if (faller.shape.side === 'R') side = 'L'; }
      else { side = want; }
      demoIdx++;
      demoWaitLeft = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 20;
      sortShape(side);
    } else if (BOT) {
      if (botPendingWait > 0) { botPendingWait--; return; }
      if (faller.y < 80) return; // wait for shape to be visible
      // imperfect bot
      var correct = faller.shape.side;
      var pick;
      if (rng() < BOT_ERR_RATE) {
        pick = correct === 'L' ? 'R' : 'L'; // intentional wrong
      } else {
        pick = correct;
      }
      botPendingWait = Math.floor(rng() * 18) + 6;
      sortShape(pick);
    }
  }

  // ---- draw helpers ----
  function drawShape(shape, x, y, size, alpha) {
    cx.save();
    cx.globalAlpha = alpha !== undefined ? alpha : 1;
    cx.fillStyle = shape.color;
    cx.strokeStyle = 'rgba(255,255,255,0.25)';
    cx.lineWidth = 1.5;
    var s = size;
    cx.beginPath();
    switch (shape.label) {
      case 'circle':
        cx.arc(x, y, s, 0, Math.PI * 2);
        break;
      case 'square':
        cx.rect(x - s, y - s, s * 2, s * 2);
        break;
      case 'triangle':
        cx.moveTo(x, y - s);
        cx.lineTo(x + s * 0.9, y + s * 0.7);
        cx.lineTo(x - s * 0.9, y + s * 0.7);
        cx.closePath();
        break;
      case 'diamond':
        cx.moveTo(x, y - s);
        cx.lineTo(x + s * 0.75, y);
        cx.lineTo(x, y + s);
        cx.lineTo(x - s * 0.75, y);
        cx.closePath();
        break;
      case 'star':
        var outerR = s, innerR = s * 0.44, pts = 5;
        for (var i = 0; i < pts * 2; i++) {
          var r2 = i % 2 === 0 ? outerR : innerR;
          var a2 = (i * Math.PI) / pts - Math.PI / 2;
          if (i === 0) cx.moveTo(x + r2 * Math.cos(a2), y + r2 * Math.sin(a2));
          else cx.lineTo(x + r2 * Math.cos(a2), y + r2 * Math.sin(a2));
        }
        cx.closePath();
        break;
      case 'hex':
        for (var hi = 0; hi < 6; hi++) {
          var ha = (hi * Math.PI) / 3 - Math.PI / 6;
          if (hi === 0) cx.moveTo(x + s * Math.cos(ha), y + s * Math.sin(ha));
          else cx.lineTo(x + s * Math.cos(ha), y + s * Math.sin(ha));
        }
        cx.closePath();
        break;
    }
    cx.fill();
    cx.stroke();
    cx.restore();
  }

  function drawZone(side, highlighted) {
    var zx = side === 'L' ? 10 : W / 2 + 10;
    var zy = ZONE_Y;
    var zw = W / 2 - 20;
    var zh = ZONE_H;
    var color = side === 'L' ? TEAL : VERM;
    cx.save();
    cx.fillStyle = highlighted ? color : 'rgba(255,255,255,0.04)';
    cx.strokeStyle = color;
    cx.lineWidth = highlighted ? 2.5 : 1.5;
    cx.globalAlpha = highlighted ? 0.9 : 0.55;
    if (cx.roundRect) cx.roundRect(zx, zy, zw, zh, 16);
    else cx.rect(zx, zy, zw, zh);
    cx.fill();
    cx.stroke();

    // zone shape hint (small icon)
    var hintShape;
    if (side === 'L') hintShape = { label: 'circle', color: TEAL };
    else hintShape = { label: 'square', color: VERM };
    cx.globalAlpha = highlighted ? 0.85 : 0.35;
    drawShape(hintShape, zx + zw / 2, zy + zh / 2, 18);
    cx.restore();
  }

  // ---- deadline line ----
  function drawDeadline() {
    cx.save();
    cx.strokeStyle = VERM;
    cx.lineWidth = 2;
    cx.globalAlpha = 0.45;
    cx.setLineDash([8, 6]);
    cx.beginPath();
    cx.moveTo(0, DEADLINE);
    cx.lineTo(W, DEADLINE);
    cx.stroke();
    cx.setLineDash([]);
    cx.restore();
  }

  // ---- main render loop ----
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop: decay always, autopilot only when not frozen
    if (hitStop > 0) {
      hitStop -= dt;
    } else if (state.phase === 'play' && faller && !faller.settled && !faller.dead) {
      faller.y += faller.speed * dt;

      // near-miss warning
      if (!faller.nearMissRead && faller.y > DEADLINE - 70) {
        faller.nearMissRead = true;
        if (window.J) J.tension(Math.min(0.7 + state.score / 50, 1));
      }

      // missed deadline
      if (faller.y > DEADLINE + 10) {
        fallerMissedDeadline();
      } else {
        autopilot();
      }
    }

    // settled faller fly-to-zone animation
    if (faller && faller.settled && !faller.dead) {
      faller.sortAnim += 0.09 * dt;
      if (faller.sortAnim >= 1) {
        faller.sortAnim = 1;
        // spawn next shape after a brief pause
        if (!faller._nextScheduled) {
          faller._nextScheduled = true;
          setTimeout(function () {
            if (state.phase === 'play') spawnFaller();
          }, 140);
        }
      }
    }

    // ---- juice transforms ----
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.13 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // center divider
    cx.save();
    cx.strokeStyle = 'rgba(255,255,255,0.07)';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(W / 2, 0);
    cx.lineTo(W / 2, ZONE_Y);
    cx.stroke();
    cx.restore();

    // zone labels
    cx.save();
    cx.textAlign = 'center';
    cx.font = '700 11px Menlo, monospace';
    cx.fillStyle = TEAL; cx.globalAlpha = 0.5;
    cx.fillText('LEFT', W / 4, ZONE_Y - 8);
    cx.fillStyle = VERM;
    cx.fillText('RIGHT', (3 * W) / 4, ZONE_Y - 8);
    cx.restore();

    // deadline line
    drawDeadline();

    // zones
    var showLeft = false, showRight = false;
    if (faller && !faller.settled && !faller.dead && faller.y > 100) {
      showLeft  = faller.shape.side === 'L';
      showRight = faller.shape.side === 'R';
    }
    drawZone('L', showLeft);
    drawZone('R', showRight);

    // faller / flying shape
    if (faller) {
      var fx, fy, fa;
      if (faller.settled && !faller.dead) {
        var t = faller.sortAnim;
        var ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        fx = faller.x + (faller.sortedX - faller.x) * ease;
        fy = faller.y + (faller.sortedY - faller.y) * ease;
        fa = 1 - Math.min(1, faller.sortAnim * 1.2);
        // trailing flash on correct sort
        if (faller.sortedSide === faller.shape.side) {
          cx.save();
          cx.globalAlpha = 0.22 * (1 - faller.sortAnim);
          cx.fillStyle = faller.shape.color;
          cx.beginPath();
          cx.arc(fx, fy, faller.size * 1.4, 0, Math.PI * 2);
          cx.fill();
          cx.restore();
        }
      } else if (!faller.dead) {
        fx = faller.x; fy = faller.y; fa = 1;
      }
      if (!faller.dead) {
        drawShape(faller.shape, fx, fy, faller.size, fa);

        // glow ring for high combo
        if (state.combo >= 3 && !faller.settled) {
          var glow = state.combo / 10;
          cx.save();
          cx.strokeStyle = faller.shape.color;
          cx.lineWidth = 2.5;
          cx.globalAlpha = Math.min(0.7, 0.25 + glow);
          cx.beginPath();
          cx.arc(fx, fy, faller.size + 8 + Math.sin(now / 120) * 4, 0, Math.PI * 2);
          cx.stroke();
          cx.restore();
        }
      }
    }

    // score HUD
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — ' + SHARE.by : ''), W / 2, 146);
      }

      // combo display
      if (state.combo >= 2 && state.phase === 'play') {
        var cSize = Math.min(24 + state.combo * 1.8, 42);
        var cAlpha = Math.min(1, 0.7 + state.combo * 0.05);
        cx.font = '900 ' + cSize + 'px -apple-system, Helvetica, Arial';
        cx.fillStyle = state.combo >= 5 ? GOLD : TEAL;
        cx.globalAlpha = cAlpha;
        cx.fillText('×' + state.combo + ' COMBO', W / 2, 148);
        cx.globalAlpha = 1;
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('24', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top sorter", W / 2, 430);
    }

    // title screen
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SPLIT SORT', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('← left or right →', W / 2, 316);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.fillStyle = VERM; cx.globalAlpha = pulse;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO SORT', W / 2, 358);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('swipe the shape to its side.', W / 2, 388);
    }

    // game over screen
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG SIDE.', W / 2, 295);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' sorted', W / 2, 340);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 386);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('faster than ' + (100 - pt) + '% of players', W / 2, 410);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE RUN', W / 2, 456);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('SPLIT SORT', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('sorted ' + (window.__demoScore || 24) + '. beat that.', W / 2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 24), W / 2, 406);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa2 = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = fa2; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 44) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
