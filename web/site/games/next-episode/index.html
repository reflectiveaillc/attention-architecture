  function startRun() {

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {

                transition = null;
                if (window.LOOP) LOOP.emit('chapter_unlocked', { n: chapterIdx });
                if (DEMO && demoPlan[chapterIdx]) { demoTimer = demoPlan[chapterIdx].wait; demoWobble = false; }
              }
            }
          } else if (transition.type === 'fail') {
            transition = null;
            gameOver();
          }
        }
      } else if (state.phase === 'play') {
        if (chapterIdx === story.length - 1) {
          finaleTimer -= dt;
          if (finaleTimer <= 0) endRunSuccess();
        } else {
          autopilot();
        }
      }
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)');
    bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    cursorX = pointer.down ? pointer.x : ((DEMO || BOT) ? demoX : null);

    if (state.phase === 'play' || state.phase === 'over') {
      drawProgress();
      drawScore();
      drawDareBanner();
    }

    // chapter cards
    if (state.phase === 'play') {
      var active = getActiveSide();
      if (transition && transition.type === 'next') {
        var tp = easeOut(Math.min(1, transition.t / transition.dur));
        var oldY = lerp(0, -H, tp);
        var newY = lerp(H, 0, tp);
        drawChapter(story[chapterIdx], oldY, active, 1);
        if (!transition.final && story[chapterIdx + 1]) drawChapter(story[chapterIdx + 1], newY, null, 1);
        else if (transition.final) {
          cx.globalAlpha = tp;
          cx.fillStyle = 'rgba(11,13,18,0.75)'; cx.fillRect(0, 0, W, H);
          cx.textAlign = 'center'; cx.fillStyle = GOLD; cx.font = '900 48px -apple-system, Helvetica, Arial';
          cx.fillText('ARC CLOSED', W / 2, H / 2 + 16);
          cx.globalAlpha = 1;
        }
      } else if (transition && transition.type === 'fail') {
        var fp = easeOut(Math.min(1, transition.t / transition.dur));
        var fy = lerp(transition.from, -H * 0.25, fp);
        var frot = (transition.side === 'L' ? -1 : 1) * 0.35 * fp;
        var fx = (transition.side === 'L' ? -1 : 1) * W * 0.25 * fp;
        cx.save();
        cx.translate(W / 2 + fx, H / 2);
        cx.rotate(frot);
        cx.translate(-W / 2, -H / 2);
        drawChapter(story[chapterIdx], fy, transition.side, 1);
        cx.restore();
        cx.fillStyle = 'rgba(232,80,46,' + (0.45 * fp) + ')';
        cx.fillRect(0, 0, W, H);
      } else if (pointer.down) {
        drawChapter(story[chapterIdx], offset, active, 1);
      } else if (chapterIdx < story.length) {
        drawChapter(story[chapterIdx], 0, active, 1);
      }
      drawThumb(cursorX);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 42);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.45) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.55);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('NEXT EPISODE', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO BINGE', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('swipe up. pick the right beat.', W / 2, 360);
      cx.fillStyle = 'rgba(255,255,255,0.25)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 392);
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('6', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var closed = state.score >= story.length;
      cx.fillStyle = closed ? GOLD : VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(closed ? 'ARC CLOSED.' : 'CLIFFHANGER.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' chapters', W / 2, 348);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 394);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 418);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE EPISODE', W / 2, 470);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        roundPath(cx, SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('NEXT EPISODE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they binged ' + (window.__demoScore || 5) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 5), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
