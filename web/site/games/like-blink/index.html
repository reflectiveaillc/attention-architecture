      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawHeart(h, now) {
    var lifePct = h.state === 'alive' ? h.life / h.maxLife : 0;
    var pulse = 1 + 0.08 * Math.sin(now / 120 + h.x * 0.01);
    var alpha = h.state === 'ghost' ? Math.max(0, 1 - h.ghostT / 45) : 1;
    var sc = h.state === 'liked' ? Math.max(1.2, 1.5 - h.fadeT / 20) : (h.state === 'ghost' ? 1 + h.ghostT * 0.008 : pulse);

    cx.save();
    cx.globalAlpha = alpha;
    cx.translate(h.x, h.y);
    cx.scale(sc, sc);

    // glow for alive hearts
    if (h.state === 'alive') {
      var g = cx.createRadialGradient(0, 0, h.r * 0.3, 0, 0, h.r * 2.2);
      var edge = lifePct < 0.25 ? 'rgba(232,80,46,0.45)' : 'rgba(232,80,46,0.22)';
      g.addColorStop(0, edge);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(0, 0, h.r * 2.2, 0, Math.PI * 2); cx.fill();
    }

    // body color
    var bodyCol;
    if (h.state === 'ghost') bodyCol = 'rgba(232,80,46,0.35)';
    else if (h.state === 'liked') bodyCol = TEAL;
    else bodyCol = VERM;

    // heart shape
    cx.fillStyle = bodyCol;
    cx.beginPath();
    var s = h.r;
    cx.moveTo(0, s * 0.35);
    cx.bezierCurveTo(0, 0, -s * 0.5, -s * 0.35, -s * 0.5, -s * 0.6);
    cx.bezierCurveTo(-s * 0.5, -s * 0.9, 0, -s * 0.9, 0, -s * 0.6);
    cx.bezierCurveTo(0, -s * 0.9, s * 0.5, -s * 0.9, s * 0.5, -s * 0.6);
    cx.bezierCurveTo(s * 0.5, -s * 0.35, 0, 0, 0, s * 0.35);
    cx.closePath();
    cx.fill();

    // highlight
    if (h.state === 'alive') {
      cx.fillStyle = 'rgba(255,255,255,0.22)';
      cx.beginPath();
      cx.ellipse(-s * 0.22, -s * 0.42, s * 0.16, s * 0.09, -Math.PI / 4, 0, Math.PI * 2);
      cx.fill();
    }

    // urgency ring when fading
    if (h.state === 'alive' && lifePct < 0.3) {
      cx.strokeStyle = 'rgba(255,255,255,' + (0.4 + 0.4 * Math.sin(now / 80)) + ')';
      cx.lineWidth = 2;
      cx.beginPath(); cx.arc(0, 0, s * 1.05, 0, Math.PI * 2); cx.stroke();
    }

    cx.restore();
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
