<meta charset="UTF-8">

<!--

                          sets window.__demoDone + __demoScore

<style>

               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'slime-stretch';</script>
<script src="../../js/loop-events.js"></script>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  // canvas + fit
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134', LAV = '#9d8cff', ROSE = '#e8a0b4';
  var MAX_STRETCH = 360, TOTAL_PULLS = 10;

  var state, pull, settledPulls;
  var score = 0, runStartTs = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [];
  var dareBeaten = false;
  var ctaAt = 0, botRunsDone = 0;

  function newGame() {
    state = 'title';
    pull = null;
    settledPulls = [];
    score = 0;
    dareBeaten = false;
    if (BOT || DEMO) startRun();
  }

  function startRun() {
    state = 'play';
    runStartTs = Date.now();
    score = 0;
    settledPulls = [];
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    startPull();
  }

  function startPull() {
    if (settledPulls.length >= TOTAL_PULLS) { gameOver(); return; }
    var baseY = H - 150 - settledPulls.length * 26;
    pull = {
      baseY: baseY,
      tipY: baseY,
      releaseY: baseY,
      phase: 'idle',       // idle | pulling | snapping
      snapT: 0,
      quality: 0,
      auto: false,
      sway: rng() * Math.PI * 2
    };
    if (window.LOOP) LOOP.emit('slime_pull', { n: settledPulls.length + 1 });
  }

  function stretch() { return Math.max(0, Math.min(1, (pull.baseY - pull.tipY) / MAX_STRETCH)); }

  function qualityFromStretch(s) {
    var q;
    if (s <= 0.68) q = 100 - 110 * Math.pow((0.68 - s) / 0.68, 1.6);
    else q = 100 - 100 * Math.pow((s - 0.68) / 0.32, 1.8);
    return Math.max(10, Math.min(100, Math.round(q)));
  }

  function endPull() {
    if (!pull || pull.phase !== 'pulling') return;
    pull.phase = 'snapping';
    pull.releaseY = pull.tipY;
    pull.snapT = 0;
    var s = stretch();
    pull.quality = qualityFromStretch(s);
    score += pull.quality;

    var label, color, size;
    if (pull.quality >= 90) { label = 'PERFECT'; color = TEAL; size = 40; }
    else if (pull.quality >= 75) { label = 'CLEAN'; color = TEAL; size = 34; }
    else if (pull.quality >= 50) { label = 'SOFT'; color = GOLD; size = 28; }
    else { label = 'TEAR'; color = ROSE; size = 28; }
    flash(label, color, size);

    // calm-engine sound only
    if (window.J) J.calm(settledPulls.length + 1);

    // gentle hit-stop / zoom on clean snaps
    if (pull.quality >= 75) { hitStop = 4; zoom = 1.025; }
    else if (pull.quality >= 50) { hitStop = 2; zoom = 1.01; }

    if (window.LOOP) LOOP.emit('slime_snap', { n: settledPulls.length + 1, quality: pull.quality, stretch: +s.toFixed(3) });
  }

  function easeOutBack(t) { var c = 1.70158; var r = t - 1; return r * r * ((c + 1) * r + c) + 1; }

  function settlePull() {
    if (!pull) return;
    settledPulls.push({
      y: pull.baseY,
      quality: pull.quality,
      hue: 160 + pull.quality * 0.5,
      born: performance.now()
    });
    if (window.LOOP) LOOP.emit('slime_settle', { n: settledPulls.length, quality: pull.quality, score: score });
    pull = null;
    if (settledPulls.length >= TOTAL_PULLS) gameOver();
    else startPull();
  }

  function gameOver() {
    state = 'over';
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.calm(12);
    if (DEMO) window.__demoScore = score;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        state = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) window.__botDone = true;
      else {
        if (window.LOOP) LOOP.emit('restart', {});
        setTimeout(startRun, 900);
      }
    }
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function screenToGame(ex, ey) {
    var rect = cv.getBoundingClientRect();
    return { x: (ex - rect.left) / scale, y: (ey - rect.top) / scale };
  }

  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state === 'title') { startRun(); if (pull) pull.phase = 'pulling'; return; }
    if (state === 'play' && pull) {
      if (pull.phase === 'idle') pull.phase = 'pulling';
      else if (pull.phase === 'pulling') endPull();
      return;
    }
    if (state === 'over') {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'stretch' }); return;
      }
      newGame();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    var p = screenToGame(e.clientX, e.clientY);
    tap(p.x, p.y);
  });
  window.addEventListener('pointermove', function (e) {
    if (DEMO || BOT || !pull || pull.phase !== 'pulling' || pull.auto) return;
    var p = screenToGame(e.clientX, e.clientY);
    pull.tipY = Math.min(pull.baseY, Math.max(pull.baseY - MAX_STRETCH, p.y));
  });
  window.addEventListener('pointerup', function (e) {
    if (DEMO || BOT) return;
    if (pull && pull.phase === 'pulling' && !pull.auto) endPull();
  });
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    if (e.code === 'Space') {
      if (state === 'title') { startRun(); if (pull) { pull.phase = 'pulling'; pull.auto = true; } }
      else if (state === 'play' && pull) {
        if (pull.phase === 'idle') { pull.phase = 'pulling'; pull.auto = true; }
        else if (pull.phase === 'pulling') endPull();
      } else if (state === 'over') newGame();
    }
  });

  // ---- demo / bot autopilots ----
  // demo arc: settle → deepen → resolve, with hesitation (calm game skips challenge/near-fail)
  var demoPlan = [
    { target: 0.42, hold: 16, wait: 30 },
    { target: 0.55, hold: 14, wait: 24 },
    { target: 0.65, hold: 18, wait: 22 },
    { target: 0.72, hold: 20, wait: 26 },
    { target: 0.68, hold: 16, wait: 20 },
    { target: 0.75, hold: 22, wait: 24 },
    { target: 0.70, hold: 18, wait: 20 },
    { target: 0.82, hold: 24, wait: 28 },
    { target: 0.78, hold: 18, wait: 22 },
    { target: 0.85, hold: 22, wait: 26 }
  ];
  var demoIdx = 0, demoState = 'wait', demoTimer = 45;
  var botTarget = null;

  function autopilot(dt) {
    if (state !== 'play' || !pull) return;
    if (DEMO) {
      if (demoState === 'wait') {
        demoTimer -= dt;
        if (demoTimer <= 0) {
          demoState = 'pull';
          pull.phase = 'pulling';
        }
      } else if (demoState === 'pull') {
        var target = demoPlan[demoIdx].target;
        var current = stretch();
        var diff = target - current;
        var speed = 0.008 + rng() * 0.006;
        if (Math.abs(diff) <= speed * dt) {
          pull.tipY = pull.baseY - target * MAX_STRETCH;
          demoState = 'hold';
          demoTimer = demoPlan[demoIdx].hold;
        } else {
          current += Math.sign(diff) * speed * dt;
          pull.tipY = pull.baseY - current * MAX_STRETCH;
        }
      } else if (demoState === 'hold') {
        demoTimer -= dt;
        if (demoTimer <= 0) {
          endPull();
          demoState = 'settle';
          demoTimer = 26;
        }
      } else if (demoState === 'settle') {
        demoTimer -= dt;
        // settlePull replaces pull with the next idle pull; advance when we see a fresh idle pull
        if (pull && pull.phase === 'idle') {
          demoIdx++;
          if (demoIdx >= demoPlan.length) return; // gameOver handles end
          demoState = 'wait';
          demoTimer = demoPlan[demoIdx].wait;
        }
      }
    } else if (BOT) {
      if (pull.phase === 'idle') {
        pull.phase = 'pulling';
        botTarget = Math.max(0.25, Math.min(0.95, 0.4 + rng() * 0.45 + gauss() * 0.12));
      }
      if (pull.phase === 'pulling') {
        var cur = stretch();
        var diff = botTarget - cur;
        var dir = Math.sign(diff);
        cur += dir * 0.014 * dt;
        if ((dir > 0 && cur >= botTarget) || (dir < 0 && cur <= botTarget)) {
          cur = botTarget;
          botTarget = null;
          endPull();
        }
        pull.tipY = pull.baseY - cur * MAX_STRETCH;
      }
    }
  }

  // ---- render helpers ----
  function drawSlime(t) {
    if (!pull) return;
    var bx = W / 2;
    var by = pull.baseY;
    var tx = W / 2 + Math.sin(t / 800 + pull.sway) * 3;
    var ty = pull.tipY;
    var s = stretch();

    var baseW = 110, baseH = 55;
    var tipW = 84 - s * 28;              // tip narrows as it thins
    var tipH = 46 - s * 8;

    // warm at base, cooling toward teal at tip as it stretches/settles
    var baseHue = 42, tipHue = 175 - s * 18;
    var g = cx.createLinearGradient(bx, by, tx, ty);
    g.addColorStop(0, 'hsl(' + baseHue + ', 76%, 62%)');
    g.addColorStop(0.5, 'hsl(' + ((baseHue + tipHue) / 2) + ', 58%, 58%)');
    g.addColorStop(1, 'hsl(' + tipHue + ', 52%, 68%)');

    // connecting body
    cx.beginPath();
    cx.moveTo(bx - baseW / 2, by);
    cx.bezierCurveTo(bx - baseW * 0.55, by - (by - ty) * 0.35, tx - tipW * 0.5, ty + (by - ty) * 0.35, tx - tipW / 2, ty);
    cx.lineTo(tx + tipW / 2, ty);
    cx.bezierCurveTo(tx + tipW * 0.5, ty + (by - ty) * 0.35, bx + baseW * 0.55, by - (by - ty) * 0.35, bx + baseW / 2, by);
    cx.closePath();
    cx.fillStyle = g;
    cx.fill();

    // top cap
    cx.beginPath();
    cx.ellipse(tx, ty, tipW / 2, tipH / 2, 0, 0, Math.PI * 2);
    cx.fillStyle = g;
    cx.fill();

    // bottom cap
    cx.beginPath();
    cx.ellipse(bx, by, baseW / 2, baseH / 2, 0, 0, Math.PI * 2);
    cx.fillStyle = g;
    cx.fill();

    // soft highlight
    cx.beginPath();
    cx.ellipse(tx - tipW * 0.12, ty - tipH * 0.18, tipW * 0.22, tipH * 0.16, -0.4, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(255,255,255,0.22)';
    cx.fill();
  }

  function drawSettled(t) {
    for (var i = 0; i < settledPulls.length; i++) {
      var p = settledPulls[i];
      var age = (t - p.born) / 1000;
      var a = Math.max(0.12, 0.55 - age * 0.25);
      var w = 46 + p.quality * 0.35;
      var h = 24 + p.quality * 0.16;
      cx.beginPath();
      cx.ellipse(W / 2 + Math.sin(t / 900 + i) * 2, p.y, w / 2, h / 2, 0, 0, Math.PI * 2);
      cx.fillStyle = 'hsla(' + p.hue + ', 55%, 62%, ' + a + ')';
      cx.fill();
    }
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop decay — sim frozen, but we still decay every frame
    if (hitStop > 0) { hitStop -= dt; }
    else {
      // update active pull
      if (pull) {
        if (pull.phase === 'snapping') {
          pull.snapT += dt;
          var t2 = Math.min(1, pull.snapT / 22);
          var s2 = 1 - easeOutBack(t2);
          pull.tipY = pull.baseY - (pull.releaseY - pull.baseY) * s2;
          if (t2 >= 1) settlePull();
        } else if (pull.phase === 'pulling' && pull.auto) {
          pull.tipY -= 3.2 * dt;
          if (pull.tipY < pull.baseY - MAX_STRETCH) pull.tipY = pull.baseY - MAX_STRETCH;
        }
      }
      autopilot(dt);
    }

    // dare beaten check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state === 'play' && score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 38);
      if (window.J) J.calm(10);
      SHARE.beaten(score);
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)');
    bg.addColorStop(0.55, 'rgba(157,140,255,0.04)');
    bg.addColorStop(1, 'rgba(232,160,180,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // settled pull ghosts
    drawSettled(now);

    // current slime
    drawSlime(now);

    // score / progress
    if (state === 'play' || state === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 92);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('pull ' + (settledPulls.length + (pull ? 1 : 0)) + ' / ' + TOTAL_PULLS, W / 2, 120);

      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 150);
      }
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // title
    if (state === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SLIME STRETCH', W / 2, 280);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillText('HOLD & RELEASE', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('stretch. snap. settle.', W / 2, 360);
    }

    // game over
    if (state === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('SETTLED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' stretch', W / 2, 345);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('10 pulls complete', W / 2, 390);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card — soft invitation, no dare
    if (state === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SLIME STRETCH', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.78)';
      cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore || score) + ' stretch settled', W / 2, 332);
      var p3 = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 25px -apple-system, Helvetica, Arial';
      cx.fillText('▶  REACH IT', W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = LAV;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 432);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
