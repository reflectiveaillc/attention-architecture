<!--
  LOOP / attention-architecture — Unfollow Cleanse (calm engine)
  Circuits: 01 soft-RPE (the occasional big drop), 05 ease (breath-paced release),

  Conditioned path: follower-count accumulation anxiety. The thumb already knows

<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips + bot runs are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // CALM palette — teal/soft tones, vermillion avoided by design
  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var SOFT = [
    { h: 172, s: 42, l: 56 }, { h: 42, s: 48, l: 62 },
    { h: 196, s: 32, l: 62 }, { h: 160, s: 36, l: 56 },
    { h: 30, s: 40, l: 64 },  { h: 188, s: 38, l: 60 },
    { h: 210, s: 28, l: 64 }, { h: 52, s: 44, l: 64 }
  ];
  var HANDLES = ['kale.kit','loop.dream','soft.studio','mirror.co','daily.dust',
    'quiet.tide','lumen.ai','still.frame','feather.co','hush.note','slow.tide',
    'paper.moon','fern.co','mellow.fm','dusk.app','halo.lab','river.studio',
    'moss.ai','cloud.house','amber.co','willow.fm','stone.co','linen.app','pith.fm'];

  var POOL = 16;                 // accounts in one cleanse (a finite, satisfying session)
  var VISIBLE = 4;               // cards on screen at once
  var CARD_W = 322, CARD_H = 74, CARD_GAP = 92;
  var ZONE_Y = H - 168;          // y of the front (release) card's top

  var state, field, leaving, flashes, runStartTs, camBob;
  var releasedCount, releasedWeight, startCount, liveCount, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, step = 0;
  var ctaAt = 0, overAt = 0, botRunsDone = 0, demoWaitIdx = 0, demoWait = 0;
  try { best = +localStorage.getItem('uc_best') || 0; } catch (_) {}

  function slotY(i) { return ZONE_Y - i * CARD_GAP; }

  function makeAcct() {
    var pal = SOFT[Math.floor(rng() * SOFT.length)];
    var handle = HANDLES[Math.floor(rng() * HANDLES.length)] +
                 (rng() < 0.5 ? '' : '_' + Math.floor(rng() * 90 + 9));
    var whale = rng() < 0.18;
    var weight = whale ? 14 + Math.floor(rng() * 13)   // 14..26 — the soft-RPE spike
                       : 2 + Math.floor(rng() * 6);    // 2..7
    return { handle: handle, pal: pal, weight: weight, whale: whale,
             sub: 100 + Math.floor(rng() * 9000) };
  }

  function newGame() {
    rng = mulberry32(SEED + botRunsDone * 7919);   // each bot run gets its own stream
    state = { phase: 'title', pool: [], queue: [] };
    for (var i = 0; i < POOL; i++) state.pool.push(makeAcct());
    field = []; leaving = []; flashes = []; camBob = 0;
    releasedCount = 0; releasedWeight = 0; step = 0;
    startCount = 2400 + Math.floor(rng() * 600);
    liveCount = startCount;
    if (DEMO) { startRun(); return; }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    // prime the column
    for (var i = 0; i < VISIBLE && state.pool.length; i++) spawnCard();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function spawnCard() {
    if (!state.pool.length) return;
    var acct = state.pool.shift();
    var slot = field.length;
    field.push({ acct: acct, slot: slot, y: slotY(slot) - 110, a: 1, rel: false, relT: 0, breath: rng() * 6.28 });
  }

  // release the front card — the embodied unfollow. the count goes DOWN.
  function release() {
    if (state.phase !== 'play') return;
    if (!field.length || field[0].rel) return;
    var front = field[0];
    front.rel = true; front.relT = 0;
    var w = front.acct.weight;
    releasedWeight += w; releasedCount++; liveCount -= w; step++;
    leaving.push(front);

    // soft-RPE: the whale is the occasional bigger drop — felt, not flashy
    if (window.J) J.calm(step);
    if (front.acct.whale) { hitStop = 2; zoom = 1.012; shakeAmt = 1.4;
      flash('-' + w, GOLD, 30); }
    else { flash('-' + w, TEAL, 22); }

    if (window.LOOP) LOOP.emit('unfollow', { n: releasedCount, weight: w, whale: front.acct.whale });

    // shift the column down one slot
    field.splice(0, 1);
    for (var i = 0; i < field.length; i++) field[i].slot = i;
    if (state.pool.length) spawnCard();

    // completion — the cleanse is finished (finite, calm, satisfying)
    if (!state.pool.length && !field.length) complete();
  }

  function complete() {
    state.phase = 'over';
    overAt = performance.now();
    zoom = 1.02;                        // gentle bloom — the peak-end is the lightness
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = releasedWeight > best;
    if (newBest) { best = releasedWeight; try { localStorage.setItem('uc_best', String(best)); } catch (_) {} }
    if (DEMO) window.__demoScore = releasedWeight;
    if (window.LOOP) LOOP.emit('game_over', { score: releasedWeight, dur_s: +dur.toFixed(1), released: releasedCount });
    if (DEMO) setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3500); }, 2000);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    newGame(); startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { release(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: releasedWeight, unit: 'released' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // demo: a breath-paced release rhythm with hesitation — never robotic.
  // arc: settle (steady) → deepen (one long hold mid-run) → resolve (lighter, quicker).
  var demoWaits = [38, 44, 50, 40, 86, 46, 42, 52, 38, 44, 70, 40, 42, 46, 38, 44];
  // bot: imperfect — gaussian jitter around a calm cadence
  function autopilot() {
    if (state.phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      if (!field.length) return;
      release();
      demoWait = demoWaits[Math.min(demoWaitIdx, demoWaits.length - 1)] || 44;
      demoWaitIdx++;
    } else if (BOT) {
      if (!field.length) return;
      if (demoWait > 0) { demoWait--; return; }
      release();
      // 0.55–1.0s cadence with gaussian jitter — imperfect, humanish
      var base = 38, jit = (Math.sqrt(-2 * Math.log(1 - rng())) * Math.cos(6.283 * rng())) * 8;
      demoWait = Math.max(20, Math.round(base + jit));
    }
  }

  // ---- render helpers ----
  function cardRect(c, y) {
    var x = (W - CARD_W) / 2;
    return { x: x, y: y, w: CARD_W, h: CARD_H };
  }
  function drawCard(c, y, alpha) {
    var r = cardRect(c, y);
    cx.globalAlpha = alpha;
    // soft drop shadow
    cx.fillStyle = 'rgba(0,0,0,0.28)';
    cx.beginPath(); (cx.roundRect ? cx.roundRect(r.x + 2, r.y + 4, r.w, r.h, 16) : cx.rect(r.x + 2, r.y + 4, r.w, r.h)); cx.fill();
    // body
    cx.fillStyle = '#161a22';
    cx.beginPath(); (cx.roundRect ? cx.roundRect(r.x, r.y, r.w, r.h, 16) : cx.rect(r.x, r.y, r.w, r.h)); cx.fill();
    cx.strokeStyle = c.acct.whale ? 'rgba(242,177,52,0.45)' : 'rgba(255,255,255,0.07)';
    cx.lineWidth = c.acct.whale ? 1.6 : 1;
    cx.beginPath(); (cx.roundRect ? cx.roundRect(r.x + 0.5, r.y + 0.5, r.w - 1, r.h - 1, 16) : cx.rect(r.x + 0.5, r.y + 0.5, r.w - 1, r.h - 1)); cx.stroke();
    // avatar
    var ax = r.x + 30, ay = r.y + r.h / 2, ar = 21;
    var p = c.acct.pal;
    var g = cx.createRadialGradient(ax - 4, ay - 4, 2, ax, ay, ar);
    g.addColorStop(0, 'hsl(' + p.h + ',' + p.s + '%,' + (p.l + 8) + '%)');
    g.addColorStop(1, 'hsl(' + p.h + ',' + p.s + '%,' + (p.l - 10) + '%)');
    cx.fillStyle = g; cx.beginPath(); cx.arc(ax, ay, ar, 0, 6.283); cx.fill();
    cx.fillStyle = 'rgba(11,13,18,0.55)';
    cx.font = '800 16px -apple-system, Helvetica, Arial'; cx.textAlign = 'center';
    cx.fillText(c.acct.handle.charAt(0).toUpperCase(), ax, ay + 5);
    // handle + sub
    cx.textAlign = 'left';
    cx.fillStyle = 'rgba(255,255,255,0.86)';
    cx.font = '600 15px Menlo, monospace';
    cx.fillText(c.acct.handle, r.x + 64, r.y + 30);
    cx.fillStyle = 'rgba(255,255,255,0.38)';
    cx.font = '500 11px -apple-system, Helvetica, Arial';
    cx.fillText(c.acct.sub.toLocaleString() + ' followers', r.x + 64, r.y + 49);
    // weight pill (right)
    var txt = '-' + c.acct.weight;
    cx.textAlign = 'right';
    cx.fillStyle = c.acct.whale ? GOLD : 'rgba(46,197,182,0.85)';
    cx.font = '800 18px -apple-system, Helvetica, Arial';
    cx.fillText(txt, r.x + r.w - 18, r.y + r.h / 2 + 6);
    cx.globalAlpha = 1;
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;
    camBob += dt;

    // hit-stop decays every frame — never gate autopilot on a frozen hitStop
    if (hitStop > 0) hitStop -= dt;
    else autopilot();

    // ease cards toward their slots (the slow drift down) — always runs
    for (var i = 0; i < field.length; i++) {
      var c = field[i];
      var ty = slotY(c.slot) + Math.sin(now / 1500 + c.breath) * 1.4;
      c.y += (ty - c.y) * 0.06 * dt;
    }
    // leaving cards lift and fade
    for (var k = leaving.length - 1; k >= 0; k--) {
      var l = leaving[k]; l.relT += dt;
      l.y -= 1.4 * dt; l.a = Math.max(0, 1 - l.relT / 26);
      if (l.relT > 30) leaving.splice(k, 1);
    }

    // ---- juice transforms: gentle shake + zoom-pulse (calm-tuned) ----
    cx.save();
    if (shakeAmt > 0.15 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt); zoom += (1 - zoom) * 0.10 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createRadialGradient(W / 2, H * 0.62, 40, W / 2, H * 0.62, H * 0.8);
    bg.addColorStop(0, 'rgba(46,197,182,0.07)');
    bg.addColorStop(0.55, 'rgba(46,197,182,0.025)');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- top: the follower count (the relief is it going DOWN) ----
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '700 12px -apple-system, Helvetica, Arial';
    cx.fillText('YOUR  FOLLOWERS', W / 2, 58);
    cx.fillStyle = 'rgba(255,255,255,0.96)';
    cx.font = '800 52px -apple-system, Helvetica, Arial';
    cx.fillText(liveCount.toLocaleString(), W / 2, 102);
    // gentle downward arrow + delta
    cx.fillStyle = TEAL; cx.font = '700 14px -apple-system, Helvetica, Arial';
    cx.fillText('↓ ' + releasedWeight.toLocaleString() + ' released', W / 2, 126);
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.fillText(releasedCount + ' / ' + POOL + ' let go', W / 2, 146);

    // ---- the release zone (breath ring) ----
    if (state.phase === 'play') {
      var breath = 0.5 + 0.5 * Math.sin(now / 1400);     // ~4.4s breath cycle
      var zy = ZONE_Y + CARD_H / 2;
      cx.strokeStyle = 'rgba(46,197,182,' + (0.16 + 0.18 * breath) + ')';
      cx.lineWidth = 1.4;
      cx.beginPath(); (cx.roundRect ? cx.roundRect((W - CARD_W) / 2 - 10, ZONE_Y - 10, CARD_W + 20, CARD_H + 20, 22) : cx.rect((W - CARD_W) / 2 - 10, ZONE_Y - 10, CARD_W + 20, CARD_H + 20)); cx.stroke();
      cx.fillStyle = 'rgba(46,197,182,' + (0.05 + 0.06 * breath) + ')';
      cx.beginPath(); (cx.roundRect ? cx.roundRect((W - CARD_W) / 2 - 10, ZONE_Y - 10, CARD_W + 20, CARD_H + 20, 22) : cx.rect((W - CARD_W) / 2 - 10, ZONE_Y - 10, CARD_W + 20, CARD_H + 20)); cx.fill();
    }

    // ---- cards (top first so front renders on top) ----
    for (var j = field.length - 1; j >= 0; j--) {
      if (j === 0) continue;            // front drawn last
      drawCard(field[j], field[j].y, field[j].a);
    }
    if (field.length && !field[0].rel) drawCard(field[0], field[0].y, field[0].a);
    for (var m = 0; m < leaving.length; m++) drawCard(leaving[m], leaving[m].y, leaving[m].a);

    // ---- floating reward text ----
    for (var f = flashes.length - 1; f >= 0; f--) {
      var fl = flashes[f]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.35) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, ZONE_Y - 14 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(f, 1);
    }

    // ---- title ----
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('UNFOLLOW', W / 2, 286);
      cx.fillText('CLEANSE', W / 2, 332);
      var pulse = 0.55 + 0.45 * Math.sin(now / 320);
      cx.fillStyle = TEAL; cx.globalAlpha = pulse;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO LET GO', W / 2, 390); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.34)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('each tap drops your count. breathe with it.', W / 2, 414);
    }

    // ---- completion (the calm "game over") ----
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.5)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('YOU LET GO.', W / 2, 296);
      cx.fillStyle = '#fff'; cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(releasedWeight.toLocaleString(), W / 2, 366);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText(releasedCount + ' accounts released · ' + startCount.toLocaleString() + ' → ' + liveCount.toLocaleString(), W / 2, 392);
      cx.fillStyle = GOLD; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('feels lighter.', W / 2, 418);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — CLEANSE AGAIN', W / 2, 462);
        cx.globalAlpha = 1;
        // soft share pill (sharing, not daring — calm framing)
        cx.fillStyle = 'rgba(46,197,182,0.14)';
        cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = TEAL; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ PASS IT ON', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- demo CTA card (soft invitation, not a dare) ----
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('UNFOLLOW', W / 2, 296);
      cx.fillText('CLEANSE', W / 2, 340);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('let go of the noise.', W / 2, 382);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 432);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 462);
      cx.globalAlpha = 1;
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
