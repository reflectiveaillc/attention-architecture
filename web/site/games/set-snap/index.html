<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // SET DEFINITIONS: 6 items in the set, deck has 12 cards (each item appears twice)
  // Items: each has an id 0-5, emoji symbol, and a color
  var ITEMS = [
    { id: 0, sym: '★', color: GOLD },
    { id: 1, sym: '♦', color: VERM },
    { id: 2, sym: '●', color: TEAL },
    { id: 3, sym: '▲', color: '#a855f7' },
    { id: 4, sym: '■', color: '#22c55e' },
    { id: 5, sym: '♥', color: '#f472b6' }
  ];
  var SET_SIZE = 6;  // unique items
  var DECK_SIZE = 12; // 2 of each

  // Build a shuffled deck from RNG
  function buildDeck(r) {
    var deck = [];
    for (var i = 0; i < SET_SIZE; i++) deck.push(i, i); // two of each
    // Fisher-Yates
    for (var j = deck.length - 1; j > 0; j--) {
      var k = Math.floor(r() * (j + 1));
      var tmp = deck[j]; deck[j] = deck[k]; deck[k] = tmp;
    }
    return deck;
  }

  // State
  var phase;          // 'challenge' | 'play' | 'complete' | 'over' | 'cta'
  var deck, deckIdx;
  var grid;           // array of 6 slots, each null or item id (first fill)
  var score;          // cards drawn
  var runStartTs;
  var flashes, hitStop, zoom, shakeAmt;
  var dareBeaten, challengeAt, ctaAt, overAt;
  var best = 0;
  var botRunsDone = 0;
  var demoDone = false;
  // Demo script: indices into deck to pull, paced by demoWaits (frames)
  // We'll drive it by pull count and timing
  var demoPullCount = 0;
  var demoWaitFrames = 0;
  var demoWaits = [55, 40, 48, 36, 60, 44, 38, 55, 42, 36, 28, 20];
  // Bot state
  var botWait = 0;
  var botPulls = 0;
  var botMaxPulls = 9; // bot pulls 9 cards then goes passive (natural end since grid fills or deck runs out)

  try { best = +localStorage.getItem('ss_best') || 0; } catch (_) {}

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 7))));
  }

  function initGame() {
    rng = mulberry32(SEED);
    deck = buildDeck(rng);
    deckIdx = 0;
    grid = [null, null, null, null, null, null];
    score = 0;
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    dareBeaten = false;
    demoPullCount = 0;
    demoWaitFrames = 0;
    botWait = 0;
    botPulls = 0;
    phase = 'challenge';
    challengeAt = performance.now();

    if (DEMO) {
      // Challenge card shows, then auto-starts
      setTimeout(startPlay, 1250);
    } else if (BOT) {
      phase = 'play';
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    } else {
      // Human: show challenge card briefly, then play
      setTimeout(startPlay, 1200);
    }
  }

  function startPlay() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function pullCard() {
    if (phase !== 'play') return;
    if (deckIdx >= deck.length) {
      // Deck exhausted — didn't complete the set
      endGame(false);
      return;
    }
    var itemId = deck[deckIdx++];
    score++;
    var item = ITEMS[itemId];
    var slotFilled = false;
    var duplicate = false;

    if (grid[itemId] === null) {
      // New unique item — fill the slot
      grid[itemId] = itemId;
      slotFilled = true;
    } else {
      // Duplicate — already have this one
      duplicate = true;
    }

    // Count filled slots
    var filled = 0;
    for (var i = 0; i < SET_SIZE; i++) { if (grid[i] !== null) filled++; }

    // Sound and juice
    if (window.J) {
      if (slotFilled) {
        if (filled === SET_SIZE) {
          J.fanfare();
          hitStop = 6;
          zoom = 1.04;
        } else if (filled >= 5) {
          J.gold();
          hitStop = 4;
          zoom = 1.025;
        } else {
          J.hit(filled);
        }
        J.tension(filled / SET_SIZE);
      } else {
        J.near();
        shakeAmt = 3;
      }
    }

    if (slotFilled) {
      flash('+SNAP', item.color, 44);
      if (window.LOOP) LOOP.emit('card_snapped', { item: itemId, filled: filled, pull: score });
      if (filled === SET_SIZE) {
        // SET COMPLETE!
        if (window.J) J.fanfare();
        hitStop = 8;
        zoom = 1.06;
        shakeAmt = 0;
        flash('SET COMPLETE!', GOLD, 52);
        setTimeout(function () { endGame(true); }, 900);
        return;
      }
    } else {
      flash('ALREADY GOT IT', VERM, 32);
      if (window.LOOP) LOOP.emit('near_miss', { item: itemId, pull: score });
    }

    // Dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }

    // Check deck exhausted after this pull
    if (deckIdx >= deck.length) {
      var finalFilled = 0;
      for (var s = 0; s < SET_SIZE; s++) { if (grid[s] !== null) finalFilled++; }
      if (finalFilled < SET_SIZE) {
        setTimeout(function () { endGame(false); }, 400);
      }
    }
  }

  function endGame(completed) {
    phase = completed ? 'complete' : 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;

    var filled = 0;
    for (var i = 0; i < SET_SIZE; i++) { if (grid[i] !== null) filled++; }

    if (window.J) {
      if (completed) {
        J.fanfare();
      } else {
        J.death(Math.min(0.3 + (SET_SIZE - filled) / SET_SIZE, 1));
      }
    }
    if (completed && score > best) {
      best = score;
      try { localStorage.setItem('ss_best', String(best)); } catch (_) {}
    }

    // score = filled slots for completed, or filled for incomplete
    var finalScore = filled;
    if (window.LOOP) LOOP.emit('game_over', { score: finalScore, dur_s: +dur.toFixed(1), completed: completed });

    if (DEMO) {
      window.__demoScore = finalScore;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2200);
    }

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetBot(); }, 600);
      }
    }
  }

  function resetBot() {
    rng = mulberry32(SEED + botRunsDone * 1337);
    deck = buildDeck(rng);
    deckIdx = 0;
    grid = [null, null, null, null, null, null];
    score = 0;
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    botWait = 0;
    botPulls = 0;
    botMaxPulls = 7 + Math.floor(rng() * 5); // vary per run
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('restart', {});
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED + botRunsDone });
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- Input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var PULL_R  = { x: W / 2 - 90, y: H - 130, w: 180, h: 60 };
  var SHARE_R = { x: W / 2 - 125, y: 500, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'play') {
      pullCard();
      return;
    }
    if ((phase === 'over' || phase === 'complete') && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        var filled = 0;
        for (var i = 0; i < SET_SIZE; i++) { if (grid[i] !== null) filled++; }
        SHARE.send({ score: filled, unit: 'pieces' });
        return;
      }
      // Restart
      SEED = Math.floor(Math.random() * 99999);
      if (window.LOOP) LOOP.emit('restart', {});
      initGame();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- Autopilots ----
  function autopilot(dt) {
    if (phase !== 'play') return;

    if (DEMO) {
      // Mirror-neuron arc: deliberate pulls with hesitation
      // Pull counts: 0-7 = normal snaps, 8 = near-fail (already-have), 9-10 = tension pulls, 11 = final snap
      if (demoWaitFrames > 0) { demoWaitFrames -= dt; return; }
      if (demoPullCount < demoWaits.length) {
        pullCard();
        demoWaitFrames = demoWaits[demoPullCount] || 35;
        demoPullCount++;
      }
    } else if (BOT) {
      if (botWait > 0) { botWait -= dt; return; }
      if (botPulls < botMaxPulls) {
        pullCard();
        botPulls++;
        botWait = 20 + rng() * 30;
      } else {
        // Go passive — deck runs out naturally
        // Force end if stuck
        if (deckIdx < deck.length) {
          // pull remaining slowly to exhaust deck
          pullCard();
          botWait = 60;
        }
      }
    }
  }

  // ---- Render helpers ----
  function drawGrid(now) {
    // 6-slot grid: 3x2 layout
    var cols = 3, rows = 2;
    var cellW = 100, cellH = 100, gapX = 20, gapY = 20;
    var gridW = cols * cellW + (cols - 1) * gapX;
    var gridH = rows * cellH + (rows - 1) * gapY;
    var startX = (W - gridW) / 2;
    var startY = 200;

    for (var idx = 0; idx < SET_SIZE; idx++) {
      var col = idx % cols, row = Math.floor(idx / cols);
      var cx0 = startX + col * (cellW + gapX);
      var cy0 = startY + row * (cellH + gapY);
      var item = ITEMS[idx];
      var filled = grid[idx] !== null;

      // Cell background
      cx.save();
      if (filled) {
        // Pulse animation on recently filled
        cx.fillStyle = 'rgba(255,255,255,0.07)';
      } else {
        cx.fillStyle = 'rgba(255,255,255,0.04)';
      }
      cx.strokeStyle = filled ? item.color : 'rgba(255,255,255,0.12)';
      cx.lineWidth = filled ? 2 : 1;
      if (cx.roundRect) cx.roundRect(cx0, cy0, cellW, cellH, 12);
      else cx.rect(cx0, cy0, cellW, cellH);
      cx.fill(); cx.stroke();

      if (filled) {
        // Draw item symbol
        cx.fillStyle = item.color;
        cx.font = '900 46px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(item.sym, cx0 + cellW / 2, cy0 + cellH / 2 + 18);
      } else {
        // Empty slot — show faint slot number
        cx.fillStyle = 'rgba(255,255,255,0.15)';
        cx.font = '700 28px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText('?', cx0 + cellW / 2, cy0 + cellH / 2 + 10);
      }
      cx.restore();
    }
  }

  function drawDeckInfo() {
    var remaining = deck.length - deckIdx;
    var filled = 0;
    for (var i = 0; i < SET_SIZE; i++) { if (grid[i] !== null) filled++; }

    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.font = '600 14px -apple-system, Helvetica, Arial';
    cx.fillText(remaining + ' cards left', W / 2, 176);

    // Progress bar
    var barW = 200, barH = 5;
    var bx = (W - barW) / 2, by = 182;
    cx.fillStyle = 'rgba(255,255,255,0.1)';
    if (cx.roundRect) cx.roundRect(bx, by, barW, barH, 3);
    else cx.rect(bx, by, barW, barH);
    cx.fill();
    cx.fillStyle = TEAL;
    var progress = filled / SET_SIZE;
    if (cx.roundRect) cx.roundRect(bx, by, barW * progress, barH, 3);
    else cx.rect(bx, by, barW * progress, barH);
    cx.fill();
  }

  function drawPullButton(now) {
    var remaining = deck.length - deckIdx;
    if (remaining <= 0 && phase !== 'play') return;

    var pulse = 0.75 + 0.25 * Math.sin(now / 320);
    // Pull button
    cx.save();
    cx.fillStyle = VERM;
    cx.globalAlpha = pulse;
    if (cx.roundRect) cx.roundRect(PULL_R.x, PULL_R.y, PULL_R.w, PULL_R.h, 30);
    else cx.rect(PULL_R.x, PULL_R.y, PULL_R.w, PULL_R.h);
    cx.fill();
    cx.globalAlpha = 1;
    cx.fillStyle = '#fff';
    cx.font = '900 20px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText('PULL', W / 2, PULL_R.y + 38);
    cx.restore();

    // Card remaining indicator
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText(remaining + ' in deck', W / 2, PULL_R.y + PULL_R.h + 20);
  }

  // ---- Main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Decay juice
    if (hitStop > 0) {
      hitStop -= dt;
      // autopilot still needs to run even during hit-stop decay
    } else {
      autopilot(dt);
    }
    shakeAmt *= Math.pow(0.83, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // Juice transforms
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- CHALLENGE CARD ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 310);
      cx.fillStyle = GOLD;
      cx.font = '900 90px -apple-system, Helvetica, Arial';
      cx.fillText('6', W / 2, 420);
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('pieces collected today', W / 2, 450);
    }

    // ---- PLAY ----
    if (phase === 'play') {
      // Title
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('SET SNAP', W / 2, 60);

      // Score / progress
      var filled = 0;
      for (var i = 0; i < SET_SIZE; i++) { if (grid[i] !== null) filled++; }
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(filled + ' / 6', W / 2, 128);

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : ('BEAT ' + SHARE.dare + (SHARE.by ? ' — ' + SHARE.by : '')), W / 2, 158);
      }

      drawDeckInfo();
      drawGrid(now);
      if (!DEMO && !BOT) drawPullButton(now);
    }

    // ---- GAME OVER (incomplete) ----
    if (phase === 'over') {
      var filled2 = 0;
      for (var i = 0; i < SET_SIZE; i++) { if (grid[i] !== null) filled2++; }
      drawGrid(now);
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('DECK EMPTY.', W / 2, 300);
      cx.fillStyle = '#fff';
      cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(filled2 + ' / 6 pieces', W / 2, 342);
      var pt = pctTop(filled2);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 386);
      if (!DEMO && !BOT) {
        var p2 = 0.65 + 0.35 * Math.sin(now / 290);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — TRY AGAIN', W / 2, 432);
        cx.globalAlpha = 1;
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 29);
      }
    }

    // ---- COMPLETE (set filled) ----
    if (phase === 'complete') {
      drawGrid(now);
      cx.fillStyle = 'rgba(11,13,18,0.45)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = GOLD;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('COMPLETE!', W / 2, 292);
      cx.fillStyle = '#fff';
      cx.font = '800 22px -apple-system, Helvetica, Arial';
      cx.fillText('full set in ' + score + ' pulls', W / 2, 334);
      var pt2 = pctTop(score);
      cx.fillStyle = TEAL;
      cx.font = '900 20px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt2 + '% TODAY', W / 2, 372);
      if (!DEMO && !BOT) {
        var p3 = 0.65 + 0.35 * Math.sin(now / 290);
        cx.globalAlpha = p3; cx.fillStyle = VERM;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — PULL AGAIN', W / 2, 420);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 29);
      }
    }

    // ---- CTA CARD (demo only) ----
    if (phase === 'cta') {
      drawGrid(now);
      var t = (now - ctaAt) / 1000;
      var ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SET SNAP', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they snapped all 6. can you?', W / 2, 342);
      var p4 = 0.72 + 0.28 * Math.sin(now / 250);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p4;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 6), W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // ---- Floating flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 42);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 155 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // ---- Mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  initGame();
  requestAnimationFrame(frame);
})();
</script>
