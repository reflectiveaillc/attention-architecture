  // Tap logic
  // ------------------------------------------------------------------
  function registerTap(now) {
    if (state.phase !== 'play') return;
    var t = currentTempo();
    var interval = beatInterval();

    // Determine the target window based on tempo type
    var distFromBeat = Math.abs(now - state.nextBeatTime);
    var distFromLast = Math.abs(now - state.lastBeatTime);
    var minDist = Math.min(distFromBeat, distFromLast);

    var isOnBeat   = minDist <= interval * GOOD_WIN;
    var isPerfect  = minDist <= interval * PERFECT_WIN;
    var isOffBeat  = (now - state.lastBeatTime) > interval * 0.38 &&
                     (now - state.lastBeatTime) < interval * 0.62;

    var hit = false;
    if (t.type === 'beat' || t.type === 'half') {
      hit = isOnBeat;
    } else if (t.type === 'double') {
      // half-interval taps also count
      var halfInterval = interval / 2;
      var lastHalfBeat = state.lastBeatTime + halfInterval;
      var distFromHalf = Math.abs(now - lastHalfBeat);
      hit = minDist <= interval * GOOD_WIN || distFromHalf <= halfInterval * GOOD_WIN;
      isPerfect = minDist <= interval * PERFECT_WIN || distFromHalf <= halfInterval * PERFECT_WIN;
    } else if (t.type === 'offbeat') {
      hit = isOffBeat;
      isPerfect = (now - state.lastBeatTime) > interval * 0.42 &&

    cx.globalAlpha = 0.2;
    cx.fillStyle = '#fff';
    cx.beginPath();

    if (cx.roundRect) cx.roundRect(bx, by, fill, barH, 3);
    else cx.rect(bx, by, fill, barH);
    cx.fill();
    cx.restore();
  }

      cx.font = '800 14px Menlo, monospace';
      cx.fillText(t.label + ' — ' + t.name, W / 2, 36);

      // beat progress bar
      drawTempoBar(cx, state.tempoIdx, state.beatsInTempo, tColor);

      // score
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 116);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 138);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W / 2, 162);
      }

      // miss indicators (3 = dead)
      for (var mi = 0; mi < 3; mi++) {
        cx.save();
        cx.globalAlpha = mi < state.misses ? 1 : 0.2;
        cx.fillStyle = VERM;
        cx.beginPath();
        cx.arc(W / 2 - 18 + mi * 18, 168, 5, 0, Math.PI * 2);
        cx.fill();
        cx.restore();
      }

      // CENTER DOT — the main tap target
      var dotY = H / 2 + 30;
      var dotRadius = 40 + state.streak * 0.8;
      if (dotRadius > 70) dotRadius = 70;
      drawDot(cx, W / 2, dotY, dotRadius, state.dotPulse, state.dotHit, tColor);

      // beat type indicator below dot
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '700 12px Menlo, monospace';
      var hint;
      if (t.type === 'beat')    hint = 'TAP  ON  THE  FLASH';
      else if (t.type === 'double') hint = 'TAP  TWICE  AS  FAST';
      else if (t.type === 'half')   hint = 'TAP  EVERY  OTHER  BEAT';
      else                          hint = 'TAP  BETWEEN  THE  BEATS';
      cx.fillText(hint, W / 2, dotY + dotRadius + 30);

      // beat track (bottom)
      drawBeatTrack(cx, t.type, t.bpm, state.beatPhase, tColor);

      // streak display
      if (state.streak > 1) {
        cx.textAlign = 'center';
        var streakScale = 1 + Math.min(state.streak / 20, 0.6);
        var streakAlpha = Math.min(1, 0.5 + state.streak * 0.04);
        cx.save();
        cx.globalAlpha = streakAlpha;
        cx.fillStyle = tColor;
        cx.font = '900 ' + Math.round(22 * streakScale) + 'px -apple-system, Helvetica, Arial';
        cx.fillText('×' + state.streak, W / 2, dotY - dotRadius - 20);
        cx.restore();
      }
    }

    // === GAME OVER ===
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';

      var crackTempo = TEMPOS[Math.min(state.tempoIdx, TEMPOS.length - 1)];
      cx.fillStyle = VERM;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('CRACKED.', W / 2, 296);
      cx.fillStyle = 'rgba(255,255,255,0.6)';
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('at ' + crackTempo.label + ' — ' + crackTempo.name, W / 2, 328);
      cx.fillStyle = '#fff';
      cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' hits', W / 2, 366);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 402);
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 424);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 290);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 460);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD;
        cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill();
        cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // === DEMO CTA ===
    if (state.phase === 'cta') {
      var t2 = (now - state.ctaAt) / 1000;
      var ease2 = Math.min(1, t2 * 2.4);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease2) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease2;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('TEMPO FLIP', W / 2, 298);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('he cracked at tempo ' + (TEMPOS[Math.min(state.tempoIdx, TEMPOS.length - 1)].label.split(' ')[1]) + '. beat it.', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 250);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease2 * p3;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 24), W / 2, 408);
      cx.globalAlpha = ease2;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 444);
      cx.globalAlpha = 1;
    }

    // === FLASHES ===
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // === MUTE (human only) ===
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
