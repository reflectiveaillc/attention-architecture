<style>

               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<body>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // Match duration: real-time for human/demo, compressed for bot
  var MATCH_DURATION = BOT ? 4 : 30;  // seconds per match
  var ZONE_LIFETIME  = BOT ? 0.8 : 1.8;
  var ZONE_INTERVAL  = BOT ? 0.18 : 0.55;

  var phase, matchPhase, matchTimer, playerScore, oppScore, totalScore;
  var zones, flashes, botRunsDone, dareBeaten, runStartTs;
  var hitStop, zoom, shakeAmt;
  var bracketRound;   // 0 = semi, 1 = final
  var bracketWon, matchEnding;
  var challengeAt, overAt, ctaAt;
  var winStreak;
  var bestScore;
  try { bestScore = +localStorage.getItem('sb_best') || 0; } catch(_) {}

  // demo script state
  var demoNearFail, demoPhaseState, demoTapTimer;
  var DEMO_SCORE_TARGET = 41;

  function newGame() {
    phase        = DEMO ? 'challenge' : (BOT ? 'play' : 'title');
    matchPhase   = 'countdown';
    matchTimer   = BOT ? 0 : 3;
    playerScore  = 0;
    oppScore     = 0;
    totalScore   = 0;
    zones        = [];
    flashes      = [];
    hitStop      = 0;
    zoom         = 1;
    shakeAmt     = 0;
    bracketRound = 0;
    bracketWon   = false;
    dareBeaten   = false;
    winStreak    = 0;
    botRunsDone  = 0;
    demoNearFail = false;
    demoPhaseState = 'normal';
    demoTapTimer = 0;
    zoneTimer    = 0;
    matchEnding  = false;

    if (DEMO) {
      challengeAt = performance.now();
      setTimeout(function () {
        phase = 'play';
        matchPhase = 'countdown';
        matchTimer = 3;
        runStartTs = Date.now();
        if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      }, 1300);
      return;
    }
    if (BOT) {
      matchPhase = 'duel';
      matchTimer = MATCH_DURATION;
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    // human: wait on title
  }

  function startMatch() {
    playerScore  = 0;
    oppScore     = 0;
    zones        = [];
    zoneTimer    = 0;
    matchEnding  = false;
    demoNearFail = false;
    demoPhaseState = 'normal';
    demoTapTimer = 0;
    if (BOT) {
      matchPhase = 'duel';
      matchTimer = MATCH_DURATION;
      runStartTs = Date.now();
    } else {
      matchPhase = 'countdown';
      matchTimer = 3;
      runStartTs = Date.now();
    }
  }

  // Zone spawning
  function spawnZone() {
    var margin = 60;
    var x = margin + rng() * (W - margin * 2);
    var y = 220 + rng() * (H - 400);
    var r = 32 + rng() * 20;
    var pts = Math.floor(5 + rng() * 6);
    var isGold = rng() < 0.12;
    if (isGold) { pts = Math.floor(15 + rng() * 10); r = 40; }
    zones.push({ x: x, y: y, r: r, pts: pts, isGold: isGold, age: 0,
      lifetime: ZONE_LIFETIME * (0.8 + rng() * 0.4) });
  }

  var zoneTimer = 0;

  function tapZone(px, py) {
    for (var i = zones.length - 1; i >= 0; i--) {
      var z = zones[i];
      var dx = px - z.x, dy = py - z.y;
      if (Math.sqrt(dx*dx + dy*dy) <= z.r + 12) {
        playerScore += z.pts;
        totalScore  += z.pts;
        var combo = winStreak + 1;
        if (z.isGold) {
          if (window.J) J.gold();
          hitStop = 5; zoom = 1.04;
          flash('+' + z.pts + ' GOLD', GOLD, 40);
        } else {
          if (window.J) J.hit(combo);
          flash('+' + z.pts, TEAL, 30);
        }
        if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && totalScore > SHARE.dare) {
          dareBeaten = true;
          flash('DARE BEATEN', TEAL, 44);
          if (window.J) J.fanfare();
          SHARE.beaten(totalScore);
        }
        zones.splice(i, 1);
        if (window.LOOP) LOOP.emit('zone_tapped', { pts: z.pts, gold: z.isGold });
        return;
      }
    }
    // near-miss check
    var closest = Infinity;
    for (var j = 0; j < zones.length; j++) {
      var z2 = zones[j];
      var d2 = Math.sqrt(Math.pow(px-z2.x,2)+Math.pow(py-z2.y,2));
      if (d2 < closest) closest = d2;
    }
    if (closest < 80) {
      flash('SO CLOSE', VERM, 26);
      shakeAmt = 3;
      if (window.J) J.near();
      if (window.LOOP) LOOP.emit('near_miss', { dist: Math.round(closest) });
    }
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0,
      x: W/2 + (rng()-0.5)*80, y: 300 + (rng()-0.5)*50 });
  }

  var matchEnding = false;

  function endMatch() {
    if (matchEnding) return;
    matchEnding = true;
    matchPhase = 'result';
    var won = playerScore > oppScore;
    var dur = (Date.now() - runStartTs) / 1000;
    if (won) winStreak++;
    else winStreak = 0;

    if (window.J) {
      if (won) { if (bracketRound >= 1) J.fanfare(); else J.perfect(winStreak); }
      else { J.death(0.5 + Math.min(0.5, (oppScore - playerScore) / 80)); shakeAmt = 7; }
    }

    var resultDelay = BOT ? 200 : (won ? 1400 : 1600);
    setTimeout(function () {
      matchEnding = false;
      if (!won) {
        // eliminated
        if (window.LOOP) LOOP.emit('game_over', { score: totalScore, dur_s: +dur.toFixed(1) });
        finishRun(false);
      } else {
        bracketRound++;
        if (bracketRound > 1) {
          // bracket champion
          bracketWon = true;
          if (window.LOOP) LOOP.emit('game_over', { score: totalScore, dur_s: +dur.toFixed(1) });
          finishRun(true);
        } else {
          // advance to final
          startMatch();
        }
      }
    }, resultDelay);
  }

  function finishRun(champion) {
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () {
          bracketRound = 0;
          totalScore   = 0;
          winStreak    = 0;
          zones        = [];
          flashes      = [];
          if (window.LOOP) LOOP.emit('restart', {});
          startMatch();
        }, 100);
      }
    } else if (DEMO) {
      window.__demoScore = totalScore;
      phase = 'over';
      overAt = performance.now();
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2200);
    } else {
      if (totalScore > bestScore) {
        bestScore = totalScore;
        try { localStorage.setItem('sb_best', String(bestScore)); } catch(_) {}
        if (window.J) setTimeout(function(){ J.fanfare(); }, 400);
      }
      phase  = 'over';
      overAt = performance.now();
    }
  }

  // ---- Input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W/2 - 125, y: 492, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { phase = 'play'; startMatch(); return; }
    if (phase === 'play' && matchPhase === 'duel') {
      tapZone(px !== undefined ? px : W/2, py !== undefined ? py : H/2); return;
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: totalScore, unit: 'bracket' }); return;
      }
      bracketRound = 0; totalScore = 0; winStreak = 0; zones = []; flashes = []; dareBeaten = false;
      bracketWon = false;
      if (window.LOOP) LOOP.emit('restart', {});
      phase = 'play';
      startMatch();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- Autopilots ----
  var oppTapTimer = 0;

  function oppAct(dt) {
    if (matchPhase !== 'duel') return;
    oppTapTimer -= dt * 60;
    if (oppTapTimer > 0) return;
    var oppSpeed = bracketRound === 0 ? 22 : 18;
    oppTapTimer = oppSpeed + rng() * 14;
    if (zones.length > 0) {
      var hitChance = bracketRound === 0 ? 0.55 : 0.68;
      if (rng() < hitChance) {
        var oidx = Math.floor(rng() * zones.length);
        oppScore += zones[oidx].pts;
        if (window.J) J.tension(Math.min(1, Math.abs(oppScore - playerScore) / 60));
      }
    }
  }

  // Demo autopilot
  var demoActTimer = 0;
  function demoAct() {
    if (matchPhase !== 'duel') return;
    demoTapTimer--;
    if (demoTapTimer > 0) return;

    var elapsed = MATCH_DURATION - matchTimer;
    var ratio   = elapsed / MATCH_DURATION;

    // Phase transitions
    if (ratio > 0.58 && demoPhaseState === 'normal') {
      demoPhaseState = 'near_fail'; demoNearFail = true;
    }
    if (ratio > 0.70 && demoPhaseState === 'near_fail') demoPhaseState = 'recovery';
    if (ratio > 0.83 && demoPhaseState === 'recovery')  demoPhaseState = 'dying';

    if (demoPhaseState === 'normal') {
      demoTapTimer = 28 + Math.floor(rng() * 22);
      if (zones.length > 0) {
        var idx = Math.floor(rng() * zones.length);
        var z   = zones[idx];
        var miss = rng() < 0.20;
        tapZone(z.x + (rng()-0.5)*(miss?120:22), z.y + (rng()-0.5)*(miss?120:22));
      }
    } else if (demoPhaseState === 'near_fail') {
      demoTapTimer = 34 + Math.floor(rng() * 28);
      if (zones.length > 0) {
        var idx2 = Math.floor(rng() * zones.length);
        var z2   = zones[idx2];
        tapZone(z2.x + (rng()<0.5?1:-1)*(58+rng()*32), z2.y+(rng()-0.5)*38);
      }
      if (window.J) J.tension(0.75 + rng() * 0.25);
    } else if (demoPhaseState === 'recovery') {
      demoTapTimer = 13 + Math.floor(rng() * 10);
      if (zones.length > 0) {
        var idx3 = Math.floor(rng() * zones.length);
        var z3   = zones[idx3];
        tapZone(z3.x + (rng()-0.5)*7, z3.y+(rng()-0.5)*7);
      }
    } else { // dying
      demoTapTimer = 70 + Math.floor(rng() * 45);
      if (zones.length > 0) {
        var idx4 = Math.floor(rng() * zones.length);
        var z4   = zones[idx4];
        tapZone(z4.x+(rng()<0.5?-1:1)*160, z4.y+(rng()-0.5)*80);
      }
    }
  }

  // Bot autopilot
  var botActTimer = 0;
  function botAct() {
    if (matchPhase !== 'duel') return;
    botActTimer--;
    if (botActTimer > 0) return;
    botActTimer = 8 + Math.floor(rng() * 10);
    if (zones.length > 0) {
      var bidx = Math.floor(rng() * zones.length);
      var bz   = zones[bidx];
      var miss = rng() < 0.35;
      tapZone(bz.x+(rng()-0.5)*(miss?110:18), bz.y+(rng()-0.5)*(miss?110:18));
    }
  }

  // ---- Render helpers ----
  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 55))));
  }
  function roundName(r) { return r === 0 ? 'SEMI-FINAL' : 'FINAL'; }
  function oppName(r)   { return r === 0 ? 'REYES' : 'KALANI'; }

  function drawBracket(round) {
    var bx = W/2, by = 54;
    cx.save();
    cx.textAlign = 'center';

    cx.strokeStyle = 'rgba(255,255,255,0.14)';
    cx.lineWidth = 1.5;
    cx.beginPath(); cx.moveTo(bx-80,by-12); cx.lineTo(bx-30,by-12); cx.lineTo(bx-30,by+4); cx.stroke();
    cx.beginPath(); cx.moveTo(bx+80,by-12); cx.lineTo(bx+30,by-12); cx.lineTo(bx+30,by+4); cx.stroke();
    cx.beginPath(); cx.moveTo(bx-30,by+4);  cx.lineTo(bx+30,by+4);  cx.stroke();
    cx.beginPath(); cx.moveTo(bx,by+4);     cx.lineTo(bx,by+22);    cx.stroke();

    cx.fillStyle = round > 0 ? TEAL : VERM;
    cx.font = '700 10px -apple-system, Helvetica, Arial';
    cx.fillText('YOU', bx-80, by-16);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.fillText(oppName(0), bx+80, by-16);

    if (round > 0) {
      cx.fillStyle = GOLD;
      cx.fillText('YOU', bx-46, by+30);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.fillText(oppName(1), bx+46, by+30);
    } else {
      cx.fillStyle = 'rgba(255,255,255,0.18)';
      cx.fillText('?', bx-46, by+30);
      cx.fillText('?', bx+46, by+30);
    }

    cx.fillStyle = bracketWon ? GOLD : 'rgba(255,255,255,0.18)';
    cx.font = '12px -apple-system, Helvetica, Arial';
    cx.fillText('🏆', bx, by+44);
    cx.restore();
  }

  function drawProgressBar(elapsed, total, py) {
    var pct = Math.min(1, elapsed / total);
    var bw = 300, bh = 8, bx2 = (W-bw)/2;
    cx.fillStyle = 'rgba(255,255,255,0.1)';
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(bx2, py, bw, bh, 4); else cx.rect(bx2, py, bw, bh);
    cx.fill();
    cx.fillStyle = pct > 0.75 ? VERM : (pct > 0.45 ? GOLD : TEAL);
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(bx2, py, bw*pct, bh, 4); else cx.rect(bx2, py, bw*pct, bh);
    cx.fill();
  }

  function drawZone(z, now) {
    var ageR = z.age / z.lifetime;
    var alpha = ageR < 0.15 ? ageR/0.15 : (ageR > 0.65 ? 1-(ageR-0.65)/0.35 : 1);
    var pulse = 1 + 0.06 * Math.sin(now/120 + z.x);
    var r = z.r * pulse;

    cx.save(); cx.globalAlpha = alpha;

    // countdown arc
    cx.beginPath();
    cx.arc(z.x, z.y, r+6, -Math.PI/2, -Math.PI/2 + (1-ageR)*Math.PI*2);
    cx.strokeStyle = z.isGold ? GOLD : TEAL;
    cx.lineWidth = 3; cx.stroke();

    // glow
    var grd = cx.createRadialGradient(z.x, z.y, 0, z.x, z.y, r);
    if (z.isGold) {
      grd.addColorStop(0,'rgba(242,177,52,0.35)'); grd.addColorStop(1,'rgba(242,177,52,0)');
    } else {
      grd.addColorStop(0,'rgba(46,197,182,0.28)'); grd.addColorStop(1,'rgba(46,197,182,0)');
    }
    cx.fillStyle = grd;
    cx.beginPath(); cx.arc(z.x, z.y, r, 0, Math.PI*2); cx.fill();

    // center
    cx.fillStyle = z.isGold ? GOLD : TEAL;
    cx.beginPath(); cx.arc(z.x, z.y, 7, 0, Math.PI*2); cx.fill();

    // pts label
    cx.fillStyle = '#fff';
    cx.font = '700 ' + (z.isGold?15:13) + 'px Menlo, monospace';
    cx.textAlign = 'center';
    cx.fillText('+' + z.pts, z.x, z.y + r + 20);
    cx.restore();
  }

  // ---- Main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Update sim
    if (phase === 'play') {
      if (matchPhase === 'countdown') {
        matchTimer -= dt / 60;
        if (matchTimer <= 0) {
          matchPhase = 'duel';
          matchTimer = MATCH_DURATION;
          zoneTimer  = 0;
        }
      } else if (matchPhase === 'duel') {
        matchTimer -= dt / 60;

        // Zone management
        zoneTimer -= dt / 60;
        if (zoneTimer <= 0 && zones.length < 5) {
          var spawnRate = ZONE_INTERVAL - ((MATCH_DURATION - matchTimer) / MATCH_DURATION) * (BOT ? 0.05 : 0.15);
          zoneTimer = Math.max(BOT ? 0.1 : 0.28, spawnRate);
          spawnZone();
        }
        for (var i = zones.length - 1; i >= 0; i--) {
          zones[i].age += dt / 60;
          if (zones[i].age >= zones[i].lifetime) zones.splice(i, 1);
        }

        if (matchTimer < 8 && matchTimer > 0.2 && !BOT) {
          if (window.J) J.tension(Math.min(1, (8 - matchTimer) / 8));
        }

        // Opponent sim
        oppAct(dt);

        // Autopilots
        if (hitStop > 0) { hitStop -= dt; }
        else {
          if (DEMO) demoAct();
          else if (BOT) botAct();
        }

        if (matchTimer <= 0 && !matchEnding) endMatch();
      }
    }

    // Juice
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random()-0.5)*shakeAmt, sy = (Math.random()-0.5)*shakeAmt;
      cx.translate(W/2+sx, H/2+sy); cx.scale(zoom,zoom); cx.translate(-W/2,-H/2);
    }
    shakeAmt *= Math.pow(0.83, dt);
    zoom += (1-zoom)*0.12*dt;

    // BG
    cx.fillStyle = INK; cx.fillRect(-20,-20,W+40,H+40);
    var bg = cx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'rgba(46,197,182,0.05)');
    bg.addColorStop(1,'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0,0,W,H);

    // TITLE
    if (phase === 'title') {
      drawBracket(0);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('SPEED', W/2, 282);
      cx.fillStyle = VERM;
      cx.fillText('BRACKET', W/2, 336);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('4-player elimination. tap the zones.', W/2, 382);
      cx.fillStyle = 'rgba(255,255,255,0.32)';
      cx.font = '600 11px -apple-system, Helvetica, Arial';
      cx.fillText('winner holds the bracket badge.', W/2, 404);
      var pulse = 0.6 + 0.4*Math.sin(now/300);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO ENTER', W/2, 452);
      cx.globalAlpha = 1;
      if (bestScore > 0) {
        cx.fillStyle = 'rgba(255,255,255,0.22)';
        cx.font = '600 12px -apple-system, Helvetica, Arial';
        cx.fillText('BEST ' + bestScore + ' pts', W/2, 482);
      }
    }

    // CHALLENGE CARD
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.44)';
      cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(DEMO_SCORE_TARGET, W/2, 402);
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top bracket", W/2, 434);
    }

    // PLAY
    if (phase === 'play') {
      drawBracket(bracketRound);

      cx.textAlign = 'center';
      cx.fillStyle = GOLD;
      cx.font = '800 13px Menlo, monospace';
      cx.fillText(roundName(bracketRound), W/2, 108);

      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('YOU  vs  ' + oppName(bracketRound), W/2, 130);

      if (matchPhase === 'countdown') {
        var cdN = Math.ceil(matchTimer);
        cx.fillStyle = '#fff';
        cx.font = '900 110px -apple-system, Helvetica, Arial';
        cx.fillText(cdN > 0 ? String(cdN) : 'GO!', W/2, 432);
        cx.fillStyle = 'rgba(255,255,255,0.38)';
        cx.font = '600 14px -apple-system, Helvetica, Arial';
        cx.fillText('get ready', W/2, 490);
      } else if (matchPhase === 'duel') {
        // Scores
        cx.fillStyle = TEAL;
        cx.font = '900 52px -apple-system, Helvetica, Arial';
        cx.textAlign = 'right';
        cx.fillText(playerScore, W/2-18, 172);
        cx.fillStyle = 'rgba(255,255,255,0.38)';
        cx.font = '700 20px -apple-system, Helvetica, Arial';
        cx.fillText('YOU', W/2-18, 194);

        cx.fillStyle = VERM;
        cx.font = '900 52px -apple-system, Helvetica, Arial';
        cx.textAlign = 'left';
        cx.fillText(oppScore, W/2+18, 172);
        cx.fillStyle = 'rgba(255,255,255,0.38)';
        cx.font = '700 20px -apple-system, Helvetica, Arial';
        cx.fillText(oppName(bracketRound), W/2+18, 194);

        cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.18)';
        cx.font = '900 22px -apple-system, Helvetica, Arial';
        cx.fillText('VS', W/2, 177);

        // Timer bar
        drawProgressBar(MATCH_DURATION - matchTimer, MATCH_DURATION, 204);
        cx.fillStyle = matchTimer < 8 ? VERM : 'rgba(255,255,255,0.42)';
        cx.font = '700 13px Menlo, monospace';
        cx.textAlign = 'center';
        cx.fillText(Math.ceil(matchTimer) + 's', W/2, 224);

        // Dare banner
        if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
          cx.fillStyle = dareBeaten ? TEAL : GOLD;
          cx.font = '800 13px -apple-system, Helvetica, Arial';
          cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W/2, 242);
        }

        // Zones
        for (var zi = 0; zi < zones.length; zi++) drawZone(zones[zi], now);

        // Lead indicator
        var gap = playerScore - oppScore;
        if (Math.abs(gap) > 4) {
          cx.textAlign = 'center';
          cx.fillStyle = gap > 0 ? TEAL : VERM;
          cx.globalAlpha = 0.55;
          cx.font = '700 11px -apple-system, Helvetica, Arial';
          cx.fillText(gap > 0 ? '+' + gap + ' AHEAD' : Math.abs(gap) + ' BEHIND', W/2, 646);
          cx.globalAlpha = 1;
        }
      } else if (matchPhase === 'result') {
        var mWon = playerScore > oppScore;
        cx.textAlign = 'center';
        cx.fillStyle = mWon ? TEAL : VERM;
        cx.font = '900 38px -apple-system, Helvetica, Arial';
        var resultLabel = mWon ? (bracketRound > 1 ? 'CHAMPION' : 'ADVANCING') : 'ELIMINATED';
        cx.fillText(resultLabel, W/2, 372);
        cx.fillStyle = '#fff';
        cx.font = '800 22px -apple-system, Helvetica, Arial';
        cx.fillText(playerScore + '  —  ' + oppScore, W/2, 422);
        cx.fillStyle = 'rgba(255,255,255,0.42)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText(mWon ? (bracketRound > 1 ? 'bracket cleared' : 'next: the final') : 'vs ' + oppName(bracketRound), W/2, 454);
      }
    }

    // GAME OVER / SCORE CARD
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.62)'; cx.fillRect(0,0,W,H);
      cx.textAlign = 'center';
      if (bracketWon) {
        cx.fillStyle = GOLD;
        cx.font = '900 42px -apple-system, Helvetica, Arial';
        cx.fillText('BRACKET', W/2, 292);
        cx.fillStyle = TEAL;
        cx.fillText('CHAMPION', W/2, 342);
      } else {
        cx.fillStyle = VERM;
        cx.font = '900 40px -apple-system, Helvetica, Arial';
        cx.fillText('KNOCKED OUT.', W/2, 312);
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.font = '700 13px -apple-system, Helvetica, Arial';
        cx.fillText('round ' + (bracketRound+1) + ' · ' + roundName(bracketRound), W/2, 342);
      }
      cx.fillStyle = '#fff';
      cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(totalScore + ' pts', W/2, 390);
      var pt = pctTop(totalScore);
      cx.fillStyle = GOLD;
      cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W/2, 428);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('best: ' + Math.max(bestScore,totalScore) + ' pts', W/2, 452);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4*Math.sin(now/280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ENTER AGAIN', W/2, 476);
        cx.globalAlpha = 1;
        // Share zone
        cx.fillStyle = 'rgba(242,177,52,0.13)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W/2, SHARE_R.y+30);
      }
    }

    // CTA CARD
    if (phase === 'cta') {
      var ct = (now - ctaAt) / 1000, ease = Math.min(1, ct * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8*ease) + ')'; cx.fillRect(0,0,W,H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SPEED', W/2, 284);
      cx.fillStyle = VERM;
      cx.fillText('BRACKET', W/2, 336);
      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore||DEMO_SCORE_TARGET) + ' pts. think you can beat it?', W/2, 380);
      var p3 = 0.7 + 0.3*Math.sin(now/240);
      cx.fillStyle = VERM; cx.globalAlpha = ease*p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore||DEMO_SCORE_TARGET), W/2, 434);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 466);
      cx.globalAlpha = 1;
    }

    // FLOATING TEXT
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t/38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t*0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t*1.2);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // MUTE TOGGLE
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w/2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
