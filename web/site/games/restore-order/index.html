<meta charset="UTF-8">

<title>Restore Order — Tilt</title>
<!--
  LOOP / attention-architecture — Restore Order
  Engine: calm. Circuits: 06-zeigarnik, 08-investment, 05-ease.
  Mechanic: tap misplaced objects then tap their correct slots to restore the room.
  Modes:
    ?demo=1&seed=7   scripted calm arc ~16s → soft CTA → window.__demoDone=true
    ?bot=1&runs=N&seed=5  imperfect autopilot, N runs, window.__botDone=true
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'restore-order';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var SOFT_WHITE = 'rgba(255,255,255,0.92)';

  // Object definitions: home positions + colors
  var ITEM_R = 26;
  var HOMES = [
    { id:0, label:'book',    hx:80,  hy:200, color:'#5b8fd4' },
    { id:1, label:'cup',     hx:310, hy:210, color:'#e88c3a' },
    { id:2, label:'plant',   hx:200, hy:180, color:'#5abf6a' },
    { id:3, label:'lamp',    hx:340, hy:340, color:'#f2b134' },
    { id:4, label:'clock',   hx:70,  hy:340, color:'#c47bb5' },
    { id:5, label:'keys',    hx:190, hy:390, color:'#8cc8e8' },
    { id:6, label:'phone',   hx:310, hy:490, color:'#e8aac8' },
    { id:7, label:'glass',   hx:100, hy:510, color:'#a0d8a0' },
    { id:8, label:'rem',     hx:200, hy:560, color:'#d4a878' },
  ];

  // Game state
  var phase, items, selected, score, runStartTs;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var flashes = [];
  var stepNum = 0;
  var botRunsDone = 0;

  // Bot state machine: pick → place → pick → place → ... → win → restart
  // State: 'idle', 'picked', 'placing', 'done'
  var botState = 'idle';
  var botTimer = 0;        // counts up in ms (dt * 16.667)
  var botCooldown = 600;   // ms between actions
  var botRestartTimer = 0;
  var botCurrentItem = null;

  // Demo state
  var demoElapsed = 0;
  var demoStep = 0;       // 0=settling, 1=placing items, 2=win, 3=cta
  var demoTimer = 0;
  var demoCtaStart = 0;
  var demoDone = false;

  function shufflePositions() {
    var spots = [
      {x:60,  y:450}, {x:160, y:460}, {x:280, y:460},
      {x:350, y:540}, {x:200, y:640}, {x:80,  y:610},
      {x:310, y:610}, {x:150, y:540}, {x:250, y:540},
    ];
    for (var i = spots.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = spots[i]; spots[i] = spots[j]; spots[j] = tmp;
    }
    return spots;
  }

  function newRound() {
    phase = 'play';
    selected = null;
    score = 0;
    flashes = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    stepNum = 0;
    botState = 'idle'; botTimer = 0; botRestartTimer = 0; botCurrentItem = null;
    demoTimer = 0;

    var spots = shufflePositions();
    items = HOMES.map(function (h, i) {
      return {
        id: h.id, label: h.label, color: h.color,
        hx: h.hx, hy: h.hy,
        x: spots[i].x, y: spots[i].y,
        placed: false
      };
    });

    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function placeItem(itm) {
    itm.placed = true;
    itm.x = itm.hx;
    itm.y = itm.hy;
    selected = null;
    score++;
    stepNum++;
    hitStop = 3;
    zoom = 1.015;

    if (window.J) J.calm(stepNum);
    flash('+calm', TEAL, 28);
    if (window.LOOP) LOOP.emit('item_placed', { id: itm.id, label: itm.label, score: score });

    var allPlaced = items.every(function (it) { return it.placed; });
    if (allPlaced) {
      onAllPlaced();
    }
  }

  function onAllPlaced() {
    phase = 'win';
    hitStop = 6;
    zoom = 1.02;
    if (window.J) J.calm(stepNum + 1);
    flash('ORDER RESTORED', TEAL, 34);
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // Input
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, px, py) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }
  function inCircle(ox, oy, r, px, py) { var dx = px-ox, dy = py-oy; return dx*dx+dy*dy <= r*r; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }

    if (phase === 'title') { startPlay(); return; }
    if (phase === 'win' || phase === 'over') { resetHuman(); return; }
    if (phase !== 'play') return;

    if (!selected) {
      for (var i = 0; i < items.length; i++) {
        if (!items[i].placed && inCircle(items[i].x, items[i].y, ITEM_R + 8, px, py)) {
          selected = items[i];
          return;
        }
      }
    } else {
      if (inCircle(selected.hx, selected.hy, ITEM_R + 14, px, py)) {
        placeItem(selected);
        return;
      }
      for (var j = 0; j < items.length; j++) {
        if (!items[j].placed && items[j] !== selected && inCircle(items[j].x, items[j].y, ITEM_R + 8, px, py)) {
          selected = items[j];
          return;
        }
      }
      selected = null;
    }
  }

  function startPlay() {
    phase = 'play';
  }

  function resetHuman() {
    rng = mulberry32(SEED + Math.floor(Date.now() / 1000));
    if (window.LOOP) LOOP.emit('restart', {});
    newRound();
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // BOT autopilot — simple state machine, one action at a time
  // After completing a run (win), restart. After BOT_RUNS, set __botDone.
  function botTick(dt) {
    if (!BOT) return;

    // Restart delay after win
    if (phase === 'win') {
      botRestartTimer += dt * 16.667;
      if (botRestartTimer > 800) {
        botRestartTimer = 0;
        botRunsDone++;
        if (botRunsDone >= BOT_RUNS) {
          window.__botDone = true;
          return;
        }
        rng = mulberry32(SEED + botRunsDone * 13);
        if (window.LOOP) LOOP.emit('restart', {});
        newRound();
      }
      return;
    }

    if (phase !== 'play') return;

    botTimer += dt * 16.667;

    if (botState === 'idle') {
      if (botTimer < botCooldown) return;
      botTimer = 0;
      // Pick next unplaced item
      var unplaced = items.filter(function(it){ return !it.placed; });
      if (unplaced.length === 0) return;
      // Pick a random unplaced item (seeded)
      var idx = Math.floor(rng() * unplaced.length);
      botCurrentItem = unplaced[idx];
      selected = botCurrentItem;
      botState = 'placing';
      botCooldown = 350 + rng() * 500; // hesitation before placing
    } else if (botState === 'placing') {
      if (botTimer < botCooldown) return;
      botTimer = 0;
      if (botCurrentItem && !botCurrentItem.placed) {
        placeItem(botCurrentItem);
        botCurrentItem = null;
      }
      botState = 'idle';
      botCooldown = 400 + rng() * 600;
    }
  }

  // DEMO autopilot — calm arc: settle(1.2s) → place all items (~1.7s each) → win → CTA(3.5s)
  function demoTick(dt) {
    if (!DEMO || demoDone) return;
    demoElapsed += dt * 16.667;

    if (demoStep === 0) {
      // Settling phase — just let the room sit
      if (demoElapsed >= 1200) {
        demoStep = 1;
        demoTimer = 0;
        phase = 'play';
        if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      }
      return;
    }

    if (demoStep === 1 && phase === 'play') {
      demoTimer += dt * 16.667;
      var interval = 1650 + (rng() * 200 - 100);
      if (demoTimer < interval) return;
      demoTimer = 0;

      var unplaced = items.filter(function(it){ return !it.placed; });
      if (unplaced.length > 0) {
        // Pick first for orderliness (calm, deliberate)
        selected = unplaced[0];
        placeItem(selected);
      }
      // Check if all placed (onAllPlaced sets phase='win')
      return;
    }

    if (phase === 'win' && demoStep === 1) {
      demoStep = 2;
      demoTimer = 0;
      return;
    }

    if (demoStep === 2) {
      // Linger on win screen ~1.5s
      demoTimer += dt * 16.667;
      if (demoTimer >= 1500) {
        demoStep = 3;
        phase = 'cta';
        demoCtaStart = demoElapsed;
        demoTimer = 0;
        window.__demoScore = score;
      }
      return;
    }

    if (demoStep === 3) {
      // CTA lingers ~3.5s
      var ctaElapsed = demoElapsed - demoCtaStart;
      if (ctaElapsed >= 3500 && !demoDone) {
        demoDone = true;
        window.__demoDone = true;
      }
    }
  }

  // Drawing helpers
  function drawItemShape(it, x, y, alpha, sc) {
    cx.save();
    cx.globalAlpha = alpha !== undefined ? alpha : 1;
    cx.translate(x, y);
    if (sc) cx.scale(sc, sc);
    var r = ITEM_R - 4;
    cx.beginPath();
    cx.arc(0, 0, r, 0, Math.PI * 2);
    cx.fillStyle = it.color;
    cx.fill();
    cx.fillStyle = 'rgba(0,0,0,0.5)';
    cx.font = 'bold 12px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText(it.label.slice(0,2).toUpperCase(), 0, 0);
    cx.restore();
    cx.textBaseline = 'alphabetic';
  }

  function drawRoom() {
    var floor = cx.createLinearGradient(0, 400, 0, H);
    floor.addColorStop(0, '#1a1c24');
    floor.addColorStop(1, '#111318');
    cx.fillStyle = floor;
    cx.fillRect(0, 400, W, H - 400);
    var wall = cx.createLinearGradient(0, 0, 0, 400);
    wall.addColorStop(0, '#14161e');
    wall.addColorStop(1, '#1a1c24');
    cx.fillStyle = wall;
    cx.fillRect(0, 0, W, 400);
    // baseboard
    cx.fillStyle = 'rgba(255,255,255,0.04)';
    cx.fillRect(0, 396, W, 8);
    // shelves
    cx.strokeStyle = 'rgba(255,255,255,0.07)';
    cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(20, 232); cx.lineTo(W-20, 232); cx.stroke();
    cx.beginPath(); cx.moveTo(20, 422); cx.lineTo(W-20, 422); cx.stroke();
    // subtle shelf highlight
    cx.fillStyle = 'rgba(255,255,255,0.025)';
    cx.fillRect(20, 150, 120, 82);
    cx.fillRect(155, 140, 95, 92);
    cx.fillRect(265, 155, 105, 85);
  }

  function drawHomeSlot(it) {
    var isSelected = selected && selected.id === it.id;
    cx.save();
    cx.translate(it.hx, it.hy);
    if (it.placed) {
      cx.restore();
      drawItemShape(it, it.hx, it.hy, 1, 1);
    } else {
      // Dashed ring slot
      cx.beginPath();
      cx.arc(0, 0, ITEM_R + 4, 0, Math.PI * 2);
      cx.strokeStyle = isSelected ? TEAL : 'rgba(255,255,255,0.16)';
      cx.lineWidth = isSelected ? 2.5 : 1.5;
      cx.setLineDash(isSelected ? [] : [5, 4]);
      cx.stroke();
      cx.setLineDash([]);
      // Faint fill
      cx.beginPath();
      cx.arc(0, 0, ITEM_R - 4, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(255,255,255,0.04)';
      cx.fill();
      cx.restore();
    }
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Autopilots
    if (DEMO) demoTick(dt);
    if (BOT) botTick(dt);

    // Juice decay — ALWAYS decay hitStop every frame
    if (hitStop > 0) { hitStop -= dt; } else { /* autopilot already called above */ }
    zoom += (1 - zoom) * 0.14 * dt;
    shakeAmt *= Math.pow(0.82, dt);

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W/2 + sx, H/2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W/2, -H/2);
    }

    // BG
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W+40, H+40);
    drawRoom();

    // Home slots
    for (var i = 0; i < items.length; i++) drawHomeSlot(items[i]);

    // Unplaced items
    for (var j = 0; j < items.length; j++) {
      var it = items[j];
      if (!it.placed) {
        var isSel = selected && selected.id === it.id;
        var pulse = isSel ? 1 + 0.06 * Math.sin(now / 180) : 1;
        if (isSel) {
          cx.save();
          cx.translate(it.x, it.y);
          cx.beginPath();
          cx.arc(0, 0, ITEM_R + 9, 0, Math.PI * 2);
          cx.strokeStyle = TEAL;
          cx.lineWidth = 2;
          cx.globalAlpha = 0.45 + 0.3 * Math.sin(now / 200);
          cx.stroke();
          cx.restore();
          cx.globalAlpha = 1;
        }
        drawItemShape(it, it.x, it.y, 1, pulse);
      }
    }

    // Dashed guide line from selected item to its home
    if (selected && !selected.placed) {
      cx.save();
      cx.globalAlpha = 0.22 + 0.1 * Math.sin(now / 300);
      cx.strokeStyle = TEAL;
      cx.lineWidth = 1.5;
      cx.setLineDash([6, 5]);
      cx.beginPath();
      cx.moveTo(selected.x, selected.y);
      cx.lineTo(selected.hx, selected.hy);
      cx.stroke();
      cx.setLineDash([]);
      cx.restore();
    }

    // Progress bar + score
    var total = items.length;
    var placed = items.filter(function(i){ return i.placed; }).length;
    var prog = placed / total;
    cx.fillStyle = 'rgba(255,255,255,0.06)';
    cx.fillRect(30, 36, W-60, 6);
    cx.fillStyle = TEAL;
    cx.fillRect(30, 36, (W-60) * prog, 6);
    cx.textAlign = 'center';
    cx.fillStyle = SOFT_WHITE;
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText(placed + ' / ' + total + '  restored', W/2, 27);

    // Floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 36);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.35) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 330 - fl.t * 1.3);
      cx.globalAlpha = 1;
      if (fl.t > 36) flashes.splice(k, 1);
    }

    // Title screen
    if (phase === 'title') {
      cx.fillStyle = 'rgba(11,13,18,0.85)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 38px -apple-system, Helvetica, Arial';
      cx.fillText('RESTORE ORDER', W/2, 298);
      cx.fillStyle = 'rgba(255,255,255,0.58)';
      cx.font = '500 16px -apple-system, Helvetica, Arial';
      cx.fillText('tap object · tap its home', W/2, 336);
      var tp = 0.6 + 0.4 * Math.sin(now / 350);
      cx.globalAlpha = tp;
      cx.fillStyle = TEAL;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO BEGIN', W/2, 392);
      cx.globalAlpha = 1;
    }

    // Win screen
    if (phase === 'win') {
      cx.fillStyle = 'rgba(11,13,18,0.68)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '800 34px -apple-system, Helvetica, Arial';
      cx.fillText('ORDER RESTORED', W/2, 294);
      cx.fillStyle = SOFT_WHITE;
      cx.font = '600 20px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' items at peace', W/2, 334);
      if (!DEMO && !BOT) {
        var wp = 0.6 + 0.4 * Math.sin(now / 320);
        cx.globalAlpha = wp;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO PLAY AGAIN', W/2, 392);
        cx.globalAlpha = 1;
      }
    }

    // Demo CTA card
    if (phase === 'cta') {
      var ctaElapsed = demoElapsed - demoCtaStart;
      var ease = Math.min(1, (ctaElapsed / 1000) * 2.4);
      cx.fillStyle = 'rgba(11,13,18,' + (0.84 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '800 40px -apple-system, Helvetica, Arial';
      cx.fillText('RESTORE ORDER', W/2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.68)';
      cx.font = '500 18px -apple-system, Helvetica, Arial';
      cx.fillText('the room is waiting', W/2, 328);
      var cp = 0.7 + 0.3 * Math.sin(now / 260);
      cx.globalAlpha = ease * cp;
      cx.fillStyle = TEAL;
      cx.font = '700 22px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W/2, 400);
      cx.globalAlpha = ease * 0.7;
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 432);
      cx.globalAlpha = 1;
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w/2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // Init
  function init() {
    if (DEMO) {
      // Demo: start in settling phase, game state already ready but we gate play
      newRound();
      phase = 'demo'; // override back to demo settle phase
      demoStep = 0;
      demoElapsed = 0;
    } else {
      newRound();
      if (!BOT) phase = 'title'; // human sees title
    }
    requestAnimationFrame(frame);
  }

  init();
})();
</script>
