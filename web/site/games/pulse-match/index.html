<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var TEAL_DIM = 'rgba(46,197,182,0.18)';

  // ---- pulse timing ----
  // The pulse beats at a period (ms). Player must tap within WINDOW_FRAC of the period.
  // 3 consecutive hits slow the beat one notch (period grows). 1 miss speeds it back up.
  // Win condition: slow the pulse enough that the screen fades to stillness.
  var BASE_PERIOD = 1200;   // ms, starting beat (moderate)
  var MAX_PERIOD  = 6000;   // ms, "stillness" — win condition
  var MIN_PERIOD  = 700;    // ms, fastest possible (after a miss)
  var PERIOD_STEP = 300;    // ms added per notch slow
  var NOTCH_HITS  = 3;      // consecutive hits to earn a slow
  var WINDOW_FRAC = 0.28;   // fraction of period around the peak that counts as "in time"
  var WIN_NOTCHES = 9;      // notches of slowing until "stillness"

  // ---- state ----
  var state, hitStop, zoom, shakeAmt, flashes;
  var runStartTs, botRunsDone = 0;

  function newGame() {
    hitStop = 0; zoom = 1; shakeAmt = 0; flashes = [];
    state = {
      phase:      'title',  // title | play | over | cta
      period:     BASE_PERIOD,
      beatPhase:  0,        // 0..1 within current beat
      lastBeatMs: 0,        // timestamp of last peak
      nextBeatMs: 0,        // scheduled next peak
      consecutiveHits: 0,
      notches:    0,        // slowing steps achieved
      misses:     0,
      score:      0,        // total in-time taps
      overAt:     0,
      overReason: '',
      ctaAt:      0,
      // for demo
      demoStep:   0,
      demoWait:   0,
    };
    if (DEMO) {
      // start immediately in play
      startRun();
    } else if (BOT) {
      startRun();
    }
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    var now = performance.now();
    state.lastBeatMs = now;
    state.nextBeatMs = now + state.period;
    state.beatPhase  = 0;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // --- WIN / LOSS ---
  // Win: notches >= WIN_NOTCHES (still, fade to black)
  // Lose: misses >= 3 (lost the rhythm)
  var MAX_MISSES = 3;

  function handleTap() {
    if (state.phase !== 'play') return;
    var now = performance.now();
    // measure distance from the nearest beat peak
    var sinceLast = now - state.lastBeatMs;
    var untilNext = state.nextBeatMs - now;
    var nearest   = Math.min(sinceLast, untilNext);
    var window_ms = state.period * WINDOW_FRAC;
    var hit       = nearest <= window_ms;

    if (hit) {
      state.consecutiveHits++;
      state.score++;
      // floating text
      var isCalm = state.consecutiveHits >= NOTCH_HITS;
      flash(isCalm ? '✦ SLOWING' : '✦ IN SYNC', TEAL, 22 + state.consecutiveHits * 2);
      // calm sound
      if (window.J) J.calm(state.notches + 1);
      // zoom-pulse on notch achievement
      if (state.consecutiveHits >= NOTCH_HITS) {
        state.consecutiveHits = 0;
        state.notches++;
        state.period = Math.min(MAX_PERIOD, BASE_PERIOD + state.notches * PERIOD_STEP);
        zoom = 1.025;
        hitStop = 60; // 60ms
        flash('SLOWER ▾', GOLD, 28);
        if (window.LOOP) LOOP.emit('notch_earned', { notches: state.notches, period: state.period });
        // win check
        if (state.notches >= WIN_NOTCHES) {
          winRun();
          return;
        }
      }
      if (window.LOOP) LOOP.emit('tap_hit', { score: state.score, nearest_ms: Math.round(nearest) });
    } else {
      // miss: near-miss check
      var nearMiss = nearest <= window_ms * 2.5;
      state.consecutiveHits = 0;
      state.misses++;
      // speed up slightly on miss (discouragement)
      state.period = Math.max(MIN_PERIOD, state.period - PERIOD_STEP * 0.5);
      shakeAmt = 3;
      flash('OFF BEAT', 'rgba(255,255,255,0.5)', 18);
      if (window.LOOP) {
        if (nearMiss) LOOP.emit('near_miss', { nearest_ms: Math.round(nearest) });
        LOOP.emit('tap_miss', { misses: state.misses });
      }
      if (state.misses >= MAX_MISSES) {
        gameOver('lost the rhythm');
      }
    }
  }

  function winRun() {
    state.phase = 'over';
    state.overReason = 'win';
    state.overAt = performance.now();
    hitStop = 0;
    zoom = 1.04;
    if (window.J) J.calm(WIN_NOTCHES);
    var dur = (Date.now() - runStartTs) / 1000;
    window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), result: 'win' });
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        state.ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2000);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 600);
    }
  }

  function gameOver(reason) {
    state.phase = 'over';
    state.overReason = reason || 'miss';
    state.overAt = performance.now();
    shakeAmt = 6;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), result: 'lose' });
    if (DEMO) {
      // demo shouldn't normally lose (it's scripted calm arc), but as fallback:
      setTimeout(function () {
        state.phase = 'cta';
        state.ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 600);
    }
  }

  function resetRun() {
    state.phase        = 'play';
    state.period       = BASE_PERIOD;
    state.beatPhase    = 0;
    state.consecutiveHits = 0;
    state.notches      = 0;
    state.misses       = 0;
    state.score        = 0;
    var now = performance.now();
    state.lastBeatMs   = now;
    state.nextBeatMs   = now + state.period;
    flashes = [];
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('restart', {});
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size || 22, t: 0 });
  }

  // ---- MUTE button region ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 510, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function onTap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { handleTap(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 400) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'pulses slowed' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    onTap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'Enter') onTap();
  });

  // ---- DEMO autopilot ----
  // Demo arc: calm progression — hit 3 notches, brief hesitation, continue to WIN_NOTCHES
  // demoWaits: how many ms before each notch group starts tapping after the beat
  // The demo hits perfectly for 8 notches then completes for a WIN
  var DEMO_NOTCH_TARGET = WIN_NOTCHES; // demo wins fully
  var demoLastTapScheduled = false;

  function demoPilot(now) {
    if (state.phase !== 'play') return;
    // Demo: tap slightly after each beat peak (human feel — 40-120ms late)
    var sinceLast = now - state.lastBeatMs;
    var offset = 60 + rng() * 80; // 60-140ms after peak
    if (sinceLast >= offset && !demoLastTapScheduled) {
      demoLastTapScheduled = true;
      handleTap();
    }
    // reset the flag when the beat advances
    if (sinceLast < 30) demoLastTapScheduled = false;
  }

  // ---- BOT autopilot ----
  // Bot plays imperfectly — varies timing so it sometimes misses,
  // eventually accumulates MAX_MISSES and loses. Runs BOT_RUNS times.
  // To ensure it LOSES (reaches game_over): it deliberately misses on beats
  // where rng() < missChance.
  var BOT_MISS_CHANCE = 0.38; // about 38% miss rate → loses fairly quickly
  var botLastTapped = false;

  function botPilot(now) {
    if (state.phase !== 'play') return;
    var sinceLast = now - state.lastBeatMs;
    // Tap with human-feel offset but sometimes skip (miss)
    var tapOffset = 50 + rng() * 120; // 50-170ms after peak
    if (sinceLast >= tapOffset && !botLastTapped) {
      botLastTapped = true;
      var willMiss = rng() < BOT_MISS_CHANCE;
      if (!willMiss) {
        // tap in window
        handleTap();
      } else {
        // tap very late (outside window) to register a miss
        var lateDelay = state.period * WINDOW_FRAC + 50 + rng() * 100;
        var capturedNow = now;
        // schedule a late tap
        setTimeout(function () {
          if (state.phase === 'play') handleTap();
        }, lateDelay);
      }
    }
    if (sinceLast < 20) botLastTapped = false;
  }

  // ---- RENDER ----
  var last = performance.now();

  function frame(ts) {
    var dt = Math.min((ts - last) / 16.667, 3); last = ts;

    // advance beat phase
    if (state.phase === 'play') {
      var elapsed = ts - state.lastBeatMs;
      state.beatPhase = elapsed / state.period;
      // when a new beat arrives, roll over
      if (ts >= state.nextBeatMs) {
        state.lastBeatMs = state.nextBeatMs;
        state.nextBeatMs = state.lastBeatMs + state.period;
        state.beatPhase  = (ts - state.lastBeatMs) / state.period;
      }
      // autopilots
      if (hitStop > 0) {
        hitStop -= dt * 16.667;
      } else {
        if (DEMO) demoPilot(ts);
        else if (BOT) botPilot(ts);
      }
    }

    // juice decay
    if (shakeAmt > 0.2) shakeAmt *= Math.pow(0.82, dt);
    else shakeAmt = 0;
    zoom += (1 - zoom) * 0.10 * dt;

    // --- DRAW ---
    cx.save();
    // shake + zoom transform
    if (shakeAmt > 0.1 || zoom > 1.002) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background — dims as notches increase (calm toward black)
    var dimFrac = state.notches / WIN_NOTCHES; // 0 = alive, 1 = stillness
    var bgAlpha = 1 - dimFrac * 0.85;
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    // subtle teal wash that fades
    if (dimFrac < 0.99) {
      cx.fillStyle = 'rgba(46,197,182,' + (0.04 * (1 - dimFrac)) + ')';
      cx.fillRect(0, 0, W, H);
    }

    // ---- PULSE RING ----
    if (state.phase === 'play' || state.phase === 'over') {
      drawPulse(ts, dimFrac);
    }

    // ---- SCORE / NOTCHES ----
    if (state.phase === 'play') {
      drawHUD(dimFrac);
    }

    // ---- TITLE ----
    if (state.phase === 'title') {
      drawTitle(ts);
    }

    // ---- GAME OVER ----
    if (state.phase === 'over') {
      drawOver(ts, dimFrac);
    }

    // ---- DEMO CTA ----
    if (state.phase === 'cta') {
      drawCTA(ts);
    }

    // ---- FLASHES ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 55);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 320 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 55) flashes.splice(k, 1);
    }

    // ---- MUTE (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawPulse(ts, dimFrac) {
    var cx2 = cx;
    var cx0 = W / 2, cy0 = H / 2;

    // beat pulse envelope: 0..1 using a smooth triangle/sine shape
    var ph = state.phase === 'play' ? state.beatPhase % 1 : 0;
    // shape: rises quickly to peak at ph=0, falls off over the period
    var env = Math.max(0, 1 - ph * 2.8);  // bright right at beat peak
    env = Math.pow(env, 0.7);             // smoother curve

    // glow radius: calm teal, shrinks as we slow it
    var baseR = 90 - dimFrac * 40;  // 90 -> 50 as we approach stillness
    var pulseR = baseR + env * (50 - dimFrac * 30);

    // outer glow (multiple rings for softness)
    for (var g = 3; g >= 0; g--) {
      var gr = pulseR + g * 14;
      var ga = (0.07 - g * 0.015) * env * (1 - dimFrac * 0.7);
      if (ga <= 0) continue;
      cx2.beginPath();
      cx2.arc(cx0, cy0, gr, 0, Math.PI * 2);
      cx2.fillStyle = 'rgba(46,197,182,' + ga + ')';
      cx2.fill();
    }

    // main ring
    cx2.beginPath();
    cx2.arc(cx0, cy0, pulseR, 0, Math.PI * 2);
    var rAlpha = (0.18 + env * 0.55) * (1 - dimFrac * 0.9);
    cx2.fillStyle = 'rgba(46,197,182,' + rAlpha + ')';
    cx2.fill();

    // center dot (stillness core)
    cx2.beginPath();
    cx2.arc(cx0, cy0, 10 + env * 4, 0, Math.PI * 2);
    cx2.fillStyle = 'rgba(46,197,182,' + (0.6 + env * 0.4) * (1 - dimFrac * 0.95) + ')';
    cx2.fill();

    // thin ring stroke to mark the beat boundary
    cx2.beginPath();
    cx2.arc(cx0, cy0, pulseR, 0, Math.PI * 2);
    cx2.strokeStyle = 'rgba(46,197,182,' + (0.4 + env * 0.5) * (1 - dimFrac * 0.85) + ')';
    cx2.lineWidth = 1.5;
    cx2.stroke();

    // TAP WINDOW indicator (arc highlighting the hit zone)
    if (state.phase === 'play') {
      var w_frac = WINDOW_FRAC;
      // window covers ±w_frac from ph=0 and ph=1 (wrap)
      var inWindow = ph <= w_frac || ph >= (1 - w_frac);
      if (inWindow) {
        var wAlpha = 0.25 - dimFrac * 0.1;
        cx2.beginPath();
        cx2.arc(cx0, cy0, pulseR + 18, -Math.PI / 2 - w_frac * Math.PI * 2,
                -Math.PI / 2 + w_frac * Math.PI * 2);
        cx2.strokeStyle = 'rgba(242,177,52,' + wAlpha + ')';
        cx2.lineWidth = 3;
        cx2.stroke();
      }
    }

    // "still" state text when fully dimmed
    if (dimFrac > 0.95) {
      cx2.textAlign = 'center';
      var stillA = (dimFrac - 0.95) / 0.05;
      cx2.globalAlpha = stillA;
      cx2.fillStyle = 'rgba(46,197,182,0.7)';
      cx2.font = '400 16px -apple-system, Helvetica, Arial';
      cx2.fillText('stillness', cx0, cy0 + 60);
      cx2.globalAlpha = 1;
    }
  }

  function drawHUD(dimFrac) {
    // notch progress bar (dots)
    var dotY = 95, dotR = 5, spacing = 18;
    var total = WIN_NOTCHES, filled = state.notches;
    var startX = W / 2 - ((total - 1) * spacing) / 2;
    for (var i = 0; i < total; i++) {
      cx.beginPath();
      cx.arc(startX + i * spacing, dotY, dotR, 0, Math.PI * 2);
      if (i < filled) {
        cx.fillStyle = TEAL;
        cx.globalAlpha = 1 - dimFrac * 0.5;
      } else {
        cx.fillStyle = 'rgba(46,197,182,0.18)';
        cx.globalAlpha = 1 - dimFrac * 0.8;
      }
      cx.fill();
      cx.globalAlpha = 1;
    }

    // streak indicator
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,' + (0.3 * (1 - dimFrac)) + ')';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('IN A ROW: ' + state.consecutiveHits + '/3', W / 2, 120);

    // miss dots
    for (var m = 0; m < MAX_MISSES; m++) {
      cx.beginPath();
      cx.arc(W / 2 - (MAX_MISSES - 1) * 10 + m * 20, H - 68, 4, 0, Math.PI * 2);
      cx.fillStyle = m < state.misses ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.10)';
      cx.fill();
    }

    // tap prompt (fades with dim)
    var promptA = 0.35 * (1 - dimFrac * 1.5);
    if (promptA > 0) {
      cx.globalAlpha = Math.max(0, promptA);
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('TAP WITH THE PULSE', W / 2, H - 44);
      cx.globalAlpha = 1;
    }
  }

  function drawTitle(ts) {
    cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '800 42px -apple-system, Helvetica, Arial';
    cx.fillText('PULSE MATCH', W / 2, 300);
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.font = '500 16px -apple-system, Helvetica, Arial';
    cx.fillText('match the pulse to slow it', W / 2, 336);
    var pulse = 0.6 + 0.4 * Math.sin(ts / 400);
    cx.globalAlpha = pulse;
    cx.fillStyle = TEAL;
    cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('TAP TO BEGIN', W / 2, 390);
    cx.globalAlpha = 1;
  }

  function drawOver(ts, dimFrac) {
    var isWin = state.overReason === 'win';
    var tOverlay = Math.min(1, (ts - state.overAt) / 600);
    cx.fillStyle = 'rgba(11,13,18,' + (0.6 * tOverlay) + ')';
    cx.fillRect(0, 0, W, H);

    cx.globalAlpha = tOverlay;
    cx.textAlign = 'center';

    if (isWin) {
      cx.fillStyle = TEAL;
      cx.font = '800 36px -apple-system, Helvetica, Arial';
      cx.fillText('STILL.', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '500 17px -apple-system, Helvetica, Arial';
      cx.fillText('you slowed it to nothing', W / 2, 335);
    } else {
      cx.fillStyle = 'rgba(255,255,255,0.8)';
      cx.font = '800 34px -apple-system, Helvetica, Arial';
      cx.fillText('LOST THE BEAT', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '500 17px -apple-system, Helvetica, Arial';
      cx.fillText(state.notches + ' notch' + (state.notches !== 1 ? 'es' : '') + ' slowed', W / 2, 335);
    }

    cx.fillStyle = GOLD;
    cx.font = '700 22px -apple-system, Helvetica, Arial';
    cx.fillText(state.score + ' taps in rhythm', W / 2, 378);

    if (!DEMO && !BOT) {
      var blink = 0.65 + 0.35 * Math.sin(ts / 320);
      cx.globalAlpha = tOverlay * blink;
      cx.fillStyle = TEAL;
      cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText(isWin ? 'TAP TO PLAY AGAIN' : 'TAP — FIND THE BEAT', W / 2, 440);
      cx.globalAlpha = tOverlay;

      // share zone
      cx.fillStyle = 'rgba(46,197,182,0.12)';
      cx.strokeStyle = TEAL;
      cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
    cx.globalAlpha = 1;
  }

  function drawCTA(ts) {
    var t = (ts - state.ctaAt) / 1000, ease = Math.min(1, t * 2.0);
    cx.fillStyle = 'rgba(11,13,18,' + (0.85 * ease) + ')';
    cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease;
    cx.textAlign = 'center';

    // game name
    cx.fillStyle = 'rgba(255,255,255,0.9)';
    cx.font = '800 40px -apple-system, Helvetica, Arial';
    cx.fillText('PULSE MATCH', W / 2, 280);

    // invitation line (calm, not competitive)
    cx.fillStyle = 'rgba(255,255,255,0.6)';
    cx.font = '500 17px -apple-system, Helvetica, Arial';
    cx.fillText('slow the pulse to stillness', W / 2, 318);

    // CTA button
    var blink = 0.75 + 0.25 * Math.sin(ts / 350);
    cx.globalAlpha = ease * blink;
    cx.fillStyle = TEAL;
    cx.font = '800 26px -apple-system, Helvetica, Arial';
    cx.fillText('▶ REACH IT', W / 2, 398);

    cx.globalAlpha = ease;
    cx.fillStyle = 'rgba(46,197,182,0.55)';
    cx.font = '600 15px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 432);

    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
