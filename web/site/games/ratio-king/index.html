<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 18;
  var SEED = +qs.get('seed') || 42;

  // ---- deterministic RNG ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  // ---- canvas / fit ----
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // ---- palette / layout ----
  var INK = '#0b0d12', VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var CARD_W = 172, CARD_H = 220;
  var LIKE_X = W / 2 - CARD_W / 2 - 8, REPLY_X = W / 2 + 8;
  var CARD_Y = 212;
  var BAR_Y = 612, BAR_W = 330, BAR_H = 18;
  var REPLIES_R = { x: REPLY_X, y: CARD_Y, w: CARD_W, h: CARD_H };
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 500, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // ---- state ----
  var state, runStartTs, best = 0, dareBeaten = false;
  var floats = [], flashes = [];
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var ctaAt = 0, challengeAt = 0;
  var botRunsDone = 0, botTarget = null, botActions = 0, botGiveUp = 3;
  try { best = +localStorage.getItem('rk_best') || 0; } catch (_) {}

  function levelParams(lvl) {
    return {
      baseLikes: 12 + (lvl - 1) * 6,
      baseReplies: 5 + (lvl - 1) * 3,
      likesRate: 1.8 + (lvl - 1) * 0.55,
      repliesRate: 0.45 + (lvl - 1) * 0.15,
      tapBurst: Math.max(3.4, 6.5 - (lvl - 1) * 0.5),
      maxGap: 22 + (lvl - 1) * 3
    };
  }

  function newGame() {
    state = {
      phase: 'title',
      score: 0, combo: 0,
      lvl: 1, likes: 0, replies: 0,
      overAt: 0, wonAt: 0
    };
    floats = []; flashes = []; dareBeaten = false;
    var p = levelParams(1);
    state.likes = p.baseLikes; state.replies = p.baseReplies;
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      demoLevelState = null;
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    if (state.phase !== 'challenge') {
      state.score = 0; state.combo = 0; state.lvl = 1;
      var p = levelParams(1);
      state.likes = p.baseLikes; state.replies = p.baseReplies;
    }
    state.phase = 'play';
    runStartTs = Date.now();
    if (DEMO) demoLevelReset();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function levelUp() {
    state.score++;
    state.combo++;
    state.wonAt = performance.now();
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    state.lvl++;
    var p = levelParams(state.lvl);
    state.likes = p.baseLikes;
    state.replies = p.baseReplies;
    hitStop = 5; zoom = 1.04;
    flash('RATIO WON', TEAL, 44);
    if (state.combo >= 3) flash('×' + state.combo + ' STREAK', GOLD, 32);
    if (window.J) {
      if (state.combo >= 3) J.fanfare();
      else J.perfect(state.combo);
      J.tension(Math.min(state.score / 8, 1));
    }
    if (window.LOOP) LOOP.emit('ratio_won', { n: state.score, combo: state.combo, lvl: state.lvl });
    if (DEMO) demoLevelReset();
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(Math.min(0.35 + state.score / 20, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 500);
      J.tension(0);
    }
    if (newBest) { best = state.score; try { localStorage.setItem('rk_best', String(best)); } catch (_) {} }
    if (DEMO) window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3600); }, 2800);
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 800);
    }
  }

  function resetRun() {
    state.score = 0; state.combo = 0; state.lvl = 1;
    var p = levelParams(1);
    state.likes = p.baseLikes; state.replies = p.baseReplies;
    floats = []; flashes = []; dareBeaten = false; botTarget = null;
    botActions = 0; botGiveUp = 3;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }
  function floatText(txt, x, y, color, size) { floats.push({ txt: txt, x: x, y: y, color: color, size: size, t: 0, vy: -1.8 }); }

  function tapReply() {
    if (state.phase !== 'play') return;
    var p = levelParams(state.lvl);
    var burst = p.tapBurst;
    state.replies += burst;
    hitStop = 1.5;
    if (window.J) J.hit(state.combo + 1);
    floatText('+' + Math.round(burst), REPLY_X + CARD_W / 2, CARD_Y + CARD_H / 2 + 20, TEAL, 24);
    if (window.LOOP) LOOP.emit('reply_pumped', { n: state.score, burst: +burst.toFixed(2), replies: +state.replies.toFixed(2) });
  }

  // ---- input ----
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      // conditioned path: tap the reply counter to pump replies
      if (x === undefined || inR(REPLIES_R, x, y)) { tapReply(); }
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'ratio wins' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  var demoLevelState = null;
  var demoPlan = [
    null,
    { wait: 24, taps: 2, trigger: 7, tapWait: 8 },   // lvl 1: quick double tap
    { wait: 42, taps: 3, trigger: 9, tapWait: 10 },  // lvl 2: hesitation, then win
    { wait: 70, taps: 5, trigger: 24, tapWait: 5 }, // lvl 3: the near-fail + recovery (~60%)
    { wait: 28, taps: 3, trigger: 11, tapWait: 9 }, // lvl 4: one more ratio
    { wait: 18, taps: 1, trigger: 14, tapWait: 0 }  // lvl 5: the real fail
  ];
  function demoLevelReset() {
    var plan = demoPlan[Math.min(state.lvl, demoPlan.length - 1)] || demoPlan[demoPlan.length - 1];
    demoLevelState = { tapsDone: 0, wait: plan.wait, trigger: plan.trigger, tapWait: plan.tapWait, taps: plan.taps };
  }
  function autopilot() {
    if (state.phase !== 'play') return;
    var p = levelParams(state.lvl);
    var gap = state.likes - state.replies;
    if (DEMO) {
      if (!demoLevelState) demoLevelReset();
      if (demoLevelState.wait > 0) { demoLevelState.wait--; return; }
      if (demoLevelState.tapsDone < demoLevelState.taps && gap > demoLevelState.trigger) {
        tapReply();
        demoLevelState.tapsDone++;
        demoLevelState.wait = demoLevelState.tapWait;
      }
    } else if (BOT) {
      // play a human-plausible number of saves, then go passive so the gap
      // overflows to maxGap and the game's own lose path fires
      if (botActions >= botGiveUp) return;
      if (botTarget === null) botTarget = Math.max(p.maxGap * 0.7, p.maxGap - Math.abs(gauss()) * BOT_ERR);
      if (gap > botTarget) { botTarget = null; botActions++; tapReply(); }
    }
  }

  // ---- helpers ----
  function roundRect(x, y, w, h, r) {
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); return; }
    var rr = Math.min(r, w / 2, h / 2);
    cx.moveTo(x + rr, y);
    cx.arcTo(x + w, y, x + w, y + h, rr);
    cx.arcTo(x + w, y + h, x, y + h, rr);
    cx.arcTo(x, y + h, x, y, rr);
    cx.arcTo(x, y, x + w, y, rr);
    cx.closePath();
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 5))));
  }

  function drawCard(x, y, label, value, color, isWinner) {
    cx.save();
    // card shadow / glow
    if (isWinner) {
      cx.shadowColor = color;
      cx.shadowBlur = 18 + 6 * Math.sin(performance.now() / 150);
    }
    cx.strokeStyle = color;
    cx.lineWidth = isWinner ? 3 : 1.5;
    cx.fillStyle = 'rgba(255,255,255,0.04)';
    cx.beginPath();
    roundRect(x, y, CARD_W, CARD_H, 16);
    cx.fill(); cx.stroke();
    cx.restore();

    cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '700 13px -apple-system, Helvetica, Arial';
    cx.fillText(label, x + CARD_W / 2, y + 34);

    var n = Math.round(value);
    cx.fillStyle = isWinner ? color : 'rgba(255,255,255,0.85)';
    cx.font = '900 52px -apple-system, Helvetica, Arial';
    cx.fillText(String(n), x + CARD_W / 2, y + 108);

    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.fillText(label === 'LIKES' ? 'auto' : 'tap to pump', x + CARD_W / 2, y + 134);
  }

  function drawGapBar() {
    var p = levelParams(state.lvl);
    var gap = state.likes - state.replies;
    var t = Math.max(-1, Math.min(1, gap / p.maxGap)); // -1..1 (replies lead .. likes lead)
    var cxm = W / 2;

    // bar track
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.beginPath();
    roundRect(cxm - BAR_W / 2, BAR_Y, BAR_W, BAR_H, 9);
    cx.fill();

    // center marker
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.fillRect(cxm - 1, BAR_Y - 4, 2, BAR_H + 8);

    // filled side
    var fillW = Math.abs(t) * (BAR_W / 2);
    if (t > 0) {
      cx.fillStyle = 'rgba(232,80,46,0.55)';
      cx.fillRect(cxm - fillW, BAR_Y + 2, fillW, BAR_H - 4);
    } else if (t < 0) {
      cx.fillStyle = 'rgba(46,197,182,0.55)';
      cx.fillRect(cxm, BAR_Y + 2, fillW, BAR_H - 4);
    }

    // danger glow near lose edge
    if (t > 0.82) {
      cx.shadowColor = VERM; cx.shadowBlur = 14;
      cx.fillStyle = VERM;
      cx.beginPath();
      cx.arc(cxm - BAR_W / 2 + 9, BAR_Y + BAR_H / 2, 5, 0, Math.PI * 2);
      cx.fill();
      cx.shadowBlur = 0;
    }

    // labels
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '600 11px -apple-system, Helvetica, Arial';
    cx.fillText('LIKE FLOOD', cxm - BAR_W / 2 + 44, BAR_Y + BAR_H + 18);
    cx.fillStyle = TEAL;
    cx.fillText('RATIO WON', cxm + BAR_W / 2 - 42, BAR_Y + BAR_H + 18);
  }

  // ---- render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // sim update (frozen during hit-stop so the impact bites)
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      var p = levelParams(state.lvl);
      state.likes += p.likesRate * dt / 60;
      state.replies += p.repliesRate * dt / 60;

      // near-miss detection: replies almost caught up but not yet over
      var gap = state.likes - state.replies;
      if (gap > 0 && gap < p.maxGap * 0.12 && (now - (state.lastNear || 0)) > 260) {
        state.lastNear = now;
        shakeAmt = Math.max(shakeAmt, 4);
        flash('SO CLOSE', VERM, 28);
        if (window.J) J.near();
        if (window.LOOP) LOOP.emit('near_miss', { n: state.score, gap: +gap.toFixed(2), lvl: state.lvl });
      }

      if (state.replies > state.likes) levelUp();
      else if (state.likes - state.replies >= p.maxGap) gameOver();
      else autopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(232,80,46,0.06)'); bg.addColorStop(1, 'rgba(46,197,182,0.05)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // header: score + best
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 58px -apple-system, Helvetica, Arial';
    cx.fillText(state.score, W / 2, 84);
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('BEST ' + best, W / 2, 108);

    // incoming dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 142);
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('4', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // title card
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('RATIO KING', W / 2, 280);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.fillStyle = TEAL; cx.globalAlpha = pulse; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('tap replies. flip the ratio. don’t drown.', W / 2, 360);
    }

    // play / over: the two counters
    if (state.phase === 'play' || state.phase === 'over') {
      var repliesWinning = state.replies > state.likes;
      drawCard(LIKE_X, CARD_Y, 'LIKES', state.likes, GOLD, !repliesWinning);
      drawCard(REPLY_X, CARD_Y, 'REPLIES', state.replies, TEAL, repliesWinning);

      // VS / status text
      cx.textAlign = 'center';
      if (repliesWinning) {
        cx.fillStyle = TEAL; cx.font = '900 18px -apple-system, Helvetica, Arial';
        cx.fillText('REPLIES WINNING', W / 2, CARD_Y + CARD_H + 28);
      } else {
        cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '800 18px -apple-system, Helvetica, Arial';
        cx.fillText('VS', W / 2, CARD_Y + CARD_H + 28);
      }

      // gap bar
      drawGapBar();
    }

    // floating texts (tap rewards)
    for (var f = floats.length - 1; f >= 0; f--) {
      var fl = floats[f]; fl.t += dt; fl.y += fl.vy * dt;
      var a = Math.max(0, 1 - fl.t / 35);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.2) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y);
      cx.globalAlpha = 1;
      if (fl.t > 35) floats.splice(f, 1);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fa = flashes[k]; fa.t += dt;
      var aa = Math.max(0, 1 - fa.t / 42);
      cx.globalAlpha = aa; cx.textAlign = 'center';
      cx.fillStyle = fa.color;
      cx.font = '900 ' + (fa.size + fa.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fa.txt, W / 2, 252 - fa.t * 0.6);
      cx.globalAlpha = 1;
      if (fa.t > 42) flashes.splice(k, 1);
    }

    // game over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('BURIED.', W / 2, 304);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' ratio wins', W / 2, 349);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 396);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 420);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 466);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('RATIO KING', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he won ' + (window.__demoScore || 4) + ' ratios. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 4), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
