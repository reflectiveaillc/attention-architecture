<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var DUR_MS = 45000;                         // full calm run: 45s
  var BADGE_R = 22, TAP_R = BADGE_R + 8;      // hit area slightly larger than visual

  var state, badges = [], ripples = [], floaters = [], particles = [];
  var runStartTs, spawnTimer, clock, calmStep = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, ctaAt = 0;
  var lives, botRunsDone = 0, botNextTapAt = 0;
  var dareBeaten = false;

  function newGame() {
    state = { phase: 'title', score: 0, avoided: 0, tapped: 0, overAt: 0 };
    badges = []; ripples = []; floaters = []; particles = [];
    lives = 3; spawnTimer = 0; clock = 0; calmStep = 0; dareBeaten = false;
    if (DEMO) {
      buildDemo();
      startRun();
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    spawnTimer = 0; clock = 0; calmStep = 0; lives = 3;
    if (BOT) botNextTapAt = 0;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // pick a spawn position away from the score, lives and mute corners
  function randPos() {
    var pad = 48 + BADGE_R;
    for (var tries = 0; tries < 20; tries++) {
      var x = pad + rng() * (W - pad * 2);
      var y = 170 + rng() * (H - 170 - pad - 110);
      // avoid score area top center
      if (Math.abs(x - W / 2) < 70 && y < 150) continue;
      // avoid share/mute corners when not playing? still keep clear
      if (x > W - 80 && y < 80) continue;
      return { x: x, y: y };
    }
    return { x: pad + rng() * (W - pad * 2), y: 220 + rng() * (H - 340) };
  }

  function spawnBadge() {
    var pos = randPos();
    var b = {
      x: pos.x, y: pos.y,
      r: 0, maxR: BADGE_R,
      born: clock,
      life: 2600 + rng() * 1400,      // 2.6–4.0s lifetime
      value: 100,
      pulse: 0,
      id: (state.avoided + state.tapped + badges.length)
    };
    badges.push(b);
  }

  function avoidBadge(b, i) {
    // badge dissolves into a soft ripple
    ripples.push({ x: b.x, y: b.y, r: b.r, a: 0.55, born: clock });
    floaters.push({ txt: '+' + b.value, x: b.x, y: b.y - 18, t: 0, color: TEAL, size: 18 });
    state.score += b.value; state.avoided++;
    badges.splice(i, 1);
    calmStep++;
    if (window.J) J.calm(calmStep);
    if (state.avoided % 5 === 0) { hitStop = 3; zoom = 1.015; }
    if (window.LOOP) LOOP.emit('badge_avoided', { n: state.avoided, score: state.score });
  }

  function tapBadge(b, i) {
    // gave in to the conditioned swipe
    lives--;
    state.tapped++;
    // small punishment particles
    for (var k = 0; k < 8; k++) {
      particles.push({
        x: b.x, y: b.y,
        vx: (rng() - 0.5) * 4, vy: (rng() - 0.5) * 4,
        life: 25 + rng() * 20, color: VERM, r: 2 + rng() * 3
      });
    }
    floaters.push({ txt: '—1', x: b.x, y: b.y - 24, t: 0, color: VERM, size: 22 });
    ripples.push({ x: b.x, y: b.y, r: b.r, a: 0.35, born: clock, color: VERM });
    badges.splice(i, 1);
    shakeAmt = 2.5;
    if (window.J) J.calm(0);
    if (window.LOOP) LOOP.emit('badge_tapped', { lives_left: lives, n: state.tapped });
    if (lives <= 0) gameOver('tapped out');
  }

  function gameOver(reason) {
    state.phase = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (reason === 'resolved') {
      state.score += 500;                       // resolve bonus
      if (window.J) J.calm(20);
    }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), reason: reason });
    if (DEMO) {
      window.__demoScore = state.score;
      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500); }, 400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 700);
    }
  }

  function resetRun() {
    state = { phase: 'title', score: 0, avoided: 0, tapped: 0, overAt: 0 };
    badges = []; ripples = []; floaters = []; particles = [];
    lives = 3; spawnTimer = 0; clock = 0; calmStep = 0; dareBeaten = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 110, y: 520, w: 220, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function hitBadgeAt(x, y) {
    for (var i = badges.length - 1; i >= 0; i--) {
      var b = badges[i];
      var dx = x - b.x, dy = y - b.y;
      if (dx * dx + dy * dy <= TAP_R * TAP_R) return i;
    }
    return -1;
  }
  function tap(x, y) {
    if (DEMO || BOT) return;                 // scripted modes ignore human taps
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') {
      var idx = hitBadgeAt(x, y);
      if (idx >= 0) tapBadge(badges[idx], idx);
      else {
        // tapping empty space is a near-miss — the thumb wanted a badge
        if (window.LOOP) LOOP.emit('near_miss', { x: x, y: y });
      }
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'calm' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(W / 2, H / 2); });

  // ---- demo / bot autopilots ----
  // Demo arc: settle → deepen → resolve → soft invitation.
  // The demo hand hovers but never taps; scripted spawns build a calm wave.
  var demoSpawns = [], demoIdx = 0, demoWait = 0;
  function buildDemo() {
    var t = 0;
    // settle: slow single badges
    demoSpawns.push({ at: 700, x: W * 0.28, y: H * 0.42, life: 3200 });
    demoSpawns.push({ at: 2600, x: W * 0.72, y: H * 0.38, life: 3200 });
    // deepen: pairs and a tighter cluster
    demoSpawns.push({ at: 4300, x: W * 0.35, y: H * 0.55, life: 3000 });
    demoSpawns.push({ at: 5100, x: W * 0.66, y: H * 0.50, life: 3000 });
    demoSpawns.push({ at: 6500, x: W * 0.50, y: H * 0.62, life: 2800 });
    demoSpawns.push({ at: 7600, x: W * 0.22, y: H * 0.30, life: 2800 });
    demoSpawns.push({ at: 8500, x: W * 0.78, y: H * 0.68, life: 2800 });
    // resolve: wave of badges fading together
    demoSpawns.push({ at: 10000, x: W * 0.30, y: H * 0.45, life: 2200 });
    demoSpawns.push({ at: 10400, x: W * 0.50, y: H * 0.52, life: 2200 });
    demoSpawns.push({ at: 10800, x: W * 0.70, y: H * 0.40, life: 2200 });
    demoSpawns.push({ at: 11600, x: W * 0.25, y: H * 0.60, life: 2200 });
    demoSpawns.push({ at: 12000, x: W * 0.55, y: H * 0.35, life: 2200 });
    demoSpawns.push({ at: 12400, x: W * 0.75, y: H * 0.58, life: 2200 });
    // end of play at ~16s
  }

  function autopilot() {
    if (state.phase !== 'play') return;
    if (DEMO) {
      // scripted spawns only; the hand never taps
      while (demoIdx < demoSpawns.length && clock >= demoSpawns[demoIdx].at) {
        var s = demoSpawns[demoIdx++];
        badges.push({ x: s.x, y: s.y, r: 0, maxR: BADGE_R, born: clock, life: s.life, value: 100, pulse: 0, id: badges.length });
      }
      if (clock >= 16000) gameOver('resolved');
    } else if (BOT) {
      // imperfect autopilot: mostly calm, occasionally gives in
      var spawnRate = 1100 + Math.sin(clock / 3000) * 300;
      if (clock - spawnTimer > spawnRate) { spawnTimer = clock; spawnBadge(); }
      if (botNextTapAt === 0) botNextTapAt = clock + 2000 + rng() * 6000;
      if (clock >= botNextTapAt && badges.length) {
        var idx = Math.floor(rng() * badges.length);
        tapBadge(badges[idx], idx);
        botNextTapAt = clock + 1500 + rng() * 5000;
      }
      if (clock >= DUR_MS) gameOver('resolved');
    }
  }

  // ---- render helpers ----
  function badgeFill(progress) {
    // soft red notification look; inner number "1"
    var g = cx.createRadialGradient(0, 0, 2, 0, 0, BADGE_R);
    g.addColorStop(0, 'rgba(255,255,255,0.18)');
    g.addColorStop(0.35, VERM);
    g.addColorStop(1, '#b7361f');
    return g;
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop: decay every frame, never gate autopilot without decaying it
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') {
      clock += 16.667 * dt;
      autopilot();
      if (!DEMO && !BOT) {
        var rate = 1200 - Math.min(600, clock / 60); // slowly denser, still calm
        if (clock - spawnTimer > rate) { spawnTimer = clock; spawnBadge(); }
      }
      if (clock >= DUR_MS) gameOver('resolved');

      // age badges
      for (var i = badges.length - 1; i >= 0; i--) {
        var b = badges[i];
        var age = clock - b.born;
        if (age >= b.life) avoidBadge(b, i);
      }
    }

    // juice transforms: decaying shake + zoom-pulse
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.88, dt); zoom += (1 - zoom) * 0.10 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(242,177,52,0.04)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ripples
    for (var r = ripples.length - 1; r >= 0; r--) {
      var rp = ripples[r];
      var age = (clock - rp.born) / 1000;
      var a = Math.max(0, rp.a - age * 0.55);
      cx.globalAlpha = a;
      cx.strokeStyle = rp.color || TEAL;
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.arc(rp.x, rp.y, rp.r + age * 45, 0, Math.PI * 2);
      cx.stroke();
      cx.globalAlpha = 1;
      if (a <= 0.02) ripples.splice(r, 1);
    }

    // particles
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.life -= dt;
      cx.globalAlpha = Math.max(0, pt.life / 30);
      cx.fillStyle = pt.color;
      cx.beginPath(); cx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2); cx.fill();
      cx.globalAlpha = 1;
      if (pt.life <= 0) particles.splice(p, 1);
    }

    // badges
    for (var i = 0; i < badges.length; i++) {
      var b = badges[i];
      var age = clock - b.born;
      var lifePct = age / b.life;
      b.r = Math.min(b.maxR, b.r + (b.maxR - b.r) * 0.12 * dt);
      var alpha = lifePct < 0.15 ? lifePct / 0.15 : (lifePct > 0.75 ? 1 - (lifePct - 0.75) / 0.25 : 1);
      alpha = Math.max(0.25, alpha);
      cx.save();
      cx.translate(b.x, b.y);
      cx.globalAlpha = alpha;
      // soft outer glow
      var glow = cx.createRadialGradient(0, 0, b.r * 0.7, 0, 0, b.r * 1.8);
      glow.addColorStop(0, 'rgba(232,80,46,0.18)');
      glow.addColorStop(1, 'rgba(232,80,46,0)');
      cx.fillStyle = glow;
      cx.beginPath(); cx.arc(0, 0, b.r * 1.8, 0, Math.PI * 2); cx.fill();
      // badge body
      cx.fillStyle = badgeFill();
      cx.beginPath(); cx.arc(0, 0, b.r, 0, Math.PI * 2); cx.fill();
      // inner dot / "1"
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.beginPath(); cx.arc(b.r * 0.35, -b.r * 0.35, 4, 0, Math.PI * 2); cx.fill();
      cx.font = '700 11px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText('1', b.r * 0.35, -b.r * 0.35 - 0.5);
      cx.restore();
    }

    // floaters
    for (var f = floaters.length - 1; f >= 0; f--) {
      var fl = floaters[f]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 45) floaters.splice(f, 1);
    }

    // HUD: score
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 92);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText(state.avoided + ' badges left alone', W / 2, 118);
      // lives
      for (var li = 0; li < 3; li++) {
        cx.fillStyle = li < lives ? TEAL : 'rgba(255,255,255,0.15)';
        cx.beginPath();
        cx.arc(28 + li * 22, 44, 6, 0, Math.PI * 2);
        cx.fill();
      }
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('NO BADGE', W / 2, 270);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 360);
      cx.globalAlpha = pulse; cx.fillText('TAP TO START', W / 2, 322); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('the badge wants your thumb. let it fade.', W / 2, 356);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var resolved = state.tapped < 3 && clock >= DUR_MS;
      cx.fillStyle = resolved ? TEAL : VERM;
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText(resolved ? 'RESOLVED.' : 'GAVE IN.', W / 2, 296);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' calm', W / 2, 342);
      cx.fillStyle = GOLD; cx.font = '900 20px -apple-system, Helvetica, Arial';
      cx.fillText(state.avoided + ' badges un-tapped', W / 2, 380);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE BREATH', W / 2, 460);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE CALM', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card (soft invitation, no dare)
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('NO BADGE', W / 2, 284);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('your thumb already knows. don\'t.', W / 2, 326);
      var p3 = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 396);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 430);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
