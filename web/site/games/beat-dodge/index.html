<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  // canvas setup
  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- game constants ----
  var PLAYER_W = 48, PLAYER_H = 36;
  var PLAYER_Y = H - 130;           // vertical position of player
  var DUCK_Y   = PLAYER_Y + 28;     // ducked position
  var BEAT_LINE_Y = H - 90;         // beat line y
  var BAR_H = 46;                   // barrier height when slammed down

  // ---- state ----
  var state, flashes, barriers, particles;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var dareBeaten = false;
  var runStartTs = 0;
  var best = 0;
  try { best = +localStorage.getItem('bd_best') || 0; } catch (_) {}

  // beat timing
  var BPM_START = 90, BPM_CAP = 180;
  var beatInterval, nextBeat, beatPhase, beatCount;
  var barPattern; // array of which beat positions have barriers

  // player state
  var playerX, playerDuck, duckTarget, duckEase;
  var playerPulse; // visual beat pulse

  // demo / bot state
  var demoBeatIdx, demoActions;
  var botRunsDone, botAction;
  var challengeAt, ctaAt;

  // ---- hit detection rects ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // ---- BPM / beat helpers ----
  function currentBPM() {
    if (!state) return BPM_START;
    return Math.min(BPM_CAP, BPM_START + state.dodges * 1.4);
  }
  function beatMs() { return 60000 / currentBPM(); }

  // ---- barrier generation ----
  // Pattern: a sequence of beats (true/false = has barrier). Off-beat traps inserted as BPM rises.
  function makePattern() {
    var len = 8;
    var pat = [];
    for (var i = 0; i < len; i++) {
      // early game: every 2nd beat. late game: more frequent
      var density = Math.min(0.7, 0.3 + state.dodges * 0.005);
      pat.push(rng() < density);
    }
    // guarantee at least 2 barriers per pattern
    var count = pat.filter(Boolean).length;
    while (count < 2) {
      var idx = Math.floor(rng() * len);
      if (!pat[idx]) { pat[idx] = true; count++; }
    }
    return pat;
  }

  // ---- barriers ----
  function spawnBarrier(beat) {
    // a barrier slams from the top at random X, leaving a gap near the player (or not)
    var gap = 70 + rng() * 30;     // gap width
    var gapX;
    // sometimes gap is where player is (safe), sometimes elsewhere (trap)
    if (rng() < 0.5) {
      gapX = playerX - gap / 2 + (rng() - 0.5) * 20;
    } else {
      // gap far from player — player must dodge
      gapX = (rng() < 0.5 ? 30 : W - gap - 30) + rng() * 20;
    }
    gapX = Math.max(10, Math.min(W - gap - 10, gapX));
    barriers.push({
      gapX: gapX, gap: gap,
      y: -BAR_H,
      vy: 0,
      slamming: true,     // falling toward BEAT_LINE_Y
      stuck: false,       // locked at beat line
      stuckAt: 0,         // timestamp when it landed
      beat: beat
    });
  }

  // ---- death check ----
  function checkDeath() {
    // player hitbox (slightly forgiving)
    var px1 = playerX - PLAYER_W / 2 + 6, px2 = playerX + PLAYER_W / 2 - 6;
    var py = playerDuck > 0.5 ? DUCK_Y : PLAYER_Y;
    var py1 = py - 4, py2 = py + PLAYER_H - 4;
    for (var i = 0; i < barriers.length; i++) {
      var b = barriers[i];
      if (!b.stuck) continue;
      // barrier occupies full width except gap
      var gap1 = b.gapX, gap2 = b.gapX + b.gap;
      var barY1 = BEAT_LINE_Y, barY2 = BEAT_LINE_Y + BAR_H;
      if (py2 < barY1 || py1 > barY2) continue;   // no vertical overlap
      // horizontal: player overlaps left block or right block?
      var inLeft  = px2 > 0    && px1 < gap1;
      var inRight = px2 > gap2 && px1 < W;
      if (inLeft || inRight) return true;
    }
    return false;
  }

  // ---- flash helper ----
  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- pct rank ----
  function pctTop(score) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 18)))); }

  // ---- game init ----
  function newGame() {
    state = { phase: 'title', dodges: 0, combo: 0, overAt: 0 };
    flashes = []; barriers = []; particles = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    playerX = W / 2; playerDuck = 0; duckTarget = 0; duckEase = 0;
    playerPulse = 0;
    beatCount = 0; beatPhase = 0;
    barPattern = null; demoBeatIdx = 0;
    dareBeaten = false;
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { botRunsDone = 0; startRun(); return; }
  }

  function startRun() {
    state.phase = 'play';
    state.dodges = 0; state.combo = 0;
    barriers = []; particles = [];
    playerX = W / 2; playerDuck = 0; duckTarget = 0;
    beatCount = 0;
    nextBeat = performance.now() + beatMs() * 0.5; // slight delay before first beat
    barPattern = null;
    runStartTs = Date.now();
    if (DEMO) { demoBeatIdx = 0; buildDemoActions(); }
    if (BOT)  { botAction = null; }
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- demo actions: a scripted sequence of dodge/no-dodge decisions ----
  // Each entry: { beat: N, duck: true/false, moveX: dx }
  // We build this lazily after pattern is known, but for demo we pre-script it
  var demoScript = null;
  var demoScriptIdx = 0;
  function buildDemoActions() {
    // pre-planned: dodge first 8 beats (with hesitation), near-fail at beat 9, save, then miss
    demoScript = [
      { dodge: true,  hesitation: 38 },
      { dodge: true,  hesitation: 28 },
      { dodge: false, hesitation: 22 },  // no barrier, so not ducking is correct
      { dodge: true,  hesitation: 45 },
      { dodge: true,  hesitation: 32 },
      { dodge: false, hesitation: 20 },
      { dodge: true,  hesitation: 55 },  // near-fail beat — duck very late
      { dodge: true,  hesitation: 26 },  // save
      { dodge: false, hesitation: 18 },  // no barrier
      { dodge: false, hesitation: 60 },  // MISS: barrier present, hesitates too long, dies
    ];
    demoScriptIdx = 0;
  }

  // ---- game over ----
  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.dodges > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.dodges / 30, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = state.dodges;
    if (newBest) { best = state.dodges; try { localStorage.setItem('bd_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.dodges, dur_s: +(dur).toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        state.phase = 'score';
        setTimeout(function () {
          state.phase = 'cta';
          ctaAt = performance.now();
          setTimeout(function () { window.__demoDone = true; }, 3600);
        }, 2200);
      }, 2000);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 600);
      }
    }
  }

  function resetRun() {
    state.dodges = 0; state.combo = 0;
    barriers = []; particles = [];
    playerX = W / 2; playerDuck = 0; duckTarget = 0;
    beatCount = 0;
    nextBeat = performance.now() + beatMs() * 0.5;
    barPattern = null;
    if (DEMO) { demoBeatIdx = 0; demoScript = null; }
    if (BOT)  { botAction = null; }
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // ---- input ----
  var isDucking = false;
  function startDuck() {
    if (DEMO || BOT) return;
    isDucking = true;
  }
  function endDuck() {
    if (DEMO || BOT) return;
    isDucking = false;
  }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.dodges, unit: 'dodges' }); return;
      }
      resetRun(); return;
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    var lx = (e.clientX - r.left) / scale, ly = (e.clientY - r.top) / scale;
    tap(lx, ly);
    if (!DEMO && !BOT && state.phase === 'play') { isDucking = true; }
  });
  window.addEventListener('pointerup', function () { if (!DEMO && !BOT) isDucking = false; });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowDown') {
      if (!DEMO && !BOT && state.phase === 'play') isDucking = true;
      if (state.phase === 'title') { startRun(); return; }
    }
    if (e.code === 'Space') tap();
  });
  window.addEventListener('keyup', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowDown') {
      if (!DEMO && !BOT) isDucking = false;
    }
  });

  // ---- beat tick ----
  var demoBeatHesitation = 0;
  var demoHesitating = false;
  var botMissOnRun = -1; // which bot dodge will cause death

  function onBeat(now) {
    beatCount++;
    beatPhase = 0; // reset visual pulse
    playerPulse = 1;

    // decide whether this beat has a barrier
    if (!barPattern || beatCount % barPattern.length === 0) {
      barPattern = makePattern();
    }
    var patIdx = (beatCount - 1) % barPattern.length;
    var hasBarrier = barPattern[patIdx];

    if (hasBarrier && state.phase === 'play') {
      spawnBarrier(beatCount);
    }

    // tension ramp
    if (window.J) J.tension(Math.min(state.dodges / 25, 1));

    // === DEMO autopilot ===
    if (DEMO && state.phase === 'play') {
      var script = demoScript;
      if (!script) { buildDemoActions(); script = demoScript; }
      var idx = Math.min(demoScriptIdx, script.length - 1);
      var entry = script[idx];
      demoBeatHesitation = entry.hesitation;
      demoHesitating = true;
      // schedule the action after hesitation frames
      (function (ent, beatN) {
        var frames = ent.hesitation;
        var ms = frames * 16;
        setTimeout(function () {
          if (state.phase !== 'play') return;
          // on the final script entry (miss), don't duck even if barrier present
          var isMiss = (idx >= script.length - 1);
          if (isMiss) {
            // deliberately fail: don't duck, barrier will hit
            isDucking = false;
          } else if (ent.dodge && hasBarrier) {
            isDucking = true;
            setTimeout(function () { isDucking = false; }, 280);
          }
          demoHesitating = false;
        }, ms);
      })(entry, beatCount);
      demoScriptIdx++;
    }

    // === BOT autopilot ===
    if (BOT && state.phase === 'play') {
      // Decide which beat will be the fatal one for this run
      if (botMissOnRun < 0) {
        // die somewhere between dodge 6 and 20
        botMissOnRun = 6 + Math.floor(rng() * 14);
      }
      var willMiss = (state.dodges >= botMissOnRun);
      if (hasBarrier) {
        if (!willMiss) {
          // dodge successfully (with slight random latency)
          var delay = 40 + rng() * 120;
          setTimeout(function () {
            if (state.phase !== 'play') return;
            isDucking = true;
            setTimeout(function () { isDucking = false; }, 250 + rng() * 100);
          }, delay);
        }
        // else: don't duck → die
      }
    }
  }

  // ---- update barriers / dodge scoring ----
  function updateBarriers(now, dt) {
    var bms = beatMs();
    for (var i = barriers.length - 1; i >= 0; i--) {
      var b = barriers[i];
      if (b.slamming) {
        // slam down to BEAT_LINE_Y over ~half a beat
        var progress = (now - b.stuckAt) / (bms * 0.4);
        if (!b.startTime) b.startTime = now;
        progress = (now - b.startTime) / (bms * 0.35);
        b.y = -BAR_H + progress * (BEAT_LINE_Y + BAR_H);
        if (b.y >= BEAT_LINE_Y) {
          b.y = BEAT_LINE_Y;
          b.slamming = false;
          b.stuck = true;
          b.stuckAt = now;
        }
      }
      if (b.stuck) {
        // stays for one beat, then lifts
        var age = now - b.stuckAt;
        if (age > bms * 0.55) {
          // lift back up
          b.y -= 7 * dt;
          if (b.y < -BAR_H - 10) {
            // barrier cleared: score a dodge if player survived this beat
            barriers.splice(i, 1);
            // count only if player is alive
            if (state.phase === 'play') {
              state.dodges++;
              state.combo++;
              var cRatio = rng();
              if (state.combo >= 5) {
                if (window.J) J.perfect(state.combo);
                flash('×' + state.combo, GOLD, 38);
                zoom = 1.025; hitStop = 3;
              } else if (state.combo >= 3) {
                if (window.J) J.hit(state.combo);
                flash('+' + state.dodges, TEAL, 32);
              } else {
                if (window.J) J.hit(1);
              }
              if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.dodges > SHARE.dare) {
                dareBeaten = true;
                flash('DARE BEATEN', TEAL, 44);
                if (window.J) J.fanfare();
                SHARE.beaten(state.dodges);
              }
              if (window.LOOP) LOOP.emit('beat_dodged', { n: state.dodges, combo: state.combo, bpm: Math.round(currentBPM()) });
            }
          }
        }
      }
    }
  }

  // ---- particles ----
  function spawnParticles(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var angle = rng() * Math.PI * 2;
      var speed = 2 + rng() * 4;
      particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                       color: color, r: 3 + rng() * 3, life: 1 });
    }
  }

  // ---- render helpers ----
  function drawPlayer(now) {
    var py = playerDuck > 0.5 ? DUCK_Y + (1 - playerDuck) * (PLAYER_Y - DUCK_Y)
                              : PLAYER_Y - playerDuck * (PLAYER_Y - DUCK_Y);
    // smooth: lerp toward target
    var targetY = isDucking ? DUCK_Y : PLAYER_Y;
    playerDuck += (isDucking ? 1 : -1) * 0.18;
    playerDuck = Math.max(0, Math.min(1, playerDuck));
    var drawY = PLAYER_Y + playerDuck * (DUCK_Y - PLAYER_Y);
    var drawH = PLAYER_H - playerDuck * 10;

    // body glow
    var glow = cx.createRadialGradient(playerX, drawY + drawH / 2, 4, playerX, drawY + drawH / 2, 32);
    glow.addColorStop(0, 'rgba(46,197,182,0.35)');
    glow.addColorStop(1, 'rgba(46,197,182,0)');
    cx.fillStyle = glow;
    cx.fillRect(playerX - 36, drawY - 10, 72, drawH + 20);

    // beat pulse ring
    if (playerPulse > 0) {
      cx.strokeStyle = 'rgba(242,177,52,' + playerPulse * 0.6 + ')';
      cx.lineWidth = 2;
      cx.beginPath();
      cx.arc(playerX, drawY + drawH / 2, 28 + (1 - playerPulse) * 18, 0, Math.PI * 2);
      cx.stroke();
      playerPulse -= 0.04;
    }

    // player rect
    cx.fillStyle = TEAL;
    cx.beginPath();
    if (cx.roundRect) cx.roundRect(playerX - PLAYER_W / 2, drawY, PLAYER_W, drawH, 8);
    else cx.rect(playerX - PLAYER_W / 2, drawY, PLAYER_W, drawH);
    cx.fill();

    // face detail
    cx.fillStyle = INK;
    cx.fillRect(playerX - 12, drawY + 8, 8, 5);
    cx.fillRect(playerX + 4, drawY + 8, 8, 5);

    return drawY; // for collision
  }

  function drawBeatLine(now) {
    var bms = beatMs();
    var phase = ((now - (nextBeat - bms)) % bms) / bms;
    var pulse = Math.pow(Math.max(0, 1 - phase * 2), 2);

    // base line
    cx.strokeStyle = 'rgba(232,80,46,' + (0.3 + pulse * 0.5) + ')';
    cx.lineWidth = 2 + pulse * 3;
    cx.beginPath();
    cx.moveTo(0, BEAT_LINE_Y); cx.lineTo(W, BEAT_LINE_Y);
    cx.stroke();

    // tick marks
    for (var i = 0; i < 8; i++) {
      var tx = 28 + i * (W - 56) / 7;
      var th = 6 + pulse * 8;
      cx.strokeStyle = 'rgba(232,80,46,' + (0.4 + pulse * 0.4) + ')';
      cx.lineWidth = 2;
      cx.beginPath();
      cx.moveTo(tx, BEAT_LINE_Y - th); cx.lineTo(tx, BEAT_LINE_Y + th);
      cx.stroke();
    }
  }

  function drawBarriers(now) {
    for (var i = 0; i < barriers.length; i++) {
      var b = barriers[i];
      // draw left block
      if (b.gapX > 0) {
        var lw = b.gapX;
        var g1 = cx.createLinearGradient(0, b.y, 0, b.y + BAR_H);
        g1.addColorStop(0, '#e8502e');
        g1.addColorStop(1, '#a03520');
        cx.fillStyle = g1;
        cx.fillRect(0, b.y, lw, BAR_H);
        // edge flash when slamming
        if (b.slamming) {
          cx.fillStyle = 'rgba(255,255,255,0.2)';
          cx.fillRect(lw - 3, b.y, 3, BAR_H);
        }
      }
      // draw right block
      var rStart = b.gapX + b.gap;
      if (rStart < W) {
        var rw = W - rStart;
        var g2 = cx.createLinearGradient(0, b.y, 0, b.y + BAR_H);
        g2.addColorStop(0, '#e8502e');
        g2.addColorStop(1, '#a03520');
        cx.fillStyle = g2;
        cx.fillRect(rStart, b.y, rw, BAR_H);
        if (b.slamming) {
          cx.fillStyle = 'rgba(255,255,255,0.2)';
          cx.fillRect(rStart, b.y, 3, BAR_H);
        }
      }
      // gap indicator (subtle arrow)
      cx.strokeStyle = 'rgba(255,255,255,0.15)';
      cx.lineWidth = 1;
      cx.beginPath();
      cx.moveTo(b.gapX + b.gap / 2, b.y + 4);
      cx.lineTo(b.gapX + b.gap / 2, b.y + BAR_H - 4);
      cx.stroke();
    }
  }

  function drawBPM(now) {
    var bpm = Math.round(currentBPM());
    cx.textAlign = 'right';
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '600 12px Menlo, monospace';
    cx.fillText(bpm + ' BPM', W - 12, H - 60);
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    requestAnimationFrame(frame);
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // beat clock
    if (state.phase === 'play' && now >= nextBeat) {
      onBeat(now);
      nextBeat += beatMs();
    }

    // decay hit-stop
    if (hitStop > 0) { hitStop -= dt; }

    // update barriers + score
    if (state.phase === 'play' && hitStop <= 0) {
      updateBarriers(now, dt);
    }

    // death check
    if (state.phase === 'play') {
      if (checkDeath()) {
        // near-miss detection: if barely survived emit near_miss
        gameOver();
      }
    }

    // update particles
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.vy += 0.15 * dt;
      pt.life -= 0.025 * dt;
      if (pt.life <= 0) particles.splice(p, 1);
    }

    // ---- draw ----
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(232,80,46,0.04)');
    bg.addColorStop(0.5, 'rgba(11,13,18,0)');
    bg.addColorStop(1, 'rgba(46,197,182,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // bg beat lines (subtle grid)
    if (state.phase === 'play') {
      for (var g = 0; g < 4; g++) {
        var gy = 100 + g * 160;
        cx.strokeStyle = 'rgba(255,255,255,0.03)';
        cx.lineWidth = 1;
        cx.beginPath(); cx.moveTo(0, gy); cx.lineTo(W, gy); cx.stroke();
      }
    }

    // --- challenge card ---
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('24', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // --- play screen ---
    if (state.phase === 'play') {
      drawBeatLine(now);
      drawBarriers(now);
      drawPlayer(now);
      // particles
      for (var pi = 0; pi < particles.length; pi++) {
        var pp = particles[pi];
        cx.globalAlpha = pp.life;
        cx.fillStyle = pp.color;
        cx.beginPath(); cx.arc(pp.x, pp.y, pp.r, 0, Math.PI * 2); cx.fill();
      }
      cx.globalAlpha = 1;
      // score display
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.95)';
      cx.font = '800 66px -apple-system, Helvetica, Arial';
      cx.fillText(state.dodges, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 118);
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 144);
      }
      // combo
      if (state.combo >= 3) {
        var comboScale = 1 + Math.min(state.combo / 20, 0.6);
        cx.save();
        cx.translate(W / 2, H - 160);
        cx.scale(comboScale, comboScale);
        cx.textAlign = 'center';
        cx.fillStyle = GOLD;
        cx.font = '900 ' + Math.round(20 + state.combo * 1.2) + 'px -apple-system, Helvetica, Arial';
        cx.fillText('×' + state.combo, 0, 0);
        cx.restore();
      }
      drawBPM(now);
    }

    // --- game over screen ---
    if (state.phase === 'over') {
      // still show beat line + player faded
      drawBeatLine(now);
      cx.globalAlpha = 0.3; drawPlayer(now); cx.globalAlpha = 1;

      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('DROPPED.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(state.dodges + ' dodges', W / 2, 338);
      var pt = pctTop(state.dodges);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 382);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 406);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 290);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 448);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.13)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // --- demo score card ---
    if (state.phase === 'score') {
      cx.fillStyle = 'rgba(11,13,18,0.75)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText((window.__demoScore || 0) + ' dodges', W / 2, 320);
      var pt2 = pctTop(window.__demoScore || 0);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt2 + '% TODAY', W / 2, 364);
    }

    // --- demo CTA card ---
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT DODGE', W / 2, 294);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('he dodged ' + (window.__demoScore || 0) + '. your move.', W / 2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(now / 250);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 0), W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // --- title screen ---
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT DODGE', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 310);
      cx.globalAlpha = pulse; cx.fillText('HOLD TO DUCK', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('survive the drop.', W / 2, 360);
    }

    // --- flashes ---
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 230 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
