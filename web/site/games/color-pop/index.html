<script>
(function () {

  // ---- mulberry32 seeded RNG ----
  function mulberry32(a) {
    return function () {

      var t = Math.imul(a ^ a >>> 15, 1 | a);

  function genDots(round) {

    var family = COLOR_FAMILIES[Math.floor(rng() * COLOR_FAMILIES.length)];
    var dots = [];

    function place() {

      var x = margin + rng() * (W - margin * 2);

    state.timeLeft = state.roundDuration;

      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);

      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';

      if (!DEMO && !BOT) {

      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('COLOR POP', W / 2, 294);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 27) + '. your eyes faster?', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 27), W / 2, 408);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // ---- flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- draw dots helper ----
  function drawDots(now, dt) {
    if (!state.dots || state.dots.length === 0) return;
    for (var i = 0; i < state.dots.length; i++) {
      var d = state.dots[i];
      // spawn stagger animation
      var spawnAge = now - state.roundStartTs - d.spawnT;
      if (spawnAge < 0) continue; // not spawned yet
      var spawnProgress = Math.min(1, spawnAge / 220); // 220ms pop-in
      var drawR = d.r * spawnProgress;

      if (d.popped) {
        d.popT += dt;
        // burst-out animation
        var popProgress = d.popT / 18;
        if (popProgress > 1) continue;
        drawR = d.r * (1 + popProgress * 1.8);
        var popAlpha = 1 - popProgress;
        cx.globalAlpha = popAlpha;
        cx.beginPath();
        cx.arc(d.x, d.y, drawR, 0, Math.PI * 2);
        cx.fillStyle = hsl(d.h, d.s, d.l);
        cx.fill();
        cx.globalAlpha = 1;
        continue;
      }

      // breathing pulse (makes them feel alive)
      var pulse = 1 + 0.04 * Math.sin(now / 420 + i * 1.3);
      var r = drawR * pulse;

      // glow ring if it's close to timeout (tension)
      var timerFrac2 = state.roundDuration > 0 ? state.timeLeft / state.roundDuration : 1;
      if (timerFrac2 < 0.3) {
        cx.beginPath();
        cx.arc(d.x, d.y, r + 6, 0, Math.PI * 2);
        cx.fillStyle = hsl(d.h, d.s, d.l, 0.18 + 0.12 * Math.sin(now / 100));
        cx.fill();
      }

      cx.beginPath();
      cx.arc(d.x, d.y, r, 0, Math.PI * 2);
      // radial gradient for depth
      var gr = cx.createRadialGradient(d.x - r * 0.25, d.y - r * 0.25, r * 0.05, d.x, d.y, r);
      gr.addColorStop(0, hsl(d.h, d.s, Math.min(d.l + 16, 85)));
      gr.addColorStop(1, hsl(d.h, d.s, d.l));
      cx.fillStyle = gr;
      cx.fill();

      // subtle rim highlight
      cx.strokeStyle = hsl(d.h, d.s, Math.min(d.l + 28, 90), 0.45);
      cx.lineWidth = 1.5;
      cx.stroke();
    }
  }

  // ---- title preview dots ----
  var previewDots = [];
  (function () {
    var family = COLOR_FAMILIES[2]; // pink family for preview
    var positions = [
      { x: 90, y: 430 }, { x: 160, y: 460 }, { x: 240, y: 445 },
      { x: 315, y: 435 }, { x: 130, y: 540 }, { x: 270, y: 555 }
    ];
    for (var i = 0; i < positions.length; i++) {
      var hShift = (i === 2) ? 0 : (i % 2 === 0 ? 1 : -1) * (14 + i * 4);
      previewDots.push({
        x: positions[i].x, y: positions[i].y,
        h: (family.h + hShift + 360) % 360,
        s: family.s, l: family.l,
        r: 22, isTarget: (i === 2)
      });
    }
  })();

  function drawSampleDots(now) {
    for (var i = 0; i < previewDots.length; i++) {
      var d = previewDots[i];
      var pulse = 1 + 0.05 * Math.sin(now / 400 + i * 1.1);
      var r = d.r * pulse;
      cx.beginPath();
      cx.arc(d.x, d.y, r, 0, Math.PI * 2);
      var gr = cx.createRadialGradient(d.x - r * 0.25, d.y - r * 0.25, r * 0.05, d.x, d.y, r);
      gr.addColorStop(0, hsl(d.h, d.s, d.l + 14));
      gr.addColorStop(1, hsl(d.h, d.s, d.l));
      cx.fillStyle = gr;
      cx.fill();
      cx.strokeStyle = hsl(d.h, d.s, d.l + 26, 0.4);
      cx.lineWidth = 1.5;
      cx.stroke();
      // arrow pointing at target
      if (d.isTarget) {
        var pulseA = 0.5 + 0.5 * Math.sin(now / 300);
        cx.globalAlpha = pulseA;
        cx.fillStyle = GOLD;
        cx.font = '900 13px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText('← THIS ONE', d.x + 52, d.y + 5);
        cx.globalAlpha = 1;
      }
    }
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
