<script>
(function () {
  'use strict';

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;

  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';

  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- tile layout: 2×2 grid + a 5th center tile ----
  // 4 corner tiles + 1 center tile = 5 distinct tiles
  var TILE_SIZE = 120;
  var GRID_CX = W / 2, GRID_CY = 370;
  var GAP = 14;
  var HALF = TILE_SIZE / 2 + GAP / 2;

  // tile definitions: id, cx, cy, base color
  var TILES = [

    { id: 1, cx: GRID_CX + HALF, cy: GRID_CY - HALF, color: TEAL,  dim: '#0f4742' },  // top-right  teal
    { id: 2, cx: GRID_CX - HALF, cy: GRID_CY + HALF, color: GOLD,  dim: '#5a430e' },  // bot-left   gold
    { id: 3, cx: GRID_CX + HALF, cy: GRID_CY + HALF, color: '#b06ef2', dim: '#3a1a5a' }, // bot-right  purple
    { id: 4, cx: GRID_CX,        cy: GRID_CY,         color: '#f2f0eb', dim: '#3a3a38' }, // center     white

  var sequence = [];   // the growing sequence of tile ids

  }

  // ---- game logic ----
  function newGame() {
    sequence = []; inputIdx = 0; roundLen = 0; score = 0;
    flashes = []; litTile = -1; showIdx = 0; showWait = 0;

    }
  }

  function startRun() {
    sequence = []; inputIdx = 0; roundLen = 0; score = 0;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    phase = 'show';

  }

  function startDemoRun() {
    sequence = []; inputIdx = 0; roundLen = 0; score = 0;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    phase = 'show';
    addTile();
  }

  function addTile() {
    // pick next tile id — avoid immediate repeat for first few
    var next;
    if (sequence.length === 0) {
      next = Math.floor(rng() * TILES.length);
    } else {
      do { next = Math.floor(rng() * TILES.length); } while (next === sequence[sequence.length - 1] && TILES.length > 1);
    }
    sequence.push(next);
    roundLen = sequence.length;
    inputIdx = 0;
    beginShow();
  }

  function beginShow() {
    showIdx = 0;
    showWait = SHOW_ON;
    showState = 'on';
    litTile = sequence[0];
    litTimer = SHOW_ON;
    phase = 'show';
    // play tension rising with sequence length
    if (window.J) J.tension(Math.min(roundLen / 12, 1));
  }

  function advanceShow(dt) {
    if (phase !== 'show') return;
    showWait -= dt;
    if (showWait > 0) return;

    if (showState === 'on') {
      // turn off current tile
      litTile = -1;
      showState = 'off';
      showWait = SHOW_OFF;
    } else {
      // move to next tile or begin input
      showIdx++;
      if (showIdx >= sequence.length) {
        litTile = -1;
        phase = 'input';
        inputIdx = 0;
        if (roundLen >= 5 && window.J) J.tension(Math.min(roundLen / 12, 1));
        return;
      }
      litTile = sequence[showIdx];
      showState = 'on';
      showWait = SHOW_ON;
    }
  }

  function tapTile(id) {
    if (phase !== 'input') return;
    if (id === sequence[inputIdx]) {
      // correct
      tileGlow[id] = 1.0;
      tileCorrect = id;
      inputIdx++;
      var combo = inputIdx;
      if (window.J) {
        if (inputIdx === sequence.length) J.perfect(roundLen);   // completed round
        else J.hit(combo);
      }
      if (inputIdx === sequence.length) {
        // round complete!
        score = roundLen;
        if (score > best) { best = score; try { localStorage.setItem('se_best', String(best)); } catch (_) {} }
        hitStop = 5; zoom = 1.025;
        if (roundLen > 4) { shakeAmt = 2; }
        flash(roundLen >= 8 ? 'PERFECT!' : roundLen >= 5 ? 'NICE!' : 'ECHO!', TEAL, 38);
        if (window.LOOP) LOOP.emit('round_complete', { len: roundLen });
        // dare check
        if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
          dareBeaten = true;
          flash('DARE BEATEN', GOLD, 44);
          if (window.J) J.fanfare();
          SHARE.beaten(score);
        }
        // short pause then add tile
        phase = 'pause';
        setTimeout(function () { addTile(); }, 700);
      }
    } else {
      // wrong tile — game over
      tileGlow[id] = 1.0;
      shakeAmt = 10;
      if (window.J) J.death(Math.min(0.3 + score / 15, 1));
      flash('WRONG', VERM, 44);
      gameOver();
    }
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best - (score === best ? 1 : 0); // detect new best before update
    if (score > best) {
      best = score;
      try { localStorage.setItem('se_best', String(best)); } catch (_) {}
    }

      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { startRun(); }, 900);
      }
    }
  }

  function resetRun() {
    flashes = []; tileGlow = [0,0,0,0,0]; dareBeaten = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ---- INPUT ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function hitTestTiles(x, y) {
    var best = -1, bestDist = Infinity;
    for (var i = 0; i < TILES.length; i++) {
      var t = TILES[i];
      var dx = x - t.cx, dy = y - t.cy;
      var half = TILE_SIZE / 2;
      if (Math.abs(dx) <= half && Math.abs(dy) <= half) {
        var dist = dx*dx + dy*dy;
        if (dist < bestDist) { bestDist = dist; best = i; }
      }
    }
    return best;
  }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'input') {
      var tid = (x !== undefined) ? hitTestTiles(x, y) : -1;
      if (tid >= 0) { tapTile(tid); return; }
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'tiles' }); return;
      }
      resetRun();

    var r = cv.getBoundingClientRect();

  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') tap();
    // keyboard shortcuts for tiles (testing)

    if (map[e.code] !== undefined && !DEMO && !BOT && phase === 'input') tapTile(map[e.code]);
  });

  // ---- DEMO / BOT AUTOPILOT ----
  // demo script: sequence of actions that produce the mirror-neuron arc.
  // We build a fixed demo sequence of 9 tiles, then play as follows:
  // rounds 1-5: correct (building tension), round 6 near-fail (wrong tile caught
  // in the last position of a 6-length run, recovered to show near-miss feel),
  // round 7: correct, round 8: WRONG on last tile (the haunting miss).
  // Actually for demo we replay the whole sequence correctly up to 7 tiles,
  // then on tile 8 we deliberately tap wrong on the final tile.

  var demoPhase = 'idle';
  var demoWaitFrames = 0;
  var demoTargetLen = 0;   // we'll let it reach 7 then miss on 8th
  var demoNearMissAt = 6;  // on round of length 6, pause extra long before last tile
  var demoDoneAllCorrect = false;

  // hesitation waits per input position (frames), random feel
  var demoHesitations = [22, 18, 30, 24, 15, 38, 20, 28, 16, 42, 25, 19];

  var botRunsDone = 0;
  // bot: each run, accumulate correct answers for up to K tiles then intentionally miss
  var botCorrectSoFar = 0;
  var BOT_MISS_AT = 5; // miss on this round length to ensure game_over fires

  function botStep() {
    if (!BOT || phase !== 'input') return;
    // pick correct or wrong tile
    var correct = sequence[inputIdx];
    // miss on the last tile of a round of length BOT_MISS_AT (or if we've done enough)
    var shouldMiss = (roundLen >= BOT_MISS_AT && inputIdx === roundLen - 1);
    if (shouldMiss) {
      // tap wrong tile
      var wrong = (correct + 1 + Math.floor(rng() * (TILES.length - 1))) % TILES.length;
      tapTile(wrong);
    } else {
      tapTile(correct);
    }
  }

  var botWaitFrames = 0;
  var BOT_WAIT_MIN = 20, BOT_WAIT_MAX = 45;

  function demoStep() {
    if (!DEMO || phase !== 'input') return;
    if (demoWaitFrames > 0) { demoWaitFrames--; return; }

    var correct = sequence[inputIdx];
    var isLastTile = (inputIdx === roundLen - 1);
    var isNearMissRound = (roundLen === demoNearMissAt);
    var isFinalMissRound = (roundLen === 8);

    // extra hesitation on penultimate tile of near-miss round
    if (isNearMissRound && inputIdx === roundLen - 2 && !demoDoneNearMissPause) {
      demoDoneNearMissPause = true;
      demoWaitFrames = 55; // very long pause = "almost missed it" feel
      return;
    }
    // on last tile of final round, tap wrong tile
    if (isFinalMissRound && isLastTile) {
      var wrongTile = (correct + 1) % TILES.length;
      tapTile(wrongTile);
      return;
    }
    // normal: tap correct tile
    tapTile(correct);
    // set hesitation for next tile
    demoWaitFrames = demoHesitations[inputIdx % demoHesitations.length] || 22;
  }
  var demoDoneNearMissPause = false;

  // ---- RENDER ----
  function drawTile(t, lit, glow) {
    var x = t.cx - TILE_SIZE / 2, y = t.cy - TILE_SIZE / 2;
    var radius = 16;

    cx.save();
    if (glow > 0.01) {
      cx.shadowColor = t.color;
      cx.shadowBlur = 30 * glow;
    }

    // background
    cx.fillStyle = lit > 0 ? t.color : t.dim;
    cx.beginPath();
    if (cx.roundRect) {
      cx.roundRect(x, y, TILE_SIZE, TILE_SIZE, radius);
    } else {
      roundRect(x, y, TILE_SIZE, TILE_SIZE, radius);
    }
    cx.fill();

    // lit overlay shine
    if (lit > 0) {
      var shine = cx.createLinearGradient(x, y, x, y + TILE_SIZE * 0.55);
      shine.addColorStop(0, 'rgba(255,255,255,0.22)');
      shine.addColorStop(1, 'rgba(255,255,255,0)');
      cx.fillStyle = shine;
      cx.beginPath();
      if (cx.roundRect) {
        cx.roundRect(x, y, TILE_SIZE, TILE_SIZE, radius);
      } else {
        roundRect(x, y, TILE_SIZE, TILE_SIZE, radius);
      }
      cx.fill();
    }

    cx.shadowBlur = 0;
    cx.restore();

  function roundRect(x, y, w, h, r) {
    cx.moveTo(x + r, y);
    cx.lineTo(x + w - r, y);
    cx.quadraticCurveTo(x + w, y, x + w, y + r);
    cx.lineTo(x + w, y + h - r);
    cx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    cx.lineTo(x + r, y + h);
    cx.quadraticCurveTo(x, y + h, x, y + h - r);
    cx.lineTo(x, y + r);
    cx.quadraticCurveTo(x, y, x + r, y);
    cx.closePath();

  function drawSequenceIndicator() {

    if (phase !== 'input' && phase !== 'pause') return;
    var dotR = 5, dotGap = 14, total = sequence.length;
    var startX = W / 2 - (total - 1) * dotGap / 2;
    var dotY = 174;
    for (var i = 0; i < total; i++) {
      cx.beginPath();
      cx.arc(startX + i * dotGap, dotY, dotR, 0, Math.PI * 2);

        cx.fillStyle = TEAL;

        cx.fillStyle = GOLD;
      } else {

    // decay juice

      if (BOT) {

      }

    for (var i = 0; i < tileGlow.length; i++) tileGlow[i] *= Math.pow(0.88, dt);

    // advance show phase
    advanceShow(dt);

    // flashes advance always
    for (var k = flashes.length - 1; k >= 0; k--) {
      flashes[k].t += dt;
      if (flashes[k].t > 45) flashes.splice(k, 1);
    }

    // ---- draw ----
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.001) {

      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 68px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 100);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 122);

      // dare banner during input
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'input') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W / 2, 148);
      }
    }

    // show phase label
    if (phase === 'show') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '700 14px Menlo, monospace';
      cx.fillText('WATCH', W / 2, 200);
    }
    if (phase === 'input') {
      cx.textAlign = 'center';
      cx.fillStyle = GOLD;
      cx.font = '700 14px Menlo, monospace';
      var pulse = 0.7 + 0.3 * Math.sin(now / 250);
      cx.globalAlpha = pulse;
      cx.fillText('YOUR TURN', W / 2, 200);
      cx.globalAlpha = 1;
    }

    // round length label (small, above tiles)
    if (phase === 'show' || phase === 'input' || phase === 'pause') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.28)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('round ' + roundLen, W / 2, 226);
    }

    // -- flashes --
    for (var fl = 0; fl < flashes.length; fl++) {
      var f = flashes[fl], a = Math.max(0, 1 - f.t / 42);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = f.color;
      cx.font = '900 ' + (f.size + f.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(f.txt, W / 2, 250 - f.t * 0.5);
      cx.globalAlpha = 1;
    }

    // -- title screen --
    if (phase === 'title') {
      for (var ti2 = 0; ti2 < TILES.length; ti2++) drawTile(TILES[ti2], 0, 0);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('SEQUENCE ECHO', W / 2, 200);
      cx.fillStyle = VERM; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var p = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = p;
      cx.fillText('TAP TO PLAY', W / 2, 248);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.32)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('watch. remember. echo.', W / 2, 278);
    }

    // -- challenge card (demo beat 1) --
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('8', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 432);
    }

    // -- game over screen --
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      // re-draw tiles dim below overlay
      for (var ti3 = 0; ti3 < TILES.length; ti3++) drawTile(TILES[ti3], 0, 0);

      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' tiles', W / 2, 335);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 375);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 398);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 446);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) {
          cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        } else {
          roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        }
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // -- demo CTA card --
    if (phase === 'cta') {
      var t2 = (now - ctaAt) / 1000, ease = Math.min(1, t2 * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('SEQUENCE ECHO', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.72)'; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they echoed ' + (window.__demoScore || 7) + '. your move.', W / 2, 332);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 7), W / 2, 402);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 438);
      cx.globalAlpha = 1;
    }

    // -- mute toggle (human only) --
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>

</html>
