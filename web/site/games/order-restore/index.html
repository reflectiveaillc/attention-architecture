<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;

  var cv = document.getElementById('c'), cx = cv.getContext('2d');

  var grid;           // grid[cellIdx] = tileVal

  var dragging;       // { tileVal, offX, offY, x, y } or null

    for (var i = 0; i < grid.length; i++) { if (grid[i] === val) return i; }
    return -1;

    for (var i = 0; i < grid.length; i++) { if (grid[i] !== i) return false; }

  // Build a sorted move sequence using selection sort (returns array of [fromCell, toCell])
  function buildSolveMoves(initGrid) {
    var g = initGrid.slice();
    var moves = [];
    for (var target = 0; target < g.length; target++) {
      if (g[target] === target) continue;
      var found = -1;
      for (var j = target + 1; j < g.length; j++) {
        if (g[j] === target) { found = j; break; }
      }
      if (found >= 0) {
        moves.push([found, target]);
        var tmp = g[found]; g[found] = g[target]; g[target] = tmp;
      }
    }
    return moves;
  }

  function shuffleGrid() {
    var arr = [];
    for (var i = 0; i < N * N; i++) arr.push(i);
    for (var j = arr.length - 1; j > 0; j--) {
      var k = Math.floor(rng() * (j + 1));
      var tmp = arr[j]; arr[j] = arr[k]; arr[k] = tmp;
    }
    // ensure not already sorted
    var sorted = true;
    for (var m = 0; m < arr.length; m++) { if (arr[m] !== m) { sorted = false; break; } }
    if (sorted) { var t = arr[0]; arr[0] = arr[1]; arr[1] = t; }
    return arr;
  }

  function makeTilePos() {
    var tp = {};
    for (var i = 0; i < grid.length; i++) {
      var val = grid[i];
      var p = cellXY(i);
      tp[val] = { x: p.x, y: p.y };
    }
    return tp;
  }

    var tmp = grid[fromCell]; grid[fromCell] = grid[toCell]; grid[toCell] = tmp;
    moveCount++;
    if (window.J) J.calm(moveCount);
    zoom = 1.015;
    if (window.LOOP) LOOP.emit('tile_placed', { from: fromCell, to: toCell, moves: moveCount });
  }

  function checkWin() {
    if (!isOrdered()) return false;
    shimmerActive = true; shimmerT = 0;
    zoom = 1.035;
    if (window.J) J.calm(9);
    flash('RESTORED', TEAL, 42);
    return true;
  }

  function flash(txt, col, sz) { flashes.push({ txt: txt, color: col, size: sz, t: 0 }); }

  function fireGameOver() {
    if (phase === 'over' || phase === 'cta') return;
    phase = 'over'; overAt = performance.now();
    demoScore = moveCount;
    window.__demoScore = demoScore;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: moveCount, dur_s: +dur.toFixed(1) });
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else { setTimeout(function () { startRun(); }, 700); }
    }
  }

  function startRun() {
    grid = shuffleGrid();
    tilePos = makeTilePos();
    dragging = null;
    flashes = [];
    shimmerActive = false; shimmerT = 0;
    moveCount = 0;
    runStartTs = Date.now();
    phase = 'play';

    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });

    if (BOT) {
      botMoves = buildSolveMoves(grid.slice());

      demoMoves = buildSolveMoves(grid.slice());
      demoMoveIdx = 0;

    if (botWaitFrames > 0) return;
    if (botMoveIdx >= botMoves.length) {
      // All moves done; grid should be ordered

          botMoveIdx = 0;
          botWaitFrames = 30;

      return;

      checkWin();
      setTimeout(function () { fireGameOver(); }, 500);
      botMoveIdx = botMoves.length; // stop

    else if (demoMoveIdx === demoMoves.length) gap = 1200; // final snap

    demoNextAt = now + gap;

      triggerDemoCTA(now);
      demoMoveIdx = demoMoves.length;

    setTimeout(function () {
      phase = 'cta';
      ctaAt = performance.now();

  var last = performance.now();

            cx.beginPath();

            cx.fill();

      cx.fillText('find your calm', W / 2, 368);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 400);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('tap — try again', W / 2, 416);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(46,197,182,0.12)';
        cx.strokeStyle = TEAL; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = TEAL; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ DARE A FRIEND', W / 2, SHARE_R.y + 29);
      }
    }

    // Demo CTA card
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('ORDER RESTORE', W / 2, 288);
      cx.fillStyle = 'rgba(255,255,255,0.68)'; cx.font = '600 18px -apple-system, Helvetica, Arial';
      cx.fillText('restore yours', W / 2, 326);
      var p3 = 0.7 + 0.3 * Math.sin(now / 340);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ REACH IT', W / 2, 392);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.42)'; cx.font = '500 14px -apple-system, Helvetica, Arial';

      cx.fillText(fl.txt, W / 2, GRID_Y - 44 - fl.t * 0.4);

    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
