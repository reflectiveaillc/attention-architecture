<script>
(function () {
  'use strict';

  var cv = document.getElementById('c'), cx = cv.getContext('2d');

    runStartTs = Date.now();

  }

  function newRound() {
    state.tol = tolFor(state.score);
    state.thumb = 0; state.dir = 1;
    state.speed = 1.3 + state.score * 0.05;

    state.pollIdx = Math.floor(rng() * POLLS.length);
    state.locked = false; state.lockedHold = 0;
  }

  function lock() {

    var diff = Math.abs(state.thumb - state.target);
    var tol = state.tol;
    state.locked = true;
    state.lockedThumb = state.thumb;
    state.lockedTarget = state.target;
    state.lastDiff = diff;

    if (diff > tol) {                                   // MISS → game over
      state.result = 'miss';
      gameOver();
      return;

    var ratio = diff / tol;

    else state.combo = 0;

      shakeAmt = 5; if (window.J) J.near();

    } else if (perfect) {

    } else {
      flash('+1', GOLD, 34);

    state.score++;
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {

    cx.fillStyle = state.combo >= 3 ? GOLD : VERM;

    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.beginPath(); cx.arc(hx, hy, 5, 0, Math.PI * 2); cx.fill();

    // locked-result connector (the near-perfection read)
    if (state.locked) {
      var lx = pctToX(state.lockedThumb), ttx = pctToX(state.lockedTarget);
      cx.strokeStyle = state.result === 'miss' ? 'rgba(232,80,46,0.7)' : 'rgba(46,197,182,0.6)';
      cx.setLineDash([4, 4]); cx.lineWidth = 2;
      cx.beginPath(); cx.moveTo(lx, hy); cx.lineTo(ttx, hy); cx.stroke();
      cx.setLineDash([]);
      cx.textAlign = 'center';
      cx.fillStyle = state.result === 'miss' ? VERM : 'rgba(255,255,255,0.8)';
      cx.font = '800 14px Menlo, monospace';
      cx.fillText((state.lastDiff < 10 ? state.lastDiff.toFixed(1) : Math.round(state.lastDiff)) + '% off', W / 2, TRACK_Y + TRACK_H + 44);

    // score

      cx.font = '600 13px -apple-system, Helvetica, Arial';

      // incoming dare banner takes the sub-score slot when an unmet dare is live
      var dareLive = !DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten;
      if (dareLive && state.phase === 'play') {
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText('BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 150);
      } else if (state.combo >= 2) {
        // combo escalation — stakes must be visible
        var cs = 18 + Math.min(state.combo, 10) * 1.4;
        cx.fillStyle = GOLD; cx.font = '900 ' + cs + 'px -apple-system, Helvetica, Arial';
        cx.globalAlpha = 0.5 + 0.5 * Math.sin(now / 140);
        cx.fillText('×' + state.combo, W / 2, 150);
        cx.globalAlpha = 1;
      }
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && dareBeaten && state.phase === 'play') {
        cx.fillStyle = TEAL; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText('DARE BEATEN ✓', W / 2, 150);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('14', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 168 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('POLL SLIDER', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO LOCK', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('hit the crowd. don’t miss the vibe.', W / 2, 360);
    }

    // game over (death spectacle: the locked thumb vs the crowd)
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';

      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' votes', W / 2, 345);

      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('POLL SLIDER', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he hit ' + (window.__demoScore || 14) + ' votes. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 14), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
