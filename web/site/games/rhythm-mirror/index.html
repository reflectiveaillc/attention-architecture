<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ── GAME CONSTANTS ──
  var BEAT_MS   = 420;   // ms per beat (tempo ~143bpm)
  var WIN_MS    = 320;   // player input window (±160ms from beat)
  var MAX_BEATS = 8;     // max beats in a pattern
  var FLASH_DUR = 45;    // frames for floating text

  // State
  var phase;          // 'title' | 'challenge' | 'show' | 'play' | 'over' | 'cta'
  var pattern;        // array of 0/1 per beat (0=left half,1=right half; always 1 since player mirrors right)
  var patternLen;
  var showBeat;       // which beat is currently lit in the show phase
  var showTimer;      // ms elapsed in show phase
  var playerIdx;      // which beat we're waiting for next
  var roundScore;     // beats mirrored this round (= pattern.length on success)
  var score;          // total longest pattern mirrored
  var bestScore;
  var runStartTs;
  var overAt;
  var challengeAt;
  var ctaAt;

  var hitStop  = 0;
  var shakeAmt = 0;
  var zoom     = 1;
  var flashes  = [];
  var dareBeaten = false;

  // Visual beat indicators
  var leftPulse  = 0;  // 0..1 decay
  var rightPulse = 0;

  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };

  try { bestScore = +localStorage.getItem('rm_best') || 0; } catch (_) { bestScore = 0; }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 5))));
  }

  // ── PATTERN GENERATION ──
  function makePattern(len) {
    // All beats land on the right half (player always mirrors right side)
    // We encode timing gaps — each beat is just 1 (tap) in sequence
    var p = [];
    for (var i = 0; i < len; i++) p.push(1);
    return p;
  }

  // ── ROUND LIFECYCLE ──
  function newGame() {
    phase = 'title';
    score = 0;
    patternLen = 1;
    pattern = [];
    flashes = [];
    dareBeaten = false;
    hitStop = 0; shakeAmt = 0; zoom = 1;
    leftPulse = 0; rightPulse = 0;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRound, 1300);
      return;
    }
    if (BOT) {
      startRound();
      return;
    }
  }

  function startRound() {
    pattern    = makePattern(patternLen);
    showBeat   = 0;
    showTimer  = 0;
    playerIdx  = 0;
    phase      = 'show';
    if (patternLen === 1) {
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    }
    if (window.J) J.tension(Math.min((patternLen - 1) / MAX_BEATS, 1));
  }

  function onBeatShown() {
    // all beats shown — switch to play phase
    phase = 'play';
    playerIdx = 0;
    if (window.LOOP) LOOP.emit('pattern_shown', { len: patternLen });
  }

  // called when player taps the right side during play phase
  function playerTap() {
    if (phase !== 'play') return;
    // accept if within ±WIN_MS of the expected beat position
    var elapsed = performance.now() - playPhaseStart;
    var beatPos = playerIdx * BEAT_MS;
    var diff = Math.abs(elapsed - beatPos);

    if (diff > WIN_MS) {
      // premature or too late — miss
      onMiss('timing');
      return;
    }

    // hit!
    playerIdx++;
    rightPulse = 1;
    var perfect = diff < WIN_MS * 0.18;

    if (window.J) {
      if (perfect) J.perfect(playerIdx);
      else J.hit(playerIdx);
    }
    if (perfect) { hitStop = 4; zoom = 1.03; flash('PERFECT', TEAL, 42); }

    if (playerIdx >= pattern.length) {
      // round complete!
      onRoundComplete();
    }
  }

  var playPhaseStart = 0;

  // Override startRound to track play phase start
  var _origStartRound = startRound;
  // We'll set playPhaseStart when phase becomes 'play'

  function onRoundComplete() {
    roundScore = patternLen;
    if (patternLen > score) score = patternLen;
    if (score > bestScore) { bestScore = score; try { localStorage.setItem('rm_best', String(bestScore)); } catch (_) {} }
    if (window.J) J.gold();
    flash('+' + patternLen + ' beats', GOLD, 46);
    hitStop = 8; zoom = 1.04;

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score >= SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }

    // advance to next pattern
    patternLen = Math.min(patternLen + 1, MAX_BEATS);

    // slight pause then next round
    phase = 'transition';
    setTimeout(function () {
      if (phase === 'transition') startRound();
    }, 600);
  }

  function onMiss(reason) {
    var dur = (Date.now() - runStartTs) / 1000;
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 10;
    if (window.J) {
      J.death(Math.min(0.3 + score / MAX_BEATS, 1));
      if (score >= bestScore && score > 0) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) { window.__demoScore = score; }

    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 700);
    }
  }

  function resetRun() {
    score = 0; patternLen = 1; flashes = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    leftPulse = 0; rightPulse = 0; dareBeaten = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRound();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size || 36, t: 0 });
  }

  // ── INPUT ──
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRound(); return; }
    // Player taps right half during play
    if (phase === 'play' && (x === undefined || x >= W / 2)) {
      playerTap();
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'beats' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ── AUTOPILOTS ──
  var botRunsDone = 0;
  var botBeatsDone = 0;
  var demoState = { step: 0, wait: 0 };
  // demo script: steps are arrays of [targetDiff, hesitationFrames]
  // negative diff = early, positive = late, 0 = perfect
  // The near-fail at step 3 (beat 4 of pattern len 4): very late input (+260ms)
  // then recovery next rounds, then real miss
  var demoScript = [
    { diff: 15,  hes: 38 },  // round 1 beat 1: slight early
    { diff: -20, hes: 32 },  // round 2 beat 1-2
    { diff: 10,  hes: 42 },  // round 2 beat 2
    { diff: 200, hes: 55 },  // near-fail: very late, just barely in window
    { diff: 5,   hes: 30 },  // recovery
    { diff: 8,   hes: 35 },  // round 4 beats
    { diff: -15, hes: 28 },
    { diff: 380, hes: 50 },  // MISS: past window
  ];
  var demoScriptIdx = 0;
  var demoBeatsFired = 0;

  // Bot: plays patterns but eventually makes a timing error to reach game_over
  var botMaxRounds = 4; // lose on round 5

  function autopilot(now) {
    if (DEMO) {
      demoBeat(now);
    } else if (BOT) {
      botBeat(now);
    }
  }

  var demoPendingTap = null; // { at: timestamp }

  function demoBeat(now) {
    if (phase === 'play') {
      var elapsed = now - playPhaseStart;
      // schedule taps for each beat
      if (demoPendingTap === null && playerIdx < pattern.length) {
        var scriptEntry = demoScript[Math.min(demoScriptIdx, demoScript.length - 1)];
        var targetTime = playerIdx * BEAT_MS + scriptEntry.diff;
        demoPendingTap = { at: playPhaseStart + targetTime };
        demoScriptIdx++;
      }
      if (demoPendingTap && now >= demoPendingTap.at) {
        demoPendingTap = null;
        playerTap();
      }
    }
  }

  var botPendingTap = null;
  var botRoundNum = 0;

  function botBeat(now) {
    if (phase === 'play') {
      if (botPendingTap === null && playerIdx < pattern.length) {
        var err;
        if (botRoundNum >= botMaxRounds) {
          // intentional miss: too late
          err = WIN_MS + 80 + rng() * 100;
        } else {
          err = (rng() - 0.5) * 120;
        }
        var targetTime = playerIdx * BEAT_MS + err;
        botPendingTap = { at: playPhaseStart + targetTime };
      }
      if (botPendingTap && now >= botPendingTap.at) {
        botPendingTap = null;
        playerTap();
      }
    }
    if (phase === 'transition') {
      botRoundNum++;
      botPendingTap = null;
    }
  }

  // ── RENDER ──
  var last = performance.now();
  var beatVisTimer = 0; // tracks beat flash on left side

  function drawDivider() {
    cx.strokeStyle = 'rgba(255,255,255,0.12)';
    cx.lineWidth = 1.5;
    cx.setLineDash([6, 6]);
    cx.beginPath(); cx.moveTo(W / 2, 160); cx.lineTo(W / 2, H - 100);
    cx.stroke(); cx.setLineDash([]);
  }

  function drawBeatDot(x, y, lit, color, pulse) {
    var r = 22 + pulse * 10;
    cx.save();
    cx.globalAlpha = 0.18 + pulse * 0.55;
    cx.fillStyle = lit ? color : 'rgba(255,255,255,0.15)';
    cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2);
    cx.fill();
    cx.globalAlpha = lit ? (0.7 + pulse * 0.3) : 0.35;
    cx.fillStyle = lit ? color : 'rgba(255,255,255,0.5)';
    cx.beginPath(); cx.arc(x, y, 14, 0, Math.PI * 2);
    cx.fill();
    cx.restore();
  }

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Advance show phase timer
    if (phase === 'show') {
      showTimer += dt * 16.667;
      var beatDur = BEAT_MS;
      var beat = Math.floor(showTimer / beatDur);
      if (beat !== showBeat) {
        showBeat = beat;
        if (showBeat < pattern.length) {
          // lit!
          leftPulse = 1;
          if (window.J) J.hit(showBeat + 1);
          beatVisTimer = 0;
        }
        if (showBeat >= pattern.length) {
          onBeatShown();
          playPhaseStart = now;
          demoPendingTap = null;
          botPendingTap = null;
        }
      }
      if (showBeat < pattern.length) {
        beatVisTimer += dt * 16.667;
      }
    }

    // Autopilot
    if (hitStop > 0) { hitStop -= dt; }
    else { autopilot(now); }

    // Decay pulses
    leftPulse  = Math.max(0, leftPulse  - dt * 0.06);
    rightPulse = Math.max(0, rightPulse - dt * 0.06);

    // ── JUICE TRANSFORMS ──
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // BG
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ── TITLE ──
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('RHYTHM MIRROR', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('WATCH LEFT — MIRROR RIGHT', W / 2, 300);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 350);
      cx.globalAlpha = 1;
    }

    // ── CHALLENGE CARD ──
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD; cx.font = '900 104px -apple-system, Helvetica, Arial';
      cx.fillText('7', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's longest mirror", W / 2, 432);
    }

    // ── SHOW & PLAY PHASES ──
    if (phase === 'show' || phase === 'play' || phase === 'over' || phase === 'transition') {
      // Labels
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '700 11px Menlo, monospace';
      cx.fillText('PATTERN', W / 4, 190);
      cx.fillStyle = phase === 'play' ? TEAL : 'rgba(255,255,255,0.35)';
      cx.fillText('YOUR TURN', W * 3 / 4, 190);

      drawDivider();

      // Pattern progress dots (top area)
      var dotY = 225;
      var spacing = Math.min(44, (W - 60) / (Math.max(patternLen, 2) + 1));
      var totalW = (patternLen - 1) * spacing;
      var startX = W / 2 - totalW / 2;

      for (var i = 0; i < patternLen; i++) {
        var dotX = startX + i * spacing;
        var isShown = phase === 'show' ? (i < showBeat) : true;
        var isPlayer = phase === 'play' ? (i < playerIdx) : false;
        var isDone = isPlayer || (phase !== 'show' && phase !== 'play');

        cx.globalAlpha = isDone ? 1 : (isShown ? 0.85 : 0.25);
        cx.fillStyle = isDone ? GOLD : (isShown ? TEAL : 'rgba(255,255,255,0.4)');
        cx.beginPath(); cx.arc(dotX, dotY, 6, 0, Math.PI * 2); cx.fill();
        cx.globalAlpha = 1;
      }

      // Beat tiles — left side shows pattern, right side is player zone
      var tileY = 290;
      var tileH = 280;
      var tileW = W / 2 - 20;

      // LEFT side: lit during show
      var leftLit = (phase === 'show' && showBeat < pattern.length && leftPulse > 0.3);
      cx.save();
      cx.globalAlpha = 0.08 + leftPulse * 0.25;
      cx.fillStyle = TEAL;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(14, tileY, tileW, tileH, 12);
      else cx.rect(14, tileY, tileW, tileH);
      cx.fill();
      cx.globalAlpha = 1;
      cx.restore();

      // Left tile border
      cx.strokeStyle = leftLit ? TEAL : 'rgba(255,255,255,0.1)';
      cx.lineWidth = leftLit ? 2.5 : 1;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(14, tileY, tileW, tileH, 12);
      else cx.rect(14, tileY, tileW, tileH);
      cx.stroke();

      // Left beat indicator dot
      drawBeatDot(W / 4, tileY + tileH / 2, leftLit, TEAL, leftPulse);

      // Beat number label on left
      if (phase === 'show' && showBeat < pattern.length) {
        cx.textAlign = 'center';
        cx.fillStyle = TEAL; cx.globalAlpha = leftPulse;
        cx.font = '900 28px -apple-system, Helvetica, Arial';
        cx.fillText((showBeat + 1), W / 4, tileY + tileH / 2 + 60);
        cx.globalAlpha = 1;
      }

      // RIGHT side: player tap zone
      var rightLit = (phase === 'play' && rightPulse > 0.3);
      cx.save();
      cx.globalAlpha = 0.08 + rightPulse * 0.28;
      cx.fillStyle = VERM;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(W / 2 + 6, tileY, tileW, tileH, 12);
      else cx.rect(W / 2 + 6, tileY, tileW, tileH);
      cx.fill();
      cx.globalAlpha = 1;
      cx.restore();

      // Right tile border
      var rightActive = phase === 'play';
      cx.strokeStyle = rightLit ? VERM : (rightActive ? 'rgba(232,80,46,0.45)' : 'rgba(255,255,255,0.1)');
      cx.lineWidth = rightLit ? 2.5 : (rightActive ? 1.5 : 1);
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(W / 2 + 6, tileY, tileW, tileH, 12);
      else cx.rect(W / 2 + 6, tileY, tileW, tileH);
      cx.stroke();

      // Right beat dot
      drawBeatDot(W * 3 / 4, tileY + tileH / 2, rightLit, VERM, rightPulse);

      // "TAP!" prompt during play
      if (phase === 'play' && playerIdx < pattern.length) {
        var elapsed2 = now - playPhaseStart;
        var beatPos2 = playerIdx * BEAT_MS;
        var beatPulse = Math.max(0, 1 - Math.abs(elapsed2 - beatPos2) / (BEAT_MS * 0.7));
        var pp = 0.5 + 0.5 * Math.sin(now / 180);
        cx.textAlign = 'center';
        cx.globalAlpha = 0.5 + beatPulse * 0.5;
        cx.fillStyle = VERM; cx.font = '900 24px -apple-system, Helvetica, Arial';
        cx.fillText('TAP', W * 3 / 4, tileY + tileH / 2 + 60);
        cx.globalAlpha = 1;
      }

      // Score display
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '800 58px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 92);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + bestScore, W / 2, 116);

      // Round label
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 12px Menlo, monospace';
      cx.fillText('ROUND ' + patternLen, W / 2, 150);

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 136);
      }

      // Pattern timing bar (below tiles)
      if (phase === 'show' || phase === 'play') {
        var barY = tileY + tileH + 22;
        var barW = W - 60;
        var barX = 30;
        var totalBeats = patternLen;
        var prog = phase === 'show' ? (showTimer / (totalBeats * BEAT_MS)) : (playerIdx / totalBeats);
        prog = Math.min(1, Math.max(0, prog));

        cx.fillStyle = 'rgba(255,255,255,0.1)';
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(barX, barY, barW, 5, 2.5);
        else cx.rect(barX, barY, barW, 5);
        cx.fill();

        cx.fillStyle = phase === 'show' ? TEAL : VERM;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(barX, barY, barW * prog, 5, 2.5);
        else cx.rect(barX, barY, barW * prog, 5);
        cx.fill();
      }
    }

    // ── GAME OVER ──
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('BROKE THE MIRROR', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' beats', W / 2, 340);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 384);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 408);

      if (!DEMO && !BOT) {
        var pp2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = pp2;
        cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 458);
        cx.globalAlpha = 1;

        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ── DEMO CTA CARD ──
    if (phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.0);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('RHYTHM MIRROR', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('they hit ' + (window.__demoScore || 7) + '. match the mirror.', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 7), W / 2, 406);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // ── FLASHES ──
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / FLASH_DUR);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 248 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > FLASH_DUR) flashes.splice(k, 1);
    }

    // ── MUTE TOGGLE ──
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>

</html>
