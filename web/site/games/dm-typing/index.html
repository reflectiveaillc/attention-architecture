<body>

<script>window.LOOP_GAME = 'dm-typing';</script>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 70;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var BUBBLE_W = 152, BUBBLE_H = 58, DOT_R = 6;

  var state, messages, flashes, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var challengeAt = 0, ctaAt = 0, sendPulse = 0, failPulse = 0, challengeScore = 7;
  try { best = +localStorage.getItem('dt_best') || 0; } catch (_) {}

  function newGame() {
    state = {
      phase: 'title', score: 0, combo: 0,
      roundStart: 0, typingDur: 0, windowDur: 0, typingEnd: 0, windowEnd: 0,
      tapDone: false, msgText: '...'
    };
    messages = []; flashes = []; dareBeaten = false; sendPulse = 0; failPulse = 0;
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1200);
      return;
    }
    if (BOT) startRun();
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 6))));
  }

  function typingDuration() {
    var s = state.score;
    var shrink = Math.min(s * 55, 520);
    var min = 820 - shrink, max = 2300 - shrink;
    return min + rng() * (max - min);
  }

  function windowDuration() {
    return Math.max(200, 440 - state.score * 24);
  }

  function nextRound() {
    if (state.phase !== 'play') return;
    var now = performance.now();
    state.roundStart = now;
    state.typingDur = typingDuration();
    state.windowDur = windowDuration();
    state.typingEnd = now + state.typingDur;
    state.windowEnd = state.typingEnd + state.windowDur;
    state.tapDone = false;
    state.msgText = randomMsg();
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    nextRound();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function randomMsg() {
    var msgs = ['lol', 'ok', 'wait', 'no way', 'fr?', 'lmao', 'yes', 'haha', 'omg', 'bruh', 'bet', 'i see'];
    return msgs[Math.floor(rng() * msgs.length)];
  }

  function handleTap(now) {
    if (state.phase !== 'play' || state.tapDone) return;
    state.tapDone = true;
    if (now < state.typingEnd) { gameOver('early'); return; }
    if (now > state.windowEnd) { gameOver('late'); return; }

    var inWindow = now - state.typingEnd;
    var perfectWin = Math.min(150, state.windowDur * 0.42);
    var perfect = inWindow <= perfectWin;
    var near = inWindow >= state.windowDur - 90;
    state.score++;
    sendPulse = 1;

    if (perfect) {
      state.combo++;
      flash('PERFECT', TEAL, 46);
      hitStop = 4; zoom = 1.035;
      if (window.J && !DEMO && !BOT) J.perfect(state.combo);
    } else if (near) {
      state.combo = 0;
      flash('SO CLOSE', VERM, 40);
      shakeAmt = 4;
      if (window.J && !DEMO && !BOT) { J.near(); J.hit(state.score); }
      if (window.LOOP) LOOP.emit('near_miss', { n: state.score, ratio: +(inWindow / state.windowDur).toFixed(3) });
    } else {
      state.combo++;
      flash('+1', GOLD, 36);
      if (window.J && !DEMO && !BOT) J.hit(state.combo);
    }

    messages.unshift({ text: state.msgText, t: 0 });
    if (messages.length > 7) messages.pop();

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J && !DEMO && !BOT) J.fanfare();
      SHARE.beaten(state.score);
    }
    if (window.J && !DEMO && !BOT) J.tension(Math.min(state.score / 12, 1));
    if (window.LOOP) LOOP.emit('round_success', { n: state.score, perfect: perfect, near: near, combo: state.combo });

    setTimeout(nextRound, perfect ? 220 : 160);
  }

  function gameOver(reason) {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10; failPulse = 1;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J && !DEMO && !BOT) { J.death(Math.min(0.3 + state.score / 20, 1)); if (newBest) setTimeout(function () { J.fanfare(); }, 450); }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('dt_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1), reason: reason });

    if (DEMO) setTimeout(function () {
      state.phase = 'cta'; ctaAt = performance.now();
      setTimeout(function () { window.__demoDone = true; }, 3600);
    }, 2200);

    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) window.__botDone = true;
      else setTimeout(resetRun, 900);
    }
  }

  function resetRun() {
    state.score = 0; state.combo = 0; messages = []; sendPulse = 0; failPulse = 0; dareBeaten = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title' || state.phase === 'challenge') { startRun(); return; }
    if (state.phase === 'play' && !state.tapDone) { handleTap(performance.now()); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'msgs' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // demo script: ms offset from typingEnd. 'near' = edge of window (near-miss save).
  // 'miss' = tap before the window opens (too early). 7 successes → fail at score 7.
  var demoScript = [110, 70, 160, 90, 'near', 80, 120, 'miss'];
  var demoIdx = 0, botRunsDone = 0, botTarget = null;

  function autopilot() {
    if (state.phase !== 'play' || state.tapDone) return;
    var now = performance.now();
    if (DEMO) {
      if (demoIdx >= demoScript.length) return;
      var want = demoScript[demoIdx];
      var target;
      if (want === 'miss') target = state.typingEnd - 130;
      else if (want === 'near') target = state.windowEnd - 35;
      else target = state.typingEnd + want;
      if (now >= target) { handleTap(now); demoIdx++; }
    } else if (BOT) {
      if (botTarget === null) botTarget = gauss() * BOT_ERR;
      var target = state.typingEnd + state.windowDur / 2 + botTarget;
      if (now >= target) { botTarget = null; handleTap(now); }
    }
  }

  // ---- render helpers ----
  function roundRectPath(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    cx.beginPath();
    cx.moveTo(x + r, y);
    cx.arcTo(x + w, y, x + w, y + h, r);
    cx.arcTo(x + w, y + h, x, y + h, r);
    cx.arcTo(x, y + h, x, y, r);
    cx.arcTo(x, y, x + w, y, r);
    cx.closePath();
  }

  function drawBubble(x, y, w, h, r, fill, stroke) {
    cx.fillStyle = fill;
    if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = 1.5; }
    roundRectPath(x, y, w, h, r);
    cx.fill();
    if (stroke) cx.stroke();
  }

  function drawMessages() {
    for (var i = messages.length - 1; i >= 0; i--) {
      var m = messages[i];
      m.t += 1;
      var y = H - 188 - i * 52;
      if (y < 140) continue;
      var alpha = Math.max(0.35, 1 - m.t / 70);
      cx.globalAlpha = alpha;
      var tw = cx.measureText(m.text).width;
      var bw = Math.max(70, tw + 28);
      drawBubble(66, y, bw, 44, 22, '#1a1f28', 'rgba(255,255,255,0.10)');
      cx.fillStyle = '#fff';
      cx.textAlign = 'left';
      cx.font = '600 16px -apple-system, Helvetica, Arial';
      cx.fillText(m.text, 80, y + 28);
      cx.globalAlpha = 1;
    }
  }

  function activeBubbleY() { return H - 118; }

  function drawTypingBubble(now) {
    var bx = 66, by = activeBubbleY();
    drawBubble(bx, by, BUBBLE_W, BUBBLE_H, BUBBLE_H / 2, failPulse > 0.05 ? 'rgba(232,80,46,0.18)' : '#1a1f28', 'rgba(255,255,255,0.12)');

    // dots
    var inTyping = state.phase === 'play' && now < state.typingEnd;
    var settled = state.phase === 'play' && now >= state.typingEnd && now <= state.windowEnd;
    var bob = 0;
    if (state.phase === 'title') bob = Math.sin(now * 0.012) * 4;
    else if (inTyping) bob = Math.sin(now * 0.018) * 5;

    var dotBaseX = bx + 36, dotBaseY = by + 29;
    for (var i = 0; i < 3; i++) {
      var db = bob * (i === 1 ? 1 : 0.65) + Math.sin(now * 0.025 + i * 1.2) * 1.5;
      var dx = dotBaseX + i * 28;
      cx.beginPath();
      cx.arc(dx, dotBaseY + db, DOT_R, 0, Math.PI * 2);
      cx.fillStyle = settled ? GOLD : 'rgba(255,255,255,0.82)';
      if (settled) { cx.shadowColor = GOLD; cx.shadowBlur = 10; }
      cx.fill();
      cx.shadowBlur = 0;
    }

    // send / fail pulse ring
    if (sendPulse > 0.01) {
      cx.strokeStyle = 'rgba(46,197,182,' + sendPulse + ')';
      cx.lineWidth = 2;
      roundRectPath(bx - sendPulse * 10, by - sendPulse * 10, BUBBLE_W + sendPulse * 20, BUBBLE_H + sendPulse * 20, BUBBLE_H / 2 + sendPulse * 10);
      cx.stroke();
    }
    if (failPulse > 0.01) {
      cx.strokeStyle = 'rgba(232,80,46,' + failPulse + ')';
      cx.lineWidth = 2;
      roundRectPath(bx - failPulse * 12, by - failPulse * 12, BUBBLE_W + failPulse * 24, BUBBLE_H + failPulse * 24, BUBBLE_H / 2 + failPulse * 12);
      cx.stroke();
    }
  }

  function drawScore() {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 64px -apple-system, Helvetica, Arial';
    cx.fillText(state.score, W / 2, 96);
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('msgs  ·  BEST ' + best, W / 2, 120);
    if (state.combo > 1) {
      cx.fillStyle = TEAL;
      cx.font = '800 18px -apple-system, Helvetica, Arial';
      cx.fillText('×' + state.combo, W / 2, 150);
    }
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 176);
    }
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // decay pulses / messages age
    if (sendPulse > 0.01) sendPulse *= Math.pow(0.85, dt);
    if (failPulse > 0.01) failPulse *= Math.pow(0.85, dt);

    // hit-stop: freeze the sim on big hits, but always decay it
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play' && !state.tapDone) {
      if (now > state.windowEnd + 20) gameOver('late');
      else autopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // chat content
    drawMessages();
    drawTypingBubble(now);

    // score / combo / dare
    if (state.phase === 'play' || state.phase === 'over') drawScore();

    // flashes
    for (var f = flashes.length - 1; f >= 0; f--) {
      var fl = flashes[f]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(f, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('DM TYPING', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 15px -apple-system, Helvetica, Arial';
      cx.fillText('wait for the dots to stop. tap when it sends.', W / 2, 300);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO START', W / 2, 360); cx.globalAlpha = 1;
    }

    // challenge card
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(String(challengeScore), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('MISSED SEND.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' msgs', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        roundRectPath(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('DM TYPING', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they caught ' + (window.__demoScore || challengeScore) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || challengeScore), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
