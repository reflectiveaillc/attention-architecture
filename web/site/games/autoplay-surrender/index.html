      var t = Math.imul(a ^ a >>> 15, 1 | a);

    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 56px -apple-system, Helvetica, Arial';

    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('surrendered — best ' + best, W / 2, 122);

    // darkness vignette from edges
    if (state.dimLevel > 0.1) {
      var vig = cx.createRadialGradient(W/2, H/2, H * 0.1, W/2, H/2, H * 0.72);
      vig.addColorStop(0, 'rgba(11,13,18,0)');
      vig.addColorStop(1, 'rgba(11,13,18,' + (state.dimLevel * 0.6) + ')');
      cx.fillStyle = vig;
      cx.fillRect(0, 0, W, H);

  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    var label = state.stopped ? 'COULDN\'T HOLD.' : 'GONE DARK.';
    cx.fillStyle = state.stopped ? VERM : GOLD;
    cx.font = '900 38px -apple-system, Helvetica, Arial';
    cx.fillText(label, W / 2, 300);
    cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
    cx.fillText(state.surrendered + ' surrendered', W / 2, 344);
    var pt = pctTop(state.surrendered);
    cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 388);
    cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('held longer than ' + (100 - pt) + '% of players', W / 2, 412);
    if (!DEMO && !BOT) {
      var pulse = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — TRY AGAIN', W / 2, 456);
      cx.globalAlpha = 1;
      // share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  function drawCTA(now) {
    var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.80 * ease) + ')'; cx.fillRect(0, 0, W, H);
    cx.save();
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
    cx.fillText('AUTOPLAY', W / 2, 295);
    cx.fillStyle = VERM; cx.font = '900 42px -apple-system, Helvetica, Arial';
    cx.fillText('SURRENDER', W / 2, 343);
    cx.fillStyle = 'rgba(255,255,255,0.70)'; cx.font = '600 17px -apple-system, Helvetica, Arial';
    cx.fillText('he lasted ' + (window.__demoScore || 7) + '. can you hold longer?', W / 2, 382);
    var p3 = 0.7 + 0.3 * Math.sin(now / 240);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 28px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + (window.__demoScore || 7), W / 2, 432);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 462);
    cx.restore();
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
