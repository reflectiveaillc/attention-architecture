<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // Seeded RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  function tealA(a) { return 'rgba(46,197,182,' + a + ')'; }

  // --- Constants ---
  var TOTAL_CYCLES = 6;
  // tideCurrent: 0 = base (water at bottom ~18% of screen), 1 = max pulled (~75%)
  // EBB_RATE: linear speed of tide returning per frame (at dt=1, 60fps)
  var EBB_RATE = 0.012;   // tideCurrent units per frame — tide fully ebbs in ~83 frames (~1.4s)
  var RISE_LAG = 0.12;    // exponential follow speed when pulling (per frame)
  var PULL_THRESHOLD = 0.28;  // minimum pullRaw to count as a valid pull

  // --- State ---
  var phase;          // 'title' | 'play' | 'over' | 'cta'
  var cycles;
  var tideCurrent;    // 0..1 actual rendered tide level
  var tideTarget;     // 0..1 target (set by pull or 0 when releasing)
  var pullRaw;        // 0..1 raw pull depth from pointer/autopilot
  var cycleState;     // 'idle' | 'rising' | 'ebbing'
  var sessionDone;
  var runStartTs, overAt, ctaAt;
  var flashes, particles;

  // Juice
  var hitStop = 0, zoom = 1, shakeAmt = 0;

  // Human input
  var pointerDown = false, pullStartY = 0, pointerY = 0;

  // Bot state
  var botRunsDone = 0;
  var botTimer = 0;       // frames until next action
  var botState;           // 'waiting' | 'rising' | 'ebbing'
  var botPullGoal = 0;    // target tide for this bot pull

  // Demo state
  var demoElapsed = 0;    // seconds elapsed in demo
  var demoStep = 0;       // current step index in DEMO_PLAN
  var demoHeld = false;   // demo is in a 'pull held' phase

  // Demo plan: [startSec, endSec, 'pull'|'release']
  // 6 cycles over ~18s — settle → deepen → resolve
  var DEMO_PLAN = [
    [0.5,  2.2,  'pull'],    // cycle 1 — tentative
    [2.5,  3.8,  'release'],
    [4.2,  5.7,  'pull'],    // cycle 2
    [6.0,  7.2,  'release'],
    [7.6,  9.0,  'pull'],    // cycle 3
    [9.2, 10.3,  'release'],
    [10.6, 11.8, 'pull'],    // cycle 4
    [12.0, 13.1, 'release'],
    [13.3, 14.5, 'pull'],    // cycle 5
    [14.7, 15.7, 'release'],
    [16.0, 17.2, 'pull'],    // cycle 6 — resolve
    [17.4, 18.6, 'release']
  ];

  // Mute region
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // --- Init ---
  function newGame() {
    phase        = (DEMO || BOT) ? 'play' : 'title';
    cycles       = 0;
    tideCurrent  = 0;
    tideTarget   = 0;
    pullRaw      = 0;
    cycleState   = 'idle';
    sessionDone  = false;
    flashes      = [];
    particles    = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    pointerDown  = false; pullStartY = 0; pointerY = 0;
    botState = 'waiting'; botTimer = 40 + rng() * 30; botPullGoal = 0;
    demoElapsed = 0; demoStep = 0; demoHeld = false;
    if (DEMO || BOT) startRun();
  }

  function startRun() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function completeCycle() {
    if (sessionDone) return;
    cycles++;
    if (window.J) J.calm(cycles);
    hitStop = 22;
    zoom = 1.016;
    flash('WAVE ' + cycles, TEAL, 30);
    spawnFoam(W / 2, tideWorldY(), 10);
    if (window.LOOP) LOOP.emit('tide_cycle', { n: cycles });
    if (cycles >= TOTAL_CYCLES) {
      sessionDone = true;
      setTimeout(gameOver, 900);
    }
  }

  function gameOver() {
    phase  = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.calm(TOTAL_CYCLES);
    if (DEMO) window.__demoScore = cycles;
    if (window.LOOP) LOOP.emit('game_over', { score: cycles, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(resetRun, 500);
      }
    }
  }

  function resetRun() {
    cycles = 0; tideCurrent = 0; tideTarget = 0; pullRaw = 0;
    cycleState = 'idle'; sessionDone = false;
    flashes = []; particles = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    pointerDown = false; pullStartY = 0; pointerY = 0;
    botState = 'waiting'; botTimer = 30 + rng() * 30; botPullGoal = 0;
    demoElapsed = 0; demoStep = 0; demoHeld = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  function spawnFoam(x, y, n) {
    for (var i = 0; i < n; i++) {
      particles.push({
        x: x + (rng() - 0.5) * 70,
        y: y + (rng() - 0.5) * 8,
        vx: (rng() - 0.5) * 1.4,
        vy: -(rng() * 0.9 + 0.2),
        r: 2 + rng() * 3,
        a: 0.65, life: 0, maxLife: 50
      });
    }
  }

  // Y position of tide surface (screen pixels from top)
  function tideWorldY() {
    var frac = 0.18 + (0.75 - 0.18) * tideCurrent;
    return H - H * frac;
  }

  // --- Human input ---
  function humanDown(ey) {
    if (DEMO || BOT) return;
    pointerDown = true;
    pullStartY  = ey;
    pointerY    = ey;
    if (cycleState === 'idle') {
      cycleState = 'rising';
    }
  }

  function humanMove(ey) {
    if (DEMO || BOT || !pointerDown || phase !== 'play') return;
    pointerY = ey;
    var dy = ey - pullStartY;
    if (dy < 0) dy = 0;
    pullRaw = Math.min(1, dy / (H * 0.45));
  }

  function humanUp() {
    if (!pointerDown) return;
    pointerDown = false;
    if (phase !== 'play') return;
    if (cycleState === 'rising') {
      if (pullRaw >= PULL_THRESHOLD) {
        cycleState = 'ebbing';
        tideTarget = 0;
      } else {
        // Too shallow — reset
        cycleState = 'idle';
        tideTarget = 0;
      }
    }
    pullRaw = 0;
  }

  cv.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    var ex = (e.clientX - r.left) / scale, ey = (e.clientY - r.top) / scale;
    if (DEMO || BOT) return;
    if (inR(MUTE_R, ex, ey) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) { resetRun(); return; }
    if (phase === 'play') humanDown(ey);
  });
  cv.addEventListener('pointermove', function (e) {
    if (!pointerDown) return;
    var r = cv.getBoundingClientRect();
    humanMove((e.clientY - r.top) / scale);
  });
  cv.addEventListener('pointerup',     humanUp);
  cv.addEventListener('pointercancel', humanUp);

  // --- Bot autopilot ---
  // Runs TOTAL_CYCLES pull-release cycles then waits for gameOver.
  // Imperfect: variable pull depth and hold time per cycle.
  function botAutopilot(dt) {
    if (phase !== 'play') return;
    if (sessionDone) return;  // wait for setTimeout(gameOver)
    if (cycles >= TOTAL_CYCLES) return;

    botTimer -= dt;

    if (botState === 'waiting') {
      if (botTimer <= 0) {
        // Start a pull
        botState    = 'rising';
        botPullGoal = 0.55 + rng() * 0.35;
        cycleState  = 'rising';
        tideTarget  = botPullGoal;
      }
      return;
    }

    if (botState === 'rising') {
      // Wait until tideCurrent reaches ~90% of goal
      if (tideCurrent >= botPullGoal * 0.90) {
        // Hold briefly, then release
        botState  = 'holding';
        botTimer  = 15 + rng() * 20;
      }
      return;
    }

    if (botState === 'holding') {
      if (botTimer <= 0) {
        // Release: trigger ebb
        botState   = 'ebbing';
        cycleState = 'ebbing';
        tideTarget = 0;
        pullRaw    = 0;
      }
      return;
    }

    if (botState === 'ebbing') {
      // Wait for ebb to complete (completeCycle sets cycleState='idle')
      if (cycleState === 'idle') {
        botState  = 'waiting';
        botTimer  = 20 + rng() * 25;
      }
      return;
    }
  }

  // --- Demo autopilot ---
  // Drive pull-release cycles at scripted times.
  function demoAutopilot(dt) {
    if (phase !== 'play') return;
    demoElapsed += dt / 60;

    if (demoStep >= DEMO_PLAN.length) return;

    var seg = DEMO_PLAN[demoStep];
    var segStart = seg[0], segEnd = seg[1], segAct = seg[2];

    if (demoElapsed < segStart) return;  // wait

    if (demoElapsed >= segEnd) {
      // Force-complete segment
      if (segAct === 'pull' && cycleState === 'rising') {
        // Make sure it's high enough
        tideTarget = 0.70;
        tideCurrent = Math.max(tideCurrent, 0.65);
      } else if (segAct === 'release') {
        if (cycleState === 'rising') {
          // Trigger ebb if we pulled enough
          if (tideCurrent >= PULL_THRESHOLD) {
            cycleState = 'ebbing';
            tideTarget = 0;
          } else {
            cycleState = 'idle';
            tideTarget = 0;
          }
          demoHeld = false;
        }
      }
      demoStep++;
      return;
    }

    // Within segment
    var frac = (demoElapsed - segStart) / (segEnd - segStart);

    if (segAct === 'pull') {
      if (!demoHeld) {
        demoHeld   = true;
        if (cycleState === 'idle') {
          cycleState = 'rising';
        }
      }
      // Ease the pull target up — deeper each cycle
      var pullGoal = 0.50 + (demoStep / 2) * 0.06;  // increases each pull segment
      if (pullGoal > 0.88) pullGoal = 0.88;
      var ease = frac * frac * (3 - 2 * frac);  // smoothstep
      tideTarget = pullGoal * ease;
    } else if (segAct === 'release') {
      if (demoHeld) {
        demoHeld   = false;
        if (cycleState === 'rising' && tideCurrent >= PULL_THRESHOLD) {
          cycleState = 'ebbing';
          tideTarget = 0;
        } else {
          cycleState = 'idle';
          tideTarget = 0;
        }
      }
    }
  }

  // --- Tide update (physics, every frame) ---
  function updateTide(dt) {
    if (phase !== 'play') return;

    if (cycleState === 'rising') {
      // When rising, follow tideTarget with smooth lag
      // For human: tideTarget = pullRaw (updated every frame by humanMove)
      // For bot/demo: tideTarget set by autopilot
      if (!DEMO && !BOT) {
        // Human: update tideTarget from pullRaw each frame
        tideTarget = (cycleState === 'rising') ? pullRaw : 0;
      }
      // Exponential follow toward tideTarget
      var diff = tideTarget - tideCurrent;
      tideCurrent += diff * RISE_LAG * dt;
      if (tideCurrent < 0) tideCurrent = 0;
      if (tideCurrent > 1) tideCurrent = 1;
    } else if (cycleState === 'ebbing') {
      // Linear ebb toward 0
      tideCurrent -= EBB_RATE * dt;
      if (tideCurrent <= 0) {
        // Ebb complete — cycle done
        tideCurrent = 0;
        tideTarget  = 0;
        cycleState  = 'idle';
        completeCycle();
      }
    } else {
      // Idle — gentle drift toward 0
      if (tideCurrent > 0.001) {
        tideCurrent -= 0.003 * dt;
        if (tideCurrent < 0) tideCurrent = 0;
      }
    }
  }

  // --- Render loop ---
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Autopilots (before tide update so they set tideTarget)
    if (DEMO) demoAutopilot(dt);
    if (BOT)  botAutopilot(dt);

    // Update tide — human pullRaw → tideTarget happens inside updateTide for human
    if (!DEMO && !BOT && phase === 'play' && cycleState === 'rising') {
      tideTarget = pullRaw;
    }
    updateTide(dt);

    // Juice decay — ALWAYS decay hitStop first, then run other logic
    if (hitStop > 0) {
      hitStop -= dt;
    }
    zoom     += (1 - zoom) * 0.10 * dt;
    shakeAmt *= Math.pow(0.88, dt);

    // Particle update
    for (var pi = particles.length - 1; pi >= 0; pi--) {
      var p = particles[pi];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 0.05 * dt;
      p.life += dt;
      p.a = Math.max(0, 0.65 * (1 - p.life / p.maxLife));
      if (p.life >= p.maxLife) particles.splice(pi, 1);
    }

    // Draw — wrap in save/restore for juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shakeAmt;
      var sy = (rng() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    // Sky glow deepens as tide rises
    var skyA = 0.04 + tideCurrent * 0.18;
    var bg = cx.createLinearGradient(0, 0, 0, H * 0.6);
    bg.addColorStop(0, 'rgba(15,50,80,' + skyA.toFixed(3) + ')');
    bg.addColorStop(1, 'rgba(11,13,18,0)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    if (phase === 'title') {
      drawTitle(now);
    } else if (phase === 'play') {
      drawOcean(now);
      drawHUD(now);
      drawHint(now);
    } else if (phase === 'over') {
      drawOcean(now);
      drawHUD(now);
      drawOver(now);
    } else if (phase === 'cta') {
      drawOcean(now);
      drawCtaCard(now);
    }

    // Floating texts (always on top)
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 52);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '700 ' + fl.size + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 90 - fl.t * 1.1);
      cx.globalAlpha = 1;
      if (fl.t > 52) flashes.splice(k, 1);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // --- Draw helpers ---

  function drawOcean(now) {
    var ty = tideWorldY();
    var t  = tideCurrent;
    var el = now / 1000;

    // Three wave layers
    var layers = [
      { amp: 5 + t * 11, freq: 0.018, speed: 0.75,  alphaTop: 0.26, alphaBot: 0.52, yOff: 0 },
      { amp: 3 + t * 7,  freq: 0.026, speed: -0.50, alphaTop: 0.14, alphaBot: 0.34, yOff: 9 },
      { amp: 2 + t * 4,  freq: 0.036, speed: 0.95,  alphaTop: 0.07, alphaBot: 0.18, yOff: 16 }
    ];

    for (var li = 0; li < layers.length; li++) {
      var lyr = layers[li];
      var wty = ty + lyr.yOff;
      cx.beginPath();
      cx.moveTo(0, H);
      cx.lineTo(0, wty);
      for (var wx = 0; wx <= W + 4; wx += 4) {
        cx.lineTo(wx, wty + Math.sin(wx * lyr.freq + el * lyr.speed) * lyr.amp);
      }
      cx.lineTo(W, H);
      cx.closePath();
      var wg = cx.createLinearGradient(0, wty, 0, H);
      wg.addColorStop(0, tealA(lyr.alphaTop));
      wg.addColorStop(0.45, 'rgba(20,90,110,' + lyr.alphaBot + ')');
      wg.addColorStop(1,    'rgba(10,28,55,0.65)');
      cx.fillStyle = wg;
      cx.fill();
    }

    // Shimmer line at surface
    cx.beginPath();
    cx.moveTo(0, ty);
    for (var sx = 0; sx <= W + 3; sx += 3) {
      cx.lineTo(sx, ty + Math.sin(sx * 0.020 + el * 1.3) * (4 + t * 9));
    }
    cx.strokeStyle = tealA(0.45 + t * 0.35);
    cx.lineWidth = 1.5;
    cx.stroke();

    // Foam particles
    for (var pi = 0; pi < particles.length; pi++) {
      var p = particles[pi];
      if (p.a <= 0) continue;
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
      cx.fillStyle = tealA(p.a);
      cx.fill();
    }
  }

  function drawHUD(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.72)';
    cx.font = '700 54px -apple-system, Helvetica, Arial';
    cx.fillText(cycles, W / 2, 90);
    cx.fillStyle = 'rgba(255,255,255,0.28)';
    cx.font = '500 12px -apple-system, Helvetica, Arial';
    cx.fillText('of ' + TOTAL_CYCLES + ' tides', W / 2, 112);

    // Cycle progress dots
    var dotSpacing = 18;
    var totalDW = (TOTAL_CYCLES - 1) * dotSpacing;
    var dotStartX = W / 2 - totalDW / 2;
    for (var i = 0; i < TOTAL_CYCLES; i++) {
      cx.beginPath();
      cx.arc(dotStartX + i * dotSpacing, 130, 4, 0, 2 * Math.PI);
      cx.fillStyle = (i < cycles) ? TEAL : tealA(0.20);
      cx.fill();
    }
  }

  function drawHint(now) {
    if (cycleState !== 'idle' || sessionDone) return;
    var pulse = 0.4 + 0.4 * Math.sin(now / 720);
    var ty = tideWorldY();
    cx.globalAlpha = pulse;
    cx.textAlign = 'center';
    cx.fillStyle = tealA(0.85);
    cx.font = '500 14px -apple-system, Helvetica, Arial';
    cx.fillText(cycles > 0 ? 'pull again' : 'drag down', W / 2, ty - 36);
    cx.fillText('↓', W / 2, ty - 18);
    cx.globalAlpha = 1;
  }

  function drawTitle(now) {
    // Animated idle tide
    var fakeTide = 0.18 + 0.06 * Math.sin(now / 2400);
    var fy = H - H * fakeTide;
    cx.beginPath();
    cx.moveTo(0, H); cx.lineTo(0, fy);
    for (var wx = 0; wx <= W; wx += 4) {
      cx.lineTo(wx, fy + Math.sin(wx * 0.020 + now / 1100) * 5);
    }
    cx.lineTo(W, H); cx.closePath();
    var wg = cx.createLinearGradient(0, fy, 0, H);
    wg.addColorStop(0, tealA(0.16));
    wg.addColorStop(1, 'rgba(10,28,55,0.40)');
    cx.fillStyle = wg; cx.fill();

    cx.textAlign = 'center';
    cx.fillStyle = tealA(0.5);
    cx.font = '300 12px -apple-system, Helvetica, Arial';
    cx.fillText('TIDE PULL', W / 2, 118);

    cx.fillStyle = '#fff'; cx.font = '800 38px -apple-system, Helvetica, Arial';
    cx.fillText('six slow tides', W / 2, H / 2 - 18);
    cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '400 16px -apple-system, Helvetica, Arial';
    cx.fillText('pull, let go, breathe', W / 2, H / 2 + 18);

    var pulse = 0.5 + 0.5 * Math.sin(now / 680);
    cx.globalAlpha = 0.55 + 0.25 * pulse;
    cx.fillStyle = TEAL; cx.font = '600 14px -apple-system, Helvetica, Arial';
    cx.fillText('drag down to begin', W / 2, H / 2 + 62);
    cx.globalAlpha = 1;
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.65)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = TEAL; cx.font = '700 40px -apple-system, Helvetica, Arial';
    cx.fillText('settled.', W / 2, 295);
    cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '600 18px -apple-system, Helvetica, Arial';
    cx.fillText('six tides, one shore', W / 2, 338);
    cx.fillStyle = tealA(0.5); cx.font = '400 14px -apple-system, Helvetica, Arial';
    cx.fillText('the water remembers', W / 2, 368);
    if (!DEMO && !BOT) {
      var pulse = 0.5 + 0.3 * Math.sin(now / 640);
      cx.globalAlpha = pulse;
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('pull to go again', W / 2, 428);
      cx.globalAlpha = 1;
    }
  }

  function drawCtaCard(now) {
    var t  = (now - ctaAt) / 1000;
    var ease = Math.min(1, t * 2.0);
    cx.fillStyle = 'rgba(11,13,18,' + (0.80 * ease).toFixed(3) + ')';
    cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    cx.fillStyle = tealA(0.55); cx.font = '300 12px -apple-system, Helvetica, Arial';
    cx.fillText('TIDE PULL', W / 2, 272);
    cx.fillStyle = '#fff'; cx.font = '700 34px -apple-system, Helvetica, Arial';
    cx.fillText('six tides. one breath.', W / 2, 322);
    cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '400 16px -apple-system, Helvetica, Arial';
    cx.fillText('your thumb already knows the move.', W / 2, 360);
    var p2 = 0.75 + 0.25 * Math.sin(now / 520);
    cx.fillStyle = TEAL; cx.globalAlpha = ease * p2;
    cx.font = '700 20px -apple-system, Helvetica, Arial';
    cx.fillText('▶ REACH IT', W / 2, 420);
    cx.globalAlpha = ease;
    cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '400 13px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 450);
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
