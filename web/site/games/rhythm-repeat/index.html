<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rhythm Repeat — Tilt</title>
<!--
  LOOP / attention-architecture — Rhythm Repeat
  Circuits: 01-rpe (variable reward per pattern), 06-zeigarnik (one more round), 07-timing.
  Mechanic: watch a tap-rhythm pattern play as pulses; replay it by tapping in time.
            Pattern grows each round. Miss by >100ms and the streak ends.
  Modes:
    ?demo=1&seed=7   mirror-neuron clip: challenge card → human-feeling play
                     → near-fail/recovery at ~60% → real fail → score card → CTA
                     → sets window.__demoDone
    ?bot=1&runs=N    imperfect autoplay, N runs, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'rhythm-repeat';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';

  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO     = qs.get('demo') === '1';
  var BOT      = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED     = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- constants ----
  var BEAT_MS      = 400;    // base inter-beat interval used for pattern playback
  var HIT_WINDOW   = 100;    // ±ms tolerance for a tap to count as on-beat
  var START_LEN    = 3;      // taps in round 1
  var MAX_LEN      = 10;     // hard cap

  // ---- state ----
  var phase;       // 'title' | 'challenge' | 'show' | 'wait' | 'input' | 'over' | 'cta'
  var pattern;     // array of timestamps (ms into the pattern sequence) to replicate
  var roundLen;
  var showIdx;     // which beat we're currently flashing during 'show'
  var showStart;   // performance.now() when show phase started
  var inputIdx;    // which beat the player is on during 'input'
  var inputStart;  // when the input phase started
  var score, combo, round;
  var flashes, particles;
  var hitStop, zoom, shakeAmt;
  var overAt, ctaAt, challengeAt, waitStart;
  var runStartTs, dareBeaten, best;
  var botRunsDone, botActionsDone;

  best = 0;
  try { best = +localStorage.getItem('rr_best') || 0; } catch (_) {}

  // ---- input regions ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // ---- pattern generation ----
  // Gaps between beats are 1× or 2× BEAT_MS, seeded, so each run is deterministic
  function genPattern(len) {
    var pat = [];
    var t = 0;
    for (var i = 0; i < len; i++) {
      pat.push(t);
      var gap = rng() < 0.4 ? BEAT_MS * 2 : BEAT_MS;
      t += gap;
    }
    return pat;
  }

  // ---- flash / particles ----
  function flash(txt, color, size, x, y) {
    flashes.push({ txt: txt, color: color, size: size, t: 0,
                   x: x !== undefined ? x : W / 2,
                   y: y !== undefined ? y : 260 });
  }
  function spawnParticles(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var a = rng() * Math.PI * 2, sp = 2 + rng() * 5;
      particles.push({ x: x, y: y,
                       vx: Math.cos(a) * sp,
                       vy: Math.sin(a) * sp - 2,
                       color: color, life: 1 });
    }
  }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 8))));
  }

  // ---- game lifecycle ----
  function newGame() {
    phase = DEMO ? 'challenge' : (BOT ? 'show' : 'title');
    roundLen = START_LEN; round = 0; score = 0; combo = 0;
    showIdx = 0; showStart = 0; inputIdx = 0; inputStart = 0;
    flashes = []; particles = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    overAt = 0; ctaAt = 0; challengeAt = 0; waitStart = 0;
    dareBeaten = false; botRunsDone = 0; botActionsDone = 0;
    runStartTs = Date.now();

    if (DEMO) {
      challengeAt = performance.now();
      setTimeout(function () { beginShowPhase(); }, 1250);
    } else if (BOT) {
      beginShowPhase();
    }
  }

  function beginShowPhase() {
    pattern = genPattern(roundLen);
    showIdx = 0;
    showStart = performance.now();
    phase = 'show';
    if (round === 0 && window.LOOP) { LOOP.emit('play_start', { seed: SEED }); }
  }

  // After show phase ends, brief pause then player inputs
  function beginInputPhase() {
    phase = 'wait';
    waitStart = performance.now();
    // 600ms pause so the player gets ready
    setTimeout(function () {
      if (phase !== 'wait') return;
      inputIdx = 0;
      inputStart = performance.now();
      phase = 'input';
      if (window.J) { J.tension(Math.min(round / 8, 1)); }
    }, 600);
  }

  function registerTap(nowMs) {
    if (phase !== 'input') return;
    var expected = pattern[inputIdx];
    var elapsed  = (nowMs !== undefined ? nowMs : performance.now()) - inputStart;
    var diff = Math.abs(elapsed - expected);
    var isPerfect = diff <= 30;
    var isGood    = diff <= HIT_WINDOW;

    if (isPerfect) {
      combo++;
      var pts = 10 + combo;
      score += pts;
      hitStop = 4; zoom = 1.03;
      flash('PERFECT', TEAL, 32 + Math.min(combo * 2, 14),
            W / 2 + (rng() - 0.5) * 80, 340);
      flash('+' + pts, 'rgba(255,255,255,0.9)', 18,
            W / 2 + (rng() - 0.5) * 50, 310);
      spawnParticles(W / 2, H / 2 + 30, TEAL, 8);
      if (window.J) { J.perfect(combo); }
      if (window.LOOP) { LOOP.emit('beat_hit', { beat: inputIdx, diff: diff, quality: 'perfect', score: score }); }
    } else if (isGood) {
      combo++;
      var pts2 = 5 + Math.floor(combo / 2);
      score += pts2;
      flash('GOOD', GOLD, 26, W / 2 + (rng() - 0.5) * 60, 340);
      flash('+' + pts2, 'rgba(255,255,255,0.8)', 16,
            W / 2 + (rng() - 0.5) * 40, 312);
      spawnParticles(W / 2, H / 2 + 40, GOLD, 4);
      if (window.J) { J.hit(combo); }
      if (window.LOOP) { LOOP.emit('beat_hit', { beat: inputIdx, diff: diff, quality: 'good', score: score }); }
    } else {
      // miss — off by more than HIT_WINDOW
      var isNear = diff <= HIT_WINDOW * 2.5;
      if (isNear) {
        flash('SO CLOSE', VERM, 24, W / 2, 340);
        shakeAmt = 4;
        if (window.J) { J.near(); }
        if (window.LOOP) { LOOP.emit('near_miss', { beat: inputIdx, diff: diff }); }
      } else {
        flash('MISS', VERM, 28, W / 2, 340);
        shakeAmt = 6;
        if (window.J) { J.near(); }
      }
      // streak ends immediately on a miss
      gameOver();
      return;
    }

    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 36);
      if (window.J) { J.fanfare(); }
      if (window.SHARE) { SHARE.beaten(score); }
    }

    inputIdx++;
    if (inputIdx >= pattern.length) {
      // completed the round
      round++;
      if (window.J) { J.gold(); }
      flash('ROUND ' + round + ' CLEAR', GOLD, 30, W / 2, 280);
      roundLen = Math.min(roundLen + 1, MAX_LEN);
      // brief celebration pause then next round
      setTimeout(function () {
        if (phase === 'input' || phase === 'wait') { beginShowPhase(); }
      }, 900);
      phase = 'wait'; // prevent further taps until show
    }
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = score > best;
    if (window.J) {
      J.death(Math.min(0.3 + score / 40, 1));
      if (newBest) { setTimeout(function () { J.fanfare(); }, 450); }
    }
    if (DEMO) { window.__demoScore = score; }
    if (newBest) {
      best = score;
      try { localStorage.setItem('rr_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) { LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) }); }

    if (DEMO) {
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 900);
      }
    }
  }

  function resetRun() {
    roundLen = START_LEN; round = 0; score = 0; combo = 0;
    showIdx = 0; showStart = 0; inputIdx = 0; inputStart = 0;
    flashes = []; particles = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    overAt = 0; dareBeaten = false; botActionsDone = 0;
    runStartTs = Date.now();
    if (window.LOOP) { LOOP.emit('restart', {}); }
    beginShowPhase();
  }

  // ---- demo autopilot ----
  // Mirror-neuron arc:
  //   round 1: solid hits
  //   round 2: good hits (some GOOD, not all PERFECT)
  //   ~60% in (round 3 start): near-fail (one beat off) → quick recovery
  //   real fail shortly after in round 3
  // demoScript: per-beat offsets from expected time (ms). 'fail' = intentional miss.
  var demoRounds = [
    // round 1 (len=3): steady, with slight timing imperfection
    [  8, -12,  15 ],
    // round 2 (len=4): slight hesitation on beat 3
    [  5,  -8,  60, -10 ],   // beat 2 is 60ms late → GOOD but not PERFECT
    // round 3 (len=5): near-fail on beat 3 (145ms off → miss → triggers end)
    [  10,  -6, 145, 18, 5 ]
  ];
  var demoRoundIdx = 0;
  var demoBeatIdx  = 0;
  var demoScheduled = false;

  function scheduleDemoTap() {
    if (!DEMO || phase !== 'input' || demoScheduled) return;
    if (demoRoundIdx >= demoRounds.length) { return; }
    var offsets = demoRounds[demoRoundIdx];
    if (demoBeatIdx >= offsets.length) { return; }
    var expected = pattern[demoBeatIdx];
    var offset   = offsets[demoBeatIdx];
    // pick time relative to inputStart
    var fireAt   = expected + offset;
    var now      = performance.now();
    var delay    = (inputStart + fireAt) - now;
    if (delay < 0) delay = 5;
    demoScheduled = true;
    setTimeout(function () {
      demoScheduled = false;
      if (phase !== 'input') return;
      var tapNow = performance.now() - inputStart;
      // simulate the tap at the intended time
      var fakeNow = inputStart + fireAt;
      registerTap(fakeNow);
      if (phase === 'input') { demoBeatIdx++; scheduleDemoTap(); }
      else if (phase === 'wait') {
        // advanced to next round
        demoRoundIdx++;
        demoBeatIdx = 0;
      }
    }, Math.max(5, delay));
  }

  // ---- bot autopilot ----
  // Bot plays patterns with gaussian jitter; after BOT_RUNS completes __botDone
  // Bot intentionally misses on the last beat of each run to trigger game_over
  var botScheduled = false;
  var botBeatIdx   = 0;
  var botRunBeatCount = 0; // total beats tapped this run
  var BOT_FAIL_AFTER = 6; // fail after this many successful beats per run

  function scheduleBotTap() {
    if (!BOT || phase !== 'input' || botScheduled) return;
    var expected = pattern[inputIdx];
    // jitter ±50ms; force a miss on the final beat to end the run
    var isFinalBeat = (botRunBeatCount + 1 >= BOT_FAIL_AFTER);
    var jitter = isFinalBeat ? 200 : (rng() - 0.5) * 80;
    var fireAt = expected + jitter;
    var now    = performance.now();
    var delay  = (inputStart + fireAt) - now;
    if (delay < 0) delay = 5;
    botScheduled = true;
    setTimeout(function () {
      botScheduled = false;
      if (phase !== 'input') return;
      var fakeNow = inputStart + (expected + jitter);
      registerTap(fakeNow);
      botRunBeatCount++;
      if (phase === 'input') { scheduleBotTap(); }
    }, Math.max(5, delay));
  }

  // ---- input ----
  function tap(x, y, nowOverride) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { beginShowPhase(); if (window.LOOP) { LOOP.emit('play_start', { seed: SEED }); } return; }
    if (phase === 'input') { registerTap(); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'beats' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'KeyZ') tap();
  });

  // ---- draw helpers ----

  // Draw the beat dots for pattern display / input feedback
  function drawPatternDots(nowTs, activeIdx, isInput) {
    if (!pattern) return;
    var n   = pattern.length;
    var cx2 = W / 2;
    var cy  = H / 2 + 40;
    var spacing = Math.min(52, (W - 80) / Math.max(n - 1, 1));
    var totalW  = (n - 1) * spacing;
    var startX  = cx2 - totalW / 2;

    for (var i = 0; i < n; i++) {
      var px = startX + i * spacing;
      var isActive = (i === activeIdx);
      var isDone   = isInput ? (i < inputIdx) : (i < showIdx);
      var r = isDone ? 14 : (isActive ? 18 : 11);
      var alpha = isDone ? 0.95 : (isActive ? 1 : 0.28);
      var color;
      if (isDone) {
        color = TEAL;
      } else if (isActive) {
        color = isInput ? GOLD : VERM;
      } else {
        color = 'rgba(255,255,255,0.6)';
      }

      // glow behind active dot
      if (isActive) {
        cx.save();
        cx.shadowColor = color;
        cx.shadowBlur  = 18;
        cx.beginPath();
        cx.arc(px, cy, r, 0, Math.PI * 2);
        cx.fillStyle = color;
        cx.globalAlpha = alpha;
        cx.fill();
        cx.restore();
      } else {
        cx.globalAlpha = alpha;
        cx.fillStyle = color;
        cx.beginPath();
        cx.arc(px, cy, r, 0, Math.PI * 2);
        cx.fill();
        cx.globalAlpha = 1;
      }
      cx.globalAlpha = 1;

      // connecting line between dots
      if (i < n - 1) {
        var nx = startX + (i + 1) * spacing;
        cx.strokeStyle = isDone ? 'rgba(46,197,182,0.4)' : 'rgba(255,255,255,0.1)';
        cx.lineWidth = 2;
        cx.beginPath();
        cx.moveTo(px + 11, cy);
        cx.lineTo(nx - 11, cy);
        cx.stroke();
      }
    }
    cx.globalAlpha = 1;
  }

  // Pulse ring on every beat flash
  function drawPulse(nowTs) {
    if (phase !== 'show') return;
    if (showIdx <= 0 || showIdx > pattern.length) return;
    var beatTime = showStart + pattern[showIdx - 1];
    var age      = nowTs - beatTime;
    if (age < 0 || age > 350) return;
    var r2 = 38 + age * 0.22;
    var a2 = Math.max(0, 0.7 - age / 350);
    cx.globalAlpha = a2;
    cx.strokeStyle = VERM;
    cx.lineWidth = 3;
    cx.beginPath();
    cx.arc(W / 2, H / 2 + 40, r2, 0, Math.PI * 2);
    cx.stroke();
    cx.globalAlpha = 1;
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(nowTs) {
    var dt = Math.min((nowTs - last) / 16.667, 3); last = nowTs;

    // ---- show phase: flash beats in sequence ----
    if (phase === 'show') {
      var elapsed = nowTs - showStart;
      // advance showIdx to flash all beats up to current time
      while (showIdx < pattern.length && elapsed >= pattern[showIdx]) {
        // flash this beat
        if (window.J) { J.hit(showIdx + 1); }
        showIdx++;
      }
      // all beats shown — wait a moment then switch to input
      if (showIdx >= pattern.length) {
        var lastBeat = pattern[pattern.length - 1];
        if (elapsed >= lastBeat + BEAT_MS * 0.9) {
          // reset demo scheduling
          demoBeatIdx = 0;
          demoScheduled = false;
          botBeatIdx = 0;
          botScheduled = false;
          botRunBeatCount = 0;
          beginInputPhase();
        }
      }
    }

    // ---- input phase: trigger bot/demo autopilot ----
    if (phase === 'input') {
      if (DEMO) { scheduleDemoTap(); }
      else if (BOT) { scheduleBotTap(); }
      // check for timeout: if player hasn't tapped for 1.5× expected next beat
      if (!DEMO && !BOT && inputIdx < pattern.length) {
        var expectedNext = pattern[inputIdx];
        var sinceStart   = nowTs - inputStart;
        if (sinceStart > expectedNext + BEAT_MS * 1.5) {
          // timeout = miss
          flash('TOO SLOW', VERM, 28, W / 2, 340);
          shakeAmt = 6;
          gameOver();
        }
      }
    }

    // hit-stop decay
    if (hitStop > 0) { hitStop -= dt; }

    // ---- juice transforms ----
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // ---- title ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('RHYTHM REPEAT', W / 2, 270);
      cx.fillStyle = VERM; cx.font = '700 17px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(nowTs / 300);
      cx.globalAlpha = pulse;
      cx.fillText('WATCH. THEN REPEAT.', W / 2, 318);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('feel the pattern — send it back', W / 2, 348);
      // preview dots
      pattern = genPattern(START_LEN);
      drawPatternDots(nowTs, -1, false);
      pattern = null;
      cx.textAlign = 'center';
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      var p2 = 0.5 + 0.5 * Math.sin(nowTs / 400);
      cx.globalAlpha = p2;
      cx.fillText('TAP TO START', W / 2, 630);
      cx.globalAlpha = 1;
    }

    // ---- challenge card (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 290);
      cx.fillStyle = GOLD; cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('28', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top rhythm run", W / 2, 432);
    }

    // ---- show phase ----
    if (phase === 'show') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('WATCH THE PATTERN', W / 2, 220);
      cx.fillStyle = 'rgba(255,255,255,0.22)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + (round + 1) + '  •  ' + pattern.length + ' BEATS', W / 2, 244);

      // big center circle pulses on each beat
      var showElapsed = nowTs - showStart;
      var beatActive  = (showIdx > 0 && showIdx <= pattern.length &&
                         showElapsed - pattern[showIdx - 1] < 220);
      var bigR = beatActive ? 54 : 46;
      var bgColor = beatActive ? VERM : 'rgba(232,80,46,0.18)';
      cx.fillStyle = bgColor;
      cx.beginPath();
      cx.arc(W / 2, H / 2 - 20, bigR, 0, Math.PI * 2);
      cx.fill();
      drawPulse(nowTs);
      drawPatternDots(nowTs, showIdx - 1, false);
      // score
      cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 110);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 130);
    }

    // ---- wait phase (between show → input) ----
    if (phase === 'wait') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 110);
      cx.fillStyle = GOLD; cx.font = '900 28px -apple-system, Helvetica, Arial';
      var p3 = 0.7 + 0.3 * Math.sin(nowTs / 140);
      cx.globalAlpha = p3;
      cx.fillText('YOUR TURN…', W / 2, 300);
      cx.globalAlpha = 1;
      drawPatternDots(nowTs, -1, false);
    }

    // ---- input phase ----
    if (phase === 'input') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 110);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 130);

      // tap hint
      cx.fillStyle = TEAL; cx.font = '900 22px -apple-system, Helvetica, Arial';
      var tapPulse = 0.7 + 0.3 * Math.sin(nowTs / 110);
      cx.globalAlpha = tapPulse;
      cx.fillText('TAP!', W / 2, 230);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + (round + 1) + '  •  BEAT ' + (inputIdx + 1) + ' OF ' + pattern.length, W / 2, 252);

      // progress ring behind center
      var progressFrac = inputIdx / pattern.length;
      cx.strokeStyle = 'rgba(46,197,182,0.25)';
      cx.lineWidth = 6;
      cx.beginPath();
      cx.arc(W / 2, H / 2 - 20, 50, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progressFrac);
      cx.stroke();
      // center circle (tap target)
      cx.fillStyle = TEAL;
      cx.beginPath();
      cx.arc(W / 2, H / 2 - 20, 44, 0, Math.PI * 2);
      cx.fill();
      cx.fillStyle = '#fff';
      cx.font = '900 20px -apple-system, Helvetica, Arial';
      cx.fillText('TAP', W / 2, H / 2 - 11);

      drawPatternDots(nowTs, inputIdx, true);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 13px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' :
                    ('BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : '')),
                    W / 2, 158);
      }

      // combo display
      if (combo >= 2) {
        var cpulse = 1 + 0.04 * Math.sin(nowTs / 70);
        cx.save();
        cx.translate(W / 2, 175);
        cx.scale(cpulse, cpulse);
        cx.textAlign = 'center';
        var cc = combo >= 5 ? GOLD : TEAL;
        cx.fillStyle = cc;
        cx.font = '900 ' + (16 + Math.min(combo * 2, 12)) + 'px -apple-system, Helvetica, Arial';
        cx.fillText('×' + combo + ' STREAK', 0, 0);
        cx.restore();
      }
    }

    // ---- over ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('BROKE THE BEAT.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 24px -apple-system, Helvetica, Arial';
      cx.fillText(score + ' points', W / 2, 336);
      var pt = pctTop(score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 376);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 400);
      if (!DEMO && !BOT) {
        var p4 = 0.6 + 0.4 * Math.sin(nowTs / 280);
        cx.globalAlpha = p4; cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE RUN', W / 2, 452);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) { cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23); }
        else { cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h); }
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ?
                    '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
                    W / 2, SHARE_R.y + 30);
      }
    }

    // ---- demo CTA ----
    if (phase === 'cta') {
      var t = (nowTs - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('RHYTHM REPEAT', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.65)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they scored ' + (window.__demoScore || 28) + '. can you feel it?', W / 2, 332);
      var p5 = 0.7 + 0.3 * Math.sin(nowTs / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p5;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 28), W / 2, 402);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 436);
      cx.globalAlpha = 1;
    }

    // ---- flashes ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 44);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.9);
      cx.globalAlpha = 1;
      if (fl.t > 48) { flashes.splice(k, 1); }
    }

    // ---- particles ----
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt2 = particles[p];
      pt2.x += pt2.vx * dt; pt2.y += pt2.vy * dt; pt2.vy += 0.15 * dt;
      pt2.life -= 0.025 * dt;
      if (pt2.life <= 0) { particles.splice(p, 1); continue; }
      cx.globalAlpha = pt2.life;
      cx.fillStyle = pt2.color;
      cx.beginPath();
      cx.arc(pt2.x, pt2.y, 3, 0, Math.PI * 2);
      cx.fill();
      cx.globalAlpha = 1;
    }

    // ---- mute toggle (human only) ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
