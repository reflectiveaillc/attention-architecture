<!--
  LOOP / attention-architecture — Combo Sustain
  Circuits: 01-rpe (variable reward per beat), 08-investment (combo multiplier),
            04-loss (combo reset pain).
  Mechanic: Tap on every beat of a 60-beat track to sustain a combo counter.
            Perfect taps (near the beat) add to multiplier; early/late reset to 0.
  Modes:
    ?demo=1&seed=7        scripted mirror-neuron clip, sets window.__demoDone
    ?bot=1&runs=N&seed=5  imperfect autoplay N runs, sets window.__botDone
-->
<style>

               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<script>
(function () {
  'use strict';
  var W = 405, H = 720;

  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // Mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ---- Game constants ----
  var TOTAL_BEATS = 60;
  var BPM = 90;                          // beats per minute
  var BEAT_MS = 60000 / BPM;            // ~667ms per beat
  var PERFECT_WINDOW = 0.16;            // ±16% of beat interval = perfect
  var HIT_WINDOW     = 0.30;            // ±30% = good
  // score per tap = combo * multiplier
  var DEMO_TARGET_SCORE = 312;          // shown in challenge card

  // ---- State ----
  var phase;          // 'title' | 'challenge' | 'play' | 'over' | 'cta'
  var beatIdx;        // which beat we're currently on (0..59)
  var beatStartMs;    // absolute ms when the current beat window opened
  var sessionStartMs; // when play_start fired
  var combo, maxCombo, score, tapHandled;
  var flashes, hitStop, shakeAmt, zoom;
  var dareBeaten, best;
  var overAt, ctaAt, challengeAt;
  var botRunsDone;

  try { best = +localStorage.getItem('cs_best') || 0; } catch (_) { best = 0; }

  // ---- Init ----
  function newGame() {
    phase        = 'title';
    beatIdx      = 0;
    beatStartMs  = 0;
    sessionStartMs = 0;
    combo        = 0;
    maxCombo     = 0;
    score        = 0;
    tapHandled   = false;
    flashes      = [];
    hitStop      = 0;
    shakeAmt     = 0;
    zoom         = 1;
    dareBeaten   = false;
    overAt       = 0;
    ctaAt        = 0;
    challengeAt  = 0;
    botRunsDone  = 0;

    if (DEMO) {
      phase       = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
  }

  function startRun() {
    phase         = 'play';
    beatIdx       = 0;
    combo         = 0;
    maxCombo      = 0;
    score         = 0;
    tapHandled    = false;
    sessionStartMs = Date.now();
    beatStartMs   = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function pctTop(s) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-s / 80))));
  }

  // ---- Beat / tap logic ----
  // Returns fraction elapsed in current beat window [0,1]
  function beatFrac(nowMs) {
    return Math.min(1, Math.max(0, (nowMs - beatStartMs) / BEAT_MS));
  }

  function registerTap(nowMs) {
    if (phase !== 'play') return;
    if (tapHandled) {
      // extra tap in same beat = early for next beat — reset combo
      earlyTap();
      return;
    }
    var frac = beatFrac(nowMs);
    // frac near 0 = very early, near 0.5 = perfect, near 1 = very late
    // window centered at 0.5
    var dist = Math.abs(frac - 0.5);
    tapHandled = true;

    if (dist <= PERFECT_WINDOW) {
      // Perfect
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      var pts = 5 * combo;
      score += pts;
      hitStop = 50;
      zoom    = 1.03;
      flash('+' + pts, GOLD, 38);
      if (window.J) { J.perfect(combo); J.tension(Math.min(combo / 30, 1)); }
      if (combo >= 10 && combo % 10 === 0) {
        if (window.J) J.gold();
        flash('×' + combo + ' STREAK', TEAL, 34);
      }
      if (window.LOOP) LOOP.emit('beat_hit', { beat: beatIdx, combo: combo, quality: 'perfect' });
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(score);
      }
    } else if (dist <= HIT_WINDOW) {
      // Good (not perfect)
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      var pts2 = 2 * combo;
      score += pts2;
      shakeAmt = 1.5;
      flash('+' + pts2, TEAL, 30);
      if (window.J) { J.hit(combo); J.tension(Math.min(combo / 30, 1)); }
      if (window.LOOP) LOOP.emit('beat_hit', { beat: beatIdx, combo: combo, quality: 'good' });
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
        dareBeaten = true;
        flash('DARE BEATEN', TEAL, 44);
        if (window.J) J.fanfare();
        SHARE.beaten(score);
      }
    } else {
      // Tapped in window but too early
      earlyTap();
    }
  }

  function earlyTap() {
    var lost = combo;
    combo = 0;
    shakeAmt = 4;
    if (window.J) J.near();
    flash('EARLY', VERM, 34);
    if (lost >= 5) {
      if (window.LOOP) LOOP.emit('near_miss', { lost: lost, beat: beatIdx });
    }
  }

  function missedBeat() {
    // Beat elapsed without a tap
    var lost = combo;
    if (combo > 0) {
      combo = 0;
      shakeAmt = 5;
      if (window.J) J.near();
      flash('MISSED!', VERM, 36);
      if (lost >= 5 && window.LOOP) LOOP.emit('near_miss', { lost: lost, beat: beatIdx });
    }
    // (silence on miss when combo was already 0)
  }

  function advanceBeat(nowMs) {
    // Advance to next beat
    if (!tapHandled) {
      missedBeat();
    }
    beatIdx++;
    beatStartMs = beatStartMs + BEAT_MS;
    tapHandled  = false;

    if (beatIdx >= TOTAL_BEATS) {
      gameOver(nowMs);
    }
  }

  function gameOver(nowMs) {
    phase  = 'over';
    overAt = performance.now();
    shakeAmt = 7;
    var dur = (Date.now() - sessionStartMs) / 1000;
    var newBest = maxCombo > best;
    if (window.J) {
      J.tension(0);
      J.death(Math.min(0.3 + maxCombo / 40, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (newBest) { best = maxCombo; try { localStorage.setItem('cs_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1), max_combo: maxCombo });
    if (DEMO) {
      window.__demoScore = maxCombo;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 900);
      }
    }
  }

  function resetRun() {
    combo    = 0;
    maxCombo = 0;
    score    = 0;
    flashes  = [];
    dareBeaten = false;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0, x: W / 2, y: 380 });
  }

  // ---- Input ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 490, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(px, py) {
    if (DEMO || BOT) return;
    if (px !== undefined && inR(MUTE_R, px, py) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startRun(); return; }
    if (phase === 'play') { registerTap(Date.now()); return; }
    if (phase === 'over' && performance.now() - overAt > 350) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: maxCombo, unit: 'max combo' }); return;
      }
      resetRun();
      return;
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- Demo / Bot autopilot ----
  // Demo script: describes desired tap quality per beat index
  // 'perfect'=tap at beat center, 'good'=slight offset, 'miss'=skip, 'early'=too early
  var demoScript = [
    'perfect','perfect','good','perfect','perfect','good','perfect',
    'miss',                    // beat 7 — near-fail moment (combo drops)
    'perfect','perfect',       // recovery
    'good','perfect','perfect','good','perfect',
    'early',                   // beat 15 — early reset (visible tension)
    'perfect','perfect','good','perfect','perfect',
    'perfect','good','perfect',
    'miss',                    // beat 23 — near-fail+recovery point (~60%)
    'perfect','perfect',
    'good','perfect','perfect','perfect',
    'miss',                    // the real fail — combo drops here then...
    'miss',                    // ...two misses in row = session ends degraded
    // remaining beats filled with good/perfect to reach game_over naturally
    'perfect','perfect','good','perfect','perfect',
    'good','perfect','perfect','good','perfect',
    'perfect','good','perfect','perfect','good',
    'perfect','perfect','good','perfect','perfect',
    'good','perfect','perfect','good','perfect',
    'perfect','good','perfect','perfect','good',
    'perfect','perfect'
  ];
  // Wait offsets for each beat (frames to wait before acting — gives hesitation)
  var demoWaits = [
    18,20,16,22,18,24,16,
    0,                    // miss — no tap
    14,18,
    16,18,20,16,22,
    0,                    // early — will fire before center
    18,16,20,18,22,
    18,20,16,
    0,                    // miss
    14,18,
    16,18,20,16,
    0, 0,                 // two misses
    18,20,16,18,22,
    16,18,20,22,18,
    18,16,20,18,22,
    16,18,20,16,22,
    18,20,16,18,22,
    20,18,16,20,18,
    18,20
  ];

  var demoBeatProcessed = -1;
  var demoFrameCount    = 0;

  function demoBeatAction(nowMs) {
    var bi = beatIdx;
    if (bi >= TOTAL_BEATS || tapHandled) return;
    if (bi === demoBeatProcessed) return;
    // Only act within a beat window
    var frac = beatFrac(nowMs);
    if (frac < 0.05) { demoFrameCount = 0; return; } // too early in window, wait

    var action = demoScript[Math.min(bi, demoScript.length - 1)];
    var wait   = demoWaits[Math.min(bi, demoWaits.length - 1)] || 16;

    demoFrameCount++;
    if (action === 'miss') {
      // just let the beat expire — do nothing
      demoBeatProcessed = bi;
      return;
    }
    if (action === 'early') {
      // Act very soon in the window (frac ~0.1) — reads as early
      if (frac >= 0.12 && demoFrameCount >= 4) {
        registerTap(nowMs);
        demoBeatProcessed = bi;
      }
      return;
    }
    if (action === 'perfect') {
      // Target frac ~0.5, wait for it
      if (frac >= 0.44 && demoFrameCount >= wait) {
        registerTap(nowMs);
        demoBeatProcessed = bi;
      }
      return;
    }
    if (action === 'good') {
      // Target frac ~0.65 (slightly late but in HIT_WINDOW)
      if (frac >= 0.60 && demoFrameCount >= wait) {
        registerTap(nowMs);
        demoBeatProcessed = bi;
      }
      return;
    }
  }

  // Bot: imperfect random timing within hit window, occasionally misses to eventually lose
  var botBeatProcessed = -1;
  var botFrameCount    = 0;
  var botMissChance    = 0.18; // 18% chance to miss a beat
  var botDecision      = null; // null = not decided yet for this beat

  function botBeatAction(nowMs) {
    var bi = beatIdx;
    if (bi >= TOTAL_BEATS || tapHandled) return;
    if (bi === botBeatProcessed) return;
    var frac = beatFrac(nowMs);
    if (frac < 0.05) { botFrameCount = 0; botDecision = null; return; }

    // Decide once per beat whether to miss or tap
    if (botDecision === null) {
      botDecision = rng() < botMissChance ? 'miss' : 'tap';
    }

    if (botDecision === 'miss') {
      botBeatProcessed = bi;
      return;
    }

    // Tap with random offset around center
    botFrameCount++;
    var targetFrac = 0.4 + rng() * 0.25; // 0.4..0.65 — mostly hits, occasionally edge
    if (frac >= targetFrac) {
      registerTap(nowMs);
      botBeatProcessed = bi;
    }
  }

  // ---- Ring / beat visualizer ----
  // The "pulse" ring that expands each beat interval
  function ringPhase(nowMs) {
    var elapsed = nowMs - beatStartMs;
    return Math.min(1, elapsed / BEAT_MS); // 0→1 over beat duration
  }

  // ---- Render ----
  var last = performance.now();

  function frame(ts) {
    var dt = Math.min((ts - last) / 16.667, 3);
    last = ts;
    var nowMs = Date.now();

    // --- Sim tick ---
    if (phase === 'play') {
      // Check if current beat window has elapsed
      var elapsed = nowMs - beatStartMs;
      if (elapsed >= BEAT_MS) {
        // Don't advance if hitStop is active — let it drain first
        if (hitStop <= 0) {
          advanceBeat(nowMs);
        }
      }

      // Autopilots
      if (DEMO) demoBeatAction(nowMs);
      else if (BOT) botBeatAction(nowMs);
    }

    // Decay juice
    if (hitStop > 0) hitStop -= dt * 16.667; // hitStop in ms
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // === Draw ===
    cx.save();
    // Screen shake + zoom
    if (shakeAmt > 0.3 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // BG
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, W, H);

    // ---- PLAY phase draw ----
    if (phase === 'play' || phase === 'over') {
      drawBeats(ts, nowMs);
    }

    // Score/combo display (play + over)
    if (phase === 'play' || phase === 'over') {
      // Combo ring glow
      var comboScale = Math.min(3, 1 + combo * 0.08);
      var comboAlpha = Math.min(1, 0.3 + combo * 0.03);
      cx.save();
      cx.globalAlpha = comboAlpha * 0.35;
      cx.fillStyle = GOLD;
      cx.beginPath();
      cx.arc(W / 2, 200, 60 * comboScale, 0, Math.PI * 2);
      cx.fill();
      cx.restore();

      // Combo number
      cx.textAlign = 'center';
      var comboFontSize = Math.min(120, 48 + combo * 3);
      cx.font = '900 ' + comboFontSize + 'px -apple-system, Helvetica, Arial';
      cx.fillStyle = combo > 0 ? GOLD : 'rgba(255,255,255,0.3)';
      cx.fillText(combo > 0 ? '×' + combo : '×0', W / 2, 210);

      // Label
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.fillText('COMBO', W / 2, 232);

      // Score
      cx.font = '800 32px -apple-system, Helvetica, Arial';
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.fillText(score, W / 2, 276);

      // Beat progress bar
      if (phase === 'play') {
        drawProgressBar(nowMs);
      }

      // Beats remaining
      if (phase === 'play') {
        cx.font = '600 14px -apple-system, Helvetica, Arial';
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.fillText((TOTAL_BEATS - beatIdx) + ' beats left', W / 2, 640);
      }

      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 662);
      }
    }

    // Floating flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 1.4);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('COMBO SUSTAIN', W / 2, 280);
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(ts / 300);
      cx.globalAlpha = pulse;
      cx.fillText('TAP THE BEAT', W / 2, 330);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('keep the streak alive', W / 2, 362);
    }

    // ---- CHALLENGE card (demo beat 1) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD;
      cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText(DEMO_TARGET_SCORE, W / 2, 405);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 435);
    }

    // ---- OVER screen ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)';
      cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM;
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('BROKE.', W / 2, 302);
      cx.fillStyle = '#fff';
      cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('max combo ×' + maxCombo, W / 2, 346);
      var pt = pctTop(maxCombo);
      cx.fillStyle = GOLD;
      cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(ts / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 462);
        cx.globalAlpha = 1;
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD;
        cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );
      }
    }

    // ---- CTA card (demo) ----
    if (phase === 'cta') {
      var t2 = (ts - ctaAt) / 1000;
      var ease = Math.min(1, t2 * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('COMBO SUSTAIN', W / 2, 295);
      cx.fillStyle = 'rgba(255,255,255,0.72)';
      cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('max combo ×' + (window.__demoScore || 18) + '. can you beat it?', W / 2, 336);
      var p3 = 0.7 + 0.3 * Math.sin(ts / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ×' + (window.__demoScore || 18), W / 2, 405);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 440);
      cx.globalAlpha = 1;
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // ---- Beat ring visualizer ----
  // Shows expanding rings on beat, tapZone in center
  function drawBeats(ts, nowMs) {
    var cx2 = cx;
    var cx0 = W / 2, cy0 = 480;   // beat tap zone center
    var rFrac = ringPhase(nowMs);  // 0→1 per beat

    // Expanding beat ring
    var ringR = 40 + rFrac * 55;
    var ringA = Math.max(0, 0.8 - rFrac * 0.8);
    cx2.save();
    cx2.globalAlpha = ringA;
    cx2.strokeStyle = TEAL;
    cx2.lineWidth = 2.5 - rFrac * 1.5;
    cx2.beginPath();
    cx2.arc(cx0, cy0, ringR, 0, Math.PI * 2);
    cx2.stroke();
    cx2.restore();

    // Second (trailing) ring slightly behind
    var rFrac2 = Math.max(0, rFrac - 0.18);
    var ringR2 = 40 + rFrac2 * 55;
    var ringA2 = Math.max(0, 0.5 - rFrac2 * 0.6);
    cx2.save();
    cx2.globalAlpha = ringA2;
    cx2.strokeStyle = GOLD;
    cx2.lineWidth = 1.5;
    cx2.beginPath();
    cx2.arc(cx0, cy0, ringR2, 0, Math.PI * 2);
    cx2.stroke();
    cx2.restore();

    // Inner tap circle — glows gold when combo active
    var tapGlow = Math.min(1, combo * 0.06);
    cx2.save();
    cx2.globalAlpha = 0.15 + tapGlow * 0.4;
    cx2.fillStyle = combo > 0 ? GOLD : TEAL;
    cx2.beginPath();
    cx2.arc(cx0, cy0, 38, 0, Math.PI * 2);
    cx2.fill();
    cx2.restore();

    cx2.save();
    cx2.strokeStyle = combo > 0 ? GOLD : TEAL;
    cx2.lineWidth = 2;
    cx2.globalAlpha = 0.8;
    cx2.beginPath();
    cx2.arc(cx0, cy0, 38, 0, Math.PI * 2);
    cx2.stroke();
    cx2.restore();

    // Tap label
    cx2.textAlign = 'center';
    cx2.font = '700 13px -apple-system, Helvetica, Arial';
    cx2.fillStyle = 'rgba(255,255,255,0.55)';
    cx2.fillText('TAP', cx0, cy0 + 5);

    // Beat dots at the top (shows track progress)
    var dotY = 310, dotR = 4, dotSpacing = 6;
    var totalW = TOTAL_BEATS * (dotR * 2 + dotSpacing) - dotSpacing;
    var startX = W / 2 - totalW / 2;
    for (var i = 0; i < TOTAL_BEATS; i++) {
      var dx = startX + i * (dotR * 2 + dotSpacing) + dotR;
      var col, alpha;
      if (i < beatIdx) {
        col   = TEAL;
        alpha = 0.55;
      } else if (i === beatIdx) {
        col   = GOLD;
        alpha = 0.9;
      } else {
        col   = 'rgba(255,255,255,0.18)';
        alpha = 1;
      }
      cx2.save();
      cx2.globalAlpha = alpha;
      cx2.fillStyle = col;
      cx2.beginPath();
      cx2.arc(dx, dotY, i === beatIdx ? dotR + 1 : dotR, 0, Math.PI * 2);
      cx2.fill();
      cx2.restore();
    }
  }

  function drawProgressBar(nowMs) {
    var barW = W - 80, barH = 6, bx = 40, by = 650;
    var prog = beatIdx / TOTAL_BEATS;
    // Track bar bg
    cx.fillStyle = 'rgba(255,255,255,0.1)';
    cx.fillRect(bx, by, barW, barH);
    // Fill
    var g = cx.createLinearGradient(bx, 0, bx + barW, 0);
    g.addColorStop(0, TEAL);
    g.addColorStop(1, VERM);
    cx.fillStyle = g;
    cx.fillRect(bx, by, barW * prog, barH);
    // Beat tick at current position
    cx.fillStyle = GOLD;
    cx.fillRect(bx + barW * prog - 2, by - 2, 4, barH + 4);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
