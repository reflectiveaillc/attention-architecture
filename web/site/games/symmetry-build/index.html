<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c');
  var cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  // Soft calm palette — avoid vermillion
  var PETAL_COLORS = [
    '#2ec5b6', '#5fd8cc', '#f2b134', '#e8d06a',
    '#a8d8ea', '#7ec8e3', '#b8e4bc', '#82c8a0'
  ];

  // ---- Grid definition ----
  // Mandala grid: a 5×5 grid of tile slots on the left half.
  // Each slot mirrored on the right.
  var GRID_COLS = 5, GRID_ROWS = 5;
  var GRID_SIZE = 46;   // tile size px
  var GRID_GAP  = 4;
  var GRID_TOTAL_W = GRID_COLS * (GRID_SIZE + GRID_GAP) - GRID_GAP;
  var GRID_TOTAL_H = GRID_ROWS * (GRID_SIZE + GRID_GAP) - GRID_GAP;
  var GRID_X = W / 2 - GRID_TOTAL_W - 10;  // left side starts here
  var GRID_Y = (H - GRID_TOTAL_H) / 2 + 20;

  // Shape types: circle, triangle, diamond, ring, petal
  var SHAPES = ['circle', 'triangle', 'diamond', 'ring', 'petal'];

  // ---- Game state ----
  var placed, score, phase, runStartTs, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var flashes = [];
  var particles = [];
  var ctaAt = 0;
  var bloomFade = 0;    // 0=not bloomed, >0=bloom alpha fading in
  var bloomAt = 0;
  var demoDone = false;
  try { best = +localStorage.getItem('sb_best') || 0; } catch(_) {}

  var botRunsDone = 0;

  // Mute / share hit-regions
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  // Total tiles in the mandala = GRID_COLS * GRID_ROWS
  var TOTAL_TILES = GRID_COLS * GRID_ROWS;  // 25

  function newGame() {
    placed = [];   // array of {col, row, shape, color, age, glow}
    score = 0;
    flashes = [];
    particles = [];
    bloomFade = 0;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    demoDone = false;
    rng = mulberry32(SEED);

    if (DEMO) {
      phase = 'play';
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    if (BOT) {
      phase = 'play';
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }
    phase = 'title';
  }

  function tileAt(col, row) {
    for (var i = 0; i < placed.length; i++) {
      if (placed[i].col === col && placed[i].row === row) return placed[i];
    }
    return null;
  }

  function placeTile(col, row) {
    if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return;
    if (tileAt(col, row)) return;   // already placed

    var shape = SHAPES[Math.floor(rng() * SHAPES.length)];
    var color = PETAL_COLORS[Math.floor(rng() * PETAL_COLORS.length)];
    var tile = { col: col, row: row, shape: shape, color: color, age: 0, glow: 0 };
    placed.push(tile);
    score++;

    // Juice
    hitStop = 3;
    zoom = 1.02;
    if (window.J) J.calm(score);

    // Spawn bloom particles
    var lx = tileX(col), ly = tileY(row);
    var rx = mirrorX(lx);
    spawnParticles(lx + GRID_SIZE / 2, ly + GRID_SIZE / 2, color);
    spawnParticles(rx + GRID_SIZE / 2, ly + GRID_SIZE / 2, color);

    flash('+' + score, TEAL, 28);

    if (window.LOOP) LOOP.emit('tile_placed', { n: score, shape: shape });

    // Check mandala complete
    if (placed.length >= TOTAL_TILES) {
      completeMandala();
    }
  }

  function completeMandala() {
    phase = 'over';
    bloomFade = 0.01;
    bloomAt = performance.now();
    shakeAmt = 3;
    zoom = 1.04;
    if (window.J) { J.calm(score); J.calm(score + 1); }
    var dur = (Date.now() - runStartTs) / 1000;
    if (score > best) { best = score; try { localStorage.setItem('sb_best', String(best)); } catch(_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 1200);
      }
    }
  }

  // If bot/demo runs can't naturally complete (shouldn't happen, but guard):
  // Force game_over after BOT_TIMEOUT ms
  var BOT_TIMEOUT = 45000;
  var botStartTs = 0;

  function resetRun() {
    placed = [];
    score = 0;
    flashes = [];
    particles = [];
    bloomFade = 0;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    rng = mulberry32(SEED + botRunsDone * 1337);
    botQueue = null;
    botWait = 0;
    phase = 'play';
    runStartTs = Date.now();
    botStartTs = Date.now();
    if (window.LOOP) LOOP.emit('restart', {});
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0, x: W / 2, y: H / 2 - 60 });
  }

  function spawnParticles(x, y, color) {
    for (var i = 0; i < 6; i++) {
      var angle = rng() * Math.PI * 2;
      var speed = 1.5 + rng() * 2.5;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: color, r: 3 + rng() * 3, life: 1.0
      });
    }
  }

  // Grid coordinate helpers
  function tileX(col) { return GRID_X + col * (GRID_SIZE + GRID_GAP); }
  function tileY(row) { return GRID_Y + row * (GRID_SIZE + GRID_GAP); }
  function mirrorX(lx) {
    // Mirror x across W/2: the left tile at lx, its center is lx+GRID_SIZE/2
    // Mirror center = W - (lx + GRID_SIZE/2), so mirror tile starts at W - lx - GRID_SIZE
    return W - lx - GRID_SIZE;
  }

  // Tap → find grid cell on left half
  function handleTap(px, py) {
    if (DEMO || BOT) return;
    if (!window.J && px !== undefined && inR(MUTE_R, px, py)) return; // no J yet
    if (window.J && px !== undefined && inR(MUTE_R, px, py)) { J.toggleMute(); return; }

    if (phase === 'title') {
      phase = 'play';
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
      return;
    }

    if (phase === 'over' && performance.now() - bloomAt > 400) {
      if (px !== undefined && inR(SHARE_R, px, py) && window.SHARE) {
        SHARE.send({ score: score, unit: 'tiles' }); return;
      }
      resetHuman();
      return;
    }

    if (phase !== 'play') return;

    // Find which grid cell was tapped (left half only)
    if (px === undefined) return;
    var col = Math.floor((px - GRID_X) / (GRID_SIZE + GRID_GAP));
    var row = Math.floor((py - GRID_Y) / (GRID_SIZE + GRID_GAP));
    if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
      placeTile(col, row);
    }
  }

  function resetHuman() {
    placed = [];
    score = 0;
    flashes = [];
    particles = [];
    bloomFade = 0;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    rng = mulberry32(SEED);
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('restart', {});
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ---- input ----
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale;
    var py = (e.clientY - r.top) / scale;
    handleTap(px, py);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') handleTap(undefined, undefined);
  });

  // ---- demo / bot autopilot ----
  // Demo: scripted placement order — fills grid in a calm spiral order
  // with hesitation pauses to read as human
  var DEMO_ORDER = (function () {
    // Spiral-ish order starting from center outward
    var cx2 = 2, cy2 = 2;
    var order = [];
    // Center first
    order.push([cx2, cy2]);
    // Rings out
    var cells = [];
    for (var r2 = 0; r2 < GRID_COLS; r2++) {
      for (var c2 = 0; c2 < GRID_COLS; c2++) {
        if (r2 === cx2 && c2 === cy2) continue;
        cells.push([c2, r2]);
      }
    }
    // Sort by distance from center
    cells.sort(function (a, b) {
      var da = Math.abs(a[0] - cx2) + Math.abs(a[1] - cy2);
      var db = Math.abs(b[0] - cx2) + Math.abs(b[1] - cy2);
      return da - db;
    });
    for (var i = 0; i < cells.length; i++) order.push(cells[i]);
    return order;
  }());

  var demoIdx = 0;
  // Hesitation waits in frames (at 60fps): vary per tile for human feel
  var DEMO_WAITS = [45, 28, 32, 25, 38, 22, 30, 35, 20, 28, 42, 18, 26, 30, 24, 36, 22, 30, 28, 25, 40, 18, 32, 26, 28];
  var demoWait = 60;  // initial pause before first tile

  // Bot: random order, tiles placed at random intervals
  var botWait = 0;
  var botQueue = null;
  var BOT_BASE_WAIT = 12;  // frames between placements

  function buildBotQueue() {
    var q = [];
    for (var r2 = 0; r2 < GRID_ROWS; r2++) {
      for (var c2 = 0; c2 < GRID_COLS; c2++) {
        q.push([c2, r2]);
      }
    }
    // Shuffle
    for (var i = q.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = q[i]; q[i] = q[j]; q[j] = tmp;
    }
    return q;
  }

  function autopilot(dt) {
    if (phase !== 'play') return;

    if (DEMO) {
      if (demoIdx >= DEMO_ORDER.length) return;
      demoWait -= dt;
      if (demoWait > 0) return;
      var cell = DEMO_ORDER[demoIdx];
      placeTile(cell[0], cell[1]);
      demoIdx++;
      demoWait = (DEMO_WAITS[demoIdx % DEMO_WAITS.length] || 28);
    } else if (BOT) {
      if (!botQueue) {
        botQueue = buildBotQueue();
        botStartTs = Date.now();
      }
      if (botQueue.length === 0) return;
      botWait -= dt;
      if (botWait > 0) return;
      var bcell = botQueue.shift();
      placeTile(bcell[0], bcell[1]);
      // After placing all tiles, game ends via completeMandala
      botWait = BOT_BASE_WAIT + rng() * 8;
    }
  }

  // ---- drawing helpers ----
  function drawShape(ctx, shape, x, y, size, color, alpha, glowAmt) {
    ctx.save();
    ctx.globalAlpha = alpha;
    if (glowAmt > 0) {
      ctx.shadowColor = color;
      ctx.shadowBlur = glowAmt * 12;
    }
    ctx.fillStyle = color;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    var cx3 = x + size / 2, cy3 = y + size / 2, r3 = size * 0.42;
    if (shape === 'circle') {
      ctx.beginPath(); ctx.arc(cx3, cy3, r3, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    } else if (shape === 'ring') {
      ctx.beginPath(); ctx.arc(cx3, cy3, r3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = INK;
      ctx.beginPath(); ctx.arc(cx3, cy3, r3 * 0.55, 0, Math.PI * 2);
      ctx.fill();
    } else if (shape === 'diamond') {
      ctx.beginPath();
      ctx.moveTo(cx3, cy3 - r3);
      ctx.lineTo(cx3 + r3 * 0.75, cy3);
      ctx.lineTo(cx3, cy3 + r3);
      ctx.lineTo(cx3 - r3 * 0.75, cy3);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (shape === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(cx3, cy3 - r3);
      ctx.lineTo(cx3 + r3 * 0.87, cy3 + r3 * 0.5);
      ctx.lineTo(cx3 - r3 * 0.87, cy3 + r3 * 0.5);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (shape === 'petal') {
      // 4-petal flower
      for (var p = 0; p < 4; p++) {
        ctx.save();
        ctx.translate(cx3, cy3);
        ctx.rotate(p * Math.PI / 2);
        ctx.beginPath();
        ctx.ellipse(0, -r3 * 0.5, r3 * 0.32, r3 * 0.52, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      // center dot
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(cx3, cy3, r3 * 0.15, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawGrid(now) {
    // Draw grid slots (left half)
    for (var row = 0; row < GRID_ROWS; row++) {
      for (var col = 0; col < GRID_COLS; col++) {
        var x = tileX(col), y = tileY(row);
        var tile = tileAt(col, row);
        // Slot background
        cx.fillStyle = tile ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.06)';
        cx.strokeStyle = tile ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.12)';
        cx.lineWidth = 1;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(x, y, GRID_SIZE, GRID_SIZE, 6) : cx.rect(x, y, GRID_SIZE, GRID_SIZE);
        cx.fill(); cx.stroke();

        if (tile) {
          tile.age += 1;
          var glow = Math.max(0, 1 - tile.age / 40);
          drawShape(cx, tile.shape, x, y, GRID_SIZE, tile.color, 1, glow);

          // Mirror on right half
          var rx = mirrorX(x);
          // Slot bg for right
          cx.fillStyle = 'rgba(255,255,255,0.04)';
          cx.strokeStyle = 'rgba(255,255,255,0.08)';
          cx.lineWidth = 1;
          cx.beginPath();
          cx.roundRect ? cx.roundRect(rx, y, GRID_SIZE, GRID_SIZE, 6) : cx.rect(rx, y, GRID_SIZE, GRID_SIZE);
          cx.fill(); cx.stroke();
          drawShape(cx, tile.shape, rx, y, GRID_SIZE, tile.color, 1, glow);
        }
      }
    }

    // Also draw empty right-half slots behind placed tiles
    for (var row2 = 0; row2 < GRID_ROWS; row2++) {
      for (var col2 = 0; col2 < GRID_COLS; col2++) {
        var tile2 = tileAt(col2, row2);
        if (tile2) continue;  // already drawn above
        var rx2 = mirrorX(tileX(col2));
        var ry2 = tileY(row2);
        cx.fillStyle = 'rgba(255,255,255,0.04)';
        cx.strokeStyle = 'rgba(255,255,255,0.10)';
        cx.lineWidth = 1;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(rx2, ry2, GRID_SIZE, GRID_SIZE, 6) : cx.rect(rx2, ry2, GRID_SIZE, GRID_SIZE);
        cx.fill(); cx.stroke();
      }
    }

    // Center mirror line
    cx.strokeStyle = 'rgba(46,197,182,0.18)';
    cx.lineWidth = 1.5;
    cx.setLineDash([4, 6]);
    cx.beginPath();
    cx.moveTo(W / 2, GRID_Y - 10);
    cx.lineTo(W / 2, GRID_Y + GRID_TOTAL_H + 10);
    cx.stroke();
    cx.setLineDash([]);
  }

  // ---- main render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Autopilot tick
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      autopilot(dt);
    }

    // Juice decay
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.14 * dt;

    // Bloom alpha
    if (bloomFade > 0 && bloomFade < 1) {
      bloomFade = Math.min(1, bloomFade + 0.012 * dt);
    }

    // Save/transform for juice
    cx.save();
    if (shakeAmt > 0.3 || zoom > 1.002) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // BG
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.04)');
    bg.addColorStop(1, 'rgba(242,177,52,0.04)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // Title phase
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 36px -apple-system, Helvetica, Arial';
      cx.fillText('SYMMETRY BUILD', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '500 15px -apple-system, Helvetica, Arial';
      cx.fillText('tap the left half to place a tile', W / 2, 296);
      cx.fillText('watch its mirror appear on the right', W / 2, 318);
      var pulse = 0.55 + 0.45 * Math.sin(now / 380);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO BEGIN', W / 2, 380);
      cx.globalAlpha = 1;
      // Draw empty grid preview
      drawGrid(now);
      cx.restore();
      requestAnimationFrame(frame);
      return;
    }

    // Play + over: draw grid
    if (phase === 'play' || phase === 'over') {
      drawGrid(now);

      // Particles
      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 0.05 * dt;
        p.life -= 0.025 * dt;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        cx.globalAlpha = p.life;
        cx.fillStyle = p.color;
        cx.beginPath(); cx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        cx.fill();
        cx.globalAlpha = 1;
      }

      // Score display
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.88)';
      cx.font = '800 48px -apple-system, Helvetica, Arial';
      cx.fillText(score, W / 2, 88);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '500 12px -apple-system, Helvetica, Arial';
      cx.fillText('/ ' + TOTAL_TILES + '  tiles', W / 2, 110);

      // Flashes
      for (var k = flashes.length - 1; k >= 0; k--) {
        var fl = flashes[k]; fl.t += dt;
        var fa = Math.max(0, 1 - fl.t / 38);
        cx.globalAlpha = fa;
        cx.textAlign = 'center';
        cx.fillStyle = fl.color;
        cx.font = '700 ' + fl.size + 'px -apple-system, Helvetica, Arial';
        cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.8);
        cx.globalAlpha = 1;
        if (fl.t > 38) flashes.splice(k, 1);
      }
    }

    // Bloom overlay on completion
    if (phase === 'over' || phase === 'cta') {
      if (bloomFade > 0) {
        // Radial glow bloom from center
        var grad = cx.createRadialGradient(W / 2, H / 2, 30, W / 2, H / 2, 260);
        grad.addColorStop(0, 'rgba(46,197,182,' + (bloomFade * 0.22) + ')');
        grad.addColorStop(1, 'rgba(46,197,182,0)');
        cx.fillStyle = grad; cx.fillRect(0, 0, W, H);
      }
    }

    // Over card (calm settle)
    if (phase === 'over') {
      if (bloomFade > 0.5) {
        cx.fillStyle = 'rgba(11,13,18,0.52)'; cx.fillRect(0, 0, W, H);
        var oa = Math.min(1, (bloomFade - 0.5) * 2);
        cx.globalAlpha = oa;
        cx.textAlign = 'center';
        cx.fillStyle = TEAL; cx.font = '900 32px -apple-system, Helvetica, Arial';
        cx.fillText('COMPLETE', W / 2, 300);
        cx.fillStyle = '#fff'; cx.font = '700 22px -apple-system, Helvetica, Arial';
        cx.fillText(score + ' tiles placed', W / 2, 336);
        cx.fillStyle = GOLD; cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('BEST ' + best, W / 2, 362);
        if (!DEMO && !BOT) {
          var pulse2 = 0.6 + 0.4 * Math.sin(now / 320);
          cx.globalAlpha = oa * pulse2;
          cx.fillStyle = TEAL; cx.font = '700 17px -apple-system, Helvetica, Arial';
          cx.fillText('TAP — BUILD AGAIN', W / 2, 422);
          cx.globalAlpha = oa;
          // Share pill
          cx.fillStyle = 'rgba(242,177,52,0.13)';
          cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
          cx.beginPath();
          cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
          cx.fill(); cx.stroke();
          cx.fillStyle = GOLD; cx.font = '700 15px -apple-system, Helvetica, Arial';
          cx.fillText('⚡ SHARE YOUR MANDALA', W / 2, SHARE_R.y + 30);
        }
        cx.globalAlpha = 1;
      }
    }

    // Demo CTA card
    if (phase === 'cta') {
      var t2 = (now - ctaAt) / 1000;
      var ease = Math.min(1, t2 * 2.4);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('SYMMETRY BUILD', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '500 17px -apple-system, Helvetica, Arial';
      cx.fillText('build yours tile by tile', W / 2, 326);
      var pulse3 = 0.72 + 0.28 * Math.sin(now / 260);
      cx.globalAlpha = ease * pulse3;
      cx.fillStyle = TEAL; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 390);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 420);
      cx.globalAlpha = 1;
    }

    // Mute toggle — human only
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
}());
</script>
