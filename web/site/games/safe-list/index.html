<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Safe List — Tilt</title>
<!--
  LOOP / attention-architecture — Safe List
  Circuits: 05-ease, 08-investment, 06-zeigarnik.
  Calm engine — pinning saved posts as a security blanket.
  Modes:
    ?demo=1&seed=7   scripted calm arc ~16s → soft CTA card ~3.5s → __demoDone
    ?bot=1&runs=N    imperfect autopilot, N runs, sets __botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'safe-list';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  // palette — calm tones, no vermillion
  var INK  = '#0b0d12';
  var TEAL = '#2ec5b6';
  var GOLD = '#f2b134';

  // calm tile palette — soft muted tones
  var TILE_PALETTES = [
    ['#5ba4cf','#7ec8c8','#94d2bd','#a8dadc','#b5c7d3'],
    ['#c9ada7','#9a8c98','#c4b7a6','#b2d8d8','#8ecae6'],
    ['#a8c5a0','#b7cfa7','#c5d9b1','#d4e3bb','#83b2a8'],
    ['#e2c290','#d4a76a','#c8956c','#d4b896','#e8d5b7'],
    ['#9b8db4','#b4a7d6','#c8bfe0','#a89bc8','#d6ceec'],
  ];

  // game constants
  var TILE_H    = 52;   // height of each tile
  var TILE_GAP  = 6;    // gap between tiles
  var TILE_STEP = TILE_H + TILE_GAP;
  var LIST_X    = 40;
  var LIST_W    = W - 80;
  var LIST_TOP  = 160;  // top of the list area
  var MAX_TILES = 9;    // list fills up → triggers close / game_over

  // state
  var phase;       // 'title' | 'play' | 'closing' | 'closed' | 'over' | 'cta'
  var tiles;       // [{color, label, alpha, targetAlpha, vy}]
  var score;
  var closeProgress; // 0→1 notebook fold animation
  var runStartTs;
  var overAt;
  var ctaAt;
  var hitStop, shakeAmt, zoom;
  var floats;     // [{txt, color, x, y, t, size}]
  var promptAlpha; // fades in the soft prompt text
  var paletteIdx;

  // bot state
  var botRunsDone = 0, botTimer = 0, botActed = false, botActions = 0;

  // demo state
  var demoStep = 0, demoTimer = 0;
  // settle: add 3 tiles slowly; deepen: add 3 more; resolve: add 2 more → then close
  var demoAddAt  = [60, 110, 165, 230, 300, 370, 450, 540]; // frames at which to add tile
  var demoFrame  = 0;

  function newGame() {
    rng = mulberry32(SEED); // reset rng each game for reproducibility
    phase         = DEMO ? 'play' : 'title';
    tiles         = [];
    score         = 0;
    closeProgress = 0;
    hitStop       = 0;
    shakeAmt      = 0;
    zoom          = 1;
    floats        = [];
    promptAlpha   = 0;
    paletteIdx    = Math.floor(rng() * TILE_PALETTES.length);
    overAt        = 0;
    ctaAt         = 0;
    demoStep      = 0;
    demoTimer     = 0;
    demoFrame     = 0;
    botTimer      = 0;
    botActed      = false;
    botNextAdd    = 45;

    if (DEMO) {
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    }
    if (BOT) {
      phase = 'play';
      runStartTs = Date.now();
      if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    }
  }

  function startPlay() {
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function addTile() {
    if (phase !== 'play') return;
    if (tiles.length >= MAX_TILES) return;
    var palette = TILE_PALETTES[paletteIdx % TILE_PALETTES.length];
    var color   = palette[tiles.length % palette.length];
    tiles.push({ color: color, alpha: 0, targetAlpha: 1, vy: -8 });
    score++;
    var step = Math.min(score, 7);
    if (window.J) J.calm(step);
    // tiny zoom pulse on each add
    zoom = 1.015;
    // floating reward text — soft, not aggressive
    floats.push({
      txt: score === 1 ? 'one thing.' : score <= 3 ? 'and another.' : score <= 6 ? 'still here.' : 'almost full.',
      color: TEAL,
      x: W / 2 + (rng() - 0.5) * 60,
      y: LIST_TOP + 20,
      t: 0,
      size: 13
    });
    if (window.LOOP) LOOP.emit('tile_added', { n: score });

    // when list fills — auto-trigger close sequence after a beat
    if (tiles.length >= MAX_TILES) {
      setTimeout(function () { closelist(); }, 800);
    }
  }

  function closelist() {
    if (phase !== 'play') return;
    phase = 'closing';
    closeProgress = 0;
    if (window.J) J.calm(8); // final calm bell
  }

  function gameOver() {
    phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      ctaAt = performance.now();
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(function () { resetRun(); }, 900);
      }
    }
  }

  function resetRun() {
    tiles = [];
    score = 0;
    phase = 'play';
    closeProgress = 0;
    floats = [];
    promptAlpha = 0;
    paletteIdx = (paletteIdx + 1) % TILE_PALETTES.length;
    botTimer = 0;
    botActed = false;
    botActions = 0;
    botNextAdd = 45;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('restart', {});
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED + botRunsDone });
  }

  // ---- input rects ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var ADD_R   = { x: LIST_X, y: LIST_TOP - 2, w: LIST_W, h: H - LIST_TOP - 80 }; // tap anywhere in list area
  var CLOSE_R = { x: W / 2 - 80, y: H - 90, w: 160, h: 44 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (phase === 'title') { startPlay(); return; }
    if (phase === 'play') {
      if (x !== undefined && inR(CLOSE_R, x, y)) {
        closelist(); return;
      }
      // tap anywhere adds a tile
      addTile();
      return;
    }
    if (phase === 'over' && performance.now() - overAt > 400) {
      resetRun(); return;
    }
    if (phase === 'closed') {
      resetRun(); return;
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo autopilot ----
  function demoAutopilot() {
    // settle phase: add tiles gently, then close
    if (demoFrame < demoAddAt[demoAddAt.length - 1]) {
      for (var i = 0; i < demoAddAt.length; i++) {
        if (demoFrame === demoAddAt[i] && tiles.length < MAX_TILES) {
          addTile();
        }
      }
    } else if (phase === 'play' && tiles.length > 0) {
      // resolve: close the list
      closelist();
    }
    demoFrame++;
  }

  // ---- bot autopilot ----
  // bot adds tiles at a fixed interval until list is full → auto-closes → game_over
  var BOT_MAX_ACTIONS = MAX_TILES; // fill the list completely
  var botNextAdd = 45; // frames until next add action
  function botAutopilot(dt) {
    if (phase !== 'play') return;
    botTimer += dt;
    if (botTimer >= botNextAdd) {
      botTimer = 0;
      botNextAdd = 35 + Math.floor(rng() * 25); // 35-60 frames per tile
      if (botActions < BOT_MAX_ACTIONS && tiles.length < MAX_TILES) {
        addTile();
        botActions++;
      }
      // when botActions == MAX_TILES, the last addTile() fired setTimeout(closelist)
      // so we just wait for that to propagate through frame loop
    }
  }

  // ---- render helpers ----
  function tileY(i) {
    // tiles stack from bottom of list area upward, most recent on top
    var totalH = tiles.length * TILE_STEP - TILE_GAP;
    var baseY  = LIST_TOP + (H - LIST_TOP - 120 - totalH) / 2 + totalH - TILE_STEP;
    return baseY - i * TILE_STEP;
  }

  function drawRoundRect(x, y, w, h, r) {
    cx.beginPath();
    if (cx.roundRect) { cx.roundRect(x, y, w, h, r); }
    else {
      cx.moveTo(x + r, y);
      cx.lineTo(x + w - r, y); cx.arcTo(x + w, y, x + w, y + r, r);
      cx.lineTo(x + w, y + h - r); cx.arcTo(x + w, y + h, x + w - r, y + h, r);
      cx.lineTo(x + r, y + h); cx.arcTo(x, y + h, x, y + h - r, r);
      cx.lineTo(x, y + r); cx.arcTo(x, y, x + r, y, r);
      cx.closePath();
    }
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop / autopilots
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      if (DEMO) demoAutopilot();
      if (BOT)  botAutopilot(dt);
    }

    // closing animation
    if (phase === 'closing') {
      closeProgress += dt * 0.045;
      if (closeProgress >= 1) {
        closeProgress = 1;
        phase = 'over';
        gameOver();
      }
    }

    // tile entrance animations
    for (var i = 0; i < tiles.length; i++) {
      var tile = tiles[i];
      tile.alpha += (tile.targetAlpha - tile.alpha) * 0.12 * dt;
      if (tile.vy) {
        tile.vy *= Math.pow(0.85, dt);
        if (Math.abs(tile.vy) < 0.1) tile.vy = 0;
      }
    }

    // prompt fade in
    if (phase === 'play') {
      promptAlpha += (1 - promptAlpha) * 0.04 * dt;
    }

    // juice
    if (shakeAmt > 0.2) shakeAmt *= Math.pow(0.82, dt);
    else shakeAmt = 0;
    zoom += (1 - zoom) * 0.12 * dt;

    // ---- draw ----
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    // background
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
    // subtle warm vignette
    var vg = cx.createRadialGradient(W/2, H/2, 80, W/2, H/2, 420);
    vg.addColorStop(0, 'rgba(46,197,182,0.04)');
    vg.addColorStop(1, 'rgba(11,13,18,0.18)');
    cx.fillStyle = vg;
    cx.fillRect(0, 0, W, H);

    if (phase === 'title') {
      drawTitle(now);
    } else if (phase === 'play' || phase === 'closing') {
      drawPlay(now);
    } else if (phase === 'over') {
      drawOver(now);
    } else if (phase === 'cta') {
      drawCta(now);
    }

    // floats
    for (var k = floats.length - 1; k >= 0; k--) {
      var fl = floats[k];
      fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 55);
      cx.globalAlpha = fa;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '500 ' + fl.size + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y - fl.t * 0.35);
      cx.globalAlpha = 1;
      if (fl.t > 55) floats.splice(k, 1);
    }

    // mute toggle
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.4;
      cx.font = '15px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 24);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawTitle(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '300 36px -apple-system, Helvetica, Arial';
    cx.fillText('safe list', W / 2, 280);
    cx.fillStyle = 'rgba(255,255,255,0.38)';
    cx.font = '400 15px -apple-system, Helvetica, Arial';
    cx.fillText('what do you know for certain right now?', W / 2, 316);
    var pulse = 0.5 + 0.35 * Math.sin(now / 700);
    cx.globalAlpha = pulse;
    cx.fillStyle = TEAL;
    cx.font = '500 14px -apple-system, Helvetica, Arial';
    cx.fillText('tap to begin', W / 2, 380);
    cx.globalAlpha = 1;
  }

  function drawPlay(now) {
    // header — soft prompt
    cx.globalAlpha = promptAlpha;
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.font = '300 14px -apple-system, Helvetica, Arial';
    cx.fillText('what do you know for certain right now?', W / 2, LIST_TOP - 28);
    cx.globalAlpha = 1;

    // closing fold — clip tiles with a "folding down" curtain
    var curtainY = phase === 'closing' ? LIST_TOP + closeProgress * (H - LIST_TOP) : H + 100;

    // draw tiles
    for (var i = 0; i < tiles.length; i++) {
      var tile = tiles[i];
      var ty = tileY(i) + (tile.vy || 0);
      if (ty > curtainY) continue; // clipped by closing animation
      cx.globalAlpha = tile.alpha;
      drawRoundRect(LIST_X, ty, LIST_W, TILE_H - 4, 8);
      cx.fillStyle = tile.color;
      cx.fill();
      // soft inner highlight
      cx.globalAlpha = tile.alpha * 0.18;
      drawRoundRect(LIST_X + 2, ty + 2, LIST_W - 4, (TILE_H - 4) / 2, 6);
      cx.fillStyle = '#fff';
      cx.fill();
      cx.globalAlpha = 1;
    }

    // closing curtain (folding paper effect)
    if (phase === 'closing' && closeProgress > 0) {
      var curtH = closeProgress * (H - LIST_TOP);
      cx.fillStyle = 'rgba(11,13,18,0.75)';
      cx.fillRect(LIST_X - 8, LIST_TOP, LIST_W + 16, curtH);
      // fold crease line
      cx.strokeStyle = 'rgba(46,197,182,0.5)';
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.moveTo(LIST_X - 8, LIST_TOP + curtH);
      cx.lineTo(LIST_X + LIST_W + 8, LIST_TOP + curtH);
      cx.stroke();
    }

    // CLOSE button (human only, play phase)
    if (phase === 'play' && !DEMO && !BOT && tiles.length > 0) {
      var cp = 0.55 + 0.35 * Math.sin(now / 900);
      cx.globalAlpha = cp;
      drawRoundRect(CLOSE_R.x, CLOSE_R.y, CLOSE_R.w, CLOSE_R.h, 22);
      cx.fillStyle = 'rgba(46,197,182,0.12)';
      cx.fill();
      cx.strokeStyle = TEAL;
      cx.lineWidth = 1;
      cx.stroke();
      cx.globalAlpha = 1;
      cx.textAlign = 'center';
      cx.fillStyle = TEAL;
      cx.font = '500 14px -apple-system, Helvetica, Arial';
      cx.fillText('close the list', W / 2, CLOSE_R.y + 28);
      cx.globalAlpha = 1;
    }

    // tap hint (early, before any tiles)
    if (phase === 'play' && tiles.length === 0 && !DEMO && !BOT) {
      var ph = 0.4 + 0.35 * Math.sin(now / 600);
      cx.globalAlpha = ph;
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '400 13px -apple-system, Helvetica, Arial';
      cx.fillText('tap anywhere to add', W / 2, LIST_TOP + 60);
      cx.globalAlpha = 1;
    }

    // score / count (soft, not aggressive)
    if (tiles.length > 0) {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.22)';
      cx.font = '300 12px -apple-system, Helvetica, Arial';
      cx.fillText(score + (score === 1 ? ' thing' : ' things'), W / 2, LIST_TOP - 10);
    }
  }

  function drawOver(now) {
    var t = (now - overAt) / 1000;
    var ease = Math.min(1, t * 1.6);

    // subtle overlay
    cx.fillStyle = 'rgba(11,13,18,0.55)';
    cx.fillRect(0, 0, W, H);

    cx.globalAlpha = ease;
    cx.textAlign = 'center';

    // the list is closed
    cx.fillStyle = 'rgba(255,255,255,0.88)';
    cx.font = '300 32px -apple-system, Helvetica, Arial';
    cx.fillText('you closed it.', W / 2, 300);

    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '400 15px -apple-system, Helvetica, Arial';
    cx.fillText(score + (score === 1 ? ' certainty held.' : ' certainties held.'), W / 2, 338);

    // gentle tap hint
    if (!DEMO && !BOT) {
      var pulse = 0.5 + 0.35 * Math.sin(now / 800);
      cx.globalAlpha = ease * pulse;
      cx.fillStyle = TEAL;
      cx.font = '500 13px -apple-system, Helvetica, Arial';
      cx.fillText('tap to begin again', W / 2, 420);
    }
    cx.globalAlpha = 1;
  }

  function drawCta(now) {
    var t = (now - ctaAt) / 1000;
    var ease = Math.min(1, t * 2);

    cx.fillStyle = 'rgba(11,13,18,0.80)';
    cx.fillRect(0, 0, W, H);

    cx.globalAlpha = ease;
    cx.textAlign = 'center';

    cx.fillStyle = '#fff';
    cx.font = '300 34px -apple-system, Helvetica, Arial';
    cx.fillText('safe list', W / 2, 300);

    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '400 15px -apple-system, Helvetica, Arial';
    cx.fillText('make yours.', W / 2, 338);

    var pulse2 = 0.7 + 0.25 * Math.sin(now / 600);
    cx.globalAlpha = ease * pulse2;
    cx.fillStyle = TEAL;
    cx.font = '600 18px -apple-system, Helvetica, Arial';
    cx.fillText('▶ GROW YOURS', W / 2, 410);

    cx.globalAlpha = ease * 0.6;
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '400 13px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 444);

    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
