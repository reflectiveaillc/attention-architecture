<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // ─── Game constants ───────────────────────────────────────────────
  var ROUNDS = 7;                 // guesses per run
  // Like count pools (authentic-feeling numbers)
  var COUNT_POOLS = [
    [  112,   843,  2100,  8400, 34000, 127000 ],
    [   44,   310,   950,  4200, 19000,  82000 ],
    [   28,   630,  1800,  7700, 28000, 110000 ],
    [  590,  3200,  9900, 42000, 98000, 310000 ],
    [   18,   175,   480,  1900,  7400,  22000 ],
    [  200,  1100,  4400, 17000, 61000, 240000 ],
    [   77,   520,  2900, 11000, 43000, 180000 ]
  ];
  // Threshold each round — player guesses: real likes ABOVE or BELOW threshold?
  var THRESHOLDS = [ 1000, 500, 5000, 15000, 300, 3000, 8000 ];
  // Captions shown on each post card (IG/TikTok flavour)
  var CAPTIONS = [
    'pov: you finally said it out loud',
    'things that hit different at 2am',
    'nobody talks about this but they should',
    'the face you make when it actually works',
    'i will never not laugh at this',
    'that moment when you knew you knew',
    'healing but make it unhinged'
  ];
  // "Account" handles shown on card
  var HANDLES = [
    '@solsticevibes', '@notlikeother.txt', '@calmchaos__',
    '@realtalk.reel', '@darkhumourclub', '@glowup.log', '@midnightdump'
  ];

  // Like count formatter
  function fmtK(n) {
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(n >= 10000 ? 0 : 1) + 'K';
    return String(n);
  }

  // percentile function: score 0-7 → top N%
  function pctTop(score) {
    var pts = [99, 90, 80, 65, 48, 30, 15, 5];
    return pts[Math.min(score, 7)];
  }

  // ─── State ────────────────────────────────────────────────────────
  var phase;         // 'challenge' | 'play' | 'bet' | 'reveal' | 'over' | 'cta'
  var score, round;
  var cards;         // [{likes, threshold, caption, handle, poolIdx}]
  var streak;
  var currentGuess;  // 'high' | 'low' | null
  var revealTimer;   // countdown before auto-advance in reveal
  var betChoice;     // 50|25|10 or null
  var betResult;     // 'win'|'lose'|null
  var runStartTs;
  var dareBeaten;
  var flashes;       // floating texts
  var hitStop, shakeAmt, zoom;
  var challengeAt, scoreCardAt, ctaAt;
  var cardSlideT;    // animation t for card entering [0-1]
  var cardFadeOut;   // alpha of old card flying away
  var cardFadeOutT;
  var revealGlow;    // flash amount after reveal
  var lastGuessCorrect;
  var botRunsDone;
  var botPassive;    // once bot makes enough actions, go passive so natural loss fires

  // ─── Input regions ────────────────────────────────────────────────
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var HIGH_R  = { x: 20,     y: 580, w: 175, h: 70 };
  var LOW_R   = { x: 210,    y: 580, w: 175, h: 70 };
  var BET50_R = { x: 20,     y: 500, w: 108, h: 68 };
  var BET25_R = { x: 148,    y: 500, w: 108, h: 68 };
  var BET10_R = { x: 276,    y: 500, w: 108, h: 68 };
  var SHARE_R = { x: W/2-125, y: 580, w: 250, h: 50 };
  function inR(r, x, y) { return x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h; }

  // ─── Init ─────────────────────────────────────────────────────────
  function buildCards() {
    cards = [];
    for (var i = 0; i < ROUNDS; i++) {
      var pool = COUNT_POOLS[i % COUNT_POOLS.length];
      var likes = pool[Math.floor(rng() * pool.length)];
      cards.push({
        likes:     likes,
        threshold: THRESHOLDS[i % THRESHOLDS.length],
        caption:   CAPTIONS[i % CAPTIONS.length],
        handle:    HANDLES[i % HANDLES.length],
        poolIdx:   i
      });
    }
  }

  function newGame() {
    buildCards();
    score = 0; round = 0; streak = 0;
    currentGuess = null; betChoice = null; betResult = null;
    dareBeaten = false; flashes = [];
    hitStop = 0; shakeAmt = 0; zoom = 1;
    cardSlideT = 0; cardFadeOut = 0; cardFadeOutT = 1;
    revealGlow = 0; lastGuessCorrect = null;
    revealTimer = 0; botRunsDone = 0; botPassive = false;
    phase = 'challenge';
    challengeAt = performance.now();
    if (DEMO) {
      // beat 1: challenge card ~1.2s then auto-start
      setTimeout(startRun, 1250);
    } else {
      // humans and bot see challenge briefly, then play
      setTimeout(startRun, BOT ? 400 : 1400);
    }
  }

  function startRun() {
    phase = 'play';
    round = 0;
    cardSlideT = 0;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ─── Guess logic ──────────────────────────────────────────────────
  function makeGuess(guess) {
    if (phase !== 'play' || currentGuess !== null) return;
    currentGuess = guess;
    var card = cards[round];
    var correct = (guess === 'high') ? (card.likes > card.threshold) : (card.likes <= card.threshold);
    lastGuessCorrect = correct;

    if (correct) {
      score++;
      streak++;
      var nearMiss = Math.abs(card.likes - card.threshold) / card.threshold < 0.15;
      if (window.J) {
        if (nearMiss) { J.near(); J.hit(streak); }
        else if (streak >= 3) J.perfect(streak);
        else J.hit(streak);
        J.tension(Math.min(round / ROUNDS, 0.9));
      }
      if (nearMiss) {
        flash('SO CLOSE!', GOLD, 34);
        shakeAmt = 3;
        if (window.LOOP) LOOP.emit('near_miss', { round: round, ratio: +(Math.abs(card.likes - card.threshold)/card.threshold).toFixed(3) });
      } else if (streak >= 3) {
        flash('×' + streak + ' STREAK', TEAL, 38);
        hitStop = 3; zoom = 1.025;
      } else {
        flash('+1', TEAL, 32);
      }
    } else {
      streak = 0;
      if (window.J) J.near();
      flash('MISS', VERM, 36);
      shakeAmt = 4;
    }

    revealGlow = 1;
    revealTimer = 90; // frames before auto-advance
    phase = 'reveal';
    if (window.LOOP) LOOP.emit('guess_made', { round: round, guess: guess, correct: correct, score: score });
  }

  function advanceRound() {
    // card fly-away animation
    cardFadeOut = 1; cardFadeOutT = 0;
    currentGuess = null;
    round++;
    if (round >= ROUNDS) {
      // go to bet phase
      setTimeout(function () { phase = 'bet'; cardFadeOut = 0; }, 320);
    } else {
      cardSlideT = 0;
      setTimeout(function () { phase = 'play'; cardFadeOut = 0; }, 320);
    }
  }

  // ─── Bet logic ────────────────────────────────────────────────────
  function placeBet(pct) {
    if (phase !== 'bet' || betChoice !== null) return;
    betChoice = pct;
    var actualPct = pctTop(score); // top N% based on score
    // win condition: bet was EQUAL or BETTER (more confident) than actual
    // e.g. actual top 30% → bet top 50% = WIN; bet top 25% = WIN; bet top 10% = LOSE (too bold if actual is 30%)
    // Actually contract says: bet whether score sits in top 50/25/10 %. Win if correct bracket.
    // We interpret: you win if the score actually IS in that bracket (or better).
    // So: top 10% bracket: win if actualPct <= 10; top 25%: win if actualPct <= 25; top 50%: win if actualPct <= 50
    betResult = (actualPct <= pct) ? 'win' : 'lose';

    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) {
      if (betResult === 'win') J.fanfare();
      else J.death(0.6);
    }
    if (betResult === 'win') {
      flash('BET WON!', GOLD, 42);
      hitStop = 5; zoom = 1.03;
      shakeAmt = 2;
    } else {
      flash('WRONG CALL', VERM, 38);
      shakeAmt = 7;
    }
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (window.LOOP) LOOP.emit('bet_placed', { pct: pct, actual: actualPct, result: betResult });

    // Check dare beaten
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && score > SHARE.dare) {
      dareBeaten = true;
      if (window.J) J.fanfare();
      SHARE.beaten(score);
    }

    phase = 'over';
    scoreCardAt = performance.now();

    if (DEMO) {
      window.__demoScore = score;
      // score card ~2.2s, then cta ~3.5s
      setTimeout(function () {
        phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2300);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(resetRun, 800);
      }
    }
  }

  function resetRun() {
    rng = mulberry32(SEED + botRunsDone * 17);
    buildCards();
    score = 0; round = 0; streak = 0;
    currentGuess = null; betChoice = null; betResult = null;
    flashes = []; hitStop = 0; shakeAmt = 0; zoom = 1;
    cardSlideT = 0; cardFadeOut = 0; cardFadeOutT = 1;
    revealGlow = 0; lastGuessCorrect = null;
    botPassive = false;
    if (window.LOOP) LOOP.emit('restart', {});
    phase = 'play';
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // ─── Floating text ────────────────────────────────────────────────
  function flash(txt, color, size) {
    flashes.push({ txt: txt, color: color, size: size, t: 0 });
  }

  // ─── Demo autopilot ───────────────────────────────────────────────
  // mirror-neuron arc: confident run → near-fail moment → recovery → loss bet
  // script: array of {guess, delayFrames} or 'bet:<pct>'
  var demoScript = [
    { guess: 'high', wait: 38 },   // round 0 — correct, confident
    { guess: 'low',  wait: 26 },   // round 1 — correct
    { guess: 'high', wait: 44 },   // round 2 — correct, hesitation
    { guess: 'low',  wait: 55 },   // round 3 — NEAR-FAIL tension
    { guess: 'high', wait: 34 },   // round 4 — correct, recovery
    { guess: 'low',  wait: 48 },   // round 5 — correct
    { guess: 'high', wait: 30 },   // round 6 — correct/miss, real fail moment
  ];
  var demoBetChoice = 10;  // bold bet → will win (score is likely ≥5 → top 30%)
  // Demo will get ~5-6/7 right and bet top 10% (actualPct=15 → LOSE the bet → spectacle!)
  // So the fail is the bet loss, perfect ending.
  var demoIdx = 0, demoWait = 42, demoBetWait = 60;

  // Bot autopilot state
  var botWait = 0, botBetWait = 0, botActionCount = 0;
  var BOT_MAX_ACTIONS = 5; // after this many correct, go passive → natural losses fire via wrong bet

  function autopilot() {
    if (DEMO) {
      demoPilot();
    } else if (BOT) {
      botPilot();
    }
  }

  function demoPilot() {
    if (phase === 'play' && currentGuess === null) {
      if (demoWait > 0) { demoWait--; return; }
      var step = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      makeGuess(step.guess);
      demoWait = step.wait;
      demoIdx++;
    } else if (phase === 'reveal') {
      // wait for auto-advance (handled by revealTimer in frame loop)
    } else if (phase === 'bet' && betChoice === null) {
      if (demoBetWait > 0) { demoBetWait--; return; }
      placeBet(demoBetChoice);
    }
  }

  function botPilot() {
    if (phase === 'play' && currentGuess === null) {
      if (botWait > 0) { botWait--; return; }
      botActionCount++;
      if (botPassive || botActionCount > BOT_MAX_ACTIONS) {
        // start making wrong guesses to reach game_over faster
        botPassive = true;
        var card = cards[Math.min(round, cards.length - 1)];
        // deliberately guess wrong: if likes > threshold, guess low
        var wrongGuess = (card.likes > card.threshold) ? 'low' : 'high';
        makeGuess(wrongGuess);
      } else {
        // correct guess most of the time
        var card2 = cards[Math.min(round, cards.length - 1)];
        var correctGuess = (card2.likes > card2.threshold) ? 'high' : 'low';
        // small noise: sometimes wrong
        if (rng() < 0.25) correctGuess = (correctGuess === 'high') ? 'low' : 'high';
        makeGuess(correctGuess);
      }
      botWait = 10 + Math.floor(rng() * 15);
    } else if (phase === 'bet' && betChoice === null) {
      if (botBetWait > 0) { botBetWait--; return; }
      // Bot always bets too high → lose → triggers game_over path
      var bets = [50, 25, 10];
      var boldBet = bets[Math.floor(rng() * bets.length)];
      placeBet(boldBet);
      botBetWait = 0;
    }
  }

  // ─── Input ────────────────────────────────────────────────────────
  function tap(x, y) {
    if (DEMO || BOT) return;
    // mute toggle
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }

    if (phase === 'challenge') { startRun(); return; }

    if (phase === 'play') {
      if (x !== undefined) {
        if (inR(HIGH_R, x, y)) { makeGuess('high'); return; }
        if (inR(LOW_R,  x, y)) { makeGuess('low');  return; }
      }
      return;
    }

    if (phase === 'reveal') {
      // tap to skip reveal
      advanceRound();
      return;
    }

    if (phase === 'bet') {
      if (x !== undefined) {
        if (inR(BET50_R, x, y)) { placeBet(50); return; }
        if (inR(BET25_R, x, y)) { placeBet(25); return; }
        if (inR(BET10_R, x, y)) { placeBet(10); return; }
      }
      return;
    }

    if (phase === 'over' && performance.now() - scoreCardAt > 400) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE && betResult === 'win') {
        SHARE.send({ score: score, unit: 'pts' }); return;
      }
      if (betResult === 'lose') {
        // wrong bet → end session, no restart (the game's penalty)
        // show a brief message then reset
        setTimeout(function () { newGame(); }, 600);
      } else {
        newGame();
      }
      return;
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'ArrowLeft')  tap(HIGH_R.x + 1, HIGH_R.y + 1);
    if (e.code === 'ArrowRight') tap(LOW_R.x  + 1, LOW_R.y  + 1);
    if (e.code === 'Space') tap();
  });

  // ─── Draw helpers ─────────────────────────────────────────────────
  function drawRoundRect(x, y, w, h, r, fill, stroke) {
    cx.beginPath();
    if (cx.roundRect) {
      cx.roundRect(x, y, w, h, r);
    } else {
      cx.moveTo(x + r, y);
      cx.lineTo(x + w - r, y);
      cx.quadraticCurveTo(x + w, y, x + w, y + r);
      cx.lineTo(x + w, y + h - r);
      cx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      cx.lineTo(x + r, y + h);
      cx.quadraticCurveTo(x, y + h, x, y + h - r);
      cx.lineTo(x, y + r);
      cx.quadraticCurveTo(x, y, x + r, y);
      cx.closePath();
    }
    if (fill) { cx.fillStyle = fill; cx.fill(); }
    if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = 1.5; cx.stroke(); }
  }

  // Draw a post card (the IG/TikTok look)
  function drawCard(card, cx2, alpha, slideT) {
    if (!card) return;
    var cardX = W / 2, cardY = 300;
    var cardW = 340, cardH = 230;
    var slideOffset = (1 - Math.min(slideT, 1)) * 60;

    cx2.save();
    cx2.globalAlpha = alpha * Math.min(slideT * 2, 1);
    cx2.translate(0, slideOffset);

    // card bg
    drawRoundRect(cardX - cardW/2, cardY - cardH/2, cardW, cardH, 18,
      'rgba(20,22,30,0.97)', 'rgba(255,255,255,0.08)');

    // fake image area (gradient placeholder)
    var imgY = cardY - cardH/2 + 12, imgH = 110;
    cx2.save();
    cx2.beginPath();
    if (cx2.roundRect) cx2.roundRect(cardX - cardW/2 + 12, imgY, cardW - 24, imgH, 10);
    else cx2.rect(cardX - cardW/2 + 12, imgY, cardW - 24, imgH);
    cx2.clip();
    // gradient placeholder
    var seed2 = card.poolIdx * 137;
    var hue1 = (seed2 * 73 + 180) % 360, hue2 = (seed2 * 37 + 290) % 360;
    var gr = cx2.createLinearGradient(cardX - cardW/2 + 12, imgY, cardX + cardW/2 - 12, imgY + imgH);
    gr.addColorStop(0, 'hsl(' + hue1 + ',38%,22%)');
    gr.addColorStop(1, 'hsl(' + hue2 + ',44%,16%)');
    cx2.fillStyle = gr;
    cx2.fillRect(cardX - cardW/2 + 12, imgY, cardW - 24, imgH);
    // subtle grid lines to suggest a post
    cx2.strokeStyle = 'rgba(255,255,255,0.05)';
    cx2.lineWidth = 0.5;
    for (var gx = 0; gx < 4; gx++) {
      var lx = cardX - cardW/2 + 12 + gx * (cardW - 24) / 3;
      cx2.beginPath(); cx2.moveTo(lx, imgY); cx2.lineTo(lx, imgY + imgH); cx2.stroke();
    }
    cx2.restore();

    // handle
    cx2.fillStyle = 'rgba(255,255,255,0.55)';
    cx2.font = '600 11px Menlo, monospace';
    cx2.textAlign = 'left';
    cx2.fillText(card.handle, cardX - cardW/2 + 16, imgY + imgH + 18);

    // caption
    cx2.fillStyle = 'rgba(255,255,255,0.88)';
    cx2.font = '500 13px -apple-system, Helvetica, Arial';
    cx2.textAlign = 'left';
    // word-wrap the caption in ~34 chars
    var words = card.caption.split(' '), line = '', lines = [];
    for (var wi = 0; wi < words.length; wi++) {
      var test = line + (line ? ' ' : '') + words[wi];
      if (test.length > 32 && line) { lines.push(line); line = words[wi]; }
      else line = test;
    }
    if (line) lines.push(line);
    for (var li = 0; li < Math.min(lines.length, 2); li++) {
      cx2.fillText(lines[li], cardX - cardW/2 + 16, imgY + imgH + 36 + li * 17);
    }

    // ❤ icon and HIDDEN count
    cx2.font = '700 12px -apple-system, Helvetica, Arial';
    cx2.textAlign = 'left';
    cx2.fillStyle = VERM;
    cx2.fillText('♥', cardX - cardW/2 + 16, imgY + imgH + 78);
    cx2.fillStyle = 'rgba(255,255,255,0.35)';
    cx2.fillText('? ? ? likes', cardX - cardW/2 + 30, imgY + imgH + 78);

    cx2.restore();
  }

  // Draw the threshold zone
  function drawThreshold(card, alpha) {
    if (!card) return;
    cx.save();
    cx.globalAlpha = alpha;
    cx.textAlign = 'center';
    // threshold label
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '600 11px Menlo, monospace';
    cx.fillText('THRESHOLD', W/2, 452);
    cx.fillStyle = GOLD;
    cx.font = '900 32px -apple-system, Helvetica, Arial';
    cx.fillText(fmtK(card.threshold) + ' likes', W/2, 482);
    cx.restore();
  }

  function drawGuessButtons(now, alpha) {
    cx.save();
    cx.globalAlpha = alpha;
    // HIGH button
    var hPulse = 0.85 + 0.15 * Math.sin(now / 340);
    cx.globalAlpha = alpha * hPulse;
    drawRoundRect(HIGH_R.x, HIGH_R.y, HIGH_R.w, HIGH_R.h, 14,
      'rgba(46,197,182,0.15)', TEAL);
    cx.fillStyle = TEAL;
    cx.font = '900 20px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText('↑ ABOVE', HIGH_R.x + HIGH_R.w/2, HIGH_R.y + HIGH_R.h/2 + 7);

    // LOW button
    cx.globalAlpha = alpha * (0.85 + 0.15 * Math.sin(now / 340 + 1.2));
    drawRoundRect(LOW_R.x, LOW_R.y, LOW_R.w, LOW_R.h, 14,
      'rgba(232,80,46,0.15)', VERM);
    cx.fillStyle = VERM;
    cx.font = '900 20px -apple-system, Helvetica, Arial';
    cx.textAlign = 'center';
    cx.fillText('↓ BELOW', LOW_R.x + LOW_R.w/2, LOW_R.y + LOW_R.h/2 + 7);

    cx.restore();
  }

  function drawReveal(card, alpha) {
    if (!card) return;
    cx.save();
    cx.globalAlpha = alpha;
    // show real like count
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '600 12px Menlo, monospace';
    cx.fillText('ACTUAL LIKES', W/2, 452);
    cx.fillStyle = lastGuessCorrect ? TEAL : VERM;
    cx.font = '900 40px -apple-system, Helvetica, Arial';
    cx.fillText(fmtK(card.likes), W/2, 496);
    // vs threshold
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('threshold: ' + fmtK(card.threshold), W/2, 520);
    // correct / wrong label
    cx.fillStyle = lastGuessCorrect ? TEAL : VERM;
    cx.font = '900 22px -apple-system, Helvetica, Arial';
    cx.fillText(lastGuessCorrect ? 'CORRECT ✓' : 'WRONG ✗', W/2, 548);
    // tap to continue
    var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 300);
    cx.fillStyle = 'rgba(255,255,255,' + (0.3 + 0.2 * pulse) + ')';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('tap to continue', W/2, 582);
    cx.restore();
  }

  function drawBetPhase(now, alpha) {
    cx.save();
    cx.globalAlpha = alpha;
    cx.textAlign = 'center';
    // Header
    cx.fillStyle = '#fff';
    cx.font = '900 26px -apple-system, Helvetica, Arial';
    cx.fillText('PLACE YOUR BET', W/2, 160);
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('where does your score land today?', W/2, 186);

    // Score display
    cx.fillStyle = GOLD;
    cx.font = '900 80px -apple-system, Helvetica, Arial';
    cx.fillText(score + '/' + ROUNDS, W/2, 300);
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText('correct guesses', W/2, 326);

    // Bet label
    cx.fillStyle = 'rgba(255,255,255,0.6)';
    cx.font = '700 13px Menlo, monospace';
    cx.fillText('MY SCORE IS IN THE TOP:', W/2, 474);

    // Bet buttons
    var bets = [
      { r: BET50_R, pct: 50, label: 'TOP 50%', color: TEAL },
      { r: BET25_R, pct: 25, label: 'TOP 25%', color: GOLD },
      { r: BET10_R, pct: 10, label: 'TOP 10%', color: VERM },
    ];
    for (var bi = 0; bi < bets.length; bi++) {
      var b = bets[bi];
      var pulse2 = 0.85 + 0.15 * Math.sin(now / 360 + bi * 0.8);
      cx.globalAlpha = alpha * pulse2;
      drawRoundRect(b.r.x, b.r.y, b.r.w, b.r.h, 12,
        b.color.replace(')', ',0.15)').replace('rgb', 'rgba'), b.color);
      cx.fillStyle = b.color;
      cx.font = '900 16px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText(b.label, b.r.x + b.r.w/2, b.r.y + b.r.h/2 + 6);
    }
    cx.restore();
  }

  function drawScoreCard(now, alpha) {
    cx.save();
    cx.globalAlpha = alpha;
    cx.textAlign = 'center';

    if (betResult === 'win') {
      // Win state
      cx.fillStyle = GOLD;
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('BET WON', W/2, 240);
      cx.fillStyle = '#fff';
      cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(score + '/' + ROUNDS + ' correct', W/2, 284);
      var pt = pctTop(score);
      cx.fillStyle = TEAL;
      cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W/2, 332);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('bet: top ' + betChoice + '%  ·  actual: top ' + pt + '%', W/2, 358);

      // dare beaten flash
      if (dareBeaten) {
        cx.fillStyle = TEAL; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('DARE BEATEN ✓', W/2, 385);
      }

      if (!DEMO && !BOT) {
        cx.fillStyle = 'rgba(255,255,255,0.6)';
        cx.font = '700 14px -apple-system, Helvetica, Arial';
        var p4 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = alpha * p4;
        cx.fillText('TAP — PLAY AGAIN', W/2, 430);
        cx.globalAlpha = alpha;
        // Share pill
        drawRoundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 25,
          'rgba(242,177,52,0.15)', GOLD);
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W/2, SHARE_R.y + 32);
        // incoming dare banner
        if (window.SHARE && SHARE.dare !== null) {
          cx.fillStyle = dareBeaten ? TEAL : GOLD;
          cx.font = '700 13px -apple-system, Helvetica, Arial';
          cx.globalAlpha = alpha * 0.8;
          cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : ('BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : '')), W/2, 648);
        }
      }
    } else {
      // Lose state — the spectacular fail
      cx.fillStyle = VERM;
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('WRONG BET.', W/2, 240);
      cx.fillStyle = '#fff';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText(score + '/' + ROUNDS + ' correct', W/2, 278);
      var pt2 = pctTop(score);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('actual: top ' + pt2 + '%  ·  you bet: top ' + betChoice + '%', W/2, 308);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('wrong call ends the run. no share.', W/2, 338);
      if (!DEMO && !BOT) {
        var p5 = 0.5 + 0.5 * Math.sin(now / 320);
        cx.globalAlpha = alpha * p5;
        cx.fillStyle = VERM;
        cx.font = '700 15px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO TRY AGAIN', W/2, 392);
      }
    }
    cx.restore();
  }

  // ─── Main render loop ─────────────────────────────────────────────
  var last = performance.now();

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // card slide-in animation
    if (phase === 'play') cardSlideT = Math.min(cardSlideT + dt * 0.09, 1);
    // card fade-out
    if (cardFadeOut > 0) { cardFadeOutT = Math.min(cardFadeOutT + dt * 0.12, 1); }

    // reveal timer auto-advance
    if (phase === 'reveal') {
      revealTimer -= dt;
      if (revealTimer <= 0) advanceRound();
    }

    // reveal glow decay
    if (revealGlow > 0) revealGlow = Math.max(0, revealGlow - dt * 0.03);

    // hit-stop decay + autopilot gate
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      autopilot();
    }

    // juice: shake + zoom decay
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W/2 + sx, H/2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W/2, -H/2);
    }
    shakeAmt *= Math.pow(0.84, dt);
    zoom += (1 - zoom) * 0.13 * dt;

    // ── background ──
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // reveal glow overlay
    if (revealGlow > 0 && (phase === 'reveal' || phase === 'play')) {
      var glowColor = lastGuessCorrect ? 'rgba(46,197,182,' : 'rgba(232,80,46,';
      cx.fillStyle = glowColor + (revealGlow * 0.12) + ')';
      cx.fillRect(0, 0, W, H);
    }

    // ── CHALLENGE CARD ──
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.font = '700 14px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W/2, 296);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('23', W/2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's dare to beat", W/2, 432);
      if (!DEMO && !BOT) {
        var p0 = 0.5 + 0.5 * Math.sin(now / 320);
        cx.globalAlpha = p0;
        cx.fillStyle = VERM; cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP TO START', W/2, 492);
        cx.globalAlpha = 1;
      }
    }

    // ── PLAY + REVEAL + BET + OVER ──
    if (phase === 'play' || phase === 'reveal') {
      var curCard = cards[Math.min(round, cards.length - 1)];
      var slideAlpha = cardFadeOut > 0 ? Math.max(0, 1 - cardFadeOutT) : 1;
      drawCard(curCard, cx, slideAlpha, cardSlideT);
      // round counter
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px Menlo, monospace';
      cx.fillText('ROUND ' + (round + 1) + ' / ' + ROUNDS, W/2, 152);
      // score
      cx.fillStyle = 'rgba(255,255,255,0.9)';
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText(score, W/2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('score', W/2, 116);
      // streak badge
      if (streak >= 2) {
        cx.fillStyle = GOLD;
        cx.font = '700 12px -apple-system, Helvetica, Arial';
        cx.fillText('🔥 ' + streak + ' STREAK', W/2 + 90, 90);
      }

      if (phase === 'play') {
        drawThreshold(curCard, 1);
        drawGuessButtons(now, 1);
        // incoming dare banner during play
        if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
          cx.fillStyle = dareBeaten ? TEAL : GOLD;
          cx.font = '700 12px -apple-system, Helvetica, Arial';
          cx.textAlign = 'center';
          cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare, W/2, 672);
        }
      }
      if (phase === 'reveal') {
        drawReveal(curCard, 1);
      }
    }

    if (phase === 'bet') {
      drawBetPhase(now, 1);
    }

    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      drawScoreCard(now, 1);
    }

    if (phase === 'cta') {
      var te = (now - ctaAt) / 1000, ease = Math.min(1, te * 2.5);
      cx.fillStyle = 'rgba(11,13,18,' + (0.8 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('PERCENTILE POKER', W/2, 270);
      cx.fillStyle = 'rgba(255,255,255,0.6)'; cx.font = '700 17px -apple-system, Helvetica, Arial';
      cx.fillText('they got ' + (window.__demoScore || 5) + '/' + ROUNDS + '. beat it.', W/2, 308);
      var p6 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p6;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 5), W/2, 380);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W/2, 412);
      cx.globalAlpha = 1;
    }

    // ── Floating texts ──
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 38);
      cx.save();
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W/2, 220 - fl.t * 0.7);
      cx.restore();
      if (fl.t > 38) flashes.splice(k, 1);
    }

    // ── Mute toggle ──
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w/2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
