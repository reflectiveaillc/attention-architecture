<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 10;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips and bot runs are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var BASE_RATE = 50;                           // points/sec at t=0
  var ACCEL = 1.6;                              // multiplier per second
  var LN_A = Math.log(ACCEL);                   // for value integral
  var MIN_POP = 3.5, MAX_POP = 9.0;             // pop point range (seconds)
  var NEAR_MS = 400;                            // near-miss window before pop
  var HOLDS_PER_RUN = 5;

  var state, floaters, runStartTs, best = 0;
  var challengeAt = 0, scoreAt = 0;
  try { best = +localStorage.getItem('ho_best') || 0; } catch (_) {}

  function valueAt(t) {
    // integral of BASE_RATE * ACCEL^t from 0 to t
    return Math.round(BASE_RATE * (Math.pow(ACCEL, t) - 1) / LN_A);
  }

  function popPoint() { return MIN_POP + rng() * (MAX_POP - MIN_POP); }

  function format(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 2000))));
  }

  // mirror-neuron beat 1 (contract §4): the challenge card primes "SCORE TO BEAT"
  // with the demo's FINAL banked total. The demo's release schedule is deterministic
  // from SEED (hold 1 banks at popAt-2.2, hold 2 banks at popAt-0.12, hold 3 pops),
  // so we precompute the exact total on a cloned RNG to display before play starts.
  function computeDemoScore() {
    var r = mulberry32(SEED), banked = 0;
    for (var h = 1; h <= 3; h++) {
      var popAt = MIN_POP + r() * (MAX_POP - MIN_POP);
      var popMs = popAt * 1000, relT;
      if (h === 1) relT = Math.max(400, popMs - 2200) / 1000;
      else if (h === 2) relT = Math.max(400, popMs - 120) / 1000;
      else continue;                                  // hold 3 pops — lost
      if (relT < popAt) banked += valueAt(relT);
    }
    return banked;
  }

  function newGame() {
    state = {
      phase: 'title',          // title | challenge | play | scorecard | over | cta
      holds: [],               // completed holds this run
      holdN: 0,                // current hold (1..HOLDS_PER_RUN)
      popAt: 0,                // seconds from hold start until pop
      holdStart: 0,            // performance.now() when current hold began (0 = not holding)
      holding: false,
      bankStart: 0,
      bestThis: 0,             // best single banked hold this run
      runBots: 0,              // runs completed in bot mode
      combo: 0,                // consecutive banks this run (drives J.hit pitch ladder)
      dareBeaten: false,
      shake: 0,
      hitStop: 0,
      zoom: 1,
      ctaAt: 0,
      scoreAt: 0,
      nextBotAt: 0             // when demo/bot should begin next hold
    };
    floaters = [];
    if (DEMO) {
      state.demoScore = computeDemoScore();
      window.__demoScore = state.demoScore;
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    state.holds = [];
    state.holdN = 0;
    state.bankStart = 0;
    state.bestThis = 0;
    state.combo = 0;
    state.dareBeaten = false;
    runStartTs = Date.now();
    nextHold(DEMO ? 450 : 0);                          // demo: a beat of hesitation before hold 1
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function nextHold(delayMs) {
    state.holding = false;
    if (DEMO && state.holdN >= 3) {
      setTimeout(showDemoScoreCard, delayMs);
      return;
    }
    if (state.holdN >= HOLDS_PER_RUN) { gameOver(); return; }
    state.holdN++;
    state.popAt = popPoint();
    state.holdStart = 0;
    if (DEMO || BOT) state.nextBotAt = performance.now() + delayMs;
  }

  function beginHold() {
    if (state.phase !== 'play') return;
    state.holding = true;
    state.holdStart = performance.now();
  }

  function elapsed() { return (performance.now() - state.holdStart) / 1000; }

  function bank() {
    if (!state.holding) return;
    var t = elapsed();
    if (t >= state.popAt) return; // pop already happened this frame
    var v = valueAt(t);
    var margin = state.popAt - t;
    var near = margin > 0 && margin * 1000 <= NEAR_MS;
    state.holding = false;
    state.bankStart += v;
    state.combo++;
    if (v > state.bestThis) state.bestThis = v;
    state.holds.push({ n: state.holdN, value: v, banked: true });
    if (window.LOOP) LOOP.emit('hold_result', { n: state.holdN, value: v, banked: true });
    if (window.J) {
      if (near) J.near();                              // the sliver save — tense whoosh
      else J.hit(state.combo);                         // reward pop, pitch climbs with combo
      J.tension(0);
    }
    if (near) { state.hitStop = 4; state.zoom = 1.03; }  // hit-stop + zoom-pulse on the save
    else { state.zoom = 1.012; }
    if (near) {
      if (window.LOOP) LOOP.emit('near_miss', { value: v, margin_ms: Math.round(margin * 1000) });
      flash('BANKED ' + (margin < 0.1 ? '0.1' : margin.toFixed(1)) + 's BEFORE POP', TEAL, 22);
    } else {
      flash('+ ' + format(v) + ' BANKED', '#4fd36c', 30);
    }
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !state.dareBeaten && state.bankStart > SHARE.dare) {
      state.dareBeaten = true;
      flash('DARE BEATEN', TEAL, 40);
      if (window.J) J.fanfare();
      SHARE.beaten(state.bankStart);
    }
    // demo hesitation: a longer human pause before the greedy hold 3 (the sliver just saved)
    nextHold(DEMO ? (state.holdN === 1 ? 650 : 1100) : (near ? 700 : 500));
  }

  function pop() {
    if (!state.holding) return;
    var v = valueAt(state.popAt);
    state.holding = false;
    state.combo = 0;
    state.holds.push({ n: state.holdN, value: v, banked: false });
    if (window.LOOP) LOOP.emit('hold_result', { n: state.holdN, value: v, banked: false });
    state.shake = 16; state.hitStop = 5; state.zoom = 1.04;   // death spectacle: shake + hit-stop + zoom
    if (window.J) { J.death(Math.min(1, 0.4 + v / 4000)); J.tension(0); }
    flash('POPPED — LOST ' + format(v), VERM, 30);
    var pause = (DEMO && state.holdN === 3) ? 2000 : 700;
    nextHold(pause);
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    if (window.J) J.tension(0);
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.bankStart > best;
    if (newBest) {
      best = state.bankStart;
      try { localStorage.setItem('ho_best', String(best)); } catch (_) {}
    }
    if (window.LOOP) LOOP.emit('game_over', { score: state.bankStart, dur_s: +dur.toFixed(1) });
    if (newBest && window.J) setTimeout(function () { J.fanfare(); }, 450);
    if (DEMO) {
      setTimeout(showDemoScoreCard, 900);
    } else if (BOT) {
      state.runBots++;
      if (state.runBots >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(resetRun, 900);
    }
  }

  function resetRun() {
    state.holds = [];
    state.holdN = 0;
    state.bankStart = 0;
    state.bestThis = 0;
    state.combo = 0;
    state.dareBeaten = false;
    if (window.J) J.tension(0);
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  // mirror-neuron beats 5–6 (contract §4): score card (~2.2s) then dare CTA (~3.5s)
  function showDemoScoreCard() {
    state.phase = 'scorecard';
    state.scoreAt = performance.now();
    if (window.__demoScore === undefined) window.__demoScore = state.bankStart;
    setTimeout(showDemoCTA, 2200);
  }

  function showDemoCTA() {
    state.phase = 'cta';
    state.ctaAt = performance.now();
    setTimeout(function () { window.__demoDone = true; }, 3500);
  }

  function flash(txt, color, size) { floaters.push({ txt: txt, color: color, size: size, t: 0, x: W / 2, y: 250 }); }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 430, w: 250, h: 44 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function press(x, y) {
    if (DEMO || BOT) return;                           // scripted modes ignore human input
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && !state.holding) { beginHold(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {   // share pill tap
        SHARE.send({ score: state.bankStart, unit: 'banked' }); return;
      }
      resetRun();
    }
  }
  function release() {
    if (DEMO || BOT) return;
    if (state.phase === 'play' && state.holding) { bank(); }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    press((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('pointerup', release);
  window.addEventListener('pointerleave', release);
  window.addEventListener('pointercancel', release);
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') press(); });
  window.addEventListener('keyup', function (e) { if (e.code === 'Space') release(); });

  // ---- demo / bot autopilots ----
  // demo script (mirror-neuron arc, contract §4): 3 holds.
  //   hold 1 — safe early bank (popAt - 2.2s): the comfortable opener.
  //   hold 2 — the NEAR-FAIL + RECOVERY (~60% in): ridden right to the edge and
  //            released 0.12s before the pop. Reads as "it's over" — then the save.
  //            Hesitation before it (longer wait) keeps it human, never robotic.
  //   hold 3 — the real FAIL: greed held past the pop, full death spectacle.
  // The release schedule is deterministic from SEED; computeDemoScore() mirrors it.
  var demoHold = 0, demoReleaseAt = 0;

  function autopilot() {
    if (state.phase !== 'play') return;
    var now = performance.now();
    if (DEMO || BOT) {
      if (!state.holding && state.holdStart === 0 && now >= state.nextBotAt) {
        beginHold();
        if (state.holding) {
          var popMs = state.popAt * 1000;
          if (DEMO) {
            demoHold++;
            if (demoHold === 1) demoReleaseAt = state.holdStart + Math.max(400, popMs - 2200);
            else if (demoHold === 2) demoReleaseAt = state.holdStart + Math.max(400, popMs - 120);
            else if (demoHold === 3) demoReleaseAt = state.holdStart + popMs + 400;
          } else {
            // seeded release: some banks, some pops
            var target = rng() * (popMs + 1200);
            demoReleaseAt = state.holdStart + Math.max(400, target);
          }
        }
      }
      if (state.holding && now >= demoReleaseAt) releaseSim();
    }
  }

  function releaseSim() {
    if (!state.holding) return;
    var t = elapsed();
    if (t >= state.popAt) pop(); else bank();
  }

  // ---- render ----
  function hexToRgb(hex) {
    var n = parseInt(hex.slice(1), 16);
    return { r: n >> 16, g: (n >> 8) & 255, b: n & 255 };
  }
  function mix(a, b, t) {
    var ca = hexToRgb(a), cb = hexToRgb(b);
    var r = Math.round(ca.r + (cb.r - ca.r) * t);
    var g = Math.round(ca.g + (cb.g - ca.g) * t);
    var b = Math.round(ca.b + (cb.b - ca.b) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }
  function riskColor(r) {
    if (r < 0.5) return mix(TEAL, GOLD, r / 0.5);
    return mix(GOLD, VERM, Math.min(1, (r - 0.5) / 0.5));
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    autopilot();

    // pop detection
    if (state.phase === 'play' && state.holding && elapsed() >= state.popAt) {
      pop();
    }

    // stakes rising: the longer you hold, the louder the tension riser (contract §2)
    if (window.J && state.phase === 'play') {
      if (state.holding) J.tension(Math.min(1, elapsed() / state.popAt));
      else J.tension(0);
    }

    // juice transforms: decaying shake + zoom-pulse, frozen during hit-stop (the impact "bites")
    if (state.hitStop > 0) {
      state.hitStop -= dt;
    } else {
      if (state.shake > 0) state.shake = Math.max(0, state.shake - 0.8 * dt);
      state.zoom += (1 - state.zoom) * 0.12 * dt;
    }

    cx.save();
    if (state.shake > 0.2 || state.zoom > 1.001) {
      var sx = (Math.random() - 0.5) * state.shake, sy = (Math.random() - 0.5) * state.shake;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(state.zoom, state.zoom); cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // total banked (top center)
    if (state.phase === 'play' || state.phase === 'over' || state.phase === 'scorecard' || state.phase === 'cta') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(format(state.bankStart), W / 2, 86);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BANKED', W / 2, 108);
      if (best > 0) cx.fillText('BEST ' + format(best), W / 2, 128);
    }

    // hold counter
    if (state.phase === 'play' || state.phase === 'over' || state.phase === 'scorecard' || state.phase === 'cta') {
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '700 14px -apple-system, Menlo, monospace';
      cx.textAlign = 'center';
      cx.fillText('HOLD ' + state.holdN + ' / ' + HOLDS_PER_RUN, W / 2, 160);
    }

    // incoming dare banner (human mode only — contract §9)
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = state.dareBeaten ? TEAL : GOLD;
      cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(state.dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + format(SHARE.dare) + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 188);
    }

    // active hold circle + value
    if (state.phase === 'play' && state.holding) {
      var t = elapsed();
      var r = Math.min(1, t / state.popAt);
      var v = valueAt(t);
      var color = riskColor(r);
      var radius = 60 + 70 * r;

      cx.beginPath();
      cx.arc(W / 2, 360, radius, 0, Math.PI * 2);
      cx.lineWidth = 8;
      cx.strokeStyle = color;
      cx.globalAlpha = 0.85;
      cx.stroke();
      cx.globalAlpha = 1;

      var g = cx.createRadialGradient(W / 2, 360, radius * 0.3, W / 2, 360, radius);
      g.addColorStop(0, 'rgba(255,255,255,0.04)');
      g.addColorStop(1, color.replace('rgb', 'rgba').replace(')', ',0.15)'));
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(W / 2, 360, radius, 0, Math.PI * 2); cx.fill();

      cx.fillStyle = '#fff';
      cx.font = '900 56px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.textBaseline = 'middle';
      cx.fillText(format(v), W / 2, 360);
      cx.textBaseline = 'alphabetic';

      cx.fillStyle = color;
      cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('release to bank', W / 2, 410);
    }

    // between-holds prompt
    if (state.phase === 'play' && !state.holding && state.holdN > 0 && state.holdN < HOLDS_PER_RUN && !DEMO && !BOT) {
      var p = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = p;
      cx.fillStyle = TEAL;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText('HOLD AGAIN', W / 2, 410);
      cx.globalAlpha = 1;
    }

    // floaters
    for (var k = floaters.length - 1; k >= 0; k--) {
      var fl = floaters[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 55);
      fl.y -= 1.2 * dt;
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + fl.size + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, fl.x, fl.y);
      cx.globalAlpha = 1;
      if (fl.t > 55) floaters.splice(k, 1);
    }

    // challenge card (demo beat 1 — primes the competitive frame)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 78px -apple-system, Helvetica, Arial';
      cx.fillText(format(state.demoScore || 0), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 52px -apple-system, Helvetica, Arial';
      cx.fillText('HOLD ON', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('release to bank. hold for more. it pops.', W / 2, 340);
      cx.fillStyle = TEAL; cx.font = '700 20px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('HOLD TO START', W / 2, 400); cx.globalAlpha = 1;
      if (best > 0) {
        cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('BEST RUN ' + format(best), W / 2, 435);
      }
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';

      var popped = state.holds.filter(function (h) { return !h.banked; });
      var biggestLost = popped.reduce(function (m, h) { return h.value > m.value ? h : m; }, { value: 0, n: 0 });

      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText(format(state.bankStart), W / 2, 270);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('TOTAL BANKED', W / 2, 296);

      cx.fillStyle = GOLD; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('BEST HOLD ' + format(state.bestThis), W / 2, 340);

      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      if (biggestLost.value > 0) {
        cx.fillText('you rode hold #' + biggestLost.n + ' to ' + format(biggestLost.value), W / 2, 390);
        cx.fillText('and lost it. one release earlier…', W / 2, 410);
      } else {
        cx.fillText('never popped — you\'re leaving points on the table.', W / 2, 400);
      }

      if (!DEMO && !BOT) {
        // share pill (contract §9) — tappable "⚡ DARE A FRIEND" zone
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 22) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && state.dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 28);
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('HOLD — ONE MORE RUN', W / 2, 500);
        cx.globalAlpha = 1;
      }
    }

    // demo score card (beat 5 — score + rank line, ~2.2s)
    if (state.phase === 'scorecard') {
      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 60px -apple-system, Helvetica, Arial';
      cx.fillText(format(state.bankStart), W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('TOTAL BANKED', W / 2, 328);
      var pt = pctTop(state.bankStart);
      cx.fillStyle = GOLD; cx.font = '900 26px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 380);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 404);
    }

    // demo CTA card (beat 6 — DIRECT challenge, not an invitation)
    if (state.phase === 'cta') {
      var t = (now - state.ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      var ds = window.__demoScore || state.bankStart || 0;
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 54px -apple-system, Helvetica, Arial';
      cx.fillText('HOLD ON', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he banked ' + format(ds) + '. your move.', W / 2, 335);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + format(ds), W / 2, 405);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 438);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only — contract §2)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
