<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ink Fill — Tilt</title>
<!--
  LOOP / attention-architecture — Ink Fill
  Engine: calm. Circuits: 06-zeigarnik, 05-ease, 08-investment.
  Mechanic: outlined shape sits empty; hold to let ink flood-fill from touch.
  The ink always stops before the last corner — hold until it reaches every edge.
  Score = shapes completed (ink reached all edges within time limit).
  Game over when shape fails to fill within the time limit (ink runs out).

  Modes:
    ?demo=1&seed=7    scripted calm arc ~16s → soft CTA → window.__demoDone
    ?bot=1&runs=N&seed=M  imperfect autopilot N runs → window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'ink-fill';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot')  === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 deterministic RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  // Calm — no vermillion

  // ---- Shape definitions ----
  // Each shape: array of [x,y] path points (closed polygon), relative to shape center
  // Plus a "weak corner" that fills last (for the hook moment)
  function makeShapes() {
    return [
      // Shape 0: wide rectangle
      { pts: [[-80,-55],[80,-55],[80,55],[-80,55]], name: 'rect', timeLimit: 8 },
      // Shape 1: hexagon
      { pts: [
          [0,-70],[60,-35],[60,35],[0,70],[-60,35],[-60,-35]
        ], name: 'hex', timeLimit: 9 },
      // Shape 2: diamond
      { pts: [[0,-75],[65,0],[0,75],[-65,0]], name: 'diamond', timeLimit: 8 },
      // Shape 3: rounded square (approximated as octagon)
      { pts: [
          [-40,-65],[40,-65],[65,-40],[65,40],[40,65],[-40,65],[-65,40],[-65,-40]
        ], name: 'octagon', timeLimit: 10 },
      // Shape 4: wide arch / U-shape zig
      { pts: [
          [-70,-60],[70,-60],[70,0],[20,0],[20,60],[-20,60],[-20,0],[-70,0]
        ], name: 'bracket', timeLimit: 11 }
    ];
  }
  var SHAPES = makeShapes();
  var SHAPE_CX = W / 2;
  var SHAPE_CY = 340;

  // ---- Game state ----
  var state;             // phase: 'title' | 'play' | 'over' | 'cta'
  var flashes = [];
  var runStartTs = 0;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var ctaAt = 0, overAt = 0;
  var score = 0;
  var shapeDef = null;   // current shape definition
  var shapeIdx = 0;
  var fillPct = 0;       // 0..1 current fill level
  var holdTimer = 0;     // seconds held this press
  var holding = false;
  var touchX = 0, touchY = 0;
  var fillRate = 0.18;   // fill per second while holding
  var drainRate = 0.06;  // fill drains slowly when not holding
  var timeLeft = 0;      // seconds before game over
  var inkParticles = []; // drip particles
  var completeGlow = 0;  // 0..1 bloom on completion
  var SHARE_R = { x: W / 2 - 120, y: 540, w: 240, h: 44 };

  // ---- Shape geometry helpers ----
  function shapeAbsPoints() {
    return shapeDef.pts.map(function(p){ return [SHAPE_CX + p[0], SHAPE_CY + p[1]]; });
  }

  function drawShapePath() {
    var pts = shapeAbsPoints();
    cx.beginPath();
    cx.moveTo(pts[0][0], pts[0][1]);
    for (var i = 1; i < pts.length; i++) cx.lineTo(pts[i][0], pts[i][1]);
    cx.closePath();
  }

  // Bounding box of current shape
  function shapeBounds() {
    var pts = shapeDef.pts;
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (var i = 0; i < pts.length; i++) {
      if (pts[i][0] < minX) minX = pts[i][0];
      if (pts[i][0] > maxX) maxX = pts[i][0];
      if (pts[i][1] < minY) minY = pts[i][1];
      if (pts[i][1] > maxY) maxY = pts[i][1];
    }
    return { minX: SHAPE_CX+minX, minY: SHAPE_CY+minY,
             maxX: SHAPE_CX+maxX, maxY: SHAPE_CY+maxY };
  }

  // Pick next shape (seeded)
  function nextShape() {
    shapeIdx = Math.floor(rng() * SHAPES.length);
    shapeDef = SHAPES[shapeIdx];
    timeLeft = shapeDef.timeLimit;
    fillPct = 0;
    completeGlow = 0;
    inkParticles = [];
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- Input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function startHold(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J && !DEMO && !BOT) { J.toggleMute(); return; }
    if (state.phase === 'title') { beginRun(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: score, unit: 'shapes' }); return;
      }
      resetRun(); return;
    }
    if (state.phase === 'play') {
      holding = true;
      if (x !== undefined) { touchX = x; touchY = y; }
    }
  }
  function endHold() {
    if (DEMO || BOT) return;
    holding = false;
  }

  cv.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    var px = (e.clientX - r.left) / scale, py = (e.clientY - r.top) / scale;
    startHold(px, py);
  });
  cv.addEventListener('pointermove', function (e) {
    if (!holding || DEMO || BOT) return;
    var r = cv.getBoundingClientRect();
    touchX = (e.clientX - r.left) / scale;
    touchY = (e.clientY - r.top) / scale;
  });
  cv.addEventListener('pointerup', function () { endHold(); });
  cv.addEventListener('pointercancel', function () { endHold(); });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') { holding = true; } });
  window.addEventListener('keyup',   function (e) { if (e.code === 'Space') { holding = false; } });

  // ---- Game logic ----
  function newGame() {
    state = { phase: 'title' };
    flashes = []; inkParticles = [];
    holding = false; fillPct = 0; score = 0;
    hitStop = 0; shakeAmt = 0; zoom = 1;
    shapeIdx = 0; shapeDef = SHAPES[0];
    timeLeft = shapeDef.timeLimit;
    if (DEMO) { beginRun(); return; }
    if (BOT)  { beginRun(); return; }
  }

  function beginRun() {
    state.phase = 'play';
    runStartTs = Date.now();
    nextShape();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // Called each frame when shape is being filled
  function updateFill(dt) {
    var dtS = dt / 60;

    if (holding) {
      holdTimer += dtS;
      fillPct += fillRate * dtS;
      // Spawn ink drip particles
      if (Math.random() < 0.3 * dt) spawnInkDrip();
    } else {
      holdTimer = 0;
      fillPct -= drainRate * dtS;
    }
    fillPct = Math.max(0, Math.min(1, fillPct));

    // Time limit counts down regardless
    timeLeft -= dtS;

    // Completion check — ink reached all edges
    if (fillPct >= 1.0) {
      onShapeComplete();
      return;
    }

    // Time ran out — game over
    if (timeLeft <= 0) {
      gameOver();
    }
  }

  function onShapeComplete() {
    score++;
    completeGlow = 1;
    zoom = 1.025;
    if (BOT) botShapesDone++;
    if (window.J) J.calm(score);
    var msg = score === 1 ? 'FILLED' : score < 4 ? 'COMPLETE' : 'FLOWING';
    flash(msg, TEAL, 32);
    if (window.LOOP) LOOP.emit('shape_filled', { n: score, shape: shapeDef.name });

    // Brief pause then next shape
    state.phase = 'between';
    var delayMs = DEMO ? 900 : 1200;
    setTimeout(function () {
      if (state.phase === 'between') {
        nextShape();
        state.phase = 'play';
        if (window.J) J.calm(score + 1);
      }
    }, delayMs);
  }

  function gameOver() {
    if (state.phase !== 'play') return;
    state.phase = 'over';
    overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    shakeAmt = 4;
    if (window.J) J.calm(score);
    if (window.LOOP) LOOP.emit('game_over', { score: score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = score;
      setTimeout(function () {
        state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) {
        window.__botDone = true;
      } else {
        setTimeout(resetRun, 700);
      }
    }
  }

  function resetRun() {
    flashes = []; inkParticles = [];
    holding = false; fillPct = 0; score = 0;
    hitStop = 0; shakeAmt = 0; zoom = 1;
    completeGlow = 0;
    botHolding = false; botHoldFor = 0; botPauseFor = 0; botShapesDone = 0;
    demoIdx = 0; demoTimer = 0; demoHolding = false; demoPhase = 'hold';
    // Reset rng for reproducibility
    rng = mulberry32(SEED);
    if (window.LOOP) LOOP.emit('restart', {});
    beginRun();
  }

  // ---- Ink drip particles ----
  function spawnInkDrip() {
    var b = shapeBounds();
    inkParticles.push({
      x: b.minX + rng() * (b.maxX - b.minX),
      y: b.minY + fillPct * (b.maxY - b.minY) + (rng() - 0.5) * 12,
      vy: 0.4 + rng() * 0.8,
      r: 1.5 + rng() * 2.5,
      life: 0,
      maxLife: 40 + rng() * 30,
      alpha: 0.6 + rng() * 0.4
    });
  }

  // ---- Demo / Bot autopilot ----
  var botRunsDone = 0;
  var botHolding = false;
  var botHoldFor = 0;    // frames to hold
  var botPauseFor = 0;   // frames to pause
  var botShapesDone = 0; // shapes bot has completed; after 2 it goes passive so time runs out

  // Demo script: [holdFrames, pauseFrames] — calm settle→deepen→resolve
  // At 60fps: fill needs ~1/fillRate = ~5.6s = 336 frames of pure hold to complete
  // fillRate=0.18/s, so to fill 100% need 100%/0.18 = 5.55s
  // But drainRate=0.06/s when released, so partial drain is manageable
  // For ~16s demo total with 3-4 shapes:
  // Shape 1: slow hold (settle) — hold 200 pause 30 hold 150 → complete
  // Then brief between-shape pause (1s)
  // Shape 2: deepen — hold 220 pause 20 → complete
  // Then game over when time runs out on shape 3
  var demoScript = [
    // [type, frames] type: 'hold'|'pause'
    { type: 'hold', frames: 180 },
    { type: 'pause', frames: 25 },
    { type: 'hold', frames: 200 },   // fills shape 1
    { type: 'pause', frames: 60 },   // between shapes (natural game pause)
    { type: 'hold', frames: 200 },
    { type: 'pause', frames: 20 },
    { type: 'hold', frames: 160 },   // fills shape 2
    { type: 'pause', frames: 55 },   // between shapes
    { type: 'hold', frames: 160 },   // partially fills shape 3 (slow drain causes time out)
    { type: 'pause', frames: 999 }   // let time run out → game_over
  ];
  var demoIdx = 0, demoTimer = 0, demoHolding = false, demoPhase = 'hold';

  function autopilot(dt) {
    if (state.phase !== 'play' && state.phase !== 'between') return;

    if (DEMO) {
      if (demoIdx >= demoScript.length) { holding = false; demoHolding = false; return; }
      var step = demoScript[demoIdx];
      demoTimer += dt;
      if (step.type === 'hold') {
        if (!demoHolding) { demoHolding = true; holding = true; }
        if (demoTimer >= step.frames) {
          demoIdx++; demoTimer = 0;
          if (demoScript[demoIdx] && demoScript[demoIdx].type === 'pause') {
            holding = false; demoHolding = false;
          }
        }
      } else {
        holding = false; demoHolding = false;
        if (demoTimer >= step.frames) { demoIdx++; demoTimer = 0; }
      }
      return;
    }

    if (BOT) {
      // After 2 completed shapes, go fully passive — let timeLeft drain to 0 → game_over
      if (botShapesDone >= 2) {
        holding = false; botHolding = false;
        return;
      }
      if (botPauseFor > 0) {
        botPauseFor -= dt;
        holding = false; botHolding = false;
        return;
      }
      if (!botHolding) {
        // Hold for 120-280 frames, then pause briefly
        botHoldFor = 120 + Math.floor(rng() * 160);
        botHolding = true; holding = true;
      }
      botHoldFor -= dt;
      if (botHoldFor <= 0) {
        holding = false; botHolding = false;
        botPauseFor = 15 + Math.floor(rng() * 20); // short pause (imperfect)
      }
    }
  }

  // ---- Render helpers ----
  function drawInkFill(pct) {
    if (!shapeDef) return;
    var b = shapeBounds();
    var fillH = (b.maxY - b.minY) * pct;
    var fillTop = b.maxY - fillH;

    // Clip to shape
    cx.save();
    drawShapePath();
    cx.clip();

    // Ink fill (bottom to top)
    var g = cx.createLinearGradient(0, b.maxY, 0, b.minY);
    g.addColorStop(0,   'rgba(46,197,182,0.95)');
    g.addColorStop(0.6, 'rgba(46,197,182,0.80)');
    g.addColorStop(1,   'rgba(46,197,182,0.55)');
    cx.fillStyle = g;
    cx.fillRect(b.minX - 2, fillTop, b.maxX - b.minX + 4, fillH + 2);

    // Ink surface shimmer line
    if (pct > 0.02 && pct < 0.99) {
      cx.strokeStyle = 'rgba(255,255,255,0.35)';
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.moveTo(b.minX, fillTop);
      cx.lineTo(b.maxX, fillTop);
      cx.stroke();
    }

    // Ink particles inside
    for (var i = 0; i < inkParticles.length; i++) {
      var p = inkParticles[i];
      if (p.y < fillTop) continue;
      var la = p.alpha * (1 - p.life / p.maxLife);
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(255,255,255,' + la.toFixed(2) + ')';
      cx.fill();
    }

    cx.restore();
  }

  function drawShapeOutline(pct) {
    if (!shapeDef) return;
    // Outline fades as fill completes
    var alpha = pct >= 0.98 ? Math.max(0, (1 - pct) * 50) : 1;
    drawShapePath();
    cx.strokeStyle = 'rgba(46,197,182,' + (0.6 * alpha).toFixed(2) + ')';
    cx.lineWidth = 2.5;
    cx.stroke();
    // Empty interior hint (very faint)
    if (pct < 0.1) {
      drawShapePath();
      cx.fillStyle = 'rgba(46,197,182,0.04)';
      cx.fill();
    }
  }

  function drawTimerArc(pct, timeLeft, timeLimit) {
    // Small arc timer at bottom of shape
    var cx_ = cx, cy_ = SHAPE_CY + 120;
    var arcPct = timeLeft / timeLimit;
    cx_.beginPath();
    cx_.arc(W / 2, cy_, 14, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * arcPct);
    cx_.strokeStyle = arcPct < 0.3 ? 'rgba(242,177,52,0.7)' : 'rgba(46,197,182,0.4)';
    cx_.lineWidth = 2;
    cx_.stroke();
  }

  function drawCompletionGlow(glow) {
    if (glow < 0.01) return;
    var b = shapeBounds();
    var cx_ = W / 2, cy_ = (b.minY + b.maxY) / 2;
    var r = Math.max(b.maxX - b.minX, b.maxY - b.minY) * 0.8;
    var grad = cx.createRadialGradient(cx_, cy_, 0, cx_, cy_, r);
    grad.addColorStop(0, 'rgba(46,197,182,' + (0.25 * glow).toFixed(2) + ')');
    grad.addColorStop(1, 'rgba(46,197,182,0)');
    cx.fillStyle = grad;
    cx.beginPath(); cx.arc(cx_, cy_, r, 0, Math.PI * 2); cx.fill();
  }

  // ---- Main render loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    if (DEMO || BOT) autopilot(dt);

    if (state.phase === 'play') {
      updateFill(dt);
      // Update ink particles
      for (var pi = inkParticles.length - 1; pi >= 0; pi--) {
        var p = inkParticles[pi];
        p.life += dt; p.y += p.vy * dt;
        if (p.life >= p.maxLife) inkParticles.splice(pi, 1);
      }
    }

    // Decay hit-stop
    if (hitStop > 0) hitStop -= dt;

    // Decay juice
    completeGlow *= Math.pow(0.94, dt);

    // ---- Draw ----
    cx.save();
    // Juice transforms
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.10 * dt;

    // Background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    // Subtle teal vignette on hold
    if (holding && (state.phase === 'play' || state.phase === 'between')) {
      var vigAlpha = Math.min(0.07, fillPct * 0.08);
      var vigG = cx.createRadialGradient(W/2, SHAPE_CY, 40, W/2, SHAPE_CY, 280);
      vigG.addColorStop(0, 'rgba(46,197,182,' + vigAlpha + ')');
      vigG.addColorStop(1, 'rgba(46,197,182,0)');
      cx.fillStyle = vigG; cx.fillRect(0, 0, W, H);
    }

    // Completion glow
    drawCompletionGlow(completeGlow);

    // ---- Phases ----
    if (state.phase === 'title') {
      drawTitle(now);
    } else if (state.phase === 'play' || state.phase === 'between') {
      drawPlay(now);
    } else if (state.phase === 'over') {
      drawPlay(now);
      drawOver(now);
    } else if (state.phase === 'cta') {
      drawPlay(now);
      drawCta(now);
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  function drawTitle(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.90)';
    cx.font = '300 42px -apple-system, Helvetica, Arial';
    cx.fillText('INK FILL', W / 2, 268);
    cx.fillStyle = 'rgba(255,255,255,0.42)';
    cx.font = '400 15px -apple-system, Helvetica, Arial';
    cx.fillText('hold to pour · fill the shape', W / 2, 306);

    // Draw empty shape preview
    if (shapeDef) {
      drawShapeOutline(0);
    }

    var pulse = 0.5 + 0.45 * Math.sin(now / 720);
    cx.globalAlpha = pulse;
    cx.fillStyle = TEAL;
    cx.font = '600 15px -apple-system, Helvetica, Arial';
    cx.fillText('HOLD TO BEGIN', W / 2, 490);
    cx.globalAlpha = 1;

    cx.fillStyle = 'rgba(255,255,255,0.20)';
    cx.font = '400 12px -apple-system, Helvetica, Arial';
    cx.fillText('reach every edge', W / 2, 516);
  }

  function drawPlay(now) {
    // Shape outline + fill
    if (shapeDef) {
      drawShapeOutline(fillPct);
      drawInkFill(fillPct);
      if (state.phase === 'play') {
        drawTimerArc(fillPct, timeLeft, shapeDef.timeLimit);
      }
    }

    // Score
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.88)';
    cx.font = '700 56px -apple-system, Helvetica, Arial';
    cx.fillText(score, W / 2, 106);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '400 12px -apple-system, Helvetica, Arial';
    cx.fillText('shapes filled', W / 2, 126);

    // Fill progress label
    if (state.phase === 'play' && fillPct > 0.05) {
      var pctLabel = Math.round(fillPct * 100) + '%';
      cx.fillStyle = 'rgba(46,197,182,' + Math.min(1, fillPct + 0.3) + ')';
      cx.font = '600 13px Menlo, monospace';
      cx.fillText(pctLabel, W / 2, SHAPE_CY + 148);
    }

    // "Hold" instruction (early)
    if (state.phase === 'play' && score === 0 && fillPct < 0.15) {
      var instA = Math.max(0, 0.45 - fillPct * 3);
      cx.fillStyle = 'rgba(255,255,255,' + instA + ')';
      cx.font = '400 13px -apple-system, Helvetica, Arial';
      cx.fillText('hold anywhere to pour', W / 2, SHAPE_CY + 170);
    }

    // Dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
      cx.fillStyle = GOLD;
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText('FILL ' + SHARE.dare + ' shapes' + (SHARE.by ? ' — ' + SHARE.by : ''), W / 2, 156);
    }

    // Flashes
    for (var fi = flashes.length - 1; fi >= 0; fi--) {
      var fl = flashes[fi]; fl.t += 1;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '600 ' + (fl.size + fl.t * 0.25) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, SHAPE_CY - 90 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(fi, 1);
    }
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.72)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.font = '300 28px -apple-system, Helvetica, Arial';
    cx.fillText('ink ran out', W / 2, 286);
    cx.fillStyle = TEAL;
    cx.font = '700 68px -apple-system, Helvetica, Arial';
    cx.fillText(score, W / 2, 366);
    cx.fillStyle = 'rgba(255,255,255,0.50)';
    cx.font = '400 14px -apple-system, Helvetica, Arial';
    cx.fillText('shapes filled', W / 2, 392);

    if (!DEMO && !BOT) {
      var pulse = 0.55 + 0.4 * Math.sin(now / 700);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('tap to pour again', W / 2, 442);
      cx.globalAlpha = 1;
      // Share pill
      cx.fillStyle = 'rgba(242,177,52,0.12)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 22);
      else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD; cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('⚡ DARE A FRIEND', W / 2, SHARE_R.y + 28);
    }
  }

  function drawCta(now) {
    var t = (now - ctaAt) / 1000;
    var ease = Math.min(1, t * 1.8);
    cx.fillStyle = 'rgba(11,13,18,' + (0.88 * ease).toFixed(2) + ')';
    cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.88)';
    cx.font = '300 38px -apple-system, Helvetica, Arial';
    cx.fillText('INK FILL', W / 2, 288);
    cx.fillStyle = 'rgba(255,255,255,0.50)';
    cx.font = '400 16px -apple-system, Helvetica, Arial';
    cx.fillText('pour until every edge is reached', W / 2, 322);
    var p2 = 0.7 + 0.3 * Math.sin(now / 650);
    cx.fillStyle = TEAL; cx.globalAlpha = ease * p2;
    cx.font = '700 20px -apple-system, Helvetica, Arial';
    cx.fillText('▶ GROW YOURS', W / 2, 396);
    cx.globalAlpha = ease;
    cx.fillStyle = 'rgba(255,255,255,0.30)';
    cx.font = '400 13px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 426);
    cx.globalAlpha = 1;
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
