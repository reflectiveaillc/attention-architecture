<script>
(function () {

  // mulberry32 seeded RNG
  function mulberry32(a) {

      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);

    var buf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);

    for (var i = 0; i < data.length; i++) { data[i] = (rng() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.015)); }
    var src = ac.createBufferSource();

    hgain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
    src.start(time); src.stop(time + 0.06);

  }

    var data = buf.getChannelData(0);

      var env = Math.exp(-i / (ac.sampleRate * 0.04));
      data[i] = (rng() * 2 - 1) * env;
    }
    var src = ac.createBufferSource();
    var sgain = ac.createGain();
    src.buffer = buf; src.connect(sgain); sgain.connect(ac.destination);
    sgain.gain.setValueAtTime(0.4 * v, time);
    sgain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    src.start(time); src.stop(time + 0.15);
  }

  function scheduleBeats(startSec) {
    var ac = getAudio();
    if (!ac) return;
    var totalBeats = AUDIBLE_BARS * BEATS_PER_BAR;
    for (var b = 0; b < totalBeats; b++) {
      var t = startSec + (b * BEAT_MS) / 1000;
      var beatInBar = b % BEATS_PER_BAR;
      playBeat(t, beatInBar === 0, 1);
      if (beatInBar === 1 || beatInBar === 3) playSnare(t, 1);
    }
  }

  // ---- State ----
  var phase = 'title';   // title | challenge | play | over | cta
  var playStartMs = 0;   // when play phase started (performance.now)
  var silenceStartMs = 0; // when silence begins (= playStartMs + AUDIBLE_MS)
  var phantomBeatMs = 0;  // absolute time of phantom beat (bar 4, beat 1)
  var tapTime = null;     // performance.now() when player tapped (null = no tap yet)
  var tapError = null;    // ms from phantom beat (signed)
  var tapScore = null;    // score = max(0, 500 - abs(error)); lower ms = better
  var overAt = 0;
  var runStartTs = 0;
  var best = 999999;
  var bestLabel = '--';
  var dareBeaten = false;
  var flashes = [];
  var hitStop = 0, zoom = 1, shakeAmt = 0;
  var challengeAt = 0, ctaAt = 0;
  var last = performance.now();

  // bar/beat animation state
  var curBeat = -1;          // which beat we're on (0..11 for 3 bars)
  var beatFlash = 0;         // 0..1, decays
  var beatFlashIdx = -1;     // which beat flashed

  try { var s = localStorage.getItem('sb_best'); if (s !== null) { best = +s; bestLabel = best + 'ms'; } } catch (_) {}

  function saveBest(ms) {
    if (ms < best) {
      best = ms;
      bestLabel = ms + 'ms';
      try { localStorage.setItem('sb_best', String(ms)); } catch (_) {}
      return true;
    }
    return false;
  }

  // ---- score helpers ----
  function errToScore(absErr) {
    // score = ms error. Lower = better. Cap at 500ms.
    return Math.min(500, Math.round(absErr));
  }
  function pctTop(ms) {
    // 0ms = top 1%; 500ms = top 80%
    return Math.max(1, Math.min(99, Math.round(1 + 79 * (ms / 500))));
  }
  function qualityLabel(absErr) {
    if (absErr <= PERFECT_WINDOW_MS) return 'PERFECT';
    if (absErr <= 60) return 'GREAT';
    if (absErr <= NEAR_MS) return 'CLOSE';
    return 'MISSED IT';
  }

  // ---- flash ----
  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- game flow ----
  function newGame() {
    phase = 'title';
    tapTime = null; tapError = null; tapScore = null;
    dareBeaten = false; flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    curBeat = -1; beatFlash = 0;

    if (DEMO) {
      phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1300);
      return;
    }
    if (BOT) {
      setTimeout(startRun, 100);
    }
  }

  function startRun() {
    phase = 'play';
    tapTime = null; tapError = null; tapScore = null;
    flashes = []; dareBeaten = false;
    curBeat = -1; beatFlash = 0;
    runStartTs = Date.now();
    playStartMs = performance.now();
    silenceStartMs = playStartMs + AUDIBLE_MS;
    phantomBeatMs = silenceStartMs + 0;  // bar 4 beat 1 lands exactly when bar 3 ends
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED, bpm: BPM });

    // Schedule audio
    if (!DEMO && !BOT && window.J && !J.muted) {
      var ac = getAudio();
      if (ac) {
        if (ac.state === 'suspended') ac.resume().then(doSchedule);
        else doSchedule();
      }
    }
    function doSchedule() {
      var ac = getAudio();
      if (!ac) return;
      scheduleBeats(ac.currentTime + 0.05);
    }

    // Start beat tracking for visual
    scheduleBeatTick();

    // After silence begins, show the waiting state
    // After response window, auto-miss if no tap
    setTimeout(function () {
      if (phase === 'play' && tapTime === null) {
        // They missed the window entirely — worst score
        tapTime = phantomBeatMs + BEAT_MS; // very late
        tapError = BEAT_MS;
        tapScore = errToScore(Math.abs(tapError));
        finishRound();
      }
    }, AUDIBLE_MS + RESPONSE_WINDOW_MS + 100);
  }

  function scheduleBeatTick() {
    var TOTAL = AUDIBLE_BARS * BEATS_PER_BAR;
    for (var b = 0; b < TOTAL; b++) {
      (function(beat) {
        setTimeout(function () {
          if (phase === 'play') {
            curBeat = beat;
            beatFlash = 1;
            beatFlashIdx = beat;
          }
        }, beat * BEAT_MS);
      })(b);
    }
  }

  function doTap() {
    if (phase !== 'play' || tapTime !== null) return;
    tapTime = performance.now();
    tapError = tapTime - phantomBeatMs;  // signed: negative=early, positive=late
    tapScore = errToScore(Math.abs(tapError));
    finishRound();
  }

  function finishRound() {
    var absErr = Math.abs(tapError);
    var label = qualityLabel(absErr);
    var isNewBest = saveBest(tapScore);

    // juice
    if (absErr <= PERFECT_WINDOW_MS) {
      hitStop = 5; zoom = 1.04;
      if (window.J) { J.perfect(1); }
      flash('PERFECT', TEAL, 52);
    } else if (absErr <= 60) {
      hitStop = 3; zoom = 1.02;
      if (window.J) { J.hit(1); }
      flash('GREAT', TEAL, 44);
    } else if (absErr <= NEAR_MS) {
      shakeAmt = 4;
      if (window.J) { J.near(); }
      flash('SO CLOSE', GOLD, 40);
      if (window.LOOP) LOOP.emit('near_miss', { err_ms: Math.round(absErr) });
    } else {
      shakeAmt = 8;
      if (window.J) { J.death(0.4 + Math.min(0.5, absErr / 500)); }
      flash('TOO ' + (tapError < 0 ? 'EARLY' : 'LATE'), VERM, 40);

    if (isNewBest && absErr <= 60) { setTimeout(function () { if (window.J) J.fanfare(); }, 500); }

    // dare check
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && tapScore < SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(tapScore);

      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(resetRun, 700);

  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});

  // ---- bot / demo autopilot ----
  var botRunsDone = 0;
  // Demo script: tap errors in ms (signed). First few are great, then a near-miss recovery, then over.
  var demoScript = [-55, 18, -22, 88, -12, 180]; // ms errors for each attempt
  var demoCurIdx = 0;
  var demoBotArmed = false;
  var demoBotFired = false;

  function armDemoTap() {
    if (!DEMO || phase !== 'play' || demoBotFired) return;
    demoBotFired = true;
    var errMs = demoScript[Math.min(demoCurIdx, demoScript.length - 1)] || 50;

  var botBotArmed = false;
  var botBotFired = false;

  function barY(beatIdx) {

    var GRID_Y = H / 2 - 40;

    var CELL_H = 54;

  function drawGrid(now, progress) {
    // 3 bars of 4 beats + 1 phantom bar
    cx.save();

          cx.lineWidth = 1.5;

          cx.strokeRect(x, y, CELL_W, CELL_H);

            cx.setLineDash([]);
            cx.strokeRect(x, y, CELL_W, CELL_H);

            cx.fillRect(x, y, CELL_W, CELL_H);
            // Question mark

            cx.font = '700 20px -apple-system, Helvetica, Arial';
            cx.textAlign = 'center';
            cx.fillText('?', x + CELL_W / 2, y + CELL_H / 2 + 7);
          } else {
            cx.fillStyle = 'rgba(255,255,255,0.04)';
            cx.fillRect(x, y, CELL_W, CELL_H);
          }
        } else if (isPast || isActive) {
          // beat has played

          var beatInBar = beat % 4;
          var isKick = beatInBar === 0;
          var isSnare = beatInBar === 1 || beatInBar === 3;
          cx.fillStyle = isKick ? 'rgba(46,197,182,0.25)' : (isSnare ? 'rgba(232,80,46,0.2)' : 'rgba(255,255,255,0.1)');

            cx.fillStyle = isKick ? 'rgba(46,197,182,' + (0.5 + flash2 * 0.4) + ')' :

          }
          cx.fillRect(x, y, CELL_W, CELL_H);
          // beat number dot
          cx.fillStyle = isKick ? TEAL : (isSnare ? VERM : 'rgba(255,255,255,0.5)');
          if (flash2 > 0) cx.fillStyle = '#fff';
          cx.beginPath();
          cx.arc(x + CELL_W / 2, y + CELL_H / 2, isKick ? 8 : (isSnare ? 6 : 4), 0, Math.PI * 2);
          cx.fill();
        } else {
          // future beat — dim
          cx.fillStyle = 'rgba(255,255,255,0.05)';
          cx.fillRect(x, y, CELL_W, CELL_H);
          cx.strokeStyle = 'rgba(255,255,255,0.1)';
          cx.lineWidth = 1;
          cx.strokeRect(x, y, CELL_W, CELL_H);
        }
        cx.restore();
      }
    }
    // Bar labels
    cx.textAlign = 'left';
    cx.font = '600 10px Menlo, monospace';
    for (var b2 = 0; b2 < 4; b2++) {
      var ly = GRID_Y + b2 * (CELL_H + GAP);
      cx.fillStyle = b2 === 3 ? 'rgba(242,177,52,0.6)' : 'rgba(255,255,255,0.3)';
      cx.fillText(b2 === 3 ? 'BAR 4 ?' : 'BAR ' + (b2 + 1), GRID_X - 2, ly - 4);
    }
    cx.restore();
  }

  // ---- frame loop ----
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;
    beatFlash = Math.max(0, beatFlash - dt * 0.07);

    // arm autopilots once play starts
    if (DEMO && phase === 'play' && !demoBotFired) armDemoTap();
    if (BOT && phase === 'play' && !botBotFired) armBotTap();

    // hit-stop and autopilot decay
    if (hitStop > 0) hitStop -= dt;

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (rng() - 0.5) * shakeAmt * 2, sy = (rng() - 0.5) * shakeAmt * 2;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt); zoom += (1 - zoom) * 0.14 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bgG = cx.createLinearGradient(0, 0, 0, H);
    bgG.addColorStop(0, 'rgba(46,197,182,0.04)'); bgG.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bgG; cx.fillRect(0, 0, W, H);

    var elapsed = phase === 'play' ? (now - playStartMs) : 0;
    var progress = Math.min(1, elapsed / AUDIBLE_MS);
    var inSilence = phase === 'play' && elapsed >= AUDIBLE_MS;

    // ---- TITLE ----
    if (phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('SILENT BAR', W / 2, 260);
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('3 bars. then silence.', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('tap the phantom beat.', W / 2, 325);
      // pulse cta
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillStyle = VERM;
      cx.font = '800 20px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 400);
      cx.globalAlpha = 1;
      // best
      if (best < 999999) {
        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('BEST ' + bestLabel, W / 2, 440);
      }
    }

    // ---- CHALLENGE CARD (demo) ----
    if (phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 295);
      cx.fillStyle = GOLD; cx.font = '900 100px -apple-system, Helvetica, Arial';
      cx.fillText('38', W / 2, 405);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 14px -apple-system, Helvetica, Arial';
      cx.fillText('ms off the beat', W / 2, 432);
    }

    // ---- PLAY ----
    if (phase === 'play') {
      // Progress bar (audible phase)
      if (!inSilence) {
        var PBY = 200;
        cx.fillStyle = 'rgba(255,255,255,0.1)';
        cx.fillRect(60, PBY, W - 120, 4);
        cx.fillStyle = TEAL;
        cx.fillRect(60, PBY, (W - 120) * progress, 4);
        // beat pulse orb
        var orb = 0.5 + 0.5 * Math.sin(now / (BEAT_MS / Math.PI));
        cx.fillStyle = 'rgba(46,197,182,' + (0.3 + orb * 0.4) + ')';
        cx.beginPath();
        cx.arc(60 + (W - 120) * progress, PBY + 2, 6 + orb * 3, 0, Math.PI * 2);
        cx.fill();
      }

      // BPM / bar indicator
      cx.textAlign = 'center';
      if (!inSilence) {
        cx.fillStyle = 'rgba(255,255,255,0.25)';
        cx.font = '700 12px Menlo, monospace';
        cx.fillText(BPM + ' BPM', W / 2, 185);
        var curBar = Math.floor(elapsed / BAR_MS) + 1;
        cx.fillStyle = TEAL;
        cx.font = '700 12px Menlo, monospace';
        cx.fillText('BAR ' + Math.min(curBar, 3), W / 2, 168);
      } else {
        // SILENCE — anticipation
        var silElapsed = elapsed - AUDIBLE_MS;
        var silPulse = 0.5 + 0.5 * Math.sin((now - silenceStartMs) / (BEAT_MS / Math.PI * 0.5));
        cx.fillStyle = 'rgba(242,177,52,' + (0.5 + silPulse * 0.4) + ')';
        cx.font = '900 22px -apple-system, Helvetica, Arial';
        cx.fillText('· · · ·', W / 2, 185);
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.font = '600 13px Menlo, monospace';
        cx.fillText('TAP THE BEAT', W / 2, 210);
      }

      drawGrid(now, progress);

      // tap hint
      cx.textAlign = 'center';
      if (!inSilence) {
        cx.fillStyle = 'rgba(255,255,255,0.2)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('feel the beat...', W / 2, 640);
      }
    }

    // ---- OVER ----
    if (phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.60)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var aErr = Math.abs(tapError);
      var lbl = qualityLabel(aErr);

      // quality label
      var lColor = aErr <= PERFECT_WINDOW_MS ? TEAL : (aErr <= 60 ? TEAL : (aErr <= NEAR_MS ? GOLD : VERM));
      cx.fillStyle = lColor; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText(lbl, W / 2, 280);

      // ms error
      cx.fillStyle = '#fff'; cx.font = '800 28px -apple-system, Helvetica, Arial';
      cx.fillText(Math.round(aErr) + ' ms ' + (tapError < 0 ? 'EARLY' : 'LATE'), W / 2, 328);

      // rank
      var pt = pctTop(tapScore);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 370);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('best ' + (best < 999999 ? best + 'ms' : '--'), W / 2, 395);

      // grid overlay with answer
      drawGrid(now, 1);

      // show where they tapped vs phantom
      var GRID_X = W / 2 - 160;
      var GRID_Y = 300;
      var CELL_W = 76; var CELL_H = 50; var GAP = 4;
      var px = GRID_X + 0 * (CELL_W + GAP);
      var py = GRID_Y + 3 * (CELL_H + GAP);
      // highlight phantom beat cell
      cx.strokeStyle = GOLD; cx.lineWidth = 2;
      cx.strokeRect(px + 1, py + 1, CELL_W - 2, CELL_H - 2);
      cx.fillStyle = 'rgba(242,177,52,0.15)'; cx.fillRect(px + 1, py + 1, CELL_W - 2, CELL_H - 2);
      cx.fillStyle = GOLD; cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.textAlign = 'center';
      cx.fillText('♩', px + CELL_W / 2, py + CELL_H / 2 + 7);

      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — NEXT BAR', W / 2, 470);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // ---- CTA (demo) ----
    if (phase === 'cta') {
      var tCta = (now - ctaAt) / 1000, easeCta = Math.min(1, tCta * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * easeCta) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = easeCta; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 48px -apple-system, Helvetica, Arial';
      cx.fillText('SILENT BAR', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.65)'; cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('can you feel the beat?', W / 2, 332);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = easeCta * p3;
      cx.font = '900 32px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 38) + 'ms', W / 2, 406);
      cx.globalAlpha = easeCta;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // ---- FLASHES ----
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 38);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 235 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // ---- MUTE toggle ----
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    // incoming dare banner (human play)
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && phase === 'play') {
      cx.textAlign = 'center';
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 14px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + 'ms' + (SHARE.by ? ' — by ' + SHARE.by : ''), W / 2, 152);
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
