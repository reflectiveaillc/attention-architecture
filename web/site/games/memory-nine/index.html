<script>
(function () {
  'use strict';
  var W = 405, H = 720;                       // internal 9:16 space
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) so demo clips are reproducible
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var GRID = { cols: 3, rows: 3, tile: 90, gap: 15, top: 210 };
  GRID.left = (W - (GRID.cols * GRID.tile + (GRID.cols - 1) * GRID.gap)) / 2;

  var state, runStartTs, best = 0;
  try { best = +localStorage.getItem('mn_best') || 0; } catch (_) {}

  // juice state
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false, challengeAt = 0;

  // tile helpers
  function tileRect(i) {
    var c = i % GRID.cols, r = Math.floor(i / GRID.cols);
    return {
      x: GRID.left + c * (GRID.tile + GRID.gap),
      y: GRID.top + r * (GRID.tile + GRID.gap),
      w: GRID.tile, h: GRID.tile
    };
  }
  function tileAtXY(x, y) {
    for (var i = 0; i < 9; i++) {
      var r = tileRect(i);
      if (x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h) return i;
    }
    return -1;
  }

  function flash(txt, color, size) { state.flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  function newGame() {
    state = {
      phase: 'title',            // title | challenge | playback | input | sweep | over | cta | interstitial
      round: 0,                  // current round number
      seq: [],                   // full generated sequence
      step: 0,                   // input step index
      flashTile: -1,             // tile currently flashing in playback
      flashUntil: 0,             // when current flash ends
      gapUntil: 0,               // gap between flashes
      playbackIdx: 0,            // index in seq during playback
      glows: [],                 // active tile glows: {tile, t, color, max}
      flashes: [],               // floating text rewards
      demoJump: null,            // {round, until} set after round clear in demo
      demoNearDone: false,       // near-fail + recovery beat fired
      sweepUntil: 0,
      sweepNext: 0,
      sweepIdx: 0,
      overAt: 0,
      score: 0
    };
    hitStop = 0; zoom = 1; shakeAmt = 0; dareBeaten = false;
    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) startRun();
  }

  function flashDurationFor(r) { return Math.max(260, 500 - (r - 1) * 18); }

  function startRun() {
    state.phase = 'playback';
    state.round = 1;
    state.seq = [];
    state.step = 0;
    state.demoJump = null;
    state.demoNearDone = false;
    runStartTs = Date.now();
    extendSeqTo(1);
    if (BOT) startBotRun();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
    startPlayback();
  }

  function extendSeqTo(n) {
    while (state.seq.length < n) state.seq.push(Math.floor(rng() * 9));
  }

  function startRound(r) {
    state.round = r;
    extendSeqTo(r);
    state.step = 0;
    state.phase = 'playback';
    if (DEMO) demoHesitation = performance.now() + 250 + Math.floor(rng() * 180);
    if (window.J) J.tension(Math.min((r - 1) / 12, 1));
    startPlayback();
  }

  function startPlayback() {
    state.playbackIdx = 0;
    state.flashTile = -1;
    state.flashUntil = 0;
    state.gapUntil = performance.now() + 350; // brief pause before first flash
  }

  function advancePlayback(now) {
    if (state.phase !== 'playback') return;
    if (now < state.gapUntil) return;
    if (now < state.flashUntil) return;
    if (state.flashTile !== -1) {
      // flash just ended
      state.flashTile = -1;
      state.playbackIdx++;
      if (state.playbackIdx >= state.round) {
        state.phase = 'input';
        state.step = 0;
        return;
      }
      state.gapUntil = now + 150;
      return;
    }
    // start next flash
    var dur = flashDurationFor(state.round);
    state.flashTile = state.seq[state.playbackIdx];
    state.flashUntil = now + dur;
    addGlow(state.flashTile, dur, TEAL);
  }

  function addGlow(tile, ms, color) {
    state.glows.push({ tile: tile, t: ms, max: ms, color: color });
  }

  function roundClear() {
    state.score = state.round;
    if (state.round > best) { best = state.round; try { localStorage.setItem('mn_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('round_clear', { r: state.round });
    if (window.J) { J.fanfare(); J.tension(0); }
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }
    flash('ROUND ' + state.round + ' CLEAR', TEAL, 38);
    hitStop = 5; zoom = 1.03;
    state.phase = 'sweep';
    state.sweepUntil = performance.now() + 420;
    state.sweepIdx = 0;
    state.sweepNext = performance.now() + 80;
    // demo skip-cut plan: after rounds 1,5,7 jump to 5,7,8
    if (DEMO) {
      var shown = [1, 5, 7, 8];
      var idx = shown.indexOf(state.round);
      if (idx >= 0 && idx < shown.length - 1) {
        state.demoJump = { round: shown[idx + 1], until: 0 };
      }
    }
  }

  function advanceSweep(now) {
    if (state.phase !== 'sweep') return;
    if (now >= state.sweepNext && state.sweepIdx < 9) {
      addGlow(state.sweepIdx, 240, '#3ddc97');
      state.sweepIdx++;
      state.sweepNext = now + 60;
    }
    if (now >= state.sweepUntil) {
      if (state.demoJump) {
        state.phase = 'interstitial';
        state.demoJump.until = now + 700;
      } else {
        startRound(state.round + 1);
      }
    }
  }

  function tapTile(i, now) {
    if (state.phase !== 'input') return;
    var expected = state.seq[state.step];
    if (i === expected) {
      addGlow(i, 220, TEAL);
      if (window.J) J.hit(state.step + 1);
      state.step++;
      if (state.step >= state.round) {
        roundClear();
      }
      return;
    }
    // wrong tap
    addGlow(expected, 520, VERM);             // correct tile pulses
    var lastStep = state.step === state.round - 1;
    if (lastStep && window.LOOP) LOOP.emit('near_miss', { r: state.round, step: state.step });
    if (window.J) {
      if (lastStep) J.near();
      J.death(Math.min(0.25 + state.round / 16, 1));
    }
    shakeAmt = 8;
    gameOver();
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    state.score = state.round - (state.step < state.round ? 1 : 0); // completed rounds
    if (state.score < 0) state.score = 0;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.tension(0);
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      window.__demoScore = state.score;
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    state.phase = 'playback';
    state.round = 1;
    state.seq = [];
    state.step = 0;
    state.demoJump = null;
    state.demoNearDone = false;
    dareBeaten = false;
    extendSeqTo(1);
    if (BOT) startBotRun();
    if (window.J) J.tension(0);
    if (window.LOOP) LOOP.emit('restart', {});
    startPlayback();
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 500, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    var i = -1, now = performance.now();
    if (state.phase === 'input' && x !== undefined) { i = tileAtXY(x, y); }
    if (state.phase === 'input' && i >= 0) { tapTile(i, now); return; }
    if (state.phase === 'over' && now - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'steps' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) {
    if (DEMO || BOT) return;
    if (e.code === 'Space') {
      if (state.phase === 'title') { startRun(); }
      else if (state.phase === 'over' && performance.now() - state.overAt > 350) { resetRun(); }
    }
  });

  // ---- demo / bot autopilots ----
  var botRunsDone = 0;
  var botRunState = { willFailRound: -1, failStep: -1, nextTap: 0 };
  var demoHesitation = 0;

  function startBotRun() {
    botRunState.nextTap = 0;
    botRunState.willFailRound = -1;
    botRunState.failStep = -1;
  }

  function scheduleBotFail() {
    // per round, 85% clear; else pick a step to fail at
    var r = state.round;
    if (rng() < 0.85) return; // clear this round
    botRunState.willFailRound = r;
    botRunState.failStep = Math.floor(rng() * r); // 0..r-1
  }

  function demoAutopilot(now) {
    if (state.phase === 'interstitial') {
      if (now >= state.demoJump.until) {
        startRound(state.demoJump.round);
        state.demoJump = null;
      }
      return;
    }
    if (state.phase !== 'input') return;
    if (now < demoHesitation) return;
    var expected = state.seq[state.step];
    // near-fail + recovery at ~60% through the final round: hesitate, then save
    if (state.round === 9 && state.step === 4 && !state.demoNearDone) {
      state.demoNearDone = true;
      flash('HOLD...', VERM, 40);
      if (window.J) J.near();
      demoHesitation = now + 950;
      return;
    }
    // the real fail on the last step of round 9
    if (state.round === 9 && state.step === state.round - 1) {
      var wrong = (expected + 1 + Math.floor(rng() * 8)) % 9;
      tapTile(wrong, now);
      return;
    }
    tapTile(expected, now);
    demoHesitation = now + 180 + Math.floor(rng() * 140);
  }

  function botAutopilot(now) {
    if (state.phase === 'input') {
      if (botRunState.nextTap === 0) botRunState.nextTap = now + 300 + rng() * 160;
      if (now < botRunState.nextTap) return;
      if (state.round !== botRunState.willFailRound) scheduleBotFail();
      var expected = state.seq[state.step];
      if (state.round === botRunState.willFailRound && state.step === botRunState.failStep) {
        var wrong = (expected + 1 + Math.floor(rng() * 8)) % 9;
        tapTile(wrong, now);
      } else {
        tapTile(expected, now);
      }
      botRunState.nextTap = now + 260 + rng() * 60;
    }
  }

  function autopilot(now) {
    if (DEMO) demoAutopilot(now);
    else if (BOT) botAutopilot(now);
  }

  // ---- benchmark copy ----
  function benchmark(r) {
    if (r >= 13) return 'top 1% — are you counting cards?';
    if (r >= 10) return 'top 8%';
    if (r >= 8)  return 'above the famous 7±2';
    if (r === 7) return 'exactly average. suspicious.';
    return 'below average… tired?';
  }

  // ---- render ----
  var ctaAt = 0, last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // update glows
    for (var g = state.glows.length - 1; g >= 0; g--) {
      var gl = state.glows[g];
      gl.t -= 16.667 * dt;
      if (gl.t <= 0) state.glows.splice(g, 1);
    }

    // update flashes
    for (var k = state.flashes.length - 1; k >= 0; k--) {
      var fl = state.flashes[k];
      fl.t += dt;
      if (fl.t > 40) state.flashes.splice(k, 1);
    }

    // state machine timing (frozen during hit-stop so the payoff "bites")
    if (hitStop > 0) { hitStop -= dt; }
    else {
      if (state.phase === 'playback') advancePlayback(now);
      if (state.phase === 'sweep') advanceSweep(now);
      autopilot(now);
    }

    // juice transforms: decaying shake + zoom-pulse
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // grid tiles
    for (var i = 0; i < 9; i++) {
      var r = tileRect(i);
      // base
      cx.fillStyle = '#15181f';
      cx.fillRect(r.x, r.y, r.w, r.h);
      cx.strokeStyle = 'rgba(255,255,255,0.12)';
      cx.lineWidth = 1;
      cx.strokeRect(r.x + 0.5, r.y + 0.5, r.w - 1, r.h - 1);

      // playback flash
      if (state.phase === 'playback' && state.flashTile === i) {
        var prog = (state.flashUntil - now) / flashDurationFor(state.round);
        if (prog < 0) prog = 0;
        var a = 0.35 + 0.55 * Math.sin(prog * Math.PI);
        cx.fillStyle = TEAL;
        cx.globalAlpha = a;
        cx.fillRect(r.x, r.y, r.w, r.h);
        cx.globalAlpha = 1;
      }

      // glows overlay
      for (var kk = 0; kk < state.glows.length; kk++) {
        var gl = state.glows[kk];
        if (gl.tile !== i) continue;
        var ga = gl.t / gl.max;
        if (ga < 0) ga = 0;
        cx.fillStyle = gl.color;
        cx.globalAlpha = 0.25 + 0.55 * Math.sin(ga * Math.PI);
        cx.fillRect(r.x, r.y, r.w, r.h);
        cx.globalAlpha = 1;
      }
    }

    // status text
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.92)';
    cx.font = '800 52px -apple-system, Helvetica, Arial';
    if (state.phase === 'title') {
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('MEMORY NINE', W / 2, 160);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 16px -apple-system, Helvetica, Arial';
      cx.fillText('average human holds 7. you?', W / 2, 195);
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillStyle = VERM;
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO START', W / 2, 580);
      cx.globalAlpha = 1;
    } else if (state.phase === 'challenge') {
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('8', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    } else if (state.phase === 'playback') {
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('WATCH', W / 2, 160);
      cx.fillStyle = 'rgba(255,255,255,0.12)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.round, W / 2, 115);
    } else if (state.phase === 'input') {
      cx.fillStyle = 'rgba(255,255,255,0.55)';
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('YOUR TURN', W / 2, 160);
      cx.fillStyle = 'rgba(255,255,255,0.12)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.round, W / 2, 115);
    } else if (state.phase === 'sweep') {
      cx.fillStyle = TEAL;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + state.round + ' CLEAR', W / 2, 160);
    } else if (state.phase === 'interstitial') {
      cx.fillStyle = '#fff';
      cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + state.demoJump.round, W / 2, 360);
    }

    // score / best during play
    if (state.phase !== 'title' && state.phase !== 'cta' && state.phase !== 'challenge') {
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 640);
    }

    // incoming dare banner
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null &&
        (state.phase === 'playback' || state.phase === 'input' || state.phase === 'sweep')) {
      cx.fillStyle = dareBeaten ? TEAL : GOLD;
      cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 146);
    }

    // flashes
    for (var f = 0; f < state.flashes.length; f++) {
      var fl = state.flashes[f];
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 260 - fl.t * 0.6);
      cx.globalAlpha = 1;
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('MISSED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText('you held ' + state.score + ' steps', W / 2, 345);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText(benchmark(state.score).toUpperCase(), W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('average human working memory: 7 ± 2', W / 2, 420);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE ROUND', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('MEMORY NINE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he held ' + (window.__demoScore || 8) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 8), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
