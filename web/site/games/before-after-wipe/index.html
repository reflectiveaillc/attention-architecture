      cx.moveTo(wipeX + 5, IMG.y + 18); cx.lineTo(wipeX + 9, IMG.y + 14); cx.moveTo(wipeX + 5, IMG.y + 18); cx.lineTo(wipeX + 9, IMG.y + 22);
      cx.stroke();
      // reveal payoff glow on the focal
      if (state.phase === 'reveal') {
        var gx = IMG.x + state.zoneCenter * IMG.w, gy = IMG.y + IMG.h * 0.5;
        var rg = cx.createRadialGradient(gx, gy, 2, gx, gy, IMG.w * 0.5);
        rg.addColorStop(0, 'rgba(255,255,255,' + (0.35 * Math.max(0, 1 - state.revealT / 30)) + ')');
        rg.addColorStop(1, 'rgba(255,255,255,0)');
        cx.fillStyle = rg; cx.fillRect(IMG.x, IMG.y, IMG.w, IMG.h);
      }

      // header: score
      cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '%', W / 2, 70);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best + '%', W / 2, 92);
      // combo
      if (state.combo > 1) {
        var cs = 18 + Math.min(state.combo, 8) * 1.6;
        cx.fillStyle = TEAL; cx.font = '900 ' + cs + 'px -apple-system, Helvetica, Arial';
        cx.fillText('×' + state.combo, W / 2, 114);
      }
      // incoming dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD; cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + '%' + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 118);
      }
      // play hint
      if (state.phase === 'play') {
        var pulse = 0.6 + 0.4 * Math.sin(now / 300);
        cx.globalAlpha = pulse; cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 14px -apple-system, Helvetica, Arial';
        cx.fillText('tap to lock the wipe', W / 2, IMG.y + IMG.h + 30); cx.globalAlpha = 1;
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 92px -apple-system, Helvetica, Arial';
      cx.fillText('62%', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top wipe", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.fillStyle = fl.color; cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.fillStyle = '#fff'; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('BEFORE AFTER WIPE', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var p1 = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = p1; cx.fillText('TAP TO REVEAL', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('wipe to the gold. land the transformation.', W / 2, 360);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.fillStyle = VERM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText(state.missSide === 'over' ? 'OVERSHOT.' : 'MISSED IT.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 30px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + '%', W / 2, 348);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE WIPE', W / 2, 456); cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)'; cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('BEFORE AFTER WIPE', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they hit ' + (window.__demoScore || 62) + '%. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3; cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 62) + '%', W / 2, 410);
      cx.globalAlpha = ease; cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442); cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
      cx.globalAlpha = 0.5; cx.font = '16px -apple-system, Helvetica, Arial'; cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26); cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
