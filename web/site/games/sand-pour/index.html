<!--
  LOOP / attention-architecture — Sand Pour
  Circuits: 05-ease, 01-rpe, 08-investment.

  Modes:

                          sets window.__demoDone when finished

<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'sand-pour';</script>
<script src="../../js/loop-events.js"></script>

<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 24;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32)
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }
  function randInt(n) { return Math.floor(rng() * n); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', TEAL = '#2ec5b6', GOLD = '#f2b134', CREAM = '#f5e6c8';
  var SAND_TONES = ['#2ec5b6', '#3dd4c5', '#5ee0d3', '#f2b134', '#f5e6c8'];

  var state, pile, particles, settled, pourX, pouring, runStartTs, overAt, holdTimer, disperseTimer;
  var hitStop = 0, shakeAmt = 0, zoom = 1;
  var ctaAt = 0, last = performance.now();
  var dareBeaten = false, botRunsDone = 0, nextCalmAt = 0, flashes = [], nextMilestone = 100;

  function newGame() {
    state = { phase: 'title', score: 0, dur: 0 };
    pile = new Float32Array(W);          // height per column
    particles = [];
    settled = 0;
    pourX = W / 2;
    pouring = false;
    holdTimer = 0;
    disperseTimer = 0;
    dareBeaten = false;
    if (DEMO) state.phase = 'play';       // demo starts immediately
    if (BOT) state.phase = 'play';
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0;
    settled = 0;
    pile = new Float32Array(W);
    particles = [];
    pourX = W / 2;
    pouring = false;
    holdTimer = 0;
    disperseTimer = 0;
    runStartTs = Date.now();
    nextCalmAt = 0; nextMilestone = 100;
    demoIdx = 0; demoElapsed = 0;
    botPlan = { nextT: 1.2 + rng() * 2.2, pouring: true, targetX: Math.max(40, Math.min(W - 40, W / 2 + gauss() * BOT_ERR)) };
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function resetRun() {
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.calm(Math.min(settled / 200, 1));
    if (DEMO) window.__demoScore = settled;
    if (window.LOOP) LOOP.emit('game_over', { score: settled, dur_s: +dur.toFixed(1) });
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else { setTimeout(resetRun, 900); }
    }
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- physics ----
  var GRAVITY = 0.7, MAX_PILE = H - 70, DISPERSAL_RATE = 0.35;
  function spawnParticle() {
    var spread = 14 + Math.min(settled / 180, 14);
    var x = pourX + gauss() * spread;
    x = Math.max(2, Math.min(W - 2, x));
    var tone = SAND_TONES[randInt(SAND_TONES.length)];
    particles.push({
      x: x, y: -6, vy: 5 + rng() * 4, r: 1.2 + rng() * 1.3,
      color: tone, landed: false
    });
  }

  function settle(p) {
    var ix = Math.floor(p.x);
    if (ix < 0 || ix >= W) return;
    p.landed = true;
    var add = p.r * 1.1;                 // volume added to pile
    pile[ix] += add;
    settled++;
    // local relaxation: make the landing look like a mound
    for (var k = 0; k < 6; k++) {
      for (var i = 1; i < W - 1; i++) {
        var h = pile[i], left = pile[i - 1], right = pile[i + 1];
        var diff = 2.4;
        if (h - left > diff) { var m = (h - left - diff) * 0.45; pile[i] -= m; pile[i - 1] += m; }
        if (h - right > diff) { var m = (h - right - diff) * 0.45; pile[i] -= m; pile[i + 1] += m; }
      }
    }
    // soft ceiling: if any column hits max, end run after a brief hold
    if (pile[ix] >= MAX_PILE && state.phase === 'play') {
      pouring = false;
      disperseTimer = 2.0;
    }
  }

  function update(dt) {
    // spawn while pouring
    if (state.phase === 'play' && pouring) {
      var rate = 10 * dt;
      var n = Math.floor(rate) + (rng() < (rate % 1) ? 1 : 0);
      for (var i = 0; i < n; i++) spawnParticle();
    }

    // move particles
    var anyFlying = false;
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      if (p.landed) continue;
      anyFlying = true;
      p.vy += GRAVITY * dt;
      p.y += p.vy * dt;
      var ix = Math.floor(p.x);
      var ground = H - (pile[ix] || 0) - p.r;
      if (p.y >= ground) {
        p.y = ground;
        settle(p);
      }
    }

    // remove fully swallowed landed particles (visual only, volume already in pile)
    for (var i = particles.length - 1; i >= 0; i--) {
      if (particles[i].landed) particles.splice(i, 1);
    }

    // milestone calm chimes + floating reward text
    if (state.phase === 'play' && settled > nextCalmAt && window.J) {
      J.calm(Math.min(settled / 250, 1));
      nextCalmAt = settled + 40 + randInt(20);
    }
    if (state.phase === 'play' && settled >= nextMilestone) {
      flash('+' + nextMilestone, TEAL, 32);
      nextMilestone += 250;
    }

    // disperse / end
    if (state.phase === 'play' && !pouring) {
      if (!anyFlying && particles.length === 0) {
        holdTimer += dt / 60;            // seconds
        if (holdTimer >= 1.4 || disperseTimer > 0) {
          disperseTimer += dt / 60;
          // gently lower the pile
          var stillSand = false;
          for (var i = 0; i < W; i++) {
            if (pile[i] > 0.2) {
              pile[i] -= DISPERSAL_RATE * dt + pile[i] * 0.015 * dt;
              if (pile[i] < 0) pile[i] = 0;
              stillSand = true;
            }
          }
          if (!stillSand && disperseTimer >= 1.8) gameOver();
        }
      } else {
        holdTimer = 0;
      }
    }

    // juice decay
    if (shakeAmt > 0.1) shakeAmt *= Math.pow(0.88, dt);
    if (zoom > 1.0005) zoom += (1 - zoom) * 0.10 * dt;
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 115, y: 510, w: 230, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function startPour(x) {
    if (state.phase !== 'play' || DEMO || BOT) return;
    if (!pouring && window.LOOP) LOOP.emit('pour_start', { x: Math.round(x) });
    pouring = true;
    pourX = x;
  }
  function stopPour() {
    if (DEMO || BOT) return;
    if (pouring && window.LOOP) LOOP.emit('pour_stop', { grains: settled });
    pouring = false;
  }
  function movePour(x) {
    if (state.phase !== 'play' || DEMO || BOT) return;
    pourX = Math.max(20, Math.min(W - 20, x));
  }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: settled, unit: 'grains' }); return;
      }
      resetRun();
    }
  }

  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
    if (DEMO || BOT) return;
    if (inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title' || state.phase === 'over') { tap(x, y); return; }
    startPour(x);
  });
  window.addEventListener('pointermove', function (e) {
    if (!pouring) return;
    var r = cv.getBoundingClientRect();
    movePour((e.clientX - r.left) / scale);
  });
  window.addEventListener('pointerup', stopPour);
  window.addEventListener('pointercancel', stopPour);
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // scripted calm arc: settle → deepen → resolve → soft invitation
  var demoActions = [
    { t: 0.5, act: 'pour', x: W / 2 },
    { t: 3.6, act: 'pour', x: 130 },
    { t: 5.9, act: 'pour', x: 275 },
    { t: 8.1, act: 'pour', x: W / 2 },
    { t: 11.4, act: 'stop' }
  ];
  var demoIdx = 0, demoElapsed = 0;

  var botPlan = { nextT: 0, pouring: false, targetX: W / 2 };
  function planBot() {
    botPlan.targetX = Math.max(40, Math.min(W - 40, W / 2 + gauss() * BOT_ERR));
    botPlan.pouring = true;
    botPlan.nextT = 1.2 + rng() * 2.2;
  }

  function autopilot(dtSec) {
    if (!DEMO && !BOT) return;
    if (state.phase !== 'play') return;
    if (DEMO) {
      demoElapsed += dtSec;
      var a = demoActions[demoIdx];
      if (a && demoElapsed >= a.t) {
        if (a.act === 'pour') { pouring = true; pourX = a.x; demoIdx++; }
        else if (a.act === 'stop') { pouring = false; demoIdx++; }
      }
    } else if (BOT) {
      if (botPlan.pouring) {
        if (botPlan.nextT <= 0) { botPlan.pouring = false; pouring = false; }
        else {
          pourX += (botPlan.targetX - pourX) * 0.12 * dtSec * 60;
          pouring = true;
        }
        botPlan.nextT -= dtSec;
      }
    }
  }

  // ---- render ----
  function pileColor(i, h) {
    // soft gradient: deeper = richer teal/gold, edges = cream
    var t = Math.min(h / 180, 1);
    var edge = Math.abs(i - W / 2) / (W / 2);
    if (edge > 0.75) return 'rgba(245,230,200,' + (0.5 + t * 0.35) + ')';
    if (t < 0.5) return 'rgba(46,197,182,' + (0.55 + t * 0.45) + ')';
    return 'rgba(242,177,52,' + (0.55 + (t - 0.5) * 0.5) + ')';
  }

  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;
    var dtSec = dt / 60;

    if (hitStop > 0) { hitStop -= dt; }
    else {
      update(dt);
      autopilot(dtSec);
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(242,177,52,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // pile
    cx.beginPath();
    var first = true;
    for (var i = 0; i < W; i += 2) {
      var h = pile[i] || 0;
      if (first) { cx.moveTo(i, H - h); first = false; }
      else cx.lineTo(i, H - h);
    }
    cx.lineTo(W, H); cx.lineTo(0, H); cx.closePath();
    var g = cx.createLinearGradient(0, H - 250, 0, H);
    g.addColorStop(0, 'rgba(46,197,182,0.55)'); g.addColorStop(0.5, 'rgba(46,197,182,0.85)'); g.addColorStop(1, 'rgba(242,177,52,0.75)');
    cx.fillStyle = g; cx.fill();

    // grain texture on pile surface
    for (var i = 0; i < W; i += 3) {
      var h = pile[i] || 0;
      if (h < 2) continue;
      cx.fillStyle = pileColor(i, h);
      cx.fillRect(i, H - h, 2, 2 + Math.min(h * 0.08, 3));
    }

    // falling particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      cx.globalAlpha = 0.9;
      cx.fillStyle = p.color;
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      cx.fill();
    }
    cx.globalAlpha = 1;

    // pour stream hint
    if (state.phase === 'play' && pouring) {
      var gy = cx.createLinearGradient(pourX, -10, pourX, 140);
      gy.addColorStop(0, 'rgba(245,230,200,0)'); gy.addColorStop(1, 'rgba(245,230,200,0.35)');
      cx.fillStyle = gy;
      cx.beginPath(); cx.moveTo(pourX - 4, 0); cx.lineTo(pourX + 4, 0); cx.lineTo(pourX + 10, 140); cx.lineTo(pourX - 10, 140); cx.closePath(); cx.fill();
    }

    // score / UI
    cx.textAlign = 'center';
    if (state.phase === 'play' || state.phase === 'over') {
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(settled, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('GRAINS SETTLED', W / 2, 122);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.3) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 260 - fl.t * 0.5);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('SAND POUR', W / 2, 270);
      cx.fillStyle = TEAL; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 320);
      cx.globalAlpha = pulse; cx.fillText('HOLD TO POUR', W / 2, 320); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('pile it. let it settle.', W / 2, 350);
    }

    // game over / score card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.45)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = CREAM; cx.font = '900 38px -apple-system, Helvetica, Arial';
      cx.fillText('SETTLED.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(settled + ' grains', W / 2, 340);
      cx.fillStyle = GOLD; cx.font = '900 20px -apple-system, Helvetica, Arial';
      cx.fillText('one soft mound', W / 2, 378);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 300);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — POUR AGAIN', W / 2, 430);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.12)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText('⚡ SHARE YOUR PILE', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.72 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SAND POUR', W / 2, 290);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('their mound held ' + (window.__demoScore || 0) + ' grains', W / 2, 338);
      var p3 = 0.7 + 0.3 * Math.sin(now / 260);
      cx.fillStyle = TEAL; cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 400);
      cx.globalAlpha = ease;
      cx.fillStyle = CREAM; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 438);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  if (DEMO || BOT) startRun();
  requestAnimationFrame(frame);
})();
</script>
