<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Layer Peel — Tilt</title>
<!--
  LOOP / attention-architecture — Layer Peel
  Circuits: 01-rpe (variable reward per peel), 06-zeigarnik (one more layer),
            05-ease (the thumb gesture is already conditioned from IG/TikTok reveals)
  Modes:
    ?demo=1&seed=7   scripted mirror-neuron arc → window.__demoDone
    ?bot=1&runs=N    imperfect autopilot, N runs → window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'layer-peel';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // Layer palette — each layer has a distinct color stop
  // Outermost first, center last
  var LAYER_COLORS = [
    '#e8502e', // vermillion
    '#f2b134', // gold
    '#2ec5b6', // teal
    '#8b5cf6', // violet
    '#ec4899', // pink
    '#22c55e', // green
    '#3b82f6', // blue
    '#f97316', // orange
    '#a855f7', // purple
    '#14b8a6', // cyan
  ];

  var TOTAL_LAYERS = 8;   // layers per round (outermost ring = layer 0)
  var CENTER_RADIUS = 40; // inner core
  var OUTER_RADIUS = 160; // outermost ring outer edge

  // Game state
  var state, flashes, sparks;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var best = 0;
  try { best = +localStorage.getItem('lp_best') || 0; } catch (_) {}

  // Peel animation
  var peelAnims = []; // {layer, startAngle, endAngle, progress, color, x, y}
  var bloomAnim = null; // center bloom on reveal
  var revealFlash = 0; // big screen flash on center reveal

  // Run timing
  var runStartTs = 0;
  var ctaAt = 0;
  var challengeAt = 0;

  // Bot state
  var botRunsDone = 0;

  function layerRadius(i, total) {
    // i=0 => outermost, i=total-1 => center
    var inner = CENTER_RADIUS;
    var outer = OUTER_RADIUS;
    var step = (outer - inner) / total;
    return {
      inner: outer - (i + 1) * step,
      outer: outer - i * step
    };
  }

  function newGame() {
    state = {
      phase: 'title',  // title | challenge | play | reveal | over | cta
      layers: TOTAL_LAYERS,    // how many layers remain (counts down)
      totalLayers: TOTAL_LAYERS,
      score: 0,        // layers peeled this run
      combo: 0,        // perfect-timing combo
      peelWindow: 0,   // timer: tap must land inside window for bonus
      windowOpen: false,
      windowDur: 0,    // how long window stays open (ms)
      overAt: 0,
      revealAt: 0,
      // The ring is slowly rotating — tap when the "sweet spot" arc is over a target zone
      ringAngle: 0,
      ringSpeed: 0.012,  // rad/frame
      // "sweet spot" arc on the ring (the gap you aim for)
      spotArc: Math.PI * 0.55,  // arc size in radians
      spotAngle: 0,             // current sweet-spot center
      lives: 3,        // miss 3 times and it's game over
      missFlash: 0,
    };
    flashes = []; sparks = []; peelAnims = []; bloomAnim = null; revealFlash = 0;
    dareBeaten = false;

    // randomise starting sweet spot each game
    state.spotAngle = rng() * Math.PI * 2;

    if (DEMO) {
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
  }

  function startRun() {
    state.phase = 'play';
    state.peelWindow = 0;
    state.windowOpen = false;
    runStartTs = Date.now();
    openPeelWindow();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // Open a peel-window: the sweet spot appears on the rotating ring
  // Player must tap while their indicator lines up with the spot
  function openPeelWindow() {
    if (state.phase !== 'play') return;
    // difficulty scales: window narrows as layers peel
    var peeled = state.totalLayers - state.layers;
    var baseDur = 1400 - peeled * 80;  // ms, minimum 600
    state.windowDur = Math.max(600, baseDur + (rng() - 0.5) * 200);
    state.windowOpen = true;
    state.peelWindow = state.windowDur;
    // sweet spot arc shrinks slightly with difficulty
    state.spotArc = Math.max(0.35, Math.PI * 0.55 - peeled * 0.02);
    if (window.J) J.tension(Math.min(peeled / state.totalLayers, 1));
  }

  function attemptPeel() {
    if (state.phase !== 'play' || !state.windowOpen) return;
    // Check if the "tap indicator" is inside the sweet spot arc
    // Indicator sits at top (angle = -PI/2); sweet spot moves with ring
    var indicatorAngle = -Math.PI / 2;  // fixed top position
    var spotStart = state.spotAngle - state.spotArc / 2;
    var spotEnd   = state.spotAngle + state.spotArc / 2;

    // Normalize angles to compare
    function normAngleDiff(a, b) {
      var d = ((a - b) % (Math.PI * 2) + Math.PI * 2 * 3) % (Math.PI * 2);
      if (d > Math.PI) d -= Math.PI * 2;
      return Math.abs(d);
    }
    var diff = normAngleDiff(indicatorAngle, state.spotAngle);
    var hit = diff < state.spotArc / 2;

    if (hit) {
      peelLayer(diff);
    } else {
      missLayer();
    }
  }

  function peelLayer(diff) {
    var layerIdx = state.totalLayers - state.layers;
    var color = LAYER_COLORS[layerIdx % LAYER_COLORS.length];
    var r = layerRadius(layerIdx, state.totalLayers);

    // Compute how close to center of sweet spot (0=edge, 1=dead center)
    var quality = 1 - (diff / (state.spotArc / 2));
    var perfect = quality > 0.75;
    var near = quality < 0.15;   // barely scraped in

    state.layers--;
    state.score++;
    state.windowOpen = false;

    // Juice: combo tracking
    if (perfect) {
      state.combo++;
      hitStop = perfect ? 5 : 2;
      zoom = 1.025;
      if (window.J) J.perfect(state.combo);
      flash('PERFECT', TEAL, 42);
    } else if (near) {
      state.combo = 0;
      shakeAmt = 4;
      if (window.J) J.near();
      flash('SO CLOSE!', GOLD, 36);
      if (window.LOOP) LOOP.emit('near_miss', { layer: state.score, quality: +quality.toFixed(3) });
    } else {
      if (window.J) J.hit(state.combo + 1);
      state.combo = 0;
    }

    // Emit event
    if (window.LOOP) LOOP.emit('layer_peeled', { layer: state.score, quality: +quality.toFixed(3), perfect: perfect });

    // Peel animation: arc sweeps off the layer
    var sweepStart = state.spotAngle - Math.PI * 0.8;
    peelAnims.push({
      color: color,
      rInner: r.inner,
      rOuter: r.outer,
      sweepAngle: sweepStart,
      progress: 0,
      alpha: 1
    });

    // Dare tracking
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }

    // Check if center is reached
    if (state.layers <= 0) {
      // BIG REVEAL
      setTimeout(function () { centerReveal(); }, 80);
    } else {
      // Open next window after short gap
      setTimeout(openPeelWindow, 420 + rng() * 200);
    }
  }

  function centerReveal() {
    if (window.J) J.gold();
    state.phase = 'reveal';
    state.revealAt = performance.now();
    revealFlash = 1;
    zoom = 1.06;
    bloomAnim = { progress: 0, alpha: 1 };
    flash('REVEALED!', GOLD, 52);
    shakeAmt = 3;
    // Spawn sparks
    for (var i = 0; i < 28; i++) {
      var angle = rng() * Math.PI * 2;
      var spd = 1.5 + rng() * 3.5;
      sparks.push({ x: W / 2, y: H / 2, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
                    color: LAYER_COLORS[i % LAYER_COLORS.length], r: 3 + rng() * 3,
                    alpha: 1, t: 0 });
    }
    if (window.J) setTimeout(function () { J.fanfare(); }, 200);
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (state.score > best) {
      best = state.score;
      try { localStorage.setItem('lp_best', String(best)); } catch (_) {}
    }
    if (DEMO) { window.__demoScore = state.score; }
    // Show score card then CTA (demo) or over (human/bot)
    setTimeout(function () {
      state.phase = 'over';
      state.overAt = performance.now();
      if (DEMO) {
        setTimeout(function () {
          state.phase = 'cta'; ctaAt = performance.now();
          setTimeout(function () { window.__demoDone = true; }, 3600);
        }, 2400);
      }
      if (BOT) {
        botRunsDone++;
        if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
        else setTimeout(resetRun, 900);
      }
    }, 1800);
  }

  function missLayer() {
    state.lives--;
    state.combo = 0;
    state.windowOpen = false;
    shakeAmt = 6;
    state.missFlash = 30;
    if (window.J) J.near();
    flash('MISSED!', VERM, 38);
    if (window.LOOP) LOOP.emit('miss', { lives: state.lives, layer: state.score });

    if (state.lives <= 0) {
      gameOver();
    } else {
      setTimeout(openPeelWindow, 600);
    }
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    state.windowOpen = false;
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    if (window.J) J.death(Math.min(0.4 + state.score / state.totalLayers * 0.6, 1));
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    if (state.score > best) {
      best = state.score;
      try { localStorage.setItem('lp_best', String(best)); } catch (_) {}
    }
    if (DEMO) { window.__demoScore = state.score; }
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2400);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(resetRun, 900);
    }
  }

  function resetRun() {
    state.layers = TOTAL_LAYERS;
    state.score = 0; state.combo = 0; state.lives = 3; state.missFlash = 0;
    state.windowOpen = false; state.peelWindow = 0;
    flashes = []; sparks = []; peelAnims = []; bloomAnim = null; revealFlash = 0;
    state.spotAngle = rng() * Math.PI * 2;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 5))));
  }

  // ---- Input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 496, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { attemptPeel(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'layers' }); return;
      }
      resetRun();
    }
  }

  // Touch / pointer / keyboard
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- Demo / Bot autopilots ----
  // Demo script: intentional quality values for each layer (1=dead center, 0=near edge)
  // arc: challenge → near-perfect run → near-miss recovery (~60%) → miss → game over
  var demoScript = [0.85, 0.72, 0.68, 0.91, 0.55, 0.18, 0.04, -0.1];
  // negative = intentional miss
  var demoIdx = 0;
  var demoWaits = [40, 28, 36, 22, 50, 38, 30, 25];  // frames of hesitation
  var demoWait = 38;
  var demoPeelScheduled = false;

  function autoPeel() {
    if (!state.windowOpen || state.phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var quality = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (quality < 0) {
        // intentional miss
        missLayer();
        demoIdx++;
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
        return;
      }
      // Compute diff from quality: diff = (1 - quality) * halfArc
      var halfArc = state.spotArc / 2;
      var diff = (1 - quality) * halfArc;
      peelLayer(diff);
      demoIdx++;
      demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
    } else if (BOT) {
      // Bot: mostly hits with noise, occasionally misses
      var q = 0.3 + rng() * 0.6;
      if (rng() < 0.15) {
        // deliberate miss
        missLayer();
      } else {
        peelLayer((1 - q) * state.spotArc / 2);
      }
    }
  }

  // ---- Render ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // Decay hit-stop; run autopilot only when not frozen
    if (hitStop > 0) {
      hitStop -= dt;
    } else {
      // Advance ring rotation
      if (state.phase === 'play') {
        var peeled = state.totalLayers - state.layers;
        var curSpeed = state.ringSpeed + peeled * 0.001;
        state.ringAngle += curSpeed * dt;
        state.spotAngle += curSpeed * dt;
      }
      // Autopilot tick
      if ((DEMO || BOT) && state.windowOpen && state.phase === 'play') {
        autoPeel();
      }
    }

    // Peel window countdown
    if (state.windowOpen && state.phase === 'play') {
      state.peelWindow -= dt * 16.667;
      if (state.peelWindow <= 0) {
        // Time ran out — missed
        state.windowOpen = false;
        missLayer();
      }
    }

    // Juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.82, dt); zoom += (1 - zoom) * 0.12 * dt;
    if (state.missFlash > 0) state.missFlash -= dt;

    // BG
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)'); bg.addColorStop(1, 'rgba(232,80,46,0.06)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // Miss flash overlay
    if (state.missFlash > 0) {
      cx.fillStyle = 'rgba(232,80,46,' + (state.missFlash / 30 * 0.18) + ')';
      cx.fillRect(0, 0, W, H);
    }

    // Reveal flash
    if (revealFlash > 0) {
      cx.fillStyle = 'rgba(242,177,52,' + revealFlash * 0.45 + ')';
      cx.fillRect(0, 0, W, H);
      revealFlash -= 0.035 * dt;
      if (revealFlash < 0) revealFlash = 0;
    }

    var cx0 = W / 2, cy0 = H / 2;

    // Draw layers (remaining, from outer to inner)
    if (state.phase === 'play' || state.phase === 'reveal' || state.phase === 'over') {
      for (var i = 0; i < state.layers; i++) {
        var layerI = (state.totalLayers - state.layers) + i;
        var r = layerRadius(layerI, state.totalLayers);
        var col = LAYER_COLORS[layerI % LAYER_COLORS.length];
        cx.beginPath();
        cx.arc(cx0, cy0, r.outer, 0, Math.PI * 2);
        cx.arc(cx0, cy0, r.inner, Math.PI * 2, 0, true);
        cx.closePath();
        var grad = cx.createRadialGradient(cx0, cy0, r.inner, cx0, cy0, r.outer);
        grad.addColorStop(0, lighten(col, 0.2));
        grad.addColorStop(1, darken(col, 0.15));
        cx.fillStyle = grad;
        cx.fill();
        // Subtle ring glow on outermost remaining layer
        if (i === 0) {
          cx.strokeStyle = lighten(col, 0.4);
          cx.lineWidth = 1.5;
          cx.globalAlpha = 0.5 + 0.3 * Math.sin(now / 300);
          cx.stroke();
          cx.globalAlpha = 1;
        }
      }
      // Center core
      var coreColor = (state.layers <= 0) ? GOLD : '#fff';
      cx.beginPath(); cx.arc(cx0, cy0, CENTER_RADIUS, 0, Math.PI * 2);
      var coreGrad = cx.createRadialGradient(cx0, cy0, 0, cx0, cy0, CENTER_RADIUS);
      coreGrad.addColorStop(0, state.layers <= 0 ? '#fff' : '#e0e0ff');
      coreGrad.addColorStop(1, state.layers <= 0 ? GOLD : '#a0a0cc');
      cx.fillStyle = coreGrad; cx.fill();
      // Bloom animation on center reveal
      if (bloomAnim) {
        bloomAnim.progress += 0.04 * dt;
        bloomAnim.alpha = Math.max(0, 1 - bloomAnim.progress);
        var bloomR = CENTER_RADIUS + bloomAnim.progress * 120;
        cx.beginPath(); cx.arc(cx0, cy0, bloomR, 0, Math.PI * 2);
        cx.strokeStyle = GOLD; cx.lineWidth = 3 * bloomAnim.alpha;
        cx.globalAlpha = bloomAnim.alpha; cx.stroke(); cx.globalAlpha = 1;
        if (bloomAnim.progress >= 1) bloomAnim = null;
      }
    }

    // Sweet-spot arc indicator (play mode)
    if (state.phase === 'play' && state.windowOpen) {
      var peeled2 = state.totalLayers - state.layers;
      var outerR = layerRadius(peeled2, state.totalLayers);
      var arcR = outerR.outer + 12;
      var timeRatio = state.peelWindow / state.windowDur;
      // Background arc (full circle, dim)
      cx.beginPath();
      cx.arc(cx0, cy0, arcR, 0, Math.PI * 2);
      cx.strokeStyle = 'rgba(255,255,255,0.12)'; cx.lineWidth = 4;
      cx.stroke();
      // Sweet spot arc (bright)
      var spotS = state.spotAngle - state.spotArc / 2;
      var spotE = state.spotAngle + state.spotArc / 2;
      var urgencyColor = timeRatio > 0.4 ? TEAL : VERM;
      cx.beginPath();
      cx.arc(cx0, cy0, arcR, spotS, spotE);
      cx.strokeStyle = urgencyColor; cx.lineWidth = 6;
      cx.globalAlpha = 0.7 + 0.3 * Math.sin(now / 180);
      cx.stroke(); cx.globalAlpha = 1;
      // Timer arc (shrinking, shows remaining time)
      var timerEnd = spotS + state.spotArc * timeRatio;
      cx.beginPath();
      cx.arc(cx0, cy0, arcR, spotS, timerEnd);
      cx.strokeStyle = GOLD; cx.lineWidth = 3;
      cx.globalAlpha = 0.9; cx.stroke(); cx.globalAlpha = 1;
      // Fixed indicator at top (tap target)
      var indX = cx0 + Math.cos(-Math.PI / 2) * arcR;
      var indY = cy0 + Math.sin(-Math.PI / 2) * arcR;
      cx.beginPath(); cx.arc(indX, indY, 7, 0, Math.PI * 2);
      cx.fillStyle = '#fff';
      cx.globalAlpha = 0.9; cx.fill(); cx.globalAlpha = 1;
      // "TAP" pulse near indicator
      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.globalAlpha = 0.5 + 0.5 * Math.sin(now / 200);
      cx.fillText('TAP', cx0, cy0 - arcR - 18);
      cx.globalAlpha = 1;
    }

    // Peel animations (flying-off rings)
    for (var pa = peelAnims.length - 1; pa >= 0; pa--) {
      var p = peelAnims[pa];
      p.progress += 0.06 * dt;
      p.alpha = Math.max(0, 1 - p.progress * 1.4);
      var peelScale = 1 + p.progress * 0.5;
      cx.save();
      cx.translate(cx0, cy0); cx.scale(peelScale, peelScale); cx.translate(-cx0, -cy0);
      cx.globalAlpha = p.alpha;
      cx.beginPath();
      cx.arc(cx0, cy0, p.rOuter, 0, Math.PI * 2);
      cx.arc(cx0, cy0, p.rInner, Math.PI * 2, 0, true);
      cx.closePath();
      cx.fillStyle = p.color; cx.fill();
      cx.restore(); cx.globalAlpha = 1;
      if (p.progress >= 1) peelAnims.splice(pa, 1);
    }

    // Sparks
    for (var sp = sparks.length - 1; sp >= 0; sp--) {
      var s = sparks[sp];
      s.t += dt; s.x += s.vx * dt; s.y += s.vy * dt;
      s.vy += 0.08 * dt; s.alpha = Math.max(0, 1 - s.t / 40);
      cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      cx.fillStyle = s.color; cx.globalAlpha = s.alpha; cx.fill(); cx.globalAlpha = 1;
      if (s.t > 40) sparks.splice(sp, 1);
    }

    // Lives (hearts)
    if ((state.phase === 'play' || state.phase === 'reveal') && !DEMO && !BOT) {
      for (var li = 0; li < 3; li++) {
        cx.font = '20px -apple-system, Helvetica, Arial';
        cx.textAlign = 'left';
        cx.globalAlpha = li < state.lives ? 1 : 0.2;
        cx.fillText('♥', 18 + li * 30, 50);
        cx.globalAlpha = 1;
      }
    }

    // Score & progress header
    if (state.phase === 'play' || state.phase === 'reveal') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 54px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 90);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 112);
      // Layer progress dots
      var dotY = H - 80, dotSpacing = 20;
      var dotTotal = state.totalLayers;
      var startDotX = W / 2 - (dotTotal - 1) * dotSpacing / 2;
      for (var d = 0; d < dotTotal; d++) {
        var peeled3 = state.totalLayers - state.layers;
        cx.beginPath(); cx.arc(startDotX + d * dotSpacing, dotY, 5, 0, Math.PI * 2);
        if (d < peeled3) {
          cx.fillStyle = LAYER_COLORS[d % LAYER_COLORS.length];
          cx.globalAlpha = 0.9; cx.fill(); cx.globalAlpha = 1;
        } else {
          cx.strokeStyle = 'rgba(255,255,255,0.3)'; cx.lineWidth = 1.5; cx.stroke();
        }
      }
      // Dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null) {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 14px -apple-system, Helvetica, Arial';
        cx.textAlign = 'center';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 136);
      }
    }

    // Challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 15px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 310);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('7', W / 2, 405);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top peel", W / 2, 436);
    }

    // Flashes (floating reward text)
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var fa = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = fa; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, H / 2 - 120 - fl.t * 1.5);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // Title screen
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('LAYER PEEL', W / 2, 250);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 16px -apple-system, Helvetica, Arial';
      cx.fillText('peel to the center', W / 2, 290);
      // Draw a decorative concentric circle preview
      for (var li2 = 0; li2 < TOTAL_LAYERS; li2++) {
        var lr = layerRadius(li2, TOTAL_LAYERS);
        cx.beginPath(); cx.arc(W / 2, H / 2 + 30, lr.outer * 0.6, 0, Math.PI * 2);
        cx.strokeStyle = LAYER_COLORS[li2 % LAYER_COLORS.length];
        cx.lineWidth = (lr.outer - lr.inner) * 0.55;
        cx.globalAlpha = 0.7; cx.stroke(); cx.globalAlpha = 1;
      }
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO START', W / 2, H / 2 + 190); cx.globalAlpha = 1;
    }

    // Game over / score card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.65)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      var revealWin = state.layers <= 0;
      if (revealWin) {
        cx.fillStyle = GOLD; cx.font = '900 40px -apple-system, Helvetica, Arial';
        cx.fillText('REVEALED!', W / 2, 300);
      } else {
        cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
        cx.fillText('PEELED OUT.', W / 2, 300);
      }
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' layers', W / 2, 348);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 22px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 390);
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 414);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — PEEL AGAIN', W / 2, 460); cx.globalAlpha = 1;
        // Share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // Demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('LAYER PEEL', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they peeled ' + (window.__demoScore || 7) + '. your move.', W / 2, 342);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 7), W / 2, 412);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 444);
      cx.globalAlpha = 1;
    }

    // Mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center'; cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial'; cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  // Color utilities
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return [r, g, b];
  }
  function lighten(hex, amt) {
    var c = hexToRgb(hex);
    return 'rgb(' + Math.min(255, c[0] + Math.round(255*amt)) + ',' + Math.min(255, c[1] + Math.round(255*amt)) + ',' + Math.min(255, c[2] + Math.round(255*amt)) + ')';
  }
  function darken(hex, amt) {
    var c = hexToRgb(hex);
    return 'rgb(' + Math.max(0, c[0] - Math.round(255*amt)) + ',' + Math.max(0, c[1] - Math.round(255*amt)) + ',' + Math.max(0, c[2] - Math.round(255*amt)) + ')';
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
