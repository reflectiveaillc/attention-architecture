<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Level — Tilt</title>
<!--
  LOOP / attention-architecture — Stack Level
  Circuits: 01-rpe (variable reward per placement), 06-zeigarnik (one more try),
            08-investment (the taller the tower, the more you've invested).
  Modes:
    ?demo=1&seed=7   scripted mirror-neuron clip, sets window.__demoDone
    ?bot=1&runs=N&seed=5  imperfect autopilot, N runs, sets window.__botDone
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0d12; overflow:hidden;
               -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#0b0d12; }
</style>

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>window.LOOP_GAME = 'stack-level';</script>
<script src="../../js/loop-events.js"></script>
<script src="../../js/juice.js"></script>
<script src="../../js/share.js"></script>
<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 18;
  var SEED = +qs.get('seed') || 42;

  // mulberry32 seeded RNG
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';
  var BLOCK_H = 32, BASE_W = 230, PERFECT_PX = 8, NEAR_MISS_R = 0.25;
  var SWING_AMP = 180;  // half-width swing range (centered on W/2)

  // swing angle drives the block position; it swings like a pendulum
  var state, flashes, fallers, cam, runStartTs, placedThisRun, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var ctaAt = 0;
  try { best = +localStorage.getItem('sl_best') || 0; } catch (_) {}

  function newGame() {
    state = {
      phase: 'title',   // title | challenge | play | over | cta
      stack: [{ x: W / 2, w: BASE_W, hue: 178 }],
      angle: 0,         // swinger angle (rad), oscillates -1..1 mapped to x
      angVel: 0.022,    // radians per frame (increases with score)
      swingDir: 1,
      score: 0, combo: 0, overAt: 0
    };
    flashes = []; fallers = []; cam = 0; placedThisRun = 0; dareBeaten = false;
    hitStop = 0; zoom = 1; shakeAmt = 0;

    if (DEMO) {
      prebuildDemoStack();
      state.phase = 'challenge';
      challengeAt = performance.now();
      setTimeout(startRun, 1250);
      return;
    }
    if (BOT) { startRun(); return; }
    // human: title screen
  }

  var challengeAt = 0;

  // Demo: pre-build a tall, slightly tapered stack to heighten investment
  function prebuildDemoStack() {
    var x = W / 2, n = 22;
    for (var i = 1; i <= n; i++) {
      var w = BASE_W - Math.round(i * (BASE_W - 64) / n);
      x += (rng() - 0.5) * 5;
      state.stack.push({ x: x, w: w, hue: (178 + i * 16) % 360 });
    }
    state.score = n;
    cam = Math.max(0, (state.stack.length - 1) * BLOCK_H - 260);
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 12))));
  }

  function startRun() {
    state.phase = 'play';
    state.angle = 0; state.swingDir = 1;
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  // Current x position of the swinging block
  function swingerX() {
    return W / 2 + Math.sin(state.angle) * SWING_AMP;
  }

  function drop() {
    var top = state.stack[state.stack.length - 1];
    var mx = swingerX();
    var mw = top.w;   // swinger is same width as top block (Jenga-feel)
    var offset = mx - top.x;
    var overlap = mw - Math.abs(offset);
    placedThisRun++;

    if (overlap <= 1) {  // MISS — tower topples
      fallers.push({ x: mx, y: topY() - BLOCK_H, w: mw, hue: (top.hue + 16) % 360, vy: -2, vr: (offset > 0 ? 1 : -1) * 0.04, r: 0 });
      gameOver();
      return;
    }

    var perfect = Math.abs(offset) <= PERFECT_PX;
    var ratio = overlap / mw;

    if (window.J) {
      if (perfect) J.perfect(state.combo + 1);
      else if (ratio < NEAR_MISS_R) J.near();
      else J.hit(state.score + 1);
      J.tension(Math.min(state.score / 35, 1));
    }
    if (perfect) { hitStop = 5; zoom = 1.03; }
    if (ratio < NEAR_MISS_R) shakeAmt = 4;

    var nx, nw;
    if (perfect) {
      nx = top.x; nw = mw; state.combo++;
    } else {
      nw = overlap;
      nx = (Math.max(mx - mw / 2, top.x - top.w / 2) + Math.min(mx + mw / 2, top.x + top.w / 2)) / 2;
      state.combo = 0;
      // trimmed chunk falls
      var cutW = mw - overlap;
      var cutX = offset > 0 ? nx + nw / 2 + cutW / 2 : nx - nw / 2 - cutW / 2;
      fallers.push({ x: cutX, y: topY() - BLOCK_H, w: cutW, hue: (top.hue + 16) % 360, vy: -1.5, vr: (offset > 0 ? 1 : -1) * 0.05, r: 0 });
    }

    state.stack.push({ x: nx, w: nw, hue: (top.hue + 16) % 360 });
    state.score++;

    // dare beaten?
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score);
    }

    if (perfect) flash('PERFECT', TEAL, 46);
    else if (ratio < NEAR_MISS_R) {
      flash('SO CLOSE!', VERM, 40);
      if (window.LOOP) LOOP.emit('near_miss', { n: state.score, ratio: +ratio.toFixed(3) });
    }
    if (window.LOOP) LOOP.emit('block_placed', { n: state.score, ratio: +ratio.toFixed(3), perfect: perfect });

    // Speed up swing slightly each block
    state.angVel = 0.022 + state.score * 0.0008;
  }

  function gameOver() {
    state.phase = 'over';
    state.overAt = performance.now();
    shakeAmt = 10;
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (window.J) {
      J.death(Math.min(0.3 + state.score / 35, 1));
      if (newBest) setTimeout(function () { J.fanfare(); }, 450);
    }
    if (DEMO) window.__demoScore = state.score;
    if (newBest) { best = state.score; try { localStorage.setItem('sl_best', String(best)); } catch (_) {} }
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +(dur).toFixed(1) });

    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 2800);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 800);
    }
  }

  function resetRun() {
    state.stack = [{ x: W / 2, w: BASE_W, hue: 178 }];
    state.score = 0; state.combo = 0; fallers = []; cam = 0; placedThisRun = 0;
    state.angle = 0; state.swingDir = 1;
    state.angVel = 0.022;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }
  function topY() { return H - 140 - (state.stack.length - 1) * BLOCK_H + cam; }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { drop(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'blocks' }); return;
      }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- demo / bot autopilots ----
  // Demo script: angle offsets from perfect (in radians).
  // 'sliver' = drop with only ~20% overlap (near-fail tension peak).
  // 'miss' = let swing go well past the edge.
  // Hesitation beats (demoWaits) make it feel human.
  var demoScript = [0.08, -0.10, 0.12, -0.07, 'sliver', 0.04, -0.09, 'miss'];
  var demoWaits  = [32,   28,    42,    50,    36,       48,   30,     20  ];
  var demoIdx = 0, demoWait = 40;

  var botRunsDone = 0, botTargetAngle = null;

  function autopilot() {
    if (state.phase !== 'play') return;

    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var want = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (want === 'miss') {
        // let the swinger go completely off — miss by >1 block width
        var top = state.stack[state.stack.length - 1];
        var mx = swingerX();
        var offset = mx - top.x;
        if (Math.abs(offset) > top.w + 10) { demoIdx++; demoWait = 20; drop(); }
        return;
      }
      // target angle = perfect angle + offset
      var perfectAngle = Math.asin(Math.max(-1, Math.min(1, (state.stack[state.stack.length - 1].x - W / 2) / SWING_AMP)));
      var targetAngle = perfectAngle + (want === 'sliver' ? 0.72 : want);
      var dist = targetAngle - state.angle;
      // cross the target when moving toward it
      if (Math.abs(dist) <= Math.abs(state.angVel) * state.swingDir * 1.2 || (dist * state.swingDir < 0 && Math.abs(dist) < 0.15)) {
        drop();
        demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;
        demoIdx++;
      }
    } else if (BOT) {
      // Bot: target a random offset angle, drop when close
      var top2 = state.stack[state.stack.length - 1];
      if (botTargetAngle === null) {
        var pAngle = Math.asin(Math.max(-1, Math.min(1, (top2.x - W / 2) / SWING_AMP)));
        botTargetAngle = pAngle + gauss() * (BOT_ERR / 100);
        botTargetAngle = Math.max(-0.9, Math.min(0.9, botTargetAngle));
      }
      var d = botTargetAngle - state.angle;
      if (Math.abs(d) <= Math.abs(state.angVel) * 1.1) {
        botTargetAngle = null;
        drop();
      }
    }
  }

  // ---- render ----
  function blockFill(hue, y) {
    var g = cx.createLinearGradient(0, y, 0, y + BLOCK_H);
    g.addColorStop(0, 'hsl(' + hue + ',62%,58%)');
    g.addColorStop(1, 'hsl(' + hue + ',66%,44%)');
    return g;
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // camera follows stack growth
    var wantCam = Math.max(0, (state.stack.length - 1) * BLOCK_H - 260);
    cam += (wantCam - cam) * 0.08 * dt;

    // swing oscillation (frozen during hit-stop)
    if (hitStop > 0) {
      hitStop -= dt;
    } else if (state.phase === 'play') {
      state.angle += state.angVel * state.swingDir * dt;
      if (state.angle > 1.0)  { state.angle = 1.0;  state.swingDir = -1; }
      if (state.angle < -1.0) { state.angle = -1.0; state.swingDir =  1; }
      autopilot();
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.84, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // stack blocks
    for (var i = 0; i < state.stack.length; i++) {
      var b = state.stack[i], by = H - 140 - i * BLOCK_H + cam;
      if (by > H + BLOCK_H || by < -BLOCK_H) continue;
      cx.fillStyle = blockFill(b.hue, by);
      cx.fillRect(b.x - b.w / 2, by, b.w, BLOCK_H - 2);
    }

    // swinging block
    if (state.phase === 'play') {
      var top = state.stack[state.stack.length - 1];
      var mx = swingerX();
      var my = topY() - BLOCK_H;
      var mhue = (top.hue + 16) % 360;

      // swing arm guide line
      cx.save();
      cx.strokeStyle = 'rgba(255,255,255,0.10)';
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.moveTo(W / 2, my - 40);
      cx.lineTo(mx, my);
      cx.stroke();
      cx.restore();

      cx.fillStyle = blockFill(mhue, my);
      cx.fillRect(mx - top.w / 2, my, top.w, BLOCK_H - 2);
      cx.strokeStyle = 'rgba(255,255,255,0.35)'; cx.lineWidth = 1;
      cx.strokeRect(mx - top.w / 2 + 0.5, my + 0.5, top.w - 1, BLOCK_H - 3);
    }

    // falling trims
    for (var f = fallers.length - 1; f >= 0; f--) {
      var p = fallers[f];
      p.vy += 0.38 * dt; p.y += p.vy * dt; p.r += p.vr * dt;
      cx.save(); cx.translate(p.x, p.y + BLOCK_H / 2); cx.rotate(p.r);
      cx.globalAlpha = Math.max(0, 0.9 - (p.y - topY()) / H);
      cx.fillStyle = 'hsl(' + p.hue + ',60%,48%)';
      cx.fillRect(-p.w / 2, -BLOCK_H / 2, p.w, BLOCK_H - 2);
      cx.restore(); cx.globalAlpha = 1;
      if (p.y > H + 100) fallers.splice(f, 1);
    }

    // score display
    if (state.phase === 'play' || state.phase === 'over') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 146);
      }
    }

    // challenge card (demo beat 1)
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('28', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top tower", W / 2, 430);
    }

    // floating flash texts
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 240 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title screen
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('STACK LEVEL', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO DROP', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('one block off and the tower falls.', W / 2, 360);
    }

    // game over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('TOPPLED.', W / 2, 300);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' blocks', W / 2, 345);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('taller than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — BUILD HIGHER', W / 2, 462);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var elapsed = (now - ctaAt) / 1000, ease = Math.min(1, elapsed * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('STACK LEVEL', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('they stacked ' + (window.__demoScore || 28) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 28), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
