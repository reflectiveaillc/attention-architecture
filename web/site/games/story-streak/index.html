<script>
(function () {
  'use strict';
  var W = 405, H = 720;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);

  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var CARD_M = 28; // margin inside card

  var state, runStartTs, flashes, particles, best = 0;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  try { best = +localStorage.getItem('ss_best') || 0; } catch (_) {}

  function cardColor(i) {
    var hue = 180 + (i * 47) % 180; // sweep teal -> gold -> verm
    return 'hsl(' + hue + ',70%,' + (38 + (i % 3) * 6) + '%)';
  }

  function newGame() {
    state = {
      phase: 'title',
      score: 0, combo: 0, index: 0,
      cardEnter: 0, cardDuration: 1600,
      sweetPct: { a: 0.25, b: 0.75 },
      swiped: false, missReason: '',
      overAt: 0, ctaAt: 0,
      slideY: 0, slideVy: 0

    flashes = []; particles = []; dareBeaten = false;
    if (DEMO) {
      state.phase = 'challenge';
      state.challengeAt = performance.now();

  }

  function difficultyFor(score) {
    // faster, tighter windows as streak grows — tuned for ~18-24s demo clip
    var dur = Math.max(520, 1300 - score * 55);
    var tight = Math.max(0.10, 0.48 - score * 0.017);
    var a = Math.max(0.08, 0.5 - tight / 2);
    var b = Math.min(0.92, 0.5 + tight / 2);
    return { dur: dur, a: a, b: b };
  }

  function pctTop(score) {
    return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-score / 9))));
  }

  function startRun() {
    state.phase = 'play';
    state.score = 0; state.combo = 0; state.index = 0;
    state.swiped = false; state.missReason = '';
    state.cardEnter = performance.now();
    var d = difficultyFor(0);
    state.cardDuration = d.dur; state.sweetPct = { a: d.a, b: d.b };
    runStartTs = Date.now();
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function nextCard() {
    state.index++;
    state.score++;
    state.swiped = false; state.missReason = '';
    state.slideY = H;
    state.slideVy = -0.55;
    state.botTarget = undefined;
    state.cardEnter = performance.now();
    var d = difficultyFor(state.score);
    state.cardDuration = d.dur;
    state.sweetPct = { a: d.a, b: d.b };
  }

  function miss(reason) {
    state.phase = 'over';
    state.overAt = performance.now();
    state.missReason = reason;
    shakeAmt = 10;
    if (window.J) J.death(Math.min(0.35 + state.score / 30, 1));
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (newBest) {
      best = state.score;
      try { localStorage.setItem('ss_best', String(best)); } catch (_) {}
      if (window.J) setTimeout(function () { J.fanfare(); }, 400);
    }
    if (DEMO) window.__demoScore = state.score;
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });
    spawnParticles(W / 2, H / 2, VERM, 26);
    if (DEMO) {
      setTimeout(function () {
        state.phase = 'cta';
        state.ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3500);
      }, 2200);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else setTimeout(function () { resetRun(); }, 900);
    }
  }

  function resetRun() {
    state.score = 0; state.combo = 0; state.index = 0;
    state.swiped = false; state.missReason = '';
    state.slideY = 0; state.slideVy = 0;
    state.botTarget = undefined;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }
  function spawnParticles(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      var ang = rng() * Math.PI * 2, sp = 2 + rng() * 7;
      particles.push({ x: x, y: y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, life: 30 + rng() * 30, color: color, size: 2 + rng() * 5 });
    }
  }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 496, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  var ptrStartX = 0, ptrStartY = 0, ptrDown = false, ptrHandled = false;
  function swipe() {
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) { resetRun(); return; }
    if (state.phase !== 'play' || state.swiped) return;
    var elapsed = performance.now() - state.cardEnter;
    var dur = state.cardDuration;
    var a = dur * state.sweetPct.a;
    var b = dur * state.sweetPct.b;
    var half = (b - a) / 2;
    var center = (a + b) / 2;

    if (elapsed < a) { miss('early'); return; }
    if (elapsed > b) { miss('late'); return; }

    var dist = Math.abs(elapsed - center);
    var perfect = dist <= half * 0.28;
    var near = dist > half * 0.55;
    state.swiped = true;

    if (window.J) {
      if (perfect) J.perfect(state.combo + 1);
      else if (near) J.near();
      else J.hit(state.score + 1);
      if ((state.score + 1) % 10 === 0) J.gold();
      J.tension(Math.min(state.score / 35, 1));
    }

    if (perfect) {
      state.combo++;
      hitStop = 5;
      zoom = 1.04;
      flash('PERFECT', TEAL, 48);
      spawnParticles(W / 2, H - 120, TEAL, 12);
    } else if (near) {
      state.combo = 0;
      shakeAmt = 4;
      zoom = 1.015;
      flash('SO CLOSE', VERM, 40);
      if (window.LOOP) LOOP.emit('near_miss', { n: state.score + 1, dist: Math.round(dist) });
    } else {
      state.combo = 0;
      zoom = 1.02;
      flash('+1', '#fff', 34);
    }

    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score + 1 > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(state.score + 1);
    }
    if (window.LOOP) LOOP.emit('story_swiped', { n: state.score + 1, perfect: perfect, near: near, elapsed: Math.round(elapsed) });
    nextCard();
  }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J && state.phase === 'play') { J.toggleMute(); return; }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'stories' }); return;
      }
      resetRun(); return;
    }
    swipe();
  }

  window.addEventListener('pointerdown', function (e) {
    if (DEMO || BOT) return;
    ptrDown = true; ptrHandled = false;
    ptrStartX = e.clientX; ptrStartY = e.clientY;
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) / scale, y = (e.clientY - r.top) / scale;
    if (state.phase !== 'play') { tap(x, y); ptrHandled = true; }
    else if (inR(MUTE_R, x, y) && window.J) { J.toggleMute(); ptrHandled = true; }
  });
  window.addEventListener('pointerup', function (e) {
    if (DEMO || BOT) return;
    if (!ptrDown) return;
    ptrDown = false;
    if (ptrHandled) return;
    var dx = e.clientX - ptrStartX, dy = e.clientY - ptrStartY;
    if (state.phase === 'play') {
      if (dy < -40 || (Math.abs(dx) < 12 && Math.abs(dy) < 12)) swipe();
    } else if (state.phase === 'over') {
      var r = cv.getBoundingClientRect();
      tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
    }
  });
  window.addEventListener('keydown', function (e) { if (DEMO || BOT) return; if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') swipe(); });

  // ---- demo / bot autopilots ----
  var botRunsDone = 0;
  var demoIdx = 0, demoWait = 0;
  // offsets (ms from window center). 'miss' = deliberate early swipe.
  var demoScript = [0, 55, -40, 70, -65, 0, 100, 0, -90, 0, 0, 130, 0, -120, 0, 0, 0, 0, 'miss']; // 18 hits, then miss
  var demoWaits = [40, 30, 28, 34, 32, 26, 38, 24, 36, 22, 28, 44, 20, 42, 18, 30, 24, 20, 0];

  function autopilot() {
    if (state.phase !== 'play' || state.swiped) return;
    var elapsed = performance.now() - state.cardEnter;
    var dur = state.cardDuration;
    var a = dur * state.sweetPct.a;
    var b = dur * state.sweetPct.b;
    var center = (a + b) / 2;
    var half = (b - a) / 2;

    if (DEMO) {
      if (demoWait > 0) { demoWait--; return; }
      var want = demoScript[Math.min(demoIdx, demoScript.length - 1)];
      if (want === 'miss') {
        // swipe before the window opens → too-early miss
        if (elapsed < a - 80) {
          demoIdx++; demoWait = 20;
          miss('early');
        }
        return;
      }
      var target = center + (typeof want === 'number' ? want : 0);

        demoIdx++;
        var rawWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 30;

        var maxWait = Math.max(0, Math.floor((dur * state.sweetPct.a - 50) / 16.667));
        demoWait = Math.min(rawWait, maxWait);
        swipe();
      }
    } else if (BOT) {
      if (state.botTarget === undefined) {
        // imperfect timing; can drift outside the window and miss
        var err = gauss() * BOT_ERR * half * (1 + state.score / 18);
        state.botTarget = center + err;
      }
      var t = state.botTarget;
      if (Math.abs(elapsed - t) <= 22) {
        state.botTarget = undefined;
        swipe();
      }
      // safety timeout so every run terminates
      if (elapsed > dur - 40) { state.botTarget = undefined; miss('late'); }
    }

  // ---- render ----
  function drawCard(idx, y, alpha, isCurrent) {
    var x = CARD_M, w = W - CARD_M * 2, h = H - CARD_M * 2;
    cx.save();
    cx.globalAlpha = alpha;
    var col = cardColor(idx);
    // card body
    var g = cx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, col);
    g.addColorStop(1, 'hsl(' + (180 + idx * 47) % 360 + ',55%,22%)');
    cx.fillStyle = g;
    if (cx.roundRect) {
      cx.beginPath(); cx.roundRect(x, y, w, h, 18); cx.fill();
    } else {
      cx.fillRect(x, y, w, h);

    // inner accent bar
    cx.fillStyle = 'rgba(255,255,255,0.08)';
    cx.fillRect(x + 18, y + 40, w - 36, 8);
    cx.fillRect(x + 18, y + 64, w - 96, 4);
    cx.fillRect(x + 18, y + 76, w - 140, 4);

      cx.beginPath();
      cx.arc(x + 20 + i * 14, y + 22, 3, 0, Math.PI * 2);

      cx.fillStyle = '#fff';
      cx.textAlign = 'center';
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText('STORY STREAK', W / 2, y + h / 2 - 40);
      cx.fillStyle = VERM;
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(performance.now() / 280);
      cx.globalAlpha = alpha * pulse;
      cx.fillText('SWIPE UP', W / 2, y + h / 2 + 10);
      cx.globalAlpha = alpha;
      cx.fillStyle = 'rgba(255,255,255,0.35)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText("don't skip the beat.", W / 2, y + h / 2 + 38);
    }
    cx.restore();
  }

  function drawBeatRing(y) {
    var elapsed = performance.now() - state.cardEnter;
    var dur = state.cardDuration;
    var pct = Math.min(1, elapsed / dur);
    var a = state.sweetPct.a;
    var b = state.sweetPct.b;
    var cxm = W / 2, cym = y + (H - CARD_M * 2) / 2 + CARD_M;
    var rOut = Math.min(W, H) / 2 - 10;
    var rIn = rOut - 8;

    // full background ring
    cx.strokeStyle = 'rgba(255,255,255,0.08)';
    cx.lineWidth = 8;
    cx.beginPath(); cx.arc(cxm, cym, rOut - 4, 0, Math.PI * 2); cx.stroke();

    // sweet window arc
    var angA = -Math.PI / 2 + a * Math.PI * 2;
    var angB = -Math.PI / 2 + b * Math.PI * 2;
    cx.strokeStyle = 'rgba(255,255,255,0.18)';
    cx.lineWidth = 8;
    cx.beginPath(); cx.arc(cxm, cym, rOut - 4, angA, angB); cx.stroke();

    // sweet zone teal fill
    cx.strokeStyle = TEAL;
    cx.lineWidth = 8;
    cx.beginPath(); cx.arc(cxm, cym, rOut - 4, angA, angB); cx.stroke();

    // moving beat dot
    var ang = -Math.PI / 2 + pct * Math.PI * 2;
    var dx = cxm + Math.cos(ang) * (rOut - 4);
    var dy = cym + Math.sin(ang) * (rOut - 4);
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(dx, dy, 7, 0, Math.PI * 2); cx.fill();

    // too-early / too-late warning
    if (pct < a - 0.05) {
      cx.fillStyle = 'rgba(255,255,255,0.45)';
      cx.textAlign = 'center';
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText('WAIT', W / 2, y + 118);
    } else if (pct > b + 0.02 && pct < 1) {
      cx.fillStyle = VERM;
      cx.textAlign = 'center';
      cx.font = '700 13px -apple-system, Helvetica, Arial';
      cx.fillText('TOO LATE', W / 2, y + 118);
    }
  }

  function drawSwipeArrow(y) {
    var t = performance.now() / 250;
    var bounce = 8 * Math.sin(t);
    var x = W / 2, yb = y + (H - CARD_M * 2) - 100 + bounce;
    cx.strokeStyle = 'rgba(255,255,255,0.55)';
    cx.lineWidth = 3;
    cx.beginPath();
    cx.moveTo(x, yb + 28);
    cx.lineTo(x, yb);
    cx.moveTo(x - 10, yb + 12);
    cx.lineTo(x, yb);
    cx.lineTo(x + 10, yb + 12);
    cx.stroke();
    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.textAlign = 'center';
    cx.font = '700 13px -apple-system, Helvetica, Arial';
    cx.fillText('SWIPE UP', W / 2, yb + 48);
  }

  function drawBurn(y) {
    var t = (performance.now() - state.overAt) / 800;
    var alpha = Math.max(0, 1 - t);
    cx.save();
    cx.globalAlpha = alpha;
    cx.fillStyle = VERM;
    cx.fillRect(0, y, W, H);
    cx.fillStyle = '#fff';
    cx.textAlign = 'center';
    cx.font = '900 54px -apple-system, Helvetica, Arial';
    cx.fillText('BURNED', W / 2, y + H / 2);
    cx.restore();
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop: freeze sim, decay every frame
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play' && !state.swiped) {
      var elapsed = now - state.cardEnter;
      if (elapsed > state.cardDuration) { miss('late'); }
      else autopilot();
    }

    // slide animation for next card
    if (state.slideY !== 0) {
      state.slideY += state.slideVy * dt;
      if (state.slideY < 0) { state.slideY = 0; state.slideVy = 0; }
    }

    // juice transforms
    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // background
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.05)');
    bg.addColorStop(1, 'rgba(232,80,46,0.08)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // title
    if (state.phase === 'title') {
      drawCard(0, CARD_M, 1, true);
      drawSwipeArrow(CARD_M);
    }

    // challenge card
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 96px -apple-system, Helvetica, Arial';
      cx.fillText('18', W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's top run", W / 2, 430);
    }

    // play
    if (state.phase === 'play' || state.phase === 'over') {
      var prevY = CARD_M - H + state.slideY * 0.3;
      var curY = CARD_M - state.slideY;
      var nextY = CARD_M + H - state.slideY;
      if (state.index > 0) drawCard(state.index - 1, prevY, Math.max(0, 1 - state.slideY / (H * 0.5)), false);
      drawCard(state.index, curY, 1, true);
      if (state.phase === 'play' && !state.swiped) {
        drawBeatRing(curY);
        drawSwipeArrow(curY);
      }
      if (state.index < 200) drawCard(state.index + 1, nextY, 0.55, false);

      // score + combo
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '800 64px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 120);
      if (state.combo > 1) {
        var pulse = 1 + state.combo * 0.04;
        cx.save();
        cx.translate(W / 2, 154);
        cx.scale(pulse, pulse);
        cx.fillStyle = GOLD;
        cx.font = '800 22px -apple-system, Helvetica, Arial';
        cx.fillText('×' + state.combo, 0, 0);
        cx.restore();
      }
      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 186);
      }
    }

    // over card
    if (state.phase === 'over') {
      var curY2 = CARD_M - state.slideY;
      drawBurn(curY2);
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('STREAK BURNED.', W / 2, 290);
      cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' stories', W / 2, 335);
      var pt = pctTop(state.score);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 382);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 406);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 452);
        cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - state.ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('STORY STREAK', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he hit ' + (window.__demoScore || 18) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + (window.__demoScore || 18), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // floating text
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 42);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 250 - fl.t * 0.7);
      cx.globalAlpha = 1;
      if (fl.t > 42) flashes.splice(k, 1);
    }

    // particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.25 * dt;
      p.life -= dt;
      cx.globalAlpha = Math.max(0, p.life / 30);
      cx.fillStyle = p.color;
      cx.beginPath(); cx.arc(p.x, p.y, p.size, 0, Math.PI * 2); cx.fill();
      if (p.life <= 0) particles.splice(i, 1);
    }
    cx.globalAlpha = 1;

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
