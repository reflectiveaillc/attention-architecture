<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var BOT_ERR  = +qs.get('err') || 180;
  var SEED = +qs.get('seed') || 42;

  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);
  function gauss() { var u = 1 - rng(), v = rng(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W * scale) + 'px'; cv.style.height = (H * scale) + 'px';
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var INK = '#0b0d12', VERM = '#e8502e', TEAL = '#2ec5b6', GOLD = '#f2b134';
  var ROUNDS = [
    { c: 3, t: 2000 },
    { c: 4, t: 1700 },
    { c: 5, t: 1400 },
    { c: 5, t: 1100 },
    { c: 6, t: 900 }
  ];
  var ROW_Y = 380, GAP = 10, CHALLENGE_TARGET = 14500;

  var state, toys, activeIdx, combo, runStartTs, activeStartTs, scoreMs = 0, completed = false;
  var hitStop = 0, zoom = 1, shakeAmt = 0, dareBeaten = false;
  var challengeAt = 0, ctaAt = 0, overAt = 0, best = 0;
  try { best = +localStorage.getItem('squish_best') || 0; } catch (_) {}

  function fmtMs(ms) { return (ms / 1000).toFixed(2) + 's'; }

  function buildRound(r) {
    var cfg = ROUNDS[r - 1];
    var c = cfg.c;
    var rad = Math.min(38, (W - 40 - (c - 1) * GAP) / (2 * c));
    var total = 2 * rad * c + GAP * (c - 1);
    var startX = (W - total) / 2 + rad;
    var out = [];
    for (var i = 0; i < c; i++) {
      out.push({ x: startX + i * (2 * rad + GAP), y: ROW_Y, r: rad, max: cfg.t, t: cfg.t,
                 squished: false, pop: false, pressT: 0, popT: 0 });
    }
    return out;
  }

  function setActive(i) { activeIdx = i; activeStartTs = performance.now(); }

  function newGame() {
    state = { phase: 'title', round: 1 };
    toys = buildRound(1); setActive(0);
    combo = 0; scoreMs = 0; completed = false; dareBeaten = false;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    if (DEMO) { state.phase = 'challenge'; challengeAt = performance.now(); setTimeout(startRun, 1200); return; }
    if (BOT) startRun();
  }

  function startRun() {
    state.phase = 'play';
    runStartTs = performance.now();
    activeStartTs = runStartTs;
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function pressActive() {
    if (state.phase !== 'play' || activeIdx < 0 || activeIdx >= toys.length) return;
    var t = toys[activeIdx];
    if (t.squished || t.pop) return;
    var ratio = t.t / t.max;
    t.squished = true; t.pressT = 0;
    combo++;
    var near = ratio < 0.18;
    if (window.J) {
      if (near) { J.near(); hitStop = 5; zoom = 1.03; shakeAmt = 6; flash('SO CLOSE', VERM, 38); }
      else { J.hit(combo); hitStop = 2; zoom = 1.015; shakeAmt = 1; }
      J.tension(Math.min(state.round / 5, 1));
    }
    if (near && window.LOOP) LOOP.emit('near_miss', { round: state.round, n: activeIdx + 1, ratio: +ratio.toFixed(3) });
    if (window.LOOP) LOOP.emit('squish', { round: state.round, n: activeIdx + 1, leftMs: Math.round(t.t) });

    var next = activeIdx + 1;
    while (next < toys.length && toys[next].squished) next++;
    if (next >= toys.length) roundComplete();
    else setActive(next);
  }

  function roundComplete() {
    flash('ROUND ' + state.round, GOLD, 40);
    zoom = 1.04;
    if (window.J) J.gold();
    if (state.round >= 5) { cleanSweep(); return; }
    if (window.LOOP) LOOP.emit('round_complete', { round: state.round, timeMs: Math.round(performance.now() - runStartTs) });
    state.round++;
    toys = buildRound(state.round);
    setActive(0);
  }

  function cleanSweep() {
    completed = true;
    scoreMs = performance.now() - runStartTs;
    var newBest = best === 0 || scoreMs < best;
    if (newBest) { best = scoreMs; try { localStorage.setItem('squish_best', String(best)); } catch (_) {} }
    if (window.J) { J.fanfare(); J.tension(0); }
    checkDare();
    gameOver();
  }

  function failToy() {
    var t = toys[activeIdx]; if (!t) return;
    t.pop = true;
    scoreMs = performance.now() - runStartTs;
    if (window.J) { J.death(Math.min(0.3 + state.round / 5, 1)); J.tension(0); }
    gameOver();
  }

  function checkDare() {
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && completed && scoreMs < SHARE.dare) {
      dareBeaten = true; flash('DARE BEATEN', TEAL, 44);
      if (window.J) J.fanfare();
      SHARE.beaten(scoreMs);
    }
  }

  function gameOver() {
    state.phase = 'over'; overAt = performance.now(); shakeAmt = 9;
    if (window.LOOP) LOOP.emit('game_over', { score: Math.round(scoreMs), dur_s: +(scoreMs / 1000).toFixed(2), completed: completed });
    if (DEMO) {
      window.__demoScore = Math.round(scoreMs);
      setTimeout(function () { state.phase = 'cta'; ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3000);
      }, 1500);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) window.__botDone = true;
      else setTimeout(resetRun, 900);
    }
  }

  function resetRun() {
    state = { phase: 'play', round: 1 };
    toys = buildRound(1); setActive(0);
    combo = 0; scoreMs = 0; completed = false; dareBeaten = false;
    hitStop = 0; zoom = 1; shakeAmt = 0;
    botTarget = null; demoStep = 0; demoWaitMs = null;
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function flash(txt, color, size) { flashes.push({ txt: txt, color: color, size: size, t: 0 }); }

  // ---- input ----
  var MUTE_R = { x: W - 46, y: 10, w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 520, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play') { pressActive(); return; }
    if (state.phase === 'over' && performance.now() - overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) { SHARE.send({ score: Math.round(scoreMs), unit: 'ms' }); return; }
      resetRun();
    }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') { e.preventDefault(); tap(); } });

  // ---- autopilots ----
  var botRunsDone = 0, botTarget = null;
  // 16 presses, fail on the 17th toy. Near-fail at index 7 (~60% of the run).
  var demoStep = 0;
  var demoPlan = [
    0.55, 0.45, 0.60,       // round 1
    0.50, 0.65, 0.55, 0.70, // round 2
    0.97, 0.55, 0.70, 0.50, // round 3 — index 7 is the near-fail
    0.45, 0.60, 0.55        // round 4 — stops before the fourth toy
  ];
  var demoWaitMs = null;

  function botPlan() {
    if (activeIdx < 0 || activeIdx >= toys.length) return;
    var max = toys[activeIdx].max;
    var delay = max * 0.5 + gauss() * BOT_ERR;
    if (delay < 60) delay = 60;
    botTarget = activeStartTs + delay;
  }

  function autopilot() {
    if (state.phase !== 'play' || activeIdx < 0 || activeIdx >= toys.length) return;
    var t = toys[activeIdx];
    if (t.squished || t.pop) return;
    if (DEMO) {
      if (demoStep >= demoPlan.length) return; // let the timer expire → spectacle fail
      if (demoWaitMs === null) demoWaitMs = demoPlan[demoStep] * t.max;
      if (performance.now() - activeStartTs >= demoWaitMs) {
        pressActive();
        demoStep++;
        demoWaitMs = null;
      }
    } else if (BOT) {
      if (botTarget === null) botPlan();
      if (performance.now() >= botTarget) { botTarget = null; pressActive(); }
    }
  }

  // ---- render ----
  var flashes = [];
  var last = performance.now();

  function pctTop(ms) { return Math.max(1, Math.min(99, Math.round(100 * Math.exp(-ms / 6500)))); }

  function drawToy(t, isActive, now) {
    var squish = 1;
    if (t.squished) { t.pressT += 0.25; squish = 1 - 0.68 * Math.min(t.pressT, 1); }
    var scaleY = squish;
    var scaleX = 1 + (1 - squish) * 0.25;
    var alpha = 1;
    if (t.pop) { t.popT += 0.12; scaleX = 1 + t.popT * 0.6; scaleY = 1 + t.popT * 0.6; alpha = Math.max(0, 1 - t.popT); }

    cx.save();
    cx.globalAlpha = alpha;
    cx.translate(t.x, t.y);
    cx.scale(scaleX, scaleY);

    var g = cx.createRadialGradient(-t.r * 0.3, -t.r * 0.3, t.r * 0.2, 0, 0, t.r);
    g.addColorStop(0, isActive ? '#4ad6c8' : '#3bbba9');
    g.addColorStop(1, isActive ? TEAL : '#208a7e');
    cx.fillStyle = g;
    cx.beginPath();
    cx.ellipse(0, 0, t.r, t.r, 0, 0, Math.PI * 2);
    cx.fill();

    // highlight
    cx.fillStyle = 'rgba(255,255,255,0.18)';
    cx.beginPath();
    cx.ellipse(-t.r * 0.25, -t.r * 0.25, t.r * 0.35, t.r * 0.22, -0.4, 0, Math.PI * 2);
    cx.fill();

    if (t.squished) {
      // squish crease
      cx.strokeStyle = 'rgba(11,13,18,0.25)'; cx.lineWidth = 2;
      cx.beginPath(); cx.moveTo(-t.r * 0.6, 0); cx.lineTo(t.r * 0.6, 0); cx.stroke();
    }

    cx.restore();

    if (isActive && !t.squished && !t.pop) {
      var ratio = Math.max(0, t.t / t.max);
      cx.save();
      cx.globalAlpha = 0.9;
      cx.strokeStyle = ratio < 0.2 ? VERM : GOLD;
      cx.lineWidth = 5;
      cx.beginPath();
      cx.arc(t.x, t.y, t.r * ratio, -Math.PI / 2, -Math.PI / 2 + ratio * Math.PI * 2);
      cx.stroke();
      // active glow ring
      cx.strokeStyle = 'rgba(255,255,255,0.25)'; cx.lineWidth = 2;
      cx.beginPath(); cx.arc(t.x, t.y, t.r + 5 + 2 * Math.sin(now / 180), 0, Math.PI * 2); cx.stroke();
      cx.restore();
    }
  }

  function frame(now) {
    var dtMs = now - last;
    var dt = Math.min(dtMs / 16.667, 3); last = now;

    // freeze sim during hit-stop, but always decay it
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play' && activeIdx >= 0 && activeIdx < toys.length) {
      var a = toys[activeIdx];
      if (!a.squished && !a.pop) {
        a.t -= dtMs;
        if (a.t <= 0) { a.t = 0; failToy(); }
        else autopilot();
      }
    }

    cx.save();
    if (shakeAmt > 0.2 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt, sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy); cx.scale(zoom, zoom); cx.translate(-W / 2, -H / 2);
    }
    shakeAmt *= Math.pow(0.85, dt); zoom += (1 - zoom) * 0.12 * dt;

    // bg
    cx.fillStyle = INK; cx.fillRect(-20, -20, W + 40, H + 40);
    var bg = cx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(46,197,182,0.06)'); bg.addColorStop(1, 'rgba(232,80,46,0.07)');
    cx.fillStyle = bg; cx.fillRect(0, 0, W, H);

    // row
    for (var i = 0; i < toys.length; i++) drawToy(toys[i], i === activeIdx, now);

    // ui
    cx.textAlign = 'center';
    if (state.phase === 'play' || state.phase === 'over') {
      var elapsed = state.phase === 'over' ? scoreMs : performance.now() - runStartTs;
      cx.fillStyle = '#fff'; cx.font = '800 56px -apple-system, Helvetica, Arial';
      cx.fillText(fmtMs(elapsed), W / 2, 96);
      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + (best ? fmtMs(best) : '--'), W / 2, 122);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '700 14px -apple-system, Helvetica, Arial';
      cx.fillText('ROUND ' + state.round + '/5', W / 2, 150);
      if (combo > 1) {
        cx.fillStyle = GOLD; cx.font = '800 18px -apple-system, Helvetica, Arial';
        cx.fillText('×' + combo, W / 2, 176);
      }
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + fmtMs(SHARE.dare) + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 204);
      }
    }

    // challenge card
    if (state.phase === 'challenge') {
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.font = '800 16px Menlo, monospace';
      cx.fillText('SCORE TO BEAT', W / 2, 300);
      cx.fillStyle = GOLD; cx.font = '900 80px -apple-system, Helvetica, Arial';
      cx.fillText(fmtMs(CHALLENGE_TARGET), W / 2, 400);
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText("today's fastest clean sweep", W / 2, 430);
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 40);
      cx.globalAlpha = a; cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.5) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 260 - fl.t * 0.6);
      cx.globalAlpha = 1;
      if (fl.t > 40) flashes.splice(k, 1);
    }

    // title
    if (state.phase === 'title') {
      cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('SQUISH ROW', W / 2, 280);
      cx.fillStyle = VERM; cx.font = '700 18px -apple-system, Helvetica, Arial';
      var pulse = 0.6 + 0.4 * Math.sin(now / 300);
      cx.globalAlpha = pulse; cx.fillText('TAP TO SQUISH', W / 2, 330); cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('pop the row before it pops you.', W / 2, 360);
    }

    // game over
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.55)'; cx.fillRect(0, 0, W, H);
      cx.textAlign = 'center';
      if (completed) {
        cx.fillStyle = TEAL; cx.font = '900 38px -apple-system, Helvetica, Arial';
        cx.fillText('CLEAN SWEEP', W / 2, 290);
        cx.fillStyle = '#fff'; cx.font = '800 30px -apple-system, Helvetica, Arial';
        cx.fillText(fmtMs(scoreMs), W / 2, 340);
      } else {
        cx.fillStyle = VERM; cx.font = '900 40px -apple-system, Helvetica, Arial';
        cx.fillText('POPPED.', W / 2, 300);
        cx.fillStyle = '#fff'; cx.font = '800 26px -apple-system, Helvetica, Arial';
        cx.fillText('CRACKED AT ' + fmtMs(scoreMs), W / 2, 345);
      }
      var pt = pctTop(scoreMs);
      cx.fillStyle = GOLD; cx.font = '900 24px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 392);
      cx.fillStyle = 'rgba(255,255,255,0.55)'; cx.font = '600 13px -apple-system, Helvetica, Arial';
      cx.fillText('better than ' + (100 - pt) + '% of players', W / 2, 416);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2; cx.fillStyle = TEAL;
        cx.font = '700 17px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE TRY', W / 2, 470); cx.globalAlpha = 1;
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        cx.roundRect ? cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23) : cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD; cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.75 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease; cx.textAlign = 'center';
      cx.fillStyle = '#fff'; cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('SQUISH ROW', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)'; cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('he cracked at ' + fmtMs(window.__demoScore || 0) + '. your move.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('BEAT ' + fmtMs(window.__demoScore || 0), W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = TEAL; cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 442);
      cx.globalAlpha = 1;
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }
    cx.restore();

    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
