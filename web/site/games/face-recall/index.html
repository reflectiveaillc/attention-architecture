    cx.fillStyle = 'rgba(255,255,255,0.55)';
    cx.font = '500 15px -apple-system, Helvetica, Arial';
    cx.fillText('three faces flash — remember them', W / 2, 300);
    cx.fillText('tap the three in the lineup', W / 2, 322);
    var pulse = 0.6 + 0.4 * Math.sin(now / 320);
    cx.globalAlpha = pulse;
    cx.fillStyle = VERM;
    cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('TAP TO START', W / 2, 380);
    cx.globalAlpha = 1;
    // show 3 face previews
    var fp = flashPositions();
    for (var i = 0; i < 3; i++) {
      drawFace(FACE_TEMPLATES[i], cx, fp[i].x, fp[i].y + 50, FACE_SZ_FLASH, false, false, false);
    }
  }

  function drawChallenge(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.font = '800 16px Menlo, monospace';
    cx.fillText('SCORE TO BEAT', W / 2, 300);
    cx.fillStyle = GOLD;
    cx.font = '900 96px -apple-system, Helvetica, Arial';
    cx.fillText('11', W / 2, 405);
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.font = '600 13px -apple-system, Helvetica, Arial';
    cx.fillText("out of 12 correct", W / 2, 435);
  }

  function drawFlashPhase(now) {
    // countdown bar
    var elapsed = now - state.flashStart;
    var pct = Math.max(0, 1 - elapsed / FLASH_DUR);
    cx.fillStyle = 'rgba(255,255,255,0.12)';
    cx.fillRect(40, 68, W - 80, 6);
    cx.fillStyle = pct > 0.33 ? TEAL : VERM;
    cx.fillRect(40, 68, (W - 80) * pct, 6);

    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.45)';
    cx.font = '600 12px -apple-system, Helvetica, Arial';
    cx.fillText('REMEMBER THESE', W / 2, 96);

    var fp = flashPositions();
    for (var i = 0; i < 3; i++) {
      drawFace(FACE_TEMPLATES[state.targets[i]], cx, fp[i].x, fp[i].y, FACE_SZ_FLASH, false, false, false);
    }

    // result overlay (after submitting)
    if (state.phase === 'result') {
      cx.fillStyle = 'rgba(11,13,18,0.38)';
      cx.fillRect(0, 0, W, H);
    }
  }

  function drawLineupPhase(now) {
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.font = '700 15px -apple-system, Helvetica, Arial';
    cx.fillText('TAP THE THREE YOU SAW', W / 2, 96);
    cx.fillStyle = 'rgba(255,255,255,0.38)';
    cx.font = '500 12px -apple-system, Helvetica, Arial';
    cx.fillText(state.picked.length + ' / 3 selected', W / 2, 116);

    var gp = gridPositions();
    for (var i = 0; i < state.lineup.length; i++) {
      var selected = state.picked.indexOf(i) !== -1;
      drawFace(FACE_TEMPLATES[state.lineup[i]], cx, gp[i].x, gp[i].y, FACE_SZ_GRID, selected, false, false);
    }
  }

  function drawOver(now) {
    cx.fillStyle = 'rgba(11,13,18,0.6)';
    cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';

    // show final lineup with correct answers revealed
    var gp = gridPositions();
    for (var i = 0; i < state.lineup.length; i++) {
      var isTarget = state.targets.indexOf(state.lineup[i]) !== -1;
      var wasPicked = state.picked.indexOf(i) !== -1;
      var wrong = wasPicked && !isTarget;
      drawFace(FACE_TEMPLATES[state.lineup[i]], cx, gp[i].x, gp[i].y, FACE_SZ_GRID, wasPicked, isTarget && !wasPicked, wrong);
    }

    cx.fillStyle = VERM;
    cx.font = '900 36px -apple-system, Helvetica, Arial';
    cx.fillText(state.score + ' / 12', W / 2, 130);
    var pt = pctTop(state.score);
    cx.fillStyle = GOLD;
    cx.font = '800 18px -apple-system, Helvetica, Arial';
    cx.fillText('TOP ' + pt + '% TODAY', W / 2, 158);

    if (!DEMO && !BOT) {
      var p2 = 0.6 + 0.4 * Math.sin(now / 280);
      cx.globalAlpha = p2;
      cx.fillStyle = TEAL;
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('TAP — PLAY AGAIN', W / 2, 192);
      cx.globalAlpha = 1;
      // share pill
      cx.fillStyle = 'rgba(242,177,52,0.14)';
      cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
      else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
      cx.fill(); cx.stroke();
      cx.fillStyle = GOLD;
      cx.font = '800 15px -apple-system, Helvetica, Arial';
      cx.fillText(window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND', W / 2, SHARE_R.y + 30);
    }
  }

  function drawCta(now) {
    var t = (now - state.ctaAt) / 1000, ease = Math.min(1, t * 2.2);
    cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')';
    cx.fillRect(0, 0, W, H);
    cx.globalAlpha = ease;
    cx.textAlign = 'center';
    cx.fillStyle = '#fff';
    cx.font = '900 44px -apple-system, Helvetica, Arial';
    cx.fillText('FACE RECALL', W / 2, 300);
    cx.fillStyle = 'rgba(255,255,255,0.7)';
    cx.font = '700 18px -apple-system, Helvetica, Arial';
    cx.fillText('I got ' + (window.__demoScore || 11) + '/12. think you can?', W / 2, 342);
    var p3 = 0.7 + 0.3 * Math.sin(now / 240);
    cx.fillStyle = VERM; cx.globalAlpha = ease * p3;
    cx.font = '900 28px -apple-system, Helvetica, Arial';
    cx.fillText('BEAT ' + (window.__demoScore || 11), W / 2, 406);
    cx.globalAlpha = ease;
    cx.fillStyle = TEAL;
    cx.font = '700 15px -apple-system, Helvetica, Arial';
    cx.fillText('link in bio', W / 2, 440);
    cx.globalAlpha = 1;
  }

  // ---- demo autopilot ----
  // Beats: challenge(done via timeout) → flash(watch) → lineup(pick 3 with human timing)
  // Mirror-neuron arc: round 1 perfect, round 2 perfect, round 3 near-miss (2/3), round 4 fail (1/3)
  var demoPhase = 0; // which sub-beat we're in
  var demoWait  = 0;
  var demoPicks = [];  // for current lineup
  var demoLineupIdx = 0;

  // per-round scripts: array of lineup slot indices to pick (may be wrong)
  // We'll pick them based on state after flash. Schedule set when lineup begins.
  var demoRoundScripts = [
    { correct: 3, hesitation: [48, 55, 40] },  // round 0: all right, slow
    { correct: 3, hesitation: [38, 44, 50] },  // round 1: all right
    { correct: 2, hesitation: [52, 40, 60] },  // round 2: near-miss (2/3) — tension
    { correct: 1, hesitation: [44, 60, 55] },  // round 3: fail (1/3) — the real death
  ];
  var demoRoundIdx = 0;
  var demoPickPlan = null;
  var demoPickCursor = 0;
  var demoPickWait = 0;

  function buildPickPlan(roundScript) {
    // build ordered list of 3 lineup indices to tap
    var plan = [];
    var targetSlots = state.targets.map(function (t) { return state.lineup.indexOf(t); });
    var foilSlots = [];
    for (var i = 0; i < 6; i++) { if (targetSlots.indexOf(i) === -1) foilSlots.push(i); }
    shuffleArray(foilSlots);
    var correct = roundScript.correct;
    // pick correct targets
    for (var j = 0; j < correct; j++) plan.push(targetSlots[j]);
    // fill rest with foils
    for (var f = 0; plan.length < 3; f++) plan.push(foilSlots[f]);
    // shuffle pick order
    shuffleArray(plan);
    return plan;
  }

  function demoAct(now, dt) {
    if (!DEMO) return;
    if (state.phase === 'flash') {
      // just wait for flash to expire — human-feeling
      demoPickPlan = null;
      demoPickCursor = 0;
    }
    if (state.phase === 'lineup' && state.picked.length < 3) {
      if (!demoPickPlan) {
        var script = demoRoundScripts[Math.min(demoRoundIdx, demoRoundScripts.length - 1)];
        demoPickPlan = buildPickPlan(script);
        demoPickWait = script.hesitation[0] || 45;
        demoPickCursor = 0;
      }
      demoPickWait -= dt;
      if (demoPickWait <= 0 && demoPickCursor < demoPickPlan.length) {
        tapFace(demoPickPlan[demoPickCursor]);
        demoPickCursor++;
        var script2 = demoRoundScripts[Math.min(demoRoundIdx, demoRoundScripts.length - 1)];
        demoPickWait = script2.hesitation[demoPickCursor] || 42;
      }
    }
    if (state.phase === 'result') {
      demoPickPlan = null;
      demoRoundIdx++;
    }
  }

  newGame();
  requestAnimationFrame(frame);
}());
</script>
</body>
