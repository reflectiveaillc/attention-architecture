<script>
(function () {
  'use strict';
  var W = 405, H = 720;
  var qs = new URLSearchParams(location.search);
  var DEMO = qs.get('demo') === '1';
  var BOT  = qs.get('bot') === '1';
  var BOT_RUNS = +qs.get('runs') || 3;
  var SEED = +qs.get('seed') || 42;

  // deterministic RNG (mulberry32) — reproducible demo clips
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rng = mulberry32(SEED);

  var cv = document.getElementById('c'), cx = cv.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2), scale = 1;
  function fit() {
    var vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width  = (W * scale) + 'px';
    cv.style.height = (H * scale) + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', fit); fit();

  var TEAL = '#2ec5b6', GOLD = '#f2b134', INK = '#0b0d12';

  // Ink color palette — calm tones (teal family + muted jewel tones)
  var INK_COLORS = [
    { h: 181, s: 63, l: 48 },   // teal
    { h: 210, s: 55, l: 52 },   // steel blue
    { h: 263, s: 40, l: 55 },   // muted violet
    { h: 155, s: 50, l: 42 },   // deep mint
    { h: 194, s: 58, l: 45 },   // slate blue
    { h: 230, s: 45, l: 58 },   // periwinkle
    { h: 170, s: 55, l: 40 },   // forest teal
    { h: 240, s: 35, l: 60 },   // soft indigo
    { h: 140, s: 42, l: 44 },   // sage
    { h: 200, s: 60, l: 50 },   // sky
  ];

  // ---- game constants ----
  var MAX_DROPS = 10;
  var STILL_TIMEOUT = 5000;    // ms before forcing game_over in 'stilling'
  var BLOOM_LIFE = 3.8;        // seconds a bloom lives

  // ---- state ----
  var state, blooms, flashes, dareBeaten;
  var runStartTs, calmTone, colorIdx;
  var hitStop, zoom, shakeAmt, ctaAt, waveT, inviteT;
  var best = 0;
  try { best = +localStorage.getItem('id_best') || 0; } catch (_) {}

  // ---- demo script ----
  // positions as fractions of W,H; hesitation waits in frames at 60fps
  var demoIdx = 0, demoWait = 70;
  var demoPositions = [
    [0.50, 0.50],  // center anchor
    [0.30, 0.42],
    [0.68, 0.45],
    [0.50, 0.32],
    [0.50, 0.68],
    [0.22, 0.60],
    [0.78, 0.58],
    [0.38, 0.72],
    [0.62, 0.30],
    [0.50, 0.50],  // final drop over center — full tie-dye
  ];
  var demoWaits = [70, 58, 72, 85, 62, 78, 65, 90, 55, 80];

  // ---- bot state ----
  var botRunsDone, botDropsDone, botDropTimer;

  // ---- off-screen bloom buffer ----
  var offCanvas, offCtx;
  function initOffscreen() {
    offCanvas = document.createElement('canvas');
    offCanvas.width  = W * dpr;
    offCanvas.height = H * dpr;
    offCtx = offCanvas.getContext('2d');
    offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    offCtx.fillStyle = INK;
    offCtx.fillRect(0, 0, W, H);
  }

  // paint a bloom gradient on the off-screen canvas (permanent stain)
  function paintBloom(bloom, alpha) {
    var c = bloom.color;
    var r = bloom.maxR * bloom.fill;
    var g = offCtx.createRadialGradient(bloom.x, bloom.y, 0, bloom.x, bloom.y, r);
    var col = 'hsla(' + c.h + ',' + c.s + '%,' + c.l + '%,';
    g.addColorStop(0,   col + (0.72 * alpha) + ')');
    g.addColorStop(0.4, col + (0.55 * alpha) + ')');
    g.addColorStop(0.8, col + (0.25 * alpha) + ')');
    g.addColorStop(1,   col + '0)');
    offCtx.globalCompositeOperation = 'source-over';
    offCtx.fillStyle = g;
    offCtx.beginPath();
    offCtx.arc(bloom.x, bloom.y, r, 0, Math.PI * 2);
    offCtx.fill();
  }

  function newGame() {
    initOffscreen();
    blooms  = [];
    flashes = [];
    hitStop = 0; zoom = 1; shakeAmt = 0;
    ctaAt = 0; waveT = 0; inviteT = 0;
    dareBeaten = false;
    calmTone = 0;
    colorIdx  = 0;
    demoIdx   = 0; demoWait = demoWaits[0];
    botRunsDone = 0; botDropsDone = 0; botDropTimer = 0;

    state = { phase: 'title', score: 0, drops: 0, overAt: 0, stillStart: 0 };

    if (DEMO) { startRun(); }
    else if (BOT) {
      botDropTimer = 20 + Math.floor(rng() * 30);
      startRun();
    }
  }

  function startRun() {
    state.phase  = 'play';
    state.score  = 0;
    state.drops  = 0;
    state.overAt = 0;
    state.stillStart = 0;
    blooms  = [];
    flashes = [];
    calmTone = 0;
    colorIdx = 0;
    dareBeaten = false;
    runStartTs = Date.now();
    // reset offscreen to pure ink
    offCtx.globalCompositeOperation = 'source-over';
    offCtx.fillStyle = INK;
    offCtx.fillRect(0, 0, W, H);
    if (window.LOOP) LOOP.emit('play_start', { seed: SEED });
  }

  function addDrop(x, y) {
    var c = INK_COLORS[colorIdx % INK_COLORS.length];
    colorIdx++;
    var maxR = 80 + rng() * 70;
    blooms.push({
      x: x, y: y,
      r: 0, maxR: maxR,
      fill: 0,             // 0..1 fill fraction (for permanent stain)
      born: 0,
      life: BLOOM_LIFE,
      color: c,
      painted: false,      // has the permanent stain been committed?
    });
    state.drops++;
    if (window.J) J.calm(calmTone++);

    // calm juice — every 3rd drop gets a mild pulse
    if (state.drops % 3 === 0) {
      hitStop = 2;
      zoom    = 1.015;
      shakeAmt = 1.2;
      flash('✦', TEAL, 20, x, y - 30);
    } else {
      zoom = Math.max(zoom, 1.006);
    }

    if (window.LOOP) LOOP.emit('ink_drop', { n: state.drops, x: Math.round(x), y: Math.round(y), color: c.h });
    state.score += 10 + Math.round(rng() * 20);   // slight novelty variance

    // check dare beaten
    checkDare();

    if (state.drops >= MAX_DROPS) {
      state.phase     = 'stilling';
      state.stillStart = performance.now();
    }
  }

  function gameOver() {
    state.phase  = 'over';
    state.overAt = performance.now();
    var dur = (Date.now() - runStartTs) / 1000;
    var newBest = state.score > best;
    if (newBest) {
      best = state.score;
      try { localStorage.setItem('id_best', String(best)); } catch (_) {}
    }
    if (window.J) J.calm(calmTone++);
    if (window.LOOP) LOOP.emit('game_over', { score: state.score, dur_s: +dur.toFixed(1) });

    if (DEMO) {
      window.__demoScore = state.score;
      setTimeout(function () {
        state.phase = 'cta';
        ctaAt = performance.now();
        setTimeout(function () { window.__demoDone = true; }, 3600);
      }, 1600);
    }
    if (BOT) {
      botRunsDone++;
      if (botRunsDone >= BOT_RUNS) { window.__botDone = true; }
      else { setTimeout(function () { resetRun(); }, 800); }
    }
  }

  function resetRun() {
    botDropsDone  = 0;
    botDropTimer  = 20 + Math.floor(rng() * 30);
    demoIdx  = 0;
    demoWait = demoWaits[0];
    if (window.LOOP) LOOP.emit('restart', {});
    startRun();
  }

  function checkDare() {
    if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && !dareBeaten && state.score > SHARE.dare) {
      dareBeaten = true;
      flash('DARE BEATEN', TEAL, 44);
      SHARE.beaten(state.score);
    }
  }

  function flash(txt, color, size, x, y) {
    flashes.push({ txt: txt, color: color, size: size, x: x, y: y, t: 0 });
  }

  // ---- input ----
  var MUTE_R  = { x: W - 46, y: 10,  w: 38, h: 38 };
  var SHARE_R = { x: W / 2 - 125, y: 486, w: 250, h: 46 };
  function inR(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function tap(x, y) {
    if (DEMO || BOT) return;
    if (x !== undefined && inR(MUTE_R, x, y) && window.J) { J.toggleMute(); return; }
    if (state.phase === 'title') { startRun(); return; }
    if (state.phase === 'play' && state.drops < MAX_DROPS) {
      var rx = x !== undefined ? x : W * (0.3 + rng() * 0.4);
      var ry = y !== undefined ? y : H * (0.3 + rng() * 0.4);
      addDrop(rx, ry);
      return;
    }
    if (state.phase === 'over' && performance.now() - state.overAt > 350) {
      if (x !== undefined && inR(SHARE_R, x, y) && window.SHARE) {
        SHARE.send({ score: state.score, unit: 'hues' }); return;
      }
      resetRun();
    }
    if (state.phase === 'cta') { resetRun(); }
  }
  window.addEventListener('pointerdown', function (e) {
    var r = cv.getBoundingClientRect();
    tap((e.clientX - r.left) / scale, (e.clientY - r.top) / scale);
  });
  window.addEventListener('keydown', function (e) { if (e.code === 'Space') tap(); });

  // ---- autopilots ----
  function autopilot() {
    if (state.phase !== 'play') return;
    if (DEMO) {
      if (demoWait > 0) { demoWait -= 1; return; }
      if (demoIdx >= demoPositions.length) return;
      var pos = demoPositions[demoIdx];
      addDrop(pos[0] * W, pos[1] * H);
      demoIdx++;
      demoWait = demoWaits[Math.min(demoIdx, demoWaits.length - 1)] || 55;
    } else if (BOT) {
      if (botDropsDone >= MAX_DROPS) return;
      if (botDropTimer > 0) { botDropTimer -= 1; return; }
      var bx = (0.12 + rng() * 0.76) * W;
      var by = (0.18 + rng() * 0.64) * H;
      addDrop(bx, by);
      botDropsDone++;
      botDropTimer = 18 + Math.floor(rng() * 40);
    }
  }

  // ---- simulation ----
  function updateSim(dt) {
    waveT   += dt * 0.012;
    inviteT += dt * 0.0166667;

    for (var i = blooms.length - 1; i >= 0; i--) {
      var b = blooms[i];
      b.born += dt * 0.0166667;   // convert to seconds
      var age = b.born / b.life;
      b.r    = age * b.maxR;
      b.fill = Math.min(1, age * 1.4);   // fill catches up slightly faster than edge

      // commit permanent stain once the bloom is fairly full
      if (!b.painted && b.fill > 0.55) {
        paintBloom(b, 1.0);
        b.painted = true;
      }

      if (b.born >= b.life) {
        if (!b.painted) { paintBloom(b, 1.0); }
        blooms.splice(i, 1);
      }
    }

    // resolve stilling phase
    if (state.phase === 'stilling') {
      var since = performance.now() - state.stillStart;
      if ((since > 2000 && blooms.length === 0) || since > STILL_TIMEOUT) {
        gameOver();
      }
    }
  }

  // ---- rendering ----
  function drawBackground() {
    cx.fillStyle = INK;
    cx.fillRect(-20, -20, W + 40, H + 40);
  }

  function drawOffscreen() {
    cx.drawImage(offCanvas, 0, 0, W * dpr, H * dpr, 0, 0, W, H);
  }

  // draw live (expanding) bloom rings on top of the stained canvas
  function drawLiveBlooms(now) {
    for (var i = 0; i < blooms.length; i++) {
      var b = blooms[i];
      var age = b.born / b.life;
      var c = b.color;

      // draw soft glow core
      var gInner = cx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 0.5);
      gInner.addColorStop(0, 'hsla(' + c.h + ',' + c.s + '%,' + (c.l + 12) + '%,' + (0.35 * (1 - age)) + ')');
      gInner.addColorStop(1, 'hsla(' + c.h + ',' + c.s + '%,' + c.l + '%,0)');
      cx.fillStyle = gInner;
      cx.beginPath();
      cx.arc(b.x, b.y, b.r * 0.5, 0, Math.PI * 2);
      cx.fill();

      // expanding ring edge
      var ringAlpha = (1 - age) * 0.6;
      cx.beginPath();
      cx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      cx.strokeStyle = 'hsla(' + c.h + ',' + c.s + '%,' + (c.l + 8) + '%,' + ringAlpha + ')';
      cx.lineWidth = 2.2 - age * 1.5;
      cx.stroke();

      // center drop particle (fades in first 0.2s)
      if (age < 0.18) {
        var spA = (1 - age / 0.18) * 0.85;
        cx.beginPath();
        cx.arc(b.x, b.y, 7 * (1 - age / 0.18), 0, Math.PI * 2);
        cx.fillStyle = 'hsla(' + c.h + ',' + c.s + '%,' + (c.l + 20) + '%,' + spA + ')';
        cx.fill();
      }
    }
  }

  // water shimmer overlay (very subtle, calm)
  function drawWaterShimmer() {
    cx.save();
    cx.globalAlpha = 0.04;
    for (var i = 0; i < 14; i++) {
      var yBase = 140 + i * 36;
      cx.beginPath();
      cx.moveTo(0, yBase);
      for (var x = 0; x <= W; x += 10) {
        var wave = Math.sin((x / W) * Math.PI * 5 + waveT + i * 0.5) * 2.8;
        cx.lineTo(x, yBase + wave);
      }
      cx.strokeStyle = TEAL;
      cx.lineWidth = 0.9;
      cx.stroke();
    }
    cx.restore();
  }

  function drawFlashes(dt) {
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k];
      fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 50);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '800 ' + Math.round(fl.size + fl.t * 0.35) + 'px -apple-system, Helvetica, Arial';
      var fx = fl.x !== undefined ? fl.x : W / 2;
      var fy = fl.y !== undefined ? fl.y - fl.t * 0.55 : H / 2 - 80 - fl.t * 0.55;
      cx.fillText(fl.txt, fx, fy);
      cx.globalAlpha = 1;
      if (fl.t > 50) flashes.splice(k, 1);
    }
  }

  // gentle pulsing invite circle
  function drawInvite() {
    var pulse = 0.3 + 0.22 * Math.sin(inviteT * 2.0);
    cx.beginPath();
    cx.arc(W / 2, H * 0.52, 52 + 8 * Math.sin(inviteT * 1.6), 0, Math.PI * 2);
    cx.strokeStyle = TEAL;
    cx.lineWidth = 1.5;
    cx.globalAlpha = pulse;
    cx.stroke();
    cx.globalAlpha = 1;
  }

  function drawDropCounter(now) {
    // small pill showing drops remaining
    var remaining = MAX_DROPS - state.drops;
    for (var i = 0; i < MAX_DROPS; i++) {
      var filled = i < state.drops;
      var dotX = W / 2 - (MAX_DROPS - 1) * 11 + i * 22;
      var dotY = H - 52;
      cx.beginPath();
      cx.arc(dotX, dotY, 6, 0, Math.PI * 2);
      if (filled) {
        var c = INK_COLORS[i % INK_COLORS.length];
        cx.fillStyle = 'hsl(' + c.h + ',' + c.s + '%,' + c.l + '%)';
        cx.globalAlpha = 0.85;
      } else {
        cx.fillStyle = 'rgba(255,255,255,0.15)';
        cx.globalAlpha = 1;
      }
      cx.fill();
      cx.globalAlpha = 1;
    }
  }

  function drawHUD(now) {
    cx.textAlign = 'center';

    if (state.phase !== 'title') {
      cx.fillStyle = 'rgba(255,255,255,0.88)';
      cx.font = '800 52px -apple-system, Helvetica, Arial';
      cx.fillText(state.score, W / 2, 90);
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '600 13px Menlo, monospace';
      cx.fillText('BEST ' + best, W / 2, 114);

      // dare banner
      if (!DEMO && !BOT && window.SHARE && SHARE.dare !== null && state.phase === 'play') {
        cx.fillStyle = dareBeaten ? TEAL : GOLD;
        cx.font = '800 15px -apple-system, Helvetica, Arial';
        cx.fillText(dareBeaten ? 'DARE BEATEN ✓' : 'BEAT ' + SHARE.dare + (SHARE.by ? ' — dared by ' + SHARE.by : ''), W / 2, 140);
      }
    }

    // title screen
    if (state.phase === 'title') {
      drawInvite();
      cx.fillStyle = 'rgba(255,255,255,0.92)';
      cx.font = '900 44px -apple-system, Helvetica, Arial';
      cx.fillText('INK DROP', W / 2, H / 2 - 68);
      var pulse = 0.55 + 0.35 * Math.sin(now / 320);
      cx.globalAlpha = pulse;
      cx.fillStyle = TEAL;
      cx.font = '700 19px -apple-system, Helvetica, Arial';
      cx.fillText('TAP TO DROP', W / 2, H / 2 - 22);
      cx.globalAlpha = 1;
      cx.fillStyle = 'rgba(255,255,255,0.3)';
      cx.font = '600 12px -apple-system, Helvetica, Arial';
      cx.fillText('ten drops. let the colors bleed.', W / 2, H / 2 + 10);
    }

    // play: show drop counter dots at bottom
    if (state.phase === 'play' || state.phase === 'stilling') {
      drawDropCounter(now);
    }

    // stilling dimmer
    if (state.phase === 'stilling') {
      var since = performance.now() - state.stillStart;
      var dim = Math.min(0.35, since / STILL_TIMEOUT * 0.8);
      cx.fillStyle = 'rgba(11,13,18,' + dim + ')';
      cx.fillRect(0, 0, W, H);
    }

    // game over card
    if (state.phase === 'over') {
      cx.fillStyle = 'rgba(11,13,18,0.58)'; cx.fillRect(0, 0, W, H);
      cx.fillStyle = TEAL;
      cx.font = '900 42px -apple-system, Helvetica, Arial';
      cx.fillText(state.score + ' HUE', W / 2, 300);
      cx.fillStyle = '#fff';
      cx.font = '800 22px -apple-system, Helvetica, Arial';
      cx.fillText(MAX_DROPS + ' drops', W / 2, 342);
      cx.fillStyle = GOLD;
      cx.font = '900 20px -apple-system, Helvetica, Arial';
      cx.fillText('BEST ' + best, W / 2, 384);
      if (!DEMO && !BOT) {
        var p2 = 0.6 + 0.4 * Math.sin(now / 280);
        cx.globalAlpha = p2;
        cx.fillStyle = TEAL;
        cx.font = '700 16px -apple-system, Helvetica, Arial';
        cx.fillText('TAP — ONE MORE CANVAS', W / 2, 450);
        cx.globalAlpha = 1;
        // share pill
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) {
          cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        } else {
          cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        }
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        var shareLabel = (window.SHARE && SHARE.dare !== null && dareBeaten) ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND';
        cx.fillText(shareLabel, W / 2, SHARE_R.y + 30);
      }
    }

    // demo CTA card (calm — no dare, soft invitation)
    if (state.phase === 'cta') {
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.76 * ease) + ')';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;
      cx.fillStyle = '#fff';
      cx.font = '900 46px -apple-system, Helvetica, Arial';
      cx.fillText('INK DROP', W / 2, 300);
      cx.fillStyle = 'rgba(255,255,255,0.75)';
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText('ten drops. your colors.', W / 2, 340);
      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.globalAlpha = ease * p3;
      cx.fillStyle = TEAL;
      cx.font = '900 30px -apple-system, Helvetica, Arial';
      cx.fillText('▶ GROW YOURS', W / 2, 410);
      cx.globalAlpha = ease;
      cx.fillStyle = 'rgba(255,255,255,0.38)';
      cx.font = '700 16px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 446);
      cx.globalAlpha = 1;
    }
  }

  // ---- main loop ----
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 16.667, 3); last = now;

    // hit-stop: decay, then run autopilot
    if (hitStop > 0) { hitStop -= dt; }
    else if (state.phase === 'play') { autopilot(); }

    var frozen = hitStop > 0;
    if (!frozen) updateSim(dt);

    // decaying juice
    shakeAmt *= Math.pow(0.82, dt);
    zoom += (1 - zoom) * 0.10 * dt;

    // ---- draw ----
    cx.save();
    if (shakeAmt > 0.15 || zoom > 1.001) {
      var sx = (Math.random() - 0.5) * shakeAmt;
      var sy = (Math.random() - 0.5) * shakeAmt;
      cx.translate(W / 2 + sx, H / 2 + sy);
      cx.scale(zoom, zoom);
      cx.translate(-W / 2, -H / 2);
    }

    drawBackground();
    drawOffscreen();
    drawWaterShimmer();
    drawLiveBlooms(now);
    drawFlashes(dt);
    drawHUD(now);

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.45;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
