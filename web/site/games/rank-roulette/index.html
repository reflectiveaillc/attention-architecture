      cx.fillStyle = 'rgba(11,13,18,0.6)'; cx.fillRect(0, 0, W, H);

      // Show wheel frozen at result
      drawWheel(cx, W / 2, 300, (wheelAngle * Math.PI / 180));

      // Result overlay
      var won = finalScore >= betScore && resultMult > 0;
      cx.fillStyle = won ? TEAL : VERM;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText(won ? 'YOU WIN' : 'NOPE', W / 2, 500);

      cx.fillStyle = '#fff';
      cx.font = '900 60px -apple-system, Helvetica, Arial';
      cx.fillText(finalScore + ' pts', W / 2, 558);

      cx.fillStyle = resultColor;
      cx.font = '700 20px -apple-system, Helvetica, Arial';
      cx.fillText(resultLabel + ' × ' + baseRoll + ' = ' + finalScore, W / 2, 588);

      var pt = pctTop(finalScore);
      cx.fillStyle = GOLD;
      cx.font = '900 18px -apple-system, Helvetica, Arial';
      cx.fillText('TOP ' + pt + '% TODAY', W / 2, 618);

      if (!DEMO && !BOT) {
        // Share button
        cx.fillStyle = 'rgba(242,177,52,0.14)';
        cx.strokeStyle = GOLD; cx.lineWidth = 1.5;
        cx.beginPath();
        if (cx.roundRect) cx.roundRect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h, 23);
        else cx.rect(SHARE_R.x, SHARE_R.y, SHARE_R.w, SHARE_R.h);
        cx.fill(); cx.stroke();
        cx.fillStyle = GOLD;
        cx.font = '800 16px -apple-system, Helvetica, Arial';
        cx.fillText(
          window.SHARE && SHARE.dare !== null && dareBeaten ? '⚡ DARE THEM BACK' : '⚡ DARE A FRIEND',
          W / 2, SHARE_R.y + 30
        );

        // tap to restart
        var pr = 0.6 + 0.4 * Math.sin(now / 300);
        cx.globalAlpha = pr;
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.font = '600 13px -apple-system, Helvetica, Arial';
        cx.fillText('tap anywhere to spin again', W / 2, 612);
        cx.globalAlpha = 1;
      }
    }

    if (phase === 'cta') {
      // Demo CTA card
      var t = (now - ctaAt) / 1000, ease = Math.min(1, t * 2.2);
      cx.fillStyle = 'rgba(11,13,18,' + (0.78 * ease) + ')'; cx.fillRect(0, 0, W, H);
      cx.globalAlpha = ease;

      drawWheel(cx, W / 2, 300, wheelAngle * Math.PI / 180);

      cx.textAlign = 'center';
      cx.fillStyle = '#fff';
      cx.font = '900 40px -apple-system, Helvetica, Arial';
      cx.fillText('RANK ROULETTE', W / 2, 510);

      cx.fillStyle = 'rgba(255,255,255,0.7)';
      cx.font = '700 18px -apple-system, Helvetica, Arial';
      cx.fillText('they scored ' + (window.__demoScore || 42) + '. your move.', W / 2, 548);

      var p3 = 0.7 + 0.3 * Math.sin(now / 240);
      cx.fillStyle = VERM;
      cx.globalAlpha = ease * p3;
      cx.font = '900 28px -apple-system, Helvetica, Arial';
      cx.fillText('▶ BEAT ' + (window.__demoScore || 42), W / 2, 600);

      cx.globalAlpha = ease;
      cx.fillStyle = TEAL;
      cx.font = '700 15px -apple-system, Helvetica, Arial';
      cx.fillText('link in bio', W / 2, 630);

      cx.globalAlpha = 1;
    }

    // flashes
    for (var k = flashes.length - 1; k >= 0; k--) {
      var fl = flashes[k]; fl.t += dt;
      var a = Math.max(0, 1 - fl.t / 45);
      cx.globalAlpha = a;
      cx.textAlign = 'center';
      cx.fillStyle = fl.color;
      cx.font = '900 ' + (fl.size + fl.t * 0.4) + 'px -apple-system, Helvetica, Arial';
      cx.fillText(fl.txt, W / 2, 200 - fl.t * 0.8);
      cx.globalAlpha = 1;
      if (fl.t > 45) flashes.splice(k, 1);
    }

    // mute toggle (human only)
    if (!DEMO && !BOT && window.J) {
      cx.textAlign = 'center';
      cx.globalAlpha = 0.5;
      cx.font = '16px -apple-system, Helvetica, Arial';
      cx.fillStyle = '#fff';
      cx.fillText(J.muted ? '🔇' : '🔊', MUTE_R.x + MUTE_R.w / 2, MUTE_R.y + 26);
      cx.globalAlpha = 1;
    }

    cx.restore();
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
