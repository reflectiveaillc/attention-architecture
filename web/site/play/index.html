<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Play — Viral Free Games</title>
<link rel="canonical" href="https://www.viralfreegames.com/play">
<meta name="description" content="An endless feed of free browser games. Play, and when you die swipe up for the next one. No download, no signup.">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;-webkit-user-select:none;user-select:none;overscroll-behavior:none}
  #stage{position:fixed;inset:0;overflow:hidden;background:#000}
  .slide{position:absolute;left:0;width:100%;height:100%;transition:transform .38s cubic-bezier(.22,.61,.36,1);will-change:transform}
  .slide iframe{width:100%;height:100%;border:0;display:block;background:#0b0f1a}
  /* overlays are visual only — pointer-events:none so taps reach the game */
  #top{position:fixed;top:0;left:0;right:0;z-index:25;display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 10px) 12px 12px;background:linear-gradient(#000b,transparent);color:#fff;pointer-events:none}
  #homeBtn{display:flex;align-items:center;gap:7px;pointer-events:auto;text-decoration:none;color:#fff;background:#ffffff14;border:1px solid #ffffff22;padding:7px 11px;border-radius:100px;-webkit-tap-highlight-color:transparent}
  #homeBtn b{font-weight:800;font-size:14px}
  #homeBtn .dot{width:6px;height:6px;border-radius:50%;background:#7cffb2;box-shadow:0 0 8px #7cffb2}
  #top .gname{opacity:.8;font-size:12px;font-weight:600;text-transform:capitalize;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #browseBtn{pointer-events:auto;display:flex;align-items:center;gap:6px;background:#ffffff1f;border:1px solid #ffffff2b;color:#fff;font-weight:800;font-size:13px;padding:8px 13px;border-radius:100px;-webkit-tap-highlight-color:transparent}
  /* browse sheet */
  #scrim{position:fixed;inset:0;z-index:44;background:#000a;opacity:0;pointer-events:none;transition:opacity .25s}
  #scrim.on{opacity:1;pointer-events:auto}
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:45;max-height:80vh;display:flex;flex-direction:column;background:#0d1320;border-radius:20px 20px 0 0;transform:translateY(105%);transition:transform .3s cubic-bezier(.22,.61,.36,1);box-shadow:0 -12px 40px #000a}
  #sheet.on{transform:translateY(0)}
  .shhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
  .shhead b{color:#fff;font-size:17px;font-weight:800}
  #closeSheet{background:#ffffff1a;border:0;color:#fff;font-size:16px;width:32px;height:32px;border-radius:50%}
  .homelink{display:flex;align-items:center;gap:10px;margin:2px 14px 10px;padding:14px 16px;background:linear-gradient(90deg,#7c5cff,#ff4fd8);color:#fff;font-weight:800;font-size:15px;border-radius:14px;text-decoration:none}
  #search{margin:0 14px 10px;padding:11px 14px;background:#ffffff12;border:1px solid #ffffff22;border-radius:12px;color:#fff;font-size:15px;outline:none}
  #search::placeholder{color:#fff7}
  #glist{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 12px calc(env(safe-area-inset-bottom) + 16px);display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:#ffffff12;border:1px solid #ffffff1e;color:#fff;font-size:13px;font-weight:600;padding:9px 13px;border-radius:100px;text-transform:capitalize;-webkit-tap-highlight-color:transparent}
  .chip.cur{background:#7cffb2;color:#062;border-color:#7cffb2}
  #swap{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:70px;padding-bottom:calc(env(safe-area-inset-bottom) + 6px);background:linear-gradient(transparent,#0009);pointer-events:none}
  #swap .chev{color:#fff;font-size:22px;line-height:1;opacity:.9;animation:bob 1.5s ease-in-out infinite}
  #swap .lbl{color:#fff;font-size:11px;font-weight:700;letter-spacing:.3px;opacity:.8;text-shadow:0 1px 4px #000}
  @keyframes bob{0%,100%{transform:translateY(2px)}50%{transform:translateY(-3px)}}
  .site{position:fixed;bottom:6px;right:10px;z-index:21;color:#fff8;font-size:10px;font-weight:700;pointer-events:none;text-shadow:0 1px 3px #000}
  /* death overlay — captures touch (game is over, so it owns the screen) */
  #dead{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(#0009,#000c);color:#fff;text-align:center;padding:24px;touch-action:none}
  #dead.on{display:flex;animation:fade .3s}
  #dead .big{font-size:52px;animation:swipeup 1.5s ease-in-out infinite}
  #dead h2{margin:4px 0 0;font-size:22px;font-weight:900}
  #dead .sub{opacity:.85;font-size:14px}
  #dead .replay{margin-top:16px;background:#fff2;border:1.5px solid #fff6;color:#fff;font-weight:800;font-size:15px;padding:11px 22px;border-radius:100px}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes swipeup{0%{transform:translateY(14px);opacity:.4}50%{transform:translateY(-10px);opacity:1}100%{transform:translateY(14px);opacity:.4}}
  /* first-run hint — captures the first touch (to dismiss) then gets out of the way */
  #hint{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#000b;color:#fff;transition:opacity .5s;text-align:center;padding:24px;touch-action:none}
  #hint .big{font-size:56px;animation:swipeup 1.6s ease-in-out infinite}
  #hint h2{margin:6px 0 0;font-size:20px;font-weight:800}
  #hint p{margin:0;opacity:.85;font-size:14px;max-width:280px;line-height:1.4}
  #hint small{opacity:.6;font-size:12px;margin-top:8px}
</style>
</head>
<body>
<div id="stage"></div>
<div id="top">
  <a id="homeBtn" href="/" aria-label="Home"><span class="dot"></span><b>Viral Free Games</b></a>
  <span class="gname" id="gname"></span>
  <button id="browseBtn" aria-label="Browse games">▦ Browse</button>
</div>
<div id="swap"><div class="chev">⌄</div><div class="lbl">swipe for next game</div></div>
<div class="site">viralfreegames.com</div>

<div id="scrim"></div>
<div id="sheet">
  <div class="shhead"><b>Browse games</b><button id="closeSheet" aria-label="Close">✕</button></div>
  <a class="homelink" href="/">🏠 Exit to home &amp; all games →</a>
  <input id="search" placeholder="Search games…" autocomplete="off">
  <div id="glist"></div>
</div>
<div id="dead">
  <div class="big">⬆</div>
  <h2>Swipe up for the next game</h2>
  <div class="sub">swipe down ↓ for the last one</div>
  <button class="replay" id="replay">↻ Replay</button>
</div>
<div id="hint">
  <div class="big">👆</div>
  <h2>Play. Die. Swipe.</h2>
  <p>An endless feed of free games. Play with a tap — when you lose, swipe up for the next one.</p>
  <small>tap anywhere to start</small>
</div>

<script>
const stage=document.getElementById('stage');
const gname=document.getElementById('gname');
const dead=document.getElementById('dead');
const hint=document.getElementById('hint');
let ORDER=[], idx=0, slides={}, animating=false, alive=true;

// ---- A/B: which "chain of games" to present (sticky per visitor) ----
let VARIANT='ranked', UID='', startTs=Date.now(), maxDepth=0, viewed=new Set();
function getUid(){ try{ let u=localStorage.getItem('vfg_uid'); if(!u){ u='v-'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); localStorage.setItem('vfg_uid',u); } return u; }catch(e){ return 'v-'+Math.random().toString(36).slice(2,10); } }
function hstr(s){ let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))>>>0; return h; }
function femit(event,props){ try{ navigator.sendBeacon('/api/collect', JSON.stringify(Object.assign({event,ts:Date.now(),vid:UID,variant:VARIANT,src:'feed',page_type:'feed'},props||{}))); }catch(_){} }
function viewGame(){ const g=ORDER[idx]; if(g){ viewed.add(idx); if(idx>maxDepth) maxDepth=idx; femit('feed_game_view',{game:g,pos:idx,depth:viewed.size}); } }

async function boot(){
  UID=getUid();
  let VAR=null;
  try{ const r=await fetch('/feed-variants.json',{cache:'no-store'}); VAR=await r.json(); }catch(e){}
  const arms=(VAR&&VAR.arms)||['ranked'];
  const forced=new URLSearchParams(location.search).get('v');
  VARIANT=(forced&&arms.includes(forced))?forced:arms[hstr(UID)%arms.length];
  ORDER=(VAR&&VAR.variants&&VAR.variants[VARIANT])||[];
  if(!ORDER.length){ try{ const r=await fetch('/feed-order.json',{cache:'no-store'}); ORDER=(await r.json()).order||[]; VARIANT='ranked'; }catch(e){} }
  if(!ORDER.length) ORDER=['reflex-duel','stack-rush','drop-dodge','tap-save','ten-seconds','tap-pop','plunge','tap-combo','perfect-circle','orb-dodge'];
  const q=new URLSearchParams(location.search).get('g')||location.hash.slice(1);
  if(q){ const i=ORDER.indexOf(q); if(i>=0) idx=i; }
  mount(idx); mount(idx+1); position(false); setName();
  femit('feed_view',{entry_game:ORDER[idx],arm:VARIANT}); viewGame();
}
addEventListener('pagehide',()=>femit('feed_exit',{max_depth:maxDepth,games_viewed:viewed.size,session_s:Math.round((Date.now()-startTs)/1000)}));
const gameUrl=id=>'/games/'+id+'/?v='+encodeURIComponent(VARIANT)+'&src=feed';
function mount(i){
  if(i<0||i>=ORDER.length||slides[i]) return;
  const d=document.createElement('div'); d.className='slide'; d.dataset.i=i;
  const f=document.createElement('iframe'); f.src=gameUrl(ORDER[i]); f.setAttribute('scrolling','no'); f.allow='autoplay; fullscreen; camera';
  f.addEventListener('load',()=>attachGestures(f));
  d.appendChild(f); stage.appendChild(d); slides[i]=d;
}
function position(anim){
  for(const k in slides){ const i=+k,d=slides[i];
    if(!anim) d.style.transition='none';
    d.style.transform='translateY('+((i-idx)*100)+'%)';
  }
  if(!anim) requestAnimationFrame(()=>{ for(const k in slides) slides[k].style.transition=''; });
}
const clean=s=>s.replace(/-/g,' ');
function setName(){ gname.textContent = ORDER[idx]? '· '+clean(ORDER[idx]):''; }
function go(delta){
  const n=idx+delta;
  if(n<0||n>=ORDER.length||animating) return;
  const from=idx; animating=true; idx=n; alive=true; dead.classList.remove('on');
  mount(idx-1); mount(idx); mount(idx+1);
  position(true); setName();
  femit('feed_advance',{from_pos:from,to_pos:idx,dir:delta>0?'next':'prev',from_game:ORDER[from],to_game:ORDER[idx]});
  viewGame();
  setTimeout(()=>{ animating=false; cleanup(); }, 430);
}
function cleanup(){ for(const k in slides){ const i=+k; if(Math.abs(i-idx)>1){ slides[i].remove(); delete slides[i]; } } }

// jump straight to any game (from the Browse sheet) — no long animation
function goTo(i){
  if(i<0||i>=ORDER.length) { closeSheet(); return; }
  if(i!==idx){ const from=idx; animating=true; idx=i; alive=true; dead.classList.remove('on');
    for(const k in slides){ slides[k].remove(); delete slides[k]; }
    mount(idx-1); mount(idx); mount(idx+1); position(false); setName();
    femit('feed_jump',{from_pos:from,to_pos:idx,to_game:ORDER[idx]}); viewGame();
    setTimeout(()=>{ animating=false; },60);
  }
  closeSheet();
}
// ---- Browse sheet ----
const sheet=document.getElementById('sheet'), scrim=document.getElementById('scrim'), glist=document.getElementById('glist');
let listBuilt=false;
function buildList(){
  glist.innerHTML='';
  ORDER.forEach((id,i)=>{ const c=document.createElement('button'); c.className='chip'+(i===idx?' cur':''); c.textContent=clean(id); c.dataset.i=i; glist.appendChild(c); });
  listBuilt=true;
}
function openSheet(){ if(!listBuilt) buildList(); else glist.querySelectorAll('.chip').forEach(c=>c.classList.toggle('cur',+c.dataset.i===idx)); document.getElementById('search').value=''; glist.querySelectorAll('.chip').forEach(c=>c.style.display=''); sheet.classList.add('on'); scrim.classList.add('on'); }
function closeSheet(){ sheet.classList.remove('on'); scrim.classList.remove('on'); }
document.getElementById('browseBtn').addEventListener('click',openSheet);
document.getElementById('closeSheet').addEventListener('click',closeSheet);
scrim.addEventListener('click',closeSheet);
glist.addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(c) goTo(+c.dataset.i); });
document.getElementById('search').addEventListener('input',e=>{ const q=e.target.value.toLowerCase().replace(/\s+/g,'-'); glist.querySelectorAll('.chip').forEach(c=>{ c.style.display = ORDER[+c.dataset.i].includes(q)?'':'none'; }); });

// ---- swipe detection INSIDE each game iframe (same-origin) → taps still reach the game ----
function attachGestures(iframe){
  let doc; try{ doc=iframe.contentDocument||iframe.contentWindow.document; }catch(e){ return; }
  if(!doc || doc.__loopGeo) return; doc.__loopGeo=1;
  let y0=0,x0=0,t0=0,axis=null,tracking=false;
  const start=t=>{ y0=t.clientY;x0=t.clientX;t0=Date.now();axis=null;tracking=true; if(hint.style.display!=='none')dismissHint(); };
  const move=t=>{ if(!tracking)return; const dy=t.clientY-y0,dx=t.clientX-x0; if(axis===null&&(Math.abs(dy)>12||Math.abs(dx)>12)) axis=Math.abs(dy)>Math.abs(dx)*1.2?'v':'h'; };
  const end=t=>{ if(!tracking)return; tracking=false; const dy=t.clientY-y0,dx=t.clientX-x0,dt=Date.now()-t0;
    if(axis==='v' && Math.abs(dy)>46 && Math.abs(dy)>Math.abs(dx) && dt<800){ go(dy<0?1:-1); } };
  doc.addEventListener('touchstart',e=>start(e.touches[0]),{passive:true,capture:true});
  doc.addEventListener('touchmove', e=>move(e.touches[0]),{passive:true,capture:true});
  doc.addEventListener('touchend',  e=>end(e.changedTouches[0]),{passive:true,capture:true});
  // mouse drag (desktop, over the game)
  doc.addEventListener('mousedown',e=>start(e),{capture:true});
  doc.addEventListener('mouseup',  e=>end(e),{capture:true});
}

// ---- messages from games (death / restart) ----
addEventListener('message',e=>{
  const m=e.data; if(!m||!m.__loopFeed) return;
  if(m.type==='game_over'){ alive=false; clearTimeout(dt2); dt2=setTimeout(()=>{ if(!alive) dead.classList.add('on'); },650); }
  else { alive=true; dead.classList.remove('on'); }
});
let dt2=0;
document.getElementById('replay').addEventListener('click',()=>{ const d=slides[idx]; if(d){ const f=d.querySelector('iframe'); f.src=f.src; } alive=true; dead.classList.remove('on'); });

// ---- swipe on the death overlay (full screen when dead) ----
(function(el){
  let y0=0,t0=0,tr=false;
  el.addEventListener('touchstart',e=>{ if(e.target.id==='replay')return; y0=e.touches[0].clientY;t0=Date.now();tr=true; },{passive:true});
  el.addEventListener('touchend', e=>{ if(!tr)return;tr=false; const dy=e.changedTouches[0].clientY-y0; if(Math.abs(dy)>46&&Date.now()-t0<800) go(dy<0?1:-1); },{passive:true});
})(dead);

// ---- desktop ----
let wl=0;
addEventListener('wheel',e=>{ const n=Date.now(); if(n-wl<480)return; if(Math.abs(e.deltaY)>18){ wl=n; go(e.deltaY>0?1:-1); } },{passive:true});
addEventListener('keydown',e=>{ if(e.key==='ArrowUp')go(-1); else if(e.key==='ArrowDown'||e.key==='PageDown')go(1); });

// ---- first-run hint ----
function dismissHint(){ hint.style.opacity='0'; setTimeout(()=>hint.style.display='none',500); }
hint.addEventListener('touchstart',dismissHint,{once:true,passive:true});
hint.addEventListener('mousedown',dismissHint,{once:true});
setTimeout(()=>{ if(hint.style.display!=='none') dismissHint(); }, 4500);

boot();
</script>
</body>
</html>
