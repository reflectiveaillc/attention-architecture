<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Play — Viral Free Games</title>
<link rel="canonical" href="https://www.viralfreegames.com/play">
<meta name="description" content="An endless feed of free browser games. Play, and when you die just swipe up for the next one. No download, no signup.">
<style>
  :root{ --pill:#12203a; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;-webkit-user-select:none;user-select:none;overscroll-behavior:none;touch-action:none}
  #stage{position:fixed;inset:0;overflow:hidden;background:#000}
  .slide{position:absolute;left:0;width:100%;height:100%;transition:transform .38s cubic-bezier(.22,.61,.36,1);will-change:transform;background:#0b0f1a}
  .slide iframe{width:100%;height:100%;border:0;display:block;background:#0b0f1a}
  /* top brand */
  #top{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;background:linear-gradient(#000a,transparent);color:#fff;pointer-events:none}
  #top b{font-weight:800;font-size:15px}
  #top .gname{opacity:.85;font-size:13px;font-weight:600}
  #top .dot{width:6px;height:6px;border-radius:50%;background:#7cffb2;box-shadow:0 0 8px #7cffb2}
  /* bottom swap pill — always visible, drag up for next */
  #swap{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:16%;min-height:88px;padding-bottom:calc(env(safe-area-inset-bottom) + 8px);background:linear-gradient(transparent,#000b 70%);touch-action:none}
  #swap .chev{color:#fff;font-size:26px;line-height:1;opacity:.9;animation:bob 1.5s ease-in-out infinite}
  #swap .lbl{color:#fff;font-size:12px;font-weight:700;letter-spacing:.3px;opacity:.85;margin-top:2px;text-shadow:0 1px 4px #000}
  @keyframes bob{0%,100%{transform:translateY(3px)}50%{transform:translateY(-3px)}}
  /* first-run hint */
  #hint{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#000a;color:#fff;transition:opacity .5s;text-align:center;padding:24px}
  #hint .big{font-size:56px;animation:swipeup 1.6s ease-in-out infinite}
  #hint h2{margin:6px 0 0;font-size:20px;font-weight:800}
  #hint p{margin:0;opacity:.85;font-size:14px;max-width:280px;line-height:1.4}
  #hint small{opacity:.6;font-size:12px;margin-top:8px}
  @keyframes swipeup{0%{transform:translateY(14px);opacity:.4}50%{transform:translateY(-10px);opacity:1}100%{transform:translateY(14px);opacity:.4}}
  /* death overlay — non-blocking, appears on game_over */
  #dead{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(#0009,#000c);color:#fff;text-align:center;padding:24px;touch-action:none}
  #dead.on{display:flex;animation:fade .3s}
  #dead .big{font-size:52px;animation:swipeup 1.5s ease-in-out infinite}
  #dead h2{margin:4px 0 0;font-size:22px;font-weight:900}
  #dead .sub{opacity:.85;font-size:14px}
  #dead .replay{margin-top:16px;background:#fff2;border:1.5px solid #fff6;color:#fff;font-weight:800;font-size:15px;padding:11px 22px;border-radius:100px;pointer-events:auto}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .site{position:fixed;bottom:6px;right:10px;z-index:21;color:#fff8;font-size:10px;font-weight:700;pointer-events:none;text-shadow:0 1px 3px #000}
</style>
</head>
<body>
<div id="stage"></div>
<div id="top"><span class="dot"></span><b>Viral Free Games</b><span class="gname" id="gname"></span></div>
<div id="swap"><div class="chev">⌄</div><div class="lbl">swipe up · next game</div></div>
<div class="site">viralfreegames.com</div>

<div id="dead">
  <div class="big">⬆</div>
  <h2 id="deadTitle">Swipe up for the next game</h2>
  <div class="sub">swipe down ↓ for the last one</div>
  <button class="replay" id="replay">↻ Replay</button>
</div>

<div id="hint">
  <div class="big">👆</div>
  <h2>Play. Die. Swipe.</h2>
  <p>An endless feed of free games. When you lose, swipe up for the next one.</p>
  <small>tap to start</small>
</div>

<script>
const stage=document.getElementById('stage');
const gname=document.getElementById('gname');
const dead=document.getElementById('dead');
const hint=document.getElementById('hint');
let ORDER=[], idx=0, slides={}, animating=false, alive=true;

// ---- load feed order ----
async function boot(){
  try{ const r=await fetch('/feed-order.json',{cache:'no-store'}); const j=await r.json(); ORDER=j.order||[]; }catch(e){}
  if(!ORDER.length) ORDER=['reflex-duel','stack-rush','drop-dodge','tap-save','ten-seconds','tap-pop','plunge','tap-combo','perfect-circle','orb-dodge'];
  // optional deep link: /play?g=<id> or #<id>
  const q=new URLSearchParams(location.search).get('g')||location.hash.slice(1);
  if(q){ const i=ORDER.indexOf(q); if(i>=0) idx=i; }
  mount(idx); mount(idx+1); position(false); setName();
}
function gameUrl(id){ return '/games/'+id+'/'; }
function mount(i){
  if(i<0||i>=ORDER.length||slides[i]) return;
  const d=document.createElement('div'); d.className='slide'; d.dataset.i=i;
  const f=document.createElement('iframe'); f.src=gameUrl(ORDER[i]); f.loading='lazy'; f.allow='autoplay; fullscreen';
  d.appendChild(f); stage.appendChild(d); slides[i]=d;
}
function position(anim){
  for(const k in slides){ const i=+k; const d=slides[i];
    d.style.transition = anim ? '' : 'none';
    d.style.transform='translateY('+((i-idx)*100)+'%)';
  }
  if(!anim) requestAnimationFrame(()=>{ for(const k in slides) slides[k].style.transition=''; });
}
function setName(){ const id=ORDER[idx]||''; gname.textContent = id? '· '+id.replace(/-/g,' '):''; }
function go(delta){
  const n=idx+delta;
  if(n<0||n>=ORDER.length||animating) return;
  animating=true; idx=n; alive=true; dead.classList.remove('on');
  mount(idx-1); mount(idx); mount(idx+1);
  position(true); setName();
  setTimeout(()=>{ animating=false; cleanup(); }, 420);
}
function cleanup(){ for(const k in slides){ const i=+k; if(Math.abs(i-idx)>1){ slides[i].remove(); delete slides[i]; } } }

// ---- game → feed messages (death, restart) ----
addEventListener('message',(e)=>{
  const m=e.data; if(!m||!m.__loopFeed) return;
  if(m.type==='game_over'){ alive=false; showDead(); }
  else if(m.type==='play_start'||m.type==='restart'||m.type==='first_tap'){ alive=true; dead.classList.remove('on'); }
});
let deadTimer=0;
function showDead(){ clearTimeout(deadTimer); deadTimer=setTimeout(()=>{ if(!alive) dead.classList.add('on'); }, 700); }
document.getElementById('replay').addEventListener('click',()=>{ // reload current game
  const d=slides[idx]; if(d){ const f=d.querySelector('iframe'); f.src=f.src; } alive=true; dead.classList.remove('on');
});

// ---- gesture: swipe up/down. Active on the bottom swap-pill always, and full-screen on death. ----
function bindSwipe(el){
  let y0=null,t0=0,active=false;
  el.addEventListener('touchstart',(e)=>{ y0=e.touches[0].clientY; t0=Date.now(); active=true; },{passive:true});
  el.addEventListener('touchmove',(e)=>{ if(!active)return; },{passive:true});
  el.addEventListener('touchend',(e)=>{ if(!active)return; active=false; const dy=(e.changedTouches[0].clientY)-y0; const dt=Date.now()-t0;
    if(Math.abs(dy)>44 && dt<700){ go(dy<0?1:-1); } else if(Math.abs(dy)<10 && dt<300 && el.id==='swap'){ go(1); } // tap pill = next
  },{passive:true});
}
bindSwipe(document.getElementById('swap'));
bindSwipe(dead);
// desktop
let wheelLock=0;
addEventListener('wheel',(e)=>{ const now=Date.now(); if(now-wheelLock<500)return; if(Math.abs(e.deltaY)>18){ wheelLock=now; go(e.deltaY>0?1:-1); } },{passive:true});
addEventListener('keydown',(e)=>{ if(e.key==='ArrowUp'){go(-1);} else if(e.key==='ArrowDown'){go(1);} });

// ---- first-run hint ----
function dismissHint(){ hint.style.opacity='0'; setTimeout(()=>hint.style.display='none',500); removeEventListener('pointerdown',dismissHint); }
addEventListener('pointerdown',dismissHint,{once:true});
setTimeout(()=>{ if(hint.style.display!=='none') dismissHint(); }, 5000);

boot();
</script>
</body>
</html>
